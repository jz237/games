  const lampGlowGrd = ctx.createRadialGradient(0, helmetY + S*0.015, S*0.01, 0, helmetY + S*0.015, S * 0.15);
  lampGlowGrd.addColorStop(0, `rgba(255,255,200,${lampBrightness * 0.6})`); // 160
  lampGlowGrd.addColorStop(0.3, `rgba(255,255,180,${lampBrightness * 0.2})`);
  lampGlowGrd.addColorStop(1, 'rgba(255,255,180,0)');
  ctx.fillStyle = lampGlowGrd;
  ctx.beginPath(); // 161
  ctx.arc(0, helmetY + S*0.015, S * 0.15, 0, Math.PI * 2);
  ctx.fill(); // 162

  // ── LAMP LIGHT BEAM (directional) ──
  const dirVec = player.dir === 0 ? [1, 0] : player.dir === 2 ? [-1, 0] : player.dir === 3 ? [0, -0.8] : [0, 0.8];
  const beamLen = S * 1.3;
  const bx = dirVec[0] * beamLen;
  const by = dirVec[1] * beamLen;
  if (flickerOn) {
    const beam = ctx.createRadialGradient(0, helmetY, 0, bx * 0.6, helmetY + by * 0.6, beamLen * 1.2);
    beam.addColorStop(0, 'rgba(255,240,180,0.22)'); // 163
    beam.addColorStop(0.5, 'rgba(255,240,180,0.06)');
    beam.addColorStop(1, 'rgba(255,240,180,0)');
    ctx.fillStyle = beam;
    ctx.beginPath(); // 164
    ctx.ellipse(bx * 0.4, helmetY + by * 0.4, S * 0.75, S * 0.45, Math.atan2(by, bx), 0, Math.PI * 2);
    ctx.fill(); // 165

    // Inner bright beam core
    const beamCore = ctx.createRadialGradient(0, helmetY, 0, bx * 0.3, helmetY + by * 0.3, beamLen * 0.5);
    beamCore.addColorStop(0, 'rgba(255,250,200,0.15)'); // 166
    beamCore.addColorStop(1, 'rgba(255,250,200,0)');
    ctx.fillStyle = beamCore;
    ctx.beginPath(); // 167
    ctx.ellipse(bx * 0.25, helmetY + by * 0.25, S * 0.3, S * 0.2, Math.atan2(by, bx), 0, Math.PI * 2);
    ctx.fill(); // 168
  }

  ctx.restore();
}

function drawEnemy(en) {
  if (!en.alive) {
    if (en.deathTimer < 0.5) {
      const [sx, sy] = worldToScreen(en.x + 0.5, en.y + 0.5);
      const t = en.deathTimer / 0.5;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.globalAlpha = 1-t;
      if (en.crushed) {
        // Squash animation — flatten vertically
        ctx.scale(1 + t * 1.0, Math.max(0.05, 1 - t * 1.5));
      } else {
        ctx.scale(1+t*0.5, 1-t);
      }
      drawEnemySprite(0, 0, CELL, en);
      ctx.restore();
    }
    return;
  }
  
  const [sx, sy] = worldToScreen(en.x + 0.5, en.y + 0.5);
  if (sx < -CELL*2 || sx > W+CELL*2 || sy < -CELL*2 || sy > H+CELL*2) return;
  
  const pulse = Math.sin(en.glowT * 1.7 + globalTime * 0.4);
  const glowIntensity = en.type === 'firefly' ? 0.38 + pulse * 0.10 : en.type === 'hunter' ? 0.25 + pulse * 0.08 : 0.22 + pulse * 0.07;
  const glowR = CELL * (en.type === 'firefly' ? 1.95 : en.type === 'hunter' ? 1.55 : 1.42);
  const egrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
  const glowColor = en.type === 'butterfly' ? '105,225,255' : en.type === 'hunter' ? '255,35,125' : '255,112,24';
  egrd.addColorStop(0, `rgba(${glowColor},${glowIntensity})`);
  egrd.addColorStop(0.42, `rgba(${glowColor},${glowIntensity * 0.32})`);
  egrd.addColorStop(1, `rgba(${glowColor},0)`);
  ctx.fillStyle = egrd;
  ctx.beginPath(); ctx.arc(sx, sy, glowR, 0, Math.PI*2); ctx.fill();
  
  const bobY = sy + Math.sin(en.bobT) * CELL * 0.035;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  if (en.type === 'firefly') {
    // Orange patrol ring: reads as warm/fire danger.
    ctx.strokeStyle = `rgba(255,190,45,${0.28 + Math.sin(globalTime * 4 + en.bobT) * 0.07})`;
    ctx.lineWidth = Math.max(1.5 * DPR, CELL * 0.038);
    ctx.beginPath();
    ctx.arc(sx, bobY, CELL * 0.48, globalTime * 1.4 + en.bobT, globalTime * 1.4 + en.bobT + Math.PI * 1.20);
    ctx.stroke();
  } else if (en.type === 'butterfly') {
    // Blue prismatic trail: reads as fragile bonus creature.
    for (let i = 0; i < 3; i++) {
      ctx.strokeStyle = `rgba(${95+i*35},${215+i*10},255,${0.13 - i*0.025})`;
      ctx.lineWidth = Math.max(1 * DPR, CELL * (0.022 - i*0.003));
      ctx.beginPath();
      const off = i * 0.18;
      ctx.ellipse(sx, bobY, CELL*(0.45+off), CELL*(0.22+off*0.45), Math.sin(globalTime+en.bobT)*0.4, 0, Math.PI*2);
      ctx.stroke();
    }
  } else if (en.type === 'hunter') {
    // Magenta warning spikes: reads as aggressive threat.
    ctx.strokeStyle = `rgba(255,42,118,${0.30 + Math.sin(globalTime * 7) * 0.08})`;
    ctx.lineWidth = Math.max(1.4 * DPR, CELL * 0.035);
    for (let i = 0; i < 6; i++) {
      const a = globalTime * 1.8 + en.bobT + i * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(a)*CELL*0.43, bobY + Math.sin(a)*CELL*0.43);
      ctx.lineTo(sx + Math.cos(a)*CELL*0.68, bobY + Math.sin(a)*CELL*0.68);
      ctx.stroke();
    }
  }
  ctx.restore();
  drawEnemySprite(sx, bobY, CELL, en);
}

function drawEnemySprite(sx, sy, s, en) {
  const r = s * 0.31;
  const flap = Math.sin(globalTime * (en.type === 'firefly' ? 20 : 13) + en.bobT);
  ctx.save();

  if (en.type === 'butterfly') {
    // Butterfly: broad cyan wings + small dark body. Very different from firefly.
    ctx.globalCompositeOperation = 'source-over';
    const wingOpen = 0.74 + flap * 0.13;
    const wingGrdL = ctx.createRadialGradient(sx-r*0.65, sy-r*0.28, 0, sx-r*0.42, sy, r*1.0);
    wingGrdL.addColorStop(0, '#e7ffff'); wingGrdL.addColorStop(0.42, '#63eaff'); wingGrdL.addColorStop(1, '#1260ff');
    const wingGrdR = ctx.createRadialGradient(sx+r*0.65, sy-r*0.28, 0, sx+r*0.42, sy, r*1.0);
    wingGrdR.addColorStop(0, '#e7ffff'); wingGrdR.addColorStop(0.42, '#63eaff'); wingGrdR.addColorStop(1, '#1260ff');
    ctx.strokeStyle = 'rgba(0,35,85,0.72)';
    ctx.lineWidth = Math.max(1, s*0.025);
    ctx.fillStyle = wingGrdL;
    ctx.beginPath(); ctx.ellipse(sx-r*0.47, sy-r*0.12, r*0.62, r*wingOpen, -0.58, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = wingGrdR;
    ctx.beginPath(); ctx.ellipse(sx+r*0.47, sy-r*0.12, r*0.62, r*wingOpen, 0.58, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.42)';
    ctx.beginPath(); ctx.ellipse(sx-r*0.58, sy-r*0.23, r*0.18, r*0.28, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sx+r*0.58, sy-r*0.23, r*0.18, r*0.28, 0.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(210,255,255,0.55)'; ctx.lineWidth = Math.max(0.7, s*0.012);
    for (const side of [-1,1]) {
      ctx.beginPath();
      ctx.moveTo(sx, sy-r*0.1);
      ctx.lineTo(sx + side*r*0.72, sy-r*0.38);
      ctx.moveTo(sx, sy+r*0.08);
      ctx.lineTo(sx + side*r*0.58, sy+r*0.32);
      ctx.stroke();
    }
    const bodyGrd = ctx.createLinearGradient(sx, sy-r*0.48, sx, sy+r*0.52);
    bodyGrd.addColorStop(0, '#113a78'); bodyGrd.addColorStop(1, '#06142f');
    ctx.fillStyle = bodyGrd;
    ctx.beginPath(); ctx.ellipse(sx, sy, r*0.22, r*0.68, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.75)'; ctx.stroke();
    ctx.strokeStyle = 'rgba(170,245,255,0.65)'; ctx.lineWidth = Math.max(0.7, s*0.014);
    ctx.beginPath(); ctx.moveTo(sx-r*0.08, sy-r*0.5); ctx.lineTo(sx-r*0.28, sy-r*0.78); ctx.moveTo(sx+r*0.08, sy-r*0.5); ctx.lineTo(sx+r*0.28, sy-r*0.78); ctx.stroke();
  } else if (en.type === 'hunter') {
    // Hunter: angular magenta predator with claws and horned silhouette.
    ctx.fillStyle = 'rgba(0,0,0,0.38)';
    ctx.beginPath(); ctx.ellipse(sx, sy+r*0.78, r*0.78, r*0.20, 0, 0, Math.PI*2); ctx.fill();
    const grd = ctx.createRadialGradient(sx-r*0.18, sy-r*0.34, 0, sx, sy, r*1.25);
    grd.addColorStop(0, '#ffb3ea'); grd.addColorStop(0.22, '#ff3bb3'); grd.addColorStop(0.68, '#b80058'); grd.addColorStop(1, '#36001f');
    ctx.fillStyle = grd;
    ctx.strokeStyle = 'rgba(40,0,25,0.85)';
    ctx.lineWidth = Math.max(1.2, s*0.035);
    ctx.beginPath();
    ctx.moveTo(sx, sy-r*0.92);
    ctx.lineTo(sx+r*0.38, sy-r*0.32);
    ctx.lineTo(sx+r*0.82, sy-r*0.15);
    ctx.lineTo(sx+r*0.40, sy+r*0.18);
    ctx.lineTo(sx+r*0.55, sy+r*0.78);
    ctx.lineTo(sx, sy+r*0.48);
    ctx.lineTo(sx-r*0.55, sy+r*0.78);
    ctx.lineTo(sx-r*0.40, sy+r*0.18);
    ctx.lineTo(sx-r*0.82, sy-r*0.15);
    ctx.lineTo(sx-r*0.38, sy-r*0.32);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,140,205,0.45)'; ctx.lineWidth = Math.max(0.8, s*0.014);
    ctx.beginPath(); ctx.moveTo(sx-r*0.18, sy-r*0.55); ctx.lineTo(sx, sy+r*0.42); ctx.lineTo(sx+r*0.18, sy-r*0.55); ctx.stroke();
    ctx.fillStyle = `rgba(255,245,100,${0.9 + Math.sin(en.glowT*3)*0.08})`;
    ctx.beginPath(); ctx.ellipse(sx-r*0.20, sy-r*0.22, r*0.15, r*0.11, -0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sx+r*0.20, sy-r*0.22, r*0.15, r*0.11, 0.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#210010';
    ctx.beginPath(); ctx.arc(sx-r*0.20, sy-r*0.20, r*0.055, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+r*0.20, sy-r*0.20, r*0.055, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,230,245,0.55)'; ctx.lineWidth = Math.max(1, s*0.018);
    for (const side of [-1,1]) {
      ctx.beginPath();
      ctx.moveTo(sx+side*r*0.43, sy+r*0.12);
      ctx.lineTo(sx+side*r*0.78, sy+r*0.36);
      ctx.lineTo(sx+side*r*0.56, sy+r*0.42);
      ctx.stroke();
    }
  } else {
    // Firefly: hot lantern core, small beetle body, bright flapping wings.
    const bodyGrd = ctx.createRadialGradient(sx, sy-r*0.2, 0, sx, sy, r*1.15);
    bodyGrd.addColorStop(0, '#fff9b5'); bodyGrd.addColorStop(0.26, '#ffc436'); bodyGrd.addColorStop(0.62, '#ff621b'); bodyGrd.addColorStop(1, '#641300');
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const wing = 0.58 + Math.abs(flap) * 0.24;
    ctx.fillStyle = `rgba(255,230,115,${wing})`;
    ctx.beginPath(); ctx.ellipse(sx - r*0.58, sy - r*0.12, r*0.42, r*0.20, -0.55, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sx + r*0.58, sy - r*0.12, r*0.42, r*0.20, 0.55, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = bodyGrd;
    ctx.strokeStyle = 'rgba(65,18,0,0.78)';
    ctx.lineWidth = Math.max(1, s*0.03);
    ctx.beginPath();
    ctx.moveTo(sx, sy-r*0.82);
    ctx.bezierCurveTo(sx+r*0.70, sy-r*0.42, sx+r*0.66, sy+r*0.62, sx, sy+r*0.82);
    ctx.bezierCurveTo(sx-r*0.66, sy+r*0.62, sx-r*0.70, sy-r*0.42, sx, sy-r*0.82);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = `rgba(255,252,178,${0.58 + Math.sin(en.glowT*2)*0.18})`;
    ctx.beginPath(); ctx.arc(sx, sy+r*0.25, r*0.28, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,220,95,0.35)'; ctx.lineWidth = Math.max(0.7, s*0.012);
    ctx.beginPath(); ctx.moveTo(sx-r*0.34, sy-r*0.06); ctx.lineTo(sx+r*0.34, sy-r*0.06); ctx.moveTo(sx-r*0.26, sy+r*0.18); ctx.lineTo(sx+r*0.26, sy+r*0.18); ctx.stroke();
    const eyeGlow = 0.8 + Math.sin(en.glowT * 2) * 0.2;
    ctx.fillStyle = `rgba(255,255,120,${eyeGlow})`;
    ctx.beginPath(); ctx.ellipse(sx - r*0.22, sy - r*0.20, r*0.12, r*0.15, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sx + r*0.22, sy - r*0.20, r*0.12, r*0.15, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#240600';
    ctx.beginPath(); ctx.arc(sx - r*0.22, sy - r*0.18, r*0.055, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + r*0.22, sy - r*0.18, r*0.055, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const [sx, sy] = worldToScreen(p.x, p.y);
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(sx, sy, p.size * CELL * 0.02, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawShockwaveRings() {
  for (const sw of shockwaveRings) {
    const [sx, sy] = worldToScreen(sw.x, sw.y);
    const alpha = (sw.life / sw.maxLife) * 0.7;
    const r = sw.r * CELL;
    ctx.strokeStyle = `rgba(${sw.color},${alpha})`;
    ctx.lineWidth = sw.lineWidth * DPR * (sw.life / sw.maxLife);
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawSparkleParticles() {
  for (const s of sparkleParticles) {
    const [sx, sy] = worldToScreen(s.x, s.y);
    const alpha = (s.life / s.maxLife) * (0.5 + Math.sin(s.twinkle) * 0.5);
    if (alpha <= 0) continue;
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.7})`;
    const size = s.size * CELL * 0.015 * (0.5 + Math.sin(s.twinkle * 1.5) * 0.5);
    drawStar(ctx, sx, sy, 4, size, size * 0.3);
  }
}

function drawDustMotes() {
  for (const d of dustMotes) {
    const [sx, sy] = worldToScreen(d.x, d.y);
    ctx.fillStyle = `rgba(180,160,130,${d.alpha * d.life})`;
    ctx.beginPath();
    ctx.arc(sx, sy, d.size * CELL * 0.015, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawDripParticles() {
  for (const d of dripParticles) {
    const [sx, sy] = worldToScreen(d.x, d.y);
    const alpha = Math.min(d.life * 0.5, d.alpha);
    ctx.fillStyle = `rgba(100,140,200,${alpha})`;
    // Elongated drop shape
    ctx.beginPath();
    ctx.ellipse(sx, sy, CELL * 0.015, CELL * 0.03, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEnemyTrails() {
  for (const et of enemyTrails) {
    const [sx, sy] = worldToScreen(et.x, et.y);
    const alpha = et.life / et.maxLife;
    const sz = et.size * CELL * 0.018 * (0.4 + alpha * 0.6);
    ctx.fillStyle = et.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawPlacedDynamite() {
  for (const dyn of placedDynamite) {
    const [sx, sy] = worldToScreen(dyn.gx + 0.5, dyn.gy + 0.5);
    const s = CELL * 0.3;
    const urgency = 1 - dyn.timer / 3;
    
    // Flash red as countdown progresses
    const flash = urgency > 0.7 ? Math.sin(globalTime * 20) * 0.3 : 0;
    
    // Red body
    ctx.fillStyle = `rgb(${200 + flash * 55},${30 - flash * 30},0)`;
    ctx.beginPath();
    ctx.roundRect(sx - s*0.3, sy - s*0.5, s*0.6, s, s*0.1);
    ctx.fill();
    
    // Timer text
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(8, s * 0.6)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(Math.ceil(dyn.timer).toString(), sx, sy);
    
    // Fuse sparking
    ctx.fillStyle = `rgba(255,200,50,${0.5 + Math.sin(globalTime * 15) * 0.5})`;
    ctx.beginPath();
    ctx.arc(sx, sy - s * 0.6, s * 0.12, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFlyGems() {
  for (const fg of flyGems) {
    const t = easeInOut(fg.t);
    const [startX, startY] = worldToScreen(fg.x, fg.y);
    const endX = CELL * 3;
    const endY = HUD_H * 0.48;
    const cx = lerp(startX, endX, t);
    const cy = lerp(startY, endY, t) - Math.sin(t * Math.PI) * CELL * 2;
    const scale = 1 - t * 0.7;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);

    const r = CELL * 0.2;
    // Prismatic trail
    const hue = (globalTime * 100 + fg.t * 200) % 360;
    ctx.fillStyle = `hsla(${hue},90%,70%,${1-t})`;
    ctx.beginPath();
    ctx.moveTo(0, -r);
    ctx.lineTo(r*0.6, 0);
    ctx.lineTo(0, r*0.8);
    ctx.lineTo(-r*0.6, 0);
    ctx.closePath();
    ctx.fill();
    
    // Trail sparkle
    ctx.fillStyle = `rgba(255,255,255,${(1-t)*0.5})`;
    drawStar(ctx, 0, 0, 4, r*0.5, r*0.15);

    ctx.restore();
  }
}

function drawDynamicLights() {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  const [px, py] = worldToScreen(player.x + 0.5, player.y + 0.5);
  const pLight = ctx.createRadialGradient(px, py, 0, px, py, CELL * 3.5);
  pLight.addColorStop(0, 'rgba(255,230,170,0.1)');
  pLight.addColorStop(0.55, 'rgba(255,200,120,0.04)');
  pLight.addColorStop(1, 'rgba(255,200,120,0)');
  ctx.fillStyle = pLight;
  ctx.beginPath();
  ctx.arc(px, py, CELL * 3.5, 0, Math.PI * 2);
  ctx.fill();

  for (let y = 1; y < gridH - 1; y++) {
    for (let x = 1; x < gridW - 1; x++) {
      const tileHere = grid[y][x];
      if (tileHere !== TILE.GEM && tileHere !== TILE.DIAMOND) continue;
      const [gx, gy] = worldToScreen(x + 0.5, y + 0.5);
      if (gx < -CELL || gx > W + CELL || gy < -CELL || gy > H + CELL) continue;
      const pulse = 0.6 + 0.4 * Math.sin(globalTime * 3 + x * 0.7 + y * 0.8);
      const gLight = ctx.createRadialGradient(gx, gy, 0, gx, gy, CELL * 1.5);
      if (tileHere === TILE.DIAMOND) {
        gLight.addColorStop(0, `rgba(140,180,255,${0.09 * pulse})`);
        gLight.addColorStop(1, 'rgba(100,140,255,0)');
      } else {
        gLight.addColorStop(0, `rgba(50,220,120,${0.08 * pulse})`);
        gLight.addColorStop(1, 'rgba(30,160,80,0)');
      }
      ctx.fillStyle = gLight;
      ctx.beginPath();
      ctx.arc(gx, gy, CELL * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Dynamic light from enemies
  for (const en of enemies) {
    if (!en.alive) continue;
    const [ex, ey] = worldToScreen(en.x + 0.5, en.y + 0.5);
    if (ex < -CELL*2 || ex > W+CELL*2 || ey < -CELL*2 || ey > H+CELL*2) continue;
    const ePulse = 0.5 + 0.5 * Math.sin(globalTime * 4 + en.bobT);
    const eR = CELL * 1.8;
    const eLight = ctx.createRadialGradient(ex, ey, 0, ex, ey, eR);
    if (en.type === 'firefly') {
      eLight.addColorStop(0, `rgba(255,160,40,${0.06 * ePulse})`);
      eLight.addColorStop(1, 'rgba(255,120,20,0)');
    } else if (en.type === 'butterfly') {
      eLight.addColorStop(0, `rgba(80,180,255,${0.04 * ePulse})`);
      eLight.addColorStop(1, 'rgba(60,140,255,0)');
    } else {
      eLight.addColorStop(0, `rgba(255,40,100,${0.05 * ePulse})`);
      eLight.addColorStop(1, 'rgba(255,20,80,0)');
    }
    ctx.fillStyle = eLight;
    ctx.beginPath(); ctx.arc(ex, ey, eR, 0, Math.PI*2); ctx.fill();
  }

  // Exit beacon: once enough emeralds are collected, the open exit throws a visible green guidance glow.
  if (exitOpen) {
    const [ex, ey] = worldToScreen(exitPos.x + 0.5, exitPos.y + 0.5);
    if (ex > -CELL * 4 && ex < W + CELL * 4 && ey > -CELL * 4 && ey < H + CELL * 4) {
      const pulse = 0.72 + 0.28 * Math.sin(globalTime * 4.2);
      const r0 = CELL * (2.2 + pulse * 0.7);
      const exitGlow = ctx.createRadialGradient(ex, ey, 0, ex, ey, r0);
      exitGlow.addColorStop(0, `rgba(80,255,150,${0.18 * pulse})`);
      exitGlow.addColorStop(0.34, `rgba(30,210,110,${0.08 * pulse})`);
      exitGlow.addColorStop(1, 'rgba(20,120,70,0)');
      ctx.fillStyle = exitGlow;
      ctx.beginPath(); ctx.arc(ex, ey, r0, 0, Math.PI * 2); ctx.fill();

      ctx.strokeStyle = `rgba(140,255,190,${0.22 * pulse})`;
      ctx.lineWidth = Math.max(1, CELL * 0.018);
      for (let ring = 0; ring < 2; ring++) {
        ctx.beginPath();
        ctx.arc(ex, ey, CELL * (0.72 + ring * 0.42 + (globalTime * 0.28) % 0.42), 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  // Magic walls and powerups get their own cave-object glows so interactive tiles read from the corner of the eye.
  for (let yy = 1; yy < gridH-1; yy++) {
    for (let xx = 1; xx < gridW-1; xx++) {
      const tt = grid[yy][xx];
      if (tt !== TILE.DYNAMITE && tt !== TILE.SPEED_BOOTS && tt !== TILE.GHOST_MODE && tt !== TILE.MAGIC_WALL) continue;
      const [bx, by] = worldToScreen(xx + 0.5, yy + 0.5);
      if (bx < -CELL || bx > W+CELL || by < -CELL || by > H+CELL) continue;
      const bPulse = 0.6 + 0.4 * Math.sin(globalTime * 3.5 + xx * 1.2 + yy * 0.8);
      const bR = CELL * (tt === TILE.MAGIC_WALL ? 1.7 : 1.2);
      const bLight = ctx.createRadialGradient(bx, by, 0, bx, by, bR);
      if (tt === TILE.DYNAMITE) {
        bLight.addColorStop(0, `rgba(255,120,40,${0.06 * bPulse})`);
        bLight.addColorStop(1, 'rgba(255,80,20,0)');
      } else if (tt === TILE.SPEED_BOOTS) {
        bLight.addColorStop(0, `rgba(60,130,255,${0.05 * bPulse})`);
        bLight.addColorStop(1, 'rgba(40,100,255,0)');
      } else if (tt === TILE.MAGIC_WALL) {
        const activeBoost = magicWallActive ? 1.8 : 1;
        bLight.addColorStop(0, `rgba(120,255,220,${0.07 * bPulse * activeBoost})`);
        bLight.addColorStop(0.45, `rgba(90,130,255,${0.035 * bPulse * activeBoost})`);
        bLight.addColorStop(1, 'rgba(80,120,255,0)');
      } else {
        bLight.addColorStop(0, `rgba(160,160,255,${0.05 * bPulse})`);
        bLight.addColorStop(1, 'rgba(120,120,255,0)');
      }
      ctx.fillStyle = bLight;
      ctx.beginPath(); ctx.arc(bx, by, bR, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.restore();
}

function drawHUD() {
  updatePauseBtn();
  updateDynamiteBtn();
  updateRetryBtn();
  updateMenuBtn();

  const barH = HUD_H;
  const pad = Math.max(8 * DPR, Math.min(W, H) * 0.012);

  // HUD background with gradient
  const hudGrd = ctx.createLinearGradient(0, 0, 0, barH);
  hudGrd.addColorStop(0, 'rgba(0,0,0,0.76)');
  hudGrd.addColorStop(1, 'rgba(0,0,0,0.48)');
  ctx.fillStyle = hudGrd;
  ctx.fillRect(0, 0, W, barH);
  ctx.fillStyle = 'rgba(255,220,150,0.08)';
  ctx.fillRect(0, barH - 2, W, 2);

  const fontSize = clamp(CELL * 0.34, 12 * DPR, 22 * DPR);
  ctx.font = `bold ${fontSize}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textBaseline = 'middle';

  const controlsRightW = (menuBtn.visible || retryBtn.visible) ? (menuBtn.r * 4.1 + pad * 2.8) : 0;
  const statsRight = W - controlsRightW - pad;
  const leftControlsRight = Math.max(
    pauseBtn.visible ? pauseBtn.x + pauseBtn.r : 0,
    dynamiteBtn.visible ? dynamiteBtn.x + dynamiteBtn.r : 0
  ) + pad;

  // Gems: always starts after pause/bomb controls so it never collides with icons.
  const gemY = barH * 0.50;
  const gemX = Math.max(CELL * 0.6, leftControlsRight + CELL * 0.18);
  const gr = Math.max(4 * DPR, CELL * 0.13);
  ctx.fillStyle = `hsl(${145 + Math.sin(globalTime*2)*10},80%,50%)`;
  ctx.beginPath();
  ctx.moveTo(gemX, gemY - gr);
  ctx.lineTo(gemX + gr*0.5, gemY - gr*0.35);
  ctx.lineTo(gemX + gr*0.6, gemY + gr*0.2);
  ctx.lineTo(gemX, gemY + gr*0.7);
  ctx.lineTo(gemX - gr*0.6, gemY + gr*0.2);
  ctx.lineTo(gemX - gr*0.5, gemY - gr*0.35);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(200,255,230,0.35)';
  ctx.beginPath();
  ctx.moveTo(gemX - gr*0.1, gemY - gr*0.5);
  ctx.lineTo(gemX + gr*0.2, gemY);
  ctx.lineTo(gemX - gr*0.3, gemY);
  ctx.closePath(); ctx.fill();

  const gemCount = Math.floor(displayGems);
  ctx.fillStyle = gemCount >= gemsNeeded ? '#60FF90' : '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(`${gemCount} / ${gemsNeeded}`, gemX + gr * 1.6, gemY);

  // Hearts + zoom occupy the center lane, clamped away from left counters and right buttons.
  const heartSpacing = Math.max(CELL * 0.44, 18 * DPR);
  let centerX = W * 0.50;
  const centerMin = gemX + gr * 1.6 + ctx.measureText(`${gemCount} / ${gemsNeeded}`).width + heartSpacing * 2.4;
  const centerMax = statsRight - heartSpacing * 3.0;
  if (centerMin < centerMax) centerX = clamp(centerX, centerMin, centerMax);
  const heartX = centerX - heartSpacing;
  for (let i = 0; i < 3; i++) {
    const hx = heartX + i * heartSpacing;
    drawHeart(hx, barH * 0.36, Math.max(5 * DPR, CELL * 0.13), i < player.lives);
  }

  if (boardView.follow || zoomToast > 0) {
    ctx.textAlign = 'center';
    ctx.font = `${Math.max(9 * DPR, fontSize * 0.62)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = zoomToast > 0 ? 'rgba(170,255,210,0.9)' : 'rgba(255,255,255,0.34)';
    ctx.fillText(`Zoom ${Math.round(userZoom * 100)}%`, centerX, barH * 0.72);
  }

  // Stats live in their own right lane, left of the menu/restart rail.
  ctx.textAlign = 'right';
  ctx.font = `bold ${Math.max(11 * DPR, fontSize * 0.88)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = `rgba(255,255,255,${0.65 + Math.sin(globalTime*2)*0.1})`;
  ctx.fillText(`Level ${level + 1}`, statsRight, barH * 0.30);
  ctx.font = `${Math.max(9 * DPR, fontSize * 0.62)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(255,220,100,0.82)';
  ctx.fillText(`Score: ${score}`, statsRight, barH * 0.56);
  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.fillText(VERSION, statsRight, barH * 0.80);

  if (trappedTimer > 0.8 && state === 'playing' && !player.dead) {
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.max(10 * DPR, fontSize * 0.55)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = `rgba(255,170,70,${0.65 + Math.sin(globalTime * 12) * 0.25})`;
    ctx.fillText('No moves — tap restart level', W / 2, HUD_H + Math.max(14 * DPR, fontSize * 0.8));
  }
}

function drawHeart(cx, cy, r, filled) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.moveTo(0, r*0.5);
  ctx.bezierCurveTo(-r, -r*0.3, -r*0.5, -r*1.2, 0, -r*0.4);
  ctx.bezierCurveTo(r*0.5, -r*1.2, r, -r*0.3, 0, r*0.5);
  ctx.closePath();
  ctx.fillStyle = filled ? '#ff4060' : 'rgba(255,64,96,0.2)';
  ctx.fill();
  if (filled) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(-r*0.2, -r*0.3, r*0.2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawVignette() {
  // Vignette pulsing slightly
  const pulse = 0.5 + Math.sin(globalTime * 0.8) * 0.03;
  const healthPulse = player.lives <= 1 && state === 'playing' ? Math.sin(globalTime * 3) * 0.05 : 0;
  const vignetteStrength = pulse + healthPulse;
  
  const grd = ctx.createRadialGradient(W/2, H/2, W*0.25, W/2, H/2, W*0.75);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, `rgba(0,0,0,${vignetteStrength})`);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
  
  // Red vignette when low health
  if (player.lives <= 1 && state === 'playing') {
    const redPulse = 0.05 + Math.sin(globalTime * 2) * 0.03;
    const rgrd = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
    rgrd.addColorStop(0, 'rgba(255,0,0,0)');
    rgrd.addColorStop(1, `rgba(255,0,0,${redPulse})`);
    ctx.fillStyle = rgrd;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawFlash() {
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(${flashColor},${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawTouchRipples() {
  for (const tr of touchRipples) {
    const r = tr.t * CELL * 1.5;
    ctx.strokeStyle = `rgba(255,255,255,${0.3 * (1-tr.t)})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, r, 0, Math.PI*2);
    ctx.stroke();
  }
}

// ─── Title Screen ───
function drawTitle() {
  drawCaveBackground();

  const cx = W / 2;
  const t = titleAnimT;
  const cavePulse = 0.5 + Math.sin(t * 1.4) * 0.5;

  // Cinematic emerald aurora spilling through the mine shaft.
  const aurora = ctx.createRadialGradient(cx, H * 0.18, W * 0.04, cx, H * 0.18, Math.max(W, H) * 0.72);
  aurora.addColorStop(0, `rgba(80,255,170,${0.22 + cavePulse * 0.08})`);
  aurora.addColorStop(0.35, 'rgba(15,130,95,0.14)');
  aurora.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = aurora;
  ctx.fillRect(0, 0, W, H);

  // Layered cave silhouettes.
  for (let layer = 0; layer < 3; layer++) {
    const yBase = H * (0.18 + layer * 0.06);
    ctx.fillStyle = `rgba(${8 + layer*8},${18 + layer*12},${18 + layer*9},${0.34 - layer*0.06})`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    for (let i = 0; i <= 12; i++) {
      const x = W * i / 12;
      const y = yBase + Math.sin(i * 1.7 + t * (0.18 + layer*0.05)) * H * 0.025 + (i % 2) * H * 0.035;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, 0); ctx.closePath(); ctx.fill();
  }

  // Mine cart rail and tiny cart for attract-mode life.
  const railY = H * 0.72;
  ctx.strokeStyle = 'rgba(105,70,42,0.45)';
  ctx.lineWidth = Math.max(2, DPR * 2);
  ctx.beginPath(); ctx.moveTo(W*0.08, railY); ctx.lineTo(W*0.92, railY + Math.sin(t)*H*0.015); ctx.stroke();
  ctx.strokeStyle = 'rgba(180,120,65,0.22)';
  for (let i=0;i<12;i++) {
    const x = W * (0.1 + i * 0.07);
    ctx.beginPath(); ctx.moveTo(x, railY - 5*DPR); ctx.lineTo(x + 16*DPR, railY + 8*DPR); ctx.stroke();
  }
  const cartX = W * (0.18 + ((t * 0.035) % 0.64));
  ctx.fillStyle = 'rgba(25,36,38,0.86)';
  ctx.strokeStyle = 'rgba(110,175,140,0.45)';
  ctx.lineWidth = Math.max(1, DPR);
  ctx.beginPath(); ctx.roundRect(cartX - 26*DPR, railY - 28*DPR, 52*DPR, 25*DPR, 5*DPR); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(70,255,150,0.75)';
  for (let i=0;i<3;i++) drawStar(ctx, cartX - 13*DPR + i*13*DPR, railY - 20*DPR - (i%2)*4*DPR, 5, 5*DPR, 1.5*DPR);

  // Floating emeralds/diamonds, brighter and larger than before.
  for (let i = 0; i < 18; i++) {
    const x = W * (0.06 + (i * 0.113 + Math.sin(t * 0.16 + i) * 0.05) % 0.88);
    const y = H * (0.12 + (i * 0.097 + Math.cos(t * 0.18 + i*1.7) * 0.05) % 0.62);
    const r = Math.max(6 * DPR, Math.min(W, H) * (0.010 + (i % 4) * 0.002));
    const shimmer = t * 2.2 + i;
    const isDiamond = i % 6 === 0;
    const hue = isDiamond ? (200 + Math.sin(shimmer)*18) : (136 + Math.sin(shimmer)*14);
    const glow = ctx.createRadialGradient(x, y, 0, x, y, r*3.2);
    glow.addColorStop(0, `hsla(${hue},90%,65%,0.22)`);
    glow.addColorStop(1, `hsla(${hue},90%,45%,0)`);
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(x, y, r*3.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `hsla(${hue},${isDiamond ? 75 : 88}%,${isDiamond ? 76 : 52}%,${0.42 + Math.sin(shimmer)*0.15})`;
    ctx.beginPath();
    ctx.moveTo(x, y - r); ctx.lineTo(x + r*0.58, y - r*0.32); ctx.lineTo(x + r*0.66, y + r*0.22);
    ctx.lineTo(x, y + r*0.9); ctx.lineTo(x - r*0.66, y + r*0.22); ctx.lineTo(x - r*0.58, y - r*0.32);
    ctx.closePath(); ctx.fill();
    if (Math.sin(shimmer * 3) > 0.68) {
      ctx.fillStyle = 'rgba(220,255,235,0.75)';
      drawStar(ctx, x + r*0.9, y - r*0.25, 4, r*0.45, r*0.09);
    }
  }

  // Backing glass card behind the title.
  const cardW = Math.min(W * 0.88, 680 * DPR);
  const cardH = Math.min(H * 0.43, 330 * DPR);
  const cardY = H * 0.31;
  ctx.fillStyle = 'rgba(2,10,8,0.54)';
  ctx.strokeStyle = 'rgba(90,255,170,0.24)';
  ctx.lineWidth = Math.max(1, DPR);
  ctx.beginPath(); ctx.roundRect(cx - cardW/2, cardY - cardH/2, cardW, cardH, 22*DPR); ctx.fill(); ctx.stroke();

  let titleSize = Math.min(W * 0.075, H * 0.092);
  const titleText = 'EMERALD MINE';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `900 ${titleSize}px 'Segoe UI', system-ui, sans-serif`;
  while (ctx.measureText(titleText).width > W * 0.80 && titleSize > 16 * DPR) {
    titleSize *= 0.92;
    ctx.font = `900 ${titleSize}px 'Segoe UI', system-ui, sans-serif`;
  }

  ctx.shadowColor = 'rgba(0,255,150,0.6)';
  ctx.shadowBlur = 18 * DPR;
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillText(titleText, cx + 3*DPR, H*0.235 + 4*DPR);
  const tgrd = ctx.createLinearGradient(W*0.18, H*0.18, W*0.82, H*0.30);
  tgrd.addColorStop(0, '#10B86C');
  tgrd.addColorStop(0.28, '#73FFAD');
  tgrd.addColorStop(0.48, '#E8FFF2');
  tgrd.addColorStop(0.72, '#62F49C');
  tgrd.addColorStop(1, '#00995C');
  ctx.fillStyle = tgrd;
  ctx.fillText(titleText, cx, H*0.235 + Math.sin(t*1.2)*2*DPR);
  ctx.shadowBlur = 0;

  ctx.font = `700 ${titleSize*0.34}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(210,255,228,0.82)';
  ctx.fillText('Crystal Caves', cx, H*0.31);
  ctx.font = `700 ${Math.max(10*DPR, titleSize*0.22)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(205,235,205,0.78)';
  ctx.fillText('falling rock danger • magic walls • glittering escape', cx, H*0.36);

  const instrSize = Math.max(11 * DPR, titleSize * 0.24);
  if (!showScores) {
    const tips = ['⛏️ dig emeralds', '🪨 boulders crush', '💎 diamonds sparkle', '🧫 slime mutates'];
    ctx.font = `700 ${instrSize}px 'Segoe UI', system-ui, sans-serif`;
    tips.forEach((txt, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const x = cx + (col - 0.5) * Math.min(W*0.42, 210*DPR);
      const y = H * 0.43 + row * Math.max(34*DPR, instrSize * 1.75);
      const boxW = Math.min(W*0.38, 174*DPR);
      const boxH = Math.max(28*DPR, instrSize * 1.55);
      ctx.fillStyle = 'rgba(10,28,20,0.62)';
      ctx.beginPath(); ctx.roundRect(x - boxW/2, y - boxH/2, boxW, boxH, 10*DPR); ctx.fill();
      ctx.strokeStyle = 'rgba(120,255,180,0.24)'; ctx.stroke();
      ctx.fillStyle = 'rgba(235,255,240,0.90)';
      ctx.fillText(txt, x, y);
    });
  }

  // Tiny attract-mode cave demo.
  const demoW = Math.min(W * 0.52, 260 * DPR), demoH = Math.min(H * 0.115, 88 * DPR);
  const demoX = cx - demoW/2, demoY = H * 0.535;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.strokeStyle = 'rgba(100,255,170,0.20)';
  ctx.lineWidth = Math.max(1, DPR);
  ctx.beginPath(); ctx.roundRect(demoX, demoY, demoW, demoH, 10*DPR); ctx.fill(); ctx.stroke();
  const cols = 9, rows = 3, cs = Math.min(demoW/cols, demoH/rows);
  const ox = demoX + (demoW - cols*cs)/2, oy = demoY + (demoH - rows*cs)/2;
  for (let yy=0; yy<rows; yy++) for (let xx=0; xx<cols; xx++) {
    ctx.fillStyle = (xx+yy)%2 ? 'rgba(67,43,28,0.55)' : 'rgba(92,55,31,0.55)';
    ctx.fillRect(ox+xx*cs, oy+yy*cs, cs-1, cs-1);
  }
  const minerX = 1 + Math.floor((t*1.4)%6);
  ctx.fillStyle = '#ffe0a0'; ctx.beginPath(); ctx.arc(ox+(minerX+0.5)*cs, oy+1.5*cs, cs*0.28, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#50ffaa'; drawStar(ctx, ox+(6.5+Math.sin(t*3)*0.12)*cs, oy+1.5*cs, 5, cs*0.28, cs*0.08);
  const rockY = 0.45 + Math.abs(Math.sin(t*2.1))*1.25;
  ctx.fillStyle = '#8a8378'; ctx.beginPath(); ctx.arc(ox+4.5*cs, oy+(rockY+0.5)*cs, cs*0.30, 0, Math.PI*2); ctx.fill();

  // Level select chips.
  if (!showScores) {
    const cols = 5;
    const startX = W * 0.18;
    const gapX = W * 0.16;
    const cySel = H * 0.630;
    const gapY = Math.max(24 * DPR, H * 0.031);
    const rSel = Math.max(10 * DPR, Math.min(W, H) * 0.020);
    ctx.font = `800 ${Math.max(10*DPR, rSel*0.52)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = 'rgba(230,255,240,0.86)';
    ctx.fillText('choose cave', cx, cySel - rSel*1.9);
    for (let i=0;i<LEVELS.length;i++) {
      const bx = startX + (i % cols) * gapX;
      const by = cySel + Math.floor(i / cols) * gapY;
      const selected = i === titleSelectedLevel;
      ctx.fillStyle = selected ? 'rgba(95,255,155,0.34)' : 'rgba(10,28,20,0.52)';
      ctx.strokeStyle = selected ? 'rgba(165,255,190,0.82)' : 'rgba(120,255,180,0.22)';
      ctx.lineWidth = Math.max(1, DPR * (selected ? 2 : 1));
      ctx.beginPath(); ctx.arc(bx, by, rSel, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = selected ? '#fff' : 'rgba(230,255,240,0.78)';
      ctx.fillText(String(i+1), bx, by);
    }
    ctx.font = `700 ${Math.max(9*DPR, rSel*0.38)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = 'rgba(220,255,235,0.78)';
    ctx.fillText(LEVELS[titleSelectedLevel].name || `Cave ${titleSelectedLevel+1}`, cx, cySel + gapY*2 + rSel*1.9);
  }

  const pulse = 0.92 + Math.sin(t * 3.4) * 0.08;
  const btnW = Math.min(W * 0.46, 300 * DPR) * pulse;
  const btnH = Math.max(48 * DPR, H * 0.07) * pulse;
  const btnY = H * 0.80;
  const bglow = ctx.createRadialGradient(cx, btnY, 0, cx, btnY, btnW);
  bglow.addColorStop(0, 'rgba(0,255,150,0.22)');
  bglow.addColorStop(1, 'rgba(0,255,150,0)');
  ctx.fillStyle = bglow;
  ctx.fillRect(cx - btnW, btnY - btnH, btnW*2, btnH*2);
  const btnGrd = ctx.createLinearGradient(cx, btnY - btnH/2, cx, btnY + btnH/2);
  btnGrd.addColorStop(0, 'rgba(35,210,125,0.62)');
  btnGrd.addColorStop(1, 'rgba(0,95,60,0.64)');
  ctx.fillStyle = btnGrd;
  ctx.beginPath(); ctx.roundRect(cx - btnW/2, btnY - btnH/2, btnW, btnH, btnH*0.32); ctx.fill();
  ctx.strokeStyle = 'rgba(155,255,195,0.72)'; ctx.lineWidth = Math.max(2, DPR*1.5); ctx.stroke();
  ctx.font = `900 ${btnH*0.35}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = '#fff'; ctx.fillText('TAP TO PLAY', cx, btnY - btnH*0.06);
  ctx.font = `${Math.max(9*DPR, btnH*0.16)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(225,255,235,0.76)'; ctx.fillText(titleMusicUnlocked ? 'the mine is awake' : 'tap once to wake the mine', cx, btnY + btnH*0.30);

  ctx.font = `${Math.max(9*DPR, titleSize*0.15)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(230,255,238,0.66)';
  ctx.fillText(`${VERSION}  •  drag/WASD  •  +/- cave  •  H scores`, cx, H*0.94);
  if (showScores) drawScoresPanel(cx, H*0.58, Math.min(W*0.88, 440*DPR), Math.min(H*0.44, 300*DPR), -1);
  drawVignette();
}
// ─── Level Clear Screen ───
function drawLevelClear() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(levelClearTimer * 0.8, 0.6)})`;
  ctx.fillRect(0, 0, W, H);
  
  const titleSize = Math.min(W * 0.07, H * 0.09);
  if (hsEntry.active) { drawHighScoreEntry(); return; }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  if (levelClearTimer > 0.3) {
    const t = easeOut(Math.min((levelClearTimer - 0.3) * 2, 1));
    ctx.font = `bold ${titleSize * t}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#FFD700';
    ctx.fillText('✨ LEVEL CLEAR! ✨', W/2, H*0.35);
  }
  
  if (levelClearTimer > 1) {
    const statSize = titleSize * 0.4;
    ctx.font = `${statSize}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#fff';
    
    // Animated score tally
    const tallyProgress = Math.min((levelClearTimer - 1) * 2, 1);
    const displayScore = Math.floor(score * easeOut(tallyProgress));
    
    ctx.fillText(`Gems: ${player.gems}`, W/2, H*0.5);
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`Score: ${displayScore}`, W/2, H*0.57);
    ctx.fillStyle = '#fff';
    ctx.fillText(`Lives remaining: ${player.lives}`, W/2, H*0.64);
  }
  
  // Celebration particle fountain
  for (const p of celebrationParticles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawScoresPanel(cx, cy, w, h, highlightIdx) {
  const scores = loadHighScores();
  requestGlobalScores();
  const globalScores = globalScoresCache || [];
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(5,12,8,0.82)';
  ctx.strokeStyle = 'rgba(80,220,140,0.35)'; ctx.lineWidth = Math.max(1, DPR);
  ctx.beginPath(); ctx.roundRect(cx-w/2, cy-h/2, w, h, 16*DPR); ctx.fill(); ctx.stroke();
  const titleFont = Math.max(12*DPR, h*0.062);
  const rowFont = Math.max(8.5*DPR, h*0.046);
  ctx.font = `bold ${titleFont}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = '#60ffa0'; ctx.fillText('HIGH SCORES', cx, cy-h*0.42);

  const leftX = cx - w * 0.25;
  const rightX = cx + w * 0.25;
  const topY = cy - h * 0.30;
  ctx.font = `bold ${Math.max(9*DPR, rowFont*0.95)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = '#5be4ff'; ctx.fillText('🏠 LOCAL', leftX, topY);
  ctx.fillStyle = '#ffd95c'; ctx.fillText('🌐 GLOBAL', rightX, topY);
  ctx.font = `${rowFont}px monospace`;

  if (!scores.length) {
    ctx.fillStyle = 'rgba(255,255,255,0.52)';
    ctx.fillText('No local scores', leftX, topY + h*0.11);
  } else {
    for (let i=0; i<Math.min(scores.length, 10); i++) {
      const e = scores[i];
      const y = topY + h*0.075 + i * h*0.052;
      ctx.fillStyle = i === highlightIdx ? '#fff59a' : i === 0 ? '#8cf7ff' : 'rgba(210,245,255,0.82)';
      const rank = String(i+1).padStart(2,' ');
      const sc = String(e.score).padStart(6,' ');
      ctx.fillText(`${rank}. ${e.initials || '---'} ${sc} C${e.level || e.cave || 1}`, leftX, y);
    }
  }

  if (globalScoresLoading && !globalScores.length) {
    ctx.fillStyle = 'rgba(255,255,255,0.52)';
    ctx.fillText('Loading...', rightX, topY + h*0.11);
  } else if (!globalScores.length) {
    ctx.fillStyle = 'rgba(255,255,255,0.52)';
    ctx.fillText('No global scores', rightX, topY + h*0.11);
  } else {
    for (let i=0; i<Math.min(globalScores.length, 10); i++) {
      const e = globalScores[i];
      const y = topY + h*0.075 + i * h*0.052;
      ctx.fillStyle = i === 0 ? '#ffe082' : 'rgba(255,235,160,0.86)';
      const rank = String(i+1).padStart(2,' ');
      const sc = String(e.score || 0).padStart(6,' ');
      ctx.fillText(`${rank}. ${e.initials || '---'} ${sc} C${e.level || e.cave || '?'}`, rightX, y);
    }
  }
  ctx.restore();
}
function drawHighScoreEntry() {
  if (!hsEntry.active) return;
  const titleSize = Math.min(W * 0.07, H * 0.09);
  if (hsEntry.submitted) {
    drawScoresPanel(W/2, H*0.56, Math.min(W*0.82, 500*DPR), Math.min(H*0.46, 330*DPR), hsEntry.newIdx);
    ctx.font = `${titleSize*0.25}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Tap or press any key after the shimmer settles', W/2, H*0.84);
    return;
  }
  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.font = `bold ${titleSize*0.65}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle='#ffd95c'; ctx.fillText('NEW HIGH SCORE', W/2, H*0.24);
  ctx.font = `${titleSize*0.32}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle='#fff'; ctx.fillText(`Score ${hsEntry.score}  •  Cave ${hsEntry.level}`, W/2, H*0.33);
  const spacing = Math.min(W*0.12, 70*DPR);
  for (let i=0; i<3; i++) {
    const x = W/2 + (i-1)*spacing;
    ctx.fillStyle = hsEntry.pos === i ? 'rgba(255,217,80,0.25)' : 'rgba(255,255,255,0.08)';
    ctx.strokeStyle = hsEntry.pos === i ? '#ffd95c' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = Math.max(2, DPR*2);
    ctx.beginPath(); ctx.roundRect(x-spacing*0.34, H*0.45, spacing*0.68, spacing*0.78, 8*DPR); ctx.fill(); ctx.stroke();
    ctx.font = `bold ${spacing*0.54}px monospace`; ctx.fillStyle = '#fff'; ctx.fillText(hsEntry.initials[i], x, H*0.50);
    ctx.font = `${spacing*0.22}px monospace`; ctx.fillStyle='rgba(255,255,255,0.65)'; ctx.fillText('▲', x, H*0.43); ctx.fillText('▼', x, H*0.59);
  }
  ctx.font = `bold ${titleSize*0.28}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle='rgba(0,180,255,0.35)'; ctx.beginPath(); ctx.roundRect(W/2-W*0.16, H*0.70, W*0.32, H*0.075, 14*DPR); ctx.fill();
  ctx.strokeStyle='rgba(120,220,255,0.7)'; ctx.stroke(); ctx.fillStyle='#fff'; ctx.fillText('SAVE SCORE', W/2, H*0.738);
  ctx.font = `${titleSize*0.20}px 'Segoe UI', system-ui, sans-serif`; ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillText('Tap letters or use arrows/WASD. Enter/Space saves.', W/2, H*0.84);
  ctx.restore();
}

// ─── Game Over / Win ───
function drawGameOver() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(gameOverTimer * 0.5, 0.7)})`;
  ctx.fillRect(0, 0, W, H);
  
  const titleSize = Math.min(W * 0.07, H * 0.09);
  if (hsEntry.active) { drawHighScoreEntry(); return; }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  if (gameOverTimer > 0.5) {
    ctx.font = `bold ${titleSize}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#ff4060';
    ctx.fillText('GAME OVER', W/2, H*0.4);
    
    ctx.font = `${titleSize*0.4}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#ccc';
    ctx.fillText(`Final Score: ${score}`, W/2, H*0.52);
  }
  
  if (gameOverTimer > 2) {
    ctx.font = `${titleSize*0.3}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(globalTime*3)*0.2})`;
    ctx.fillText('Tap or press any key to restart', W/2, H*0.65);
  }
}

function drawWin() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(gameOverTimer * 0.5, 0.5)})`;
  ctx.fillRect(0, 0, W, H);
  
  const titleSize = Math.min(W * 0.06, H * 0.08);
  if (hsEntry.active) { drawHighScoreEntry(); return; }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  if (gameOverTimer > 0.3) {
    ctx.font = `bold ${titleSize}px 'Segoe UI', system-ui, sans-serif`;
    
    const tgrd = ctx.createLinearGradient(W*0.3, H*0.3, W*0.7, H*0.5);
    tgrd.addColorStop(0, '#FFD700');
    tgrd.addColorStop(0.5, '#FFF');
    tgrd.addColorStop(1, '#FFD700');
    ctx.fillStyle = tgrd;
    ctx.fillText('🏆 YOU WIN! 🏆', W/2, H*0.35);
    
    ctx.font = `${titleSize*0.5}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#E0FFFF';
    ctx.fillText('All caves conquered!', W/2, H*0.45);
    
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`Final Score: ${score}`, W/2, H*0.55);
  }
  
  for (let i = 0; i < 5; i++) {
    const angle = globalTime * 0.5 + i * Math.PI * 2 / 5;
    const px = W/2 + Math.cos(angle) * W * 0.25;
    const py = H*0.45 + Math.sin(angle) * H * 0.15;
    ctx.fillStyle = `rgba(255,215,0,${0.4 + Math.sin(globalTime*3+i)*0.3})`;
    drawStar(ctx, px, py, 4, 6, 2);
  }
  
  if (gameOverTimer > 2) {
    ctx.font = `${titleSize*0.3}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(globalTime*3)*0.2})`;
    ctx.fillText('Tap or press any key to play again', W/2, H*0.7);
  }
}

function drawDangerWarnings() {
  if (state !== 'playing' || player.dead) return;
  // Proximity danger halo: subtle red pulse when enemies are within 3 tiles
  for (const en of enemies) {
    if (!en.alive) continue;
    const d = dist(player.gx, player.gy, en.gx, en.gy);
    if (d > 3.5) continue;
    const urgency = 1 - d / 3.5; // 0 at edge, 1 at adjacent
    const pulse = 0.5 + Math.sin(globalTime * 8) * 0.5;
    const alpha = urgency * pulse * 0.25;
    if (alpha < 0.02) continue;
    const [sx, sy] = worldToScreen(en.gx + 0.5, en.gy + 0.5);
    const dangerGlow = ctx.createRadialGradient(sx, sy, 0, sx, sy, CELL * 1.8);
    dangerGlow.addColorStop(0, `rgba(255,60,30,${alpha})`);
    dangerGlow.addColorStop(0.5, `rgba(255,30,0,${alpha * 0.3})`);
    dangerGlow.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = dangerGlow;
    ctx.beginPath(); ctx.arc(sx, sy, CELL * 1.8, 0, Math.PI * 2); ctx.fill();
  }
  // Falling boulder danger: subtle warning glow on boulders directly above player
  for (let checkY = player.gy - 1; checkY >= Math.max(1, player.gy - 4); checkY--) {
    if (grid[checkY] && grid[checkY][player.gx] === TILE.BOULDER) {
      const fk = fallKey(player.gx, checkY);
      if (fallMap[fk] > 0) {
        const [bsx, bsy] = worldToScreen(player.gx + 0.5, checkY + 0.5);
        const warnPulse = 0.5 + Math.sin(globalTime * 10) * 0.5;
        ctx.fillStyle = `rgba(255,100,50,${warnPulse * 0.12})`;
        ctx.beginPath(); ctx.arc(bsx, bsy, CELL * 0.6, 0, Math.PI * 2); ctx.fill();
      }
      break; // only check first boulder above
    }
    if (grid[checkY] && grid[checkY][player.gx] !== TILE.EMPTY) break;
  }
}

function drawCaveIntro() {
  if (state !== 'caveIntro') return;
  const L = LEVELS[level];
  const th = caveTheme();
  const a = Math.min(1, caveIntroTimer * 2.4); // Fade in, then stay until the player taps.
  ctx.save();
  ctx.fillStyle = `rgba(0,0,0,${0.48 * a})`;
  ctx.fillRect(0, 0, W, H);
  const cx = W / 2, cy = H * 0.47;
  const w = Math.min(W * 0.90, 560 * DPR);
  const h = Math.min(H * 0.56, 336 * DPR);
  const padX = w * 0.06;
  const maxTextW = w - padX * 2;
  ctx.globalAlpha = a;
  const grd = ctx.createLinearGradient(cx - w/2, cy - h/2, cx + w/2, cy + h/2);
  grd.addColorStop(0, `rgba(${th.tint},0.42)`);
  grd.addColorStop(0.55, 'rgba(6,12,10,0.88)');
  grd.addColorStop(1, `rgba(${th.wall},0.42)`);
  ctx.fillStyle = grd;
  ctx.strokeStyle = `rgba(${th.accent},0.50)`;
  ctx.lineWidth = Math.max(1, DPR * 1.4);
  ctx.beginPath(); ctx.roundRect(cx - w/2, cy - h/2, w, h, 18 * DPR); ctx.fill(); ctx.stroke();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  const caveLabel = `CAVE ${level + 1}`;
  setFitFont(caveLabel, 800, Math.max(12*DPR, h*0.095), 10*DPR, maxTextW);
  ctx.fillStyle = `rgba(${th.accent},0.95)`;
  ctx.fillText(caveLabel, cx, cy - h*0.33);

  const caveName = L.name || 'Emerald Mine';
  setFitFont(caveName, 900, Math.max(18*DPR, h*0.155), 17*DPR, maxTextW);
  ctx.fillStyle = '#fff';
  ctx.fillText(caveName, cx, cy - h*0.16);

  const target = `Target ${gemsNeeded} crystals  •  ${L.enemies} creatures`;
  setFitFont(target, 700, Math.max(11*DPR, h*0.073), 10*DPR, maxTextW);
  ctx.fillStyle = 'rgba(255,228,138,0.92)';
  ctx.fillText(target, cx, cy + h*0.03);

  const wrapped = wrapTextToWidth(caveBlurb(level), maxTextW, 600, Math.max(11*DPR, h*0.062), 9*DPR);
  ctx.fillStyle = 'rgba(218,245,228,0.82)';
  const lineGap = wrapped.size * 1.22;
  const startY = cy + h*0.19 - ((wrapped.lines.length - 1) * lineGap) / 2;
  for (let i = 0; i < wrapped.lines.length; i++) {
    ctx.fillText(wrapped.lines[i], cx, startY + i * lineGap);
  }

  const hint = level === 0 ? 'pinch to zoom  •  drag or hold to move' : 'tap to enter';
  setFitFont(hint, 600, Math.max(9*DPR, h*0.052), 8*DPR, maxTextW);
  ctx.fillStyle = level === 0 ? 'rgba(180,235,255,0.82)' : `rgba(220,255,235,${0.42 + Math.sin(globalTime * 5) * 0.18})`;
  ctx.fillText(hint, cx, cy + h*0.39);

  if (level === 0) {
    const enter = 'tap to enter';
    setFitFont(enter, 600, Math.max(9*DPR, h*0.047), 8*DPR, maxTextW);
    ctx.fillStyle = `rgba(220,255,235,${0.42 + Math.sin(globalTime * 5) * 0.18})`;
    ctx.fillText(enter, cx, cy + h*0.48);
  }
  ctx.restore();
}

function drawPauseOverlay() {
  if (!paused || state !== 'playing') return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const size = Math.min(W * 0.12, H * 0.09, 64 * DPR);
  ctx.font = `900 ${size}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(235,255,245,0.94)';
  ctx.fillText('PAUSED', W/2, H*0.44);
  ctx.font = `600 ${Math.max(12 * DPR, size * 0.25)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(210,245,230,0.78)';
  ctx.fillText('tap the pause button or press P', W/2, H*0.52);
  ctx.restore();
}

// ─── Main Render ───
function render() {
  ctx.clearRect(0, 0, W, H);
  
  if (state === 'title') {
    drawTitle();
    return;
  }
  
  updateViewLayout();
  drawCaveBackground();

  const boardPxW = gridW * CELL;
  const boardPxH = gridH * CELL;
  if (!boardView.follow) {
    const boardLeft = boardView.x + (boardView.w - boardPxW) * 0.5;
    const boardTop = boardView.y + (boardView.h - boardPxH) * 0.5;
    const panelPad = Math.max(4 * DPR, CELL * 0.2);
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.roundRect(boardLeft - panelPad, boardTop - panelPad, boardPxW + panelPad * 2, boardPxH + panelPad * 2, panelPad * 0.65);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,220,180,0.08)';
    ctx.lineWidth = Math.max(1, DPR);
    ctx.stroke();
  }
  
  ctx.save();
  ctx.beginPath();
  ctx.rect(boardView.x, boardView.y, boardView.w, boardView.h);
  ctx.clip();
  
  // Draw tiles
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const t = grid[y][x];
      if (t === TILE.EMPTY || t === TILE.DIRT || t === TILE.WALL || t === TILE.EXIT || t === TILE.AMOEBA) {
        drawTile(x, y, t);
      } else if (t === TILE.PLAYER) {
        drawTile(x, y, TILE.EMPTY);
      } else if (t === TILE.BOULDER) {
        suppressEmptyTileEdgeFX = true;
        drawTile(x, y, TILE.EMPTY);
        suppressEmptyTileEdgeFX = false;
        drawBoulder(x, y, !!fallMap[fallKey(x,y)]);
      } else if (t === TILE.GEM) {
        drawTile(x, y, TILE.EMPTY);
        drawGem(x, y, !!fallMap[fallKey(x,y)]);
      } else if (t === TILE.ENEMY) {
        drawTile(x, y, TILE.EMPTY);
      } else if (t === TILE.DIAMOND) {
        drawTile(x, y, TILE.EMPTY);
        drawDiamondGem(x, y, !!fallMap[fallKey(x,y)]);
      } else if (t === TILE.MAGIC_WALL) {
        drawMagicWall(x, y);
      } else if (t === TILE.DYNAMITE || t === TILE.SPEED_BOOTS || t === TILE.GHOST_MODE) {
        drawTile(x, y, TILE.EMPTY);
        drawBonusItem(x, y, t);
      }
    }
  }
  
  drawDynamicLights();
  drawDustMotes();
  drawDripParticles();
  drawSparkleParticles();
  
  // Enemy trails (behind enemies)
  drawEnemyTrails();

  // Enemies
  for (const en of enemies) {
    drawEnemy(en);
  }
  
  // Placed dynamite
  drawPlacedDynamite();
  
  // Player
  if (state === 'playing' || state === 'levelClear' || state === 'caveIntro') {
    drawPlayer(player.x, player.y);
  }
  
  drawDangerWarnings();
  drawParticles();
  drawShockwaveRings();
  drawFlyGems();
  ctx.restore();
  drawVignette();
  drawFlash();
  drawHUD();
  updatePauseBtn();
  updateDynamiteBtn();
  updateRetryBtn();
  updateMenuBtn();
  drawPauseBtn();
  drawMenuBtn();
  drawRetryBtn();
  drawDynamiteBtn();
  drawTouchRipples();
  
  // Overlays
  drawPauseOverlay();
  if (state === 'caveIntro') drawCaveIntro();
  if (state === 'levelClear') drawLevelClear();
  if (state === 'gameOver') drawGameOver();
  if (state === 'win') drawWin();
}

// ─── Game Loop ───
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  
  resize();
  
  if (state === 'title') {
    CELL = Math.min(W, H) * 0.04;
  } else {
    updateViewLayout();
  }

  update(dt);
  render();
  
  requestAnimationFrame(gameLoop);
}

// Init
level = 0;
score = 0;
requestAnimationFrame(gameLoop);

</script>
