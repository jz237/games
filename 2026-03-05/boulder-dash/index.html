  const [sx, sy] = worldToScreen(gx + 0.5, gy + 0.5);
  if (sx < -CELL*2 || sx > W+CELL*2 || sy < -CELL*2 || sy > H+CELL*2) return;
  
  const s = CELL * 0.35;
  const bob = Math.sin(globalTime * 3 + gx * 2 + gy * 3) * CELL * 0.04;
  
  // Glow
  const glowColors = {
    [TILE.DYNAMITE]: 'rgba(255,100,30,0.15)',
    [TILE.SPEED_BOOTS]: 'rgba(50,120,255,0.15)',
    [TILE.GHOST_MODE]: 'rgba(180,180,255,0.15)'
  };
  const glow = ctx.createRadialGradient(sx, sy + bob, 0, sx, sy + bob, CELL * 1.2);
  glow.addColorStop(0, glowColors[type] || 'rgba(255,255,255,0.1)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(sx, sy + bob, CELL * 1.2, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.save();
  ctx.translate(sx, sy + bob);
  
  if (type === TILE.DYNAMITE) {
    // Red cylinder
    ctx.fillStyle = '#cc2200';
    ctx.beginPath();
    ctx.roundRect(-s*0.3, -s*0.6, s*0.6, s*1.2, s*0.1);
    ctx.fill();
    // Band
    ctx.fillStyle = '#881100';
    ctx.fillRect(-s*0.3, -s*0.1, s*0.6, s*0.2);
    // Fuse
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = Math.max(1, s * 0.1);
    ctx.beginPath();
    ctx.moveTo(0, -s*0.6);
    ctx.quadraticCurveTo(s*0.3, -s*0.8, s*0.2, -s);
    ctx.stroke();
    // Fuse spark
    const sparkA = 0.5 + Math.sin(globalTime * 8) * 0.5;
    ctx.fillStyle = `rgba(255,200,50,${sparkA})`;
    ctx.beginPath();
    ctx.arc(s*0.2, -s, s*0.08, 0, Math.PI * 2);
    ctx.fill();
    // Label
    ctx.fillStyle = '#ff0';
    ctx.font = `bold ${Math.max(8, s*0.5)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💥', 0, 0);
  } else if (type === TILE.SPEED_BOOTS) {
    // Blue boot shape
    ctx.fillStyle = '#3366ff';
    ctx.beginPath();
    ctx.moveTo(-s*0.4, -s*0.3);
    ctx.lineTo(-s*0.3, -s*0.6);
    ctx.lineTo(s*0.1, -s*0.5);
    ctx.lineTo(s*0.15, -s*0.1);
    ctx.lineTo(s*0.5, s*0.2);
    ctx.lineTo(s*0.5, s*0.5);
    ctx.lineTo(-s*0.5, s*0.5);
    ctx.lineTo(-s*0.5, s*0.2);
    ctx.closePath();
    ctx.fill();
    // Lightning bolt
    ctx.fillStyle = '#ffee00';
    ctx.beginPath();
    ctx.moveTo(-s*0.05, -s*0.35);
    ctx.lineTo(s*0.15, -s*0.05);
    ctx.lineTo(-s*0.02, -s*0.05);
    ctx.lineTo(s*0.08, s*0.25);
    ctx.lineTo(-s*0.12, s*0.0);
    ctx.lineTo(s*0.02, s*0.0);
    ctx.closePath();
    ctx.fill();
    // Speed lines
    const speedPulse = 0.3 + Math.sin(globalTime * 6) * 0.3;
    ctx.strokeStyle = `rgba(100,180,255,${speedPulse})`;
    ctx.lineWidth = Math.max(1, s * 0.06);
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(-s*0.8 - i*s*0.15, -s*0.2 + i*s*0.25);
      ctx.lineTo(-s*0.5 - i*s*0.15, -s*0.2 + i*s*0.25);
      ctx.stroke();
    }
  } else if (type === TILE.GHOST_MODE) {
    // Ghost shape — translucent
    const ghostAlpha = 0.5 + Math.sin(globalTime * 4) * 0.2;
    ctx.globalAlpha = ghostAlpha;
    ctx.fillStyle = '#dddeff';
    ctx.beginPath();
    ctx.moveTo(0, -s*0.7);
    ctx.bezierCurveTo(s*0.6, -s*0.7, s*0.6, s*0.2, s*0.5, s*0.5);
    ctx.lineTo(s*0.3, s*0.3);
    ctx.lineTo(s*0.1, s*0.5);
    ctx.lineTo(-s*0.1, s*0.3);
    ctx.lineTo(-s*0.3, s*0.5);
    ctx.lineTo(-s*0.5, s*0.3);
    ctx.bezierCurveTo(-s*0.6, s*0.2, -s*0.6, -s*0.7, 0, -s*0.7);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#4444aa';
    ctx.beginPath();
    ctx.arc(-s*0.15, -s*0.15, s*0.1, 0, Math.PI*2);
    ctx.arc(s*0.15, -s*0.15, s*0.1, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Shimmer
    ctx.fillStyle = `rgba(200,200,255,${0.2 + Math.sin(globalTime*5)*0.15})`;
    ctx.beginPath();
    ctx.arc(0, -s*0.2, s*0.5, 0, Math.PI*2);
    ctx.fill();
  }
  
  ctx.restore();
}

function drawPlayer(px, py) {
  const [sx, sy] = worldToScreen(px + 0.5, py + 0.5);
  if (player.dead) {
    if (player.deadTimer < 1.5) {
      const t = player.deadTimer / 1.5;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(t * Math.PI * 4);
      ctx.scale(1-t, 1-t);
      ctx.globalAlpha = 1-t;
      drawPlayerSprite(0, 0, CELL);
      ctx.restore();
    }
    return;
  }
  
  // Player light cone in facing direction
  const dirVecs = [[1,0],[0,0.8],[-1,0],[0,-0.8]]; // right, down, left, up
  const dv = dirVecs[player.dir] || [1,0];
  const lightRange = CELL * 4;
  const lx = sx + dv[0] * lightRange * 0.4;
  const ly = sy + dv[1] * lightRange * 0.4;
  const lampGrd = ctx.createRadialGradient(sx, sy, CELL * 0.2, lx, ly, lightRange);
  lampGrd.addColorStop(0, 'rgba(255,240,180,0.12)');
  lampGrd.addColorStop(0.5, 'rgba(255,220,150,0.04)');
  lampGrd.addColorStop(1, 'rgba(255,220,150,0)');
  ctx.fillStyle = lampGrd;
  ctx.beginPath();
  ctx.arc(lx, ly, lightRange, 0, Math.PI * 2);
  ctx.fill();

  // Player ambient glow
  const lightR = CELL * 3.1;
  const lgrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, lightR);
  lgrd.addColorStop(0, 'rgba(255,230,165,0.13)');
  lgrd.addColorStop(0.5, 'rgba(255,205,120,0.06)');
  lgrd.addColorStop(1, 'rgba(255,205,120,0)');
  ctx.fillStyle = lgrd;
  ctx.beginPath();
  ctx.arc(sx, sy, lightR, 0, Math.PI*2);
  ctx.fill();

  // Ghost mode visual
  if (player.ghostTimer > 0) {
    ctx.save();
    ctx.globalAlpha = 0.4 + Math.sin(globalTime * 6) * 0.2;
    drawPlayerSprite(sx, sy, CELL);
    ctx.restore();
    // Shimmer overlay
    ctx.fillStyle = `rgba(180,180,255,${0.1 + Math.sin(globalTime * 8) * 0.05})`;
    ctx.beginPath();
    ctx.arc(sx, sy, CELL * 0.5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    drawPlayerSprite(sx, sy, CELL);
  }
  
  // Speed boots ring timer
  if (player.speedTimer > 0) {
    const ringRadius = CELL * 0.55;
    const ringFraction = player.speedTimer / 10;
    ctx.strokeStyle = `rgba(80,140,255,${0.6 + Math.sin(globalTime*4)*0.2})`;
    ctx.lineWidth = Math.max(2, CELL * 0.04);
    ctx.beginPath();
    ctx.arc(sx, sy, ringRadius, -Math.PI/2, -Math.PI/2 + ringFraction * Math.PI * 2);
    ctx.stroke();
    // Speed lines
    for (let i = 0; i < 3; i++) {
      const lineAlpha = 0.3 + Math.sin(globalTime * 8 + i) * 0.2;
      ctx.strokeStyle = `rgba(100,180,255,${lineAlpha})`;
      ctx.lineWidth = Math.max(1, CELL * 0.02);
      const lx2 = sx - dv[0] * CELL * (0.4 + i * 0.15);
      const ly2 = sy - dv[1] * CELL * (0.4 + i * 0.15);
      ctx.beginPath();
      ctx.moveTo(lx2 + (Math.random()-0.5)*CELL*0.2, ly2 + (Math.random()-0.5)*CELL*0.2);
      ctx.lineTo(lx2 - dv[0]*CELL*0.3, ly2 - dv[1]*CELL*0.3);
      ctx.stroke();
    }
  }
  
  // Ghost mode ring timer
  if (player.ghostTimer > 0) {
    const ringRadius = CELL * 0.6;
    const ringFraction = player.ghostTimer / 5;
    ctx.strokeStyle = `rgba(180,180,255,${0.5 + Math.sin(globalTime*3)*0.2})`;
    ctx.lineWidth = Math.max(2, CELL * 0.04);
    ctx.beginPath();
    ctx.arc(sx, sy, ringRadius, -Math.PI/2, -Math.PI/2 + ringFraction * Math.PI * 2);
    ctx.stroke();
  }
  
  // Shadow under feet
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + CELL * 0.32, CELL * 0.18, CELL * 0.05, 0, 0, Math.PI * 2);
  ctx.fill();
}

// ── Miner dust particles system ──
let minerDustParticles = [];

function spawnMinerDust(sx, sy, S, dx) {
  for (let i = 0; i < 4; i++) {
    minerDustParticles.push({
      x: sx + (Math.random() - 0.5) * S * 0.2,
      y: sy + S * 0.42 + Math.random() * S * 0.05,
      vx: (Math.random() - 0.5) * 30 - dx * 15,
      vy: 10 + Math.random() * 20,
      life: 0.4 + Math.random() * 0.3,
      maxLife: 0.4 + Math.random() * 0.3,
      size: 1.5 + Math.random() * 2.5
    });
  }
}

function updateMinerDust(dt) {
  for (let i = minerDustParticles.length - 1; i >= 0; i--) {
    const p = minerDustParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 40 * dt;
    p.life -= dt;
    if (p.life <= 0) minerDustParticles.splice(i, 1);
  }
}

function drawMinerDust() {
  for (const p of minerDustParticles) {
    const alpha = (p.life / p.maxLife) * 0.6;
    ctx.fillStyle = `rgba(140,110,70,${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayerSprite(sx, sy, s) {
  // ═══════════════════════════════════════════════════════════════
  //  HD MINER CHARACTER — fills 88% of tile with full detail
  //  50+ canvas drawing calls for rich visual detail
  // ═══════════════════════════════════════════════════════════════
  const S = s * 0.88; // character fills 88% of tile
  const isWalking = player.moving;
  const walkSpeed = 10; // walk animation speed
  const walkCycle = globalTime * walkSpeed;
  const walkPhase = Math.sin(walkCycle);       // leg/arm oscillation
  const walkPhase2 = Math.cos(walkCycle);      // offset phase

  // ── Idle animations ──
  // Breathing: gentle vertical oscillation (2-3px)
  const breathOffset = isWalking ? 0 : Math.sin(player.breathT * 1.5) * S * 0.025;
  const breathScale = isWalking ? 1 : 1 + Math.sin(player.breathT * 1.5) * 0.015;
  const idleSway = !isWalking && player.idleT > 0.5 ? Math.sin(globalTime * 1.5) * S * 0.02 : 0;

  // Blink: eyes close briefly every 3-4 seconds
  const blinkCycle = (globalTime % 3.5);
  const isBlinking = !isWalking && blinkCycle > 3.3 && blinkCycle < 3.45;

  // Walk bob (body bobs up/down when walking)
  const walkBob = isWalking ? Math.abs(Math.sin(walkCycle * 2)) * S * 0.06 : 0;

  // Spawn dust when walking
  if (isWalking && Math.sin(walkCycle * 2) > 0.95) {
    const dirDx = player.dir === 0 ? 1 : player.dir === 2 ? -1 : 0;
    spawnMinerDust(sx, sy, S, dirDx);
  }

  // Update and draw dust particles
  updateMinerDust(1/60);
  drawMinerDust();

  ctx.save();
  ctx.translate(sx + idleSway, sy - walkBob - breathOffset);
  ctx.scale(breathScale, breathScale);

  // ── Global outline settings ──
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  // ══════════════════════════════
  //  LEGS — dramatic walk animation
  // ══════════════════════════════
  const legLen = S * 0.25;
  const legW = S * 0.11;
  const legBaseY = S * 0.12;
  const legSpread = S * 0.07;

  // Walk animation: legs alternate DRAMATICALLY
  // Amplitude = 25%+ of character height for obvious motion
  const legAmplitude = S * 0.28; // 28% of char height — very obvious
  const leftLegSwing = isWalking ? Math.sin(walkCycle) * legAmplitude : 0;
  const rightLegSwing = isWalking ? Math.sin(walkCycle + Math.PI) * legAmplitude : 0;

  // Leg gradient — blue denim overalls
  const legGrd = ctx.createLinearGradient(0, legBaseY, 0, legBaseY + legLen + S * 0.3);
  legGrd.addColorStop(0, '#3a6298');  // 1
  legGrd.addColorStop(0.4, '#2d5080'); // 2
  legGrd.addColorStop(0.8, '#1e3a60'); // 3
  legGrd.addColorStop(1, '#152a48');   // 4

  // Left leg
  ctx.save();
  ctx.translate(-legSpread, legBaseY);
  if (isWalking) ctx.rotate(leftLegSwing / (legLen * 2)); // 5 - rotation for natural swing
  ctx.fillStyle = legGrd; // 6
  ctx.beginPath(); // 7
  ctx.roundRect(-legW/2, 0, legW, legLen, S * 0.025);
  ctx.fill(); // 8
  ctx.stroke(); // 9
  // Knee highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; // 10
  ctx.fillRect(-legW/2 + legW*0.15, legLen * 0.35, legW * 0.7, legLen * 0.15); // 11
  // Left boot
  ctx.fillStyle = '#5a3d28'; // 12
  ctx.beginPath(); // 13
  ctx.roundRect(-legW/2 - S*0.02, legLen - S*0.01, legW + S*0.04, S * 0.09, [S*0.015, S*0.015, S*0.025, S*0.025]);
  ctx.fill(); // 14
  ctx.stroke(); // 15
  // Boot sole
  ctx.fillStyle = '#2a1a10'; // 16
  ctx.fillRect(-legW/2 - S*0.02, legLen + S*0.06, legW + S*0.04, S * 0.02); // 17
  // Boot highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)'; // 18
  ctx.fillRect(-legW/2, legLen, legW * 0.6, S * 0.02); // 19
  // Boot lace detail
  ctx.strokeStyle = 'rgba(180,140,100,0.5)'; // 20
  ctx.lineWidth = Math.max(0.5, S * 0.012);
  ctx.beginPath(); ctx.moveTo(-legW*0.1, legLen + S*0.01); ctx.lineTo(legW*0.1, legLen + S*0.03); ctx.stroke(); // 21
  ctx.beginPath(); ctx.moveTo(-legW*0.1, legLen + S*0.03); ctx.lineTo(legW*0.1, legLen + S*0.05); ctx.stroke(); // 22
  ctx.restore();

  // Reset stroke for next elements
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // Right leg
  ctx.save();
  ctx.translate(legSpread, legBaseY);
  if (isWalking) ctx.rotate(rightLegSwing / (legLen * 2)); // 23
  ctx.fillStyle = legGrd; // 24
  ctx.beginPath(); // 25
  ctx.roundRect(-legW/2, 0, legW, legLen, S * 0.025);
  ctx.fill(); // 26
  ctx.stroke(); // 27
  // Knee highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; // 28
  ctx.fillRect(-legW/2 + legW*0.15, legLen * 0.35, legW * 0.7, legLen * 0.15); // 29
  // Right boot
  ctx.fillStyle = '#5a3d28'; // 30
  ctx.beginPath(); // 31
  ctx.roundRect(-legW/2 - S*0.02, legLen - S*0.01, legW + S*0.04, S * 0.09, [S*0.015, S*0.015, S*0.025, S*0.025]);
  ctx.fill(); // 32
  ctx.stroke(); // 33
  // Boot sole
  ctx.fillStyle = '#2a1a10'; // 34
  ctx.fillRect(-legW/2 - S*0.02, legLen + S*0.06, legW + S*0.04, S * 0.02); // 35
  // Boot highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)'; // 36
  ctx.fillRect(-legW/2, legLen, legW * 0.6, S * 0.02); // 37
  ctx.restore();

  // Reset stroke
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // ══════════════════════════════
  //  BODY — Blue overalls with straps
  // ══════════════════════════════
  const bodyW = S * 0.42;
  const bodyH = S * 0.3;
  const bodyTop = -S * 0.16;

  // Main body gradient — blue overalls
  const bodyGrd = ctx.createLinearGradient(-bodyW/2, bodyTop, bodyW/2, bodyTop + bodyH);
  bodyGrd.addColorStop(0, '#3a6da8');   // 38
  bodyGrd.addColorStop(0.3, '#2d5a90');
  bodyGrd.addColorStop(0.7, '#1e4a78');
  bodyGrd.addColorStop(1, '#163a60');
  ctx.fillStyle = bodyGrd;
  ctx.beginPath(); // 39
  ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, S * 0.04);
  ctx.fill(); // 40

  // Side lighting — lamp hits from facing direction
  const lampSide = player.dir === 0 ? -1 : player.dir === 2 ? 1 : 0;
  const bodyLightGrd = ctx.createLinearGradient(-bodyW/2, 0, bodyW/2, 0);
  bodyLightGrd.addColorStop(0, `rgba(255,255,200,${lampSide <= 0 ? 0.12 : 0})`); // 41
  bodyLightGrd.addColorStop(0.5, 'rgba(0,0,0,0)');
  bodyLightGrd.addColorStop(1, `rgba(255,255,200,${lampSide >= 0 ? 0.12 : 0})`);
  ctx.fillStyle = bodyLightGrd;
  ctx.beginPath(); // 42
  ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, S * 0.04);
  ctx.fill(); // 43

  // Shadow on opposite side of lamp
  const bodyShadowGrd = ctx.createLinearGradient(-bodyW/2, 0, bodyW/2, 0);
  bodyShadowGrd.addColorStop(0, `rgba(0,0,0,${lampSide >= 0 ? 0.2 : 0})`); // 44
  bodyShadowGrd.addColorStop(0.5, 'rgba(0,0,0,0)');
  bodyShadowGrd.addColorStop(1, `rgba(0,0,0,${lampSide <= 0 ? 0.2 : 0})`);
  ctx.fillStyle = bodyShadowGrd;
  ctx.beginPath(); // 45
  ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, S * 0.04);
  ctx.fill(); // 46

  // Body outline
  ctx.beginPath(); // 47
  ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, S * 0.04);
  ctx.stroke(); // 48

  // Shoulder straps
  ctx.fillStyle = '#2d5080'; // 49
  ctx.fillRect(-bodyW/2 + S*0.02, bodyTop - S*0.04, S * 0.06, S * 0.08); // 50
  ctx.fillRect(bodyW/2 - S*0.08, bodyTop - S*0.04, S * 0.06, S * 0.08); // 51
  // Strap outlines
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = Math.max(1, S * 0.02);
  ctx.strokeRect(-bodyW/2 + S*0.02, bodyTop - S*0.04, S * 0.06, S * 0.08); // 52
  ctx.strokeRect(bodyW/2 - S*0.08, bodyTop - S*0.04, S * 0.06, S * 0.08); // 53
  // Strap buttons (brass)
  ctx.fillStyle = '#d4a840'; // 54
  ctx.beginPath(); ctx.arc(-bodyW/2 + S*0.05, bodyTop + S*0.02, S*0.015, 0, Math.PI*2); ctx.fill(); // 55
  ctx.beginPath(); ctx.arc(bodyW/2 - S*0.05, bodyTop + S*0.02, S*0.015, 0, Math.PI*2); ctx.fill(); // 56

  // Belt line
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);
  ctx.fillStyle = '#5a3c22'; // 57
  ctx.fillRect(-bodyW/2, bodyTop + bodyH - S*0.055, bodyW, S * 0.045); // 58
  // Belt buckle
  ctx.fillStyle = '#e8c040'; // 59
  ctx.beginPath(); ctx.roundRect(-S*0.03, bodyTop + bodyH - S*0.052, S*0.06, S*0.04, S*0.008); ctx.fill(); // 60
  ctx.strokeStyle = '#b89830';
  ctx.lineWidth = Math.max(0.5, S * 0.01);
  ctx.beginPath(); ctx.roundRect(-S*0.03, bodyTop + bodyH - S*0.052, S*0.06, S*0.04, S*0.008); ctx.stroke(); // 61
  // Buckle prong
  ctx.strokeStyle = '#a08020';
  ctx.lineWidth = Math.max(0.5, S * 0.008);
  ctx.beginPath(); ctx.moveTo(0, bodyTop + bodyH - S*0.05); ctx.lineTo(0, bodyTop + bodyH - S*0.015); ctx.stroke(); // 62

  // Chest pocket detail
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = Math.max(0.5, S * 0.01);
  ctx.beginPath(); // 63
  ctx.roundRect(-bodyW/4 - S*0.01, bodyTop + S*0.04, S*0.08, S*0.06, S*0.01);
  ctx.stroke(); // 64

  // ══════════════════════════════
  //  ARMS — swing opposite to legs
  // ══════════════════════════════
  // Arms swing opposite to legs: left arm forward when right leg forward
  const armAmplitude = isWalking ? 0.9 : 0.06; // 15%+ char height swing
  const leftArmSwing = isWalking ? Math.sin(walkCycle + Math.PI) * armAmplitude : Math.sin(globalTime * 0.8) * 0.06;
  const rightArmSwing = isWalking ? Math.sin(walkCycle) * armAmplitude : -Math.sin(globalTime * 0.8) * 0.06;
  const armLen = S * 0.22;
  const armW2 = S * 0.08;

  // Arm gradient — shirt sleeve color
  const armGrd = ctx.createLinearGradient(0, 0, 0, armLen);
  armGrd.addColorStop(0, '#4a8ac0'); // 65
  armGrd.addColorStop(0.4, '#3a7ab0');
  armGrd.addColorStop(1, '#2a5a88');

  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // Left arm
  ctx.save();
  ctx.translate(-bodyW/2 - S*0.01, bodyTop + S*0.06);
  ctx.rotate(-0.15 + leftArmSwing); // 66
  ctx.fillStyle = armGrd;
  ctx.beginPath(); // 67
  ctx.roundRect(-armW2/2, 0, armW2, armLen, S*0.025);
  ctx.fill(); // 68
  ctx.stroke(); // 69
  // Sleeve cuff
  ctx.fillStyle = '#3a6898'; // 70
  ctx.fillRect(-armW2/2 - S*0.005, armLen - S*0.03, armW2 + S*0.01, S*0.03); // 71
  // Hand — skin tone
  const handGrd = ctx.createRadialGradient(0, armLen + S*0.02, 0, 0, armLen + S*0.02, S*0.04);
  handGrd.addColorStop(0, '#f8d8a8'); // 72
  handGrd.addColorStop(1, '#d8a878');
  ctx.fillStyle = handGrd;
  ctx.beginPath(); ctx.arc(0, armLen + S*0.02, S * 0.04, 0, Math.PI * 2); ctx.fill(); // 73
  // Fingers
  ctx.fillStyle = '#ecc898'; // 74
  ctx.beginPath();
  ctx.ellipse(S*0.02, armLen + S*0.04, S*0.015, S*0.01, 0.3, 0, Math.PI*2);
  ctx.fill(); // 75
  ctx.beginPath();
  ctx.ellipse(-S*0.02, armLen + S*0.04, S*0.012, S*0.008, -0.3, 0, Math.PI*2);
  ctx.fill(); // 76
  ctx.restore();

  // Right arm
  ctx.save();
  ctx.translate(bodyW/2 + S*0.01, bodyTop + S*0.06);
  ctx.rotate(0.15 + rightArmSwing); // 77
  ctx.fillStyle = armGrd;
  ctx.beginPath(); // 78
  ctx.roundRect(-armW2/2, 0, armW2, armLen, S*0.025);
  ctx.fill(); // 79
  ctx.stroke(); // 80
  // Sleeve cuff
  ctx.fillStyle = '#3a6898'; // 81
  ctx.fillRect(-armW2/2 - S*0.005, armLen - S*0.03, armW2 + S*0.01, S*0.03); // 82
  // Hand
  ctx.fillStyle = handGrd;
  ctx.beginPath(); ctx.arc(0, armLen + S*0.02, S * 0.04, 0, Math.PI * 2); ctx.fill(); // 83
  ctx.restore();

  // Reset stroke
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // ══════════════════════════════
  //  HEAD — detailed with gradients
  // ══════════════════════════════
  const headR = S * 0.17;
  const headY = -S * 0.3;

  // Head shadow on body (neck shadow)
  ctx.fillStyle = 'rgba(0,0,0,0.15)'; // 84
  ctx.beginPath();
  ctx.ellipse(0, bodyTop + S*0.01, headR * 0.8, S * 0.03, 0, 0, Math.PI * 2);
  ctx.fill(); // 85

  // Head — radial gradient for 3D skin
  const headGrd = ctx.createRadialGradient(-headR*0.25, headY - headR*0.2, headR*0.1, headR*0.1, headY + headR*0.1, headR*1.1);
  headGrd.addColorStop(0, '#ffe8c8');  // 86 bright highlight
  headGrd.addColorStop(0.3, '#f5d0a0');
  headGrd.addColorStop(0.6, '#e4b880');
  headGrd.addColorStop(0.85, '#d4a068');
  headGrd.addColorStop(1, '#b88050');  // shadow edge
  ctx.fillStyle = headGrd;
  ctx.beginPath(); // 87
  ctx.arc(0, headY, headR, 0, Math.PI * 2);
  ctx.fill(); // 88
  ctx.stroke(); // 89

  // Cheek blush
  ctx.fillStyle = 'rgba(220,140,100,0.15)'; // 90
  ctx.beginPath(); ctx.arc(-headR*0.5, headY + headR*0.2, headR*0.2, 0, Math.PI*2); ctx.fill(); // 91
  ctx.beginPath(); ctx.arc(headR*0.5, headY + headR*0.2, headR*0.2, 0, Math.PI*2); ctx.fill(); // 92

  // Ears
  ctx.fillStyle = '#e4b880'; // 93
  ctx.beginPath(); ctx.ellipse(-headR*0.95, headY + headR*0.05, headR*0.12, headR*0.18, 0, 0, Math.PI*2); ctx.fill(); // 94
  ctx.beginPath(); ctx.ellipse(headR*0.95, headY + headR*0.05, headR*0.12, headR*0.18, 0, 0, Math.PI*2); ctx.fill(); // 95
  // Inner ear
  ctx.fillStyle = '#d4a070'; // 96
  ctx.beginPath(); ctx.ellipse(-headR*0.95, headY + headR*0.05, headR*0.06, headR*0.1, 0, 0, Math.PI*2); ctx.fill(); // 97
  ctx.beginPath(); ctx.ellipse(headR*0.95, headY + headR*0.05, headR*0.06, headR*0.1, 0, 0, Math.PI*2); ctx.fill(); // 98

  // ── Eyes — look in movement direction ──
  const eyeDir = player.dir === 0 ? 1 : player.dir === 2 ? -1 : 0;
  const eyeDirY = player.dir === 3 ? -1 : player.dir === 1 ? 1 : 0;
  const eyeOffX = eyeDir * S * 0.02;
  const eyeOffY = eyeDirY * S * 0.01;
  const eyeY = headY - headR * 0.08;
  const eyeSpacing = S * 0.065;

  if (!isBlinking) {
    // Eye whites (larger, more visible)
    ctx.fillStyle = '#fff'; // 99
    ctx.beginPath(); ctx.ellipse(-eyeSpacing + eyeOffX, eyeY, S*0.038, S*0.032, 0, 0, Math.PI*2); ctx.fill(); // 100
    ctx.beginPath(); ctx.ellipse(eyeSpacing + eyeOffX, eyeY, S*0.038, S*0.032, 0, 0, Math.PI*2); ctx.fill(); // 101
    // Eye outlines
    ctx.strokeStyle = 'rgba(80,50,30,0.5)';
    ctx.lineWidth = Math.max(0.5, S * 0.012);
    ctx.beginPath(); ctx.ellipse(-eyeSpacing + eyeOffX, eyeY, S*0.038, S*0.032, 0, 0, Math.PI*2); ctx.stroke(); // 102
    ctx.beginPath(); ctx.ellipse(eyeSpacing + eyeOffX, eyeY, S*0.038, S*0.032, 0, 0, Math.PI*2); ctx.stroke(); // 103
    // Iris (dark brown)
    ctx.fillStyle = '#3a2818'; // 104
    ctx.beginPath(); ctx.arc(-eyeSpacing + eyeOffX*1.8, eyeY + eyeOffY, S*0.02, 0, Math.PI*2); ctx.fill(); // 105
    ctx.beginPath(); ctx.arc(eyeSpacing + eyeOffX*1.8, eyeY + eyeOffY, S*0.02, 0, Math.PI*2); ctx.fill(); // 106
    // Pupils (black)
    ctx.fillStyle = '#0a0a0a'; // 107
    ctx.beginPath(); ctx.arc(-eyeSpacing + eyeOffX*2, eyeY + eyeOffY, S*0.012, 0, Math.PI*2); ctx.fill(); // 108
    ctx.beginPath(); ctx.arc(eyeSpacing + eyeOffX*2, eyeY + eyeOffY, S*0.012, 0, Math.PI*2); ctx.fill(); // 109
    // Eye sparkle highlights
    ctx.fillStyle = 'rgba(255,255,255,0.85)'; // 110
    ctx.beginPath(); ctx.arc(-eyeSpacing + eyeOffX*1.2 - S*0.008, eyeY - S*0.01, S*0.009, 0, Math.PI*2); ctx.fill(); // 111
    ctx.beginPath(); ctx.arc(eyeSpacing + eyeOffX*1.2 - S*0.008, eyeY - S*0.01, S*0.009, 0, Math.PI*2); ctx.fill(); // 112
    // Secondary smaller highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; // 113
    ctx.beginPath(); ctx.arc(-eyeSpacing + eyeOffX*1.5 + S*0.005, eyeY + S*0.005, S*0.005, 0, Math.PI*2); ctx.fill(); // 114
    ctx.beginPath(); ctx.arc(eyeSpacing + eyeOffX*1.5 + S*0.005, eyeY + S*0.005, S*0.005, 0, Math.PI*2); ctx.fill(); // 115
    // Eyebrows
    ctx.strokeStyle = '#6a4a2a'; // 116
    ctx.lineWidth = Math.max(1, S * 0.02);
    ctx.beginPath(); ctx.moveTo(-eyeSpacing - S*0.03, eyeY - S*0.04); ctx.quadraticCurveTo(-eyeSpacing, eyeY - S*0.05, -eyeSpacing + S*0.03, eyeY - S*0.038); ctx.stroke(); // 117
    ctx.beginPath(); ctx.moveTo(eyeSpacing - S*0.03, eyeY - S*0.038); ctx.quadraticCurveTo(eyeSpacing, eyeY - S*0.05, eyeSpacing + S*0.03, eyeY - S*0.04); ctx.stroke(); // 118
  } else {
    // Blinking — closed eyes (horizontal lines)
    ctx.strokeStyle = '#5a3a1a'; // 119
    ctx.lineWidth = Math.max(1, S * 0.02);
    ctx.beginPath(); ctx.moveTo(-eyeSpacing - S*0.025, eyeY); ctx.lineTo(-eyeSpacing + S*0.025, eyeY); ctx.stroke(); // 120
    ctx.beginPath(); ctx.moveTo(eyeSpacing - S*0.025, eyeY); ctx.lineTo(eyeSpacing + S*0.025, eyeY); ctx.stroke(); // 121
    // Eyebrows still visible
    ctx.strokeStyle = '#6a4a2a';
    ctx.lineWidth = Math.max(1, S * 0.02);
    ctx.beginPath(); ctx.moveTo(-eyeSpacing - S*0.03, eyeY - S*0.035); ctx.quadraticCurveTo(-eyeSpacing, eyeY - S*0.045, -eyeSpacing + S*0.03, eyeY - S*0.033); ctx.stroke(); // 122
    ctx.beginPath(); ctx.moveTo(eyeSpacing - S*0.03, eyeY - S*0.033); ctx.quadraticCurveTo(eyeSpacing, eyeY - S*0.045, eyeSpacing + S*0.03, eyeY - S*0.035); ctx.stroke(); // 123
  }

  // Nose
  ctx.fillStyle = '#daa870'; // 124
  ctx.beginPath();
  ctx.moveTo(0, headY + headR*0.05);
  ctx.lineTo(S*0.015, headY + headR*0.25);
  ctx.lineTo(-S*0.015, headY + headR*0.25);
  ctx.closePath();
  ctx.fill(); // 125

  // Mouth — slight smile
  ctx.strokeStyle = '#8b5a3a'; // 126
  ctx.lineWidth = Math.max(1, S * 0.018);
  ctx.beginPath(); // 127
  ctx.arc(0, headY + headR * 0.42, S * 0.04, 0.15, Math.PI - 0.15);
  ctx.stroke(); // 128
  // Lower lip highlight
  ctx.strokeStyle = 'rgba(200,140,100,0.3)'; // 129
  ctx.lineWidth = Math.max(0.5, S * 0.01);
  ctx.beginPath();
  ctx.arc(0, headY + headR * 0.42, S * 0.035, 0.3, Math.PI - 0.3);
  ctx.stroke(); // 130

  // Chin shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)'; // 131
  ctx.beginPath();
  ctx.ellipse(0, headY + headR * 0.85, headR * 0.5, headR * 0.15, 0, 0, Math.PI * 2);
  ctx.fill(); // 132

  // ══════════════════════════════
  //  HELMET — metallic yellow hard hat
  // ══════════════════════════════
  const helmetY = headY - headR * 0.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // Helmet dome — metallic gradient with bright yellow top → darker gold bottom
  const helmetGrd = ctx.createRadialGradient(-S*0.08, helmetY - S*0.04, S*0.02, S*0.05, helmetY + S*0.03, S*0.25);
  helmetGrd.addColorStop(0, '#FFFAB0');  // 133 bright specular
  helmetGrd.addColorStop(0.15, '#FFE850');
  helmetGrd.addColorStop(0.35, '#F0D020');
  helmetGrd.addColorStop(0.6, '#D4A800');
  helmetGrd.addColorStop(0.85, '#B08500');
  helmetGrd.addColorStop(1, '#8B6500');  // dark gold edge
  ctx.fillStyle = helmetGrd;
  ctx.beginPath(); // 134
  ctx.ellipse(0, helmetY + S*0.015, S * 0.22, S * 0.12, 0, Math.PI, 0);
  ctx.fill(); // 135

  // Helmet brim — wider than dome
  const brimGrd = ctx.createLinearGradient(-S*0.26, 0, S*0.26, 0);
  brimGrd.addColorStop(0, '#E8C010'); // 136
  brimGrd.addColorStop(0.3, '#FFD700');
  brimGrd.addColorStop(0.5, '#FFE040');
  brimGrd.addColorStop(0.7, '#FFD700');
  brimGrd.addColorStop(1, '#C8A000');
  ctx.fillStyle = brimGrd;
  ctx.beginPath(); // 137
  ctx.ellipse(0, helmetY + S*0.015, S * 0.25, S * 0.055, 0, 0, Math.PI * 2);
  ctx.fill(); // 138

  // Brim shadow underneath
  ctx.fillStyle = 'rgba(80,60,0,0.35)'; // 139
  ctx.beginPath();
  ctx.ellipse(0, helmetY + S*0.04, S * 0.23, S * 0.025, 0, 0, Math.PI);
  ctx.fill(); // 140

  // Helmet ridge line (center)
  ctx.strokeStyle = 'rgba(180,140,0,0.4)'; // 141
  ctx.lineWidth = Math.max(1, S * 0.015);
  ctx.beginPath();
  ctx.moveTo(0, helmetY - S*0.1);
  ctx.quadraticCurveTo(0, helmetY, 0, helmetY + S*0.015);
  ctx.stroke(); // 142

  // Helmet outlines
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.lineWidth = Math.max(1.5, S * 0.028);
  ctx.beginPath(); // 143
  ctx.ellipse(0, helmetY + S*0.015, S * 0.25, S * 0.055, 0, 0, Math.PI * 2);
  ctx.stroke(); // 144
  ctx.beginPath(); // 145
  ctx.ellipse(0, helmetY + S*0.015, S * 0.22, S * 0.12, 0, Math.PI, 0);
  ctx.stroke(); // 146

  // ── Bright white specular highlight spot (top-left) ──
  const glintPhase = Math.sin(player.lampFlicker * 2) * 0.3 + 0.7;
  const flickerOn = Math.sin(player.lampFlicker * 12) > -0.8;
  ctx.fillStyle = `rgba(255,255,255,${0.75 * glintPhase})`; // 147
  ctx.beginPath();
  ctx.ellipse(-S * 0.08, helmetY - S*0.04, S * 0.055, S * 0.03, -0.4, 0, Math.PI * 2);
  ctx.fill(); // 148
  // Secondary glint
  ctx.fillStyle = `rgba(255,255,240,${0.4 * glintPhase})`; // 149
  ctx.beginPath();
  ctx.ellipse(-S * 0.04, helmetY - S*0.06, S * 0.025, S * 0.015, -0.2, 0, Math.PI * 2);
  ctx.fill(); // 150

  // Rim light on helmet edges
  ctx.strokeStyle = `rgba(255,240,180,${0.3 + Math.sin(globalTime * 3) * 0.1})`; // 151
  ctx.lineWidth = Math.max(1, S * 0.018);
  ctx.beginPath();
  ctx.ellipse(0, helmetY + S*0.015, S * 0.215, S * 0.095, 0, Math.PI + 0.4, -0.4);
  ctx.stroke(); // 152

  // ══════════════════════════════
  //  HEADLAMP — with glow
  // ══════════════════════════════
  const lampBrightness = flickerOn ? (0.85 + Math.sin(globalTime * 5) * 0.15) : 0.15;

  // Lamp housing (metal bracket)
  ctx.fillStyle = '#707070'; // 153
  ctx.beginPath();
  ctx.roundRect(-S*0.04, helmetY - S*0.005, S*0.08, S*0.045, S*0.01);
  ctx.fill(); // 154
  // Housing highlight
  ctx.fillStyle = 'rgba(200,200,200,0.3)'; // 155
  ctx.fillRect(-S*0.035, helmetY, S*0.07, S*0.012); // 156
  // Housing outline
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = Math.max(0.5, S * 0.01);
  ctx.beginPath();
  ctx.roundRect(-S*0.04, helmetY - S*0.005, S*0.08, S*0.045, S*0.01);
  ctx.stroke(); // 157

  // Lamp lens (circular)
  ctx.fillStyle = `rgba(255,255,220,${lampBrightness})`; // 158
  ctx.beginPath();
  ctx.arc(0, helmetY + S*0.015, S * 0.022, 0, Math.PI * 2);
  ctx.fill(); // 159
  // Lamp lens glow ring
  const lampGlowGrd = ctx.createRadialGradient(0, helmetY + S*0.015, S*0.01, 0, helmetY + S*0.015, S * 0.15);
  lampGlowGrd.addColorStop(0, `rgba(255,255,200,${lampBrightness * 0.6})`); // 160
  lampGlowGrd.addColorStop(0.3, `rgba(255,255,180,${lampBrightness * 0.2})`);
  lampGlowGrd.addColorStop(1, 'rgba(255,255,180,0)');
  ctx.fillStyle = lampGlowGrd;
  ctx.beginPath(); // 161
  ctx.arc(0, helmetY + S*0.015, S * 0.15, 0, Math.PI * 2);
  ctx.fill(); // 162

  // ── LAMP LIGHT BEAM (directional) ──
  const dirVec = player.dir === 0 ? [1, 0] : player.dir === 2 ? [-1, 0] : player.dir === 3 ? [0, -0.8] : [0, 0.8];
  const beamLen = S * 1.3;
  const bx = dirVec[0] * beamLen;
  const by = dirVec[1] * beamLen;
  if (flickerOn) {
    const beam = ctx.createRadialGradient(0, helmetY, 0, bx * 0.6, helmetY + by * 0.6, beamLen * 1.2);
    beam.addColorStop(0, 'rgba(255,240,180,0.22)'); // 163
    beam.addColorStop(0.5, 'rgba(255,240,180,0.06)');
    beam.addColorStop(1, 'rgba(255,240,180,0)');
    ctx.fillStyle = beam;
    ctx.beginPath(); // 164
    ctx.ellipse(bx * 0.4, helmetY + by * 0.4, S * 0.75, S * 0.45, Math.atan2(by, bx), 0, Math.PI * 2);
    ctx.fill(); // 165

    // Inner bright beam core
    const beamCore = ctx.createRadialGradient(0, helmetY, 0, bx * 0.3, helmetY + by * 0.3, beamLen * 0.5);
    beamCore.addColorStop(0, 'rgba(255,250,200,0.15)'); // 166
    beamCore.addColorStop(1, 'rgba(255,250,200,0)');
    ctx.fillStyle = beamCore;
    ctx.beginPath(); // 167
    ctx.ellipse(bx * 0.25, helmetY + by * 0.25, S * 0.3, S * 0.2, Math.atan2(by, bx), 0, Math.PI * 2);
    ctx.fill(); // 168
  }

  ctx.restore();
}

function drawEnemy(en) {
  if (!en.alive) {
    if (en.deathTimer < 0.5) {
      const [sx, sy] = worldToScreen(en.x + 0.5, en.y + 0.5);
      const t = en.deathTimer / 0.5;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.globalAlpha = 1-t;
      if (en.crushed) {
        // Squash animation — flatten vertically
        ctx.scale(1 + t * 1.0, Math.max(0.05, 1 - t * 1.5));
      } else {
        ctx.scale(1+t*0.5, 1-t);
      }
      drawEnemySprite(0, 0, CELL, en);
      ctx.restore();
    }
    return;
  }
  
  const [sx, sy] = worldToScreen(en.x + 0.5, en.y + 0.5);
  if (sx < -CELL*2 || sx > W+CELL*2 || sy < -CELL*2 || sy > H+CELL*2) return;
  
  const glowIntensity = 0.1 + Math.sin(en.glowT) * 0.05;
  const glowR = CELL * 1.2;
  const egrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
  egrd.addColorStop(0, `rgba(255,80,30,${glowIntensity})`);
  egrd.addColorStop(1, 'rgba(255,80,30,0)');
  ctx.fillStyle = egrd;
  ctx.beginPath(); ctx.arc(sx, sy, glowR, 0, Math.PI*2); ctx.fill();
  
  drawEnemySprite(sx, sy + Math.sin(en.bobT) * CELL * 0.03, CELL, en);
}

function drawEnemySprite(sx, sy, s, en) {
  const r = s * 0.3;
  
  ctx.beginPath();
  ctx.moveTo(sx, sy - r);
  ctx.bezierCurveTo(sx + r*1.2, sy - r*0.5, sx + r*1.1, sy + r*0.8, sx + r*0.5, sy + r);
  const wave = Math.sin(globalTime * 5 + en.bobT) * r * 0.1;
  ctx.quadraticCurveTo(sx + r*0.25, sy + r*0.85 + wave, sx, sy + r*0.9);
  ctx.quadraticCurveTo(sx - r*0.25, sy + r*0.85 - wave, sx - r*0.5, sy + r);
  ctx.bezierCurveTo(sx - r*1.1, sy + r*0.8, sx - r*1.2, sy - r*0.5, sx, sy - r);
  ctx.closePath();
  
  const egrd = ctx.createRadialGradient(sx, sy - r*0.2, 0, sx, sy, r*1.2);
  egrd.addColorStop(0, '#ff6030');
  egrd.addColorStop(0.7, '#cc3010');
  egrd.addColorStop(1, '#881500');
  ctx.fillStyle = egrd;
  ctx.fill();
  
  const eyeGlow = 0.8 + Math.sin(en.glowT * 2) * 0.2;
  ctx.fillStyle = `rgba(255,255,100,${eyeGlow})`;
  ctx.beginPath();
  ctx.ellipse(sx - r*0.25, sy - r*0.15, r*0.15, r*0.18, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(sx + r*0.25, sy - r*0.15, r*0.15, r*0.18, 0, 0, Math.PI*2);
  ctx.fill();
  
  ctx.fillStyle = '#220000';
  ctx.beginPath();
  ctx.arc(sx - r*0.25, sy - r*0.12, r*0.07, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(sx + r*0.25, sy - r*0.12, r*0.07, 0, Math.PI*2);
  ctx.fill();
  
  ctx.fillStyle = `rgba(255,200,50,${eyeGlow * 0.3})`;
  ctx.beginPath();
  ctx.arc(sx - r*0.25, sy - r*0.15, r*0.25, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(sx + r*0.25, sy - r*0.15, r*0.25, 0, Math.PI*2);
  ctx.fill();
}

function drawParticles() {
  for (const p of particles) {
    const [sx, sy] = worldToScreen(p.x, p.y);
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(sx, sy, p.size * CELL * 0.02, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawSparkleParticles() {
  for (const s of sparkleParticles) {
    const [sx, sy] = worldToScreen(s.x, s.y);
    const alpha = (s.life / s.maxLife) * (0.5 + Math.sin(s.twinkle) * 0.5);
    if (alpha <= 0) continue;
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.7})`;
    const size = s.size * CELL * 0.015 * (0.5 + Math.sin(s.twinkle * 1.5) * 0.5);
    drawStar(ctx, sx, sy, 4, size, size * 0.3);
  }
}

function drawDustMotes() {
  for (const d of dustMotes) {
    const [sx, sy] = worldToScreen(d.x, d.y);
    ctx.fillStyle = `rgba(180,160,130,${d.alpha * d.life})`;
    ctx.beginPath();
    ctx.arc(sx, sy, d.size * CELL * 0.015, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawDripParticles() {
  for (const d of dripParticles) {
    const [sx, sy] = worldToScreen(d.x, d.y);
    const alpha = Math.min(d.life * 0.5, d.alpha);
    ctx.fillStyle = `rgba(100,140,200,${alpha})`;
    // Elongated drop shape
    ctx.beginPath();
    ctx.ellipse(sx, sy, CELL * 0.015, CELL * 0.03, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlacedDynamite() {
  for (const dyn of placedDynamite) {
    const [sx, sy] = worldToScreen(dyn.gx + 0.5, dyn.gy + 0.5);
    const s = CELL * 0.3;
    const urgency = 1 - dyn.timer / 3;
    
    // Flash red as countdown progresses
    const flash = urgency > 0.7 ? Math.sin(globalTime * 20) * 0.3 : 0;
    
    // Red body
    ctx.fillStyle = `rgb(${200 + flash * 55},${30 - flash * 30},0)`;
    ctx.beginPath();
    ctx.roundRect(sx - s*0.3, sy - s*0.5, s*0.6, s, s*0.1);
    ctx.fill();
    
    // Timer text
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(8, s * 0.6)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(Math.ceil(dyn.timer).toString(), sx, sy);
    
    // Fuse sparking
    ctx.fillStyle = `rgba(255,200,50,${0.5 + Math.sin(globalTime * 15) * 0.5})`;
    ctx.beginPath();
    ctx.arc(sx, sy - s * 0.6, s * 0.12, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFlyGems() {
  for (const fg of flyGems) {
    const t = easeInOut(fg.t);
    const [startX, startY] = worldToScreen(fg.x, fg.y);
    const endX = CELL * 3;
    const endY = HUD_H * 0.48;
    const cx = lerp(startX, endX, t);
    const cy = lerp(startY, endY, t) - Math.sin(t * Math.PI) * CELL * 2;
    const scale = 1 - t * 0.7;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);

    const r = CELL * 0.2;
    // Prismatic trail
    const hue = (globalTime * 100 + fg.t * 200) % 360;
    ctx.fillStyle = `hsla(${hue},90%,70%,${1-t})`;
    ctx.beginPath();
    ctx.moveTo(0, -r);
    ctx.lineTo(r*0.6, 0);
    ctx.lineTo(0, r*0.8);
    ctx.lineTo(-r*0.6, 0);
    ctx.closePath();
    ctx.fill();
    
    // Trail sparkle
    ctx.fillStyle = `rgba(255,255,255,${(1-t)*0.5})`;
    drawStar(ctx, 0, 0, 4, r*0.5, r*0.15);

    ctx.restore();
  }
}

function drawDynamicLights() {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  const [px, py] = worldToScreen(player.x + 0.5, player.y + 0.5);
  const pLight = ctx.createRadialGradient(px, py, 0, px, py, CELL * 3.5);
  pLight.addColorStop(0, 'rgba(255,230,170,0.1)');
  pLight.addColorStop(0.55, 'rgba(255,200,120,0.04)');
  pLight.addColorStop(1, 'rgba(255,200,120,0)');
  ctx.fillStyle = pLight;
  ctx.beginPath();
  ctx.arc(px, py, CELL * 3.5, 0, Math.PI * 2);
  ctx.fill();

  for (let y = 1; y < gridH - 1; y++) {
    for (let x = 1; x < gridW - 1; x++) {
      const tileHere = grid[y][x];
      if (tileHere !== TILE.GEM && tileHere !== TILE.DIAMOND) continue;
      const [gx, gy] = worldToScreen(x + 0.5, y + 0.5);
      if (gx < -CELL || gx > W + CELL || gy < -CELL || gy > H + CELL) continue;
      const pulse = 0.6 + 0.4 * Math.sin(globalTime * 3 + x * 0.7 + y * 0.8);
      const gLight = ctx.createRadialGradient(gx, gy, 0, gx, gy, CELL * 1.5);
      if (tileHere === TILE.DIAMOND) {
        gLight.addColorStop(0, `rgba(140,180,255,${0.09 * pulse})`);
        gLight.addColorStop(1, 'rgba(100,140,255,0)');
      } else {
        gLight.addColorStop(0, `rgba(50,220,120,${0.08 * pulse})`);
        gLight.addColorStop(1, 'rgba(30,160,80,0)');
      }
      ctx.fillStyle = gLight;
      ctx.beginPath();
      ctx.arc(gx, gy, CELL * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawHUD() {
  const barH = HUD_H;
  
  // HUD background with gradient
  const hudGrd = ctx.createLinearGradient(0, 0, 0, barH);
  hudGrd.addColorStop(0, 'rgba(0,0,0,0.7)');
  hudGrd.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = hudGrd;
  ctx.fillRect(0, 0, W, barH);
  // Bottom border
  ctx.fillStyle = 'rgba(255,220,150,0.08)';
  ctx.fillRect(0, barH - 2, W, 2);
  
  const fontSize = clamp(CELL * 0.38, 13 * DPR, 24 * DPR);
  ctx.font = `bold ${fontSize}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textBaseline = 'middle';
  
  const gemY = barH / 2;
  const gemX = CELL * 0.6;
  
  // Mini emerald icon
  const gr = CELL * 0.15;
  ctx.fillStyle = `hsl(${145 + Math.sin(globalTime*2)*10},80%,50%)`;
  ctx.beginPath();
  ctx.moveTo(gemX, gemY - gr);
  ctx.lineTo(gemX + gr*0.5, gemY - gr*0.35);
  ctx.lineTo(gemX + gr*0.6, gemY + gr*0.2);
  ctx.lineTo(gemX, gemY + gr*0.7);
  ctx.lineTo(gemX - gr*0.6, gemY + gr*0.2);
  ctx.lineTo(gemX - gr*0.5, gemY - gr*0.35);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(200,255,230,0.35)';
  ctx.beginPath();
  ctx.moveTo(gemX - gr*0.1, gemY - gr*0.5);
  ctx.lineTo(gemX + gr*0.2, gemY);
  ctx.lineTo(gemX - gr*0.3, gemY);
  ctx.closePath();
  ctx.fill();
  
  const gemCount = Math.floor(displayGems);
  ctx.fillStyle = gemCount >= gemsNeeded ? '#60FF90' : '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(`${gemCount} / ${gemsNeeded}`, gemX + CELL*0.3, gemY);
  
  // Hearts
  const heartX = W / 2 - CELL * 0.5;
  for (let i = 0; i < 3; i++) {
    const hx = heartX + i * CELL * 0.5;
    const filled = i < player.lives;
    drawHeart(hx, gemY, CELL * 0.15, filled);
  }
  
  // Level
  ctx.textAlign = 'right';
  ctx.fillStyle = `rgba(255,255,255,${0.6 + Math.sin(globalTime*2)*0.1})`;
  ctx.fillText(`Level ${level + 1}`, W - CELL * 0.4, gemY - fontSize * 0.3);
  
  // Score
  ctx.font = `${fontSize*0.7}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(255,220,100,0.8)';
  ctx.fillText(`Score: ${score}`, W - CELL * 0.4, gemY + fontSize * 0.4);
  ctx.textAlign = 'right';
  ctx.font = `${Math.max(9 * DPR, fontSize * 0.46)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.fillText(VERSION, W - CELL * 0.4, HUD_H - 8 * DPR);
  if (boardView.follow || zoomToast > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = zoomToast > 0 ? 'rgba(170,255,210,0.9)' : 'rgba(255,255,255,0.34)';
    ctx.fillText(`Zoom ${Math.round(userZoom * 100)}%`, W / 2, HUD_H - 8 * DPR);
  }
  
  // Dynamite counter (if any)
  if (player.dynamite > 0) {
    ctx.textAlign = 'left';
    ctx.font = `${fontSize*0.8}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#ff6633';
    const dynX = gemX + CELL * 2.5;
    ctx.fillText(`💥×${player.dynamite}`, dynX, gemY);
  }
  
  // Powerup indicators
  let indicatorX = CELL * 0.6;
  const indicatorY = barH - fontSize * 0.4;
  ctx.font = `${fontSize*0.55}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'left';
  if (player.speedTimer > 0) {
    ctx.fillStyle = '#6699ff';
    ctx.fillText(`⚡ ${player.speedTimer.toFixed(1)}s`, indicatorX, indicatorY);
    indicatorX += CELL * 1.5;
  }
  if (player.ghostTimer > 0) {
    ctx.fillStyle = '#bbbbff';
    ctx.fillText(`👻 ${player.ghostTimer.toFixed(1)}s`, indicatorX, indicatorY);
  }
}

function drawHeart(cx, cy, r, filled) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.moveTo(0, r*0.5);
  ctx.bezierCurveTo(-r, -r*0.3, -r*0.5, -r*1.2, 0, -r*0.4);
  ctx.bezierCurveTo(r*0.5, -r*1.2, r, -r*0.3, 0, r*0.5);
  ctx.closePath();
  ctx.fillStyle = filled ? '#ff4060' : 'rgba(255,64,96,0.2)';
  ctx.fill();
  if (filled) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(-r*0.2, -r*0.3, r*0.2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawVignette() {
  // Vignette pulsing slightly
  const pulse = 0.5 + Math.sin(globalTime * 0.8) * 0.03;
  const healthPulse = player.lives <= 1 && state === 'playing' ? Math.sin(globalTime * 3) * 0.05 : 0;
  const vignetteStrength = pulse + healthPulse;
  
  const grd = ctx.createRadialGradient(W/2, H/2, W*0.25, W/2, H/2, W*0.75);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, `rgba(0,0,0,${vignetteStrength})`);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
  
  // Red vignette when low health
  if (player.lives <= 1 && state === 'playing') {
    const redPulse = 0.05 + Math.sin(globalTime * 2) * 0.03;
    const rgrd = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
    rgrd.addColorStop(0, 'rgba(255,0,0,0)');
    rgrd.addColorStop(1, `rgba(255,0,0,${redPulse})`);
    ctx.fillStyle = rgrd;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawFlash() {
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(${flashColor},${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawTouchRipples() {
  for (const tr of touchRipples) {
    const r = tr.t * CELL * 1.5;
    ctx.strokeStyle = `rgba(255,255,255,${0.3 * (1-tr.t)})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, r, 0, Math.PI*2);
    ctx.stroke();
  }
}

// ─── Title Screen ───
function drawTitle() {
  drawCaveBackground();
  
  // Floating emeralds on title screen
  for (let i = 0; i < 12; i++) {
    const x = W * (0.1 + (i * 0.17 + Math.sin(titleAnimT * 0.3 + i) * 0.05) % 0.9);
    const y = H * (0.2 + (i * 0.13 + Math.sin(titleAnimT * 0.4 + i*2) * 0.08) % 0.7);
    const r = W * 0.015;
    const shimmer = titleAnimT * 2 + i;
    // Mostly emerald green, occasional diamond blue
    const isDiamond = i % 5 === 0;
    const hue = isDiamond ? (200 + Math.sin(shimmer)*20) : (130 + Math.sin(shimmer)*15);
    const sat = isDiamond ? 70 : 80;
    
    ctx.fillStyle = `hsla(${hue},${sat}%,${isDiamond ? 75 : 55}%,${0.2 + Math.sin(shimmer)*0.1})`;
    ctx.beginPath();
    // Hexagonal emerald shape
    ctx.moveTo(x, y - r);
    ctx.lineTo(x + r*0.5, y - r*0.35);
    ctx.lineTo(x + r*0.6, y + r*0.2);
    ctx.lineTo(x, y + r*0.8);
    ctx.lineTo(x - r*0.6, y + r*0.2);
    ctx.lineTo(x - r*0.5, y - r*0.35);
    ctx.closePath();
    ctx.fill();
    
    // Sparkle around floating gems
    ctx.fillStyle = `rgba(150,255,200,${0.25 + Math.sin(shimmer*3)*0.15})`;
    drawStar(ctx, x + r*0.8*Math.cos(shimmer*2), y + r*0.5*Math.sin(shimmer*2), 4, r*0.3, r*0.08);
  }
  
  let titleSize = Math.min(W * 0.06, H * 0.075);
  const titleText = 'EMERALD MINE';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${titleSize}px 'Segoe UI', system-ui, sans-serif`;
  while (ctx.measureText(titleText).width > W * 0.72 && titleSize > 16 * DPR) {
    titleSize *= 0.92;
    ctx.font = `bold ${titleSize}px 'Segoe UI', system-ui, sans-serif`;
  }
  
  // Title shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText(titleText, W/2 + 3, H*0.24 + 3);
  
  // Emerald green gradient title
  const tgrd = ctx.createLinearGradient(W*0.2, H*0.19, W*0.8, H*0.29);
  tgrd.addColorStop(0, '#20E080');
  tgrd.addColorStop(0.3, '#60FFA0');
  tgrd.addColorStop(0.5, '#A0FFD0');
  tgrd.addColorStop(0.7, '#60FFA0');
  tgrd.addColorStop(1, '#20E080');
  ctx.fillStyle = tgrd;
  ctx.fillText(titleText, W/2, H*0.24);
  
  // Subtitle
  ctx.font = `${titleSize*0.32}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(200,255,220,0.7)';
  ctx.fillText('Crystal Caves', W/2, H*0.31);
  
  ctx.font = `${titleSize*0.22}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(200,220,180,0.6)';
  ctx.fillText('Inspired by the Amiga classic', W/2, H*0.36);
  
  const instrSize = Math.max(11 * DPR, titleSize * 0.24);
  ctx.font = `600 ${instrSize}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(235,255,238,0.9)';
  const instructions = showScores ? [] : [
    '⛏️ Dig emeralds',
    '🪨 Dodge boulders',
    '💎 Magic walls convert rocks',
    '✨ Rare diamonds = bonus',
    '🚪 Open the exit and escape'
  ];
  instructions.forEach((txt, i) => {
    ctx.fillText(txt, W/2, H*0.42 + i * instrSize * 1.38);
  });
  
  ctx.font = `${instrSize*0.82}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(210,255,225,0.75)';
  if (!showScores) ctx.fillText('Swipe / D-pad / WASD', W/2, H*0.64);
  
  const pulse = 0.85 + Math.sin(titleAnimT * 3) * 0.15;
  const btnW = W * 0.3 * pulse;
  const btnH = H * 0.08 * pulse;
  const btnY = H * 0.81;
  
  const bglow = ctx.createRadialGradient(W/2, btnY, 0, W/2, btnY, btnW);
  bglow.addColorStop(0, 'rgba(0,200,120,0.15)');
  bglow.addColorStop(1, 'rgba(0,200,120,0)');
  ctx.fillStyle = bglow;
  ctx.fillRect(W/2 - btnW, btnY - btnH, btnW*2, btnH*2);
  
  ctx.fillStyle = 'rgba(0,160,80,0.3)';
  ctx.beginPath();
  ctx.roundRect(W/2 - btnW/2, btnY - btnH/2, btnW, btnH, btnH*0.3);
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,255,160,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  ctx.font = `bold ${btnH*0.45}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.fillText('TAP TO PLAY', W/2, btnY);
  ctx.font = `${Math.max(10*DPR, titleSize*0.16)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(230,255,238,0.72)';
  ctx.fillText(`${VERSION}  •  tap to start  •  H toggles scores`, W/2, H*0.94);
  if (showScores) drawScoresPanel(W/2, H*0.58, Math.min(W*0.88, 440*DPR), Math.min(H*0.44, 300*DPR), -1);
  
  drawVignette();
}

// ─── Level Clear Screen ───
function drawLevelClear() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(levelClearTimer * 0.8, 0.6)})`;
  ctx.fillRect(0, 0, W, H);
  
  const titleSize = Math.min(W * 0.07, H * 0.09);
  if (hsEntry.active) { drawHighScoreEntry(); return; }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  if (levelClearTimer > 0.3) {
    const t = easeOut(Math.min((levelClearTimer - 0.3) * 2, 1));
    ctx.font = `bold ${titleSize * t}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#FFD700';
    ctx.fillText('✨ LEVEL CLEAR! ✨', W/2, H*0.35);
  }
  
  if (levelClearTimer > 1) {
    const statSize = titleSize * 0.4;
    ctx.font = `${statSize}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#fff';
    
    // Animated score tally
    const tallyProgress = Math.min((levelClearTimer - 1) * 2, 1);
    const displayScore = Math.floor(score * easeOut(tallyProgress));
    
    ctx.fillText(`Gems: ${player.gems}`, W/2, H*0.5);
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`Score: ${displayScore}`, W/2, H*0.57);
    ctx.fillStyle = '#fff';
    ctx.fillText(`Lives remaining: ${player.lives}`, W/2, H*0.64);
  }
  
  // Celebration particle fountain
  for (const p of celebrationParticles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawScoresPanel(cx, cy, w, h, highlightIdx) {
  const scores = loadHighScores();
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(5,12,8,0.78)';
  ctx.strokeStyle = 'rgba(80,220,140,0.35)'; ctx.lineWidth = Math.max(1, DPR);
  ctx.beginPath(); ctx.roundRect(cx-w/2, cy-h/2, w, h, 16*DPR); ctx.fill(); ctx.stroke();
  ctx.font = `bold ${Math.max(13*DPR, h*0.085)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = '#60ffa0'; ctx.fillText('HIGH SCORES', cx, cy-h*0.38);
  ctx.font = `${Math.max(10*DPR, h*0.062)}px monospace`;
  if (!scores.length) { ctx.fillStyle = 'rgba(255,255,255,0.62)'; ctx.fillText('No scores yet — mine the first legend.', cx, cy); ctx.restore(); return; }
  const startY = cy - h*0.25;
  for (let i=0; i<Math.min(scores.length, 10); i++) {
    const e = scores[i];
    const y = startY + i * h*0.06;
    ctx.fillStyle = i === highlightIdx ? '#fff59a' : i === 0 ? '#ffd95c' : 'rgba(235,245,255,0.82)';
    const rank = String(i+1).padStart(2,' ');
    const sc = String(e.score).padStart(6,' ');
    ctx.fillText(`${rank}. ${e.initials || '---'}  ${sc}  CAVE ${e.level || 1}`, cx, y);
  }
  ctx.restore();
}
function drawHighScoreEntry() {
  if (!hsEntry.active) return;
  const titleSize = Math.min(W * 0.07, H * 0.09);
  if (hsEntry.submitted) {
    drawScoresPanel(W/2, H*0.56, Math.min(W*0.82, 500*DPR), Math.min(H*0.46, 330*DPR), hsEntry.newIdx);
    ctx.font = `${titleSize*0.25}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Tap or press any key after the shimmer settles', W/2, H*0.84);
    return;
  }
  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.font = `bold ${titleSize*0.65}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle='#ffd95c'; ctx.fillText('NEW HIGH SCORE', W/2, H*0.24);
  ctx.font = `${titleSize*0.32}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle='#fff'; ctx.fillText(`Score ${hsEntry.score}  •  Cave ${hsEntry.level}`, W/2, H*0.33);
  const spacing = Math.min(W*0.12, 70*DPR);
  for (let i=0; i<3; i++) {
    const x = W/2 + (i-1)*spacing;
    ctx.fillStyle = hsEntry.pos === i ? 'rgba(255,217,80,0.25)' : 'rgba(255,255,255,0.08)';
    ctx.strokeStyle = hsEntry.pos === i ? '#ffd95c' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = Math.max(2, DPR*2);
    ctx.beginPath(); ctx.roundRect(x-spacing*0.34, H*0.45, spacing*0.68, spacing*0.78, 8*DPR); ctx.fill(); ctx.stroke();
    ctx.font = `bold ${spacing*0.54}px monospace`; ctx.fillStyle = '#fff'; ctx.fillText(hsEntry.initials[i], x, H*0.50);
    ctx.font = `${spacing*0.22}px monospace`; ctx.fillStyle='rgba(255,255,255,0.65)'; ctx.fillText('▲', x, H*0.43); ctx.fillText('▼', x, H*0.59);
  }
  ctx.font = `bold ${titleSize*0.28}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle='rgba(0,180,255,0.35)'; ctx.beginPath(); ctx.roundRect(W/2-W*0.16, H*0.70, W*0.32, H*0.075, 14*DPR); ctx.fill();
  ctx.strokeStyle='rgba(120,220,255,0.7)'; ctx.stroke(); ctx.fillStyle='#fff'; ctx.fillText('SAVE SCORE', W/2, H*0.738);
  ctx.font = `${titleSize*0.20}px 'Segoe UI', system-ui, sans-serif`; ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillText('Tap letters or use arrows/WASD. Enter/Space saves.', W/2, H*0.84);
  ctx.restore();
}

// ─── Game Over / Win ───
function drawGameOver() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(gameOverTimer * 0.5, 0.7)})`;
  ctx.fillRect(0, 0, W, H);
  
  const titleSize = Math.min(W * 0.07, H * 0.09);
  if (hsEntry.active) { drawHighScoreEntry(); return; }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  if (gameOverTimer > 0.5) {
    ctx.font = `bold ${titleSize}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#ff4060';
    ctx.fillText('GAME OVER', W/2, H*0.4);
    
    ctx.font = `${titleSize*0.4}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#ccc';
    ctx.fillText(`Final Score: ${score}`, W/2, H*0.52);
  }
  
  if (gameOverTimer > 2) {
    ctx.font = `${titleSize*0.3}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(globalTime*3)*0.2})`;
    ctx.fillText('Tap or press any key to restart', W/2, H*0.65);
  }
}

function drawWin() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(gameOverTimer * 0.5, 0.5)})`;
  ctx.fillRect(0, 0, W, H);
  
  const titleSize = Math.min(W * 0.06, H * 0.08);
  if (hsEntry.active) { drawHighScoreEntry(); return; }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  if (gameOverTimer > 0.3) {
    ctx.font = `bold ${titleSize}px 'Segoe UI', system-ui, sans-serif`;
    
    const tgrd = ctx.createLinearGradient(W*0.3, H*0.3, W*0.7, H*0.5);
    tgrd.addColorStop(0, '#FFD700');
    tgrd.addColorStop(0.5, '#FFF');
    tgrd.addColorStop(1, '#FFD700');
    ctx.fillStyle = tgrd;
    ctx.fillText('🏆 YOU WIN! 🏆', W/2, H*0.35);
    
    ctx.font = `${titleSize*0.5}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = '#E0FFFF';
    ctx.fillText('All caves conquered!', W/2, H*0.45);
    
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`Final Score: ${score}`, W/2, H*0.55);
  }
  
  for (let i = 0; i < 5; i++) {
    const angle = globalTime * 0.5 + i * Math.PI * 2 / 5;
    const px = W/2 + Math.cos(angle) * W * 0.25;
    const py = H*0.45 + Math.sin(angle) * H * 0.15;
    ctx.fillStyle = `rgba(255,215,0,${0.4 + Math.sin(globalTime*3+i)*0.3})`;
    drawStar(ctx, px, py, 4, 6, 2);
  }
  
  if (gameOverTimer > 2) {
    ctx.font = `${titleSize*0.3}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(globalTime*3)*0.2})`;
    ctx.fillText('Tap or press any key to play again', W/2, H*0.7);
  }
}

// ─── Main Render ───
function render() {
  ctx.clearRect(0, 0, W, H);
  
  if (state === 'title') {
    drawTitle();
    return;
  }
  
  updateViewLayout();
  drawCaveBackground();

  const boardPxW = gridW * CELL;
  const boardPxH = gridH * CELL;
  if (!boardView.follow) {
    const boardLeft = boardView.x + (boardView.w - boardPxW) * 0.5;
    const boardTop = boardView.y + (boardView.h - boardPxH) * 0.5;
    const panelPad = Math.max(4 * DPR, CELL * 0.2);
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.roundRect(boardLeft - panelPad, boardTop - panelPad, boardPxW + panelPad * 2, boardPxH + panelPad * 2, panelPad * 0.65);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,220,180,0.08)';
    ctx.lineWidth = Math.max(1, DPR);
    ctx.stroke();
  }
  
  ctx.save();
  ctx.beginPath();
  ctx.rect(boardView.x, boardView.y, boardView.w, boardView.h);
  ctx.clip();
  
  // Draw tiles
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const t = grid[y][x];
      if (t === TILE.EMPTY || t === TILE.DIRT || t === TILE.WALL || t === TILE.EXIT) {
        drawTile(x, y, t);
      } else if (t === TILE.PLAYER) {
        drawTile(x, y, TILE.EMPTY);
      } else if (t === TILE.BOULDER) {
        drawTile(x, y, TILE.EMPTY);
        drawBoulder(x, y, !!fallMap[fallKey(x,y)]);
      } else if (t === TILE.GEM) {
        drawTile(x, y, TILE.EMPTY);
        drawGem(x, y, !!fallMap[fallKey(x,y)]);
      } else if (t === TILE.ENEMY) {
        drawTile(x, y, TILE.EMPTY);
      } else if (t === TILE.DIAMOND) {
        drawTile(x, y, TILE.EMPTY);
        drawDiamondGem(x, y, !!fallMap[fallKey(x,y)]);
      } else if (t === TILE.MAGIC_WALL) {
        drawMagicWall(x, y);
      } else if (t === TILE.DYNAMITE || t === TILE.SPEED_BOOTS || t === TILE.GHOST_MODE) {
        drawTile(x, y, TILE.EMPTY);
        drawBonusItem(x, y, t);
      }
    }
  }
  
  drawDynamicLights();
  drawDustMotes();
  drawDripParticles();
  drawSparkleParticles();
  
  // Enemies
  for (const en of enemies) {
    drawEnemy(en);
  }
  
  // Placed dynamite
  drawPlacedDynamite();
  
  // Player
  if (state === 'playing' || state === 'levelClear') {
    drawPlayer(player.x, player.y);
  }
  
  drawParticles();
  drawFlyGems();
  ctx.restore();
  drawVignette();
  drawFlash();
  drawHUD();
  updateDynamiteBtn();
  drawDynamiteBtn();
  drawDPad();
  drawTouchRipples();
  
  // Overlays
  if (state === 'levelClear') drawLevelClear();
  if (state === 'gameOver') drawGameOver();
  if (state === 'win') drawWin();
}

// ─── Game Loop ───
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  
  resize();
  
  if (state === 'title') {
    CELL = Math.min(W, H) * 0.04;
  } else {
    updateViewLayout();
  }

  update(dt);
  render();
  
  requestAnimationFrame(gameLoop);
}

// Init
level = 0;
score = 0;
requestAnimationFrame(gameLoop);

</script>
