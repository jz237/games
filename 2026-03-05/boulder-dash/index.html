      } else if (en.type === 'hunter') {
        enemyTrails.push({ x:tx, y:ty, vx:(Math.random()-0.5)*0.6, vy:(Math.random()-0.5)*0.6, life:0.3+Math.random()*0.25, maxLife:0.55, color:'rgba(255,50,130,0.5)', size:1.2+Math.random()*1.8 });
      }
    }
  }
  
  reconcileCrystalTarget();

  // Player breathing
  player.breathT += dt * 2;
  
  // Camera spring physics
  if (boardView.follow) {
    const targetX = clamp(player.x + 0.5, cameraBounds.minX, cameraBounds.maxX);
    const targetY = clamp(player.y + 0.5, cameraBounds.minY, cameraBounds.maxY);
    camera.tx = targetX;
    camera.ty = targetY;
    camera.x += (camera.tx - camera.x) * dt * 6.5;
    camera.y += (camera.ty - camera.y) * dt * 6.5;
  } else {
    camera.tx = gridW / 2;
    camera.ty = gridH / 2;
    camera.x += (camera.tx - camera.x) * dt * 8;
    camera.y += (camera.ty - camera.y) * dt * 8;
  }
  
  // Shake spring damped harmonic oscillator
  const springK = 250;
  const damping = 14;
  camera.shakeX += camera.shakeVX * dt;
  camera.shakeY += camera.shakeVY * dt;
  camera.shakeVX += (-camera.shakeX * springK - camera.shakeVX * damping) * dt;
  camera.shakeVY += (-camera.shakeY * springK - camera.shakeVY * damping) * dt;
  
  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  // Enemy trail particles
  for (let i = enemyTrails.length - 1; i >= 0; i--) {
    const et = enemyTrails[i];
    et.x += et.vx * dt; et.y += et.vy * dt;
    et.life -= dt;
    if (et.life <= 0) enemyTrails.splice(i, 1);
  }
  if (enemyTrails.length > 120) enemyTrails.splice(0, enemyTrails.length - 120);

  // Shockwave rings
  for (let i = shockwaveRings.length - 1; i >= 0; i--) {
    const sw = shockwaveRings[i];
    sw.life -= dt;
    const progress = 1 - sw.life / sw.maxLife;
    sw.r = sw.maxR * easeOut(progress);
    if (sw.life <= 0) shockwaveRings.splice(i, 1);
  }

  // Sparkle particles around gems
  // Spawn new sparkles near gems
  if (state === 'playing') {
    for (let y = 1; y < gridH-1; y++) {
      for (let x = 1; x < gridW-1; x++) {
        if ((grid[y][x] === TILE.GEM || grid[y][x] === TILE.DIAMOND) && Math.random() < 0.03) {
          addSparkle(x + 0.5, y + 0.5);
        }
        // Active magic wall ambient crackling sparks
        if (grid[y][x] === TILE.MAGIC_WALL && magicWallActive && Math.random() < 0.06) {
          addParticle(x + Math.random(), y + Math.random(),
            (Math.random()-0.5)*1.2, -0.5 - Math.random()*0.8,
            `hsla(${140 + Math.random()*40},80%,${60+Math.random()*30}%,0.7)`,
            0.2 + Math.random()*0.2, 1+Math.random(), 0.3);
        }
      }
    }
  }
  for (let i = sparkleParticles.length - 1; i >= 0; i--) {
    const s = sparkleParticles[i];
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.twinkle += dt * 8;
    s.life -= dt;
    if (s.life <= 0) sparkleParticles.splice(i, 1);
  }
  
  // Dust motes
  for (let i = dustMotes.length - 1; i >= 0; i--) {
    const d = dustMotes[i];
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.life -= dt * 0.1;
    if (d.life <= 0) {
      const rx = 1 + Math.random() * (gridW-2);
      const ry = 1 + Math.random() * (gridH-2);
      const gx = Math.floor(rx), gy = Math.floor(ry);
      if (gx >= 0 && gy >= 0 && gx < gridW && gy < gridH && grid[gy][gx] === TILE.EMPTY) {
        d.x = rx; d.y = ry;
        d.vx = (Math.random()-0.5)*0.1;
        d.vy = -0.02 - Math.random()*0.03;
        d.life = 1;
        d.alpha = 0.15 + Math.random()*0.2;
      } else {
        dustMotes.splice(i, 1);
      }
    }
  }
  
  // Water drip particles from ceiling tiles
  if (Math.random() < 0.02) {
    // Pick a random wall on top edge or dirt with wall above
    const x = 1 + Math.floor(Math.random() * (gridW-2));
    if (grid[1] && (grid[0][x] === TILE.WALL || grid[0][x] === TILE.DIRT) && grid[1][x] === TILE.EMPTY) {
      dripParticles.push({
        x: x + 0.3 + Math.random()*0.4, y: 1,
        vy: 0.5 + Math.random() * 0.5,
        life: 2 + Math.random(), alpha: 0.4
      });
    }
  }
  for (let i = dripParticles.length - 1; i >= 0; i--) {
    const d = dripParticles[i];
    d.y += d.vy * dt;
    d.vy += 2 * dt;
    d.life -= dt;
    // Stop on solid
    const gy = Math.floor(d.y);
    if (gy >= 0 && gy < gridH && grid[gy] && grid[gy][Math.floor(d.x)] !== TILE.EMPTY) {
      d.life = -1;
    }
    if (d.life <= 0) dripParticles.splice(i, 1);
  }
  
  // Flying gems (collect animation)
  for (let i = flyGems.length - 1; i >= 0; i--) {
    flyGems[i].t += dt * 2;
    if (flyGems[i].t >= 1) flyGems.splice(i, 1);
  }
  
  // Display gems smooth
  displayGems += (player.gems - displayGems) * dt * 8;
  
  // Flash fade
  if (flashAlpha > 0) flashAlpha -= dt * 3;
  
  // Touch ripples
  if (zoomToast > 0) zoomToast = Math.max(0, zoomToast - dt);
  for (let i = touchRipples.length - 1; i >= 0; i--) {
    touchRipples[i].t += dt * 3;
    if (touchRipples[i].t >= 1) touchRipples.splice(i, 1);
  }
}

// ─── Rendering ───
function worldToScreen(wx, wy) {
  const cx = boardView.x + boardView.w * 0.5 + (wx - camera.x) * CELL + camera.shakeX * CELL * 0.08;
  const cy = boardView.y + boardView.h * 0.5 + (wy - camera.y) * CELL + camera.shakeY * CELL * 0.08;
  return [cx, cy];
}

function distToPlayer(wx, wy) {
  return Math.sqrt((wx - player.x - 0.5)**2 + (wy - player.y - 0.5)**2);
}

function lightAtTile(x, y) {
  // Fog of war lite: tiles farther from player are dimmer
  const d = distToPlayer(x + 0.5, y + 0.5);
  const maxDist = 8;
  return clamp(1 - (d - 2) / maxDist, 0.25, 1);
}

function drawCaveBackground() {
  const th = caveTheme();
  const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.72);
  grd.addColorStop(0, th.bg0);
  grd.addColorStop(1, th.bg1);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Distinct cave identity layer for the authored lesson caves.
  if (level < CAVE_THEMES.length) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = `rgba(${th.tint},0.035)`;
    for (let i = 0; i < 14; i++) {
      const x = ((i * 137 + level * 53) % 1000) / 1000 * W;
      const y = ((i * 271 + level * 91) % 1000) / 1000 * H;
      const rr = Math.min(W,H) * (0.08 + (i % 4) * 0.025);
      ctx.beginPath(); ctx.arc(x, y, rr, 0, Math.PI*2); ctx.fill();
    }
    ctx.strokeStyle = `rgba(${th.accent},0.06)`;
    ctx.lineWidth = Math.max(1, DPR);
    for (let i = 0; i < 9; i++) {
      const y = H * ((i + 1) / 10) + Math.sin(globalTime * 0.25 + i + level) * 8 * DPR;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.bezierCurveTo(W*0.25, y - 22*DPR, W*0.62, y + 18*DPR, W, y - 8*DPR);
      ctx.stroke();
    }
    ctx.restore();
  }
}

let suppressEmptyTileEdgeFX = false;

function isSolidTileForEdge(t) {
  return t === TILE.DIRT || t === TILE.WALL || t === TILE.MAGIC_WALL;
}
function noise01(x, y, salt=0) {
  const v = Math.sin(x * 127.1 + y * 311.7 + salt * 74.7) * 43758.5453123;
  return v - Math.floor(v);
}
function drawCrumbleEdge(left, top, s, side, th, strength=1) {
  const n = 7;
  ctx.save();
  ctx.fillStyle = `rgba(${th.dirt},${0.40 * strength})`;
  ctx.strokeStyle = `rgba(30,20,12,${0.30 * strength})`;
  ctx.lineWidth = Math.max(1, s * 0.018);
  for (let i = 0; i < n; i++) {
    const t = (i + 0.5) / n;
    const wob = (noise01(i, side.length, level) - 0.5) * s * 0.10;
    let x = left, y = top, w = s * (0.06 + noise01(i, level, 3) * 0.10), h = s * (0.06 + noise01(i, level, 5) * 0.10);
    if (side === 'top') { x = left + s * t + wob; y = top - s * 0.015; }
    if (side === 'bottom') { x = left + s * t + wob; y = top + s - h + s * 0.015; }
    if (side === 'left') { x = left - s * 0.015; y = top + s * t + wob; }
    if (side === 'right') { x = left + s - w + s * 0.015; y = top + s * t + wob; }
    ctx.beginPath();
    ctx.ellipse(x + w*0.5, y + h*0.5, w, h, noise01(i, level, 9) * Math.PI, 0, Math.PI*2);
    ctx.fill();
    if (i % 2 === 0) ctx.stroke();
  }
  ctx.restore();
}
function drawMineralVeins(left, top, s, x, y, th, dense=false) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const count = dense ? 5 : 3;
  for (let i = 0; i < count; i++) {
    const n = noise01(x + i*11, y - i*7, level);
    if (n < (dense ? 0.18 : 0.32)) continue;
    const sx0 = left + s * (0.12 + noise01(x, y, i) * 0.72);
    const sy0 = top + s * (0.10 + noise01(y, x, i+2) * 0.74);
    ctx.strokeStyle = `rgba(${th.accent},${dense ? 0.105 : 0.07})`;
    ctx.lineWidth = Math.max(0.7, s * (dense ? 0.014 : 0.010));
    ctx.beginPath();
    ctx.moveTo(sx0, sy0);
    ctx.lineTo(sx0 + s*(noise01(i,x,4)-0.5)*0.38, sy0 + s*(0.18 + noise01(i,y,8)*0.28));
    ctx.lineTo(sx0 + s*(noise01(i,x,6)-0.5)*0.52, sy0 + s*(0.34 + noise01(i,y,12)*0.30));
    ctx.stroke();
  }
  ctx.restore();
}

function drawTile(x, y, type) {
  const [sx, sy] = worldToScreen(x + 0.5, y + 0.5);
  if (sx < -CELL*2 || sx > W+CELL*2 || sy < -CELL*2 || sy > H+CELL*2) return;
  
  const s = CELL;
  const left = sx - s / 2;
  const top = sy - s / 2;
  
  // Apply distance-based dimming
  const light = lightAtTile(x, y);
  const th = caveTheme();

  switch (type) {
    case TILE.EMPTY: {
      const fgrd = ctx.createLinearGradient(left, top, left, top + s);
      fgrd.addColorStop(0, '#1b1510');
      fgrd.addColorStop(0.55, '#100b08');
      fgrd.addColorStop(1, '#080504');
      ctx.fillStyle = fgrd;
      ctx.fillRect(left, top, s, s);

      // High-res cave floor strata: multiple hairline layers instead of one flat square.
      ctx.strokeStyle = 'rgba(255,240,210,0.030)';
      ctx.lineWidth = Math.max(0.75, s * 0.012);
      for (let i = 0; i < 5; i++) {
        const yy = top + s * (0.16 + i * 0.17) + Math.sin((x + i) * 2.7 + y * 1.4) * s * 0.035;
        ctx.beginPath();
        ctx.moveTo(left + s * 0.06, yy);
        ctx.bezierCurveTo(left+s*0.32, yy-s*0.05, left+s*0.60, yy+s*0.07, left+s*0.94, yy+s*0.02);
        ctx.stroke();
      }

      // Pebbles and grit, deterministic per tile so the cave feels higher resolution without jitter.
      for (let i = 0; i < 8; i++) {
        const px = left + s * (0.10 + noise01(x+i*5, y, 1) * 0.80);
        const py = top + s * (0.12 + noise01(x, y+i*7, 2) * 0.76);
        const pr = s * (0.006 + noise01(x+i, y-i, 3) * 0.018);
        ctx.fillStyle = i % 3 === 0 ? `rgba(${th.accent},0.045)` : 'rgba(0,0,0,0.18)';
        ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2); ctx.fill();
      }

      if (!suppressEmptyTileEdgeFX) {
        const upSolid = isSolidTileForEdge(tileAt(x, y - 1));
        const dnSolid = isSolidTileForEdge(tileAt(x, y + 1));
        const lfSolid = isSolidTileForEdge(tileAt(x - 1, y));
        const rtSolid = isSolidTileForEdge(tileAt(x + 1, y));
        const ao = Math.max(1, s * 0.10);
        ctx.fillStyle = 'rgba(0,0,0,0.28)';
        if (upSolid) { ctx.fillRect(left, top, s, ao); drawCrumbleEdge(left, top, s, 'top', th, 0.75); }
        if (dnSolid) { ctx.fillRect(left, top + s - ao, s, ao); drawCrumbleEdge(left, top, s, 'bottom', th, 0.70); }
        if (lfSolid) { ctx.fillRect(left, top, ao, s); drawCrumbleEdge(left, top, s, 'left', th, 0.72); }
        if (rtSolid) { ctx.fillRect(left + s - ao, top, ao, s); drawCrumbleEdge(left, top, s, 'right', th, 0.72); }
      }

      // Subtle ambient cave glow
      const caveGlow = 0.02 + Math.sin(globalTime * 0.5 + x * 0.3 + y * 0.7) * 0.01;
      ctx.fillStyle = `rgba(${th.tint},${caveGlow * (level < CAVE_THEMES.length ? 2.1 : 1)})`;
      ctx.fillRect(left, top, s, s);
      break;
    }
    case TILE.DIRT: {
      const patIdx = (x * 7 + y * 13) % dirtPatterns.length;
      ctx.drawImage(dirtPatterns[patIdx], left, top, s, s);
      if (level < CAVE_THEMES.length) {
        ctx.fillStyle = `rgba(${th.dirt},0.24)`;
        ctx.fillRect(left, top, s, s);
      }

      // Layered soil clumps, roots, and mineral specks.
      for (let i = 0; i < 10; i++) {
        const px = left + s * noise01(x+i*2, y, 20);
        const py = top + s * noise01(x, y+i*3, 21);
        const rw = s * (0.025 + noise01(x+i, y, 22) * 0.085);
        const rh = s * (0.014 + noise01(x, y+i, 23) * 0.050);
        ctx.fillStyle = i % 4 === 0 ? `rgba(${th.accent},0.055)` : `rgba(25,15,8,${0.09 + noise01(i,x,y)*0.10})`;
        ctx.beginPath(); ctx.ellipse(px, py, rw, rh, noise01(i,x,y)*Math.PI, 0, Math.PI*2); ctx.fill();
      }
      ctx.strokeStyle = `rgba(${th.accent},0.060)`;
      ctx.lineWidth = Math.max(0.7, s * 0.012);
      for (let i = 0; i < 3; i++) {
        const rx = left + s * (0.08 + noise01(x+i, y, 30) * 0.82);
        const ry = top + s * (0.10 + noise01(y, x+i, 31) * 0.72);
        ctx.beginPath();
        ctx.moveTo(rx, ry);
        ctx.quadraticCurveTo(rx + s*(noise01(i,x,32)-0.5)*0.28, ry + s*0.18, rx + s*(noise01(i,y,33)-0.5)*0.44, ry + s*0.38);
        ctx.stroke();
      }
      drawMineralVeins(left, top, s, x, y, th, false);

      const bevel = Math.max(1, s * 0.09);
      ctx.fillStyle = 'rgba(255,230,180,0.13)';
      ctx.fillRect(left, top, s, bevel);
      ctx.fillRect(left, top, bevel, s);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(left, top + s - bevel, s, bevel);
      ctx.fillRect(left + s - bevel, top, bevel, s);

      // Irregular crumble lip where dirt borders dug-out space.
      if (tileAt(x, y - 1) === TILE.EMPTY) drawCrumbleEdge(left, top, s, 'top', th, 1.0);
      if (tileAt(x, y + 1) === TILE.EMPTY) drawCrumbleEdge(left, top, s, 'bottom', th, 0.92);
      if (tileAt(x - 1, y) === TILE.EMPTY) drawCrumbleEdge(left, top, s, 'left', th, 0.95);
      if (tileAt(x + 1, y) === TILE.EMPTY) drawCrumbleEdge(left, top, s, 'right', th, 0.95);

      const cAO = Math.max(1, s * 0.14);
      const cgrd = ctx.createRadialGradient(left + s, top + s, 0, left + s, top + s, cAO * 1.8);
      cgrd.addColorStop(0, 'rgba(0,0,0,0.30)');
      cgrd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cgrd;
      ctx.fillRect(left + s - cAO * 1.8, top + s - cAO * 1.8, cAO * 1.8, cAO * 1.8);
      break;
    }
    case TILE.WALL: {
      const patIdx = (x * 3 + y * 11) % wallPatterns.length;
      ctx.drawImage(wallPatterns[patIdx], left, top, s, s);
      if (level < CAVE_THEMES.length) {
        ctx.fillStyle = `rgba(${th.wall},0.24)`;
        ctx.fillRect(left, top, s, s);
      }
      // Faceted high-res rock plates and faint mineral seams.
      for (let i = 0; i < 5; i++) {
        const ax = left + s * noise01(x+i, y, 40);
        const ay = top + s * noise01(x, y+i, 41);
        ctx.fillStyle = i % 2 ? 'rgba(255,255,255,0.035)' : 'rgba(0,0,0,0.09)';
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax + s*(0.12 + noise01(i,x,42)*0.18), ay + s*(noise01(i,y,43)-0.5)*0.18);
        ctx.lineTo(ax + s*(0.08 + noise01(i,x,44)*0.16), ay + s*(0.12 + noise01(i,y,45)*0.20));
        ctx.closePath(); ctx.fill();
      }
      drawMineralVeins(left, top, s, x, y, th, true);

      const joints = Math.max(1, s * 0.03);
      ctx.strokeStyle = 'rgba(20,20,24,0.45)';
      ctx.lineWidth = joints;
      ctx.beginPath();
      ctx.moveTo(left + s * 0.5, top + s * 0.07);
      ctx.lineTo(left + s * 0.48, top + s * 0.93);
      ctx.moveTo(left + s * 0.08, top + s * 0.55);
      ctx.lineTo(left + s * 0.92, top + s * 0.52);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.14)';
      ctx.lineWidth = Math.max(1, s * 0.02);
      ctx.beginPath();
      ctx.moveTo(left + s * 0.12, top + s * 0.15);
      ctx.lineTo(left + s * 0.82, top + s * 0.1);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = Math.max(1, s * 0.015);
      ctx.beginPath();
      ctx.moveTo(left + s * 0.22, top + s * 0.32);
      ctx.lineTo(left + s * 0.35, top + s * 0.48);
      ctx.lineTo(left + s * 0.27, top + s * 0.68);
      ctx.moveTo(left + s * 0.64, top + s * 0.25);
      ctx.lineTo(left + s * 0.74, top + s * 0.42);
      ctx.lineTo(left + s * 0.59, top + s * 0.61);
      ctx.stroke();

      const ao2 = Math.max(1, s * 0.1);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(left, top + s - ao2, s, ao2);
      ctx.fillRect(left + s - ao2, top, ao2, s);
      break;
    }
    case TILE.AMOEBA: {
      suppressEmptyTileEdgeFX = true;
      drawTile(x, y, TILE.EMPTY);
      suppressEmptyTileEdgeFX = false;
      const pulse = 0.65 + Math.sin(globalTime * 4 + x * 1.7 + y) * 0.25;
      // Organic wobbling body outline using bezier pseudopods
      const cx0 = sx, cy0 = sy;
      ctx.save();
      ctx.beginPath();
      const np = 8;
      for (let i = 0; i <= np; i++) {
        const ang = (i / np) * Math.PI * 2;
        const wobble = 1 + 0.12 * Math.sin(globalTime * 3.5 + i * 2.1 + x * 1.3 + y * 0.7)
                          + 0.06 * Math.sin(globalTime * 5.8 + i * 4.3 + y * 2.1);
        const pr = s * 0.38 * wobble;
        const px = cx0 + Math.cos(ang) * pr;
        const py = cy0 + Math.sin(ang) * pr;
        if (i === 0) ctx.moveTo(px, py);
        else {
          const prevAng = ((i - 1) / np) * Math.PI * 2;
          const prevWob = 1 + 0.12 * Math.sin(globalTime * 3.5 + (i-1) * 2.1 + x * 1.3 + y * 0.7)
                            + 0.06 * Math.sin(globalTime * 5.8 + (i-1) * 4.3 + y * 2.1);
          const cpR = s * 0.40 * (wobble + prevWob) * 0.5;
          const cpAng = (prevAng + ang) * 0.5;
          ctx.quadraticCurveTo(cx0 + Math.cos(cpAng) * cpR * 1.12, cy0 + Math.sin(cpAng) * cpR * 1.12, px, py);
        }
      }
      ctx.closePath();
      const grd = ctx.createRadialGradient(cx0 - s*0.12, cy0 - s*0.15, s*0.04, cx0, cy0, s*0.45);
      grd.addColorStop(0, `rgba(200,255,130,${0.94 + pulse*0.04})`);
      grd.addColorStop(0.45, `rgba(80,200,60,${0.88})`);
      grd.addColorStop(0.8, `rgba(35,120,30,${0.92})`);
      grd.addColorStop(1, `rgba(15,60,15,${0.95})`);
      ctx.fillStyle = grd;
      ctx.fill();
      // Glistening membrane edge
      ctx.strokeStyle = `rgba(210,255,120,${0.30 + pulse*0.20})`;
      ctx.lineWidth = Math.max(1.2, s*0.030);
      ctx.stroke();
      // Internal veins / cytoplasm strands
      ctx.strokeStyle = `rgba(50,140,30,${0.25 + pulse*0.12})`;
      ctx.lineWidth = Math.max(0.7, s*0.015);
      for (let i = 0; i < 3; i++) {
        const va = globalTime * 0.8 + i * 2.09 + x * 0.9;
        const vx0 = cx0 + Math.cos(va) * s * 0.10;
        const vy0 = cy0 + Math.sin(va) * s * 0.08;
        const vx1 = cx0 + Math.cos(va + 1.8) * s * 0.28;
        const vy1 = cy0 + Math.sin(va + 1.4) * s * 0.24;
        ctx.beginPath(); ctx.moveTo(vx0, vy0);
        ctx.quadraticCurveTo(cx0 + Math.sin(va*1.3)*s*0.12, cy0 + Math.cos(va*0.9)*s*0.14, vx1, vy1);
        ctx.stroke();
      }
      // Nucleus cluster
      ctx.fillStyle = `rgba(120,220,60,${0.45 + pulse*0.15})`;
      ctx.beginPath(); ctx.arc(cx0 - s*0.04, cy0 + s*0.02, s*0.065, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(160,240,90,${0.35 + pulse*0.10})`;
      ctx.beginPath(); ctx.arc(cx0 + s*0.05, cy0 - s*0.04, s*0.045, 0, Math.PI*2); ctx.fill();
      // Surface bubbles — animated positions
      ctx.fillStyle = `rgba(230,255,180,${0.22 + pulse*0.20})`;
      for (let i = 0; i < 5; i++) {
        const ba = globalTime * 1.5 + i * 1.26 + x * 3.1 + y * 1.7;
        const bx = cx0 + Math.sin(ba) * s * 0.22;
        const by = cy0 + Math.cos(ba * 0.8 + i) * s * 0.20;
        const br = s * (0.025 + 0.012 * Math.sin(globalTime * 6 + i * 2.4));
        ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
        // Bubble highlight
        ctx.fillStyle = `rgba(255,255,240,${0.18 + pulse*0.10})`;
        ctx.beginPath(); ctx.arc(bx - br*0.25, by - br*0.30, br*0.35, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = `rgba(230,255,180,${0.22 + pulse*0.20})`;
      }
      // Pseudopod extensions toward adjacent empty cells
      const podDirs = [[0,-1],[1,0],[0,1],[-1,0]];
      for (let pi = 0; pi < 4; pi++) {
        const [pdx,pdy] = podDirs[pi];
        if (tileAt(x+pdx, y+pdy) === TILE.EMPTY || tileAt(x+pdx, y+pdy) === TILE.DIRT) {
          const reach = 0.08 + 0.06 * Math.sin(globalTime * 2.5 + pi * 1.57 + x * 1.1 + y * 0.8);
          const tipX = cx0 + pdx * s * (0.42 + reach);
          const tipY = cy0 + pdy * s * (0.42 + reach);
          ctx.fillStyle = `rgba(100,210,50,${0.30 + pulse*0.08})`;
          ctx.beginPath();
          ctx.moveTo(cx0 + pdx * s * 0.28 - pdy * s * 0.06, cy0 + pdy * s * 0.28 + pdx * s * 0.06);
          ctx.quadraticCurveTo(tipX, tipY, cx0 + pdx * s * 0.28 + pdy * s * 0.06, cy0 + pdy * s * 0.28 - pdx * s * 0.06);
          ctx.fill();
        }
      }
      ctx.restore();
      break;
    }
    case TILE.EXIT: {
      drawExit(sx, sy, s);
      break;
    }
  }
  
  if (level < CAVE_THEMES.length && (type === TILE.EMPTY || type === TILE.DIRT || type === TILE.WALL)) {
    const motif = th.motif;
    const mark = (x * 31 + y * 17 + level * 23) % 19;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = `rgba(${th.accent},${type === TILE.EMPTY ? 0.10 : 0.055})`;
    ctx.fillStyle = `rgba(${th.accent},${type === TILE.EMPTY ? 0.10 : 0.045})`;
    ctx.lineWidth = Math.max(0.75, s * 0.018);
    if (motif === 'roots' && mark < 3) {
      ctx.beginPath(); ctx.moveTo(left+s*0.15, top+s*(0.25+mark*0.16)); ctx.quadraticCurveTo(left+s*0.45, top+s*0.10, left+s*0.86, top+s*(0.32+mark*0.08)); ctx.stroke();
    } else if (motif === 'runes' && mark < 3) {
      ctx.strokeRect(left+s*0.34, top+s*0.28, s*0.28, s*0.36); ctx.beginPath(); ctx.moveTo(left+s*0.34, top+s*0.46); ctx.lineTo(left+s*0.62, top+s*0.30); ctx.stroke();
    } else if (motif === 'embers' && mark < 4) {
      ctx.beginPath(); ctx.arc(left+s*(0.25+mark*0.13), top+s*(0.28+((x+y)%5)*0.1), s*0.035, 0, Math.PI*2); ctx.fill();
    } else if (motif === 'crystals' && mark < 3) {
      ctx.beginPath(); ctx.moveTo(left+s*0.50, top+s*0.18); ctx.lineTo(left+s*0.62, top+s*0.45); ctx.lineTo(left+s*0.50, top+s*0.76); ctx.lineTo(left+s*0.38, top+s*0.45); ctx.closePath(); ctx.stroke();
    } else if (motif === 'circuit' && mark < 4) {
      ctx.beginPath(); ctx.moveTo(left+s*0.18, top+s*0.35); ctx.lineTo(left+s*0.50, top+s*0.35); ctx.lineTo(left+s*0.50, top+s*0.66); ctx.lineTo(left+s*0.82, top+s*0.66); ctx.stroke();
    } else if (motif === 'vents' && mark < 3) {
      ctx.beginPath(); for (let i=0;i<3;i++){ ctx.moveTo(left+s*0.25, top+s*(0.32+i*0.14)); ctx.lineTo(left+s*0.75, top+s*(0.25+i*0.14)); } ctx.stroke();
    } else if (motif === 'claws' && mark < 3) {
      ctx.beginPath(); for (let i=0;i<3;i++){ ctx.moveTo(left+s*(0.28+i*0.16), top+s*0.22); ctx.lineTo(left+s*(0.18+i*0.18), top+s*0.78); } ctx.stroke();
    }
    ctx.restore();
  }
  
  // Apply fog dimming overlay
  if (light < 0.95 && state === 'playing') {
    ctx.fillStyle = `rgba(0,0,0,${(1 - light) * 0.6})`;
    ctx.fillRect(left, top, s, s);
  }
}

function drawExit(sx, sy, s) {
  const open = exitOpen;
  const halfS = s * 0.45;
  
  // Stone archway frame
  const archW = s * 0.08;
  ctx.fillStyle = open ? '#6b5a28' : '#2a2420';
  ctx.fillRect(sx - halfS - archW, sy - halfS * 0.6, archW, halfS * 1.6 + archW);
  ctx.fillRect(sx + halfS, sy - halfS * 0.6, archW, halfS * 1.6 + archW);
  // Arch top
  ctx.beginPath();
  ctx.arc(sx, sy - halfS * 0.6, halfS + archW, Math.PI, 0);
  ctx.arc(sx, sy - halfS * 0.6, halfS, 0, Math.PI, true);
  ctx.closePath();
  ctx.fillStyle = open ? '#7d6830' : '#2a2420';
  ctx.fill();
  // Keystone highlight
  if (open) {
    ctx.fillStyle = 'rgba(255,230,140,0.22)';
    ctx.beginPath(); ctx.arc(sx, sy - halfS * 0.6 - halfS * 0.6, archW * 0.6, 0, Math.PI * 2); ctx.fill();
  }
  
  // Dark recess
  ctx.fillStyle = open ? '#1a1408' : '#0e0c08';
  ctx.fillRect(sx - halfS, sy - halfS * 0.5, halfS*2, halfS*1.5);
  ctx.beginPath();
  ctx.arc(sx, sy - halfS * 0.5, halfS, Math.PI, 0);
  ctx.fill();
  
  if (open) {
    // Swirling vortex effect
    const pulse = 0.5 + Math.sin(globalTime * 4) * 0.3;
    ctx.save();
    ctx.beginPath();
    ctx.rect(sx - halfS, sy - halfS, halfS*2, halfS*2);
    ctx.clip();
    
    // Vortex spiral arms
    for (let ring = 0; ring < 4; ring++) {
      const rFrac = (ring + 1) / 5;
      const ringR = halfS * rFrac;
      const speed = 3.5 - ring * 0.6;
      const arms = 3;
      for (let a = 0; a < arms; a++) {
        const baseAng = globalTime * speed + a * (Math.PI * 2 / arms) + ring * 0.4;
        const arcLen = Math.PI * 0.55;
        ctx.strokeStyle = `rgba(255,${200 + ring*15},${80 + ring*25},${(0.12 + pulse * 0.08) * (1 - rFrac * 0.5)})`;
        ctx.lineWidth = Math.max(1.2, s * (0.035 - ring * 0.006));
        ctx.beginPath();
        ctx.arc(sx, sy, ringR, baseAng, baseAng + arcLen);
        ctx.stroke();
      }
    }
    
    // Central bright glow
    const cGlow = ctx.createRadialGradient(sx, sy, 0, sx, sy, halfS * 0.5);
    cGlow.addColorStop(0, `rgba(255,240,180,${0.35 * pulse})`);
    cGlow.addColorStop(0.5, `rgba(212,175,55,${0.12 * pulse})`);
    cGlow.addColorStop(1, 'rgba(212,175,55,0)');
    ctx.fillStyle = cGlow;
    ctx.fillRect(sx - halfS, sy - halfS, halfS*2, halfS*2);
    ctx.restore();
    
    // Outer beckoning glow
    const oGlow = ctx.createRadialGradient(sx, sy, 0, sx, sy, s * 1.4);
    oGlow.addColorStop(0, `rgba(212,175,55,${0.22 * pulse})`);
    oGlow.addColorStop(0.5, `rgba(212,175,55,${0.06 * pulse})`);
    oGlow.addColorStop(1, 'rgba(212,175,55,0)');
    ctx.fillStyle = oGlow;
    ctx.beginPath(); ctx.arc(sx, sy, s * 1.4, 0, Math.PI*2); ctx.fill();
    
    // Rising sparkle motes
    for (let i = 0; i < 5; i++) {
      const phase = globalTime * 2.5 + i * 1.26;
      const moteY = sy + halfS * 0.4 - ((phase % 2) / 2) * halfS * 1.2;
      const moteX = sx + Math.sin(phase * 1.7 + i) * halfS * 0.5;
      const mAlpha = 0.3 + 0.35 * Math.sin(phase * 3);
      ctx.fillStyle = `rgba(255,230,120,${mAlpha})`;
      drawStar(ctx, moteX, moteY, 4, s * 0.04, s * 0.012);
    }
  } else {
    // Sealed door face
    ctx.fillStyle = '#2a2420';
    ctx.fillRect(sx - halfS*0.75, sy - halfS*0.35, halfS*1.5, halfS*1.35);
  }
  
  // Door handle / lock
  ctx.fillStyle = open ? '#fff' : '#555';
  ctx.beginPath();
  ctx.arc(sx + halfS*0.35, sy + halfS*0.1, s*0.04, 0, Math.PI*2);
  ctx.fill();
}

function drawBoulder(gx, gy, isFalling) {
  const [sx, sy] = worldToScreen(gx + 0.5, gy + 0.5);
  if (sx < -CELL*2 || sx > W+CELL*2 || sy < -CELL*2 || sy > H+CELL*2) return;

  const r = CELL * 0.43;
  const fk = fallKey(gx, gy);
  const fallDist = fallMap[fk] || 0;
  const seedA = gx * 12.9898 + gy * 78.233;
  const rotAngle = globalTime * (isFalling ? 2.4 + fallDist * 0.9 : 0.22) + seedA;

  // Ground shadow: broad and dusty, not glossy.
  const shadowScale = 1 + fallDist * 0.14;
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.36 + fallDist * 0.06, 0.62)})`;
  ctx.beginPath();
  ctx.ellipse(sx, sy + r * 0.88, r * 0.92 * shadowScale, r * (0.22 + fallDist * 0.035), 0, 0, Math.PI * 2);
  ctx.fill();

  if (isFalling && fallDist > 0) {
    const streakLen = Math.min(fallDist * 0.34, 0.85);
    const streakGrd = ctx.createLinearGradient(sx, sy - r - streakLen * CELL, sx, sy - r * 0.25);
    streakGrd.addColorStop(0, 'rgba(95,82,67,0)');
    streakGrd.addColorStop(1, `rgba(95,82,67,${0.14 * Math.min(fallDist, 3)})`);
    ctx.fillStyle = streakGrd;
    ctx.fillRect(sx - r * 0.72, sy - r - streakLen * CELL, r * 1.44, streakLen * CELL);
  }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(Math.sin(rotAngle) * 0.08);

  // Irregular lumpy silhouette — explicitly not a perfect sphere.
  const pts = [];
  const n = 15;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const wob = 0.88 + 0.09 * Math.sin(seedA + i * 1.91) + 0.045 * Math.sin(rotAngle * 0.7 + i * 2.7);
    pts.push([Math.cos(a) * r * wob, Math.sin(a) * r * (0.92 + 0.06*Math.sin(seedA+i))]);
  }
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 0; i < n; i++) {
    const p0 = pts[i], p1 = pts[(i + 1) % n];
    ctx.quadraticCurveTo(p0[0], p0[1], (p0[0] + p1[0]) / 2, (p0[1] + p1[1]) / 2);
  }
  ctx.closePath();
  ctx.clip();

  const rockGrd = ctx.createLinearGradient(-r * 0.75, -r, r * 0.85, r);
  rockGrd.addColorStop(0, '#b8ab98');
  rockGrd.addColorStop(0.22, '#8f8372');
  rockGrd.addColorStop(0.52, '#665b4d');
  rockGrd.addColorStop(0.78, '#3d342a');
  rockGrd.addColorStop(1, '#1f1914');
  ctx.fillStyle = rockGrd;
  ctx.fillRect(-r*1.12, -r*1.12, r*2.24, r*2.24);

  // Faceted planes and chips.
  const facets = [
    [[-0.72,-0.62],[-0.16,-0.82],[0.03,-0.28],[-0.46,-0.12],'rgba(230,215,190,0.18)'],
    [[0.04,-0.74],[0.66,-0.45],[0.42,0.02],[-0.08,-0.18],'rgba(170,154,132,0.18)'],
    [[-0.76,-0.04],[-0.24,-0.18],[-0.10,0.48],[-0.58,0.62],'rgba(45,38,30,0.20)'],
    [[0.06,0.10],[0.68,-0.02],[0.56,0.62],[0.10,0.74],'rgba(30,25,20,0.24)'],
    [[-0.18,-0.22],[0.26,-0.12],[0.10,0.22],[-0.28,0.18],'rgba(120,108,92,0.20)']
  ];
  for (const f of facets) {
    ctx.fillStyle = f[4];
    ctx.beginPath();
    ctx.moveTo(f[0][0]*r, f[0][1]*r);
    for (let i=1;i<4;i++) ctx.lineTo(f[i][0]*r, f[i][1]*r);
    ctx.closePath(); ctx.fill();
  }

  // Cracks: angular, branching, matte.
  ctx.lineCap = 'round';
  const cracks = [
    [[-0.55,-0.25],[-0.25,-0.12],[-0.04,-0.30],[0.20,-0.22]],
    [[0.36,-0.42],[0.18,-0.10],[0.36,0.08],[0.28,0.34]],
    [[-0.42,0.38],[-0.18,0.22],[0.02,0.34]],
    [[-0.02,0.05],[-0.20,0.18],[-0.30,0.34]],
  ];
  for (const c of cracks) {
    ctx.strokeStyle = 'rgba(18,14,10,0.46)';
    ctx.lineWidth = Math.max(1, r * 0.045);
    ctx.beginPath(); ctx.moveTo(c[0][0]*r, c[0][1]*r);
    for (let i=1;i<c.length;i++) ctx.lineTo(c[i][0]*r, c[i][1]*r);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(210,190,160,0.08)';
    ctx.lineWidth = Math.max(0.5, r * 0.018);
    ctx.stroke();
  }

  // Speckles and chipped bright edges, deterministic per tile.
  for (let i=0; i<18; i++) {
    const a = Math.sin(seedA + i * 18.17) * 43758.5453;
    const b = Math.sin(seedA + i * 7.91) * 24634.6345;
    const px = ((a - Math.floor(a)) * 2 - 1) * r * 0.78;
    const py = ((b - Math.floor(b)) * 2 - 1) * r * 0.70;
    if (px*px + py*py > r*r*0.78) continue;
    ctx.fillStyle = i % 3 === 0 ? 'rgba(230,215,190,0.18)' : 'rgba(25,20,16,0.22)';
    ctx.beginPath(); ctx.arc(px, py, Math.max(0.7, r * (0.012 + (i%4)*0.004)), 0, Math.PI*2); ctx.fill();
  }

  // Small dusty highlight instead of marble shine.
  ctx.fillStyle = 'rgba(235,225,205,0.16)';
  ctx.beginPath();
  ctx.ellipse(-r*0.34, -r*0.42, r*0.24, r*0.10, -0.55, 0, Math.PI*2);
  ctx.fill();

  // Mineral inclusions — tiny colored flecks embedded in the rock face.
  const inclusions = [
    [-0.22,-0.55, 0.028, 'rgba(180,140,90,0.35)'],
    [0.32,-0.28, 0.022, 'rgba(140,120,80,0.30)'],
    [-0.42,0.12, 0.018, 'rgba(200,180,150,0.25)'],
    [0.15,0.38, 0.025, 'rgba(160,145,110,0.30)'],
    [-0.08,0.55, 0.020, 'rgba(130,110,75,0.28)'],
  ];
  for (const [ix,iy,ir,ic] of inclusions) {
    ctx.fillStyle = ic;
    ctx.beginPath(); ctx.arc(ix*r, iy*r, r*ir, 0, Math.PI*2); ctx.fill();
    // Tiny bright centre dot
    ctx.fillStyle = 'rgba(255,250,230,0.18)';
    ctx.beginPath(); ctx.arc(ix*r - r*0.005, iy*r - r*0.008, r*ir*0.35, 0, Math.PI*2); ctx.fill();
  }

  // Surface grain — fine directional scratches that catch the light.
  ctx.strokeStyle = 'rgba(255,240,210,0.06)';
  ctx.lineWidth = Math.max(0.5, r * 0.014);
  for (let i = 0; i < 6; i++) {
    const a0 = Math.sin(seedA + i * 3.7) * 43758.5453;
    const gx0 = ((a0 - Math.floor(a0)) * 2 - 1) * r * 0.65;
    const gy0 = ((Math.sin(a0 * 1.3) * 0.5 + 0.5) * 2 - 1) * r * 0.60;
    ctx.beginPath();
    ctx.moveTo(gx0, gy0);
    ctx.lineTo(gx0 + r * 0.15, gy0 + r * 0.08);
    ctx.stroke();
  }

  ctx.restore();

  // Ragged dark outline follows the same lumpy profile.
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(Math.sin(rotAngle) * 0.08);
  ctx.strokeStyle = 'rgba(13,10,7,0.68)';
  ctx.lineWidth = Math.max(1.5, r * 0.055);
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 0; i < n; i++) {
    const p0 = pts[i], p1 = pts[(i + 1) % n];
    ctx.quadraticCurveTo(p0[0], p0[1], (p0[0] + p1[0]) / 2, (p0[1] + p1[1]) / 2);
  }
  ctx.closePath(); ctx.stroke();
  ctx.restore();
}

function drawGem(gx, gy, isFalling) {
  // EMERALD — rich green hexagonal gem, Emerald Mine style
  const [sx, sy] = worldToScreen(gx + 0.5, gy + 0.5);
  if (sx < -CELL*2 || sx > W+CELL*2 || sy < -CELL*2 || sy > H+CELL*2) return;

  const r = CELL * 0.35;
  const t = globalTime * 2.5 + gx * 2.1 + gy * 3.7;
  const rotPhase = t * 0.6;
  const facetSkew = Math.sin(rotPhase) * 0.25;

  // Outer emerald glow
  const glowR = r * 2.8;
  const ggrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
  ggrd.addColorStop(0, `rgba(0,220,100,${0.18 + Math.sin(t)*0.06})`);
  ggrd.addColorStop(0.5, 'rgba(0,180,80,0.06)');
  ggrd.addColorStop(1, 'rgba(0,120,60,0)');
  ctx.fillStyle = ggrd;
  ctx.fillRect(sx - glowR, sy - glowR, glowR * 2, glowR * 2);

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(Math.sin(t * 0.3) * 0.06);
  const scaleX = 0.8 + Math.abs(Math.cos(rotPhase)) * 0.2;
  ctx.scale(scaleX, 1);

  // Hexagonal emerald shape
  const topY = -r;
  const botY = r * 0.85;
  const midY = -r * 0.1;
  const rightX = r * 0.7;
  const leftX = -r * 0.7;
  const facetOff = facetSkew * r * 0.15;

  ctx.beginPath();
  ctx.moveTo(0, topY);
  ctx.lineTo(rightX * 0.85, topY * 0.35);
  ctx.lineTo(rightX, midY);
  ctx.lineTo(rightX * 0.7, botY * 0.7);
  ctx.lineTo(0, botY);
  ctx.lineTo(-rightX * 0.7, botY * 0.7);
  ctx.lineTo(leftX, midY);
  ctx.lineTo(leftX * 0.85, topY * 0.35);
  ctx.closePath();

  // Rich emerald gradient — deep green to bright green
  const dgrd = ctx.createLinearGradient(-r, topY, r * 0.5, botY);
  dgrd.addColorStop(0, '#40ff90');   // bright highlight
  dgrd.addColorStop(0.2, '#20d070'); // medium green
  dgrd.addColorStop(0.5, '#10a850'); // rich emerald
  dgrd.addColorStop(0.75, '#088040'); // deep emerald
  dgrd.addColorStop(1, '#065028');   // dark base
  ctx.fillStyle = dgrd;
  ctx.fill();

  // Internal facet lines
  ctx.strokeStyle = `rgba(150,255,200,${0.3 + Math.sin(t * 2) * 0.1})`;
  ctx.lineWidth = Math.max(0.5, CELL * 0.015);
  ctx.beginPath();
  ctx.moveTo(facetOff, topY);
  ctx.lineTo(facetOff * 0.3, botY);
  ctx.moveTo(leftX, midY);
  ctx.lineTo(facetOff * 0.2, midY * 0.2 + botY * 0.1);
  ctx.lineTo(rightX, midY);
  ctx.moveTo(-rightX * 0.7, botY * 0.7);
  ctx.lineTo(facetOff * 0.2, midY * 0.2 + botY * 0.1);
  ctx.lineTo(rightX * 0.7, botY * 0.7);
  ctx.stroke();

  // Internal emerald light — shifting green reflection
  const innerGrd = ctx.createRadialGradient(facetOff * 2, midY * 0.5, 0, 0, 0, r * 0.6);
  innerGrd.addColorStop(0, `rgba(100,255,180,${0.35 + Math.sin(t*3)*0.15})`);
  innerGrd.addColorStop(0.5, 'rgba(50,200,120,0.1)');
  innerGrd.addColorStop(1, 'rgba(0,100,50,0)');
  ctx.fillStyle = innerGrd;
  ctx.fill();

  // Top specular highlight — bright white-green glint
  const specY = topY * 0.6 + midY * 0.4;
  ctx.fillStyle = `rgba(200,255,230,${0.5 + Math.sin(t * 1.5) * 0.2})`;
  ctx.beginPath();
  ctx.ellipse(facetOff * 0.3, specY, r * 0.14, r * 0.07, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Outline — emerald edge
  ctx.strokeStyle = `rgba(100,255,180,${0.35 + Math.sin(t)*0.1})`;
  ctx.lineWidth = Math.max(0.5, CELL * 0.02);
  ctx.beginPath();
  ctx.moveTo(0, topY);
  ctx.lineTo(rightX * 0.85, topY * 0.35);
  ctx.lineTo(rightX, midY);
  ctx.lineTo(rightX * 0.7, botY * 0.7);
  ctx.lineTo(0, botY);
  ctx.lineTo(-rightX * 0.7, botY * 0.7);
  ctx.lineTo(leftX, midY);
  ctx.lineTo(leftX * 0.85, topY * 0.35);
  ctx.closePath();
  ctx.stroke();

  ctx.restore();

  // Orbiting sparkles — green tinted
  for (let i = 0; i < 3; i++) {
    const ang = t * (1.2 + i * 0.5) + i * Math.PI * 0.67;
    const orbit = r * (1 + 0.3 * i);
    const px = sx + Math.cos(ang) * orbit;
    const py = sy + Math.sin(ang) * orbit * 0.7;
    const alpha = 0.3 + 0.3 * Math.sin(t * 3 + i * 2);
    ctx.fillStyle = `rgba(150,255,200,${alpha})`;
    drawStar(ctx, px, py, 4, r * 0.15, r * 0.04);
  }

  // Bright flash sparkle
  if (Math.sin(t * 1.6) > 0.9) {
    const ga = t * 2.4;
    ctx.fillStyle = 'rgba(200,255,230,0.9)';
    drawStar(ctx, sx + Math.cos(ga) * r * 0.8, sy + Math.sin(ga * 1.1) * r * 0.5, 4, r * 0.25, r * 0.07);
  }
}

function drawDiamondGem(gx, gy, isFalling) {
  // DIAMOND — rare blue-white brilliant gem worth 300 pts
  const [sx, sy] = worldToScreen(gx + 0.5, gy + 0.5);
  if (sx < -CELL*2 || sx > W+CELL*2 || sy < -CELL*2 || sy > H+CELL*2) return;

  const r = CELL * 0.3;
  const t = globalTime * 3 + gx * 1.7 + gy * 2.9;
  const rotPhase = t * 1.2;

  // Brilliant white-blue glow
  const glowR = r * 3.5;
  const ggrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
  ggrd.addColorStop(0, `rgba(180,220,255,${0.25 + Math.sin(t*2)*0.1})`);
  ggrd.addColorStop(0.4, 'rgba(100,180,255,0.08)');
  ggrd.addColorStop(1, 'rgba(60,120,255,0)');
  ctx.fillStyle = ggrd;
  ctx.fillRect(sx - glowR, sy - glowR, glowR * 2, glowR * 2);

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(Math.sin(t * 0.5) * 0.1);
  const scaleX = 0.75 + Math.abs(Math.cos(rotPhase)) * 0.25;
  ctx.scale(scaleX, 1);

  // Classic diamond shape
  const topY = -r;
  const botY = r * 0.95;
  const midY = -r * 0.2;
  const rightX = r * 0.8;
  const leftX = -r * 0.8;

  ctx.beginPath();
  ctx.moveTo(0, topY);
  ctx.lineTo(rightX, midY);
  ctx.lineTo(r * 0.5, botY * 0.7);
  ctx.lineTo(0, botY);
  ctx.lineTo(-r * 0.5, botY * 0.7);
  ctx.lineTo(leftX, midY);
  ctx.closePath();

  // Prismatic rainbow gradient — shifts over time (diamonds are prismatic)
  const hue = (t * 60) % 360;
  const dgrd = ctx.createLinearGradient(-r, topY, r, botY);
  dgrd.addColorStop(0, `hsl(${hue},70%,88%)`);
  dgrd.addColorStop(0.25, `hsl(${(hue+60)%360},80%,80%)`);
  dgrd.addColorStop(0.5, `hsl(${(hue+180)%360},75%,75%)`);
  dgrd.addColorStop(0.75, `hsl(${(hue+240)%360},70%,70%)`);
  dgrd.addColorStop(1, `hsl(${(hue+300)%360},65%,65%)`);
  ctx.fillStyle = dgrd;
  ctx.fill();

  // Facet lines
  ctx.strokeStyle = `rgba(255,255,255,${0.35 + Math.sin(t * 2) * 0.15})`;
  ctx.lineWidth = Math.max(0.5, CELL * 0.015);
  ctx.beginPath();
  ctx.moveTo(0, topY); ctx.lineTo(0, botY);
  ctx.moveTo(leftX, midY); ctx.lineTo(0, botY * 0.3); ctx.lineTo(rightX, midY);
  ctx.stroke();

  // Brilliant specular
  ctx.fillStyle = `rgba(255,255,255,${0.6 + Math.sin(t * 2) * 0.2})`;
  ctx.beginPath();
  ctx.ellipse(0, topY * 0.4, r * 0.2, r * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();

  // Outline
  ctx.strokeStyle = `rgba(200,220,255,${0.4 + Math.sin(t)*0.15})`;
  ctx.lineWidth = Math.max(0.5, CELL * 0.025);
  ctx.beginPath();
  ctx.moveTo(0, topY); ctx.lineTo(rightX, midY); ctx.lineTo(r*0.5, botY*0.7);
  ctx.lineTo(0, botY); ctx.lineTo(-r*0.5, botY*0.7); ctx.lineTo(leftX, midY);
  ctx.closePath(); ctx.stroke();

  ctx.restore();

  // Orbiting sparkles — white/blue
  for (let i = 0; i < 4; i++) {
    const ang = t * (1.5 + i * 0.4) + i * Math.PI * 0.5;
    const orbit = r * (1.2 + 0.3 * i);
    const px = sx + Math.cos(ang) * orbit;
    const py = sy + Math.sin(ang) * orbit * 0.6;
    const alpha = 0.35 + 0.3 * Math.sin(t * 4 + i * 2);
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    drawStar(ctx, px, py, 4, r * 0.18, r * 0.05);
  }
}

function drawMagicWall(x, y) {
  const [sx, sy] = worldToScreen(x + 0.5, y + 0.5);
  if (sx < -CELL*2 || sx > W+CELL*2 || sy < -CELL*2 || sy > H+CELL*2) return;
  const s = CELL;
  const left = sx - s / 2;
  const top = sy - s / 2;

  // Base wall tile (darker than normal wall)
  const patIdx = (x * 3 + y * 11) % wallPatterns.length;
  ctx.drawImage(wallPatterns[patIdx], left, top, s, s);

  // Darkening tint so magic walls read as distinct from regular walls
  ctx.fillStyle = 'rgba(0,10,5,0.25)';
  ctx.fillRect(left, top, s, s);

  const active = magicWallActive;

  // Flowing energy veins — animated circuit-like channels
  ctx.save();
  ctx.beginPath(); ctx.rect(left, top, s, s); ctx.clip();
  const veinAlpha = active ? 0.40 : 0.12;
  const veinSpeed = active ? 5.0 : 1.5;
  ctx.strokeStyle = `rgba(100,255,180,${veinAlpha + Math.sin(globalTime * veinSpeed + x * 2) * veinAlpha * 0.4})`;
  ctx.lineWidth = Math.max(1, s * 0.025);
  // Horizontal flowing line
  const hPhase = globalTime * veinSpeed * 0.3 + x * 1.1;
  ctx.beginPath();
  ctx.moveTo(left, sy + Math.sin(hPhase) * s * 0.15);
  ctx.bezierCurveTo(left + s*0.3, sy + Math.sin(hPhase + 1) * s * 0.2,
                    left + s*0.7, sy + Math.sin(hPhase + 2) * s * 0.18,
                    left + s, sy + Math.sin(hPhase + 3) * s * 0.12);
  ctx.stroke();
  // Vertical flowing line
  const vPhase = globalTime * veinSpeed * 0.25 + y * 1.3;
  ctx.beginPath();
  ctx.moveTo(sx + Math.sin(vPhase) * s * 0.12, top);
  ctx.bezierCurveTo(sx + Math.sin(vPhase + 1.2) * s * 0.18, top + s*0.35,
                    sx + Math.sin(vPhase + 2.4) * s * 0.15, top + s*0.65,
                    sx + Math.sin(vPhase + 3.6) * s * 0.10, top + s);
  ctx.stroke();

  // Rune symbol — a small arcane glyph etched into the stone
  const runeA = active ? (0.30 + Math.sin(globalTime * 6 + x) * 0.15) : 0.10;
  ctx.strokeStyle = `rgba(180,255,200,${runeA})`;
  ctx.lineWidth = Math.max(0.8, s * 0.018);
  const rs = s * 0.14;
  // Diamond rune shape
  ctx.beginPath();
  ctx.moveTo(sx, sy - rs); ctx.lineTo(sx + rs, sy); ctx.lineTo(sx, sy + rs); ctx.lineTo(sx - rs, sy); ctx.closePath();
  ctx.stroke();
  // Cross through it
  ctx.beginPath(); ctx.moveTo(sx - rs*0.5, sy - rs*0.5); ctx.lineTo(sx + rs*0.5, sy + rs*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx + rs*0.5, sy - rs*0.5); ctx.lineTo(sx - rs*0.5, sy + rs*0.5); ctx.stroke();
  ctx.restore();

  // Shimmer overlay
  const shimmerAlpha = active ? (0.18 + Math.sin(globalTime * 6 + x * 2) * 0.10) : (0.05 + Math.sin(globalTime * 2 + x * 1.5) * 0.03);
  ctx.fillStyle = active ? `rgba(100,255,180,${shimmerAlpha})` : `rgba(80,180,120,${shimmerAlpha})`;
  ctx.fillRect(left, top, s, s);

  // Animated sparkle dots
  const dotCount = active ? 8 : 3;
  for (let i = 0; i < dotCount; i++) {
    const phase = globalTime * (active ? 4 : 1.5) + i * 1.7 + x * 0.8;
    const dx = (Math.sin(phase * 1.3 + i) * 0.5 + 0.5) * s;
    const dy = (Math.sin(phase * 0.9 + i * 2.3) * 0.5 + 0.5) * s;
    const dotAlpha = active ? (0.45 + Math.sin(phase * 3) * 0.30) : (0.15 + Math.sin(phase) * 0.1);
    const dotR = (active ? 2.5 : 1.5) * DPR;
    ctx.fillStyle = active ? `rgba(200,255,100,${dotAlpha})` : `rgba(100,200,150,${dotAlpha})`;
    ctx.beginPath(); ctx.arc(left + dx, top + dy, dotR, 0, Math.PI * 2); ctx.fill();
  }

  // Border glow when active
  if (active) {
    ctx.strokeStyle = `rgba(100,255,180,${0.3 + Math.sin(globalTime * 5 + x) * 0.2})`;
    ctx.lineWidth = Math.max(2, s * 0.04);
    ctx.strokeRect(left + 1, top + 1, s - 2, s - 2);
  }
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const angle = (i / (spikes * 2)) * Math.PI * 2 - Math.PI/2;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function drawBonusItem(gx, gy, type) {
  const [sx, sy] = worldToScreen(gx + 0.5, gy + 0.5);
  if (sx < -CELL*2 || sx > W+CELL*2 || sy < -CELL*2 || sy > H+CELL*2) return;
  
  const s = CELL * 0.35;
  const bob = Math.sin(globalTime * 3 + gx * 2 + gy * 3) * CELL * 0.04;
  const spinAngle = globalTime * 1.2 + gx * 1.7 + gy * 2.3; // Gentle spin
  
  // Glow — pulsing
  const glowPulse = 0.8 + Math.sin(globalTime * 4 + gx + gy) * 0.2;
  const glowColors = {
    [TILE.DYNAMITE]: `rgba(255,100,30,${0.18 * glowPulse})`,
    [TILE.SPEED_BOOTS]: `rgba(50,120,255,${0.18 * glowPulse})`,
    [TILE.GHOST_MODE]: `rgba(180,180,255,${0.18 * glowPulse})`
  };
  const glow = ctx.createRadialGradient(sx, sy + bob, 0, sx, sy + bob, CELL * 1.3);
  glow.addColorStop(0, glowColors[type] || 'rgba(255,255,255,0.1)');
  glow.addColorStop(0.5, 'rgba(0,0,0,0.02)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(sx, sy + bob, CELL * 1.3, 0, Math.PI * 2); ctx.fill();

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(sx, sy + CELL*0.35, s*0.5, s*0.12, 0, 0, Math.PI*2); ctx.fill();
  
  ctx.save();
  ctx.translate(sx, sy + bob);
  
  if (type === TILE.DYNAMITE) {
    // Slight wobble rotation
    ctx.rotate(Math.sin(spinAngle * 0.5) * 0.08);
    // Shadow cylinder
    ctx.fillStyle = 'rgba(80,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(-s*0.28 + s*0.04, -s*0.56 + s*0.04, s*0.56, s*1.12, s*0.08); ctx.fill();
    // Red cylinder body with gradient
    const dynGrd = ctx.createLinearGradient(-s*0.3, 0, s*0.3, 0);
    dynGrd.addColorStop(0, '#991800'); dynGrd.addColorStop(0.3, '#dd2800');
    dynGrd.addColorStop(0.7, '#cc2200'); dynGrd.addColorStop(1, '#881200');
    ctx.fillStyle = dynGrd;
    ctx.beginPath(); ctx.roundRect(-s*0.3, -s*0.6, s*0.6, s*1.2, s*0.1); ctx.fill();
    // Highlight strip
    ctx.fillStyle = 'rgba(255,200,160,0.18)';
    ctx.fillRect(-s*0.12, -s*0.55, s*0.08, s*1.05);
    // Dark band
    ctx.fillStyle = '#701000';
    ctx.fillRect(-s*0.3, -s*0.12, s*0.6, s*0.18);
    // Warning label
    ctx.fillStyle = 'rgba(255,220,0,0.75)';
    ctx.font = `bold ${Math.max(6, s*0.32)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('TNT', 0, -s*0.03);
    // Fuse with curl
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = Math.max(1, s * 0.08);
    ctx.beginPath(); ctx.moveTo(0, -s*0.6);
    ctx.bezierCurveTo(s*0.15, -s*0.72, s*0.32, -s*0.85, s*0.18, -s*1.05);
    ctx.stroke();
    // Fuse ember glow
    const sparkA = 0.6 + Math.sin(globalTime * 10) * 0.4;
    const sparkGrd = ctx.createRadialGradient(s*0.18, -s*1.05, 0, s*0.18, -s*1.05, s*0.15);
    sparkGrd.addColorStop(0, `rgba(255,240,80,${sparkA})`);
    sparkGrd.addColorStop(0.4, `rgba(255,140,20,${sparkA*0.5})`);
    sparkGrd.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = sparkGrd;
    ctx.beginPath(); ctx.arc(s*0.18, -s*1.05, s*0.15, 0, Math.PI*2); ctx.fill();
    // Core spark
    ctx.fillStyle = `rgba(255,255,200,${sparkA})`;
    ctx.beginPath(); ctx.arc(s*0.18, -s*1.05, s*0.04, 0, Math.PI*2); ctx.fill();
  } else if (type === TILE.SPEED_BOOTS) {
    // Gentle bob-tilt
    ctx.rotate(Math.sin(spinAngle * 0.7) * 0.12);
    // Boot shadow
    ctx.fillStyle = 'rgba(0,0,60,0.35)';
    ctx.beginPath();
    ctx.moveTo(-s*0.38+s*0.03, -s*0.28+s*0.04); ctx.lineTo(-s*0.28+s*0.03, -s*0.58+s*0.04);
    ctx.lineTo(s*0.12+s*0.03, -s*0.48+s*0.04); ctx.lineTo(s*0.17+s*0.03, -s*0.08+s*0.04);
    ctx.lineTo(s*0.52+s*0.03, s*0.22+s*0.04); ctx.lineTo(s*0.52+s*0.03, s*0.52+s*0.04);
    ctx.lineTo(-s*0.48+s*0.03, s*0.52+s*0.04); ctx.lineTo(-s*0.48+s*0.03, s*0.22+s*0.04);
    ctx.closePath(); ctx.fill();
    // Blue boot with gradient
    const bootGrd = ctx.createLinearGradient(-s*0.4, -s*0.6, s*0.5, s*0.5);
    bootGrd.addColorStop(0, '#5588ff'); bootGrd.addColorStop(0.4, '#3366ff');
    bootGrd.addColorStop(0.8, '#2244cc'); bootGrd.addColorStop(1, '#1a2e88');
    ctx.fillStyle = bootGrd;
    ctx.beginPath();
    ctx.moveTo(-s*0.4, -s*0.3); ctx.lineTo(-s*0.3, -s*0.6); ctx.lineTo(s*0.1, -s*0.5);
    ctx.lineTo(s*0.15, -s*0.1); ctx.lineTo(s*0.5, s*0.2); ctx.lineTo(s*0.5, s*0.5);
    ctx.lineTo(-s*0.5, s*0.5); ctx.lineTo(-s*0.5, s*0.2); ctx.closePath(); ctx.fill();
    // Sole
    ctx.fillStyle = '#1a1a40';
    ctx.fillRect(-s*0.5, s*0.42, s*1.0, s*0.08);
    // Highlight
    ctx.fillStyle = 'rgba(180,210,255,0.22)';
    ctx.beginPath();
    ctx.moveTo(-s*0.3, -s*0.55); ctx.lineTo(-s*0.18, -s*0.52); ctx.lineTo(-s*0.25, -s*0.15); ctx.lineTo(-s*0.38, -s*0.22); ctx.closePath(); ctx.fill();
    // Lightning bolt with glow
    const boltGlow = 0.5 + Math.sin(globalTime * 8) * 0.3;
    ctx.fillStyle = `rgba(255,238,0,${boltGlow})`;
    ctx.beginPath();
    ctx.moveTo(-s*0.05, -s*0.35); ctx.lineTo(s*0.15, -s*0.05); ctx.lineTo(-s*0.02, -s*0.05);
    ctx.lineTo(s*0.08, s*0.25); ctx.lineTo(-s*0.12, s*0.0); ctx.lineTo(s*0.02, s*0.0); ctx.closePath(); ctx.fill();
    // Speed trail lines with animation
    const speedPulse = 0.3 + Math.sin(globalTime * 6) * 0.3;
    ctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      const trailPhase = (globalTime * 3 + i * 0.5) % 1;
      ctx.strokeStyle = `rgba(100,180,255,${speedPulse * (1 - trailPhase * 0.5)})`;
      ctx.lineWidth = Math.max(1, s * 0.06);
      ctx.beginPath();
      ctx.moveTo(-s*(0.6 + trailPhase*0.3) - i*s*0.12, -s*0.2 + i*s*0.25);
      ctx.lineTo(-s*(0.4 + trailPhase*0.1) - i*s*0.12, -s*0.2 + i*s*0.25);
      ctx.stroke();
    }
    ctx.lineCap = 'butt';
  } else if (type === TILE.GHOST_MODE) {
    // Floating ghost with wavy bottom
    const ghostAlpha = 0.55 + Math.sin(globalTime * 4) * 0.18;
    ctx.globalAlpha = ghostAlpha;
    // Ghost body with gradient
    const ghostGrd = ctx.createLinearGradient(0, -s*0.7, 0, s*0.5);
    ghostGrd.addColorStop(0, '#f0f0ff'); ghostGrd.addColorStop(0.5, '#d0d0ee');
    ghostGrd.addColorStop(1, '#a0a0cc');
    ctx.fillStyle = ghostGrd;
    ctx.beginPath();
    ctx.moveTo(0, -s*0.7);
    ctx.bezierCurveTo(s*0.6, -s*0.7, s*0.6, s*0.2, s*0.5, s*0.35);
    // Wavy bottom edge
    const waveT = globalTime * 4;
    ctx.lineTo(s*0.35, s*0.25 + Math.sin(waveT)*s*0.08);
    ctx.lineTo(s*0.2, s*0.42 + Math.sin(waveT+1)*s*0.06);
    ctx.lineTo(s*0.05, s*0.28 + Math.sin(waveT+2)*s*0.07);
    ctx.lineTo(-s*0.1, s*0.44 + Math.sin(waveT+3)*s*0.06);
    ctx.lineTo(-s*0.25, s*0.26 + Math.sin(waveT+4)*s*0.08);
    ctx.lineTo(-s*0.4, s*0.40 + Math.sin(waveT+5)*s*0.05);
    ctx.bezierCurveTo(-s*0.6, s*0.2, -s*0.6, -s*0.7, 0, -s*0.7);
    ctx.fill();
    // Semi-transparent inner glow
    ctx.globalAlpha = ghostAlpha * 0.5;
    const innerG = ctx.createRadialGradient(0, -s*0.2, 0, 0, 0, s*0.45);
    innerG.addColorStop(0, 'rgba(200,200,255,0.35)'); innerG.addColorStop(1, 'rgba(150,150,220,0)');
    ctx.fillStyle = innerG;
    ctx.fill();
    ctx.globalAlpha = ghostAlpha;
    // Eyes — hollow glowing
    for (const ex of [-1, 1]) {
      ctx.fillStyle = '#2222aa';
      ctx.beginPath(); ctx.ellipse(ex*s*0.15, -s*0.18, s*0.11, s*0.13, 0, 0, Math.PI*2); ctx.fill();
      // Eye pupil glow
      ctx.fillStyle = `rgba(120,120,255,${0.6 + Math.sin(globalTime*5+ex)*0.3})`;
      ctx.beginPath(); ctx.arc(ex*s*0.15, -s*0.15, s*0.05, 0, Math.PI*2); ctx.fill();
      // Bright pupil centre
      ctx.fillStyle = 'rgba(220,220,255,0.6)';
      ctx.beginPath(); ctx.arc(ex*s*0.15, -s*0.16, s*0.02, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Ethereal wisps around the ghost
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 3; i++) {
      const wa = globalTime * 2 + i * 2.09;
      const wx = Math.cos(wa) * s * 0.55;
      const wy = Math.sin(wa * 0.7) * s * 0.35;
      ctx.strokeStyle = `rgba(180,180,255,${0.12 + Math.sin(wa*3)*0.06})`;
      ctx.lineWidth = Math.max(0.8, s * 0.03);
      ctx.beginPath();
      ctx.moveTo(wx - s*0.1, wy); ctx.quadraticCurveTo(wx, wy - s*0.15, wx + s*0.1, wy);
      ctx.stroke();
    }
    ctx.restore();
  }
  
  ctx.restore();
}

function drawPlayer(px, py) {
  const [sx, sy] = worldToScreen(px + 0.5, py + 0.5);
  if (player.dead) {
    if (player.deadTimer < 1.5) {
      const t = player.deadTimer / 1.5;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(t * Math.PI * 4);
      ctx.scale(1-t, 1-t);
      ctx.globalAlpha = 1-t;
      drawPlayerSprite(0, 0, CELL);
      ctx.restore();
    }
    return;
  }
  
  // Player light cone in facing direction
  const dirVecs = [[1,0],[0,0.8],[-1,0],[0,-0.8]]; // right, down, left, up
  const dv = dirVecs[player.dir] || [1,0];
  const lightRange = CELL * 4;
  const lx = sx + dv[0] * lightRange * 0.4;
  const ly = sy + dv[1] * lightRange * 0.4;
  const lampGrd = ctx.createRadialGradient(sx, sy, CELL * 0.2, lx, ly, lightRange);
  lampGrd.addColorStop(0, 'rgba(255,240,180,0.12)');
  lampGrd.addColorStop(0.5, 'rgba(255,220,150,0.04)');
  lampGrd.addColorStop(1, 'rgba(255,220,150,0)');
  ctx.fillStyle = lampGrd;
  ctx.beginPath();
  ctx.arc(lx, ly, lightRange, 0, Math.PI * 2);
  ctx.fill();

  // Player ambient glow
  const lightR = CELL * 3.1;
  const lgrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, lightR);
  lgrd.addColorStop(0, 'rgba(255,230,165,0.13)');
  lgrd.addColorStop(0.5, 'rgba(255,205,120,0.06)');
  lgrd.addColorStop(1, 'rgba(255,205,120,0)');
  ctx.fillStyle = lgrd;
  ctx.beginPath();
  ctx.arc(sx, sy, lightR, 0, Math.PI*2);
  ctx.fill();

  // Ghost mode visual
  if (player.ghostTimer > 0) {
    ctx.save();
    ctx.globalAlpha = 0.4 + Math.sin(globalTime * 6) * 0.2;
    drawPlayerSprite(sx, sy, CELL);
    ctx.restore();
    // Shimmer overlay
    ctx.fillStyle = `rgba(180,180,255,${0.1 + Math.sin(globalTime * 8) * 0.05})`;
    ctx.beginPath();
    ctx.arc(sx, sy, CELL * 0.5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    drawPlayerSprite(sx, sy, CELL);
  }
  
  // Speed boots ring timer
  if (player.speedTimer > 0) {
    const ringRadius = CELL * 0.55;
    const ringFraction = player.speedTimer / 10;
    ctx.strokeStyle = `rgba(80,140,255,${0.6 + Math.sin(globalTime*4)*0.2})`;
    ctx.lineWidth = Math.max(2, CELL * 0.04);
    ctx.beginPath();
    ctx.arc(sx, sy, ringRadius, -Math.PI/2, -Math.PI/2 + ringFraction * Math.PI * 2);
    ctx.stroke();
    // Speed lines
    for (let i = 0; i < 3; i++) {
      const lineAlpha = 0.3 + Math.sin(globalTime * 8 + i) * 0.2;
      ctx.strokeStyle = `rgba(100,180,255,${lineAlpha})`;
      ctx.lineWidth = Math.max(1, CELL * 0.02);
      const lx2 = sx - dv[0] * CELL * (0.4 + i * 0.15);
      const ly2 = sy - dv[1] * CELL * (0.4 + i * 0.15);
      ctx.beginPath();
      ctx.moveTo(lx2 + (Math.random()-0.5)*CELL*0.2, ly2 + (Math.random()-0.5)*CELL*0.2);
      ctx.lineTo(lx2 - dv[0]*CELL*0.3, ly2 - dv[1]*CELL*0.3);
      ctx.stroke();
    }
  }
  
  // Ghost mode ring timer
  if (player.ghostTimer > 0) {
    const ringRadius = CELL * 0.6;
    const ringFraction = player.ghostTimer / 5;
    ctx.strokeStyle = `rgba(180,180,255,${0.5 + Math.sin(globalTime*3)*0.2})`;
    ctx.lineWidth = Math.max(2, CELL * 0.04);
    ctx.beginPath();
    ctx.arc(sx, sy, ringRadius, -Math.PI/2, -Math.PI/2 + ringFraction * Math.PI * 2);
    ctx.stroke();
  }
  
  // Shadow under feet
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + CELL * 0.32, CELL * 0.18, CELL * 0.05, 0, 0, Math.PI * 2);
  ctx.fill();
}

// ── Miner dust particles system ──
let minerDustParticles = [];

function spawnMinerDust(sx, sy, S, dx) {
  for (let i = 0; i < 4; i++) {
    minerDustParticles.push({
      x: sx + (Math.random() - 0.5) * S * 0.2,
      y: sy + S * 0.42 + Math.random() * S * 0.05,
      vx: (Math.random() - 0.5) * 30 - dx * 15,
      vy: 10 + Math.random() * 20,
      life: 0.4 + Math.random() * 0.3,
      maxLife: 0.4 + Math.random() * 0.3,
      size: 1.5 + Math.random() * 2.5
    });
  }
}

function updateMinerDust(dt) {
  for (let i = minerDustParticles.length - 1; i >= 0; i--) {
    const p = minerDustParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 40 * dt;
    p.life -= dt;
    if (p.life <= 0) minerDustParticles.splice(i, 1);
  }
}

function drawMinerDust() {
  for (const p of minerDustParticles) {
    const alpha = (p.life / p.maxLife) * 0.6;
    ctx.fillStyle = `rgba(140,110,70,${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawMinerToolAndGear(S, bodyTop, bodyW) {
  const actionAge = globalTime - (player.actionT || -99);
  const active = actionAge >= 0 && actionAge < 0.52;
  const dirX = player.dir === 0 ? 1 : player.dir === 2 ? -1 : 0;
  const dirY = player.dir === 3 ? -1 : player.dir === 1 ? 1 : 0;
  const swing = active ? Math.sin((1 - actionAge / 0.52) * Math.PI) : 0;

  // Satchel/backpack: small readable gear silhouette at high zoom.
  ctx.save();
  ctx.translate(-bodyW * 0.62, bodyTop + S * 0.04);
  const bagGrd = ctx.createLinearGradient(-S*0.12, -S*0.08, S*0.06, S*0.18);
  bagGrd.addColorStop(0, '#8a5a2b'); bagGrd.addColorStop(1, '#3f2615');
  ctx.fillStyle = bagGrd;
  ctx.strokeStyle = 'rgba(0,0,0,0.65)';
  ctx.lineWidth = Math.max(1, S*0.018);
  ctx.beginPath(); ctx.roundRect(-S*0.08, -S*0.04, S*0.16, S*0.20, S*0.035); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = 'rgba(245,190,90,0.35)'; ctx.lineWidth = Math.max(0.7, S*0.01);
  ctx.beginPath(); ctx.moveTo(-S*0.05, S*0.02); ctx.lineTo(S*0.05, S*0.02); ctx.stroke();
  ctx.restore();

  // Pickaxe / hand tool: idle on shoulder, swings when digging/pushing.
  ctx.save();
  const side = dirX || 1;
  const baseX = side * S * 0.25;
  const baseY = bodyTop - S * 0.03;
  ctx.translate(baseX, baseY);
  let rot = side * -0.75;
  if (player.action === 'dig' && active) rot = side * (-1.25 + swing * 1.35) + dirY * -0.35;
  if (player.action === 'push' && active) rot = side * (-0.15 + swing * 0.25);
  if (player.action === 'collect' && active) rot = side * (-0.95 + swing * 0.45);
  ctx.rotate(rot);
  ctx.strokeStyle = '#7b4d28';
  ctx.lineWidth = Math.max(1.4, S * 0.028);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -S * 0.30); ctx.stroke();
  ctx.strokeStyle = '#b8c4c8';
  ctx.lineWidth = Math.max(1.5, S * 0.030);
  ctx.beginPath();
  ctx.moveTo(-S * 0.095, -S * 0.30);
  ctx.quadraticCurveTo(0, -S * 0.36, S * 0.115, -S * 0.30);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.arc(S*0.085, -S*0.305, S*0.012, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  if (active && (player.action === 'dig' || player.action === 'push')) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const fx = (dirX || side) * S * 0.46;
    const fy = dirY * S * 0.34 - S * 0.05;
    for (let i = 0; i < 5; i++) {
      const a = -actionAge * 8 + i * 1.25;
      ctx.strokeStyle = `rgba(255,210,120,${0.26 * (1 - actionAge/0.52)})`;
      ctx.lineWidth = Math.max(0.7, S*0.010);
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(fx + Math.cos(a)*S*0.12, fy + Math.sin(a)*S*0.12);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawPlayerSprite(sx, sy, s) {
  // ═══════════════════════════════════════════════════════════════
  //  HD MINER CHARACTER — fills 88% of tile with full detail
  //  50+ canvas drawing calls for rich visual detail
  // ═══════════════════════════════════════════════════════════════
  const S = s * 0.88; // character fills 88% of tile
  const isWalking = player.moving;
  const walkSpeed = 10; // walk animation speed
  const walkCycle = globalTime * walkSpeed;
  const walkPhase = Math.sin(walkCycle);       // leg/arm oscillation
  const walkPhase2 = Math.cos(walkCycle);      // offset phase

  // ── Idle animations ──
  // Breathing: gentle vertical oscillation (2-3px)
  const breathOffset = isWalking ? 0 : Math.sin(player.breathT * 1.5) * S * 0.025;
  const breathScale = isWalking ? 1 : 1 + Math.sin(player.breathT * 1.5) * 0.015;
  const idleSway = !isWalking && player.idleT > 0.5 ? Math.sin(globalTime * 1.5) * S * 0.02 : 0;

  // Blink: eyes close briefly every 3-4 seconds
  const blinkCycle = (globalTime % 3.5);
  const isBlinking = !isWalking && blinkCycle > 3.3 && blinkCycle < 3.45;

  // Walk bob (body bobs up/down when walking)
  const walkBob = isWalking ? Math.abs(Math.sin(walkCycle * 2)) * S * 0.06 : 0;

  // Spawn dust when walking
  if (isWalking && Math.sin(walkCycle * 2) > 0.95) {
    const dirDx = player.dir === 0 ? 1 : player.dir === 2 ? -1 : 0;
    spawnMinerDust(sx, sy, S, dirDx);
  }

  // Update and draw dust particles
  updateMinerDust(1/60);
  drawMinerDust();

  ctx.save();
  ctx.translate(sx + idleSway, sy - walkBob - breathOffset);
  ctx.scale(breathScale, breathScale);

  // ── Global outline settings ──
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  // ══════════════════════════════
  //  LEGS — dramatic walk animation
  // ══════════════════════════════
  const legLen = S * 0.25;
  const legW = S * 0.11;
  const legBaseY = S * 0.12;
  const legSpread = S * 0.07;

  // Walk animation: legs alternate DRAMATICALLY
  // Amplitude = 25%+ of character height for obvious motion
  const legAmplitude = S * 0.28; // 28% of char height — very obvious
  const leftLegSwing = isWalking ? Math.sin(walkCycle) * legAmplitude : 0;
  const rightLegSwing = isWalking ? Math.sin(walkCycle + Math.PI) * legAmplitude : 0;

  // Leg gradient — blue denim overalls
  const legGrd = ctx.createLinearGradient(0, legBaseY, 0, legBaseY + legLen + S * 0.3);
  legGrd.addColorStop(0, '#3a6298');  // 1
  legGrd.addColorStop(0.4, '#2d5080'); // 2
  legGrd.addColorStop(0.8, '#1e3a60'); // 3
  legGrd.addColorStop(1, '#152a48');   // 4

  // Left leg
  ctx.save();
  ctx.translate(-legSpread, legBaseY);
  if (isWalking) ctx.rotate(leftLegSwing / (legLen * 2)); // 5 - rotation for natural swing
  ctx.fillStyle = legGrd; // 6
  ctx.beginPath(); // 7
  ctx.roundRect(-legW/2, 0, legW, legLen, S * 0.025);
  ctx.fill(); // 8
  ctx.stroke(); // 9
  // Knee highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; // 10
  ctx.fillRect(-legW/2 + legW*0.15, legLen * 0.35, legW * 0.7, legLen * 0.15); // 11
  // Left boot
  ctx.fillStyle = '#5a3d28'; // 12
  ctx.beginPath(); // 13
  ctx.roundRect(-legW/2 - S*0.02, legLen - S*0.01, legW + S*0.04, S * 0.09, [S*0.015, S*0.015, S*0.025, S*0.025]);
  ctx.fill(); // 14
  ctx.stroke(); // 15
  // Boot sole
  ctx.fillStyle = '#2a1a10'; // 16
  ctx.fillRect(-legW/2 - S*0.02, legLen + S*0.06, legW + S*0.04, S * 0.02); // 17
  // Boot highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)'; // 18
  ctx.fillRect(-legW/2, legLen, legW * 0.6, S * 0.02); // 19
  // Boot lace detail
  ctx.strokeStyle = 'rgba(180,140,100,0.5)'; // 20
  ctx.lineWidth = Math.max(0.5, S * 0.012);
  ctx.beginPath(); ctx.moveTo(-legW*0.1, legLen + S*0.01); ctx.lineTo(legW*0.1, legLen + S*0.03); ctx.stroke(); // 21
  ctx.beginPath(); ctx.moveTo(-legW*0.1, legLen + S*0.03); ctx.lineTo(legW*0.1, legLen + S*0.05); ctx.stroke(); // 22
  ctx.restore();

  // Reset stroke for next elements
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // Right leg
  ctx.save();
  ctx.translate(legSpread, legBaseY);
  if (isWalking) ctx.rotate(rightLegSwing / (legLen * 2)); // 23
  ctx.fillStyle = legGrd; // 24
  ctx.beginPath(); // 25
  ctx.roundRect(-legW/2, 0, legW, legLen, S * 0.025);
  ctx.fill(); // 26
  ctx.stroke(); // 27
  // Knee highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; // 28
  ctx.fillRect(-legW/2 + legW*0.15, legLen * 0.35, legW * 0.7, legLen * 0.15); // 29
  // Right boot
  ctx.fillStyle = '#5a3d28'; // 30
  ctx.beginPath(); // 31
  ctx.roundRect(-legW/2 - S*0.02, legLen - S*0.01, legW + S*0.04, S * 0.09, [S*0.015, S*0.015, S*0.025, S*0.025]);
  ctx.fill(); // 32
  ctx.stroke(); // 33
  // Boot sole
  ctx.fillStyle = '#2a1a10'; // 34
  ctx.fillRect(-legW/2 - S*0.02, legLen + S*0.06, legW + S*0.04, S * 0.02); // 35
  // Boot highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)'; // 36
  ctx.fillRect(-legW/2, legLen, legW * 0.6, S * 0.02); // 37
  ctx.restore();

  // Reset stroke
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // ══════════════════════════════
  //  BODY — Blue overalls with straps
  // ══════════════════════════════
  const bodyW = S * 0.42;
  const bodyH = S * 0.3;
  const bodyTop = -S * 0.16;

  // Main body gradient — blue overalls
  const bodyGrd = ctx.createLinearGradient(-bodyW/2, bodyTop, bodyW/2, bodyTop + bodyH);
  bodyGrd.addColorStop(0, '#3a6da8');   // 38
  bodyGrd.addColorStop(0.3, '#2d5a90');
  bodyGrd.addColorStop(0.7, '#1e4a78');
  bodyGrd.addColorStop(1, '#163a60');
  ctx.fillStyle = bodyGrd;
  ctx.beginPath(); // 39
  ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, S * 0.04);
  ctx.fill(); // 40

  // Side lighting — lamp hits from facing direction
  const lampSide = player.dir === 0 ? -1 : player.dir === 2 ? 1 : 0;
  const bodyLightGrd = ctx.createLinearGradient(-bodyW/2, 0, bodyW/2, 0);
  bodyLightGrd.addColorStop(0, `rgba(255,255,200,${lampSide <= 0 ? 0.12 : 0})`); // 41
  bodyLightGrd.addColorStop(0.5, 'rgba(0,0,0,0)');
  bodyLightGrd.addColorStop(1, `rgba(255,255,200,${lampSide >= 0 ? 0.12 : 0})`);
  ctx.fillStyle = bodyLightGrd;
  ctx.beginPath(); // 42
  ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, S * 0.04);
  ctx.fill(); // 43

  // Shadow on opposite side of lamp
  const bodyShadowGrd = ctx.createLinearGradient(-bodyW/2, 0, bodyW/2, 0);
  bodyShadowGrd.addColorStop(0, `rgba(0,0,0,${lampSide >= 0 ? 0.2 : 0})`); // 44
  bodyShadowGrd.addColorStop(0.5, 'rgba(0,0,0,0)');
  bodyShadowGrd.addColorStop(1, `rgba(0,0,0,${lampSide <= 0 ? 0.2 : 0})`);
  ctx.fillStyle = bodyShadowGrd;
  ctx.beginPath(); // 45
  ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, S * 0.04);
  ctx.fill(); // 46

  // Body outline
  ctx.beginPath(); // 47
  ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, S * 0.04);
  ctx.stroke(); // 48

  // Shoulder straps
  ctx.fillStyle = '#2d5080'; // 49
  ctx.fillRect(-bodyW/2 + S*0.02, bodyTop - S*0.04, S * 0.06, S * 0.08); // 50
  ctx.fillRect(bodyW/2 - S*0.08, bodyTop - S*0.04, S * 0.06, S * 0.08); // 51
  // Strap outlines
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = Math.max(1, S * 0.02);
  ctx.strokeRect(-bodyW/2 + S*0.02, bodyTop - S*0.04, S * 0.06, S * 0.08); // 52
  ctx.strokeRect(bodyW/2 - S*0.08, bodyTop - S*0.04, S * 0.06, S * 0.08); // 53
  // Strap buttons (brass)
  ctx.fillStyle = '#d4a840'; // 54
  ctx.beginPath(); ctx.arc(-bodyW/2 + S*0.05, bodyTop + S*0.02, S*0.015, 0, Math.PI*2); ctx.fill(); // 55
  ctx.beginPath(); ctx.arc(bodyW/2 - S*0.05, bodyTop + S*0.02, S*0.015, 0, Math.PI*2); ctx.fill(); // 56

  // Belt line
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);
  ctx.fillStyle = '#5a3c22'; // 57
  ctx.fillRect(-bodyW/2, bodyTop + bodyH - S*0.055, bodyW, S * 0.045); // 58
  // Belt buckle
  ctx.fillStyle = '#e8c040'; // 59
  ctx.beginPath(); ctx.roundRect(-S*0.03, bodyTop + bodyH - S*0.052, S*0.06, S*0.04, S*0.008); ctx.fill(); // 60
  ctx.strokeStyle = '#b89830';
  ctx.lineWidth = Math.max(0.5, S * 0.01);
  ctx.beginPath(); ctx.roundRect(-S*0.03, bodyTop + bodyH - S*0.052, S*0.06, S*0.04, S*0.008); ctx.stroke(); // 61
  // Buckle prong
  ctx.strokeStyle = '#a08020';
  ctx.lineWidth = Math.max(0.5, S * 0.008);
  ctx.beginPath(); ctx.moveTo(0, bodyTop + bodyH - S*0.05); ctx.lineTo(0, bodyTop + bodyH - S*0.015); ctx.stroke(); // 62

  // Chest pocket detail
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = Math.max(0.5, S * 0.01);
  ctx.beginPath(); // 63
  ctx.roundRect(-bodyW/4 - S*0.01, bodyTop + S*0.04, S*0.08, S*0.06, S*0.01);
  ctx.stroke(); // 64
  // Gear layer: backpack + pickaxe/tool, animated by dig/push/collect actions.
  drawMinerToolAndGear(S, bodyTop, bodyW);

  // ══════════════════════════════
  //  ARMS — swing opposite to legs
  // ══════════════════════════════
  // Arms swing opposite to legs: left arm forward when right leg forward
  const armAmplitude = isWalking ? 0.9 : 0.06; // 15%+ char height swing
  const leftArmSwing = isWalking ? Math.sin(walkCycle + Math.PI) * armAmplitude : Math.sin(globalTime * 0.8) * 0.06;
  const rightArmSwing = isWalking ? Math.sin(walkCycle) * armAmplitude : -Math.sin(globalTime * 0.8) * 0.06;
  const armLen = S * 0.22;
  const armW2 = S * 0.08;

  // Arm gradient — shirt sleeve color
  const armGrd = ctx.createLinearGradient(0, 0, 0, armLen);
  armGrd.addColorStop(0, '#4a8ac0'); // 65
  armGrd.addColorStop(0.4, '#3a7ab0');
  armGrd.addColorStop(1, '#2a5a88');

  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // Left arm
  ctx.save();
  ctx.translate(-bodyW/2 - S*0.01, bodyTop + S*0.06);
  ctx.rotate(-0.15 + leftArmSwing); // 66
  ctx.fillStyle = armGrd;
  ctx.beginPath(); // 67
  ctx.roundRect(-armW2/2, 0, armW2, armLen, S*0.025);
  ctx.fill(); // 68
  ctx.stroke(); // 69
  // Sleeve cuff
  ctx.fillStyle = '#3a6898'; // 70
  ctx.fillRect(-armW2/2 - S*0.005, armLen - S*0.03, armW2 + S*0.01, S*0.03); // 71
  // Hand — skin tone
  const handGrd = ctx.createRadialGradient(0, armLen + S*0.02, 0, 0, armLen + S*0.02, S*0.04);
  handGrd.addColorStop(0, '#f8d8a8'); // 72
  handGrd.addColorStop(1, '#d8a878');
  ctx.fillStyle = handGrd;
  ctx.beginPath(); ctx.arc(0, armLen + S*0.02, S * 0.04, 0, Math.PI * 2); ctx.fill(); // 73
  // Fingers
  ctx.fillStyle = '#ecc898'; // 74
  ctx.beginPath();
  ctx.ellipse(S*0.02, armLen + S*0.04, S*0.015, S*0.01, 0.3, 0, Math.PI*2);
  ctx.fill(); // 75
  ctx.beginPath();
  ctx.ellipse(-S*0.02, armLen + S*0.04, S*0.012, S*0.008, -0.3, 0, Math.PI*2);
  ctx.fill(); // 76
  ctx.restore();

  // Right arm
  ctx.save();
  ctx.translate(bodyW/2 + S*0.01, bodyTop + S*0.06);
  ctx.rotate(0.15 + rightArmSwing); // 77
  ctx.fillStyle = armGrd;
  ctx.beginPath(); // 78
  ctx.roundRect(-armW2/2, 0, armW2, armLen, S*0.025);
  ctx.fill(); // 79
  ctx.stroke(); // 80
  // Sleeve cuff
  ctx.fillStyle = '#3a6898'; // 81
  ctx.fillRect(-armW2/2 - S*0.005, armLen - S*0.03, armW2 + S*0.01, S*0.03); // 82
  // Hand
  ctx.fillStyle = handGrd;
  ctx.beginPath(); ctx.arc(0, armLen + S*0.02, S * 0.04, 0, Math.PI * 2); ctx.fill(); // 83
  ctx.restore();

  // Reset stroke
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // ══════════════════════════════
  //  HEAD — detailed with gradients
  // ══════════════════════════════
  const headR = S * 0.17;
  const headY = -S * 0.3;

  // Head shadow on body (neck shadow)
  ctx.fillStyle = 'rgba(0,0,0,0.15)'; // 84
  ctx.beginPath();
  ctx.ellipse(0, bodyTop + S*0.01, headR * 0.8, S * 0.03, 0, 0, Math.PI * 2);
  ctx.fill(); // 85

  // Head — radial gradient for 3D skin
  const headGrd = ctx.createRadialGradient(-headR*0.25, headY - headR*0.2, headR*0.1, headR*0.1, headY + headR*0.1, headR*1.1);
  headGrd.addColorStop(0, '#ffe8c8');  // 86 bright highlight
  headGrd.addColorStop(0.3, '#f5d0a0');
  headGrd.addColorStop(0.6, '#e4b880');
  headGrd.addColorStop(0.85, '#d4a068');
  headGrd.addColorStop(1, '#b88050');  // shadow edge
  ctx.fillStyle = headGrd;
  ctx.beginPath(); // 87
  ctx.arc(0, headY, headR, 0, Math.PI * 2);
  ctx.fill(); // 88
  ctx.stroke(); // 89

  // Cheek blush
  ctx.fillStyle = 'rgba(220,140,100,0.15)'; // 90
  ctx.beginPath(); ctx.arc(-headR*0.5, headY + headR*0.2, headR*0.2, 0, Math.PI*2); ctx.fill(); // 91
  ctx.beginPath(); ctx.arc(headR*0.5, headY + headR*0.2, headR*0.2, 0, Math.PI*2); ctx.fill(); // 92

  // Ears
  ctx.fillStyle = '#e4b880'; // 93
  ctx.beginPath(); ctx.ellipse(-headR*0.95, headY + headR*0.05, headR*0.12, headR*0.18, 0, 0, Math.PI*2); ctx.fill(); // 94
  ctx.beginPath(); ctx.ellipse(headR*0.95, headY + headR*0.05, headR*0.12, headR*0.18, 0, 0, Math.PI*2); ctx.fill(); // 95
  // Inner ear
  ctx.fillStyle = '#d4a070'; // 96
  ctx.beginPath(); ctx.ellipse(-headR*0.95, headY + headR*0.05, headR*0.06, headR*0.1, 0, 0, Math.PI*2); ctx.fill(); // 97
  ctx.beginPath(); ctx.ellipse(headR*0.95, headY + headR*0.05, headR*0.06, headR*0.1, 0, 0, Math.PI*2); ctx.fill(); // 98

  // ── Eyes — look in movement direction ──
  const eyeDir = player.dir === 0 ? 1 : player.dir === 2 ? -1 : 0;
  const eyeDirY = player.dir === 3 ? -1 : player.dir === 1 ? 1 : 0;
  const eyeOffX = eyeDir * S * 0.02;
  const eyeOffY = eyeDirY * S * 0.01;
  const eyeY = headY - headR * 0.08;
  const eyeSpacing = S * 0.065;

  if (!isBlinking) {
    // Eye whites (larger, more visible)
    ctx.fillStyle = '#fff'; // 99
    ctx.beginPath(); ctx.ellipse(-eyeSpacing + eyeOffX, eyeY, S*0.038, S*0.032, 0, 0, Math.PI*2); ctx.fill(); // 100
    ctx.beginPath(); ctx.ellipse(eyeSpacing + eyeOffX, eyeY, S*0.038, S*0.032, 0, 0, Math.PI*2); ctx.fill(); // 101
    // Eye outlines
    ctx.strokeStyle = 'rgba(80,50,30,0.5)';
    ctx.lineWidth = Math.max(0.5, S * 0.012);
    ctx.beginPath(); ctx.ellipse(-eyeSpacing + eyeOffX, eyeY, S*0.038, S*0.032, 0, 0, Math.PI*2); ctx.stroke(); // 102
    ctx.beginPath(); ctx.ellipse(eyeSpacing + eyeOffX, eyeY, S*0.038, S*0.032, 0, 0, Math.PI*2); ctx.stroke(); // 103
    // Iris (dark brown)
    ctx.fillStyle = '#3a2818'; // 104
    ctx.beginPath(); ctx.arc(-eyeSpacing + eyeOffX*1.8, eyeY + eyeOffY, S*0.02, 0, Math.PI*2); ctx.fill(); // 105
    ctx.beginPath(); ctx.arc(eyeSpacing + eyeOffX*1.8, eyeY + eyeOffY, S*0.02, 0, Math.PI*2); ctx.fill(); // 106
    // Pupils (black)
    ctx.fillStyle = '#0a0a0a'; // 107
    ctx.beginPath(); ctx.arc(-eyeSpacing + eyeOffX*2, eyeY + eyeOffY, S*0.012, 0, Math.PI*2); ctx.fill(); // 108
    ctx.beginPath(); ctx.arc(eyeSpacing + eyeOffX*2, eyeY + eyeOffY, S*0.012, 0, Math.PI*2); ctx.fill(); // 109
    // Eye sparkle highlights
    ctx.fillStyle = 'rgba(255,255,255,0.85)'; // 110
    ctx.beginPath(); ctx.arc(-eyeSpacing + eyeOffX*1.2 - S*0.008, eyeY - S*0.01, S*0.009, 0, Math.PI*2); ctx.fill(); // 111
    ctx.beginPath(); ctx.arc(eyeSpacing + eyeOffX*1.2 - S*0.008, eyeY - S*0.01, S*0.009, 0, Math.PI*2); ctx.fill(); // 112
    // Secondary smaller highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; // 113
    ctx.beginPath(); ctx.arc(-eyeSpacing + eyeOffX*1.5 + S*0.005, eyeY + S*0.005, S*0.005, 0, Math.PI*2); ctx.fill(); // 114
    ctx.beginPath(); ctx.arc(eyeSpacing + eyeOffX*1.5 + S*0.005, eyeY + S*0.005, S*0.005, 0, Math.PI*2); ctx.fill(); // 115
    // Eyebrows
    ctx.strokeStyle = '#6a4a2a'; // 116
    ctx.lineWidth = Math.max(1, S * 0.02);
    ctx.beginPath(); ctx.moveTo(-eyeSpacing - S*0.03, eyeY - S*0.04); ctx.quadraticCurveTo(-eyeSpacing, eyeY - S*0.05, -eyeSpacing + S*0.03, eyeY - S*0.038); ctx.stroke(); // 117
    ctx.beginPath(); ctx.moveTo(eyeSpacing - S*0.03, eyeY - S*0.038); ctx.quadraticCurveTo(eyeSpacing, eyeY - S*0.05, eyeSpacing + S*0.03, eyeY - S*0.04); ctx.stroke(); // 118
  } else {
    // Blinking — closed eyes (horizontal lines)
    ctx.strokeStyle = '#5a3a1a'; // 119
    ctx.lineWidth = Math.max(1, S * 0.02);
    ctx.beginPath(); ctx.moveTo(-eyeSpacing - S*0.025, eyeY); ctx.lineTo(-eyeSpacing + S*0.025, eyeY); ctx.stroke(); // 120
    ctx.beginPath(); ctx.moveTo(eyeSpacing - S*0.025, eyeY); ctx.lineTo(eyeSpacing + S*0.025, eyeY); ctx.stroke(); // 121
    // Eyebrows still visible
    ctx.strokeStyle = '#6a4a2a';
    ctx.lineWidth = Math.max(1, S * 0.02);
    ctx.beginPath(); ctx.moveTo(-eyeSpacing - S*0.03, eyeY - S*0.035); ctx.quadraticCurveTo(-eyeSpacing, eyeY - S*0.045, -eyeSpacing + S*0.03, eyeY - S*0.033); ctx.stroke(); // 122
    ctx.beginPath(); ctx.moveTo(eyeSpacing - S*0.03, eyeY - S*0.033); ctx.quadraticCurveTo(eyeSpacing, eyeY - S*0.045, eyeSpacing + S*0.03, eyeY - S*0.035); ctx.stroke(); // 123
  }

  // Nose
  ctx.fillStyle = '#daa870'; // 124
  ctx.beginPath();
  ctx.moveTo(0, headY + headR*0.05);
  ctx.lineTo(S*0.015, headY + headR*0.25);
  ctx.lineTo(-S*0.015, headY + headR*0.25);
  ctx.closePath();
  ctx.fill(); // 125

  // Mouth — slight smile
  ctx.strokeStyle = '#8b5a3a'; // 126
  ctx.lineWidth = Math.max(1, S * 0.018);
  ctx.beginPath(); // 127
  ctx.arc(0, headY + headR * 0.42, S * 0.04, 0.15, Math.PI - 0.15);
  ctx.stroke(); // 128
  // Lower lip highlight
  ctx.strokeStyle = 'rgba(200,140,100,0.3)'; // 129
  ctx.lineWidth = Math.max(0.5, S * 0.01);
  ctx.beginPath();
  ctx.arc(0, headY + headR * 0.42, S * 0.035, 0.3, Math.PI - 0.3);
  ctx.stroke(); // 130

  // Chin shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)'; // 131
  ctx.beginPath();
  ctx.ellipse(0, headY + headR * 0.85, headR * 0.5, headR * 0.15, 0, 0, Math.PI * 2);
  ctx.fill(); // 132

  // ══════════════════════════════
  //  HELMET — metallic yellow hard hat
  // ══════════════════════════════
  const helmetY = headY - headR * 0.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = Math.max(2, S * 0.04);

  // Helmet dome — metallic gradient with bright yellow top → darker gold bottom
  const helmetGrd = ctx.createRadialGradient(-S*0.08, helmetY - S*0.04, S*0.02, S*0.05, helmetY + S*0.03, S*0.25);
  helmetGrd.addColorStop(0, '#FFFAB0');  // 133 bright specular
  helmetGrd.addColorStop(0.15, '#FFE850');
  helmetGrd.addColorStop(0.35, '#F0D020');
  helmetGrd.addColorStop(0.6, '#D4A800');
  helmetGrd.addColorStop(0.85, '#B08500');
  helmetGrd.addColorStop(1, '#8B6500');  // dark gold edge
  ctx.fillStyle = helmetGrd;
  ctx.beginPath(); // 134
  ctx.ellipse(0, helmetY + S*0.015, S * 0.22, S * 0.12, 0, Math.PI, 0);
  ctx.fill(); // 135

  // Helmet brim — wider than dome
  const brimGrd = ctx.createLinearGradient(-S*0.26, 0, S*0.26, 0);
  brimGrd.addColorStop(0, '#E8C010'); // 136
  brimGrd.addColorStop(0.3, '#FFD700');
  brimGrd.addColorStop(0.5, '#FFE040');
  brimGrd.addColorStop(0.7, '#FFD700');
  brimGrd.addColorStop(1, '#C8A000');
  ctx.fillStyle = brimGrd;
  ctx.beginPath(); // 137
  ctx.ellipse(0, helmetY + S*0.015, S * 0.25, S * 0.055, 0, 0, Math.PI * 2);
  ctx.fill(); // 138

  // Brim shadow underneath
  ctx.fillStyle = 'rgba(80,60,0,0.35)'; // 139
  ctx.beginPath();
  ctx.ellipse(0, helmetY + S*0.04, S * 0.23, S * 0.025, 0, 0, Math.PI);
  ctx.fill(); // 140

  // Helmet ridge line (center)
  ctx.strokeStyle = 'rgba(180,140,0,0.4)'; // 141
  ctx.lineWidth = Math.max(1, S * 0.015);
  ctx.beginPath();
  ctx.moveTo(0, helmetY - S*0.1);
  ctx.quadraticCurveTo(0, helmetY, 0, helmetY + S*0.015);
  ctx.stroke(); // 142

  // Helmet outlines
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.lineWidth = Math.max(1.5, S * 0.028);
  ctx.beginPath(); // 143
  ctx.ellipse(0, helmetY + S*0.015, S * 0.25, S * 0.055, 0, 0, Math.PI * 2);
  ctx.stroke(); // 144
  ctx.beginPath(); // 145
  ctx.ellipse(0, helmetY + S*0.015, S * 0.22, S * 0.12, 0, Math.PI, 0);
  ctx.stroke(); // 146

  // ── Bright white specular highlight spot (top-left) ──
  const glintPhase = Math.sin(player.lampFlicker * 2) * 0.3 + 0.7;
  const flickerOn = Math.sin(player.lampFlicker * 12) > -0.8;
  ctx.fillStyle = `rgba(255,255,255,${0.75 * glintPhase})`; // 147
  ctx.beginPath();
  ctx.ellipse(-S * 0.08, helmetY - S*0.04, S * 0.055, S * 0.03, -0.4, 0, Math.PI * 2);
  ctx.fill(); // 148
  // Secondary glint
  ctx.fillStyle = `rgba(255,255,240,${0.4 * glintPhase})`; // 149
  ctx.beginPath();
  ctx.ellipse(-S * 0.04, helmetY - S*0.06, S * 0.025, S * 0.015, -0.2, 0, Math.PI * 2);
  ctx.fill(); // 150

  // Rim light on helmet edges
  ctx.strokeStyle = `rgba(255,240,180,${0.3 + Math.sin(globalTime * 3) * 0.1})`; // 151
  ctx.lineWidth = Math.max(1, S * 0.018);
  ctx.beginPath();
  ctx.ellipse(0, helmetY + S*0.015, S * 0.215, S * 0.095, 0, Math.PI + 0.4, -0.4);
  ctx.stroke(); // 152

  // ══════════════════════════════
  //  HEADLAMP — with glow
  // ══════════════════════════════
  const lampBrightness = flickerOn ? (0.85 + Math.sin(globalTime * 5) * 0.15) : 0.15;

  // Lamp housing (metal bracket)
  ctx.fillStyle = '#707070'; // 153
  ctx.beginPath();
  ctx.roundRect(-S*0.04, helmetY - S*0.005, S*0.08, S*0.045, S*0.01);
  ctx.fill(); // 154
  // Housing highlight
  ctx.fillStyle = 'rgba(200,200,200,0.3)'; // 155
  ctx.fillRect(-S*0.035, helmetY, S*0.07, S*0.012); // 156
  // Housing outline
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = Math.max(0.5, S * 0.01);
  ctx.beginPath();
  ctx.roundRect(-S*0.04, helmetY - S*0.005, S*0.08, S*0.045, S*0.01);
  ctx.stroke(); // 157

  // Lamp lens (circular)
  ctx.fillStyle = `rgba(255,255,220,${lampBrightness})`; // 158
  ctx.beginPath();
  ctx.arc(0, helmetY + S*0.015, S * 0.022, 0, Math.PI * 2);
  ctx.fill(); // 159
  // Lamp lens glow ring
