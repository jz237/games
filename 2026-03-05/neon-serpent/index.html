<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Neon Serpent</title>
<!-- build: neon-v4-mouse-fix -->
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hud{position:absolute;top:0;left:0;right:0;height:48px;background:rgba(0,0,0,0.65);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;
  border-bottom:1px solid rgba(0,255,255,0.15);display:none;pointer-events:none}
.hud-item{color:#0ff;font-size:15px;text-shadow:0 0 8px #0ff,0 0 16px #0ff;letter-spacing:1px}
.hud-item .val{color:#fff;text-shadow:0 0 6px #fff}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:auto}
#overlay h1{font-size:clamp(28px,6vw,56px);color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #08f,0 0 80px #a0f;
  letter-spacing:4px;margin-bottom:8px}
#overlay h2{font-size:clamp(14px,3vw,22px);color:#f0f;text-shadow:0 0 10px #f0f;margin-bottom:24px;letter-spacing:2px}
#overlay .sub{font-size:clamp(11px,2.2vw,15px);color:rgba(255,255,255,0.5);margin-top:6px}
.btn{background:transparent;border:2px solid #0ff;color:#0ff;padding:12px 32px;font-size:clamp(14px,2.5vw,20px);
  cursor:pointer;letter-spacing:2px;text-shadow:0 0 8px #0ff;border-radius:4px;
  box-shadow:0 0 15px rgba(0,255,255,0.3),inset 0 0 15px rgba(0,255,255,0.1);
  transition:all 0.2s;pointer-events:auto;margin-top:16px}
.btn:hover{background:rgba(0,255,255,0.1);box-shadow:0 0 30px rgba(0,255,255,0.5),inset 0 0 20px rgba(0,255,255,0.2)}
#powerup-indicator{position:absolute;top:56px;right:16px;display:none;pointer-events:none}
#flash{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="ui">
  <div id="hud">
    <div class="hud-item">⬡ LEVEL <span class="val" id="h-level">1</span></div>
    <div class="hud-item">✦ SCORE <span class="val" id="h-score">0</span></div>
    <div class="hud-item">🐍 LENGTH <span class="val" id="h-len">3</span></div>
    <div class="hud-item" id="h-orbs-wrap">◉ <span class="val" id="h-orbs">0</span>/<span class="val" id="h-orbs-need">10</span></div>
  </div>
  <canvas id="powerup-indicator" width="60" height="60"></canvas>
  <div id="overlay">
    <h1>NEON SERPENT</h1>
    <h2>CYBERPUNK SNAKE ARENA</h2>
    <button class="btn" id="startBtn">▶ PLAY</button>
    <div class="sub">WASD / Arrows / Swipe to steer • BUILD v4</div>
  </div>
</div>
<script>
'use strict';
// ═══════════════════════════════════════════
// NEON SERPENT — Cyberpunk Snake Arena
// ═══════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const flashEl = document.getElementById('flash');
const hud = document.getElementById('hud');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const puCanvas = document.getElementById('powerup-indicator');
const puCtx = puCanvas.getContext('2d');

// ─── Audio Engine ───
let audioCtx = null;
let bgOsc = null, bgGain = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // background drone
  bgGain = audioCtx.createGain();
  bgGain.gain.value = 0.012;
  bgGain.connect(audioCtx.destination);
  bgOsc = audioCtx.createOscillator();
  bgOsc.type = 'sawtooth';
  bgOsc.frequency.value = 55;
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 120;
  bgOsc.connect(f); f.connect(bgGain);
  bgOsc.start();
}
function playCollect() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(880, t);
  o.frequency.exponentialRampToValueAtTime(1760, t + 0.1);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.25);
}
function playDeath() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  // Stage 1: deep rumble
  const rumble = audioCtx.createOscillator();
  const rumbleGain = audioCtx.createGain();
  rumble.type = 'sawtooth';
  rumble.frequency.setValueAtTime(90, t);
  rumble.frequency.exponentialRampToValueAtTime(24, t + 0.75);
  rumbleGain.gain.setValueAtTime(0.0001, t);
  rumbleGain.gain.exponentialRampToValueAtTime(0.26, t + 0.04);
  rumbleGain.gain.exponentialRampToValueAtTime(0.001, t + 0.85);
  rumble.connect(rumbleGain); rumbleGain.connect(audioCtx.destination);
  rumble.start(t); rumble.stop(t + 0.9);

  // Stage 2: crack blast (filtered noise)
  const crackBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.28), audioCtx.sampleRate);
  const crackData = crackBuf.getChannelData(0);
  for (let i = 0; i < crackData.length; i++) {
    crackData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (crackData.length * 0.12));
  }
  const crack = audioCtx.createBufferSource();
  crack.buffer = crackBuf;
  const crackFilter = audioCtx.createBiquadFilter();
  crackFilter.type = 'highpass';
  crackFilter.frequency.setValueAtTime(850, t);
  const crackGain = audioCtx.createGain();
  crackGain.gain.setValueAtTime(0.0001, t + 0.01);
  crackGain.gain.exponentialRampToValueAtTime(0.2, t + 0.03);
  crackGain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  crack.connect(crackFilter); crackFilter.connect(crackGain); crackGain.connect(audioCtx.destination);
  crack.start(t + 0.01); crack.stop(t + 0.31);

  // Stage 3: sparkle tail
  [1320, 1760, 2100, 2480].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(f, t + 0.09 + i * 0.045);
    o.frequency.exponentialRampToValueAtTime(f * 0.6, t + 0.24 + i * 0.045);
    g.gain.setValueAtTime(0.0001, t + 0.09 + i * 0.045);
    g.gain.exponentialRampToValueAtTime(0.06, t + 0.11 + i * 0.045);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.36 + i * 0.045);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t + 0.09 + i * 0.045);
    o.stop(t + 0.38 + i * 0.045);
  });
}
function playPowerUp() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.08);
    g.gain.linearRampToValueAtTime(0.1, t + i * 0.08 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.2);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.2);
  });
}
function playLevelComplete() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047, 784, 1047, 1319].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.12, t + i * 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.35);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.35);
  });
}

// ─── Pixel ratio / resize ───
let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ─── Game State ───
const LEVELS = [
  { cols: 24, rows: 18, orbsNeeded: 10, playerInterval: 0.18, aiCount: 1, aiSpeed: 0.48, aiLookahead: 2, powerups: [] },
  { cols: 28, rows: 20, orbsNeeded: 15, playerInterval: 0.145, aiCount: 2, aiSpeed: 0.72, aiLookahead: 4, powerups: ['speed'] },
  { cols: 22, rows: 16, orbsNeeded: 20, playerInterval: 0.12, aiCount: 3, aiSpeed: 0.95, aiLookahead: 6, powerups: ['phase', 'magnet'] },
];

let state = 'menu'; // menu, playing, dying, levelComplete, gameOver, win
let level = 0;
let cellSize, offsetX, offsetY, cols, rows;
let player = null, aiSnakes = [], orbs = [], powerups = [], particles = [], bgParticles = [], fireworks = [];
let score = 0, displayScore = 0, orbsCollected = 0;
let gameTime = 0, slowMoTimer = 0, slowMoFactor = 1;
let shakeX = 0, shakeY = 0, shakeVX = 0, shakeVY = 0;
let gridPhase = 0;
let activePowerups = []; // {type, timer, maxTime}
let levelTransTimer = 0;
let deathTimer = 0;
let deathExplosionDelay = 1.05;
let deathFX = { flash: 0, ring: 0, secondary: false, embersTimer: 0 };
let scatteredSegments = [];

function cloneSegments(segments) {
  return segments.map(s => ({ x: s.x, y: s.y }));
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerpPoint(a, b, t) { return { x: lerp(a.x, b.x, t), y: lerp(a.y, b.y, t) }; }
function getInterpSegments(snake, alpha) {
  const prev = snake.prevSegments || snake.segments;
  const curr = snake.segments;
  const out = [];
  const n = curr.length;
  for (let i = 0; i < n; i++) {
    const pa = prev[i] || prev[prev.length - 1] || curr[i];
    const pb = curr[i];
    out.push(lerpPoint(pa, pb, alpha));
  }
  return out;
}

// ─── Helpers ───
function lerp(a, b, t) { return a + (b - a) * t; }
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function dist(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function hsl(h, s, l) { return `hsl(${h},${s}%,${l}%)`; }

const DIR = { UP: { x: 0, y: -1 }, DOWN: { x: 0, y: 1 }, LEFT: { x: -1, y: 0 }, RIGHT: { x: 1, y: 0 } };
const DIRS = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
function oppositeDir(d) { return { x: -d.x, y: -d.y }; }

// ─── Particles ───
function spawnParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life, maxLife: life, color, size: rand(2, 5) });
  }
}
function spawnSparkle(x, y, color) {
  particles.push({ x, y, vx: rand(-8, 8), vy: rand(-15, -5), life: rand(0.3, 0.8), maxLife: 0.8, color, size: rand(1, 3), sparkle: true });
}

// ─── Flash effect ───
let flashOpacity = 0, flashColor = '#fff';
function screenFlash(color, intensity) {
  flashColor = color; flashOpacity = intensity || 0.3;
}

// ─── Init Level ───
function initLevel() {
  const L = LEVELS[level];
  cols = L.cols; rows = L.rows;
  // responsive board sizing (larger on phones, not oversized on desktop)
  const isPortrait = H > W;
  const hudH = 48;
  const padX = isPortrait ? 12 : Math.max(20, W * 0.035);
  const padY = isPortrait ? 8 : 16;
  cellSize = Math.min((W - padX * 2) / cols, (H - hudH - padY * 2) / rows);
  if (isPortrait) cellSize *= 1.05;
  cellSize = Math.min(cellSize, isPortrait ? 34 : 40);
  cellSize = Math.max(cellSize, 12);
  offsetX = (W - cols * cellSize) / 2;
  offsetY = hudH + (H - hudH - rows * cellSize) / 2;

  orbsCollected = 0;
  particles = [];
  fireworks = [];
  activePowerups = [];
  powerups = [];
  shakeX = shakeY = shakeVX = shakeVY = 0;
  deathFX = { flash: 0, ring: 0, secondary: false, embersTimer: 0 };
  scatteredSegments = [];

  // Player start
  const px = Math.floor(cols / 2), py = Math.floor(rows / 2);
  player = {
    segments: [{ x: px, y: py }, { x: px - 1, y: py }, { x: px - 2, y: py }],
    prevSegments: [{ x: px, y: py }, { x: px - 1, y: py }, { x: px - 2, y: py }],
    dir: DIR.RIGHT, nextDir: DIR.RIGHT, moveTimer: 0, moveInterval: Math.max(0.085, L.playerInterval * 0.92),
    alive: true, phase: false, magnet: false, boosted: false, turnPulse: 0
  };

  // AI snakes
  aiSnakes = [];
  const aiColors = [
    { h: 0, name: 'red' },
    { h: 120, name: 'green' },
    { h: 300, name: 'magenta' }
  ];
  for (let i = 0; i < L.aiCount; i++) {
    const ax = i % 2 === 0 ? 3 : cols - 4;
    const ay = i < 2 ? 3 : rows - 4;
    aiSnakes.push({
      segments: [{ x: ax, y: ay }, { x: ax - 1, y: ay }, { x: ax - 2, y: ay }],
      prevSegments: [{ x: ax, y: ay }, { x: ax - 1, y: ay }, { x: ax - 2, y: ay }],
      dir: DIR.RIGHT, moveTimer: 0, moveInterval: Math.max(0.075, (0.115 / L.aiSpeed) * 0.92),
      alive: true, respawnTimer: 0, color: aiColors[i],
      lookahead: L.aiLookahead
    });
  }

  // Orbs
  orbs = [];
  spawnOrbs(Math.min(5, L.orbsNeeded));

  // BG particles
  bgParticles = [];
  for (let i = 0; i < 60; i++) {
    bgParticles.push({ x: rand(0, W), y: rand(0, H), vx: rand(-5, 5), vy: rand(-5, 5), size: rand(0.5, 2), alpha: rand(0.1, 0.4) });
  }

  updateHUD();
}

function spawnOrbs(count) {
  for (let i = 0; i < count; i++) {
    let tries = 0, x, y;
    do {
      x = randInt(1, cols - 2); y = randInt(1, rows - 2);
      tries++;
    } while (tries < 100 && isOccupied(x, y));
    orbs.push({ x, y, phase: rand(0, Math.PI * 2) });
  }
}

function isOccupied(x, y) {
  for (const s of player.segments) if (s.x === x && s.y === y) return true;
  for (const ai of aiSnakes) for (const s of ai.segments) if (s.x === x && s.y === y) return true;
  for (const o of orbs) if (o.x === x && o.y === y) return true;
  return false;
}

function spawnPowerup() {
  const L = LEVELS[level];
  if (L.powerups.length === 0) return;
  if (powerups.length >= 2) return;
  if (Math.random() > 0.3) return;
  const type = L.powerups[randInt(0, L.powerups.length - 1)];
  let x, y, tries = 0;
  do { x = randInt(2, cols - 3); y = randInt(2, rows - 3); tries++; } while (tries < 50 && isOccupied(x, y));
  powerups.push({ x, y, type, phase: 0 });
}

// ─── HUD ───
function updateHUD() {
  document.getElementById('h-level').textContent = level + 1;
  document.getElementById('h-len').textContent = player.segments.length;
  document.getElementById('h-orbs').textContent = orbsCollected;
  document.getElementById('h-orbs-need').textContent = LEVELS[level].orbsNeeded;
}

// ─── Input ───
let inputDir = null;
document.addEventListener('keydown', e => {
  if (state === 'menu') return;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': inputDir = DIR.UP; break;
    case 'ArrowDown': case 's': case 'S': inputDir = DIR.DOWN; break;
    case 'ArrowLeft': case 'a': case 'A': inputDir = DIR.LEFT; break;
    case 'ArrowRight': case 'd': case 'D': inputDir = DIR.RIGHT; break;
  }
  e.preventDefault();
});

// Touch / swipe
let touchStart = null;
document.addEventListener('touchstart', e => {
  if (state === 'menu') return;
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (!touchStart || state !== 'playing') return;
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  if (Math.abs(dx) + Math.abs(dy) > 15) {
    if (Math.abs(dx) > Math.abs(dy)) inputDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
    else inputDir = dy > 0 ? DIR.DOWN : DIR.UP;
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
document.addEventListener('touchend', () => { touchStart = null; }, { passive: true });

// Mouse / touch tap steering: click/tap around the snake head to steer
function steerTowardPoint(px, py) {
  if (state !== 'playing' || !player || !player.segments?.length) return;
  const head = player.segments[0];
  const hx = cx(head.x), hy = cy(head.y);
  const dx = px - hx, dy = py - hy;
  if (Math.abs(dx) + Math.abs(dy) < 6) return;
  let d;
  if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? DIR.RIGHT : DIR.LEFT;
  else d = dy > 0 ? DIR.DOWN : DIR.UP;
  // prevent reversing into self
  if (!(d.x === -player.dir.x && d.y === -player.dir.y)) inputDir = d;
}

canvas.addEventListener('mousedown', e => steerTowardPoint(e.clientX, e.clientY));
canvas.addEventListener('pointerdown', e => {
  if (e.pointerType === 'mouse') return;
  steerTowardPoint(e.clientX, e.clientY);
});

// ─── Start ───
startBtn.addEventListener('click', () => {
  initAudio();
  level = 0; score = 0; displayScore = 0;
  initLevel();
  state = 'playing';
  overlay.style.display = 'none';
  hud.style.display = 'flex';
});

function showOverlay(title, sub, btnText) {
  overlay.innerHTML = `<h1>${title}</h1><h2>${sub}</h2><button class="btn" id="retryBtn">${btnText}</button>`;
  overlay.style.display = 'flex';
  document.getElementById('retryBtn').addEventListener('click', () => {
    initAudio();
    if (state === 'win') { level = 0; score = 0; displayScore = 0; }
    if (state === 'gameOver') { score = 0; displayScore = 0; }
    initLevel();
    state = 'playing';
    overlay.style.display = 'none';
    hud.style.display = 'flex';
  });
}

// ─── Cell → pixel ───
function cx(gx) { return offsetX + (gx + 0.5) * cellSize; }
function cy(gy) { return offsetY + (gy + 0.5) * cellSize; }

// ─── Drawing Helpers ───
function drawGlowOrb(x, y, r, coreH, coreS, coreL, glowAlpha) {
  // outer glow
  const g1 = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 2);
  g1.addColorStop(0, `hsla(${coreH},${coreS}%,${coreL}%,${glowAlpha})`);
  g1.addColorStop(1, 'transparent');
  ctx.fillStyle = g1;
  ctx.beginPath(); ctx.arc(x, y, r * 2, 0, Math.PI * 2); ctx.fill();
  // 3D sphere
  const g2 = ctx.createRadialGradient(x - r * 0.25, y - r * 0.25, r * 0.05, x, y, r);
  g2.addColorStop(0, `hsl(${coreH},${coreS}%,${Math.min(coreL + 30, 95)}%)`);
  g2.addColorStop(0.5, `hsl(${coreH},${coreS}%,${coreL}%)`);
  g2.addColorStop(1, `hsl(${coreH},${coreS}%,${Math.max(coreL - 30, 10)}%)`);
  ctx.fillStyle = g2;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // specular highlight
  const g3 = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x - r * 0.2, y - r * 0.2, r * 0.5);
  g3.addColorStop(0, 'rgba(255,255,255,0.6)');
  g3.addColorStop(1, 'transparent');
  ctx.fillStyle = g3;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}

function drawSnake(snake, segs, hue, saturation, lightness, alpha, isPlayer, interpAlpha) {
  const r = cellSize * 0.4;

  // Curved trail ribbon for smoother feel
  if (segs.length > 2) {
    ctx.globalAlpha = alpha * (isPlayer ? 0.24 : 0.14);
    ctx.strokeStyle = isPlayer ? 'rgba(0,255,255,0.9)' : `hsla(${hue},95%,60%,0.85)`;
    ctx.lineWidth = r * (isPlayer ? 1.1 : 0.9);
    ctx.lineCap = 'round';
    ctx.beginPath();
    const p0 = segs[0];
    ctx.moveTo(cx(p0.x), cy(p0.y));
    for (let i = 1; i < segs.length - 1; i++) {
      const p = segs[i], n = segs[i + 1];
      const mx = (cx(p.x) + cx(n.x)) * 0.5;
      const my = (cy(p.y) + cy(n.y)) * 0.5;
      ctx.quadraticCurveTo(cx(p.x), cy(p.y), mx, my);
    }
    const lp = segs[segs.length - 1];
    ctx.lineTo(cx(lp.x), cy(lp.y));
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Trail afterglow
  ctx.globalAlpha = alpha * 0.15;
  for (let i = segs.length - 1; i >= 0; i--) {
    const t = i / segs.length;
    const h = isPlayer ? lerp(180, 270, t) : hue;
    const sz = r * lerp(1, 0.6, t);
    const px = cx(segs[i].x), py = cy(segs[i].y);
    const g = ctx.createRadialGradient(px, py, 0, px, py, sz * 2.5);
    g.addColorStop(0, `hsla(${h},${saturation}%,${lightness}%,0.3)`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(px, py, sz * 2.5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Body segments
  for (let i = segs.length - 1; i >= 1; i--) {
    const t = i / segs.length;
    const h = isPlayer ? lerp(180, 270, t) : hue;
    const sz = r * lerp(1, 0.65, t);
    ctx.globalAlpha = alpha;
    drawGlowOrb(cx(segs[i].x), cy(segs[i].y), sz, h, saturation, lightness, 0.15 * alpha);
    ctx.globalAlpha = 1;
  }

  // Head with subtle bob synced to movement
  const head = segs[0];
  let hx = cx(head.x), hy = cy(head.y);
  const bobAmp = isPlayer ? cellSize * 0.06 : cellSize * 0.035;
  const bob = Math.sin((gameTime * 14) + interpAlpha * Math.PI * 2) * bobAmp;
  hx += -snake.dir.y * bob;
  hy += snake.dir.x * bob;
  const headHue = isPlayer ? 180 : hue;

  if (isPlayer) {
    const pulse = 0.72 + 0.28 * Math.sin(gameTime * 4 + interpAlpha * Math.PI * 2);
    const ga = ctx.createRadialGradient(hx, hy, r * 0.5, hx, hy, r * 3 * pulse);
    ga.addColorStop(0, 'rgba(0,255,255,0.16)');
    ga.addColorStop(1, 'transparent');
    ctx.fillStyle = ga;
    ctx.beginPath(); ctx.arc(hx, hy, r * 3 * pulse, 0, Math.PI * 2); ctx.fill();
  }

  ctx.globalAlpha = alpha;
  drawGlowOrb(hx, hy, r, headHue, saturation, lightness + 10, 0.3 * alpha);
  ctx.globalAlpha = 1;

  const ed = snake.dir;
  const ex = hx + ed.x * r * 0.3, ey = hy + ed.y * r * 0.3;
  ctx.fillStyle = isPlayer ? '#003' : `hsl(${hue},100%,10%)`;
  ctx.beginPath(); ctx.arc(ex, ey, r * 0.25, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex + r * 0.08, ey - r * 0.08, r * 0.1, 0, Math.PI * 2); ctx.fill();
}

// ─── AI Logic ───
function aiMove(ai) {
  // Find nearest orb
  let nearest = null, nearDist = Infinity;
  for (const o of orbs) {
    const d = dist(ai.segments[0], o);
    if (d < nearDist) { nearDist = d; nearest = o; }
  }
  if (!nearest) { nearest = { x: Math.floor(cols / 2), y: Math.floor(rows / 2) }; }

  const head = ai.segments[0];
  let bestDir = ai.dir, bestScore = -Infinity;

  for (const d of DIRS) {
    // Don't reverse
    if (d.x === -ai.dir.x && d.y === -ai.dir.y) continue;
    const nx = head.x + d.x, ny = head.y + d.y;
    // Wall check
    if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
    // Body check with lookahead
    let blocked = false;
    for (const s of player.segments) if (s.x === nx && s.y === ny) blocked = true;
    for (const other of aiSnakes) {
      if (!other.alive) continue;
      for (const s of other.segments) if (s.x === nx && s.y === ny) blocked = true;
    }
    if (blocked) continue;

    // Score: closer to target = better
    const newDist = Math.abs(nx - nearest.x) + Math.abs(ny - nearest.y);
    let sc = -newDist;

    // Lookahead: penalize moves that get close to walls/bodies
    for (let look = 1; look <= ai.lookahead; look++) {
      const lx = nx + d.x * look, ly = ny + d.y * look;
      if (lx < 0 || lx >= cols || ly < 0 || ly >= rows) { sc -= 5; break; }
    }

    if (sc > bestScore) { bestScore = sc; bestDir = d; }
  }
  ai.dir = bestDir;
}

// ─── Update ───
function update(dt) {
  if (state !== 'playing' && state !== 'dying' && state !== 'levelComplete') return;

  // Slow-mo
  if (slowMoTimer > 0) {
    slowMoTimer -= dt;
    slowMoFactor = 0.2;
    if (slowMoTimer <= 0) slowMoFactor = 1;
  }
  const adt = dt * slowMoFactor;
  gameTime += adt;
  gridPhase += adt;

  // Flash fade
  if (flashOpacity > 0) flashOpacity = Math.max(0, flashOpacity - dt * 3);
  flashEl.style.background = flashColor;
  flashEl.style.opacity = flashOpacity;

  // Shake spring
  shakeX += shakeVX * dt; shakeY += shakeVY * dt;
  shakeVX += (-shakeX * 300 - shakeVX * 10) * dt;
  shakeVY += (-shakeY * 300 - shakeVY * 10) * dt;

  // Score animation
  if (displayScore < score) displayScore = Math.min(score, displayScore + dt * 800);
  document.getElementById('h-score').textContent = Math.floor(displayScore);

  // BG particles
  for (const p of bgParticles) {
    p.x += p.vx * adt; p.y += p.vy * adt;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * adt; p.y += p.vy * adt;
    p.vy += 80 * adt; // gravity
    p.life -= adt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Fireworks
  for (let i = fireworks.length - 1; i >= 0; i--) {
    const f = fireworks[i];
    f.timer -= dt;
    if (f.timer <= 0) {
      fireworks.splice(i, 1);
    } else if (Math.random() < 0.3) {
      const a = Math.random() * Math.PI * 2;
      const s = rand(30, 120);
      particles.push({ x: f.x, y: f.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60,
        life: rand(0.5, 1.2), maxLife: 1.2, color: f.color, size: rand(2, 4) });
    }
  }

  // Power-up timers
  for (let i = activePowerups.length - 1; i >= 0; i--) {
    activePowerups[i].timer -= adt;
    if (activePowerups[i].timer <= 0) {
      const t = activePowerups[i].type;
      if (t === 'phase') player.phase = false;
      if (t === 'magnet') player.magnet = false;
      if (t === 'speed') player.boosted = false;
      activePowerups.splice(i, 1);
    }
  }
  if (player?.turnPulse > 0) player.turnPulse = Math.max(0, player.turnPulse - adt * 2.6);

  // Scattered death segment motion
  for (let i = scatteredSegments.length - 1; i >= 0; i--) {
    const s = scatteredSegments[i];
    s.x += s.vx * adt;
    s.y += s.vy * adt;
    s.vx *= Math.exp(-2.8 * adt);
    s.vy = s.vy * Math.exp(-2.0 * adt) + 110 * adt;
    s.life -= adt;
    if (s.life <= 0) scatteredSegments.splice(i, 1);
  }

  if (state === 'dying') {
    deathTimer -= dt;
    deathFX.flash = Math.max(0, deathFX.flash - dt * 3.6);
    deathFX.ring += dt * 3.8;
    deathFX.embersTimer -= dt;
    if (deathFX.embersTimer > 0 && Math.random() < 0.9) {
      const h = player?.segments?.[0] || { x: cols / 2, y: rows / 2 };
      particles.push({
        x: cx(h.x) + rand(-cellSize, cellSize), y: cy(h.y) + rand(-cellSize, cellSize),
        vx: rand(-30, 30), vy: rand(-95, -30),
        life: rand(0.8, 1.25), maxLife: 1.25, color: Math.random() < 0.5 ? '#ff9a44' : '#ff3ea5', size: rand(1.2, 2.6), sparkle: true
      });
    }
    if (deathTimer <= 0) {
      state = 'gameOver';
      showOverlay('GAME OVER', `SCORE: ${score}`, '↻ RETRY');
    }
    return;
  }

  if (state === 'levelComplete') {
    levelTransTimer -= dt;
    if (levelTransTimer <= 0) {
      level++;
      if (level >= LEVELS.length) {
        state = 'win';
        showOverlay('VICTORY', `FINAL SCORE: ${score}`, '▶ PLAY AGAIN');
      } else {
        initLevel();
        state = 'playing';
      }
    }
    return;
  }

  // ─── Playing ───
  // Magnet effect
  if (player.magnet) {
    const head = player.segments[0];
    for (const o of orbs) {
      const dx = head.x - o.x, dy = head.y - o.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 6 && d > 0.5) {
        // Move orb toward player
        if (Math.abs(dx) > Math.abs(dy)) {
          o.x += Math.sign(dx);
        } else {
          o.y += Math.sign(dy);
        }
        o.x = Math.max(0, Math.min(cols - 1, o.x));
        o.y = Math.max(0, Math.min(rows - 1, o.y));
      }
    }
  }

  // Player movement
  if (inputDir) {
    // Prevent 180 reversal
    if (!(inputDir.x === -player.dir.x && inputDir.y === -player.dir.y)) {
      player.nextDir = inputDir;
    }
  }

  const moveSpeed = player.boosted ? player.moveInterval * 0.5 : player.moveInterval;
  player.moveTimer += adt;
  if (player.moveTimer >= moveSpeed) {
    player.moveTimer -= moveSpeed;
    const oldDir = player.dir;
    player.dir = player.nextDir;
    player.prevSegments = cloneSegments(player.segments);
    const head = player.segments[0];

    // impact sparks on sharp turns
    if (oldDir.x !== player.dir.x || oldDir.y !== player.dir.y) {
      const hx = cx(head.x), hy = cy(head.y);
      player.turnPulse = 1;
      for (let i = 0; i < 12; i++) {
        const a = Math.atan2(player.dir.y, player.dir.x) + Math.PI + rand(-0.95, 0.95);
        particles.push({
          x: hx, y: hy,
          vx: Math.cos(a) * rand(45, 160), vy: Math.sin(a) * rand(45, 160),
          life: rand(0.2, 0.46), maxLife: 0.46,
          color: i % 2 ? '#4ff' : '#f6f', size: rand(1.4, 3.1), sparkle: i % 3 === 0
        });
      }
    }

    const nx = head.x + player.dir.x, ny = head.y + player.dir.y;

    // Wall collision
    if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) {
      killPlayer(); return;
    }
    // Self collision
    for (let i = 1; i < player.segments.length; i++) {
      if (player.segments[i].x === nx && player.segments[i].y === ny) {
        killPlayer(); return;
      }
    }
    // AI body collision
    if (!player.phase) {
      for (const ai of aiSnakes) {
        if (!ai.alive) continue;
        for (const s of ai.segments) {
          if (s.x === nx && s.y === ny) { killPlayer(); return; }
        }
      }
    }

    // Move
    player.segments.unshift({ x: nx, y: ny });
    let ate = false;

    // Orb collision
    for (let i = orbs.length - 1; i >= 0; i--) {
      if (orbs[i].x === nx && orbs[i].y === ny) {
        ate = true;
        const ox = cx(orbs[i].x), oy = cy(orbs[i].y);
        spawnParticles(ox, oy, '#ffdd00', 15, 80, 0.5);
        orbs.splice(i, 1);
        score += 100;
        orbsCollected++;
        playCollect();
        screenFlash('#ffdd00', 0.15);
        // Spawn replacement orb
        if (orbsCollected < LEVELS[level].orbsNeeded) {
          spawnOrbs(1);
          if (Math.random() < 0.15) spawnPowerup();
        }
        break;
      }
    }

    // Powerup collision
    for (let i = powerups.length - 1; i >= 0; i--) {
      if (powerups[i].x === nx && powerups[i].y === ny) {
        const pu = powerups[i];
        powerups.splice(i, 1);
        playPowerUp();
        screenFlash(pu.type === 'speed' ? '#4488ff' : pu.type === 'phase' ? '#bb44ff' : '#ffdd44', 0.2);
        spawnParticles(cx(nx), cy(ny), pu.type === 'speed' ? '#48f' : pu.type === 'phase' ? '#b4f' : '#fd4', 20, 100, 0.6);
        const dur = pu.type === 'magnet' ? 8 : 5;
        activePowerups.push({ type: pu.type, timer: dur, maxTime: dur });
        if (pu.type === 'phase') player.phase = true;
        if (pu.type === 'magnet') player.magnet = true;
        if (pu.type === 'speed') player.boosted = true;
        score += 200;
        ate = true;
        break;
      }
    }

    if (!ate) player.segments.pop();
    updateHUD();

    // Level complete check
    if (orbsCollected >= LEVELS[level].orbsNeeded) {
      state = 'levelComplete';
      levelTransTimer = 2.5;
      playLevelComplete();
      // Fireworks
      for (let i = 0; i < 5; i++) {
        fireworks.push({
          x: rand(offsetX + cellSize * 2, offsetX + cols * cellSize - cellSize * 2),
          y: rand(offsetY + cellSize * 2, offsetY + rows * cellSize - cellSize * 2),
          color: hsl(rand(0, 360), 100, 60), timer: rand(1, 2.5)
        });
      }
    }
  }

  // AI movement
  for (const ai of aiSnakes) {
    if (!ai.alive) {
      ai.respawnTimer -= adt;
      if (ai.respawnTimer <= 0) {
        const sx = randInt(1, cols - 2), sy = randInt(1, rows - 2);
        ai.segments = [{ x: sx, y: sy }, { x: sx - 1, y: sy }, { x: sx - 2, y: sy }];
        ai.prevSegments = cloneSegments(ai.segments);
        ai.alive = true;
        ai.dir = DIR.RIGHT;
      }
      continue;
    }

    ai.moveTimer += adt;
    if (ai.moveTimer >= ai.moveInterval) {
      ai.moveTimer -= ai.moveInterval;
      aiMove(ai);
      ai.prevSegments = cloneSegments(ai.segments);
      const head = ai.segments[0];
      const nx = head.x + ai.dir.x, ny = head.y + ai.dir.y;

      // Wall death
      if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) {
        killAI(ai); continue;
      }
      // Player body collision
      for (const s of player.segments) {
        if (s.x === nx && s.y === ny) { killAI(ai); continue; }
      }
      // Other AI collision
      let dead = false;
      for (const other of aiSnakes) {
        if (other === ai || !other.alive) continue;
        for (const s of other.segments) {
          if (s.x === nx && s.y === ny) { dead = true; break; }
        }
      }
      if (dead) { killAI(ai); continue; }

      ai.segments.unshift({ x: nx, y: ny });
      let ateOrb = false;
      for (let i = orbs.length - 1; i >= 0; i--) {
        if (orbs[i].x === nx && orbs[i].y === ny) {
          ateOrb = true;
          orbs.splice(i, 1);
          spawnOrbs(1); // replace so player can still collect enough
          break;
        }
      }
      if (!ateOrb) ai.segments.pop();
      // Cap AI length
      if (ai.segments.length > 12) ai.segments.pop();
    }
  }
}

function spawnDeathBurst(x, y, power = 1) {
  // 3-layer burst: chunks, sparks, glitter
  for (let i = 0; i < 52; i++) {
    const a = rand(0, Math.PI * 2), s = rand(120, 270) * power;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.45, 0.9), maxLife: 0.9, color: i % 2 ? '#88ffff' : '#ff66dd', size: rand(4, 8) });
  }
  for (let i = 0; i < 64; i++) {
    const a = rand(0, Math.PI * 2), s = rand(160, 360) * power;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40, life: rand(0.5, 1.0), maxLife: 1.0, color: i % 3 ? '#00f5ff' : '#ff38c7', size: rand(2.1, 4.5), sparkle: i % 5 === 0 });
  }
  for (let i = 0; i < 82; i++) {
    const a = rand(0, Math.PI * 2), s = rand(120, 420) * power;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60, life: rand(0.65, 1.25), maxLife: 1.25, color: i % 2 ? '#ffffff' : '#9fffff', size: rand(0.8, 2.2), sparkle: true });
  }
}

function createDeathExplosion() {
  const head = player.segments[0];
  const hx = cx(head.x), hy = cy(head.y);
  deathFX.flash = 1;
  deathFX.ring = 0;
  deathFX.secondary = false;
  deathFX.embersTimer = 1.2;

  // Stage B immediate burst
  spawnDeathBurst(hx, hy, 1);

  // Stage D embers seeded around corpse
  for (let i = 0; i < 70; i++) {
    particles.push({
      x: hx + rand(-cellSize * 0.7, cellSize * 0.7), y: hy + rand(-cellSize * 0.7, cellSize * 0.7),
      vx: rand(-65, 65), vy: rand(-120, -30), life: rand(0.8, 1.25), maxLife: 1.25,
      color: i % 2 ? '#ff7d45' : '#ffd37a', size: rand(1.2, 2.8), sparkle: true
    });
  }

  // Player segment scattering with glow decay
  scatteredSegments = player.segments.map((s, idx) => {
    const px = cx(s.x), py = cy(s.y);
    const away = { x: s.x - head.x, y: s.y - head.y };
    const ang = Math.atan2(away.y + rand(-0.3, 0.3), away.x + rand(-0.3, 0.3));
    const speed = rand(60, 230) + idx * 8;
    return {
      x: px, y: py,
      vx: Math.cos(ang) * speed + rand(-50, 50),
      vy: Math.sin(ang) * speed + rand(-120, -10),
      life: rand(0.85, 1.2), maxLife: 1.2,
      size: cellSize * lerp(0.2, 0.42, 1 - idx / Math.max(1, player.segments.length)),
      hue: lerp(180, 300, idx / Math.max(1, player.segments.length - 1))
    };
  });

  // Stage C secondary burst (~120ms)
  setTimeout(() => {
    if (state !== 'dying') return;
    deathFX.secondary = true;
    spawnDeathBurst(hx + rand(-10, 10), hy + rand(-10, 10), 0.85);
    shakeVX += rand(-500, 500);
    shakeVY += rand(-500, 500);
  }, 120);
}

function killPlayer() {
  player.alive = false;
  state = 'dying';
  deathTimer = deathExplosionDelay;
  slowMoTimer = 0.34;
  playDeath();
  screenFlash('#fff', 0.72);
  shakeVX = rand(-520, 520); shakeVY = rand(-520, 520);
  createDeathExplosion();
}

function killAI(ai) {
  ai.alive = false;
  ai.respawnTimer = 5;
  const c = hsl(ai.color.h, 100, 60);
  for (const s of ai.segments) {
    spawnParticles(cx(s.x), cy(s.y), c, 8, 120, 0.7);
  }
}

// ─── Draw ───
function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Clear
  ctx.fillStyle = '#05050a';
  ctx.fillRect(0, 0, W, H);

  // Vignette
  const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // BG particles (dust)
  for (const p of bgParticles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = '#88ccff';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Skip game rendering if not in game state
  if (state !== 'playing' && state !== 'dying' && state !== 'levelComplete') {
    ctx.restore();
    ctx.globalAlpha = 1;
    return;
  }

  // Arena grid
  const gAlpha = 0.06 + 0.02 * Math.sin(gridPhase * 1.5);
  ctx.strokeStyle = `rgba(0,255,255,${gAlpha})`;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= cols; x++) {
    ctx.beginPath();
    ctx.moveTo(offsetX + x * cellSize, offsetY);
    ctx.lineTo(offsetX + x * cellSize, offsetY + rows * cellSize);
    ctx.stroke();
  }
  for (let y = 0; y <= rows; y++) {
    ctx.beginPath();
    ctx.moveTo(offsetX, offsetY + y * cellSize);
    ctx.lineTo(offsetX + cols * cellSize, offsetY + y * cellSize);
    ctx.stroke();
  }

  // Arena border glow
  const bw = cols * cellSize, bh = rows * cellSize;
  ctx.shadowColor = '#a020f0';
  ctx.shadowBlur = 25;
  ctx.strokeStyle = `rgba(160,32,240,${0.4 + 0.15 * Math.sin(gameTime * 2)})`;
  ctx.lineWidth = 2;
  ctx.strokeRect(offsetX, offsetY, bw, bh);
  ctx.shadowBlur = 0;

  // Second border layer (magenta)
  ctx.shadowColor = '#ff20a0';
  ctx.shadowBlur = 15;
  ctx.strokeStyle = `rgba(255,32,160,${0.2 + 0.1 * Math.sin(gameTime * 3)})`;
  ctx.lineWidth = 1;
  ctx.strokeRect(offsetX - 2, offsetY - 2, bw + 4, bh + 4);
  ctx.shadowBlur = 0;

  // Orbs
  for (const o of orbs) {
    const ox = cx(o.x), oy = cy(o.y);
    const r = cellSize * 0.35 * (1 + 0.08 * Math.sin(gameTime * 3 + o.phase));

    // Ambient sparkles
    if (Math.random() < 0.15) {
      spawnSparkle(ox + rand(-cellSize * 0.5, cellSize * 0.5), oy + rand(-cellSize * 0.5, cellSize * 0.5), '#ffee88');
    }

    drawGlowOrb(ox, oy, r, 45, 100, 60, 0.25);

    // Rotating highlight (3D spin illusion)
    const ha = gameTime * 2.5 + o.phase;
    const hx2 = ox + Math.cos(ha) * r * 0.4;
    const hy2 = oy + Math.sin(ha) * r * 0.2 - r * 0.15;
    const hlg = ctx.createRadialGradient(hx2, hy2, 0, hx2, hy2, r * 0.35);
    hlg.addColorStop(0, 'rgba(255,255,200,0.7)');
    hlg.addColorStop(1, 'transparent');
    ctx.fillStyle = hlg;
    ctx.beginPath(); ctx.arc(hx2, hy2, r * 0.35, 0, Math.PI * 2); ctx.fill();
  }

  // Powerups
  for (const pu of powerups) {
    const px2 = cx(pu.x), py2 = cy(pu.y);
    const r = cellSize * 0.4 * (1 + 0.1 * Math.sin(gameTime * 4));
    let puH, puIcon;
    if (pu.type === 'speed') { puH = 220; puIcon = '⚡'; }
    else if (pu.type === 'phase') { puH = 280; puIcon = '👻'; }
    else { puH = 50; puIcon = '🧲'; }

    drawGlowOrb(px2, py2, r, puH, 100, 55, 0.3);

    // Icon
    ctx.font = `${cellSize * 0.45}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(puIcon, px2, py2);
  }

  // AI snakes (interpolated)
  for (const ai of aiSnakes) {
    if (!ai.alive) continue;
    const aiAlpha = clamp(ai.moveTimer / ai.moveInterval, 0, 1);
    const aiSegs = getInterpSegments(ai, aiAlpha);
    drawSnake(ai, aiSegs, ai.color.h, 90, 55, 0.72, false, aiAlpha);
  }

  // Player snake (interpolated)
  if (player.alive || state === 'dying') {
    const playerMove = player.boosted ? player.moveInterval * 0.5 : player.moveInterval;
    const interpAlpha = clamp(player.moveTimer / playerMove, 0, 1);
    const segs = getInterpSegments(player, interpAlpha);
    const alpha = state === 'dying' ? Math.max(0, deathTimer / deathExplosionDelay) : 1;

    if (player.alive) {
      if (player.boosted) {
        const head = segs[0];
        for (let i = 0; i < 2; i++) {
          const a = Math.atan2(player.dir.y, player.dir.x) + Math.PI + rand(-0.45, 0.45);
          particles.push({
            x: cx(head.x), y: cy(head.y), vx: Math.cos(a) * rand(90, 165), vy: Math.sin(a) * rand(90, 165),
            life: 0.18, maxLife: 0.18, color: '#4af', size: rand(1, 2)
          });
        }
      }
      if (player.phase) {
        const head = segs[0];
        if (Math.random() < 0.45) {
          particles.push({
            x: cx(head.x) + rand(-10, 10), y: cy(head.y) + rand(-10, 10),
            vx: rand(-20, 20), vy: rand(-30, -10), life: 0.4, maxLife: 0.4,
            color: '#b4f', size: rand(2, 4)
          });
        }
      }
      if (player.magnet) {
        const head = segs[0];
        const mr = cellSize * 6;
        const mg = ctx.createRadialGradient(cx(head.x), cy(head.y), 0, cx(head.x), cy(head.y), mr);
        mg.addColorStop(0, 'rgba(255,220,50,0.06)');
        mg.addColorStop(1, 'transparent');
        ctx.fillStyle = mg;
        ctx.beginPath(); ctx.arc(cx(head.x), cy(head.y), mr, 0, Math.PI * 2); ctx.fill();
      }
      drawSnake(player, segs, 180, 100, 60, alpha, true, interpAlpha);

      if (player.turnPulse > 0) {
        const head = segs[0];
        const tr = cellSize * (1 + player.turnPulse * 0.65);
        const tg = ctx.createRadialGradient(cx(head.x), cy(head.y), tr * 0.2, cx(head.x), cy(head.y), tr);
        tg.addColorStop(0, `rgba(255,255,255,${0.35 * player.turnPulse})`);
        tg.addColorStop(1, 'transparent');
        ctx.fillStyle = tg;
        ctx.beginPath(); ctx.arc(cx(head.x), cy(head.y), tr, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  // Scattered body shards during death
  for (const s of scatteredSegments) {
    const a = s.life / s.maxLife;
    ctx.globalAlpha = a;
    drawGlowOrb(s.x, s.y, s.size * a, s.hue, 95, 60, 0.35 * a);
  }
  ctx.globalAlpha = 1;

  if (state === 'dying' && player?.segments?.length) {
    const head = player.segments[0];
    const hx = cx(head.x), hy = cy(head.y);

    // Stage A: white core flash
    if (deathFX.flash > 0) {
      const fr = cellSize * (1.6 + (1 - deathFX.flash) * 2.2);
      const fg = ctx.createRadialGradient(hx, hy, 0, hx, hy, fr * 2.5);
      fg.addColorStop(0, `rgba(255,255,255,${0.95 * deathFX.flash})`);
      fg.addColorStop(0.28, `rgba(140,255,255,${0.55 * deathFX.flash})`);
      fg.addColorStop(1, 'transparent');
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.arc(hx, hy, fr * 2.5, 0, Math.PI * 2); ctx.fill();
    }

    // Stage A: cyan/magenta shockwave ring
    const ringR = cellSize * (1.2 + deathFX.ring * 6.2);
    const ringA = clamp(1 - deathFX.ring * 0.42, 0, 0.85);
    if (ringA > 0.01) {
      ctx.lineWidth = cellSize * 0.25;
      const rg = ctx.createLinearGradient(hx - ringR, hy, hx + ringR, hy);
      rg.addColorStop(0, `rgba(0,255,255,${ringA})`);
      rg.addColorStop(1, `rgba(255,0,200,${ringA})`);
      ctx.strokeStyle = rg;
      ctx.beginPath(); ctx.arc(hx, hy, ringR, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // Particles
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    if (p.sparkle) {
      ctx.fillStyle = p.color;
      const sz = p.size * a;
      ctx.fillRect(p.x - sz / 2, p.y - sz / 2, sz, sz);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Scanline overlay
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }

  // Level complete text
  if (state === 'levelComplete') {
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 36px sans-serif';
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
    const a2 = Math.min(1, (2.5 - levelTransTimer) * 2);
    ctx.globalAlpha = a2;
    ctx.fillText(level < LEVELS.length - 1 ? `LEVEL ${level + 1} COMPLETE!` : 'ALL LEVELS COMPLETE!', W / 2, H / 2);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  ctx.restore();

  // Power-up indicator
  if (activePowerups.length > 0) {
    puCanvas.style.display = 'block';
    puCtx.clearRect(0, 0, 60, 60);
    const pu = activePowerups[0];
    const frac = pu.timer / pu.maxTime;
    puCtx.strokeStyle = pu.type === 'speed' ? '#4af' : pu.type === 'phase' ? '#b4f' : '#fd4';
    puCtx.lineWidth = 4;
    puCtx.beginPath();
    puCtx.arc(30, 30, 24, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
    puCtx.stroke();
    puCtx.font = '20px sans-serif';
    puCtx.textAlign = 'center'; puCtx.textBaseline = 'middle';
    puCtx.fillText(pu.type === 'speed' ? '⚡' : pu.type === 'phase' ? '👻' : '🧲', 30, 30);
  } else {
    puCanvas.style.display = 'none';
  }
}

// ─── Main Loop ───
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  resize(); // handle dynamic resize
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
