<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Neon Tinkerer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100vw;height:100vh;image-rendering:pixelated}  </style>
</head>
<body>
  <canvas id="game" width="800" height="600"></canvas>
  <script>
// Neon Tinkerer - full game
(function(){
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Internal resolution
const GW = 800, GH = 600;
canvas.width = GW; canvas.height = GH;

// ---- STATE ----
const STATE = {TITLE:0, HOW:1, PLAYING:2, WIN:3, LOSE:4};
let state = STATE.TITLE;
let level = 1;
let score = 0;
let partsCollected = 0;
let partsNeeded = 5;
let atWorkbench = false;
let assembleTimer = 0;
let playerResetFlash = 0;
let time = 0;

// ---- KEYS ----
let keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); });
window.addEventListener('keyup', e => keys[e.key] = false);

// ---- PLAYER ----
let player = {x:0, y:0, w:22, h:22, speed:180};

// ---- LEVEL DATA ----
let walls = [];
let parts = [];
let workbench = {x:0, y:0, w:0, h:0};
let lasers = [];

function loadLevel(n) {
  walls = [];
  parts = [];
  lasers = [];
  partsCollected = 0;
  assembleTimer = 0;
  playerResetFlash = 0;
  particles = [];
  ripples = [];

  if (n === 1) {
    partsNeeded = 5;
    player.x = 60; player.y = 60;
    // Outer boundary walls
    walls.push({x:0,y:0,w:GW,h:12});       // top
    walls.push({x:0,y:GH-12,w:GW,h:12});   // bottom
    walls.push({x:0,y:0,w:12,h:GH});        // left
    walls.push({x:GW-12,y:0,w:12,h:GH});   // right
    // Interior walls
    walls.push({x:200,y:100,w:16,h:200});
    walls.push({x:400,y:0,w:16,h:180});
    walls.push({x:500,y:250,w:200,h:16});
    walls.push({x:300,y:400,w:16,h:200});
    walls.push({x:550,y:400,w:16,h:120});
    // Workbench
    workbench = {x:620,y:440,w:60,h:60};
    // Parts
    parts = [
      {x:120,y:300,w:14,h:14,collected:false},
      {x:350,y:150,w:14,h:14,collected:false},
      {x:500,y:100,w:14,h:14,collected:false},
      {x:700,y:200,w:14,h:14,collected:false},
      {x:450,y:500,w:14,h:14,collected:false},
    ];
  } else if (n === 2) {
    partsNeeded = 8;
    player.x = 60; player.y = 60;
    // Outer boundary
    walls.push({x:0,y:0,w:GW,h:12});
    walls.push({x:0,y:GH-12,w:GW,h:12});
    walls.push({x:0,y:0,w:12,h:GH});
    walls.push({x:GW-12,y:0,w:12,h:GH});
    // Interior maze walls
    walls.push({x:150,y:80,w:16,h:250});
    walls.push({x:150,y:80,w:200,h:16});
    walls.push({x:300,y:200,w:16,h:200});
    walls.push({x:450,y:80,w:16,h:160});
    walls.push({x:450,y:80,w:200,h:16});
    walls.push({x:550,y:300,w:16,h:200});
    walls.push({x:200,y:450,w:300,h:16});
    walls.push({x:650,y:200,w:16,h:150});
    walls.push({x:100,y:400,w:100,h:16});
    // Workbench
    workbench = {x:680,y:500,w:60,h:60};
    // Parts
    parts = [
      {x:80,y:200,w:14,h:14,collected:false},
      {x:250,y:140,w:14,h:14,collected:false},
      {x:380,y:300,w:14,h:14,collected:false},
      {x:500,y:150,w:14,h:14,collected:false},
      {x:700,y:120,w:14,h:14,collected:false},
      {x:620,y:400,w:14,h:14,collected:false},
      {x:200,y:520,w:14,h:14,collected:false},
      {x:450,y:520,w:14,h:14,collected:false},
    ];
    // Laser hazards (horizontal beams that sweep)
    lasers.push({x1:170,y:180,x2:290,dir:1,speed:100,pos:170});
    lasers.push({x1:470,y:250,x2:640,dir:-1,speed:130,pos:640});
    lasers.push({x1:320,y:480,x2:540,dir:1,speed:90,pos:320});
  }
}

// ---- TOUCH ----
let joy = {active:false, startX:0, startY:0, curX:0, curY:0, dx:0, dy:0};
let tapRight = false;
let ripples = [];

function canvasPos(tx, ty) {
  const r = canvas.getBoundingClientRect();
  return { x: (tx - r.left) * (GW / r.width), y: (ty - r.top) * (GH / r.height) };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const r = canvas.getBoundingClientRect();
    const cx = t.clientX - r.left;
    // Add ripple
    const gp = canvasPos(t.clientX, t.clientY);
    ripples.push({x:gp.x, y:gp.y, r:0, maxR:50, alpha:0.8});

    if (state === STATE.TITLE) { state = STATE.HOW; return; }
    if (state === STATE.HOW) { state = STATE.PLAYING; loadLevel(level); return; }
    if (state === STATE.WIN || state === STATE.LOSE) {
      // Check restart area
      state = STATE.TITLE; level = 1; score = 0; return;
    }
    if (cx < r.width / 2) {
      // Left half: joystick
      joy.active = true;
      joy.startX = t.clientX; joy.startY = t.clientY;
      joy.curX = t.clientX; joy.curY = t.clientY;
    } else {
      // Right half: interact
      tapRight = true;
    }
  }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (joy.active) {
      joy.curX = t.clientX; joy.curY = t.clientY;
    }
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  joy.active = false;
  joy.dx = 0; joy.dy = 0;
  tapRight = false;
}, {passive:true});

// Mouse click for desktop
canvas.addEventListener('click', e => {
  if (state === STATE.TITLE) { state = STATE.HOW; return; }
  if (state === STATE.HOW) { state = STATE.PLAYING; loadLevel(level); return; }
  if (state === STATE.WIN || state === STATE.LOSE) { state = STATE.TITLE; level = 1; score = 0; return; }
});

// ---- PARTICLES ----
let particles = [];

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 30 + Math.random() * 80;
    const life = 0.4 + Math.random() * 0.4;
    particles.push({
      x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life, maxLife: life,
      size: 2 + Math.random()*3, color
    });
  }
}

// ---- COLLISION ----
function rectOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function moveWithCollision(entity, dx, dy, dt) {
  // Move X
  const nx = entity.x + dx * entity.speed * dt;
  const testX = {x:nx, y:entity.y, w:entity.w, h:entity.h};
  let blockedX = false;
  for (const w of walls) { if (rectOverlap(testX, w)) { blockedX = true; break; } }
  if (!blockedX) entity.x = nx;

  // Move Y
  const ny = entity.y + dy * entity.speed * dt;
  const testY = {x:entity.x, y:ny, w:entity.w, h:entity.h};
  let blockedY = false;
  for (const w of walls) { if (rectOverlap(testY, w)) { blockedY = true; break; } }
  if (!blockedY) entity.y = ny;

  // Clamp to bounds
  entity.x = Math.max(0, Math.min(GW - entity.w, entity.x));
  entity.y = Math.max(0, Math.min(GH - entity.h, entity.y));
}

// ---- UPDATE ----
function update(dt) {
  time += dt;

  // Update ripples
  for (let i = ripples.length-1; i >= 0; i--) {
    ripples[i].r += 120 * dt;
    ripples[i].alpha -= 1.5 * dt;
    if (ripples[i].alpha <= 0) ripples.splice(i, 1);
  }

  // Update particles always (for win/lose screen effects)
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (state !== STATE.PLAYING) return;

  // Input
  let dx = 0, dy = 0;
  if (keys.ArrowLeft || keys.a) dx = -1;
  if (keys.ArrowRight || keys.d) dx = 1;
  if (keys.ArrowUp || keys.w) dy = -1;
  if (keys.ArrowDown || keys.s) dy = 1;

  // Joystick
  if (joy.active) {
    const jdx = joy.curX - joy.startX;
    const jdy = joy.curY - joy.startY;
    const dist = Math.hypot(jdx, jdy);
    if (dist > 10) {
      dx += jdx / dist;
      dy += jdy / dist;
    }
  }

  // Normalize and move
  if (dx || dy) {
    const len = Math.hypot(dx, dy) || 1;
    moveWithCollision(player, dx/len, dy/len, dt);
    // Particle trail
    if (Math.random() < 0.4) {
      spawnParticles(player.x + player.w/2, player.y + player.h/2, '#00ffd5', 1);
    }
  }

  // Flash timer
  if (playerResetFlash > 0) playerResetFlash -= dt;

  // Pickup parts
  for (let p of parts) {
    if (!p.collected && rectOverlap(player, p)) {
      p.collected = true;
      partsCollected++;
      score += 100;
      spawnParticles(p.x + p.w/2, p.y + p.h/2, '#ffaa33', 12);
    }
  }

  // Workbench interaction
  atWorkbench = rectOverlap(player, workbench);
  if (atWorkbench && partsCollected >= partsNeeded) {
    // Auto-assemble or press interact
    if (keys[' '] || keys.Enter || tapRight) {
      assembleTimer += dt;
      if (assembleTimer >= 1.0) {
        // Level complete
        score += 500;
        spawnParticles(workbench.x+workbench.w/2, workbench.y+workbench.h/2, '#ff00ff', 25);
        if (level === 1) {
          level = 2;
          loadLevel(2);
        } else {
          state = STATE.WIN;
        }
      }
    } else {
      assembleTimer = Math.max(0, assembleTimer - dt * 2);
    }
  } else {
    assembleTimer = Math.max(0, assembleTimer - dt * 2);
  }

  // Update lasers (level 2)
  for (let l of lasers) {
    l.pos += l.dir * l.speed * dt;
    if (l.pos <= l.x1) { l.pos = l.x1; l.dir = 1; }
    if (l.pos >= l.x2) { l.pos = l.x2; l.dir = -1; }

    // Check laser hit (beam is vertical line at l.pos, height ~20px around l.y)
    const laserRect = {x: l.pos - 3, y: l.y - 10, w: 6, h: 20};
    if (rectOverlap(player, laserRect)) {
      // Reset player
      player.x = 60; player.y = 60;
      playerResetFlash = 0.5;
      score = Math.max(0, score - 50);
      spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff3355', 15);
    }
  }

}

// ---- DRAW HELPERS ----
function drawGlow(x, y, w, h, color, glowSize) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = glowSize;
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  ctx.restore();
}

function drawTextCenter(text, y, size, color, glow) {
  ctx.save();
  ctx.font = size + 'px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (glow) { ctx.shadowColor = color; ctx.shadowBlur = glow; }
  ctx.fillStyle = color;
  ctx.fillText(text, GW/2, y);
  ctx.restore();
}

// ---- DRAW ----
function draw() {
  ctx.clearRect(0, 0, GW, GH);

  // Background
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, GW, GH);

  // Grid
  ctx.strokeStyle = 'rgba(0,255,200,0.04)';
  ctx.lineWidth = 1;
  const gs = 40;
  for (let x = 0; x < GW; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GH); ctx.stroke(); }
  for (let y = 0; y < GH; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GW,y); ctx.stroke(); }

  // Ripples
  for (const rp of ripples) {
    ctx.save();
    ctx.strokeStyle = 'rgba(0,255,210,' + rp.alpha + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  if (state === STATE.TITLE) {
    drawTitle();
    return;
  }
  if (state === STATE.HOW) {
    drawHowTo();
    return;
  }
  if (state === STATE.WIN) {
    drawWin();
    return;
  }
  if (state === STATE.LOSE) {
    drawLose();
    return;
  }

  // ---- PLAYING ----
  // Walls
  for (const w of walls) {
    drawGlow(w.x, w.y, w.w, w.h, '#1a4060', 6);
    ctx.fillStyle = '#0d3050';
    ctx.fillRect(w.x+1, w.y+1, w.w-2, w.h-2);
  }

  // Workbench (pulsing)
  const pulse = 0.6 + 0.4 * Math.sin(time * 3);
  ctx.save();
  ctx.shadowColor = partsCollected >= partsNeeded ? '#ff00ff' : '#8844ff';
  ctx.shadowBlur = 10 + pulse * 10;
  ctx.fillStyle = partsCollected >= partsNeeded
    ? 'rgba(255,0,255,' + (0.3 + pulse*0.3) + ')'
    : 'rgba(100,50,200,' + (0.2 + pulse*0.2) + ')';
  ctx.fillRect(workbench.x, workbench.y, workbench.w, workbench.h);
  ctx.strokeStyle = partsCollected >= partsNeeded ? '#ff66ff' : '#8866cc';
  ctx.lineWidth = 2;
  ctx.strokeRect(workbench.x, workbench.y, workbench.w, workbench.h);
  ctx.restore();
  // Workbench label
  ctx.save();
  ctx.font = '10px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ccaaff';
  ctx.fillText('WORKBENCH', workbench.x + workbench.w/2, workbench.y - 6);
  ctx.restore();

  // Assemble progress bar
  if (assembleTimer > 0) {
    ctx.fillStyle = '#ff00ff';
    ctx.fillRect(workbench.x, workbench.y - 18, workbench.w * (assembleTimer / 1.0), 6);
    ctx.strokeStyle = '#cc00cc';
    ctx.strokeRect(workbench.x, workbench.y - 18, workbench.w, 6);
  }

  // Parts (with glow)
  for (const p of parts) {
    if (p.collected) continue;
    const partPulse = 0.7 + 0.3 * Math.sin(time * 4 + p.x);
    drawGlow(p.x, p.y, p.w, p.h, 'rgba(255,170,50,' + partPulse + ')', 8);
    ctx.fillStyle = '#ffcc44';
    ctx.fillRect(p.x+2, p.y+2, p.w-4, p.h-4);
  }

  // Lasers
  for (const l of lasers) {
    // Beam track
    ctx.save();
    ctx.strokeStyle = 'rgba(255,0,50,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(l.x1, l.y); ctx.lineTo(l.x2, l.y); ctx.stroke();
    // Beam head
    ctx.shadowColor = '#ff0033';
    ctx.shadowBlur = 15;
    ctx.strokeStyle = '#ff3355';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(l.pos, l.y - 10); ctx.lineTo(l.pos, l.y + 10); ctx.stroke();
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    ctx.restore();
  }

  // Player
  ctx.save();
  if (playerResetFlash > 0) {
    ctx.globalAlpha = 0.3 + 0.7 * Math.abs(Math.sin(time * 20));
  }
  ctx.shadowColor = '#00ffd5';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#00ffd5';
  ctx.fillRect(player.x, player.y, player.w, player.h);
  // Inner detail
  ctx.fillStyle = '#00aa88';
  ctx.fillRect(player.x+4, player.y+4, player.w-8, player.h-8);
  // Eye/visor
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(player.x+6, player.y+6, player.w-12, 4);
  ctx.restore();

  // Joystick indicator
  if (joy.active) {
    const r = canvas.getBoundingClientRect();
    const sx = (joy.startX - r.left) * (GW / r.width);
    const sy = (joy.startY - r.top) * (GH / r.height);
    const cx = (joy.curX - r.left) * (GW / r.width);
    const cy = (joy.curY - r.top) * (GH / r.height);
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#00ffd5';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sx, sy, 40, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#00ffd5';
    ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // HUD
  drawHUD();

  // Workbench prompt
  if (atWorkbench && partsCollected >= partsNeeded) {
    drawTextCenter('HOLD SPACE / TAP RIGHT TO ASSEMBLE', GH - 30, 14, '#ff88ff', 8);
  } else if (atWorkbench && partsCollected < partsNeeded) {
    drawTextCenter('Need ' + (partsNeeded - partsCollected) + ' more parts', GH - 30, 14, '#8866cc', 6);
  }
}

function drawHUD() {
  ctx.save();
  ctx.font = '14px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#aaffee';
  ctx.shadowColor = '#00ffd5';
  ctx.shadowBlur = 4;
  ctx.fillText('LEVEL ' + level, 20, 30);
  ctx.fillText('PARTS: ' + partsCollected + '/' + partsNeeded, 20, 50);
  ctx.fillText('SCORE: ' + score, 20, 70);
  ctx.restore();
}

function drawTitle() {
  // Title
  ctx.save();
  ctx.shadowColor = '#00ffd5';
  ctx.shadowBlur = 20;
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00ffd5';
  ctx.fillText('NEON TINKERER', GW/2, GH/2 - 60);
  ctx.restore();

  // Subtitle
  ctx.save();
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8899aa';
  ctx.fillText('Collect parts. Assemble gadgets. Glow on.', GW/2, GH/2 - 15);
  ctx.restore();

  // Tap to play (blinking)
  const blink = Math.sin(time * 3) > -0.3;
  if (blink) {
    drawTextCenter('TAP TO PLAY', GH/2 + 50, 22, '#ff88ff', 10);
  }

  // Decorative parts
  for (let i = 0; i < 8; i++) {
    const angle = time * 0.5 + i * Math.PI/4;
    const rx = GW/2 + Math.cos(angle) * 140;
    const ry = GH/2 + Math.sin(angle) * 100 - 20;
    drawGlow(rx-5, ry-5, 10, 10, '#ffaa33', 6);
  }
}

function drawHowTo() {
  drawTextCenter('HOW TO PLAY', GH/2 - 100, 28, '#00ffd5', 12);
  ctx.save();
  ctx.font = '15px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aabbcc';
  const lines = [
    'MOVE: Arrow keys / WASD / Left-side joystick',
    'INTERACT: Space / Enter / Tap right side',
    '',
    'Collect all glowing PARTS scattered around the level.',
    'Bring them to the WORKBENCH and hold interact to assemble.',
    '',
    'Watch out for LASER BEAMS in Level 2!',
  ];
  lines.forEach((line, i) => {
    ctx.fillText(line, GW/2, GH/2 - 40 + i * 26);
  });
  ctx.restore();

  const blink = Math.sin(time * 3) > -0.3;
  if (blink) drawTextCenter('TAP TO START', GH/2 + 160, 18, '#ff88ff', 8);
}

function drawWin() {
  drawTextCenter('YOU WIN!', GH/2 - 50, 42, '#00ffd5', 20);
  drawTextCenter('Final Score: ' + score, GH/2 + 10, 22, '#ffaa33', 8);
  // Celebratory particles
  if (Math.random() < 0.3) {
    spawnParticles(Math.random()*GW, Math.random()*GH, '#ff00ff', 2);
  }
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    ctx.restore();
  }
  const blink = Math.sin(time * 3) > -0.3;
  if (blink) drawTextCenter('TAP TO RESTART', GH/2 + 70, 18, '#ff88ff', 8);
}

function drawLose() {
  drawTextCenter('GAME OVER', GH/2 - 40, 38, '#ff3355', 16);
  drawTextCenter('Score: ' + score, GH/2 + 10, 20, '#aabbcc', 6);
  const blink = Math.sin(time * 3) > -0.3;
  if (blink) drawTextCenter('TAP TO RESTART', GH/2 + 60, 18, '#ff88ff', 8);
}

// ---- GAME LOOP ----
let last = performance.now();
function loop(t) {
  const dt = Math.min(0.05, (t - last) / 1000);
  last = t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

console.log('Neon Tinkerer loaded.');
})();
  </script>
</body>
</html>
