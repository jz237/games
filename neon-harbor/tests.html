<h1>Neon Harbor Unit Tests</h1><div id="results"></div>

const log = document.getElementById('results');
let pass=0, fail=0;
function test(name, fn) {
  try { fn(); log.innerHTML += `<div class="pass">✓ ${name}</div>`; pass++; }
  catch(e) { log.innerHTML += `<div class="fail">✗ ${name}: ${e.message}</div>`; fail++; }
}
function assert(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }

// --- Scene01 Tests ---
test('Scene01 exists and has required fields', () => {
  assert(typeof Scene01 === 'object');
  assert(Scene01.name === 'The Docks');
  assert(Scene01.width === 2400);
  assert(Array.isArray(Scene01.layers));
  assert(Array.isArray(Scene01.interactions));
});

test('Scene01 has player start position', () => {
  assert(Scene01.playerStart.x === 100);
  assert(Scene01.playerStart.y === 0);
});

test('Scene01 interactions have valid types', () => {
  const validTypes = ['dialogue', 'shard', 'signature'];
  for (const i of Scene01.interactions) {
    assert(validTypes.includes(i.type), `Invalid type: ${i.type}`);
    assert(typeof i.id === 'string', `Missing id`);
    assert(typeof i.x === 'number', `Missing x`);
  }
});

test('Scene01 dialogue nodes have speaker and text', () => {
  for (const i of Scene01.interactions) {
    if (i.type !== 'dialogue') continue;
    for (const node of i.dialogue) {
      assert(typeof node.speaker === 'string');
      assert(typeof node.text === 'string');
      assert(Array.isArray(node.choices));
    }
  }
});

test('Scene01 choice "next" indices are in range', () => {
  for (const i of Scene01.interactions) {
    if (i.type !== 'dialogue') continue;
    const len = i.dialogue.length;
    for (const node of i.dialogue) {
      for (const ch of node.choices) {
        if (ch.next != null) assert(ch.next < len, `next=${ch.next} >= len=${len}`);
      }
    }
  }
});

test('Scene01 shard/signature have name field', () => {
  for (const i of Scene01.interactions) {
    if (i.type === 'shard' || i.type === 'signature') {
      assert(typeof i.name === 'string', `Missing name on ${i.id}`);
    }
  }
});

test('Scene01 has at least 3 parallax layers', () => {
  assert(Scene01.layers.length >= 3);
});

test('Scene01 layers have render functions', () => {
  for (const l of Scene01.layers) assert(typeof l.render === 'function');
});

test('Scene01 has 2 audio shards', () => {
  const shards = Scene01.interactions.filter(i => i.type === 'shard');
  assert(shards.length === 2, `Expected 2, got ${shards.length}`);
});

test('Scene01 has 2 light signatures', () => {
  const sigs = Scene01.interactions.filter(i => i.type === 'signature');
  assert(sigs.length === 2, `Expected 2, got ${sigs.length}`);
});

  assert(typeof Scene01.exitZones[0].target === 'string');

// --- Vignette Weaving Tests ---
test('Weaving adds to wovenMemories', () => {
  // Simulate: add shard + signature, then check state
  const origShards = [...NeonHarbor.state.audioShards];
  const origSigs = [...NeonHarbor.state.lightSignatures];
  const origWoven = [...NeonHarbor.state.wovenMemories];

  NeonHarbor.state.audioShards.push('shard_dock_ambient');
  NeonHarbor.state.lightSignatures.push('sig_cyan_dock');
  NeonHarbor.state.wovenMemories.push('The First Ships');

  assert(NeonHarbor.state.wovenMemories.includes('The First Ships'), 'Memory not woven');

  // Restore
  NeonHarbor.state.audioShards.length = 0;
  origShards.forEach(s => NeonHarbor.state.audioShards.push(s));
  NeonHarbor.state.lightSignatures.length = 0;
  origSigs.forEach(s => NeonHarbor.state.lightSignatures.push(s));
  NeonHarbor.state.wovenMemories.length = 0;
  origWoven.forEach(m => NeonHarbor.state.wovenMemories.push(m));
});

test('Woven memories count correctly', () => {
  NeonHarbor.state.wovenMemories.push('Test Memory 1', 'Test Memory 2');
  assert(NeonHarbor.state.wovenMemories.length === 2);
  NeonHarbor.state.wovenMemories.length = 0;
});

// --- Ending System Tests ---
test('Ending triggers when all 8 memories woven', () => {
  const origWoven = [...NeonHarbor.state.wovenMemories];
  const origFlags = { ...NeonHarbor.state.flags };
  NeonHarbor._endingTriggered = false;

  // Fill 8 memories
  const memoryNames = [
    'The First Ships', 'The Last Festival', "Mara's Youth", "The Engineers' Descent",
    "The Keeper's Vigil", 'The Original Frequency', 'The Third Frequency', 'The Deep Current'
  ];
  NeonHarbor.state.wovenMemories.length = 0;
  memoryNames.forEach(m => NeonHarbor.state.wovenMemories.push(m));

  const result = NeonHarbor.checkEndingTrigger({ id: 'the_loom_machine', type: 'dialogue' });
  assert(result === true, 'Ending should trigger with 8 woven memories');
  assert(NeonHarbor.endingTriggered === true, 'endingTriggered should be true');

  // Restore
  NeonHarbor.state.wovenMemories.length = 0;
  origWoven.forEach(m => NeonHarbor.state.wovenMemories.push(m));
  Object.keys(NeonHarbor.state.flags).forEach(k => delete NeonHarbor.state.flags[k]);
  Object.assign(NeonHarbor.state.flags, origFlags);
  NeonHarbor._endingTriggered = false;
});

test('Ending does not trigger with fewer than 8 memories', () => {
  NeonHarbor._endingTriggered = false;
  NeonHarbor.state.wovenMemories.length = 0;
  NeonHarbor.state.wovenMemories.push('The First Ships', 'The Last Festival');

  const result = NeonHarbor.checkEndingTrigger({ id: 'the_loom_machine', type: 'dialogue' });
  assert(result === false, 'Ending should not trigger with only 2 memories');

  NeonHarbor.state.wovenMemories.length = 0;
});

  ];
  NeonHarbor.state.wovenMemories.length = 0;

  const result = NeonHarbor.checkEndingTrigger({ id: 'the_architect', type: 'dialogue' });
  assert(result === false, 'Ending should not trigger for non-loom object');

  NeonHarbor.state.wovenMemories.length = 0;
  NeonHarbor._endingTriggered = false;
});

test('Third way ending triggers with correct flags', () => {
  NeonHarbor._endingTriggered = false;
  const memoryNames = [
    'The First Ships', 'The Last Festival', "Mara's Youth", "The Engineers' Descent",
    "The Keeper's Vigil", 'The Original Frequency', 'The Third Frequency', 'The Deep Current'
  ];
  NeonHarbor.state.wovenMemories.length = 0;
  memoryNames.forEach(m => NeonHarbor.state.wovenMemories.push(m));
  NeonHarbor.state.flags.questioned_restoration = true;
  NeonHarbor.state.flags.third_way = true;

  const result = NeonHarbor.checkEndingTrigger({ id: 'the_loom_machine', type: 'dialogue' });
  assert(result === true, 'Third way ending should trigger');
  assert(NeonHarbor.endingTriggered === true);

  // Check the dialogue box shows the third way text
  const dlgText = document.getElementById('dlg-text')?.textContent || '';
  assert(dlgText.includes('violet') || dlgText.includes('third frequency'), 'Should show third way ending text');

  NeonHarbor.state.wovenMemories.length = 0;
  delete NeonHarbor.state.flags.questioned_restoration;
  delete NeonHarbor.state.flags.third_way;
  NeonHarbor._endingTriggered = false;
});

test('Credits overlay appears after ending', () => {

  assert(typeof NeonHarbor.checkEndingTrigger === 'function', 'checkEndingTrigger should exist');
  // Check that endingTriggered is exposed
  assert('endingTriggered' in NeonHarbor, 'endingTriggered should be exposed');
  // Verify credits overlay is not present at start
  const existing = document.getElementById('credits-overlay');
  assert(!existing, 'Credits overlay should not exist at start');
});
