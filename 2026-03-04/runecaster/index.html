<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>RUNECASTER — Wizard Duel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;touch-action:none;user-select:none}
canvas{display:block;width:100%;height:100%}
#overlay{position:fixed;inset:0;background:rgba(5,5,15,0.93);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column}
#overlay.hidden{display:none}
.panel{background:linear-gradient(135deg,#1a0a2e,#2a1040);border:2px solid #9b59b6;border-radius:16px;padding:32px 28px;max-width:480px;width:92%;text-align:center;box-shadow:0 0 40px rgba(155,89,182,0.3)}
.panel h1{font-size:2.2em;margin-bottom:8px;background:linear-gradient(90deg,#9b59b6,#e74c3c,#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.panel h2{font-size:1.3em;color:#bb8fce;margin-bottom:12px}
.panel p{font-size:0.92em;color:#c0b0d0;line-height:1.6;margin-bottom:10px}
.panel ul{text-align:left;margin:10px 16px;color:#c0b0d0;font-size:0.85em;line-height:1.8}
.panel ul strong{color:#f39c12}
.btn{display:inline-block;margin-top:16px;padding:14px 40px;font-size:1.2em;font-weight:700;border:none;border-radius:30px;cursor:pointer;background:linear-gradient(90deg,#9b59b6,#e74c3c);color:#fff;box-shadow:0 0 20px rgba(155,89,182,0.5);transition:transform 0.15s}
.btn:hover{transform:scale(1.05)}.btn:active{transform:scale(0.97)}
#restartBtn{position:fixed;bottom:16px;right:16px;z-index:50;padding:8px 18px;border-radius:20px;border:1px solid #9b59b6;background:rgba(26,10,46,0.8);color:#bb8fce;font-size:0.85em;cursor:pointer}
#restartBtn.hidden{display:none}

/* Spell choice buttons */
#spellChoice{position:fixed;bottom:0;left:0;right:0;z-index:60;display:none;padding:12px 8px 20px;background:linear-gradient(to top,rgba(10,10,26,0.97),rgba(10,10,26,0.7));flex-wrap:wrap;justify-content:center;gap:8px}
#spellChoice.show{display:flex}
.spell-btn{padding:12px 6px;border-radius:14px;border:2px solid;cursor:pointer;font-size:1em;font-weight:700;color:#fff;flex:1;min-width:70px;max-width:110px;text-align:center;transition:transform 0.12s,box-shadow 0.12s;background:rgba(20,15,40,0.9)}
.spell-btn:active{transform:scale(0.93)}
.spell-btn .icon{font-size:1.4em;display:block;margin-bottom:2px}
.spell-btn .counter-hint{font-size:0.7em;font-weight:400;opacity:0.7;display:block;margin-top:2px}
.spell-btn.effective{box-shadow:0 0 18px rgba(46,204,113,0.6);border-color:#2ecc71 !important}
.spell-btn.effective .counter-hint{color:#2ecc71;opacity:1;font-weight:700}

#choicePrompt{position:fixed;z-index:61;left:0;right:0;text-align:center;color:#f39c12;font-size:1.05em;font-weight:700;display:none;text-shadow:0 0 12px rgba(243,156,18,0.5)}
#choicePrompt.show{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="restartBtn" class="hidden" onclick="startLevel(currentLevel)">↻ Restart</button>
<div id="spellChoice">
  <button class="spell-btn" data-spell="BOLT" style="border-color:#3498db" onclick="pickSpell('BOLT')"><span class="icon">⚡</span>BOLT<span class="counter-hint"></span></button>
  <button class="spell-btn" data-spell="EMBER" style="border-color:#e74c3c" onclick="pickSpell('EMBER')"><span class="icon">🔥</span>EMBER<span class="counter-hint"></span></button>
  <button class="spell-btn" data-spell="WARD" style="border-color:#2ecc71" onclick="pickSpell('WARD')"><span class="icon">🛡️</span>WARD<span class="counter-hint"></span></button>
  <button class="spell-btn" data-spell="VORTEX" style="border-color:#9b59b6" onclick="pickSpell('VORTEX')"><span class="icon">🌀</span>VORTEX<span class="counter-hint"></span></button>
</div>
<div id="choicePrompt">Choose your spell to counter!</div>
<div id="overlay">
  <div class="panel" id="panelContent"></div>
</div>
<script>
"use strict";
const C=document.getElementById('c'),X=C.getContext('2d');
const overlay=document.getElementById('overlay'),panelContent=document.getElementById('panelContent');
const restartBtn=document.getElementById('restartBtn');
const spellChoiceEl=document.getElementById('spellChoice');
const choicePromptEl=document.getElementById('choicePrompt');
let W,H,dpr;

// Game state
let gameState='menu',currentLevel=1;
let playerHP=5,aiHP=5;
let playerRune=null,aiRune=null;
let traceNodes=[],tracePath=[],tracing=false,traceComplete=false;
let aiCastTimer=0,aiCastDuration=5000,aiCasting=false,aiCastProgress=0;
let spellResult=null,resultTimer=0;
let particles=[],screenFlash=0;
let roundActive=false,roundCooldown=0;
// Round phases: 'choosing' (player picks spell), 'tracing' (player traces rune), 'resolved'
let roundPhase='';

const SPELLS=['BOLT','EMBER','WARD','VORTEX'];
const SPELL_COLORS={BOLT:'#3498db',EMBER:'#e74c3c',WARD:'#2ecc71',VORTEX:'#9b59b6'};
const SPELL_ICONS={BOLT:'⚡',EMBER:'🔥',WARD:'🛡️',VORTEX:'🌀'};

// Each spell beats exactly one other in a 4-way cycle:
// BOLT > VORTEX > WARD > EMBER > BOLT
// The "opposite" pair (BOLT-WARD, EMBER-VORTEX) = no effect (miss)
const BEATS={BOLT:'VORTEX',EMBER:'BOLT',WARD:'EMBER',VORTEX:'WARD'};
// For quick counter-hint lookup: what counters what
const COUNTERED_BY={BOLT:'EMBER',EMBER:'WARD',WARD:'VORTEX',VORTEX:'BOLT'};

// Rune patterns: arrays of [x,y] normalized 0-1
const RUNE_PATTERNS={
  BOLT:{
    simple:[[0.5,0],[0.3,0.4],[0.6,0.4],[0.4,1]],
    medium:[[0.5,0],[0.25,0.3],[0.55,0.3],[0.35,0.55],[0.65,0.55],[0.45,1]],
    complex:[[0.5,0],[0.2,0.2],[0.6,0.2],[0.3,0.4],[0.7,0.4],[0.25,0.6],[0.55,0.6],[0.4,1]]
  },
  EMBER:{
    simple:[[0.5,0.1],[0.8,0.4],[0.5,0.6],[0.2,0.4]],
    medium:[[0.5,0],[0.8,0.25],[0.65,0.55],[0.5,0.35],[0.35,0.55],[0.2,0.25]],
    complex:[[0.5,0],[0.85,0.2],[0.7,0.5],[0.85,0.8],[0.5,1],[0.15,0.8],[0.3,0.5],[0.15,0.2]]
  },
  WARD:{
    simple:[[0.2,0.2],[0.8,0.2],[0.8,0.8],[0.2,0.8]],
    medium:[[0.5,0],[0.9,0.3],[0.9,0.7],[0.5,1],[0.1,0.7],[0.1,0.3]],
    complex:[[0.5,0],[0.8,0.1],[1,0.4],[0.85,0.75],[0.5,1],[0.15,0.75],[0,0.4],[0.2,0.1]]
  },
  VORTEX:{
    simple:[[0.5,0.1],[0.85,0.5],[0.5,0.9],[0.15,0.5]],
    medium:[[0.5,0],[0.9,0.2],[0.8,0.7],[0.5,0.95],[0.2,0.7],[0.1,0.2]],
    complex:[[0.5,0],[0.8,0.1],[0.95,0.4],[0.85,0.7],[0.6,0.9],[0.3,0.95],[0.1,0.7],[0.05,0.35],[0.2,0.1]]
  }
};

const LEVELS={
  1:{aiSpeed:8000,complexity:'simple',aiSmarts:0.2,choiceTime:99999},
  2:{aiSpeed:5500,complexity:'medium',aiSmarts:0.5,choiceTime:99999},
  3:{aiSpeed:3500,complexity:'complex',aiSmarts:0.75,choiceTime:99999}
};

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  C.width=W*dpr;C.height=H*dpr;
  C.style.width=W+'px';C.style.height=H+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
  if(roundActive&&roundPhase==='tracing')positionRuneNodes();
  // Position choice prompt above spell buttons
  choicePromptEl.style.bottom=(spellChoiceEl.offsetHeight+8)+'px';
}
window.addEventListener('resize',resize);
resize();

function getRuneArea(){
  const isPortrait=H>W;
  let cx,cy,size;
  if(isPortrait){
    size=Math.min(W*0.6,H*0.28);
    cx=W*0.5;cy=H*0.48;
  }else{
    size=Math.min(W*0.25,H*0.5);
    cx=W*0.38;cy=H*0.55;
  }
  return{cx,cy,size};
}

function getAIRuneArea(){
  const isPortrait=H>W;
  let cx,cy,size;
  if(isPortrait){
    size=Math.min(W*0.3,H*0.13);
    cx=W*0.5;cy=H*0.17;
  }else{
    size=Math.min(W*0.15,H*0.35);
    cx=W*0.78;cy=H*0.45;
  }
  return{cx,cy,size};
}

function positionRuneNodes(){
  if(!playerRune)return;
  const{cx,cy,size}=getRuneArea();
  const cfg=LEVELS[currentLevel];
  const pattern=RUNE_PATTERNS[playerRune.type][cfg.complexity];
  traceNodes=pattern.map(([px,py],i)=>({
    x:cx+(px-0.5)*size,
    y:cy+(py-0.5)*size,
    index:i,
    reached:false
  }));
}

function showSpellChoice(){
  roundPhase='choosing';
  const aiType=aiRune.type;
  const counterSpell=COUNTERED_BY[aiType]; // the spell that beats the AI's spell
  
  // Update button hints
  document.querySelectorAll('.spell-btn').forEach(btn=>{
    const spell=btn.dataset.spell;
    const hint=btn.querySelector('.counter-hint');
    btn.classList.remove('effective');
    if(spell===counterSpell){
      hint.textContent='⚔ COUNTER!';
      btn.classList.add('effective');
    }else if(BEATS[spell]===aiType){
      // this shouldn't differ from counterSpell, but just in case
      hint.textContent='⚔ COUNTER!';
      btn.classList.add('effective');
    }else if(BEATS[aiType]===spell){
      hint.textContent='✗ Weak';
    }else if(spell===aiType){
      hint.textContent='= Mirror';
    }else{
      hint.textContent='— No effect';
    }
  });
  
  spellChoiceEl.classList.add('show');
  choicePromptEl.classList.add('show');
  // re-position prompt
  requestAnimationFrame(()=>{
    choicePromptEl.style.bottom=(spellChoiceEl.offsetHeight+8)+'px';
  });
}

function hideSpellChoice(){
  spellChoiceEl.classList.remove('show');
  choicePromptEl.classList.remove('show');
}

function pickSpell(type){
  if(roundPhase!=='choosing'||!roundActive)return;
  playerRune={type,cast:false};
  hideSpellChoice();
  roundPhase='tracing';
  positionRuneNodes();
}
// Make pickSpell globally accessible
window.pickSpell=pickSpell;

function startRound(){
  roundActive=true;traceComplete=false;tracing=false;
  tracePath=[];spellResult=null;resultTimer=0;
  traceNodes=[];
  
  // AI picks its spell
  const cfg=LEVELS[currentLevel];
  let aiType;
  if(Math.random()<cfg.aiSmarts){
    // Smart: pick a spell that beats a random likely player choice
    // At higher levels, AI is less predictable
    aiType=SPELLS[Math.floor(Math.random()*SPELLS.length)];
  }else{
    aiType=SPELLS[Math.floor(Math.random()*SPELLS.length)];
  }
  aiRune={type:aiType,cast:false};
  playerRune=null; // player hasn't chosen yet
  
  aiCastTimer=0;aiCastDuration=cfg.aiSpeed;aiCasting=true;aiCastProgress=0;
  
  // Show AI spell and let player choose
  showSpellChoice();
}

function resolveSpells(pType,aType){
  if(pType===aType){
    // Mirror: both take 1
    return{pDmg:1,aDmg:1,result:'mirror'};
  }
  if(BEATS[pType]===aType){
    // Player counters AI
    return{pDmg:2,aDmg:0,result:'counter'};
  }
  if(BEATS[aType]===pType){
    // AI counters player
    return{pDmg:0,aDmg:2,result:'countered'};
  }
  // Neutral / opposite pair: no effect
  return{pDmg:0,aDmg:0,result:'neutral'};
}

function finishRound(playerCast){
  roundActive=false;roundPhase='resolved';
  hideSpellChoice();
  let pType=playerCast?playerRune.type:null;
  let aType=aiRune.type;
  
  if(!playerCast){
    // Player didn't finish: AI hits for 1
    playerHP=Math.max(0,playerHP-1);
    spellResult={text:'⏱ Too slow! Dark Mage strikes!',color:'#e74c3c',pDmg:0,aDmg:1};
    screenFlash=0.7;
    spawnHitParticles(W*0.5,H*0.35,'#e74c3c');
  }else{
    const{pDmg,aDmg,result}=resolveSpells(pType,aType);
    aiHP=Math.max(0,aiHP-pDmg);
    playerHP=Math.max(0,playerHP-aDmg);
    
    let text='',color='#fff';
    if(result==='counter'){
      text=`${SPELL_ICONS[pType]} COUNTER! 2x damage!`;
      color=SPELL_COLORS[pType];
      spawnHitParticles(W*0.5,H*0.15,'#2ecc71');
    }else if(result==='countered'){
      text=`${SPELL_ICONS[aType]} Dark Mage counters you!`;
      color='#e74c3c';
      screenFlash=0.5;
      spawnHitParticles(W*0.5,H*0.35,'#e74c3c');
    }else if(result==='mirror'){
      text=`${SPELL_ICONS[pType]} Mirror match! Both take 1`;
      color='#f39c12';
      spawnHitParticles(W*0.5,H*0.25,'#f39c12');
      screenFlash=0.2;
    }else{
      // Neutral: no effect
      text='💨 No effect! Spells fizzle!';
      color='#8a80a0';
    }
    spellResult={text,color,pDmg,aDmg};
    if(pDmg>0){
      const aiArea=getAIRuneArea();
      spawnHitParticles(aiArea.cx,aiArea.cy,SPELL_COLORS[pType]);
    }
  }
  
  resultTimer=2200;
  roundCooldown=800;
  aiCasting=false;
  
  // Check win/lose after delay
  setTimeout(()=>{
    if(gameState!=='playing')return;
    if(aiHP<=0){
      gameState='won';
      if(currentLevel<3){
        showOverlay('victory',`Level ${currentLevel} Complete!`,`The Dark Mage staggers back... Prepare for a tougher fight!`,'Next Level',()=>startLevel(currentLevel+1));
      }else{
        showOverlay('victory','🏆 RUNECASTER SUPREME! 🏆','The Dark Mage is vanquished forever!','Play Again',()=>startLevel(1));
      }
    }else if(playerHP<=0){
      gameState='lost';
      showOverlay('defeat','💀 Defeated!','The Dark Mage overwhelmed you...','Try Again',()=>startLevel(currentLevel));
    }
  },1400);
}

function spawnHitParticles(px,py,color){
  for(let i=0;i<30;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*5;
    particles.push({x:px,y:py,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,color,size:2+Math.random()*4});
  }
}

function spawnTrailParticle(px,py,color){
  particles.push({x:px+Math.random()*6-3,y:py+Math.random()*6-3,vx:Math.random()*2-1,vy:-Math.random()*2,life:0.8,color,size:2+Math.random()*2});
}

// Drawing
function drawBackground(){
  const bg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#15102a');bg.addColorStop(1,'#0a0a1a');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  
  // Subtle magic particles in bg
  const t=Date.now()*0.001;
  X.globalAlpha=0.03;
  for(let i=0;i<20;i++){
    const x=W*(0.1+0.8*((Math.sin(t+i*1.3)+1)/2));
    const y=H*(0.1+0.8*((Math.cos(t*0.7+i*0.9)+1)/2));
    X.fillStyle='#9b59b6';
    X.beginPath();X.arc(x,y,2,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

function drawHealthOrbs(cx,cy,hp,maxHP,color,label){
  X.font='bold 14px system-ui';X.fillStyle='#a0a0c0';X.textAlign='center';
  X.fillText(label,cx,cy-22);
  const orbR=10,gap=6;
  const totalW=maxHP*(orbR*2+gap)-gap;
  const startX=cx-totalW/2+orbR;
  for(let i=0;i<maxHP;i++){
    const ox=startX+i*(orbR*2+gap);
    if(i<hp){
      X.beginPath();X.arc(ox,cy,orbR,0,Math.PI*2);
      const g=X.createRadialGradient(ox-3,cy-3,2,ox,cy,orbR);
      g.addColorStop(0,'#fff');g.addColorStop(0.5,color);g.addColorStop(1,color+'80');
      X.fillStyle=g;X.fill();
      X.shadowColor=color;X.shadowBlur=10;
      X.beginPath();X.arc(ox,cy,orbR,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }else{
      X.beginPath();X.arc(ox,cy,orbR,0,Math.PI*2);
      X.fillStyle='#1a1a2e';X.fill();
      X.strokeStyle='#333';X.lineWidth=1;X.stroke();
    }
  }
}

function drawRuneNodes(){
  if(!roundActive||roundPhase!=='tracing'||!traceNodes.length)return;
  const color=SPELL_COLORS[playerRune.type];
  
  // Draw guide lines (dim)
  X.strokeStyle=color+'30';X.lineWidth=2;X.setLineDash([5,5]);
  X.beginPath();
  for(let i=0;i<traceNodes.length;i++){
    const n=traceNodes[i];
    i===0?X.moveTo(n.x,n.y):X.lineTo(n.x,n.y);
  }
  X.stroke();X.setLineDash([]);
  
  // Draw traced path
  if(tracePath.length>1){
    X.strokeStyle=color;X.lineWidth=4;X.lineCap='round';X.lineJoin='round';
    X.shadowColor=color;X.shadowBlur=15;
    X.beginPath();
    X.moveTo(tracePath[0].x,tracePath[0].y);
    for(let i=1;i<tracePath.length;i++){
      X.lineTo(tracePath[i].x,tracePath[i].y);
    }
    X.stroke();
    X.shadowBlur=0;
  }
  
  // Draw nodes
  for(let i=0;i<traceNodes.length;i++){
    const n=traceNodes[i];
    const r=n.reached?8:12;
    X.beginPath();X.arc(n.x,n.y,r,0,Math.PI*2);
    if(n.reached){
      X.fillStyle=color;X.fill();
      X.shadowColor=color;X.shadowBlur=15;
      X.beginPath();X.arc(n.x,n.y,r,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }else{
      X.fillStyle='#1a1a2e';X.fill();
      X.strokeStyle=color;X.lineWidth=2;X.stroke();
      // Pulsing glow on next target
      const nextIdx=traceNodes.filter(t=>t.reached).length;
      if(i===nextIdx){
        const pulse=0.5+0.5*Math.sin(Date.now()*0.005);
        X.shadowColor=color;X.shadowBlur=20*pulse;
        X.strokeStyle=color;X.lineWidth=3;
        X.beginPath();X.arc(n.x,n.y,r+2,0,Math.PI*2);X.stroke();
        X.shadowBlur=0;
      }
    }
    // Number label
    X.font='bold 11px system-ui';X.fillStyle=n.reached?'#fff':color;
    X.textAlign='center';X.textBaseline='middle';
    X.fillText(i+1,n.x,n.y);
  }
  
  // Spell name below rune area
  const{cx,cy,size}=getRuneArea();
  X.font='bold 18px system-ui';X.fillStyle=color;X.textAlign='center';
  X.fillText(`${SPELL_ICONS[playerRune.type]} ${playerRune.type}`,cx,cy+size/2+28);
}

function drawAICasting(){
  if(!aiRune)return;
  const{cx,cy,size}=getAIRuneArea();
  const color=SPELL_COLORS[aiRune.type];
  
  // Label
  X.font='bold 14px system-ui';X.fillStyle='#e74c3c';X.textAlign='center';
  X.fillText('DARK MAGE',cx,cy-size-18);
  
  // Always show AI spell type (the core fix!)
  X.font=`${Math.round(size*0.7)}px system-ui`;X.textAlign='center';X.textBaseline='middle';
  X.fillText(SPELL_ICONS[aiRune.type],cx,cy);
  X.font='bold 15px system-ui';X.fillStyle=color;
  X.fillText(aiRune.type,cx,cy+size*0.55);
  
  // Casting progress ring
  const r=size*0.85;
  X.strokeStyle='#222';X.lineWidth=5;
  X.beginPath();X.arc(cx,cy,r,0,Math.PI*2);X.stroke();
  
  if(aiCasting){
    X.strokeStyle=color;X.lineWidth=5;X.lineCap='round';
    X.shadowColor=color;X.shadowBlur=12;
    X.beginPath();
    X.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+aiCastProgress*Math.PI*2);
    X.stroke();
    X.shadowBlur=0;
    
    // Danger warning when almost done
    if(aiCastProgress>0.75){
      const pulse=0.5+0.5*Math.sin(Date.now()*0.01);
      X.globalAlpha=pulse*0.15;
      X.fillStyle='#e74c3c';
      X.beginPath();X.arc(cx,cy,r+5,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }
    
    // Time remaining text
    const remaining=Math.max(0,Math.ceil((aiCastDuration-aiCastTimer)/1000));
    X.font='bold 12px system-ui';X.fillStyle='#e74c3c';X.textAlign='center';
    X.fillText(`${remaining}s`,cx,cy+size+12);
  }
}

function drawParticles(){
  for(const p of particles){
    X.globalAlpha=p.life*0.9;
    X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

function drawResult(){
  if(!spellResult||resultTimer<=0)return;
  const alpha=Math.min(1,resultTimer/500);
  X.globalAlpha=alpha;
  X.font='bold 22px system-ui';X.fillStyle=spellResult.color;
  X.textAlign='center';
  const resultY=H>W?H*0.36:H*0.42;
  X.fillText(spellResult.text,W/2,resultY);
  X.globalAlpha=1;
}

function drawScreenFlash(){
  if(screenFlash>0){
    X.globalAlpha=screenFlash*0.3;
    X.fillStyle='#e74c3c';
    X.fillRect(0,0,W,H);
    X.globalAlpha=1;
  }
}

function drawHUD(){
  const isPortrait=H>W;
  // Player health - left
  drawHealthOrbs(isPortrait?W*0.25:W*0.25,50,playerHP,5,'#3498db','YOU');
  // AI health - right
  drawHealthOrbs(isPortrait?W*0.75:W*0.75,50,aiHP,5,'#e74c3c','DARK MAGE');
  // Level
  X.font='bold 13px system-ui';X.fillStyle='#f39c12';X.textAlign='center';
  X.fillText(`— Level ${currentLevel} —`,W/2,20);
  
  // Phase-specific instructions
  if(roundActive){
    X.font='14px system-ui';X.fillStyle='#8a80a0';X.textAlign='center';
    if(roundPhase==='choosing'){
      X.fillStyle='#f39c12';
      X.fillText('⬇ Pick a spell to cast!',W/2,H*0.92);
    }else if(roundPhase==='tracing'&&!traceComplete){
      X.fillText('Trace the rune — drag through numbered nodes!',W/2,H*0.92);
    }
  }
}

let lastTime=0;
function gameLoop(t){
  const dt=lastTime?Math.min(t-lastTime,50):16;lastTime=t;
  
  drawBackground();
  
  if(gameState==='playing'){
    // AI cast timer (runs during both choosing and tracing)
    if(roundActive&&aiCasting){
      aiCastTimer+=dt;
      aiCastProgress=Math.min(1,aiCastTimer/aiCastDuration);
      if(aiCastProgress>=1){
        // AI finished casting before player
        aiCasting=false;
        hideSpellChoice();
        finishRound(false);
      }
    }
    
    // Round cooldown (between rounds)
    if(!roundActive&&resultTimer>0){
      resultTimer-=dt;
    }
    if(!roundActive&&resultTimer<=0&&gameState==='playing'){
      roundCooldown-=dt;
      if(roundCooldown<=0){
        roundCooldown=999999;
        startRound();
      }
    }
    
    // Screen flash decay
    if(screenFlash>0)screenFlash=Math.max(0,screenFlash-dt*0.003);
    
    // Particles
    for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life-=dt*0.002;p.vy+=0.02;}
    particles=particles.filter(p=>p.life>0);
    
    drawHUD();
    drawRuneNodes();
    drawAICasting();
    drawParticles();
    drawResult();
    drawScreenFlash();
  }
  
  requestAnimationFrame(gameLoop);
}

// Input handling
let pointerDown=false;

function getNodeAtPos(mx,my,threshold){
  const nextIdx=traceNodes.filter(n=>n.reached).length;
  if(nextIdx>=traceNodes.length)return null;
  const n=traceNodes[nextIdx];
  const dx=mx-n.x,dy=my-n.y;
  if(Math.sqrt(dx*dx+dy*dy)<threshold)return n;
  return null;
}

C.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(gameState!=='playing'||!roundActive||roundPhase!=='tracing'||traceComplete)return;
  pointerDown=true;
  const mx=e.clientX,my=e.clientY;
  
  const reached=traceNodes.filter(n=>n.reached).length;
  if(reached===0){
    const n=getNodeAtPos(mx,my,40);
    if(n){n.reached=true;tracePath=[{x:n.x,y:n.y}];tracing=true;}
  }
});

C.addEventListener('pointermove',e=>{
  e.preventDefault();
  if(!pointerDown||!tracing||traceComplete)return;
  const mx=e.clientX,my=e.clientY;
  
  tracePath.push({x:mx,y:my});
  if(tracePath.length>200)tracePath.splice(0,tracePath.length-200);
  
  if(playerRune)spawnTrailParticle(mx,my,SPELL_COLORS[playerRune.type]);
  
  const n=getNodeAtPos(mx,my,35);
  if(n){
    n.reached=true;
    tracePath.push({x:n.x,y:n.y});
    
    if(traceNodes.every(n=>n.reached)){
      traceComplete=true;tracing=false;
      const{cx,cy}=getRuneArea();
      spawnHitParticles(cx,cy,SPELL_COLORS[playerRune.type]);
      finishRound(true);
    }
  }
});

C.addEventListener('pointerup',e=>{
  e.preventDefault();
  pointerDown=false;
  if(tracing&&!traceComplete){
    tracing=false;
    tracePath=[];
    for(const n of traceNodes)n.reached=false;
  }
});

function showOverlay(type,title,msg,btnText,btnAction){
  hideSpellChoice();
  panelContent.innerHTML=`<h1>${title}</h1><p>${msg}</p><button class="btn" id="overlayBtn">${btnText}</button>`;
  overlay.classList.remove('hidden');
  restartBtn.classList.add('hidden');
  document.getElementById('overlayBtn').onclick=()=>{overlay.classList.add('hidden');btnAction();};
}

function showHowToPlay(){
  panelContent.innerHTML=`
    <h1>RUNECASTER</h1>
    <h2>⚔ Wizard Duel ⚔</h2>
    <p style="color:#f39c12;font-weight:700">Outsmart the Dark Mage with strategic spellcasting!</p>
    <ul>
      <li>The Dark Mage reveals their spell — <strong>choose yours to counter it!</strong></li>
      <li>Then trace the rune pattern before the Mage finishes casting</li>
      <li><strong>⚡BOLT</strong> beats <strong>🌀VORTEX</strong> — <strong>🌀VORTEX</strong> beats <strong>🛡️WARD</strong></li>
      <li><strong>🛡️WARD</strong> beats <strong>🔥EMBER</strong> — <strong>🔥EMBER</strong> beats <strong>⚡BOLT</strong></li>
      <li>Counter = <strong>2x damage!</strong> Same spell = both take 1. Opposite = no effect!</li>
      <li>Drain all 5 health orbs to win each level!</li>
    </ul>
    <button class="btn" id="overlayBtn">⚔ BEGIN DUEL</button>
  `;
  overlay.classList.remove('hidden');
  document.getElementById('overlayBtn').onclick=()=>{overlay.classList.add('hidden');startLevel(1);};
}

function startLevel(lvl){
  currentLevel=lvl;
  gameState='playing';
  playerHP=5;aiHP=5;
  particles=[];screenFlash=0;
  spellResult=null;resultTimer=0;
  roundActive=false;roundCooldown=800;
  traceComplete=false;tracing=false;tracePath=[];
  roundPhase='';
  hideSpellChoice();
  restartBtn.classList.remove('hidden');
  overlay.classList.add('hidden');
  setTimeout(()=>startRound(),600);
}

showHowToPlay();
requestAnimationFrame(gameLoop);
</script>
