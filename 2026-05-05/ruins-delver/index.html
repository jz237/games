<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="icon" href="data:,">
<title>Ruins Delver</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{position:fixed;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#0a0806;color:#f0e8d8;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block;width:100%;height:100%;touch-action:none;image-rendering:pixelated;image-rendering:crisp-edges}
#game-container{position:absolute;inset:0;display:flex;flex-direction:column}
.hidden{display:none!important}
/* Overlays */
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.85)}
.panel{position:relative;width:min(94vw,480px);max-height:94vh;overflow-y:auto;text-align:center;padding:24px 18px;border:3px solid #8b6914;border-radius:4px;background:linear-gradient(180deg,#1a1408,#0d0a04);box-shadow:0 0 40px rgba(139,105,20,.3),inset 0 0 60px rgba(0,0,0,.5)}
.panel::before{content:'';position:absolute;inset:6px;border:1px solid rgba(139,105,20,.4);border-radius:2px;pointer-events:none}
.game-title{font-size:clamp(2rem,10vw,3.5rem);font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#ffd700;text-shadow:0 0 10px #ffd700,0 0 30px rgba(255,215,0,.5),0 3px 0 #4a3800;margin-bottom:4px;font-family:'Courier New',monospace}
.subtitle{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:#8b9;margin-bottom:16px}
.version{position:absolute;top:8px;right:12px;font-size:10px;color:#666;letter-spacing:.1em}
.btn{display:inline-block;min-height:44px;min-width:160px;margin:6px;padding:12px 20px;border:2px solid #8b6914;border-radius:4px;background:linear-gradient(180deg,#3d2f0a,#1a1408);color:#ffd700;font-weight:900;font-size:14px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;font-family:'Courier New',monospace;touch-action:manipulation;user-select:none}
.btn:active{background:#2a1f06;transform:scale(.97)}
.btn.secondary{border-color:#444;color:#aaa;background:linear-gradient(180deg,#1a1a1a,#0d0d0d)}
/* Scores */
.scores-list{text-align:left;margin:12px 0}
.score-row{display:grid;grid-template-columns:24px 40px 1fr auto;gap:6px;padding:4px 8px;border-bottom:1px solid rgba(139,105,20,.2);font-size:12px;font-weight:700;align-items:center}
.score-row.highlight{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.5)}
/* Initials input */
.initials-input{display:flex;justify-content:center;gap:12px;margin:16px 0}
.init-slot{display:flex;flex-direction:column;align-items:center;gap:4px}
.init-letter{width:44px;height:52px;border:2px solid #8b6914;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;background:rgba(0,0,0,.4);color:#ffd700}
.init-arrow{width:44px;height:32px;border:1px solid #8b6914;border-radius:4px;background:rgba(26,20,8,.8);color:#ffd700;font-size:18px;font-weight:900;cursor:pointer;touch-action:manipulation}
/* Touch controls */
.touch-controls{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;z-index:50;pointer-events:none}
.touch-controls button{pointer-events:auto;width:56px;height:56px;border-radius:50%;border:2px solid rgba(139,105,20,.5);background:rgba(26,20,8,.6);color:#ffd700;font-size:20px;font-weight:900;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.touch-controls button:active{background:rgba(139,105,20,.4)}
.dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px;gap:4px}
.dpad .up{grid-column:2;grid-row:1}
.dpad .left{grid-column:1;grid-row:2}
.dpad .right{grid-column:3;grid-row:2}
.action-btns{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
@media(min-width:769px){.touch-controls{display:none}}
</style>
</head>
<body>
<div id="game-container">
<canvas id="gameCanvas"></canvas>
<!-- Touch Controls -->
<div class="touch-controls" id="touchControls">
<div class="dpad">
<button class="up" id="btnUp">▲</button>
<button class="left" id="btnLeft">◀</button>
<button class="right" id="btnRight">▶</button>
</div>
<div class="action-btns">
<button id="btnJump">⬆</button>
<button id="btnBomb">💣</button>
<button id="btnRope">🪢</button>
</div>
</div>
</div>

<!-- Title Screen -->
<div class="overlay" id="titleScreen">
<div class="overlay-bg"></div>
<div class="panel">
<div class="version">v1.0.0</div>
<div class="game-title">RUINS DELVER</div>
<div class="subtitle">Jungle Temple Explorer</div>
<p style="font-size:12px;color:#8b9;margin:8px 0 16px;line-height:1.5">Explore ancient ruins. Collect gold &amp; gems.<br>Avoid traps. Reach the exit.</p>
<div style="text-align:left;font-size:11px;color:#998;margin:12px auto;max-width:280px;line-height:1.6">
<b style="color:#ffd700">CONTROLS:</b><br>
← → Move &nbsp;|&nbsp; ↑ Climb/Jump<br>
B = Bomb &nbsp;|&nbsp; R = Rope &nbsp;|&nbsp; T = Torch<br>
<span style="color:#666">Mobile: D-pad + action buttons</span>
</div>
<button class="btn" onclick="startGame()">EXPLORE</button><br>
<button class="btn secondary" onclick="showScores()">HIGH SCORES</button>
</div>
</div>

<!-- Game Over Screen -->
<div class="overlay hidden" id="gameOverScreen">
<div class="overlay-bg"></div>
<div class="panel">
<div class="game-title" style="font-size:clamp(1.5rem,8vw,2.5rem)">GAME OVER</div>
<p id="finalScore" style="color:#ffd700;font-size:18px;margin:8px 0"></p>
<p id="finalLevel" style="color:#8b9;font-size:12px;margin:4px 0 16px"></p>
<div id="initialsEntry" class="hidden">
<p style="font-size:12px;color:#aaa;margin-bottom:8px">NEW HIGH SCORE! Enter initials:</p>
<div class="initials-input" id="initialsBox"></div>
<button class="btn" onclick="submitInitials()">SUBMIT</button>
</div>
<div id="gameOverBtns">
<button class="btn" onclick="startGame()">RETRY</button><br>
<button class="btn secondary" onclick="showTitle()">MENU</button>
</div>
</div>
</div>

<!-- Level Complete Screen -->
<div class="overlay hidden" id="levelCompleteScreen">
<div class="overlay-bg"></div>
<div class="panel">
<div class="game-title" style="font-size:clamp(1.5rem,8vw,2.5rem)">LEVEL CLEAR!</div>
<p id="levelScore" style="color:#ffd700;font-size:16px;margin:8px 0"></p>
<p id="levelBonus" style="color:#8b9;font-size:12px;margin:4px 0 16px"></p>
<button class="btn" onclick="nextLevel()">CONTINUE</button>
</div>
</div>

<!-- High Scores Screen -->
<div class="overlay hidden" id="scoresScreen">
<div class="overlay-bg"></div>
<div class="panel">
<div class="game-title" style="font-size:clamp(1.3rem,6vw,2rem)">HIGH SCORES</div>
<div class="scores-list" id="scoresList"></div>
<button class="btn secondary" onclick="showTitle()">BACK</button>
</div>
</div>

<script>
// ===== RUINS DELVER v1.0.0 =====
// A jungle-ruins adventure platformer

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// === CONSTANTS ===
const TILE = 24;
const GRAVITY = 0.45;
const JUMP_FORCE = -8.5;
const MOVE_SPEED = 2.8;
const CLIMB_SPEED = 2.2;
const MAX_LEVELS = 5;
const STORAGE_KEY = 'ruinsDelver_scores';

// === GAME STATE ===
let gameState = 'title'; // title, playing, paused, gameover, levelcomplete
let level = 1;
let lives = 3;
let health = 4;
let maxHealth = 4;
let bombs = 4;
let ropes = 4;
let torches = 2;
let gold = 0;
let gems = 0;
let score = 0;
let timer = 0;
let frameCount = 0;
let cameraX = 0, cameraY = 0;
let screenShake = 0;
let particles = [];
let floatingTexts = [];

// Level dimensions
let levelW = 0, levelH = 0;
let tiles = [];
let entities = [];
let items = [];
let exitPos = {x:0, y:0};
let placedRopes = [];
let explosions = [];

// Player
let player = {
  x: 0, y: 0, vx: 0, vy: 0,
  w: 20, h: 22,
  onGround: false, onLadder: false,
  facing: 1, frame: 0, animTimer: 0,
  invincible: 0, dead: false,
  hasKey: false
};

// Input
let keys = {};
let touchState = {left:false, right:false, up:false, jump:false, bomb:false, rope:false};

// === TILE TYPES ===
const T = {
  EMPTY: 0, STONE: 1, MOSS_STONE: 2, DIRT: 3,
  LADDER: 4, SPIKE: 5, VINE: 6, PLATFORM: 7,
  IDOL: 8, CARVED_FACE: 9, TORCH_WALL: 10,
  WEB: 11, EXIT: 12, GOLD_VEIN: 13, CRUMBLE: 14
};

// === COLORS ===
const COLORS = {
  bg: '#0a0806',
  stone: '#3d3528', stoneLt: '#5a4e3a', stoneDk: '#2a2418',
  moss: '#2a4a1a', mossLt: '#3d6b28',
  dirt: '#4a3820', dirtLt: '#5a4830',
  vine: '#1a5a1a', vineLt: '#2a7a2a',
  gold: '#ffd700', goldDk: '#b8960a',
  gem: '#ff3366', gemLt: '#ff6699',
  ladder: '#8b6914', ladderLt: '#a8820a',
  spike: '#c0c0c0', spikeLt: '#e0e0e0',
  torch: '#ff8800', torchLt: '#ffcc00',
  hud_bg: '#1a1408', hud_border: '#8b6914',
  hud_text: '#ffd700', hud_dim: '#665522',
  parchment: '#d4c5a0', parchmentDk: '#a89070',
  idol: '#8b7a40', idolLt: '#b8a050',
  web: 'rgba(220,220,220,0.6)',
  sky: '#0a1020'
};

// === CANVAS SETUP ===
let W, H, scale, viewTilesX, viewTilesY;
let hudH = 0, bottomH = 0, gameH = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  
  // Layout: top HUD, game area, bottom panel
  hudH = Math.floor(H * 0.08);
  bottomH = Math.floor(H * 0.14);
  gameH = H - hudH - bottomH;
  
  scale = Math.max(1, Math.floor(Math.min(W, gameH) / (16 * TILE)));
  viewTilesX = Math.ceil(W / TILE) + 2;
  viewTilesY = Math.ceil(gameH / TILE) + 2;
}
window.addEventListener('resize', resize);
resize();

// === LEVEL GENERATION ===
function generateLevel(lvl) {
  const w = 28 + lvl * 4;
  const h = 20 + lvl * 3;
  levelW = w; levelH = h;
  tiles = [];
  entities = [];
  items = [];
  placedRopes = [];
  explosions = [];
  
  // Fill with empty
  for (let y = 0; y < h; y++) {
    tiles[y] = [];
    for (let x = 0; x < w; x++) {
      tiles[y][x] = T.EMPTY;
    }
  }
  
  // Border walls
  for (let x = 0; x < w; x++) {
    tiles[0][x] = T.STONE;
    tiles[h-1][x] = T.STONE;
  }
  for (let y = 0; y < h; y++) {
    tiles[y][0] = T.STONE;
    tiles[y][w-1] = T.STONE;
  }
  
  // Generate platforms and structure
  // Ground floor
  for (let x = 1; x < w-1; x++) {
    tiles[h-2][x] = T.STONE;
    if (Math.random() < 0.3) tiles[h-2][x] = T.MOSS_STONE;
  }
  
  // Platforms at various heights
  const numPlatforms = 12 + lvl * 4;
  for (let i = 0; i < numPlatforms; i++) {
    const px = 2 + Math.floor(Math.random() * (w - 6));
    const py = 3 + Math.floor(Math.random() * (h - 7));
    const pw = 3 + Math.floor(Math.random() * 5);
    for (let dx = 0; dx < pw && px + dx < w - 1; dx++) {
      if (tiles[py][px+dx] === T.EMPTY) {
        tiles[py][px+dx] = Math.random() < 0.3 ? T.MOSS_STONE : T.STONE;
        // Add crumbling platforms occasionally
        if (Math.random() < 0.1) tiles[py][px+dx] = T.CRUMBLE;
      }
    }
  }
  
  // Add dirt patches
  for (let y = 2; y < h-2; y++) {
    for (let x = 1; x < w-1; x++) {
      if (tiles[y][x] === T.EMPTY && tiles[y-1][x] >= T.STONE && tiles[y-1][x] <= T.MOSS_STONE && Math.random() < 0.15) {
        tiles[y][x] = T.DIRT;
      }
    }
  }
  
  // Ladders
  const numLadders = 5 + lvl * 2;
  for (let i = 0; i < numLadders; i++) {
    const lx = 2 + Math.floor(Math.random() * (w - 4));
    const ly = 3 + Math.floor(Math.random() * (h - 8));
    const lh = 3 + Math.floor(Math.random() * 5);
    for (let dy = 0; dy < lh && ly + dy < h - 2; dy++) {
      if (tiles[ly+dy][lx] === T.EMPTY || tiles[ly+dy][lx] === T.DIRT) {
        tiles[ly+dy][lx] = T.LADDER;
      }
    }
  }
  
  // Vines (hanging from ceiling/platforms)
  for (let x = 2; x < w-2; x++) {
    if (Math.random() < 0.08) {
      let vy = 1;
      while (vy < h-2 && tiles[vy][x] === T.EMPTY) {
        if (Math.random() < 0.7 && vy > 1) {
          tiles[vy][x] = T.VINE;
        }
        vy++;
        if (vy - 1 > 4) break;
      }
    }
  }
  
  // Spikes
  for (let x = 2; x < w-2; x++) {
    if (Math.random() < 0.05 + lvl * 0.01) {
      for (let y = h-3; y > 2; y--) {
        if (tiles[y][x] === T.EMPTY && (tiles[y+1][x] === T.STONE || tiles[y+1][x] === T.MOSS_STONE)) {
          tiles[y][x] = T.SPIKE;
          break;
        }
      }
    }
  }
  
  // Decorative elements
  for (let y = 2; y < h-2; y++) {
    for (let x = 2; x < w-2; x++) {
      if (tiles[y][x] === T.EMPTY) {
        if (Math.random() < 0.01) tiles[y][x] = T.IDOL;
        else if (Math.random() < 0.008) tiles[y][x] = T.CARVED_FACE;
        else if (Math.random() < 0.012 && tiles[y][x-1] >= T.STONE && tiles[y][x-1] <= T.MOSS_STONE) tiles[y][x] = T.TORCH_WALL;
        else if (Math.random() < 0.015) tiles[y][x] = T.WEB;
        else if (Math.random() < 0.02 && tiles[y+1][x] >= T.STONE) tiles[y][x] = T.GOLD_VEIN;
      }
    }
  }
  
  // Place player start (top-left area, on a platform)
  player.x = 3 * TILE;
  player.y = 2 * TILE;
  for (let y = 2; y < h-3; y++) {
    if (tiles[y+1][3] >= T.STONE && tiles[y+1][3] <= T.MOSS_STONE && tiles[y][3] === T.EMPTY) {
      player.y = y * TILE - player.h;
      break;
    }
  }
  player.vx = 0; player.vy = 0;
  player.onGround = false; player.onLadder = false;
  player.dead = false; player.invincible = 0;
  player.facing = 1; player.hasKey = false;
  
  // Place exit (bottom-right area)
  exitPos.x = (w - 4) * TILE;
  exitPos.y = (h - 3) * TILE;
  for (let y = h-4; y > 3; y--) {
    if (tiles[y+1][w-4] >= T.STONE && tiles[y][w-4] === T.EMPTY) {
      exitPos.y = y * TILE;
      tiles[y][w-4] = T.EXIT;
      break;
    }
  }
  
  // Place items (gold, gems)
  const numGold = 8 + lvl * 3;
  const numGems = 2 + lvl;
  for (let i = 0; i < numGold; i++) {
    placeItem('gold');
  }
  for (let i = 0; i < numGems; i++) {
    placeItem('gem');
  }
  // Bonus items
  if (Math.random() < 0.4) placeItem('health');
  if (Math.random() < 0.3) placeItem('bomb_pickup');
  if (Math.random() < 0.3) placeItem('rope_pickup');
  
  // Place enemies
  const numBats = 2 + lvl;
  const numSnakes = 1 + Math.floor(lvl * 0.8);
  const numSpiders = 1 + Math.floor(lvl * 0.6);
  const numSkeletons = Math.floor(lvl * 0.5);
  
  for (let i = 0; i < numBats; i++) spawnEnemy('bat');
  for (let i = 0; i < numSnakes; i++) spawnEnemy('snake');
  for (let i = 0; i < numSpiders; i++) spawnEnemy('spider');
  for (let i = 0; i < numSkeletons; i++) spawnEnemy('skeleton');
}

function placeItem(type) {
  for (let attempts = 0; attempts < 50; attempts++) {
    const x = 2 + Math.floor(Math.random() * (levelW - 4));
    const y = 2 + Math.floor(Math.random() * (levelH - 4));
    if (tiles[y][x] === T.EMPTY && tiles[y+1][x] >= T.STONE) {
      items.push({type, x: x * TILE + TILE/2, y: y * TILE + TILE/2, collected: false, bobOffset: Math.random() * Math.PI * 2});
      return;
    }
  }
}

function spawnEnemy(type) {
  for (let attempts = 0; attempts < 50; attempts++) {
    const x = 4 + Math.floor(Math.random() * (levelW - 8));
    const y = 2 + Math.floor(Math.random() * (levelH - 5));
    if (type === 'bat') {
      if (tiles[y][x] === T.EMPTY) {
        entities.push({type, x: x*TILE, y: y*TILE, vx: (Math.random()<0.5?1:-1)*1.2, vy: 0, w:18, h:14, hp:1, frame:0, phase: Math.random()*Math.PI*2});
        return;
      }
    } else if (type === 'snake' || type === 'skeleton') {
      if (tiles[y][x] === T.EMPTY && tiles[y+1][x] >= T.STONE) {
        entities.push({type, x: x*TILE, y: y*TILE, vx: (Math.random()<0.5?1:-1)*0.8, vy:0, w:20, h:16, hp: type==='skeleton'?2:1, frame:0, patrolStart: x*TILE - 40, patrolEnd: x*TILE + 40});
        return;
      }
    } else if (type === 'spider') {
      if (tiles[y][x] === T.EMPTY && y > 2) {
        entities.push({type, x: x*TILE, y: y*TILE, vx:0, vy: 0.5, w:16, h:16, hp:1, frame:0, startY: y*TILE, range: 40 + Math.random()*30});
        return;
      }
    }
  }
}

// === TILE COLLISION ===
function isSolid(tx, ty) {
  if (tx < 0 || tx >= levelW || ty < 0 || ty >= levelH) return true;
  const t = tiles[ty][tx];
  return t === T.STONE || t === T.MOSS_STONE || t === T.DIRT || t === T.CRUMBLE || t === T.IDOL || t === T.CARVED_FACE;
}

function isLadder(tx, ty) {
  if (tx < 0 || tx >= levelW || ty < 0 || ty >= levelH) return false;
  return tiles[ty][tx] === T.LADDER || tiles[ty][tx] === T.VINE;
}

// === PLAYER PHYSICS ===
function updatePlayer() {
  if (player.dead) return;
  
  // Input
  let moveX = 0;
  let wantUp = keys['ArrowUp'] || keys['KeyW'] || touchState.up;
  let wantJump = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touchState.jump;
  if (keys['ArrowLeft'] || keys['KeyA'] || touchState.left) moveX = -1;
  if (keys['ArrowRight'] || keys['KeyD'] || touchState.right) moveX = 1;
  
  // Check ladder
  const pcx = Math.floor((player.x + player.w/2) / TILE);
  const pcy = Math.floor((player.y + player.h/2) / TILE);
  const onLadderTile = isLadder(pcx, pcy);
  
  if (onLadderTile && wantUp) {
    player.onLadder = true;
  }
  if (!onLadderTile) player.onLadder = false;
  
  if (player.onLadder) {
    player.vy = 0;
    if (wantUp) player.vy = -CLIMB_SPEED;
    if (keys['ArrowDown'] || keys['KeyS']) player.vy = CLIMB_SPEED;
    player.vx = moveX * MOVE_SPEED * 0.6;
  } else {
    player.vx = moveX * MOVE_SPEED;
    player.vy += GRAVITY;
    if (player.vy > 10) player.vy = 10;
    
    // Jump
    if (wantJump && player.onGround) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
    }
  }
  
  if (moveX !== 0) player.facing = moveX;
  
  // Move X
  player.x += player.vx;
  resolveCollisionX();
  
  // Move Y
  player.y += player.vy;
  resolveCollisionY();
  
  // Animation
  player.animTimer++;
  if (Math.abs(player.vx) > 0.5) {
    if (player.animTimer % 8 === 0) player.frame = (player.frame + 1) % 4;
  } else {
    player.frame = 0;
  }
  
  // Invincibility timer
  if (player.invincible > 0) player.invincible--;
  
  // Check spike damage
  const footTileX = Math.floor((player.x + player.w/2) / TILE);
  const footTileY = Math.floor((player.y + player.h) / TILE);
  if (footTileY >= 0 && footTileY < levelH && footTileX >= 0 && footTileX < levelW) {
    if (tiles[footTileY][footTileX] === T.SPIKE) {
      damagePlayer(1);
    }
  }
  
  // Crumbling platforms
  if (player.onGround) {
    const belowY = Math.floor((player.y + player.h + 2) / TILE);
    const belowX = Math.floor((player.x + player.w/2) / TILE);
    if (belowY < levelH && tiles[belowY][belowX] === T.CRUMBLE) {
      if (!tiles[belowY][belowX]._crumbleTimer) {
        tiles[belowY][belowX] = T.CRUMBLE;
        setTimeout(() => {
          if (belowY < levelH && belowX < levelW) tiles[belowY][belowX] = T.EMPTY;
          spawnParticles(belowX * TILE + TILE/2, belowY * TILE + TILE/2, COLORS.stone, 6);
        }, 800);
      }
    }
  }
  
  // Collect items
  for (let item of items) {
    if (item.collected) continue;
    const dx = (player.x + player.w/2) - item.x;
    const dy = (player.y + player.h/2) - item.y;
    if (Math.abs(dx) < 16 && Math.abs(dy) < 16) {
      item.collected = true;
      collectItem(item);
    }
  }
  
  // Check exit
  const exitDx = (player.x + player.w/2) - (exitPos.x + TILE/2);
  const exitDy = (player.y + player.h/2) - (exitPos.y + TILE/2);
  if (Math.abs(exitDx) < 16 && Math.abs(exitDy) < 20) {
    levelComplete();
  }
  
  // Camera
  const targetCX = player.x - W/2 + player.w/2;
  const targetCY = player.y - (hudH + gameH/2) + player.h/2 + hudH;
  cameraX += (targetCX - cameraX) * 0.08;
  cameraY += (targetCY - cameraY) * 0.08;
  cameraX = Math.max(0, Math.min(cameraX, levelW * TILE - W));
  cameraY = Math.max(0, Math.min(cameraY, levelH * TILE - gameH));
}

function resolveCollisionX() {
  const left = Math.floor(player.x / TILE);
  const right = Math.floor((player.x + player.w - 1) / TILE);
  const top = Math.floor(player.y / TILE);
  const bottom = Math.floor((player.y + player.h - 1) / TILE);
  
  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, ty)) {
        if (player.vx > 0) {
          player.x = tx * TILE - player.w;
        } else if (player.vx < 0) {
          player.x = (tx + 1) * TILE;
        }
        player.vx = 0;
        return;
      }
    }
  }
}

function resolveCollisionY() {
  const left = Math.floor(player.x / TILE);
  const right = Math.floor((player.x + player.w - 1) / TILE);
  const top = Math.floor(player.y / TILE);
  const bottom = Math.floor((player.y + player.h - 1) / TILE);
  
  player.onGround = false;
  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, ty)) {
        if (player.vy > 0) {
          player.y = ty * TILE - player.h;
          player.vy = 0;
          player.onGround = true;
        } else if (player.vy < 0) {
          player.y = (ty + 1) * TILE;
          player.vy = 0;
        }
        return;
      }
    }
  }
}

function damagePlayer(dmg) {
  if (player.invincible > 0 || player.dead) return;
  health -= dmg;
  player.invincible = 60;
  screenShake = 8;
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 8);
  if (health <= 0) {
    playerDeath();
  }
}

function playerDeath() {
  player.dead = true;
  lives--;
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff6600', 16);
  if (lives <= 0) {
    setTimeout(() => { gameOver(); }, 1000);
  } else {
    setTimeout(() => {
      health = maxHealth;
      player.dead = false;
      player.x = 3 * TILE;
      player.y = 2 * TILE;
      player.vx = 0; player.vy = 0;
      player.invincible = 90;
    }, 1000);
  }
}

function collectItem(item) {
  switch(item.type) {
    case 'gold':
      gold += 100;
      score += 100;
      addFloatingText(item.x, item.y, '+100', COLORS.gold);
      break;
    case 'gem':
      gems++;
      score += 500;
      addFloatingText(item.x, item.y, '+500', COLORS.gem);
      break;
    case 'health':
      health = Math.min(health + 1, maxHealth);
      addFloatingText(item.x, item.y, '+♥', '#ff4444');
      break;
    case 'bomb_pickup':
      bombs += 2;
      addFloatingText(item.x, item.y, '+2💣', '#ff8800');
      break;
    case 'rope_pickup':
      ropes += 2;
      addFloatingText(item.x, item.y, '+2🪢', '#8b6914');
      break;
  }
  spawnParticles(item.x, item.y, COLORS.gold, 5);
}

// === ENEMIES ===
function updateEntities() {
  for (let e of entities) {
    if (e.hp <= 0) continue;
    
    e.frame++;
    switch(e.type) {
      case 'bat':
        e.phase += 0.05;
        e.x += e.vx;
        e.y += Math.sin(e.phase) * 0.8;
        // Bounce off walls
        const btx = Math.floor(e.x / TILE);
        if (isSolid(btx, Math.floor(e.y / TILE)) || e.x < TILE || e.x > (levelW-2)*TILE) {
          e.vx *= -1;
        }
        break;
      case 'snake':
      case 'skeleton':
        e.x += e.vx;
        // Check ground ahead and walls
        const sx = Math.floor((e.x + e.w/2 + e.vx * 12) / TILE);
        const sy = Math.floor((e.y + e.h) / TILE);
        if (isSolid(sx, Math.floor(e.y/TILE)) || !isSolid(sx, sy)) {
          e.vx *= -1;
        }
        // Stay in patrol range
        if (e.x < e.patrolStart || e.x > e.patrolEnd) e.vx *= -1;
        break;
      case 'spider':
        e.y += e.vy;
        if (e.y > e.startY + e.range || e.y < e.startY) {
          e.vy *= -1;
        }
        break;
    }
    
    // Collision with player
    if (!player.dead && player.invincible <= 0) {
      if (rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        // Stomp from above?
        if (player.vy > 0 && player.y + player.h < e.y + e.h/2) {
          e.hp--;
          player.vy = JUMP_FORCE * 0.6;
          score += 200;
          addFloatingText(e.x, e.y, '+200', '#ffcc00');
          spawnParticles(e.x + e.w/2, e.y + e.h/2, '#aa44aa', 8);
        } else {
          damagePlayer(1);
        }
      }
    }
  }
  // Remove dead
  entities = entities.filter(e => e.hp > 0);
}

function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// === ITEMS: BOMB, ROPE ===
function useBomb() {
  if (bombs <= 0 || player.dead) return;
  bombs--;
  const bx = Math.floor((player.x + player.w/2) / TILE) + player.facing;
  const by = Math.floor((player.y + player.h/2) / TILE);
  
  screenShake = 12;
  // Destroy tiles in radius
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const tx = bx + dx, ty = by + dy;
      if (tx > 0 && tx < levelW-1 && ty > 0 && ty < levelH-1) {
        const t = tiles[ty][tx];
        if (t === T.STONE || t === T.MOSS_STONE || t === T.DIRT || t === T.CRUMBLE) {
          tiles[ty][tx] = T.EMPTY;
          spawnParticles(tx*TILE+TILE/2, ty*TILE+TILE/2, COLORS.stone, 4);
        }
      }
    }
  }
  // Damage enemies in range
  for (let e of entities) {
    const dist = Math.hypot(e.x - bx*TILE, e.y - by*TILE);
    if (dist < TILE * 2.5) {
      e.hp -= 2;
      score += 200;
      spawnParticles(e.x + e.w/2, e.y + e.h/2, '#ff8800', 10);
    }
  }
  spawnParticles(bx*TILE+TILE/2, by*TILE+TILE/2, '#ff8800', 20);
  spawnParticles(bx*TILE+TILE/2, by*TILE+TILE/2, '#ffcc00', 12);
}

function useRope() {
  if (ropes <= 0 || player.dead) return;
  ropes--;
  const rx = Math.floor((player.x + player.w/2) / TILE);
  let ry = Math.floor(player.y / TILE) - 1;
  
  // Place rope tiles going up
  let placed = 0;
  while (ry > 0 && placed < 6) {
    if (tiles[ry][rx] === T.EMPTY) {
      tiles[ry][rx] = T.LADDER;
      placedRopes.push({x: rx, y: ry});
      placed++;
    } else {
      break;
    }
    ry--;
  }
}

// === PARTICLES & EFFECTS ===
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5) * 6,
      vy: (Math.random()-0.5) * 6 - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({x, y, text, color, life: 60, vy: -1.5});
}

function updateParticles() {
  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.vx *= 0.96;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);
  
  for (let ft of floatingTexts) {
    ft.y += ft.vy;
    ft.life--;
  }
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

// === RENDERING ===
function render() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);
  
  if (gameState !== 'playing') return;
  
  // Apply shake
  let shakeX = 0, shakeY = 0;
  if (screenShake > 0) {
    shakeX = (Math.random()-0.5) * screenShake;
    shakeY = (Math.random()-0.5) * screenShake;
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }
  
  // Draw ornate top HUD
  drawTopHUD();
  
  // Game viewport
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, hudH, W, gameH);
  ctx.clip();
  ctx.translate(shakeX - cameraX, shakeY + hudH - cameraY);
  
  // Background
  drawBackground();
  
  // Tiles
  drawTiles();
  
  // Items
  drawItems();
  
  // Placed ropes highlight
  // Entities
  drawEntities();
  
  // Player
  drawPlayer();
  
  // Particles
  drawParticles();
  
  // Floating texts
  drawFloatingTexts();
  
  ctx.restore();
  
  // Draw ornate frame around viewport
  drawViewportFrame();
  
  // Draw bottom panel
  drawBottomPanel();
}

function drawBackground() {
  // Dark cave gradient background
  const gradient = ctx.createLinearGradient(0, 0, 0, levelH * TILE);
  gradient.addColorStop(0, '#0a1020');
  gradient.addColorStop(0.5, '#0a0806');
  gradient.addColorStop(1, '#140a06');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, levelW * TILE, levelH * TILE);
  
  // Subtle background stones
  ctx.globalAlpha = 0.15;
  for (let y = 0; y < levelH; y += 3) {
    for (let x = 0; x < levelW; x += 4) {
      ctx.fillStyle = '#2a2418';
      ctx.fillRect(x*TILE + ((y*7)%5), y*TILE, TILE*2, TILE*2);
    }
  }
  ctx.globalAlpha = 1;
}

function drawTiles() {
  const startX = Math.max(0, Math.floor(cameraX / TILE) - 1);
  const startY = Math.max(0, Math.floor(cameraY / TILE) - 1);
  const endX = Math.min(levelW, startX + viewTilesX + 2);
  const endY = Math.min(levelH, startY + viewTilesY + 2);
  
  for (let y = startY; y < endY; y++) {
    for (let x = startX; x < endX; x++) {
      const t = tiles[y][x];
      const px = x * TILE, py = y * TILE;
      
      switch(t) {
        case T.STONE:
          drawStoneTile(px, py, false);
          break;
        case T.MOSS_STONE:
          drawStoneTile(px, py, true);
          break;
        case T.DIRT:
          ctx.fillStyle = COLORS.dirt;
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = COLORS.dirtLt;
          ctx.fillRect(px+2, py+2, 4, 3);
          ctx.fillRect(px+12, py+8, 5, 3);
          ctx.fillRect(px+6, py+16, 4, 3);
          break;
        case T.LADDER:
          drawLadder(px, py);
          break;
        case T.VINE:
          drawVine(px, py, y);
          break;
        case T.SPIKE:
          drawSpike(px, py);
          break;
        case T.PLATFORM:
          ctx.fillStyle = COLORS.stoneLt;
          ctx.fillRect(px, py, TILE, 4);
          break;
        case T.IDOL:
          drawIdol(px, py);
          break;
        case T.CARVED_FACE:
          drawCarvedFace(px, py);
          break;
        case T.TORCH_WALL:
          drawTorchWall(px, py);
          break;
        case T.WEB:
          drawWeb(px, py);
          break;
        case T.EXIT:
          drawExit(px, py);
          break;
        case T.GOLD_VEIN:
          drawGoldVein(px, py);
          break;
        case T.CRUMBLE:
          drawStoneTile(px, py, false);
          // Cracklines
          ctx.strokeStyle = '#111';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(px+4, py+4); ctx.lineTo(px+12, py+12);
          ctx.moveTo(px+18, py+6); ctx.lineTo(px+10, py+18);
          ctx.stroke();
          break;
      }
    }
  }
}

function drawStoneTile(px, py, hasMoss) {
  // Base stone
  ctx.fillStyle = COLORS.stone;
  ctx.fillRect(px, py, TILE, TILE);
  
  // Stone texture - highlight edges
  ctx.fillStyle = COLORS.stoneLt;
  ctx.fillRect(px, py, TILE, 2);
  ctx.fillRect(px, py, 2, TILE);
  
  // Dark edges
  ctx.fillStyle = COLORS.stoneDk;
  ctx.fillRect(px, py + TILE - 2, TILE, 2);
  ctx.fillRect(px + TILE - 2, py, 2, TILE);
  
  // Texture details
  ctx.fillStyle = COLORS.stoneDk;
  ctx.fillRect(px + 8, py + 6, 3, 2);
  ctx.fillRect(px + 4, py + 14, 4, 2);
  ctx.fillRect(px + 16, py + 10, 3, 2);
  
  // Moss on top
  if (hasMoss) {
    ctx.fillStyle = COLORS.moss;
    ctx.fillRect(px, py, TILE, 4);
    ctx.fillStyle = COLORS.mossLt;
    ctx.fillRect(px + 2, py, 3, 3);
    ctx.fillRect(px + 8, py, 4, 2);
    ctx.fillRect(px + 16, py, 5, 3);
    // Dripping moss
    ctx.fillStyle = COLORS.moss;
    ctx.fillRect(px + 4, py + 4, 2, 3);
    ctx.fillRect(px + 18, py + 4, 2, 4);
  }
}

function drawLadder(px, py) {
  ctx.fillStyle = COLORS.ladder;
  ctx.fillRect(px + 4, py, 3, TILE);
  ctx.fillRect(px + TILE - 7, py, 3, TILE);
  // Rungs
  ctx.fillStyle = COLORS.ladderLt;
  ctx.fillRect(px + 4, py + 4, TILE - 8, 2);
  ctx.fillRect(px + 4, py + 12, TILE - 8, 2);
  ctx.fillRect(px + 4, py + 20, TILE - 8, 2);
}

function drawVine(px, py, tileY) {
  ctx.fillStyle = COLORS.vine;
  ctx.fillRect(px + 10, py, 4, TILE);
  // Leaves
  ctx.fillStyle = COLORS.vineLt;
  if (tileY % 2 === 0) {
    ctx.fillRect(px + 6, py + 6, 4, 3);
    ctx.fillRect(px + 14, py + 16, 5, 3);
  } else {
    ctx.fillRect(px + 14, py + 4, 4, 3);
    ctx.fillRect(px + 5, py + 14, 5, 3);
  }
}

function drawSpike(px, py) {
  ctx.fillStyle = COLORS.spike;
  for (let i = 0; i < 4; i++) {
    const sx = px + 2 + i * 5;
    ctx.beginPath();
    ctx.moveTo(sx, py + TILE);
    ctx.lineTo(sx + 2.5, py + 6);
    ctx.lineTo(sx + 5, py + TILE);
    ctx.fill();
  }
  // Shine
  ctx.fillStyle = COLORS.spikeLt;
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(px + 4 + i * 5, py + 8, 1, 4);
  }
}

function drawIdol(px, py) {
  // Golden idol statue
  ctx.fillStyle = COLORS.idol;
  ctx.fillRect(px + 6, py + 4, 12, 16);
  ctx.fillStyle = COLORS.idolLt;
  ctx.fillRect(px + 8, py + 6, 8, 4); // face
  ctx.fillRect(px + 10, py + 2, 4, 4); // crown
  // Eyes
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(px + 9, py + 7, 2, 2);
  ctx.fillRect(px + 13, py + 7, 2, 2);
  // Base
  ctx.fillStyle = COLORS.stoneLt;
  ctx.fillRect(px + 4, py + 18, 16, 4);
}

function drawCarvedFace(px, py) {
  ctx.fillStyle = COLORS.stone;
  ctx.fillRect(px, py, TILE, TILE);
  ctx.fillStyle = COLORS.stoneDk;
  // Face outline
  ctx.fillRect(px + 4, py + 4, 16, 16);
  ctx.fillStyle = COLORS.stoneLt;
  // Eyes
  ctx.fillRect(px + 6, py + 8, 4, 3);
  ctx.fillRect(px + 14, py + 8, 4, 3);
  // Mouth
  ctx.fillRect(px + 8, py + 14, 8, 3);
  // Nose
  ctx.fillRect(px + 11, py + 10, 2, 4);
}

function drawTorchWall(px, py) {
  // Bracket
  ctx.fillStyle = '#5a4a3a';
  ctx.fillRect(px + 9, py + 8, 6, 12);
  ctx.fillRect(px + 7, py + 6, 10, 4);
  
  // Flame (animated)
  const flicker = Math.sin(frameCount * 0.2 + px) * 2;
  ctx.fillStyle = COLORS.torch;
  ctx.fillRect(px + 9 + flicker*0.3, py + 2, 6, 6);
  ctx.fillStyle = COLORS.torchLt;
  ctx.fillRect(px + 10 + flicker*0.5, py, 4, 4);
  
  // Glow
  ctx.globalAlpha = 0.15 + Math.sin(frameCount * 0.1) * 0.05;
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.arc(px + 12, py + 4, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawWeb(px, py) {
  ctx.strokeStyle = COLORS.web;
  ctx.lineWidth = 1;
  ctx.beginPath();
  // Web strands
  ctx.moveTo(px, py); ctx.lineTo(px + TILE, py + TILE);
  ctx.moveTo(px + TILE, py); ctx.lineTo(px, py + TILE);
  ctx.moveTo(px + TILE/2, py); ctx.lineTo(px + TILE/2, py + TILE);
  ctx.moveTo(px, py + TILE/2); ctx.lineTo(px + TILE, py + TILE/2);
  ctx.stroke();
  // Concentric rings
  ctx.beginPath();
  ctx.arc(px + TILE/2, py + TILE/2, 4, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(px + TILE/2, py + TILE/2, 8, 0, Math.PI*2);
  ctx.stroke();
}

function drawExit(px, py) {
  // Door frame
  ctx.fillStyle = '#4a3a20';
  ctx.fillRect(px + 2, py, 20, TILE);
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(px + 5, py + 2, 14, TILE - 2);
  // Skull decoration
  ctx.fillStyle = '#ddd';
  ctx.fillRect(px + 9, py + 4, 6, 5);
  ctx.fillStyle = '#333';
  ctx.fillRect(px + 10, py + 5, 2, 2);
  ctx.fillRect(px + 13, py + 5, 2, 2);
  // Glow
  ctx.globalAlpha = 0.3 + Math.sin(frameCount * 0.05) * 0.15;
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(px + 5, py + 2, 14, TILE - 2);
  ctx.globalAlpha = 1;
}

function drawGoldVein(px, py) {
  ctx.fillStyle = COLORS.stone;
  ctx.fillRect(px, py, TILE, TILE);
  // Gold streaks
  ctx.fillStyle = COLORS.goldDk;
  ctx.fillRect(px + 3, py + 5, 6, 3);
  ctx.fillRect(px + 12, py + 10, 5, 4);
  ctx.fillRect(px + 7, py + 16, 4, 3);
  ctx.fillStyle = COLORS.gold;
  ctx.fillRect(px + 4, py + 6, 3, 1);
  ctx.fillRect(px + 13, py + 11, 3, 1);
}

function drawItems() {
  for (let item of items) {
    if (item.collected) continue;
    const bob = Math.sin(frameCount * 0.06 + item.bobOffset) * 3;
    const ix = item.x - 6, iy = item.y - 6 + bob;
    
    switch(item.type) {
      case 'gold':
        ctx.fillStyle = COLORS.goldDk;
        ctx.fillRect(ix, iy, 12, 12);
        ctx.fillStyle = COLORS.gold;
        ctx.fillRect(ix + 2, iy + 2, 8, 8);
        ctx.fillStyle = '#fff8cc';
        ctx.fillRect(ix + 3, iy + 3, 3, 3);
        break;
      case 'gem':
        ctx.fillStyle = COLORS.gem;
        ctx.beginPath();
        ctx.moveTo(ix + 6, iy);
        ctx.lineTo(ix + 12, iy + 5);
        ctx.lineTo(ix + 6, iy + 12);
        ctx.lineTo(ix, iy + 5);
        ctx.fill();
        ctx.fillStyle = COLORS.gemLt;
        ctx.fillRect(ix + 4, iy + 3, 4, 3);
        break;
      case 'health':
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(ix + 3, iy + 1, 6, 10);
        ctx.fillRect(ix + 1, iy + 3, 10, 6);
        break;
      case 'bomb_pickup':
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(ix + 6, iy + 7, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ff8800';
        ctx.fillRect(ix + 5, iy, 2, 4);
        break;
      case 'rope_pickup':
        ctx.fillStyle = COLORS.ladder;
        ctx.fillRect(ix + 4, iy + 2, 4, 8);
        ctx.strokeStyle = COLORS.ladderLt;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(ix + 6, iy + 3, 3, 0, Math.PI);
        ctx.stroke();
        break;
    }
  }
}

function drawEntities() {
  for (let e of entities) {
    if (e.hp <= 0) continue;
    const flap = Math.sin(e.frame * 0.3) * 3;
    
    switch(e.type) {
      case 'bat':
        // Body
        ctx.fillStyle = '#6a2a8a';
        ctx.fillRect(e.x + 4, e.y + 4, 10, 8);
        // Wings
        ctx.fillStyle = '#8a3aaa';
        ctx.fillRect(e.x, e.y + 2 + flap, 6, 6);
        ctx.fillRect(e.x + 12, e.y + 2 + flap, 6, 6);
        // Eyes
        ctx.fillStyle = '#ff0';
        ctx.fillRect(e.x + 5, e.y + 5, 2, 2);
        ctx.fillRect(e.x + 11, e.y + 5, 2, 2);
        break;
      case 'snake':
        ctx.fillStyle = '#2a8a2a';
        ctx.fillRect(e.x + 2, e.y + 10, 16, 6);
        ctx.fillRect(e.x, e.y + 8, 6, 4);
        ctx.fillStyle = '#4aba4a';
        ctx.fillRect(e.x + 4, e.y + 11, 10, 3);
        // Head
        ctx.fillStyle = '#1a6a1a';
        ctx.fillRect(e.x + (e.vx > 0 ? 14 : 0), e.y + 8, 6, 6);
        // Eyes/tongue
        ctx.fillStyle = '#ff0';
        ctx.fillRect(e.x + (e.vx > 0 ? 16 : 2), e.y + 9, 2, 2);
        ctx.fillStyle = '#f00';
        ctx.fillRect(e.x + (e.vx > 0 ? 19 : -1), e.y + 11, 3, 1);
        break;
      case 'spider':
        ctx.fillStyle = '#5a2a1a';
        ctx.beginPath();
        ctx.arc(e.x + 8, e.y + 8, 7, 0, Math.PI*2);
        ctx.fill();
        // Legs
        ctx.strokeStyle = '#3a1a0a';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 4; i++) {
          const lx = e.x + 3 + i * 3;
          ctx.beginPath();
          ctx.moveTo(lx, e.y + 8);
          ctx.lineTo(lx - 3, e.y + 15 + (i%2)*2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(lx + 6, e.y + 8);
          ctx.lineTo(lx + 9, e.y + 15 + (i%2)*2);
          ctx.stroke();
        }
        // Eyes
        ctx.fillStyle = '#f00';
        ctx.fillRect(e.x + 5, e.y + 5, 2, 2);
        ctx.fillRect(e.x + 9, e.y + 5, 2, 2);
        // Thread
        ctx.strokeStyle = COLORS.web;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(e.x + 8, e.y);
        ctx.lineTo(e.x + 8, e.startY - 10);
        ctx.stroke();
        break;
      case 'skeleton':
        // Body
        ctx.fillStyle = '#ddd';
        ctx.fillRect(e.x + 6, e.y + 2, 8, 6);
        ctx.fillRect(e.x + 7, e.y + 8, 6, 6);
        // Legs
        ctx.fillRect(e.x + 7, e.y + 12, 2, 5);
        ctx.fillRect(e.x + 11, e.y + 12, 2, 5);
        // Arms
        ctx.fillRect(e.x + 3, e.y + 5, 4, 2);
        ctx.fillRect(e.x + 13, e.y + 5, 4, 2);
        // Skull
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x + 7, e.y, 6, 5);
        ctx.fillStyle = '#000';
        ctx.fillRect(e.x + 8, e.y + 1, 2, 2);
        ctx.fillRect(e.x + 11, e.y + 1, 2, 2);
        ctx.fillRect(e.x + 9, e.y + 3, 2, 1);
        break;
    }
  }
}

function drawPlayer() {
  if (player.dead) return;
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;
  
  const px = player.x, py = player.y;
  const f = player.facing;
  
  // Body
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(px + 3, py + 8, 14, 10);
  
  // Shirt
  ctx.fillStyle = '#c4956a';
  ctx.fillRect(px + 4, py + 9, 12, 8);
  
  // Legs
  ctx.fillStyle = '#5a4020';
  const legOffset = player.onGround ? (Math.abs(player.vx) > 0.5 ? (player.frame % 2) * 2 : 0) : 0;
  ctx.fillRect(px + 5, py + 17, 4, 5);
  ctx.fillRect(px + 11, py + 17 + legOffset, 4, 5);
  
  // Head
  ctx.fillStyle = '#e8c8a0';
  ctx.fillRect(px + 5, py + 2, 10, 8);
  
  // Hat
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(px + 3, py, 14, 4);
  ctx.fillRect(px + 5, py - 2, 10, 3);
  
  // Eyes
  ctx.fillStyle = '#000';
  if (f > 0) {
    ctx.fillRect(px + 11, py + 5, 2, 2);
  } else {
    ctx.fillRect(px + 7, py + 5, 2, 2);
  }
  
  // Whip/arm
  ctx.fillStyle = '#8b6914';
  if (f > 0) {
    ctx.fillRect(px + 16, py + 10, 4, 2);
  } else {
    ctx.fillRect(px, py + 10, 4, 2);
  }
}

function drawParticles() {
  for (let p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawFloatingTexts() {
  for (let ft of floatingTexts) {
    const alpha = ft.life / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// === HUD RENDERING ===
function drawTopHUD() {
  // Background
  ctx.fillStyle = COLORS.hud_bg;
  ctx.fillRect(0, 0, W, hudH);
  
  // Ornate border
  ctx.fillStyle = COLORS.hud_border;
  ctx.fillRect(0, hudH - 3, W, 3);
  // Decorative dots
  for (let i = 0; i < W; i += 12) {
    ctx.fillRect(i, hudH - 4, 2, 1);
  }
  
  // Vine decoration on border
  ctx.fillStyle = COLORS.moss;
  for (let i = 0; i < W; i += 40) {
    ctx.fillRect(i + 5, hudH - 5, 8, 2);
    ctx.fillStyle = COLORS.mossLt;
    ctx.fillRect(i + 7, hudH - 6, 3, 2);
    ctx.fillStyle = COLORS.moss;
  }
  
  const pad = 8;
  const ty = hudH / 2 + 1;
  ctx.font = 'bold 11px monospace';
  ctx.textBaseline = 'middle';
  
  // Left section: Lives, Health, Bombs, Ropes
  ctx.textAlign = 'left';
  let lx = pad;
  
  // Lives
  ctx.fillStyle = COLORS.hud_text;
  ctx.fillText('♦x' + lives, lx, ty);
  lx += 44;
  
  // Health hearts
  for (let i = 0; i < maxHealth; i++) {
    ctx.fillStyle = i < health ? '#ff4444' : '#442222';
    ctx.fillText('♥', lx + i * 14, ty);
  }
  lx += maxHealth * 14 + 10;
  
  // Bombs
  ctx.fillStyle = '#ff8800';
  ctx.fillText('💣' + bombs, lx, ty);
  lx += 40;
  
  // Ropes
  ctx.fillStyle = COLORS.ladder;
  ctx.fillText('🪢' + ropes, lx, ty);
  
  // Center: Title
  ctx.textAlign = 'center';
  ctx.fillStyle = COLORS.hud_text;
  ctx.font = 'bold 12px monospace';
  ctx.fillText('RUINS DELVER', W/2, ty);
  
  // Right section: Gold, Timer, Level
  ctx.textAlign = 'right';
  ctx.font = 'bold 11px monospace';
  let rx = W - pad;
  
  // Level
  ctx.fillStyle = '#8b9';
  ctx.fillText('L' + level, rx, ty);
  rx -= 36;
  
  // Timer
  const mins = Math.floor(timer / 3600);
  const secs = Math.floor((timer % 3600) / 60);
  ctx.fillStyle = '#aaa';
  ctx.fillText(String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0'), rx, ty);
  rx -= 56;
  
  // Gold
  ctx.fillStyle = COLORS.gold;
  ctx.fillText('$' + gold, rx, ty);
}

function drawViewportFrame() {
  // Ornate stone frame around game viewport
  const frameW = 4;
  ctx.fillStyle = COLORS.hud_border;
  // Top
  ctx.fillRect(0, hudH, W, frameW);
  // Bottom
  ctx.fillRect(0, hudH + gameH - frameW, W, frameW);
  // Left
  ctx.fillRect(0, hudH, frameW, gameH);
  // Right
  ctx.fillRect(W - frameW, hudH, frameW, gameH);
  
  // Corner decorations
  const cs = 10;
  ctx.fillStyle = COLORS.idolLt;
  // Top-left
  ctx.fillRect(0, hudH, cs, cs);
  ctx.fillRect(2, hudH + 2, cs - 4, cs - 4);
  // Top-right
  ctx.fillRect(W - cs, hudH, cs, cs);
  // Bottom-left
  ctx.fillRect(0, hudH + gameH - cs, cs, cs);
  // Bottom-right
  ctx.fillRect(W - cs, hudH + gameH - cs, cs, cs);
}

function drawBottomPanel() {
  const by = hudH + gameH;
  
  // Background
  ctx.fillStyle = COLORS.hud_bg;
  ctx.fillRect(0, by, W, bottomH);
  
  // Top border
  ctx.fillStyle = COLORS.hud_border;
  ctx.fillRect(0, by, W, 3);
  
  // Vine decoration
  ctx.fillStyle = COLORS.moss;
  for (let i = 0; i < W; i += 35) {
    ctx.fillRect(i + 3, by + 1, 6, 2);
  }
  
  // Three sections
  const secW = W / 3;
  
  // Left: Inventory
  ctx.fillStyle = COLORS.hud_dim;
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('INVENTORY', secW * 0.5, by + 6);
  
  // Inventory grid
  const invY = by + 18;
  const invSlotSize = Math.min(24, (secW - 20) / 4);
  const invStartX = (secW - invSlotSize * 4 - 6) / 2;
  const invItems = [
    {icon: '💣', count: bombs, color: '#ff8800'},
    {icon: '🪢', count: ropes, color: '#8b6914'},
    {icon: '🔥', count: torches, color: '#ff4400'},
    {icon: '🔑', count: player.hasKey ? 1 : 0, color: '#ffd700'}
  ];
  for (let i = 0; i < 4; i++) {
    const ix = invStartX + i * (invSlotSize + 2);
    ctx.fillStyle = 'rgba(40,30,15,0.8)';
    ctx.fillRect(ix, invY, invSlotSize, invSlotSize);
    ctx.strokeStyle = COLORS.hud_border;
    ctx.lineWidth = 1;
    ctx.strokeRect(ix, invY, invSlotSize, invSlotSize);
    if (invItems[i].count > 0) {
      ctx.font = `${Math.floor(invSlotSize*0.55)}px monospace`;
      ctx.fillStyle = invItems[i].color;
      ctx.textAlign = 'center';
      ctx.fillText(invItems[i].icon, ix + invSlotSize/2, invY + 2);
      ctx.font = 'bold 8px monospace';
      ctx.fillStyle = '#fff';
      ctx.fillText(String(invItems[i].count), ix + invSlotSize/2, invY + invSlotSize - 9);
    }
  }
  
  // Center: Journal/Parchment
  const bookX = secW + 8;
  const bookW = secW - 16;
  const bookY = by + 6;
  const bookH = bottomH - 12;
  
  // Parchment background
  ctx.fillStyle = COLORS.parchment;
  ctx.fillRect(bookX, bookY, bookW, bookH);
  ctx.fillStyle = COLORS.parchmentDk;
  ctx.fillRect(bookX, bookY, 3, bookH);
  ctx.fillRect(bookX + bookW - 3, bookY, 3, bookH);
  ctx.fillRect(bookX + bookW/2 - 1, bookY, 2, bookH); // Spine
  
  // Book text
  ctx.fillStyle = '#3a2a1a';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('JUNGLE RUINS', bookX + bookW * 0.25, bookY + 10);
  ctx.font = '7px monospace';
  ctx.fillText('Level ' + level, bookX + bookW * 0.25, bookY + 22);
  ctx.fillText('Find the exit', bookX + bookW * 0.25, bookY + 32);
  
  ctx.font = 'bold 8px monospace';
  ctx.fillText('HAZARDS', bookX + bookW * 0.75, bookY + 10);
  ctx.font = '7px monospace';
  ctx.fillText('Spikes ▲', bookX + bookW * 0.75, bookY + 22);
  ctx.fillText('Enemies ☠', bookX + bookW * 0.75, bookY + 32);
  
  // Right: Status
  ctx.fillStyle = COLORS.hud_dim;
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STATUS', secW * 2.5, by + 6);
  
  ctx.textAlign = 'left';
  ctx.font = 'bold 10px monospace';
  const statX = secW * 2 + 12;
  let statY = by + 18;
  
  ctx.fillStyle = COLORS.gold;
  ctx.fillText('SCORE: ' + score, statX, statY);
  statY += 14;
  ctx.fillStyle = '#8b9';
  ctx.fillText('GOLD: ' + gold, statX, statY);
  statY += 14;
  ctx.fillStyle = COLORS.gem;
  ctx.fillText('GEMS: ' + gems, statX, statY);
  statY += 14;
  ctx.fillStyle = '#aaa';
  ctx.fillText('DEPTH: ' + level, statX, statY);
}

// === MINIMAP (on HUD) ===
// Simplified - drawn as part of game render

// === GAME FLOW ===
function startGame() {
  hideAllOverlays();
  gameState = 'playing';
  level = 1; lives = 3; health = maxHealth;
  bombs = 4; ropes = 4; torches = 2;
  gold = 0; gems = 0; score = 0; timer = 0;
  particles = []; floatingTexts = [];
  generateLevel(level);
}

function nextLevel() {
  hideAllOverlays();
  level++;
  if (level > MAX_LEVELS) {
    // Win! Add bonus and end
    score += 5000;
    gameOver();
    return;
  }
  gameState = 'playing';
  health = Math.min(health + 1, maxHealth);
  bombs += 2; ropes += 2;
  generateLevel(level);
}

function levelComplete() {
  gameState = 'levelcomplete';
  const timeBonus = Math.max(0, 3000 - Math.floor(timer / 60) * 10);
  score += timeBonus;
  document.getElementById('levelScore').textContent = 'Score: ' + score;
  document.getElementById('levelBonus').textContent = 'Time bonus: +' + timeBonus;
  document.getElementById('levelCompleteScreen').classList.remove('hidden');
}

function gameOver() {
  gameState = 'gameover';
  document.getElementById('finalScore').textContent = 'Score: ' + score;
  document.getElementById('finalLevel').textContent = 'Reached Level ' + level + ' | Gold: ' + gold;
  
  // Check high score
  const scores = getScores();
  if (scores.length < 10 || score > scores[scores.length - 1].score) {
    document.getElementById('initialsEntry').classList.remove('hidden');
    document.getElementById('gameOverBtns').style.marginTop = '8px';
    buildInitialsInput();
  } else {
    document.getElementById('initialsEntry').classList.add('hidden');
  }
  
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function showTitle() {
  hideAllOverlays();
  gameState = 'title';
  document.getElementById('titleScreen').classList.remove('hidden');
}

function showScores() {
  hideAllOverlays();
  const scores = getScores();
  const list = document.getElementById('scoresList');
  list.innerHTML = '';
  if (scores.length === 0) {
    list.innerHTML = '<p style="color:#666;font-size:12px;text-align:center">No scores yet. Go explore!</p>';
  } else {
    for (let i = 0; i < scores.length; i++) {
      const row = document.createElement('div');
      row.className = 'score-row';
      row.innerHTML = `<span style="color:#8b6914">${i+1}.</span><span style="color:#ffd700">${scores[i].initials}</span><span>${scores[i].score}</span><span style="color:#666">L${scores[i].level}</span>`;
      list.appendChild(row);
    }
  }
  document.getElementById('scoresScreen').classList.remove('hidden');
}

function hideAllOverlays() {
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('levelCompleteScreen').classList.add('hidden');
  document.getElementById('scoresScreen').classList.add('hidden');
}

// === HIGH SCORES ===
function getScores() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveScore(initials, sc, lvl) {
  const scores = getScores();
  scores.push({initials, score: sc, level: lvl, date: Date.now()});
  scores.sort((a,b) => b.score - a.score);
  if (scores.length > 10) scores.length = 10;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
}

// Initials input
let currentInitials = [65, 65, 65]; // A, A, A
let currentSlot = 0;

function buildInitialsInput() {
  currentInitials = [65, 65, 65];
  currentSlot = 0;
  const box = document.getElementById('initialsBox');
  box.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const slot = document.createElement('div');
    slot.className = 'init-slot';
    slot.innerHTML = `
      <button class="init-arrow" onclick="changeInitial(${i},1)">▲</button>
      <div class="init-letter" id="initLetter${i}">${String.fromCharCode(currentInitials[i])}</div>
      <button class="init-arrow" onclick="changeInitial(${i},-1)">▼</button>
    `;
    box.appendChild(slot);
  }
}

function changeInitial(slot, dir) {
  currentInitials[slot] += dir;
  if (currentInitials[slot] > 90) currentInitials[slot] = 65;
  if (currentInitials[slot] < 65) currentInitials[slot] = 90;
  document.getElementById('initLetter' + slot).textContent = String.fromCharCode(currentInitials[slot]);
}

function submitInitials() {
  const initials = currentInitials.map(c => String.fromCharCode(c)).join('');
  saveScore(initials, score, level);
  document.getElementById('initialsEntry').classList.add('hidden');
}

// === INPUT HANDLING ===
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyB') useBomb();
  if (e.code === 'KeyR') useRope();
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  e.preventDefault();
});

// Touch controls
function setupTouch() {
  const btnUp = document.getElementById('btnUp');
  const btnLeft = document.getElementById('btnLeft');
  const btnRight = document.getElementById('btnRight');
  const btnJump = document.getElementById('btnJump');
  const btnBomb = document.getElementById('btnBomb');
  const btnRope = document.getElementById('btnRope');
  
  function addTouchEvents(btn, stateKey, action) {
    const start = (e) => { e.preventDefault(); if (stateKey) touchState[stateKey] = true; if (action) action(); };
    const end = (e) => { e.preventDefault(); if (stateKey) touchState[stateKey] = false; };
    btn.addEventListener('touchstart', start, {passive: false});
    btn.addEventListener('touchend', end, {passive: false});
    btn.addEventListener('touchcancel', end, {passive: false});
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', end);
    btn.addEventListener('mouseleave', end);
  }
  
  addTouchEvents(btnUp, 'up', null);
  addTouchEvents(btnLeft, 'left', null);
  addTouchEvents(btnRight, 'right', null);
  addTouchEvents(btnJump, 'jump', null);
  addTouchEvents(btnBomb, null, useBomb);
  addTouchEvents(btnRope, null, useRope);
}
setupTouch();

// === MAIN LOOP ===
function gameLoop() {
  frameCount++;
  
  if (gameState === 'playing') {
    timer++;
    updatePlayer();
    updateEntities();
    updateParticles();
  }
  
  render();
  requestAnimationFrame(gameLoop);
}

// Start
gameLoop();
</script>
