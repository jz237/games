// Premium title cabinet art. If the generated art is missing or fails to load,
// the procedural poster backdrop below remains the fallback.
const TITLE_CABINET_ART_SRC = 'assets/title-cabinet-art.png';
const titleCabinetArt = {img:new Image(),loaded:false,failed:false};
titleCabinetArt.img.onload=()=>{titleCabinetArt.loaded=true;};
titleCabinetArt.img.onerror=()=>{titleCabinetArt.failed=true;};
titleCabinetArt.img.src=TITLE_CABINET_ART_SRC;

// --- Resize ---
let W = 0, H = 0;
function resize(){
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

// --- Audio ---
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  if(audioCtx&&audioCtx.state==='suspended'){try{audioCtx.resume()}catch(e){}}
}
function playTone(freq,dur,type,vol,ramp,delay=0){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime+delay;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type||'square';o.frequency.setValueAtTime(freq,t);
    if(ramp!==undefined&&ramp!==null)o.frequency.linearRampToValueAtTime(ramp,t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(vol||0.15,t+Math.min(0.01,dur*0.25));
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(t);o.stop(t+dur+0.02);
  }catch(e){}
}
function playWarble(freqA,freqB,freqC,dur,type,vol,delay=0){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime+delay;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type||'sine';
    o.frequency.setValueAtTime(freqA,t);
    o.frequency.linearRampToValueAtTime(freqB,t+dur*0.5);
    o.frequency.linearRampToValueAtTime(freqC,t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(vol||0.1,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+0.02);
  }catch(e){}
}

const spriteCache = {};
function cacheSprite(name,pixels,palette,scale=SPRITE_SCALE){const h=pixels.length,w=pixels[0].length,c=document.createElement('canvas');c.width=w*scale;c.height=h*scale;const sx=c.getContext('2d');sx.imageSmoothingEnabled=false;for(let y=0;y<h;y++)for(let x=0;x<w;x++){const color=palette[pixels[y][x]];if(color){sx.fillStyle=color;sx.fillRect(x*scale,y*scale,scale,scale);}}spriteCache[name]={canvas:c,w,h,scale};}
function cacheAllSprites(){for(const [name,pixels] of Object.entries(SPRITES)){let pal=null; if(name.startsWith('ptero'))pal='ptero'; else if(name==='trollHand')pal='troll'; if(pal)cacheSprite(name,pixels,SPRITE_PALETTES[pal]);}}
function drawCachedSprite(name,x,y,displayW,displayH,flip=false,alpha=1){const s=spriteCache[name];if(!s)return;ctx.save();ctx.imageSmoothingEnabled=false;ctx.globalAlpha=alpha;if(flip){ctx.translate(x+displayW,y);ctx.scale(-1,1);ctx.drawImage(s.canvas,0,0,displayW,displayH);}else ctx.drawImage(s.canvas,x,y,displayW,displayH);ctx.restore();}

function generateBG(){
  bgLayers=[];
  for(let layer=0;layer<3;layer++){
    const formations=[];
    const count=10+layer*6;
    for(let i=0;i<count;i++){
      formations.push({
        x:Math.random()*Math.max(W,1200),
        w:30+Math.random()*90+layer*25,
        h:80+Math.random()*230+layer*45,
        top:Math.random()>0.45,
        glow:Math.random(),
        seed:Math.random()*1000
      });
    }
    bgLayers.push({formations,depth:[0.05,0.12,0.20][layer],alpha:[0.22,0.32,0.46][layer]});
  }
}

// --- Platform generation ---
function generatePlatforms(waveNum){
  platforms=[];
  const fragileStart = waveNum >= 5;
  const lavaLine = H*0.84;
  const clampX = (x,w)=>Math.max(18,Math.min(W-w-18,x));
  const addPlat=(cx,cy,bw,fragile,nest=true)=>{
    const variance=(Math.random()-0.5)*40;
    const pw=Math.max(96,Math.min(W-36,bw+variance));
    const px=clampX(cx-pw/2,pw);
    const py=Math.min(cy,lavaLine-70);
    const tier=py<H*0.31?'high':py>H*0.61?'low':'mid';
    platforms.push({x:px,y:py,w:pw,h:26+Math.floor(Math.random()*5),fragile,crackTimer:0,crackPulse:0,creakCooldown:0,broken:false,hasNest:nest,seed:Math.random()*999,tier});
  };
  const wide=Math.min(W*0.54,420);
  const side=Math.min(W*0.32,190);
  const top=Math.min(W*0.28,165);
  // Dense Williams-Joust-inspired cave shelves: top pairs, side ledges, long center, low approach ledges.
  addPlat(W*0.28,H*0.18,top,fragileStart&&Math.random()>0.75,true);
  addPlat(W*0.72,H*0.18,top,fragileStart&&Math.random()>0.75,true);
  addPlat(W*0.20,H*0.34,side,fragileStart&&Math.random()>0.68,true);
  addPlat(W*0.80,H*0.34,side,fragileStart&&Math.random()>0.68,true);
  addPlat(W*0.50,H*0.49,wide,fragileStart&&Math.random()>0.72,true);
  addPlat(W*0.25,H*0.64,side+20,fragileStart&&Math.random()>0.62,true);
  addPlat(W*0.75,H*0.64,side+20,fragileStart&&Math.random()>0.62,true);
  addPlat(W*0.50,H*0.74,Math.min(W*0.36,250),fragileStart&&Math.random()>0.58,false);
}

// --- Entity factories ---
function createPlayer(){
  const p = platforms[Math.floor(platforms.length/2)];
  return {
    x:p?p.x+p.w/2:W/2, y:p?p.y-PLAYER_H:H*0.4,
    vx:0, vy:0, facing:1,
    wingFrame:0, wingTimer:0, flapPunch:0,
    type:'player', color:'#E8A800', glowColor:'rgba(255,215,0,0.8)'
  };
}

function createEnemy(type,x,y){
  const colors={bounder:'#00A8FF',hunter:'#FF2020',shadow:'#B000FF'};
  const speeds={bounder:0.7,hunter:1.0,shadow:1.4};
  const flapRates={bounder:0.6+Math.random()*0.4,hunter:0.4+Math.random()*0.3,shadow:0.3+Math.random()*0.2};
  return {
    x,y,vx:(Math.random()>0.5?1:-1)*60*speeds[type],vy:0,
    facing:1,wingFrame:0,wingTimer:0,
    type,color:colors[type],glowColor:type==='bounder'?'rgba(0,168,255,0.75)':type==='hunter'?'rgba(255,32,32,0.75)':'rgba(190,0,255,0.8)',
    speed:speeds[type],flapRate:flapRates[type],
    flapCooldown:Math.random()*flapRates[type],
    ai:{changeTimer:1+Math.random()*2,targetVx:0,wander:(Math.random()-0.5)*160},
    scoreVal:type==='bounder'?500:type==='hunter'?750:1000
  };
}

let waveStartTime = 0;
function spawnWaveEnemies(){
  const bounders=Math.max(3,3+Math.floor(wave*0.5));
  const hunters=wave>=4?Math.max(1,Math.floor((wave-3)*0.8)):0;
  const shadows=wave>=7?Math.max(1,Math.floor((wave-6)*0.5)):0;
  let spawnable=platforms.filter(p=>!p.broken&&p.hasNest);
  if(spawnable.length===0)spawnable=platforms.filter(p=>!p.broken);
  if(spawnable.length===0){generatePlatforms(wave);spawnable=platforms.filter(p=>!p.broken);}
  let list=[];
  for(let i=0;i<bounders;i++)list.push('bounder');
  for(let i=0;i<hunters;i++)list.push('hunter');
  for(let i=0;i<shadows;i++)list.push('shadow');
  waveStartTime=gameTime;
  list.forEach((type,i)=>{
    const p=spawnable.length?spawnable[i%spawnable.length]:null;
    const sx=p?p.x+p.w/2:W*(0.25+0.5*((i%5)/4));
    const sy=p?p.y-PLAYER_H:H*(0.22+0.18*((i%3)/2));
    const e=createEnemy(type,sx,sy);
    enemySpawnDramas.push({x:sx,y:sy+PLAYER_H-12,type,life:1.05,maxLife:1.05,seed:i*17+wave});
    burstFeathers(sx,sy+PLAYER_H-18,type==='hunter'?'#FF7A2A':type==='shadow'?'#C55CFF':'#7FE7FF',14);
    e.vy=0;
    e.invincible=0.5; // brief invincibility on spawn
    enemies.push(e);
  });
}

function spawnFlapFeathers(entity,count=1){

}

}

function createImpactBurst(x,y,dir=1,color='#FFD700'){
  // impactBurst: comic-book radial burst + white lance spark + feather shrapnel.
  const rays=[];

    embers.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-90,life:0.45+Math.random()*0.45,maxLife:0.9,r:2+Math.random()*3,color:'#FFD700'});
  }
}
function lavaSplash(x,y,big=true){
  lavaBursts.push({x,y:Math.min(y,lavaY+12),r:big?42:28,life:0.95,maxLife:0.95,parts:Array.from({length:big?68:38},()=>({a:-Math.PI+Math.random()*Math.PI,s:130+Math.random()*360,rr:3+Math.random()*6,c:['#FFFF88','#FFD000','#FF7A00','#FF2600','#B00000'][Math.floor(Math.random()*5)]}))});
  for(let i=0;i<(big?55:30);i++)spawnEmber(x+(Math.random()-0.5)*70,lavaY+4);
}
function spawnTouchPulse(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  const x=(clientX-rect.left)/rect.width*W, y=(clientY-rect.top)/rect.height*H;
  touchPulses.push({x,y,life:0.25,maxLife:0.25});
}
function createDeathFragments(){
  if(!player)return [];
  const dir=player.facing||1, x=player.x, y=player.y+30;
  return [
    {kind:'riderBody',x:x-8,y:y-25,vx:-120*dir,vy:-260,rot:0,rs:-7*dir,hit:false,color:'#FFD700'},
    {kind:'helmet',x:x+5,y:y-45,vx:80*dir,vy:-310,rot:0,rs:10*dir,hit:false,color:'#FFD700'},
    {kind:'birdBody',x:x,y:y+2,vx:-40*dir,vy:-210,rot:0,rs:4*dir,hit:false,color:player.color},
    {kind:'wingL',x:x-28*dir,y:y+4,vx:-190*dir,vy:-240,rot:0,rs:-12*dir,hit:false,color:'#FFFFFF'},
    {kind:'wingR',x:x+24*dir,y:y+8,vx:160*dir,vy:-180,rot:0,rs:9*dir,hit:false,color:'#C0C0C0'}

}
function finishDeathSequence(){
  if(pendingGameOver){
    pendingGameOver=false;
    sfxGameOver();
    loadLocalScores();
    const qualifies=localScores.length<10||score>localScores[localScores.length-1].score;
    state=(qualifies&&score>0)?'highscoreEntry':'gameOver';
    if(state==='highscoreEntry'){hsInitials=['A','A','A'];hsPos=0;}
  }else respawnPlayer();
}
// --- Egg ---
function burnEggInLava(eg){
  const bx=eg.x||0, by=Math.min(eg.y||lavaY,lavaY+4);
  lavaSplash(bx,lavaY,false);
  burstFeathers(bx,by,eg.type==='bounder'?'#4488FF':eg.type==='hunter'?'#FF6A00':'#AA44FF',18);
  sfxLavaPop();
}
function dropEgg(x,y,type){
  // find platform below; if none exists, the egg falls into lava and disintegrates.
  let landY=null;
  for(const p of platforms){
    if(!p.broken&&x>p.x&&x<p.x+p.w&&p.y>y&&p.y<lavaY-18&&(landY===null||p.y<landY))landY=p.y;
  }
  if(landY===null){
    const ghost={x,y,type};
    burnEggInLava(ghost);
    return;
  }
  // Long hatch timer like arcade Joust — generous pickup window
  eggs.push({x,y,targetY:landY-14,vy:0,type,hatchTimer:15+Math.random()*5,pulsePhase:0,landed:false});
}

// --- Pterodactyl ---
function spawnPtero(){

// --- Input ---
let touchDown = false;
let touchSide = 0; // -1=left, 1=right, 0=none
function isInteractiveTouchTarget(target){return !!(target&&target.closest&&(target.closest('button')||target.closest('.overlay')));}
document.addEventListener('touchmove',(e)=>{if(isInteractiveTouchTarget(e.target))return;if(e.cancelable)e.preventDefault();},{passive:false});
function getTouchSide(clientX){
  const rect=canvas.getBoundingClientRect();
  const relX=(clientX-rect.left)/rect.width;
  return relX<0.5?-1:1;
}
function onDown(e){
  if(isInteractiveTouchTarget(e.target))return;
  if(e.cancelable)e.preventDefault();
  ensureAudio();
  touchDown=true;
  const pt=(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]:e;
  if(state==='playing'&&pt&&pt.clientX!==undefined)spawnTouchPulse(pt.clientX,pt.clientY);
  // Determine touch side
  if(e.changedTouches&&e.changedTouches.length>0){
    touchSide=getTouchSide(e.changedTouches[0].clientX);
  } else if(e.clientX!==undefined){
    touchSide=getTouchSide(e.clientX);
  } else {
    touchSide=1; // default right for keyboard
  }
  if(state==='title'){startGame();return}
  if(state==='gameOver'){
    // check button areas handled in update
  }
}
function onUp(e){
  if(isInteractiveTouchTarget(e.target))return;
  if(e.cancelable)e.preventDefault();
  touchDown=false;
  touchSide=0;
}
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',(e)=>{
  if(isInteractiveTouchTarget(e.target))return;
  if(e.cancelable)e.preventDefault();
  if(e.changedTouches&&e.changedTouches.length>0&&touchDown){
    touchSide=getTouchSide(e.changedTouches[0].clientX);
  }
},{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mouseup',onUp);

// --- Button handling ---
let buttons = [];
function addButton(label,x,y,w,h,cb){
  buttons.push({label,x,y,w,h,cb});
}
function checkButtons(px,py){
  for(const b of buttons){
    if(px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h){b.cb();return true}
  }
  return false;
}

canvas.addEventListener('click',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const sx=(e.clientX-rect.left)/rect.width*W;
  const sy=(e.clientY-rect.top)/rect.height*H;
  checkButtons(sx,sy);
});
canvas.addEventListener('touchend',(e)=>{
  if(e.changedTouches&&e.changedTouches.length>0){
    const t=e.changedTouches[0];
    const rect=canvas.getBoundingClientRect();
    const sx=(t.clientX-rect.left)/rect.width*W;
    const sy=(t.clientY-rect.top)/rect.height*H;
    checkButtons(sx,sy);
  }
},{passive:true});

// --- Start Game ---
function startGame(){
  state='playing';score=0;lives=3;wave=0;extraLifeGiven=false;trollHand=null;
  enemies=[];feathers=[];eggs=[];embers=[];explosions=[];impactBursts=[];scorePopups=[];lavaBursts=[];smokeWisps=[];waterDrops=[];touchPulses=[];enemySpawnDramas=[];deathPieces=[];ptero=null;pteroTimer=0;pteroWarnTimer=0;pteroWarnActive=false;gameTime=0;invincTimer=0;pendingGameOver=false;scoreFlashTimer=0;lifeFlashTimer=0;extraLifeBannerTimer=0;waveKills=0;waveEggs=0;lastWaveStats=null;
  generatePlatforms(1);
  player=createPlayer();
  nextWave();
}

function nextWave(){
  if(state==='playing'&&wave>0){lastWaveStats={wave,kills:waveKills,eggs:waveEggs,time:Math.max(0,gameTime-waveStartTime),bonus:500*wave};}
  wave++;
  waveKills=0;waveEggs=0;
  lavaBase=H*0.84;
  lavaY=lavaBase;
  lavaRiseRate=0;
  lavaSurging=false;
  lavaSurgeTimer=Infinity;
  if(wave>1){
    generatePlatforms(wave);
    // Keep the player exactly where they cleared the last wave; only the new enemies reset.
  }
  state='waveTrans';waveTransTimer=3.0;
  waveCountdown=3.0; waveLastTick=4; waveFlashTimer=0.35;
  sfxWaveStart();
}

function playerDie(){
  lives--;
  sfxDeath();
  deathPieces=createDeathFragments();
  shakeTimer=0.5;shakeMag=12;deathFlashTimer=1.5;
  burstFeathers(player.x,player.y,player.color,70);
  createExplosion(player.x,player.y+20,true);
  pendingGameOver=lives<=0;
  state='dying';dyingTimer=1.5;
  invincTimer=2.0;
}

function respawnPlayer(){
  // Respawn in open air near center instead of snapping to a platform.
  player.x=W/2+(Math.random()-0.5)*Math.min(180,W*0.28);
  player.y=H*0.34+(Math.random()-0.5)*Math.min(90,H*0.16);
  player.vx=0;player.vy=0;
  invincTimer=2.0;
  state='playing';
}

// --- Update ---
function update(dt){
  if(dt>0.05)dt=0.05;
  gameTime+=dt;

  // Shake
  if(shakeTimer>0)shakeTimer-=dt;
  // Kill flash
  if(killFlashTimer>0)killFlashTimer-=dt;
  if(deathFlashTimer>0)deathFlashTimer-=dt;
  if(scoreFlashTimer>0)scoreFlashTimer-=dt;
  if(lifeFlashTimer>0)lifeFlashTimer-=dt;
  if(extraLifeBannerTimer>0)extraLifeBannerTimer-=dt;
  for(const p of platforms){if(p.crackPulse>0)p.crackPulse-=dt;if(p.creakCooldown>0)p.creakCooldown-=dt;}
  // Wave countdown
  if(waveCountdown>0)waveCountdown-=dt;

  // Lava embers
  if(Math.random()<dt*45){
    spawnEmber(Math.random()*W,lavaY);
  }

  // Lava bubbles
  if(Math.random()<dt*3){
    sfxLavaPop();
  }
  if(Math.random()<dt*0.55){
    const x=Math.random()*W;
    lavaBursts.push({x,y:lavaY+18,r:8+Math.random()*18,life:0.7,maxLife:0.7,parts:Array.from({length:18},()=>({a:Math.random()*Math.PI*2,s:80+Math.random()*210,rr:2+Math.random()*4}))});
  }
  if(Math.random()<dt*2.2)smokeWisps.push({x:Math.random()*W,y:lavaY-8,vx:(Math.random()-0.5)*18,vy:-20-Math.random()*35,life:2.6,maxLife:2.6,r:18+Math.random()*26});
  if(Math.random()<dt*0.7)smokeWisps.push({x:Math.random()*W,y:lavaY-12,vx:(Math.random()-0.5)*38,vy:-85-Math.random()*70,life:1.9,maxLife:1.9,r:7+Math.random()*12,ashColumn:true});
  if(Math.random()<dt*1.2)waterDrops.push({x:Math.random()*W,y:Math.random()*H*0.45,vy:70+Math.random()*90,life:2,maxLife:2});

  // Lava troll hand
  updateTrollHand(dt);

  if(state==='playing'||state==='waveTrans'){
    // Wave transition countdown
    if(state==='waveTrans'){
      waveTransTimer-=dt;
      const tick=Math.ceil(Math.max(0,waveTransTimer));
      if(tick>0&&tick<waveLastTick){waveLastTick=tick;waveFlashTimer=0.22;shakeTimer=0.12;shakeMag=6;sfxWaveStart();}
      if(waveFlashTimer>0)waveFlashTimer-=dt;
      if(waveTransTimer<=0){
        state='playing';
        spawnWaveEnemies();
        if(wave>=3){pteroTimer=8+Math.random()*6;pteroWarnTimer=Math.max(0,pteroTimer-2.2);pteroWarnActive=false;}
      }
    }
    // Lava resets at each wave start but no longer rises continuously during play.
    if(state==='playing'){
      lavaSurging=false;
      lavaY=lavaBase;
    }

    // Player physics
    if(player&&state==='playing'){
      // Flap
      if(touchDown&&flapping===false){
        flapping=true;
      }
      if(touchDown){
        // Touch-side directional steering
        if(touchSide!==0){
          player.vx+=touchSide*HORIZ_SPEED*dt;
          // Clamp horizontal speed
          if(player.vx>HORIZ_SPEED)player.vx=HORIZ_SPEED;
          if(player.vx<-HORIZ_SPEED)player.vx=-HORIZ_SPEED;
        }
        if(player.wingTimer<=0){
          player.vy=FLAP_POWER;
          player.wingFrame=(player.wingFrame+1)%3;
          player.wingTimer=0.09;
          player.flapPunch=0.12;
          sfxFlap();
          spawnFlapFeathers(player,2);
          // horizontal boost in touch direction
          if(touchSide!==0){
            player.vx+=touchSide*FLAP_HORIZ_BOOST*dt*10;
          }
        }
      } else {
        flapping=false;
        // Horizontal drag when not touching
      }
      player.wingTimer-=dt;
      if(player.flapPunch>0)player.flapPunch-=dt;

      // Idle wing flap when standing on platform (not touching)
      if(!touchDown && player.vy===0 && player.wingTimer<=0){
        player.wingFrame=(player.wingFrame+1)%3;
        player.wingTimer=0.2; // visible idle wing bob
      }

      // Gravity
      player.vy+=GRAVITY*dt;
      if(player.vy>MAX_VY)player.vy=MAX_VY;

      // Player faces direction of movement (or touch side)
      if(touchDown&&touchSide!==0){
        player.facing=touchSide;
      } else if(player.vx>5){
        player.facing=1;
      } else if(player.vx<-5){
        player.facing=-1;
      }

      // Apply velocity
      player.x+=player.vx*dt;
      player.y+=player.vy*dt;

      // Horizontal drag
      player.vx*=0.995;

      // Screen wrap
      if(player.x<-PLAYER_W)player.x=W+PLAYER_W;
      if(player.x>W+PLAYER_W)player.x=-PLAYER_W;

      // Platform collision
      for(const p of platforms){
        if(p.broken)continue;
        // Landing on top of platform (falling down)
        if(player.vy>0&&player.y+PLAYER_H>p.y&&player.y+PLAYER_H<p.y+p.h+player.vy*dt+5&&
           player.x+PLAYER_W/2>p.x&&player.x-PLAYER_W/2<p.x+p.w){
          player.y=p.y-PLAYER_H;
          player.vy=0;
          // Horizontal movement on platform
          if(Math.abs(player.vx)<10)player.vx=0;
          // Fragile
          if(p.fragile){
            p.crackTimer+=dt;
            p.crackPulse=0.18;
            if(p.creakCooldown<=0){sfxCreak();p.creakCooldown=0.42;}
            if(p.crackTimer>1.25){shakeTimer=Math.max(shakeTimer,0.08);shakeMag=Math.max(shakeMag,4);}
            if(p.crackTimer>2){p.broken=true;shakeTimer=0.22;shakeMag=8;createExplosion(p.x+p.w/2,p.y,false);burstFeathers(p.x+p.w/2,p.y,'#888',28);}
          }
        }
        // Bumping head on bottom of platform (rising up)
        if(player.vy<0&&player.y>p.y&&player.y<p.y+p.h&&
           player.y-player.vy*dt<=p.y+p.h&&
           player.x+PLAYER_W/2>p.x&&player.x-PLAYER_W/2<p.x+p.w){
          player.y=p.y+p.h;
          player.vy=0;
        }
      }

      // Lava death
      if(player.y+PLAYER_H>lavaY){
        playerDie();return;
      }

      // Ceiling
      if(player.y<0){player.y=0;player.vy=0;}

      // Safety: if all platforms are broken, respawn them
      if(platforms.every(p=>p.broken)){
        generatePlatforms(wave);
      }

      // Invincibility
      if(invincTimer>0)invincTimer-=dt;

      // Score survival bonus
      bumpScore(Math.floor(dt*5));

      // Extra life
      if(!extraLifeGiven&&score>=10000){lives++;extraLifeGiven=true;lifeFlashTimer=1.2;extraLifeBannerTimer=2.4;shakeTimer=0.28;shakeMag=7;sfxExtraLife();goldenBurst(player.x,player.y-20);addScorePopup(player.x,player.y-55,'EXTRA LIFE!','#7CFF8A');}
    }

    // Enemy AI & physics
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      // Invincibility countdown for freshly spawned enemies
      if(e.invincible!==undefined&&e.invincible>0){
        e.invincible-=dt;
      }
      // AI — arcade flapping: patrol platforms, swoop at player, avoid lava.
      e.ai.changeTimer-=dt;
      if(e.ai.changeTimer<=0){
        e.ai.changeTimer=0.3+Math.random()*0.7;
        e.ai.wander=(Math.random()-0.5)*160;
      }
      const dx=player?player.x-e.x:0;
      const dy=player?player.y-e.y:0;
      const distToLava=lavaY-(e.y+PLAYER_H);
      const criticalLow=distToLava<80;
      const tooLow=distToLava<120;
      // Target altitude: patrol around platforms, dive at player when above
      let targetVx=e.ai.wander;
      let wantFlap=false;
      if(player){
        if(e.type==='bounder'){
          // Bounders: drift toward player horizontally, stay at platform level
          targetVx=dx*0.7+e.ai.wander;
          // Flap to maintain altitude near platforms, not to camp at top
          if(e.y>H*0.6)wantFlap=true; // too low, go up
          if(dy<0&&e.y<player.y-120)wantFlap=false; // high above player, let gravity bring down
        } else if(e.type==='hunter'){
          // Hunters: chase player, try to stay slightly above
          targetVx=dx*2.0;
          if(e.y>player.y-30)wantFlap=true; // below player, flap up
          if(e.y<player.y-150)wantFlap=false; // way above, dive
        } else {
          // Shadows: aggressive, swing wide then dive
          targetVx=dx*2.5+Math.sign(dx||1)*100;
          if(e.y>player.y+10)wantFlap=true; // below player, flap
          if(e.y<player.y-100&&distToLava>200)wantFlap=false; // high up, let dive begin
        }
      }
      // Lava avoidance overrides everything
      if(criticalLow){wantFlap=true;targetVx=(W/2-e.x)*2;}
      else if(tooLow){wantFlap=true;let nearestX=W/2,bestDist=Infinity;for(const p of platforms){if(p.broken)continue;const px=p.x+p.w/2,d=Math.abs(px-e.x);if(d<bestDist){bestDist=d;nearestX=px;}}targetVx=(nearestX-e.x)*2;}
      targetVx=Math.max(-HORIZ_SPEED*e.speed,Math.min(HORIZ_SPEED*e.speed,targetVx));
      e.vx+=(targetVx-e.vx)*dt*(e.type==='bounder'?2.5:e.type==='hunter'?4.0:5.5);

      // Flapping logic
      e.flapCooldown-=dt;
      const flapReady=e.flapCooldown<=0;
      const shouldFlap=flapReady&&(wantFlap||(!tooLow&&e.vy>80));
      if(shouldFlap||criticalLow){
        const power=criticalLow?1.4:tooLow?1.2:1.0;
        e.vy=FLAP_POWER*(0.95+e.speed*0.18)*power;
        const intervals={bounder:[0.5,0.9],hunter:[0.35,0.65],shadow:[0.28,0.5]};
        const iv=intervals[e.type]||intervals.bounder;
        e.flapCooldown=iv[0]+Math.random()*(iv[1]-iv[0]);
        e.wingFrame=(e.wingFrame+1)%3;
        spawnFlapFeathers(e,1+(Math.random()<0.35?1:0));
      }
      // Shadows: gravity boost when diving at player from above
      if(player&&e.type==='shadow'&&e.y<player.y-80&&distToLava>180)e.vy+=GRAVITY*dt*0.5;
      // Hard lava floor
      if(e.y+PLAYER_H>lavaY-30){e.y=lavaY-30-PLAYER_H;e.vy=Math.min(e.vy,FLAP_POWER*1.3);}

      // Gravity
      e.vy+=GRAVITY*dt;
      if(e.vy>MAX_VY)e.vy=MAX_VY;

      e.x+=e.vx*dt;
      e.y+=e.vy*dt;

      if(e.vx>5)e.facing=1;
      else if(e.vx<-5)e.facing=-1;

      // Screen wrap
      if(e.x<-PLAYER_W)e.x=W+PLAYER_W;
      if(e.x>W+PLAYER_W)e.x=-PLAYER_W;

      // Platform collision
      for(const p of platforms){
        if(p.broken)continue;
        // Landing on top
        if(e.vy>0&&e.y+PLAYER_H>p.y&&e.y+PLAYER_H<p.y+p.h+e.vy*dt+5&&
           e.x+PLAYER_W/2>p.x&&e.x-PLAYER_W/2<p.x+p.w){
          e.y=p.y-PLAYER_H;
          e.vy=0;
        }
        // Bumping head on bottom
        if(e.vy<0&&e.y>p.y&&e.y<p.y+p.h&&
           e.y-e.vy*dt<=p.y+p.h&&
           e.x+PLAYER_W/2>p.x&&e.x-PLAYER_W/2<p.x+p.w){
          e.y=p.y+p.h;
          e.vy=0;
        }
      }

      // Absolute lava floor: enemies are never allowed into the lava band.
      if(e.y+PLAYER_H>lavaY-40){
        e.y=lavaY-40-PLAYER_H;
        e.vy=FLAP_POWER*1.25;
        e.wingFrame=(e.wingFrame+1)%3;
        spawnFlapFeathers(e,2);
      }

      // Lava death for enemies
      if(e.y+PLAYER_H>lavaY){
        burstFeathers(e.x,lavaY,e.color,20);
        enemies.splice(i,1);
        continue;
      }

      // Player collision (skip if enemy still invincible from spawn)
      if(player&&state==='playing'&&invincTimer<=0&&!(e.invincible>0)){
        const dx=player.x-e.x, dy=player.y-e.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const hitW=PLAYER_W*0.95, hitH=PLAYER_H*0.95;
        if(Math.abs(dx)<hitW && Math.abs(dy)<hitH){
          // Joust rule: whoever's center is higher wins
          const playerMid=player.y+PLAYER_H*0.5;
          const enemyMid=e.y+PLAYER_H*0.5;
          if(playerMid<enemyMid){
            // Player is higher → player wins the joust
            bumpScore(e.scoreVal,e.x,e.y,'+'+e.scoreVal,e.type==='shadow'?'#FF44FF':'#FFD700');
            waveKills++;
            sfxScore();
            sfxKill();
            createImpactBurst((player.x+e.x)/2,(player.y+e.y)/2,player.facing||1,e.color);
            createExplosion(e.x,e.y,true); // big explosion on kill
            burstFeathers(e.x,e.y,e.color,50);
            dropEgg(e.x,e.y,e.type);
            enemies.splice(i,1);
            player.vy=FLAP_POWER*0.7;
            killFlashTimer=0.15;
            // Brief freeze frame for impact
            state='playing'; // stay playing, but add a micro-pause via shake
          } else if(enemyMid<playerMid){
            // Enemy is higher → enemy wins
            playerDie();return;
          } else {
            // Same height → bounce apart
            player.vx+=dx*3;player.vy-=80;
            e.vx-=dx*3;e.vy-=80;
          }
        }
      }
    }

    // Eggs
    for(let i=eggs.length-1;i>=0;i--){
      const eg=eggs[i];
      if(!eg.landed){
        eg.vy+=GRAVITY*dt*0.5;
        eg.y+=eg.vy*dt;
        if(eg.y>=lavaY-8){burnEggInLava(eg);eggs.splice(i,1);continue;}
        if(eg.y>=eg.targetY){eg.y=eg.targetY;eg.landed=true;eg.vy=0;}
      }
      if(eg.landed&&eg.y>=lavaY-18){burnEggInLava(eg);eggs.splice(i,1);continue;}
      eg.pulsePhase+=dt*3;
      eg.hatchTimer-=dt;
      if(eg.hatchTimer<=0){
        // Hatch
        sfxEggHatch();
        burstFeathers(eg.x,eg.y,eg.type==='bounder'?'#4488FF':eg.type==='hunter'?'#FF4444':'#AA44FF',20);
        { const hatchling=createEnemy(eg.type,eg.x,eg.y-PLAYER_H); hatchling.invincible=0.5; enemies.push(hatchling); }
        eggs.splice(i,1);
        continue;
      }
      // Egg pickup — generous hitbox, any direction
      if(eg.landed&&player&&state==='playing'){
        const dx=player.x-eg.x,dy=(player.y+PLAYER_H*0.5)-eg.y;
        if(Math.abs(dx)<40&&Math.abs(dy)<35){
          bumpScore(250,eg.x,eg.y,'+250','#FFE98A');
          waveEggs++;
          sfxScore();
          sfxEggStomp();
          goldenBurst(eg.x,eg.y); // golden egg collect burst
          eggs.splice(i,1);
          player.vy=FLAP_POWER*0.4;
        }
      }
      // Lava safety: eggs touching the lava are destroyed so they cannot block wave clear.
      if(eg.y>=lavaY-18){burnEggInLava(eg);eggs.splice(i,1);continue;}
    }

    // Pterodactyl
    if(pteroTimer>0&&state==='playing'){
      pteroTimer-=dt;
      pteroWarnTimer-=dt;
      if(!pteroWarnActive&&pteroWarnTimer<=0&&pteroTimer>0){pteroWarnActive=true;sfxPteroWarn();shakeTimer=Math.max(shakeTimer,0.12);shakeMag=Math.max(shakeMag,5);}
      if(pteroTimer<=0){pteroWarnActive=false;spawnPtero();}
    }
    if(ptero){
      ptero.phase+=dt*2.5;
      ptero.x+=ptero.vx*dt;
      ptero.y=ptero.baseY+Math.sin(ptero.phase)*80;
      if(ptero.streakLife>0)ptero.streakLife-=dt;
      ptero.wingTimer-=dt;
      if(ptero.wingTimer<=0){ptero.wingFrame=(ptero.wingFrame+1)%2;ptero.wingTimer=0.15;}
      // Pterodactyl collision with player
      if(ptero&&player&&state==='playing'){
        const px=player.x-ptero.x,py=player.y-ptero.y;
        if(Math.sqrt(px*px+py*py)<75){
          // Joust rule: higher player kills pterodactyl
          const playerMid=player.y+PLAYER_H*0.5;
          const pteroMid=ptero.y+32; // approximate center of ptero
          if(playerMid<pteroMid&&invincTimer<=0){
            // Player wins — kill pterodactyl
            bumpScore(1000,ptero.x,ptero.y,'+1000','#FF44FF');
            sfxPteroKill();
            createImpactBurst((player.x+ptero.x)/2,(player.y+ptero.y)/2,player.facing||1,'#FF44FF');
            createExplosion(ptero.x,ptero.y,true);
            burstFeathers(ptero.x,ptero.y,'#FF6A00',50);
            killFlashTimer=0.18;
            shakeTimer=0.25;shakeMag=10;
            ptero=null;
            player.vy=FLAP_POWER*0.5; // bounce up like killing an enemy
            // Next ptero spawns later
            if(wave>=3){pteroTimer=8+Math.random()*6;pteroWarnTimer=Math.max(0,pteroTimer-2.2);pteroWarnActive=false;}
          } else if(invincTimer<=0) {
            // Pterodactyl kills player
            playerDie();return;
          }
        }
      }
      // Off screen — ptero escaped, small dodge bonus
      if(ptero&&((ptero.vx>0&&ptero.x>W+100)||(ptero.vx<0&&ptero.x<-100))){
        ptero=null;
        bumpScore(100); // dodge bonus
        if(wave>=3){pteroTimer=6+Math.random()*8;pteroWarnTimer=Math.max(0,pteroTimer-2.2);pteroWarnActive=false;}
      }
    }

    // Wave clear check
    // Wave clear check (only after enemies have had time to spawn — at least 3s after wave start)
    if(state==='playing'&&enemies.length===0&&eggs.length===0&&(gameTime-waveStartTime)>3.0){
      bumpScore(500*wave);
      nextWave();
    }

    // Feathers
    for(let i=feathers.length-1;i>=0;i--){
      const f=feathers[i];
      f.x+=f.vx*dt;f.y+=f.vy*dt;
      f.vy+=200*dt; // light gravity
      f.vx*=0.98;
      f.rot+=f.rotSpeed*dt;
      f.life-=dt;
      if(f.life<=0)feathers.splice(i,1);
    }

    // Embers
    for(let i=embers.length-1;i>=0;i--){
      const em=embers[i];
      em.x+=em.vx*dt;em.y+=em.vy*dt;
      em.life-=dt;
      if(em.life<=0)embers.splice(i,1);
    }


    // Score popups / atmospheric particles
    for(let i=scorePopups.length-1;i>=0;i--){
      const sp=scorePopups[i]; sp.y-=40*dt; sp.life-=dt; if(sp.flash>0)sp.flash-=dt; if(sp.life<=0)scorePopups.splice(i,1);
    }
    for(let i=lavaBursts.length-1;i>=0;i--){
      lavaBursts[i].life-=dt; if(lavaBursts[i].life<=0)lavaBursts.splice(i,1);
    }
    for(let i=smokeWisps.length-1;i>=0;i--){
      const sm=smokeWisps[i]; sm.x+=sm.vx*dt; sm.y+=sm.vy*dt; sm.r+=10*dt; sm.life-=dt; if(sm.life<=0)smokeWisps.splice(i,1);
    }
    for(let i=waterDrops.length-1;i>=0;i--){
      const wd=waterDrops[i]; wd.y+=wd.vy*dt; wd.life-=dt; if(wd.life<=0||wd.y>lavaY)waterDrops.splice(i,1);
    }
    for(let i=touchPulses.length-1;i>=0;i--){touchPulses[i].life-=dt;if(touchPulses[i].life<=0)touchPulses.splice(i,1);}
    for(let i=enemySpawnDramas.length-1;i>=0;i--){enemySpawnDramas[i].life-=dt;if(enemySpawnDramas[i].life<=0)enemySpawnDramas.splice(i,1);}
    for(let i=impactBursts.length-1;i>=0;i--){impactBursts[i].life-=dt;if(impactBursts[i].life<=0)impactBursts.splice(i,1);}

    // Explosions
    for(let i=explosions.length-1;i>=0;i--){
      explosions[i].time+=dt;
      if(explosions[i].time>=explosions[i].duration)explosions.splice(i,1);
    }
  }

  if(state==='dying'){
    dyingTimer-=dt;
    for(const dp of deathPieces){dp.x+=dp.vx*dt;dp.y+=dp.vy*dt;dp.vy+=GRAVITY*dt;dp.rot+=dp.rs*dt;if(!dp.hit&&dp.y>lavaY-8){dp.hit=true;lavaSplash(dp.x,lavaY,true);dp.vx*=0.35;dp.vy=-120-Math.random()*120;}}
    if(dyingTimer<=0)finishDeathSequence();
    // Still update feathers/embers
    for(let i=feathers.length-1;i>=0;i--){
      const f=feathers[i];f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=200*dt;f.vx*=0.98;f.rot+=f.rotSpeed*dt;f.life-=dt;
      if(f.life<=0)feathers.splice(i,1);
    }
    for(let i=embers.length-1;i>=0;i--){
      const em=embers[i];em.x+=em.vx*dt;em.y+=em.vy*dt;em.life-=dt;
      if(em.life<=0)embers.splice(i,1);
    }
    for(let i=explosions.length-1;i>=0;i--){
      explosions[i].time+=dt;if(explosions[i].time>=explosions[i].duration)explosions.splice(i,1);
    }
    for(let i=touchPulses.length-1;i>=0;i--){touchPulses[i].life-=dt;if(touchPulses[i].life<=0)touchPulses.splice(i,1);}
    for(let i=impactBursts.length-1;i>=0;i--){impactBursts[i].life-=dt;if(impactBursts[i].life<=0)impactBursts.splice(i,1);}
  }
}

function drawBG(){

  sky.addColorStop(0,'#02050B'); sky.addColorStop(0.34,'#071323'); sky.addColorStop(0.62,'#1B1420'); sky.addColorStop(0.82,'#230904'); sky.addColorStop(1,'#3A0800');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Distant lava glow wash from below.
  const wash=ctx.createLinearGradient(0,H*0.25,0,H);
  wash.addColorStop(0,'rgba(255,90,0,0)'); wash.addColorStop(1,'rgba(255,105,0,0.28)');
  ctx.fillStyle=wash; ctx.fillRect(0,0,W,H);

  // Visual-bible blue cave opening: cold upper rim against molten underlight.
  ctx.save();ctx.globalCompositeOperation='screen';
  const blue=ctx.createRadialGradient(W*.58,H*.18,20,W*.58,H*.18,Math.max(W,H)*.55);
  blue.addColorStop(0,'rgba(80,150,210,.20)');blue.addColorStop(.35,'rgba(28,74,112,.14)');blue.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=blue;ctx.fillRect(0,0,W,H*.62);ctx.restore();

  // Painterly cavern ceiling silhouettes framing gameplay like the cabinet art.
  ctx.save();
  for(let i=0;i<11;i++){
    const x=i*W/10+Math.sin(i*2.9+gameTime*.08)*24;
    const h=H*(.13+.16*Math.abs(Math.sin(i*1.77)));
    const grad=ctx.createLinearGradient(x,0,x,h);grad.addColorStop(0,'rgba(0,2,8,.96)');grad.addColorStop(1,'rgba(3,8,18,.18)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(x-70,0);ctx.lineTo(x+72,0);ctx.lineTo(x+28,h*.72);ctx.lineTo(x+8,h);ctx.lineTo(x-18,h*.64);ctx.closePath();ctx.fill();
  }
  ctx.restore();

  for(let li=0;li<bgLayers.length;li++){
    const layer=bgLayers[li];
    const off=(gameTime*18 + (player?player.x*0.012:0))*layer.depth;
    const color=[`rgba(12,9,16,${layer.alpha})`,`rgba(25,17,18,${layer.alpha})`,`rgba(42,25,20,${layer.alpha})`][li];
    ctx.fillStyle=color;
    for(const f of layer.formations){
      let x=((f.x-off)%(W+220)); if(x<-120)x+=W+220;
      const base=f.top?0:H;
      const dir=f.top?1:-1;
      const h=f.h, w=f.w;
      ctx.beginPath();
      ctx.moveTo(x-w/2,base);
      ctx.lineTo(x-w*0.25,base+dir*h*(0.55+0.2*Math.sin(f.seed)));
      ctx.lineTo(x,base+dir*h);
      ctx.lineTo(x+w*0.28,base+dir*h*(0.48+0.2*Math.cos(f.seed)));
      ctx.lineTo(x+w/2,base); ctx.closePath(); ctx.fill();
      if(f.glow>0.64){
        ctx.save(); ctx.globalCompositeOperation='lighter';
        ctx.strokeStyle=f.glow>0.86?'rgba(120,255,150,0.22)':'rgba(255,145,40,0.30)';
        ctx.lineWidth=1.2+li;
        ctx.beginPath();
        ctx.moveTo(x-w*.08,base+dir*h*.22); ctx.lineTo(x+w*.12,base+dir*h*.48); ctx.lineTo(x-w*.02,base+dir*h*.72);
        ctx.stroke(); ctx.restore();
      }
    }
  }
  // Far magma falls and wall cracks.
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(let i=0;i<7;i++){
    const x=(i*211+Math.sin(gameTime*.15+i)*30)%W;
    const alpha=0.16+0.08*Math.sin(gameTime*2+i);
    ctx.strokeStyle=`rgba(255,92,12,${alpha})`; ctx.lineWidth=2+(i%3);
    ctx.beginPath(); ctx.moveTo(x,0); ctx.bezierCurveTo(x+10,H*.22,x-8,H*.44,x+4,H*.7); ctx.stroke();
  }
  ctx.restore();
  // Foreground stalactites, wet drips, smoke, and deeper cave motion.
  ctx.save();
  const fgOff=(player?player.x*0.018:0)+gameTime*7;
  for(let i=0;i<18;i++){
    const x=((i*97-fgOff)%(W+160));
    const sx=x<-80?x+W+160:x;
    const len=34+28*Math.abs(Math.sin(i*2.17));
    ctx.fillStyle=i%3===0?'rgba(55,42,38,.58)':'rgba(32,27,32,.64)';
    ctx.beginPath();ctx.moveTo(sx-12,0);ctx.lineTo(sx+12,0);ctx.lineTo(sx+Math.sin(gameTime+i)*4,len);ctx.closePath();ctx.fill();
    if(i%4===0){ctx.strokeStyle='rgba(150,220,255,.22)';ctx.beginPath();ctx.moveTo(sx,len-3);ctx.lineTo(sx,len+12+8*Math.sin(gameTime*2+i));ctx.stroke();}
  }
  ctx.restore();
  for(let i=0;i<5;i++){
    const x=(W*(0.12+i*.21)+Math.sin(gameTime*.33+i)*22)%W;
    const top=H*(0.16+(i%2)*.08), bottom=Math.min(lavaY-30,H*.86);
    const grad=ctx.createLinearGradient(x,top,x,bottom);grad.addColorStop(0,'rgba(255,95,0,0.02)');grad.addColorStop(.55,'rgba(255,80,0,.13)');grad.addColorStop(1,'rgba(255,210,80,.28)');
    ctx.fillStyle=grad;ctx.fillRect(x-3,top,6,bottom-top);
  }
  // Drips, heat shimmer, ash columns, and smoke.
  for(const wd of waterDrops){ctx.strokeStyle=`rgba(155,220,255,${0.35*wd.life/wd.maxLife})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(wd.x,wd.y);ctx.lineTo(wd.x,wd.y+8);ctx.stroke();}
  for(const sm of smokeWisps){
    const a=sm.life/sm.maxLife;
    if(sm.ashColumn){
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.fillStyle=`rgba(255,165,70,${0.10*a})`;ctx.beginPath();ctx.ellipse(sm.x,sm.y,sm.r*.85,sm.r*3.2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(90,84,78,${0.28*a})`;ctx.beginPath();ctx.ellipse(sm.x+Math.sin(gameTime*5+sm.x)*8,sm.y,sm.r*1.6,sm.r*4.6,Math.sin(gameTime+sm.x),0,Math.PI*2);ctx.fill();ctx.restore();
    }else{ctx.fillStyle=`rgba(130,120,120,${0.12*a})`;ctx.beginPath();ctx.ellipse(sm.x,sm.y,sm.r,sm.r*.45,Math.sin(gameTime+sm.x),0,Math.PI*2);ctx.fill();}
  }
}

function drawForegroundDepth(){
  // near-camera chains, hanging bones/roots/stalactites, and fast smoke layers
  const off=gameTime*34+(player?player.x*.035:0);

  ctx.fillStyle='rgba(0,2,8,.72)';
  ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,H*.68);ctx.quadraticCurveTo(W*.08,H*.78,W*.16,H);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(W,H);ctx.lineTo(W,H*.66);ctx.quadraticCurveTo(W*.90,H*.80,W*.82,H);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,112,24,.15)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(W*.03,H*.73);ctx.lineTo(W*.13,H*.96);ctx.moveTo(W*.96,H*.70);ctx.lineTo(W*.86,H*.98);ctx.stroke();
  for(const pr of FOREGROUND_PROPS){

      ctx.strokeStyle='rgba(245,140,55,.18)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x+sway,-10);ctx.lineTo(x+sway,H*.35);ctx.stroke();
    }else if(pr.kind===1){
      ctx.fillStyle='rgba(190,176,142,.52)';ctx.beginPath();ctx.moveTo(x+sway,H*.03);ctx.lineTo(x+12*pr.scale+sway,H*.25);ctx.lineTo(x-8*pr.scale+sway,H*.27);ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(48,30,24,.65)';ctx.lineWidth=2;ctx.stroke();
    }else if(pr.kind===2){
      ctx.strokeStyle='rgba(54,36,27,.72)';ctx.lineWidth=4*pr.scale;ctx.beginPath();ctx.moveTo(x+sway,-5);ctx.bezierCurveTo(x-25,H*.12,x+18,H*.20,x-7,H*.34);ctx.stroke();
    }else if(pr.kind===3){
      ctx.strokeStyle='rgba(210,195,160,.46)';ctx.lineWidth=3*pr.scale;ctx.beginPath();ctx.moveTo(x-18+sway,H*.12);ctx.lineTo(x+14+sway,H*.17);ctx.moveTo(x-5+sway,H*.10);ctx.lineTo(x-9+sway,H*.20);ctx.stroke();
    }else{
      ctx.fillStyle='rgba(26,21,24,.70)';ctx.beginPath();ctx.moveTo(x-15+sway,0);ctx.lineTo(x+18+sway,0);ctx.lineTo(x+sway,70*pr.scale);ctx.closePath();ctx.fill();
    }
  }
  for(let i=0;i<12;i++){const x=((i*197+gameTime*(46+i*5))%(W+260))-130;ctx.fillStyle=i%3===0?'rgba(35,75,105,.075)':'rgba(120,86,66,.085)';ctx.beginPath();ctx.ellipse(x,H*(.16+.07*(i%7)),100+18*i,22+4*i,Math.sin(gameTime*.7+i),0,Math.PI*2);ctx.fill();}
  // Heavy vignette ties playfield to the darker, painterly title art.
  const vg=ctx.createRadialGradient(W*.5,H*.42,Math.min(W,H)*.22,W*.5,H*.45,Math.max(W,H)*.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(.72,'rgba(0,0,0,.12)');vg.addColorStop(1,'rgba(0,2,8,.56)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

function drawLava(){
  const pulse=0.5+0.5*Math.sin(gameTime*4.2);
  // Warm light cast upward about 100px before the lava body is drawn.
  const glowH=Math.min(110,H*0.18);
  const glowGrad=ctx.createLinearGradient(0,lavaY-glowH,0,lavaY);
  glowGrad.addColorStop(0,'rgba(255,80,0,0)');
  glowGrad.addColorStop(0.55,'rgba(255,90,0,0.10)');
  glowGrad.addColorStop(1,`rgba(255,180,20,${0.28+pulse*0.12})`);
  ctx.fillStyle=glowGrad;
  ctx.fillRect(0,lavaY-glowH,W,glowH);

  // Intense red/orange lava pool, bottom 15-18% of screen.
  const lavaGrad=ctx.createLinearGradient(0,lavaY,0,H);
  lavaGrad.addColorStop(0,`rgb(255,${210+Math.floor(pulse*35)},30)`);
  lavaGrad.addColorStop(0.12,'#FF8A00');
  lavaGrad.addColorStop(0.35,'#FF2600');
  lavaGrad.addColorStop(0.72,'#B00000');
  lavaGrad.addColorStop(1,'#430000');
  ctx.fillStyle=lavaGrad;
  ctx.fillRect(0,lavaY,W,H-lavaY);

  // Shimmering white-hot/yellow surface waves.
  for(let x=0;x<W;x+=4){
    const waveH=5*Math.sin(x*0.025+gameTime*4)+3*Math.sin(x*0.075+gameTime*7);
    ctx.fillStyle=(x%16<8)?'#FFFF66':'#FFCC00';
    ctx.fillRect(x,lavaY+waveH-4,4,8);
  }
  ctx.fillStyle='#FF3300';
  for(let x=0;x<W;x+=9){
    const waveH=4*Math.sin(x*0.02+gameTime*2.5+2);
    ctx.fillRect(x,lavaY+18+waveH,8,5);
  }

  // Actual flames rising from the surface — triangular/teardrop flicker layers.
  const flameCount=Math.max(14,Math.floor(W/48));
  for(let i=0;i<flameCount;i++){
    const fx=(i+0.35+0.25*Math.sin(gameTime*1.7+i))*W/flameCount;
    const fh=24+18*Math.abs(Math.sin(gameTime*3.1+i*1.9));
    const fw=12+5*Math.sin(gameTime*4.3+i);
    const base=lavaY+4*Math.sin(gameTime*5+i);
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(255,40,0,0.75)';
    ctx.beginPath();ctx.moveTo(fx-fw,base+6);ctx.quadraticCurveTo(fx-fw*0.7,base-fh*0.45,fx,base-fh);ctx.quadraticCurveTo(fx+fw*0.8,base-fh*0.35,fx+fw,base+6);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,155,0,0.9)';
    ctx.beginPath();ctx.moveTo(fx-fw*0.55,base+4);ctx.quadraticCurveTo(fx-fw*0.3,base-fh*0.35,fx+2,base-fh*0.78);ctx.quadraticCurveTo(fx+fw*0.45,base-fh*0.22,fx+fw*0.45,base+4);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,90,0.86)';
    ctx.beginPath();ctx.moveTo(fx-3,base+2);ctx.quadraticCurveTo(fx-2,base-fh*0.24,fx+1,base-fh*0.46);ctx.quadraticCurveTo(fx+5,base-fh*0.16,fx+4,base+2);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // Bright bubbles/pops.
  const bubbleCount=10;
  for(let i=0;i<bubbleCount;i++){
    const bx=((gameTime*38+i*W/bubbleCount)%W);
    const by=lavaY+10+Math.sin(gameTime*2.7+i*2.5)*12;
    const br=4+Math.sin(gameTime*3.4+i*1.7)*2.5;
    ctx.fillStyle='rgba(255,240,80,0.82)';
    ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,220,0.45)';
    ctx.beginPath();ctx.arc(bx-br*0.3,by-br*0.35,br*0.35,0,Math.PI*2);ctx.fill();
  }

  // lavaSkullHandShapes — the lava briefly forms faces and reaching fingers.
  for(let i=0;i<5;i++){
    const phase=(gameTime*.36+i*.19)%1;
    if(phase<.28){
      const a=Math.sin(phase/.28*Math.PI)*.32;
      const x=(W*(.12+i*.21)+Math.sin(i*3.7)*44)%W, y=lavaY+38+Math.sin(gameTime*2+i)*12;

  for(const b of lavaBursts){

}

// Lava Troll Hand — reaches up from lava when player is near
let trollHand = null;
function updateTrollHand(dt){
  if(!player||state!=='playing'){trollHand=null;return;}
  const distToLava=player.y+PLAYER_H-lavaY;
  // Activate when player is within 80px of lava
  if(distToLava>-130&&distToLava<55&&player.vy>=-40){
    if(!trollHand){
      trollHand={x:player.x,targetY:player.y+PLAYER_H-10,progress:0,grabbing:false,grabX:player.x,warn:0.45};
      sfxTroll();lavaSplash(player.x,lavaY,false);
    }
    // Track toward player
    trollHand.grabX+=(player.x-trollHand.grabX)*dt*4;
    trollHand.x=trollHand.grabX;
    trollHand.targetY=player.y+PLAYER_H-10;
    trollHand.progress=Math.min(1,trollHand.progress+dt*3.4);
    if(trollHand.warn>0)trollHand.warn-=dt;
    // Check grab
    if(trollHand.progress>0.7){
      const dx=player.x-trollHand.x;
      const dy=player.y-trollHand.targetY;
      if(Math.abs(dx)<PLAYER_W&&Math.abs(dy)<PLAYER_H*0.5){
        // Grabbed! Pull player down
        player.vy=280;
        player.vx*=0.2;
        shakeTimer=0.35;shakeMag=12;lavaSplash(player.x,lavaY,true);
        trollHand.progress=0;
        trollHand=null;
      }
    }
  } else {
    if(trollHand){
      trollHand.progress-=dt*3;
      if(trollHand.progress<=0)trollHand=null;
    }
  }
}
function drawTrollHand(){
  if(!trollHand)return;
  const p=trollHand.progress;

}
function drawPlatform(p){
  if(p.broken)return;
  ctx.save();
  const tremor=(p.crackPulse||0)>0?Math.sin(gameTime*70+(p.seed||0))*Math.min(8,2+p.crackTimer*3):0;
  ctx.translate(tremor,0);
  const seed=p.seed||1;
  const jag=(i)=>Math.sin(seed*7+i*1.73)*3+Math.sin(seed*3+i*0.61)*2;

  // Heavy dark brown/black drop shadow under thick ledge.
  ctx.fillStyle='rgba(0,0,0,0.78)';
  ctx.fillRect(p.x+5,p.y+p.h-1,p.w,7);
  ctx.fillStyle='rgba(40,16,0,0.55)';
  ctx.fillRect(p.x+2,p.y+p.h,p.w,4);

  // Irregular stone shelf silhouette.
  ctx.beginPath();
  ctx.moveTo(p.x,p.y+3+jag(0));
  const segs=Math.max(5,Math.floor(p.w/28));
  for(let i=0;i<=segs;i++){
    const xx=p.x+p.w*i/segs;
    ctx.lineTo(xx,p.y+2+jag(i));
  }
  ctx.lineTo(p.x+p.w,p.y+p.h-3+jag(22));
  for(let i=segs;i>=0;i--){
    const xx=p.x+p.w*i/segs;
    ctx.lineTo(xx,p.y+p.h-1+jag(i+30));
  }
  ctx.closePath();

  const pGrad=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
  if(p.fragile){
    pGrad.addColorStop(0,'#B68C58');
    pGrad.addColorStop(0.28,'#7E5436');
    pGrad.addColorStop(0.66,'#38251D');
    pGrad.addColorStop(1,'#12080A');
  } else if(p.tier==='high'){
    pGrad.addColorStop(0,'#6E8FA9');pGrad.addColorStop(0.24,'#38516B');pGrad.addColorStop(0.62,'#162338');pGrad.addColorStop(1,'#05070C');
  } else if(p.tier==='low'){
    pGrad.addColorStop(0,'#B46A30');pGrad.addColorStop(0.26,'#693019');pGrad.addColorStop(0.64,'#23100E');pGrad.addColorStop(1,'#070203');
  } else {
    pGrad.addColorStop(0,'#796C5B');pGrad.addColorStop(0.22,'#3B4144');pGrad.addColorStop(0.58,'#1B242B');pGrad.addColorStop(1,'#080A0E');
  }
  ctx.fillStyle=pGrad;
  ctx.fill();

  // Lava cast: nearby shelves catch warm orange/yellow light from below.
  const lavaGlow=Math.max(0,1-(lavaY-(p.y+p.h))/110);
  if(lavaGlow>0){
    const warm=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
    warm.addColorStop(0,'rgba(255,190,60,0)');
    warm.addColorStop(1,`rgba(255,125,0,${0.32*lavaGlow})`);
    ctx.fillStyle=warm;
    ctx.fill();
  }

  // Top standable highlight line and bright edge readability.
  ctx.strokeStyle=p.fragile?'rgba(255,210,140,0.55)':'rgba(235,235,210,0.42)';
  ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<=segs;i++){
    const xx=p.x+p.w*i/segs;
    const yy=p.y+2+jag(i);
    if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);
  }
  ctx.stroke();

  // Artwork-like molten seams: black rock with thin orange veins catches the lava light.
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.strokeStyle=p.tier==='high'?'rgba(105,190,255,.22)':'rgba(255,116,28,.34)';
  ctx.lineWidth=1.2;
  for(let i=0;i<Math.max(2,Math.floor(p.w/56));i++){
    const sx=p.x+12+((i*43+seed*19)%(Math.max(16,p.w-24)));
    ctx.beginPath();ctx.moveTo(sx,p.y+5+jag(i));ctx.lineTo(sx+10*Math.sin(seed+i),p.y+p.h-6);ctx.stroke();
  }
  ctx.restore();

  // Dark lower edge for slab thickness.
  ctx.strokeStyle='rgba(0,0,0,0.52)';
  ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(p.x+2,p.y+p.h-3);ctx.lineTo(p.x+p.w-2,p.y+p.h-3);ctx.stroke();

  // Mottled stone texture: deterministic chips and flecks.
  for(let i=0;i<Math.floor(p.w/10);i++){
    const tx=p.x+8+((i*19+seed*37)%(Math.max(10,p.w-16)));
    const ty=p.y+5+((i*13+seed*11)%(Math.max(8,p.h-9)));
    const light=(i%3===0);
    ctx.fillStyle=light?'rgba(255,235,180,0.12)':'rgba(0,0,0,0.20)';
    ctx.beginPath();ctx.ellipse(tx,ty,2+(i%4),1.2+(i%2),0.25*i,0,Math.PI*2);ctx.fill();
  }

  // Block seams/chisel marks.
  ctx.strokeStyle='rgba(0,0,0,0.25)';
  ctx.lineWidth=1;
  for(let cx=p.x+22+(seed%8);cx<p.x+p.w-12;cx+=28){
    ctx.beginPath();ctx.moveTo(cx,p.y+5);ctx.lineTo(cx+4*Math.sin(cx),p.y+p.h-5);ctx.stroke();
  }

  // Tier-specific material language: high pale carved ruins, middle moss/crystal stone, low blackened basalt seams.
  if(p.tier==='high'){
    ctx.strokeStyle='rgba(255,250,220,.34)';ctx.lineWidth=1.5;
    for(let cx=p.x+18;cx<p.x+p.w-22;cx+=42){ctx.beginPath();ctx.arc(cx,p.y+p.h*.45,8,Math.PI*.15,Math.PI*.85);ctx.stroke();ctx.beginPath();ctx.moveTo(cx-10,p.y+7);ctx.lineTo(cx+10,p.y+7);ctx.stroke();}
    ctx.fillStyle='rgba(255,255,235,.18)';for(let i=0;i<4;i++){ctx.fillRect(p.x+14+i*p.w/4,p.y+5,18,3);}
  }else if(p.tier==='middle'){
    ctx.fillStyle='rgba(78,170,88,.34)';for(let i=0;i<Math.max(3,p.w/55);i++){const mx=p.x+12+((i*47+seed*19)%(p.w-24));ctx.beginPath();ctx.ellipse(mx,p.y+4,13,3,0,0,Math.PI*2);ctx.fill();}
    ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle='rgba(88,230,255,.50)';ctx.strokeStyle='rgba(175,255,255,.65)';for(let i=0;i<3;i++){const cx=p.x+p.w*(.25+i*.24)+Math.sin(seed+i)*12;ctx.beginPath();ctx.moveTo(cx,p.y+p.h-2);ctx.lineTo(cx+7,p.y+10);ctx.lineTo(cx+14,p.y+p.h-2);ctx.closePath();ctx.fill();ctx.stroke();}ctx.restore();
  }else if(p.tier==='low'){
    ctx.save();ctx.globalCompositeOperation='lighter';ctx.strokeStyle=`rgba(255,76,0,${.35+.18*Math.sin(gameTime*5+seed)})`;ctx.lineWidth=1.8;
    for(let cx=p.x+10;cx<p.x+p.w-8;cx+=34){ctx.beginPath();ctx.moveTo(cx,p.y+p.h-3);ctx.lineTo(cx+13,p.y+p.h*.58);ctx.lineTo(cx+27,p.y+p.h-4);ctx.stroke();}
    ctx.restore();
  }

  // Fragile platforms are always visibly cracked and browner/weathered.
  if(p.fragile){
    const intensity=0.65+Math.min(p.crackTimer/2,0.35);
    const spread=Math.min(1,p.crackTimer/2);
    ctx.strokeStyle=`rgba(45,18,8,${intensity})`;
    ctx.lineWidth=2.5+spread*2.2;
    const cx=p.x+p.w*0.52;
    ctx.beginPath();ctx.moveTo(cx-4,p.y+2);ctx.lineTo(cx-16,p.y+p.h*0.42);ctx.lineTo(cx-8,p.y+p.h-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+15,p.y+4);ctx.lineTo(cx+5,p.y+p.h*0.58);ctx.lineTo(cx+22,p.y+p.h-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-30-spread*22,p.y+p.h*0.35);ctx.lineTo(cx+26+spread*28,p.y+p.h*0.48);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-5,p.y+p.h*.18);ctx.lineTo(cx-42*spread,p.y+p.h*.72);ctx.lineTo(cx-72*spread,p.y+p.h*.52);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+7,p.y+p.h*.22);ctx.lineTo(cx+48*spread,p.y+p.h*.76);ctx.lineTo(cx+78*spread,p.y+p.h*.34);ctx.stroke();
    ctx.strokeStyle='rgba(255,145,50,0.35)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-4,p.y+2);ctx.lineTo(cx-16,p.y+p.h*0.42);ctx.lineTo(cx-8,p.y+p.h-3);ctx.stroke();
    if(p.crackTimer>1.15){ctx.fillStyle=`rgba(255,80,20,${0.10+0.18*Math.sin(gameTime*18)})`;ctx.fillRect(p.x,p.y,p.w,p.h);}
  }

  // Nest marker: brighter straw ring, still small.
  if(p.hasNest){
    ctx.strokeStyle='rgba(255,210,80,0.75)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(p.x+p.w/2,p.y-5,9,4,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

function drawExplosions(){

      const flashAlpha=1-t/0.25;

    fireGrad.addColorStop(0,`rgba(255,255,150,${(1-t)*0.9})`);

function drawDualLeaderboard(startY){

    ctx.save();
    const cg=ctx.createLinearGradient(x,startY-26,x,startY+cardH);cg.addColorStop(0,'rgba(18,16,24,.82)');cg.addColorStop(1,'rgba(4,4,9,.72)');

    ctx.textAlign='center';ctx.font=`900 ${headerSize}px Arial Black, Impact, sans-serif`;ctx.shadowColor=color;ctx.shadowBlur=14;ctx.fillStyle=color;ctx.fillText(title,x+colW/2,startY);

    ctx.textAlign='left';ctx.font=`800 ${bodySize}px Arial, sans-serif`;
    const icons=['👑','🥈','🥉','✦','✦','✦','✦','✦','✦','✦'];
    for(let i=0;i<10;i++){
      const e=list[i], y=startY+headerSize*1.55+12+i*rowH;
      const fresh=isLocal&&i===hsRank&&state==='gameOver';
      if(fresh){ctx.save();ctx.shadowColor='#FFD700';ctx.shadowBlur=18;ctx.fillStyle='rgba(255,215,0,.20)';roundRect(ctx,x+8,y-rowH+5,colW-16,rowH,7);ctx.fill();ctx.restore();}
      const rowColor=fresh?'#FFF3B0':e?(isLocal?'#C9F8FF':'#FFE8A0'):'rgba(255,255,255,.28)';
      ctx.fillStyle=rowColor;ctx.shadowColor=fresh?'#FFD700':'transparent';ctx.shadowBlur=fresh?10:0;
      const rank=String(i+1).padStart(2,' ');
      if(e){
        const initials=(e.initials||'???').slice(0,3).toUpperCase();
        const sc=String(e.score||0).padStart(7,' '), wv=e.wave||'?';
        ctx.fillText(`${rank}. ${icons[i]}  ${initials}  ${sc}  W${wv}`,x+14,y);
      }else ctx.fillText(`${rank}. ${icons[i]}  ---`,x+14,y);
      ctx.shadowBlur=0;
    }
    ctx.restore();
  }
  drawCard(localX,'🏠 LOCAL','#00DDFF',localScores,true);
  drawCard(globalX,'🌐 GLOBAL','#FFD700',globalScores,false);
  ctx.textAlign='left';
}

// --- Helpers ---
function darken(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.floor(r*(1-amt));g=Math.floor(g*(1-amt));b=Math.floor(b*(1-amt));
  return `rgb(${r},${g},${b})`;
}
function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.floor(r+(255-r)*amt));g=Math.min(255,Math.floor(g+(255-g)*amt));b=Math.min(255,Math.floor(b+(255-b)*amt));
  return `rgb(${r},${g},${b})`;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// --- Main loop ---
let lastTime = 0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt = lastTime ? Math.min((ts-lastTime)/1000, 0.05) : 0.016;
  lastTime = ts;

  buttons = [];

  if(state==='title'){
    lavaY=H*0.84;lavaBase=H*0.84;
    update(dt); // update feathers/embers for demo
    drawTitle();
    return;
  }
  if(state==='leaderboard'){
    drawLeaderboardScreen();
    return;
  }
  if(state==='highscoreEntry'){
    drawHighscoreEntry();
    return;
  }

  update(dt);

  // Apply shake
  ctx.save();
  if(shakeTimer>0){
    ctx.translate((Math.random()-0.5)*shakeMag,(Math.random()-0.5)*shakeMag);
  }

  drawBG();
  drawLava();
  drawTrollHand();
  for(const p of platforms)drawPlatform(p);
  drawEggs();
  drawEnemySpawnDramas();
  drawEmbers();

  // Dramatic death dimming overlay behind the tumbling fragments.
  if(state==='dying'){const a=Math.max(0,dyingTimer/1.5);ctx.fillStyle=`rgba(0,0,0,${0.38*(1-a)+0.12})`;ctx.fillRect(0,0,W,H);}

  // Draw enemies
  for(const e of enemies)drawBird(e,false);

  // Draw player / death fragments
  if(player&&state!=='dying')drawBird(player,true);
  if(state==='dying'){for(const dp of deathPieces)drawDeathPiece(dp);}

  drawPtero();
  drawFeathers();
  drawExplosions();
  drawImpactBursts();
  drawCinematicLighting();
  drawForegroundDepth();
  drawScorePopups();
  drawTouchPulses();

  // Red/orange danger glow when player is near lava (intensified during surge)
  if(player&&state==='playing'){
    const surgeZone=lavaSurging?160:80;
    const distToLava=lavaY-(player.y+PLAYER_H);
    if(distToLava<surgeZone&&distToLava>-20){
      const intensity=Math.max(0,1-distToLava/surgeZone);
      const dangerPulse=lavaSurging?(0.7+0.3*Math.sin(gameTime*14)):(0.6+0.4*Math.sin(gameTime*8));
      const dangerGrad=ctx.createLinearGradient(0,lavaY-surgeZone,0,lavaY);
      dangerGrad.addColorStop(0,'rgba(255,0,0,0)');
      dangerGrad.addColorStop(1,`rgba(255,${lavaSurging?60:0},0,${intensity*dangerPulse*(lavaSurging?0.55:0.35)})`);
      ctx.fillStyle=dangerGrad;
      ctx.fillRect(0,lavaY-surgeZone,W,surgeZone);
      // Screen edge vignette — brighter during surge
      ctx.fillStyle=`rgba(255,${lavaSurging?40:0},0,${intensity*dangerPulse*(lavaSurging?0.22:0.12)})`;
      ctx.fillRect(0,0,W,H);
    }
    // Surge label — drawn in game space above lava, not HUD
    if(lavaSurging){
      const surgePulse=0.75+0.25*Math.sin(gameTime*10);
      ctx.save();
      ctx.globalAlpha=surgePulse;
      const lblY=lavaY-22;
      ctx.font=`bold ${Math.max(13,W*0.028)}px Arial, sans-serif`;
      ctx.textAlign='center';
      ctx.fillStyle='#FF2200';
      ctx.fillText('▲ LAVA SURGE ▲',W/2,lblY);
      ctx.restore();
    }
  }

  // Kill / death flash overlays
  if(killFlashTimer>0){
    ctx.fillStyle=`rgba(255,255,255,${Math.min(1,killFlashTimer/0.15)*0.55})`;
    ctx.fillRect(0,0,W,H);
  }
  if(deathFlashTimer>0){
    const a=Math.min(1,deathFlashTimer/0.45);
    const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.15,W/2,H/2,Math.max(W,H)*0.72);
    vg.addColorStop(0,`rgba(120,0,0,${0.05*a})`);
    vg.addColorStop(1,`rgba(255,0,0,${0.55*a})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }

  drawHUD();

  if(extraLifeBannerTimer>0){const a=Math.min(1,extraLifeBannerTimer/0.45);ctx.save();ctx.textAlign='center';ctx.font=`900 ${Math.max(30,W*.058)}px Arial Black, Impact, sans-serif`;ctx.shadowColor='#7CFF8A';ctx.shadowBlur=30;ctx.fillStyle=`rgba(220,255,190,${a})`;ctx.fillText('EXTRA LIFE!',W/2,H*.20);ctx.restore();}

  if(state==='waveTrans')drawWaveTrans();
  if(state==='gameOver')drawGameOver();

  // Pterodactyl warning / presence edge treatment
  if(pteroWarnActive&&state==='playing'){
    const a=0.22+0.18*Math.sin(gameTime*18);ctx.fillStyle=`rgba(255,0,70,${a})`;ctx.fillRect(0,0,W*.075,H);ctx.fillRect(W*.925,0,W*.075,H);
    ctx.save();ctx.globalAlpha=.35+.25*Math.sin(gameTime*9);ctx.fillStyle='rgba(0,0,0,.82)';
    const sx=W*(.5+.38*Math.sin(gameTime*1.7));ctx.beginPath();ctx.moveTo(sx-210,H*.20);ctx.quadraticCurveTo(sx,H*.06,sx+210,H*.20);ctx.quadraticCurveTo(sx,H*.16,sx-210,H*.20);ctx.fill();
    ctx.strokeStyle='rgba(255,210,170,.20)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(sx-220,H*.21);ctx.lineTo(sx+220,H*.21);ctx.stroke();ctx.restore();
    ctx.save();ctx.textAlign='center';ctx.font=`900 ${Math.max(15,W*.026)}px Arial Black, Impact, sans-serif`;ctx.fillStyle=`rgba(255,230,240,${0.75+a})`;ctx.shadowColor='#FF0044';ctx.shadowBlur=18;ctx.fillText('SCREECH IN THE DARK',W/2,Math.max(72,H*.11));ctx.restore();
  } else if(ptero){
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,W*0.05,H);ctx.fillRect(W*0.95,0,W*0.05,H);
  }

  ctx.restore();
}

// --- Keyboard for desktop ---
let keyLeft = false, keyRight = false;
document.addEventListener('keydown',(e)=>{
  ensureAudio();
  if(e.code==='Space'||e.code==='ArrowUp'){
    touchDown=true;
    if(!touchSide)touchSide=keyLeft?-1:keyRight?1:1;
    if(state==='title')startGame();
    e.preventDefault();
  }
  if(e.code==='ArrowLeft'){keyLeft=true;if(touchDown)touchSide=-1;}
  if(e.code==='ArrowRight'){keyRight=true;if(touchDown)touchSide=1;}
});
document.addEventListener('keyup',(e)=>{
  if(e.code==='Space'||e.code==='ArrowUp'){touchDown=false;touchSide=0;}
  if(e.code==='ArrowLeft'){keyLeft=false;if(!keyRight&&touchSide===-1)touchSide=0;}
  if(e.code==='ArrowRight'){keyRight=false;if(!keyLeft&&touchSide===1)touchSide=0;}
});

// Init lava for title
lavaY=H*0.84;lavaBase=H*0.84;

requestAnimationFrame(loop);

})();
</script>
</body>
</html>
