<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Sky Joust</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;overflow:hidden;overscroll-behavior:none;width:100%;height:100%;background:#000}
canvas{display:block;width:100%;height:100%;touch-action:none}
button{touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const VERSION = 'v1.5.0';

// --- Resize ---
let W = 0, H = 0;
function resize(){
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  ctx.imageSmoothingEnabled = true;
}
resize();
window.addEventListener('resize', resize);

// --- Audio ---
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  if(audioCtx&&audioCtx.state==='suspended'){try{audioCtx.resume()}catch(e){}}
}
function playTone(freq,dur,type,vol,ramp){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type||'square';o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    if(ramp)o.frequency.linearRampToValueAtTime(ramp,audioCtx.currentTime+dur);
    g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxFlap(){playTone(300,0.08,'square',0.1,500)}
function sfxKill(){playTone(400,0.06,'square',0.12,600);setTimeout(()=>playTone(600,0.06,'square',0.12,800),60);setTimeout(()=>playTone(800,0.1,'square',0.12,1000),120)}
function sfxDeath(){playTone(600,0.15,'sawtooth',0.15,200);setTimeout(()=>playTone(300,0.2,'sawtooth',0.12,80),150)}
function sfxEggStomp(){playTone(800,0.08,'square',0.12,1200)}
function sfxEggHatch(){playTone(400,0.1,'sine',0.1,800);setTimeout(()=>playTone(600,0.08,'sine',0.1,1000),100)}
function sfxPtero(){playTone(200,0.3,'sawtooth',0.2,1200)}
function sfxLavaPop(){playTone(1000,0.04,'sine',0.05,600)}
function sfxWaveStart(){for(let i=0;i<4;i++)setTimeout(()=>playTone(300+i*50,0.06,'square',0.08),i*80)}
function sfxGameOver(){playTone(500,0.2,'triangle',0.15,400);setTimeout(()=>playTone(400,0.2,'triangle',0.12,300),200);setTimeout(()=>playTone(300,0.3,'triangle',0.1,150),400)}

// --- Constants ---
const GRAVITY = 1200;
const FLAP_POWER = -420;
const HORIZ_SPEED = 380;
const FLAP_HORIZ_BOOST = 80;
const MAX_VY = 600;
const PLAYER_W = 80;
const PLAYER_H = 64;

// --- Game State ---
let state = 'title'; // title, playing, dying, waveTrans, gameOver, highscoreEntry, leaderboard
let score = 0, lives = 0, wave = 0, extraLifeGiven = false;
let player = null;
let enemies = [], feathers = [], eggs = [], embers = [], explosions = [], platforms = [];
let lavaY = 0, lavaBase = 0, lavaRiseRate = 0;
let pteroTimer = 0, ptero = null;
let waveTransTimer = 0, dyingTimer = 0;
let bgLayers = [];
let flapping = false;
let gameTime = 0;
let shakeTimer = 0, shakeMag = 0;
let invincTimer = 0;
let killFlashTimer = 0;
let waveCountdown = 0;

// --- Leaderboard ---
const LS_KEY = 'skyjoust_highscores';
const API_BASE = 'https://game-scores.jez237.workers.dev/api';
let localScores = [];
let globalScores = [];
let hsInitials = ['A','A','A'];
let hsPos = 0;
let hsRank = -1;
let showingLeaderboard = false;

function loadLocalScores(){
  try{localScores=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){localScores=[]}
}
function saveLocalScores(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(localScores.slice(0,10)))}catch(e){}
}
function addLocalScore(initials,sc,w){
  localScores.push({initials,score:sc,wave:w});
  localScores.sort((a,b)=>b.score-a.score);
  localScores=localScores.slice(0,10);
  saveLocalScores();
  return localScores.findIndex(e=>e.initials===initials&&e.score===sc&&e.wave===w);
}
async function fetchGlobalScores(){
  try{
    const r=await fetch(API_BASE+'/leaderboard/sky-joust');
    if(r.ok){const d=await r.json();globalScores=(d.scores||d||[]).slice(0,10)}
  }catch(e){}
}
async function submitGlobalScore(initials,sc,w){
  try{
    await fetch(API_BASE+'/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'sky-joust',initials,score:sc,wave:w})});
    await fetchGlobalScores();
  }catch(e){}
}

loadLocalScores();
fetchGlobalScores();

// --- BG layers ---
function generateBG(){
  bgLayers=[];
  for(let layer=0;layer<3;layer++){
    const towers=[];
    const count=4+layer*3;
    for(let i=0;i<count;i++){
      const tw=30+Math.random()*60;
      const th=80+Math.random()*200+layer*40;
      towers.push({x:Math.random()*W,w:tw,h:th,hasTorch:Math.random()>0.5});
    }
    bgLayers.push({towers,depth:0.08+layer*0.12,color:`rgba(${8+layer*8},${8+layer*8},${10+layer*7},${0.28+layer*0.08})`});
  }
}
generateBG();

// --- Platform generation ---
function generatePlatforms(waveNum){
  platforms=[];
  const fragileStart = waveNum >= 5;
  const lavaLine = H*0.84;
  const clampX = (x,w)=>Math.max(18,Math.min(W-w-18,x));
  const addPlat=(cx,cy,bw,fragile,nest=true)=>{
    const variance=(Math.random()-0.5)*40;
    const pw=Math.max(96,Math.min(W-36,bw+variance));
    const px=clampX(cx-pw/2,pw);
    platforms.push({x:px,y:Math.min(cy,lavaLine-70),w:pw,h:26+Math.floor(Math.random()*5),fragile,crackTimer:0,broken:false,hasNest:nest,seed:Math.random()*999});
  };
  const wide=Math.min(W*0.54,420);
  const side=Math.min(W*0.32,190);
  const top=Math.min(W*0.28,165);
  // Dense Williams-Joust-inspired cave shelves: top pairs, side ledges, long center, low approach ledges.
  addPlat(W*0.28,H*0.18,top,fragileStart&&Math.random()>0.75,true);
  addPlat(W*0.72,H*0.18,top,fragileStart&&Math.random()>0.75,true);
  addPlat(W*0.20,H*0.34,side,fragileStart&&Math.random()>0.68,true);
  addPlat(W*0.80,H*0.34,side,fragileStart&&Math.random()>0.68,true);
  addPlat(W*0.50,H*0.49,wide,fragileStart&&Math.random()>0.72,true);
  addPlat(W*0.25,H*0.64,side+20,fragileStart&&Math.random()>0.62,true);
  addPlat(W*0.75,H*0.64,side+20,fragileStart&&Math.random()>0.62,true);
  addPlat(W*0.50,H*0.74,Math.min(W*0.36,250),fragileStart&&Math.random()>0.58,false);
}

// --- Entity factories ---
function createPlayer(){
  const p = platforms[Math.floor(platforms.length/2)];
  return {
    x:p?p.x+p.w/2:W/2, y:p?p.y-PLAYER_H:H*0.4,
    vx:0, vy:0, facing:1,
    wingFrame:0, wingTimer:0,
    type:'player', color:'#E8A800', glowColor:'rgba(255,215,0,0.8)'
  };
}

function createEnemy(type,x,y){
  const colors={bounder:'#00A8FF',hunter:'#FF2020',shadow:'#B000FF'};
  const speeds={bounder:0.7,hunter:1.0,shadow:1.4};
  const flapRates={bounder:0.8,hunter:0.6,shadow:0.4};
  return {
    x,y,vx:(Math.random()>0.5?1:-1)*60*speeds[type],vy:0,
    facing:1,wingFrame:0,wingTimer:0,
    type,color:colors[type],glowColor:type==='bounder'?'rgba(0,168,255,0.75)':type==='hunter'?'rgba(255,32,32,0.75)':'rgba(190,0,255,0.8)',
    speed:speeds[type],flapRate:flapRates[type],
    flapCooldown:Math.random()*flapRates[type],
    ai:{changeTimer:1+Math.random()*2,targetVx:0},
    scoreVal:type==='bounder'?500:type==='hunter'?750:1000
  };
}

let waveStartTime = 0;
function spawnWaveEnemies(){
  const bounders=Math.max(3,3+Math.floor(wave*0.5));
  const hunters=wave>=4?Math.floor((wave-3)*0.8):0;
  const shadows=wave>=7?Math.floor((wave-6)*0.5):0;
  const spawnable=platforms.filter(p=>!p.broken&&p.hasNest);
  let list=[];
  for(let i=0;i<bounders;i++)list.push('bounder');
  for(let i=0;i<hunters;i++)list.push('hunter');
  for(let i=0;i<shadows;i++)list.push('shadow');
  waveStartTime=gameTime;
  list.forEach((type,i)=>{
    const p=spawnable[i%spawnable.length]||platforms[0];
    if(p){
      const e=createEnemy(type,p.x+p.w/2,p.y-PLAYER_H);
      // Spawn directly on platform, no drop-in delay
      e.vy=0;
      e.invincible=1.0; // brief invincibility instead of spawnDelay
      enemies.push(e);
    }
  });
}

// --- Feather particles ---
function burstFeathers(x,y,color,count){
  count=Math.max(count,30);
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=60+Math.random()*180;
    feathers.push({
      x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-80,
      rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*8,
      life:1.5+Math.random()*1.5,maxLife:1.5+Math.random()*1.5,
      color,w:3+Math.random()*5,h:1.5+Math.random()*2
    });
  }
}
function trailFeather(x,y,color){
  feathers.push({
    x:x+(Math.random()-0.5)*10,y:y+(Math.random()-0.5)*10,
    vx:(Math.random()-0.5)*30,vy:-20-Math.random()*40,
    rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*4,
    life:0.6+Math.random()*0.4,maxLife:0.6+Math.random()*0.4,
    color,w:2+Math.random()*3,h:1+Math.random()*1.5
  });
}

// --- Ember particles ---
function spawnEmber(x,y){
  const life=1.1+Math.random()*1.8;
  embers.push({x,y,vx:(Math.random()-0.5)*55,vy:-70-Math.random()*150,life,maxLife:life,r:2+Math.random()*3.5});
}

// --- Explosion ---
function createExplosion(x,y,big){
  explosions.push({x,y,time:0,duration:big?0.6:0.4,big,r:big?90:60,particles:[]});
  const pCount=big?60:50;
  const ex=explosions[explosions.length-1];
  for(let i=0;i<pCount;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=40+Math.random()*200;
    ex.particles.push({x:0,y:0,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-60,life:0.3+Math.random()*0.5,maxLife:0.3+Math.random()*0.5,r:2+Math.random()*4,color:['#FFDD44','#FF8800','#FF4400','#FFFFFF','#FFD700'][Math.floor(Math.random()*5)]});
  }
  if(big){shakeTimer=0.25;shakeMag=10;}
}

// --- Egg ---
function dropEgg(x,y,type){
  // find platform below
  let landY=lavaY-10;
  for(const p of platforms){
    if(!p.broken&&x>p.x&&x<p.x+p.w&&p.y>y&&p.y<landY)landY=p.y;
  }
  eggs.push({x,y,targetY:landY-14,vy:0,type,hatchTimer:8+Math.random()*4,pulsePhase:0,landed:false});
}

// --- Pterodactyl ---
function spawnPtero(){
  const fromLeft=Math.random()>0.5;
  ptero={
    x:fromLeft?-120:W+120,y:H*0.2+Math.random()*H*0.2,
    vx:fromLeft?350:-350,baseY:0,phase:0,
    wingFrame:0,wingTimer:0,entering:true
  };
  ptero.baseY=ptero.y;
  sfxPtero();
}

// --- Input ---
let touchDown = false;
let touchSide = 0; // -1=left, 1=right, 0=none
function getTouchSide(clientX){
  const rect=canvas.getBoundingClientRect();
  const relX=(clientX-rect.left)/rect.width;
  return relX<0.5?-1:1;
}
function onDown(e){
  if(e.cancelable)e.preventDefault();
  ensureAudio();
  touchDown=true;
  // Determine touch side
  if(e.changedTouches&&e.changedTouches.length>0){
    touchSide=getTouchSide(e.changedTouches[0].clientX);
  } else if(e.clientX!==undefined){
    touchSide=getTouchSide(e.clientX);
  } else {
    touchSide=1; // default right for keyboard
  }
  if(state==='title'){startGame();return}
  if(state==='gameOver'){
    // check button areas handled in update
  }
}
function onUp(e){
  if(e.cancelable)e.preventDefault();
  touchDown=false;
  touchSide=0;
}
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',(e)=>{
  if(e.cancelable)e.preventDefault();
  if(e.changedTouches&&e.changedTouches.length>0&&touchDown){
    touchSide=getTouchSide(e.changedTouches[0].clientX);
  }
},{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mouseup',onUp);

// --- Button handling ---
let buttons = [];
function addButton(label,x,y,w,h,cb){
  buttons.push({label,x,y,w,h,cb});
}
function checkButtons(px,py){
  for(const b of buttons){
    if(px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h){b.cb();return true}
  }
  return false;
}

canvas.addEventListener('click',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const sx=(e.clientX-rect.left)/rect.width*W;
  const sy=(e.clientY-rect.top)/rect.height*H;
  checkButtons(sx,sy);
});
canvas.addEventListener('touchend',(e)=>{
  if(e.changedTouches&&e.changedTouches.length>0){
    const t=e.changedTouches[0];
    const rect=canvas.getBoundingClientRect();
    const sx=(t.clientX-rect.left)/rect.width*W;
    const sy=(t.clientY-rect.top)/rect.height*H;
    checkButtons(sx,sy);
  }
},{passive:true});

// --- Start Game ---
function startGame(){
  state='playing';score=0;lives=3;wave=0;extraLifeGiven=false;trollHand=null;
  enemies=[];feathers=[];eggs=[];embers=[];explosions=[];ptero=null;pteroTimer=0;gameTime=0;invincTimer=0;
  generatePlatforms(1);
  player=createPlayer();
  nextWave();
}

function nextWave(){
  wave++;
  lavaBase=H*0.84;
  lavaY=lavaBase;
  lavaRiseRate=2+wave*0.8;
  if(wave>1){
    generatePlatforms(wave);
    // reposition player on a safe platform
    const safePlat=platforms.find(p=>!p.broken&&!p.fragile)||platforms[0];
    if(safePlat&&player){player.x=safePlat.x+safePlat.w/2;player.y=safePlat.y-PLAYER_H;player.vx=0;player.vy=0;}
  }
  state='waveTrans';waveTransTimer=3.0;
  waveCountdown=3.0;
  sfxWaveStart();
}

function playerDie(){
  lives--;
  sfxDeath();
  createExplosion(player.x,player.y,true);
  burstFeathers(player.x,player.y,player.color,40);
  if(lives<=0){
    state='gameOver';
    sfxGameOver();
    // Check high score
    loadLocalScores();
    const qualifies=localScores.length<10||score>localScores[localScores.length-1].score;
    if(qualifies&&score>0){
      state='highscoreEntry';hsInitials=['A','A','A'];hsPos=0;
    }
    return;
  }
  state='dying';dyingTimer=1.5;
  invincTimer=2.0;
}

function respawnPlayer(){
  const safePlat=platforms.find(p=>!p.broken)||platforms[0];
  if(safePlat){player.x=safePlat.x+safePlat.w/2;player.y=safePlat.y-PLAYER_H;}
  else{player.x=W/2;player.y=H*0.3;}
  player.vx=0;player.vy=0;
  state='playing';
}

// --- Update ---
function update(dt){
  if(dt>0.05)dt=0.05;
  gameTime+=dt;

  // Shake
  if(shakeTimer>0)shakeTimer-=dt;
  // Kill flash
  if(killFlashTimer>0)killFlashTimer-=dt;
  // Wave countdown
  if(waveCountdown>0)waveCountdown-=dt;

  // Lava embers
  if(Math.random()<dt*30){
    spawnEmber(Math.random()*W,lavaY);
  }

  // Lava bubbles
  if(Math.random()<dt*3){
    sfxLavaPop();
  }

  // Lava troll hand
  updateTrollHand(dt);

  if(state==='playing'||state==='waveTrans'){
    // Wave transition countdown
    if(state==='waveTrans'){
      waveTransTimer-=dt;
      if(waveTransTimer<=0){
        state='playing';
        spawnWaveEnemies();
        if(wave>=3){pteroTimer=8+Math.random()*6;}
      }
    }
    // Lava rise
    if(state==='playing'){
      lavaY-=lavaRiseRate*dt;
      if(lavaY<H*0.5)lavaY=H*0.5; // cap
    }

    // Player physics
    if(player&&state==='playing'){
      // Flap
      if(touchDown&&flapping===false){
        flapping=true;
      }
      if(touchDown){
        // Touch-side directional steering
        if(touchSide!==0){
          player.vx+=touchSide*HORIZ_SPEED*dt;
          // Clamp horizontal speed
          if(player.vx>HORIZ_SPEED)player.vx=HORIZ_SPEED;
          if(player.vx<-HORIZ_SPEED)player.vx=-HORIZ_SPEED;
        }
        if(player.wingTimer<=0){
          player.vy=FLAP_POWER;
          player.wingFrame=(player.wingFrame+1)%3;
          player.wingTimer=0.09;
          sfxFlap();
          trailFeather(player.x,player.y+PLAYER_H/2,player.color);
          trailFeather(player.x,player.y+PLAYER_H/2,player.color);
          // horizontal boost in touch direction
          if(touchSide!==0){
            player.vx+=touchSide*FLAP_HORIZ_BOOST*dt*10;
          }
        }
      } else {
        flapping=false;
        // Horizontal drag when not touching
      }
      player.wingTimer-=dt;

      // Idle wing flap when standing on platform (not touching)
      if(!touchDown && player.vy===0 && player.wingTimer<=0){
        player.wingFrame=(player.wingFrame+1)%3;
        player.wingTimer=0.35; // slow idle flap
      }

      // Gravity
      player.vy+=GRAVITY*dt;
      if(player.vy>MAX_VY)player.vy=MAX_VY;

      // Player faces direction of movement (or touch side)
      if(touchDown&&touchSide!==0){
        player.facing=touchSide;
      } else if(player.vx>5){
        player.facing=1;
      } else if(player.vx<-5){
        player.facing=-1;
      }

      // Apply velocity
      player.x+=player.vx*dt;
      player.y+=player.vy*dt;

      // Horizontal drag
      player.vx*=0.995;

      // Screen wrap
      if(player.x<-PLAYER_W)player.x=W+PLAYER_W;
      if(player.x>W+PLAYER_W)player.x=-PLAYER_W;

      // Platform collision
      for(const p of platforms){
        if(p.broken)continue;
        if(player.vy>0&&player.y+PLAYER_H>p.y&&player.y+PLAYER_H<p.y+p.h+player.vy*dt+5&&
           player.x+PLAYER_W/2>p.x&&player.x-PLAYER_W/2<p.x+p.w){
          player.y=p.y-PLAYER_H;
          player.vy=0;
          // Horizontal movement on platform
          if(Math.abs(player.vx)<10)player.vx=0;
          // Fragile
          if(p.fragile){
            p.crackTimer+=dt;
            if(p.crackTimer>2){p.broken=true;burstFeathers(p.x+p.w/2,p.y,'#888',15);}
          }
        }
      }

      // Lava death
      if(player.y+PLAYER_H>lavaY){
        playerDie();return;
      }

      // Ceiling
      if(player.y<0){player.y=0;player.vy=0;}

      // Invincibility
      if(invincTimer>0)invincTimer-=dt;

      // Score survival bonus
      score+=Math.floor(dt*5);

      // Extra life
      if(!extraLifeGiven&&score>=10000){lives++;extraLifeGiven=true;}
    }

    // Enemy AI & physics
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      // Invincibility countdown for freshly spawned enemies
      if(e.invincible!==undefined&&e.invincible>0){
        e.invincible-=dt;
      }
      // AI
      e.ai.changeTimer-=dt;
      if(e.ai.changeTimer<=0){
        e.ai.changeTimer=0.5+Math.random()*1.5;
        if(e.type==='hunter'&&player){
          // Hunters aggressively chase player X position
          e.ai.targetVx=(player.x-e.x)*2;
          e.ai.targetVx=Math.max(-HORIZ_SPEED*e.speed,Math.min(HORIZ_SPEED*e.speed,e.ai.targetVx));
        } else if(e.type==='shadow'){
          e.ai.targetVx=(Math.random()-0.5)*HORIZ_SPEED*e.speed*2;
        } else {
          e.ai.targetVx=(Math.random()-0.5)*HORIZ_SPEED*e.speed;
        }
      }
      // Hunters continuously track player between AI ticks
      if(e.type==='hunter'&&player){
        const chase=(player.x-e.x)*1.5;
        e.ai.targetVx=Math.max(-HORIZ_SPEED*e.speed,Math.min(HORIZ_SPEED*e.speed,chase));
      }
      e.vx+=(e.ai.targetVx-e.vx)*dt*3;

      // Flap
      e.flapCooldown-=dt;
      if(e.flapCooldown<=0){
        e.vy=FLAP_POWER*e.speed;
        e.flapCooldown=e.flapRate+Math.random()*0.5;
        e.wingFrame=(e.wingFrame+1)%3;
        trailFeather(e.x,e.y+PLAYER_H/2,e.color);
        // Hunters try to match player altitude
        if(e.type==='hunter'&&player&&e.y>player.y+20){
          e.flapCooldown*=0.6;
        }
      }

      // Gravity
      e.vy+=GRAVITY*dt;
      if(e.vy>MAX_VY)e.vy=MAX_VY;

      e.x+=e.vx*dt;
      e.y+=e.vy*dt;

      if(e.vx>5)e.facing=1;
      else if(e.vx<-5)e.facing=-1;

      // Screen wrap
      if(e.x<-PLAYER_W)e.x=W+PLAYER_W;
      if(e.x>W+PLAYER_W)e.x=-PLAYER_W;

      // Platform collision
      for(const p of platforms){
        if(p.broken)continue;
        if(e.vy>0&&e.y+PLAYER_H>p.y&&e.y+PLAYER_H<p.y+p.h+e.vy*dt+5&&
           e.x+PLAYER_W/2>p.x&&e.x-PLAYER_W/2<p.x+p.w){
          e.y=p.y-PLAYER_H;
          e.vy=0;
        }
      }

      // Lava death for enemies
      if(e.y+PLAYER_H>lavaY){
        burstFeathers(e.x,lavaY,e.color,20);
        enemies.splice(i,1);
        continue;
      }

      // Player collision (skip if enemy still invincible from spawn)
      if(player&&state==='playing'&&invincTimer<=0&&!(e.invincible>0)){
        const dx=player.x-e.x, dy=player.y-e.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<PLAYER_W*0.9){
          const playerBottom=player.y+PLAYER_H;
          const enemyBottom=e.y+PLAYER_H;
          if(player.y+PLAYER_H*0.5<e.y+PLAYER_H*0.5-4){
            // Player wins
            score+=e.scoreVal;
            sfxKill();
            createExplosion(e.x,e.y,false);
            burstFeathers(e.x,e.y,e.color,40);
            dropEgg(e.x,e.y,e.type);
            enemies.splice(i,1);
            player.vy=FLAP_POWER*0.7;
            killFlashTimer=0.1;
          } else if(e.y+PLAYER_H*0.5<player.y+PLAYER_H*0.5-4){
            // Enemy wins
            playerDie();return;
          } else {
            // Bounce
            player.vx+=dx*3;player.vy-=80;
            e.vx-=dx*3;e.vy-=80;
          }
        }
      }
    }

    // Eggs
    for(let i=eggs.length-1;i>=0;i--){
      const eg=eggs[i];
      if(!eg.landed){
        eg.vy+=GRAVITY*dt*0.5;
        eg.y+=eg.vy*dt;
        if(eg.y>=eg.targetY){eg.y=eg.targetY;eg.landed=true;eg.vy=0;}
      }
      eg.pulsePhase+=dt*3;
      eg.hatchTimer-=dt;
      if(eg.hatchTimer<=0){
        // Hatch
        sfxEggHatch();
        burstFeathers(eg.x,eg.y,eg.type==='bounder'?'#4488FF':eg.type==='hunter'?'#FF4444':'#AA44FF',20);
        enemies.push(createEnemy(eg.type,eg.x,eg.y-PLAYER_H));
        eggs.splice(i,1);
        continue;
      }
      // Stomp check
      if(eg.landed&&player&&state==='playing'){
        const dx=player.x-eg.x,dy=(player.y+PLAYER_H)-eg.y;
        if(Math.abs(dx)<20&&Math.abs(dy)<15&&player.vy>0){
          score+=250;
          sfxEggStomp();
          burstFeathers(eg.x,eg.y,'#FFEE88',25);
          eggs.splice(i,1);
          player.vy=FLAP_POWER*0.5;
        }
      }
      // Lava
      if(eg.y>lavaY){eggs.splice(i,1)}
    }

    // Pterodactyl
    if(pteroTimer>0&&state==='playing'){
      pteroTimer-=dt;
      if(pteroTimer<=0)spawnPtero();
    }
    if(ptero){
      ptero.phase+=dt*2.5;
      ptero.x+=ptero.vx*dt;
      ptero.y=ptero.baseY+Math.sin(ptero.phase)*80;
      ptero.wingTimer-=dt;
      if(ptero.wingTimer<=0){ptero.wingFrame=(ptero.wingFrame+1)%2;ptero.wingTimer=0.15;}
      // Collision with player
      if(player&&state==='playing'){
        const dx=player.x-ptero.x,dy=player.y-ptero.y;
        if(Math.sqrt(dx*dx+dy*dy)<50){playerDie();return;}
      }
      // Off screen
      if((ptero.vx>0&&ptero.x>W+100)||(ptero.vx<0&&ptero.x<-100)){
        ptero=null;
        score+=100; // dodge bonus
        if(wave>=3)pteroTimer=6+Math.random()*8;
      }
    }

    // Wave clear check
    // Wave clear check (only after enemies have had time to spawn — at least 3s after wave start)
    if(state==='playing'&&enemies.length===0&&eggs.length===0&&(gameTime-waveStartTime)>3.0){
      score+=500*wave;
      nextWave();
    }

    // Feathers
    for(let i=feathers.length-1;i>=0;i--){
      const f=feathers[i];
      f.x+=f.vx*dt;f.y+=f.vy*dt;
      f.vy+=200*dt; // light gravity
      f.vx*=0.98;
      f.rot+=f.rotSpeed*dt;
      f.life-=dt;
      if(f.life<=0)feathers.splice(i,1);
    }

    // Embers
    for(let i=embers.length-1;i>=0;i--){
      const em=embers[i];
      em.x+=em.vx*dt;em.y+=em.vy*dt;
      em.life-=dt;
      if(em.life<=0)embers.splice(i,1);
    }

    // Explosions
    for(let i=explosions.length-1;i>=0;i--){
      explosions[i].time+=dt;
      if(explosions[i].time>=explosions[i].duration)explosions.splice(i,1);
    }
  }

  if(state==='dying'){
    dyingTimer-=dt;
    if(dyingTimer<=0)respawnPlayer();
    // Still update feathers/embers
    for(let i=feathers.length-1;i>=0;i--){
      const f=feathers[i];f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=200*dt;f.vx*=0.98;f.rot+=f.rotSpeed*dt;f.life-=dt;
      if(f.life<=0)feathers.splice(i,1);
    }
    for(let i=embers.length-1;i>=0;i--){
      const em=embers[i];em.x+=em.vx*dt;em.y+=em.vy*dt;em.life-=dt;
      if(em.life<=0)embers.splice(i,1);
    }
    for(let i=explosions.length-1;i>=0;i--){
      explosions[i].time+=dt;if(explosions[i].time>=explosions[i].duration)explosions.splice(i,1);
    }
  }
}

// --- Draw ---
function drawBG(){
  // Pure black dungeon/cave field — classic arcade bright-on-dark.
  ctx.fillStyle='#000000';
  ctx.fillRect(0,0,W,H);

  // Barely-visible parallax castle/cavern silhouettes, dark gray on black.
  for(const layer of bgLayers){
    ctx.fillStyle=layer.color;
    for(const t of layer.towers){
      const ox=(player?player.x*layer.depth*0.018:0);
      let tx=t.x-ox;
      const baseY=H-t.h-lavaBase*0.08;
      ctx.fillRect(tx,baseY,t.w,t.h);
      for(let b=0;b<t.w;b+=10){
        ctx.fillRect(tx+b,baseY-7,6,7);
      }
      // A few tiny sealed dungeon pinlights, kept subtle so gameplay stays dominant.
      if(t.hasTorch){
        const torchBri=0.35+0.25*Math.sin(gameTime*4+t.x);
        ctx.fillStyle=`rgba(255,80,10,${torchBri*0.18})`;
        ctx.beginPath();ctx.arc(tx+t.w/2,baseY+22,3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=layer.color;
      }
    }
  }
}
function drawLava(){
  const pulse=0.5+0.5*Math.sin(gameTime*4.2);
  // Warm light cast upward about 100px before the lava body is drawn.
  const glowH=Math.min(110,H*0.18);
  const glowGrad=ctx.createLinearGradient(0,lavaY-glowH,0,lavaY);
  glowGrad.addColorStop(0,'rgba(255,80,0,0)');
  glowGrad.addColorStop(0.55,'rgba(255,90,0,0.10)');
  glowGrad.addColorStop(1,`rgba(255,180,20,${0.28+pulse*0.12})`);
  ctx.fillStyle=glowGrad;
  ctx.fillRect(0,lavaY-glowH,W,glowH);

  // Intense red/orange lava pool, bottom 15-18% of screen.
  const lavaGrad=ctx.createLinearGradient(0,lavaY,0,H);
  lavaGrad.addColorStop(0,`rgb(255,${210+Math.floor(pulse*35)},30)`);
  lavaGrad.addColorStop(0.12,'#FF8A00');
  lavaGrad.addColorStop(0.35,'#FF2600');
  lavaGrad.addColorStop(0.72,'#B00000');
  lavaGrad.addColorStop(1,'#430000');
  ctx.fillStyle=lavaGrad;
  ctx.fillRect(0,lavaY,W,H-lavaY);

  // Shimmering white-hot/yellow surface waves.
  for(let x=0;x<W;x+=4){
    const waveH=5*Math.sin(x*0.025+gameTime*4)+3*Math.sin(x*0.075+gameTime*7);
    ctx.fillStyle=(x%16<8)?'#FFFF66':'#FFCC00';
    ctx.fillRect(x,lavaY+waveH-4,4,8);
  }
  ctx.fillStyle='#FF3300';
  for(let x=0;x<W;x+=9){
    const waveH=4*Math.sin(x*0.02+gameTime*2.5+2);
    ctx.fillRect(x,lavaY+18+waveH,8,5);
  }

  // Actual flames rising from the surface — triangular/teardrop flicker layers.
  const flameCount=Math.max(14,Math.floor(W/48));
  for(let i=0;i<flameCount;i++){
    const fx=(i+0.35+0.25*Math.sin(gameTime*1.7+i))*W/flameCount;
    const fh=24+18*Math.abs(Math.sin(gameTime*3.1+i*1.9));
    const fw=12+5*Math.sin(gameTime*4.3+i);
    const base=lavaY+4*Math.sin(gameTime*5+i);
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(255,40,0,0.75)';
    ctx.beginPath();ctx.moveTo(fx-fw,base+6);ctx.quadraticCurveTo(fx-fw*0.7,base-fh*0.45,fx,base-fh);ctx.quadraticCurveTo(fx+fw*0.8,base-fh*0.35,fx+fw,base+6);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,155,0,0.9)';
    ctx.beginPath();ctx.moveTo(fx-fw*0.55,base+4);ctx.quadraticCurveTo(fx-fw*0.3,base-fh*0.35,fx+2,base-fh*0.78);ctx.quadraticCurveTo(fx+fw*0.45,base-fh*0.22,fx+fw*0.45,base+4);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,90,0.86)';
    ctx.beginPath();ctx.moveTo(fx-3,base+2);ctx.quadraticCurveTo(fx-2,base-fh*0.24,fx+1,base-fh*0.46);ctx.quadraticCurveTo(fx+5,base-fh*0.16,fx+4,base+2);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // Bright bubbles/pops.
  const bubbleCount=10;
  for(let i=0;i<bubbleCount;i++){
    const bx=((gameTime*38+i*W/bubbleCount)%W);
    const by=lavaY+10+Math.sin(gameTime*2.7+i*2.5)*12;
    const br=4+Math.sin(gameTime*3.4+i*1.7)*2.5;
    ctx.fillStyle='rgba(255,240,80,0.82)';
    ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,220,0.45)';
    ctx.beginPath();ctx.arc(bx-br*0.3,by-br*0.35,br*0.35,0,Math.PI*2);ctx.fill();
  }
}
// Lava Troll Hand — reaches up from lava when player is near
let trollHand = null;
function updateTrollHand(dt){
  if(!player||state!=='playing'){trollHand=null;return;}
  const distToLava=player.y+PLAYER_H-lavaY;
  // Activate when player is within 80px of lava
  if(distToLava>-80&&distToLava<40&&player.vy>=0){
    if(!trollHand){
      trollHand={x:player.x,targetY:player.y+PLAYER_H-10,progress:0,grabbing:false,grabX:player.x};
    }
    // Track toward player
    trollHand.grabX+=(player.x-trollHand.grabX)*dt*4;
    trollHand.x=trollHand.grabX;
    trollHand.targetY=player.y+PLAYER_H-10;
    trollHand.progress=Math.min(1,trollHand.progress+dt*2.5);
    // Check grab
    if(trollHand.progress>0.7){
      const dx=player.x-trollHand.x;
      const dy=player.y-trollHand.targetY;
      if(Math.abs(dx)<PLAYER_W&&Math.abs(dy)<PLAYER_H*0.5){
        // Grabbed! Pull player down
        player.vy=200;
        player.vx*=0.3;
        trollHand.progress=0;
        trollHand=null;
      }
    }
  } else {
    if(trollHand){
      trollHand.progress-=dt*3;
      if(trollHand.progress<=0)trollHand=null;
    }
  }
}
function drawTrollHand(){
  if(!trollHand)return;
  const p=trollHand.progress;
  if(p<=0)return;
  const handY=lavaY-p*90; // hand reaches up to 90px above lava
  const handX=trollHand.x;
  // Arm from lava to hand
  ctx.strokeStyle='#8B4513';
  ctx.lineWidth=8;
  ctx.beginPath();
  ctx.moveTo(handX,lavaY+10);
  ctx.quadraticCurveTo(handX-5*p,lavaY-30*p,handX,handY);
  ctx.stroke();
  // Darker arm outline
  ctx.strokeStyle='#5A2D0C';
  ctx.lineWidth=10;
  ctx.beginPath();
  ctx.moveTo(handX,lavaY+10);
  ctx.quadraticCurveTo(handX-5*p,lavaY-30*p,handX,handY);
  ctx.stroke();
  // Lighter arm center
  ctx.strokeStyle='#A0522D';
  ctx.lineWidth=6;
  ctx.beginPath();
  ctx.moveTo(handX,lavaY+10);
  ctx.quadraticCurveTo(handX-5*p,lavaY-30*p,handX,handY);
  ctx.stroke();
  // Palm
  ctx.fillStyle='#8B4513';
  ctx.beginPath();
  ctx.ellipse(handX,handY,14*p,10*p,0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#5A2D0C';
  ctx.lineWidth=2;
  ctx.stroke();
  // Fingers reaching up (open hand, trying to grab)
  const fingerSpread=6*p;
  const fingerLen=16*p;
  ctx.strokeStyle='#A0522D';
  ctx.lineWidth=4;
  for(let i=-2;i<=2;i++){
    const fx=handX+i*fingerSpread;
    const fy=handY-fingerLen;
    ctx.beginPath();
    ctx.moveTo(fx,handY-4*p);
    ctx.quadraticCurveTo(fx+i*2,handY-fingerLen*0.5,fx+i,fy);
    ctx.stroke();
    // Fingernail
    ctx.fillStyle='#DEB887';
    ctx.beginPath();
    ctx.ellipse(fx+i,fy,2.5*p,1.5*p,0,0,Math.PI*2);
    ctx.fill();
  }
  // Glowing eyes in the lava below the hand
  const eyeY=lavaY+20;
  ctx.fillStyle='rgba(255,200,0,0.8)';
  ctx.beginPath();ctx.arc(handX-8,eyeY,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(handX+8,eyeY,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,50,0,0.6)';
  ctx.beginPath();ctx.arc(handX-8,eyeY,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(handX+8,eyeY,2,0,Math.PI*2);ctx.fill();
}

function drawPlatform(p){
  if(p.broken)return;
  const seed=p.seed||1;
  const jag=(i)=>Math.sin(seed*7+i*1.73)*3+Math.sin(seed*3+i*0.61)*2;

  // Heavy dark brown/black drop shadow under thick ledge.
  ctx.fillStyle='rgba(0,0,0,0.78)';
  ctx.fillRect(p.x+5,p.y+p.h-1,p.w,7);
  ctx.fillStyle='rgba(40,16,0,0.55)';
  ctx.fillRect(p.x+2,p.y+p.h,p.w,4);

  // Irregular stone shelf silhouette.
  ctx.beginPath();
  ctx.moveTo(p.x,p.y+3+jag(0));
  const segs=Math.max(5,Math.floor(p.w/28));
  for(let i=0;i<=segs;i++){
    const xx=p.x+p.w*i/segs;
    ctx.lineTo(xx,p.y+2+jag(i));
  }
  ctx.lineTo(p.x+p.w,p.y+p.h-3+jag(22));
  for(let i=segs;i>=0;i--){
    const xx=p.x+p.w*i/segs;
    ctx.lineTo(xx,p.y+p.h-1+jag(i+30));
  }
  ctx.closePath();

  const pGrad=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
  if(p.fragile){
    pGrad.addColorStop(0,'#C09B68');
    pGrad.addColorStop(0.28,'#9B7447');
    pGrad.addColorStop(0.66,'#6D4B30');
    pGrad.addColorStop(1,'#352018');
  } else {
    pGrad.addColorStop(0,'#B6A27E');
    pGrad.addColorStop(0.22,'#8D8676');
    pGrad.addColorStop(0.58,'#655F55');
    pGrad.addColorStop(1,'#332E2B');
  }
  ctx.fillStyle=pGrad;
  ctx.fill();

  // Lava cast: nearby shelves catch warm orange/yellow light from below.
  const lavaGlow=Math.max(0,1-(lavaY-(p.y+p.h))/110);
  if(lavaGlow>0){
    const warm=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
    warm.addColorStop(0,'rgba(255,190,60,0)');
    warm.addColorStop(1,`rgba(255,125,0,${0.32*lavaGlow})`);
    ctx.fillStyle=warm;
    ctx.fill();
  }

  // Top standable highlight line and bright edge readability.
  ctx.strokeStyle=p.fragile?'rgba(255,210,140,0.55)':'rgba(235,235,210,0.42)';
  ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<=segs;i++){
    const xx=p.x+p.w*i/segs;
    const yy=p.y+2+jag(i);
    if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);
  }
  ctx.stroke();

  // Dark lower edge for slab thickness.
  ctx.strokeStyle='rgba(0,0,0,0.52)';
  ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(p.x+2,p.y+p.h-3);ctx.lineTo(p.x+p.w-2,p.y+p.h-3);ctx.stroke();

  // Mottled stone texture: deterministic chips and flecks.
  for(let i=0;i<Math.floor(p.w/10);i++){
    const tx=p.x+8+((i*19+seed*37)%(Math.max(10,p.w-16)));
    const ty=p.y+5+((i*13+seed*11)%(Math.max(8,p.h-9)));
    const light=(i%3===0);
    ctx.fillStyle=light?'rgba(255,235,180,0.12)':'rgba(0,0,0,0.20)';
    ctx.beginPath();ctx.ellipse(tx,ty,2+(i%4),1.2+(i%2),0.25*i,0,Math.PI*2);ctx.fill();
  }

  // Block seams/chisel marks.
  ctx.strokeStyle='rgba(0,0,0,0.25)';
  ctx.lineWidth=1;
  for(let cx=p.x+22+(seed%8);cx<p.x+p.w-12;cx+=28){
    ctx.beginPath();ctx.moveTo(cx,p.y+5);ctx.lineTo(cx+4*Math.sin(cx),p.y+p.h-5);ctx.stroke();
  }

  // Fragile platforms are always visibly cracked and browner/weathered.
  if(p.fragile){
    const intensity=0.65+Math.min(p.crackTimer/2,0.35);
    ctx.strokeStyle=`rgba(45,18,8,${intensity})`;
    ctx.lineWidth=2.5;
    const cx=p.x+p.w*0.52;
    ctx.beginPath();ctx.moveTo(cx-4,p.y+2);ctx.lineTo(cx-16,p.y+p.h*0.42);ctx.lineTo(cx-8,p.y+p.h-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+15,p.y+4);ctx.lineTo(cx+5,p.y+p.h*0.58);ctx.lineTo(cx+22,p.y+p.h-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-30,p.y+p.h*0.35);ctx.lineTo(cx+26,p.y+p.h*0.48);ctx.stroke();
    ctx.strokeStyle='rgba(255,145,50,0.35)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-4,p.y+2);ctx.lineTo(cx-16,p.y+p.h*0.42);ctx.lineTo(cx-8,p.y+p.h-3);ctx.stroke();
  }

  // Nest marker: brighter straw ring, still small.
  if(p.hasNest){
    ctx.strokeStyle='rgba(255,210,80,0.75)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(p.x+p.w/2,p.y-5,9,4,0,0,Math.PI*2);ctx.stroke();
  }
}
function drawBird(entity,isPlayer){
  const x=entity.x, y=entity.y, f=entity.facing;
  const w=PLAYER_W, h=PLAYER_H;

  ctx.save();
  ctx.translate(x,y+h/2);
  ctx.scale(f,1);

  // Invincibility flash
  if(isPlayer&&invincTimer>0&&Math.floor(invincTimer*10)%2===0){
    ctx.globalAlpha=0.4;
  }
  ctx.shadowColor=entity.glowColor || entity.color;
  ctx.shadowBlur=14;

  // --- BIRD BODY (large, 50px wide x 30px tall feel) ---
  const bw=w*0.9, bh=h*0.55;
  const bodyColor=isPlayer?'#CC8800':entity.color;
  const wingColor=isPlayer?'#FFFFFF':darken(entity.color,0.15);
  const bellyColor=isPlayer?'#FFE080':lighten(entity.color,0.3);
  const bodyGrad=ctx.createRadialGradient(0,4,3,0,4,bw/2);
  bodyGrad.addColorStop(0,bellyColor);
  bodyGrad.addColorStop(0.6,bodyColor);
  bodyGrad.addColorStop(1,darken(bodyColor,0.4));
  ctx.fillStyle=bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0,4,bw/2,bh/2,0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle=darken(bodyColor,0.5);
  ctx.lineWidth=2;
  ctx.stroke();

  // --- WINGS (big, animated, dramatic flap) ---
  const wingUp=entity.wingFrame===0;
  const wingMid=entity.wingFrame===2;
  // Dramatic wing angles: up=-1.0, mid=-0.2, down=0.6
  const wingAngle=wingUp?-1.0:(wingMid?-0.2:0.6);
  const wingLen=bw*0.8, wingThick=12;
  ctx.fillStyle=wingColor;
  ctx.save();
  ctx.translate(-bw*0.1,-bh*0.25);
  ctx.rotate(wingAngle);
  // Main wing shape — bigger, broader
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(-wingLen,-wingThick*(wingUp?2.2:0.6));
  ctx.lineTo(-wingLen+6,wingThick*0.6);
  ctx.lineTo(0,wingThick);
  ctx.closePath();
  ctx.fill();
  // Wing outline for visibility
  ctx.strokeStyle=entity.color;
  ctx.lineWidth=2;
  ctx.stroke();
  // Wing tip feathers — larger, more dramatic
  ctx.fillStyle=darken(entity.color,0.3);
  ctx.beginPath();
  ctx.moveTo(-wingLen+2,-wingThick*(wingUp?1.8:0.4));
  ctx.lineTo(-wingLen-12,-wingThick*(wingUp?2.8:0));
  ctx.lineTo(-wingLen+8,0);
  ctx.closePath();
  ctx.fill();
  // Secondary tip feather
  ctx.beginPath();
  ctx.moveTo(-wingLen+8,-wingThick*(wingUp?1.5:0.3));
  ctx.lineTo(-wingLen-6,-wingThick*(wingUp?2.2:-0.2));
  ctx.lineTo(-wingLen+14,wingThick*0.2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // --- BIRD HEAD with beak (bigger) ---
  const headX=bw*0.38, headY=-bh*0.15;
  ctx.fillStyle=entity.color;
  ctx.beginPath();ctx.arc(headX,headY,11,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=darken(entity.color,0.3);
  ctx.lineWidth=1.5;
  ctx.stroke();
  // Eye
  ctx.fillStyle='#FFF';
  ctx.beginPath();ctx.arc(headX+4,headY-3,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(headX+5,headY-3,2,0,Math.PI*2);ctx.fill();
  // Beak
  ctx.fillStyle='#FF9900';
  ctx.beginPath();ctx.moveTo(headX+11,headY-2);ctx.lineTo(headX+22,headY+3);ctx.lineTo(headX+11,headY+6);ctx.closePath();ctx.fill();

  // --- BIRD LEGS (tucked under) ---
  ctx.strokeStyle=darken(entity.color,0.5);
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-4,bh/2+2);ctx.lineTo(-6,bh/2+10);ctx.lineTo(-10,bh/2+12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,bh/2+2);ctx.lineTo(8,bh/2+10);ctx.lineTo(4,bh/2+12);ctx.stroke();

  // --- TAIL FEATHERS ---
  ctx.fillStyle=darken(entity.color,0.2);
  ctx.beginPath();ctx.moveTo(-bw*0.35,2);ctx.lineTo(-bw*0.55,6);ctx.lineTo(-bw*0.5,-2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-bw*0.35,5);ctx.lineTo(-bw*0.6,10);ctx.lineTo(-bw*0.52,2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-bw*0.3,0);ctx.lineTo(-bw*0.52,-4);ctx.lineTo(-bw*0.45,-1);ctx.closePath();ctx.fill();

  // --- KNIGHT RIDER on top (bigger, more visible) ---
  const riderColor=isPlayer?'#FFFFFF':entity.type==='bounder'?'#AEEBFF':entity.type==='hunter'?'#FF9A22':'#FF4DFF';
  const armorColor=isPlayer?'#FFD700':entity.type==='bounder'?'#44D6FF':entity.type==='hunter'?'#FF6A00':'#D000FF';

  // Rider body (torso) — larger
  ctx.fillStyle=riderColor;
  ctx.beginPath();ctx.ellipse(0,-bh*0.5-11,9,13,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=darken(riderColor,0.4);
  ctx.lineWidth=1.5;
  ctx.stroke();

  // Armor chest plate — larger
  ctx.fillStyle=armorColor;
  ctx.beginPath();ctx.ellipse(0,-bh*0.5-11,8,11,0,0,Math.PI*2);ctx.fill();

  // Helmet — larger
  ctx.fillStyle=armorColor;
  ctx.beginPath();ctx.arc(0,-bh*0.5-25,8,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=darken(armorColor,0.3);
  ctx.lineWidth=1.5;
  ctx.stroke();
  // Helmet visor
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(3,-bh*0.5-28,7,5);
  // Helmet plume — bigger
  ctx.fillStyle=isPlayer?'#FF4444':entity.type==='bounder'?'#AACCFF':entity.type==='hunter'?'#FFAA00':'#DD88FF';
  ctx.beginPath();ctx.moveTo(0,-bh*0.5-33);ctx.lineTo(-10,-bh*0.5-38);ctx.lineTo(-2,-bh*0.5-33);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-2,-bh*0.5-35);ctx.lineTo(-15,-bh*0.5-36);ctx.lineTo(-4,-bh*0.5-32);ctx.closePath();ctx.fill();

  // --- LANCE (longer, thicker) ---
  ctx.strokeStyle=isPlayer?'#FFD700':armorColor;
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.moveTo(4,-bh*0.5-8);
  ctx.lineTo(bw*0.5+18,-bh*0.5-8);
  ctx.stroke();
  // Lance tip
  ctx.fillStyle=isPlayer?'#FFF7A0':'#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(bw*0.5+18,-bh*0.5-12);
  ctx.lineTo(bw*0.5+28,-bh*0.5-8);
  ctx.lineTo(bw*0.5+18,-bh*0.5-4);
  ctx.closePath();ctx.fill();

  // Rider arm holding lance
  ctx.fillStyle=riderColor;
  ctx.beginPath();ctx.ellipse(5,-bh*0.5-5,4,3,0.2,0,Math.PI*2);ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawFeathers(){
  for(const f of feathers){
    const alpha=f.life/f.maxLife;
    ctx.save();
    ctx.translate(f.x,f.y);
    ctx.rotate(f.rot);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=f.color;
    ctx.beginPath();
    ctx.ellipse(0,0,f.w,f.h,0,0,Math.PI*2);
    ctx.fill();
    // Quill line
    ctx.strokeStyle='rgba(0,0,0,0.3)';
    ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(-f.w,0);ctx.lineTo(f.w,0);ctx.stroke();
    ctx.globalAlpha=1;
    ctx.restore();
  }
}

function drawEmbers(){
  for(const em of embers){
    const alpha=em.life/em.maxLife;
    const colors=['#FFFF66','#FFB000','#FF4400','#FFFFFF'];
    ctx.fillStyle=colors[Math.floor(Math.random()*4)];
    ctx.globalAlpha=alpha;
    ctx.shadowColor='#FF7A00';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(em.x,em.y,em.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  }
}

function drawEggs(){
  for(const eg of eggs){
    const pulse=0.5+0.5*Math.sin(eg.pulsePhase);
    const near=eg.hatchTimer<3;
    // Outer glow
    ctx.fillStyle=`rgba(255,255,150,${0.15+pulse*(near?0.45:0.2)})`;
    ctx.beginPath();ctx.arc(eg.x,eg.y,22+pulse*8,0,Math.PI*2);ctx.fill();
    // Inner glow
    ctx.fillStyle=`rgba(255,240,180,${0.2+pulse*0.25})`;
    ctx.beginPath();ctx.arc(eg.x,eg.y,16+pulse*4,0,Math.PI*2);ctx.fill();
    // Egg body - big and visible
    const eggGrad=ctx.createRadialGradient(eg.x-3,eg.y-4,2,eg.x,eg.y,14);
    if(near){
      eggGrad.addColorStop(0,`rgb(255,${220+pulse*35},${180+pulse*75})`);
      eggGrad.addColorStop(1,`rgb(240,${160+pulse*40},${100+pulse*50})`);
    } else {
      eggGrad.addColorStop(0,'#FFFFF0');
      eggGrad.addColorStop(1,'#EEE8AA');
    }
    ctx.fillStyle=eggGrad;
    ctx.beginPath();ctx.ellipse(eg.x,eg.y,12,16,0,0,Math.PI*2);ctx.fill();
    // Egg outline
    ctx.strokeStyle=near?'rgba(255,100,0,0.6)':'rgba(120,100,60,0.4)';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(eg.x,eg.y,12,16,0,0,Math.PI*2);ctx.stroke();
    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();ctx.ellipse(eg.x-3,eg.y-5,4,6,0.3,0,Math.PI*2);ctx.fill();
    // Hatching warning flash
    if(near&&eg.hatchTimer<1.5){
      const flash=Math.sin(eg.hatchTimer*12);
      if(flash>0){
        ctx.fillStyle=`rgba(255,255,200,${flash*0.4})`;
        ctx.beginPath();ctx.arc(eg.x,eg.y,25,0,Math.PI*2);ctx.fill();
      }
    }
  }
}

function drawPtero(){
  if(!ptero)return;
  const px=ptero.x, py=ptero.y;
  // Shadow on platforms - larger, more visible
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();ctx.ellipse(px,lavaY-20,70,12,0,0,Math.PI*2);ctx.fill();
  // Menacing aura
  ctx.fillStyle='rgba(255,0,70,0.12)';
  ctx.beginPath();ctx.arc(px,py,80,0,Math.PI*2);ctx.fill();

  const dir=ptero.vx>0?1:-1;
  ctx.save();ctx.translate(px,py);ctx.scale(dir,1);
  const wingUp=ptero.wingFrame===0;

  // Wings - much bigger, leathery
  ctx.shadowColor='#FF0040';ctx.shadowBlur=12;
  ctx.fillStyle='#7A1238';
  ctx.beginPath();
  ctx.moveTo(-5,0);ctx.lineTo(-70,wingUp?-45:15);ctx.lineTo(-55,wingUp?-35:12);ctx.lineTo(-35,wingUp?-20:5);ctx.lineTo(-15,0);
  ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(5,0);ctx.lineTo(70,wingUp?-45:15);ctx.lineTo(55,wingUp?-35:12);ctx.lineTo(35,wingUp?-20:5);ctx.lineTo(15,0);
  ctx.closePath();ctx.fill();
  // Wing membrane detail
  ctx.strokeStyle='rgba(255,80,130,0.7)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(-55,wingUp?-35:10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-8,-2);ctx.lineTo(-40,wingUp?-30:8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(55,wingUp?-35:10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,-2);ctx.lineTo(40,wingUp?-30:8);ctx.stroke();

  // Body - larger
  ctx.fillStyle='#5A0028';
  ctx.beginPath();ctx.ellipse(0,0,22,14,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.beginPath();ctx.arc(26,-6,11,0,Math.PI*2);ctx.fill();
  // Crest
  ctx.fillStyle='#C00058';
  ctx.beginPath();ctx.moveTo(22,-15);ctx.lineTo(14,-22);ctx.lineTo(26,-12);ctx.closePath();ctx.fill();
  // Beak - long and sharp
  ctx.fillStyle='#FF5A00';
  ctx.beginPath();ctx.moveTo(34,-6);ctx.lineTo(50,-3);ctx.lineTo(34,0);ctx.closePath();ctx.fill();
  // Teeth
  ctx.fillStyle='#EEE';
  ctx.beginPath();ctx.moveTo(36,-5);ctx.lineTo(38,-2);ctx.lineTo(40,-5);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(42,-4);ctx.lineTo(44,-1);ctx.lineTo(46,-4);ctx.closePath();ctx.fill();
  // Eye - glowing
  ctx.shadowColor='#FFFF00';ctx.shadowBlur=10;
  ctx.fillStyle='#FF2200';
  ctx.beginPath();ctx.arc(29,-9,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFFF00';
  ctx.beginPath();ctx.arc(29,-9,1.5,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawExplosions(){
  for(const ex of explosions){
    const t=ex.time/ex.duration;
    const r=ex.r*(0.3+t*0.7);
    // Big white flash core
    if(t<0.25){
      const flashAlpha=1-t/0.25;
      ctx.fillStyle=`rgba(255,255,255,${flashAlpha})`;
      ctx.beginPath();ctx.arc(ex.x,ex.y,r*0.5,0,Math.PI*2);ctx.fill();
    }
    // Fireball ring
    const fireGrad=ctx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,r);
    fireGrad.addColorStop(0,`rgba(255,255,150,${(1-t)*0.9})`);
    fireGrad.addColorStop(0.3,`rgba(255,200,0,${(1-t)*0.7})`);
    fireGrad.addColorStop(0.6,`rgba(255,100,0,${(1-t)*0.4})`);
    fireGrad.addColorStop(1,`rgba(200,30,0,0)`);
    ctx.fillStyle=fireGrad;
    ctx.beginPath();ctx.arc(ex.x,ex.y,r,0,Math.PI*2);ctx.fill();
    // Debris particles
    if(ex.particles){
      for(const p of ex.particles){
        const pt=ex.time;
        const px=ex.x+p.vx*pt;
        const py=ex.y+p.vy*pt+100*pt*pt;
        const pLife=p.life-ex.time;
        if(pLife>0){
          ctx.globalAlpha=pLife/p.maxLife;
          ctx.fillStyle=p.color;
          ctx.beginPath();ctx.arc(px,py,p.r*(pLife/p.maxLife),0,Math.PI*2);ctx.fill();
          ctx.globalAlpha=1;
        }
      }
    }
  }
}

function drawHUD(){
  const fontSize=Math.max(16,W*0.03);
  ctx.font=`bold ${fontSize}px monospace`;
  ctx.textAlign='left';
  ctx.lineWidth=4;
  ctx.strokeStyle='rgba(0,0,0,0.9)';
  ctx.fillStyle='#FFFFFF';
  const hudText=[`SCORE: ${score}`,`WAVE: ${wave}`,`LIVES:`];
  const hudY=[fontSize+10,fontSize*2+15,fontSize*3+20];
  for(let i=0;i<hudText.length;i++){
    ctx.strokeText(hudText[i],20,hudY[i]);
    ctx.fillText(hudText[i],20,hudY[i]);
  }
  // Lives
  for(let i=0;i<lives;i++){
    const lx=20+fontSize*3.5+i*(fontSize+5), ly=fontSize*3+15;
    ctx.shadowColor='#FFD700';ctx.shadowBlur=8;
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.arc(lx,ly,fontSize/3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,0,0,0.85)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(lx,ly,fontSize/3,0,Math.PI*2);ctx.stroke();
  }
}

    ctx.fillStyle='#FFF';ctx.font=`${Math.max(20,W*0.03)}px monospace`;
    ctx.fillText('▼',lx,downY+arrowH/2+7);
    addButton('dn'+i,lx-arrowW/2,downY,arrowW,arrowH,(function(idx){return function(){
      hsInitials[idx]=String.fromCharCode(((hsInitials[idx].charCodeAt(0)-65+25)%26)+65);
    }})(i));
  }

  // Confirm button
  const btnW=180,btnH=50;
  const btnX=(W-btnW)/2,btnY=H*0.68;
  ctx.fillStyle='rgba(0,255,100,0.15)';
  roundRect(ctx,btnX,btnY,btnW,btnH,10);ctx.fill();
  ctx.strokeStyle='#44FF88';ctx.lineWidth=2;
  roundRect(ctx,btnX,btnY,btnW,btnH,10);ctx.stroke();
  ctx.fillStyle='#44FF88';
  ctx.font=`bold ${Math.max(18,W*0.03)}px monospace`;
  ctx.fillText('CONFIRM',W/2,btnY+btnH/2+6);
  addButton('confirm',btnX,btnY,btnW,btnH,()=>{
    const initials=hsInitials.join('');
    hsRank=addLocalScore(initials,score,wave);
    submitGlobalScore(initials,score,wave);
    state='gameOver';
  });

  ctx.textAlign='left';
}

function drawDualLeaderboard(startY){
  const colW=Math.min(W*0.42,280);
  const gap=20;
  const localX=W/2-colW-gap/2;
  const globalX=W/2+gap/2;
  const rowH=Math.max(20,W*0.028);
  const headerSize=Math.max(16,W*0.025);
  const bodySize=Math.max(13,W*0.02);

  // Local
  ctx.font=`bold ${headerSize}px monospace`;
  ctx.fillStyle='#00DDFF';
  ctx.textAlign='center';
  ctx.fillText('🏠 LOCAL',localX+colW/2,startY);

  ctx.font=`${bodySize}px monospace`;
  ctx.textAlign='left';
  for(let i=0;i<10;i++){
    const e=localScores[i];
    const y=startY+headerSize+5+i*rowH;
    if(i===hsRank&&state==='gameOver'){
      ctx.fillStyle='rgba(255,215,0,0.15)';
      ctx.fillRect(localX,y-rowH+5,colW,rowH);
      ctx.fillStyle='#FFD700';
    } else {
      ctx.fillStyle=e?'#AAE':'#555';
    }
    if(e){
      ctx.fillText(`${(i+1+'').padStart(2,' ')}. ${e.initials} ${(e.score+'').padStart(7,' ')} W${e.wave}`,localX+5,y);
    } else {
      ctx.fillText(`${(i+1+'').padStart(2,' ')}. ---`,localX+5,y);
    }
  }

  // Global
  ctx.font=`bold ${headerSize}px monospace`;
  ctx.fillStyle='#FFD700';
  ctx.textAlign='center';
  ctx.fillText('🌐 GLOBAL',globalX+colW/2,startY);

  ctx.font=`${bodySize}px monospace`;
  ctx.textAlign='left';
  for(let i=0;i<10;i++){
    const e=globalScores[i];
    const y=startY+headerSize+5+i*rowH;
    ctx.fillStyle=e?'#FFE088':'#555';
    if(e){
      ctx.fillText(`${(i+1+'').padStart(2,' ')}. ${e.initials||'???'} ${((e.score||0)+'').padStart(7,' ')} W${e.wave||'?'}`,globalX+5,y);
    } else {
      ctx.fillText(`${(i+1+'').padStart(2,' ')}. ---`,globalX+5,y);
    }
  }
  ctx.textAlign='left';
}

function drawLeaderboardScreen(){
  ctx.fillStyle='rgba(0,0,0,0.85)';
  ctx.fillRect(0,0,W,H);

  const titleSize=Math.max(28,W*0.045);
  ctx.font=`bold ${titleSize}px monospace`;
  ctx.textAlign='center';
  ctx.fillStyle='#FFD700';
  ctx.fillText('HIGH SCORES',W/2,H*0.08);

  drawDualLeaderboard(H*0.15);

  buttons=[];
  const btnW=160,btnH=44;
  const btnX=(W-btnW)/2,btnY=H*0.88;
  ctx.fillStyle='rgba(255,255,255,0.1)';
  roundRect(ctx,btnX,btnY,btnW,btnH,10);ctx.fill();
  ctx.strokeStyle='#FFF';ctx.lineWidth=2;
  roundRect(ctx,btnX,btnY,btnW,btnH,10);ctx.stroke();
  ctx.fillStyle='#FFF';
  ctx.font=`bold ${Math.max(16,W*0.025)}px monospace`;
  ctx.fillText('BACK',W/2,btnY+btnH/2+6);
  addButton('back',btnX,btnY,btnW,btnH,()=>{state='title';buttons=[]});
  ctx.textAlign='left';
}

// --- Helpers ---
function darken(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.floor(r*(1-amt));g=Math.floor(g*(1-amt));b=Math.floor(b*(1-amt));
  return `rgb(${r},${g},${b})`;
}
function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.floor(r+(255-r)*amt));g=Math.min(255,Math.floor(g+(255-g)*amt));b=Math.min(255,Math.floor(b+(255-b)*amt));
  return `rgb(${r},${g},${b})`;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// --- Main loop ---
let lastTime = 0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt = lastTime ? Math.min((ts-lastTime)/1000, 0.05) : 0.016;
  lastTime = ts;

  buttons = [];

  if(state==='title'){
    lavaY=H*0.84;lavaBase=H*0.84;
    update(dt); // update feathers/embers for demo
    drawTitle();
    return;
  }
  if(state==='leaderboard'){
    drawLeaderboardScreen();
    return;
  }
  if(state==='highscoreEntry'){
    drawHighscoreEntry();
    return;
  }

  update(dt);

  // Apply shake
  ctx.save();
  if(shakeTimer>0){
    ctx.translate((Math.random()-0.5)*shakeMag,(Math.random()-0.5)*shakeMag);
  }

  drawBG();
  drawLava();
  drawTrollHand();
  for(const p of platforms)drawPlatform(p);
  drawEggs();
  drawEmbers();

  // Draw enemies
  for(const e of enemies)drawBird(e,false);

  // Draw player
  if(player&&state!=='dying')drawBird(player,true);

  drawPtero();
  drawFeathers();
  drawExplosions();

  // Kill flash overlay
  if(killFlashTimer>0){
    ctx.fillStyle=`rgba(255,255,255,${killFlashTimer/0.1*0.3})`;
    ctx.fillRect(0,0,W,H);
  }

  drawHUD();

  if(state==='waveTrans')drawWaveTrans();
  if(state==='gameOver')drawGameOver();

  // Ptero warning darkening
  if(ptero){
    const edgeDark='rgba(0,0,0,0.15)';
    ctx.fillStyle=edgeDark;
    ctx.fillRect(0,0,W*0.05,H);
    ctx.fillRect(W*0.95,0,W*0.05,H);
  }

  ctx.restore();
}

// --- Keyboard for desktop ---
let keyLeft = false, keyRight = false;
document.addEventListener('keydown',(e)=>{
  ensureAudio();
  if(e.code==='Space'||e.code==='ArrowUp'){
    touchDown=true;
    if(!touchSide)touchSide=keyLeft?-1:keyRight?1:1;
    if(state==='title')startGame();
    e.preventDefault();
  }
  if(e.code==='ArrowLeft'){keyLeft=true;if(touchDown)touchSide=-1;}
  if(e.code==='ArrowRight'){keyRight=true;if(touchDown)touchSide=1;}
});
document.addEventListener('keyup',(e)=>{
  if(e.code==='Space'||e.code==='ArrowUp'){touchDown=false;touchSide=0;}
  if(e.code==='ArrowLeft'){keyLeft=false;if(!keyRight&&touchSide===-1)touchSide=0;}
  if(e.code==='ArrowRight'){keyRight=false;if(!keyLeft&&touchSide===1)touchSide=0;}
});

// Init lava for title
lavaY=H*0.84;lavaBase=H*0.84;

requestAnimationFrame(loop);

})();
</script>
