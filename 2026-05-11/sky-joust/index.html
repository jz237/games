(function(){
"use strict";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const VERSION = 'v3.1.80';

// Premium title cabinet art. If the generated art is missing or fails to load,
// the procedural poster backdrop below remains the fallback.
const TITLE_CABINET_ART_SRC = 'assets/title-cabinet-art.png';
const TITLE_VOLCANO_BG_SRC = 'assets/title-volcano-bg.png';
const GAMEPLAY_CAVERN_BG_SRC = 'assets/gameplay-cavern-bg.png';
const TITLE_MUSIC_SRC = 'assets/quarter-in-the-slot.mp3';
const MUSIC_MAX_VOLUME = 0.42;
const GAMEPLAY_MUSIC_DUCK = 0.40;
const titleCabinetArt = {img:new Image(),loaded:false,failed:false};
titleCabinetArt.img.onload=()=>{titleCabinetArt.loaded=true;};
titleCabinetArt.img.onerror=()=>{titleCabinetArt.failed=true;};
titleCabinetArt.img.src=TITLE_CABINET_ART_SRC;
const titleVolcanoBg={img:new Image(),loaded:false,failed:false};
titleVolcanoBg.img.onload=()=>{titleVolcanoBg.loaded=true;};
titleVolcanoBg.img.onerror=()=>{titleVolcanoBg.failed=true;};
titleVolcanoBg.img.src=TITLE_VOLCANO_BG_SRC;
const gameplayCavernBg={img:new Image(),loaded:false,failed:false};
gameplayCavernBg.img.onload=()=>{gameplayCavernBg.loaded=true;};
gameplayCavernBg.img.onerror=()=>{gameplayCavernBg.failed=true;};
gameplayCavernBg.img.src=GAMEPLAY_CAVERN_BG_SRC;

// --- Resize ---
let W = 0, H = 0;
let renderScale = 1, detailScale = 1, canvasPixelW = 0, canvasPixelH = 0, logicalCssW = 0, logicalCssH = 0;
const MAX_CANVAS_PIXELS = 2400000;
const MAX_LOGICAL_CSS_PIXELS = 1500000;
function pickRenderScale(){
  const dpr=Math.max(1,window.devicePixelRatio||1);
  const mem=navigator.deviceMemory||4, cores=navigator.hardwareConcurrency||4;
  const tiny=Math.min(window.innerWidth,window.innerHeight)<390;
  const headroom=(mem>=8&&cores>=8&&!tiny)?0.85:(mem>=4&&cores>=4&&!tiny)?0.55:0.25;
  const preferred=Math.min(2,Math.max(1,Math.min(dpr+headroom,2)));
  const cssPixels=Math.max(1,window.innerWidth*window.innerHeight);
  const pixelBudgetScale=Math.sqrt(MAX_CANVAS_PIXELS/cssPixels);
  // desktopPerformanceCap: large desktop windows/4K monitors can be far heavier than phones.
  // Allow sub-1x backing buffers when needed; CSS still fills the screen, just upscaled.
  return Math.max(0.55,Math.min(preferred,pixelBudgetScale));
}
function resize(){
  renderScale=pickRenderScale();
  detailScale=Math.max(0.85,Math.min(1.45,renderScale/1.55));
  canvasPixelW = canvas.width = Math.max(1,Math.round(window.innerWidth * renderScale));
  canvasPixelH = canvas.height = Math.max(1,Math.round(window.innerHeight * renderScale));
  const cssPixels=Math.max(1,window.innerWidth*window.innerHeight);
  const logicalCapScale=Math.min(1,Math.sqrt(MAX_LOGICAL_CSS_PIXELS/cssPixels));
  logicalCssW=Math.round(window.innerWidth*logicalCapScale);
  logicalCssH=Math.round(window.innerHeight*logicalCapScale);
  // gameplayWorldScale keeps output capped at 2x while shrinking gameplay elements about 25% for more visible arena.
  // The logical CSS cap prevents 4K/ultrawide desktops from doing 5x-10x the simulation/draw work of mobile.
  const gameplayWorldScale = 3.53;
  W = Math.round(logicalCssW * gameplayWorldScale);
  H = Math.round(logicalCssH * gameplayWorldScale);
  canvas.style.width = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
  ctx.setTransform(canvasPixelW/W,0,0,canvasPixelH/H,0,0);
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

// --- Audio ---
let audioCtx = null;
const titleMusic = new Audio(TITLE_MUSIC_SRC);
titleMusic.loop = true;
titleMusic.preload = 'auto';
let titleMusicFade = null;
let titleMusicIntent = 'stopped';
const MUSIC_ENABLED_KEY = 'skyJoust_musicEnabled_v2';
const MUSIC_VOLUME_KEY = 'skyJoust_musicVolume_v1';
const SFX_VOLUME_KEY = 'skyJoust_sfxVolume_v1';
let musicEnabled = localStorage.getItem(MUSIC_ENABLED_KEY) === 'on';
let musicVolume = Math.max(0,Math.min(1,Number(localStorage.getItem(MUSIC_VOLUME_KEY) || 0.20)));
let sfxVolume = Math.max(0,Math.min(1,Number(localStorage.getItem(SFX_VOLUME_KEY) || 1)));
function effectiveMusicVolume(){
  const duck=(state==='playing'||state==='waveTrans'||state==='dying')?GAMEPLAY_MUSIC_DUCK:1;
  return MUSIC_MAX_VOLUME*musicVolume*duck;
}
function applyMusicVolume(){
  if(titleMusic)titleMusic.volume=effectiveMusicVolume();
}
titleMusic.volume = MUSIC_MAX_VOLUME*musicVolume;
function ensureAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  if(audioCtx&&audioCtx.state==='suspended'){try{audioCtx.resume()}catch(e){}}
}
function startTitleMusic(){
  if(!titleMusic||!musicEnabled)return;
  if(titleMusicIntent==='playing'){applyMusicVolume();return;}
  titleMusicIntent='playing';
  if(titleMusicFade){clearInterval(titleMusicFade);titleMusicFade=null;}
  titleMusic.loop=true;
  applyMusicVolume();
  const p=titleMusic.play();
  if(p&&p.catch)p.catch(()=>{});
}
function stopTitleMusic(){
  if(!titleMusic)return;
  titleMusicIntent='stopped';
  if(titleMusicFade)clearInterval(titleMusicFade);
  const startVol=titleMusic.volume||effectiveMusicVolume();
  const started=performance.now();
  titleMusicFade=setInterval(()=>{
    const a=Math.min(1,(performance.now()-started)/220);
    titleMusic.volume=startVol*(1-a);
    if(a>=1){
      clearInterval(titleMusicFade);titleMusicFade=null;
      titleMusic.pause();
      titleMusic.currentTime=0;
      applyMusicVolume();
    }
  },30);
}
function setMusicEnabled(on){
  musicEnabled=!!on;
  localStorage.setItem(MUSIC_ENABLED_KEY,musicEnabled?'on':'off');
  if(musicEnabled)startTitleMusic(); else stopTitleMusic();
}
function setMusicVolume(v){
  musicVolume=Math.max(0,Math.min(1,v));
  localStorage.setItem(MUSIC_VOLUME_KEY,String(musicVolume));
  applyMusicVolume();
}
function setSfxVolume(v){
  sfxVolume=Math.max(0,Math.min(1,v));
  localStorage.setItem(SFX_VOLUME_KEY,String(sfxVolume));
}
function playTone(freq,dur,type,vol,ramp,delay=0){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime+delay;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type||'square';o.frequency.setValueAtTime(freq,t);
    if(ramp!==undefined&&ramp!==null)o.frequency.linearRampToValueAtTime(ramp,t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime((vol||0.15)*sfxVolume,t+Math.min(0.01,dur*0.25));
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(t);o.stop(t+dur+0.02);
  }catch(e){}
}
function playWarble(freqA,freqB,freqC,dur,type,vol,delay=0){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime+delay;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type||'sine';
    o.frequency.setValueAtTime(freqA,t);
    o.frequency.linearRampToValueAtTime(freqB,t+dur*0.5);
    o.frequency.linearRampToValueAtTime(freqC,t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime((vol||0.1)*sfxVolume,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+0.02);
  }catch(e){}
}
function playNoise(dur=0.12,vol=0.06,filterFreq=1200,delay=0){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime+delay,len=Math.max(1,Math.floor(audioCtx.sampleRate*dur));
    const b=audioCtx.createBuffer(1,len,audioCtx.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<len;i++){const env=1-i/len;d[i]=(Math.random()*2-1)*env;}
    const src=audioCtx.createBufferSource(),f=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=b;f.type='bandpass';f.frequency.setValueAtTime(filterFreq,t);f.Q.setValueAtTime(0.8,t);
    g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol*sfxVolume,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(f);f.connect(g);g.connect(audioCtx.destination);src.start(t);src.stop(t+dur+0.02);
  }catch(e){}
}
function playNoiseSweep(dur=0.22,vol=0.05,startFreq=400,endFreq=2600,delay=0,type='bandpass'){
  if(!audioCtx)return;
  try{
    const t=audioCtx.currentTime+delay,len=Math.max(1,Math.floor(audioCtx.sampleRate*dur));
    const b=audioCtx.createBuffer(1,len,audioCtx.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<len;i++){const a=i/len, env=Math.sin(Math.PI*a);d[i]=(Math.random()*2-1)*env;}
    const src=audioCtx.createBufferSource(),f=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=b;f.type=type;f.frequency.setValueAtTime(startFreq,t);f.frequency.exponentialRampToValueAtTime(Math.max(40,endFreq),t+dur);f.Q.setValueAtTime(1.4,t);
    g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol*sfxVolume,t+0.018);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(f);f.connect(g);g.connect(audioCtx.destination);src.start(t);src.stop(t+dur+0.03);
  }catch(e){}
}

  playNoise(0.090,0.050,250,0.028);
  playTone(72,0.078,'sine',0.060,50,0);
}

function loadLocalScores(){
  try{localScores=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){localScores=[]}
}
function saveLocalScores(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(localScores.slice(0,10)))}catch(e){}
}
function addLocalScore(initials,sc,w){
  localScores.push({initials,score:sc,wave:w});
  localScores.sort((a,b)=>b.score-a.score);
  localScores=localScores.slice(0,10);
  saveLocalScores();
  return localScores.findIndex(e=>e.initials===initials&&e.score===sc&&e.wave===w);
}
async function fetchGlobalScores(force=false){
  const now=Date.now();
  if(globalScoresLoading||(!force&&now-globalScoresLastFetch<30000))return;
  globalScoresLoading=true;
  try{
    const r=await fetch(SCORES_API,{cache:'no-store'});
    if(r.ok){const d=await r.json();globalScores=(d.scores||d||[]).slice(0,10);globalScoresLastFetch=now;}
  }catch(e){} finally {globalScoresLoading=false;}
}
async function submitGlobalScore(initials,sc,w){
  try{
    await fetch(SCORES_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({initials,score:sc,wave:w})});
    await fetchGlobalScores(true);
  }catch(e){}
}

function generateBG(){

  for(let layer=0;layer<3;layer++){
    const formations=[];
    const count=10+layer*6;
    for(let i=0;i<count;i++){
      formations.push({
        x:Math.random()*Math.max(W,1200),
        w:30+Math.random()*90+layer*25,
        h:80+Math.random()*230+layer*45,
        top:Math.random()>0.45,

      });

    bgLayers.push({formations,depth:[0.05,0.12,0.20][layer],alpha:[0.22,0.32,0.46][layer]});
  }
}
generateBG();

// --- Platform generation ---
function generatePlatforms(waveNum){
  platforms=[];
  const fragileStart = waveNum >= 5;
  const lavaLine = H*0.84;
  const clampX = (x,w)=>Math.max(18,Math.min(W-w-18,x));
  const addPlat=(cx,cy,bw,fragile,nest=true)=>{
    const variance=(Math.random()-0.5)*40;
    const pw=Math.max(96,Math.min(W-36,bw+variance));
    const px=clampX(cx-pw/2,pw);
    const py=Math.min(cy,lavaLine-70);
    const tier=py<H*0.31?'high':py>H*0.61?'low':'mid';
    platforms.push({x:px,y:py,w:pw,h:26+Math.floor(Math.random()*5),fragile,crackTimer:0,crackPulse:0,creakCooldown:0,broken:false,hasNest:nest,seed:Math.random()*999,tier});
  };
  const wide=Math.min(W*0.54,420);
  const side=Math.min(W*0.32,190);
  const top=Math.min(W*0.28,165);
  // Dense Williams-Joust-inspired cave shelves: top pairs, side ledges, long center, low approach ledges.
  addPlat(W*0.28,H*0.18,top,fragileStart&&Math.random()>0.75,true);
  addPlat(W*0.72,H*0.18,top,fragileStart&&Math.random()>0.75,true);
  addPlat(W*0.20,H*0.34,side,fragileStart&&Math.random()>0.68,true);
  addPlat(W*0.80,H*0.34,side,fragileStart&&Math.random()>0.68,true);
  addPlat(W*0.50,H*0.49,wide,fragileStart&&Math.random()>0.72,true);
  addPlat(W*0.25,H*0.64,side+20,fragileStart&&Math.random()>0.62,true);
  addPlat(W*0.75,H*0.64,side+20,fragileStart&&Math.random()>0.62,true);
  addPlat(W*0.50,H*0.74,Math.min(W*0.36,250),fragileStart&&Math.random()>0.58,false);
}

// --- Entity factories ---
function createPlayer(){
  const p = platforms[Math.floor(platforms.length/2)];
  return {
    x:p?p.x+p.w/2:W/2, y:p?p.y-PLAYER_H:H*0.4,
    vx:0, vy:0, facing:1,
    wingFrame:0, wingTimer:0, flapPunch:0,
    type:'player', color:'#E8A800', glowColor:'rgba(255,215,0,0.8)'
  };
}

function createEnemy(type,x,y){
  const colors={bounder:'#00A8FF',hunter:'#FF2020',shadow:'#B000FF'};
  const speeds={bounder:0.68,hunter:0.88,shadow:1.18};
  const flapRates={bounder:0.6+Math.random()*0.4,hunter:0.48+Math.random()*0.34,shadow:0.42+Math.random()*0.24};
  return {
    x,y,vx:(Math.random()>0.5?1:-1)*60*speeds[type],vy:0,
    facing:1,wingFrame:0,wingTimer:0,
    type,color:colors[type],glowColor:type==='bounder'?'rgba(0,168,255,0.75)':type==='hunter'?'rgba(255,32,32,0.75)':'rgba(190,0,255,0.8)',
    speed:speeds[type],flapRate:flapRates[type],
    flapCooldown:Math.random()*flapRates[type],
    ai:{changeTimer:1+Math.random()*2,targetVx:0,wander:(Math.random()-0.5)*160,unstuckTimer:0,unstuckDir:0,personalityPhase:Math.random()*Math.PI*2,ambushSide:Math.random()>0.5?1:-1,evadeDir:Math.random()>0.5?1:-1,climbTimer:0,climbCooldown:1.2+Math.random()*3.2,recoverClimb:false},
    scoreVal:type==='bounder'?500:type==='hunter'?750:1000
  };
}

let waveStartTime = 0;
function spawnWaveEnemies(){
  // enemyProgressionMix: blue bounders dominate early, red hunters take over mid-game, shadows become late-game elites.
  const bounders=Math.max(1,5-Math.floor(wave/3));
  const hunters=wave>=3?Math.min(6,Math.max(1,Math.floor((wave-1)*0.72))):0;
  const shadows=wave>=7?Math.min(5,Math.max(1,Math.floor((wave-6)*0.45))):0;
  let spawnable=platforms.filter(p=>!p.broken&&p.hasNest);
  if(spawnable.length===0)spawnable=platforms.filter(p=>!p.broken);
  if(spawnable.length===0){generatePlatforms(wave);spawnable=platforms.filter(p=>!p.broken);}
  let list=[];
  for(let i=0;i<bounders;i++)list.push('bounder');
  for(let i=0;i<hunters;i++)list.push('hunter');
  for(let i=0;i<shadows;i++)list.push('shadow');
  waveStartTime=gameTime;
  list.forEach((type,i)=>{
    const p=spawnable.length?spawnable[i%spawnable.length]:null;
    const sx=p?p.x+p.w/2:W*(0.25+0.5*((i%5)/4));
    const sy=p?p.y-PLAYER_H:H*(0.22+0.18*((i%3)/2));
    const e=createEnemy(type,sx,sy);
    enemySpawnDramas.push({x:sx,y:sy+PLAYER_H-12,type,life:1.05,maxLife:1.05,seed:i*17+wave});
    burstFeathers(sx,sy+PLAYER_H-18,type==='hunter'?'#FF7A2A':type==='shadow'?'#C55CFF':'#7FE7FF',14);
    e.vy=0;
    e.invincible=0.5; // brief invincibility on spawn
    enemies.push(e);
  });
}

function waveTheme(w=wave){
  if(w>=7&&w%4===0)return {name:'SHADOW DIVE',sub:'Purple riders cut wide angles.',color:'#D96CFF'};
  if(w>=5&&w%5===0)return {name:'EMBER WAVE',sub:'Cracked ledges and hot rescues.',color:'#FF8A2A'};
  if(w>=3&&w%3===0)return {name:'HUNTER PAIR',sub:'Red riders flank for height.',color:'#FF5A32'};
  if(w%2===0)return {name:'EGG RAID',sub:'Rescue eggs before the cave wakes.',color:'#FFE98A'};
  return {name:'SKY DUEL',sub:'Take the high lance.',color:'#72E7FF'};
}

function playerClearOfPlatform(x,y){
  for(const p of platforms){
    if(p.broken)continue;
    const overlaps=x+PLAYER_W*.45>p.x&&x-PLAYER_W*.45<p.x+p.w&&y+PLAYER_H>p.y-8&&y<p.y+p.h+18;
    if(overlaps)return false;
  }
  return true;
}
function enemySpawnClearanceScore(x,y){
  let best=Infinity;
  for(const e of enemies){
    const dx=x-e.x, dy=y-e.y;
    best=Math.min(best,dx*dx+dy*dy);
  }
  return best;
}
function movePlayerToSafeAir(reason=''){
  if(!player)return;
  const tooClose=enemies.some(e=>Math.hypot(player.x-e.x,player.y-e.y)<210);
  if(!tooClose&&player.y+PLAYER_H<lavaY-135&&playerClearOfPlatform(player.x,player.y))return false;
  const xs=[0.18,0.32,0.50,0.68,0.82], ys=[0.22,0.30,0.38,0.46];
  let best={x:W/2,y:H*.31,score:-1};
  for(const yy of ys){
    for(const xx of xs){
      const x=W*xx+(Math.random()-0.5)*28;
      const y=Math.min(lavaY-PLAYER_H-150,H*yy+(Math.random()-0.5)*20);
      if(!playerClearOfPlatform(x,y))continue;
      const edgePenalty=Math.min(x,W-x)*12;
      const lavaPenalty=Math.max(0,lavaY-(y+PLAYER_H)-110)*5;
      const score=enemySpawnClearanceScore(x,y)+edgePenalty+lavaPenalty;
      if(score>best.score)best={x,y,score};
    }
  }
  player.x=best.x;player.y=best.y;player.vx=0;player.vy=0;
  invincTimer=Math.max(invincTimer,2.0);
  if(reason)addScorePopup(player.x,player.y-34,reason,'#B9F8FF');
  return true;
}

function spawnFlapFeathers(entity,count=1){
  const dir=entity.facing||1;
  const rootX=entity.x-dir*12, rootY=entity.y+PLAYER_H*0.48;

  const tipX=rootX-dir*(30+Math.cos(angle)*8), tipY=rootY+Math.sin(angle)*28;
  for(let i=0;i<count;i++)trailFeather(tipX+(Math.random()-0.5)*8,tipY+(Math.random()-0.5)*8,entity.color||'#FFF');
}
function trailFeather(x,y,color){
  feathers.push({
    x:x+(Math.random()-0.5)*10,y:y+(Math.random()-0.5)*10,
    vx:(Math.random()-0.5)*30,vy:-20-Math.random()*40,
    rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*4,
    life:0.6+Math.random()*0.4,maxLife:0.6+Math.random()*0.4,
    color,w:2+Math.random()*4,h:1+Math.random()*2
  });
}
function updateFeathers(dt){
  for(let i=feathers.length-1;i>=0;i--){
    const f=feathers[i];
    f.x+=f.vx*dt;f.y+=f.vy*dt;
    f.vy+=200*dt;
    f.vx*=0.98;
    f.rot+=f.rotSpeed*dt;
    f.life-=dt;
    if(f.y>=lavaY-6){
      // featherLavaReaction: fallen kill feathers hiss/spark when they touch lava.
      playFeatherBurnSfx(false);
      lavaSplash(f.x,lavaY,false);
      for(let k=0;k<3;k++)spawnEmber(f.x+(Math.random()-0.5)*18,lavaY+2);
      feathers.splice(i,1);continue;
    }
    if(f.life<=0)feathers.splice(i,1);
  }
}

function playFeatherBurnSfx(big=false){
  if(featherBurnSfxCooldown>0)return;
  sfxFeatherBurn(big);
  featherBurnSfxCooldown=big?0.08:0.045;
}

function burstLargeEnemyFeathers(x,y,color,dir=1,count=5){
  // A few big readable plumes like the player's death feathers, not a cloud of tiny confetti.
  for(let i=0;i<count;i++){
    const side=(i%2===0?-1:1)*dir;
    const life=2.6+Math.random()*1.1;
    largeFeathers.push({
      x:x+(Math.random()-0.5)*24,y:y+PLAYER_H*.18+(Math.random()-0.5)*18,
      vx:side*(95+Math.random()*130)+(Math.random()-0.5)*45,
      vy:-230-Math.random()*180,
      rot:(side<0?-0.35:0.35)+Math.random()*0.7,
      rs:side*(3.8+Math.random()*4.6),
      life,maxLife:life,hit:false,
      color:i%3===0?'#FFFFFF':(i%3===1?(color||'#C0C0C0'):'#D8E8FF'),
      scale:0.82+Math.random()*0.42
    });
  }
}
function updateLargeFeathers(dt){
  for(let i=largeFeathers.length-1;i>=0;i--){
    const f=largeFeathers[i];
    f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=GRAVITY*dt;f.vx*=0.992;f.rot+=f.rs*dt;f.life-=dt;
    if(f.y+18*f.scale>=lavaY-4){
      // Large feathers are swallowed by the lava surface on contact; the lava reaction is the payoff.
      playFeatherBurnSfx(true);
      lavaSplash(f.x,lavaY,true);
      for(let k=0;k<8;k++)spawnEmber(f.x+(Math.random()-0.5)*34,lavaY+2);
      largeFeathers.splice(i,1);continue;
    }
    if(f.life<=0||f.y>H+160)largeFeathers.splice(i,1);
  }
}

    const angle=Math.random()*Math.PI*2;
    const speed=40+Math.random()*200;
    ex.particles.push({x:0,y:0,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-60,life:0.3+Math.random()*0.5,maxLife:0.3+Math.random()*0.5,r:2+Math.random()*4,color:['#FFDD44','#FF8800','#FF4400','#FFFFFF','#FFD700','#FF2266','#9A5CFF'][Math.floor(Math.random()*5)]});

function createImpactBurst(x,y,dir=1,color='#FFD700'){

  const rays=[];
  for(let i=0;i<22;i++){

// --- Egg ---
function burnEggInLava(eg){
  const bx=Number.isFinite(eg.x)?eg.x:W/2, by=Math.min(Number.isFinite(eg.y)?eg.y:lavaY,lavaY+4);
  lavaSplash(bx,lavaY,false);
  burstFeathers(bx,by,eg.type==='bounder'?'#4488FF':eg.type==='hunter'?'#FF6A00':'#AA44FF',18);
  sfxLavaEggBurn();
}

function clearStaleWaveBlockers(reason=''){
  // waveClearFailsafe: never erase valid landed eggs. Eggs are objectives until collected or burned in lava.
  for(let i=eggs.length-1;i>=0;i--){const eg=eggs[i];if(!Number.isFinite(eg.x)||!Number.isFinite(eg.y)||eg.y>=lavaY-18||eg.y>H+80){burnEggInLava(eg);eggs.splice(i,1);}}
  enemies=enemies.filter(e=>Number.isFinite(e.x)&&Number.isFinite(e.y)&&e.y<H+PLAYER_H*4&&e.y> -H);
  if(reason&&player)addScorePopup(player.x,Math.max(80,player.y-40),reason,'#FFF2A8');
}
function forceClearVisiblyEmptyWave(reason='CAVE CLEARED'){
  // visibleArenaFailsafe: if the playfield is visibly empty, internal leftovers cannot block progress.
  for(const eg of eggs)burnEggInLava(eg);
  eggs=[];enemies=[];ptero=null;pteroWarnActive=false;pteroWarnTimer=0;pteroTimer=wave>=3?8+Math.random()*6:0;
  if(player)addScorePopup(player.x,Math.max(80,player.y-46),reason,'#FFF2A8');
}
function dropEgg(x,y,type){
  // find platform below; if none exists, the egg falls into lava and disintegrates.
  let landY=null;
  for(const p of platforms){
    if(!p.broken&&x>p.x&&x<p.x+p.w&&p.y>y&&p.y<lavaY-18&&(landY===null||p.y<landY))landY=p.y;
  }
  if(landY===null){
    const ghost={x,y,type};
    burnEggInLava(ghost);
    return;
  }
  // Long hatch timer like arcade Joust — generous pickup window
  eggs.push({x,y,targetY:landY-14,vy:0,type,hatchTimer:15+Math.random()*5,pulsePhase:0,landed:false,panicChime:0});
}

// --- Pterodactyl ---

// --- Input ---
let touchDown = false;
let touchSide = 0; // -1=left, 1=right, 0=none
function isInteractiveTouchTarget(target){return !!(target&&target.closest&&(target.closest('button')||target.closest('.overlay')));}
document.addEventListener('touchmove',(e)=>{if(isInteractiveTouchTarget(e.target))return;if(e.cancelable)e.preventDefault();},{passive:false});
function getTouchSide(clientX){
  const rect=canvas.getBoundingClientRect();
  const relX=(clientX-rect.left)/rect.width;
  return relX<0.5?-1:1;
}
function pointerToGame(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  return {x:(clientX-rect.left)/rect.width*W,y:(clientY-rect.top)/rect.height*H};
}
function onDown(e){
  if(isInteractiveTouchTarget(e.target))return;
  if(e.cancelable)e.preventDefault();
  ensureAudio();
  if(state==='title'||state==='leaderboard'||state==='help'||state==='options'||state==='gameOver')startTitleMusic();
  touchDown=true;
  const pt=(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]:e;
  if(state==='options'&&pt&&pt.clientX!==undefined){
    const p=pointerToGame(pt.clientX,pt.clientY);
    if(handleOptionSlider(p.x,p.y)){touchDown=false;touchSide=0;return;}
  }
  if(state==='playing'&&pt&&pt.clientX!==undefined)spawnTouchPulse(pt.clientX,pt.clientY);
  // Determine touch side
  if(e.changedTouches&&e.changedTouches.length>0){
    touchSide=getTouchSide(e.changedTouches[0].clientX);
  } else if(e.clientX!==undefined){
    touchSide=getTouchSide(e.clientX);
  } else {
    touchSide=1; // default right for keyboard
  }
  // Title has real buttons now; do not let a high-score tap accidentally start the game.
  if((state==='title'||state==='leaderboard'||state==='help'||state==='options'||state==='gameOver'||state==='highscoreEntry')&&pt&&pt.clientX!==undefined){
    const rect=canvas.getBoundingClientRect();
    const sx=(pt.clientX-rect.left)/rect.width*W, sy=(pt.clientY-rect.top)/rect.height*H;
    if(checkButtons(sx,sy)){touchDown=false;touchSide=0;return;}
  }
  if(state==='title'){startGame();return}
  if(state==='gameOver'){
    // check button areas handled in update
  }
}
function onUp(e){
  if(isInteractiveTouchTarget(e.target))return;
  if(e.cancelable)e.preventDefault();
  activeOptionSlider=null;
  touchDown=false;
  touchSide=0;
}
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',(e)=>{
  if(isInteractiveTouchTarget(e.target))return;
  if(e.cancelable)e.preventDefault();
  if(state==='options'&&activeOptionSlider&&e.changedTouches&&e.changedTouches.length>0){
    const t=e.changedTouches[0], p=pointerToGame(t.clientX,t.clientY);
    updateOptionSlider(p.x);
    return;
  }
  if(e.changedTouches&&e.changedTouches.length>0&&touchDown){
    touchSide=getTouchSide(e.changedTouches[0].clientX);
  }
},{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',(e)=>{
  if(state==='options'&&activeOptionSlider){
    const p=pointerToGame(e.clientX,e.clientY);
    updateOptionSlider(p.x);
  }
});
canvas.addEventListener('mouseup',onUp);

// --- Button handling ---
let buttons = [];
let buttonInputLockUntil = 0;
let optionSliders = [];
let activeOptionSlider = null;
function addButton(label,x,y,w,h,cb){
  buttons.push({label,x,y,w,h,cb});
}
function addOptionSlider(label,x,y,w,h,get,set){
  optionSliders.push({label,x,y,w,h,get,set});
}
function updateOptionSlider(px){
  if(!activeOptionSlider)return;
  const s=activeOptionSlider;
  s.set(Math.max(0,Math.min(1,(px-s.x)/s.w)));
}
function handleOptionSlider(px,py){
  for(const s of optionSliders){
    if(px>=s.x-28&&px<=s.x+s.w+28&&py>=s.y-34&&py<=s.y+s.h+34){
      activeOptionSlider=s;
      updateOptionSlider(px);
      buttonInputLockUntil=performance.now()+420;
      return true;
    }
  }
  return false;
}
function enterTitle(){
  buttons=[];
  state='title';
  startTitleMusic();
}
function checkButtons(px,py){
  for(const b of buttons){
    if(px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h){
      const now=performance.now();
      if(now<buttonInputLockUntil)return true;
      buttonInputLockUntil=now+420;
      b.cb();return true
    }
  }
  return false;
}

canvas.addEventListener('click',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const sx=(e.clientX-rect.left)/rect.width*W;
  const sy=(e.clientY-rect.top)/rect.height*H;
  checkButtons(sx,sy);
});
canvas.addEventListener('touchend',(e)=>{
  if(e.changedTouches&&e.changedTouches.length>0){
    const t=e.changedTouches[0];
    const rect=canvas.getBoundingClientRect();
    const sx=(t.clientX-rect.left)/rect.width*W;
    const sy=(t.clientY-rect.top)/rect.height*H;
    checkButtons(sx,sy);
  }
},{passive:true});

// --- Start Game ---
function startGame(){
  buttons=[];
  state='playing';score=0;lives=3;wave=0;extraLifeGiven=false;trollHand=null;
  startTitleMusic();
  enemies=[];feathers=[];largeFeathers=[];eggs=[];embers=[];explosions=[];impactBursts=[];scorePopups=[];lavaBursts=[];smokeWisps=[];waterDrops=[];touchPulses=[];enemySpawnDramas=[];lavaSparks=[];deathPieces=[];ptero=null;pteroTimer=0;pteroWarnTimer=0;pteroWarnActive=false;gameTime=0;invincTimer=0;pendingGameOver=false;scoreFlashTimer=0;lifeFlashTimer=0;extraLifeBannerTimer=0;featherBurnSfxCooldown=0;waveKills=0;waveEggs=0;lastWaveStats=null;emptyWaveClearTimer=0;noEnemyEggGraceTimer=0;visuallyEmptyWaveTimer=0;comboCount=0;comboTimer=0;bestCombo=0;comboBannerTimer=0;
  generatePlatforms(1);
  player=createPlayer();
  nextWave();
}

function nextWave(){
  if(state==='playing'&&wave>0){lastWaveStats={wave,kills:waveKills,eggs:waveEggs,time:Math.max(0,gameTime-waveStartTime),bonus:500*wave};}
  wave++;
  waveKills=0;waveEggs=0;emptyWaveClearTimer=0;noEnemyEggGraceTimer=0;visuallyEmptyWaveTimer=0;comboCount=0;comboTimer=0;comboBannerTimer=0;bestCombo=0;
  lavaBase=H*0.84;
  lavaY=lavaBase;
  lavaRiseRate=0;
  lavaSurging=false;
  lavaSurgeTimer=Infinity;
  if(wave>1){
    generatePlatforms(wave);
    // Keep the player exactly where they cleared the last wave; only the new enemies reset.
  }
  state='waveTrans';waveTransTimer=3.0;
  waveCountdown=3.0; waveLastTick=4; waveFlashTimer=0.35;
  sfxWaveStart();
}

function playerDie(){
  lives--;
  sfxDeath();
  deathPieces=createDeathFragments();
  shakeTimer=0.5;shakeMag=12;deathFlashTimer=1.5;
  burstFeathers(player.x,player.y,player.color,70);
  createExplosion(player.x,player.y+20,true);
  pendingGameOver=lives<=0;
  state='dying';dyingTimer=1.5;
  invincTimer=2.0;
  comboCount=0;comboTimer=0;comboBannerTimer=0;bestCombo=0;
}

function respawnPlayer(){
  // Respawn in open air and away from active enemies.
  player.x=W/2+(Math.random()-0.5)*Math.min(180,W*0.28);
  player.y=H*0.34+(Math.random()-0.5)*Math.min(90,H*0.16);
  player.vx=0;player.vy=0;
  invincTimer=2.0;
  state='playing';
  movePlayerToSafeAir('SAFE DROP');
}

// --- Update ---
function update(dt){
  if(dt>0.05)dt=0.05;
  gameTime+=dt;

  // Shake
  if(shakeTimer>0)shakeTimer-=dt;
  // Kill flash
  if(killFlashTimer>0)killFlashTimer-=dt;
  if(deathFlashTimer>0)deathFlashTimer-=dt;
  if(featherBurnSfxCooldown>0)featherBurnSfxCooldown-=dt;
  if(scoreFlashTimer>0)scoreFlashTimer-=dt;
  if(lifeFlashTimer>0)lifeFlashTimer-=dt;
  if(extraLifeBannerTimer>0)extraLifeBannerTimer-=dt;
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)comboCount=0;}
  if(comboBannerTimer>0)comboBannerTimer-=dt;
  for(const p of platforms){if(p.crackPulse>0)p.crackPulse-=dt;if(p.creakCooldown>0)p.creakCooldown-=dt;}
  // Wave countdown
  if(waveCountdown>0)waveCountdown-=dt;

  // Lava embers
  if(Math.random()<dt*45){
    spawnEmber(Math.random()*W,lavaY);
  }

  // Occasional lava bubble chirps; keep sparse so the arcade bed never becomes annoying.
  if(Math.random()<dt*1.15){
    sfxLavaPop();
  }
  if(Math.random()<dt*0.55){
    const x=Math.random()*W;
    lavaBursts.push({x,y:lavaY+18,r:8+Math.random()*18,life:0.7,maxLife:0.7,parts:Array.from({length:18},()=>({a:Math.random()*Math.PI*2,s:80+Math.random()*210,rr:2+Math.random()*4}))});
  }
  if(Math.random()<dt*2.2)smokeWisps.push({x:Math.random()*W,y:lavaY-8,vx:(Math.random()-0.5)*18,vy:-20-Math.random()*35,life:2.6,maxLife:2.6,r:18+Math.random()*26});
  if(Math.random()<dt*0.7)smokeWisps.push({x:Math.random()*W,y:lavaY-12,vx:(Math.random()-0.5)*38,vy:-85-Math.random()*70,life:1.9,maxLife:1.9,r:7+Math.random()*12,ashColumn:true});
  if(Math.random()<dt*1.2)waterDrops.push({x:Math.random()*W,y:Math.random()*H*0.45,vy:70+Math.random()*90,life:2,maxLife:2});

  // Lava troll hand
  updateTrollHand(dt);

  if(state==='playing'||state==='waveTrans'){
    // Wave transition countdown
    if(state==='waveTrans'){
      waveTransTimer-=dt;
      const tick=Math.ceil(Math.max(0,waveTransTimer));
      if(tick>0&&tick<waveLastTick){waveLastTick=tick;waveFlashTimer=0.22;shakeTimer=0.12;shakeMag=6;sfxWaveStart();}
      if(waveFlashTimer>0)waveFlashTimer-=dt;
      if(waveTransTimer<=0){
        state='playing';
        spawnWaveEnemies();
        movePlayerToSafeAir('CLEAR START');
        if(wave>=3){pteroTimer=8+Math.random()*6;pteroWarnTimer=Math.max(0,pteroTimer-2.2);pteroWarnActive=false;}
      }
    }
    // Lava resets at each wave start but no longer rises continuously during play.
    if(state==='playing'){
      lavaSurging=false;
      lavaY=lavaBase;
    }

    // Player physics
    if(player&&state==='playing'){
      // Flap
      if(touchDown&&flapping===false){
        flapping=true;
      }
      if(touchDown){
        // Precision touch steering: ease toward a capped speed instead of instant arcade shove.
        if(touchSide!==0){
          const targetVx=touchSide*PLAYER_HORIZ_SPEED;
          player.vx+=(targetVx-player.vx)*Math.min(1,dt*PLAYER_STEER_RESPONSE);
        }
        if(player.wingTimer<=0){
          player.vy=PLAYER_FLAP_POWER;
          player.wingFrame=(player.wingFrame+1)%3;
          player.wingTimer=0.09;
          player.flapPunch=0.12;
          sfxFlap();
          spawnFlapFeathers(player,2);
          // Small horizontal punch restores enough lateral recovery to climb over hunters without making steering twitchy.
          if(touchSide!==0)player.vx+=touchSide*PLAYER_FLAP_HORIZ_BOOST;
        }
      } else {
        flapping=false;
        // Stronger release drag gives the player a precise brake when they lift.
        player.vx*=PLAYER_RELEASE_DRAG;
      }
      player.wingTimer-=dt;
      if(player.flapPunch>0)player.flapPunch-=dt;

      // Idle wing flap when standing on platform (not touching)
      if(!touchDown && player.vy===0 && player.wingTimer<=0){
        player.wingFrame=(player.wingFrame+1)%3;
        player.wingTimer=0.2; // visible idle wing bob
      }

      // Gravity
      player.vy+=GRAVITY*dt;
      if(player.vy>MAX_VY)player.vy=MAX_VY;

      // Player faces direction of movement (or touch side)
      if(touchDown&&touchSide!==0){
        player.facing=touchSide;
      } else if(player.vx>5){
        player.facing=1;
      } else if(player.vx<-5){
        player.facing=-1;
      }

      // Apply velocity
      player.x+=player.vx*dt;
      player.y+=player.vy*dt;

      // Horizontal air drag
      player.vx*=PLAYER_AIR_DRAG;
      if(player.vx>PLAYER_HORIZ_SPEED)player.vx=PLAYER_HORIZ_SPEED;
      if(player.vx<-PLAYER_HORIZ_SPEED)player.vx=-PLAYER_HORIZ_SPEED;

      // Screen wrap
      if(player.x<-PLAYER_W)player.x=W+PLAYER_W;
      if(player.x>W+PLAYER_W)player.x=-PLAYER_W;

      // Platform collision
      for(const p of platforms){
        if(p.broken)continue;
        // Landing on top of platform (falling down)
        if(player.vy>0&&player.y+PLAYER_H>p.y&&player.y+PLAYER_H<p.y+p.h+player.vy*dt+5&&
           player.x+PLAYER_W/2>p.x&&player.x-PLAYER_W/2<p.x+p.w){
          player.y=p.y-PLAYER_H;
          player.vy=0;
          // Horizontal movement on platform
          if(Math.abs(player.vx)<10)player.vx=0;
          // Fragile
          if(p.fragile){
            p.crackTimer+=dt;
            p.crackPulse=0.18;
            if(p.creakCooldown<=0){sfxCreak();p.creakCooldown=0.42;}
            if(p.crackTimer>1.25){shakeTimer=Math.max(shakeTimer,0.08);shakeMag=Math.max(shakeMag,4);}
            if(p.crackTimer>2){p.broken=true;shakeTimer=0.22;shakeMag=8;sfxFragileBreak();createExplosion(p.x+p.w/2,p.y,false);burstFeathers(p.x+p.w/2,p.y,'#888',28);}
          }
        }
        // Bumping head on bottom of platform (rising up)
        if(player.vy<0&&player.y>p.y&&player.y<p.y+p.h&&
           player.y-player.vy*dt<=p.y+p.h&&
           player.x+PLAYER_W/2>p.x&&player.x-PLAYER_W/2<p.x+p.w){
          player.y=p.y+p.h;
          player.vy=0;
        }
      }

      // Lava death
      if(player.y+PLAYER_H>lavaY){
        playerDie();return;
      }

      // Ceiling
      if(player.y<0){player.y=0;player.vy=0;}

      // Safety: if all platforms are broken, respawn them
      if(platforms.every(p=>p.broken)){
        generatePlatforms(wave);
      }

      // Invincibility
      if(invincTimer>0)invincTimer-=dt;

      // Score survival bonus
      bumpScore(Math.floor(dt*5));

      // Extra life
      if(!extraLifeGiven&&score>=10000){lives++;extraLifeGiven=true;lifeFlashTimer=1.2;extraLifeBannerTimer=2.4;shakeTimer=0.28;shakeMag=7;sfxExtraLife();goldenBurst(player.x,player.y-20);addScorePopup(player.x,player.y-55,'EXTRA LIFE!','#7CFF8A');}
    }

    // Enemy AI & physics
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      // Invincibility countdown for freshly spawned enemies
      if(e.invincible!==undefined&&e.invincible>0){
        e.invincible-=dt;
      }
      // AI — arcade flapping: patrol platforms, swoop at player, avoid lava.
      e.ai.changeTimer-=dt;
      if(e.ai.changeTimer<=0){
        e.ai.changeTimer=0.3+Math.random()*0.7;
        e.ai.wander=(Math.random()-0.5)*160;
      }
      const dx=player?player.x-e.x:0;
      const dy=player?player.y-e.y:0;
      const distToLava=lavaY-(e.y+PLAYER_H);
      const criticalLow=distToLava<80;
      const tooLow=distToLava<120;
      const recoveryTargetX=W*(e.ai.ambushSide>0?0.72:0.28);
      if(tooLow)e.ai.recoverClimb=true;
      if(e.ai.recoverClimb&&e.y<H*0.27&&distToLava>H*0.50){
        e.ai.recoverClimb=false;
        e.ai.climbCooldown=1.4+Math.random()*2.2;
      }
      if(e.ai.climbCooldown>0)e.ai.climbCooldown-=dt;
      if(e.ai.climbTimer>0)e.ai.climbTimer-=dt;
      const climbChance=e.type==='bounder'?0.58:e.type==='hunter'?0.72:0.46;
      if(e.ai.climbCooldown<=0&&e.ai.climbTimer<=0&&!tooLow&&e.y>H*0.24&&distToLava>185&&Math.random()<dt*climbChance){
        e.ai.climbTimer=e.type==='shadow'?0.8+Math.random()*0.45:1.0+Math.random()*0.7;
        e.ai.climbCooldown=(e.type==='bounder'?3.2:e.type==='hunter'?2.6:3.8)+Math.random()*3.2;
      }
      // Target altitude: every jouster slowly seeks altitude advantage, then dives once above you.
      let targetVx=e.ai.wander;
      let wantFlap=false;
      let altitudePressure=0;
      if(player){
        if(e.type==='bounder'){
          // Bounders: basic jousters. They drift toward you and slowly try to get a modest height edge.
          targetVx=dx*0.58+e.ai.wander*1.15+Math.sin(gameTime*.9+e.ai.personalityPhase)*34;
          const desiredAbove=34;
          altitudePressure=(e.y-(player.y-desiredAbove))/120;
          if(altitudePressure>0.18&&distToLava>105)wantFlap=true;
          if(e.y>H*0.63)wantFlap=true; // too low, go up
          if(e.y<player.y-92&&distToLava>145)wantFlap=false; // high enough: drop back into the joust
        } else if(e.type==='hunter'){
          // Hunters: apply steady altitude pressure, but no longer snap/hover into unbeatable height.
          const flank=Math.sign(dx||e.ai.ambushSide||1)*Math.min(80,Math.abs(dx)*0.18);
          const ahead=(player.x+player.vx*0.14+flank)-e.x;
          targetVx=ahead*1.34+Math.sign(ahead||dx||1)*24;
          const desiredAbove=58;
          altitudePressure=(e.y-(player.y-desiredAbove))/135;
          if(altitudePressure>0.12&&distToLava>120)wantFlap=true;
          if(e.y<player.y-96&&distToLava>155)wantFlap=false; // above enough: dive back in sooner
        } else {
          // Shadows: late-game elites, but they must leave a climbable opening above them.
          if(Math.abs(dx)<95&&e.y<player.y-40)e.ai.ambushSide*=-1;
          const ambushX=player.x+e.ai.ambushSide*(110+30*Math.sin(gameTime*1.2+e.ai.personalityPhase));
          const ahead=(ambushX+player.vx*0.20)-e.x;
          targetVx=ahead*1.72+Math.sign(ahead||dx||1)*72;
          const desiredAbove=52;
          altitudePressure=(e.y-(player.y-desiredAbove))/145;
          if(altitudePressure>0.16&&distToLava>135)wantFlap=true;
          if(e.y<player.y-92&&distToLava>170)wantFlap=false; // high enough: dive sooner so the player can overtake
        }
        if(wantFlap&&altitudePressure>0){
          // Add a little sideways commitment while climbing so enemies arc into position
          // like jousters instead of bobbing vertically in place.
          targetVx+=Math.sign(dx||e.ai.wander||1)*Math.min(95,altitudePressure*42);
        }
        if(e.ai.climbTimer>0&&e.y>H*0.18&&distToLava>155){
          // Occasional climb bouts keep enemies cycling through the arena instead of
          // always sinking toward the lava between attacks.
          wantFlap=true;
          targetVx+=Math.sign(dx||e.ai.wander||1)*(e.type==='bounder'?28:e.type==='hunter'?44:32);
        }
        // Smarter passes: if an enemy already has height, it commits to a crossing
        // lane instead of hovering straight below the player.
        if(e.y<player.y-70&&Math.abs(dx)<180&&distToLava>160){
          const passDir=Math.sign(dx||e.ai.ambushSide||e.ai.evadeDir||1);
          const passPush=e.type==='bounder'?42:e.type==='hunter'?68:76;
          targetVx+=passDir*passPush;
          if(e.type!=='bounder')e.vy+=GRAVITY*dt*(e.type==='shadow'?0.26:0.08);
        }
        // Subtle evasion: when the player is bearing down from above, enemies sidestep
        // just enough that they stop stacking directly underneath the player.
        const closeX=Math.abs(dx), closeY=Math.abs(dy);
        const playerAbove=e.y>player.y-18;
        const playerDropping=(player.vy||0)>-120;
        if(playerAbove&&playerDropping&&closeX<125&&closeY<210&&!tooLow){
          if(closeX>18)e.ai.evadeDir=-Math.sign(dx);
          const danger=1-Math.min(1,closeX/125);
          const typeEvade=e.type==='bounder'?58:e.type==='hunter'?76:70;
          targetVx+=e.ai.evadeDir*typeEvade*(0.35+danger*0.65);
          if(e.type==='hunter')targetVx+=e.ai.evadeDir*22*Math.sin(gameTime*5+e.ai.personalityPhase);
        }
        // Mild flock spacing keeps enemies from clumping into one dumb stack.
        for(const other of enemies){
          if(other===e)continue;
          const ox=e.x-other.x, oy=e.y-other.y;
          if(Math.abs(ox)<82&&Math.abs(oy)<78){
            targetVx+=Math.sign(ox||e.ai.evadeDir||1)*(e.type==='shadow'?46:34);
            if(e.y>other.y-10&&distToLava>135)wantFlap=true;
          }
        }
        // Hunters and shadows notice exposed eggs and bias toward defending that lane.
        if(e.type!=='bounder'&&eggs.length>0){
          let guarded=null,best=Infinity;
          for(const eg of eggs){if(!eg.landed)continue;const d=Math.abs(eg.x-e.x)+Math.abs(eg.y-e.y)*0.35;if(d<best){best=d;guarded=eg;}}
          if(guarded&&Math.abs(player.x-guarded.x)<190&&Math.abs(e.x-guarded.x)>58){
            targetVx+=(guarded.x-e.x)*(e.type==='shadow'?0.44:0.42);
          }
        }
      }
      // Shelf-avoidance AI: if an enemy is trying to flap into the underside of a platform,
      // slide toward the nearest edge instead of hovering under it forever.
      let overhead=null;
      for(const p of platforms){
        if(p.broken)continue;
        const underShelf=e.x+PLAYER_W*.42>p.x&&e.x-PLAYER_W*.42<p.x+p.w&&e.y>p.y+p.h-10&&e.y<p.y+p.h+76;
        if(underShelf){overhead=p;break;}
      }
      if(overhead&&wantFlap){
        const center=overhead.x+overhead.w/2;
        e.ai.unstuckDir=e.x<center?-1:1;
        e.ai.unstuckTimer=Math.max(e.ai.unstuckTimer,0.9);
      }
      if(e.ai.unstuckTimer>0){
        e.ai.unstuckTimer-=dt;
        targetVx=e.ai.unstuckDir*HORIZ_SPEED*e.speed*1.15;
        if(overhead&&Math.abs(e.x-(overhead.x+overhead.w/2))<overhead.w*.55)wantFlap=false;
      }
      // Lava recovery: once enemies reach the bottom danger zone, they slowly work
      // back toward the upper arena before resuming normal downward attack passes.
      if(criticalLow){e.ai.recoverClimb=true;wantFlap=true;targetVx=(recoveryTargetX-e.x)*1.15;}
      else if(tooLow){e.ai.recoverClimb=true;wantFlap=true;targetVx=(recoveryTargetX-e.x)*0.95+e.ai.wander*0.35;}
      else if(e.ai.recoverClimb){
        wantFlap=true;
        targetVx=(recoveryTargetX-e.x)*0.72+e.ai.wander*0.35;
      }
      targetVx=Math.max(-HORIZ_SPEED*e.speed,Math.min(HORIZ_SPEED*e.speed,targetVx));
      e.vx+=(targetVx-e.vx)*dt*(e.type==='bounder'?2.5:e.type==='hunter'?2.75:3.45);

      // Recovery climb: enemies near lava gradually fly back up toward the top.
      // This COMPLETELY overrides normal flap/gravity when active so enemies can't get stuck.
      if(e.ai.recoverClimb){
        // Cancel gravity, apply steady upward drift
        e.vy=-180-Math.random()*40; // constant upward speed
        e.flapCooldown=0.18; // rapid visual flapping
        e.wingFrame=(e.wingFrame+1)%3;
        if(Math.random()<0.25)spawnFlapFeathers(e,1);
        // Keep horizontal movement toward a side target
        targetVx=(recoveryTargetX-e.x)*1.4;
        targetVx=Math.max(-HORIZ_SPEED*e.speed,Math.min(HORIZ_SPEED*e.speed,targetVx));
        e.vx+=(targetVx-e.vx)*dt*4.0;
        e.x+=e.vx*dt;
        e.y+=e.vy*dt;
        // Reached upper arena? Resume normal AI
        if(e.y<H*0.25){
          e.ai.recoverClimb=false;
          e.ai.climbCooldown=2+Math.random()*2;
        }
        // Hard lava floor (still respect boundary)
        if(e.y+PLAYER_H>lavaY-30){e.y=lavaY-30-PLAYER_H;e.vy=-200;}
        // Screen wrap
        if(e.x<-PLAYER_W)e.x=W+PLAYER_W;
        if(e.x>W+PLAYER_W)e.x=-PLAYER_W;
        if(e.vx>5)e.facing=1;else if(e.vx<-5)e.facing=-1;
        const recoveryCollision=resolveEnemyPlayerCollision(e,i);
        if(recoveryCollision==='playerDead')return;
        if(recoveryCollision==='enemyRemoved')continue;
        // Skip normal physics entirely for this frame
        continue;
      }

      // Flapping logic (normal AI, not recovery)
      e.flapCooldown-=dt;
      const flapReady=e.flapCooldown<=0;
      const shouldFlap=flapReady&&(wantFlap||(!tooLow&&e.vy>155));
      if(shouldFlap||criticalLow){
        const power=criticalLow?1.4:tooLow?1.2:1.0;
        const liftScale=e.type==='shadow'?0.88:1;
        e.vy=FLAP_POWER*(0.95+e.speed*0.18)*power*liftScale;
        const intervals={bounder:[0.5,0.9],hunter:[0.48,0.82],shadow:[0.42,0.72]};
        const iv=intervals[e.type]||intervals.bounder;
        e.flapCooldown=iv[0]+Math.random()*(iv[1]-iv[0]);
        e.wingFrame=(e.wingFrame+1)%3;
        spawnFlapFeathers(e,1+(Math.random()<0.35?1:0));
      }
      // Shadows: gravity boost when diving at player from above
      if(player&&e.type==='shadow'&&!e.ai.recoverClimb&&e.y<player.y-80&&distToLava>180)e.vy+=GRAVITY*dt*0.5;
      // Hard lava floor
      if(e.y+PLAYER_H>lavaY-30){e.y=lavaY-30-PLAYER_H;e.vy=Math.min(e.vy,FLAP_POWER*1.3);}

      // Gravity
      e.vy+=GRAVITY*dt;
      if(e.vy>MAX_VY)e.vy=MAX_VY;

      e.x+=e.vx*dt;
      e.y+=e.vy*dt;

      if(e.vx>5)e.facing=1;
      else if(e.vx<-5)e.facing=-1;

      // Screen wrap
      if(e.x<-PLAYER_W)e.x=W+PLAYER_W;
      if(e.x>W+PLAYER_W)e.x=-PLAYER_W;
      // offTopRecovery: enemies that fly off the top are forced back down so waves cannot stall off-screen.
      if(e.y<-PLAYER_H*1.45){e.y=-PLAYER_H*1.45;e.vy=Math.max(e.vy,260);e.flapCooldown=Math.max(e.flapCooldown,0.42);e.ai.unstuckTimer=0;}

      // Platform collision
      for(const p of platforms){
        if(p.broken)continue;
        // Landing on top
        if(e.vy>0&&e.y+PLAYER_H>p.y&&e.y+PLAYER_H<p.y+p.h+e.vy*dt+5&&
           e.x+PLAYER_W/2>p.x&&e.x-PLAYER_W/2<p.x+p.w){
          e.y=p.y-PLAYER_H;
          e.vy=0;
        }
        // Bumping head on bottom
        if(e.vy<0&&e.y>p.y&&e.y<p.y+p.h&&
           e.y-e.vy*dt<=p.y+p.h&&
           e.x+PLAYER_W/2>p.x&&e.x-PLAYER_W/2<p.x+p.w){
          e.y=p.y+p.h;
          e.vy=0;
          e.ai.unstuckDir=e.x<(p.x+p.w/2)?-1:1;
          e.ai.unstuckTimer=Math.max(e.ai.unstuckTimer,1.05);
        }
      }

      // Absolute lava floor: enemies are never allowed into the lava band.
      if(e.y+PLAYER_H>lavaY-40){
        e.y=lavaY-40-PLAYER_H;
        e.vy=FLAP_POWER*1.25;
        e.wingFrame=(e.wingFrame+1)%3;
        spawnFlapFeathers(e,2);
      }

      // Lava death for enemies
      if(e.y+PLAYER_H>lavaY){
        burstFeathers(e.x,lavaY,e.color,20);
        enemies.splice(i,1);
        continue;
      }

      // Player collision (skip if enemy still invincible from spawn)
      const enemyCollision=resolveEnemyPlayerCollision(e,i);
      if(enemyCollision==='playerDead')return;
      if(enemyCollision==='enemyRemoved')continue;
    }

    // Eggs
    for(let i=eggs.length-1;i>=0;i--){
      const eg=eggs[i];
      if(!eg.landed){
        eg.vy+=GRAVITY*dt*0.5;
        eg.y+=eg.vy*dt;
        if(eg.y>lavaY-155&&eg.panicChime<=0){eg.panicChime=0.8;sfxEggPanic();}
        if(eg.panicChime>0)eg.panicChime-=dt;
        if(eg.y>=lavaY-8){burnEggInLava(eg);eggs.splice(i,1);continue;}
        if(eg.y>=eg.targetY){eg.y=eg.targetY;eg.landed=true;eg.vy=0;}
      }
      if(eg.landed&&eg.y>=lavaY-18){burnEggInLava(eg);eggs.splice(i,1);continue;}
      eg.pulsePhase+=dt*3;
      eg.hatchTimer-=dt;
      if(eg.hatchTimer<=0){
        // Hatch
        sfxEggHatch();
        burstFeathers(eg.x,eg.y,eg.type==='bounder'?'#4488FF':eg.type==='hunter'?'#FF4444':'#AA44FF',20);
        { const hatchling=createEnemy(eg.type,eg.x,eg.y-PLAYER_H); hatchling.invincible=0.5; enemies.push(hatchling); }
        eggs.splice(i,1);
        continue;
      }
      // Egg pickup — generous hitbox, any direction
      if(eg.landed&&player&&state==='playing'){
        const dx=player.x-eg.x,dy=(player.y+PLAYER_H*0.5)-eg.y;
        if(Math.abs(dx)<40&&Math.abs(dy)<35){
          bumpScore(250,eg.x,eg.y,'+250','#FFE98A');
          waveEggs++;
          sfxScore();
          sfxEggStomp();
          goldenBurst(eg.x,eg.y); // golden egg collect burst
          createImpactBurst(eg.x,eg.y,player.facing||1,'#FFE98A');
          burstFeathers(eg.x,eg.y,eg.type==='hunter'?'#FF8A2A':eg.type==='shadow'?'#D96CFF':'#72E7FF',16);
          addScorePopup(eg.x,eg.y-38,'EGG SECURED','#FFE98A');
          eggs.splice(i,1);
          player.vy=FLAP_POWER*0.4;
        }
      }
      // Lava safety: eggs touching the lava are destroyed so they cannot block wave clear.
      if(eg.y>=lavaY-18){burnEggInLava(eg);eggs.splice(i,1);continue;}
    }

    // Pterodactyl
    if(pteroTimer>0&&state==='playing'){
      pteroTimer-=dt;
      pteroWarnTimer-=dt;
      if(!pteroWarnActive&&pteroWarnTimer<=0&&pteroTimer>0){pteroWarnActive=true;sfxPteroWarn();shakeTimer=Math.max(shakeTimer,0.12);shakeMag=Math.max(shakeMag,5);}
      if(pteroTimer<=0){pteroWarnActive=false;spawnPtero();}
    }
    if(ptero){
      ptero.phase+=dt*2.5;
      ptero.x+=ptero.vx*dt;
      ptero.y=ptero.baseY+Math.sin(ptero.phase)*80;
      if(ptero.streakLife>0)ptero.streakLife-=dt;
      ptero.wingTimer-=dt;
      if(ptero.wingTimer<=0){ptero.wingFrame=(ptero.wingFrame+1)%2;ptero.wingTimer=0.15;}
      // Pterodactyl collision with player
      if(ptero&&player&&state==='playing'){
        const px=player.x-ptero.x,py=player.y-ptero.y;
        if(Math.sqrt(px*px+py*py)<75){
          // Joust rule: higher player kills pterodactyl
          const playerMid=player.y+PLAYER_H*0.5;
          const pteroMid=ptero.y+32; // approximate center of ptero
          if(playerMid<pteroMid&&invincTimer<=0){
            // Player wins — kill pterodactyl
            bumpScore(1000,ptero.x,ptero.y,'+1000','#FF44FF');
            sfxPteroKill();
            createImpactBurst((player.x+ptero.x)/2,(player.y+ptero.y)/2,player.facing||1,'#FF44FF');
            createExplosion(ptero.x,ptero.y,true);
            burstKillFeathers(ptero.x,ptero.y,'#FF6A00',42);
            burstLargeEnemyFeathers(ptero.x,ptero.y,'#FF6A00',ptero.facing||1,6);
            killFlashTimer=0.18;
            shakeTimer=0.25;shakeMag=10;
            ptero=null;
            player.vy=FLAP_POWER*0.5; // bounce up like killing an enemy
            // Next ptero spawns later
            if(wave>=3){pteroTimer=8+Math.random()*6;pteroWarnTimer=Math.max(0,pteroTimer-2.2);pteroWarnActive=false;}
          } else if(invincTimer<=0) {
            // Pterodactyl kills player
            playerDie();return;
          }
        }
      }
      // Off screen — ptero escaped, small dodge bonus
      if(ptero&&((ptero.vx>0&&ptero.x>W+100)||(ptero.vx<0&&ptero.x<-100))){
        ptero=null;
        bumpScore(100); // dodge bonus
        if(wave>=3){pteroTimer=6+Math.random()*8;pteroWarnTimer=Math.max(0,pteroTimer-2.2);pteroWarnActive=false;}
      }
    }

    // Wave clear check + hard failsafe for invisible egg/enemy blockers.
    if(state==='playing'){
      const waveAge=gameTime-waveStartTime;
      enemies=enemies.filter(e=>Number.isFinite(e.x)&&Number.isFinite(e.y)&&e.y<H+PLAYER_H*4&&e.y>-H);
      for(let i=eggs.length-1;i>=0;i--){const eg=eggs[i];if(!Number.isFinite(eg.x)||!Number.isFinite(eg.y)||eg.y>=lavaY-18||eg.y>H+80){burnEggInLava(eg);eggs.splice(i,1);}}
      const visibleEnemies=enemies.filter(e=>Number.isFinite(e.x)&&Number.isFinite(e.y)&&e.x>-PLAYER_W*1.5&&e.x<W+PLAYER_W*1.5&&e.y>-PLAYER_H*1.5&&e.y<lavaY-10);
      const visibleEggs=eggs.filter(eg=>Number.isFinite(eg.x)&&Number.isFinite(eg.y)&&eg.x>-80&&eg.x<W+80&&eg.y>-80&&eg.y<lavaY-18);
      if(waveAge>5&&wave>=6&&visibleEnemies.length===0&&visibleEggs.length===0&&(enemies.length+eggs.length)>0){
        visuallyEmptyWaveTimer+=dt;
        if(visuallyEmptyWaveTimer>2.25){forceClearVisiblyEmptyWave('CAVE CLEARED');}
      }else visuallyEmptyWaveTimer=0;
      if(waveAge>3&&enemies.length===0&&eggs.length>0){
        // EggObjectiveRule: landed eggs on platforms must be picked up; only lava/invalid eggs clear themselves.
        noEnemyEggGraceTimer+=dt;
        if(noEnemyEggGraceTimer>2.8){if(player)addScorePopup(player.x,Math.max(90,player.y-52),'COLLECT EGGS','#FFE98A');noEnemyEggGraceTimer=0;}
      }else noEnemyEggGraceTimer=0;
      if(waveAge>3&&enemies.length===0&&eggs.length===0){
        emptyWaveClearTimer+=dt;
        if(emptyWaveClearTimer>0.25){
          sfxWaveClear();
          const clearBonus=500*wave+(bestCombo>=3?bestCombo*100:0);
          bumpScore(clearBonus,player?player.x:W/2,player?Math.max(90,player.y-55):H*.32,`WAVE CLEAR +${clearBonus}`,'#FFF2A8');
          if(bestCombo>=3)addScorePopup(player?player.x:W/2,player?Math.max(120,player.y-20):H*.38,`BEST COMBO x${bestCombo}`,'#7CFFEA');
          nextWave();return;
        }
      }else emptyWaveClearTimer=0;
    }

    // Feathers
    updateFeathers(dt);
    updateLargeFeathers(dt);

    // Embers
    for(let i=embers.length-1;i>=0;i--){
      const em=embers[i];
      em.x+=em.vx*dt;em.y+=em.vy*dt;
      em.life-=dt;
      if(em.life<=0)embers.splice(i,1);
    }


    // Score popups / atmospheric particles
    for(let i=scorePopups.length-1;i>=0;i--){
      const sp=scorePopups[i]; sp.y-=40*dt; sp.life-=dt; if(sp.flash>0)sp.flash-=dt; if(sp.life<=0)scorePopups.splice(i,1);
    }
    for(let i=lavaBursts.length-1;i>=0;i--){
      lavaBursts[i].life-=dt; if(lavaBursts[i].life<=0)lavaBursts.splice(i,1);
    }
    for(let i=smokeWisps.length-1;i>=0;i--){
      const sm=smokeWisps[i]; sm.x+=sm.vx*dt; sm.y+=sm.vy*dt; sm.r+=10*dt; sm.life-=dt; if(sm.life<=0)smokeWisps.splice(i,1);
    }
    for(let i=waterDrops.length-1;i>=0;i--){
      const wd=waterDrops[i]; wd.y+=wd.vy*dt; wd.life-=dt; if(wd.life<=0||wd.y>lavaY)waterDrops.splice(i,1);
    }
    for(let i=touchPulses.length-1;i>=0;i--){touchPulses[i].life-=dt;if(touchPulses[i].life<=0)touchPulses.splice(i,1);}
    for(let i=enemySpawnDramas.length-1;i>=0;i--){enemySpawnDramas[i].life-=dt;if(enemySpawnDramas[i].life<=0)enemySpawnDramas.splice(i,1);}
    for(let i=lavaSparks.length-1;i>=0;i--){const ls=lavaSparks[i];ls.x+=ls.vx*dt;ls.y+=ls.vy*dt;ls.vy+=180*dt;ls.life-=dt;if(ls.life<=0)lavaSparks.splice(i,1);}
    for(let i=impactBursts.length-1;i>=0;i--){impactBursts[i].life-=dt;if(impactBursts[i].life<=0)impactBursts.splice(i,1);}

    // Explosions
    for(let i=explosions.length-1;i>=0;i--){
      explosions[i].time+=dt;
      if(explosions[i].time>=explosions[i].duration)explosions.splice(i,1);
    }
  }

  if(state==='dying'){
    dyingTimer-=dt;
    for(const dp of deathPieces){dp.x+=dp.vx*dt;dp.y+=dp.vy*dt;dp.vy+=GRAVITY*dt;dp.rot+=dp.rs*dt;if(!dp.hit&&dp.y>lavaY-8){dp.hit=true;lavaSplash(dp.x,lavaY,true);dp.vx*=0.35;dp.vy=-120-Math.random()*120;}}
    if(dyingTimer<=0)finishDeathSequence();
    // Still update feathers/embers
    updateFeathers(dt);
    updateLargeFeathers(dt);
    for(let i=embers.length-1;i>=0;i--){
      const em=embers[i];em.x+=em.vx*dt;em.y+=em.vy*dt;em.life-=dt;
      if(em.life<=0)embers.splice(i,1);
    }
    for(let i=explosions.length-1;i>=0;i--){
      explosions[i].time+=dt;if(explosions[i].time>=explosions[i].duration)explosions.splice(i,1);
    }
    for(let i=touchPulses.length-1;i>=0;i--){touchPulses[i].life-=dt;if(touchPulses[i].life<=0)touchPulses.splice(i,1);}
    for(let i=impactBursts.length-1;i>=0;i--){impactBursts[i].life-=dt;if(impactBursts[i].life<=0)impactBursts.splice(i,1);}
  }
}

// --- Draw ---


function premiumPanelPath(x,y,w,h,cut=16){
  ctx.beginPath();ctx.moveTo(x+cut,y);ctx.lineTo(x+w-cut,y);ctx.lineTo(x+w,y+cut);ctx.lineTo(x+w,y+h-cut);ctx.lineTo(x+w-cut,y+h);ctx.lineTo(x+cut,y+h);ctx.lineTo(x,y+h-cut);ctx.lineTo(x,y+cut);ctx.closePath();
}
function drawGlowLine(x1,y1,x2,y2,color,width=2,blur=10){
  ctx.save();ctx.globalCompositeOperation='lighter';ctx.shadowColor=color;ctx.shadowBlur=blur;ctx.strokeStyle=color;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();
}
function drawSoftDisc(x,y,r,color){ctx.save();ctx.globalCompositeOperation='lighter';const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,color);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.restore();}

function drawGameplayCavernBackdrop(){
  if(!gameplayCavernBg.loaded)return false;
  const img=gameplayCavernBg.img;
  const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
  if(!iw||!ih)return false;
  ctx.save();
  ctx.imageSmoothingEnabled=true;
  const scale=Math.max(W/iw,H/ih);
  const dw=iw*scale, dh=ih*scale;
  // Use Jez's cavern art as the actual gameplay backdrop, not as a texture behind old sci-fi panels.
  ctx.drawImage(img,(W-dw)/2,(H-dh)*0.58,dw,dh);
  // Match the supplied reference: darker, moodier, with the center still barely readable for play.
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgba(0,0,0,.70)');g.addColorStop(.22,'rgba(0,4,10,.32)');g.addColorStop(.58,'rgba(0,0,0,.16)');g.addColorStop(1,'rgba(0,0,0,.28)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W*.5,H*.42,Math.min(W,H)*.13,W*.5,H*.45,Math.max(W,H)*.72);
  vg.addColorStop(0,'rgba(0,0,0,.04)');vg.addColorStop(.62,'rgba(0,0,0,.16)');vg.addColorStop(1,'rgba(0,0,0,.78)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  const cool=ctx.createRadialGradient(W*.5,H*.13,20,W*.5,H*.17,Math.max(W,H)*.38);
  cool.addColorStop(0,'rgba(60,120,140,.09)');cool.addColorStop(.44,'rgba(18,48,68,.035)');cool.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=cool;ctx.fillRect(0,0,W,H*.66);
  ctx.fillStyle='rgba(0,0,0,.16)';ctx.fillRect(0,0,W,H);
  ctx.restore();
  return true;
}

function drawBG(){
  if(drawGameplayCavernBackdrop())return;
  if(true){
    // Premium sci-fi cavern grade fallback: darker near-black navy walls with restrained lava bounce.
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#000105');sky.addColorStop(.24,'#01050D');sky.addColorStop(.58,'#020711');sky.addColorStop(.80,'#080609');sky.addColorStop(1,'#130302');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

    // Deep central void so characters/platforms pop against a darker, cleaner backdrop.
    const voidG=ctx.createRadialGradient(W*.5,H*.36,Math.min(W,H)*.05,W*.5,H*.42,Math.max(W,H)*.66);
    voidG.addColorStop(0,'rgba(1,8,18,.22)');voidG.addColorStop(.42,'rgba(0,2,7,.48)');voidG.addColorStop(1,'rgba(0,0,0,.86)');
    ctx.fillStyle=voidG;ctx.fillRect(0,0,W,H);
  }

  // Massive beveled sci-fi wall slabs at the sides; angular, not vine-like clutter.
  ctx.save();
  for(let side=0;side<2;side++){
    const dir=side===0?1:-1, baseX=side===0?0:W;
    for(let i=0;i<5;i++){
      const y=-H*.04+i*H*.22+Math.sin(gameTime*.12+i)*8;
      const w=W*(.15+.035*Math.sin(i*2.2));
      const h=H*.26;
      const x=baseX-dir*(w*.12);

// Lava Troll Hand — reaches up from lava when player is near
let trollHand = null;
function updateTrollHand(dt){
  if(!player||state!=='playing'){trollHand=null;return;}
  const distToLava=player.y+PLAYER_H-lavaY;
  // Activate when player is within 80px of lava
  if(distToLava>-130&&distToLava<55&&player.vy>=-40){
    if(!trollHand){
      trollHand={x:player.x,targetY:player.y+PLAYER_H-10,progress:0,grabbing:false,grabX:player.x,warn:0.45};
      sfxTroll();lavaSplash(player.x,lavaY,false);
    }
    // Track toward player
    trollHand.grabX+=(player.x-trollHand.grabX)*dt*4;
    trollHand.x=trollHand.grabX;
    trollHand.targetY=player.y+PLAYER_H-10;
    trollHand.progress=Math.min(1,trollHand.progress+dt*3.4);
    if(trollHand.warn>0)trollHand.warn-=dt;
    // Check grab
    if(trollHand.progress>0.7){
      const dx=player.x-trollHand.x;
      const dy=player.y-trollHand.targetY;
      if(Math.abs(dx)<PLAYER_W&&Math.abs(dy)<PLAYER_H*0.5){
        // Grabbed! Pull player down
        player.vy=280;
        player.vx*=0.2;
        shakeTimer=0.35;shakeMag=12;lavaSplash(player.x,lavaY,true);
        trollHand.progress=0;
        trollHand=null;
      }
    }
  } else {
    if(trollHand){
      trollHand.progress-=dt*3;
      if(trollHand.progress<=0)trollHand=null;
    }
  }
}

function upcomingEnemyMix(){
  // enemyProgressionMix: blue bounders dominate early, red hunters take over mid-game, shadows become late-game elites.
  const bounders=Math.max(1,5-Math.floor(wave/3));
  const hunters=wave>=3?Math.min(6,Math.max(1,Math.floor((wave-1)*0.72))):0;
  const shadows=wave>=7?Math.min(5,Math.max(1,Math.floor((wave-6)*0.45))):0;
  return [{type:'bounder',count:bounders},{type:'hunter',count:hunters},{type:'shadow',count:shadows}].filter(e=>e.count>0);
}

function drawCoverImage(img,alpha=1){
  const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
  if(!iw||!ih)return false;

  return true;
}

    ctx.shadowBlur=0;ctx.textAlign='left';ctx.font=`900 ${bodySize}px Arial, sans-serif`;

// --- Helpers ---
function darken(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.floor(r*(1-amt));g=Math.floor(g*(1-amt));b=Math.floor(b*(1-amt));
  return `rgb(${r},${g},${b})`;
}
function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.floor(r+(255-r)*amt));g=Math.min(255,Math.floor(g+(255-g)*amt));b=Math.min(255,Math.floor(b+(255-b)*amt));
  return `rgb(${r},${g},${b})`;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function fitCanvasText(text,maxWidth,startPx,minPx,fontTail){
  let size=startPx;
  ctx.font=`900 ${size}px ${fontTail}`;
  while(size>minPx&&ctx.measureText(text).width>maxWidth){size-=1;ctx.font=`900 ${size}px ${fontTail}`;}
  return size;
}

// --- Main loop ---
let lastTime = 0;
function loop(ts){
  requestAnimationFrame(loop);
  // Restore logical game-world transform every frame in case canvas/image draws altered it.
  if(canvasPixelW&&canvasPixelH)ctx.setTransform(canvasPixelW/W,0,0,canvasPixelH/H,0,0);
  const dt = lastTime ? Math.min((ts-lastTime)/1000, 0.05) : 0.016;
  lastTime = ts;

  buttons = [];

  if(state==='title'){
    lavaY=H*0.84;lavaBase=H*0.84;
    update(dt); // update feathers/embers for demo
    drawTitle();
    return;
  }
  if(state==='leaderboard'){
    drawLeaderboardScreen();
    return;
  }
  if(state==='help'){
    drawHelpScreen();
    return;
  }
  if(state==='options'){
    drawOptionsScreen();
    return;
  }
  if(state==='highscoreEntry'){
    drawHighscoreEntry();
    return;
  }

  update(dt);

  // Apply shake
  ctx.save();
  if(shakeTimer>0){
    ctx.translate((Math.random()-0.5)*shakeMag,(Math.random()-0.5)*shakeMag);
  }

  drawBG();
  drawLava();
  drawTrollHand();
  for(const p of platforms)drawPlatform(p);
  drawEggs();
  drawEnemySpawnDramas();
  drawEmbers();

  // Dramatic death dimming overlay behind the tumbling fragments.
  if(state==='dying'){const a=Math.max(0,dyingTimer/1.5);ctx.fillStyle=`rgba(0,0,0,${0.38*(1-a)+0.12})`;ctx.fillRect(0,0,W,H);}

  // Draw enemies
  for(const e of enemies)drawBird(e,false);

  // Draw player / death fragments
  if(player&&state!=='dying')drawBird(player,true);
  if(state==='dying'){for(const dp of deathPieces)drawDeathPiece(dp);}

  drawPtero();
  drawExplosions();
  drawImpactBursts();
  drawFeathers();
  drawLargeFeathers();
  drawCinematicLighting();
  drawForegroundDepth();
  drawScorePopups();
  drawTouchPulses();

  // Red/orange danger glow when player is near lava (intensified during surge)
  if(player&&state==='playing'){
    const surgeZone=lavaSurging?160:80;
    const distToLava=lavaY-(player.y+PLAYER_H);
    if(distToLava<surgeZone&&distToLava>-20){
      const intensity=Math.max(0,1-distToLava/surgeZone);
      const dangerPulse=lavaSurging?(0.7+0.3*Math.sin(gameTime*14)):(0.6+0.4*Math.sin(gameTime*8));
      const dangerGrad=ctx.createLinearGradient(0,lavaY-surgeZone,0,lavaY);
      dangerGrad.addColorStop(0,'rgba(255,0,0,0)');
      dangerGrad.addColorStop(1,`rgba(255,${lavaSurging?60:0},0,${intensity*dangerPulse*(lavaSurging?0.55:0.35)})`);
      ctx.fillStyle=dangerGrad;
      ctx.fillRect(0,lavaY-surgeZone,W,surgeZone);
      // Screen edge vignette — brighter during surge
      ctx.fillStyle=`rgba(255,${lavaSurging?40:0},0,${intensity*dangerPulse*(lavaSurging?0.22:0.12)})`;
      ctx.fillRect(0,0,W,H);
    }
    // Surge label — drawn in game space above lava, not HUD
    if(lavaSurging){
      const surgePulse=0.75+0.25*Math.sin(gameTime*10);
      ctx.save();
      ctx.globalAlpha=surgePulse;
      const lblY=lavaY-22;
      ctx.font=`bold ${Math.max(13,W*0.028)}px Arial, sans-serif`;
      ctx.textAlign='center';
      ctx.fillStyle='#FF2200';
      ctx.fillText('▲ LAVA SURGE ▲',W/2,lblY);
      ctx.restore();
    }
  }

  // Kill / death flash overlays
  if(killFlashTimer>0){
    ctx.fillStyle=`rgba(255,255,255,${Math.min(1,killFlashTimer/0.15)*0.55})`;
    ctx.fillRect(0,0,W,H);
  }
  if(deathFlashTimer>0){
    const a=Math.min(1,deathFlashTimer/0.45);
    const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.15,W/2,H/2,Math.max(W,H)*0.72);
    vg.addColorStop(0,`rgba(120,0,0,${0.05*a})`);
    vg.addColorStop(1,`rgba(255,0,0,${0.55*a})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }

  drawHUD();
  if(state==='playing'){drawWaveClarity();drawComboMeter();}

  if(extraLifeBannerTimer>0){const a=Math.min(1,extraLifeBannerTimer/0.45);ctx.save();ctx.textAlign='center';ctx.font=`900 ${Math.max(30,W*.058)}px Arial Black, Impact, sans-serif`;ctx.shadowColor='#7CFF8A';ctx.shadowBlur=30;ctx.fillStyle=`rgba(220,255,190,${a})`;ctx.fillText('EXTRA LIFE!',W/2,H*.20);ctx.restore();}

  if(state==='waveTrans')drawWaveTrans();
  if(state==='gameOver')drawGameOver();

  // Pterodactyl warning / presence edge treatment
  if(pteroWarnActive&&state==='playing'){
    const a=0.22+0.18*Math.sin(gameTime*18);ctx.fillStyle=`rgba(255,0,70,${a})`;ctx.fillRect(0,0,W*.075,H);ctx.fillRect(W*.925,0,W*.075,H);
    ctx.save();ctx.globalAlpha=.35+.25*Math.sin(gameTime*9);ctx.fillStyle='rgba(0,0,0,.82)';
    const sx=W*(.5+.38*Math.sin(gameTime*1.7));ctx.beginPath();ctx.moveTo(sx-210,H*.20);ctx.quadraticCurveTo(sx,H*.06,sx+210,H*.20);ctx.quadraticCurveTo(sx,H*.16,sx-210,H*.20);ctx.fill();
    ctx.strokeStyle='rgba(255,210,170,.20)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(sx-220,H*.21);ctx.lineTo(sx+220,H*.21);ctx.stroke();ctx.restore();
    ctx.save();ctx.textAlign='center';ctx.font=`900 ${Math.max(15,W*.026)}px Arial Black, Impact, sans-serif`;ctx.fillStyle=`rgba(255,230,240,${0.75+a})`;ctx.shadowColor='#FF0044';ctx.shadowBlur=18;ctx.fillText('SCREECH IN THE DARK',W/2,Math.max(72,H*.11));ctx.restore();
  } else if(ptero){
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,W*0.05,H);ctx.fillRect(W*0.95,0,W*0.05,H);
  }

  ctx.restore();
}

// --- Keyboard for desktop ---
let keyLeft = false, keyRight = false;
document.addEventListener('keydown',(e)=>{
  ensureAudio();
  if(e.code==='Space'||e.code==='ArrowUp'){
    touchDown=true;
    if(!touchSide)touchSide=keyLeft?-1:keyRight?1:1;
    if(state==='title')startGame();
    e.preventDefault();
  }
  if(e.code==='ArrowLeft'){keyLeft=true;if(touchDown)touchSide=-1;}
  if(e.code==='ArrowRight'){keyRight=true;if(touchDown)touchSide=1;}
});
document.addEventListener('keyup',(e)=>{
  if(e.code==='Space'||e.code==='ArrowUp'){touchDown=false;touchSide=0;}
  if(e.code==='ArrowLeft'){keyLeft=false;if(!keyRight&&touchSide===-1)touchSide=0;}
  if(e.code==='ArrowRight'){keyRight=false;if(!keyLeft&&touchSide===1)touchSide=0;}
});

// Init lava for title
lavaY=H*0.84;lavaBase=H*0.84;

requestAnimationFrame(loop);

})();
</script>
