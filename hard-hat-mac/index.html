<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hard Hat Mac</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#000;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}
#controls{position:fixed;bottom:0;left:0;right:0;height:120px;background:rgba(0,0,0,0.75);display:none;z-index:10;touch-action:none}
.ctrl-btn{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.15);color:#fff;font-size:22px;font-weight:bold;display:flex;align-items:center;justify-content:center;touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{background:rgba(255,255,255,0.35)}
#btn-up{width:52px;height:52px;left:56px;top:6px}
#btn-down{width:52px;height:52px;left:56px;top:62px}
#btn-left{width:52px;height:52px;left:2px;top:34px}
#btn-right{width:52px;height:52px;left:110px;top:34px}
#btn-jump{width:70px;height:70px;right:20px;top:25px;background:rgba(255,180,0,0.35);border-color:rgba(255,200,0,0.7);font-size:16px}
#btn-mute{position:fixed;top:8px;right:8px;width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.5);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;cursor:pointer;z-index:20;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
<div class="ctrl-btn" id="btn-up">▲</div>
<div class="ctrl-btn" id="btn-down">▼</div>
<div class="ctrl-btn" id="btn-left">◀</div>
<div class="ctrl-btn" id="btn-right">▶</div>
<div class="ctrl-btn" id="btn-jump">JUMP</div>
</div>
<div class="ctrl-btn" id="btn-mute">🔊</div>
<script>
'use strict';
// ============ SETUP ============
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const controlsDiv = document.getElementById('controls');
const muteBtn = document.getElementById('btn-mute');

let W, H, CTRL_H = 120, viewW, viewH;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  viewW = W; viewH = H - CTRL_H;
}
resize();
window.addEventListener('resize', resize);

// Prevent scroll
document.addEventListener('touchmove', (e) => {
  if (e.target.closest && (e.target.closest('.ctrl-btn') || e.target.closest('.overlay'))) return;
  e.preventDefault();
}, { passive: false });

// ============ AUDIO ============
let audioCtx = null, muted = false;
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function playTone(freq, dur, type='square', vol=0.15, slide=0) {
  if (!audioCtx || muted) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slide) o.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
const SFX = {
  jump: () => playTone(200, 0.15, 'sine', 0.2, 400),
  step: () => playTone(100, 0.04, 'square', 0.05),
  climb: () => playTone(800, 0.05, 'triangle', 0.08),
  collect: () => { playTone(600, 0.1, 'sine', 0.2); setTimeout(() => playTone(900, 0.15, 'sine', 0.2), 100); },
  girder: () => playTone(80, 0.3, 'sawtooth', 0.2),
  drill: () => playTone(150, 0.5, 'sawtooth', 0.15, 50),
  spring: () => playTone(150, 0.25, 'sine', 0.2, 600),
  die: () => { playTone(400, 0.1, 'square', 0.2, -300); setTimeout(() => playTone(100, 0.4, 'sawtooth', 0.15), 150); },
  timerWarn: () => playTone(1000, 0.08, 'square', 0.12),
  levelComplete: () => { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.15), i*150)); },
  gameOver: () => { [400,350,300,200].forEach((f,i) => setTimeout(() => playTone(f, 0.3, 'sawtooth', 0.12), i*200)); },
  zap: () => playTone(60, 0.2, 'sawtooth', 0.2, 200),
};

muteBtn.addEventListener('click', () => { muted = !muted; muteBtn.textContent = muted ? '🔇' : '🔊'; });
muteBtn.addEventListener('touchend', (e) => { e.preventDefault(); });

// ============ INPUT ============
const keys = {};
function bindBtn(id, key) {
  const el = document.getElementById(id);
  const down = () => { initAudio(); keys[key] = true; };
  const up = () => { keys[key] = false; };
  el.addEventListener('touchstart', (e) => { e.preventDefault(); down(); }, {passive:false});
  el.addEventListener('touchend', (e) => { e.preventDefault(); up(); }, {passive:false});
  el.addEventListener('touchcancel', up);
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup', up);
  el.addEventListener('mouseleave', up);
}
bindBtn('btn-up','up'); bindBtn('btn-down','down');
bindBtn('btn-left','left'); bindBtn('btn-right','right');
bindBtn('btn-jump','jump');
document.addEventListener('keydown', (e) => {
  initAudio();
  if (e.key==='ArrowLeft'||e.key==='a') keys.left=true;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=true;
  if (e.key==='ArrowUp'||e.key==='w') keys.up=true;
  if (e.key==='ArrowDown'||e.key==='s') keys.down=true;
  if (e.key===' '||e.key==='z') keys.jump=true;
});
document.addEventListener('keyup', (e) => {
  if (e.key==='ArrowLeft'||e.key==='a') keys.left=false;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=false;
  if (e.key==='ArrowUp'||e.key==='w') keys.up=false;
  if (e.key==='ArrowDown'||e.key==='s') keys.down=false;
  if (e.key===' '||e.key==='z') keys.jump=false;
});

// ============ CONSTANTS ============
const TILE = 32;
const PLAYER_W = 24, PLAYER_H = 40;
const GRAVITY = 600;
const WALK_SPEED = 120;
const JUMP_VEL = -280;
const CLIMB_SPEED = 100;
const WORLD_W = 900;

// Tile types
const T_EMPTY=0, T_SOLID=1, T_LADDER=2, T_CHAIN=3, T_CONV_L=4, T_CONV_R=5, T_SPRING=6, T_ELEV_RAIL=7, T_HOLE=8;

// ============ PARTICLES ============
let particles = [];
function spawnParticles(x, y, count, color, speed, life) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - speed*0.3, life, maxLife: life, color, size: 2 + Math.random()*3 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 200 * dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles(ox, oy) {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - ox - p.size/2, p.y - oy - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ============ SCREEN SHAKE ============
let shakeTime = 0, shakeIntensity = 0;
function shake(intensity, duration) { shakeIntensity = intensity; shakeTime = duration; }

// ============ GAME STATE ============
let state = 'title'; // title, playing, levelIntro, levelComplete, gameOver, highScoreEntry, highScoreView
let score = 0, lives = 3, round = 1, level = 1;
let bonusTimer = 0, bonusTimerMax = 0;
let levelIntroTimer = 0;
let levelCompleteTimer = 0;

// Player
let player = { x:0, y:0, vx:0, vy:0, onGround:false, onLadder:false, facing:1, walkFrame:0, walkTimer:0, climbing:false, climbFrame:0, jumping:false, dead:false, deathTimer:0, carrying:null, stepTimer:0 };

// Camera
let camX = 0, camY = 0;

// Level data
let levelMap = [];
let levelW = 0, levelH = 0;
let entities = []; // enemies, hazards, pickups, etc.
let elevator = null;
let drill = null;
let holes = [];
let collectedCount = 0;
let totalCollect = 0;
let levelDone = false;

// ============ LEVEL GENERATION ============
function generateLevel(lv) {
  entities = [];
  holes = [];
  elevator = null;
  drill = null;
  collectedCount = 0;
  levelDone = false;
  particles = [];

  const diffMult = Math.min(1 + (round - 1) * 0.2, 1.8);
  const timerMult = Math.max(1 - (round - 1) * 0.1, 0.6);

  if (lv === 1) return genLevel1(diffMult, timerMult);
  if (lv === 2) return genLevel2(diffMult, timerMult);
  return genLevel3(diffMult, timerMult);
}

function makeTileMap(cols, rows) {
  levelW = cols; levelH = rows;
  levelMap = [];
  for (let r = 0; r < rows; r++) {
    levelMap[r] = [];
    for (let c = 0; c < cols; c++) levelMap[r][c] = T_EMPTY;
  }
}

function fillPlatform(row, c1, c2, type=T_SOLID) {
  for (let c = c1; c <= c2; c++) if (c >= 0 && c < levelW) levelMap[row][c] = type;
}

function fillLadder(col, r1, r2) {
  for (let r = r1; r <= r2; r++) if (r >= 0 && r < levelH) levelMap[r][col] = T_LADDER;
}

function genLevel1(diff, tmult) {
  const cols = 28, rows = 48;
  makeTileMap(cols, rows);
  // 5 platforms spaced out
  const platRows = [42, 34, 26, 18, 10];
  for (const r of platRows) fillPlatform(r, 1, cols-2);
  // Ground
  fillPlatform(rows-1, 0, cols-1);

  // Alternating ladders
  const ladderCols = [5, 22, 8, 19, 12];
  for (let i = 0; i < 4; i++) {
    const col = ladderCols[i];
    fillLadder(col, platRows[i+1]+1, platRows[i]-1);
    fillLadder(col+1, platRows[i+1]+1, platRows[i]-1);
  }

  // Holes (4)
  const holePositions = [
    {r: platRows[0], c: 10}, {r: platRows[1], c: 18},
    {r: platRows[2], c: 6}, {r: platRows[3], c: 22}
  ];
  for (const h of holePositions) {
    levelMap[h.r][h.c] = T_HOLE;
    levelMap[h.r][h.c+1] = T_HOLE;
    holes.push({r: h.r, c: h.c, filled: false, drilled: false});
  }

  // Girder pickups
  const girderPos = [
    {x: 3*TILE, y: (platRows[0]-1)*TILE},
    {x: 24*TILE, y: (platRows[1]-1)*TILE},
    {x: 14*TILE, y: (platRows[2]-1)*TILE},
    {x: 20*TILE, y: (platRows[3]-1)*TILE}
  ];
  for (const g of girderPos) {
    entities.push({type:'girder', x:g.x, y:g.y, w:TILE*2, h:TILE, collected:false});
  }
  totalCollect = 4;

  // Springboard right side
  levelMap[platRows[0]-1][cols-4] = T_SPRING;

  // Elevator left side
  elevator = {x: 0, y: platRows[0]*TILE, minY: platRows[4]*TILE, maxY: platRows[0]*TILE, speed: 40, dir: -1, w: TILE*2, h: TILE};

  // Drill (moves along top platform)
  drill = {x: 2*TILE, y: (platRows[4]-1)*TILE, dir: 1, speed: 50 * diff, platRow: -1, active: false};

  // Bolts from top
  entities.push({type:'boltSpawner', timer:0, interval: Math.max(1.5, 3 / diff), y: platRows[4]*TILE - TILE*3});

  // Vandal
  entities.push({type:'vandal', x: 15*TILE, y: (platRows[2]-1)*TILE, vx: 40*diff, patrolMin:2*TILE, patrolMax:25*TILE, platRow: platRows[2]});

  // OSHA
  entities.push({type:'osha', x: 10*TILE, y: (platRows[1]-1)*TILE, vx: 35*diff, patrolMin:2*TILE, patrolMax:25*TILE, platRow: platRows[1]});

  player.x = 4 * TILE; player.y = (platRows[0] - 2) * TILE;
  player.vx = 0; player.vy = 0; player.onGround = false; player.onLadder = false;
  player.climbing = false; player.jumping = false; player.dead = false; player.carrying = null;

  bonusTimerMax = 60 * tmult;
  bonusTimer = bonusTimerMax;
}

function genLevel2(diff, tmult) {
  const cols = 28, rows = 44;
  makeTileMap(cols, rows);
  const platRows = [38, 28, 18, 8];
  for (const r of platRows) fillPlatform(r, 1, cols-2);
  fillPlatform(rows-1, 0, cols-1);

  // Central elevator rail
  for (let r = platRows[3]; r <= platRows[0]; r++) {
    levelMap[r][14] = T_ELEV_RAIL;
  }
  elevator = {x:13*TILE, y:platRows[0]*TILE, minY:platRows[3]*TILE, maxY:platRows[0]*TILE, speed:50, dir:-1, w:TILE*2, h:TILE};

  // Ladders on sides
  fillLadder(4, platRows[1]+1, platRows[0]-1);
  fillLadder(5, platRows[1]+1, platRows[0]-1);
  fillLadder(22, platRows[2]+1, platRows[1]-1);
  fillLadder(23, platRows[2]+1, platRows[1]-1);
  fillLadder(8, platRows[3]+1, platRows[2]-1);
  fillLadder(9, platRows[3]+1, platRows[2]-1);

  // 5 lunchboxes
  const lbPos = [
    {x:3*TILE, y:(platRows[0]-1)*TILE},
    {x:24*TILE, y:(platRows[1]-1)*TILE},
    {x:7*TILE, y:(platRows[1]-1)*TILE},
    {x:20*TILE, y:(platRows[2]-1)*TILE},
    {x:12*TILE, y:(platRows[3]-1)*TILE}
  ];
  for (const lb of lbPos) entities.push({type:'lunchbox', x:lb.x, y:lb.y, w:TILE, h:TILE, collected:false});
  totalCollect = 5;

  // Conveyor at top
  fillPlatform(platRows[3], 18, 25, T_CONV_R);

  // Hazards
  entities.push({type:'pincers', x:10*TILE, y:(platRows[0]-1)*TILE, w:TILE, h:TILE, snapTimer:0});
  entities.push({type:'dynamite', x:16*TILE, y:(platRows[1]-1)*TILE, w:TILE, h:TILE, fuseTimer:0});
  entities.push({type:'poison', x:18*TILE, y:(platRows[2]-1)*TILE, w:TILE, h:TILE});
  entities.push({type:'squasher', x:6*TILE, y:(platRows[2])*TILE, w:TILE*3, h:0, maxH:TILE*2, speed:40*diff, extending:true});

  // Enemies
  entities.push({type:'vandal', x:20*TILE, y:(platRows[0]-1)*TILE, vx:45*diff, patrolMin:2*TILE, patrolMax:25*TILE, platRow:platRows[0]});
  entities.push({type:'osha', x:5*TILE, y:(platRows[2]-1)*TILE, vx:30*diff, patrolMin:2*TILE, patrolMax:25*TILE, platRow:platRows[2]});

  // Electromagnet endpoint
  entities.push({type:'magnet', x:22*TILE, y:(platRows[3]-3)*TILE, w:TILE*3, h:TILE});

  player.x = 4*TILE; player.y = (platRows[0]-2)*TILE;
  player.vx=0;player.vy=0;player.onGround=false;player.onLadder=false;
  player.climbing=false;player.jumping=false;player.dead=false;player.carrying=null;

  bonusTimerMax = 90 * tmult;
  bonusTimer = bonusTimerMax;
}

function genLevel3(diff, tmult) {
  const cols = 28, rows = 44;
  makeTileMap(cols, rows);

  // Platforms in a circular-ish arrangement
  fillPlatform(38, 1, cols-2); // bottom
  fillPlatform(28, 1, 12); // left mid
  fillPlatform(28, 16, cols-2); // right mid
  fillPlatform(18, 4, cols-5); // upper
  fillPlatform(8, 1, cols-2); // top
  fillPlatform(rows-1, 0, cols-1); // ground

  // Circular conveyor (L and R sections)
  fillPlatform(38, 8, 12, T_CONV_R);
  fillPlatform(38, 16, 20, T_CONV_L);

  // Ladders
  fillLadder(3, 29, 37); fillLadder(4, 29, 37);
  fillLadder(24, 29, 37); fillLadder(25, 29, 37);
  fillLadder(10, 19, 27); fillLadder(11, 19, 27);
  fillLadder(18, 9, 17); fillLadder(19, 9, 17);
  fillLadder(6, 9, 17); fillLadder(7, 9, 17);

  // Springboards
  levelMap[37][2] = T_SPRING;
  levelMap[27][25] = T_SPRING;

  // 5 boxes to collect
  const boxPos = [
    {x:6*TILE, y:37*TILE}, {x:22*TILE, y:37*TILE},
    {x:15*TILE, y:27*TILE}, {x:8*TILE, y:17*TILE},
    {x:20*TILE, y:7*TILE}
  ];
  for (const b of boxPos) entities.push({type:'crate', x:b.x, y:b.y, w:TILE, h:TILE, collected:false});
  totalCollect = 5;

  // Processor
  entities.push({type:'processor', x:13*TILE, y:37*TILE, w:TILE*2, h:TILE});

  // OSHA
  entities.push({type:'osha', x:12*TILE, y:27*TILE, vx:35*diff, patrolMin:2*TILE, patrolMax:14*TILE, platRow:28});

  // Pool hazard
  entities.push({type:'pool', x:1*TILE, y:39*TILE, w:TILE*4, h:TILE*3});

  player.x = 14*TILE; player.y = 36*TILE;
  player.vx=0;player.vy=0;player.onGround=false;player.onLadder=false;
  player.climbing=false;player.jumping=false;player.dead=false;player.carrying=null;

  bonusTimerMax = 80 * tmult;
  bonusTimer = bonusTimerMax;
}

// ============ COLLISION HELPERS ============
function tileAt(c, r) {
  if (r < 0 || r >= levelH || c < 0 || c >= levelW) return T_SOLID;
  return levelMap[r][c];
}
function isSolid(c, r) {
  const t = tileAt(c, r);
  return t === T_SOLID || t === T_CONV_L || t === T_CONV_R || t === T_SPRING;
}
function isLadder(c, r) {
  const t = tileAt(c, r);
  return t === T_LADDER || t === T_CHAIN;
}
function isHole(c, r) { return tileAt(c, r) === T_HOLE; }

function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ============ UPDATE ============
let jumpPressed = false, jumpWasPressed = false;
let warnBeepTimer = 0;
let stepSoundTimer = 0;

function updateGame(dt) {
  if (player.dead) {
    player.deathTimer -= dt;
    if (player.deathTimer <= 0) {
      lives--;
      if (lives <= 0) {
        state = 'gameOver';
        SFX.gameOver();
        return;
      }
      // Reset level
      generateLevel(level);
    }
    return;
  }

  // Timer
  bonusTimer -= dt;
  if (bonusTimer <= 0) {
    bonusTimer = 0;
    killPlayer();
    return;
  }
  // Timer warning beeps
  if (bonusTimer < 10) {
    warnBeepTimer -= dt;
    if (warnBeepTimer <= 0) { SFX.timerWarn(); warnBeepTimer = 0.5; }
  }

  const pLeft = player.x, pRight = player.x + PLAYER_W, pTop = player.y, pBottom = player.y + PLAYER_H;
  const cMid = Math.floor((player.x + PLAYER_W/2) / TILE);
  const rFeet = Math.floor((player.y + PLAYER_H) / TILE);
  const rMid = Math.floor((player.y + PLAYER_H/2) / TILE);

  // Jump input (edge detect)
  jumpPressed = keys.jump && !jumpWasPressed;
  jumpWasPressed = keys.jump;

  // Check if on ladder
  const onLadderTile = isLadder(cMid, rMid) || isLadder(cMid, rFeet);
  const wantsClimb = keys.up || keys.down;

  if (!player.climbing && onLadderTile && wantsClimb) {
    player.climbing = true;
    player.vy = 0;
    player.x = cMid * TILE + (TILE - PLAYER_W) / 2;
  }

  if (player.climbing) {
    if (!onLadderTile && !isLadder(cMid, rFeet-1)) {
      player.climbing = false;
    } else {
      player.vy = 0;
      if (keys.up) { player.y -= CLIMB_SPEED * dt; player.climbFrame += dt * 8; SFX.climb(); }
      if (keys.down) { player.y += CLIMB_SPEED * dt; player.climbFrame += dt * 8; }
      if (keys.left) { player.climbing = false; player.facing = -1; }
      if (keys.right) { player.climbing = false; player.facing = 1; }
      if (jumpPressed) { player.climbing = false; player.vy = JUMP_VEL; player.jumping = true; SFX.jump(); }
    }
  }

  if (!player.climbing) {
    // Horizontal
    player.vx = 0;
    if (keys.left) { player.vx = -WALK_SPEED; player.facing = -1; }
    if (keys.right) { player.vx = WALK_SPEED; player.facing = 1; }

    // Conveyor push
    const feetTile = tileAt(cMid, rFeet);
    if (player.onGround) {
      if (feetTile === T_CONV_L) player.vx -= 40;
      if (feetTile === T_CONV_R) player.vx += 40;
    }

    // Jump
    if (jumpPressed && player.onGround) {
      // Check springboard
      if (feetTile === T_SPRING || tileAt(cMid, rFeet) === T_SPRING) {
        player.vy = JUMP_VEL * 1.8;
        SFX.spring();
      } else {
        player.vy = JUMP_VEL;
        SFX.jump();
      }
      player.onGround = false;
      player.jumping = true;
    }

    // Gravity
    player.vy += GRAVITY * dt;
    if (player.vy > 500) player.vy = 500;

    // Move X
    player.x += player.vx * dt;
    // Collide X
    const newCL = Math.floor(player.x / TILE);
    const newCR = Math.floor((player.x + PLAYER_W - 1) / TILE);
    const rTop = Math.floor(player.y / TILE);
    const rBot = Math.floor((player.y + PLAYER_H - 2) / TILE);
    for (let r = rTop; r <= rBot; r++) {
      if (isSolid(newCL, r) && player.vx < 0) { player.x = (newCL + 1) * TILE; player.vx = 0; }
      if (isSolid(newCR, r) && player.vx > 0) { player.x = newCR * TILE - PLAYER_W; player.vx = 0; }
    }

    // Move Y
    player.y += player.vy * dt;
    player.onGround = false;

    // Collide Y
    if (player.vy >= 0) {
      const rF = Math.floor((player.y + PLAYER_H) / TILE);
      const cL = Math.floor(player.x / TILE);
      const cR = Math.floor((player.x + PLAYER_W - 1) / TILE);
      for (let c = cL; c <= cR; c++) {
        if (isSolid(c, rF)) {
          // Check for hole - fall through
          if (isHole(c, rF)) {
            // Check if filled
            const hole = holes.find(h => h.r === rF && (h.c === c || h.c+1 === c));
            if (!hole || !hole.filled) continue;
          }
          player.y = rF * TILE - PLAYER_H;
          if (player.vy > 200) {
            spawnParticles(player.x + PLAYER_W/2, player.y + PLAYER_H, 5, '#aa8866', 60, 0.3);
          }
          player.vy = 0;
          player.onGround = true;
          player.jumping = false;
          break;
        }
      }
    } else {
      const rH = Math.floor(player.y / TILE);
      const cL = Math.floor(player.x / TILE);
      const cR = Math.floor((player.x + PLAYER_W - 1) / TILE);
      for (let c = cL; c <= cR; c++) {
        if (isSolid(c, rH)) {
          player.y = (rH + 1) * TILE;
          player.vy = 0;
          break;
        }
      }
    }

    // Walk animation
    if (player.onGround && Math.abs(player.vx) > 10) {
      player.walkTimer += dt * Math.abs(player.vx) * 0.05;
      player.walkFrame = Math.floor(player.walkTimer) % 2;
      stepSoundTimer -= dt;
      if (stepSoundTimer <= 0) { SFX.step(); stepSoundTimer = 0.25; }
    } else {
      player.walkFrame = 0;
    }
  }

  // Fall off bottom
  if (player.y > levelH * TILE) { killPlayer(); return; }

  // World bounds
  if (player.x < 0) player.x = 0;
  if (player.x > (levelW-1)*TILE - PLAYER_W) player.x = (levelW-1)*TILE - PLAYER_W;

  // Elevator
  if (elevator) {
    elevator.y += elevator.speed * elevator.dir * dt;
    if (elevator.y <= elevator.minY) { elevator.y = elevator.minY; elevator.dir = 1; }
    if (elevator.y >= elevator.maxY) { elevator.y = elevator.maxY; elevator.dir = -1; }
    // Ride elevator
    if (rectOverlap(player.x, player.y+PLAYER_H-4, PLAYER_W, 8, elevator.x, elevator.y, elevator.w, elevator.h/2)) {
      player.y = elevator.y - PLAYER_H;
      player.vy = 0;
      player.onGround = true;
    }
  }

  // Drill (level 1)
  if (drill && level === 1) {
    drill.x += drill.speed * drill.dir * dt;
    if (drill.x > (levelW-3)*TILE) { drill.dir = -1; }
    if (drill.x < 2*TILE) { drill.dir = 1; }

    // Check if drill over filled but undrilled hole
    for (const h of holes) {
      if (h.filled && !h.drilled) {
        if (Math.abs(drill.x - h.c*TILE) < TILE*2) {
          h.drilled = true;
          score += 200;
          SFX.drill();
          spawnParticles(h.c*TILE+TILE, h.r*TILE, 15, '#ffaa00', 100, 0.5);
          collectedCount++;
          if (collectedCount >= totalCollect) { completeLvl(); return; }
        }
      }
    }
  }

  // Entity updates
  for (let i = entities.length - 1; i >= 0; i--) {
    const e = entities[i];
    switch(e.type) {
      case 'girder':
        if (!e.collected) {
          if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
            if (!player.carrying) {
              e.collected = true;
              player.carrying = 'girder';
              score += 100;
              SFX.collect();
            }
          }
        }
        break;

      case 'lunchbox':
      case 'crate':
        if (!e.collected) {
          if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
            e.collected = true;
            score += 150;
            SFX.collect();
            spawnParticles(e.x+e.w/2, e.y+e.h/2, 8, '#ffdd00', 80, 0.4);
            if (e.type === 'lunchbox') {
              collectedCount++;
              if (collectedCount >= totalCollect) {
                // Level 2: need to reach magnet
                // For simplicity, mark level as completable
                levelDone = true;
              }
            }
            if (e.type === 'crate') {
              player.carrying = 'crate';
            }
          }
        }
        break;

      case 'processor':
        if (player.carrying === 'crate' && rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
          player.carrying = null;
          score += 200;
          SFX.girder();
          spawnParticles(e.x+e.w/2, e.y, 12, '#ffaa00', 100, 0.5);
          collectedCount++;
          if (collectedCount >= totalCollect) { completeLvl(); return; }
        }
        break;

      case 'magnet':
        if (levelDone && rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
          completeLvl(); return;
        }
        break;

      case 'vandal':
      case 'osha':
        e.x += e.vx * dt;
        if (e.x >= e.patrolMax) { e.x = e.patrolMax; e.vx = -Math.abs(e.vx); }
        if (e.x <= e.patrolMin) { e.x = e.patrolMin; e.vx = Math.abs(e.vx); }
        // Collision with player
        if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, PLAYER_W, PLAYER_H)) {
          killPlayer(); return;
        }
        break;

      case 'boltSpawner':
        e.timer -= dt;
        if (e.timer <= 0) {
          e.timer = e.interval;
          entities.push({type:'bolt', x: (3 + Math.random()*(levelW-6))*TILE, y: e.y, vy: 120 + Math.random()*60, angle:0});
        }
        break;

      case 'bolt':
        e.y += e.vy * dt;
        e.angle += dt * 10;
        if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x-8, e.y-8, 16, 16)) {
          killPlayer(); return;
        }
        if (e.y > levelH * TILE) { entities.splice(i, 1); }
        break;

      case 'pincers':
        e.snapTimer += dt * 3;
        if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
          killPlayer(); return;
        }
        break;

      case 'dynamite':
        e.fuseTimer += dt;
        if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
          killPlayer(); return;
        }
        break;

      case 'poison':
        if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
          killPlayer(); return;
        }
        break;

      case 'squasher':
        if (e.extending) {
          e.h += e.speed * dt;
          if (e.h >= e.maxH) { e.h = e.maxH; e.extending = false; }
        } else {
          e.h -= e.speed * dt;
          if (e.h <= 0) { e.h = 0; e.extending = true; }
        }
        if (e.h > TILE && !keys.down) {
          if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
            killPlayer(); return;
          }
        }
        break;

      case 'pool':
        if (rectOverlap(player.x, player.y+PLAYER_H-4, PLAYER_W, 4, e.x, e.y, e.w, e.h)) {
          killPlayer(); return;
        }
        break;
    }
  }

  // Level 1: place girder in hole
  if (level === 1 && player.carrying === 'girder') {
    for (const h of holes) {
      if (!h.filled) {
        const hx = h.c * TILE, hy = h.r * TILE;
        if (Math.abs(player.x - hx) < TILE*2 && Math.abs(player.y + PLAYER_H - hy) < TILE) {
          h.filled = true;
          player.carrying = null;
          score += 100;
          SFX.girder();
          spawnParticles(hx+TILE, hy, 10, '#ffaa00', 80, 0.4);
          levelMap[h.r][h.c] = T_SOLID;
          levelMap[h.r][h.c+1] = T_SOLID;
        }
      }
    }
  }

  // Camera
  const targetCX = player.x + PLAYER_W/2 - viewW/2;
  const targetCY = player.y + PLAYER_H/2 - viewH/2;
  camX += (targetCX - camX) * 0.08;
  camY += (targetCY - camY) * 0.08;
  camX = Math.max(0, Math.min(camX, levelW*TILE - viewW));
  camY = Math.max(0, Math.min(camY, levelH*TILE - viewH));
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  player.deathTimer = 1.5;
  shake(8, 0.3);
  SFX.die();
  spawnParticles(player.x+PLAYER_W/2, player.y+PLAYER_H/2, 20, '#ff4400', 150, 0.6);
  spawnParticles(player.x+PLAYER_W/2, player.y+PLAYER_H/2, 10, '#ffcc00', 100, 0.5);
}

function completeLvl() {
  state = 'levelComplete';
  levelCompleteTimer = 2;
  const timeBonus = Math.floor(bonusTimer * 10);
  score += timeBonus;
  SFX.levelComplete();
}

// ============ DRAWING ============
function drawBackground(ox, oy) {
  // Sky gradient
  const grd = ctx.createLinearGradient(0, 0, 0, viewH);
  grd.addColorStop(0, '#0a1628');
  grd.addColorStop(0.6, '#1a3a5c');
  grd.addColorStop(1, '#3a6080');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, viewW, viewH);

  // Parallax clouds
  const cloudOx = ox * 0.1;
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 200 + 50) - cloudOx) % (viewW + 200) - 100;
    ctx.beginPath();
    ctx.ellipse(cx, 40 + i*20, 60+i*10, 15+i*3, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // City silhouette
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  const silOx = ox * 0.2;
  const buildings = [
    [0,50],[40,80],[80,40],[120,90],[170,55],[210,70],[260,45],[300,85],[350,60],[400,75],
    [450,50],[500,90],[550,40],[600,65],[650,80],[700,55],[750,70],[800,45],[850,85]
  ];
  for (const [bx, bh] of buildings) {
    const sx = (bx - silOx) % (viewW + 100) - 50;
    ctx.fillRect(sx, viewH - bh, 35, bh);
  }

  // Warm amber overlay
  ctx.fillStyle = 'rgba(255,160,50,0.04)';
  ctx.fillRect(0, 0, viewW, viewH);
}

function drawGirder(x, y, w, h) {
  // Top face (lighter)
  const topGrd = ctx.createLinearGradient(x, y, x, y + h*0.3);
  topGrd.addColorStop(0, '#8899aa');
  topGrd.addColorStop(1, '#667788');
  ctx.fillStyle = topGrd;
  ctx.fillRect(x, y, w, h*0.35);

  // Front face (darker)
  const fGrd = ctx.createLinearGradient(x, y+h*0.35, x, y+h);
  fGrd.addColorStop(0, '#556677');
  fGrd.addColorStop(1, '#3a4a5a');
  ctx.fillStyle = fGrd;
  ctx.fillRect(x, y+h*0.35, w, h*0.65);

  // Rivets
  ctx.fillStyle = '#99aabb';
  const rivetSpacing = 24;
  for (let rx = x + 8; rx < x + w - 4; rx += rivetSpacing) {
    ctx.beginPath();
    ctx.arc(rx, y + h*0.5, 2.5, 0, Math.PI*2);
    ctx.fill();
  }

  // Highlight line
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, y+1); ctx.lineTo(x+w, y+1); ctx.stroke();
}

function drawLadder(x, y, h) {
  const rungCount = Math.floor(h / 10);
  // Rails
  ctx.fillStyle = '#6a5a4a';
  ctx.fillRect(x+4, y, 3, h);
  ctx.fillRect(x+TILE-7, y, 3, h);
  // Rungs
  for (let i = 0; i < rungCount; i++) {
    const ry = y + i * (h / rungCount);
    ctx.fillStyle = '#7a6a5a';
    ctx.fillRect(x+6, ry, TILE-13, 3);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x+6, ry+2, TILE-13, 1);
  }
}

function drawHole(x, y) {
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(x, y, TILE*2, TILE);
  ctx.strokeStyle = '#ff4400';
  ctx.lineWidth = 2;
  ctx.setLineDash([4,4]);
  ctx.strokeRect(x+1, y+1, TILE*2-2, TILE-2);
  ctx.setLineDash([]);
}

function drawSpring(x, y, t) {
  const bounce = Math.sin(t * 4) * 3;
  ctx.fillStyle = '#cc8800';
  ctx.fillRect(x+4, y+TILE-8, TILE-8, 8);
  // Coil
  ctx.strokeStyle = '#ddaa00';
  ctx.lineWidth = 2;
  for (let i = 0; i < 4; i++) {
    const sy = y + TILE - 10 - i*5 + bounce;
    ctx.beginPath();
    ctx.moveTo(x+6, sy); ctx.lineTo(x+TILE-6, sy-3);
    ctx.stroke();
  }
}

function drawConveyor(x, y, dir, t) {
  drawGirder(x, y, TILE, TILE);
  // Arrow indicators
  ctx.fillStyle = '#ffcc00';
  const arrowX = x + TILE/2 + Math.sin(t*4) * 4 * dir;
  ctx.beginPath();
  ctx.moveTo(arrowX + 4*dir, y+TILE/2);
  ctx.lineTo(arrowX - 4*dir, y+TILE/2 - 4);
  ctx.lineTo(arrowX - 4*dir, y+TILE/2 + 4);
  ctx.fill();
}

function drawPlayer(px, py, p, t) {
  if (p.dead) {
    ctx.globalAlpha = Math.max(0, p.deathTimer / 1.5);
  }
  const x = px, y = py;
  const f = p.facing;

  // Body - blue work clothes
  const bodyGrd = ctx.createLinearGradient(x, y+12, x, y+PLAYER_H);
  bodyGrd.addColorStop(0, '#2255aa');
  bodyGrd.addColorStop(1, '#1a3a77');
  ctx.fillStyle = bodyGrd;

  if (p.climbing) {
    // Climbing pose
    const armOff = Math.floor(p.climbFrame) % 2 === 0 ? -3 : 3;
    ctx.fillRect(x+2, y+14, PLAYER_W-4, 18); // torso
    // Arms
    ctx.fillRect(x-2+armOff, y+14, 5, 10);
    ctx.fillRect(x+PLAYER_W-3-armOff, y+14, 5, 10);
    // Legs
    ctx.fillRect(x+4, y+32, 6, 8);
    ctx.fillRect(x+PLAYER_W-10, y+32, 6, 8);
  } else if (p.jumping) {
    // Jump pose - arms up
    ctx.fillRect(x+2, y+14, PLAYER_W-4, 16); // torso
    ctx.fillRect(x+2, y+6, 5, 10); // left arm up
    ctx.fillRect(x+PLAYER_W-7, y+6, 5, 10); // right arm up
    // Legs together
    ctx.fillRect(x+6, y+30, PLAYER_W-12, 10);
  } else {
    // Walk / stand
    ctx.fillRect(x+2, y+14, PLAYER_W-4, 16); // torso
    // Arms at sides
    ctx.fillRect(x-1, y+16, 4, 10);
    ctx.fillRect(x+PLAYER_W-3, y+16, 4, 10);
    // Legs
    if (p.walkFrame === 0) {
      ctx.fillRect(x+4, y+30, 6, 10);
      ctx.fillRect(x+PLAYER_W-10, y+30, 6, 10);
    } else {
      ctx.fillRect(x+2, y+30, 6, 10);
      ctx.fillRect(x+PLAYER_W-8, y+28, 6, 12);
    }
  }

  // Boots
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(x+3, y+PLAYER_H-4, 7, 4);
  ctx.fillRect(x+PLAYER_W-10, y+PLAYER_H-4, 7, 4);

  // Head (skin)
  ctx.fillStyle = '#e8b88a';
  ctx.fillRect(x+5, y+6, PLAYER_W-10, 9);

  // Hard hat
  const hatGrd = ctx.createLinearGradient(x, y, x, y+8);
  hatGrd.addColorStop(0, '#ffdd00');
  hatGrd.addColorStop(1, '#ccaa00');
  ctx.fillStyle = hatGrd;
  ctx.fillRect(x+2, y+2, PLAYER_W-4, 6);
  // Brim
  ctx.fillRect(x, y+7, PLAYER_W, 2);
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(x+4, y+3, 6, 2);

  // Eyes
  ctx.fillStyle = '#222';
  if (f > 0) {
    ctx.fillRect(x+12, y+9, 2, 2);
    ctx.fillRect(x+16, y+9, 2, 2);
  } else {
    ctx.fillRect(x+6, y+9, 2, 2);
    ctx.fillRect(x+10, y+9, 2, 2);
  }

  // Carrying indicator
  if (p.carrying) {
    ctx.fillStyle = p.carrying === 'girder' ? '#8899aa' : '#8B6914';
    ctx.fillRect(x + PLAYER_W/2 - 8, y - 6, 16, 5);
  }

  ctx.globalAlpha = 1;
}

function drawVandal(x, y, t) {
  // Hunched red figure
  ctx.fillStyle = '#cc3300';
  // Body (hunched)
  ctx.fillRect(x+2, y+14, PLAYER_W-4, 14);
  ctx.fillRect(x+4, y+10, PLAYER_W-8, 6); // upper body, offset forward
  // Head
  ctx.fillStyle = '#dd4400';
  ctx.fillRect(x+6, y+2, PLAYER_W-12, 10);
  // Eyes (menacing)
  ctx.fillStyle = '#ff0';
  ctx.fillRect(x+8, y+5, 3, 2);
  ctx.fillRect(x+14, y+5, 3, 2);
  // Legs
  ctx.fillStyle = '#aa2200';
  const lOff = Math.sin(t*6)*3;
  ctx.fillRect(x+4+lOff, y+28, 5, 12);
  ctx.fillRect(x+PLAYER_W-9-lOff, y+28, 5, 12);
  // Boots
  ctx.fillStyle = '#333';
  ctx.fillRect(x+3, y+PLAYER_H-4, 7, 4);
  ctx.fillRect(x+PLAYER_W-10, y+PLAYER_H-4, 7, 4);
}

function drawOSHA(x, y, t) {
  // Green upright figure with clipboard
  ctx.fillStyle = '#228833';
  ctx.fillRect(x+2, y+12, PLAYER_W-4, 18);
  // Head
  ctx.fillStyle = '#33aa44';
  ctx.fillRect(x+5, y+2, PLAYER_W-10, 11);
  // Hard hat (white)
  ctx.fillStyle = '#eee';
  ctx.fillRect(x+4, y, PLAYER_W-8, 5);
  // Eyes
  ctx.fillStyle = '#222';
  ctx.fillRect(x+8, y+6, 2, 2);
  ctx.fillRect(x+14, y+6, 2, 2);
  // Clipboard
  ctx.fillStyle = '#ddcc88';
  ctx.fillRect(x+PLAYER_W-2, y+14, 6, 8);
  ctx.fillStyle = '#aa9955';
  ctx.fillRect(x+PLAYER_W, y+12, 4, 3);
  // Legs
  ctx.fillStyle = '#1a6633';
  const lOff = Math.sin(t*5)*2;
  ctx.fillRect(x+5+lOff, y+30, 5, 10);
  ctx.fillRect(x+PLAYER_W-10-lOff, y+30, 5, 10);
}

function drawBolt(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  // Bolt shape
  ctx.fillStyle = '#aabbcc';
  ctx.fillRect(-6, -3, 12, 6);
  ctx.fillStyle = '#8899aa';
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI*2);
  ctx.fill();
  // Motion trail
  ctx.fillStyle = 'rgba(200,220,240,0.3)';
  ctx.fillRect(-4, 6, 8, 10);
  ctx.restore();
}

function drawCollectible(e, t) {
  if (e.collected) return;
  const glow = Math.sin(t*4)*0.15 + 0.85;
  ctx.globalAlpha = glow;
  if (e.type === 'girder') {
    drawGirder(e.x, e.y, e.w, e.h);
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 1;
    ctx.strokeRect(e.x-1, e.y-1, e.w+2, e.h+2);
  } else if (e.type === 'lunchbox') {
    ctx.fillStyle = '#cc2200';
    ctx.fillRect(e.x+2, e.y+4, TILE-4, TILE-4);
    ctx.fillStyle = '#dd3311';
    ctx.fillRect(e.x+4, e.y+6, TILE-8, TILE-8);
    // Handle
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(e.x+TILE/2, e.y+4, 6, Math.PI, 0);
    ctx.stroke();
  } else if (e.type === 'crate') {
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(e.x+1, e.y+1, TILE-2, TILE-2);
    ctx.strokeStyle = '#6a4a0a';
    ctx.lineWidth = 1;
    ctx.strokeRect(e.x+1, e.y+1, TILE-2, TILE-2);
    // Cross pattern
    ctx.beginPath();
    ctx.moveTo(e.x+2, e.y+2); ctx.lineTo(e.x+TILE-2, e.y+TILE-2);
    ctx.moveTo(e.x+TILE-2, e.y+2); ctx.lineTo(e.x+2, e.y+TILE-2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawHazard(e, t) {
  if (e.type === 'pincers') {
    const snap = Math.sin(e.snapTimer) > 0 ? 0 : 8;
    ctx.fillStyle = '#cc4400';
    // Two jaws
    ctx.fillRect(e.x+2, e.y+4, 10, TILE-8);
    ctx.fillRect(e.x+TILE-12, e.y+4, 10, TILE-8);
    // Tips
    ctx.fillRect(e.x+6, e.y+4-snap, 4, 6);
    ctx.fillRect(e.x+TILE-10, e.y+4-snap, 4, 6);
  } else if (e.type === 'dynamite') {
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(e.x+8, e.y+8, 8, TILE-8);
    // Fuse
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(e.x+12, e.y+8);
    ctx.quadraticCurveTo(e.x+14, e.y, e.x+18, e.y+2);
    ctx.stroke();
    // Spark
    const sparkY = e.y + 2 + Math.sin(t*10)*2;
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.arc(e.x+18, sparkY, 2+Math.random()*2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffdd00';
    ctx.beginPath(); ctx.arc(e.x+18, sparkY, 1, 0, Math.PI*2); ctx.fill();
  } else if (e.type === 'poison') {
    ctx.fillStyle = '#00aa00';
    ctx.fillRect(e.x+2, e.y+2, TILE-4, TILE-4);
    ctx.fillStyle = 'rgba(0,255,0,0.2)';
    ctx.fillRect(e.x, e.y, TILE, TILE);
    // Skull
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(e.x+TILE/2, e.y+TILE/2-2, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#00aa00';
    ctx.fillRect(e.x+TILE/2-4, e.y+TILE/2+2, 8, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(e.x+TILE/2-3, e.y+TILE/2-4, 2, 2);
    ctx.fillRect(e.x+TILE/2+1, e.y+TILE/2-4, 2, 2);
  } else if (e.type === 'squasher') {
    if (e.h > 2) {
      ctx.fillStyle = '#555';
      ctx.fillRect(e.x, e.y, e.w, e.h);
      ctx.fillStyle = '#777';
      ctx.fillRect(e.x, e.y+e.h-4, e.w, 4);
    }
  } else if (e.type === 'pool') {
    ctx.fillStyle = 'rgba(0,100,200,0.5)';
    ctx.fillRect(e.x, e.y, e.w, e.h);
    // Ripple
    ctx.strokeStyle = 'rgba(100,200,255,0.3)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const ry = e.y + 4 + i*8 + Math.sin(t*2+i)*2;
      ctx.beginPath();
      ctx.moveTo(e.x+4, ry);
      ctx.quadraticCurveTo(e.x+e.w/2, ry + Math.sin(t*3)*3, e.x+e.w-4, ry);
      ctx.stroke();
    }
  }
}

function drawElevator(el) {
  ctx.fillStyle = '#6677';
  ctx.fillRect(el.x, el.y, el.w, el.h);
  const elGrd = ctx.createLinearGradient(el.x, el.y, el.x, el.y+el.h);
  elGrd.addColorStop(0, '#8899aa');
  elGrd.addColorStop(1, '#556677');
  ctx.fillStyle = elGrd;
  ctx.fillRect(el.x, el.y, el.w, el.h);
  // Rails
  ctx.fillStyle = '#445566';
  ctx.fillRect(el.x-2, el.minY, 3, el.maxY-el.minY+el.h);
  ctx.fillRect(el.x+el.w-1, el.minY, 3, el.maxY-el.minY+el.h);
}

function drawDrill(d, t) {
  if (!d) return;
  ctx.fillStyle = '#888';
  ctx.fillRect(d.x, d.y+4, TILE*1.5, TILE-8);
  ctx.fillStyle = '#aaa';
  ctx.fillRect(d.x+TILE*1.5, d.y+8, 10, TILE-16);
  // Spinning bit
  const spin = Math.sin(t*20)*2;
  ctx.fillStyle = '#ccc';
  ctx.fillRect(d.x+TILE*1.5+8, d.y+12+spin, 6, 8);
}

function drawProcessor(e, t) {
  ctx.fillStyle = '#554433';
  ctx.fillRect(e.x, e.y, e.w, e.h);
  ctx.fillStyle = '#776655';
  ctx.fillRect(e.x+2, e.y+2, e.w-4, e.h-4);
  // Glow
  ctx.fillStyle = `rgba(255,${100+Math.sin(t*3)*50},0,0.3)`;
  ctx.fillRect(e.x+4, e.y+4, e.w-8, e.h-8);
}

function drawMagnet(e, t) {
  ctx.fillStyle = '#666';
  ctx.fillRect(e.x, e.y, e.w, e.h);
  // Electricity arcs
  if (levelDone) {
    ctx.strokeStyle = `rgba(100,200,255,${0.5+Math.sin(t*8)*0.3})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(e.x+e.w/2, e.y+e.h);
    ctx.lineTo(e.x+e.w/2+Math.sin(t*12)*10, e.y+e.h+15);
    ctx.stroke();
  }
}

function drawWorld(t) {
  const ox = Math.floor(camX), oy = Math.floor(camY);

  // Apply shake
  let sx = 0, sy = 0;
  if (shakeTime > 0) {
    sx = (Math.random()-0.5) * shakeIntensity * 2;
    sy = (Math.random()-0.5) * shakeIntensity * 2;
  }

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, viewW, viewH);
  ctx.clip();

  ctx.translate(sx, sy);

  drawBackground(ox, oy);

  // Draw tiles
  const startC = Math.max(0, Math.floor(ox / TILE));
  const endC = Math.min(levelW, Math.ceil((ox + viewW) / TILE) + 1);
  const startR = Math.max(0, Math.floor(oy / TILE));
  const endR = Math.min(levelH, Math.ceil((oy + viewH) / TILE) + 1);

  for (let r = startR; r < endR; r++) {
    for (let c = startC; c < endC; c++) {
      const tile = levelMap[r][c];
      const tx = c * TILE - ox, ty = r * TILE - oy;
      switch(tile) {
        case T_SOLID:
          drawGirder(tx, ty, TILE, TILE);
          break;
        case T_LADDER: case T_CHAIN:
          drawLadder(tx, ty, TILE);
          break;
        case T_CONV_L:
          drawConveyor(tx, ty, -1, t);
          break;
        case T_CONV_R:
          drawConveyor(tx, ty, 1, t);
          break;
        case T_SPRING:
          drawSpring(tx, ty, t);
          break;
        case T_HOLE:
          drawHole(tx, ty);
          break;
      }
    }
  }

  // Elevator
  if (elevator) {
    ctx.save(); ctx.translate(-ox, -oy);
    drawElevator(elevator);
    ctx.restore();
  }

  // Drill
  if (drill && level === 1) {
    ctx.save(); ctx.translate(-ox, -oy);
    drawDrill(drill, t);
    ctx.restore();
  }

  // Entities
  for (const e of entities) {
    ctx.save(); ctx.translate(-ox, -oy);
    switch(e.type) {
      case 'girder': case 'lunchbox': case 'crate':
        drawCollectible(e, t); break;
      case 'vandal':
        drawVandal(e.x, e.y, t); break;
      case 'osha':
        drawOSHA(e.x, e.y, t); break;
      case 'bolt':
        drawBolt(e.x, e.y, e.angle); break;
      case 'pincers': case 'dynamite': case 'poison': case 'squasher': case 'pool':
        drawHazard(e, t); break;
      case 'processor':
        drawProcessor(e, t); break;
      case 'magnet':
        drawMagnet(e, t); break;
    }
    ctx.restore();
  }

  // Player
  if (!player.dead || player.deathTimer > 0) {
    drawPlayer(player.x - ox, player.y - oy, player, t);
  }

  // Particles
  drawParticles(ox, oy);

  ctx.restore();
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 10, 22);

  // Timer
  const timerPct = bonusTimer / bonusTimerMax;
  let timerColor = '#ffdd00';
  if (timerPct < 0.3) timerColor = '#ff3300';
  else if (timerPct < 0.6) timerColor = '#ff8800';
  ctx.fillStyle = timerColor;
  ctx.textAlign = 'center';
  ctx.fillText(`TIME: ${Math.ceil(bonusTimer)}`, viewW/2, 22);

  // Timer bar
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(viewW/2-60, 28, 120, 6);
  ctx.fillStyle = timerColor;
  ctx.fillRect(viewW/2-60, 28, 120*timerPct, 6);

  // Lives
  for (let i = 0; i < lives; i++) {
    const lx = viewW - 30 - i * 28;
    // Mini hard hat
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(lx, 10, 20, 8);
    ctx.fillRect(lx-2, 16, 24, 3);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(lx+3, 11, 6, 3);
  }

  // Round / Level
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`ROUND ${round} - LEVEL ${level}`, 10, viewH - 4);

  // Carrying indicator
  if (player.carrying) {
    ctx.fillStyle = '#ffcc00';
    ctx.textAlign = 'right';
    ctx.font = '12px monospace';
    ctx.fillText(`CARRYING: ${player.carrying.toUpperCase()}`, viewW-10, viewH-4);
  }

  // Collected count
  ctx.fillStyle = '#aaddff';
  ctx.textAlign = 'center';
  ctx.font = '12px monospace';
  const label = level===1?'GIRDERS DRILLED':level===2?'LUNCHBOXES':'BOXES PROCESSED';
  ctx.fillText(`${collectedCount}/${totalCollect} ${label}`, viewW/2, viewH-4);
}

// ============ HIGH SCORES ============
const HS_KEY = 'hard_hat_mac_highscores';
function loadScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch(e) { return []; }
}
function saveScores(scores) {
  try { localStorage.setItem(HS_KEY, JSON.stringify(scores)); } catch(e) {}
}
function isHighScore(s) {
  const hs = loadScores();
  return hs.length < 10 || s > (hs[hs.length-1]?.score || 0);
}

let hsEntry = { initials: ['A','A','A'], pos: 0 };

function drawHighScores() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HIGH SCORES', W/2, 50);

  const hs = loadScores();
  ctx.font = '18px monospace';
  for (let i = 0; i < Math.min(10, hs.length); i++) {
    const entry = hs[i];
    ctx.fillStyle = i === 0 ? '#ffdd00' : '#ccddee';
    ctx.fillText(`${(i+1+'').padStart(2,' ')}. ${entry.initials}  ${(entry.score+'').padStart(7,' ')}  R${entry.round}`, W/2, 90 + i*30);
  }
  if (hs.length === 0) {
    ctx.fillStyle = '#888';
    ctx.fillText('NO SCORES YET', W/2, 120);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '16px monospace';
  ctx.fillText('TAP TO RETURN', W/2, H - 40);
}

function drawHSEntry() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NEW HIGH SCORE!', W/2, 60);
  ctx.fillText(`${score}`, W/2, 95);

  // Initials
  ctx.font = 'bold 40px monospace';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i === hsEntry.pos ? '#ffdd00' : '#888';
    ctx.fillText(hsEntry.initials[i], W/2 - 40 + i*40, 170);
    if (i === hsEntry.pos) {
      // Underline
      ctx.fillRect(W/2 - 52 + i*40, 178, 24, 3);
    }
  }

  // Up/Down buttons for each position
  const btnY1 = 120, btnY2 = 195;
  for (let i = 0; i < 3; i++) {
    const bx = W/2 - 52 + i*40;
    // Up
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(bx, btnY1, 24, 24);
    ctx.fillStyle = '#fff';
    ctx.font = '16px monospace';
    ctx.fillText('▲', bx+12, btnY1+18);
    // Down
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(bx, btnY2, 24, 24);
    ctx.fillStyle = '#fff';
    ctx.fillText('▼', bx+12, btnY2+18);
  }

  // OK button
  ctx.fillStyle = 'rgba(255,180,0,0.4)';
  ctx.fillRect(W/2-40, 250, 80, 40);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('OK', W/2, 276);

  // Left/Right arrows to change position
  ctx.fillStyle = '#aaa';
  ctx.font = '14px monospace';
  ctx.fillText('← TAP LETTER →', W/2, 310);
}

function handleHSEntryTap(tx, ty) {
  const btnY1 = 120, btnY2 = 195;
  for (let i = 0; i < 3; i++) {
    const bx = W/2 - 52 + i*40;
    if (tx >= bx && tx <= bx+24) {
      if (ty >= btnY1 && ty <= btnY1+24) {
        // Up
        hsEntry.pos = i;
        let code = hsEntry.initials[i].charCodeAt(0) - 1;
        if (code < 65) code = 90;
        hsEntry.initials[i] = String.fromCharCode(code);
        return;
      }
      if (ty >= btnY2 && ty <= btnY2+24) {
        // Down
        hsEntry.pos = i;
        let code = hsEntry.initials[i].charCodeAt(0) + 1;
        if (code > 90) code = 65;
        hsEntry.initials[i] = String.fromCharCode(code);
        return;
      }
    }
  }
  // OK button
  if (tx >= W/2-40 && tx <= W/2+40 && ty >= 250 && ty <= 290) {
    const hs = loadScores();
    hs.push({ initials: hsEntry.initials.join(''), score, round });
    hs.sort((a,b) => b.score - a.score);
    if (hs.length > 10) hs.length = 10;
    saveScores(hs);
    state = 'highScoreView';
  }
}

// ============ TITLE SCREEN ============
function drawTitle(t) {
  // Background construction scene
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#0a1628');
  grd.addColorStop(0.5, '#1a3a5c');
  grd.addColorStop(1, '#2a1a0a');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Construction silhouettes
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(W*0.1, H*0.4, 30, H*0.6);
  ctx.fillRect(W*0.1-20, H*0.4, 70, 8);
  ctx.fillRect(W*0.8, H*0.35, 25, H*0.65);
  ctx.fillRect(W*0.8-15, H*0.35, 55, 8);
  // Cross braces
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(W*0.1, H*0.4); ctx.lineTo(W*0.1+30, H*0.7);
  ctx.moveTo(W*0.1+30, H*0.4); ctx.lineTo(W*0.1, H*0.7);
  ctx.stroke();

  // Girder platforms
  for (let i = 0; i < 5; i++) {
    const gy = H*0.5 + i*40;
    ctx.fillStyle = '#3a4a5a';
    ctx.fillRect(W*0.15, gy, W*0.7, 8);
    // Rivets
    ctx.fillStyle = '#5a6a7a';
    for (let rx = W*0.15+10; rx < W*0.85; rx += 30) {
      ctx.beginPath(); ctx.arc(rx, gy+4, 2, 0, Math.PI*2); ctx.fill();
    }
  }

  // Title
  ctx.save();
  const bob = Math.sin(t*2) * 4;
  ctx.fillStyle = '#000';
  ctx.font = `bold ${Math.min(48, W*0.1)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('HARD HAT MAC', W/2+2, H*0.2+2+bob);
  ctx.fillStyle = '#ffdd00';
  ctx.fillText('HARD HAT MAC', W/2, H*0.2+bob);
  // Subtitle
  ctx.fillStyle = '#aabbcc';
  ctx.font = `${Math.min(16, W*0.04)}px monospace`;
  ctx.fillText('AN ENHANCED REMAKE', W/2, H*0.2+25+bob);
  ctx.restore();

  // Mack standing on a girder
  const mx = W/2 - PLAYER_W/2, my = H*0.5 - PLAYER_H - 2;
  drawPlayer(mx, my, {facing:1, walkFrame:0, climbing:false, jumping:false, dead:false, carrying:null, climbFrame:0}, t);

  // Buttons
  drawButton(W/2, H*0.72, 160, 44, 'START GAME', '#ffcc00', '#aa7700');
  drawButton(W/2, H*0.82, 160, 44, 'HIGH SCORES', '#88aacc', '#446688');

  // Credits
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BASED ON HARD HAT MACK (1983)', W/2, H-20);
}

function drawButton(cx, cy, w, h, text, color, dark) {
  ctx.fillStyle = dark;
  ctx.fillRect(cx-w/2, cy-h/2+2, w, h);
  ctx.fillStyle = color;
  ctx.fillRect(cx-w/2, cy-h/2, w, h-2);
  ctx.fillStyle = '#000';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text, cx, cy+5);
}

// ============ LEVEL INTRO / COMPLETE ============
function drawLevelIntro(t) {
  drawWorld(t);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, viewW, viewH);

  const names = ['', 'BUILDING FRAMEWORK', 'CONSTRUCTION SITE', 'FACTORY'];
  ctx.fillStyle = '#ffdd00';
  ctx.font = `bold ${Math.min(32, W*0.07)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${level}`, viewW/2, viewH/2 - 20);
  ctx.fillStyle = '#aabbcc';
  ctx.font = `bold ${Math.min(20, W*0.05)}px monospace`;
  ctx.fillText(names[level], viewW/2, viewH/2 + 15);
  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText(`ROUND ${round}`, viewW/2, viewH/2 + 45);
}

function drawLevelComplete(t) {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL COMPLETE!', W/2, H/2-30);
  ctx.fillStyle = '#aaddff';
  ctx.font = '18px monospace';
  ctx.fillText(`TIME BONUS: ${Math.floor(bonusTimer*10)}`, W/2, H/2+10);
  ctx.fillText(`SCORE: ${score}`, W/2, H/2+40);
}

function drawGameOver(t) {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ff4400';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2-40);
  ctx.fillStyle = '#ffdd00';
  ctx.font = '20px monospace';
  ctx.fillText(`FINAL SCORE: ${score}`, W/2, H/2+10);
  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText(`ROUND ${round} - LEVEL ${level}`, W/2, H/2+40);
  ctx.fillText('TAP TO CONTINUE', W/2, H/2+80);
}

// ============ TAP HANDLING ============
let tapHandled = false;
function handleTap(tx, ty) {
  initAudio();
  switch(state) {
    case 'title':
      // Start button
      if (ty > H*0.72-22 && ty < H*0.72+22 && tx > W/2-80 && tx < W/2+80) {
        score = 0; lives = 3; round = 1; level = 1;
        generateLevel(level);
        state = 'levelIntro';
        levelIntroTimer = 1.5;
        controlsDiv.style.display = 'block';
      }
      // High scores
      if (ty > H*0.82-22 && ty < H*0.82+22 && tx > W/2-80 && tx < W/2+80) {
        state = 'highScoreView';
      }
      break;
    case 'highScoreView':
      state = 'title';
      break;
    case 'highScoreEntry':
      handleHSEntryTap(tx, ty);
      break;
    case 'gameOver':
      if (isHighScore(score)) {
        state = 'highScoreEntry';
        hsEntry = { initials: ['A','A','A'], pos: 0 };
      } else {
        state = 'highScoreView';
      }
      break;
  }
}

canvas.addEventListener('click', (e) => { handleTap(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length > 0) handleTap(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});

// ============ MAIN LOOP ============
let lastTime = 0, gameTime = 0;
function loop(timestamp) {
  requestAnimationFrame(loop);
  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  if (dt > 1/30) dt = 1/30;
  if (dt <= 0) dt = 1/60;
  gameTime += dt;

  // Shake
  if (shakeTime > 0) shakeTime -= dt;

  switch(state) {
    case 'title':
      controlsDiv.style.display = 'none';
      drawTitle(gameTime);
      break;

    case 'levelIntro':
      levelIntroTimer -= dt;
      drawLevelIntro(gameTime);
      if (levelIntroTimer <= 0) state = 'playing';
      break;

    case 'playing':
      controlsDiv.style.display = 'block';
      updateGame(dt);
      updateParticles(dt);
      drawWorld(gameTime);
      drawHUD();
      break;

    case 'levelComplete':
      levelCompleteTimer -= dt;
      updateParticles(dt);
      drawLevelComplete(gameTime);
      if (levelCompleteTimer <= 0) {
        level++;
        if (level > 3) {
          level = 1;
          round++;
        }
        generateLevel(level);
        state = 'levelIntro';
        levelIntroTimer = 1.5;
      }
      break;

    case 'gameOver':
      controlsDiv.style.display = 'none';
      drawGameOver(gameTime);
      break;

    case 'highScoreEntry':
      controlsDiv.style.display = 'none';
      drawHSEntry();
      break;

    case 'highScoreView':
      controlsDiv.style.display = 'none';
      drawHighScores();
      break;
  }
}

requestAnimationFrame(loop);
