// ============================================================
// TILE QUERIES
// ============================================================
function tileAt(c, r) {
  if (c < 0 || c >= levelW) return T_SOLID;
  if (r < 0 || r >= levelH) return T_EMPTY;
  return levelMap[r][c];
}
function isSolid(c, r) {
  const t = tileAt(c, r);
  if (t === T_HOLE) { const h = holeIdx[r + ',' + c]; return h ? h.filled : false; }
  return t === T_SOLID || t === T_CONV_L || t === T_CONV_R || t === T_SPRING;
}
function isLadder(c, r) { return tileAt(c, r) === T_LADDER; }
function overlap(ax,ay,aw,ah,bx,by,bw,bh) { return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by; }

// ============================================================
// SCORING / COMBO / POWER-UPS
// ============================================================
function addScore(n, x, y, label) {
  const v = n * comboMult;
  score += v;
  if (x !== undefined) popup(x, y, (label?label+' ':'') + '+' + v + (comboMult>1?' ×'+comboMult:''), comboMult>1?'#ffb347':'#ffe082');
  while (score >= nextLifeAt) {
    lives = Math.min(lives + 1, 5);
    nextLifeAt += (nextLifeAt < 25000 ? 15000 : 25000);
    SFX.oneUp();
    toast('⛑️ Extra life! Stay safe out there.');
    spawnP(player.x + P_W/2, player.y, 18, {color:['#ffe082','#fff','#7dffa0'], sMax:180, glow:true, shape:'circle'});
  }
}
function bumpCombo(x, y) {
  comboTimer = 5;
  if (comboMult < 5) {
    comboMult++;
    SFX.combo(comboMult);
    if (comboMult === 3 && Math.random() < 0.7) toast('📻 ' + FOREMAN.combo[randi(0, FOREMAN.combo.length-1)]);
  }
}
const POWER_TYPES = ['coffee','goldhat','watch','cash'];
function spawnPowerup() {
  // find a random platform spot
  for (let tries = 0; tries < 40; tries++) {
    const c = randi(2, levelW-3), r = randi(3, levelH-3);
    if (isSolid(c, r) && !isSolid(c, r-1) && !isSolid(c, r-2) && tileAt(c, r) === T_SOLID) {
      const kind = POWER_TYPES[randi(0, POWER_TYPES.length-1)];
      entities.push({type:'powerup', kind, x:c*TILE + 9, y:r*TILE - 30, w:30, h:30, life:9, bob:rand(0,TAU)});
      return;
    }
  }
}
function grabPowerup(e) {
  e.dead = true;
  SFX.power();
  vibrate(20);
  spawnP(e.x+15, e.y+15, 16, {color:['#ffe082','#fff','#9fd8ff'], sMax:160, glow:true, shape:'circle'});
  toast('📻 ' + FOREMAN.power[e.kind]);
  if (e.kind === 'coffee') { speedTimer = 10; }
  else if (e.kind === 'goldhat') { shieldOn = true; SFX.shield(); }
  else if (e.kind === 'watch') { freezeTimer = 5; bonusTimer = Math.min(bonusTimerMax, bonusTimer + 20); }
  else { addScore(500, e.x, e.y, '💰'); }
}

// ============================================================
// DEATH
// ============================================================
function killPlayer(cause) {
  if (player.dead || player.invuln > 0 || levelDone) return;
  if (shieldOn && cause !== 'fall' && cause !== 'drown' && cause !== 'timer') {
    shieldOn = false;
    SFX.shieldPop();
    player.invuln = 1.6;
    spawnP(player.x+P_W/2, player.y, 22, {color:['#ffd24a','#fff'], sMax:220, glow:true, shape:'circle'});
    shake(5, 0.2);
    return;
  }
  player.dead = true;
  player.deathTimer = 1.4;
  player.deathSpin = 0;
  player.vy = -380;
  player.vx = -player.facing * 60;
  comboMult = 1; comboTimer = 0;
  hitStop = 0.12;
  shake(9, 0.45);
  vibrate([30, 40, 60]);
  if (cause === 'drown') { SFX.splash(); player.drown = true; }
  else SFX.die();
  spawnP(player.x+P_W/2, player.y+P_H/2, 14, {color:['#ffc116','#e87830','#fff'], sMax:240});
}
function afterDeath() {
  lives--;
  if (lives <= 0) {
    gameOverNow();
    return;
  }
  toast('📻 ' + FOREMAN.death[randi(0, FOREMAN.death.length-1)]);
  genLevel(level, false);
  bonusTimer = bonusTimerMax;       // fresh clock, keep collection progress
}

// ============================================================
// PLAYER UPDATE
// ============================================================
let warnBeep = 0;
function updatePlayer(dt) {
  const p = player;
  if (p.dead) {
    p.deathSpin += dt * 9 * (p.facing||1);
    p.vy += GRAV * 0.7 * dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.deathTimer -= dt;
    if (p.deathTimer <= 0) afterDeath();
    return;
  }
  if (p.magnetGrab > 0) return; // magnet end-sequence moves player
  p.invuln = Math.max(0, p.invuln - dt);
  p.idleTime += dt;

  const speedMult = (speedTimer > 0 ? 1.42 : 1) * (p.carrying ? 0.86 : 1);
  const cMid = Math.floor((p.x + P_W/2) / TILE);
  const rFeet = Math.floor((p.y + P_H) / TILE);
  const rMid = Math.floor((p.y + P_H*0.55) / TILE);
  const rHead = Math.floor(p.y / TILE);

  // jump buffer + coyote
  p.jumpBuf = Math.max(0, p.jumpBuf - dt);
  p.coyote = Math.max(0, p.coyote - dt);
  if (keys.jump && !p.jumpHeld) p.jumpBuf = 0.12;
  p.jumpHeld = keys.jump;

  // ladder logic
  const onLadderTile = isLadder(cMid, rMid) || isLadder(cMid, rFeet);
  const ladderBelow = isLadder(cMid, rFeet);
  if (!p.climbing && ((keys.up && onLadderTile) || (keys.down && ladderBelow && p.onGround && !isSolid(cMid, rFeet)))) {
    p.climbing = true; p.ducking = false;
    p.vx = 0; p.vy = 0;
    p.x = cMid * TILE + (TILE - P_W) / 2;
  }
  if (p.climbing) {
    if (keys.up) { p.y -= CLIMB * speedMult * dt; p.climbPhase += dt * 9; if ((p.stepTimer-=dt)<=0) { SFX.climb(); p.stepTimer=0.22; } }
    if (keys.down) { p.y += CLIMB * speedMult * dt; p.climbPhase += dt * 9; }
    // top-out: feet rise past the last ladder tile → stand on the crossing
    const nMid = Math.floor((p.y + P_H*0.55) / TILE);
    const nFeet = Math.floor((p.y + P_H) / TILE);
    if (!isLadder(cMid, nMid) && !isLadder(cMid, nFeet)) {
      p.climbing = false;
      if (keys.up) { p.y = (nFeet+1) * TILE - P_H; p.onGround = true; p.coyote = 0.09; }
    }
    if (keys.down && isSolid(cMid, nFeet)) { p.y = nFeet*TILE - P_H; p.climbing = false; p.onGround = true; }
    if (keys.left) { p.climbing = false; p.facing = -1; }
    if (keys.right) { p.climbing = false; p.facing = 1; }
    if (p.jumpBuf > 0) { p.climbing = false; p.vy = JUMP_V*0.85; p.jumpBuf = 0; SFX.jump(); }
    p.onGround = false;
    return; // climbing skips physics
  }

  // ducking (only on ground, not while carrying-jacking)
  const wasDucking = p.ducking;
  p.ducking = p.onGround && keys.down && !p.climbing;
  if (p.ducking && !wasDucking) SFX.duck();

  // jackhammer interaction — hold DOWN standing on a filled, unriveted hole (or socket with plate gone)
  p.jacking = 0;
  if (p.onGround && keys.down) {
    // L1 holes
    const h = holeIdx[rFeet + ',' + cMid];
    if (h && h.filled && !h.riveted) {
      p.jacking = 1; p.ducking = false; p.jackTarget = h;
      h.jackP += dt / 1.4;
      if ((p.stepTimer -= dt) <= 0) { SFX.jack(); p.stepTimer = 0.07; shake(1.5, 0.05); }
      spawnP(p.x + P_W/2 + p.facing*8, p.y + P_H - 4, 1, {color:['#ffd24a','#fff','#ff9a3c'], sMax:130, up:60, lMax:0.4, glow:true, shape:'spark'});
      if (h.jackP >= 1) {
        h.riveted = true; collectedCount++;
        SFX.rivet(); vibrate(40);
        addScore(500, p.x, p.y - 20, '🔩');
        bumpCombo();
        shake(4, 0.2);
        spawnP(p.x + P_W/2, p.y + P_H, 20, {color:['#ffd24a','#fff'], sMax:220, up:120, glow:true, shape:'spark'});
        checkLevelDone();
      }
    }
    // L4 sockets
    for (const e of entities) {
      if (e.type === 'socket' && e.filled && !e.riveted && Math.abs((e.x + TILE) - (p.x + P_W/2)) < TILE && Math.abs(e.y - (p.y + P_H)) < 8) {
        p.jacking = 1; p.ducking = false;
        e.jackP += dt / 1.4;
        if ((p.stepTimer -= dt) <= 0) { SFX.jack(); p.stepTimer = 0.07; shake(1.5, 0.05); }
        spawnP(p.x + P_W/2 + p.facing*8, p.y + P_H - 4, 1, {color:['#ffd24a','#fff','#ff9a3c'], sMax:130, up:60, lMax:0.4, glow:true, shape:'spark'});
        if (e.jackP >= 1) {
          e.riveted = true; collectedCount++;
          SFX.rivet(); vibrate(40);
          addScore(500, p.x, p.y - 20, '🔩');
          bumpCombo();
          shake(4, 0.2);
          checkLevelDone();
        }
      }
    }
  }

  // horizontal movement (accel-based for feel)
  let target = 0;
  if (!p.jacking) {
    if (keys.left) { target = -WALK * speedMult; p.facing = -1; p.idleTime = 0; }
    if (keys.right) { target = WALK * speedMult; p.facing = 1; p.idleTime = 0; }
    if (p.ducking) target *= 0.35;
  }
  const accel = p.onGround ? 2400 : 1400;
  if (p.vx < target) p.vx = Math.min(target, p.vx + accel*dt);
  else if (p.vx > target) p.vx = Math.max(target, p.vx - accel*dt);

  // conveyor push
  const feetT = tileAt(cMid, rFeet);
  let convPush = 0;
  if (p.onGround) {
    if (feetT === T_CONV_L) convPush = -64;
    if (feetT === T_CONV_R) convPush = 64;
  }

  // jump
  if (p.jumpBuf > 0 && (p.onGround || p.coyote > 0)) {
    p.jumpBuf = 0; p.coyote = 0;
    if (feetT === T_SPRING && p.onGround) {
      p.vy = JUMP_V * 1.62;
      SFX.spring();
      spawnP(p.x+P_W/2, p.y+P_H, 10, {color:['#e8e2d4','#d8453a'], sMax:160, up:100});
      shake(2, 0.1);
    } else {
      p.vy = JUMP_V;
      SFX.jump();
    }
    p.onGround = false; p.onPlatform = null;
    p.squashX = 0.72; p.squashY = 1.3;
    spawnP(p.x+P_W/2, p.y+P_H, 5, {color:'#9aa3b8', sMax:60, up:20, lMax:0.35});
  }
  // variable jump height
  if (!keys.jump && p.vy < -220) p.vy = -220;

  // gravity
  p.vy += GRAV * dt;
  if (p.vy > MAX_FALL) p.vy = MAX_FALL;

  // integrate X
  p.x += (p.vx + convPush) * dt;
  const pH = p.ducking ? P_DUCK_H : P_H;
  const pTop = p.y + (P_H - pH);
  {
    const cL = Math.floor(p.x / TILE), cR = Math.floor((p.x + P_W - 1) / TILE);
    const r0 = Math.floor(pTop / TILE), r1 = Math.floor((p.y + P_H - 2) / TILE);
    for (let r = r0; r <= r1; r++) {
      if (p.vx + convPush < 0 && isSolid(cL, r)) { p.x = (cL+1)*TILE; p.vx = 0; }
      if (p.vx + convPush > 0 && isSolid(cR, r)) { p.x = cR*TILE - P_W; p.vx = 0; }
    }
  }
  p.x = clamp(p.x, 0, worldW - P_W);

  // integrate Y
  const wasGround = p.onGround;
  p.y += p.vy * dt;
  p.onGround = false;
  {
    const cL = Math.floor((p.x+3) / TILE), cR = Math.floor((p.x + P_W - 4) / TILE);
    if (p.vy >= 0) {
      const rB = Math.floor((p.y + P_H) / TILE);
      const prevB = Math.floor((p.y + P_H - p.vy*dt - 1) / TILE);
      // ladder tops (a ladder tile with no ladder above) act as one-way platforms
      const ladTop = c => tileAt(c, rB) === T_LADDER && tileAt(c, rB-1) !== T_LADDER;
      if ((isSolid(cL, rB) || isSolid(cR, rB) || ladTop(cL) || ladTop(cR)) && prevB < rB) {
        p.y = rB*TILE - P_H;
        if (!wasGround && p.vy > 240) {
          SFX.land();
          p.squashX = 1.28; p.squashY = 0.74;
          spawnP(p.x+P_W/2, p.y+P_H, 6, {color:'#8a8a96', sMax:70, up:30, lMax:0.35});
          if (p.vy > 600) shake(3, 0.12);
        }
        p.vy = 0; p.onGround = true; p.coyote = 0.09;
      }
    } else {
      const rT = Math.floor(pTop / TILE);
      if (isSolid(cL, rT) || isSolid(cR, rT)) {
        p.y = (rT+1)*TILE - (P_H - pH);
        p.vy = 0;
      }
    }
  }
  if (p.onGround) p.coyote = 0.09;
  // moving platforms (elevators / beams / hook)
  p.onPlatform = null;
  for (const e of entities) {
    if (e.type !== 'elevator' && e.type !== 'beam' && e.type !== 'hook') continue;
    const ex = e.type === 'hook' ? e.hx - e.w/2 : e.x;
    const ey = e.type === 'hook' ? e.hy : e.y;
    if (p.vy >= 0 && p.x + P_W > ex + 4 && p.x < ex + e.w - 4) {
      const feet = p.y + P_H;
      if (feet >= ey - 2 && feet <= ey + 16 + Math.max(0, p.vy*dt)) {
        p.y = ey - P_H;
        p.vy = 0; p.onGround = true; p.coyote = 0.12;
        p.onPlatform = e;
      }
    }
  }
  if (p.onPlatform) {
    p.x += (p.onPlatform.dx || 0);
    p.y += (p.onPlatform.dy || 0);
  }

  // squash & stretch recovery
  p.squashX = lerp(p.squashX, 1, Math.min(1, dt*12));
  p.squashY = lerp(p.squashY, 1, Math.min(1, dt*12));

  // walk anim + steps
  if (p.onGround && Math.abs(p.vx) > 30) {
    p.walkPhase += dt * (10 + Math.abs(p.vx)*0.02);
    if ((p.stepTimer -= dt) <= 0) { SFX.step(); p.stepTimer = 0.26; }
  }

  // fell off the world
  if (p.y > worldH + 80) killPlayer('fall');

  // pickups & item interactions
  for (const e of entities) {
    if (e.dead) continue;
    if ((e.type === 'girder' || e.type === 'lunchbox' || e.type === 'crate' || e.type === 'plate') && !e.collected) {
      if (overlap(p.x, pTop, P_W, pH, e.x, e.y, e.w, e.h)) {
        if (e.type === 'lunchbox') {
          e.collected = true; e.dead = true;
          collectedCount++;
          SFX.pickup(comboMult); vibrate(15);
          addScore(300, e.x, e.y, '🍱');
          bumpCombo();
          spawnP(e.x+e.w/2, e.y+e.h/2, 12, {color:['#ffe082','#ff8a65','#fff'], sMax:150, glow:true, shape:'circle'});
          checkLevelDone();
        } else if (!p.carrying) {
          e.collected = true; e.dead = true;
          p.carrying = e.type === 'girder' ? 'girder' : (e.type === 'crate' ? 'crate' : 'plate');
          p.carryId = e.id;
          SFX.pickup(1); vibrate(15);
          popup(e.x, e.y, e.type === 'girder' ? '🏗 GIRDER' : (e.type==='crate' ? '📦 CRATE' : '🔶 PLATE'), '#9fd8ff');
        }
      }
    }
    // deposit girder into hole
    if (e.type === 'processor' && p.carrying === 'crate') {
      if (overlap(p.x, pTop, P_W, pH, e.x - 10, e.y - 14, e.w + 20, e.h + 14)) {
        p.carrying = null;
        e.fed++; e.anim = 1;
        collectedCount++;
        SFX.process(); vibrate(25);
        addScore(400, e.x + e.w/2, e.y, '⚙️');
        bumpCombo();
        spawnP(e.x + e.w/2, e.y, 14, {color:['#ff9a3c','#ffe082'], sMax:140, up:140, glow:true});
        checkLevelDone();
      }
    }
  }
  // girder into hole (auto-place standing over an unfilled hole)
  if (p.carrying === 'girder') {
    const hb = holeIdx[(rFeet) + ',' + cMid];
    const hb2 = holeIdx[(rFeet+1) + ',' + cMid];
    const h = (hb && !hb.filled) ? hb : ((hb2 && !hb2.filled) ? hb2 : null);
    if (h) {
      h.filled = true;
      p.carrying = null;
      SFX.girder(); vibrate(30);
      addScore(300, cMid*TILE, h.r*TILE - 20, '🏗');
      bumpCombo();
      shake(3, 0.15);
      spawnP(h.c*TILE + TILE, h.r*TILE, 16, {color:['#9aa3b8','#fff','#ffd24a'], sMax:160, up:80});
      // snap player on top
      p.y = h.r*TILE - P_H; p.vy = 0; p.onGround = true;
    }
  }
  // plate into socket (L4)
  if (p.carrying === 'plate') {
    for (const e of entities) {
      if (e.type === 'socket' && !e.filled && Math.abs((e.x + TILE) - (p.x + P_W/2)) < TILE*0.8 && Math.abs(e.y - (p.y + P_H)) < 10) {
        e.filled = true;
        p.carrying = null;
        SFX.girder(); vibrate(30);
        addScore(300, e.x, e.y - 20, '🔶');
        bumpCombo();
        spawnP(e.x + TILE, e.y, 14, {color:['#ffb050','#fff'], sMax:150, up:80});
      }
    }
  }
}

function checkLevelDone() {
  if (level === 1) {
    if (holes.every(h => h.riveted)) beginLevelEnd('girders');
  } else if (level === 2) {
    if (collectedCount >= totalCollect) {
      const m = entities.find(e => e.type === 'magnet');
      if (m && !m.active) { m.active = true; SFX.magnet(); toast('📻 Magnet\'s hot! Ride the top conveyor, Mack!'); }
    }
  } else if (level === 3) {
    if (collectedCount >= totalCollect) beginLevelEnd('processed');
  } else {
    const sockets = entities.filter(e => e.type === 'socket');
    if (sockets.length && sockets.every(s => s.riveted)) beginLevelEnd('flag');
  }
}
function beginLevelEnd(kind) {
  if (levelDone) return;
  levelDone = true;
  endSequence = {kind, t: 0};
  comboTimer = 0;
  SFX.levelDone();
}

// ============================================================
// ENTITY UPDATES
// ============================================================
function updateEntities(dt) {
  const p = player;
  const pH = p.ducking ? P_DUCK_H : P_H;
  const pTop = p.y + (P_H - pH);
  const frozen = freezeTimer > 0;

  for (let i = entities.length - 1; i >= 0; i--) {
    const e = entities[i];
    if (e.dead) { entities.splice(i, 1); continue; }
    switch (e.type) {

      case 'vandal': {
        if (!frozen && !levelDone) {
          let sp = e.vx;
          // menace: speed up when on same row as player heading toward them
          if (Math.abs((e.row*TILE) - (p.y + P_H)) < TILE && Math.sign(p.x - e.x) === e.facing) sp *= 1.3;
          e.x += sp * e.facing * dt;
          if (e.x < e.min) { e.x = e.min; e.facing = 1; }
          if (e.x > e.max) { e.x = e.max; e.facing = -1; }
          e.walkPhase += dt * 9;
        }
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x - 11, e.row*TILE - 46, 22, 46)) killPlayer('vandal');
        break;
      }

      case 'osha': {
        if (!frozen && !levelDone) {
          if (e.checking > 0) {
            e.checking -= dt;
          } else {
            e.x += e.vx * e.facing * dt;
            if (e.x < e.min) { e.x = e.min; e.facing = 1; }
            if (e.x > e.max) { e.x = e.max; e.facing = -1; }
            e.walkPhase += dt * 7;
            e.checkT -= dt;
            if (e.checkT <= 0) { e.checking = rand(0.8, 1.4); e.checkT = rand(3, 7); }
          }
        }
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x - 11, e.row*TILE - 50, 22, 50)) killPlayer('osha');
        break;
      }

      case 'boltSpawner': {
        if (frozen || levelDone) break;
        e.t -= dt;
        if (e.t <= 0) {
          e.t = e.iv * rand(0.7, 1.3);
          const bx = clamp(p.x + rand(-180, 180), TILE, worldW - TILE);
          entities.push({type:'bolt', x:bx, y:2.2*TILE, vy:0, spin:rand(0,TAU), w:14, h:14});
        }
        break;
      }
      case 'bolt': {
        e.vy += GRAV * 0.55 * dt;
        e.y += e.vy * dt;
        e.spin += dt * 9;
        const c = Math.floor((e.x+7) / TILE), r = Math.floor((e.y + e.h) / TILE);
        if (isSolid(c, r)) {
          e.dead = true;
          spawnP(e.x+7, r*TILE, 6, {color:['#ffd24a','#fff'], sMax:120, up:60, lMax:0.3, glow:true, shape:'spark'});
          if (Math.abs(e.x - p.x) < viewW*0.6) SFX.thud();
        }
        if (e.y > worldH) e.dead = true;
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x, e.y, e.w, e.h)) killPlayer('bolt');
        break;
      }

      case 'spigot': {
        if (frozen || levelDone) break;
        e.t -= dt;
        if (e.t <= 0) {
          e.t = e.iv * rand(0.8, 1.25);
          entities.push({type:'blob', x:e.x - 8, y:e.y + 12, vy:30, w:16, h:16, wob:rand(0,TAU)});
        }
        break;
      }
      case 'blob': {
        e.vy += GRAV * 0.4 * dt;
        e.y += e.vy * dt;
        e.wob += dt*8;
        const c = Math.floor((e.x+8) / TILE), r = Math.floor((e.y + e.h) / TILE);
        if (isSolid(c, r)) {
          e.dead = true;
          spawnP(e.x+8, r*TILE, 7, {color:['#b8b8c0','#8a8a96'], sMax:90, up:40, lMax:0.4});
        }
        if (e.y > worldH) e.dead = true;
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x+2, e.y+2, e.w-4, e.h-4)) killPlayer('blob');
        break;
      }

      case 'pincers': {
        if (!frozen && !levelDone) e.ph += dt;
        const cyc = e.ph % 2.2;
        e.closed = cyc > 1.4; // snap window
        if (e.closed && !e.wasClosed && Math.abs(e.x - p.x) < viewW*0.55) SFX.thud();
        e.wasClosed = e.closed;
        if (!p.dead && e.closed && overlap(p.x, pTop, P_W, pH, e.x + 4, e.y - e.h, e.w - 8, e.h)) killPlayer('pincers');
        break;
      }

      case 'dynamite': {
        if (!frozen && !levelDone) e.ph += dt;
        const cyc = e.ph % e.cyc;
        e.lit = cyc > e.cyc - 1.6 && cyc < e.cyc - 0.35;
        e.boom = cyc >= e.cyc - 0.35;
        if (e.boom && !e.wasBoom) {
          SFX.explode(); shake(7, 0.35);
          spawnP(e.x+15, e.y, 30, {color:['#ff9a3c','#ffe082','#ff5030','#888'], sMax:300, up:140, glow:true});
        }
        e.wasBoom = e.boom;
        if (e.lit && Math.random() < 0.4) spawnP(e.x + 15, e.y - 32, 1, {color:['#ffe082','#fff'], sMax:60, up:60, lMax:0.3, glow:true, shape:'spark'});
        if (!p.dead) {
          if (overlap(p.x, pTop, P_W, pH, e.x+3, e.y - e.h, e.w-6, e.h)) killPlayer('dynamite');
          if (e.boom) {
            const dx = (p.x + P_W/2) - (e.x + 15), dy = (p.y + P_H/2) - (e.y - 15);
            if (dx*dx + dy*dy < 95*95) killPlayer('explosion');
          }
        }
        break;
      }

      case 'poison': {
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x+4, e.y - e.h, e.w-8, e.h)) killPlayer('poison');
        break;
      }

      case 'squasher': {
        if (!frozen && !levelDone) {
          const reach = (e.row - 1) * TILE - e.gapTop - 38; // leaves ~38px gap
          e.ext += e.spd * e.dir * dt;
          if (e.ext > reach) { e.ext = reach; e.dir = -1; if (Math.abs(e.x - p.x) < viewW*0.6) { SFX.thud(); shake(2, 0.08); } }
          if (e.ext < 0) { e.ext = 0; e.dir = 1; }
        }
        const plateY = e.gapTop + 26 + e.ext;
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x, e.gapTop, e.w, 26 + e.ext + 10)) {
          if (pTop < plateY + 10) killPlayer('squasher');
        }
        break;
      }

      case 'elevator': case 'beam': {
        const oy = e.y;
        if (!levelDone || level !== 2) {
          e.y += e.spd * e.dir * dt;
          if (e.y < e.minY) { e.y = e.minY; e.dir = 1; }
          if (e.y > e.maxY) { e.y = e.maxY; e.dir = -1; }
        }
        e.dy = e.y - oy; e.dx = 0;
        break;
      }

      case 'hook': {
        const ox = e.hx || 0, oy = e.hy || 0;
        e.t += dt;
        e.ang = Math.sin(e.t * TAU / e.period) * e.maxA;
        e.hx = e.px + Math.sin(e.ang) * e.len;
        e.hy = e.py + Math.cos(e.ang) * e.len;
        e.dx = ox ? e.hx - ox : 0; e.dy = oy ? e.hy - oy : 0;
        if (Math.abs(e.ang) > e.maxA * 0.97 && !e.creaked) { e.creaked = true; if (Math.abs(e.hx - p.x) < viewW*0.7) SFX.crane(); }
        if (Math.abs(e.ang) < 0.1) e.creaked = false;
        break;
      }

      case 'ball': {
        if (!frozen && !levelDone) e.t += dt;
        e.ang = Math.sin(e.t * TAU / e.period) * e.maxA;
        e.bx = e.px + Math.sin(e.ang) * e.len;
        e.by = e.py + Math.cos(e.ang) * e.len;
        if (!p.dead) {
          const dx = (p.x + P_W/2) - e.bx, dy = (p.y + P_H/2) - e.by;
          if (dx*dx + dy*dy < (e.r + 12)*(e.r + 12)) killPlayer('ball');
        }
        break;
      }

      case 'magnet': {
        e.hum += dt;
        if (e.active && Math.random() < 0.3) {
          spawnP(e.x + rand(0, e.w), e.y + e.h + rand(0, 10), 1, {color:['#7dc4ff','#fff'], sMax:40, up:-30, lMax:0.25, grav:-100, glow:true, shape:'spark'});
        }
        if (e.active && !p.dead && !levelDone && p.magnetGrab === 0) {
          const px2 = p.x + P_W/2;
          if (px2 > e.x - 10 && px2 < e.x + e.w + 10 && p.y + P_H > e.y && p.y < e.y + TILE*4.4) {
            p.magnetGrab = 0.001;
            p.vx = 0; p.vy = 0;
            SFX.magnet(); vibrate(50);
          }
        }
        break;
      }

      case 'processor': {
        e.anim = Math.max(0, e.anim - dt);
        if (e.anim > 0 && Math.random() < 0.5) {
          spawnP(e.x + rand(10, e.w-10), e.y - 4, 1, {color:['#ff9a3c','#aaa'], sMax:50, up:90, lMax:0.6, grav:-60});
        }
        break;
      }

      case 'pool': {
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x, e.y + 8, e.w, e.h)) {
          spawnP(p.x + P_W/2, e.y + 10, 16, {color:['#5ab4e8','#9fd8ff','#fff'], sMax:180, up:160});
          killPlayer('drown');
        }
        break;
      }

      case 'powerup': {
        e.life -= dt;
        e.bob += dt * 3;
        if (e.life <= 0) { e.dead = true; break; }
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x, e.y, e.w, e.h)) grabPowerup(e);
        break;
      }

      case 'girder': case 'lunchbox': case 'crate': case 'plate': {
        if (!e.collected) e.bob += dt * 2.4;
        break;
      }
    }
  }
}

// ---------- end-of-level sequences ----------
function updateEndSequence(dt) {
  if (!endSequence) return;
  const s = endSequence;
  s.t += dt;
  if (s.kind === 'magnetGrab') {
    // player rises to magnet
    const m = entities.find(e => e.type === 'magnet');
    if (m) {
      player.y = lerp(player.y, m.y + m.h - 6, Math.min(1, dt * 3));
      player.x = lerp(player.x, m.x + m.w/2 - P_W/2, Math.min(1, dt * 4));
      spawnP(player.x + P_W/2 + rand(-14, 14), player.y + rand(0, P_H), 1, {color:['#7dc4ff','#fff'], sMax:30, lMax:0.2, grav:0, glow:true, shape:'spark'});
    }
    if (s.t > 1.5) finishLevel();
  } else if (s.kind === 'flag') {
    const f = entities.find(e => e.type === 'flag');
    if (f) {
      f.raise = Math.min(1, f.raise + dt * 0.55);
      if (Math.random() < 0.25) {
        spawnP(f.x + rand(-90, 90), f.y - TILE*2.6 + rand(-50, 10), 1, {color:['#ffd24a','#ff6a5a','#7dffa0','#7dc4ff'], sMax:130, up:80, lMax:0.9, glow:true, shape:'circle'});
      }
    }
    if (s.t > 2.4) finishLevel();
  } else {
    if (s.t > 1.1) finishLevel();
  }
}
function finishLevel() {
  endSequence = null;
  const timeBonus = Math.round(bonusTimer) * 10;
  const frac = bonusTimer / bonusTimerMax;
  const medal = frac >= 0.55 ? 'gold' : frac >= 0.32 ? 'silver' : 'bronze';
  try {
    const md = JSON.parse(localStorage.getItem(MEDAL_KEY) || '{}');
    const rank = {bronze:1, silver:2, gold:3};
    if (!md[level] || rank[medal] > rank[md[level]]) { md[level] = medal; localStorage.setItem(MEDAL_KEY, JSON.stringify(md)); }
  } catch(e) {}
  lastMedal = medal;
  lastTimeBonus = timeBonus;
  score += 1000 + timeBonus;
  tallyShown = 0;
  if (level === 4) {
    state = 'roundComplete';
    SFX.roundDone();
    score += 2000;
    toast('📻 ' + FOREMAN.level[randi(0, FOREMAN.level.length-1)]);
  } else {
    state = 'levelComplete';
  }
  stopMusic();
}
let lastMedal = 'bronze', lastTimeBonus = 0, tallyShown = 0;
function advanceLevel() {
  SFX.ui();
  if (state === 'roundComplete') {
    round++;
    level = 1;
  } else {
    level++;
  }
  startLevel();
}
function startLevel() {
  genLevel(level, true);
  uiButtons = [];
  state = 'levelIntro';
  levelIntroT = 0;
  startMusic('l' + level);
}
let levelIntroT = 0;

// ============================================================
// CAMERA
// ============================================================
function updateCamera(dt) {
  const tx = clamp(player.x + P_W/2 + player.facing * 56 - viewW/2, 0, Math.max(0, worldW - viewW));
  const ty = clamp(player.y + P_H/2 - viewH * 0.55, 0, Math.max(0, worldH - viewH));
  if (!camInit) { camX = tx; camY = ty; camInit = true; }
  camX = lerp(camX, tx, Math.min(1, dt * 5));
  camY = lerp(camY, ty, Math.min(1, dt * 6));
}

// ============================================================
// WORLD RENDER
// ============================================================
function drawTiles() {
  const c0 = Math.max(0, Math.floor(camX / TILE)), c1 = Math.min(levelW-1, Math.ceil((camX + viewW) / TILE));
  const r0 = Math.max(0, Math.floor(camY / TILE)), r1 = Math.min(levelH-1, Math.ceil((camY + viewH) / TILE));
  for (let r = r0; r <= r1; r++) {
    for (let c = c0; c <= c1; c++) {
      const t = levelMap[r][c];
      if (t === T_EMPTY) continue;
      const x = c*TILE - camX, y = r*TILE - camY;
      if (t === T_SOLID) {
        ctx.drawImage(ART.girder, x, y);
      } else if (t === T_LADDER) {
        ctx.drawImage(ART.ladder, x, y);
      } else if (t === T_CONV_L || t === T_CONV_R) {
        ctx.drawImage(ART.conveyor, x, y);
        // animated chevrons
        const dirMul = t === T_CONV_R ? 1 : -1;
        const off = ((gameTime * 60 * dirMul) % 16 + 16) % 16;
        ctx.strokeStyle = '#ffae00'; ctx.lineWidth = 2.5;
        ctx.save();
        ctx.beginPath(); ctx.rect(x, y+4, TILE, 11); ctx.clip();
        ctx.beginPath();
        for (let ox = -16; ox < TILE + 16; ox += 16) {
          const cx2 = x + ox + off;
          ctx.moveTo(cx2 - 4*dirMul, y + 6); ctx.lineTo(cx2 + 3*dirMul, y + 9.5); ctx.lineTo(cx2 - 4*dirMul, y + 13);
        }
        ctx.stroke();
        ctx.restore();
        // girder body under belt
        ctx.fillStyle = '#363d50'; ctx.fillRect(x, y+22, TILE, TILE-22);
        ctx.strokeStyle = 'rgba(20,24,38,0.5)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x+4, y+26); ctx.lineTo(x+TILE-4, y+TILE-4); ctx.stroke();
      } else if (t === T_SPRING) {
        ctx.drawImage(ART.girder, x, y);
        const sq = (player.onGround && Math.floor((player.x+P_W/2)/TILE)===c && Math.floor((player.y+P_H)/TILE)===r) ? 4 : 0;
        ctx.drawImage(ART.spring, x, y - 14 + sq);
      } else if (t === T_RAIL) {
        ctx.drawImage(ART.rail, x, y);
      } else if (t === T_HOLE) {
        const h = holeIdx[r + ',' + c];
        if (h && h.filled) {
          ctx.drawImage(ART.girder, x, y);
          if (!h.riveted) {
            // unriveted: glowing outline + progress
            ctx.strokeStyle = 'rgba(255,210,74,' + (0.5 + 0.3*Math.sin(gameTime*5)) + ')';
            ctx.lineWidth = 3;
            ctx.strokeRect(x+2, y+2, TILE-4, TILE-4);
            if (h.jackP > 0 && h.c === c) {
              ctx.fillStyle = 'rgba(0,0,0,0.55)';
              rr(ctx, x + 6, y - 16, TILE*2 - 12, 9, 4); ctx.fill();
              ctx.fillStyle = '#ffd24a';
              rr(ctx, x + 8, y - 14, (TILE*2 - 16) * Math.min(1, h.jackP), 5, 2); ctx.fill();
            }
          } else {
            ctx.fillStyle = '#ffd24a';
            for (const rx of [10, 24, 38]) { ctx.beginPath(); ctx.arc(x+rx, y+8, 2.6, 0, TAU); ctx.fill(); }
          }
        } else {
          // Open hole: keep the girder scenery intact, then cut a local shadow into it.
          ctx.drawImage(ART.girder, x, y);
          if (h && h.c === c) {
            ctx.save();
            const hw = TILE * 2;
            ctx.beginPath();
            ctx.ellipse(x + hw/2, y + TILE*0.44, hw*0.33, TILE*0.17, 0, 0, TAU);
            ctx.clip();
            const pit = ctx.createRadialGradient(x + hw/2, y + TILE*0.36, 1, x + hw/2, y + TILE*0.44, hw*0.34);
            pit.addColorStop(0, '#1c2030');
            pit.addColorStop(0.62, '#080a10');
            pit.addColorStop(1, '#000');
            ctx.fillStyle = pit;
            ctx.fillRect(x + 10, y + 6, hw - 20, TILE - 10);
            ctx.restore();

            ctx.save();
            ctx.translate(x + 7, y + 2);
            for (let i = 0; i < 13; i++) {
              ctx.fillStyle = i % 2 ? '#ffc116' : '#1c1c22';
              ctx.fillRect(i*7, 0, 7, 4);
            }
            ctx.restore();
          }
        }
      }
    }
  }
}

function drawEntities() {
  const p = player;
  for (const e of entities) {
    if (e.dead) continue;
    const x = e.x - camX, y = e.y - camY;
    switch (e.type) {
      case 'girder': {
        if (e.collected) break;
        const by = y + Math.sin(e.bob)*3;
        glow(x + 32, by + 9, 36, '#9fd8ff', 0.18);
        ctx.fillStyle = '#6b7488'; rr(ctx, x, by, 64, 14, 2); ctx.fill();
        ctx.fillStyle = '#9aa3b8'; ctx.fillRect(x, by, 64, 4);
        ctx.fillStyle = '#b8c0d4';
        for (const rx of [10, 32, 54]) { ctx.beginPath(); ctx.arc(x+rx, by+8, 2.2, 0, TAU); ctx.fill(); }
        break;
      }
      case 'lunchbox': {
        if (e.collected) break;
        const by = y + Math.sin(e.bob)*3;
        glow(x + 15, by + 10, 30, '#ffe082', 0.22);
        ctx.fillStyle = '#d84848'; rr(ctx, x, by + 5, 30, 17, 3); ctx.fill();
        ctx.fillStyle = '#b83838'; rr(ctx, x + 6, by, 18, 8, 3); ctx.fill();
        ctx.fillStyle = '#e8e2d4'; ctx.fillRect(x + 12, by + 9, 6, 4);
        ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fillRect(x + 3, by + 7, 24, 2);
        break;
      }
      case 'crate': {
        if (e.collected) break;
        const by = y + Math.sin(e.bob)*2.5;
        glow(x + 15, by + 13, 28, '#ffb050', 0.16);
        ctx.fillStyle = '#b07a3c'; rr(ctx, x, by, 30, 26, 3); ctx.fill();
        ctx.strokeStyle = '#7c5424'; ctx.lineWidth = 2.5;
        ctx.strokeRect(x + 4, by + 4, 22, 18);
        ctx.beginPath(); ctx.moveTo(x + 4, by + 4); ctx.lineTo(x + 26, by + 22); ctx.stroke();
        break;
      }
      case 'plate': {
        if (e.collected) break;
        const by = y + Math.sin(e.bob)*3;
        glow(x + 24, by + 7, 32, '#ffb050', 0.2);
        ctx.fillStyle = '#c8762a'; rr(ctx, x, by, 48, 14, 2); ctx.fill();
        ctx.fillStyle = '#ffb050'; ctx.fillRect(x, by, 48, 3.5);
        ctx.fillStyle = '#8a4c14';
        for (const rx of [8, 24, 40]) { ctx.beginPath(); ctx.arc(x+rx, by+8.5, 2.2, 0, TAU); ctx.fill(); }
        break;
      }
      case 'socket': {
        const sx = e.c*TILE - camX, sy = e.r*TILE - camY;
        if (!e.filled) {
          ctx.strokeStyle = 'rgba(255,176,80,' + (0.45 + 0.3*Math.sin(gameTime*4)) + ')';
          ctx.lineWidth = 2.5;
          ctx.setLineDash([7, 5]);
          ctx.strokeRect(sx + 4, sy - 12, TILE*2 - 8, 12);
          ctx.setLineDash([]);
          glow(sx + TILE, sy - 6, 26, '#ffb050', 0.14);
        } else {
          ctx.fillStyle = '#c8762a'; rr(ctx, sx + 2, sy - 13, TILE*2 - 4, 13, 2); ctx.fill();
          ctx.fillStyle = '#ffb050'; ctx.fillRect(sx + 2, sy - 13, TILE*2 - 4, 3);
          if (!e.riveted) {
            ctx.strokeStyle = 'rgba(255,210,74,' + (0.5 + 0.3*Math.sin(gameTime*5)) + ')';
            ctx.lineWidth = 3;
            ctx.strokeRect(sx + 2, sy - 13, TILE*2 - 4, 13);
            if (e.jackP > 0) {
              ctx.fillStyle = 'rgba(0,0,0,0.55)';
              rr(ctx, sx + 6, sy - 28, TILE*2 - 12, 9, 4); ctx.fill();
              ctx.fillStyle = '#ffd24a';
              rr(ctx, sx + 8, sy - 26, (TILE*2 - 16) * Math.min(1, e.jackP), 5, 2); ctx.fill();
            }
          } else {
            ctx.fillStyle = '#ffd24a';
            for (const rx of [12, 48, 84]) { ctx.beginPath(); ctx.arc(sx+rx, sy-7, 2.6, 0, TAU); ctx.fill(); }
          }
        }
        break;
      }
      case 'vandal': drawVandal(e.x - camX, e.row*TILE - camY, e); break;
      case 'osha': { const o = {...e, checking: e.checking > 0}; drawOsha(e.x - camX, e.row*TILE - camY, o); break; }
      case 'bolt': {
        ctx.save();
        ctx.translate(x + 7, y + 7);
        ctx.rotate(e.spin);
        ctx.fillStyle = '#c8ccd8';
        ctx.beginPath();
        for (let i = 0; i < 6; i++) { const a = i*TAU/6; ctx.lineTo(Math.cos(a)*7, Math.sin(a)*7); }
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#7a7f8e';
        ctx.beginPath(); ctx.arc(0, 0, 3, 0, TAU); ctx.fill();
        ctx.restore();
        break;
      }
      case 'blob': {
        ctx.fillStyle = '#a8a8b2';
        ctx.beginPath();
        ctx.ellipse(x + 8, y + 8, 7 + Math.sin(e.wob), 9 - Math.sin(e.wob), 0, 0, TAU);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath(); ctx.arc(x + 5, y + 5, 2.5, 0, TAU); ctx.fill();
        break;
      }
      case 'spigot': {
        ctx.fillStyle = '#3c4254'; ctx.fillRect(x - 6, y - 610, 12, 600); // feed pipe up
        ctx.fillStyle = '#4a5268'; rr(ctx, x - 20, y - 10, 40, 18, 4); ctx.fill();
        ctx.fillStyle = '#363d50'; ctx.fillRect(x - 7, y + 6, 14, 10);
        ctx.fillStyle = '#9aa3b8'; ctx.fillRect(x - 20, y - 10, 40, 4);
        break;
      }
      case 'pincers': {
        const cyc = e.ph % 2.2;
        let open = 16;
        if (cyc > 1.2 && cyc < 1.4) open = 16 - (cyc - 1.2)/0.2 * 14;
        else if (e.closed) open = 2;
        ctx.fillStyle = '#7a4458';
        ctx.save();
        ctx.translate(x + e.w/2, y);
        for (const s of [-1, 1]) {
          ctx.beginPath();
          ctx.moveTo(s * (4 + open), -34);
          ctx.quadraticCurveTo(s * (16 + open), -20, s * (3 + open*0.4), -2);
          ctx.lineTo(s * (10 + open*0.4), -2);
          ctx.quadraticCurveTo(s * (26 + open), -22, s * (12 + open), -34);
          ctx.closePath(); ctx.fill();
        }
        ctx.fillStyle = '#5a3040';
        rr(ctx, -10, -42, 20, 10, 3); ctx.fill();
        if (e.closed) glow(0, -16, 22, '#ff5040', 0.25);
        ctx.restore();
        break;
      }
      case 'dynamite': {
        ctx.save();
        ctx.translate(x + 15, y);
        ctx.fillStyle = '#c83030';
        for (const ddx of [-9, 0, 9]) rr(ctx, ddx - 4, -28, 9, 28, 3), ctx.fill();
        ctx.fillStyle = '#7a1818'; ctx.fillRect(-13, -20, 27, 5);
        ctx.strokeStyle = '#d8c8a8'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, -28); ctx.quadraticCurveTo(4, -36, 9, -34); ctx.stroke();
        if (e.lit) {
          glow(9, -34, 14, '#ffe082', 0.7);
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(9, -34, 3 + Math.sin(gameTime*20)*1.5, 0, TAU); ctx.fill();
        }
        if (e.boom) {
          const bt = (e.ph % e.cyc) - (e.cyc - 0.35);
          const br = 30 + bt/0.35 * 70;
          glow(0, -14, br*1.6, '#ff9a3c', 0.8 * (1 - bt/0.35));
          ctx.fillStyle = 'rgba(255,230,150,' + (0.85 * (1 - bt/0.35)) + ')';
          ctx.beginPath(); ctx.arc(0, -14, br, 0, TAU); ctx.fill();
        }
        ctx.restore();
        break;
      }
      case 'poison': {
        ctx.fillStyle = '#3c7a3c'; rr(ctx, x, y - 30, 34, 30, 3); ctx.fill();
        ctx.fillStyle = '#2c5a2c'; ctx.fillRect(x, y - 30, 34, 6);
        ctx.fillStyle = '#aaffaa';
        ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('☠', x + 17, y - 8);
        glow(x + 17, y - 15, 24, '#50ff50', 0.12 + 0.06*Math.sin(gameTime*4));
        break;
      }
      case 'squasher': {
        const sx = e.x - camX, topY = e.gapTop - camY;
        // housing
        ctx.fillStyle = '#363d50'; rr(ctx, sx - 4, topY, e.w + 8, 26, 3); ctx.fill();
        ctx.fillStyle = '#9aa3b8'; ctx.fillRect(sx - 4, topY, e.w + 8, 5);
        // piston
        ctx.fillStyle = '#7a7f8e'; ctx.fillRect(sx + e.w/2 - 7, topY + 26, 14, e.ext);
        // plate
        const py2 = topY + 26 + e.ext;
        ctx.fillStyle = '#4a5268'; rr(ctx, sx, py2, e.w, 14, 2); ctx.fill();
        ctx.save();
        ctx.beginPath(); ctx.rect(sx, py2 + 14 - 6, e.w, 6); ctx.clip();
        for (let i = 0; i < 12; i++) {
          ctx.fillStyle = i % 2 ? '#ffc116' : '#1c1c22';
          ctx.fillRect(sx + i * (e.w/10), py2 + 8, e.w/10 + 1, 6);
        }
        ctx.restore();
        break;
      }
      case 'elevator': case 'beam': {
        // cable
        ctx.strokeStyle = 'rgba(150,160,185,0.5)'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(x + e.w*0.25, y); ctx.lineTo(x + e.w*0.25, y - 600); ctx.moveTo(x + e.w*0.75, y); ctx.lineTo(x + e.w*0.75, y - 600); ctx.stroke();
        ctx.fillStyle = '#4a5268'; rr(ctx, x, y, e.w, e.h, 3); ctx.fill();
        ctx.fillStyle = '#9aa3b8'; ctx.fillRect(x, y, e.w, 4);
        for (let i = 0; i < Math.floor(e.w/13); i++) {
          ctx.fillStyle = i % 2 ? '#ffc116' : '#1c1c22';
          ctx.fillRect(x + i*13, y + e.h - 5, 13, 5);
        }
        break;
      }
      case 'hook': {
        const hx = e.hx - camX, hy = e.hy - camY;
        const pivx = e.px - camX, pivy = e.py - camY;
        ctx.strokeStyle = 'rgba(60,64,80,0.9)'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(pivx, pivy); ctx.lineTo(hx, hy - 26); ctx.stroke();
        // hook body
        ctx.fillStyle = '#d8a020';
        ctx.beginPath(); ctx.arc(hx, hy - 22, 9, 0, TAU); ctx.fill();
        ctx.fillStyle = '#4a5268'; rr(ctx, hx - e.w/2, hy, e.w, e.h, 3); ctx.fill();
        ctx.fillStyle = '#9aa3b8'; ctx.fillRect(hx - e.w/2, hy, e.w, 3.5);
        ctx.strokeStyle = '#d8a020'; ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.moveTo(hx - e.w/2 + 6, hy); ctx.lineTo(hx, hy - 18); ctx.lineTo(hx + e.w/2 - 6, hy); ctx.stroke();
        glow(hx, hy + 4, 30, '#ffd24a', 0.1);
        break;
      }
      case 'ball': {
        const bx = e.bx - camX, by = e.by - camY;
        const pivx = e.px - camX, pivy = e.py - camY;
        ctx.strokeStyle = 'rgba(40,44,58,0.95)'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(pivx, pivy); ctx.lineTo(bx, by); ctx.stroke();
        const g2 = ctx.createRadialGradient(bx - 10, by - 12, 4, bx, by, e.r);
        g2.addColorStop(0, '#5a6072'); g2.addColorStop(1, '#23262f');
        ctx.fillStyle = g2;
        ctx.beginPath(); ctx.arc(bx, by, e.r, 0, TAU); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(bx, by, e.r - 6, 0.2, 1.4); ctx.stroke();
        break;
      }
      case 'magnet': {
        ctx.strokeStyle = 'rgba(150,160,185,0.5)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x + e.w/2, y); ctx.lineTo(x + e.w/2, y - 400); ctx.stroke();
        ctx.fillStyle = e.active ? '#c84040' : '#5a4448';
        rr(ctx, x, y, e.w, e.h, 6); ctx.fill();
        ctx.fillStyle = e.active ? '#e86060' : '#6a5458';
        ctx.fillRect(x, y, e.w, 8);
        ctx.fillStyle = '#d8d8e0';
        ctx.fillRect(x + 6, y + e.h - 8, 14, 8); ctx.fillRect(x + e.w - 20, y + e.h - 8, 14, 8);
        if (e.active) {
          glow(x + e.w/2, y + e.h + 8, 50, '#7dc4ff', 0.3 + 0.15*Math.sin(e.hum*8));
          ctx.strokeStyle = 'rgba(125,196,255,' + (0.4 + 0.3*Math.sin(e.hum*8)) + ')';
          ctx.lineWidth = 2;
          for (let i = 1; i <= 2; i++) {
            ctx.beginPath(); ctx.arc(x + e.w/2, y + e.h, 12*i + (e.hum*30)%12, 0.25, Math.PI - 0.25); ctx.stroke();
          }
        }
        break;
      }
      case 'processor': {
        ctx.fillStyle = '#4a4454'; rr(ctx, x, y, e.w, e.h, 5); ctx.fill();
        ctx.fillStyle = '#5a5468'; ctx.fillRect(x, y, e.w, 8);
        // hopper mouth
        ctx.fillStyle = '#23202a';
        ctx.beginPath();
        ctx.moveTo(x + 8, y); ctx.lineTo(x + e.w - 8, y); ctx.lineTo(x + e.w - 20, y + 18); ctx.lineTo(x + 20, y + 18);
        ctx.closePath(); ctx.fill();
        // gauge
        ctx.fillStyle = '#181520'; rr(ctx, x + 12, y + 26, e.w - 24, 14, 3); ctx.fill();
        for (let i = 0; i < totalCollect; i++) {
          ctx.fillStyle = i < e.fed ? '#7dffa0' : '#3a3544';
          ctx.fillRect(x + 16 + i * ((e.w - 32)/totalCollect), y + 29, (e.w - 32)/totalCollect - 3, 8);
        }
        if (e.anim > 0) {
          glow(x + e.w/2, y + 4, 40, '#ff9a3c', e.anim * 0.5);
          shake(1, 0.03);
        }
        ctx.fillStyle = '#888'; ctx.fillRect(x + e.w - 16, y - 14, 9, 14);
        if (Math.random() < 0.06) spawnP(x + camX + e.w - 11, y + camY - 14, 1, {color:'#aaa', sMax:16, up:40, lMax:1.2, grav:-30});
        break;
      }
      case 'pool': {
        ctx.fillStyle = 'rgba(40,90,140,0.85)';
        ctx.fillRect(x, y + 8, e.w, e.h);
        ctx.fillStyle = 'rgba(90,180,232,0.9)';
        ctx.beginPath();
        ctx.moveTo(x, y + 10);
        for (let wx = 0; wx <= e.w; wx += 10) ctx.lineTo(x + wx, y + 8 + Math.sin(gameTime*3 + wx*0.1)*2.5);
        ctx.lineTo(x + e.w, y + 14); ctx.lineTo(x, y + 14);
        ctx.fill();
        glow(x + e.w/2, y + 16, 40, '#5ab4e8', 0.1);
        break;
      }
      case 'flag': {
        const fx = e.x - camX, fy = e.y - camY;
        ctx.fillStyle = '#9aa3b8'; ctx.fillRect(fx - 2, fy - TILE*3, 4, TILE*3);
        ctx.beginPath(); ctx.arc(fx, fy - TILE*3, 4, 0, TAU); ctx.fill();
        if (e.raise > 0) {
          const flagY = fy - TILE*3 + 6 + (1 - e.raise) * (TILE*2.4);
          ctx.fillStyle = '#ffc116';
          ctx.beginPath();
          ctx.moveTo(fx + 2, flagY);
          for (let i = 0; i <= 36; i += 6) ctx.lineTo(fx + 2 + i, flagY + Math.sin(gameTime*6 + i*0.18)*3);
          for (let i = 36; i >= 0; i -= 6) ctx.lineTo(fx + 2 + i, flagY + 22 + Math.sin(gameTime*6 + i*0.18)*3);
          ctx.closePath(); ctx.fill();
        }
        break;
      }
      case 'powerup': {
        const by = y + Math.sin(e.bob)*4;
        const blink = e.life < 2.5 && Math.floor(e.life*6)%2===0;
        if (blink) break;
        const colors = {coffee:'#8a5a30', goldhat:'#ffd24a', watch:'#7dc4ff', cash:'#7dffa0'};
        glow(x + 15, by + 15, 30, colors[e.kind], 0.3 + 0.1*Math.sin(gameTime*5));
        ctx.fillStyle = 'rgba(20,26,46,0.8)';
        ctx.beginPath(); ctx.arc(x + 15, by + 15, 16, 0, TAU); ctx.fill();
        ctx.strokeStyle = colors[e.kind]; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(x + 15, by + 15, 16, 0, TAU); ctx.stroke();
        ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText({coffee:'☕', goldhat:'⛑️', watch:'⏱️', cash:'💰'}[e.kind], x + 15, by + 16);
        ctx.textBaseline = 'alphabetic';
        break;
      }
    }
  }
}

function drawWorldLighting() {
  // work lamps
  for (const l of bg.lamps) {
    const lx = l.x - camX, ly = l.y - camY;
    if (lx < -200 || lx > viewW + 200) continue;
    const fl = 0.85 + 0.15 * Math.sin(gameTime * 11 + l.flicker);
    // lamp fixture
    ctx.fillStyle = '#23262f';
    ctx.fillRect(lx - 6, ly - 12, 12, 8);
    ctx.fillStyle = '#ffe9b0';
    ctx.beginPath(); ctx.arc(lx, ly - 2, 4, 0, TAU); ctx.fill();
    glow(lx, ly, 70, '#ffc868', 0.22 * fl);
    // light cone
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const cg = ctx.createLinearGradient(0, ly, 0, ly + 200);
    cg.addColorStop(0, 'rgba(255,200,104,' + (0.10*fl) + ')');
    cg.addColorStop(1, 'rgba(255,200,104,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.moveTo(lx - 5, ly); ctx.lineTo(lx + 5, ly);
    ctx.lineTo(lx + 62, ly + 200); ctx.lineTo(lx - 62, ly + 200);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // player headlamp-ish presence glow (subtle)
  if (!player.dead) glow(player.x + P_W/2 - camX, player.y + 14 - camY, 64, '#ffe9c4', 0.07);
}

function drawParticlesAndPopups() {
  for (const p of particles) {
    const a = clamp(p.life / p.maxLife, 0, 1);
    const x = p.x - camX, y = p.y - camY;
    ctx.globalAlpha = a;
    if (p.glow) { ctx.globalCompositeOperation = 'lighter'; }
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath(); ctx.arc(x, y, p.size * a + 0.5, 0, TAU); ctx.fill();
    } else if (p.shape === 'spark') {
      ctx.fillRect(x - p.size/2, y - p.size*1.5, p.size*0.7, p.size*3);
    } else {
      ctx.fillRect(x - p.size/2, y - p.size/2, p.size, p.size);
    }
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.globalAlpha = 1;
  for (const pp of popups) {
    const a = clamp(pp.life, 0, 1);
    ctx.globalAlpha = a;
    ctx.font = 'bold 15px "Arial Black", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText(pp.text, pp.x - camX + 1.5, pp.y - camY + 1.5);
    ctx.fillStyle = pp.color;
    ctx.fillText(pp.text, pp.x - camX, pp.y - camY);
  }
  ctx.globalAlpha = 1;
}

function drawHints() {
  if (!firstRun) return;
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  for (const h of hints) {
    if (!h.cond()) continue;
    h.shown += 1/60;
    if (h.shown > 7) continue;
    const x = h.x - camX, y = h.y - camY + Math.sin(gameTime*2.5)*3;
    const w = ctx.measureText(h.text).width + 22;
    ctx.fillStyle = 'rgba(12,16,32,0.82)';
    rr(ctx, x - w/2, y - 15, w, 24, 12); ctx.fill();
    ctx.strokeStyle = 'rgba(255,210,74,0.5)'; ctx.lineWidth = 1.5;
    rr(ctx, x - w/2, y - 15, w, 24, 12); ctx.stroke();
    ctx.fillStyle = '#ffe9c4';
    ctx.fillText(h.text, x, y + 2);
  }
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  // top bar
  const g = ctx.createLinearGradient(0, 0, 0, 56);
  g.addColorStop(0, 'rgba(8,10,22,0.85)'); g.addColorStop(1, 'rgba(8,10,22,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, viewW, 56);
  // score
  dispScore = Math.abs(score - dispScore) < 2 ? score : lerp(dispScore, score, 0.18);
  ctx.font = 'bold 22px "Arial Black", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffe082';
  ctx.fillText(Math.round(dispScore).toLocaleString(), 14, 30);
  ctx.font = 'bold 10px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText(viewW < 520 ? 'ROUND ' + round : 'ROUND ' + round + ' · ' + LEVEL_NAMES[level-1], 14, 45);
  // combo
  if (comboMult > 1) {
    const cf = comboTimer / 5;
    ctx.font = 'bold 16px "Arial Black", sans-serif';
    ctx.fillStyle = '#ffb347';
    ctx.fillText('×' + comboMult + ' COMBO', 14, 64);
    ctx.fillStyle = 'rgba(255,179,71,0.3)';
    ctx.fillRect(14, 70, 80 * cf, 3);
  }
  // timer bar (center)
  const tw = Math.min(240, viewW * 0.34);
  const tx = viewW/2 - tw/2, frac = clamp(bonusTimer / bonusTimerMax, 0, 1);
  const low = frac < 0.25;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  rr(ctx, tx - 2, 12, tw + 4, 16, 8); ctx.fill();
  const tc = low ? (Math.floor(gameTime*4)%2 ? '#ff5040' : '#ff8060') : (frac < 0.5 ? '#ffc116' : '#7dffa0');
  ctx.fillStyle = tc;
  rr(ctx, tx, 14, Math.max(4, tw * frac), 12, 6); ctx.fill();
  ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#0a0c18';
  ctx.fillText('⏱ ' + Math.ceil(bonusTimer), viewW/2, 24);
  if (freezeTimer > 0) {
    ctx.fillStyle = '#7dc4ff';
    ctx.fillText('❄ FROZEN ' + Math.ceil(freezeTimer), viewW/2, 42);
  }
  // objective progress (under timer)
  ctx.font = 'bold 12px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';

      ctx.textAlign = 'left';

    }
  }
}

// ---------- high scores ----------
let hsRows = null, hsLoading = false, hsGlobal = false;
let hsEntry = {initials:['A','A','A'], pos:0, submitting:false};
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 '.split('');
function getLocalScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY) || '[]'); } catch(e) { return []; }
}
function saveLocalScore(name, sc, extra) {
  const rows = getLocalScores();
  rows.push({name, score: sc, extra});
  rows.sort((a,b) => b.score - a.score);
  rows.length = Math.min(rows.length, 10);
  try { localStorage.setItem(HS_KEY, JSON.stringify(rows)); } catch(e) {}
  return rows;
}
async function fetchScores() {
  hsLoading = true;
  try {
    const ctl = new AbortController();
    const tm = setTimeout(() => ctl.abort(), 8000);
    const r = await fetch(SCORES_API, {signal: ctl.signal});
    clearTimeout(tm);
    const data = await r.json();
    const rows = (Array.isArray(data) ? data : (data.scores || []))
      .map(r2 => ({name: r2.initials || r2.name || '???', score: r2.score|0, extra: r2.extra || ''}))
      .sort((a,b) => b.score - a.score);
    hsRows = rows.slice(0, 10);
    hsGlobal = true;
  } catch(e) {
    hsRows = getLocalScores();
    hsGlobal = false;
  }
  hsLoading = false;
}
async function submitScore(initials) {
  saveLocalScore(initials, score, 'R' + round);
  try { localStorage.setItem(NAME_KEY, initials); } catch(e) {}
  try {
    const ctl = new AbortController();
    const tm = setTimeout(() => ctl.abort(), 8000);
    await fetch(SCORES_API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({initials, score, extra: 'R' + round}),
      signal: ctl.signal,
    });
    clearTimeout(tm);
  } catch(e) {}
  hsRows = null;
  openScores();
}
function openScores() {
  state = 'hsView';
  hsRows = null;
  fetchScores();
}
function qualifies() {
  const rows = hsRows && hsGlobal ? hsRows : getLocalScores();
  if (score <= 0) return false;
  if (!rows || rows.length < 10) return true;
  return score > rows[rows.length-1].score;
}
function leaveGameOver() {
  SFX.ui();
  // pre-fetch then decide
  if (score > 0) {
    let saved = '';
    try { saved = localStorage.getItem(NAME_KEY) || ''; } catch(e) {}
    if (saved && saved.length === 3) hsEntry.initials = saved.split('');
    hsEntry.pos = 0;
    state = 'hsEntry';
  } else {
    goTitle();
  }
}
function hsKeydown(k, e) {
  if (/^[a-zA-Z0-9]$/.test(k)) {
    hsEntry.initials[hsEntry.pos] = k.toUpperCase();
    hsEntry.pos = Math.min(2, hsEntry.pos + 1);
    SFX.tick();
    return;
  }
  if (k === 'ArrowLeft') { hsEntry.pos = Math.max(0, hsEntry.pos - 1); SFX.tick(); }
  if (k === 'ArrowRight') { hsEntry.pos = Math.min(2, hsEntry.pos + 1); SFX.tick(); }
  if (k === 'ArrowUp' || k === 'ArrowDown') {
    const d = k === 'ArrowUp' ? -1 : 1;
    const cur = LETTERS.indexOf(hsEntry.initials[hsEntry.pos]);
    hsEntry.initials[hsEntry.pos] = LETTERS[(cur + d + LETTERS.length) % LETTERS.length];
    SFX.tick();
  }
  if (k === 'Backspace') { e.preventDefault(); hsEntry.pos = Math.max(0, hsEntry.pos - 1); }
  if (k === 'Enter') { SFX.ui(); submitScore(hsEntry.initials.join('')); }
  if (k === 'Escape') { SFX.ui(); goTitle(); }
}

    ctx.textAlign = 'right';
    ctx.fillText(r ? r.score.toLocaleString() : '·····', viewW*0.78, y + rh*0.6);
    ctx.font = '11px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    if (r && r.extra) ctx.fillText(r.extra, viewW*0.87, y + rh*0.6);
  }
  uiButtons = [];
  const bw = Math.min(260, viewW - 80);
  panelBtn('back', '◀  BACK', viewW/2 - bw/2, viewH - 80, bw, 50);
}
function drawHowto(dt) {
  gameTime += dt;
  ctx.fillStyle = '#0b0e1a';
  ctx.fillRect(0, 0, viewW, H);
  drawBackdrop();
  ctx.fillStyle = 'rgba(8,10,22,0.85)';
  ctx.fillRect(0, 0, viewW, H);
  ctx.fillStyle = '#ffc116';
  ctx.font = 'bold 26px "Arial Black", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('❓ SITE ORIENTATION', viewW/2, 54);
  const lines = [
    ['👷', 'You\'re Mack. Finish each job before the shift clock dies.'],
    ['🏗', 'L1 — Carry girders to gaps, then HOLD ▼ to jackhammer.'],
    ['🍱', 'L2 — Grab 5 lunchboxes, duck (▼) the squasher, ride the magnet.'],
    ['📦', 'L3 — Feed 5 crates to the processor. Avoid the pool!'],
    ['🔶', 'L4 — Bolt plates into sockets. Ride the crane hook over the gap.'],
    ['😈', 'The Vandal and the OSHA inspector end your shift on touch.'],
    ['⚡', 'Bolts, pincers, dynamite, poison, squasher, wrecking ball: dodge!'],
    ['☕', 'Power-ups: coffee = speed, gold hat = 1 free hit,'],
    ['', 'stopwatch = +time & freeze, cash = points.'],
    ['🔥', 'Chain pickups fast for a ×5 combo. Extra life at 10k.'],
    ['', ''],
    [IS_TOUCH ? '📱' : '⌨', IS_TOUCH ? 'D-pad walks & climbs · JUMP hops · ▼ ducks / jackhammers'
                          : 'WASD/arrows · SPACE jump · S/▼ duck & jackhammer · P pause'],
  ];
  ctx.textAlign = 'left';
  let y = 92;
  const lh = Math.min(28, (viewH - 180) / lines.length);
  for (const [ic, txt] of lines) {
    ctx.font = '15px sans-serif';
    ctx.fillText(ic, viewW*0.08, y);
    ctx.font = '13px sans-serif';
    ctx.fillStyle = '#dde4f5';
    ctx.fillText(txt, viewW*0.08 + 30, y, viewW*0.84 - 30);
    ctx.fillStyle = '#ffd9a0';
    y += lh;
  }
  uiButtons = [];
  const bw = Math.min(260, viewW - 80);
  panelBtn('back', '◀  GOT IT', viewW/2 - bw/2, viewH - 76, bw, 50);
}

// ---------- UI button dispatch ----------
function handleUIButton(id) {
  if (id === 'start') { startGame(); return; }
  if (id === 'scores') { SFX.ui(); openScores(); return; }
  if (id === 'howto') { SFX.ui(); state = 'howto'; return; }
  if (id === 'back') { SFX.ui(); goTitle(); return; }
  if (id === 'resume') { resumeGame(); return; }
  if (id === 'restartLevel') { SFX.ui(); genLevel(level, true); state = 'playing'; return; }
  if (id === 'quit') { SFX.ui(); goTitle(); return; }
  if (id === 'toggleSfx') { setMuted(!muted); return; }
  if (id === 'toggleMusic') { SFX.ui(); setMusicOn(!musicOn); return; }
  if (id === 'advance') { advanceLevel(); return; }
  if (id === 'continue') { leaveGameOver(); return; }
  if (id === 'hsSubmit') { SFX.ui(); submitScore(hsEntry.initials.join('')); return; }
  if (id === 'hsSkip') { SFX.ui(); saveLocalScore(hsEntry.initials.join(''), score, 'R' + round); goTitle(); return; }
  for (let i = 0; i < 3; i++) {
    if (id === 'hsUp' + i || id === 'hsDn' + i) {
      hsEntry.pos = i;
      const d = id[2] === 'U' ? -1 : 1;
      const cur = LETTERS.indexOf(hsEntry.initials[i]);
      hsEntry.initials[i] = LETTERS[(cur + d + LETTERS.length) % LETTERS.length];
      SFX.tick();
      return;
    }
  }
}

// ============================================================
// GAME FLOW
// ============================================================
function goTitle() {
  state = 'title';
  level = 1; worldW = 2000; worldH = 960;
  buildBackdrop(1);
  stopMusic();
  startMusic('title');
}
function startGame() {
  SFX.ui();
  initAudio();
  score = 0; dispScore = 0; lives = 3; round = 1; level = 1;
  nextLifeAt = 10000;
  comboMult = 1; comboTimer = 0; shieldOn = false;
  startLevel();
  try { localStorage.setItem(SEEN_KEY, '1'); } catch(e) {}
}
function pauseGame(silent) {
  state = 'paused';
  if (!silent) SFX.ui();
}
function resumeGame() {
  uiButtons = [];
  state = 'playing';
  SFX.ui();
}
function gameOverNow() {
  state = 'gameOver';
  gameOverT = 0;
  stopMusic();
  SFX.gameOver();
  fetchScores(); // warm cache for qualify check
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastT = 0;
function frame(t) {
  requestAnimationFrame(frame);
  tick(t);
}
function tick(t) {
  let dt = Math.min(0.033, Math.max(0, (t - lastT) / 1000) || 0.016);
  lastT = t;
  mergeKeys();
  pollGamepad();
  controlsDiv.style.display = (IS_TOUCH && (state === 'playing' || state === 'levelIntro')) ? 'block' : 'none';
  ctx.clearRect(0, 0, W, H);
  // letterbox fill
  ctx.fillStyle = '#0b0e1a';
  ctx.fillRect(0, 0, W, H);

  if (state === 'title') {
    if (music.track !== 'title') startMusic('title');
    drawTitle(dt);
    updateParticles(dt);
  } else if (state === 'levelIntro') {
    gameTime += dt;
    updateCamera(dt);
    drawLevelIntro(dt);
  } else if (state === 'playing') {
    if (hitStop > 0) { hitStop -= dt; dt = 0.001; }
    gameTime += dt;
    comboTimer -= dt;
    if (comboTimer <= 0 && comboMult > 1) { comboMult = 1; }
    freezeTimer = Math.max(0, freezeTimer - dt);
    speedTimer = Math.max(0, speedTimer - dt);
    // shift clock
    if (!levelDone && !player.dead) {
      bonusTimer -= dt;
      music.danger = bonusTimer / bonusTimerMax < 0.25;
      if (bonusTimer < 12 && bonusTimer > 0) {
        warnBeep -= dt;
        if (warnBeep <= 0) { SFX.warn(); warnBeep = bonusTimer < 5 ? 0.4 : 0.8; }
        if (Math.abs(bonusTimer - 11) < dt) toast('📻 ' + FOREMAN.hurry[randi(0, FOREMAN.hurry.length-1)]);
      }
      if (bonusTimer <= 0) { bonusTimer = 0; killPlayer('timer'); }
    } else { music.danger = false; }
    // power-up spawner
    if (!levelDone && !player.dead) {
      powerSpawnTimer -= dt;
      if (powerSpawnTimer <= 0) {
        powerSpawnTimer = rand(16, 26);
        if (!entities.some(e => e.type === 'powerup')) spawnPowerup();
      }
    }
    // magnet grab sequence trigger
    if (player.magnetGrab > 0 && !endSequence) { endSequence = {kind:'magnetGrab', t:0}; levelDone = true; SFX.levelDone(); }
    updatePlayer(dt);
    updateEntities(dt);
    updateEndSequence(dt);
    updateParticles(dt);
    updateCamera(dt);
    drawPlayfield(dt);
  } else if (state === 'paused') {
    drawPause();
  } else if (state === 'levelComplete' || state === 'roundComplete') {
    drawLevelComplete(dt);
  } else if (state === 'gameOver') {
    gameTime += dt;
    updateParticles(dt);
    drawGameOver(dt);
  } else if (state === 'hsEntry') {
    gameTime += dt;
    drawHsEntry();
  } else if (state === 'hsView') {
    drawHsView(dt);
  } else if (state === 'howto') {
    drawHowto(dt);
  }
}
requestAnimationFrame(frame);

// boot: title backdrop needs world dims
worldW = 2000; worldH = 960; level = 1;
buildBackdrop(1);

// ---------- debug hooks (headless testing) ----------
window.__g = {
  get state() { return state; },
  set state(s) { state = s; },
  get score() { return score; },
  set score(v) { score = v; },
  get level() { return level; },
  get round() { return round; },
  get lives() { return lives; },
  set lives(v) { lives = v; },
  get player() { return player; },
  get entities() { return entities; },
  get holes() { return holes; },
  get bonusTimer() { return bonusTimer; },
  get collected() { return collectedCount; },
  keys, kKeys,
  start: startGame,
  skipToLevel(lv) { level = lv; startLevel(); state = 'playing'; },
  winLevel() { beginLevelEnd('debug'); },
  kill() { player.invuln = 0; killPlayer('debug'); },
  give(kind) { entities.push({type:'powerup', kind, x:player.x, y:player.y, w:30, h:30, life:9, bob:0}); },
  step(ms) { tick(lastT + (ms || 16.7)); }, // manual frame for headless testing
  snap(w) { // small JPEG of the canvas for headless visual checks
    const s = (w || 420) / canvas.width;
    const cv = makeCanvas(Math.round(canvas.width*s), Math.round(canvas.height*s));
    cv.getContext('2d').drawImage(canvas, 0, 0, cv.width, cv.height);
    return cv.toDataURL('image/jpeg', 0.55);
  },
};
</script>
