<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hard Hat Mac</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;position:fixed;overflow:hidden;overscroll-behavior:none;-webkit-overflow-scrolling:touch;background:#111;font-family:'Courier New',monospace;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;margin:0 auto;image-rendering:pixelated;touch-action:none;}
button{touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#controls{position:fixed;bottom:0;left:0;right:0;height:140px;display:none;z-index:10;pointer-events:none;}
.ctrl-btn{position:absolute;width:60px;height:60px;border-radius:14px;border:2px solid rgba(255,200,50,0.5);background:rgba(40,40,40,0.65);color:rgba(255,200,50,0.8);font-size:24px;font-weight:bold;display:flex;align-items:center;justify-content:center;pointer-events:auto;outline:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.ctrl-btn:active{background:rgba(255,200,50,0.3);}
#btn-left{left:10px;bottom:40px;}
#btn-right{left:80px;bottom:40px;}
#btn-up{left:45px;bottom:105px;}
#btn-down{left:45px;bottom:0px;}
#btn-jump{right:15px;bottom:40px;width:75px;height:75px;border-radius:50%;font-size:16px;border-color:rgba(100,200,255,0.6);color:rgba(100,200,255,0.9);}
#mute-btn{position:fixed;top:5px;right:5px;z-index:20;background:rgba(0,0,0,0.5);border:1px solid #666;color:#ffc832;font-size:20px;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;pointer-events:auto;touch-action:manipulation;}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<button id="mute-btn">🔊</button>
<div id="controls">
<button class="ctrl-btn" id="btn-left">◀</button>
<button class="ctrl-btn" id="btn-right">▶</button>
<button class="ctrl-btn" id="btn-up">▲</button>
<button class="ctrl-btn" id="btn-down">▼</button>
<button class="ctrl-btn" id="btn-jump">JUMP</button>
</div>
<script>
'use strict';
// ===== HARD HAT MAC =====
const C=document.getElementById('gc'), X=C.getContext('2d');
const controlsDiv=document.getElementById('controls');
const muteBtn=document.getElementById('mute-btn');

// Game constants
const TW=20, TH=20; // tile size in game pixels
const GW=400, GH=500; // game world size
let scale=1, offsetX=0, offsetY=0;

function resize(){
  const w=window.innerWidth, h=window.innerHeight;
  const ctrlH=140;
  const availH=h-ctrlH;
  scale=Math.min(w/GW, availH/GH);
  C.width=Math.floor(GW*scale);
  C.height=Math.floor(GH*scale);
  C.style.width=C.width+'px';
  C.style.height=C.height+'px';
  offsetX=(w-C.width)/2;
  C.style.marginLeft=offsetX+'px';
  X.imageSmoothingEnabled=false;
}
window.addEventListener('resize',resize);
resize();

// ===== AUDIO =====
let audioCtx=null, muted=false;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function playTone(freq,dur,type,vol){
  if(muted||!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.value=vol||0.1;
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sfx(name){
  if(muted||!audioCtx)return;
  switch(name){
    case'jump':playTone(300,0.15,'square',0.08);setTimeout(()=>playTone(500,0.1,'square',0.06),50);break;
    case'walk':playTone(100,0.05,'triangle',0.03);break;
    case'climb':playTone(800,0.05,'sine',0.04);break;
    case'collect':playTone(880,0.1,'sine',0.1);setTimeout(()=>playTone(1100,0.15,'sine',0.08),80);break;
    case'place':playTone(200,0.2,'sawtooth',0.1);playTone(150,0.3,'square',0.05);break;
    case'drill':playTone(120,0.4,'sawtooth',0.06);break;
    case'die':playTone(400,0.1,'square',0.1);setTimeout(()=>playTone(300,0.1,'square',0.08),100);setTimeout(()=>playTone(200,0.2,'square',0.06),200);break;
    case'spring':playTone(200,0.1,'sine',0.1);setTimeout(()=>playTone(600,0.2,'sine',0.08),50);break;
    case'timer':playTone(1000,0.08,'square',0.08);break;
    case'levelComplete':
      [0,100,200,300,400].forEach((d,i)=>setTimeout(()=>playTone([523,659,784,1047,1318][i],0.2,'sine',0.1),d));break;
    case'gameOver':
      [0,200,400].forEach((d,i)=>setTimeout(()=>playTone([400,300,200][i],0.3,'square',0.08),d));break;
  }
}

muteBtn.addEventListener('click',()=>{initAudio();muted=!muted;muteBtn.textContent=muted?'🔇':'🔊';});
muteBtn.addEventListener('touchend',(e)=>{e.preventDefault();initAudio();muted=!muted;muteBtn.textContent=muted?'🔇':'🔊';});

// ===== INPUT =====
const keys={left:false,right:false,up:false,down:false,jump:false};
let jumpPressed=false;

function bindBtn(id,key){
  const b=document.getElementById(id);
  b.addEventListener('mousedown',(e)=>{e.preventDefault();keys[key]=true;if(key==='jump')jumpPressed=true;});
  b.addEventListener('mouseup',(e)=>{e.preventDefault();keys[key]=false;});
  b.addEventListener('mouseleave',()=>{keys[key]=false;});
  b.addEventListener('touchstart',(e)=>{e.preventDefault();initAudio();keys[key]=true;if(key==='jump')jumpPressed=true;});
  b.addEventListener('touchend',(e)=>{e.preventDefault();keys[key]=false;});
  b.addEventListener('touchcancel',()=>{keys[key]=false;});
}
bindBtn('btn-left','left');
bindBtn('btn-right','right');
bindBtn('btn-up','up');
bindBtn('btn-down','down');
bindBtn('btn-jump','jump');

document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowLeft')keys.left=true;
  if(e.key==='ArrowRight')keys.right=true;
  if(e.key==='ArrowUp')keys.up=true;
  if(e.key==='ArrowDown')keys.down=true;
  if(e.key===' '||e.key==='z'){keys.jump=true;jumpPressed=true;}
});
document.addEventListener('keyup',(e)=>{
  if(e.key==='ArrowLeft')keys.left=false;
  if(e.key==='ArrowRight')keys.right=false;
  if(e.key==='ArrowUp')keys.up=false;
  if(e.key==='ArrowDown')keys.down=false;
  if(e.key===' '||e.key==='z')keys.jump=false;
});

document.addEventListener('touchmove',(e)=>{
  if(e.target.classList&&e.target.classList.contains('ctrl-btn'))return;
  e.preventDefault();
},{passive:false});

// ===== GAME STATE =====
const ST={TITLE:0,INTRO:1,PLAY:2,DYING:3,LEVEL_COMPLETE:4,ROUND_COMPLETE:5,GAME_OVER:6,HIGH_SCORES:7,ENTER_SCORE:8};
let state=ST.TITLE, score=0, lives=3, round=1, level=1, bonusTimer=0, bonusTimerMax=0;
let introTimer=0, dieTimer=0, levelCompleteTimer=0, roundCompleteTimer=0;
let shakeTimer=0, shakeX=0, shakeY=0;
let player=null, entities=[], particles=[], pickups=[], hazards=[];
let tileMap=[], mapW=0, mapH=0;
let elevatorY=0, elevatorDir=1, elevatorMinY=0, elevatorMaxY=0;
let drillX=0, drillDir=1, drillY=0;
let levelData={};
let walkFrame=0, walkTimer=0;

// Level 1 specifics
let girdersPlaced=[], girdersSecured=[], girderCarrying=false;
let girderPieces=[], girderHoles=[];
// Level 2 specifics
let lunchboxes=[], lunchCollected=0, conveyorActive=false, magnetActive=false, magnetX=0, magnetY=0;
let squasherY=0, squasherDir=1;
// Level 3 specifics
let factoryBoxes=[], boxCarrying=false, boxesProcessed=0, processorX=0, processorY=0;
let conveyorBeltAngle=0;

// ===== HIGH SCORES =====
const HS_KEY='hard_hat_mac_highscores';
function loadScores(){try{return JSON.parse(localStorage.getItem(HS_KEY))||[];}catch(e){return[];}}
function saveScores(s){try{localStorage.setItem(HS_KEY,JSON.stringify(s));}catch(e){}}
let highScores=loadScores();
let enterInitials=['A','A','A'], enterPos=0, newScoreIdx=-1;

// ===== TILE TYPES =====
const T={AIR:0,SOLID:1,LADDER:2,CHAIN:3,CONVL:4,CONVR:5,SPRING:6,ELEV:7,HOLE:8,HAZARD:9};

// ===== LEVEL DEFINITIONS =====
function buildLevel1(){
  mapW=20; mapH=25;
  tileMap=[];
  for(let y=0;y<mapH;y++){tileMap[y]=[];for(let x=0;x<mapW;x++)tileMap[y][x]=T.AIR;}
  // Floor (y=24)
  for(let x=0;x<mapW;x++)tileMap[24][x]=T.SOLID;
  // Platform 1 (y=20)
  for(let x=1;x<19;x++)tileMap[20][x]=T.SOLID;
  // Platform 2 (y=16)
  for(let x=2;x<18;x++)tileMap[16][x]=T.SOLID;
  // Platform 3 (y=12)
  for(let x=1;x<19;x++)tileMap[12][x]=T.SOLID;
  // Platform 4 (y=8)
  for(let x=2;x<18;x++)tileMap[8][x]=T.SOLID;
  // Top platform (y=4)
  for(let x=3;x<17;x++)tileMap[4][x]=T.SOLID;

  // Holes in floor (platform 1, y=20)
  girderHoles=[{x:4,y:20,filled:false,secured:false},{x:8,y:20,filled:false,secured:false},{x:12,y:20,filled:false,secured:false},{x:16,y:20,filled:false,secured:false}];
  for(const h of girderHoles)tileMap[h.y][h.x]=T.HOLE;

  // Ladders between platforms
  // Floor to P1
  for(let y=21;y<24;y++){tileMap[y][5]=T.CHAIN;tileMap[y][14]=T.CHAIN;}
  // P1 to P2
  for(let y=17;y<20;y++){tileMap[y][3]=T.LADDER;tileMap[y][16]=T.LADDER;}
  // P2 to P3
  for(let y=13;y<16;y++){tileMap[y][6]=T.CHAIN;tileMap[y][13]=T.CHAIN;}
  // P3 to P4
  for(let y=9;y<12;y++){tileMap[y][4]=T.LADDER;tileMap[y][15]=T.LADDER;}
  // P4 to top
  for(let y=5;y<8;y++){tileMap[y][8]=T.CHAIN;tileMap[y][11]=T.CHAIN;}

  // Springboard on right
  tileMap[23][18]=T.SPRING;
  // Elevator on left
  elevatorMinY=4*TH; elevatorMaxY=23*TH; elevatorY=20*TH; elevatorDir=-1;
  tileMap[20][0]=T.ELEV;tileMap[21][0]=T.ELEV;

  // Girder pieces (loose, on various platforms)
  girderPieces=[{x:3*TW,y:23*TH,collected:false},{x:10*TW,y:15*TH,collected:false},{x:7*TW,y:11*TH,collected:false},{x:14*TW,y:7*TH,collected:false}];
  girderCarrying=false;
  girdersPlaced=[];girdersSecured=[];
  for(const h of girderHoles){h.filled=false;h.secured=false;}

  // Drill
  drillX=2*TW; drillDir=1; drillY=19*TH;

  // Enemies
  entities=[];
  entities.push({type:'vandal',x:10*TW,y:23*TH,dir:1,speed:40+round*8,platformY:24});
  entities.push({type:'osha',x:6*TW,y:15*TH,dir:-1,speed:30+round*6,platformY:16});

  // Bolts (thrown from above)
  hazards=[];
  bonusTimerMax=2000-round*200; if(bonusTimerMax<800)bonusTimerMax=800;
  bonusTimer=bonusTimerMax;

  player={x:2*TW,y:23*TH,vx:0,vy:0,onGround:false,climbing:false,jumping:false,alive:true,w:14,h:18,facingR:true};
}

function buildLevel2(){
  mapW=20; mapH=25;
  tileMap=[];
  for(let y=0;y<mapH;y++){tileMap[y]=[];for(let x=0;x<mapW;x++)tileMap[y][x]=T.AIR;}

  // Floor
  for(let x=0;x<mapW;x++)tileMap[24][x]=T.SOLID;
  // Level 1 (y=20)
  for(let x=0;x<8;x++)tileMap[20][x]=T.SOLID;
  for(let x=12;x<mapW;x++)tileMap[20][x]=T.SOLID;
  // Level 2 (y=15)
  for(let x=2;x<18;x++)tileMap[15][x]=T.SOLID;
  // Level 3 (y=10)
  for(let x=0;x<8;x++)tileMap[10][x]=T.SOLID;
  for(let x=12;x<mapW;x++)tileMap[10][x]=T.SOLID;
  // Level 4 (y=5)
  for(let x=2;x<18;x++)tileMap[5][x]=T.SOLID;

  // Central elevator
  elevatorMinY=5*TH; elevatorMaxY=23*TH; elevatorY=15*TH; elevatorDir=-1;
  for(let y=6;y<24;y++){tileMap[y][10]=T.ELEV;}

  // Ladders
  for(let y=21;y<24;y++){tileMap[y][3]=T.LADDER;tileMap[y][16]=T.LADDER;}
  for(let y=16;y<20;y++){tileMap[y][6]=T.LADDER;tileMap[y][14]=T.LADDER;}
  for(let y=11;y<15;y++){tileMap[y][4]=T.LADDER;tileMap[y][16]=T.LADDER;}
  for(let y=6;y<10;y++){tileMap[y][8]=T.LADDER;tileMap[y][12]=T.LADDER;}

  // Conveyor at top
  for(let x=2;x<8;x++)tileMap[5][x]=T.CONVR;
  // Magnet position
  magnetX=7*TW; magnetY=3*TH; magnetActive=false;

  // Squasher area (on level 3, y=10)
  squasherY=7*TH; squasherDir=1;

  // Lunchboxes
  lunchboxes=[{x:2*TW,y:23*TH,collected:false},{x:17*TW,y:19*TH,collected:false},{x:5*TW,y:14*TH,collected:false},{x:15*TW,y:9*TH,collected:false},{x:10*TW,y:4*TH,collected:false}];
  lunchCollected=0; conveyorActive=false;

  // Hazards: pincers, dynamite, poison
  hazards=[];
  hazards.push({type:'pincers',x:13*TW,y:19*TH,w:16,h:16,timer:0});
  hazards.push({type:'dynamite',x:8*TW,y:14*TH,w:12,h:14,timer:0,blink:0});
  hazards.push({type:'poison',x:3*TW,y:9*TH,w:14,h:14});

  entities=[];
  entities.push({type:'vandal',x:14*TW,y:23*TH,dir:-1,speed:40+round*8,platformY:24});
  entities.push({type:'osha',x:4*TW,y:14*TH,dir:1,speed:30+round*6,platformY:15});

  bonusTimerMax=2200-round*200; if(bonusTimerMax<900)bonusTimerMax=900;
  bonusTimer=bonusTimerMax;
  player={x:1*TW,y:23*TH,vx:0,vy:0,onGround:false,climbing:false,jumping:false,alive:true,w:14,h:18,facingR:true};
}

function buildLevel3(){
  mapW=20; mapH=25;
  tileMap=[];
  for(let y=0;y<mapH;y++){tileMap[y]=[];for(let x=0;x<mapW;x++)tileMap[y][x]=T.AIR;}

  // Floor
  for(let x=0;x<mapW;x++)tileMap[24][x]=T.SOLID;
  // Pool hazard bottom-left
  tileMap[24][0]=T.HAZARD;tileMap[24][1]=T.HAZARD;tileMap[24][2]=T.HAZARD;

  // Platforms forming circular path
  // Bottom platform (y=20)
  for(let x=4;x<16;x++)tileMap[20][x]=T.SOLID;
  // Left wall platforms
  for(let x=1;x<5;x++){tileMap[16][x]=T.SOLID;tileMap[12][x]=T.SOLID;}
  // Right wall platforms
  for(let x=15;x<19;x++){tileMap[16][x]=T.SOLID;tileMap[12][x]=T.SOLID;}
  // Top platform (y=8)
  for(let x=4;x<16;x++)tileMap[8][x]=T.SOLID;
  // Mid platforms
  for(let x=6;x<14;x++){tileMap[14][x]=T.CONVR;tileMap[10][x]=T.CONVL;}

  // Ladders
  for(let y=21;y<24;y++){tileMap[y][5]=T.LADDER;tileMap[y][14]=T.LADDER;}
  for(let y=17;y<20;y++){tileMap[y][3]=T.CHAIN;tileMap[y][17]=T.CHAIN;}
  for(let y=13;y<16;y++){tileMap[y][2]=T.LADDER;tileMap[y][17]=T.LADDER;}
  for(let y=9;y<12;y++){tileMap[y][5]=T.CHAIN;tileMap[y][14]=T.CHAIN;}

  // Springboards
  tileMap[23][18]=T.SPRING;
  tileMap[19][4]=T.SPRING;

  // Processor chute position
  processorX=17*TW; processorY=23*TH;

  // Boxes to collect
  factoryBoxes=[{x:6*TW,y:19*TH,collected:false},{x:12*TW,y:13*TH,collected:false},{x:3*TW,y:11*TH,collected:false},{x:10*TW,y:7*TH,collected:false},{x:16*TW,y:15*TH,collected:false}];
  boxCarrying=false; boxesProcessed=0;

  entities=[];
  entities.push({type:'osha',x:8*TW,y:7*TH,dir:1,speed:35+round*8,platformY:8});
  entities.push({type:'vandal',x:10*TW,y:19*TH,dir:-1,speed:40+round*8,platformY:20});

  hazards=[];
  bonusTimerMax=2400-round*200; if(bonusTimerMax<1000)bonusTimerMax=1000;
  bonusTimer=bonusTimerMax;
  player={x:5*TW,y:23*TH,vx:0,vy:0,onGround:false,climbing:false,jumping:false,alive:true,w:14,h:18,facingR:true};
}

function startLevel(){
  particles=[];
  if(level===1)buildLevel1();
  else if(level===2)buildLevel2();
  else buildLevel3();
  state=ST.INTRO;
  introTimer=1.5;
  controlsDiv.style.display='flex';
}

// Bolts (level 1)
let bolts=[];
let boltSpawnTimer=0;

// ===== PHYSICS & COLLISION =====
function tileAt(tx,ty){
  if(tx<0||tx>=mapW||ty<0||ty>=mapH)return T.SOLID;
  return tileMap[ty][tx];
}
function isSolid(tx,ty){
  const t=tileAt(tx,ty);
  return t===T.SOLID||t===T.CONVL||t===T.CONVR||t===T.SPRING;
}
function isLadder(tx,ty){const t=tileAt(tx,ty);return t===T.LADDER||t===T.CHAIN;}
function isConveyor(tx,ty){const t=tileAt(tx,ty);return t===T.CONVL||t===T.CONVR;}

function playerTileX(){return Math.floor((player.x+player.w/2)/TW);}
function playerTileY(){return Math.floor((player.y+player.h)/TH);}
function playerTileFeetY(){return Math.floor((player.y+player.h+1)/TH);}

// ===== UPDATE =====
let lastTime=0, boltTimer=0;

function update(dt){
  if(state===ST.INTRO){
    introTimer-=dt;
    if(introTimer<=0)state=ST.PLAY;
    return;
  }
  if(state===ST.DYING){
    dieTimer-=dt;
    shakeTimer=dieTimer;
    if(dieTimer<=0){
      lives--;
      if(lives<=0){state=ST.GAME_OVER;sfx('gameOver');return;}
      startLevel();
    }
    return;
  }
  if(state===ST.LEVEL_COMPLETE){
    levelCompleteTimer-=dt;
    if(levelCompleteTimer<=0){
      score+=Math.floor(bonusTimer/10)*10;
      level++;
      if(level>3){state=ST.ROUND_COMPLETE;roundCompleteTimer=2;round++;return;}
      startLevel();
    }
    return;
  }
  if(state===ST.ROUND_COMPLETE){
    roundCompleteTimer-=dt;
    if(roundCompleteTimer<=0){level=1;startLevel();}
    return;
  }
  if(state!==ST.PLAY)return;

  const p=player;
  const spd=100, gravity=600, jumpVel=-220, climbSpd=80;

  // Bonus timer
  bonusTimer-=dt*100;
  if(bonusTimer<=200&&bonusTimer>0&&Math.floor(bonusTimer)%30<2)sfx('timer');
  if(bonusTimer<=0){bonusTimer=0;killPlayer();return;}

  // Determine ladder state
  const ptx=playerTileX(), pty=Math.floor((p.y+p.h-2)/TH);
  const onLadder=isLadder(ptx,pty)||isLadder(ptx,Math.floor((p.y+4)/TH));

  // Climbing
  if(onLadder&&(keys.up||keys.down)){
    p.climbing=true;p.vy=0;p.jumping=false;
    if(keys.up){p.y-=climbSpd*dt;sfx('climb');}
    if(keys.down){p.y+=climbSpd*dt;}
    // Check if left ladder
    const ntx=playerTileX(), nty=Math.floor((p.y+p.h-2)/TH);
    if(!isLadder(ntx,nty)&&!isLadder(ntx,Math.floor((p.y+4)/TH))){
      p.climbing=false;
    }
  } else if(p.climbing&&!onLadder){
    p.climbing=false;
  }

  if(!p.climbing){
    // Horizontal movement
    p.vx=0;
    if(keys.left){p.vx=-spd;p.facingR=false;}
    if(keys.right){p.vx=spd;p.facingR=true;}

    // Conveyor push
    const feetTy=playerTileFeetY();
    const convTile=tileAt(ptx,feetTy);
    if(convTile===T.CONVL)p.vx-=40;
    if(convTile===T.CONVR)p.vx+=40;

    // Jump
    if(jumpPressed&&p.onGround&&!p.climbing){
      p.vy=jumpVel;p.onGround=false;p.jumping=true;sfx('jump');
    }
    jumpPressed=false;

    // Gravity
    p.vy+=gravity*dt;

    // Move X
    p.x+=p.vx*dt;
    // Collide X
    const leftTx=Math.floor(p.x/TW), rightTx=Math.floor((p.x+p.w-1)/TW);
    const topTy=Math.floor(p.y/TH), botTy=Math.floor((p.y+p.h-1)/TH);
    if(p.vx<0){
      for(let ty=topTy;ty<=botTy;ty++){
        if(isSolid(leftTx,ty)){p.x=(leftTx+1)*TW;p.vx=0;break;}
      }
    }
    if(p.vx>0){
      for(let ty=topTy;ty<=botTy;ty++){
        if(isSolid(rightTx,ty)){p.x=rightTx*TW-p.w;p.vx=0;break;}
      }
    }

    // Move Y
    p.y+=p.vy*dt;
    p.onGround=false;
    // Collide Y
    const topTy2=Math.floor(p.y/TH), botTy2=Math.floor((p.y+p.h-1)/TH);
    const leftTx2=Math.floor((p.x+2)/TW), rightTx2=Math.floor((p.x+p.w-3)/TW);
    if(p.vy>0){
      for(let tx=leftTx2;tx<=rightTx2;tx++){
        if(isSolid(tx,botTy2)){
          p.y=botTy2*TH-p.h;p.vy=0;p.onGround=true;p.jumping=false;
          break;
        }
      }
    }
    if(p.vy<0){
      for(let tx=leftTx2;tx<=rightTx2;tx++){
        if(isSolid(tx,topTy2)){p.y=(topTy2+1)*TH;p.vy=0;break;}
      }
    }

    // Springboard check
    const springTx=playerTileX(), springTy=playerTileFeetY();
    if(tileAt(springTx,springTy)===T.SPRING&&p.onGround){
      p.vy=-350;p.onGround=false;p.jumping=true;sfx('spring');
    }
  } else {
    jumpPressed=false;
    // Horizontal while climbing
    p.vx=0;
    if(keys.left){p.vx=-spd*0.5;p.facingR=false;}
    if(keys.right){p.vx=spd*0.5;p.facingR=true;}
    p.x+=p.vx*dt;
  }

  // Elevator (level 1 & 2)
  if(level===1||level===2){
    elevatorY+=elevatorDir*30*dt;
    if(elevatorY<=elevatorMinY){elevatorY=elevatorMinY;elevatorDir=1;}
    if(elevatorY>=elevatorMaxY){elevatorY=elevatorMaxY;elevatorDir=-1;}
    // Player on elevator
    const ex=0, ew=TW;
    if(level===2){/* elevator at x=10 */}
    const elevX=level===2?10*TW:0;
    if(p.x+p.w>elevX&&p.x<elevX+TW&&Math.abs((p.y+p.h)-(elevatorY))<6&&p.vy>=0){
      p.y=elevatorY-p.h;p.onGround=true;p.vy=0;
      p.y+=elevatorDir*30*dt;
    }
  }

  // Walk animation
  if(Math.abs(p.vx)>10){walkTimer+=dt;if(walkTimer>0.15){walkFrame=(walkFrame+1)%4;walkTimer=0;}}

  // Bounds
  if(p.x<0)p.x=0;
  if(p.x>mapW*TW-p.w)p.x=mapW*TW-p.w;
  if(p.y>mapH*TH){killPlayer();return;}

  // ===== LEVEL-SPECIFIC LOGIC =====
  if(level===1)updateLevel1(dt);
  else if(level===2)updateLevel2(dt);
  else updateLevel3(dt);

  // Enemy updates
  for(const e of entities){
    e.x+=e.dir*e.speed*dt;
    // Find platform bounds
    const ety=e.platformY;
    let minX=0,maxX=(mapW-1)*TW;
    // Reverse at edges of platform
    const etx=Math.floor(e.x/TW);
    if(e.dir>0){
      if(etx>=mapW-1||!isSolid(etx+1,ety)){e.dir=-1;}
    }else{
      if(etx<=0||!isSolid(etx-1,ety)){e.dir=1;}
    }
    if(e.x<TW){e.x=TW;e.dir=1;}
    if(e.x>(mapW-2)*TW){e.x=(mapW-2)*TW;e.dir=-1;}

    // Collision with player
    if(Math.abs(e.x-p.x)<14&&Math.abs((e.platformY-1)*TH-p.h-p.y)<10){
      killPlayer();return;
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=200*dt;pt.life-=dt;
    if(pt.life<=0)particles.splice(i,1);
  }

  // Screen shake
  if(shakeTimer>0){
    shakeTimer-=dt;
    shakeX=(Math.random()-0.5)*4;shakeY=(Math.random()-0.5)*4;
  }else{shakeX=0;shakeY=0;}
}

function updateLevel1(dt){
  const p=player;
  // Bolts from above
  boltTimer-=dt;
  const boltFreq=2-round*0.3;if(boltFreq<0.5){}
  if(boltTimer<=0){
    boltTimer=Math.max(0.5,2-round*0.3);
    bolts.push({x:Math.random()*(mapW-4)*TW+2*TW,y:0,vy:120+round*20});
  }
  for(let i=bolts.length-1;i>=0;i--){
    bolts[i].y+=bolts[i].vy*dt;
    if(bolts[i].y>mapH*TH){bolts.splice(i,1);continue;}
    if(Math.abs(bolts[i].x-p.x)<12&&Math.abs(bolts[i].y-(p.y+p.h/2))<12){
      killPlayer();return;
    }
  }

  // Girder piece pickup
  if(!girderCarrying){
    for(const g of girderPieces){
      if(!g.collected&&Math.abs(g.x-p.x)<16&&Math.abs(g.y-(p.y+p.h-TH))<16){
        g.collected=true;girderCarrying=true;sfx('collect');score+=50;break;
      }
    }
  }

  // Place girder in hole
  if(girderCarrying){
    for(const h of girderHoles){
      if(!h.filled&&Math.abs(playerTileX()-h.x)<1&&Math.abs(playerTileFeetY()-h.y)<2){
        if(keys.down){
          h.filled=true;girderCarrying=false;tileMap[h.y][h.x]=T.SOLID;
          sfx('place');score+=100;
          spawnParticles(h.x*TW+TW/2,h.y*TH,8,'#f80');
        }
      }
    }
  }

  // Drill movement
  drillX+=drillDir*50*dt;
  if(drillX>17*TW){drillDir=-1;}
  if(drillX<2*TW){drillDir=1;}

  // Drill secures placed girders
  for(const h of girderHoles){
    if(h.filled&&!h.secured&&Math.abs(drillX-h.x*TW)<TW){
      h.secured=true;sfx('drill');score+=200;
      spawnParticles(h.x*TW+TW/2,h.y*TH,12,'#ff0');
    }
  }

  // Check level complete
  if(girderHoles.every(h=>h.secured)){
    levelComplete();
  }
}

function updateLevel2(dt){
  const p=player;
  // Lunchbox pickup
  for(const lb of lunchboxes){
    if(!lb.collected&&Math.abs(lb.x-p.x)<16&&Math.abs(lb.y-(p.y+p.h-TH))<16){
      lb.collected=true;lunchCollected++;sfx('collect');score+=100;
    }
  }

  // Squasher (on level 3 area, y oscillates)
  squasherY+=squasherDir*60*dt;
  if(squasherY>10*TH-4){squasherDir=-1;}
  if(squasherY<7*TH){squasherDir=1;}
  // Player near squasher must duck
  if(p.x>12*TW&&p.x<16*TW&&p.y<squasherY+20&&p.y+p.h>squasherY&&!keys.down){
    // Only kill if not ducking and in squasher zone on correct platform
    if(Math.abs(p.y+p.h-(10*TH))<4){
      killPlayer();return;
    }
  }

  // Hazard collision
  for(const h of hazards){
    if(Math.abs(h.x-p.x)<(h.w||12)&&Math.abs(h.y-(p.y+p.h-TH))<(h.h||12)){
      killPlayer();return;
    }
  }

  // Conveyor/magnet after all lunchboxes
  if(lunchCollected>=5){
    conveyorActive=true;
    // If player on conveyor at top and reaches magnet area
    if(p.x>6*TW&&p.y<6*TH){
      magnetActive=true;
      levelComplete();
    }
  }
}

function updateLevel3(dt){
  const p=player;
  // Box pickup
  if(!boxCarrying){
    for(const b of factoryBoxes){
      if(!b.collected&&Math.abs(b.x-p.x)<16&&Math.abs(b.y-(p.y+p.h-TH))<16){
        b.collected=true;boxCarrying=true;sfx('collect');score+=50;break;
      }
    }
  }
  // Drop box in processor
  if(boxCarrying&&Math.abs(p.x-processorX)<20&&Math.abs(p.y+p.h-processorY)<20){
    if(keys.down){
      boxCarrying=false;boxesProcessed++;sfx('place');score+=200;
      spawnParticles(processorX+TW/2,processorY,10,'#0ff');
    }
  }
  // Pool hazard
  if(p.x<3*TW&&p.y+p.h>=24*TH){killPlayer();return;}
  // Level complete
  if(boxesProcessed>=5)levelComplete();
}

function killPlayer(){
  if(state!==ST.PLAY)return;
  sfx('die');state=ST.DYING;dieTimer=1.5;shakeTimer=0.5;
  spawnParticles(player.x+player.w/2,player.y+player.h/2,15,'#f44');
}

function levelComplete(){
  sfx('levelComplete');state=ST.LEVEL_COMPLETE;levelCompleteTimer=2;
}

function spawnParticles(x,y,count,color){
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*150,vy:-Math.random()*150,life:0.5+Math.random()*0.5,color});
  }
}

// ===== DRAWING =====
function draw(){
  X.save();
  X.scale(scale,scale);
  X.translate(shakeX,shakeY);

  // Background
  const bgGrad=X.createLinearGradient(0,0,0,GH);
  bgGrad.addColorStop(0,'#0a0e1a');
  bgGrad.addColorStop(1,'#1a1e2e');
  X.fillStyle=bgGrad;
  X.fillRect(0,0,GW,GH);

  // Skyline
  X.fillStyle='#141828';
  [[20,80,30],[60,60,25],[100,90,20],[160,70,35],[220,85,20],[280,65,30],[330,75,25],[370,55,20]].forEach(([bx,bh,bw])=>{
    X.fillRect(bx,GH-bh-100,bw,bh);
    // Windows
    X.fillStyle='#2a2e3e';
    for(let wy=GH-bh-95;wy<GH-105;wy+=12){
      for(let wx=bx+4;wx<bx+bw-4;wx+=8){
        X.fillRect(wx,wy,4,6);
      }
    }
    X.fillStyle='#141828';
  });

  if(state===ST.TITLE){drawTitle();X.restore();return;}
  if(state===ST.HIGH_SCORES){drawHighScores();X.restore();return;}
  if(state===ST.ENTER_SCORE){drawEnterScore();X.restore();return;}
  if(state===ST.GAME_OVER){drawGameOver();X.restore();return;}

  // Draw tiles
  for(let y=0;y<mapH;y++){
    for(let x=0;x<mapW;x++){
      const t=tileMap[y][x];
      const px=x*TW, py=y*TH;
      if(t===T.SOLID||t===T.CONVL||t===T.CONVR||t===T.SPRING){
        drawGirder(px,py,t);
      }else if(t===T.LADDER){
        drawLadder(px,py);
      }else if(t===T.CHAIN){
        drawChain(px,py);
      }else if(t===T.HOLE){
        X.fillStyle='#300';X.fillRect(px+2,py+2,TW-4,TH-4);
        X.strokeStyle='#f80';X.strokeRect(px+1,py+1,TW-2,TH-2);
      }else if(t===T.HAZARD){
        X.fillStyle='#004466';X.fillRect(px,py,TW,TH);
        // Wavy water
        X.fillStyle='#0088aa';
        X.fillRect(px,py+4+Math.sin(Date.now()/300+x)*3,TW,TH/2);
      }
    }
  }

  // Elevator
  if(level===1||level===2){
    const ex=level===2?10*TW:0;
    X.fillStyle='#667';X.fillRect(ex,elevatorY,TW,4);
    X.fillStyle='#889';X.fillRect(ex+2,elevatorY,TW-4,2);
    // Rail
    X.strokeStyle='#445';X.lineWidth=2;
    X.beginPath();X.moveTo(ex+TW/2,elevatorMinY);X.lineTo(ex+TW/2,elevatorMaxY+4);X.stroke();
    X.lineWidth=1;
  }

  // Level-specific drawing
  if(level===1){
    // Girder pieces
    for(const g of girderPieces){
      if(!g.collected){
        X.fillStyle='#c84';X.fillRect(g.x,g.y,16,6);
        X.fillStyle='#fa6';X.fillRect(g.x+1,g.y+1,14,2);
      }
    }
    // Drill
    X.fillStyle='#ff0';X.fillRect(drillX,drillY-6,12,6);
    X.fillStyle='#cc0';X.fillRect(drillX+4,drillY-10,4,4);
    // Bolts
    X.fillStyle='#aaa';
    for(const b of bolts){
      X.save();X.translate(b.x+4,b.y+4);X.rotate(Date.now()/100);
      X.fillRect(-4,-2,8,4);X.fillRect(-2,-4,4,8);
      X.restore();
    }
    // Secured indicator
    for(const h of girderHoles){
      if(h.secured){X.fillStyle='#0f0';X.fillRect(h.x*TW+6,h.y*TH+6,8,8);}
      else if(h.filled){X.fillStyle='#fa0';X.fillRect(h.x*TW+4,h.y*TH+2,TW-8,TH-4);}
    }
    // Carrying indicator
    if(girderCarrying){
      X.fillStyle='#fa6';X.fillRect(player.x-2,player.y-8,18,5);
    }
  }
  if(level===2){
    // Lunchboxes
    for(const lb of lunchboxes){
      if(!lb.collected){
        X.fillStyle='#e44';X.fillRect(lb.x,lb.y,14,12);
        X.fillStyle='#f88';X.fillRect(lb.x+2,lb.y+1,10,4);
        X.fillStyle='#fff';X.fillRect(lb.x+5,lb.y+6,4,4);
      }
    }
    // Squasher
    X.fillStyle='#888';X.fillRect(13*TW,squasherY,3*TW,8);
    X.fillStyle='#666';X.fillRect(13*TW+2,squasherY+8,3*TW-4,4);
    // Hazards
    for(const h of hazards){
      if(h.type==='pincers'){
        X.fillStyle='#c44';
        const open=Math.sin(Date.now()/200)*4;
        X.fillRect(h.x,h.y-open,6,12+open);
        X.fillRect(h.x+10,h.y-open,6,12+open);
      }else if(h.type==='dynamite'){
        X.fillStyle='#f44';X.fillRect(h.x,h.y,8,14);
        X.fillStyle='#ff0';X.fillRect(h.x+3,h.y-4,2,4);
        if(Math.floor(Date.now()/200)%2)X.fillStyle='#f80';else X.fillStyle='#ff0';
        X.fillRect(h.x+2,h.y-6,4,3);
      }else if(h.type==='poison'){
        X.fillStyle='#0f0';X.fillRect(h.x,h.y,14,14);
        X.fillStyle='#080';X.fillRect(h.x+3,h.y+3,8,8);
        X.fillStyle='#0f0';X.font='8px monospace';X.fillText('☠',h.x+3,h.y+11);
      }
    }
    // Magnet
    if(conveyorActive){
      X.fillStyle='#f00';X.fillRect(magnetX-10,magnetY,20,10);
      X.fillStyle='#00f';X.fillRect(magnetX-10,magnetY+10,10,8);
      X.fillStyle='#f00';X.fillRect(magnetX,magnetY+10,10,8);
      if(magnetActive){
        X.strokeStyle='#ff0';X.beginPath();
        X.arc(magnetX,magnetY+10,15,0,Math.PI*2);X.stroke();
      }
    }
  }
  if(level===3){
    // Factory boxes
    for(const b of factoryBoxes){
      if(!b.collected){
        X.fillStyle='#8cf';X.fillRect(b.x,b.y,14,14);
        X.fillStyle='#6ae';X.fillRect(b.x+2,b.y+2,10,10);
      }
    }
    // Processor chute
    X.fillStyle='#555';X.fillRect(processorX-4,processorY-20,28,24);
    X.fillStyle='#333';X.fillRect(processorX,processorY-16,20,16);
    X.fillStyle='#0ff';X.font='8px monospace';X.fillText('▼',processorX+6,processorY-4);
    // Carrying indicator
    if(boxCarrying){
      X.fillStyle='#8cf';X.fillRect(player.x,player.y-10,14,8);
    }
    // Processed count
    X.fillStyle='#0ff';X.font='10px monospace';
    X.fillText(boxesProcessed+'/5',processorX,processorY-22);
    // Pool
    X.fillStyle='#0088aa';X.fillRect(0,24*TH,3*TW,TH);
  }

  // Draw enemies
  for(const e of entities){
    const ey=(e.platformY-1)*TH-18;
    if(e.type==='vandal'){
      drawCharacter(e.x,ey,e.dir>0,'#c44','#f66',true);
    }else{
      drawCharacter(e.x,ey,e.dir>0,'#44c','#66f',false);
      // Clipboard
      X.fillStyle='#da8';X.fillRect(e.dir>0?e.x+10:e.x-6,ey+6,5,8);
    }
  }

  // Draw player
  if(player.alive&&state!==ST.DYING){
    drawCharacter(player.x,player.y,player.facingR,'#fc0','#fe8',false,true);
  }else if(state===ST.DYING){
    // Flash
    if(Math.floor(dieTimer*10)%2){
      drawCharacter(player.x,player.y,player.facingR,'#f00','#f88',false,true);
    }
  }

  // Particles
  for(const pt of particles){
    X.fillStyle=pt.color;
    X.globalAlpha=pt.life;
    X.fillRect(pt.x-1,pt.y-1,3,3);
  }
  X.globalAlpha=1;

  // HUD
  drawHUD();

  // Intro splash
  if(state===ST.INTRO){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,GH/2-50,GW,100);
    X.fillStyle='#fc0';X.font='bold 20px monospace';X.textAlign='center';
    const names=['BUILDING FRAMEWORK','CONSTRUCTION SITE','FACTORY'];
    X.fillText('LEVEL '+level,GW/2,GH/2-15);
    X.font='14px monospace';X.fillStyle='#fff';
    X.fillText(names[level-1],GW/2,GH/2+15);
    X.textAlign='left';
  }

  // Level complete
  if(state===ST.LEVEL_COMPLETE){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,GH/2-50,GW,100);
    X.fillStyle='#0f0';X.font='bold 20px monospace';X.textAlign='center';
    X.fillText('LEVEL COMPLETE!',GW/2,GH/2-10);
    X.fillStyle='#fc0';X.font='14px monospace';
    X.fillText('TIME BONUS: '+Math.floor(bonusTimer/10)*10,GW/2,GH/2+20);
    X.textAlign='left';
  }

  // Round complete
  if(state===ST.ROUND_COMPLETE){
    X.fillStyle='rgba(0,0,0,0.8)';X.fillRect(0,GH/2-50,GW,100);
    X.fillStyle='#fc0';X.font='bold 22px monospace';X.textAlign='center';
    X.fillText('ROUND '+(round-1)+' COMPLETE!',GW/2,GH/2);
    X.fillStyle='#fff';X.font='12px monospace';
    X.fillText('Difficulty increasing...',GW/2,GH/2+25);
    X.textAlign='left';
  }

  X.restore();
}

function drawGirder(px,py,type){
  // Base
  const grad=X.createLinearGradient(px,py,px,py+TH);
  if(type===T.SPRING){grad.addColorStop(0,'#8c4');grad.addColorStop(1,'#4a2');}
  else if(type===T.CONVL||type===T.CONVR){grad.addColorStop(0,'#666');grad.addColorStop(1,'#444');}
  else{grad.addColorStop(0,'#b87020');grad.addColorStop(1,'#7a4810');}
  X.fillStyle=grad;X.fillRect(px,py,TW,TH);
  // Bevel top
  X.fillStyle='rgba(255,255,255,0.15)';X.fillRect(px,py,TW,2);
  // Bevel bottom
  X.fillStyle='rgba(0,0,0,0.2)';X.fillRect(px,py+TH-2,TW,2);
  // Rivets
  X.fillStyle='rgba(255,255,255,0.2)';
  X.fillRect(px+3,py+TH/2-1,2,2);
  X.fillRect(px+TW-5,py+TH/2-1,2,2);
  // Conveyor animation
  if(type===T.CONVL||type===T.CONVR){
    const dir=type===T.CONVL?-1:1;
    X.fillStyle='#888';
    const off=(Date.now()/100*dir)%TW;
    for(let i=-1;i<3;i++){
      X.fillRect(px+((i*8+off)%TW+TW)%TW,py+TH/2-1,4,2);
    }
  }
  if(type===T.SPRING){
    // Spring coils
    X.strokeStyle='#ff0';X.lineWidth=1;
    for(let i=0;i<3;i++){
      X.beginPath();X.arc(px+TW/2,py+4+i*5,4,0,Math.PI);X.stroke();
    }
    X.lineWidth=1;
  }
}

function drawLadder(px,py){
  X.fillStyle='#9a8060';
  X.fillRect(px+2,py,3,TH);X.fillRect(px+TW-5,py,3,TH);
  X.fillRect(px+2,py+TH/2-1,TW-4,2);
  X.fillStyle='rgba(255,255,255,0.1)';
  X.fillRect(px+2,py,1,TH);X.fillRect(px+TW-5,py,1,TH);
}

function drawChain(px,py){
  X.strokeStyle='#aaa';X.lineWidth=2;
  for(let i=0;i<3;i++){
    X.beginPath();
    X.ellipse(px+TW/2,py+3+i*7,3,4,0,0,Math.PI*2);
    X.stroke();
  }
  X.lineWidth=1;
}

function drawCharacter(cx,cy,facingR,bodyColor,lightColor,isEnemy,isPlayer){
  const dir=facingR?1:-1;
  // Body
  X.fillStyle=bodyColor;X.fillRect(cx+2,cy+6,10,10);
  // Lighter chest
  X.fillStyle=lightColor;X.fillRect(cx+3,cy+7,8,4);
  // Head
  X.fillStyle='#fda';X.fillRect(cx+3,cy+1,8,6);
  // Eyes
  X.fillStyle='#000';X.fillRect(facingR?cx+8:cx+4,cy+3,2,2);
  // Hard hat (player) or headgear
  if(isPlayer){
    X.fillStyle='#fc0';X.fillRect(cx+1,cy-1,12,4);
    X.fillStyle='#fa0';X.fillRect(cx+3,cy-3,8,3);
  }else if(isEnemy){
    X.fillStyle=bodyColor;X.fillRect(cx+2,cy-1,10,3);
  }else{
    // OSHA hat
    X.fillStyle='#fff';X.fillRect(cx+2,cy-1,10,3);
  }
  // Legs (animated)
  X.fillStyle='#448';
  const legOff=Math.sin(Date.now()/150)*2;
  X.fillRect(cx+3,cy+16,3,4+legOff);
  X.fillRect(cx+8,cy+16,3,4-legOff);
  // Feet
  X.fillStyle='#332';
  X.fillRect(cx+2,cy+19+legOff,4,2);
  X.fillRect(cx+7,cy+19-legOff,4,2);
}

function drawHUD(){
  // Score
  X.fillStyle='#fff';X.font='bold 12px monospace';X.textAlign='left';
  X.fillText('SCORE: '+score,5,14);
  // Timer
  const timerPct=bonusTimer/bonusTimerMax;
  X.fillStyle=timerPct>0.3?'#fc0':'#f44';
  X.textAlign='center';
  X.fillText('TIME: '+Math.ceil(bonusTimer/10),GW/2,14);
  // Lives
  X.textAlign='right';
  X.fillStyle='#fc0';
  for(let i=0;i<lives;i++){
    X.fillRect(GW-15-i*18,4,12,4);
    X.fillRect(GW-14-i*18,2,10,3);
  }
  // Round
  X.fillStyle='#888';X.font='10px monospace';
  X.fillText('R'+round,GW-5,24);
  X.textAlign='left';
}

// ===== TITLE SCREEN =====
let titleBtnY=0;
function drawTitle(){
  // Title
  X.fillStyle='#fc0';X.font='bold 36px monospace';X.textAlign='center';
  X.fillText('HARD HAT',GW/2,120);
  X.fillText('MAC',GW/2,160);
  // Subtitle
  X.fillStyle='#fa0';X.font='14px monospace';
  X.fillText('A 1983 Classic Reborn',GW/2,185);
  // Construction scene
  X.fillStyle='#b87020';
  for(let i=0;i<8;i++)X.fillRect(30+i*45,210,40,6);
  X.fillStyle='#fc0';X.fillRect(GW/2-6,220,12,30);
  X.fillStyle='#fa0';X.fillRect(GW/2-8,218,16,6);
  // Buttons
  X.fillStyle='#fc0';X.fillRect(GW/2-60,300,120,40);
  X.fillStyle='#000';X.font='bold 16px monospace';
  X.fillText('START',GW/2,325);
  titleBtnY=300;
  X.fillStyle='#888';X.fillRect(GW/2-70,360,140,35);
  X.fillStyle='#fff';X.font='bold 12px monospace';
  X.fillText('HIGH SCORES',GW/2,382);
  // Instructions
  X.fillStyle='#666';X.font='10px monospace';
  X.fillText('D-Pad to move · JUMP to jump',GW/2,430);
  X.fillText('↑↓ Climb ladders · ↓ Duck/Place',GW/2,445);
  X.textAlign='left';
}

function drawHighScores(){
  X.fillStyle='#fc0';X.font='bold 22px monospace';X.textAlign='center';
  X.fillText('HIGH SCORES',GW/2,50);
  X.font='12px monospace';
  const hs=loadScores();
  for(let i=0;i<10;i++){
    const e=hs[i];
    const y=80+i*28;
    if(i===newScoreIdx)X.fillStyle='#fc0';
    else X.fillStyle='#fff';
    if(e){
      X.fillText((i+1)+'. '+e.name+' '+String(e.score).padStart(7,' ')+' R'+e.round,GW/2,y);
    }else{
      X.fillStyle='#444';
      X.fillText((i+1)+'. --- ------',GW/2,y);
    }
  }
  X.fillStyle='#888';X.fillRect(GW/2-50,400,100,35);
  X.fillStyle='#fff';X.font='bold 12px monospace';
  X.fillText('BACK',GW/2,422);
  X.textAlign='left';
}

function drawEnterScore(){
  X.fillStyle='#fc0';X.font='bold 18px monospace';X.textAlign='center';
  X.fillText('NEW HIGH SCORE!',GW/2,100);
  X.fillStyle='#fff';X.font='bold 14px monospace';
  X.fillText('SCORE: '+score,GW/2,130);

  // Initials entry
  for(let i=0;i<3;i++){
    const bx=GW/2-45+i*30, by=180;
    X.fillStyle=i===enterPos?'#fc0':'#888';
    // Up arrow
    X.fillRect(bx+5,by-30,20,20);
    X.fillStyle='#000';X.font='14px monospace';
    X.fillText('▲',bx+8,by-14);
    // Letter
    X.fillStyle=i===enterPos?'#fc0':'#fff';
    X.font='bold 24px monospace';
    X.fillText(enterInitials[i],bx+8,by+8);
    // Down arrow
    X.fillStyle=i===enterPos?'#fc0':'#888';
    X.fillRect(bx+5,by+20,20,20);
    X.fillStyle='#000';X.font='14px monospace';
    X.fillText('▼',bx+8,by+36);
  }

  X.fillStyle='#0c0';X.fillRect(GW/2-40,280,80,35);
  X.fillStyle='#000';X.font='bold 14px monospace';
  X.fillText('OK',GW/2,302);
  X.textAlign='left';
}

function drawGameOver(){
  X.fillStyle='rgba(0,0,0,0.8)';X.fillRect(0,0,GW,GH);
  X.fillStyle='#f44';X.font='bold 28px monospace';X.textAlign='center';
  X.fillText('GAME OVER',GW/2,GH/2-30);
  X.fillStyle='#fff';X.font='14px monospace';
  X.fillText('SCORE: '+score,GW/2,GH/2+10);
  X.fillText('Tap to continue',GW/2,GH/2+40);
  X.textAlign='left';
}

// ===== CLICK / TAP HANDLING =====
function handleClick(cx,cy){
  initAudio();
  // Convert to game coords
  const rect=C.getBoundingClientRect();
  const gx=(cx-rect.left)/scale;
  const gy=(cy-rect.top)/scale;

  if(state===ST.TITLE){
    if(gy>300&&gy<340&&gx>GW/2-60&&gx<GW/2+60){
      score=0;lives=3;round=1;level=1;
      startLevel();
    }
    if(gy>360&&gy<395&&gx>GW/2-70&&gx<GW/2+70){
      newScoreIdx=-1;state=ST.HIGH_SCORES;
    }
  }
  else if(state===ST.HIGH_SCORES){
    if(gy>400&&gy<435)state=ST.TITLE;
  }
  else if(state===ST.GAME_OVER){
    // Check if qualifies for high score
    const hs=loadScores();
    if(hs.length<10||score>hs[hs.length-1].score){
      enterInitials=['A','A','A'];enterPos=0;state=ST.ENTER_SCORE;
    }else{
      state=ST.TITLE;
    }
  }
  else if(state===ST.ENTER_SCORE){
    for(let i=0;i<3;i++){
      const bx=GW/2-45+i*30, by=180;
      // Up arrow
      if(gx>bx+5&&gx<bx+25&&gy>by-30&&gy<by-10){
        enterPos=i;
        let c=enterInitials[i].charCodeAt(0)+1;if(c>90)c=65;
        enterInitials[i]=String.fromCharCode(c);
      }
      // Down arrow
      if(gx>bx+5&&gx<bx+25&&gy>by+20&&gy<by+40){
        enterPos=i;
        let c=enterInitials[i].charCodeAt(0)-1;if(c<65)c=90;
        enterInitials[i]=String.fromCharCode(c);
      }
      // Letter tap to select
      if(gx>bx+5&&gx<bx+25&&gy>by-10&&gy<by+20){
        enterPos=i;
      }
    }
    // OK button
    if(gx>GW/2-40&&gx<GW/2+40&&gy>280&&gy<315){
      const name=enterInitials.join('');
      let hs=loadScores();
      const entry={name,score,round};
      hs.push(entry);
      hs.sort((a,b)=>b.score-a.score);
      hs=hs.slice(0,10);
      newScoreIdx=hs.indexOf(entry);
      saveScores(hs);highScores=hs;
      state=ST.HIGH_SCORES;
    }
  }
}

C.addEventListener('click',(e)=>handleClick(e.clientX,e.clientY));
C.addEventListener('touchend',(e)=>{
  e.preventDefault();
  if(e.changedTouches.length>0){
    const t=e.changedTouches[0];
    handleClick(t.clientX,t.clientY);
  }
});

// ===== GAME LOOP =====
function gameLoop(ts){
  if(!lastTime)lastTime=ts;
  let dt=(ts-lastTime)/1000;
  lastTime=ts;
  if(dt>0.05)dt=0.05; // cap

  update(dt);

  X.clearRect(0,0,C.width,C.height);
  draw();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
