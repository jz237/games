<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Hard Hat Mac — Remastered</title>
<style>
:root{--gutter:0px;--control-scale:1;--control-opacity:.72;--safe-top:env(safe-area-inset-top,0px);--safe-right:env(safe-area-inset-right,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#0b0e1a;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}
#c{position:absolute;top:0;left:0;outline:none}
#c.boxed{outline:1px solid rgba(255,190,60,.16);box-shadow:0 0 44px rgba(255,150,30,.12)}
#controls{position:fixed;bottom:var(--safe-bottom);left:0;right:0;height:132px;background:linear-gradient(0deg,rgba(6,8,18,.72),rgba(6,8,18,0));display:none;z-index:10;touch-action:none;pointer-events:none;opacity:var(--control-opacity)}
.ctrl-btn{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,.46);background:rgba(20,26,46,.64);color:#ffe9c4;font-size:21px;font-weight:bold;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:pointer;-webkit-tap-highlight-color:transparent;pointer-events:auto;backdrop-filter:blur(3px);font-family:inherit;padding:0;transform:scale(var(--control-scale))}
.ctrl-btn:active,.ctrl-btn.held{background:rgba(255,180,40,.45);border-color:rgba(255,210,90,.9);color:#fff}
#btn-up{width:56px;height:56px;left:calc(66px + var(--gutter) + var(--safe-left));top:0;transform-origin:center}
#btn-down{width:56px;height:56px;left:calc(66px + var(--gutter) + var(--safe-left));top:70px;transform-origin:center}
#btn-left{width:56px;height:56px;left:calc(8px + var(--gutter) + var(--safe-left));top:35px;transform-origin:center}
#btn-right{width:56px;height:56px;left:calc(124px + var(--gutter) + var(--safe-left));top:35px;transform-origin:center}
#btn-jump{width:82px;height:82px;right:calc(18px + var(--gutter) + var(--safe-right));top:28px;background:rgba(255,150,20,.52);border-color:rgba(255,210,100,.86);font-size:15px;letter-spacing:1px;transform-origin:center}
#btn-pause{position:fixed;top:calc(56px + var(--safe-top));right:calc(8px + var(--gutter) + var(--safe-right));width:42px;height:42px;font-size:17px;display:none;z-index:20;transform-origin:center}
#btn-mute{position:fixed;top:calc(8px + var(--safe-top));right:calc(8px + var(--gutter) + var(--safe-right));width:42px;height:42px;font-size:19px;display:flex;z-index:20;transform-origin:center}
.sr-only{position:fixed!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
#a11y-menu{z-index:30}
#a11y-menu:focus-within{position:fixed!important;top:10px!important;left:10px!important;width:min(320px,calc(100vw - 20px))!important;height:auto!important;margin:0!important;padding:10px!important;overflow:visible!important;clip:auto!important;white-space:normal!important;border:2px solid #ffc116!important;border-radius:10px;background:#11182af2;box-shadow:0 8px 28px #000a}
#a11y-menu button{display:block;width:100%;margin:5px 0;padding:10px;border:1px solid #7180a8;border-radius:7px;background:#28304c;color:#fff;font:bold 14px sans-serif}
#a11y-menu button:focus{outline:3px solid #ffc116;outline-offset:1px}
#sound-caption{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));z-index:24;transform:translateX(-50%);max-width:min(620px,88vw);padding:7px 12px;border:1px solid #ffc11688;border-radius:8px;background:#090d18e8;color:#fff2c7;font:700 13px/1.25 system-ui,sans-serif;text-align:center;pointer-events:none;opacity:0;transition:opacity .12s}
#sound-caption.show{opacity:1}
.touch-edit .ctrl-btn{outline:3px dashed #fff7;cursor:move}
.touch-edit #controls{background:linear-gradient(0deg,#14213bdd,#0a1022bb)}
.high-contrast #c{filter:contrast(1.12) saturate(1.12)}
.high-contrast .ctrl-btn{background:rgba(0,0,0,.88);border-color:#fff;color:#fff}
html.landscape-touch #controls{height:100%;top:0;bottom:0;background:none;opacity:var(--control-opacity)}
html.landscape-touch #btn-up{left:calc(66px + var(--safe-left));top:calc(50% - 76px)}
html.landscape-touch #btn-down{left:calc(66px + var(--safe-left));top:calc(50% + 8px)}
html.landscape-touch #btn-left{left:calc(8px + var(--safe-left));top:calc(50% - 34px)}
html.landscape-touch #btn-right{left:calc(124px + var(--safe-left));top:calc(50% - 34px)}
html.landscape-touch #btn-jump{right:calc(22px + var(--safe-right));top:calc(50% - 41px)}
html.landscape-touch #btn-pause,html.landscape-touch #btn-mute{right:calc(122px + var(--safe-right))}
@media (prefers-reduced-motion:reduce){.ctrl-btn{backdrop-filter:none}}
</style>
</head>
<body>
<canvas id="c" tabindex="0" role="application" aria-label="Hard Hat Mac game. Use the menu controls or keyboard to begin."></canvas>
<div id="controls">
  <button class="ctrl-btn" id="btn-up" type="button" aria-label="Climb up">▲</button>
  <button class="ctrl-btn" id="btn-down" type="button" aria-label="Climb down, duck, or jackhammer">▼</button>
  <button class="ctrl-btn" id="btn-left" type="button" aria-label="Move left">◀</button>
  <button class="ctrl-btn" id="btn-right" type="button" aria-label="Move right">▶</button>
  <button class="ctrl-btn" id="btn-jump" type="button" aria-label="Jump">JUMP</button>
</div>
<button class="ctrl-btn" id="btn-pause" type="button" aria-label="Pause game">Ⅱ</button>
<button class="ctrl-btn" id="btn-mute" type="button" aria-label="Mute sound">🔊</button>
<div id="live-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<div id="a11y-menu" class="sr-only" aria-label="Game menu"></div>
<div id="sound-caption" role="status" aria-live="off"></div>
<svg width="0" height="0" aria-hidden="true" style="position:absolute">
  <filter id="palette-deuteranopia"><feColorMatrix type="matrix" values="0.625 0.375 0 0 0  0.7 0.3 0 0 0  0 0.3 0.7 0 0  0 0 0 1 0"/></filter>
  <filter id="palette-tritanopia"><feColorMatrix type="matrix" values="0.95 0.05 0 0 0  0 0.433 0.567 0 0  0 0.475 0.525 0 0  0 0 0 1 0"/></filter>
</svg>
<script src="./game-support.js?v=2.2.0"></script>
<script>
'use strict';
/* ============================================================
   HARD HAT MAC — REMASTERED  v2.2
   Complete modern rewrite of the 1983 Apple II classic.
   All original mechanics + new Level 4, power-ups, combos,
   procedural music, global leaderboards, gamepad support.
   ============================================================ */
const VERSION = 'v2.2.0';
const SCORES_API = 'https://game-scores.jez237.workers.dev/scores/hard-hat-mac';
const HS_KEY = 'hhm2_highscores';
const NAME_KEY = 'hhm2_initials';
const MEDAL_KEY = 'hhm2_medals';
const SEEN_KEY = 'hhm2_seen';
const MUTE_KEY = 'hhm2_muted';
const MUSIC_KEY = 'hhm2_music';
const SETTINGS_KEY = 'hhm2_settings';
const BINDINGS_KEY = 'hhm2_bindings';
const RESUME_KEY = 'hhm2_resume_v1';
const REPLAY_KEY = 'hhm2_best_replay_v1';
const ACHIEVEMENTS_KEY = 'hhm2_achievements_v1';
const TOUCH_LAYOUT_KEY = 'hhm2_touch_layout_v1';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const controlsDiv = document.getElementById('controls');
const muteBtn = document.getElementById('btn-mute');
const pauseBtn = document.getElementById('btn-pause');
const liveStatus = document.getElementById('live-status');
const a11yMenu = document.getElementById('a11y-menu');
const soundCaption = document.getElementById('sound-caption');
const coarsePointer = matchMedia('(pointer:coarse)');
const anyFinePointer = matchMedia('(any-pointer:fine)');
const forcedTouchMode = new URLSearchParams(location.search).has('touch');
let touchMode = forcedTouchMode || (coarsePointer.matches && !anyFinePointer.matches);
let landscapeTouch = false;
let touchGameplayLayout = false;

// ---------- helpers ----------
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
let runSeed = 0x48484d32, rngState = runSeed;
function seedRun(seed) {
  runSeed = (Number(seed) >>> 0) || 0x48484d32;
  rngState = runSeed;
  return runSeed;
}
function random() { // Mulberry32: fast, deterministic, and sufficient for gameplay
  rngState = (rngState + 0x6D2B79F5) >>> 0;
  let t = rngState;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
const rand = (a, b) => a + random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const chance = (ratePerSecond, dt) => random() < 1 - Math.exp(-ratePerSecond * dt);
const ease = t => t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
function announce(text) {
  liveStatus.textContent = '';
  requestAnimationFrame(() => { liveStatus.textContent = text; });
}
let installAvailable=false;
const pwaApp=HHMSupport.registerPWA({onInstallAvailable:value=>{installAvailable=value;},onInstalled:()=>announce('Hard Hat Mac installed.'),onError:()=>{}});
async function toggleFullscreen(){
  try{if(document.fullscreenElement)await document.exitFullscreen();else await document.documentElement.requestFullscreen({navigationUI:'hide'});resize();}
  catch(e){announce('Fullscreen is unavailable in this browser.');}
}
function rr(c, x, y, w, h, r) { // roundRect path
  r = Math.min(r, w/2, h/2);
  c.beginPath();
  c.moveTo(x+r, y);
  c.arcTo(x+w, y, x+w, y+h, r);
  c.arcTo(x+w, y+h, x, y+h, r);
  c.arcTo(x, y+h, x, y, r);
  c.arcTo(x, y, x+w, y, r);
  c.closePath();
}
function makeCanvas(w, h) {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  return cv;
}

const DEFAULT_SETTINGS = {
  reducedMotion: matchMedia('(prefers-reduced-motion:reduce)').matches,
  reducedFlash: false,
  highContrast: false,
  hudScale: 1,
  controlScale: 1,
  controlOpacity: 0.72,
  gamepadDeadzone: 0.24,
  screenShake: true,
  sfxVolume: 0.9,
  musicVolume: 0.5,
  quality: 'auto',
  difficulty: 'standard',
  palette: 'normal',
  captions: true,
  ghost: true,
};
let settings = {...DEFAULT_SETTINGS};
try { settings = {...settings, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}')}; } catch(e) {}
let qualityLevel = HHMSupport.qualityProfile(settings.quality);
function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch(e) {}
  document.documentElement.classList.toggle('high-contrast', !!settings.highContrast);
  document.documentElement.style.setProperty('--control-scale', clamp(Number(settings.controlScale)||1, .85, 1.25));
  document.documentElement.style.setProperty('--control-opacity', clamp(Number(settings.controlOpacity)||.72, .45, 1));
  qualityLevel = HHMSupport.qualityProfile(settings.quality, {fps: adaptiveFps || 60});
  const filters=[];
  if (settings.palette==='deuteranopia') filters.push('url(#palette-deuteranopia)');
  else if (settings.palette==='tritanopia') filters.push('url(#palette-tritanopia)');
  else if (settings.palette==='mono') filters.push('grayscale(1)');
  if (settings.highContrast) filters.push('contrast(1.12) saturate(1.12)');
  canvas.style.filter=filters.join(' ');
  if (window.__hhmAudioReady) updateAudioGains();
}
let adaptiveFps = 60;
saveSettings();

let touchLayout={portrait:{},landscape:{}};
try{touchLayout={...touchLayout,...JSON.parse(localStorage.getItem(TOUCH_LAYOUT_KEY)||'{}')};}catch(e){}
const movableControlIds=['btn-up','btn-down','btn-left','btn-right','btn-jump'];
function touchLayoutMode(){return landscapeTouch?'landscape':'portrait';}
function saveTouchLayout(){try{localStorage.setItem(TOUCH_LAYOUT_KEY,JSON.stringify(touchLayout));}catch(e){}}
function applyTouchLayout(){
  const custom=touchLayout[touchLayoutMode()]||{},rect=controlsDiv.getBoundingClientRect();
  for(const id of movableControlIds){const el=document.getElementById(id),pos=custom[id];if(!pos||!rect.width||!rect.height){el.style.left='';el.style.right='';el.style.top='';continue;}const w=el.offsetWidth||56,h=el.offsetHeight||56;el.style.right='auto';el.style.left=Math.round(clamp(pos.x,0,1)*rect.width-w/2)+'px';el.style.top=Math.round(clamp(pos.y,0,1)*rect.height-h/2)+'px';}
}

// ---------- responsive viewport ----------
let DPR = 1, W = 0, H = 0, viewW = 0, viewH = 0, viewScale = 1, canvasLeft = 0;
let controlReserve = 0;
function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  H = Math.min(vh, 960);
  viewScale = vh / H;
  landscapeTouch = touchMode && vw > vh * 1.28 && vh <= 600;
  document.documentElement.classList.toggle('landscape-touch',landscapeTouch);
  controlReserve = touchMode && touchGameplayLayout && !landscapeTouch ? Math.min(136, Math.max(112, H * .17)) : 0;
  const logicalAvailW = Math.floor(vw / viewScale);
  if (landscapeTouch) {
    const sideReserve = Math.min(360, Math.max(300, logicalAvailW * .38));
    W = clamp(logicalAvailW - sideReserve, 420, Math.max(420, Math.round(H * 1.42)));
  } else if (logicalAvailW > H * 1.05) {
    W = Math.min(logicalAvailW, Math.max(640, Math.round(H * 1.34)));
  } else {
    W = logicalAvailW;
  }
  W = Math.max(320, Math.floor(W));
  const cssW = Math.round(W * viewScale);
  canvasLeft = Math.max(0, Math.round((vw - cssW) / 2));
  DPR = Math.min(viewScale * (window.devicePixelRatio || 1), HHMSupport.dprCap(qualityLevel));
  canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
  canvas.style.width = cssW + 'px'; canvas.style.height = vh + 'px';
  canvas.style.left = canvasLeft + 'px';
  canvas.classList.toggle('boxed', canvasLeft > 0);
  document.documentElement.style.setProperty('--gutter', canvasLeft + 'px');
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  viewW = W; viewH = H - controlReserve;
  requestAnimationFrame(applyTouchLayout);
}
resize();
window.addEventListener('resize', resize);
coarsePointer.addEventListener?.('change', () => {
  if (!anyFinePointer.matches) { touchMode = coarsePointer.matches; resize(); }
});

window.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch' && !touchMode) { touchMode = true; resize(); }
  else if (!forcedTouchMode && e.pointerType === 'mouse' && touchMode && anyFinePointer.matches && !e.target.closest('.ctrl-btn')) {
    touchMode = false; resize();
  }
}, {capture:true});

document.addEventListener('touchmove', e => {
  if (e.target.closest && e.target.closest('.ctrl-btn')) return;
  e.preventDefault();
}, { passive: false });

// ============================================================
// AUDIO ENGINE — buses, synth voices, procedural music
// ============================================================
let AC = null, masterGain, sfxGain, musicGain, leadDelay;
let muted = false, musicOn = true;
try { muted = localStorage.getItem(MUTE_KEY) === '1'; } catch(e) {}
try { musicOn = localStorage.getItem(MUSIC_KEY) !== '0'; } catch(e) {}
muteBtn.textContent = muted ? '🔇' : '🔊';
let noiseBuf = null;

function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -16; comp.knee.value = 24; comp.ratio.value = 5;
    masterGain = AC.createGain();
    masterGain.gain.value = muted ? 0 : 1;
    masterGain.connect(comp); comp.connect(AC.destination);
    sfxGain = AC.createGain(); sfxGain.gain.value = settings.sfxVolume; sfxGain.connect(masterGain);
    musicGain = AC.createGain(); musicGain.gain.value = musicOn ? settings.musicVolume : 0; musicGain.connect(masterGain);
    window.__hhmAudioReady=true;
    leadDelay = AC.createDelay(0.6);
    leadDelay.delayTime.value = 0.22;
    const fb = AC.createGain(); fb.gain.value = 0.26;
    const wet = AC.createGain(); wet.gain.value = 0.35;
    leadDelay.connect(fb); fb.connect(leadDelay);
    leadDelay.connect(wet); wet.connect(musicGain);
    // white-noise buffer for percussive/airy sounds
    noiseBuf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  } catch(e) { AC = null; }
}
function setMuted(m) {
  muted = m;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  muteBtn.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
  try { localStorage.setItem(MUTE_KEY, muted ? '1' : '0'); } catch(e) {}
  if (masterGain) masterGain.gain.setTargetAtTime(muted ? 0 : 1, AC.currentTime, 0.02);
  announce(muted ? 'Sound muted.' : 'Sound on.');
}
function updateAudioGains() {
  if (!AC) return;
  const sv=Number(settings.sfxVolume),mv=Number(settings.musicVolume);
  if (sfxGain) sfxGain.gain.setTargetAtTime(clamp(Number.isFinite(sv)?sv:.9,0,1),AC.currentTime,.03);
  if (musicGain) musicGain.gain.setTargetAtTime(musicOn?clamp(Number.isFinite(mv)?mv:.5,0,.8):0,AC.currentTime,.04);
}
let captionTimeout=0,lastCaptionAt=0;
function captionSound(text) {
  if (!settings.captions || !text || performance.now()-lastCaptionAt<350) return;
  lastCaptionAt=performance.now();soundCaption.textContent='♪ '+text;soundCaption.classList.add('show');
  clearTimeout(captionTimeout);captionTimeout=setTimeout(()=>soundCaption.classList.remove('show'),1250);
}
function setMusicOn(on) {
  musicOn = on;
  try { localStorage.setItem(MUSIC_KEY, on ? '1' : '0'); } catch(e) {}
  if (musicGain) musicGain.gain.setTargetAtTime(on ? settings.musicVolume : 0, AC.currentTime, 0.05);
  announce(on ? 'Music on.' : 'Music off.');
}
muteBtn.addEventListener('click', () => { initAudio(); setMuted(!muted); });

// --- synth voices ---
function tone(o) {
  // {f, f1, dur, vol, type, when, bus, attack, q}
  if (!AC) return;
  const t0 = (o.when || AC.currentTime);
  try {
    const osc = AC.createOscillator();
    const g = AC.createGain();
    osc.type = o.type || 'square';
    osc.frequency.setValueAtTime(o.f, t0);
    if (o.f1) osc.frequency.exponentialRampToValueAtTime(Math.max(20, o.f1), t0 + o.dur);
    const a = o.attack || 0.004;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(o.vol || 0.15, t0 + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + o.dur);
    osc.connect(g); g.connect(o.bus || sfxGain);
    if (o.echo && leadDelay) g.connect(leadDelay);
    osc.start(t0); osc.stop(t0 + o.dur + 0.05);
  } catch(e) {}
}
function noiseHit(o) {
  // {dur, vol, fType, f, q, f1, when, bus}
  if (!AC || !noiseBuf) return;
  const t0 = (o.when || AC.currentTime);
  try {
    const src = AC.createBufferSource();
    src.buffer = noiseBuf;
    src.loop = true;
    src.playbackRate.value = o.rate || 1;
    const flt = AC.createBiquadFilter();
    flt.type = o.fType || 'bandpass';
    flt.frequency.setValueAtTime(o.f || 2000, t0);
    if (o.f1) flt.frequency.exponentialRampToValueAtTime(Math.max(40, o.f1), t0 + o.dur);
    flt.Q.value = o.q || 1;
    const g = AC.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(o.vol || 0.2, t0 + (o.attack || 0.005));
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + o.dur);
    src.connect(flt); flt.connect(g); g.connect(o.bus || sfxGain);
    src.start(t0); src.stop(t0 + o.dur + 0.05);
  } catch(e) {}
}
const SFX = {
  jump:     () => { tone({f:240, f1:520, dur:0.16, vol:0.16, type:'sine'}); tone({f:1200, dur:0.03, vol:0.05, type:'square'}); },
  land:     () => { noiseHit({dur:0.09, vol:0.13, fType:'lowpass', f:500, f1:120}); },
  step:     () => { noiseHit({dur:0.035, vol:0.05, fType:'bandpass', f:900, q:1.4}); },
  climb:    () => { tone({f:rand(640,720), dur:0.05, vol:0.06, type:'triangle'}); },
  duck:     () => { noiseHit({dur:0.06, vol:0.06, fType:'lowpass', f:800}); },
  pickup:   (mult) => { const b = 520 + (mult||1)*60; tone({f:b, dur:0.09, vol:0.16, type:'sine'}); tone({f:b*1.5, dur:0.14, vol:0.14, type:'sine', when:AC?AC.currentTime+0.07:0}); },
  sparkle:  () => { for (let i=0;i<4;i++) tone({f:1400+i*330, dur:0.07, vol:0.05, type:'sine', when:AC?AC.currentTime+i*0.045:0}); },

let music = { track: null, step: 0, nextT: 0, timer: null, danger: false };
function startMusic(name) {
  if (music.track === name) return;
  music.track = name;
  music.step = 0;
  if (AC) music.nextT = AC.currentTime + 0.06;
  if (!music.timer) music.timer = setInterval(musicTick, 55);
}
function stopMusic() {
  music.track = null;
  if (music.timer) { clearInterval(music.timer); music.timer = null; }
}
function musicTick() {
  if (!AC || !music.track || muted || !musicOn) {
    if (AC && music.track) music.nextT = AC.currentTime + 0.06;
    return;
  }
  const tr = MUSIC_TRACKS[music.track];
  if (!tr) return;
  const stepDur = 60 / tr.bpm / 4;
  while (music.nextT < AC.currentTime + 0.18) {
    const i = music.step;
    let t = music.nextT;
    if (tr.swing && (i & 1)) t += stepDur * tr.swing;
    const bi = i % tr.bass.length;
    const pi = i % 16;
    const b = tr.bass[bi];
    if (b) tone({f:NF(b), dur:stepDur*0.95, vol:0.13, type:'triangle', when:t, bus:musicGain, attack:0.006});
    const l = tr.lead[i % tr.lead.length];
    if (l) tone({f:NF(l), dur:stepDur*1.6, vol:tr.leadVol, type:tr.leadType, when:t, bus:musicGain, echo:true, attack:0.008});
    if (tr.pad) {
      const pd = tr.pad[i % tr.pad.length];
      if (pd) pd.forEach(n => tone({f:NF(n), dur:stepDur*4.5, vol:0.035, type:'sawtooth', when:t, bus:musicGain, attack:0.1}));
    }
    if (tr.kick[pi]) { tone({f:140, f1:38, dur:0.12, vol:0.3, type:'sine', when:t, bus:musicGain}); }
    const hatHit = music.danger ? 1 : tr.hat[pi];
    if (hatHit) noiseHit({dur:0.03, vol:music.danger?0.06:0.045, fType:'highpass', f:6500, when:t, bus:musicGain});
    if (music.danger && pi % 4 === 2) tone({f:NF('E6'), dur:0.05, vol:0.04, type:'square', when:t, bus:musicGain});
    music.nextT += stepDur;
    music.step = (music.step + 1) % 64;
  }
}

  jump:[' ','z'], pause:['p','Escape'], mute:['m'],

// gamepad
let padIndex = -1;

function pollGamepad() {
  if (!navigator.getGamepads) { clearGamepadKeys(); return; }
  if (padIndex < 0) {
    const found = Array.from(navigator.getGamepads()).find(Boolean);
    if (found) padIndex = found.index;
  }
  if (padIndex < 0) { clearGamepadKeys(); return; }
  const gp = navigator.getGamepads()[padIndex];
  if (!gp) { padIndex = -1; clearGamepadKeys(); return; }
  const ax = gp.axes[0] || 0, ay = gp.axes[1] || 0;
  const dz=clamp(Number(settings.gamepadDeadzone)||.24,.08,.45);
  const shaped=v=>Math.abs(v)<=dz?0:Math.sign(v)*(Math.abs(v)-dz)/(1-dz);
  gamepadX=shaped(ax);gamepadY=shaped(ay);
  const now = {
    left: ax < -0.42 || !!gp.buttons[14]?.pressed, right: ax > 0.42 || !!gp.buttons[15]?.pressed,
    up: ay < -0.42 || !!gp.buttons[12]?.pressed, down: ay > 0.42 || !!gp.buttons[13]?.pressed,
    a: !!gp.buttons[0]?.pressed, b: !!gp.buttons[1]?.pressed, start: !!gp.buttons[9]?.pressed,
  };
  const playingInput = state === 'playing' || state === 'levelIntro';
  if(now.left&&gamepadX===0)gamepadX=-1;if(now.right&&gamepadX===0)gamepadX=1;
  if(now.up&&gamepadY===0)gamepadY=-1;if(now.down&&gamepadY===0)gamepadY=1;
  gKeys.left = playingInput && now.left; gKeys.right = playingInput && now.right;
  gKeys.up = playingInput && now.up; gKeys.down = playingInput && now.down; gKeys.jump = playingInput && now.a;
  if (now.start && !padPrev.start) {
    if (state==='playing') pauseGame();

    else if (state==='title') startGame();
    else if (state==='gameOver') leaveGameOver();
    else if (state==='levelComplete'||state==='roundComplete') advanceLevel();
  }
  if (stateHasCanvasButtons() && state !== 'hsEntry') {
    if ((now.up && !padPrev.up) || (now.left && !padPrev.left)) moveUIFocus(-1);
    if ((now.down && !padPrev.down) || (now.right && !padPrev.right)) moveUIFocus(1);
    if (now.a && !padPrev.a) activateUIFocus();
    if (now.b && !padPrev.b) navigateBack();
  } else if (state === 'hsEntry') {
    if (now.left && !padPrev.left) hsKeydown('ArrowLeft', {preventDefault(){}});
    if (now.right && !padPrev.right) hsKeydown('ArrowRight', {preventDefault(){}});
    if (now.up && !padPrev.up) hsKeydown('ArrowUp', {preventDefault(){}});
    if (now.down && !padPrev.down) hsKeydown('ArrowDown', {preventDefault(){}});
    if (now.a && !padPrev.a) hsKeydown('Enter', {preventDefault(){}});
    if (now.b && !padPrev.b) handleUIButton('hsSkip');

      ctx.fillRect(bx, viewH - b.h*0.8 - parY*0.4, b.w, b.h + 400);
    }
    // clouds
    const cloudStep=qualityLevel==='low'?2:1;
    for (let ci=0;ci<bg.clouds.length;ci+=cloudStep) {
      const cl=bg.clouds[ci];
      const cx = ((cl.x + gameTime*cl.v - par2) % (viewW + 400)) - 200;
      const cy = cl.y - parY*0.5;
      ctx.fillStyle = level===4 ? 'rgba(255,200,140,0.35)' : 'rgba(190,190,220,0.16)';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 50*cl.s, 14*cl.s, 0, 0, TAU);
      ctx.ellipse(cx+30*cl.s, cy-8*cl.s, 32*cl.s, 11*cl.s, 0, 0, TAU);
      ctx.ellipse(cx-32*cl.s, cy-4*cl.s, 26*cl.s, 9*cl.s, 0, 0, TAU);
      ctx.fill();
    }
    // near buildings with lit windows
    for (const b of bg.buildings1) {
      const bx = b.x - par1;
      if (bx > viewW || bx + b.w < 0) continue;
      const by = viewH - b.h - parY*0.6;
      ctx.fillStyle = sk.building;
      ctx.fillRect(bx, by, b.w, b.h + 500);
      if (b.win) {
        ctx.fillStyle = 'rgba(255,210,120,0.5)';
        const detailStep=qualityLevel==='low'?2:1;
        for (let wy = by + 14; wy < by + b.h - 8; wy += 26*detailStep)
          for (let wx = bx + 8; wx < bx + b.w - 10; wx += 22*detailStep)
            if (((wx*7 + wy*13) | 0) % 5 < 2) ctx.fillRect(wx, wy, 6, 9);
      }
    }
    // crane silhouettes (L2, L4)
    if (level === 2 || level === 4) {
      ctx.strokeStyle = 'rgba(15,18,34,0.85)'; ctx.lineWidth = 6;
      const cx0 = viewW*0.15 - par2*0.7, cy0 = viewH*0.16 - parY*0.3;
      ctx.beginPath();
      ctx.moveTo(cx0, cy0+340); ctx.lineTo(cx0, cy0);
      ctx.moveTo(cx0-60, cy0+24); ctx.lineTo(cx0+230, cy0+24);
      ctx.moveTo(cx0+230, cy0+24); ctx.lineTo(cx0+170, cy0+58); ctx.moveTo(cx0+170, cy0+24); ctx.lineTo(cx0+110, cy0+58);
      ctx.stroke();
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(cx0+200, cy0+24); ctx.lineTo(cx0+200, cy0+110); ctx.stroke();
      ctx.fillStyle = 'rgba(15,18,34,0.85)';
      ctx.fillRect(cx0+190, cy0+110, 20, 16);
    }
  }
}

function drawMack(px, py, o) {

// ============================================================
// LEVELS
// ============================================================
function makeTileMap(cols, rows) {
  levelW = cols; levelH = rows;
  worldW = cols * TILE; worldH = rows * TILE;
  levelMap = [];
  for (let r = 0; r < rows; r++) { levelMap[r] = []; for (let c = 0; c < cols; c++) levelMap[r][c] = T_EMPTY; }
}
function fillRow(row, c1, c2, type=T_SOLID) { for (let c = c1; c <= c2; c++) if (c>=0 && c<levelW) levelMap[row][c] = type; }
function fillLadder(col, r1, r2) { for (let r = r1; r <= r2; r++) if (r>=0 && r<levelH) { levelMap[r][col] = T_LADDER; } }
function addHole(row, col) {
  levelMap[row][col] = T_HOLE; levelMap[row][col+1] = T_HOLE;
  const h = {r: row, c: col, filled: false, riveted: false, jackP: 0};
  holes.push(h);
  holeIdx[row + ',' + col] = h; holeIdx[row + ',' + (col+1)] = h;
}
function resetPlayer(x, y) {
  player.x = x; player.y = y; player.vx = 0; player.vy = 0;
  player.onGround = false; player.climbing = false; player.ducking = false;
  player.dead = false; player.carrying = null; player.carryId = null; player.coyote = 0; player.jumpBuf = 0;
  player.invuln = 2.0; player.squashX = 1; player.squashY = 1;
  player.jacking = 0; player.jackTarget = null; player.onPlatform = null;
  player.magnetGrab = 0; player.drown = false; player.facing = 1;
}
function diffParams() {
  // Later rounds lean on shorter tells and more frequent pursuit rather than
  // simply making every contact hazard nearly twice as fast.
  const mode=runDifficulty==='practice'?{en:.78,tm:1.32}:runDifficulty==='foreman'?{en:1.18,tm:.86}:{en:1,tm:1};
  const en = Math.min((1 + (round-1)*0.12)*mode.en, 1.82);
  const tm = Math.max((1 - (round-1)*0.09)*mode.tm, runDifficulty==='practice'?.8:.54);
  return {en, tm};
}

function genLevel(lv, fresh) {
  // Objective state is independent of live entities, so successful pickups cannot
  // reappear after their entity has been removed. A currently carried item is the
  // sole exception: death returns it to its original spawn.
  const keep = !fresh ? {
    holes: holes.map(h => ({...h})),
    items: {...itemState},
    sockets: entities.filter(e => e.type === 'socket').map(e => ({id:e.id, filled:e.filled, riveted:e.riveted, jackP:e.jackP})),
  } : null;
  if (keep && player.carryId && keep.items[player.carryId] === 'carried') keep.items[player.carryId] = 'available';
  entities = []; holes = []; holeIdx = {};
  if (fresh) itemState = Object.create(null);
  collectedCount = 0; levelDone = false; endSequence = null;
  particles = []; popups = []; hints = [];
  powerSpawnTimer = rand(11, 16);
  freezeTimer = 0; speedTimer = 0;
  const {en, tm} = diffParams();
  if (lv === 1) genL1(en, tm);
  else if (lv === 2) genL2(en, tm);
  else if (lv === 3) genL3(en, tm);
  else genL4(en, tm);
  const pickupTypes = ['girder','lunchbox','crate','plate'];
  if (keep) {
    itemState = Object.assign(Object.create(null), keep.items);
    for (let i = 0; i < holes.length; i++) {
      if (keep.holes[i]) { holes[i].filled = keep.holes[i].filled; holes[i].riveted = keep.holes[i].riveted; holes[i].jackP = keep.holes[i].jackP; }
    }
    for (const e of entities) {
      if (pickupTypes.includes(e.type)) {
        const status = itemState[e.id] || 'available';
        if (status !== 'available') { e.collected = true; e.dead = true; }
      }
      if (e.type === 'socket') {
        const s = keep.sockets.find(s2 => s2.id === e.id);
        if (s) { e.filled = s.filled; e.riveted = s.riveted; e.jackP = s.jackP; }
      }
    }
    if (lv === 1) collectedCount = holes.filter(h => h.riveted).length;
    else if (lv === 2) collectedCount = Object.values(itemState).filter(v => v === 'collected').length;
    else if (lv === 3) collectedCount = Object.values(itemState).filter(v => v === 'delivered').length;
    else collectedCount = entities.filter(e => e.type === 'socket' && e.riveted).length;
    const proc = entities.find(e => e.type === 'processor');
    if (proc) proc.fed = collectedCount;
    checkLevelDone(); // e.g. re-arm the L2 magnet after a death with all boxes
  } else {
    for (const e of entities) if (pickupTypes.includes(e.type)) itemState[e.id] = 'available';
    bonusTimer = bonusTimerMax;
  }
  rebuildNavigation();
  buildBackdrop(lv);
  camInit = false;
}

function genL1(en, tm) {
  makeTileMap(28, 23);
  const floors = [21, 17, 13, 9, 5];
  // upper floors start at col 3, keeping cols 0-2 clear as the elevator shaft
  floors.forEach((r, i) => fillRow(r, i === 0 ? 1 : 3, 26));
  fillRow(22, 0, 27);
  // ladders zig-zag — they pass THROUGH the upper floor (ladder-top = one-way)
  const lcols = [4, 22, 8, 19];
  for (let i = 0; i < 4; i++) fillLadder(lcols[i], floors[i+1], floors[i]-1);
  // holes to fill
  addHole(17, 12); addHole(13, 20); addHole(9, 5); addHole(5, 16);
  // girder pickups
  let gid = 0;
  for (const g of [{x:24.5, f:0},{x:4.5, f:1},{x:14, f:2},{x:24, f:3}]) {
    entities.push({type:'girder', id:'g'+(gid++), x:g.x*TILE, y:floors[g.f]*TILE - 26, w:64, h:18, collected:false, bob:rand(0,TAU)});
  }
  totalCollect = 4;

// ============================================================
// TILE QUERIES
// ============================================================
function tileAt(c, r) {
  if (c < 0 || c >= levelW) return T_SOLID;
  if (r < 0 || r >= levelH) return T_EMPTY;
  return levelMap[r][c];
}
function isSolid(c, r) {
  const t = tileAt(c, r);
  if (t === T_HOLE) { const h = holeIdx[r + ',' + c]; return h ? h.filled : false; }
  return t === T_SOLID || t === T_CONV_L || t === T_CONV_R || t === T_SPRING;
}
function isLadder(c, r) { return tileAt(c, r) === T_LADDER; }
function overlap(ax,ay,aw,ah,bx,by,bw,bh) { return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by; }
function isStandable(c, r) {
  return isSolid(c, r) || (tileAt(c, r) === T_LADDER && tileAt(c, r-1) !== T_LADDER);
}
function rebuildNavigation() {
  ladderLinks = []; surfaceRows = [];
  const componentAt = Object.create(null), components = [];
  for (let r = 0; r < levelH; r++) {
    let c = 0, found = false;
    while (c < levelW) {
      while (c < levelW && !isStandable(c,r)) c++;
      if (c >= levelW) break;
      const start = c, id = components.length;
      while (c < levelW && isStandable(c,r)) { componentAt[r+','+c] = id; c++; }
      components.push({id,row:r,start,end:c-1,edges:new Set()}); found = true;
    }
    if (found) surfaceRows.push(r);
  }
  for (let c = 0; c < levelW; c++) {
    for (let r = 0; r < levelH; r++) {
      if (!isLadder(c,r)) continue;
      const top = r;
      while (r+1 < levelH && isLadder(c,r+1)) r++;
      const bottom = r+1;
      const a = componentAt[top+','+c], b = componentAt[bottom+','+c];
      ladderLinks.push({c,top,bottom});
      if (a !== undefined && b !== undefined && a !== b) { components[a].edges.add(b); components[b].edges.add(a); }
    }
  }
  // A two-tile work gap or elevator shaft is jumpable. Model that explicitly so
  // spawn validation and enemy routing do not mistake ordinary traversal for a wall.
  for(const row of surfaceRows){
    const same=components.filter(comp=>comp.row===row).sort((a,b)=>a.start-b.start);
    for(let i=1;i<same.length;i++){const a=same[i-1],b=same[i],gap=b.start-a.end-1;if(gap>0&&gap<=3){a.edges.add(b.id);b.edges.add(a.id);}}
  }
  const startRow = surfaceRows.reduce((best,r) => Math.abs(r-Math.round((player.y+P_H)/TILE)) < Math.abs(best-Math.round((player.y+P_H)/TILE)) ? r : best, surfaceRows[0] ?? 0);
  const startCol = clamp(Math.floor((player.x+P_W/2)/TILE),0,levelW-1);
  let startId = componentAt[startRow+','+startCol];
  if (startId === undefined) startId = components.find(c => c.row===startRow)?.id;
  const reachable = new Set();
  if (level === 4) components.forEach(c => reachable.add(c.id)); // hook and rising beams connect both towers
  else if (startId !== undefined) {
    const queue = [startId]; reachable.add(startId);
    while (queue.length) for (const next of components[queue.shift()].edges) if (!reachable.has(next)) { reachable.add(next); queue.push(next); }
  }
  reachablePowerSpots = [];
  for (const comp of components) {
    if (!reachable.has(comp.id)) continue;
    for (let c = comp.start; c <= comp.end; c++) {
      if (tileAt(c,comp.row) === T_SOLID && !isSolid(c,comp.row-1) && !isSolid(c,comp.row-2)) {
        reachablePowerSpots.push({c,r:comp.row});
      }
    }
  }
  navigationGraph={componentAt,reachable,components};
}
function nearestSurfaceRow(y) {
  const target = y / TILE;
  return surfaceRows.reduce((best,r) => Math.abs(r-target) < Math.abs(best-target) ? r : best, surfaceRows[0] ?? Math.round(target));
}
function surfaceBounds(row, column) {
  let c = clamp(Math.floor(column),0,levelW-1);
  if (!isStandable(c,row)) {
    let best = -1;
    for (let d=1; d<levelW && best<0; d++) for (const n of [c-d,c+d]) if (n>=0&&n<levelW&&isStandable(n,row)) { best=n; break; }
    if (best >= 0) c = best;
  }
  let left=c,right=c;
  while (left>0 && isStandable(left-1,row)) left--;
  while (right<levelW-1 && isStandable(right+1,row)) right++;
  return {min:(left+.35)*TILE,max:(right+.65)*TILE};
}

// ============================================================
// SCORING / COMBO / POWER-UPS
// ============================================================
function addScore(n, x, y, label) {
  const difficultyScore=runDifficulty==='practice'?.75:runDifficulty==='foreman'?1.25:1;
  const v = Math.round(n * comboMult*difficultyScore);
  score += v;
  if(score>0)unlockAchievement('firstPaycheck');
  if (x !== undefined) popup(x, y, (label?label+' ':'') + '+' + v + (comboMult>1?' ×'+comboMult:''), comboMult>1?'#ffb347':'#ffe082');
  while (score >= nextLifeAt) {
    const granted = lives < 5;
    if (granted) lives++;
    nextLifeAt += (nextLifeAt < 25000 ? 15000 : 25000);
    if (granted) {
      SFX.oneUp(); toast('📻 Extra life! Stay safe out there.'); announce('Extra life awarded.');
      spawnP(player.x + P_W/2, player.y, 18, {color:['#ffe082','#fff','#7dffa0'], sMax:180, glow:true, shape:'circle'});
    }
  }
}
function bumpCombo(x, y) {
  comboTimer = 5;
  if (comboMult < 5) {
    comboMult++;
    SFX.combo(comboMult);
    if (comboMult === 3 && random() < 0.7) toast('📻 ' + FOREMAN.combo[randi(0, FOREMAN.combo.length-1)]);
    if(comboMult===5)unlockAchievement('comboFive');
  }
}
const POWER_TYPES = ['coffee','goldhat','watch','cash'];
function spawnPowerup() {
  const safe = reachablePowerSpots.filter(s => {
    const x = s.c*TILE + 9, y = s.r*TILE - 30;
    return Math.hypot(x-player.x,y-player.y) > TILE*3 && !entities.some(e => e.type==='powerup' && Math.hypot(e.x-x,e.y-y)<TILE*2);
  });
  const spots = safe.length ? safe : reachablePowerSpots;
  if (!spots.length) return;
  const {c,r} = spots[randi(0, spots.length-1)];
  const kind = POWER_TYPES[randi(0, POWER_TYPES.length-1)];
  entities.push({type:'powerup', kind, x:c*TILE + 9, y:r*TILE - 30, w:30, h:30, life:9, bob:rand(0,TAU)});
}
function grabPowerup(e) {
  e.dead = true;
  SFX.power();
  vibrate(20);
  spawnP(e.x+15, e.y+15, 16, {color:['#ffe082','#fff','#9fd8ff'], sMax:160, glow:true, shape:'circle'});
  toast('📻 ' + FOREMAN.power[e.kind]);
  if (e.kind === 'coffee') { speedTimer = 10; }
  else if (e.kind === 'goldhat') { shieldOn = true; SFX.shield(); }
  else if (e.kind === 'watch') { freezeTimer = 5; bonusTimer = Math.min(bonusTimerMax, bonusTimer + 20); }
  else { addScore(500, e.x, e.y, '💰'); }
}

// ============================================================
// DEATH
// ============================================================
function killPlayer(cause) {
  if (player.dead || player.invuln > 0 || levelDone) return;
  if (shieldOn && cause !== 'fall' && cause !== 'drown' && cause !== 'timer') {
    shieldOn = false;
    unlockAchievement('shield');
    SFX.shieldPop();
    player.invuln = 1.6;
    spawnP(player.x+P_W/2, player.y, 22, {color:['#ffd24a','#fff'], sMax:220, glow:true, shape:'circle'});
    shake(5, 0.2);
    return;
  }
  player.dead = true;
  player.deathTimer = 1.4;
  player.deathSpin = 0;
  player.vy = -380;
  player.vx = -player.facing * 60;
  comboMult = 1; comboTimer = 0;
  hitStop = 0.12;
  shake(9, 0.45);
  vibrate([30, 40, 60]);
  if (cause === 'drown') { SFX.splash(); player.drown = true; }
  else SFX.die();
  spawnP(player.x+P_W/2, player.y+P_H/2, 14, {color:['#ffc116','#e87830','#fff'], sMax:240});
}
function afterDeath() {
  lives--;
  if (lives <= 0) {
    gameOverNow();
    return;
  }
  toast('📻 ' + FOREMAN.death[randi(0, FOREMAN.death.length-1)]);
  genLevel(level, false);
  bonusTimer = bonusTimerMax;       // fresh clock, keep collection progress
}

// ============================================================
// PLAYER UPDATE
// ============================================================
let warnBeep = 0;
function updatePlatforms(dt) {
  for (const e of entities) {
    if (e.type === 'elevator' || e.type === 'beam') {
      const ox=e.x, oy=e.y;
      if (!levelDone || level !== 2) {
        e.y += e.spd * e.dir * dt;
        if (e.y < e.minY) { e.y=e.minY; e.dir=1; }
        if (e.y > e.maxY) { e.y=e.maxY; e.dir=-1; }
      }
      e.dx=e.x-ox; e.dy=e.y-oy;
    } else if (e.type === 'hook') {
      const ox = e.hx ?? (e.px + Math.sin(e.ang||0)*e.len);
      const oy = e.hy ?? (e.py + Math.cos(e.ang||0)*e.len);
      e.t += dt; e.ang=Math.sin(e.t*TAU/e.period)*e.maxA;
      e.hx=e.px+Math.sin(e.ang)*e.len; e.hy=e.py+Math.cos(e.ang)*e.len;
      e.dx=e.hx-ox; e.dy=e.hy-oy;
      if (Math.abs(e.ang)>e.maxA*.97&&!e.creaked) { e.creaked=true; if(Math.abs(e.hx-player.x)<viewW*.7) SFX.crane(); }
      if (Math.abs(e.ang)<.1) e.creaked=false;
    }
  }
}
function updatePlayer(dt) {
  const p = player;
  if (p.dead) {
    p.deathSpin += dt * 9 * (p.facing||1);
    p.vy += GRAV * 0.7 * dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.deathTimer -= dt;
    if (p.deathTimer <= 0) afterDeath();
    return;
  }
  if (p.magnetGrab > 0) return; // magnet end-sequence moves player
  const riding = p.onPlatform && entities.includes(p.onPlatform) ? p.onPlatform : null;
  if (riding) { p.x += riding.dx || 0; p.y += riding.dy || 0; }
  p.invuln = Math.max(0, p.invuln - dt);
  p.idleTime += dt;

  const speedMult = (speedTimer > 0 ? 1.42 : 1) * (p.carrying ? 0.86 : 1);
  const cMid = Math.floor((p.x + P_W/2) / TILE);
  const rFeet = Math.floor((p.y + P_H) / TILE);
  const rMid = Math.floor((p.y + P_H*0.55) / TILE);
  const rHead = Math.floor(p.y / TILE);

  // jump buffer + coyote
  p.jumpBuf = Math.max(0, p.jumpBuf - dt);
  p.coyote = Math.max(0, p.coyote - dt);
  if (keys.jump && !p.jumpHeld) p.jumpBuf = 0.12;
  p.jumpHeld = keys.jump;

  // ladder logic
  const onLadderTile = isLadder(cMid, rMid) || isLadder(cMid, rFeet);
  const ladderBelow = isLadder(cMid, rFeet);
  if (!p.climbing && ((keys.up && onLadderTile) || (keys.down && ladderBelow && p.onGround && !isSolid(cMid, rFeet)))) {
    p.climbing = true; p.ducking = false;
    p.vx = 0; p.vy = 0;
    p.x = cMid * TILE + (TILE - P_W) / 2;
  }
  if (p.climbing) {
    if (keys.up) { p.y -= CLIMB * speedMult * dt; p.climbPhase += dt * 9; if ((p.stepTimer-=dt)<=0) { SFX.climb(); p.stepTimer=0.22; } }
    if (keys.down) { p.y += CLIMB * speedMult * dt; p.climbPhase += dt * 9; }
    // top-out: feet rise past the last ladder tile → stand on the crossing
    const nMid = Math.floor((p.y + P_H*0.55) / TILE);
    const nFeet = Math.floor((p.y + P_H) / TILE);
    if (!isLadder(cMid, nMid) && !isLadder(cMid, nFeet)) {
      p.climbing = false;
      if (keys.up) { p.y = (nFeet+1) * TILE - P_H; p.onGround = true; p.coyote = 0.09; }
    }
    if (keys.down && isSolid(cMid, nFeet)) { p.y = nFeet*TILE - P_H; p.climbing = false; p.onGround = true; }
    if (keys.left) { p.climbing = false; p.facing = -1; }
    if (keys.right) { p.climbing = false; p.facing = 1; }
    if (p.jumpBuf > 0) { p.climbing = false; p.vy = JUMP_V*0.85; p.jumpBuf = 0; SFX.jump(); }
    p.onGround = false;
    return; // climbing skips physics
  }

  // ducking (only on ground, not while carrying-jacking)
  const wasDucking = p.ducking;
  p.ducking = p.onGround && keys.down && !p.climbing;
  if (p.ducking && !wasDucking) SFX.duck();

  // jackhammer interaction — hold DOWN standing on a filled, unriveted hole (or socket with plate gone)
  p.jacking = 0;
  if (p.onGround && keys.down) {
    // L1 holes
    const h = holeIdx[rFeet + ',' + cMid];
    if (h && h.filled && !h.riveted) {
      p.jacking = 1; p.ducking = false; p.jackTarget = h;
      h.jackP += dt / 1.4;
      if ((p.stepTimer -= dt) <= 0) { SFX.jack(); p.stepTimer = 0.07; shake(1.5, 0.05); }
      spawnP(p.x + P_W/2 + p.facing*8, p.y + P_H - 4, 1, {color:['#ffd24a','#fff','#ff9a3c'], sMax:130, up:60, lMax:0.4, glow:true, shape:'spark'});
      if (h.jackP >= 1) {
        h.riveted = true; collectedCount++;
        SFX.rivet(); vibrate(40);
        addScore(500, p.x, p.y - 20, '🔩');
        bumpCombo();
        shake(4, 0.2);
        spawnP(p.x + P_W/2, p.y + P_H, 20, {color:['#ffd24a','#fff'], sMax:220, up:120, glow:true, shape:'spark'});
        checkLevelDone();
      }
    }
    // L4 sockets
    for (const e of entities) {
      if (e.type === 'socket' && e.filled && !e.riveted && Math.abs((e.x + TILE) - (p.x + P_W/2)) < TILE && Math.abs(e.y - (p.y + P_H)) < 8) {
        p.jacking = 1; p.ducking = false;
        e.jackP += dt / 1.4;
        if ((p.stepTimer -= dt) <= 0) { SFX.jack(); p.stepTimer = 0.07; shake(1.5, 0.05); }
        spawnP(p.x + P_W/2 + p.facing*8, p.y + P_H - 4, 1, {color:['#ffd24a','#fff','#ff9a3c'], sMax:130, up:60, lMax:0.4, glow:true, shape:'spark'});
        if (e.jackP >= 1) {
          e.riveted = true; collectedCount++;
          SFX.rivet(); vibrate(40);
          addScore(500, p.x, p.y - 20, '🔩');
          bumpCombo();
          shake(4, 0.2);
          checkLevelDone();
        }
      }
    }
  }

  // horizontal movement (accel-based for feel)
  let target = 0;
  if (!p.jacking) {
    const keyboardOrTouch = kKeys.left||kKeys.right||tKeys.left||tKeys.right;
    if (!keyboardOrTouch && Math.abs(gamepadX)>.01) { target=WALK*speedMult*gamepadX;p.facing=Math.sign(gamepadX);p.idleTime=0; }
    else {
      if (keys.left) { target = -WALK * speedMult; p.facing = -1; p.idleTime = 0; }
      if (keys.right) { target = WALK * speedMult; p.facing = 1; p.idleTime = 0; }
    }
    if (p.ducking) target *= 0.35;
  }
  const accel = p.onGround ? 2400 : 1400;
  if (p.vx < target) p.vx = Math.min(target, p.vx + accel*dt);
  else if (p.vx > target) p.vx = Math.max(target, p.vx - accel*dt);

  // conveyor push
  const feetT = tileAt(cMid, rFeet);
  let convPush = 0;
  if (p.onGround) {
    if (feetT === T_CONV_L) convPush = -64;
    if (feetT === T_CONV_R) convPush = 64;
  }

  // jump
  if (p.jumpBuf > 0 && (p.onGround || p.coyote > 0)) {
    p.jumpBuf = 0; p.coyote = 0;
    if (feetT === T_SPRING && p.onGround) {
      p.vy = JUMP_V * 1.62;
      SFX.spring();
      spawnP(p.x+P_W/2, p.y+P_H, 10, {color:['#e8e2d4','#d8453a'], sMax:160, up:100});
      shake(2, 0.1);
    } else {
      p.vy = JUMP_V;
      SFX.jump();
    }
    p.onGround = false; p.onPlatform = null;
    p.squashX = 0.72; p.squashY = 1.3;
    spawnP(p.x+P_W/2, p.y+P_H, 5, {color:'#9aa3b8', sMax:60, up:20, lMax:0.35});
  }
  // variable jump height
  if (!keys.jump && p.vy < -220) p.vy = -220;

  // gravity
  p.vy += GRAV * dt;
  if (p.vy > MAX_FALL) p.vy = MAX_FALL;

  // integrate X
  p.x += (p.vx + convPush) * dt;
  const pH = p.ducking ? P_DUCK_H : P_H;
  const pTop = p.y + (P_H - pH);
  {
    const cL = Math.floor(p.x / TILE), cR = Math.floor((p.x + P_W - 1) / TILE);
    const r0 = Math.floor(pTop / TILE), r1 = Math.floor((p.y + P_H - 2) / TILE);
    for (let r = r0; r <= r1; r++) {
      if (p.vx + convPush < 0 && isSolid(cL, r)) { p.x = (cL+1)*TILE; p.vx = 0; }
      if (p.vx + convPush > 0 && isSolid(cR, r)) { p.x = cR*TILE - P_W; p.vx = 0; }
    }
  }
  p.x = clamp(p.x, 0, worldW - P_W);

  // integrate Y
  const wasGround = p.onGround;
  p.y += p.vy * dt;
  p.onGround = false;
  {
    const cL = Math.floor((p.x+3) / TILE), cR = Math.floor((p.x + P_W - 4) / TILE);
    if (p.vy >= 0) {
      const rB = Math.floor((p.y + P_H) / TILE);
      const prevB = Math.floor((p.y + P_H - p.vy*dt - 1) / TILE);
      // ladder tops (a ladder tile with no ladder above) act as one-way platforms
      const ladTop = c => tileAt(c, rB) === T_LADDER && tileAt(c, rB-1) !== T_LADDER;
      if ((isSolid(cL, rB) || isSolid(cR, rB) || ladTop(cL) || ladTop(cR)) && prevB < rB) {
        p.y = rB*TILE - P_H;
        if (!wasGround && p.vy > 240) {
          SFX.land();
          p.squashX = 1.28; p.squashY = 0.74;
          spawnP(p.x+P_W/2, p.y+P_H, 6, {color:'#8a8a96', sMax:70, up:30, lMax:0.35});
          if (p.vy > 600) shake(3, 0.12);
        }
        p.vy = 0; p.onGround = true; p.coyote = 0.09;
      }
    } else {
      const rT = Math.floor(pTop / TILE);
      if (isSolid(cL, rT) || isSolid(cR, rT)) {
        p.y = (rT+1)*TILE - (P_H - pH);
        p.vy = 0;
      }
    }
  }
  if (p.onGround) p.coyote = 0.09;
  // moving platforms (elevators / beams / hook)
  p.onPlatform = null;
  for (const e of entities) {
    if (e.type !== 'elevator' && e.type !== 'beam' && e.type !== 'hook') continue;
    const ex = e.type === 'hook' ? e.hx - e.w/2 : e.x;
    const ey = e.type === 'hook' ? e.hy : e.y;
    if (p.vy >= 0 && p.x + P_W > ex + 4 && p.x < ex + e.w - 4) {
      const feet = p.y + P_H;
      if (feet >= ey - 2 && feet <= ey + 16 + Math.max(0, p.vy*dt)) {
        p.y = ey - P_H;
        p.vy = 0; p.onGround = true; p.coyote = 0.12;
        p.onPlatform = e;
      }
    }
  }
  // squash & stretch recovery
  p.squashX = lerp(p.squashX, 1, Math.min(1, dt*12));
  p.squashY = lerp(p.squashY, 1, Math.min(1, dt*12));

  // walk anim + steps
  if (p.onGround && Math.abs(p.vx) > 30) {
    p.walkPhase += dt * (10 + Math.abs(p.vx)*0.02);
    if ((p.stepTimer -= dt) <= 0) { SFX.step(); p.stepTimer = 0.26; }
  }

  // fell off the world
  if (p.y > worldH + 80) killPlayer('fall');

  // pickups & item interactions
  for (const e of entities) {
    if (e.dead) continue;
    if ((e.type === 'girder' || e.type === 'lunchbox' || e.type === 'crate' || e.type === 'plate') && !e.collected) {
      if (overlap(p.x, pTop, P_W, pH, e.x, e.y, e.w, e.h)) {
        if (e.type === 'lunchbox') {
          e.collected = true; e.dead = true;
          itemState[e.id] = 'collected';
          collectedCount++;
          SFX.pickup(comboMult); vibrate(15);
          addScore(300, e.x, e.y, '🍱');
          bumpCombo();
          spawnP(e.x+e.w/2, e.y+e.h/2, 12, {color:['#ffe082','#ff8a65','#fff'], sMax:150, glow:true, shape:'circle'});
          checkLevelDone();
        } else if (!p.carrying) {
          e.collected = true; e.dead = true;
          p.carrying = e.type === 'girder' ? 'girder' : (e.type === 'crate' ? 'crate' : 'plate');
          p.carryId = e.id;
          itemState[e.id] = 'carried';
          SFX.pickup(1); vibrate(15);
          popup(e.x, e.y, e.type === 'girder' ? '🏗 GIRDER' : (e.type==='crate' ? '📦 CRATE' : '🔶 PLATE'), '#9fd8ff');
        }
      }
    }
    // deposit girder into hole
    if (e.type === 'processor' && p.carrying === 'crate') {
      if (overlap(p.x, pTop, P_W, pH, e.x - 10, e.y - 14, e.w + 20, e.h + 14)) {
        if (p.carryId) itemState[p.carryId] = 'delivered';
        p.carrying = null;
        p.carryId = null;
        e.fed++; e.anim = 1;
        collectedCount++;
        SFX.process(); vibrate(25);
        addScore(400, e.x + e.w/2, e.y, '⚙️');
        bumpCombo();
        spawnP(e.x + e.w/2, e.y, 14, {color:['#ff9a3c','#ffe082'], sMax:140, up:140, glow:true});
        checkLevelDone();
      }
    }
  }
  // girder into hole (auto-place standing over an unfilled hole)
  if (p.carrying === 'girder') {
    const hb = holeIdx[(rFeet) + ',' + cMid];
    const hb2 = holeIdx[(rFeet+1) + ',' + cMid];
    const h = (hb && !hb.filled) ? hb : ((hb2 && !hb2.filled) ? hb2 : null);
    if (h) {
      h.filled = true;
      if (p.carryId) itemState[p.carryId] = 'placed';
      p.carrying = null;
      p.carryId = null;
      SFX.girder(); vibrate(30);
      addScore(300, cMid*TILE, h.r*TILE - 20, '🏗');
      bumpCombo();
      shake(3, 0.15);
      spawnP(h.c*TILE + TILE, h.r*TILE, 16, {color:['#9aa3b8','#fff','#ffd24a'], sMax:160, up:80});
      // snap player on top
      p.y = h.r*TILE - P_H; p.vy = 0; p.onGround = true;
    }
  }
  // plate into socket (L4)
  if (p.carrying === 'plate') {
    for (const e of entities) {
      if (e.type === 'socket' && !e.filled && Math.abs((e.x + TILE) - (p.x + P_W/2)) < TILE*0.8 && Math.abs(e.y - (p.y + P_H)) < 10) {
        e.filled = true;
        if (p.carryId) itemState[p.carryId] = 'placed';
        p.carrying = null;
        p.carryId = null;
        SFX.girder(); vibrate(30);
        addScore(300, e.x, e.y - 20, '🔶');
        bumpCombo();
        spawnP(e.x + TILE, e.y, 14, {color:['#ffb050','#fff'], sMax:150, up:80});
      }
    }
  }
}

function checkLevelDone() {
  if (level === 1) {
    if (holes.every(h => h.riveted)) beginLevelEnd('girders');
  } else if (level === 2) {
    if (collectedCount >= totalCollect) {
      const m = entities.find(e => e.type === 'magnet');
      if (m && !m.active) { m.active = true; SFX.magnet(); toast('📻 Magnet\'s hot! Ride the top conveyor, Mack!'); }
    }
  } else if (level === 3) {
    if (collectedCount >= totalCollect) beginLevelEnd('processed');
  } else {
    const sockets = entities.filter(e => e.type === 'socket');
    if (sockets.length && sockets.every(s => s.riveted)) beginLevelEnd('flag');
  }
}
function beginLevelEnd(kind) {
  if (levelDone) return;
  levelDone = true;
  endSequence = {kind, t: 0};
  comboTimer = 0;
  SFX.levelDone();
}

// ============================================================
// ENTITY UPDATES
// ============================================================
function enemyBottom(e) { return e.aiState === 'climb' ? e.navY : e.row*TILE; }
function chooseEnemyLadder(e, targetRow) {
  const options = ladderLinks
    .filter(l => l.top === e.row || l.bottom === e.row)
    .map(l => ({...l, to:l.top===e.row?l.bottom:l.top}))
    .filter(l => Math.abs(l.to-targetRow) < Math.abs(e.row-targetRow));
  options.sort((a,b) => (Math.abs(a.to-targetRow)*TILE + Math.abs(a.c*TILE-e.x)) - (Math.abs(b.to-targetRow)*TILE + Math.abs(b.c*TILE-e.x)));
  return options[0] || null;
}
function updateEnemyAI(e, dt, kind, frozen) {
  if (frozen || levelDone) return;
  e.aiState ||= kind === 'osha' && e.checking > 0 ? 'inspect' : 'patrol';
  e.aiT = Math.max(0, (e.aiT || 0) - dt);
  const targetRow = nearestSurfaceRow(player.y + P_H);
  const sameRow = targetRow === e.row;
  const awareness = 1 + Math.min(.28,(round-1)*.05);
  const seesPlayer = sameRow && Math.abs(player.x - e.x) < TILE * (kind==='vandal'?7:5.5) * awareness;
  const base = Math.abs(e.vx);

  if (e.aiState === 'climb') {
    e.climbT = Math.min(1, e.climbT + dt * (kind==='vandal' ? 0.72 : 0.58));
    e.navY = lerp(e.climbFrom*TILE, e.climbTo*TILE, ease(e.climbT));
    e.walkPhase += dt * 7;
    if (e.climbT >= 1) {
      e.row = e.climbTo; e.navY = e.row*TILE; e.aiState = 'recover'; e.aiT = 0.55;
      const bounds = surfaceBounds(e.row, e.x/TILE); e.min = bounds.min; e.max = bounds.max;
    }
    return;
  }

  if (e.aiState === 'alert') {
    e.facing = player.x >= e.x ? 1 : -1;
    if (e.aiT <= 0) {
      if (e.pendingLadder) {
        e.climbFrom=e.row; e.climbTo=e.pendingLadder.to; e.climbT=0; e.navY=e.row*TILE; e.pendingLadder=null; e.aiState='climb';
      } else { e.aiState='chase'; e.aiT=kind==='vandal'?2.2:1.5; }
    }
    return;
  }

  if (e.aiState === 'recover') { if (e.aiT <= 0) e.aiState='patrol'; else return; }
  if (e.aiState === 'inspect') {
    e.checking = Math.max(0,e.checking-dt);
    if (seesPlayer) { e.aiState='alert'; e.aiT=.55; e.pendingLadder=null; }
    else if (e.checking <= 0) { e.aiState='patrol'; e.checkT=rand(3,7); }
    return;
  }

  if (e.aiState === 'seek') {
    const tx = e.pendingLadder.c*TILE + TILE/2;
    e.facing = tx >= e.x ? 1 : -1;
    e.x += base * .82 * e.facing * dt; e.walkPhase += dt*8;
    if (Math.abs(tx-e.x) < 6) { e.x=tx; e.aiState='alert'; e.aiT=.42; }
    return;
  }

  if (e.aiState === 'chase') {
    e.facing = player.x >= e.x ? 1 : -1;
    e.x += base * (kind==='vandal'?1.55:1.32) * e.facing * dt;
    e.walkPhase += dt * (kind==='vandal'?12:9);
    if (!sameRow || e.aiT <= 0) { e.aiState='recover'; e.aiT=.7; }
  } else {
    e.x += base * e.facing * dt; e.walkPhase += dt * (kind==='vandal'?8:6.5);
    if (seesPlayer) { e.aiState='alert'; e.aiT = (kind === 'vandal' ? .5 : .7) * Math.max(.62,1-(round-1)*.06); e.pendingLadder=null; }
    else if (!sameRow && (e.navThink=(e.navThink||0)-dt) <= 0) {
      e.navThink=rand(1.2,2.2); const link=chooseEnemyLadder(e,targetRow);
      if (link) { e.pendingLadder=link; e.aiState='seek'; }
    } else if (kind==='osha') {
      e.checkT=(e.checkT||rand(3,6))-dt;
      if (e.checkT<=0) { e.checking=rand(.8,1.4); e.aiState='inspect'; }
    }
  }
  if (e.x < e.min) { e.x=e.min; e.facing=1; }
  if (e.x > e.max) { e.x=e.max; e.facing=-1; }
}

function updateEntities(dt) {
  const p = player;
  const pH = p.ducking ? P_DUCK_H : P_H;
  const pTop = p.y + (P_H - pH);
  const frozen = freezeTimer > 0;

  for (let i = entities.length - 1; i >= 0; i--) {
    const e = entities[i];
    if (e.dead) { entities.splice(i, 1); continue; }
    switch (e.type) {

      case 'vandal': {
        updateEnemyAI(e,dt,'vandal',frozen);
        const bottom=enemyBottom(e);
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x - 11, bottom - 46, 22, 46)) killPlayer('vandal');
        break;
      }

      case 'osha': {
        updateEnemyAI(e,dt,'osha',frozen);
        const bottom=enemyBottom(e);
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x - 11, bottom - 50, 22, 50)) killPlayer('osha');
        break;
      }

      case 'boltSpawner': {
        if (frozen || levelDone) break;
        e.t -= dt;
        if (e.t <= 0) {
          e.t = e.iv * rand(0.7, 1.3);
          const bx = clamp(p.x + rand(-180, 180), TILE, worldW - TILE);
          entities.push({type:'bolt', x:bx, y:2.2*TILE, vy:0, spin:rand(0,TAU), w:14, h:14});
        }
        break;
      }
      case 'bolt': {
        e.vy += GRAV * 0.55 * dt;
        e.y += e.vy * dt;
        e.spin += dt * 9;
        const c = Math.floor((e.x+7) / TILE), r = Math.floor((e.y + e.h) / TILE);
        if (isSolid(c, r)) {
          e.dead = true;
          spawnP(e.x+7, r*TILE, 6, {color:['#ffd24a','#fff'], sMax:120, up:60, lMax:0.3, glow:true, shape:'spark'});
          if (Math.abs(e.x - p.x) < viewW*0.6) SFX.thud();
        }
        if (e.y > worldH) e.dead = true;
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x, e.y, e.w, e.h)) killPlayer('bolt');
        break;
      }

      case 'spigot': {
        if (frozen || levelDone) break;
        e.t -= dt;
        if (e.t <= 0) {
          e.t = e.iv * rand(0.8, 1.25);
          entities.push({type:'blob', x:e.x - 8, y:e.y + 12, vy:30, w:16, h:16, wob:rand(0,TAU)});
        }
        break;
      }
      case 'blob': {
        e.vy += GRAV * 0.4 * dt;
        e.y += e.vy * dt;
        e.wob += dt*8;
        const c = Math.floor((e.x+8) / TILE), r = Math.floor((e.y + e.h) / TILE);
        if (isSolid(c, r)) {
          e.dead = true;
          spawnP(e.x+8, r*TILE, 7, {color:['#b8b8c0','#8a8a96'], sMax:90, up:40, lMax:0.4});
        }
        if (e.y > worldH) e.dead = true;
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x+2, e.y+2, e.w-4, e.h-4)) killPlayer('blob');
        break;
      }

      case 'pincers': {
        if (!frozen && !levelDone) e.ph += dt;
        const cyc = e.ph % 2.2;
        e.closed = cyc > 1.4; // snap window
        if (e.closed && !e.wasClosed && Math.abs(e.x - p.x) < viewW*0.55) SFX.thud();
        e.wasClosed = e.closed;
        if (!p.dead && e.closed && overlap(p.x, pTop, P_W, pH, e.x + 4, e.y - e.h, e.w - 8, e.h)) killPlayer('pincers');
        break;
      }

      case 'dynamite': {
        if (!frozen && !levelDone) e.ph += dt;
        const cyc = e.ph % e.cyc;
        e.lit = cyc > e.cyc - 1.6 && cyc < e.cyc - 0.35;
        e.boom = cyc >= e.cyc - 0.35;
        if (e.boom && !e.wasBoom) {
          SFX.explode(); shake(7, 0.35);
          spawnP(e.x+15, e.y, 30, {color:['#ff9a3c','#ffe082','#ff5030','#888'], sMax:300, up:140, glow:true});
        }
        e.wasBoom = e.boom;
        if (e.lit && chance(24,dt)) spawnP(e.x + 15, e.y - 32, 1, {color:['#ffe082','#fff'], sMax:60, up:60, lMax:0.3, glow:true, shape:'spark'});
        if (!p.dead) {
          if (overlap(p.x, pTop, P_W, pH, e.x+3, e.y - e.h, e.w-6, e.h)) killPlayer('dynamite');
          if (e.boom) {
            const dx = (p.x + P_W/2) - (e.x + 15), dy = (p.y + P_H/2) - (e.y - 15);
            if (dx*dx + dy*dy < 95*95) killPlayer('explosion');
          }
        }
        break;
      }

      case 'poison': {
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x+4, e.y - e.h, e.w-8, e.h)) killPlayer('poison');
        break;
      }
      case 'arcVent': {
        if(!frozen&&!levelDone)e.t+=dt;const phase=e.t%e.cycle;e.warning=phase>e.cycle-e.activeFor-.8;e.active=phase>e.cycle-e.activeFor;
        if(e.active&&!e.wasActive&&Math.abs(e.x-p.x)<viewW*.65){SFX.zap();spawnP(e.x+e.w/2,e.y-e.h*.5,12,{color:['#79ddff','#fff'],sMax:150,up:30,grav:0,glow:true,shape:'spark'});}e.wasActive=e.active;
        if(e.active&&!p.dead&&overlap(p.x,pTop,P_W,pH,e.x,e.y-e.h,e.w,e.h))killPlayer('arc');
        break;
      }

      case 'squasher': {
        if (!frozen && !levelDone) {
          const reach = (e.row - 1) * TILE - e.gapTop - 38; // leaves ~38px gap
          e.ext += e.spd * e.dir * dt;
          if (e.ext > reach) { e.ext = reach; e.dir = -1; if (Math.abs(e.x - p.x) < viewW*0.6) { SFX.thud(); shake(2, 0.08); } }
          if (e.ext < 0) { e.ext = 0; e.dir = 1; }
        }
        const plateY = e.gapTop + 26 + e.ext;
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x, e.gapTop, e.w, 26 + e.ext + 10)) {
          if (pTop < plateY + 10) killPlayer('squasher');
        }
        break;
      }

      case 'elevator': case 'beam': {
        // Advanced before player collision so riders consume this frame's delta.
        break;
      }

      case 'hook': {
        // Advanced by updatePlatforms before player collision.
        break;
      }

      case 'ball': {
        if (!frozen && !levelDone) e.t += dt;
        e.ang = Math.sin(e.t * TAU / e.period) * e.maxA;
        e.bx = e.px + Math.sin(e.ang) * e.len;
        e.by = e.py + Math.cos(e.ang) * e.len;
        if (!p.dead) {
          const dx = (p.x + P_W/2) - e.bx, dy = (p.y + P_H/2) - e.by;
          if (dx*dx + dy*dy < (e.r + 12)*(e.r + 12)) killPlayer('ball');
        }
        break;
      }

      case 'magnet': {
        e.hum += dt;
        if (e.active && chance(18,dt)) {
          spawnP(e.x + rand(0, e.w), e.y + e.h + rand(0, 10), 1, {color:['#7dc4ff','#fff'], sMax:40, up:-30, lMax:0.25, grav:-100, glow:true, shape:'spark'});
        }
        if (e.active && !p.dead && !levelDone && p.magnetGrab === 0) {
          const px2 = p.x + P_W/2;
          if (px2 > e.x - 10 && px2 < e.x + e.w + 10 && p.y + P_H > e.y && p.y < e.y + TILE*4.4) {
            p.magnetGrab = 0.001;
            p.vx = 0; p.vy = 0;
            SFX.magnet(); vibrate(50);
          }
        }
        break;
      }

      case 'processor': {
        e.anim = Math.max(0, e.anim - dt);
        if (e.anim > 0) shake(1,0.03);
        if (e.anim > 0 && chance(30,dt)) {
          spawnP(e.x + rand(10, e.w-10), e.y - 4, 1, {color:['#ff9a3c','#aaa'], sMax:50, up:90, lMax:0.6, grav:-60});
        }
        break;
      }

      case 'pool': {
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x, e.y + 8, e.w, e.h)) {
          spawnP(p.x + P_W/2, e.y + 10, 16, {color:['#5ab4e8','#9fd8ff','#fff'], sMax:180, up:160});
          killPlayer('drown');
        }
        break;
      }

      case 'powerup': {
        e.life -= dt;
        e.bob += dt * 3;
        if (e.life <= 0) { e.dead = true; break; }
        if (!p.dead && overlap(p.x, pTop, P_W, pH, e.x, e.y, e.w, e.h)) grabPowerup(e);
        break;
      }

      case 'girder': case 'lunchbox': case 'crate': case 'plate': {
        if (!e.collected) e.bob += dt * 2.4;
        break;
      }
    }
  }
}

// ---------- end-of-level sequences ----------
function updateEndSequence(dt) {
  if (!endSequence) return;
  const s = endSequence;
  s.t += dt;
  if (s.kind === 'magnetGrab') {
    // player rises to magnet
    const m = entities.find(e => e.type === 'magnet');
    if (m) {
      player.y = lerp(player.y, m.y + m.h - 6, Math.min(1, dt * 3));
      player.x = lerp(player.x, m.x + m.w/2 - P_W/2, Math.min(1, dt * 4));
      spawnP(player.x + P_W/2 + rand(-14, 14), player.y + rand(0, P_H), 1, {color:['#7dc4ff','#fff'], sMax:30, lMax:0.2, grav:0, glow:true, shape:'spark'});
    }
    if (s.t > 1.5) finishLevel();
  } else if (s.kind === 'flag') {
    const f = entities.find(e => e.type === 'flag');
    if (f) {
      f.raise = Math.min(1, f.raise + dt * 0.55);
      if (chance(15,dt)) {
        spawnP(f.x + rand(-90, 90), f.y - TILE*2.6 + rand(-50, 10), 1, {color:['#ffd24a','#ff6a5a','#7dffa0','#7dc4ff'], sMax:130, up:80, lMax:0.9, glow:true, shape:'circle'});
      }
    }
    if (s.t > 2.4) finishLevel();
  } else {
    if (s.t > 1.1) finishLevel();
  }
}
function finishLevel() {
  endSequence = null;
  const timeBonus = Math.round(bonusTimer) * 10;
  const frac = bonusTimer / bonusTimerMax;
  const medal = frac >= 0.55 ? 'gold' : frac >= 0.32 ? 'silver' : 'bronze';
  try {
    const md = JSON.parse(localStorage.getItem(MEDAL_KEY) || '{}');
    const rank = {bronze:1, silver:2, gold:3};
    if (!md[level] || rank[medal] > rank[md[level]]) { md[level] = medal; localStorage.setItem(MEDAL_KEY, JSON.stringify(md)); }
  } catch(e) {}
  lastMedal = medal;
  if(medal==='gold')unlockAchievement('gold');
  if(lives===levelLivesAtStart)unlockAchievement('survivor');
  lastTimeBonus = timeBonus;
  score += 1000 + timeBonus;
  tallyShown = 0;
  if (level === 4) {
    state = 'roundComplete';
    SFX.roundDone();
    score += 2000;
    unlockAchievement('round');if(runMode==='daily')unlockAchievement('daily');finalizeReplay();clearResume();
    toast('📻 ' + FOREMAN.level[randi(0, FOREMAN.level.length-1)]);
  } else {
    state = 'levelComplete';
  }
  stopMusic();
}
let lastMedal = 'bronze', lastTimeBonus = 0, tallyShown = 0;
function advanceLevel() {
  SFX.ui();
  if (state === 'roundComplete') {
    round++;
    level = 1;
  } else {
    level++;
  }
  startLevel();
}
function startLevel() {
  genLevel(level, true);
  levelLivesAtStart=lives;if(level===4)unlockAchievement('highRise');
  uiButtons = [];
  state = 'levelIntro';
  levelIntroT = 0;
  startMusic('l' + level);
}
let levelIntroT = 0;

// ============================================================
// CAMERA
// ============================================================
function updateCamera(dt) {
  const tx = clamp(player.x + P_W/2 + player.facing * 56 - viewW/2, 0, Math.max(0, worldW - viewW));
  const ty = clamp(player.y + P_H/2 - viewH * 0.55, 0, Math.max(0, worldH - viewH));
  if (!camInit) { camX = tx; camY = ty; camInit = true; }
  camX = lerp(camX, tx, Math.min(1, dt * 5));
  camY = lerp(camY, ty, Math.min(1, dt * 6));
}

// ============================================================
// WORLD RENDER
// ============================================================
function drawTiles() {
  const c0 = Math.max(0, Math.floor(camX / TILE)), c1 = Math.min(levelW-1, Math.ceil((camX + viewW) / TILE));
  const r0 = Math.max(0, Math.floor(camY / TILE)), r1 = Math.min(levelH-1, Math.ceil((camY + viewH) / TILE));
  for (let r = r0; r <= r1; r++) {
    for (let c = c0; c <= c1; c++) {
      const t = levelMap[r][c];
      if (t === T_EMPTY) continue;
      const x = c*TILE - camX, y = r*TILE - camY;
      if (t === T_SOLID) {
        ctx.drawImage(ART.girder, x, y);
      } else if (t === T_LADDER) {
        ctx.drawImage(ART.ladder, x, y);
      } else if (t === T_CONV_L || t === T_CONV_R) {
        ctx.drawImage(ART.conveyor, x, y);
        // animated chevrons
        const dirMul = t === T_CONV_R ? 1 : -1;
        const off = ((gameTime * 60 * dirMul) % 16 + 16) % 16;
        ctx.strokeStyle = '#ffae00'; ctx.lineWidth = 2.5;
        ctx.save();
        ctx.beginPath(); ctx.rect(x, y+4, TILE, 11); ctx.clip();
        ctx.beginPath();
        for (let ox = -16; ox < TILE + 16; ox += 16) {
          const cx2 = x + ox + off;
          ctx.moveTo(cx2 - 4*dirMul, y + 6); ctx.lineTo(cx2 + 3*dirMul, y + 9.5); ctx.lineTo(cx2 - 4*dirMul, y + 13);
        }
        ctx.stroke();
        ctx.restore();
        // girder body under belt
        ctx.fillStyle = '#363d50'; ctx.fillRect(x, y+22, TILE, TILE-22);
        ctx.strokeStyle = 'rgba(20,24,38,0.5)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x+4, y+26); ctx.lineTo(x+TILE-4, y+TILE-4); ctx.stroke();
      } else if (t === T_SPRING) {
        ctx.drawImage(ART.girder, x, y);
        const sq = (player.onGround && Math.floor((player.x+P_W/2)/TILE)===c && Math.floor((player.y+P_H)/TILE)===r) ? 4 : 0;
        ctx.drawImage(ART.spring, x, y - 14 + sq);
      } else if (t === T_RAIL) {
        ctx.drawImage(ART.rail, x, y);
      } else if (t === T_HOLE) {
        const h = holeIdx[r + ',' + c];
        if (h && h.filled) {
          ctx.drawImage(ART.girder, x, y);
          if (!h.riveted) {
            // unriveted: glowing outline + progress
            ctx.strokeStyle = 'rgba(255,210,74,' + (0.5 + 0.3*Math.sin(gameTime*5)) + ')';
            ctx.lineWidth = 3;
            ctx.strokeRect(x+2, y+2, TILE-4, TILE-4);
            if (h.jackP > 0 && h.c === c) {
              ctx.fillStyle = 'rgba(0,0,0,0.55)';
              rr(ctx, x + 6, y - 16, TILE*2 - 12, 9, 4); ctx.fill();
              ctx.fillStyle = '#ffd24a';
              rr(ctx, x + 8, y - 14, (TILE*2 - 16) * Math.min(1, h.jackP), 5, 2); ctx.fill();
            }
          } else {
            ctx.fillStyle = '#ffd24a';
            for (const rx of [10, 24, 38]) { ctx.beginPath(); ctx.arc(x+rx, y+8, 2.6, 0, TAU); ctx.fill(); }
          }
        } else {
          // Open hole: keep the girder scenery intact, then cut a local shadow into it.
          ctx.drawImage(ART.girder, x, y);
          if (h && h.c === c) {
            ctx.save();
            const hw = TILE * 2;
            ctx.beginPath();
            ctx.ellipse(x + hw/2, y + TILE*0.44, hw*0.33, TILE*0.17, 0, 0, TAU);
            ctx.clip();
            const pit = ctx.createRadialGradient(x + hw/2, y + TILE*0.36, 1, x + hw/2, y + TILE*0.44, hw*0.34);
            pit.addColorStop(0, '#1c2030');
            pit.addColorStop(0.62, '#080a10');
            pit.addColorStop(1, '#000');
            ctx.fillStyle = pit;
            ctx.fillRect(x + 10, y + 6, hw - 20, TILE - 10);
            ctx.restore();

            ctx.save();
            ctx.translate(x + 7, y + 2);
            for (let i = 0; i < 13; i++) {
              ctx.fillStyle = i % 2 ? '#ffc116' : '#1c1c22';
              ctx.fillRect(i*7, 0, 7, 4);
            }
            ctx.restore();
          }
        }
      }
    }
  }
}

function drawEntities() {
  const p = player;
  for (const e of entities) {
    if (e.dead) continue;
    const x = e.x - camX, y = e.y - camY;
    if (['girder','lunchbox','crate','plate'].includes(e.type) && !e.collected) {
      const cx=x+(e.w||30)/2, cy=y-10+Math.sin(gameTime*4)*3;
      ctx.strokeStyle=settings.highContrast?'#fff':'rgba(255,220,90,.78)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(cx,cy,7+Math.sin(gameTime*5)*1.5,0,TAU);ctx.stroke();
      ctx.fillStyle='#ffd24a';ctx.beginPath();ctx.moveTo(cx,cy+13);ctx.lineTo(cx-5,cy+6);ctx.lineTo(cx+5,cy+6);ctx.closePath();ctx.fill();
    }
    if(e.type==='vandal'||e.type==='osha'){
      const bottom=enemyBottom(e)-camY;ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(e.x-camX,bottom+2,15,4,0,0,TAU);ctx.fill();
    }
    switch (e.type) {
      case 'girder': {
        if (e.collected) break;
        const by = y + Math.sin(e.bob)*3;
        glow(x + 32, by + 9, 36, '#9fd8ff', 0.18);
        ctx.fillStyle = '#6b7488'; rr(ctx, x, by, 64, 14, 2); ctx.fill();
        ctx.fillStyle = '#9aa3b8'; ctx.fillRect(x, by, 64, 4);
        ctx.fillStyle = '#b8c0d4';
        for (const rx of [10, 32, 54]) { ctx.beginPath(); ctx.arc(x+rx, by+8, 2.2, 0, TAU); ctx.fill(); }
        break;
      }
      case 'lunchbox': {
        if (e.collected) break;
        const by = y + Math.sin(e.bob)*3;
        glow(x + 15, by + 10, 30, '#ffe082', 0.22);
        ctx.fillStyle = '#d84848'; rr(ctx, x, by + 5, 30, 17, 3); ctx.fill();
        ctx.fillStyle = '#b83838'; rr(ctx, x + 6, by, 18, 8, 3); ctx.fill();
        ctx.fillStyle = '#e8e2d4'; ctx.fillRect(x + 12, by + 9, 6, 4);
        ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fillRect(x + 3, by + 7, 24, 2);
        break;
      }
      case 'crate': {
        if (e.collected) break;
        const by = y + Math.sin(e.bob)*2.5;
        glow(x + 15, by + 13, 28, '#ffb050', 0.16);
        ctx.fillStyle = '#b07a3c'; rr(ctx, x, by, 30, 26, 3); ctx.fill();
        ctx.strokeStyle = '#7c5424'; ctx.lineWidth = 2.5;
        ctx.strokeRect(x + 4, by + 4, 22, 18);
        ctx.beginPath(); ctx.moveTo(x + 4, by + 4); ctx.lineTo(x + 26, by + 22); ctx.stroke();
        break;
      }
      case 'plate': {
        if (e.collected) break;
        const by = y + Math.sin(e.bob)*3;
        glow(x + 24, by + 7, 32, '#ffb050', 0.2);
        ctx.fillStyle = '#c8762a'; rr(ctx, x, by, 48, 14, 2); ctx.fill();
        ctx.fillStyle = '#ffb050'; ctx.fillRect(x, by, 48, 3.5);
        ctx.fillStyle = '#8a4c14';
        for (const rx of [8, 24, 40]) { ctx.beginPath(); ctx.arc(x+rx, by+8.5, 2.2, 0, TAU); ctx.fill(); }
        break;
      }
      case 'socket': {
        const sx = e.c*TILE - camX, sy = e.r*TILE - camY;
        if (!e.filled) {
          ctx.strokeStyle = 'rgba(255,176,80,' + (0.45 + 0.3*Math.sin(gameTime*4)) + ')';
          ctx.lineWidth = 2.5;
          ctx.setLineDash([7, 5]);
          ctx.strokeRect(sx + 4, sy - 12, TILE*2 - 8, 12);
          ctx.setLineDash([]);
          glow(sx + TILE, sy - 6, 26, '#ffb050', 0.14);
        } else {
          ctx.fillStyle = '#c8762a'; rr(ctx, sx + 2, sy - 13, TILE*2 - 4, 13, 2); ctx.fill();
          ctx.fillStyle = '#ffb050'; ctx.fillRect(sx + 2, sy - 13, TILE*2 - 4, 3);
          if (!e.riveted) {
            ctx.strokeStyle = 'rgba(255,210,74,' + (0.5 + 0.3*Math.sin(gameTime*5)) + ')';
            ctx.lineWidth = 3;
            ctx.strokeRect(sx + 2, sy - 13, TILE*2 - 4, 13);
            if (e.jackP > 0) {
              ctx.fillStyle = 'rgba(0,0,0,0.55)';
              rr(ctx, sx + 6, sy - 28, TILE*2 - 12, 9, 4); ctx.fill();
              ctx.fillStyle = '#ffd24a';
              rr(ctx, sx + 8, sy - 26, (TILE*2 - 16) * Math.min(1, e.jackP), 5, 2); ctx.fill();
            }
          } else {
            ctx.fillStyle = '#ffd24a';
            for (const rx of [12, 48, 84]) { ctx.beginPath(); ctx.arc(sx+rx, sy-7, 2.6, 0, TAU); ctx.fill(); }
          }
        }
        break;
      }
      case 'vandal': drawVandal(e.x - camX, enemyBottom(e) - camY, e); break;
      case 'osha': { const o = {...e, checking: e.checking > 0 || e.aiState==='inspect'}; drawOsha(e.x - camX, enemyBottom(e) - camY, o); break; }
      case 'bolt': {

        ctx.translate(x + 7, y + 7);
        ctx.rotate(e.spin);
        ctx.fillStyle = '#c8ccd8';
        ctx.beginPath();
        for (let i = 0; i < 6; i++) { const a = i*TAU/6; ctx.lineTo(Math.cos(a)*7, Math.sin(a)*7); }
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#7a7f8e';
        ctx.beginPath(); ctx.arc(0, 0, 3, 0, TAU); ctx.fill();
        ctx.restore();
        break;
      }
      case 'blob': {
        ctx.fillStyle = '#a8a8b2';
        ctx.beginPath();
        ctx.ellipse(x + 8, y + 8, 7 + Math.sin(e.wob), 9 - Math.sin(e.wob), 0, 0, TAU);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath(); ctx.arc(x + 5, y + 5, 2.5, 0, TAU); ctx.fill();
        break;
      }
      case 'spigot': {
        ctx.fillStyle = '#3c4254'; ctx.fillRect(x - 6, y - 610, 12, 600); // feed pipe up
        ctx.fillStyle = '#4a5268'; rr(ctx, x - 20, y - 10, 40, 18, 4); ctx.fill();
        ctx.fillStyle = '#363d50'; ctx.fillRect(x - 7, y + 6, 14, 10);
        ctx.fillStyle = '#9aa3b8'; ctx.fillRect(x - 20, y - 10, 40, 4);

      }
      case 'pincers': {
        const cyc = e.ph % 2.2;

        else if (e.closed) open = 2;

          ctx.moveTo(s * (4 + open), -34);
          ctx.quadraticCurveTo(s * (16 + open), -20, s * (3 + open*0.4), -2);

        ctx.restore();
        break;
      }
      case 'dynamite': {
        ctx.save();
        ctx.translate(x + 15, y);
        ctx.fillStyle = '#c83030';
        for (const ddx of [-9, 0, 9]) rr(ctx, ddx - 4, -28, 9, 28, 3), ctx.fill();
        ctx.fillStyle = '#7a1818'; ctx.fillRect(-13, -20, 27, 5);
        ctx.strokeStyle = '#d8c8a8'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, -28); ctx.quadraticCurveTo(4, -36, 9, -34); ctx.stroke();
        if (e.lit) {
          const fuse=clamp(((e.ph%e.cyc)-(e.cyc-1.6))/1.25,0,1);
          ctx.save();ctx.setLineDash([7,6]);ctx.strokeStyle='rgba(255,82,55,'+(.28+.42*fuse)+')';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-14,95,0,TAU);ctx.stroke();ctx.restore();
          glow(9, -34, 14, '#ffe082', 0.7);
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(9, -34, 3 + Math.sin(gameTime*20)*1.5, 0, TAU); ctx.fill();
        }
        if (e.boom) {
          const bt = (e.ph % e.cyc) - (e.cyc - 0.35);
          const br = 30 + bt/0.35 * 70;
          glow(0, -14, br*1.6, '#ff9a3c', 0.8 * (1 - bt/0.35));
          ctx.fillStyle = 'rgba(255,230,150,' + ((settings.reducedFlash ? .28 : .85) * (1 - bt/0.35)) + ')';
          ctx.beginPath(); ctx.arc(0, -14, br, 0, TAU); ctx.fill();
        }
        ctx.restore();
        break;
      }
      case 'poison': {

        if(e.active){ctx.save();ctx.strokeStyle='#9deaff';ctx.lineWidth=3;ctx.shadowColor='#54cfff';ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(x+7,y-8);for(let sy=16;sy<e.h;sy+=12)ctx.lineTo(x+(sy%24?e.w-8:8)+Math.sin(e.x*.07+sy+Math.floor(gameTime*20))*4,y-sy);ctx.stroke();ctx.restore();glow(x+e.w/2,y-e.h/2,34,'#69dfff',.38);}

        ctx.save();

        ctx.beginPath(); ctx.moveTo(pivx, pivy); ctx.lineTo(hx, hy - 26); ctx.stroke();

        ctx.save();ctx.setLineDash([8,9]);ctx.strokeStyle='rgba(255,88,65,.28)';ctx.lineWidth=2;ctx.beginPath();
        for(let i=0;i<=18;i++){const a=lerp(-e.maxA,e.maxA,i/18),ax=e.px+Math.sin(a)*e.len-camX,ay=e.py+Math.cos(a)*e.len-camY;i?ctx.lineTo(ax,ay):ctx.moveTo(ax,ay);}ctx.stroke();ctx.restore();
        ctx.strokeStyle = 'rgba(40,44,58,0.95)'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(pivx, pivy); ctx.lineTo(bx, by); ctx.stroke();

        ctx.beginPath(); ctx.arc(bx, by, e.r, 0, TAU); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(bx, by, e.r - 6, 0.2, 1.4); ctx.stroke();

      }
      case 'magnet': {
        ctx.strokeStyle = 'rgba(150,160,185,0.5)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x + e.w/2, y); ctx.lineTo(x + e.w/2, y - 400); ctx.stroke();
        ctx.fillStyle = e.active ? '#c84040' : '#5a4448';

        ctx.fillStyle = e.active ? '#e86060' : '#6a5458';
        ctx.fillRect(x, y, e.w, 8);
        ctx.fillStyle = '#d8d8e0';
        ctx.fillRect(x + 6, y + e.h - 8, 14, 8); ctx.fillRect(x + e.w - 20, y + e.h - 8, 14, 8);

          ctx.strokeStyle = 'rgba(125,196,255,' + (0.4 + 0.3*Math.sin(e.hum*8)) + ')';
          ctx.lineWidth = 2;
          for (let i = 1; i <= 2; i++) {

      }
      case 'processor': {
        ctx.fillStyle = '#4a4454'; rr(ctx, x, y, e.w, e.h, 5); ctx.fill();
        ctx.fillStyle = '#5a5468'; ctx.fillRect(x, y, e.w, 8);
        // hopper mouth
        ctx.fillStyle = '#23202a';
        ctx.beginPath();
        ctx.moveTo(x + 8, y); ctx.lineTo(x + e.w - 8, y); ctx.lineTo(x + e.w - 20, y + 18); ctx.lineTo(x + 20, y + 18);
        ctx.closePath(); ctx.fill();
