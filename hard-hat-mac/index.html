function drawWorldLighting() {
  // work lamps
  for (const l of bg.lamps) {
    const lx = l.x - camX, ly = l.y - camY;
    if (lx < -200 || lx > viewW + 200) continue;
    const fl = 0.85 + 0.15 * Math.sin(gameTime * 11 + l.flicker);
    // lamp fixture
    ctx.fillStyle = '#23262f';
    ctx.fillRect(lx - 6, ly - 12, 12, 8);
    ctx.fillStyle = '#ffe9b0';
    ctx.beginPath(); ctx.arc(lx, ly - 2, 4, 0, TAU); ctx.fill();
    glow(lx, ly, 70, '#ffc868', 0.22 * fl);
    // light cone
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const cg = ctx.createLinearGradient(0, ly, 0, ly + 200);
    cg.addColorStop(0, 'rgba(255,200,104,' + (0.10*fl) + ')');
    cg.addColorStop(1, 'rgba(255,200,104,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.moveTo(lx - 5, ly); ctx.lineTo(lx + 5, ly);
    ctx.lineTo(lx + 62, ly + 200); ctx.lineTo(lx - 62, ly + 200);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // player headlamp-ish presence glow (subtle)
  if (!player.dead) glow(player.x + P_W/2 - camX, player.y + 14 - camY, 64, '#ffe9c4', 0.07);
}

function drawParticlesAndPopups() {
  for (const p of particles) {
    const a = clamp(p.life / p.maxLife, 0, 1);
    const x = p.x - camX, y = p.y - camY;
    ctx.globalAlpha = a;
    if (p.glow) { ctx.globalCompositeOperation = 'lighter'; }
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath(); ctx.arc(x, y, p.size * a + 0.5, 0, TAU); ctx.fill();
    } else if (p.shape === 'spark') {
      ctx.fillRect(x - p.size/2, y - p.size*1.5, p.size*0.7, p.size*3);
    } else {
      ctx.fillRect(x - p.size/2, y - p.size/2, p.size, p.size);
    }
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.globalAlpha = 1;
  for (const pp of popups) {
    const a = clamp(pp.life, 0, 1);
    ctx.globalAlpha = a;
    ctx.font = 'bold 15px "Arial Black", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText(pp.text, pp.x - camX + 1.5, pp.y - camY + 1.5);
    ctx.fillStyle = pp.color;
    ctx.fillText(pp.text, pp.x - camX, pp.y - camY);
  }
  ctx.globalAlpha = 1;
}

function drawHints() {
  if (!firstRun) return;
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  for (const h of hints) {
    if (!h.cond()) continue;
    if (h.shown > 7) continue;
    const x = h.x - camX, y = h.y - camY + Math.sin(gameTime*2.5)*3;
    const w = ctx.measureText(h.text).width + 22;
    ctx.fillStyle = 'rgba(12,16,32,0.82)';
    rr(ctx, x - w/2, y - 15, w, 24, 12); ctx.fill();
    ctx.strokeStyle = 'rgba(255,210,74,0.5)'; ctx.lineWidth = 1.5;
    rr(ctx, x - w/2, y - 15, w, 24, 12); ctx.stroke();
    ctx.fillStyle = '#ffe9c4';
    ctx.fillText(h.text, x, y + 2);
  }
}

function drawHudIcon(kind,x,y,s=12,color='#ffe082') {
  ctx.save();ctx.translate(x,y);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=Math.max(1.5,s*.13);
  if(kind==='beam'){ctx.fillRect(-s,-s*.25,s*2,s*.5);ctx.fillRect(-s*.75,-s*.55,s*.18,s*1.1);ctx.fillRect(s*.57,-s*.55,s*.18,s*1.1);}
  else if(kind==='lunch'){rr(ctx,-s,-s*.65,s*2,s*1.3,s*.2);ctx.stroke();ctx.beginPath();ctx.arc(0,-s*.65,s*.48,Math.PI,0);ctx.stroke();}
  else if(kind==='crate'){ctx.strokeRect(-s*.75,-s*.75,s*1.5,s*1.5);ctx.beginPath();ctx.moveTo(-s*.65,-s*.65);ctx.lineTo(s*.65,s*.65);ctx.moveTo(s*.65,-s*.65);ctx.lineTo(-s*.65,s*.65);ctx.stroke();}
  else if(kind==='plate'){ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.9,0);ctx.lineTo(0,s);ctx.lineTo(-s*.9,0);ctx.closePath();ctx.fill();}
  else if(kind==='hat'){ctx.beginPath();ctx.arc(0,0,s*.72,Math.PI,0);ctx.fill();rr(ctx,-s,-s*.08,s*2,s*.35,s*.12);ctx.fill();}
  else if(kind==='coffee'){ctx.strokeRect(-s*.65,-s*.55,s*1.1,s*1.05);ctx.beginPath();ctx.arc(s*.5,-s*.05,s*.42,-Math.PI/2,Math.PI/2);ctx.stroke();}
  else if(kind==='watch'){ctx.beginPath();ctx.arc(0,0,s*.82,0,TAU);ctx.stroke();ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-s*.48);ctx.moveTo(0,0);ctx.lineTo(s*.38,s*.18);ctx.stroke();ctx.fillRect(-s*.22,-s*1.08,s*.44,s*.22);}
  else if(kind==='cash'){rr(ctx,-s,-s*.65,s*2,s*1.3,s*.12);ctx.stroke();ctx.font='bold '+Math.round(s*1.25)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',0,1);ctx.textBaseline='alphabetic';}
  ctx.restore();
}
function objectiveTarget() {
  let candidates=[];
  if(level===1) candidates=player.carrying==='girder'?holes.filter(h=>!h.filled).map(h=>({x:(h.c+1)*TILE,y:h.r*TILE})) : entities.filter(e=>e.type==='girder'&&!e.dead);
  else if(level===2) candidates=collectedCount>=totalCollect?entities.filter(e=>e.type==='magnet'):entities.filter(e=>e.type==='lunchbox'&&!e.dead);
  else if(level===3) candidates=player.carrying==='crate'?entities.filter(e=>e.type==='processor'):entities.filter(e=>e.type==='crate'&&!e.dead);
  else candidates=player.carrying==='plate'?entities.filter(e=>e.type==='socket'&&!e.filled):entities.filter(e=>e.type==='plate'&&!e.dead);
  return candidates.sort((a,b)=>((a.x-player.x)**2+(a.y-player.y)**2)-((b.x-player.x)**2+(b.y-player.y)**2))[0]||null;
}
function drawEdgeIndicator(wx,wy,color,label) {
  const sx=wx-camX,sy=wy-camY,margin=72;
  if(sx>=margin&&sx<=viewW-margin&&sy>=margin&&sy<=viewH-margin)return;
  const cx=viewW/2,cy=viewH/2,dx=sx-cx,dy=sy-cy;
  const scale=Math.min((cx-margin)/Math.max(1,Math.abs(dx)),(cy-margin)/Math.max(1,Math.abs(dy)));
  const x=cx+dx*scale,y=cy+dy*scale,a=Math.atan2(dy,dx);
  ctx.save();ctx.translate(x,y);ctx.rotate(a);ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(-7,-7);ctx.lineTo(-7,7);ctx.closePath();ctx.fill();ctx.rotate(-a);
  ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText(label,0,-11);ctx.restore();
}
function drawGuidance() {
  const target=objectiveTarget();if(target)drawEdgeIndicator(target.x+(target.w||0)/2,target.y,'#ffd24a','JOB');
  let shown=0;
  for(const e of entities){
    if(shown>=2)break;let x,y,danger=false;
    if(e.type==='bolt'){x=e.x;y=e.y;danger=true;}
    else if(e.type==='dynamite'&&e.lit){x=e.x;y=e.y;danger=true;}
    else if(e.type==='ball'){x=e.bx;y=e.by;danger=true;}
    else if(e.type==='squasher'){x=e.x+e.w/2;y=e.gapTop+e.ext;danger=true;}
    else if(e.type==='arcVent'&&e.warning){x=e.x+e.w/2;y=e.y-e.h/2;danger=true;}
    if(danger&&Math.hypot(x-player.x,y-player.y)<Math.max(viewW,viewH)*1.4){drawEdgeIndicator(x,y,'#ff5a4f','!');shown++;}
  }
}
function drawHUD() {
  const hs=clamp(Number(settings.hudScale)||1,1,1.3);
  // top bar
  const g = ctx.createLinearGradient(0, 0, 0, 56);
  g.addColorStop(0, 'rgba(8,10,22,0.85)'); g.addColorStop(1, 'rgba(8,10,22,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, viewW, 56);
  // score
  ctx.font = 'bold '+Math.round(22*hs)+'px "Arial Black", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffe082';
  ctx.fillText(Math.round(dispScore).toLocaleString(), 14, 30);
  ctx.font = 'bold '+Math.round(10*hs)+'px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText(viewW < 520 ? 'ROUND ' + round : 'ROUND ' + round + ' · ' + LEVEL_NAMES[level-1], 14, 45);
  // combo
  if (comboMult > 1) {
    const cf = comboTimer / 5;
    ctx.font = 'bold '+Math.round(16*hs)+'px "Arial Black", sans-serif';
    ctx.fillStyle = '#ffb347';
    ctx.fillText('×' + comboMult + ' COMBO', 14, 64);
    ctx.fillStyle = 'rgba(255,179,71,0.3)';
    ctx.fillRect(14, 70, 80 * cf, 3);
  }
  // timer bar (center)
  const tw = Math.min(240, viewW * 0.34);
  const tx = viewW/2 - tw/2, frac = clamp(bonusTimer / bonusTimerMax, 0, 1);
  const low = frac < 0.25;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  rr(ctx, tx - 2, 12, tw + 4, 16, 8); ctx.fill();
  const tc = low ? (settings.reducedFlash ? '#ff6655' : (Math.floor(gameTime*4)%2 ? '#ff5040' : '#ff8060')) : (frac < 0.5 ? '#ffc116' : '#7dffa0');
  ctx.fillStyle = tc;
  rr(ctx, tx, 14, Math.max(4, tw * frac), 12, 6); ctx.fill();
  ctx.font = 'bold '+Math.round(11*hs)+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#0a0c18';
  ctx.fillText('⏱ ' + Math.ceil(bonusTimer), viewW/2, 24);
  if (freezeTimer > 0) {
    ctx.fillStyle = '#7dc4ff';
    ctx.fillText('❄ FROZEN ' + Math.ceil(freezeTimer), viewW/2, 42);
  }
  // objective progress (under timer)
  ctx.font = 'bold '+Math.round(12*hs)+'px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const oy=freezeTimer>0?56:42,objKinds=['beam','lunch','crate','plate'];
  drawHudIcon(objKinds[level-1],viewW/2-27*hs,oy-4,8*hs,'#ffe082');
  ctx.fillText(collectedCount+' / '+totalCollect,viewW/2+8*hs,oy);
  // lives (mini hard hats), right side before mute button
  for (let i = 0; i < lives; i++) {
    const lx = viewW - 64 - i * 24, ly = 20;
    ctx.fillStyle = '#ffc116';
    ctx.beginPath(); ctx.arc(lx, ly, 8, Math.PI, 0); ctx.fill();
    rr(ctx, lx - 10, ly - 2, 20, 4, 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(lx, ly, 8, Math.PI*1.2, Math.PI*1.5); ctx.lineTo(lx, ly); ctx.fill();
  }
  // power-up status icons
  let px = viewW - 64; const py = 44;
  if(shieldOn){drawHudIcon('hat',px,py-5,8,'#ffd24a');px-=24;}
  if(speedTimer>0){drawHudIcon('coffee',px,py-5,8,'#d7a46b');px-=24;}
  // foreman toasts
  if (toasts.length) {
    const t = toasts[0];
    const slide = ease(clamp(t.t / 0.25, 0, 1)) * (t.t > t.dur - 0.3 ? 1 - ease(clamp((t.t - (t.dur-0.3))/0.3, 0, 1)) : 1);
    if (t.t < t.dur) {
      ctx.font = 'bold 13px sans-serif';
      const tw2 = Math.min(viewW - 40, ctx.measureText(t.text).width + 30);

// ---------- high scores ----------
let hsRows = null, hsLoading = false, hsGlobal = false;
let hsEntry = {initials:['A','A','A'], pos:0, submitting:false};
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 '.split('');
const scoreExtra = () => 'R' + round + ' S' + runSeed.toString(36).toUpperCase()+' '+runDifficulty[0].toUpperCase()+(runMode==='daily'?' DAILY':'');
function scoreProof(){const replay=finalizeReplay();return{seed:runSeed>>>0,mode:runMode,difficulty:runDifficulty,elapsedSeconds:Math.round(runElapsed*10)/10,checksum:replay?.checksum||'00000000',resumed:resumedRun};}
function getLocalScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY) || '[]'); } catch(e) { return []; }
}
function saveLocalScore(name, sc, extra) {
  const rows = getLocalScores();
  rows.push({name, score: sc, extra});
  rows.sort((a,b) => b.score - a.score);
  rows.length = Math.min(rows.length, 10);
  try { localStorage.setItem(HS_KEY, JSON.stringify(rows)); } catch(e) {}
  return rows;
}
async function fetchScores() {
  hsLoading = true;
  try {
    const ctl = new AbortController();
    const tm = setTimeout(() => ctl.abort(), 8000);
    const r = await fetch(SCORES_API, {signal: ctl.signal});
    clearTimeout(tm);
    if (!r.ok) throw new Error('score service '+r.status);
    const data = await r.json();
    const rows = (Array.isArray(data) ? data : (data.scores || []))
      .map(r2 => ({name:String(r2.initials || r2.name || '???').toUpperCase().replace(/[^A-Z0-9 ]/g,'').slice(0,3).padEnd(3,'?'), score:Number(r2.score), extra:String(r2.extra || '').slice(0,32)}))
      .filter(r2=>Number.isSafeInteger(r2.score)&&r2.score>0&&r2.score<=10000000)
      .sort((a,b) => b.score - a.score);
    hsRows = rows.slice(0, 10);
    hsGlobal = true;
  } catch(e) {
    hsRows = getLocalScores();
    hsGlobal = false;
  }
  hsLoading = false;
}
async function submitScore(initials) {
  if (hsEntry.submitting) return;
  hsEntry.submitting = true; announce('Submitting score.');
  saveLocalScore(initials, score, scoreExtra());
  try { localStorage.setItem(NAME_KEY, initials); } catch(e) {}
  const payload={initials,score,extra:scoreExtra(),proof:scoreProof()};
  const validation=HHMSupport.validateScorePayload(payload);
  const localOnly=runDifficulty==='practice'||resumedRun||!validation.ok;
  try {
    if(localOnly)throw new Error(validation.reason||'Local-only run');
    const ctl = new AbortController();
    const tm = setTimeout(() => ctl.abort(), 8000);
    const response = await fetch(SCORES_API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(validation.payload),
      signal: ctl.signal,
    });
    clearTimeout(tm);
    if (!response.ok) throw new Error('score submission '+response.status);
  } catch(e) {if(localOnly)toast('📻 Score saved locally — '+(runDifficulty==='practice'?'practice mode':resumedRun?'resumed shift':'run proof unavailable')+'.');}
  hsEntry.submitting = false;
  hsRows = null;
  openScores();
}
function openScores() {
  state = 'hsView';
  hsRows = null;
  fetchScores();
}
function qualifies() {
  const rows = hsRows && hsGlobal ? hsRows : getLocalScores();
  if (score <= 0) return false;
  if (!rows || rows.length < 10) return true;
  return score > rows[rows.length-1].score;
}
function leaveGameOver() {
  SFX.ui();
  // pre-fetch then decide
  if (score > 0) {
    let saved = '';
    try { saved = localStorage.getItem(NAME_KEY) || ''; } catch(e) {}
    if (saved && saved.length === 3) hsEntry.initials = saved.split('');
    hsEntry.pos = 0;
    state = 'hsEntry';
  } else {
    goTitle();
  }
}
function hsKeydown(k, e) {
  if (/^[a-zA-Z0-9]$/.test(k)) {
    hsEntry.initials[hsEntry.pos] = k.toUpperCase();
    hsEntry.pos = Math.min(2, hsEntry.pos + 1);
    SFX.tick();
    return;
  }
  if (k === 'ArrowLeft') { hsEntry.pos = Math.max(0, hsEntry.pos - 1); SFX.tick(); }
  if (k === 'ArrowRight') { hsEntry.pos = Math.min(2, hsEntry.pos + 1); SFX.tick(); }
  if (k === 'ArrowUp' || k === 'ArrowDown') {
    const d = k === 'ArrowUp' ? -1 : 1;
    const cur = LETTERS.indexOf(hsEntry.initials[hsEntry.pos]);
    hsEntry.initials[hsEntry.pos] = LETTERS[(cur + d + LETTERS.length) % LETTERS.length];
    SFX.tick();
  }
  if (k === 'Backspace') { e.preventDefault(); hsEntry.pos = Math.max(0, hsEntry.pos - 1); }
  if (k === 'Enter') { SFX.ui(); submitScore(hsEntry.initials.join('')); }
  if (k === 'Escape') { SFX.ui(); goTitle(); }
}

// MAIN LOOP
// ============================================================
const FIXED_DT = 1/60;
let lastT = 0, accumulator = 0, tallyTickTimer = 0,qualitySampleT=0,qualityFrames=0;
function frame(t) {
  requestAnimationFrame(frame);
  if (!lastT) lastT = t;
  const elapsed = Math.min(.25, Math.max(0,(t-lastT)/1000));
  lastT = t;
  pollGamepad(); mergeKeys();
  accumulator = Math.min(.25, accumulator + elapsed);
  let steps = 0;
  while (accumulator >= FIXED_DT && steps++ < 12) { updateFixed(FIXED_DT); accumulator -= FIXED_DT; }
  renderFrame();
  qualitySampleT+=elapsed;qualityFrames++;
  if(settings.quality==='auto'&&qualitySampleT>=5){
    adaptiveFps=qualityFrames/qualitySampleT;qualitySampleT=0;qualityFrames=0;
    const next=HHMSupport.qualityProfile('auto',{fps:adaptiveFps});
    if(next!==qualityLevel){qualityLevel=next;resize();announce('Graphics quality adjusted to '+next+'.');}
  }
}
function updateUiTimers(dt) {
  dispScore = Math.abs(score-dispScore)<2 ? score : lerp(dispScore,score,1-Math.pow(.82,dt*60));
  if (state !== 'paused') {
    if (shakeTime > 0) { shakeTime=Math.max(0,shakeTime-dt); if (!shakeTime) shakeAmp=0; }
    for (const h of hints) if (h.cond() && h.shown<=7) h.shown += dt;
    if (toasts.length) {
      toasts[0].t += dt;
      if (toasts[0].t >= toasts[0].dur) { toasts.shift(); if (toasts.length) SFX.radio(); }
    }
  }
}
function updateFixed(dt) {
  updateUiTimers(dt);
  if (state === 'title') {
    if (music.track !== 'title') startMusic('title');
    titleT += dt; gameTime += dt; updateParticles(dt);
    if (chance(1.2,dt)) {
      const sw=Math.min(440,viewW-60), signTop=viewH<520?6:Math.max(18,viewH*.13-60);
      spawnP(viewW/2+camX+sw/2-10,signTop+5+camY,settings.reducedMotion?1:5,{color:['#ffd24a','#fff'],sMax:120,lMax:.4,glow:true,shape:'spark'});
    }
  } else if (state === 'levelIntro') {
    gameTime += dt; levelIntroT += dt; updateCamera(dt);
    if (levelIntroT > 2.2) {
      uiButtons=[]; uiFocusId=null; state='playing';
      const msg = level===1&&round===1 ? FOREMAN.l1 : FOREMAN['l'+level];
      toast('📻 '+msg); announce('Level '+level+'. '+LEVEL_NAMES[level-1]+'. '+LEVEL_OBJ[level-1]);
    }
  } else if (state === 'playing') {
    let simDt=dt;
    if (hitStop>0) { hitStop=Math.max(0,hitStop-dt); simDt=.001; }
    gameTime += simDt;runElapsed+=simDt;comboTimer -= simDt;
    if (comboTimer<=0&&comboMult>1) comboMult=1;
    freezeTimer=Math.max(0,freezeTimer-simDt); speedTimer=Math.max(0,speedTimer-simDt);
    if (!levelDone&&!player.dead) {
      bonusTimer-=simDt; music.danger=bonusTimer/bonusTimerMax<.25;
      if (bonusTimer<12&&bonusTimer>0) {
        warnBeep-=simDt;
        if(warnBeep<=0){SFX.warn();warnBeep = bonusTimer < 5 ? .4 : .8;}
        if(Math.abs(bonusTimer-11)<simDt) toast('📻 '+FOREMAN.hurry[randi(0,FOREMAN.hurry.length-1)]);
      }
      if(bonusTimer<=0){bonusTimer=0;killPlayer('timer');}
    } else music.danger=false;
    if(!levelDone&&!player.dead){
      powerSpawnTimer-=simDt;
      if(powerSpawnTimer<=0){powerSpawnTimer=rand(16,26);if(!entities.some(e=>e.type==='powerup'))spawnPowerup();}
    }
    if(player.magnetGrab>0&&!endSequence){endSequence={kind:'magnetGrab',t:0};levelDone=true;SFX.levelDone();}
    updatePlatforms(simDt);
    updatePlayer(simDt);
    updateEntities(simDt);
    recordReplayFrame();resumeSaveTimer-=simDt;if(resumeSaveTimer<=0){resumeSaveTimer=10;saveResume();}
    updateEndSequence(simDt);
    updateParticles(simDt);
    updateCamera(simDt);
  } else if (state === 'levelComplete' || state === 'roundComplete') {
    gameTime+=dt; tallyShown=Math.min(1,tallyShown+dt*.7); updateParticles(dt);
    if(state==='roundComplete'&&chance(18,dt)) spawnP(camX+rand(0,viewW),camY+rand(0,viewH*.5),1,{color:['#ffd24a','#ff6a5a','#7dffa0','#7dc4ff'],sMax:100,up:50,lMax:1.2,glow:true,shape:'circle'});
    tallyTickTimer-=dt;
    if(tallyShown<1&&tallyTickTimer<=0){SFX.tick();tallyTickTimer=.085;}
  } else if (state === 'gameOver') {
    gameOverT+=dt; gameTime+=dt; updateParticles(dt);
  } else if (state === 'hsEntry' || state === 'hsView' || state === 'howto' || state === 'settings' || state === 'controlsSetup' || state==='achievements' || state==='touchSetup') {
    gameTime+=dt;
  }
}

// ---------- debug hooks (headless testing) ----------
function runSoakTests(seedCount=100,stepsPerLevel=240){
  seedCount=clamp(Math.floor(Number(seedCount)||100),1,500);stepsPerLevel=clamp(Math.floor(Number(stepsPerLevel)||240),60,1200);
  const failures=[],started=performance.now(),oldDifficulty=runDifficulty;
  const fail=(seed,lv,message)=>{if(failures.length<50)failures.push({seed,level:lv,message});};
  for(let i=0;i<seedCount;i++){
    const seed=HHMSupport.hash32('soak:'+i);seedRun(seed);round=1+(i%5);runDifficulty=['practice','standard','foreman'][i%3];
    for(let lv=1;lv<=4;lv++){
      try{
        level=lv;genLevel(lv,true);player.invuln=99999;bonusTimer=99999;
        if(!reachablePowerSpots.length)fail(seed,lv,'No reachable power-up spots.');
        for(const e of entities.filter(v=>['girder','lunchbox','crate','plate'].includes(v.type))){
          const row=Math.round((e.y+(e.h||0))/TILE),col=clamp(Math.floor((e.x+(e.w||0)/2)/TILE),0,levelW-1);
          let id=navigationGraph.componentAt[row+','+col];if(id===undefined)id=navigationGraph.components.find(c=>c.row===row&&col>=c.start&&col<=c.end)?.id;
          if(id===undefined||!navigationGraph.reachable.has(id))fail(seed,lv,'Objective '+e.id+' is outside the reachable navigation graph (row '+row+', col '+col+', component '+id+', reachable '+[...navigationGraph.reachable].join('/')+').');
        }
        for(const e of entities.filter(v=>['vandal','osha','arcVent','dynamite','pincers','poison'].includes(v.type))){
          const ey=e.row!==undefined?e.row*TILE:e.y;if(Math.abs(ey-(player.y+P_H))<TILE&&Math.abs(e.x-player.x)<TILE*1.5)fail(seed,lv,'Lethal spawn is too close to the player.');
        }
        for(let step=0;step<stepsPerLevel;step++){updatePlatforms(FIXED_DT);updateEntities(FIXED_DT);updateParticles(FIXED_DT);for(const e of entities)for(const key of ['x','y','hx','hy','bx','by','t','ph','ext'])if(e[key]!==undefined&&!Number.isFinite(e[key]))throw new Error(e.type+'.'+key+' became non-finite');}
        state='levelIntro';renderFrame();
        if(lv===1)holes.forEach(h=>h.riveted=true);else if(lv===2||lv===3)collectedCount=totalCollect;else entities.filter(e=>e.type==='socket').forEach(e=>e.riveted=true);
        checkLevelDone();if(lv===2){if(!entities.find(e=>e.type==='magnet')?.active)fail(seed,lv,'Completion did not activate magnet.');}else if(!levelDone)fail(seed,lv,'Completion state did not arm.');
      }catch(error){fail(seed,lv,String(error.message||error));}
    }
  }
  runDifficulty=oldDifficulty;goTitle();
  return{ok:failures.length===0,seeds:seedCount,levels:seedCount*4,steps:seedCount*4*stepsPerLevel,failures,durationMs:Math.round(performance.now()-started)};
}
function runSelfTests() {
  const results=[];
  const test=(name,fn)=>{try{fn();results.push({name,ok:true});}catch(error){results.push({name,ok:false,error:String(error.message||error)});}};
  const assert=(value,message)=>{if(!value)throw new Error(message);};
  state='paused';
  test('seeded RNG is reproducible',()=>{seedRun(12345);const a=[random(),random(),random()];seedRun(12345);const b=[random(),random(),random()];assert(JSON.stringify(a)===JSON.stringify(b),'random streams differ');});
  test('daily seed is stable within a UTC day',()=>{const a=HHMSupport.dailySeed(new Date('2026-07-15T01:00:00Z')),b=HHMSupport.dailySeed(new Date('2026-07-15T23:59:59Z'));assert(a===b&&a!==HHMSupport.dailySeed(new Date('2026-07-16T00:00:00Z')),'daily seed drifted');});
  test('score proof validation rejects local-only modes',()=>{const base={initials:'MAC',score:1200,proof:{seed:1,mode:'random',difficulty:'standard',elapsedSeconds:30,checksum:'1234abcd'}};assert(HHMSupport.validateScorePayload(base).ok,'valid proof rejected');base.proof.difficulty='practice';assert(!HHMSupport.validateScorePayload(base).ok,'practice proof accepted');});
  test('resume snapshots reject and bound unsafe state',()=>{assert(!HHMSupport.sanitizeResume({version:1,seed:1,score:0,lives:3,round:1,level:9,bonusTimer:4}),'invalid level accepted');assert(!HHMSupport.sanitizeResume({version:1,seed:1,score:0,lives:3,round:1,level:1,bonusTimer:4,difficulty:'impossible'}),'invalid difficulty accepted');const safe=HHMSupport.sanitizeResume({version:1,seed:1,score:0,lives:3,round:1,level:1,bonusTimer:9999,holes:Array(20).fill({filled:1,jackP:9})});assert(safe.holes.length===8&&safe.holes[0].jackP===1&&safe.bonusTimer===600,'snapshot bounds failed');});
  test('adaptive quality protects constrained devices',()=>{assert(HHMSupport.qualityProfile('auto',{fps:35})==='low','low frame rate was not downgraded');assert(HHMSupport.dprCap('low')<HHMSupport.dprCap('high'),'DPR caps are not ordered');});
  test('collected lunchboxes stay collected after regeneration',()=>{
    level=2;round=1;genLevel(2,true);const boxes=entities.filter(e=>e.type==='lunchbox');
    for(const e of boxes.slice(0,2)){itemState[e.id]='collected';e.collected=true;e.dead=true;}
    collectedCount=2;genLevel(2,false);
    assert(collectedCount===2,'counter was not preserved');
    assert(entities.filter(e=>e.type==='lunchbox'&&!e.dead).length===3,'collected boxes respawned');
  });
  test('carried objective respawns on death',()=>{
    level=3;genLevel(3,true);const crate=entities.find(e=>e.type==='crate');player.carrying='crate';player.carryId=crate.id;itemState[crate.id]='carried';crate.dead=true;
    genLevel(3,false);assert(itemState[crate.id]==='available','carried state not released');assert(entities.some(e=>e.id===crate.id&&!e.dead),'crate did not respawn');
  });
  test('delivered crates remain delivered after regeneration',()=>{
    level=3;genLevel(3,true);const crate=entities.find(e=>e.type==='crate');itemState[crate.id]='delivered';crate.dead=true;collectedCount=1;genLevel(3,false);
    assert(collectedCount===1,'delivery count changed');assert(!entities.some(e=>e.id===crate.id&&!e.dead),'delivered crate respawned');
  });
  test('all levels expose reachable power-up spots',()=>{for(let lv=1;lv<=4;lv++){level=lv;genLevel(lv,true);assert(reachablePowerSpots.length>0,'level '+lv+' has no reachable spots');}});
  test('ladder tops remain one-way standable links',()=>{level=1;genLevel(1,true);assert(ladderLinks.length===4,'ladder graph incomplete');for(const l of ladderLinks)assert(isStandable(l.c,l.top),'ladder top not standable');});
  test('moving platforms publish current-frame deltas',()=>{level=4;genLevel(4,true);const hook=entities.find(e=>e.type==='hook');updatePlatforms(FIXED_DT);assert(Number.isFinite(hook.dx)&&Number.isFinite(hook.dy),'hook delta invalid');});
  test('platform riders consume exactly one current delta',()=>{
    level=1;genLevel(1,true);const lift=entities.find(e=>e.type==='elevator');lift.y=lift.maxY-2;lift.dir=1;player.onPlatform=lift;player.x=lift.x+10;player.y=lift.y-P_H;updatePlatforms(FIXED_DT);const before=player.y,dy=lift.dy;updatePlayer(.0001);assert(Math.abs((player.y-before)-dy)<1,'rider delta applied incorrectly');
  });
  test('UI timers are independent of render rate',()=>{
    hints=[{cond:()=>true,shown:0}];toasts=[];state='playing';for(let i=0;i<120;i++)updateUiTimers(1/120);const a=hints[0].shown;
    hints=[{cond:()=>true,shown:0}];for(let i=0;i<30;i++)updateUiTimers(1/30);const b=hints[0].shown;assert(Math.abs(a-b)<.001,'timers diverged');
  });
  test('gamepad release clears every action',()=>{for(const k in gKeys)gKeys[k]=true;clearGamepadKeys();assert(Object.values(gKeys).every(v=>!v),'stuck gamepad action');});
  test('sub-frame jump taps are queued',()=>{for(const k in kKeys)kKeys[k]=false;for(const k in tKeys)tKeys[k]=false;for(const k in gKeys)gKeys[k]=false;jumpQueued=true;mergeKeys();assert(keys.jump&&!jumpQueued,'queued tap was lost');keys.jump=false;});
  test('every level completion path arms its ending',()=>{
    level=1;genLevel(1,true);holes.forEach(h=>h.riveted=true);checkLevelDone();assert(levelDone&&endSequence,'level 1 did not complete');
    level=2;genLevel(2,true);collectedCount=totalCollect;checkLevelDone();assert(entities.find(e=>e.type==='magnet').active,'level 2 magnet inactive');
    level=3;genLevel(3,true);collectedCount=totalCollect;checkLevelDone();assert(levelDone&&endSequence,'level 3 did not complete');
    level=4;genLevel(4,true);entities.filter(e=>e.type==='socket').forEach(e=>e.riveted=true);checkLevelDone();assert(levelDone&&endSequence?.kind==='flag','level 4 did not complete');
  });
  test('every level renders before its first simulation tick',()=>{for(let lv=1;lv<=4;lv++){level=lv;genLevel(lv,true);state='levelIntro';levelIntroT=0;renderFrame();}});
  test('timer death respects invulnerability rules',()=>{level=1;genLevel(1,true);player.invuln=0;player.dead=false;killPlayer('timer');assert(player.dead,'timer did not kill player');});
  test('title exposes complete accessible menu',()=>{state='title';renderFrame();for(const id of ['start','scores','howto','settings'])assert(uiButtons.some(b=>b.id===id),'missing '+id);});
  test('remapped controls propagate to player guidance',()=>{const old=keyBindings.jump.slice();keyBindings.jump=['q'];assert(controlSummary().includes('Q jump'),'guidance ignored remap');keyBindings.jump=old;});
  test('remapping removes conflicting actions',()=>{const old=JSON.parse(JSON.stringify(keyBindings));setBinding('jump','d',false);assert(bound('jump','d')&&!bound('right','d'),'conflicting action retained');assert(keyBindings.right.length>0,'right lost every binding');keyBindings=old;});
  test('effects stay within performance budgets',()=>{particles=[];popups=[];spawnP(0,0,700,{color:'#fff'});for(let i=0;i<80;i++)popup(0,0,'TEST');assert(particles.length===500&&popups.length===36,'effect cap failed');particles=[];popups=[];});
  goTitle();
  return results;
}
window.__g = {
  get state() { return state; },
  set state(s) { state = s; },
  get score() { return score; },
  set score(v) { score = v; },
  get level() { return level; },
  get round() { return round; },
  get lives() { return lives; },
  set lives(v) { lives = v; },
  get player() { return player; },
  get entities() { return entities; },
  get holes() { return holes; },
  get bonusTimer() { return bonusTimer; },
  get collected() { return collectedCount; },
  get itemState() { return {...itemState}; },
  get runSeed() { return runSeed; },
  get reachablePowerSpots() { return reachablePowerSpots.map(v=>({...v})); },
  keys, kKeys,
  start: startGame,
  setSeed: seedRun,
  selfTest: runSelfTests,
  soak: runSoakTests,
  skipToLevel(lv) { level = lv; startLevel(); state = 'playing'; },
  winLevel() { beginLevelEnd('debug'); },
  kill() { player.invuln = 0; killPlayer('debug'); },
  give(kind) { entities.push({type:'powerup', kind, x:player.x, y:player.y, w:30, h:30, life:9, bob:0}); },
  step(ms) {
    const steps=Math.max(1,Math.ceil((ms||16.7)/1000/FIXED_DT));
    for(let i=0;i<steps;i++)updateFixed(FIXED_DT);
    renderFrame();
  },
  snap(w) { // small JPEG of the canvas for headless visual checks
    const s = (w || 420) / canvas.width;
    const cv = makeCanvas(Math.round(canvas.width*s), Math.round(canvas.height*s));
    cv.getContext('2d').drawImage(canvas, 0, 0, cv.width, cv.height);
    return cv.toDataURL('image/jpeg', 0.55);
  },
};
