    ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Additive glow layer
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    const s = worldToScreen(p.x, p.y);
    const alpha = (p.life / p.maxLife);
    ctx.globalAlpha = alpha * 0.35;
    const sz = p.size * SCALE * 2.5;
    const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sz);
    glow.addColorStop(0, p.color);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(s.x - sz, s.y - sz, sz*2, sz*2);
  }
  ctx.restore();
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const s = worldToScreen(ft.x, ft.y);
    const alpha = Math.min(1, ft.life * 2);
    const fs = Math.floor(14 * SCALE);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center';
    // Glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = alpha * 0.4;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 8 * SCALE;
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, s.x, s.y);
    ctx.restore();
    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillText(ft.text, s.x + 1, s.y + 1);
    // Text
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, s.x, s.y);
    ctx.restore();
  }
}

function drawHUD() {
  const pad = 10;
  const fs = Math.floor(16 * Math.min(SCALE, 1.2));
  ctx.font = `bold ${fs}px sans-serif`;
  ctx.textBaseline = 'top';

  // Score
  ctx.fillStyle = '#000';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, pad + 1, pad + 1);
  ctx.fillStyle = '#fff';
  ctx.fillText('SCORE: ' + score, pad, pad);

  // Level
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.fillText('LEVEL ' + level, W/2 + 1, pad + 1);
  ctx.fillStyle = '#ff0';
  ctx.fillText('LEVEL ' + level, W/2, pad);

  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#000';
  ctx.fillText('LIVES: ' + lives, W - pad + 1, pad + 1);
  ctx.fillStyle = '#f44';
  ctx.fillText('LIVES: ' + lives, W - pad, pad);

  // Chain combo indicator
  if (chainCount > 1 && chainTimer > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0';
    ctx.globalAlpha = chainTimer / 1.5;
    ctx.font = `bold ${Math.floor(20 * SCALE)}px sans-serif`;
    ctx.fillText('COMBO x' + chainCount, W/2, pad + fs + 5);
    ctx.globalAlpha = 1;
  }
}

function draw(t) {
  ctx.clearRect(0, 0, W, H);

  // Screen shake
  if (screenShake > 0) {
    ctx.save();
    ctx.translate(
      (Math.random() - 0.5) * screenShake * SCALE,
      (Math.random() - 0.5) * screenShake * SCALE
    );
  }

  drawBackground(t / 1000);
  drawPlatforms();

  // Draw game objects
  for (const f of fruits) drawFruit(f);
  for (const en of enemies) {
    if (en.alive && !en.trapped) drawEnemy(en);
  }
  for (const b of bubbles) drawBubble(b);
  drawDragon(player);
  drawParticles();
  drawFloatingTexts();

  if (screenShake > 0) ctx.restore();

  drawHUD();
}

// ==================== GAME LOOP ====================
let lastTime = 0;

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastTime) / 1000, MAX_DT);
  lastTime = ts;

  if (gameState === 'playing') {
    update(dt);
  }

  if (gameState === 'playing' || gameState === 'levelClear' || gameState === 'paused') {
    draw(ts);
    if (gameState === 'paused') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      ctx.font = `bold ${Math.floor(36 * SCALE)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText('PAUSED', W/2, H/2);
    }
  } else if (gameState === 'title' || gameState === 'gameOver' || gameState === 'highScores') {
    // Draw animated background for menus
    ctx.clearRect(0, 0, W, H);
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(1, '#1a1a4e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // Floating bubbles on title
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 20; i++) {
      const bx = (i * 73 + ts * 0.02 * (i%3+1)) % W;
      const by = H - ((i * 97 + ts * 0.03 * (i%2+1)) % (H + 100));
      const br = 10 + (i % 5) * 5;
      const hue = (ts * 0.03 + i * 30) % 360;
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = `hsl(${hue}, 70%, 60%)`;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ==================== UI HANDLERS ====================
function addBtnHandler(id, fn) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('click', (e) => { e.stopPropagation(); fn(); });
  btn.addEventListener('touchend', (e) => { e.stopPropagation(); });
}

addBtnHandler('startBtn', () => {
  initAudio();
  score = 0;
  lives = 3;
  level = 1;
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('pauseBtn').classList.remove('hidden');
  startLevel();
});

addBtnHandler('restartBtn', () => {
  initAudio();
  score = 0;
  lives = 3;
  level = 1;
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('pauseBtn').classList.remove('hidden');
  startLevel();
});

addBtnHandler('scoresBtn', () => {
  document.getElementById('titleScreen').classList.add('hidden');
  showHighScores('title');
});

addBtnHandler('scoresBtn2', () => {
  document.getElementById('gameOverScreen').classList.add('hidden');
  showHighScores('gameOver');
});

addBtnHandler('backBtn', () => {
  const hs = document.getElementById('highScoreScreen');
  const ret = hs._returnTo || 'title';
  hs.classList.add('hidden');
  if (ret === 'title') document.getElementById('titleScreen').classList.remove('hidden');
  else if (ret === 'gameOver') document.getElementById('gameOverScreen').classList.remove('hidden');
});

addBtnHandler('muteBtn', () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.4;
});

addBtnHandler('pauseBtn', () => {
  if (gameState === 'playing') {
    gameState = 'paused';
    stopMusic();
    document.getElementById('pauseBtn').textContent = '▶';
  } else if (gameState === 'paused') {
    gameState = 'playing';
    startMusic();
    document.getElementById('pauseBtn').textContent = '⏸';
  }
});

// Prevent default on game canvas
document.addEventListener('gesturestart', e => e.preventDefault());

// Start
requestAnimationFrame(gameLoop);
</script>
