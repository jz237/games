.btn:active{transform:scale(0.95)}
.btn-small{padding:8px 20px;font-size:clamp(12px,2vw,16px)}
#muteBtn{position:fixed;top:10px;right:10px;z-index:20;background:rgba(0,0,0,0.6);border:1px solid #fff4;color:#fff;border-radius:8px;padding:8px 12px;font-size:18px}
#pauseBtn{position:fixed;top:10px;right:60px;z-index:20;background:rgba(0,0,0,0.6);border:1px solid #fff4;color:#fff;border-radius:8px;padding:8px 12px;font-size:14px}
.score-entry{display:flex;align-items:center;gap:8px;margin:8px 0}
.score-entry .letter-select{display:flex;flex-direction:column;align-items:center}
.score-entry .letter-select button{background:#224;color:#ff0;border:1px solid #ff0;border-radius:6px;width:36px;height:30px;font-size:18px;font-weight:bold}

.hidden{display:none!important}

<p>👉 HOLD RIGHT = walk right (auto-shoots)</p>

// ==================== CONSTANTS ====================
const W_BASE = 480, H_BASE = 640;

// ==================== CANVAS SETUP ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, SCALE, DPR;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  SCALE = Math.min(W / W_BASE, H / H_BASE);
}
resize();
window.addEventListener('resize', resize);

// ==================== AUDIO ====================
let audioCtx = null;
let muted = false;
let masterGain = null;
let musicGain = null;
let musicPlaying = false;
let musicInterval = null;

function initAudio() {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.connect(audioCtx.destination);
      masterGain.gain.value = 0.4;
      musicGain = audioCtx.createGain();
      musicGain.connect(masterGain);
      musicGain.gain.value = 0.15;
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}
}

function playTone(freq, dur, type='sine', vol=0.3, sweep=0) {
  if (!audioCtx || muted) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (sweep) o.frequency.linearRampToValueAtTime(sweep, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g);
    g.connect(masterGain);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playNoise(dur, vol=0.2) {
  if (!audioCtx || muted) return;
  try {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'highpass';
    filt.frequency.value = 2000;
    src.connect(filt);
    filt.connect(g);
    g.connect(masterGain);
    src.start();
  } catch(e) {}
}

// Simple background music

  392,440,523,659,523,440,392,349,
  392,440,523,440,392,349,330,392
];
let melodyIdx = 0;
let melodyTime = 0;

function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  melodyIdx = 0;
  melodyTime = 0;
}
function stopMusic() {
  musicPlaying = false;
}
function updateMusic(dt) {
  if (!musicPlaying || muted || !audioCtx) return;
  melodyTime += dt;
  if (melodyTime >= 0.214) { // ~140bpm, 16th notes feel
    melodyTime -= 0.214;
    try {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.value = MELODY_NOTES[melodyIdx % MELODY_NOTES.length];
      g.gain.setValueAtTime(0.06, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
      o.connect(g);
      g.connect(musicGain);
      o.start();
      o.stop(audioCtx.currentTime + 0.2);
    } catch(e) {}
    melodyIdx++;

}

// ==================== PLATFORM / COLLISION HELPERS ====================
let platforms = []; // current level platforms in world coords
let worldW, worldH;

function buildLevel(n) {
  const def = LEVEL_DEFS[(n - 1) % LEVEL_DEFS.length];
  worldW = 15 * TILE;
  worldH = 20 * TILE;
  platforms = [];
  // Bottom floor (always)
  // Side walls - thin platforms for boundary feel but we use screen wrapping
  for (const p of def.platforms) {
    platforms.push({ x: p.x * TILE, y: p.y * TILE, w: p.w * TILE, h: TILE });
  }
  // Spawn enemies
  enemies = [];
  for (const e of def.enemies) {
    spawnEnemy(e.type, e.x * TILE + 16, e.y * TILE - 16);
  }
  specialBubbleTimer = SPECIAL_BUBBLE_INTERVAL * 0.6;
}

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function isOnPlatform(entity) {
  const feet = { x: entity.x - entity.w/2, y: entity.y, w: entity.w, h: 4 };
  for (const p of platforms) {
    if (rectOverlap(feet, p) && entity.vy >= 0) return true;
  }
  return false;
}

function resolveCollisions(entity) {
  const hw = entity.w / 2;
  for (const p of platforms) {
    const ex = entity.x - hw, ey = entity.y - entity.h;
    const ew = entity.w, eh = entity.h;
    if (ex < p.x + p.w && ex + ew > p.x && ey < p.y + p.h && ey + eh > p.y) {
      const overlapTop = (ey + eh) - p.y;
      const overlapBot = (p.y + p.h) - ey;
      const overlapLeft = (ex + ew) - p.x;
      const overlapRight = (p.x + p.w) - ex;
      const minOverlap = Math.min(overlapTop, overlapBot, overlapLeft, overlapRight);
      if (minOverlap === overlapTop && entity.vy >= 0) {
        entity.y = p.y;
        entity.vy = 0;
        entity.grounded = true;
      } else if (minOverlap === overlapBot && entity.vy < 0) {
        entity.y = p.y + p.h + entity.h;
        entity.vy = 0;
      }
    }
  }
  // Screen wrap horizontal
  if (entity.x < -hw) entity.x = worldW + hw;
  if (entity.x > worldW + hw) entity.x = -hw;
  // Wrap vertical (fall through bottom → top)
  if (entity.y > worldH + entity.h) entity.y = -entity.h;
  if (entity.y < -entity.h * 2) entity.y = worldH + entity.h;
}

// ==================== PLAYER ====================
function createPlayer() {
  return {
    x: worldW / 2, y: 17 * TILE, w: 28, h: 36,
    vx: 0, vy: 0, facing: 1, grounded: false,
    walkFrame: 0, walkTimer: 0,
    blowing: 0, // countdown for blow animation
    hit: 0, // invincibility timer
    breathe: 0, // idle breathing
    dead: false, combo: 0
  };
}

// ==================== ENEMIES ====================
function spawnEnemy(type, x, y) {
  enemies.push({
    type, x, y, w: 28, h: 28, vx: (Math.random() < 0.5 ? 1 : -1) * ENEMY_SPEED_BASE,
    vy: 0, grounded: false, trapped: false, trapTimer: 0, angry: false,
    walkFrame: 0, walkTimer: 0, eyeTrack: 0, alive: true,
    attackTimer: Math.random() * 3 + 2, hp: type === 'monsta' ? 1 : 1
  });
}

// ==================== BUBBLES ====================
function createBubble(x, y, dir, special=null) {
  bubbles.push({
    x, y, vx: dir * BUBBLE_SPEED, vy: 0,
    radius: 14, age: 0, floating: false, floatTimer: 0,
    trapped: null, special, popping: false, popTimer: 0,
    wobble: Math.random() * Math.PI * 2
  });
}

// ==================== FRUITS ====================
const FRUIT_TYPES = [
  { name: 'banana', pts: 100, color: '#ff0', prob: 0.35 },
  { name: 'orange', pts: 200, color: '#f80', prob: 0.3 },
  { name: 'cherry', pts: 300, color: '#f22', prob: 0.2 },
  { name: 'strawberry', pts: 500, color: '#f48', prob: 0.1 },
  { name: 'cake', pts: 1000, color: '#f8f', prob: 0.05 }
];

function spawnFruit(x, y) {
  let r = Math.random(), acc = 0;
  let ft = FRUIT_TYPES[0];
  for (const f of FRUIT_TYPES) { acc += f.prob; if (r < acc) { ft = f; break; } }
  fruits.push({ x, y, vy: -100, vx: (Math.random()-0.5)*60, type: ft, grounded: false, age: 0, w: 20, h: 20, collected: false });
}

// ==================== PARTICLES ====================
function spawnParticles(x, y, count, colors, speed=150, life=0.6) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + speed * 0.3;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 50,
      life, maxLife: life, color: colors[Math.floor(Math.random() * colors.length)],
      size: Math.random() * 4 + 2
    });
  }
}

function spawnFloatingText(x, y, text, color='#fff') {
  floatingTexts.push({ x, y, text, color, life: 1.2 });
}

// ==================== INPUT HANDLING ====================
// HOLD left/right = continuous movement + auto-shoot
// SWIPE UP = jump (dy < -30 within 300ms)
// TAP (< 200ms, minimal movement) = shoot bubble while standing
let holdDir = 0;        // -1, 0, or 1: current held direction
let wantJump = false;
let wantShoot = false;  // set by tap
let autoShootTimer = 0; // auto-shoot while moving

// Track active touch for hold detection
const activeTouches = {};
let primaryTouchId = null; // the touch controlling movement

function handleTouchStart(e) {
  if (e.target.closest('button') || e.target.closest('.overlay')) return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    activeTouches[t.identifier] = {
      startX: t.clientX, startY: t.clientY,
      startTime: performance.now(), swiped: false,
      currentX: t.clientX, currentY: t.clientY
    };
    // First touch becomes primary (controls movement)
    if (primaryTouchId === null) {
      primaryTouchId = t.identifier;
      holdDir = t.clientX < W / 2 ? -1 : 1;
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const at = activeTouches[t.identifier];
    if (!at) continue;
    at.currentX = t.clientX;
    at.currentY = t.clientY;

    // Swipe up detection: dy < -30
    if (!at.swiped) {
      const dy = t.clientY - at.startY;
      const elapsed = performance.now() - at.startTime;
      if (dy < -30 && elapsed < 300) {
        wantJump = true;
        at.swiped = true;
      }
    }

    // Update hold direction based on current touch position
    if (t.identifier === primaryTouchId) {
      holdDir = t.clientX < W / 2 ? -1 : 1;
    }
  }
}

function handleTouchEnd(e) {
  for (const t of e.changedTouches) {
    const at = activeTouches[t.identifier];
    if (at) {
      const elapsed = performance.now() - at.startTime;
      const dx = Math.abs(t.clientX - at.startX);
      const dy = Math.abs(t.clientY - at.startY);
      // TAP: short duration, no significant movement
      if (elapsed < 200 && dx < 15 && dy < 15 && !at.swiped) {
        wantShoot = true;
      }
    }
    delete activeTouches[t.identifier];
    if (t.identifier === primaryTouchId) {
      primaryTouchId = null;
      holdDir = 0;
      // Check if another touch is still active — adopt it
      for (const id in activeTouches) {
        primaryTouchId = parseInt(id);
        holdDir = activeTouches[id].currentX < W / 2 ? -1 : 1;
        break;
      }
    }
  }
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', (e) => {
  for (const t of e.changedTouches) {
    delete activeTouches[t.identifier];
    if (t.identifier === primaryTouchId) {
      primaryTouchId = null;
      holdDir = 0;
      for (const id in activeTouches) {
        primaryTouchId = parseInt(id);
        holdDir = activeTouches[id].currentX < W / 2 ? -1 : 1;
        break;
      }
    }
  }
}, { passive: false });

// Mouse support for desktop — hold-based
let mouseDown = false;
let mouseStartX = 0, mouseStartY = 0, mouseStartTime = 0;
let mouseSwiped = false;
canvas.addEventListener('mousedown', (e) => {
  if (e.target.closest('button') || e.target.closest('.overlay')) return;
  mouseDown = true;
  mouseStartX = e.clientX;
  mouseStartY = e.clientY;
  mouseStartTime = performance.now();
  mouseSwiped = false;
  holdDir = e.clientX < W / 2 ? -1 : 1;
});
canvas.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  // Swipe up
  if (!mouseSwiped) {
    const dy = e.clientY - mouseStartY;
    const elapsed = performance.now() - mouseStartTime;
    if (dy < -30 && elapsed < 300) {
      wantJump = true;
      mouseSwiped = true;
    }
  }
  holdDir = e.clientX < W / 2 ? -1 : 1;
});
canvas.addEventListener('mouseup', (e) => {
  if (mouseDown) {
    const elapsed = performance.now() - mouseStartTime;
    const dx = Math.abs(e.clientX - mouseStartX);
    const dy = Math.abs(e.clientY - mouseStartY);
    if (elapsed < 200 && dx < 15 && dy < 15 && !mouseSwiped) {
      wantShoot = true;
    }
  }
  mouseDown = false;
  holdDir = 0;
});

// Keyboard support
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ==================== UPDATE LOGIC ====================
function update(dt) {
  if (gameState !== 'playing') return;
  updateMusic(dt);
  screenShake *= 0.9;
  if (screenShake < 0.5) screenShake = 0;

  // Chain timer
  if (chainTimer > 0) {
    chainTimer -= dt;
    if (chainTimer <= 0) chainCount = 0;
  }

  // --- PLAYER ---
  if (player && !player.dead) {
    // Keyboard input
    let kbDir = 0;
    if (keys['ArrowLeft'] || keys['a']) kbDir = -1;
    if (keys['ArrowRight'] || keys['d']) kbDir = 1;

    // Combine keyboard and touch hold direction
    const dir = kbDir || holdDir;
    player.vx = dir * PLAYER_SPEED;
    if (dir !== 0) player.facing = dir;

    // Jump
    if ((wantJump || keys['ArrowUp'] || keys['w'] || keys[' ']) && player.grounded) {
      player.vy = JUMP_VEL;
      player.grounded = false;
      sfxJump();
    }
    wantJump = false;

    // Auto-shoot while moving (every 0.4s)
    if (dir !== 0) {
      autoShootTimer -= dt;
      if (autoShootTimer <= 0) {
        autoShootTimer = 0.4;
        if (player.blowing <= 0) {
          createBubble(player.x + player.facing * 20, player.y - player.h / 2, player.facing);
          player.blowing = 0.15;
          sfxBubbleBlow();
        }
      }
    } else {
      autoShootTimer = 0; // reset so first move shoots immediately
    }

    // Tap shoot (standing still) or keyboard z/x
    if (wantShoot || keys['z'] || keys['x']) {
      if (player.blowing <= 0) {
        createBubble(player.x + player.facing * 20, player.y - player.h / 2, player.facing);
        player.blowing = 0.15;
        sfxBubbleBlow();
      }
      wantShoot = false;
      keys['z'] = false;
      keys['x'] = false;
    }

    // Physics
    player.vy += GRAVITY * dt;
    player.grounded = false;
    player.x += player.vx * dt;
    player.y += player.vy * dt;
    resolveCollisions(player);

    // Animation
    if (Math.abs(player.vx) > 10) {
      player.walkTimer += dt;
      if (player.walkTimer > 0.1) { player.walkTimer = 0; player.walkFrame = (player.walkFrame + 1) % 4; }
    } else {
      player.walkFrame = 0;
    }
    player.blowing = Math.max(0, player.blowing - dt);
    player.hit = Math.max(0, player.hit - dt);
    player.breathe += dt;
  }

  // --- SPECIAL BUBBLE TIMER ---
  specialBubbleTimer += dt * 1000;
  if (specialBubbleTimer >= SPECIAL_BUBBLE_INTERVAL) {
    specialBubbleTimer = 0;
    const types = ['water', 'fire', 'lightning'];
    const sp = types[Math.floor(Math.random() * types.length)];
    const bx = Math.random() * (worldW - 60) + 30;
    bubbles.push({
      x: bx, y: worldH - 40, vx: 0, vy: BUBBLE_FLOAT_SPEED * 0.7,
      radius: 16, age: 0, floating: true, floatTimer: 0,
      trapped: null, special: sp, popping: false, popTimer: 0,
      wobble: Math.random() * Math.PI * 2
    });
    sfxSpecialBubble();
  }

  // --- ENEMIES ---
  for (const en of enemies) {
    if (!en.alive) continue;
    if (en.trapped) {
      en.trapTimer += dt * 1000;
      if (en.trapTimer >= TRAP_ESCAPE_TIME) {
        en.trapped = false;
        en.angry = true;
        en.vx = (Math.random() < 0.5 ? 1 : -1) * ENEMY_SPEED_BASE * 1.6;
        // Find and pop the bubble that has this enemy
        for (const b of bubbles) {
          if (b.trapped === en) { b.trapped = null; b.popping = true; b.popTimer = 0.3; }
        }
      }
      continue;
    }
    // AI
    en.vy += GRAVITY * dt;
    en.grounded = false;

    // Movement type
    const spd = en.angry ? ENEMY_SPEED_BASE * 1.5 : ENEMY_SPEED_BASE;
    if (en.type === 'monsta') {
      // Bouncy - jump randomly
      if (en.grounded && Math.random() < dt * 2) {
        en.vy = JUMP_VEL * 0.7;
        en.vx = (Math.random() < 0.5 ? -1 : 1) * spd * 1.5;
      }
    } else {
      // Walk, reverse at edges or randomly
      if (en.grounded) {
        if (Math.abs(en.vx) < 10) en.vx = (Math.random() < 0.5 ? 1 : -1) * spd;
        // Check if about to walk off platform edge (simple check)
        const aheadX = en.x + Math.sign(en.vx) * 20;
        let onPlat = false;
        for (const p of platforms) {
          if (aheadX > p.x && aheadX < p.x + p.w && Math.abs(en.y - p.y) < 8) onPlat = true;
        }
        // Zen-chan falls off edges, others may turn
        if (!onPlat && en.type !== 'zen') {
          en.vx *= -1;
        }
        // Random direction change
        if (Math.random() < dt * 0.5) en.vx = Math.sign(en.vx) * spd;
      }
    }

    // Attack
    if (player && !player.dead && en.attackTimer !== undefined) {
      en.attackTimer -= dt;
      if (en.attackTimer <= 0) {
        en.attackTimer = Math.random() * 4 + 2;
        if (en.type === 'mighta') {
          // Throw rock
          const dx = player.x - en.x;
          const dir = Math.sign(dx) || 1;
          bubbles.push({
            x: en.x + dir * 16, y: en.y - 14, vx: dir * 180, vy: -80,
            radius: 5, age: 0, floating: false, floatTimer: 0,
            trapped: null, special: 'rock', popping: false, popTimer: 0, wobble: 0,
            isProjectile: true
          });
        } else if (en.type === 'drunk') {
          // Fire breath
          const dx = player.x - en.x;
          const dir = Math.sign(dx) || 1;
          for (let i = 0; i < 5; i++) {
            particles.push({
              x: en.x + dir * (10 + i * 8), y: en.y - 14 + (Math.random()-0.5)*10,
              vx: dir * (100 + i * 30), vy: (Math.random()-0.5)*40,
              life: 0.4, maxLife: 0.4, color: ['#f80','#f40','#ff0'][Math.floor(Math.random()*3)],
              size: 6 + Math.random() * 4, isDamage: true
            });
          }
        }
      }
    }

    en.x += en.vx * dt;
    en.y += en.vy * dt;
    resolveCollisions(en);

    // Eye tracking
    if (player) en.eyeTrack = Math.sign(player.x - en.x);

    // Walk animation
    en.walkTimer += dt;
    if (en.walkTimer > 0.12) { en.walkTimer = 0; en.walkFrame = (en.walkFrame + 1) % 4; }

    // Collision with player
    if (player && !player.dead && player.hit <= 0) {
      const dx = Math.abs(player.x - en.x);
      const dy = Math.abs((player.y - player.h/2) - (en.y - en.h/2));
      if (dx < 20 && dy < 24) {
        playerHit();
      }
    }
  }

  // --- BUBBLES ---
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.age += dt * 1000;
    b.wobble += dt * 3;

    if (b.popping) {
      b.popTimer -= dt;
      if (b.popTimer <= 0) {
        bubbles.splice(i, 1);
      }
      continue;
    }

    // Rock projectile
    if (b.isProjectile) {
      b.vy += GRAVITY * 0.5 * dt;
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.age > 3000 || b.y > worldH) { bubbles.splice(i, 1); continue; }
      // Hit player
      if (player && !player.dead && player.hit <= 0) {
        const dx = Math.abs(player.x - b.x);
        const dy = Math.abs((player.y - player.h/2) - b.y);
        if (dx < 16 && dy < 20) {
          playerHit();
          bubbles.splice(i, 1);
          continue;
        }
      }
      continue;
    }

    if (!b.floating && !b.trapped) {
      // Moving horizontally first
      b.x += b.vx * dt;
      // Check hit enemy
      for (const en of enemies) {
        if (!en.alive || en.trapped) continue;
        const dx = Math.abs(b.x - en.x);
        const dy = Math.abs(b.y - (en.y - en.h/2));
        if (dx < b.radius + en.w/2 && dy < b.radius + en.h/2) {
          // Trap enemy!
          en.trapped = true;
          en.trapTimer = 0;
          b.trapped = en;
          b.vx = 0;
          b.floating = true;
          sfxTrapped();
          break;
        }
      }
      // After some time, start floating
      if (b.age > 500 && !b.floating) {
        b.floating = true;
        b.vx *= 0.1;
      }
    }

    if (b.floating) {
      b.vy = BUBBLE_FLOAT_SPEED;
      b.x += Math.sin(b.wobble) * 20 * dt;
      b.y += b.vy * dt;
      b.vx *= 0.95;
      b.x += b.vx * dt;
    }

    // Screen wrap
    if (b.x < -b.radius) b.x = worldW + b.radius;
    if (b.x > worldW + b.radius) b.x = -b.radius;

    // Pop at ceiling or timeout
    if (b.y < -b.radius || b.age > BUBBLE_LIFETIME) {
      if (b.trapped) {
        b.trapped.trapped = false;
        b.trapped.angry = true;
        b.trapped.vx = (Math.random() < 0.5 ? 1 : -1) * ENEMY_SPEED_BASE * 1.6;
      }
      popBubble(b, i);
      continue;
    }

    // Player pops trapped bubbles
    if (b.trapped && player && !player.dead) {
      const dx = Math.abs(player.x - b.x);
      const dy = Math.abs((player.y - player.h/2) - b.y);
      if (dx < b.radius + 16 && dy < b.radius + 20) {
        defeatEnemy(b.trapped, b.x, b.y);
        popBubble(b, i);
        continue;
      }
    }

    // Player pops special bubbles
    if (b.special && b.special !== 'rock' && player && !player.dead) {
      const dx = Math.abs(player.x - b.x);
      const dy = Math.abs((player.y - player.h/2) - b.y);
      if (dx < b.radius + 16 && dy < b.radius + 20) {
        activateSpecial(b.special, b.x, b.y);
        popBubble(b, i);
        continue;
      }
    }
  }

  // --- FIRE PARTICLES DAMAGE ---
  for (const p of particles) {
    if (p.isDamage && player && !player.dead && player.hit <= 0) {
      const dx = Math.abs(player.x - p.x);
      const dy = Math.abs((player.y - player.h/2) - p.y);
      if (dx < 14 && dy < 18) { playerHit(); p.life = 0; }
    }
  }

  // --- FRUITS ---
  for (let i = fruits.length - 1; i >= 0; i--) {
    const f = fruits[i];
    f.age += dt;
    if (f.collected) { fruits.splice(i, 1); continue; }
    if (f.age > 8) { fruits.splice(i, 1); continue; }
    f.vy += GRAVITY * dt;
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    // Platform collision
    for (const p of platforms) {
      if (f.x > p.x && f.x < p.x + p.w && f.y > p.y && f.y < p.y + p.h && f.vy > 0) {
        f.y = p.y;
        f.vy = 0;
        f.vx = 0;
        f.grounded = true;
      }
    }
    if (f.x < 0) f.x = worldW;
    if (f.x > worldW) f.x = 0;
    // Player collect
    if (player && !player.dead) {
      const dx = Math.abs(player.x - f.x);
      const dy = Math.abs((player.y - player.h/2) - f.y);
      if (dx < 18 && dy < 22) {
        score += f.type.pts;
        spawnFloatingText(f.x, f.y - 10, '+' + f.type.pts, f.type.color);
        spawnParticles(f.x, f.y, 6, [f.type.color, '#fff'], 80, 0.3);
        sfxFruitCollect();
        f.collected = true;
      }
    }
  }

  // --- PARTICLES ---
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
  }

  // --- FLOATING TEXTS ---
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.life -= dt;
    ft.y -= 40 * dt;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // --- CHECK LEVEL CLEAR ---
  const aliveEnemies = enemies.filter(e => e.alive);
  if (aliveEnemies.length === 0 && enemies.length > 0) {
    levelComplete();
  }
}

function playerHit() {
  if (player.hit > 0) return;
  lives--;
  sfxPlayerDeath();
  screenShake = 8;
  player.hit = 2.0; // invincibility frames
  spawnParticles(player.x, player.y - player.h/2, 10, ['#f00','#f80','#ff0'], 100, 0.5);
  if (lives <= 0) {
    player.dead = true;
    gameOver();
  }
}

function popBubble(b, idx) {
  sfxBubblePop();
  // 18 rainbow sparkle particles
  spawnParticles(b.x, b.y, 18, ['#ff2080','#ff8020','#ffee20','#40ff40','#20ccff','#8040ff','#ff40ff','#fff'], 160, 0.6);
  bubbles.splice(idx, 1);
}

function defeatEnemy(en, x, y) {
  en.alive = false;
  en.trapped = false;
  chainCount++;
  chainTimer = 1.5;
  const chainPts = 200 * Math.pow(2, Math.min(chainCount - 1, 5));
  score += chainPts;
  sfxChainPop(chainCount);
  if (chainCount > 1) {
    spawnFloatingText(x, y - 30, 'COMBO x' + chainCount + '!', '#ff0');
    screenShake = 4 + chainCount * 2;
  }
  spawnFloatingText(x, y - 10, '+' + chainPts, '#fff');
  // 20 particles in enemy's color palette
  const enemyColors = en.type === 'zen' ? ['#6c6','#4a4','#8e8','#afa','#fff'] :
                      en.type === 'mighta' ? ['#48f','#36c','#6af','#88f','#fff'] :
                      en.type === 'monsta' ? ['#eef','#ccf','#fff','#aaf','#ddf'] :
                      ['#a4f','#c6f','#f80','#ff0','#fff'];
  spawnParticles(x, y, 20, enemyColors, 180, 0.7);
  sfxEnemyDefeat();
  spawnFruit(x, y);
}

function activateSpecial(type, x, y) {
  sfxSpecialBubble();
  screenShake = 6;
  if (type === 'water') {
    // Water wave
    for (let i = 0; i < 20; i++) {
      particles.push({
        x: x + (Math.random()-0.5)*40, y: y, vx: (Math.random()-0.5)*400, vy: Math.random()*-100,
        life: 1.5, maxLife: 1.5, color: '#4af', size: 6 + Math.random()*4, isWave: true
      });
    }
    // Kill nearby enemies
    for (const en of enemies) {
      if (en.alive && !en.trapped) {
        const d = Math.hypot(en.x - x, en.y - y);
        if (d < 200) defeatEnemy(en, en.x, en.y);
      }
    }
  } else if (type === 'fire') {
    for (let i = 0; i < 15; i++) {
      particles.push({
        x: x + (Math.random()-0.5)*20, y: y, vx: (Math.random()-0.5)*500, vy: -20,
        life: 1.0, maxLife: 1.0, color: ['#f80','#f40','#ff0'][i%3], size: 5+Math.random()*5
      });
    }
    for (const en of enemies) {
      if (en.alive && !en.trapped && Math.abs(en.y - y) < 60) defeatEnemy(en, en.x, en.y);
    }
  } else if (type === 'lightning') {
    let nearest = null, dist = Infinity;
    for (const en of enemies) {
      if (!en.alive) continue;
      const d = Math.hypot(en.x - x, en.y - y);
      if (d < dist) { dist = d; nearest = en; }
    }
    if (nearest) {
      spawnParticles(nearest.x, nearest.y - nearest.h/2, 20, ['#ff0','#fff','#fe0'], 200, 0.4);
      if (nearest.trapped) {
        defeatEnemy(nearest, nearest.x, nearest.y);
        // Remove the bubble
        for (let i = bubbles.length-1; i >= 0; i--) {
          if (bubbles[i].trapped === nearest) { bubbles.splice(i, 1); break; }
        }
      } else {
        defeatEnemy(nearest, nearest.x, nearest.y);
      }
    }
  }
}

function levelComplete() {
  gameState = 'levelClear';
  stopMusic();
  sfxLevelClear();
  const bonus = level * 100;
  score += bonus;
  document.getElementById('levelClearTitle').textContent = 'LEVEL ' + level + ' CLEAR!';
  document.getElementById('levelClearScore').textContent = 'Score: ' + score;
  document.getElementById('levelClearBonus').textContent = 'Bonus: +' + bonus;
  document.getElementById('levelClearScreen').classList.remove('hidden');
  levelClearTimer = 0;
  // Auto advance after 2.5s
  setTimeout(() => {
    if (gameState !== 'levelClear') return;
    document.getElementById('levelClearScreen').classList.add('hidden');
    level++;
    if (level > 12) level = 1; // Loop with harder enemies
    startLevel();
  }, 2500);
}

function startLevel() {
  gameState = 'playing';
  buildLevel(level);
  player = createPlayer();
  bubbles = [];
  fruits = [];
  particles = [];
  floatingTexts = [];
  chainCount = 0;
  chainTimer = 0;
  startMusic();
}

function gameOver() {
  gameState = 'gameOver';
  stopMusic();
  sfxGameOver();
  document.getElementById('finalScore').textContent = 'Score: ' + score;
  // Check high score
  const isHigh = highScores.length < 10 || score > (highScores[highScores.length - 1]?.score || 0);
  const entryArea = document.getElementById('scoreEntryArea');
  entryArea.innerHTML = '';
  if (isHigh && score > 0) {
    const letters = ['A','A','A'];
    const div = document.createElement('div');
    div.className = 'score-entry';
    div.style.justifyContent = 'center';
    for (let i = 0; i < 3; i++) {
      const sel = document.createElement('div');
      sel.className = 'letter-select';
      const up = document.createElement('button');
      up.textContent = '▲';
      up.addEventListener('click', (e) => { e.stopPropagation(); letters[i] = String.fromCharCode(((letters[i].charCodeAt(0) - 64) % 26) + 65); sp.textContent = letters[i]; });
      up.addEventListener('touchend', (e) => { e.stopPropagation(); });
      const sp = document.createElement('span');
      sp.textContent = 'A';
      const dn = document.createElement('button');
      dn.textContent = '▼';
      dn.addEventListener('click', (e) => { e.stopPropagation(); letters[i] = String.fromCharCode(((letters[i].charCodeAt(0) - 66 + 26) % 26) + 65); sp.textContent = letters[i]; });
      dn.addEventListener('touchend', (e) => { e.stopPropagation(); });
      sel.append(up, sp, dn);
      div.appendChild(sel);
    }
    entryArea.appendChild(div);
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-small';
    saveBtn.textContent = 'SAVE SCORE';
    saveBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const initials = letters.join('');
      highScores.push({ initials, score, level });
      highScores.sort((a,b) => b.score - a.score);
      highScores = highScores.slice(0, 10);
      saveHighScores();
      entryArea.innerHTML = '<p style="color:#4f4">Saved!</p>';
    });
    saveBtn.addEventListener('touchend', (e) => { e.stopPropagation(); });
    entryArea.appendChild(saveBtn);
  }
  setTimeout(() => document.getElementById('gameOverScreen').classList.remove('hidden'), 500);
}

function showHighScores(returnTo) {
  const list = document.getElementById('highScoreList');
  list.innerHTML = '';
  if (highScores.length === 0) {
    list.innerHTML = '<p style="color:#888;text-align:center">No scores yet!</p>';
  } else {
    highScores.forEach((h, i) => {
      const p = document.createElement('p');
      p.textContent = `${(i+1+'').padStart(2,' ')}. ${h.initials}  ${(h.score+'').padStart(8,' ')}  Lv${h.level}`;
      p.style.fontFamily = 'monospace';
      list.appendChild(p);
    });
  }
  document.getElementById('highScoreScreen').classList.remove('hidden');
  document.getElementById('highScoreScreen')._returnTo = returnTo;
}

// ==================== DRAWING ====================
function worldToScreen(wx, wy) {
  const ox = (W - worldW * SCALE) / 2;
  const oy = (H - worldH * SCALE) / 2;
  return { x: ox + wx * SCALE, y: oy + wy * SCALE };
}

// Pre-seeded pseudo-random for deterministic background particles
const bgSeeds = [];
for (let i = 0; i < 100; i++) bgSeeds.push(Math.random());

function drawBackground(t) {
  const def = LEVEL_DEFS[(level - 1) % LEVEL_DEFS.length];
  const bgType = def.bgType;

  // Rich base gradient (3-stop for depth)
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  switch(bgType) {
    case 'stars': grad.addColorStop(0,'#060622'); grad.addColorStop(0.5,'#0e0e3a'); grad.addColorStop(1,'#1a1a5e'); break;
    case 'night': grad.addColorStop(0,'#020218'); grad.addColorStop(0.5,'#0a0a30'); grad.addColorStop(1,'#141450'); break;
    case 'aurora': grad.addColorStop(0,'#1a0040'); grad.addColorStop(0.4,'#0a1838'); grad.addColorStop(1,'#081830'); break;
    case 'sunset': grad.addColorStop(0,'#5a1a00'); grad.addColorStop(0.4,'#3a0e00'); grad.addColorStop(1,'#180800'); break;
    case 'underwater': grad.addColorStop(0,'#003848'); grad.addColorStop(0.5,'#002838'); grad.addColorStop(1,'#001018'); break;
    case 'volcanic': grad.addColorStop(0,'#280000'); grad.addColorStop(0.6,'#180000'); grad.addColorStop(1,'#0a0000'); break;
    case 'clouds': grad.addColorStop(0,'#4a2868'); grad.addColorStop(0.5,'#2a1840'); grad.addColorStop(1,'#141028'); break;
    case 'cave': grad.addColorStop(0,'#201a08'); grad.addColorStop(0.5,'#141000'); grad.addColorStop(1,'#0a0800'); break;
    case 'space': grad.addColorStop(0,'#000028'); grad.addColorStop(0.5,'#000818'); grad.addColorStop(1,'#000008'); break;
    case 'snow': grad.addColorStop(0,'#282838'); grad.addColorStop(0.5,'#1a1a28'); grad.addColorStop(1,'#101018'); break;
    case 'jungle': grad.addColorStop(0,'#002200'); grad.addColorStop(0.5,'#001400'); grad.addColorStop(1,'#000a00'); break;
    case 'cosmic': grad.addColorStop(0,'#200030'); grad.addColorStop(0.4,'#100828'); grad.addColorStop(1,'#000a28'); break;
    default: grad.addColorStop(0,'#0a0a2e'); grad.addColorStop(1,'#1a1a4e');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Ambient floating particles (dust motes / sparkles) — all backgrounds
  ctx.save();
  for (let i = 0; i < 30; i++) {
    const sx = (bgSeeds[i] * W + t * 8 * (bgSeeds[i+30]*2+0.5)) % (W + 20) - 10;
    const sy = (bgSeeds[i+10] * H + t * 5 * (bgSeeds[i+40]+0.5)) % (H + 20) - 10;
    const bri = 0.06 + 0.06 * Math.sin(t * 1.5 + i * 2.1);
    ctx.globalAlpha = bri;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, 1 + bgSeeds[i+20] * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Animated background elements
  if (bgType === 'stars' || bgType === 'night' || bgType === 'space' || bgType === 'cosmic') {
    // Parallax star layers
    ctx.save();
    for (let layer = 0; layer < 3; layer++) {
      const speed = (layer + 1) * 2;
      const count = 20 + layer * 15;
      const baseSize = 0.5 + layer * 0.7;
      for (let i = 0; i < count; i++) {
        const si = layer * 35 + i;
        const sx = (bgSeeds[si % 100] * W + t * speed * (bgSeeds[(si+50) % 100] + 0.3)) % W;
        const sy = (bgSeeds[(si+20) % 100] * H);
        const pulse = 0.3 + 0.7 * Math.abs(Math.sin(t * (1.5 + layer) + i * 0.7));
        ctx.globalAlpha = pulse * (0.3 + layer * 0.2);
        // Star cross shape for brightest layer
        if (layer === 2 && i < 8) {
          const ss = baseSize * 2;
          ctx.fillStyle = '#fff';
          ctx.fillRect(sx - ss, sy - 0.3, ss * 2, 0.6);
          ctx.fillRect(sx - 0.3, sy - ss, 0.6, ss * 2);
        } else {
          ctx.fillStyle = layer === 0 ? '#aac' : layer === 1 ? '#dde' : '#fff';
          ctx.fillRect(sx, sy, baseSize, baseSize);
        }
      }
    }
    ctx.restore();
    // Nebula glow for cosmic/space
    if (bgType === 'cosmic' || bgType === 'space') {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.04;
      const ng = ctx.createRadialGradient(W*0.3, H*0.4, 0, W*0.3, H*0.4, W*0.4);
      ng.addColorStop(0, bgType === 'cosmic' ? '#a040ff' : '#2060ff');
      ng.addColorStop(1, 'transparent');
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }
  if (bgType === 'aurora') {
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.strokeStyle = ['#0f0','#0ff','#f0f','#0f8','#80f'][i];
      ctx.lineWidth = 10 + Math.sin(t * 0.5 + i) * 4;
      ctx.moveTo(0, H * 0.15 + i * 25);
      for (let x = 0; x < W; x += 10) {
        const y = H * 0.15 + i * 25 + Math.sin(x * 0.008 + t * 0.7 + i * 1.2) * 35 + Math.sin(x * 0.02 + t * 1.5) * 10;
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }
  if (bgType === 'clouds' || bgType === 'snow') {
    // Layered clouds with gradients
    ctx.save();
    for (let layer = 0; layer < 2; layer++) {
      ctx.globalAlpha = 0.06 + layer * 0.04;
      for (let i = 0; i < 6; i++) {
        const cx = (i * 90 + t * (10 + layer * 8) * (bgSeeds[i]+0.5)) % (W + 150) - 75;
        const cy = 30 + i * 55 + layer * 20;
        const cg = ctx.createRadialGradient(cx+20, cy-5, 5, cx+20, cy, 40);
        cg.addColorStop(0, 'rgba(255,255,255,0.5)');
        cg.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = cg;
        ctx.beginPath();
        ctx.arc(cx, cy, 32, 0, Math.PI*2);
        ctx.arc(cx+22, cy-12, 26, 0, Math.PI*2);
        ctx.arc(cx+44, cy, 30, 0, Math.PI*2);
        ctx.arc(cx+18, cy+8, 24, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
    if (bgType === 'snow') {
      ctx.save();
      for (let i = 0; i < 50; i++) {
        const sx = (bgSeeds[i % 100] * W + Math.sin(t * 0.8 + i) * 20 + t * 12 * (bgSeeds[(i+30) % 100] + 0.3)) % W;
        const sy = (bgSeeds[(i+10) % 100] * H + t * 35 * (bgSeeds[(i+50) % 100] + 0.3)) % H;
        const sz = 1 + bgSeeds[(i+20) % 100] * 2;
        ctx.globalAlpha = 0.2 + 0.2 * Math.sin(t + i * 1.3);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(sx, sy, sz, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }
  if (bgType === 'volcanic') {
    ctx.save();
    // Lava glow
    ctx.globalAlpha = 0.12;
    const lgrad = ctx.createRadialGradient(W/2, H, 0, W/2, H, H*0.7);
    lgrad.addColorStop(0, '#f60');
    lgrad.addColorStop(0.5, '#a20');
    lgrad.addColorStop(1, 'transparent');
    ctx.fillStyle = lgrad;
    ctx.fillRect(0, 0, W, H);
    // Rising embers
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 20; i++) {
      const ex = (bgSeeds[i] * W + Math.sin(t * 0.6 + i * 2) * 30) % W;
      const ey = H - ((bgSeeds[(i+10) % 100] * H * 0.8 + t * 25 * (bgSeeds[(i+30) % 100] + 0.5)) % (H * 0.8));
      ctx.globalAlpha = 0.15 * (1 - ey / H);
      ctx.fillStyle = i % 3 === 0 ? '#f80' : i % 3 === 1 ? '#f40' : '#fa0';
      ctx.beginPath();
      ctx.arc(ex, ey, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  if (bgType === 'underwater') {
    ctx.save();
    // Light rays from above
    ctx.globalAlpha = 0.04;
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 5; i++) {
      const rx = W * 0.15 + i * W * 0.18 + Math.sin(t * 0.3 + i) * 20;
      ctx.fillStyle = '#4af';
      ctx.beginPath();
      ctx.moveTo(rx - 5, 0);
      ctx.lineTo(rx + 5, 0);
      ctx.lineTo(rx + 40 + Math.sin(t * 0.5 + i) * 15, H);
      ctx.lineTo(rx - 40 + Math.sin(t * 0.5 + i) * 15, H);
      ctx.fill();
    }
    // Floating bubbles
    for (let i = 0; i < 20; i++) {
      const bx = (bgSeeds[i] * W + Math.sin(t * 0.4 + i * 1.5) * 25);
      const by = H - ((bgSeeds[(i+15) % 100] * H + t * 18 * (bgSeeds[(i+40) % 100] + 0.3)) % (H + 40));
      const br = 2 + bgSeeds[(i+25) % 100] * 3;
      ctx.globalAlpha = 0.06;
      ctx.strokeStyle = '#6cf';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }
  if (bgType === 'sunset') {
    ctx.save();
    ctx.globalAlpha = 0.06;
    // Sun glow
    const sg = ctx.createRadialGradient(W*0.7, H*0.15, 0, W*0.7, H*0.15, W*0.4);
    sg.addColorStop(0, '#fa0');
    sg.addColorStop(0.5, '#f40');
    sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  if (bgType === 'jungle') {
    ctx.save();
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#0f0';
    // Hanging vines
    for (let i = 0; i < 8; i++) {
      const vx = bgSeeds[i] * W;
      ctx.beginPath();
      ctx.moveTo(vx, 0);
      for (let y = 0; y < H * 0.5; y += 10) {
        ctx.lineTo(vx + Math.sin(y * 0.03 + t * 0.5 + i) * 15, y);
      }
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#0a0';
      ctx.stroke();
    }
    ctx.restore();
  }
  if (bgType === 'cave') {
    ctx.save();
    // Crystal glow spots
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.03;
    for (let i = 0; i < 6; i++) {
      const cx = bgSeeds[i] * W;
      const cy = bgSeeds[i+10] * H;
      const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
      cg.addColorStop(0, ['#ff0','#0ff','#f80','#a0f','#0f0','#f0a'][i]);
      cg.addColorStop(1, 'transparent');
      ctx.fillStyle = cg;
      ctx.globalAlpha = 0.03 + 0.02 * Math.sin(t * 1.2 + i * 2);
      ctx.fillRect(cx-60, cy-60, 120, 120);
    }
    ctx.restore();
  }
}

function drawPlatforms() {
  const def = LEVEL_DEFS[(level - 1) % LEVEL_DEFS.length];
  const col = def.theme;
  // Parse theme color for gradient manipulation
  const tc = document.createElement('canvas').getContext('2d');
  tc.fillStyle = col;
  const colHex = tc.fillStyle; // normalized

  for (const p of platforms) {
    const s = worldToScreen(p.x, p.y);
    const sw = p.w * SCALE;
    const sh = p.h * SCALE;
    const bevel = Math.max(2, 3 * SCALE);

    // Main face gradient (top lighter, bottom darker)
    const faceGrad = ctx.createLinearGradient(s.x, s.y, s.x, s.y + sh);
    faceGrad.addColorStop(0, col);
    faceGrad.addColorStop(1, 'rgba(0,0,0,0.25)');

    // Draw main body
    ctx.fillStyle = col;
    ctx.fillRect(s.x, s.y, sw, sh);
    // Darken gradient overlay
    ctx.fillStyle = faceGrad;
    ctx.fillRect(s.x, s.y, sw, sh);

    // Top face (lighter — beveled top)
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + sw, s.y);
    ctx.lineTo(s.x + sw - bevel, s.y + bevel);
    ctx.lineTo(s.x + bevel, s.y + bevel);
    ctx.fill();

    // Bottom face (darker — beveled bottom)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.moveTo(s.x, s.y + sh);
    ctx.lineTo(s.x + sw, s.y + sh);
    ctx.lineTo(s.x + sw - bevel, s.y + sh - bevel);
    ctx.lineTo(s.x + bevel, s.y + sh - bevel);
    ctx.fill();

    // Left face (slightly lighter)
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + bevel, s.y + bevel);
    ctx.lineTo(s.x + bevel, s.y + sh - bevel);
    ctx.lineTo(s.x, s.y + sh);
    ctx.fill();

    // Right face (slightly darker)
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.moveTo(s.x + sw, s.y);
    ctx.lineTo(s.x + sw - bevel, s.y + bevel);
    ctx.lineTo(s.x + sw - bevel, s.y + sh - bevel);
    ctx.lineTo(s.x + sw, s.y + sh);
    ctx.fill();

    // Pixel grid texture (subtle)
    ctx.save();
    ctx.globalAlpha = 0.06;
    const gridSize = Math.max(4, TILE * SCALE / 8);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.5;
    for (let gx = s.x + bevel; gx < s.x + sw - bevel; gx += gridSize) {
      ctx.beginPath();
      ctx.moveTo(gx, s.y + bevel);
      ctx.lineTo(gx, s.y + sh - bevel);
      ctx.stroke();
    }
    for (let gy = s.y + bevel; gy < s.y + sh - bevel; gy += gridSize) {
      ctx.beginPath();
      ctx.moveTo(s.x + bevel, gy);
      ctx.lineTo(s.x + sw - bevel, gy);
      ctx.stroke();
    }
    ctx.restore();

    // Subtle outline
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(s.x, s.y, sw, sh);
  }
}

function drawDragon(p) {
  if (!p || p.dead) return;
  const s = worldToScreen(p.x, p.y);
  const sc = SCALE;
  const f = p.facing;
  const breatheOff = Math.sin(p.breathe * 2) * 1.5 * sc;
  const t = performance.now() / 1000;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.scale(f, 1);

  // Hit flash
  if (p.hit > 0 && Math.floor(p.hit * 10) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }

  const bh = (36 + breatheOff / sc) * sc;
  const bw = 28 * sc;
  const legOffset = [0, 2.5, 0, -2.5][p.walkFrame];

  // === SHADOW ===
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, 2 * sc, bw * 0.5, 4 * sc, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // === TAIL (wiggly sine wave) ===
  const tailSegs = 6;
  ctx.save();
  ctx.strokeStyle = '#3a3';
  ctx.lineWidth = 4 * sc;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-10 * sc, -bh * 0.3);
  for (let i = 1; i <= tailSegs; i++) {
    const tt = i / tailSegs;
    const tx = (-10 - i * 4) * sc;
    const ty = -bh * 0.3 + Math.sin(t * 4 + i * 1.2) * (3 + i * 1.2) * sc + i * 1 * sc;
    ctx.lineTo(tx, ty);
  }
  ctx.stroke();
  // Tail tip
  const tipX = (-10 - tailSegs * 4) * sc;
  const tipY = -bh * 0.3 + Math.sin(t * 4 + tailSegs * 1.2) * (3 + tailSegs * 1.2) * sc + tailSegs * 1 * sc;
  ctx.fillStyle = '#f80';
  ctx.beginPath();
  ctx.moveTo(tipX, tipY - 2 * sc);
  ctx.lineTo(tipX - 4 * sc, tipY);
  ctx.lineTo(tipX, tipY + 2 * sc);
  ctx.fill();
  ctx.restore();

  // === BACK LEG (behind body) ===
  ctx.save();
  const backLegY = -2 * sc - legOffset * sc;
  // Thigh
  ctx.fillStyle = '#3a3';
  ctx.beginPath();
  ctx.ellipse(-5 * sc, backLegY, 5.5 * sc, 7 * sc, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // Foot
  const bfGrad = ctx.createRadialGradient(-4*sc, backLegY + 5*sc, 0, -4*sc, backLegY + 5*sc, 7*sc);
  bfGrad.addColorStop(0, '#5d5');
  bfGrad.addColorStop(1, '#3a3');
  ctx.fillStyle = bfGrad;
  ctx.beginPath();
  ctx.ellipse(-4 * sc, 0 - legOffset * sc, 7 * sc, 3.5 * sc, 0, 0, Math.PI * 2);
  ctx.fill();
  // Toes
  ctx.fillStyle = '#4c4';
  for (let toe = 0; toe < 3; toe++) {
    ctx.beginPath();
    ctx.arc((-6 + toe * 2.5) * sc, 0 - legOffset * sc + 2 * sc, 1.5 * sc, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // === WINGS ===
  ctx.save();
  const wingFlap = p.grounded ? Math.sin(p.breathe * 2) * 4 : Math.sin(t * 10) * 12;
  const wingOpen = p.grounded ? 0.7 : 1.0;
  ctx.globalAlpha = 0.85;
  // Wing membrane
  const wmGrad = ctx.createLinearGradient(-4*sc, -bh*0.9, -16*sc, -bh*0.5);
  wmGrad.addColorStop(0, '#6e6');
  wmGrad.addColorStop(1, 'rgba(80,220,80,0.3)');
  ctx.fillStyle = wmGrad;
  ctx.beginPath();
  ctx.moveTo(-4 * sc, -bh * 0.65);
  ctx.quadraticCurveTo(-10 * sc, -bh * 0.85 - wingFlap * sc * wingOpen, -18 * sc * wingOpen, -bh * 0.8 - wingFlap * sc * wingOpen);
  ctx.quadraticCurveTo(-16 * sc * wingOpen, -bh * 0.65 - wingFlap * sc * 0.5, -12 * sc, -bh * 0.55);
  ctx.quadraticCurveTo(-8 * sc, -bh * 0.55, -4 * sc, -bh * 0.6);
  ctx.fill();
  // Wing bone
  ctx.strokeStyle = '#4a4';
  ctx.lineWidth = 1.5 * sc;
  ctx.beginPath();
  ctx.moveTo(-4 * sc, -bh * 0.65);
  ctx.quadraticCurveTo(-10 * sc, -bh * 0.85 - wingFlap * sc * wingOpen, -18 * sc * wingOpen, -bh * 0.8 - wingFlap * sc * wingOpen);
  ctx.stroke();
  ctx.restore();

  // === BODY (chunky bezier shape with gradient) ===
  ctx.save();
  const bodyGrad = ctx.createLinearGradient(0, -bh * 0.85, 0, -bh * 0.05);
  bodyGrad.addColorStop(0, '#4dd44d'); // bright green top
  bodyGrad.addColorStop(0.4, '#44cc44');
  bodyGrad.addColorStop(1, '#66ee44'); // lime green bottom
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  // Chunky rounded body using bezier curves
  ctx.moveTo(bw * 0.35, -bh * 0.08);
  ctx.bezierCurveTo(bw * 0.55, -bh * 0.08, bw * 0.55, -bh * 0.25, bw * 0.5, -bh * 0.45);
  ctx.bezierCurveTo(bw * 0.48, -bh * 0.7, bw * 0.3, -bh * 0.85, 0, -bh * 0.85);
  ctx.bezierCurveTo(-bw * 0.35, -bh * 0.85, -bw * 0.5, -bh * 0.7, -bw * 0.48, -bh * 0.35);
  ctx.bezierCurveTo(-bw * 0.45, -bh * 0.1, -bw * 0.3, -bh * 0.05, -bw * 0.1, -bh * 0.08);
  ctx.bezierCurveTo(bw * 0.05, -bh * 0.06, bw * 0.2, -bh * 0.06, bw * 0.35, -bh * 0.08);
  ctx.fill();
  // Body shadow (bottom edge)
  ctx.fillStyle = 'rgba(0,80,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, -bh * 0.15, bw * 0.42, bh * 0.12, 0, 0, Math.PI);
  ctx.fill();
  ctx.restore();

  // === BELLY PATCH (cream/yellow oval) ===
  ctx.save();
  const bellyGrad = ctx.createRadialGradient(2*sc, -bh*0.35, 0, 2*sc, -bh*0.35, bh*0.3);
  bellyGrad.addColorStop(0, '#fff8d0');
  bellyGrad.addColorStop(0.7, '#eecc66');
  bellyGrad.addColorStop(1, '#ddbb44');
  ctx.fillStyle = bellyGrad;
  ctx.beginPath();
  ctx.ellipse(2 * sc, -bh * 0.33, bw * 0.28, bh * 0.3, 0.05, 0.3, Math.PI - 0.3);
  ctx.fill();
  ctx.restore();

  // === BACK SPIKES (row along the back curve) ===
  ctx.save();
  for (let i = 0; i < 5; i++) {
    const spX = (-2 - i * 3.5) * sc;
    const spBaseY = -bh * 0.68 + i * 3.5 * sc;
    const spH = (5 - i * 0.5) * sc;
    const spikeGrad = ctx.createLinearGradient(spX, spBaseY, spX, spBaseY - spH);
    spikeGrad.addColorStop(0, '#f80');
    spikeGrad.addColorStop(1, '#ff4');
    ctx.fillStyle = spikeGrad;
    ctx.beginPath();
    ctx.moveTo(spX - 2.5 * sc, spBaseY);
    ctx.lineTo(spX, spBaseY - spH);
    ctx.lineTo(spX + 2.5 * sc, spBaseY);
    ctx.fill();
  }
  ctx.restore();

  // === FRONT LEG ===
  ctx.save();
  const frontLegY = -2 * sc + legOffset * sc;
  ctx.fillStyle = '#3a3';
  ctx.beginPath();
  ctx.ellipse(5 * sc, frontLegY, 5.5 * sc, 7 * sc, 0.15, 0, Math.PI * 2);
  ctx.fill();
  // Foot with gradient
  const ffGrad = ctx.createRadialGradient(6*sc, frontLegY + 5*sc, 0, 6*sc, frontLegY + 5*sc, 7*sc);
  ffGrad.addColorStop(0, '#5d5');
  ffGrad.addColorStop(1, '#3a3');
  ctx.fillStyle = ffGrad;
  ctx.beginPath();
  ctx.ellipse(6 * sc, 0 + legOffset * sc, 7 * sc, 3.5 * sc, 0, 0, Math.PI * 2);
  ctx.fill();
  // Toes
  ctx.fillStyle = '#4c4';
  for (let toe = 0; toe < 3; toe++) {
    ctx.beginPath();
    ctx.arc((4 + toe * 2.5) * sc, 0 + legOffset * sc + 2 * sc, 1.5 * sc, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // === STUBBY ARMS ===
  ctx.save();
  const armSwing = Math.abs(player.vx) > 10 ? Math.sin(t * 8) * 0.3 : 0;
  // Front arm
  ctx.fillStyle = '#3c3';
  ctx.beginPath();
  ctx.save();
  ctx.translate(8 * sc, -bh * 0.4);
  ctx.rotate(0.4 + armSwing);
  ctx.ellipse(0, 4 * sc, 3 * sc, 5 * sc, 0, 0, Math.PI * 2);
  ctx.fill();
  // Rounded hand
  ctx.fillStyle = '#5d5';
  ctx.beginPath();
  ctx.arc(0, 8 * sc, 2.5 * sc, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // Back arm (behind)
  ctx.fillStyle = '#2a2';
  ctx.beginPath();
  ctx.save();
  ctx.translate(-6 * sc, -bh * 0.4);
  ctx.rotate(-0.3 - armSwing);
  ctx.ellipse(0, 4 * sc, 3 * sc, 5 * sc, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#4a4';
  ctx.beginPath();
  ctx.arc(0, 8 * sc, 2.5 * sc, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.restore();

  // === HEAD ===
  ctx.save();
  // Head gradient
  const headGrad = ctx.createRadialGradient(5*sc, -bh*0.78, 2*sc, 6*sc, -bh*0.75, 13*sc);
  headGrad.addColorStop(0, '#5ee55e');
  headGrad.addColorStop(1, '#3cb43c');
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  // Rounded head with snout bump
  ctx.arc(5 * sc, -bh * 0.75, 12.5 * sc, 0, Math.PI * 2);
  ctx.fill();
  // Snout bump
  ctx.fillStyle = '#4dd44d';
  ctx.beginPath();
  ctx.ellipse(14 * sc, -bh * 0.68, 6 * sc, 5 * sc, 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // === NOSTRILS ===
  ctx.fillStyle = '#2a6';
  ctx.beginPath();
  ctx.ellipse(17 * sc, -bh * 0.7, 1.2 * sc, 1 * sc, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(17 * sc, -bh * 0.65, 1.2 * sc, 1 * sc, 0, 0, Math.PI * 2);
  ctx.fill();

  // === HORNS (orange triangular with gradient) ===
  ctx.save();
  for (let h = 0; h < 2; h++) {
    const hx = (1 + h * 7) * sc;
    const hy = -bh * (0.88 + h * 0.02);
    const hGrad = ctx.createLinearGradient(hx, hy, hx, hy - 8 * sc);
    hGrad.addColorStop(0, '#f80');
    hGrad.addColorStop(1, '#ff4');
    ctx.fillStyle = hGrad;
    ctx.beginPath();
    ctx.moveTo(hx - 2.5 * sc, hy);
    ctx.quadraticCurveTo(hx - 1 * sc, hy - 5 * sc, hx + 0.5 * sc, hy - 8 * sc);
    ctx.quadraticCurveTo(hx + 2 * sc, hy - 5 * sc, hx + 3 * sc, hy);
    ctx.fill();
  }
  ctx.restore();

  // === EYES (BIG, expressive, look in movement direction) ===
  ctx.save();
  // Eye whites
  const eyeX = 8 * sc, eyeY = -bh * 0.8;
  const eyeRx = 5.5 * sc, eyeRy = 6 * sc;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 3 * sc;
  ctx.beginPath();
  ctx.ellipse(eyeX, eyeY, eyeRx, eyeRy, 0, 0, Math.PI * 2);
  ctx.fill();
  // Second eye (smaller, further back)
  ctx.beginPath();
  ctx.ellipse(eyeX - 8 * sc, eyeY + 0.5 * sc, eyeRx * 0.75, eyeRy * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Pupils (look in movement direction — since we're flipped, just offset forward)
  const pupilOff = Math.abs(player.vx) > 10 ? 1.5 : 0;
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(eyeX + pupilOff * sc, eyeY + 0.5 * sc, 2.8 * sc, 3.2 * sc, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(eyeX - 8 * sc + pupilOff * sc, eyeY + 1 * sc, 2.2 * sc, 2.6 * sc, 0, 0, Math.PI * 2);
  ctx.fill();

  // Highlight dots (two per eye for that cute sparkle)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(eyeX + 1.5 * sc, eyeY - 2 * sc, 1.5 * sc, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(eyeX - 1 * sc, eyeY + 1 * sc, 0.8 * sc, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(eyeX - 7 * sc, eyeY - 1.5 * sc, 1.2 * sc, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // === MOUTH ===
  if (p.blowing > 0) {
    // Puffed cheeks
    ctx.save();
    ctx.fillStyle = '#6e6';
    ctx.beginPath();
    ctx.ellipse(12 * sc, -bh * 0.62, 7 * sc, 6 * sc, 0, 0, Math.PI * 2);
    ctx.fill();
    // Open mouth (circle)
    ctx.fillStyle = '#c33';
    ctx.beginPath();
    ctx.arc(16 * sc, -bh * 0.65, 4 * sc, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#811';
    ctx.beginPath();
    ctx.arc(16 * sc, -bh * 0.65, 2.5 * sc, 0, Math.PI * 2);
    ctx.fill();
    // Bubble forming
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.4;
    const puffR = (3 + p.blowing * 15) * sc;
    const pGrad = ctx.createRadialGradient(22*sc, -bh*0.65, 0, 22*sc, -bh*0.65, puffR);
    pGrad.addColorStop(0, 'rgba(150,220,255,0.6)');
    pGrad.addColorStop(1, 'rgba(100,180,255,0)');
    ctx.fillStyle = pGrad;
    ctx.beginPath();
    ctx.arc(22 * sc, -bh * 0.65, puffR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else {
    // Happy smile (bezier)
    ctx.strokeStyle = '#2a7a2a';
    ctx.lineWidth = 1.8 * sc;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(10 * sc, -bh * 0.66);
    ctx.quadraticCurveTo(13 * sc, -bh * 0.6, 15 * sc, -bh * 0.66);
    ctx.stroke();
    // Cheek blush
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#f88';
    ctx.beginPath();
    ctx.ellipse(14 * sc, -bh * 0.62, 3.5 * sc, 2.5 * sc, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // === COMBO AURA ===
  if (chainCount > 0 && chainTimer > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.25 * (chainTimer / 1.5);
    const agrad = ctx.createRadialGradient(0, -bh*0.45, 0, 0, -bh*0.45, 35*sc);
    agrad.addColorStop(0, '#ff0');
    agrad.addColorStop(0.5, '#fa0');
    agrad.addColorStop(1, 'transparent');
    ctx.fillStyle = agrad;
    ctx.fillRect(-35*sc, -bh-15*sc, 70*sc, bh+30*sc);
    ctx.restore();
  }

  ctx.restore();
}

function drawEnemy(en) {
  if (!en.alive && !en.trapped) return;
  const s = worldToScreen(en.x, en.y);
  const sc = SCALE;
  const dir = Math.sign(en.vx) || 1;
  const t = performance.now() / 1000;

  ctx.save();
  ctx.translate(s.x, s.y);

  if (en.trapped) { ctx.restore(); return; }

  // Angry pulsing
  if (en.angry) {
    ctx.globalAlpha = 0.6 + 0.4 * Math.abs(Math.sin(t * 8));
  }

  const bh = en.h * sc;
  const bw = en.w * sc;

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, 1 * sc, bw * 0.4, 3 * sc, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  if (en.type === 'zen') {
    // === ZEN-CHAN: Round green blob with googly eyes ===
    const wobble = Math.sin(t * 5 + en.x * 0.1) * 0.04;
    ctx.save();
    ctx.rotate(wobble);

    // Body gradient (round blob)
    const zenGrad = ctx.createRadialGradient(-2*sc, -bh*0.55, 2*sc, 0, -bh*0.45, bw*0.5);
    zenGrad.addColorStop(0, en.angry ? '#ff6644' : '#88ee66');
    zenGrad.addColorStop(1, en.angry ? '#cc2200' : '#44aa22');
    ctx.fillStyle = zenGrad;
    ctx.beginPath();
    // Blobby shape using bezier
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(bw*0.5, 0, bw*0.55, -bh*0.3, bw*0.48, -bh*0.55);
    ctx.bezierCurveTo(bw*0.4, -bh*0.85, bw*0.15, -bh*0.95, 0, -bh*0.95);
    ctx.bezierCurveTo(-bw*0.15, -bh*0.95, -bw*0.4, -bh*0.85, -bw*0.48, -bh*0.55);
    ctx.bezierCurveTo(-bw*0.55, -bh*0.3, -bw*0.5, 0, 0, 0);
    ctx.fill();

    // Belly highlight
    ctx.save();
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(0, -bh*0.4, bw*0.25, bh*0.2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // BIG googly eyes
    const eyeSize = 5.5 * sc;
    for (let e = -1; e <= 1; e += 2) {
      const ex = e * 4.5 * sc;
      const ey = -bh * 0.6;
      // White
      ctx.fillStyle = '#fff';
      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 2 * sc;
      ctx.beginPath();
      ctx.arc(ex, ey, eyeSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Pupil (tracks player)
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(ex + en.eyeTrack * 2 * sc, ey + 0.5 * sc, eyeSize * 0.5, 0, Math.PI * 2);
      ctx.fill();
      // Highlight
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex + 1.5 * sc, ey - 1.5 * sc, eyeSize * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Small mouth
    ctx.strokeStyle = en.angry ? '#800' : '#2a6a22';
    ctx.lineWidth = 1.5 * sc;
    ctx.lineCap = 'round';
    ctx.beginPath();
    if (en.angry) {
      ctx.moveTo(-3*sc, -bh*0.35); ctx.lineTo(0, -bh*0.3); ctx.lineTo(3*sc, -bh*0.35);
    } else {
      ctx.arc(0, -bh*0.38, 3*sc, 0.1, Math.PI - 0.1);
    }
    ctx.stroke();

    // Feet (wobble animated)
    const lo = [0,2.5,0,-2.5][en.walkFrame] * sc;
    const footCol = en.angry ? '#cc3300' : '#55aa33';
    for (let f = -1; f <= 1; f += 2) {
      ctx.fillStyle = footCol;
      ctx.beginPath();
      ctx.ellipse(f * 6.5 * sc, 0 + f * lo, 5.5 * sc, 3.5 * sc, f * 0.15, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

  } else if (en.type === 'mighta') {
    // === MIGHTA: Hooded figure with glowing eyes and cape ===
    const sway = Math.sin(t * 3 + en.x * 0.1) * 0.03;
    ctx.save();
    ctx.rotate(sway);

    // Cape flowing behind
    ctx.save();
    const capeDir = -Math.sign(en.vx) || -1;
    ctx.fillStyle = en.angry ? '#881100' : '#223388';
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(capeDir * -2 * sc, -bh * 0.7);
    ctx.quadraticCurveTo(capeDir * -10 * sc, -bh * 0.4 + Math.sin(t * 4) * 3 * sc,
                         capeDir * -8 * sc, 0 + Math.sin(t * 3) * 2 * sc);
    ctx.quadraticCurveTo(capeDir * -5 * sc, -bh * 0.3, capeDir * -2 * sc, -bh * 0.2);
    ctx.fill();
    ctx.restore();

    // Body
    const migGrad = ctx.createRadialGradient(0, -bh*0.5, 2*sc, 0, -bh*0.45, bw*0.5);
    migGrad.addColorStop(0, en.angry ? '#ff5533' : '#5588ff');
    migGrad.addColorStop(1, en.angry ? '#aa2200' : '#2244aa');
    ctx.fillStyle = migGrad;
    ctx.beginPath();
    ctx.ellipse(0, -bh * 0.45, bw * 0.46, bh * 0.46, 0, 0, Math.PI * 2);
    ctx.fill();

    // Hood (pointed top)
    const hoodGrad = ctx.createLinearGradient(0, -bh*0.95, 0, -bh*0.5);
    hoodGrad.addColorStop(0, en.angry ? '#aa1100' : '#1a3377');
    hoodGrad.addColorStop(1, en.angry ? '#cc2200' : '#2a44aa');
    ctx.fillStyle = hoodGrad;
    ctx.beginPath();
    ctx.moveTo(-bw*0.42, -bh*0.55);
    ctx.quadraticCurveTo(-bw*0.3, -bh*0.9, 0, -bh*1.05);
    ctx.quadraticCurveTo(bw*0.3, -bh*0.9, bw*0.42, -bh*0.55);
    ctx.quadraticCurveTo(bw*0.2, -bh*0.65, 0, -bh*0.6);
    ctx.quadraticCurveTo(-bw*0.2, -bh*0.65, -bw*0.42, -bh*0.55);
    ctx.fill();

    // Glowing eyes under hood
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let e = -1; e <= 1; e += 2) {
      const ex = e * 3.5 * sc + en.eyeTrack * sc;
      const ey = -bh * 0.55;
      // Glow
      ctx.globalAlpha = 0.4;
      const eGlow = ctx.createRadialGradient(ex, ey, 0, ex, ey, 5*sc);
      eGlow.addColorStop(0, en.angry ? '#ff4400' : '#ffff00');
      eGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = eGlow;
      ctx.fillRect(ex-5*sc, ey-5*sc, 10*sc, 10*sc);
      // Core
      ctx.globalAlpha = 1;
      ctx.fillStyle = en.angry ? '#ff6600' : '#ffee00';
      ctx.beginPath();
      ctx.ellipse(ex, ey, 2.5*sc, 2*sc, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();

    // Small feet
    const lo = [0,2,0,-2][en.walkFrame] * sc;
    ctx.fillStyle = en.angry ? '#882200' : '#223388';
    ctx.beginPath();
    ctx.ellipse(-4*sc, 0+lo, 4*sc, 2.5*sc, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(4*sc, 0-lo, 4*sc, 2.5*sc, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();

  } else if (en.type === 'monsta') {
    // === MONSTA: Chubby white whale, squash/stretch bounce ===
    const bounce = Math.sin(t * 4) * 0.06;
    const squashX = 1 + bounce;
    const squashY = 1 - bounce;

    ctx.save();
    ctx.scale(squashX, squashY);

    // Body gradient
    const monGrad = ctx.createRadialGradient(2*sc, -bh*0.5, 2*sc, 0, -bh*0.45, bw*0.55);
    monGrad.addColorStop(0, en.angry ? '#ffaaaa' : '#ffffff');
    monGrad.addColorStop(1, en.angry ? '#ff6666' : '#ccccee');
    ctx.fillStyle = monGrad;
    ctx.beginPath();
    // Whale body shape
    ctx.moveTo(bw*0.45, -bh*0.3);
    ctx.bezierCurveTo(bw*0.55, -bh*0.5, bw*0.45, -bh*0.8, bw*0.1, -bh*0.9);
    ctx.bezierCurveTo(-bw*0.15, -bh*0.92, -bw*0.45, -bh*0.8, -bw*0.5, -bh*0.5);
    ctx.bezierCurveTo(-bw*0.52, -bh*0.2, -bw*0.3, 0, 0, 0);
    ctx.bezierCurveTo(bw*0.2, 0, bw*0.4, -bh*0.1, bw*0.45, -bh*0.3);
    ctx.fill();

    // Belly
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#eef';
    ctx.beginPath();
    ctx.ellipse(2*sc, -bh*0.35, bw*0.3, bh*0.25, 0.1, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Tail fin
    const tailWag = Math.sin(t * 5) * 5 * sc;
    ctx.fillStyle = en.angry ? '#ff8888' : '#bbbbee';
    ctx.beginPath();
    ctx.moveTo(-bw*0.4, -bh*0.5);
    ctx.quadraticCurveTo(-bw*0.65, -bh*0.75 + tailWag, -bw*0.55, -bh*0.9 + tailWag);
    ctx.quadraticCurveTo(-bw*0.45, -bh*0.7, -bw*0.35, -bh*0.55);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-bw*0.4, -bh*0.5);
    ctx.quadraticCurveTo(-bw*0.65, -bh*0.3 + tailWag, -bw*0.55, -bh*0.15 + tailWag);
    ctx.quadraticCurveTo(-bw*0.45, -bh*0.35, -bw*0.35, -bh*0.45);
    ctx.fill();

    // Blowhole
    ctx.fillStyle = en.angry ? '#dd6666' : '#aaaacc';
    ctx.beginPath();
    ctx.ellipse(-bw*0.05, -bh*0.88, 2.5*sc, 1.5*sc, 0, 0, Math.PI*2);
    ctx.fill();

    // Eye (one visible - whale style)
    const ex = 5 * sc + en.eyeTrack * sc;
    const ey = -bh * 0.6;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(ex, ey, 4*sc, 4.5*sc, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(ex + en.eyeTrack * sc, ey + 0.5*sc, 2.5*sc, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ex + 1*sc, ey - 1*sc, 1*sc, 0, Math.PI*2);
    ctx.fill();

    // Cute smile
    ctx.strokeStyle = en.angry ? '#cc4444' : '#8888bb';
    ctx.lineWidth = 1.5*sc;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(8*sc, -bh*0.42, 4*sc, -0.2, Math.PI * 0.5);
    ctx.stroke();

    ctx.restore();

  } else if (en.type === 'drunk') {
    // === DRUNK: Purple dragon-like with flame particles ===
    const sway = Math.sin(t * 3.5) * 0.04;
    ctx.save();
    ctx.rotate(sway);

    // Body gradient
    const drkGrad = ctx.createRadialGradient(0, -bh*0.55, 2*sc, 0, -bh*0.5, bw*0.5);
    drkGrad.addColorStop(0, en.angry ? '#ff5544' : '#bb66ff');
    drkGrad.addColorStop(1, en.angry ? '#aa2200' : '#7733cc');
    ctx.fillStyle = drkGrad;
    ctx.beginPath();
    ctx.ellipse(0, -bh*0.5, bw*0.48, bh*0.5, 0, 0, Math.PI*2);
    ctx.fill();

    // Dragon belly
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#e8d0ff';
    ctx.beginPath();
    ctx.ellipse(2*sc, -bh*0.38, bw*0.25, bh*0.25, 0.1, 0.2, Math.PI-0.2);
    ctx.fill();
    ctx.restore();

    // Animated flame crown
    for (let i = 0; i < 5; i++) {
      const fx = (i - 2) * 4.5 * sc;
      const flameH = (6 + Math.sin(t * 12 + i * 1.8) * 3) * sc;
      const fGrad = ctx.createLinearGradient(fx, -bh*0.88, fx, -bh*0.88 - flameH);
      if (en.angry) {
        fGrad.addColorStop(0, '#ff4400');
        fGrad.addColorStop(0.5, '#ff8800');
        fGrad.addColorStop(1, '#ffcc00');
      } else {
        fGrad.addColorStop(0, '#9944cc');
        fGrad.addColorStop(0.5, '#cc66ff');
        fGrad.addColorStop(1, '#ff88ff');
      }
      ctx.fillStyle = fGrad;
      ctx.beginPath();
      ctx.moveTo(fx - 3*sc, -bh*0.88);
      ctx.quadraticCurveTo(fx - 1*sc, -bh*0.88 - flameH*0.7, fx, -bh*0.88 - flameH);
      ctx.quadraticCurveTo(fx + 1*sc, -bh*0.88 - flameH*0.7, fx + 3*sc, -bh*0.88);
      ctx.fill();
    }

    // Flame particles around mouth area when angry
    if (en.angry) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.5;
      for (let i = 0; i < 4; i++) {
        const px = (8 + i * 3) * sc * dir;
        const py = -bh * 0.45 + Math.sin(t * 10 + i * 2) * 3 * sc;
        ctx.fillStyle = ['#f80','#ff0','#f40'][i % 3];
        ctx.beginPath();
        ctx.arc(px, py, (2 + Math.sin(t * 8 + i) * 1) * sc, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // Eyes (menacing)
    for (let e = -1; e <= 1; e += 2) {
      const ex = (e * 4 + (e > 0 ? 1 : 0)) * sc;
      const ey = -bh * 0.58;
      // Red sclera
      ctx.fillStyle = en.angry ? '#ff2200' : '#dd2200';
      ctx.beginPath();
      ctx.ellipse(ex, ey, 3.5*sc, 3*sc, 0, 0, Math.PI*2);
      ctx.fill();
      // Yellow slit pupil
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.ellipse(ex + en.eyeTrack * sc, ey, 1.5*sc, 2.5*sc, 0, 0, Math.PI*2);
      ctx.fill();
      // Glow
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.2;
      const eGlow = ctx.createRadialGradient(ex, ey, 0, ex, ey, 5*sc);
      eGlow.addColorStop(0, '#f00');
      eGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = eGlow;
      ctx.fillRect(ex-5*sc, ey-5*sc, 10*sc, 10*sc);
      ctx.restore();
    }

    // Snout / mouth
    ctx.fillStyle = en.angry ? '#cc3322' : '#8844aa';
    ctx.beginPath();
    ctx.ellipse(6*sc*dir, -bh*0.42, 3.5*sc, 2.5*sc, 0, 0, Math.PI*2);
    ctx.fill();
    // Nostrils
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc((7*dir - 1)*sc, -bh*0.44, 1*sc, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc((7*dir + 1)*sc, -bh*0.44, 1*sc, 0, Math.PI*2);
    ctx.fill();

    // Feet
    const lo = [0,2,0,-2][en.walkFrame] * sc;
    ctx.fillStyle = en.angry ? '#992200' : '#6633aa';
    ctx.beginPath();
    ctx.ellipse(-5*sc, 0+lo, 5*sc, 3*sc, -0.1, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(5*sc, 0-lo, 5*sc, 3*sc, 0.1, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  ctx.restore();
}

function drawTrappedEnemy(en, bx, by, radius) {
  const sc = SCALE;
  const t = performance.now() / 1000;
  ctx.save();
  ctx.translate(bx, by);

  const squish = 1 + 0.12 * Math.sin(t * 5);
  const wiggle = Math.sin(t * 6) * 0.15;
  ctx.rotate(wiggle);
  ctx.scale(0.55 * squish, 0.55 / squish);

  // Enemy body (slightly distorted inside)
  const col = en.type === 'zen' ? '#6c6' : en.type === 'mighta' ? '#48f' : en.type === 'monsta' ? '#eef' : '#a4f';
  const bodyGrad = ctx.createRadialGradient(-2*sc, -2*sc, 0, 0, 0, 11*sc);
  bodyGrad.addColorStop(0, col);
  bodyGrad.addColorStop(1, '#333');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 10 * sc, 0, Math.PI * 2);
  ctx.fill();

  // Distressed X eyes
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2 * sc;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-5*sc, -4*sc); ctx.lineTo(-2*sc, -1*sc);
  ctx.moveTo(-2*sc, -4*sc); ctx.lineTo(-5*sc, -1*sc);
  ctx.moveTo(2*sc, -4*sc); ctx.lineTo(5*sc, -1*sc);
  ctx.moveTo(5*sc, -4*sc); ctx.lineTo(2*sc, -1*sc);
  ctx.stroke();

  // Distressed mouth (wobbly)
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5 * sc;
  ctx.beginPath();
  ctx.moveTo(-3*sc, 3*sc);
  ctx.quadraticCurveTo(0, 3*sc + Math.sin(t*8)*2*sc, 3*sc, 3*sc);
  ctx.stroke();

  ctx.restore();
}

function drawBubble(b) {
  const s = worldToScreen(b.x, b.y);
  const r = b.radius * SCALE;
  const sc = SCALE;
  const t = performance.now() / 1000;

  if (b.isProjectile) {
    // Rock projectile — craggy with shadow
    const rockGrad = ctx.createRadialGradient(s.x - 1*sc, s.y - 1*sc, 0, s.x, s.y, 6*sc);
    rockGrad.addColorStop(0, '#aaa');
    rockGrad.addColorStop(0.5, '#888');
    rockGrad.addColorStop(1, '#555');
    ctx.fillStyle = rockGrad;
    ctx.beginPath();
    // Irregular rock shape
    for (let i = 0; i < 7; i++) {
      const a = (i / 7) * Math.PI * 2;
      const rr = (4 + (i % 3) * 1.5) * sc;
      const rx = s.x + Math.cos(a) * rr;
      const ry = s.y + Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry);
    }
    ctx.closePath();
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(s.x - 1.5*sc, s.y - 1.5*sc, 2*sc, 0, Math.PI*2);
    ctx.fill();
    return;
  }

  if (b.popping) return;

  ctx.save();

  const hue = (t * 18 + b.wobble * 50) % 360;

  // Outer glow (additive)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.12;
  const outerGlow = ctx.createRadialGradient(s.x, s.y, r * 0.6, s.x, s.y, r * 1.8);
  outerGlow.addColorStop(0, `hsla(${hue}, 80%, 70%, 0.4)`);
  outerGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = outerGlow;
  ctx.fillRect(s.x - r*2, s.y - r*2, r*4, r*4);
  ctx.restore();

  // Main bubble body — multiple gradient layers for depth
  // Layer 1: base translucent fill
  const baseGrad = ctx.createRadialGradient(s.x - r*0.2, s.y - r*0.2, r*0.1, s.x, s.y, r);
  baseGrad.addColorStop(0, `hsla(${hue}, 60%, 85%, 0.25)`);
  baseGrad.addColorStop(0.6, `hsla(${(hue+90)%360}, 50%, 70%, 0.12)`);
  baseGrad.addColorStop(1, `hsla(${(hue+180)%360}, 60%, 60%, 0.08)`);
  ctx.fillStyle = baseGrad;
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
  ctx.fill();

  // Layer 2: inner color gradient
  const innerGrad = ctx.createRadialGradient(s.x, s.y + r*0.3, r*0.1, s.x, s.y, r*0.9);
  innerGrad.addColorStop(0, `hsla(${(hue+120)%360}, 70%, 75%, 0.15)`);
  innerGrad.addColorStop(1, `hsla(${(hue+240)%360}, 60%, 50%, 0.05)`);
  ctx.fillStyle = innerGrad;
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
  ctx.fill();

  // Special bubble inner tint
  if (b.special === 'water') {
    ctx.fillStyle = 'rgba(40,100,255,0.2)';
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI*2); ctx.fill();
  } else if (b.special === 'fire') {
    ctx.fillStyle = 'rgba(255,80,0,0.2)';
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI*2); ctx.fill();
  } else if (b.special === 'lightning') {
    ctx.fillStyle = 'rgba(255,255,0,0.2)';
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI*2); ctx.fill();
  }

  // Rainbow iridescent edge ring (cycling hue around circumference)
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.lineWidth = 2 * sc;
  const edgeSegs = 24;
  for (let i = 0; i < edgeSegs; i++) {
    const a1 = (i / edgeSegs) * Math.PI * 2;
    const a2 = ((i + 1) / edgeSegs) * Math.PI * 2;
    const segHue = (hue + (i / edgeSegs) * 360) % 360;
    ctx.strokeStyle = `hsla(${segHue}, 80%, 65%, 0.6)`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, a1, a2);
    ctx.stroke();
  }
  ctx.restore();

  // White highlight arc (top-left crescent)
  ctx.save();
  ctx.globalAlpha = 0.55;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5 * sc;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(s.x - r*0.15, s.y - r*0.15, r*0.7, Math.PI * 1.1, Math.PI * 1.65);
  ctx.stroke();
  ctx.restore();

  // Small secondary highlight dot
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(s.x + r*0.25, s.y + r*0.3, r*0.12, 0, Math.PI*2);
  ctx.fill();

  // Subtle inner glow
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.08;
  const igGrad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r*0.8);
  igGrad.addColorStop(0, `hsla(${(hue+60)%360}, 90%, 80%, 0.5)`);
  igGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = igGrad;
  ctx.beginPath();
  ctx.arc(s.x, s.y, r*0.8, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Special bubble icon
  if (b.special && b.special !== 'rock') {
    ctx.font = `${Math.floor(12*sc)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icon = b.special === 'water' ? '💧' : b.special === 'fire' ? '🔥' : '⚡';
    ctx.fillText(icon, s.x, s.y);
  }

  // Trapped enemy
  if (b.trapped) {
    drawTrappedEnemy(b.trapped, s.x, s.y, r);
  }

  ctx.restore();
}

function drawFruit(f) {
  const s = worldToScreen(f.x, f.y);
  const sc = SCALE;
  const sz = 10 * sc;
  const t = performance.now() / 1000;
  const pulse = 1 + Math.sin(t * 4 + f.x) * 0.08;

  ctx.save();
  ctx.translate(s.x, s.y - sz);
  ctx.scale(pulse, pulse);

  // Inviting glow (additive)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.2 + 0.1 * Math.sin(t * 3 + f.x);
  const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, sz * 1.5);
  glowGrad.addColorStop(0, f.type.color);
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(0, 0, sz * 1.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  if (f.type.name === 'banana') {
    // Banana with gradient
    const bGrad = ctx.createLinearGradient(-sz*0.8, 0, sz*0.8, 0);
    bGrad.addColorStop(0, '#eecc00');
    bGrad.addColorStop(0.5, '#ffee44');
    bGrad.addColorStop(1, '#ddaa00');
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    // Curved banana shape
    ctx.moveTo(-sz*0.6, sz*0.1);
    ctx.quadraticCurveTo(-sz*0.3, -sz*0.4, sz*0.1, -sz*0.35);
    ctx.quadraticCurveTo(sz*0.5, -sz*0.3, sz*0.6, -sz*0.1);
    ctx.quadraticCurveTo(sz*0.5, sz*0.15, sz*0.1, sz*0.1);
    ctx.quadraticCurveTo(-sz*0.2, sz*0.05, -sz*0.6, sz*0.1);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, -sz*0.15, sz*0.35, sz*0.08, 0.3, 0, Math.PI*2);
    ctx.fill();
  } else if (f.type.name === 'orange') {
    const oGrad = ctx.createRadialGradient(-2*sc, -2*sc, 0, 0, 0, sz*0.65);
    oGrad.addColorStop(0, '#ffaa33');
    oGrad.addColorStop(1, '#ee6600');
    ctx.fillStyle = oGrad;
    ctx.beginPath();
    ctx.arc(0, 0, sz*0.6, 0, Math.PI*2);
    ctx.fill();
    // Texture dots
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#cc5500';
    for (let i = 0; i < 6; i++) {
      const dx = Math.cos(i * 1.1) * sz * 0.3;
      const dy = Math.sin(i * 1.1) * sz * 0.3;
      ctx.beginPath(); ctx.arc(dx, dy, sc, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
    // Stem
    ctx.fillStyle = '#4a2';
    ctx.beginPath();
    ctx.ellipse(0, -sz*0.6, 2.5*sc, 2*sc, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#6a4';
    ctx.fillRect(-1*sc, -sz*0.7, 2*sc, 3*sc);
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(-2*sc, -2*sc, sz*0.2, 0, Math.PI*2);
    ctx.fill();
  } else if (f.type.name === 'cherry') {
    // Stems
    ctx.strokeStyle = '#3a6a22';
    ctx.lineWidth = 1.5*sc;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-3*sc, 2*sc);
    ctx.quadraticCurveTo(-2*sc, -sz*0.5, 0, -sz*0.7);
    ctx.moveTo(3*sc, 2*sc);
    ctx.quadraticCurveTo(2*sc, -sz*0.5, 0, -sz*0.7);
    ctx.stroke();
    // Leaf
    ctx.fillStyle = '#5a2';
    ctx.beginPath();
    ctx.ellipse(2*sc, -sz*0.65, 3*sc, 1.5*sc, 0.5, 0, Math.PI*2);
    ctx.fill();
    // Cherries with gradient
    for (let c = -1; c <= 1; c += 2) {
      const cGrad = ctx.createRadialGradient(c*3*sc - 1*sc, 1*sc, 0, c*3*sc, 2*sc, sz*0.45);
      cGrad.addColorStop(0, '#ff4444');
      cGrad.addColorStop(1, '#aa0000');
      ctx.fillStyle = cGrad;
      ctx.beginPath();
      ctx.arc(c * 3 * sc, 2 * sc, sz * 0.4, 0, Math.PI * 2);
      ctx.fill();
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath();
      ctx.arc(c*3*sc - 1*sc, 0.5*sc, sz*0.12, 0, Math.PI*2);
      ctx.fill();
    }
  } else if (f.type.name === 'strawberry') {
    // Strawberry with gradient
    const sGrad = ctx.createLinearGradient(0, -sz*0.5, 0, sz*0.5);
    sGrad.addColorStop(0, '#ff4466');
    sGrad.addColorStop(1, '#cc1133');
    ctx.fillStyle = sGrad;
    ctx.beginPath();
    ctx.moveTo(0, sz*0.5);
    ctx.quadraticCurveTo(sz*0.65, -sz*0.05, 0, -sz*0.45);
    ctx.quadraticCurveTo(-sz*0.65, -sz*0.05, 0, sz*0.5);
    ctx.fill();
    // Seeds
    ctx.fillStyle = '#ffee66';
    ctx.globalAlpha = 0.5;
    for (let sy = -2; sy <= 2; sy++) {
      for (let sx = -1; sx <= 1; sx++) {
        if ((sx + sy) % 2 === 0) {
          ctx.beginPath();
          ctx.ellipse(sx * 2.5 * sc, sy * 2.5 * sc, 0.8*sc, 1.2*sc, 0, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }
    ctx.globalAlpha = 1;
    // Leaves
    ctx.fillStyle = '#4a2';
    ctx.beginPath();
    ctx.ellipse(0, -sz*0.45, sz*0.45, sz*0.15, 0, 0, Math.PI*2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(-2*sc, -sz*0.2, sz*0.15, sz*0.25, -0.3, 0, Math.PI*2);
    ctx.fill();
  } else if (f.type.name === 'cake') {
    // Cake body with layers
    const cakeGrad = ctx.createLinearGradient(0, -sz*0.35, 0, sz*0.3);
    cakeGrad.addColorStop(0, '#ffbb88');
    cakeGrad.addColorStop(1, '#ee9966');
    ctx.fillStyle = cakeGrad;
    // Rounded cake shape
    ctx.beginPath();
    ctx.moveTo(-sz*0.5, sz*0.3);
    ctx.lineTo(-sz*0.5, -sz*0.2);
    ctx.quadraticCurveTo(-sz*0.5, -sz*0.35, -sz*0.3, -sz*0.35);
    ctx.lineTo(sz*0.3, -sz*0.35);
    ctx.quadraticCurveTo(sz*0.5, -sz*0.35, sz*0.5, -sz*0.2);
    ctx.lineTo(sz*0.5, sz*0.3);
    ctx.closePath();
    ctx.fill();
    // Frosting
    ctx.fillStyle = '#ff88cc';
    ctx.beginPath();
    ctx.moveTo(-sz*0.5, -sz*0.15);
    for (let x = -sz*0.5; x <= sz*0.5; x += sz*0.2) {
      ctx.quadraticCurveTo(x + sz*0.05, -sz*0.25, x + sz*0.1, -sz*0.15);
      ctx.quadraticCurveTo(x + sz*0.15, -sz*0.05, x + sz*0.2, -sz*0.15);
    }
    ctx.lineTo(sz*0.5, -sz*0.3);
    ctx.lineTo(-sz*0.5, -sz*0.3);
    ctx.fill();
    // Cream layer
    ctx.fillStyle = '#fff';
    ctx.fillRect(-sz*0.48, -sz*0.35, sz*0.96, sz*0.06);
    // Candle
    ctx.fillStyle = '#ff4488';
    ctx.fillRect(-1.2*sc, -sz*0.65, 2.4*sc, sz*0.3);
    // Flame
    const flameH = 3 + Math.sin(t * 10) * 1;
    const flGrad = ctx.createRadialGradient(0, -sz*0.68, 0, 0, -sz*0.68, flameH*sc);
    flGrad.addColorStop(0, '#fff');
    flGrad.addColorStop(0.3, '#ff0');
    flGrad.addColorStop(1, '#f80');
    ctx.fillStyle = flGrad;
    ctx.beginPath();
    ctx.ellipse(0, -sz*0.7, 2*sc, flameH*sc, 0, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

function drawParticles() {
  // Base particles
  ctx.save();
  for (const p of particles) {
    const s = worldToScreen(p.x, p.y);
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    const sz = p.size * SCALE * (0.5 + alpha * 0.5);
    ctx.beginPath();
