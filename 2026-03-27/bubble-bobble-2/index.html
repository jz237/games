<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bubble Bobble 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;overflow:hidden;overscroll-behavior:none;width:100%;height:100%;background:#000}
canvas{display:block;width:100%;height:100%;touch-action:none}
button{touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none;color:#fff;font-family:inherit}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay.hidden{display:none}
.menu-btn{font-size:clamp(18px,4vw,28px);padding:12px 32px;margin:8px;border-radius:12px;background:linear-gradient(180deg,#6cf,#28a);border:2px solid #aef;text-shadow:0 2px 4px rgba(0,0,0,.5);font-weight:bold;min-width:200px}
.menu-btn:active{transform:scale(.95);background:linear-gradient(180deg,#5be,#179)}
#titleScreen h1{font-size:clamp(28px,7vw,56px);color:#ff0;text-shadow:0 0 20px #fa0,0 0 40px #f80,0 4px 8px rgba(0,0,0,.8);font-family:'Segoe UI',sans-serif;margin-bottom:20px;letter-spacing:2px}
#titleScreen p{color:#adf;font-size:clamp(12px,3vw,18px);margin-bottom:24px}
#gameOverScreen h2{font-size:clamp(24px,6vw,48px);color:#f44;text-shadow:0 0 20px #f00;margin-bottom:16px}
#hsScreen h2{font-size:clamp(20px,5vw,36px);color:#ff0;text-shadow:0 0 15px #fa0;margin-bottom:16px}
.hs-table{color:#fff;font-size:clamp(14px,3vw,20px);text-align:left;border-collapse:collapse;margin:8px 0}
.hs-table td{padding:4px 12px}
.hs-gold{color:#ffd700;text-shadow:0 0 8px #fa0}
.initials-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.init-col{display:flex;flex-direction:column;align-items:center}
.init-char{font-size:clamp(24px,6vw,40px);color:#ff0;text-shadow:0 0 10px #fa0;width:40px;text-align:center}
.arrow-btn{font-size:clamp(20px,5vw,32px);padding:4px 12px;color:#aef}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="titleScreen" class="overlay">
<h1>🫧 BUBBLE BOBBLE 2 🐉</h1>
<p>Trap enemies in bubbles & pop them!</p>
<button class="menu-btn" id="btnStart">▶ START GAME</button>
<button class="menu-btn" id="btnHS">🏆 HIGH SCORES</button>
<p style="margin-top:16px;font-size:clamp(10px,2.5vw,14px);color:#68a">
Hold left/right to move • Swipe up to jump<br>Keyboard: Arrows + Z/Space to shoot
</p>
</div>

<div id="gameOverScreen" class="overlay hidden">
<h2>GAME OVER</h2>
<p id="goScore" style="color:#ff0;font-size:clamp(16px,4vw,24px);margin:8px 0"></p>
<p id="goLevel" style="color:#adf;font-size:clamp(14px,3vw,18px);margin-bottom:12px"></p>
<div id="hsEntry" class="hidden" style="text-align:center">
<p style="color:#ffd700;font-size:clamp(14px,3vw,18px);margin-bottom:8px">NEW HIGH SCORE! Enter initials:</p>
<div class="initials-row" id="initialsRow"></div>
<button class="menu-btn" id="btnSubmitHS">SUBMIT</button>
</div>
<button class="menu-btn" id="btnRestart">🔄 PLAY AGAIN</button>
<button class="menu-btn" id="btnBackMenu">🏠 MENU</button>
</div>

<div id="hsScreen" class="overlay hidden">
<h2>🏆 HIGH SCORES</h2>
<table class="hs-table" id="hsTable"></table>
<button class="menu-btn" id="btnHSBack">⬅ BACK</button>
</div>

<script>
'use strict';
// ===== CONSTANTS =====
const GW = 480, GH = 640;
const GRAVITY = 0.45, JUMP_VEL = -10, PLAYER_SPEED = 3.2, BUBBLE_SPEED = 5;
const HS_KEY = 'bubble_bobble_2_highscores';

// ===== CANVAS SETUP =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let cw, ch, scale;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  cw = window.innerWidth; ch = window.innerHeight;
  canvas.width = cw * dpr; canvas.height = ch * dpr;
  canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
  scale = Math.min(cw / GW, ch / GH);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ===== AUDIO =====
let audioCtx = null, audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioUnlocked = true;
  } catch(e) {}
}
function playTone(freq, dur, type='square', vol=0.1) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function sfxJump() { playTone(400, 0.15); playTone(600, 0.1); }
function sfxShoot() { playTone(800, 0.1, 'sine', 0.08); }
function sfxPop() { playTone(1200, 0.15, 'sine', 0.12); playTone(600, 0.2, 'triangle', 0.08); }
function sfxFruit() { playTone(1000, 0.1); playTone(1400, 0.1); }
function sfxDie() { playTone(200, 0.3, 'sawtooth', 0.1); }
function sfxLevelUp() { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.1), i*120)); }

// ===== HIGH SCORES =====
function getHighScores() { try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch(e) { return []; } }
function saveHighScores(hs) { localStorage.setItem(HS_KEY, JSON.stringify(hs)); }
function isHighScore(score) { const hs = getHighScores(); return hs.length < 10 || score > (hs[hs.length - 1]?.score || 0); }

// ===== GAME STATE =====
let gameState = 'title'; // title, playing, gameover, highscores, levelIntro
let player = null, bubbles = [], enemies = [], fruits = [], particles = [], floatingTexts = [];
let score = 0, lives = 3, level = 1, combo = 0, comboTimer = 0;
let levelTimer = 0, maxLevelTime = 1800; // 30 sec at 60fps
let platforms = [], bgParticles = [], bgStars = [];
let frameCount = 0, shakeTimer = 0, shakeAmt = 0;
let specialBubbleTimer = 0;

// ===== LEVEL DEFINITIONS =====
const LEVELS = [];
for (let i = 0; i < 12; i++) {
  const numEnemies = 3 + Math.floor(i * 1.2);
  const types = i < 3 ? ['blob'] : i < 6 ? ['blob','ghost'] : i < 9 ? ['blob','ghost','bat'] : ['blob','ghost','bat','skull'];
  const plats = [];
  // Bottom floor
  plats.push({x:0,y:GH-24,w:GW,h:24});
  // Generate platform layout based on level
  const rows = 3 + Math.min(i, 3);
  for (let r = 1; r <= rows; r++) {
    const y = GH - 24 - r * (GH - 80) / (rows + 1);
    const numPlats = 1 + Math.floor(Math.random() * 2) + (i % 3);
    const gap = GW / (numPlats + 1);
    for (let p = 0; p < numPlats; p++) {
      const pw = 60 + Math.random() * 60;
      const px = gap * (p + 0.5) + Math.random() * 40 - 20;
      plats.push({x: Math.max(0, Math.min(GW - pw, px)), y, w: pw, h: 16});
    }
  }
  LEVELS.push({ platforms: plats, enemyCount: numEnemies, types, bg: i % 4 });
}

// ===== ENTITY CLASSES =====
function createPlayer() {
  return {
    x: GW/2, y: GH - 60, vx: 0, vy: 0, w: 28, h: 32,
    facing: 1, grounded: false, shootCool: 0, invincible: 0,
    walkFrame: 0, wingFrame: 0, tailFrame: 0, alive: true
  };
}

function createEnemy(x, y, type) {
  return {
    x, y, vx: (Math.random() > 0.5 ? 1 : -1) * (1 + level * 0.2), vy: 0,
    w: 24, h: 24, type, trapped: false, trapTimer: 0, angry: false, angryTimer: 0,
    bobPhase: Math.random() * Math.PI * 2, alive: true, escapeCount: 0
  };
}

function createBubble(x, y, dir, special) {
  return {
    x, y, vx: dir * BUBBLE_SPEED, vy: 0, r: 14, age: 0, maxAge: 300,
    phase: 'shooting', floatTimer: 0, special: special || null, trapped: null,
    hue: Math.random() * 360
  };
}

// ===== BACKGROUND =====
function initBg() {
  bgStars = [];
  for (let i = 0; i < 80; i++) {
    bgStars.push({x: Math.random()*GW, y: Math.random()*GH, r: Math.random()*2+0.5, twinkle: Math.random()*Math.PI*2, speed: Math.random()*0.02+0.005});
  }
  bgParticles = [];
  for (let i = 0; i < 20; i++) {
    bgParticles.push({x: Math.random()*GW, y: Math.random()*GH, r: Math.random()*30+10, vx: Math.random()*0.3-0.15, vy: Math.random()*0.2-0.1, hue: Math.random()*360, alpha: Math.random()*0.15+0.05});
  }
}

function drawBackground() {
  const bgType = LEVELS[Math.min(level-1, 11)].bg;
  // Deep gradient bg
  const colors = [['#0a0020','#1a0040','#050030'],['#001020','#002040','#001830'],['#100020','#200040','#0a0018'],['#001010','#002828','#000a10']];
  const c = colors[bgType];
  const grd = ctx.createLinearGradient(0,0,0,GH);
  grd.addColorStop(0, c[0]); grd.addColorStop(0.5, c[1]); grd.addColorStop(1, c[2]);
  ctx.fillStyle = grd; ctx.fillRect(0,0,GW,GH);

  // Stars
  bgStars.forEach(s => {
    s.twinkle += s.speed;
    const a = 0.4 + 0.6 * Math.sin(s.twinkle);
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Nebula particles
  bgParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < -40) p.x = GW+40; if (p.x > GW+40) p.x = -40;
    if (p.y < -40) p.y = GH+40; if (p.y > GH+40) p.y = -40;
    p.hue += 0.1;
    ctx.globalAlpha = p.alpha;
    const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    g.addColorStop(0, `hsla(${p.hue},80%,60%,0.3)`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Aurora effect
  const t = frameCount * 0.008;
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(0, GH*0.2 + Math.sin(t+i)*30);
    for (let x = 0; x <= GW; x += 20) {
      ctx.lineTo(x, GH*0.2 + Math.sin(t + x*0.01 + i*2)*30 + Math.sin(t*1.5 + x*0.02)*15);
    }
    ctx.lineTo(GW, 0); ctx.lineTo(0, 0); ctx.closePath();
    ctx.fillStyle = `hsl(${120 + i*40 + frameCount*0.2}, 80%, 50%)`;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ===== DRAW PLATFORMS =====
function drawPlatforms() {
  platforms.forEach(p => {
    // 3D bevel
    const g = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    g.addColorStop(0, '#6af'); g.addColorStop(0.3, '#38c'); g.addColorStop(1, '#126');
    ctx.fillStyle = g;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(p.x, p.y, p.w, 3);
    // Bottom shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(p.x, p.y+p.h-2, p.w, 2);
    // Left highlight
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(p.x, p.y, 2, p.h);
    // Right shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(p.x+p.w-2, p.y, 2, p.h);
    // Brick pattern
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.5;
    for (let bx = p.x; bx < p.x + p.w; bx += 16) {
      ctx.beginPath(); ctx.moveTo(bx, p.y); ctx.lineTo(bx, p.y+p.h); ctx.stroke();
    }
  });
}

// ===== DRAW DRAGON =====
function drawDragon(p) {
  if (!p.alive) return;
  const x = p.x, y = p.y;
  const f = p.facing;
  const flash = p.invincible > 0 && Math.floor(frameCount/3) % 2;
  if (flash) { ctx.globalAlpha = 0.5; }

  ctx.save();
  ctx.translate(x + p.w/2, y + p.h/2);
  ctx.scale(f, 1);

  // Tail
  const tailWag = Math.sin(frameCount * 0.15 + p.tailFrame) * 8;
  ctx.strokeStyle = '#2a2'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-14, 4);
  ctx.quadraticCurveTo(-22, 4 + tailWag, -28, -2 + tailWag * 0.5);
  ctx.stroke();
  ctx.strokeStyle = '#4e4'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-14, 4);
  ctx.quadraticCurveTo(-22, 4 + tailWag, -28, -2 + tailWag * 0.5);
  ctx.stroke();

  // Wings
  const wingFlap = p.grounded ? Math.sin(frameCount * 0.05) * 3 : Math.sin(frameCount * 0.25) * 12;
  ctx.fillStyle = 'rgba(100,220,100,0.5)';
  ctx.beginPath();
  ctx.moveTo(-4, -8);
  ctx.quadraticCurveTo(-14, -18 - wingFlap, -6, -22 - wingFlap);
  ctx.quadraticCurveTo(0, -14 - wingFlap * 0.5, 2, -8);
  ctx.fill();
  ctx.fillStyle = 'rgba(140,255,140,0.3)';
  ctx.beginPath();
  ctx.moveTo(-2, -8);
  ctx.quadraticCurveTo(-10, -15 - wingFlap * 0.8, -4, -19 - wingFlap * 0.8);
  ctx.quadraticCurveTo(1, -12 - wingFlap * 0.3, 3, -8);
  ctx.fill();

  // Body
  const bodyG = ctx.createRadialGradient(0, 2, 2, 0, 2, 16);
  bodyG.addColorStop(0, '#6f6'); bodyG.addColorStop(0.6, '#2a2'); bodyG.addColorStop(1, '#172');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.ellipse(0, 2, 13, 15, 0, 0, Math.PI*2);
  ctx.fill();

  // Belly
  const bellyG = ctx.createRadialGradient(0, 6, 1, 0, 6, 9);
  bellyG.addColorStop(0, '#cfc'); bellyG.addColorStop(1, '#6d6');
  ctx.fillStyle = bellyG;
  ctx.beginPath();
  ctx.ellipse(0, 6, 8, 9, 0, 0, Math.PI*2);
  ctx.fill();

  // Spikes on back
  ctx.fillStyle = '#fa0';
  for (let i = 0; i < 4; i++) {
    const sx = -6 - i * 1.5, sy = -10 + i * 3;
    ctx.beginPath();
    ctx.moveTo(sx - 2, sy + 3);
    ctx.lineTo(sx, sy - 3);
    ctx.lineTo(sx + 2, sy + 3);
    ctx.fill();
  }

  // Legs walk cycle
  const legAnim = p.grounded && Math.abs(p.vx) > 0.1 ? Math.sin(frameCount * 0.3) * 4 : 0;
  ctx.fillStyle = '#2a2';
  ctx.beginPath(); ctx.ellipse(-5, 14 + legAnim, 4, 4, 0, 0, Math.PI); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, 14 - legAnim, 4, 4, 0, 0, Math.PI); ctx.fill();
  // Feet
  ctx.fillStyle = '#fa0';
  ctx.beginPath(); ctx.ellipse(-5, 17 + legAnim, 5, 2, 0, 0, Math.PI); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, 17 - legAnim, 5, 2, 0, 0, Math.PI); ctx.fill();

  // Head
  const headG = ctx.createRadialGradient(2, -8, 1, 2, -6, 10);
  headG.addColorStop(0, '#8f8'); headG.addColorStop(0.7, '#2a2'); headG.addColorStop(1, '#172');
  ctx.fillStyle = headG;
  ctx.beginPath();
  ctx.arc(2, -6, 10, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(6, -9, 5, 5.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(7.5, -8.5, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(8.5, -9.5, 1, 0, Math.PI*2); ctx.fill();

  // Snout
  ctx.fillStyle = '#6d6';
  ctx.beginPath();
  ctx.ellipse(10, -4, 5, 3.5, 0, 0, Math.PI*2);
  ctx.fill();
  // Nostril
  ctx.fillStyle = '#283';
  ctx.beginPath(); ctx.arc(12, -5, 1, 0, Math.PI*2); ctx.fill();

  // Mouth
  ctx.strokeStyle = '#172'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(10, -2, 3, 0.1, Math.PI*0.8);
  ctx.stroke();

  // Cheek blush
  ctx.fillStyle = 'rgba(255,150,150,0.3)';
  ctx.beginPath(); ctx.ellipse(10, -1, 3, 2, 0, 0, Math.PI*2); ctx.fill();

  ctx.restore();
  ctx.globalAlpha = 1;
}

// ===== DRAW ENEMIES =====
function drawEnemy(e) {
  if (!e.alive) return;
  const bob = Math.sin(frameCount * 0.06 + e.bobPhase) * 3;
  const x = e.x + e.w/2, y = e.y + e.h/2 + bob;
  const angry = e.angry;

  ctx.save();
  ctx.translate(x, y);

  if (e.trapped) {
    ctx.globalAlpha = 0.6 + Math.sin(frameCount*0.1)*0.2;
    ctx.scale(0.8, 0.8);
  }

  if (e.type === 'blob') {
    // Cute slime blob
    const g = ctx.createRadialGradient(-2, -4, 2, 0, 0, 14);
    g.addColorStop(0, angry ? '#f88' : '#f8f');
    g.addColorStop(0.7, angry ? '#a22' : '#a4a');
    g.addColorStop(1, angry ? '#600' : '#628');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(-12, 4);
    ctx.quadraticCurveTo(-14, -10, 0, -12);
    ctx.quadraticCurveTo(14, -10, 12, 4);
    // Wavy bottom
    const t = frameCount * 0.1;
    ctx.quadraticCurveTo(10, 10 + Math.sin(t)*2, 6, 8 + Math.sin(t+1)*2);
    ctx.quadraticCurveTo(3, 12 + Math.sin(t+2)*2, 0, 8 + Math.sin(t+3)*2);
    ctx.quadraticCurveTo(-3, 12 + Math.sin(t+4)*2, -6, 8 + Math.sin(t+5)*2);
    ctx.quadraticCurveTo(-10, 10 + Math.sin(t+6)*2, -12, 4);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-4, -4, 4, 4.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4, -4, 4, 4.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = angry ? '#f00' : '#222';
    ctx.beginPath(); ctx.arc(-3, -3, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -3, 2, 0, Math.PI*2); ctx.fill();
    // Mouth
    if (angry) {
      ctx.strokeStyle = '#f00'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 1, 4, 0.2, Math.PI-0.2); ctx.stroke();
    } else {
      ctx.fillStyle = '#622';
      ctx.beginPath(); ctx.ellipse(0, 1, 3, 2, 0, 0, Math.PI); ctx.fill();
    }
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.ellipse(-4, -8, 3, 2, -0.3, 0, Math.PI*2); ctx.fill();
  }
  else if (e.type === 'ghost') {
    const sway = Math.sin(frameCount * 0.04 + e.bobPhase) * 5;
    ctx.translate(sway * 0.3, 0);
    const g = ctx.createRadialGradient(-2, -4, 2, 0, 0, 14);
    g.addColorStop(0, angry ? '#faa' : '#eef');
    g.addColorStop(0.6, angry ? '#a44' : '#aac');
    g.addColorStop(1, angry ? '#622' : '#668');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0, -4, 12, Math.PI, 0);
    ctx.lineTo(12, 8);
    for (let i = 4; i >= -4; i -= 2) {
      ctx.quadraticCurveTo(i*3+1.5, 8 + (i%2?-4:4), i*3, 8);
    }
    ctx.lineTo(-12, -4);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-4, -5, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4, -5, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = angry ? '#f00' : '#228';
    ctx.beginPath(); ctx.arc(-3, -4, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -4, 2.5, 0, Math.PI*2); ctx.fill();
    // Glow
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = angry ? '#f44' : '#aaf';
    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  else if (e.type === 'bat') {
    const wingAng = Math.sin(frameCount * 0.2) * 0.6;
    // Wings
    ctx.fillStyle = angry ? '#a22' : '#636';
    ctx.save(); ctx.rotate(-wingAng);
    ctx.beginPath(); ctx.moveTo(-3,-2); ctx.quadraticCurveTo(-16,-14,-20,-4);
    ctx.quadraticCurveTo(-14,0,-10,2); ctx.quadraticCurveTo(-6,0,-3,-2); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.scale(-1,1); ctx.rotate(-wingAng);
    ctx.beginPath(); ctx.moveTo(-3,-2); ctx.quadraticCurveTo(-16,-14,-20,-4);
    ctx.quadraticCurveTo(-14,0,-10,2); ctx.quadraticCurveTo(-6,0,-3,-2); ctx.fill();
    ctx.restore();
    // Body
    const g = ctx.createRadialGradient(0,-2,1,0,0,10);
    g.addColorStop(0, angry ? '#f66' : '#96a');
    g.addColorStop(1, angry ? '#622' : '#314');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(0, 0, 8, 10, 0, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = angry ? '#ff0' : '#ff4';
    ctx.beginPath(); ctx.ellipse(-3, -3, 2.5, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(3, -3, 2.5, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-2.5, -2.5, 1.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3.5, -2.5, 1.2, 0, Math.PI*2); ctx.fill();
    // Fangs
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(-2,3); ctx.lineTo(-1,7); ctx.lineTo(0,3); ctx.fill();
    ctx.beginPath(); ctx.moveTo(1,3); ctx.lineTo(2,7); ctx.lineTo(3,3); ctx.fill();
  }
  else if (e.type === 'skull') {
    const g = ctx.createRadialGradient(0,-2,2,0,0,13);
    g.addColorStop(0, angry ? '#fcc' : '#eee');
    g.addColorStop(0.6, angry ? '#a66' : '#bbb');
    g.addColorStop(1, angry ? '#622' : '#666');
    ctx.fillStyle = g;
    // Skull shape
    ctx.beginPath();
    ctx.arc(0, -3, 12, Math.PI * 0.8, Math.PI * 0.2, true);
    ctx.quadraticCurveTo(6, 10, 4, 12);
    ctx.lineTo(2, 10); ctx.lineTo(0, 12); ctx.lineTo(-2, 10); ctx.lineTo(-4, 12);
    ctx.quadraticCurveTo(-6, 10, -10, 4);
    ctx.fill();
    // Eye sockets
    ctx.fillStyle = angry ? '#f00' : '#222';
    ctx.beginPath(); ctx.ellipse(-4, -4, 3.5, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4, -4, 3.5, 4, 0, 0, Math.PI*2); ctx.fill();
    // Glowing eyes
    ctx.fillStyle = angry ? '#f44' : '#4ff';
    ctx.beginPath(); ctx.arc(-4, -4, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -4, 1.5, 0, Math.PI*2); ctx.fill();
    // Nose
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.moveTo(-1, 1); ctx.lineTo(1, 1); ctx.lineTo(0, 3); ctx.fill();
    // Glow
    if (angry) {
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#f00';
      ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();
}

// ===== DRAW BUBBLES =====
function drawBubble(b) {
  const x = b.x, y = b.y, r = b.r;
  ctx.save();

  // Outer glow
  ctx.globalAlpha = 0.15;
  const og = ctx.createRadialGradient(x,y,r*0.8,x,y,r*1.6);
  if (b.special === 'fire') { og.addColorStop(0,'#f80'); og.addColorStop(1,'transparent'); }
  else if (b.special === 'water') { og.addColorStop(0,'#08f'); og.addColorStop(1,'transparent'); }
  else if (b.special === 'lightning') { og.addColorStop(0,'#ff0'); og.addColorStop(1,'transparent'); }
  else { og.addColorStop(0,`hsl(${b.hue},80%,70%)`); og.addColorStop(1,'transparent'); }
  ctx.fillStyle = og;
  ctx.beginPath(); ctx.arc(x,y,r*1.6,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // Main bubble
  const g = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
  if (b.special === 'fire') {
    g.addColorStop(0, 'rgba(255,200,100,0.4)'); g.addColorStop(0.5, 'rgba(255,100,0,0.2)'); g.addColorStop(1, 'rgba(255,60,0,0.1)');
  } else if (b.special === 'water') {
    g.addColorStop(0, 'rgba(100,200,255,0.4)'); g.addColorStop(0.5, 'rgba(0,100,255,0.2)'); g.addColorStop(1, 'rgba(0,60,200,0.1)');
  } else if (b.special === 'lightning') {
    g.addColorStop(0, 'rgba(255,255,100,0.4)'); g.addColorStop(0.5, 'rgba(255,200,0,0.2)'); g.addColorStop(1, 'rgba(200,180,0,0.1)');
  } else {
    g.addColorStop(0, `hsla(${b.hue},80%,80%,0.35)`);
    g.addColorStop(0.5, `hsla(${b.hue+60},70%,60%,0.15)`);
    g.addColorStop(1, `hsla(${b.hue+120},60%,50%,0.08)`);
  }
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();

  // Iridescent edge
  ctx.lineWidth = 1.5;
  const edgeHue = (b.hue + frameCount * 2) % 360;
  ctx.strokeStyle = `hsla(${edgeHue},90%,70%,0.5)`;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();

  // Highlight arc
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(x - r*0.2, y - r*0.2, r*0.65, -Math.PI*0.8, -Math.PI*0.2); ctx.stroke();

  // Inner highlight dot
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(x - r*0.3, y - r*0.35, r*0.18, 0, Math.PI*2); ctx.fill();

  // Draw trapped enemy inside
  if (b.trapped) {
    ctx.globalAlpha = 0.7;
    ctx.save();
    const sc = 0.6;
    ctx.translate(x, y);
    ctx.scale(sc, sc);
    ctx.translate(-x, -y);
    const fakeE = {...b.trapped, x: x - b.trapped.w/2, y: y - b.trapped.h/2, trapped: false, alive: true};
    drawEnemy(fakeE);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ===== DRAW FRUITS =====
function drawFruit(f) {
  ctx.save();
  ctx.translate(f.x, f.y);
  const bob = Math.sin(frameCount * 0.08 + f.x) * 2;
  ctx.translate(0, bob);

  if (f.type === 'cherry') {
    // Stem
    ctx.strokeStyle = '#3a2'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0,-8); ctx.quadraticCurveTo(2,-4,0,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-8); ctx.quadraticCurveTo(-4,-4,-4,0); ctx.stroke();
    // Cherries
    const cg = ctx.createRadialGradient(-5,1,-1,-4,0,6);
    cg.addColorStop(0,'#f66'); cg.addColorStop(0.5,'#c00'); cg.addColorStop(1,'#800');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(-4, 2, 5, 0, Math.PI*2); ctx.fill();
    const cg2 = ctx.createRadialGradient(4,1,-1,5,0,6);
    cg2.addColorStop(0,'#f66'); cg2.addColorStop(0.5,'#c00'); cg2.addColorStop(1,'#800');
    ctx.fillStyle = cg2;
    ctx.beginPath(); ctx.arc(4, 2, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(-5, 0, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, 0, 1.5, 0, Math.PI*2); ctx.fill();
  } else if (f.type === 'banana') {
    ctx.fillStyle = '#fd0';
    ctx.beginPath();
    ctx.moveTo(-6, 4); ctx.quadraticCurveTo(-8, -6, 0, -8);
    ctx.quadraticCurveTo(8, -6, 6, 4);
    ctx.quadraticCurveTo(0, 2, -6, 4);
    ctx.fill();
    const bg = ctx.createLinearGradient(-4,-6,4,4);
    bg.addColorStop(0,'rgba(255,255,255,0.3)'); bg.addColorStop(1,'rgba(180,140,0,0.3)');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.moveTo(-6, 4); ctx.quadraticCurveTo(-8, -6, 0, -8);
    ctx.quadraticCurveTo(8, -6, 6, 4);
    ctx.quadraticCurveTo(0, 2, -6, 4);
    ctx.fill();
  } else if (f.type === 'melon') {
    const mg = ctx.createRadialGradient(-1,-2,1,0,0,8);
    mg.addColorStop(0,'#8f8'); mg.addColorStop(0.6,'#4a4'); mg.addColorStop(1,'#262');
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.ellipse(0,0,8,7,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#283'; ctx.lineWidth = 0.8;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(-6+i*4, -6);
      ctx.quadraticCurveTo(-4+i*4, 0, -6+i*4, 6);
      ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.ellipse(-2,-3,3,2,-0.3,0,Math.PI*2); ctx.fill();
  } else {
    // Diamond/gem
    const dg = ctx.createLinearGradient(-6,-6,6,6);
    dg.addColorStop(0,'#f8f'); dg.addColorStop(0.5,'#a4f'); dg.addColorStop(1,'#60c');
    ctx.fillStyle = dg;
    ctx.beginPath();
    ctx.moveTo(0,-8); ctx.lineTo(7,-2); ctx.lineTo(0,8); ctx.lineTo(-7,-2); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(0,-8); ctx.lineTo(3,-3); ctx.lineTo(0,-2); ctx.lineTo(-3,-3); ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ===== PARTICLES =====
function spawnParticles(x, y, count, color, big) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * (big ? 6 : 3) + 1;
    particles.push({
      x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - (big?2:1),
      life: 1, decay: 0.01 + Math.random()*0.02, r: Math.random()*(big?6:3)+1,
      color, glow: big
    });
  }
}

function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({x, y, text, color, life: 1, vy: -1.5});
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    if (p.glow) {
      ctx.globalCompositeOperation = 'lighter';
      const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2);
      g.addColorStop(0, p.color); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*2,0,Math.PI*2); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  floatingTexts.forEach(ft => {
    ctx.globalAlpha = ft.life;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = ft.color; ctx.shadowBlur = 10;
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;
}

// ===== INPUT =====
const keys = {};
let touchLeft = false, touchRight = false, touchJump = false, touchShoot = false;
let touchStartX = 0, touchStartY = 0, touchStartTime = 0, touchId = null;

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

function handleCanvasTouchStart(e) {
  const touch = e.changedTouches[0];
  touchId = touch.identifier;
  touchStartX = touch.clientX;
  touchStartY = touch.clientY;
  touchStartTime = Date.now();
  const x = touch.clientX / cw;
  if (x < 0.5) touchLeft = true;
  else touchRight = true;
}

function handleCanvasTouchMove(e) {
  const touch = Array.from(e.changedTouches).find(t => t.identifier === touchId);
  if (!touch) return;
  const dy = touch.clientY - touchStartY;
  if (dy < -30 && !touchJump) { touchJump = true; }
  const x = touch.clientX / cw;
  touchLeft = x < 0.5;
  touchRight = x >= 0.5;
}

function handleCanvasTouchEnd(e) {
  const touch = Array.from(e.changedTouches).find(t => t.identifier === touchId);
  if (!touch) return;
  const dt = Date.now() - touchStartTime;
  const dx = Math.abs(touch.clientX - touchStartX);
  const dy = Math.abs(touch.clientY - touchStartY);
  if (dt < 200 && dx < 15 && dy < 15) { touchShoot = true; }
  touchLeft = false; touchRight = false; touchId = null;
}

canvas.addEventListener('touchstart', (e) => {
  if (e.target.closest('button') || e.target.closest('.overlay')) return;
  e.preventDefault();
  unlockAudio();
  if (gameState === 'playing') handleCanvasTouchStart(e);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (e.target.closest('button') || e.target.closest('.overlay')) return;
  e.preventDefault();
  if (gameState === 'playing') handleCanvasTouchMove(e);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (e.target.closest('button') || e.target.closest('.overlay')) return;
  e.preventDefault();
  if (gameState === 'playing') handleCanvasTouchEnd(e);
}, { passive: false });

canvas.addEventListener('touchcancel', () => {
  touchLeft = false; touchRight = false; touchJump = false; touchId = null;
});

}

// ===== PHYSICS & UPDATE =====
function rectCollide(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function circRectCollide(cx, cy, cr, rx, ry, rw, rh) {
  const nx = Math.max(rx, Math.min(cx, rx+rw));
  const ny = Math.max(ry, Math.min(cy, ry+rh));
  const dx = cx-nx, dy = cy-ny;
  return dx*dx+dy*dy < cr*cr;
}

function updatePlayer() {
  const p = player;
  if (!p.alive) return;

  // Input
  let moveLeft = keys['ArrowLeft'] || keys['KeyA'] || touchLeft;
  let moveRight = keys['ArrowRight'] || keys['KeyD'] || touchRight;
  let jump = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touchJump;
  let shoot = keys['KeyZ'] || keys['KeyX'] || touchShoot;

  if (moveLeft) { p.vx = -PLAYER_SPEED; p.facing = -1; }
  else if (moveRight) { p.vx = PLAYER_SPEED; p.facing = 1; }
  else { p.vx *= 0.7; }

  if (jump && p.grounded) {
    p.vy = JUMP_VEL;
    p.grounded = false;
    sfxJump();
  }
  touchJump = false;

  // Auto-shoot while moving, or tap shoot
  if (p.shootCool <= 0) {
    if ((moveLeft || moveRight || shoot) && p.shootCool <= 0) {
      if (shoot || (moveLeft || moveRight)) {
        bubbles.push(createBubble(p.x + p.w/2 + p.facing * 10, p.y + 6, p.facing, null));
        p.shootCool = shoot ? 12 : 20;
        sfxShoot();
      }
    }
  }
  touchShoot = false;
  if (p.shootCool > 0) p.shootCool--;

  // Physics
  p.vy += GRAVITY;
  p.x += p.vx;
  p.y += p.vy;

  // Platform collision
  p.grounded = false;
  platforms.forEach(pl => {
    if (p.vy >= 0 && p.x + p.w > pl.x && p.x < pl.x + pl.w) {
      if (p.y + p.h > pl.y && p.y + p.h < pl.y + pl.h + p.vy + 2) {
        p.y = pl.y - p.h;
        p.vy = 0;
        p.grounded = true;
      }
    }
  });

  // Screen wrap
  if (p.x > GW) p.x = -p.w;
  if (p.x + p.w < 0) p.x = GW;
  if (p.y > GH) p.y = -p.h; // fall through bottom = wrap to top
  if (p.y + p.h < 0) p.y = GH;

  // Invincibility countdown
  if (p.invincible > 0) p.invincible--;

  // Walk/wing animation
  p.walkFrame += Math.abs(p.vx) * 0.1;
  p.wingFrame += 0.05;
  p.tailFrame += 0.03;
}

function updateEnemies() {
  enemies.forEach(e => {
    if (!e.alive || e.trapped) return;

    // AI: move and bounce off walls
    e.x += e.vx * (e.angry ? 1.8 : 1);
    e.vy += GRAVITY * 0.8;
    e.y += e.vy;

    // Platform collision
    platforms.forEach(pl => {
      if (e.vy >= 0 && e.x + e.w > pl.x && e.x < pl.x + pl.w) {
        if (e.y + e.h > pl.y && e.y + e.h < pl.y + pl.h + 8) {
          e.y = pl.y - e.h;
          e.vy = (e.type === 'ghost' || e.type === 'bat') ? -3 - Math.random()*3 : 0;
        }
      }
    });

    // Wall bounce
    if (e.x < 0 || e.x + e.w > GW) e.vx *= -1;
    e.x = Math.max(0, Math.min(GW - e.w, e.x));

    // Screen wrap vertical
    if (e.y > GH) e.y = -e.h;
    if (e.y + e.h < 0) e.y = GH;

    // Ghost/bat can fly toward player
    if ((e.type === 'ghost' || e.type === 'bat') && player.alive && Math.random() < 0.02) {
      e.vy = -4 - Math.random() * 2;
    }

    // Angry timer
    if (e.angryTimer > 0) {
      e.angryTimer--;
      if (e.angryTimer <= 0) e.angry = false;
    }

    // Collide with player
    if (player.alive && player.invincible <= 0) {
      if (rectCollide(player, e)) {
        playerHit();
      }
    }
  });
}

function updateBubbles() {
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.age++;
    b.hue += 0.5;

    if (b.phase === 'shooting') {
      b.x += b.vx;
      b.vy = -0.3;
      b.y += b.vy;
      if (b.age > 30) { b.phase = 'floating'; b.vx = 0; }

      // Check if bubble hits enemy
      if (!b.trapped) {
        enemies.forEach(e => {
          if (!e.alive || e.trapped) return;
          if (circRectCollide(b.x, b.y, b.r, e.x, e.y, e.w, e.h)) {
            b.trapped = e;
            e.trapped = true;
            e.trapTimer = 300 + Math.random() * 200;
            b.phase = 'floating';
            b.vx = 0;
            sfxPop();
          }
        });
      }
    }

    if (b.phase === 'floating') {
      b.vy = -0.5 - Math.sin(b.age * 0.03) * 0.3;
      b.x += Math.sin(b.age * 0.05) * 0.5;
      b.y += b.vy;

      // Trapped enemy escape
      if (b.trapped) {
        b.trapped.trapTimer--;
        if (b.trapped.trapTimer <= 0) {
          b.trapped.trapped = false;
          b.trapped.angry = true;
          b.trapped.angryTimer = 600;
          b.trapped.escapeCount++;
          b.trapped.vx = (Math.random() > 0.5 ? 1 : -1) * (2 + level * 0.3);
          b.trapped = null;
          bubbles.splice(i, 1);
          continue;
        }
      }

      // Player pops bubble
      if (player.alive && circRectCollide(b.x, b.y, b.r, player.x, player.y, player.w, player.h)) {
        if (b.trapped) {
          // Pop enemy!
          const e = b.trapped;
          e.alive = false;
          e.trapped = false;
          combo++;
          comboTimer = 120;
          const pts = 100 * combo * (e.angry ? 2 : 1);
          score += pts;
          spawnParticles(b.x, b.y, 20, `hsl(${Math.random()*360},90%,60%)`, true);
          spawnFloatingText(b.x, b.y - 10, `${pts}` + (combo > 1 ? ` x${combo}` : ''), '#ff0');
          sfxPop();
          // Spawn fruit
          const fruitTypes = ['cherry','banana','melon','gem'];
          fruits.push({
            x: b.x, y: b.y, vx: (Math.random()-0.5)*3, vy: -3,
            type: fruitTypes[Math.min(combo-1, 3)], w: 16, h: 16, age: 0
          });
        } else if (b.special) {
          // Special bubble effect
          score += 50;
          spawnParticles(b.x, b.y, 12, b.special === 'fire' ? '#f80' : b.special === 'water' ? '#08f' : '#ff0', true);
          if (b.special === 'fire') {
            enemies.forEach(e => {
              if (e.alive && !e.trapped && Math.abs(e.x - b.x) < 80 && Math.abs(e.y - b.y) < 80) {
                e.alive = false; score += 200;
                spawnParticles(e.x+e.w/2, e.y+e.h/2, 15, '#f80', true);
              }
            });
          } else if (b.special === 'water') {
            enemies.forEach(e => {
              if (e.alive && !e.trapped && e.y > b.y - 20) {
                e.alive = false; score += 200;
                spawnParticles(e.x+e.w/2, e.y+e.h/2, 15, '#08f', true);
              }
            });
          } else {
            enemies.forEach(e => {
              if (e.alive && !e.trapped) {
                e.alive = false; score += 200;
                spawnParticles(e.x+e.w/2, e.y+e.h/2, 15, '#ff0', true);
              }
            });
          }
          sfxPop();
        }
        bubbles.splice(i, 1);
        continue;
      }
    }

    // Remove old bubbles
    if (b.age > b.maxAge || b.y < -30) {
      bubbles.splice(i, 1);
    }
  }

  // Special bubble spawning
  specialBubbleTimer--;
  if (specialBubbleTimer <= 0) {
    const types = ['fire','water','lightning'];
    const sp = types[Math.floor(Math.random()*3)];
    bubbles.push(createBubble(Math.random()*GW, GH + 10, 0, sp));
    bubbles[bubbles.length-1].phase = 'floating';
    specialBubbleTimer = 800 + Math.random() * 800;
  }
}

function updateFruits() {
  for (let i = fruits.length - 1; i >= 0; i--) {
    const f = fruits[i];
    f.vy += GRAVITY * 0.6;
    f.x += f.vx;
    f.y += f.vy;
    f.age++;

    // Land on platform
    platforms.forEach(pl => {
      if (f.vy >= 0 && f.x + 8 > pl.x && f.x - 8 < pl.x + pl.w) {
        if (f.y + 8 > pl.y && f.y + 8 < pl.y + pl.h + 4) {
          f.y = pl.y - 8; f.vy = 0; f.vx *= 0.8;
        }
      }
    });

    // Collect
    if (player.alive && Math.abs(player.x + player.w/2 - f.x) < 20 && Math.abs(player.y + player.h/2 - f.y) < 20) {
      const pts = f.type === 'cherry' ? 100 : f.type === 'banana' ? 300 : f.type === 'melon' ? 500 : 1000;
      score += pts;
      spawnFloatingText(f.x, f.y - 10, `+${pts}`, '#0f0');
      spawnParticles(f.x, f.y, 8, '#ff0', false);
      sfxFruit();
      fruits.splice(i, 1);
      continue;
    }

    if (f.age > 600) fruits.splice(i, 1);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy; ft.life -= 0.015;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function playerHit() {
  lives--;
  player.invincible = 120;
  shakeTimer = 15; shakeAmt = 6;
  spawnParticles(player.x + player.w/2, player.y + player.h/2, 15, '#f44', false);
  sfxDie();
  if (lives <= 0) {
    player.alive = false;
    setTimeout(() => showGameOver(), 1000);
  }
}

function checkLevelComplete() {
  if (enemies.every(e => !e.alive)) {
    if (level < 12) {
      level++;
      setTimeout(() => loadLevel(level), 1500);
    } else {
      // Game complete!
      score += 5000;
      setTimeout(() => showGameOver(), 1500);
    }
  }
}

// ===== COMBO =====
function updateCombo() {
  if (comboTimer > 0) { comboTimer--; }
  else { combo = 0; }
}

// ===== HUD =====
function drawHUD() {
  ctx.save();
  // Score
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ff0';
  ctx.shadowColor = '#fa0'; ctx.shadowBlur = 8;
  ctx.fillText(`SCORE: ${score.toLocaleString()}`, 10, 24);
  ctx.shadowBlur = 0;

  // Lives
  ctx.fillStyle = '#4f4';
  ctx.fillText(`♥ ${lives}`, 10, 48);

  // Level
  ctx.textAlign = 'right';
  ctx.fillStyle = '#adf';
  ctx.fillText(`LV ${level}`, GW - 10, 24);

  // Combo
  if (combo > 1) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f80';
    ctx.shadowColor = '#f80'; ctx.shadowBlur = 10;
    ctx.font = `bold ${18 + combo * 2}px sans-serif`;
    ctx.fillText(`COMBO x${combo}!`, GW/2, 36);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

// ===== MAIN LOOP =====
function gameLoop() {
  requestAnimationFrame(gameLoop);
  frameCount++;

  ctx.save();
  ctx.scale(dpr, dpr);

  // Center the game area
  const ox = (cw - GW * scale) / 2;
  const oy = (ch - GH * scale) / 2;
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);

  // Screen shake
  if (shakeTimer > 0) {
    shakeTimer--;
    ctx.translate((Math.random()-0.5)*shakeAmt, (Math.random()-0.5)*shakeAmt);
    shakeAmt *= 0.9;
  }

  // Clip to game area
  ctx.beginPath(); ctx.rect(0, 0, GW, GH); ctx.clip();

  if (gameState === 'playing') {
    updatePlayer();
    updateEnemies();
    updateBubbles();
    updateFruits();
    updateParticles();
    updateCombo();
    checkLevelComplete();
    levelTimer++;
  }

  // Draw
  drawBackground();
  drawPlatforms();

  if (gameState === 'playing' || gameState === 'gameover') {
    fruits.forEach(drawFruit);
    bubbles.forEach(drawBubble);
    enemies.forEach(drawEnemy);
    if (player) drawDragon(player);
    drawParticles();
    drawHUD();
  }

  if (gameState === 'title') {
    // Ambient bubbles on title
    if (frameCount % 30 === 0) {
      bubbles.push(createBubble(Math.random()*GW, GH+20, 0, null));
      bubbles[bubbles.length-1].phase = 'floating';
    }
    for (let i = bubbles.length-1; i >= 0; i--) {
      const b = bubbles[i];
      b.age++; b.hue += 0.5;
      b.y -= 1; b.x += Math.sin(b.age*0.05)*0.5;
      if (b.y < -30) { bubbles.splice(i, 1); continue; }
    }
    bubbles.forEach(drawBubble);
  }

  ctx.restore();
}

// Init
initBg();
gameLoop();
</script>
