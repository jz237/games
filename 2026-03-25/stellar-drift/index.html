        const a = hexRot + (p / 6) * Math.PI * 2 + Math.PI / 6;
        const px = Math.cos(a) * sz * 0.4, py = Math.sin(a) * sz * 0.4;
        p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      // Center dot
      ctx.fillStyle = flash ? '#fff' : `rgba(255,${Math.min(255,e.g+120)},${Math.min(255,e.b+80)},0.7)`;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.15, 0, Math.PI * 2);
      ctx.fill();

    } else if (e.type === 'zigzagger') {
      // Diamond/rhombus with pulsing energy core, spiky protrusions
      const sz = e.size * pulse;
      // Outer diamond
      ctx.fillStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.85)`;
      ctx.beginPath();
      ctx.moveTo(0, -sz * 1.2);
      ctx.lineTo(sz * 0.8, 0);
      ctx.lineTo(0, sz * 1.2);
      ctx.lineTo(-sz * 0.8, 0);
      ctx.closePath();
      ctx.fill();
      // Glowing edge
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+80)},${Math.min(255,e.g+80)},${Math.min(255,e.b+80)},0.7)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Spiky protrusions on corners
      ctx.fillStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+40)},${Math.min(255,e.g+20)},${Math.min(255,e.b+20)},0.7)`;
      const spikes = [[0, -sz*1.2, 0, -sz*1.6], [sz*0.8, 0, sz*1.15, 0], [0, sz*1.2, 0, sz*1.6], [-sz*0.8, 0, -sz*1.15, 0]];
      for (const sp of spikes) {
        ctx.beginPath();
        ctx.moveTo(sp[0] - 2.5, sp[1]);
        ctx.lineTo(sp[2], sp[3]);
        ctx.lineTo(sp[0] + 2.5, sp[1]);
        ctx.closePath();
        ctx.fill();
      }
      // Inner diamond detail lines
      ctx.strokeStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.4)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(0, -sz * 0.5); ctx.lineTo(sz * 0.35, 0);
      ctx.lineTo(0, sz * 0.5); ctx.lineTo(-sz * 0.35, 0); ctx.closePath();
      ctx.stroke();
      // Pulsing energy core
      const corePulse = 0.6 + Math.sin(Date.now() * 0.01 + e.x) * 0.4;
      ctx.globalCompositeOperation = 'lighter';
      const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, sz * 0.35);
      coreGrad.addColorStop(0, `rgba(255,255,255,${0.6 * corePulse})`);
      coreGrad.addColorStop(0.5, `rgba(${e.r},${e.g},${e.b},${0.3 * corePulse})`);
      coreGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = coreGrad;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

    } else if (e.type === 'swarmer') {
      // Angular pentagon/arrow shape — little fighter drone with wing details
      const sz = e.size;
      ctx.fillStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.9)`;
      ctx.beginPath();
      // Arrow/pentagon body
      ctx.moveTo(0, -sz * 1.1);           // nose
      ctx.lineTo(sz * 0.45, -sz * 0.1);   // right shoulder
      ctx.lineTo(sz * 0.9, sz * 0.5);     // right wing tip
      ctx.lineTo(sz * 0.3, sz * 0.3);     // right wing notch
      ctx.lineTo(0, sz * 0.7);            // tail
      ctx.lineTo(-sz * 0.3, sz * 0.3);    // left wing notch
      ctx.lineTo(-sz * 0.9, sz * 0.5);    // left wing tip
      ctx.lineTo(-sz * 0.45, -sz * 0.1);  // left shoulder
      ctx.closePath();
      ctx.fill();
      // Edge highlight
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+80)},${Math.min(255,e.g+60)},${Math.min(255,e.b+40)},0.6)`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // Wing panel lines
      ctx.strokeStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.4)`;
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(sz * 0.2, -sz * 0.05); ctx.lineTo(sz * 0.5, sz * 0.35);
      ctx.moveTo(-sz * 0.2, -sz * 0.05); ctx.lineTo(-sz * 0.5, sz * 0.35);
      ctx.stroke();
      // Cockpit dot
      ctx.fillStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+100)},${Math.min(255,e.g+100)},${Math.min(255,e.b+80)},0.8)`;
      ctx.beginPath();
      ctx.arc(0, -sz * 0.2, 2, 0, Math.PI * 2);
      ctx.fill();

    } else if (e.type === 'tank') {
      // Octagon with layered armor rings, turret, panel lines
      const sz = e.size * pulse;
      // Outer octagon
      ctx.fillStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.9)`;
      ctx.beginPath();
      for (let p = 0; p < 8; p++) {
        const a = (p / 8) * Math.PI * 2 - Math.PI / 8;
        const px = Math.cos(a) * sz, py = Math.sin(a) * sz;
        p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      // Edge
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+80)},${Math.min(255,e.g+30)},${Math.min(255,e.b+30)},0.7)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Armor ring 1
      ctx.strokeStyle = flash ? '#fcc' : `rgba(${Math.min(255,e.r+40)},${Math.min(255,e.g+20)},${Math.min(255,e.b+20)},0.5)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.72, 0, Math.PI * 2);
      ctx.stroke();
      // Armor ring 2
      ctx.strokeStyle = flash ? '#faa' : `rgba(${e.r},${e.g},${e.b},0.35)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.5, 0, Math.PI * 2);
      ctx.stroke();
      // Panel lines (battle-scarred)
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+60)},${Math.min(255,e.g+15)},${Math.min(255,e.b+15)},0.3)`;
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      // Horizontal + vertical cross lines
      ctx.moveTo(-sz * 0.7, 0); ctx.lineTo(sz * 0.7, 0);
      ctx.moveTo(0, -sz * 0.7); ctx.lineTo(0, sz * 0.7);
      // Diagonal scar lines
      ctx.moveTo(-sz * 0.4, -sz * 0.5); ctx.lineTo(sz * 0.1, -sz * 0.2);
      ctx.moveTo(sz * 0.2, sz * 0.3); ctx.lineTo(sz * 0.5, sz * 0.1);
      ctx.stroke();
      // Turret — central rectangle + barrel
      ctx.fillStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+30)},${Math.min(255,e.g+10)},${Math.min(255,e.b+10)},0.8)`;
      ctx.fillRect(-sz * 0.2, -sz * 0.2, sz * 0.4, sz * 0.4);
      // Barrel pointing down
      ctx.fillRect(-sz * 0.06, sz * 0.2, sz * 0.12, sz * 0.45);
      // Turret core
      ctx.fillStyle = flash ? '#fff' : `rgba(255,${Math.min(255,e.g+60)},${Math.min(255,e.b+40)},0.6)`;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.12, 0, Math.PI * 2);
      ctx.fill();
      // Health bar
      const barW = e.size * 2;
      const barH = 4;
      const barY = -e.size - 10;
      ctx.fillStyle = 'rgba(100,0,0,0.7)';
      ctx.fillRect(-barW / 2, barY, barW, barH);
      ctx.fillStyle = '#f44';
      ctx.fillRect(-barW / 2, barY, barW * (e.hp / e.maxHp), barH);

    } else if (e.type === 'shielder') {
      const sz = e.size * pulse;
      // Hexagonal shield (visible when hp >= 3)
      if (e.hp >= 3) {
        ctx.strokeStyle = 'rgba(0,200,255,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let p = 0; p < 6; p++) {
          const a = (p / 6) * Math.PI * 2;
          const px = Math.cos(a) * sz * 1.4, py = Math.sin(a) * sz * 1.4;
          p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.fillStyle = 'rgba(0,180,255,0.1)';
        ctx.fill();
      }
      // Ship body - hexagon
      const bodyColor = e.hp >= 3 ? `rgba(0,180,255,0.85)` : (e.hp >= 2 ? `rgba(0,140,200,0.85)` : `rgba(100,60,180,0.85)`);
      ctx.fillStyle = flash ? '#fff' : bodyColor;
      ctx.beginPath();
      for (let p = 0; p < 6; p++) {
        const a = (p / 6) * Math.PI * 2;
        const px = Math.cos(a) * sz, py = Math.sin(a) * sz;
        p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = flash ? '#fff' : 'rgba(0,220,255,0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();

    } else if (e.type === 'kamikaze') {
      const sz = e.size;
      // Narrow pointed dart
      ctx.fillStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.9)`;
      ctx.beginPath();
      ctx.moveTo(0, -sz * 1.5);
      ctx.lineTo(sz * 0.35, sz * 0.6);
      ctx.lineTo(0, sz * 0.3);
      ctx.lineTo(-sz * 0.35, sz * 0.6);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = flash ? '#fff' : 'rgba(255,120,0,0.7)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Hot core when diving
      if (e.diving) {
        ctx.globalCompositeOperation = 'lighter';
        const dGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, sz);
        dGlow.addColorStop(0, 'rgba(255,200,0,0.6)');
        dGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = dGlow;
        ctx.beginPath();
        ctx.arc(0, 0, sz, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
      }
    }
    ctx.restore();
  }

  // Boss — spaceship dreadnought
  if (boss) {
    ctx.save();
    ctx.translate(boss.x, boss.y);
    const flash = boss.flashTimer > 0;
    const bPulse = 0.9 + Math.sin(Date.now() * 0.004) * 0.1;
    const sz = boss.size;
    const t = Date.now() * 0.001;

    // Per-boss-type color scheme
    const bTypeIdx = boss.isMini ? 99 : (boss.bossNum || 0) % 5;
    // [hullColor, wingColor, podColor, glowR, glowG, glowB, cockpitColor]
    const bColors = [
      ['#cc2200','#991100','#771100', 255,60,0,  'rgba(255,200,150,0.9)'],  // 0 DREADNOUGHT — red
      ['#1a0066','#110044','#220088', 80,40,255,  'rgba(140,120,255,0.9)'], // 1 PHANTOM — deep purple
      ['#005533','#003322','#007744', 0,200,100,  'rgba(100,255,180,0.9)'], // 2 TITAN — dark green
      ['#884400','#553300','#aa6600', 255,140,0,  'rgba(255,220,100,0.9)'], // 3 VIPER — amber/gold
      ['#440044','#220033','#660066', 200,0,255,  'rgba(220,140,255,0.9)'], // 4 OMEGA — magenta
    ];
    const bc = bTypeIdx === 99 ? ['#334455','#223344','#445566', 100,160,220, 'rgba(180,220,255,0.9)'] : bColors[bTypeIdx];
    const [hullCol, wingCol, podCol, gR, gG, gB, cockCol] = bc;

    // Outer engine glow
    ctx.globalCompositeOperation = 'lighter';
    const glowR = sz * 3;
    const glow = ctx.createRadialGradient(0, 0, sz*0.3, 0, 0, glowR);
    glow.addColorStop(0, flash ? 'rgba(255,255,255,0.5)' : `rgba(${gR},${gG},${gB},${0.25*bPulse})`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(-glowR, -glowR, glowR*2, glowR*2);
    ctx.globalCompositeOperation = 'source-over';

    // Main hull (elongated diamond body)
    ctx.fillStyle = flash ? '#fff' : hullCol;
    ctx.beginPath();
    ctx.moveTo(0, -sz*1.4);
    ctx.lineTo(sz*0.55, -sz*0.2);
    ctx.lineTo(sz*0.4, sz*1.0);
    ctx.lineTo(0, sz*0.7);
    ctx.lineTo(-sz*0.4, sz*1.0);
    ctx.lineTo(-sz*0.55, -sz*0.2);
    ctx.closePath();
    ctx.fill();

    // Hull gradient overlay
    const hullGrad = ctx.createLinearGradient(-sz*0.5, -sz*1.2, sz*0.5, sz*0.8);
    hullGrad.addColorStop(0, flash ? 'rgba(255,255,255,0.4)' : `rgba(${gR},${Math.min(255,gG+50)},${Math.min(255,gB+30)},0.4)`);
    hullGrad.addColorStop(0.5, 'transparent');
    hullGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = hullGrad;
    ctx.beginPath();
    ctx.moveTo(0, -sz*1.4);
    ctx.lineTo(sz*0.55, -sz*0.2);
    ctx.lineTo(sz*0.4, sz*1.0);
    ctx.lineTo(0, sz*0.7);
    ctx.lineTo(-sz*0.4, sz*1.0);
    ctx.lineTo(-sz*0.55, -sz*0.2);
    ctx.closePath();
    ctx.fill();

    // Swept wings
    ctx.fillStyle = flash ? '#fcc' : wingCol;
    ctx.beginPath();
    ctx.moveTo(sz*0.5, -sz*0.1);
    ctx.lineTo(sz*1.6, sz*0.4);
    ctx.lineTo(sz*1.3, sz*0.8);
    ctx.lineTo(sz*0.6, sz*0.5);
    ctx.lineTo(sz*0.35, sz*0.8);
    ctx.lineTo(sz*0.3, sz*0.2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-sz*0.5, -sz*0.1);
    ctx.lineTo(-sz*1.6, sz*0.4);
    ctx.lineTo(-sz*1.3, sz*0.8);
    ctx.lineTo(-sz*0.6, sz*0.5);
    ctx.lineTo(-sz*0.35, sz*0.8);
    ctx.lineTo(-sz*0.3, sz*0.2);
    ctx.closePath();
    ctx.fill();

    // Wing detail lines
    ctx.strokeStyle = flash ? '#fff' : `rgba(${gR},${gG},${gB},0.6)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sz*0.5, -sz*0.1); ctx.lineTo(sz*1.4, sz*0.55);
    ctx.moveTo(-sz*0.5, -sz*0.1); ctx.lineTo(-sz*1.4, sz*0.55);
    ctx.stroke();

    // Engine pods at wing tips
    for (const side of [-1, 1]) {
      const ex = side * sz * 1.35, ey = sz * 0.55;
      ctx.fillStyle = flash ? '#fff' : podCol;
      ctx.beginPath();
      ctx.ellipse(ex, ey, sz*0.18, sz*0.32, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalCompositeOperation = 'lighter';
      const engGlow = ctx.createRadialGradient(ex, ey+sz*0.25, 0, ex, ey+sz*0.25, sz*0.4);
      engGlow.addColorStop(0, `rgba(${gR},${Math.min(255,gG+100+Math.sin(t*6+side)*60|0)},${gB},${0.8*bPulse})`);
      engGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = engGlow;
      ctx.fillRect(ex-sz*0.4, ey, sz*0.8, sz*0.5);
      ctx.globalCompositeOperation = 'source-over';
    }

    // Central engine (main thruster)
    ctx.globalCompositeOperation = 'lighter';
    const mainEng = ctx.createRadialGradient(0, sz*0.7, 0, 0, sz*0.8, sz*0.5);
    mainEng.addColorStop(0, `rgba(255,180,0,${0.9*bPulse})`);
    mainEng.addColorStop(0.4, `rgba(255,80,0,${0.5*bPulse})`);
    mainEng.addColorStop(1, 'transparent');
    ctx.fillStyle = mainEng;
    ctx.fillRect(-sz*0.5, sz*0.5, sz, sz*0.7);
    ctx.globalCompositeOperation = 'source-over';

    // Cockpit / bridge
    const cockpitGrad = ctx.createRadialGradient(-sz*0.08, -sz*0.6, 0, 0, -sz*0.55, sz*0.3);
    cockpitGrad.addColorStop(0, flash ? '#fff' : cockCol);
    cockpitGrad.addColorStop(0.5, flash ? '#faa' : `rgba(${gR*0.8|0},${gG*0.3|0},${gB*0.1|0},0.6)`);
    cockpitGrad.addColorStop(1, 'rgba(80,0,0,0.3)');
    ctx.fillStyle = cockpitGrad;
    ctx.beginPath();
    ctx.ellipse(0, -sz*0.55, sz*0.22, sz*0.28, 0, 0, Math.PI*2);
    ctx.fill();

    // Panel lines on hull
    ctx.strokeStyle = flash ? '#fff' : 'rgba(255,120,60,0.35)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, -sz*0.3); ctx.lineTo(sz*0.3, sz*0.4);
    ctx.moveTo(0, -sz*0.3); ctx.lineTo(-sz*0.3, sz*0.4);
    ctx.moveTo(-sz*0.25, sz*0.1); ctx.lineTo(sz*0.25, sz*0.1);
    ctx.stroke();

    // Rotating weapon ring
    ctx.strokeStyle = `rgba(255,100,0,${0.4*bPulse})`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6,6]);
    ctx.beginPath();
    ctx.arc(0, 0, sz*0.9, t*1.5 % (Math.PI*2), t*1.5 % (Math.PI*2) + Math.PI*1.2);
    ctx.stroke();
    ctx.setLineDash([]);

    // === PROGRESSIVE DAMAGE VISUALS ===
    const dmg = boss.damage || 0;
    const T = Date.now();

    if (dmg > 0) {
      ctx.save();

      // --- SCORCH MARKS (25%+): painted on hull surface ---
      if (dmg > 0.25) {
        const sa = Math.min(0.85, (dmg-0.25)*2.0);
        // Dark burnt patches using hull-relative positions
        const grad1 = ctx.createRadialGradient(sz*0.7, sz*0.2, 0, sz*0.7, sz*0.2, sz*0.45);
        grad1.addColorStop(0, `rgba(8,2,0,${sa})`);
        grad1.addColorStop(0.5, `rgba(30,8,0,${sa*0.5})`);
        grad1.addColorStop(1, 'transparent');
        ctx.fillStyle = grad1; ctx.fillRect(sz*0.25, sz*0.0, sz*0.9, sz*0.5);

        const grad2 = ctx.createRadialGradient(-sz*0.15, -sz*0.1, 0, -sz*0.15, -sz*0.1, sz*0.3);
        grad2.addColorStop(0, `rgba(5,2,0,${sa*0.7})`);
        grad2.addColorStop(1, 'transparent');
        ctx.fillStyle = grad2; ctx.fillRect(-sz*0.5, -sz*0.4, sz*0.7, sz*0.6);
      }

      // --- GLOWING CRACKS (45%+): bright jagged lines pulsing ---
      if (dmg > 0.45) {
        const cp = (dmg-0.45)/0.55;
        ctx.globalCompositeOperation = 'lighter';
        // Crack 1 — left hull
        const c1a = (0.4 + Math.sin(T*0.019)*0.4) * cp;
        ctx.globalAlpha = c1a;
        ctx.strokeStyle = '#ff5500'; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-sz*0.35,-sz*0.5); ctx.lineTo(-sz*0.15,-sz*0.2); ctx.lineTo(-sz*0.3,sz*0.15); ctx.lineTo(-sz*0.1,sz*0.3); ctx.stroke();
        // Inner glow on crack
        ctx.lineWidth = 6; ctx.globalAlpha = c1a * 0.3;
        ctx.beginPath(); ctx.moveTo(-sz*0.35,-sz*0.5); ctx.lineTo(-sz*0.15,-sz*0.2); ctx.lineTo(-sz*0.3,sz*0.15); ctx.lineTo(-sz*0.1,sz*0.3); ctx.stroke();
        // Crack 2 — right hull
        const c2a = (0.35 + Math.sin(T*0.023+2)*0.4) * cp;
        ctx.globalAlpha = c2a;
        ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(sz*0.25,sz*0.35); ctx.lineTo(sz*0.4,sz*0.1); ctx.lineTo(sz*0.2,-sz*0.15); ctx.stroke();
        ctx.lineWidth = 5; ctx.globalAlpha = c2a * 0.25;
        ctx.beginPath(); ctx.moveTo(sz*0.25,sz*0.35); ctx.lineTo(sz*0.4,sz*0.1); ctx.lineTo(sz*0.2,-sz*0.15); ctx.stroke();
        ctx.globalCompositeOperation = 'source-over';
      }

      // --- LEFT WING ON FIRE (65%+) ---
      if (dmg > 0.65) {
        ctx.globalCompositeOperation = 'lighter';
        const ff = 0.45 + Math.sin(T*0.038)*0.3 + Math.sin(T*0.071+1)*0.2;
        const wp = Math.min(1, (dmg-0.65)/0.2);
        // Fire glow blob on left wing
        const wg = ctx.createRadialGradient(-sz*1.05, sz*0.45, 0, -sz*1.05, sz*0.45, sz*0.7);
        wg.addColorStop(0, `rgba(255,140,0,${0.7*ff*wp})`);
        wg.addColorStop(0.4, `rgba(255,50,0,${0.4*ff*wp})`);
        wg.addColorStop(1, 'transparent');
        ctx.fillStyle = wg; ctx.fillRect(-sz*1.75, sz*0.05, sz*1.4, sz);
        // Right engine pod fire
        const eg = ctx.createRadialGradient(sz*1.35, sz*0.6, 0, sz*1.35, sz*0.6, sz*0.45);
        eg.addColorStop(0, `rgba(255,100,0,${0.6*ff*wp})`);
        eg.addColorStop(1, 'transparent');
        ctx.fillStyle = eg; ctx.fillRect(sz*0.9, sz*0.2, sz*0.9, sz*0.8);
        ctx.globalCompositeOperation = 'source-over';
      }

      // --- HULL BREACH + EXPOSED CORE (82%+) ---
      if (dmg > 0.82) {
        ctx.globalCompositeOperation = 'lighter';
        const bp = Math.min(1, (dmg-0.82)/0.18);
        const bf = 0.5 + Math.sin(T*0.017)*0.35 + Math.sin(T*0.041)*0.15;
        // Exposed reactor glow — centre of hull, very bright
        const rg = ctx.createRadialGradient(0, -sz*0.3, 0, 0, -sz*0.3, sz*0.8);
        rg.addColorStop(0, `rgba(255,240,100,${0.85*bf*bp})`);
        rg.addColorStop(0.3, `rgba(255,120,0,${0.5*bf*bp})`);
        rg.addColorStop(0.6, `rgba(200,30,0,${0.2*bp})`);
        rg.addColorStop(1, 'transparent');
        ctx.fillStyle = rg; ctx.fillRect(-sz, -sz*1.1, sz*2, sz*1.6);
        // Pulsing ring
        ctx.globalAlpha = (0.2 + Math.sin(T*0.025)*0.15) * bp;
        ctx.strokeStyle = '#ffcc44'; ctx.lineWidth = 2.5;
        const rr = sz*(0.25 + ((T*0.0008) % 0.6));
        ctx.beginPath(); ctx.arc(0, -sz*0.3, rr, 0, Math.PI*2); ctx.stroke();
        ctx.globalCompositeOperation = 'source-over';
      }

      ctx.restore();
    }

    // Health bar
    const barW = sz * 3.5;
    const barH = 7;
    const barY = -sz*1.6;
    ctx.fillStyle = 'rgba(80,0,0,0.8)';
    ctx.fillRect(-barW/2, barY, barW, barH);
    const hpPct = Math.max(0, boss.hp/boss.maxHp);
    ctx.fillStyle = hpPct > 0.5 ? '#f44' : hpPct > 0.25 ? '#f80' : '#ff0';
    ctx.fillRect(-barW/2, barY, barW*hpPct, barH);
    // Boss name label
    ctx.fillStyle = boss.isMini ? 'rgba(180,180,200,0.8)' : 'rgba(255,100,50,0.8)';
    ctx.font = `bold ${Math.floor(sz*0.35)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(boss.bossName || 'BOSS', 0, barY - 4);

    ctx.restore();
  }

  // Enemy bullets — with stronger glow halos
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < enemyBullets.length; i++) {
    const b = enemyBullets[i];
    if (!b.active) continue;
    // Outer glow
    const glow2 = ctx.createRadialGradient(b.x, b.y, 2, b.x, b.y, 10);
    glow2.addColorStop(0, 'rgba(255,60,60,0.4)');
    glow2.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = glow2;
    ctx.fillRect(b.x - 10, b.y - 10, 20, 20);
    // Inner glow
    const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 5);
    glow.addColorStop(0, 'rgba(255,200,180,1)');
    glow.addColorStop(0.5, 'rgba(255,80,80,0.8)');
    glow.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(b.x - 5, b.y - 5, 10, 10);
    // Core
    ctx.fillStyle = '#fcc';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  // Player bullets — bright yellow-white elongated with orange glow
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    if (!b.active) continue;
    // Outer orange glow
    const glow2 = ctx.createRadialGradient(b.x, b.y, 2, b.x, b.y, 12);
    glow2.addColorStop(0, 'rgba(255,180,50,0.5)');
    glow2.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = glow2;
    ctx.fillRect(b.x - 12, b.y - 14, 24, 28);
    // Inner bright glow
    const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 6);
    glow.addColorStop(0, 'rgba(255,255,240,1)');
    glow.addColorStop(0.4, 'rgba(255,255,100,0.8)');
    glow.addColorStop(1, 'rgba(255,200,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(b.x - 6, b.y - 8, 12, 16);
    // Elongated bright core
    ctx.fillStyle = '#ffe';
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, 2, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  // Homing missiles — with glow
  for (const m of homingMissiles) {
    ctx.save();
    ctx.translate(m.x, m.y);
    const angle = Math.atan2(m.vy, m.vx);
    ctx.rotate(angle + Math.PI / 2);
    // Glow halo
    ctx.globalCompositeOperation = 'lighter';
    const mGlow = ctx.createRadialGradient(0, 0, 1, 0, 0, m.size * 2);
    mGlow.addColorStop(0, 'rgba(255,120,40,0.5)');
    mGlow.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.fillStyle = mGlow;
    ctx.fillRect(-m.size * 2, -m.size * 2, m.size * 4, m.size * 4);
    ctx.globalCompositeOperation = 'source-over';
    // Body
    ctx.fillStyle = '#f84';
    ctx.beginPath();
    ctx.moveTo(0, -m.size); ctx.lineTo(m.size * 0.5, m.size * 0.5); ctx.lineTo(-m.size * 0.5, m.size * 0.5);
    ctx.closePath();
    ctx.fill();
    // Hot tip
    ctx.fillStyle = '#ffe';
    ctx.beginPath();
    ctx.arc(0, -m.size * 0.5, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Player ship — glowing crystal/gem with layered gradients
  if (state === 'playing' || state === 'paused') {
    const blinkOff = invincibleTimer > 0 && Math.floor(invincibleTimer * 10) % 2 === 0;
    if (!blinkOff) {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.tilt);
      const s = player.size;
      const pulse = 0.95 + Math.sin(Date.now() * 0.004) * 0.05;

      // Outer energy glow (reduced ~60%)
      ctx.globalCompositeOperation = 'lighter';
      const outerGlow = ctx.createRadialGradient(0, 0, s * 0.2, 0, 0, s * 1.4);
      outerGlow.addColorStop(0, 'rgba(0,180,255,0.18)');
      outerGlow.addColorStop(0.5, 'rgba(0,100,200,0.06)');
      outerGlow.addColorStop(1, 'rgba(0,40,120,0)');
      ctx.fillStyle = outerGlow;
      ctx.fillRect(-s * 1.4, -s * 1.4, s * 2.8, s * 2.8);

      // Medium inner glow (reduced)
      const midGlow = ctx.createRadialGradient(0, -s * 0.2, 2, 0, -s * 0.2, s * 1.0);
      midGlow.addColorStop(0, `rgba(100,220,255,${0.25 * pulse})`);
      midGlow.addColorStop(1, 'rgba(0,120,255,0)');
      ctx.fillStyle = midGlow;
      ctx.fillRect(-s * 1.0, -s * 1.2, s * 2.0, s * 2.2);
      ctx.globalCompositeOperation = 'source-over';

      // Shield glow ring
      if (player.shield) {
        ctx.globalCompositeOperation = 'lighter';
        const shieldGlow = ctx.createRadialGradient(0, 0, s + 4, 0, 0, s + 14);
        shieldGlow.addColorStop(0, 'rgba(0,255,120,0.4)');
        shieldGlow.addColorStop(1, 'rgba(0,255,80,0)');
        ctx.fillStyle = shieldGlow;
        ctx.fillRect(-s - 14, -s - 14, (s + 14) * 2, (s + 14) * 2);
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = `rgba(0,255,100,${0.5 + Math.sin(Date.now() * 0.006) * 0.2})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(0, 0, s + 8, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Ship body — outer dark cyan layer (wings)
      ctx.fillStyle = '#068';
      ctx.beginPath();
      ctx.moveTo(0, -s * 1.1);
      ctx.lineTo(-s * 0.7, s * 0.5);
      ctx.lineTo(-s * 0.55, s * 0.7);
      ctx.lineTo(-s * 0.15, s * 0.45);
      ctx.lineTo(0, s * 0.55);
      ctx.lineTo(s * 0.15, s * 0.45);
      ctx.lineTo(s * 0.55, s * 0.7);
      ctx.lineTo(s * 0.7, s * 0.5);
      ctx.closePath();
      ctx.fill();

      // Mid layer — bright cyan body
      const bodyGrad = ctx.createLinearGradient(0, -s, 0, s * 0.6);
      bodyGrad.addColorStop(0, '#4ef');
      bodyGrad.addColorStop(0.5, '#0cf');
      bodyGrad.addColorStop(1, '#068');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(-s * 0.5, s * 0.4);
      ctx.lineTo(-s * 0.15, s * 0.35);
      ctx.lineTo(0, s * 0.5);
      ctx.lineTo(s * 0.15, s * 0.35);
      ctx.lineTo(s * 0.5, s * 0.4);
      ctx.closePath();
      ctx.fill();

      // Inner gem facet — lighter
      const facetGrad = ctx.createLinearGradient(0, -s * 0.8, 0, s * 0.2);
      facetGrad.addColorStop(0, 'rgba(200,255,255,0.7)');
      facetGrad.addColorStop(1, 'rgba(0,180,220,0.3)');
      ctx.fillStyle = facetGrad;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.85);
      ctx.lineTo(-s * 0.2, s * 0.05);
      ctx.lineTo(0, s * 0.15);
      ctx.lineTo(s * 0.2, s * 0.05);
      ctx.closePath();
      ctx.fill();

      // Bright white hot-spot at center
      ctx.globalCompositeOperation = 'lighter';
      const hotspot = ctx.createRadialGradient(0, -s * 0.15, 0, 0, -s * 0.15, s * 0.4);
      hotspot.addColorStop(0, `rgba(255,255,255,${0.6 * pulse})`);
      hotspot.addColorStop(0.4, 'rgba(150,230,255,0.2)');
      hotspot.addColorStop(1, 'rgba(0,150,255,0)');
      ctx.fillStyle = hotspot;
      ctx.beginPath();
      ctx.arc(0, -s * 0.15, s * 0.4, 0, Math.PI * 2);
      ctx.fill();

      // Wing tip accents
      ctx.fillStyle = 'rgba(0,200,255,0.5)';
      ctx.beginPath();
      ctx.arc(-s * 0.6, s * 0.55, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.6, s * 0.55, 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Engine exhaust glow at base — subtle
      const engineGlow = ctx.createRadialGradient(0, s * 0.5, 1, 0, s * 0.5, s * 0.35);
      engineGlow.addColorStop(0, 'rgba(200,240,255,0.5)');
      engineGlow.addColorStop(0.5, 'rgba(0,180,255,0.15)');
      engineGlow.addColorStop(1, 'rgba(0,80,200,0)');
      ctx.fillStyle = engineGlow;
      ctx.beginPath();
      ctx.arc(0, s * 0.5, s * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

      // Subtle ambient ring when no shield
      if (!player.shield) {
        ctx.strokeStyle = `rgba(0,200,255,${0.08 + Math.sin(Date.now() * 0.003) * 0.04})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, s + 6, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }
  }

  // Score popups
  for (let i = 0; i < scorePopups.length; i++) {
    const p = scorePopups[i];
    if (!p.active) continue;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;

  // Draw asteroids
  for (const a of asteroids) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.fillStyle = '#8a7a6a';
    ctx.strokeStyle = '#665544';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let v = 0; v < 8; v++) {
      const angle = (v / 8) * Math.PI * 2;
      const rv = a.r * a.verts[v];
      v === 0 ? ctx.moveTo(Math.cos(angle)*rv, Math.sin(angle)*rv) : ctx.lineTo(Math.cos(angle)*rv, Math.sin(angle)*rv);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  // Draw new enemy types (shielder + kamikaze) - integrated into enemy loop above but need drawing
  // (Drawing is handled in the existing enemy rendering section - we need to add cases there)

  // Screen edge warning arrows
  for (const e of enemies) {
    if (e.y < H * 0.3 && e.y > -40) {
      const arrowX = Math.max(10, Math.min(W - 10, e.x));
      const arrowY = Math.max(8, e.y < 0 ? 8 : e.y);
      if (e.y < 40) {
        ctx.fillStyle = `rgba(${e.r},${e.g},${e.b},0.7)`;
        ctx.beginPath();
        ctx.moveTo(arrowX, arrowY);
        ctx.lineTo(arrowX - 6, arrowY - 10);
        ctx.lineTo(arrowX + 6, arrowY - 10);
        ctx.closePath();
        ctx.fill();
        // Glow
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = `rgba(${e.r},${e.g},${e.b},0.3)`;
        ctx.beginPath();
        ctx.arc(arrowX, arrowY - 4, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
      }
    }
  }

  // Wave clear text
  if (waveClearText) {
    const alpha = Math.min(1, waveClearText.timer / 0.5);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${Math.min(W * 0.1, 48)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255,215,0,0.5)';
    ctx.shadowBlur = 20;
    ctx.fillText(`WAVE ${waveClearText.wave} CLEAR!`, W / 2, H * 0.4);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Boss intro cinematic
  if (bossIntro) {
    const alpha = Math.min(1, bossIntro.timer / 0.5) * 0.4;
    ctx.fillStyle = `rgba(255,0,0,${alpha})`;
    ctx.fillRect(0, 0, W, H);
    const textAlpha = Math.min(1, bossIntro.timer);
    ctx.globalAlpha = textAlpha;
    ctx.fillStyle = '#ff4400';
    ctx.font = `bold ${Math.min(W * 0.08, 40)}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255,68,0,0.8)';
    ctx.shadowBlur = 30;
    ctx.fillText(`⚠ ${bossIntro.name} INCOMING ⚠`, W / 2, H / 2);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Phase flash
  if (phaseFlashTimer > 0) {
    ctx.fillStyle = `rgba(255,0,0,${phaseFlashTimer})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Phase float text
  if (phaseFloatText) {
    const alpha = Math.min(1, phaseFloatText.timer);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff2200';
    ctx.font = `bold ${Math.min(W * 0.07, 36)}px monospace`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(255,0,0,0.8)';
    ctx.shadowBlur = 15;
    ctx.fillText(phaseFloatText.text, phaseFloatText.x, phaseFloatText.y - (1.5 - phaseFloatText.timer) * 40);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Boss warning overlay
  if (bossWarning > 0) {
    const flash = Math.sin(bossWarning * 10) > 0;
    if (flash) {
      ctx.fillStyle = 'rgba(255,0,0,0.1)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = `rgba(255,50,50,${0.5 + Math.sin(bossWarning * 8) * 0.5})`;
    ctx.font = `bold ${Math.min(W * 0.1, 50)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚠ WARNING ⚠', W / 2, H / 2);
  }

  // Speed lines when moving fast
  const pSpeed = Math.hypot(player.x - player.prevX, player.y - player.prevY);
  if (pSpeed > 3) {
    ctx.globalCompositeOperation = 'lighter';
    const lineCount = Math.min(Math.floor(pSpeed * 0.8), 8);
    for (let i = 0; i < lineCount; i++) {
      const lx = Math.random() * W;
      const ly = Math.random() * H;
      const ldx = (player.x - player.prevX) * -0.5;
      const ldy = (player.y - player.prevY) * -0.5;
      ctx.strokeStyle = `rgba(100,180,255,${0.05 + Math.random() * 0.08})`;
      ctx.lineWidth = 0.5 + Math.random();
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + ldx * (8 + Math.random() * 15), ly + ldy * (8 + Math.random() * 15));
      ctx.stroke();
    }
    ctx.globalCompositeOperation = 'source-over';
  }

  // Screen flash on big explosions
  if (screenFlashAlpha > 0) {
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = `rgba(255,255,255,${screenFlashAlpha})`;
    ctx.fillRect(-10, -10, W + 20, H + 20);
    ctx.globalCompositeOperation = 'source-over';
  }

  // HUD
  renderHUD();

  // Vignette — darker corners/edges
  const vignetteGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
  vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vignetteGrad;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  ctx.restore();
}

function renderHUD() {
  if (state !== 'playing' && state !== 'paused') return;

  const fontSize = Math.min(W * 0.045, 22);

  // Score
  ctx.fillStyle = '#ffd700';
  ctx.font = `bold ${fontSize * 1.2}px sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(255,215,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText(score.toLocaleString(), 60, 14);
  ctx.shadowBlur = 0;

  // High score
  ctx.fillStyle = 'rgba(255,215,0,0.4)';
  ctx.font = `${fontSize * 0.6}px sans-serif`;
  ctx.fillText(`HI ${Math.max(score, highScore).toLocaleString()}`, 60, 14 + fontSize * 1.3);

  // Kill counter
  ctx.fillStyle = 'rgba(200,200,255,0.6)';
  ctx.font = `${fontSize * 0.65}px monospace`;
  ctx.fillText(`KILLS: ${totalKills}`, 60, 14 + fontSize * 3.2);

  // Wave
  ctx.fillStyle = '#0ff';
  ctx.font = `bold ${fontSize}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`WAVE ${wave}`, W / 2, 14);

  // Difficulty label
  const diffColors = { easy: 'rgba(0,255,255,0.4)', normal: 'rgba(255,215,0,0.5)', hard: 'rgba(255,68,68,0.5)' };
  ctx.fillStyle = diffColors[difficulty];
  ctx.font = `bold ${fontSize * 0.55}px sans-serif`;
  ctx.fillText(difficulty.toUpperCase(), W / 2, 14 + fontSize * 1.15);

  // Wave pulse on new wave
  if (wavePause > 1.0) {
    const alpha = (wavePause - 1.0);
    ctx.fillStyle = `rgba(0,255,255,${alpha})`;
    ctx.font = `bold ${fontSize * 2.5}px sans-serif`;
    ctx.fillText(`WAVE ${wave}`, W / 2, H * 0.4);
  }

  // Lives
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    const lx = W - 55 - i * 22;
    const ly = 18;
    ctx.fillStyle = '#0cf';
    ctx.beginPath();
    ctx.moveTo(lx, ly - 8);
    ctx.lineTo(lx - 5, ly + 4);
    ctx.lineTo(lx + 5, ly + 4);
    ctx.closePath();
    ctx.fill();
  }

  // Active powerup
  if (activePowerup) {
    const px = 60, py = 14 + fontSize * 2.2;
    ctx.fillStyle = activePowerup.color;
    ctx.font = `bold ${fontSize * 0.7}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(`${activePowerup.icon} ${activePowerup.name}`, px, py);
    // Timer bar
    const barW = 80;
    const pct = Math.max(0, activePowerup.timer / activePowerup.maxTimer);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(px, py + fontSize * 0.7 + 2, barW, 4);
    ctx.fillStyle = activePowerup.color;
    ctx.fillRect(px, py + fontSize * 0.7 + 2, barW * pct, 4);
  }

  // Combo
  if (comboCount > 1 && comboTimer > 0) {
    const alpha = Math.min(1, comboTimer * 2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${fontSize * 1.8}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(255,215,0,0.5)';
    ctx.shadowBlur = 15;
    ctx.fillText(`x${comboMultiplier} COMBO!`, W / 2, H * 0.25);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Combo edge flash
  if (comboCount > 3 && comboTimer > 0) {
    const alpha = Math.min(0.15, comboTimer * 0.2);
    ctx.fillStyle = `rgba(255,215,0,${alpha})`;
    ctx.fillRect(0, 0, 4, H);
    ctx.fillRect(W - 4, 0, 4, H);
  }
}

// ===== MAIN LOOP =====
function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  if (lastTime === 0) { lastTime = time; return; }
  dt = Math.min((time - lastTime) / 1000, 1 / 30) * gameSpeedMul;
  lastTime = time;

  update();
  render();
}

requestAnimationFrame(gameLoop);

// ===== TITLE SCREEN ANIMATIONS =====
(function() {
  const tc = document.getElementById('titleCanvas');
  const tctx = tc.getContext('2d');
  let tW, tH;
  function resizeTitle() {
    tW = window.innerWidth; tH = window.innerHeight;
    tc.width = tW * (Math.min(window.devicePixelRatio||1,2));
    tc.height = tH * (Math.min(window.devicePixelRatio||1,2));
    tc.style.width = tW+'px'; tc.style.height = tH+'px';
    tctx.setTransform(Math.min(window.devicePixelRatio||1,2),0,0,Math.min(window.devicePixelRatio||1,2),0,0);
  }
  resizeTitle();
  window.addEventListener('resize', resizeTitle);

  // Title stars
  const tStars = [];
  for(let i=0;i<60;i++){
    const layer = i<30?0:i<50?1:2;
    tStars.push({x:Math.random()*2000,y:Math.random()*2000,speed:[8,20,45][layer],size:[0.6,1.2,2][layer],brightness:0.3+Math.random()*0.7,phase:Math.random()*6.28});
  }
  // Nebulae blobs
  const tNeb = [];
  const nebCols = [[80,0,160],[0,40,130],[120,0,90],[30,20,100]];
  for(let i=0;i<4;i++){
    const c=nebCols[i];
    tNeb.push({x:Math.random()*2000,y:Math.random()*2000,r:150+Math.random()*200,cr:c[0],cg:c[1],cb:c[2],alpha:0.04+Math.random()*0.03,speed:4+Math.random()*6,dx:(Math.random()-0.5)*4,phase:Math.random()*6.28});
  }
  // Shooting stars
  let tShooting = [];
  let lastShoot = 0;

  function titleAnimLoop(time) {
    if(state!=='title'){requestAnimationFrame(titleAnimLoop);return;}
    const dt2 = 1/60;
    tctx.clearRect(0,0,tW,tH);
    // BG gradient
    const bg = tctx.createLinearGradient(0,0,0,tH);
    bg.addColorStop(0,'#020108');bg.addColorStop(0.5,'#050215');bg.addColorStop(1,'#020108');
    tctx.fillStyle=bg;tctx.fillRect(0,0,tW,tH);
    // Nebulae (additive)
    tctx.globalCompositeOperation='lighter';
    for(const n of tNeb){
      n.y+=n.speed*dt2; n.x+=n.dx*dt2; n.phase+=0.3*dt2;
      if(n.y>tH+n.r){n.y=-n.r;n.x=Math.random()*tW;}
      const nx=((n.x%tW)+tW)%tW;
      const pa=n.alpha+Math.sin(n.phase)*0.01;
      const gr=tctx.createRadialGradient(nx,n.y,0,nx,n.y,n.r);
      gr.addColorStop(0,`rgba(${n.cr},${n.cg},${n.cb},${pa})`);
      gr.addColorStop(0.5,`rgba(${n.cr},${n.cg},${n.cb},${pa*0.4})`);
      gr.addColorStop(1,'transparent');
      tctx.fillStyle=gr;tctx.fillRect(nx-n.r,n.y-n.r,n.r*2,n.r*2);
    }
    tctx.globalCompositeOperation='source-over';
    // Stars
    for(const s of tStars){
      s.y+=s.speed*dt2; s.phase+=2*dt2;
      if(s.y>tH){s.y=0;s.x=Math.random()*tW;}
      const tw=s.brightness*(0.6+Math.sin(s.phase)*0.4);
      tctx.globalAlpha=Math.max(0.05,tw);
      tctx.fillStyle='#fff';
      tctx.beginPath();tctx.arc(s.x%tW,s.y,s.size,0,6.28);tctx.fill();
      if(s.size>1.5){tctx.globalAlpha=tw*0.25;tctx.beginPath();tctx.arc(s.x%tW,s.y,s.size*2.5,0,6.28);tctx.fill();}
    }
    tctx.globalAlpha=1;
    // Shooting stars
    if(time-lastShoot>3000+Math.random()*2000){lastShoot=time;tShooting.push({x:Math.random()*tW,y:Math.random()*tH*0.4,vx:-120-Math.random()*180,vy:160+Math.random()*120,life:0.6+Math.random()*0.4,ml:0.6+Math.random()*0.4,size:1+Math.random()});}
    tctx.globalCompositeOperation='lighter';
    for(let i=tShooting.length-1;i>=0;i--){
      const ss=tShooting[i];ss.x+=ss.vx*dt2;ss.y+=ss.vy*dt2;ss.life-=dt2;
      if(ss.life<=0){tShooting.splice(i,1);continue;}
      const a=ss.life/ss.ml;const len=35;
      const nx=ss.vx/Math.hypot(ss.vx,ss.vy),ny=ss.vy/Math.hypot(ss.vx,ss.vy);
      const gr=tctx.createLinearGradient(ss.x,ss.y,ss.x-nx*len,ss.y-ny*len);
      gr.addColorStop(0,`rgba(255,255,255,${a})`);gr.addColorStop(1,'rgba(255,255,255,0)');
      tctx.strokeStyle=gr;tctx.lineWidth=ss.size;tctx.beginPath();
      tctx.moveTo(ss.x,ss.y);tctx.lineTo(ss.x-nx*len,ss.y-ny*len);tctx.stroke();
    }
    tctx.globalCompositeOperation='source-over';
    requestAnimationFrame(titleAnimLoop);
  }
  requestAnimationFrame(titleAnimLoop);

  // ===== ENEMY SHOWCASE =====
  const showcase = document.getElementById('enemyShowcase');
  const enemyTypes = [
    {type:'drifter',label:'DRIFTER'},
    {type:'zigzagger',label:'ZIGZAGGER'},
    {type:'swarmer',label:'SWARMER'},
    {type:'tank',label:'TANK'},
    {type:'shielder',label:'SHIELDER'},
    {type:'kamikaze',label:'KAMIKAZE'}
  ];
  const cardCanvases = [];
  enemyTypes.forEach(et => {
    const card = document.createElement('div');
    card.className = 'enemy-card';
    const cvs = document.createElement('canvas');
    const sz = 64;
    cvs.width = sz*2; cvs.height = sz*2;
    cvs.style.width = 'clamp(44px,10vw,64px)';
    cvs.style.height = 'clamp(44px,10vw,64px)';
    const lbl = document.createElement('div');
    lbl.className = 'enemy-label';
    lbl.textContent = et.label;
    card.appendChild(cvs);
    card.appendChild(lbl);
    showcase.appendChild(card);
    cardCanvases.push({cvs, ctx: cvs.getContext('2d'), type: et.type});
  });

  function drawEnemyCard(c, type, time) {
    const cx = c.ctx, w = c.cvs.width, h = c.cvs.height;
    const ctr = w/2, mid = h/2;
    const sz = w*0.3;
    cx.clearRect(0,0,w,h);
    const t = time*0.001;
    const bob = Math.sin(t*2)*4;
    cx.save();
    cx.translate(ctr, mid+bob);

    if(type==='drifter'){
      const rot=t*0.5;
      cx.fillStyle='rgba(255,120,0,0.85)';cx.strokeStyle='rgba(255,180,50,0.8)';cx.lineWidth=2;
      cx.beginPath();
      for(let p=0;p<6;p++){const a=rot+(p/6)*6.28;p===0?cx.moveTo(Math.cos(a)*sz,Math.sin(a)*sz):cx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);}
      cx.closePath();cx.fill();cx.stroke();
      cx.strokeStyle='rgba(255,200,80,0.5)';cx.lineWidth=1;cx.beginPath();
      for(let p=0;p<3;p++){const a=rot+(p/3)*6.28;p===0?cx.moveTo(Math.cos(a)*sz*0.6,Math.sin(a)*sz*0.6):cx.lineTo(Math.cos(a)*sz*0.6,Math.sin(a)*sz*0.6);}
      cx.closePath();cx.stroke();
      cx.fillStyle='rgba(255,220,100,0.7)';cx.beginPath();cx.arc(0,0,sz*0.15,0,6.28);cx.fill();
    } else if(type==='zigzagger'){
      const pulse=0.8+Math.sin(t*3)*0.2;
      const s=sz*pulse;
      cx.fillStyle='rgba(200,0,255,0.85)';cx.beginPath();
      cx.moveTo(0,-s*1.2);cx.lineTo(s*0.8,0);cx.lineTo(0,s*1.2);cx.lineTo(-s*0.8,0);cx.closePath();cx.fill();
      cx.strokeStyle='rgba(220,80,255,0.7)';cx.lineWidth=1.5;cx.stroke();
      const spikes=[[0,-s*1.2,0,-s*1.55],[s*0.8,0,s*1.1,0],[0,s*1.2,0,s*1.55],[-s*0.8,0,-s*1.1,0]];
      cx.fillStyle='rgba(220,60,255,0.7)';
      for(const sp of spikes){cx.beginPath();cx.moveTo(sp[0]-2,sp[1]);cx.lineTo(sp[2],sp[3]);cx.lineTo(sp[0]+2,sp[1]);cx.closePath();cx.fill();}
      cx.globalCompositeOperation='lighter';
      const cg=cx.createRadialGradient(0,0,0,0,0,s*0.3);
      cg.addColorStop(0,`rgba(255,255,255,${0.5*pulse})`);cg.addColorStop(1,'transparent');
      cx.fillStyle=cg;cx.beginPath();cx.arc(0,0,s*0.3,0,6.28);cx.fill();
      cx.globalCompositeOperation='source-over';
    } else if(type==='swarmer'){
      const wobble=Math.sin(t*4)*0.1;
      cx.rotate(wobble);
      cx.fillStyle='rgba(0,255,80,0.9)';cx.beginPath();
      cx.moveTo(0,-sz*1.1);cx.lineTo(sz*0.45,-sz*0.1);cx.lineTo(sz*0.9,sz*0.5);cx.lineTo(sz*0.3,sz*0.3);cx.lineTo(0,sz*0.7);cx.lineTo(-sz*0.3,sz*0.3);cx.lineTo(-sz*0.9,sz*0.5);cx.lineTo(-sz*0.45,-sz*0.1);cx.closePath();cx.fill();
      cx.strokeStyle='rgba(80,255,120,0.6)';cx.lineWidth=1;cx.stroke();
      cx.fillStyle='rgba(100,255,150,0.8)';cx.beginPath();cx.arc(0,-sz*0.2,2.5,0,6.28);cx.fill();
    } else if(type==='tank'){
      const pulse=0.9+Math.sin(t*1.5)*0.1;const s=sz*pulse;
      cx.fillStyle='rgba(200,30,30,0.9)';cx.beginPath();
      for(let p=0;p<8;p++){const a=(p/8)*6.28-Math.PI/8;p===0?cx.moveTo(Math.cos(a)*s,Math.sin(a)*s):cx.lineTo(Math.cos(a)*s,Math.sin(a)*s);}
      cx.closePath();cx.fill();cx.strokeStyle='rgba(255,80,80,0.7)';cx.lineWidth=1.5;cx.stroke();
      cx.strokeStyle='rgba(255,60,60,0.4)';cx.lineWidth=1.5;cx.beginPath();cx.arc(0,0,s*0.7,0,6.28);cx.stroke();
      cx.strokeStyle='rgba(255,50,50,0.3)';cx.lineWidth=1;cx.beginPath();cx.arc(0,0,s*0.5,0,6.28);cx.stroke();
      cx.fillStyle='rgba(255,60,60,0.8)';cx.fillRect(-s*0.2,-s*0.2,s*0.4,s*0.4);
      cx.fillRect(-s*0.06,s*0.2,s*0.12,s*0.4);
      cx.fillStyle='rgba(255,100,80,0.6)';cx.beginPath();cx.arc(0,0,s*0.12,0,6.28);cx.fill();
    } else if(type==='shielder'){
      const rot=t*0.3;
      cx.fillStyle='rgba(0,180,255,0.85)';cx.beginPath();
      for(let p=0;p<6;p++){const a=(p/6)*6.28;p===0?cx.moveTo(Math.cos(a)*sz*0.7,Math.sin(a)*sz*0.7):cx.lineTo(Math.cos(a)*sz*0.7,Math.sin(a)*sz*0.7);}
      cx.closePath();cx.fill();cx.strokeStyle='rgba(0,220,255,0.6)';cx.lineWidth=1;cx.stroke();
      cx.strokeStyle='rgba(0,200,255,0.5)';cx.lineWidth=2;cx.beginPath();
      for(let p=0;p<6;p++){const a=rot+(p/6)*6.28;p===0?cx.moveTo(Math.cos(a)*sz*1.1,Math.sin(a)*sz*1.1):cx.lineTo(Math.cos(a)*sz*1.1,Math.sin(a)*sz*1.1);}
      cx.closePath();cx.stroke();
      cx.fillStyle='rgba(0,180,255,0.1)';cx.fill();
    } else if(type==='kamikaze'){
      const flicker=0.5+Math.random()*0.5;
      cx.fillStyle='rgba(255,60,0,0.9)';cx.beginPath();
      cx.moveTo(0,-sz*1.5);cx.lineTo(sz*0.35,sz*0.6);cx.lineTo(0,sz*0.3);cx.lineTo(-sz*0.35,sz*0.6);cx.closePath();cx.fill();
      cx.strokeStyle='rgba(255,120,0,0.7)';cx.lineWidth=1;cx.stroke();
      cx.globalCompositeOperation='lighter';
      const eg=cx.createRadialGradient(0,sz*0.5,0,0,sz*0.5,sz*0.5);
      eg.addColorStop(0,`rgba(255,180,0,${0.6*flicker})`);eg.addColorStop(1,'transparent');
      cx.fillStyle=eg;cx.beginPath();cx.arc(0,sz*0.5,sz*0.5,0,6.28);cx.fill();
      cx.globalCompositeOperation='source-over';
    }
    cx.restore();
  }

  function showcaseLoop(time) {
    if(state==='title'){
      for(const c of cardCanvases) drawEnemyCard(c, c.type, time);
    }
    requestAnimationFrame(showcaseLoop);
  }
  requestAnimationFrame(showcaseLoop);
})();
</script>
