// ===== UPDATE =====
function update() {
  if (state !== 'playing') return;

  // Timers
  if (invincibleTimer > 0) invincibleTimer -= dt;
  if (shakeTimer > 0) shakeTimer -= dt;
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; comboMultiplier = 1; }
  }
  if (scoreBoostTimer > 0) scoreBoostTimer -= dt;

  // Powerup timers
  if (player.rapidFire > 0) player.rapidFire -= dt;
  if (player.tripleShot > 0) player.tripleShot -= dt;
  if (player.speedBoost > 0) player.speedBoost -= dt;
  if (player.laser > 0) {
    player.laser -= dt;
    if (player.laser <= 0) player.laserActive = false;
  }
  if (activePowerup) {
    activePowerup.timer -= dt;
    if (activePowerup.timer <= 0) activePowerup = null;
  }

  // Player movement
  if (inputActive) {
    player.targetX = inputX;
    player.targetY = inputY;
  }
  const lerpFactor = player.speedBoost > 0 ? 0.25 : LERP;
  player.prevX = player.x; player.prevY = player.y;
  player.x += (player.targetX - player.x) * lerpFactor;
  player.y += (player.targetY - player.y) * lerpFactor;
  // Clamp
  player.x = Math.max(player.size, Math.min(W - player.size, player.x));
  player.y = Math.max(player.size, Math.min(H - player.size, player.y));
  // Tilt
  const dx = player.x - player.prevX;
  player.tilt += (Math.max(-0.3, Math.min(0.3, dx * 0.02)) - player.tilt) * 0.15;

  // Engine trail — compact focused exhaust
  const moveSpeed = Math.abs(dx) + Math.abs(player.y - player.prevY);
  const trailCount = Math.min(8 + Math.floor(moveSpeed * 0.5), 16);
  for (let i = 0; i < trailCount; i++) {
    const spread = (Math.random() - 0.5) * 8; // tight spread
    const depth = Math.random();
    const brightness = 1 - depth * 0.7;
    const r = Math.floor(brightness * 100);
    const g = Math.floor(150 + brightness * 105);
    const b = 255;
    const size = 2 + Math.random() * 5; // smaller particles 2-7px
    spawnParticle(
      player.x + spread,
      player.y + player.size * 0.6 + Math.random() * 4,
      spread * 1.5 + (Math.random() - 0.5) * 15,
      40 + Math.random() * 80,
      r, g, b,
      0.2 + Math.random() * 0.3,
      size
    );
  }
  // Small bright core particles
  for (let i = 0; i < 3; i++) {
    spawnParticle(
      player.x + (Math.random() - 0.5) * 4,
      player.y + player.size * 0.5,
      (Math.random() - 0.5) * 8,
      20 + Math.random() * 30,
      200, 240, 255,
      0.1 + Math.random() * 0.1,
      3 + Math.random() * 4
    );
  }

  // Auto-fire
  if (!player.laserActive) {
    const fireRate = (player.rapidFire > 0 ? BASE_FIRE_RATE / 2 : BASE_FIRE_RATE) * getDiff().fireMul;
    player.fireTimer -= dt;
    if (player.fireTimer <= 0) {
      player.fireTimer = fireRate;
      const streams = player.tripleShot > 0 ? 3 : 2;
      const offsets = streams === 2 ? [-5, 5] : [-8, 0, 8];
      const angles = streams === 2 ? [0, 0] : [-0.1, 0, 0.1];
      for (let i = 0; i < streams; i++) {
        const bx = player.x + offsets[i];
        const by = player.y - player.size;
        spawnBullet(bx, by, Math.sin(angles[i]) * BULLET_SPEED * 0.3, -BULLET_SPEED);
        // Muzzle flash — bigger and brighter
        for (let j = 0; j < 6; j++) {
          spawnParticle(bx, by, (Math.random() - 0.5) * 80, -Math.random() * 100, 255, 240, 120, 0.08 + Math.random() * 0.08, 2 + Math.random() * 3);
        }
      }
      playSound('pew');
    }
  } else {
    // Laser mode - continuous beam damage handled in collision
    if (Math.random() < 0.3) playSound('laser');
  }

  // Wave management
  if (wavePause > 0) {
    wavePause -= dt;
  } else if (bossWarning > 0) {
    bossWarning -= dt;
    if (bossWarning <= 0) spawnBoss();
  } else if (!bossActive) {
    waveTimer += dt;
    const spawnInterval = Math.max(0.3, (1.5 - wave * 0.05) * getDiff().spawnMul);
    if (waveEnemiesSpawned < waveEnemyCount && waveTimer >= spawnInterval) {
      waveTimer = 0;
      spawnEnemy();
    }
    // Check wave complete
    if (waveEnemiesSpawned >= waveEnemyCount && enemies.length === 0) {
      nextWave();
    }
  }

  // Update enemies
  const bulletSpeedMul = wave > 10 ? 1 + (wave - 10) * 0.05 : 1;
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed * dt;
    if (e.sinAmp > 0) {
      e.sinOffset += e.sinFreq * dt;
      e.x = e.startX + Math.sin(e.sinOffset) * e.sinAmp;
    }
    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Enemy trail particles
    if (Math.random() < 0.4) {
      spawnParticle(e.x + (Math.random()-0.5)*e.size*0.5, e.y - e.size*0.3,
        (Math.random()-0.5)*10, -20 - Math.random()*30,
        e.r, e.g, e.b, 0.25 + Math.random()*0.2, 2 + Math.random()*3);
    }

    // Tank shooting
    if (e.type === 'tank' && e.y > 0) {
      e.fireTimer -= dt;
      if (e.fireTimer <= 0) {
        e.fireTimer = 2 + Math.random();
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        const spd = 150 * bulletSpeedMul;
        spawnEnemyBullet(e.x, e.y + e.size, Math.cos(angle) * spd, Math.sin(angle) * spd);
      }
    }

    // Remove if off screen
    if (e.y > H + 50) { enemies.splice(i, 1); }
  }

  // Update boss
  if (boss) {
    if (!boss.entered) {
      boss.y += (boss.targetY - boss.y) * 0.02;
      if (Math.abs(boss.y - boss.targetY) < 2) boss.entered = true;
    }
    if (boss.flashTimer > 0) boss.flashTimer -= dt;

    if (boss.entered && !boss.dying) {
      // Boss movement
      boss.x += Math.sin(Date.now() * 0.001) * 80 * dt;
      boss.x = Math.max(boss.size, Math.min(W - boss.size, boss.x));

      // Boss fire patterns
      boss.fireTimer -= dt;
      if (boss.fireTimer <= 0) {
        boss.fireTimer = Math.max(0.8, 2 - wave * 0.05);
        boss.pattern = (boss.pattern + 1) % 3;
        const spd = 160 * bulletSpeedMul;

        if (boss.pattern === 0) {
          // Spread shot
          for (let a = -0.4; a <= 0.4; a += 0.2) {
            spawnEnemyBullet(boss.x, boss.y + boss.size, Math.sin(a) * spd, Math.cos(a) * spd);
          }
        } else if (boss.pattern === 1) {
          // Aimed shot
          const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
          for (let i = -1; i <= 1; i++) {
            spawnEnemyBullet(boss.x, boss.y + boss.size, Math.cos(angle + i * 0.15) * spd, Math.sin(angle + i * 0.15) * spd);
          }
        } else {
          // Circle
          for (let i = 0; i < 12; i++) {
            const a = (i / 12) * Math.PI * 2;
            spawnEnemyBullet(boss.x, boss.y, Math.cos(a) * spd * 0.8, Math.sin(a) * spd * 0.8);
          }
        }
      }
    }

    if (boss.dying) {
      boss.deathTimer -= dt;

      // Start boss death sequence
      if (!bossDeathSequence) {
        bossDeathSequence = {
          timer: 0,
          subExplosionCount: 0,
          subExplosionInterval: 0.35,
          totalSubExplosions: 4,
          finalDone: false,
          slowTimer: 1.0
        };
        gameSpeedMul = 0.3; // dramatic slowdown
      }

      // Slowdown timer
      if (bossDeathSequence.slowTimer > 0) {
        bossDeathSequence.slowTimer -= dt;
        if (bossDeathSequence.slowTimer <= 0) gameSpeedMul = 1;
      }

      // Sequential sub-explosions at different positions on boss body
      bossDeathSequence.timer += dt;
      if (bossDeathSequence.subExplosionCount < bossDeathSequence.totalSubExplosions &&
          bossDeathSequence.timer >= bossDeathSequence.subExplosionInterval) {
        bossDeathSequence.timer = 0;
        bossDeathSequence.subExplosionCount++;
        const ex = boss.x + (Math.random() - 0.5) * boss.size * 1.8;
        const ey = boss.y + (Math.random() - 0.5) * boss.size * 1.8;
        // Each sub-explosion: 30-40 particles, large
        const subCount = 30 + Math.floor(Math.random() * 11);
        for (let i = 0; i < subCount; i++) {
          const angle = Math.random() * Math.PI * 2;
          const spd = (60 + Math.random() * 200) * 1.5;
          const t = i / subCount;
          let pr, pg, pb;
          if (t < 0.3) { pr = 255; pg = 255; pb = 200; }
          else if (t < 0.6) { pr = 255; pg = 140; pb = 0; }
          else { pr = 200; pg = 40; pb = 0; }
          // Boss particles: 10-20px radius, 3-4 second life
          spawnParticle(ex, ey, Math.cos(angle) * spd, Math.sin(angle) * spd, pr, pg, pb,
            2.5 + Math.random() * 1.5, 10 + Math.random() * 10);
        }
        triggerShake(8, 0.3);
        spawnDebris(ex, ey, 5, 255, 100, 0);
        playSound('explode');
      }

      // Random smaller explosions during sequence
      if (Math.random() < 0.5) {
        const ex = boss.x + (Math.random() - 0.5) * boss.size * 2;
        const ey = boss.y + (Math.random() - 0.5) * boss.size * 2;
        spawnExplosion(ex, ey, 8, 255, 100, 0, 1.5);
      }

      // Final massive explosion when timer runs out
      if (boss.deathTimer <= 0 && !bossDeathSequence.finalDone) {
        bossDeathSequence.finalDone = true;
        // Final explosion: 60+ particles, large (10-20px), long lasting (3-4s)
        for (let i = 0; i < 70; i++) {
          const angle = Math.random() * Math.PI * 2;
          const spd = (80 + Math.random() * 300) * 2;
          const t = i / 70;
          let pr, pg, pb;
          if (t < 0.2) { pr = 255; pg = 255; pb = 255; }
          else if (t < 0.5) { pr = 255; pg = 200; pb = 50; }
          else if (t < 0.8) { pr = 255; pg = 100; pb = 0; }
          else { pr = 180; pg = 30; pb = 0; }
          spawnParticle(boss.x, boss.y, Math.cos(angle) * spd, Math.sin(angle) * spd, pr, pg, pb,
            3.0 + Math.random() * 1.5, 10 + Math.random() * 12);
        }
        // Full screen flash
        screenFlashAlpha = 0.6;
        // Heavy screen shake
        triggerShake(18, 0.8);
        // TONS of debris raining down (20-30 pieces)
        spawnDebris(boss.x, boss.y, 25 + Math.floor(Math.random() * 6), 255, 120, 0);
        playSound('boss_explode');
        addScore(500, boss.x, boss.y);
        gameSpeedMul = 1;
        boss = null;
        bossActive = false;
        bossDeathSequence = null;
        nextWave();
      }
    }
  }

  // Update bullets
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    if (!b.active) continue;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y < -20 || b.x < -20 || b.x > W + 20) { b.active = false; continue; }
    // Bullet trail — 3-4 fading particles behind each bullet
    for (let t = 0; t < 3; t++) {
      spawnParticle(
        b.x + (Math.random() - 0.5) * 4,
        b.y + 4 + t * 3,
        (Math.random() - 0.5) * 12,
        Math.random() * 30,
        255, 200 + Math.floor(Math.random() * 55), 50,
        0.08 + Math.random() * 0.1,
        1.5 + Math.random() * 2
      );
    }
  }

  // Update enemy bullets
  for (let i = 0; i < enemyBullets.length; i++) {
    const b = enemyBullets[i];
    if (!b.active) continue;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y > H + 20 || b.y < -20 || b.x < -20 || b.x > W + 20) { b.active = false; }
  }

  // Update particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (!p.active) continue;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    p.vx *= 0.98; p.vy *= 0.98;
    if (p.life <= 0) p.active = false;
  }

  // Update debris (cosmetic falling pieces)
  for (let i = 0; i < debris.length; i++) {
    const d = debris[i];
    if (!d.active) continue;
    d.x += d.vx * dt;
    d.vy += 120 * dt; // gravity pulls down
    d.y += d.vy * dt;
    d.rot += d.rotSpeed * dt;
    d.vx *= 0.99;
    d.life -= dt;
    if (d.life <= 0 || d.y > H + 30) d.active = false;
  }

  // Update score popups
  for (let i = 0; i < scorePopups.length; i++) {
    const p = scorePopups[i];
    if (!p.active) continue;
    p.y -= 60 * dt;
    p.x += p.vx * dt;
    p.life -= dt;
    if (p.life <= 0) p.active = false;
  }

  // Update powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.y += 50 * dt;
    pu.angle = (pu.angle || 0) + 3 * dt;
    if (pu.y > H + 30) { powerups.splice(i, 1); }
  }

  // Update homing missiles
  for (let i = homingMissiles.length - 1; i >= 0; i--) {
    const m = homingMissiles[i];
    m.life -= dt;
    if (m.life <= 0) { homingMissiles.splice(i, 1); continue; }

    // Find nearest target
    let nearest = null, nearDist = Infinity;
    for (const e of enemies) {
      const d = Math.hypot(e.x - m.x, e.y - m.y);
      if (d < nearDist) { nearDist = d; nearest = e; }
    }
    if (boss && !boss.dying) {
      const d = Math.hypot(boss.x - m.x, boss.y - m.y);
      if (d < nearDist) { nearDist = d; nearest = boss; }
    }

    if (nearest) {
      const angle = Math.atan2(nearest.y - m.y, nearest.x - m.x);
      const curAngle = Math.atan2(m.vy, m.vx);
      let diff = angle - curAngle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      const turn = Math.min(Math.abs(diff), 5 * dt) * Math.sign(diff);
      const newAngle = curAngle + turn;
      m.vx = Math.cos(newAngle) * m.speed;
      m.vy = Math.sin(newAngle) * m.speed;
    }
    m.x += m.vx * dt;
    m.y += m.vy * dt;

    // Trail
    spawnParticle(m.x, m.y, (Math.random() - 0.5) * 20, Math.random() * 40, 255, 100, 0, 0.2, 2);

    if (m.x < -50 || m.x > W + 50 || m.y < -50 || m.y > H + 50) {
      homingMissiles.splice(i, 1); continue;
    }

    // Missile collision with enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(e.x - m.x, e.y - m.y) < e.size + m.size) {
        // Big explosion
        spawnExplosion(e.x, e.y, 25, e.r, e.g, e.b, 1.5);
        triggerShake(4, 0.15);
        playSound('explode');
        const pts = e.type === 'tank' ? 50 : e.type === 'zigzagger' ? 25 : e.type === 'swarmer' ? 15 : 10;
        addScore(pts, e.x, e.y);
        maybeDropPowerup(e.x, e.y);
        enemies.splice(j, 1);
        homingMissiles.splice(i, 1);
        break;
      }
    }
  }

  // ===== COLLISIONS =====
  // Laser beam collision
  if (player.laserActive && player.laser > 0) {
    const laserW = 8;
    // Check enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (Math.abs(e.x - player.x) < laserW + e.size && e.y < player.y) {
        e.hp--;
        e.flashTimer = 0.05;
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, 15, e.r, e.g, e.b);
          for (let ci = 0; ci < 8; ci++) { const ca = (ci/8)*Math.PI*2; spawnParticle(e.x, e.y, Math.cos(ca)*120, Math.sin(ca)*120, e.r, e.g, e.b, 0.6, 4); }
          playSound('explode');
          const pts = e.type === 'tank' ? 50 : e.type === 'zigzagger' ? 25 : e.type === 'swarmer' ? 15 : 10;
          addScore(pts, e.x, e.y);
          maybeDropPowerup(e.x, e.y);
          enemies.splice(i, 1);
        }
      }
    }
    // Check boss
    if (boss && !boss.dying && Math.abs(boss.x - player.x) < laserW + boss.size && boss.y < player.y) {
      boss.hp -= 0.5; // Continuous damage scaled by frame
      boss.flashTimer = 0.05;
      if (boss.hp <= 0) {
        boss.dying = true; boss.deathTimer = 1.5;
      }
    }
  }

  // Player bullets vs enemies
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    if (!b.active) continue;
    // vs enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + 4) {
        b.active = false;
        e.hp--;
        e.flashTimer = 0.08;
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, 12 + Math.floor(Math.random() * 8), e.r, e.g, e.b);
          for (let ci = 0; ci < 8; ci++) { const ca = (ci/8)*Math.PI*2; spawnParticle(e.x, e.y, Math.cos(ca)*120, Math.sin(ca)*120, e.r, e.g, e.b, 0.6, 4); }
          playSound('explode');
          const pts = e.type === 'tank' ? 50 : e.type === 'zigzagger' ? 25 : e.type === 'swarmer' ? 15 : 10;
          addScore(pts, e.x, e.y);
          maybeDropPowerup(e.x, e.y);
          enemies.splice(j, 1);
        }
        break;
      }
    }
    // vs boss
    if (b.active && boss && !boss.dying) {
      if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.size + 4) {
        b.active = false;
        boss.hp--;
        boss.flashTimer = 0.08;
        triggerShake(2, 0.05);
        spawnParticle(b.x, b.y, (Math.random()-0.5)*80, (Math.random()-0.5)*80, 255, 200, 0, 0.15, 2);
        if (boss.hp <= 0) {
          boss.dying = true;
          boss.deathTimer = 1.5;
        }
      }
    }
  }

  // Enemy bullets vs player
  if (invincibleTimer <= 0) {
    for (let i = 0; i < enemyBullets.length; i++) {
      const b = enemyBullets[i];
      if (!b.active) continue;
      if (Math.hypot(b.x - player.x, b.y - player.y) < player.size + 3) {
        b.active = false;
        playerHit();
        break;
      }
    }
    // Enemy collision with player
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (Math.hypot(e.x - player.x, e.y - player.y) < e.size + player.size * 0.7) {
        spawnExplosion(e.x, e.y, 10, e.r, e.g, e.b);
        for (let ci = 0; ci < 8; ci++) { const ca = (ci/8)*Math.PI*2; spawnParticle(e.x, e.y, Math.cos(ca)*120, Math.sin(ca)*120, e.r, e.g, e.b, 0.6, 4); }
        enemies.splice(i, 1);
        playerHit();
        break;
      }
    }
  }

  // Powerup collection
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    if (Math.hypot(pu.x - player.x, pu.y - player.y) < 25) {
      collectPowerup(pu);
      powerups.splice(i, 1);
    }
  }

  // Update stars with twinkle
  for (let l = 0; l < 3; l++) {
    for (const s of starLayers[l]) {
      s.y += s.speed * dt;
      s.twinklePhase += s.twinkleSpeed * dt;
      if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    }
  }
  // Update nebulae
  for (const n of nebulae) {
    n.y += n.speed * dt;
    n.x += n.drift * dt;
    n.pulsePhase += 0.3 * dt;
    if (n.y > H + n.r) { n.y = -n.r; n.x = Math.random() * W; }
  }
  // Update shooting stars
  if (Math.random() < 0.003) { // occasional shooting star
    shootingStars.push({
      x: Math.random() * W, y: Math.random() * H * 0.3,
      vx: -150 - Math.random() * 200, vy: 200 + Math.random() * 150,
      life: 0.5 + Math.random() * 0.5, maxLife: 0.5 + Math.random() * 0.5,
      size: 1 + Math.random() * 1.5
    });
  }
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.x += ss.vx * dt; ss.y += ss.vy * dt; ss.life -= dt;
    if (ss.life <= 0) shootingStars.splice(i, 1);
  }
  // Screen flash decay
  if (screenFlashAlpha > 0) screenFlashAlpha = Math.max(0, screenFlashAlpha - dt * 2);
}

function addScore(pts, x, y) {
  comboTimer = COMBO_WINDOW;
  comboCount++;
  comboMultiplier = Math.min(comboCount, 10);
  const mult = (scoreBoostTimer > 0 ? 2 : 1) * comboMultiplier;
  const total = pts * mult;
  score += total;
  const text = comboMultiplier > 1 ? `+${total} x${comboMultiplier}` : `+${total}`;
  spawnScorePopup(x, y - 15, text);
}

function maybeDropPowerup(x, y) {
  if (Math.random() < POWERUP_CHANCE) {
    const type = Math.floor(Math.random() * PU_TYPES.length);
    powerups.push({ x, y, type, angle: 0 });
  }
}

function collectPowerup(pu) {
  const def = PU_TYPES[pu.type];
  playSound('powerup');
  // Parse color for ring
  const tc = hexToRgb(def.color);
  spawnPowerupRing(pu.x, pu.y, tc.r, tc.g, tc.b);

  switch(pu.type) {
    case 0: player.rapidFire = def.dur; activePowerup = {name:def.name, color:def.color, timer:def.dur, maxTimer:def.dur, icon:def.icon}; break;
    case 1: player.tripleShot = def.dur; activePowerup = {name:def.name, color:def.color, timer:def.dur, maxTimer:def.dur, icon:def.icon}; break;
    case 2: player.shield = true; break;
    case 3: fireHomingMissile(); break;
    case 4: scoreBoostTimer = def.dur; activePowerup = {name:def.name, color:def.color, timer:def.dur, maxTimer:def.dur, icon:def.icon}; break;
    case 5: player.speedBoost = def.dur; activePowerup = {name:def.name, color:def.color, timer:def.dur, maxTimer:def.dur, icon:def.icon}; break;
    case 6: player.laser = def.dur; player.laserActive = true; activePowerup = {name:def.name, color:def.color, timer:def.dur, maxTimer:def.dur, icon:def.icon}; break;
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16) || 200;
  const g = parseInt(hex.slice(3, 5), 16) || 200;
  const b = parseInt(hex.slice(5, 7), 16) || 200;
  return { r, g, b };
}

function playerHit() {
  if (invincibleTimer > 0) return;
  if (player.shield) {
    player.shield = false;
    spawnExplosion(player.x, player.y, 12, 0, 255, 100);
    triggerShake(3, 0.1);
    return;
  }
  lives--;
  playSound('hit');
  spawnExplosion(player.x, player.y, 20, 0, 200, 255, 1.5);
  triggerShake(8, 0.3);
  if (lives <= 0) {
    gameOver();
  } else {
    invincibleTimer = 2.0;
    player.x = W / 2; player.y = H * 0.75;
    player.targetX = player.x; player.targetY = player.y;
  }
}

function gameOver() {
  state = 'gameover';
  stopDrone();
  showHUD(false);
  goScoreEl.textContent = score.toLocaleString();
  goWaveEl.textContent = `Wave ${wave}`;
  const isHS = isHighScore(score);
  if (isHS) {
    goNewHS.classList.remove('hidden');
    initialsSection.classList.remove('hidden');
    goSubmitBtn.style.display = '';
    goRestartBtn.style.display = 'none';
    buildInitialsUI();
  } else {
    goNewHS.classList.add('hidden');
    initialsSection.classList.add('hidden');
    goSubmitBtn.style.display = 'none';
    goRestartBtn.style.display = '';
  }
  setTimeout(() => showScreen('goScreen'), 500);
}

// ===== RENDER =====
function render() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  // Background — deep dark space
  ctx.fillStyle = '#020108';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Nebulae — large semi-transparent radial gradients
  for (const n of nebulae) {
    const pulseAlpha = n.alpha + Math.sin(n.pulsePhase) * 0.008;
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    grad.addColorStop(0, `rgba(${n.cr},${n.cg},${n.cb},${pulseAlpha})`);
    grad.addColorStop(0.5, `rgba(${n.cr},${n.cg},${n.cb},${pulseAlpha * 0.5})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(n.x - n.r, n.y - n.r, n.r * 2, n.r * 2);
  }

  // Stars — 3 parallax layers with twinkle
  for (let l = 0; l < 3; l++) {
    for (const s of starLayers[l]) {
      const twinkle = s.baseAlpha + Math.sin(s.twinklePhase) * 0.3;
      ctx.globalAlpha = Math.max(0.05, Math.min(1, twinkle));
      ctx.fillStyle = s.color;
      if (l === 2) {
        // Largest layer: draw with glow
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha *= 0.3;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * 2.5, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(s.x, s.y, s.size, s.size);
      }
    }
  }
  ctx.globalAlpha = 1;

  // Shooting stars
  ctx.globalCompositeOperation = 'lighter';
  for (const ss of shootingStars) {
    const alpha = ss.life / ss.maxLife;
    const tailLen = 40 + (1 - alpha) * 30;
    const nx = ss.vx / Math.hypot(ss.vx, ss.vy);
    const ny = ss.vy / Math.hypot(ss.vx, ss.vy);
    const grad = ctx.createLinearGradient(ss.x, ss.y, ss.x - nx * tailLen, ss.y - ny * tailLen);
    grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = ss.size;
    ctx.beginPath();
    ctx.moveTo(ss.x, ss.y);
    ctx.lineTo(ss.x - nx * tailLen, ss.y - ny * tailLen);
    ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';

  if (state === 'title' || state === 'highscores') {
    // Demo starfield is enough
    ctx.restore();
    return;
  }

  // Particles — additive blending for luminous glow
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (!p.active) continue;
    const alpha = Math.max(0, p.life / p.maxLife);
    const sz = p.size * (0.3 + alpha * 0.7);
    // Soft glow halo
    if (sz > 2) {
      ctx.globalAlpha = alpha * 0.35;
      ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Core
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgb(${Math.min(255, p.r + 40)},${Math.min(255, p.g + 40)},${Math.min(255, p.b + 20)})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;

  // Debris — small tumbling shapes falling down
  for (let i = 0; i < debris.length; i++) {
    const d = debris[i];
    if (!d.active) continue;
    const alpha = Math.max(0, d.life / d.maxLife) * 0.8;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgb(${d.r},${d.g},${d.b})`;
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rot);
    if (d.shape === 0) {
      // Small rectangle
      ctx.fillRect(-d.size, -d.size * 0.5, d.size * 2, d.size);
    } else if (d.shape === 1) {
      // Small triangle
      ctx.beginPath();
      ctx.moveTo(0, -d.size);
      ctx.lineTo(d.size * 0.8, d.size * 0.6);
      ctx.lineTo(-d.size * 0.8, d.size * 0.6);
      ctx.closePath();
      ctx.fill();
    } else {
      // Line/shard
      ctx.strokeStyle = `rgb(${d.r},${d.g},${d.b})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-d.size, 0);
      ctx.lineTo(d.size, 0);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Laser beam
  if (player.laserActive && player.laser > 0 && (state === 'playing' || state === 'paused')) {
    ctx.globalCompositeOperation = 'lighter';
    const grad = ctx.createLinearGradient(player.x, player.y - player.size, player.x, 0);
    grad.addColorStop(0, 'rgba(180,0,255,0.8)');
    grad.addColorStop(0.5, 'rgba(200,100,255,0.4)');
    grad.addColorStop(1, 'rgba(160,0,255,0.1)');
    ctx.fillStyle = grad;
    ctx.fillRect(player.x - 5, 0, 10, player.y - player.size);
    // Glow
    const grad2 = ctx.createLinearGradient(player.x, player.y - player.size, player.x, 0);
    grad2.addColorStop(0, 'rgba(200,100,255,0.3)');
    grad2.addColorStop(1, 'rgba(160,0,255,0)');
    ctx.fillStyle = grad2;
    ctx.fillRect(player.x - 15, 0, 30, player.y - player.size);
    ctx.globalCompositeOperation = 'source-over';
  }

  // Powerups
  for (const pu of powerups) {
    const def = PU_TYPES[pu.type];
    const pulse = 0.8 + Math.sin(Date.now() * 0.005) * 0.2;
    ctx.save();
    ctx.translate(pu.x, pu.y);
    ctx.rotate(pu.angle);
    ctx.scale(pulse, pulse);
    // Glow
    ctx.globalCompositeOperation = 'lighter';
    const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, 18);
    glow.addColorStop(0, def.color);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(-18, -18, 36, 36);
    ctx.globalCompositeOperation = 'source-over';
    // Icon bg
    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.fill();
    // Icon text
    ctx.fillStyle = '#000';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(def.icon, 0, 0);
    ctx.restore();
  }

  // Enemies — detailed geometric shapes
  for (const e of enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);
    const flash = e.flashTimer > 0;
    const pulse = 0.85 + Math.sin(Date.now() * 0.006 + e.x) * 0.15;
    const rot = Date.now() * 0.001; // slow rotation timer

    // Glow halo (additive)
    ctx.globalCompositeOperation = 'lighter';
    const glowRadius = e.size * 1.8;
    const glow = ctx.createRadialGradient(0, 0, e.size * 0.3, 0, 0, glowRadius);
    if (flash) {
      glow.addColorStop(0, 'rgba(255,255,255,0.6)');
      glow.addColorStop(0.4, 'rgba(255,255,255,0.2)');
    } else {
      glow.addColorStop(0, `rgba(${e.r},${e.g},${e.b},${0.25 * pulse})`);
      glow.addColorStop(0.5, `rgba(${e.r},${e.g},${e.b},${0.08 * pulse})`);
    }
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(-glowRadius, -glowRadius, glowRadius * 2, glowRadius * 2);
    ctx.globalCompositeOperation = 'source-over';

    if (e.type === 'drifter') {
      // Hexagon with inscribed triangle, slowly rotating, glowing edges
      const hexRot = rot * 0.4 + e.x * 0.01;
      const sz = e.size * pulse;
      // Outer hexagon fill
      ctx.fillStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.85)`;
      ctx.beginPath();
      for (let p = 0; p < 6; p++) {
        const a = hexRot + (p / 6) * Math.PI * 2;
        const px = Math.cos(a) * sz, py = Math.sin(a) * sz;
        p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      // Glowing edges
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+100)},${Math.min(255,e.g+80)},${Math.min(255,e.b+60)},0.8)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Inscribed triangle
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+60)},${Math.min(255,e.g+40)},${Math.min(255,e.b+20)},0.6)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let p = 0; p < 3; p++) {
        const a = hexRot + (p / 3) * Math.PI * 2;
        const px = Math.cos(a) * sz * 0.65, py = Math.sin(a) * sz * 0.65;
        p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      // Inner hex ring detail
      ctx.strokeStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.35)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      for (let p = 0; p < 6; p++) {
        const a = hexRot + (p / 6) * Math.PI * 2 + Math.PI / 6;
        const px = Math.cos(a) * sz * 0.4, py = Math.sin(a) * sz * 0.4;
        p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      // Center dot
      ctx.fillStyle = flash ? '#fff' : `rgba(255,${Math.min(255,e.g+120)},${Math.min(255,e.b+80)},0.7)`;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.15, 0, Math.PI * 2);
      ctx.fill();

    } else if (e.type === 'zigzagger') {
      // Diamond/rhombus with pulsing energy core, spiky protrusions
      const sz = e.size * pulse;
      // Outer diamond
      ctx.fillStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.85)`;
      ctx.beginPath();
      ctx.moveTo(0, -sz * 1.2);
      ctx.lineTo(sz * 0.8, 0);
      ctx.lineTo(0, sz * 1.2);
      ctx.lineTo(-sz * 0.8, 0);
      ctx.closePath();
      ctx.fill();
      // Glowing edge
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+80)},${Math.min(255,e.g+80)},${Math.min(255,e.b+80)},0.7)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Spiky protrusions on corners
      ctx.fillStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+40)},${Math.min(255,e.g+20)},${Math.min(255,e.b+20)},0.7)`;
      const spikes = [[0, -sz*1.2, 0, -sz*1.6], [sz*0.8, 0, sz*1.15, 0], [0, sz*1.2, 0, sz*1.6], [-sz*0.8, 0, -sz*1.15, 0]];
      for (const sp of spikes) {
        ctx.beginPath();
        ctx.moveTo(sp[0] - 2.5, sp[1]);
        ctx.lineTo(sp[2], sp[3]);
        ctx.lineTo(sp[0] + 2.5, sp[1]);
        ctx.closePath();
        ctx.fill();
      }
      // Inner diamond detail lines
      ctx.strokeStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.4)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(0, -sz * 0.5); ctx.lineTo(sz * 0.35, 0);
      ctx.lineTo(0, sz * 0.5); ctx.lineTo(-sz * 0.35, 0); ctx.closePath();
      ctx.stroke();
      // Pulsing energy core
      const corePulse = 0.6 + Math.sin(Date.now() * 0.01 + e.x) * 0.4;
      ctx.globalCompositeOperation = 'lighter';
      const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, sz * 0.35);
      coreGrad.addColorStop(0, `rgba(255,255,255,${0.6 * corePulse})`);
      coreGrad.addColorStop(0.5, `rgba(${e.r},${e.g},${e.b},${0.3 * corePulse})`);
      coreGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = coreGrad;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

    } else if (e.type === 'swarmer') {
      // Angular pentagon/arrow shape — little fighter drone with wing details
      const sz = e.size;
      ctx.fillStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.9)`;
      ctx.beginPath();
      // Arrow/pentagon body
      ctx.moveTo(0, -sz * 1.1);           // nose
      ctx.lineTo(sz * 0.45, -sz * 0.1);   // right shoulder
      ctx.lineTo(sz * 0.9, sz * 0.5);     // right wing tip
      ctx.lineTo(sz * 0.3, sz * 0.3);     // right wing notch
      ctx.lineTo(0, sz * 0.7);            // tail
      ctx.lineTo(-sz * 0.3, sz * 0.3);    // left wing notch
      ctx.lineTo(-sz * 0.9, sz * 0.5);    // left wing tip
      ctx.lineTo(-sz * 0.45, -sz * 0.1);  // left shoulder
      ctx.closePath();
      ctx.fill();
      // Edge highlight
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+80)},${Math.min(255,e.g+60)},${Math.min(255,e.b+40)},0.6)`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // Wing panel lines
      ctx.strokeStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.4)`;
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(sz * 0.2, -sz * 0.05); ctx.lineTo(sz * 0.5, sz * 0.35);
      ctx.moveTo(-sz * 0.2, -sz * 0.05); ctx.lineTo(-sz * 0.5, sz * 0.35);
      ctx.stroke();
      // Cockpit dot
      ctx.fillStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+100)},${Math.min(255,e.g+100)},${Math.min(255,e.b+80)},0.8)`;
      ctx.beginPath();
      ctx.arc(0, -sz * 0.2, 2, 0, Math.PI * 2);
      ctx.fill();

    } else if (e.type === 'tank') {
      // Octagon with layered armor rings, turret, panel lines
      const sz = e.size * pulse;
      // Outer octagon
      ctx.fillStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.9)`;
      ctx.beginPath();
      for (let p = 0; p < 8; p++) {
        const a = (p / 8) * Math.PI * 2 - Math.PI / 8;
        const px = Math.cos(a) * sz, py = Math.sin(a) * sz;
        p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      // Edge
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+80)},${Math.min(255,e.g+30)},${Math.min(255,e.b+30)},0.7)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Armor ring 1
      ctx.strokeStyle = flash ? '#fcc' : `rgba(${Math.min(255,e.r+40)},${Math.min(255,e.g+20)},${Math.min(255,e.b+20)},0.5)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.72, 0, Math.PI * 2);
      ctx.stroke();
      // Armor ring 2
      ctx.strokeStyle = flash ? '#faa' : `rgba(${e.r},${e.g},${e.b},0.35)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.5, 0, Math.PI * 2);
      ctx.stroke();
      // Panel lines (battle-scarred)
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+60)},${Math.min(255,e.g+15)},${Math.min(255,e.b+15)},0.3)`;
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      // Horizontal + vertical cross lines
      ctx.moveTo(-sz * 0.7, 0); ctx.lineTo(sz * 0.7, 0);
      ctx.moveTo(0, -sz * 0.7); ctx.lineTo(0, sz * 0.7);
      // Diagonal scar lines
      ctx.moveTo(-sz * 0.4, -sz * 0.5); ctx.lineTo(sz * 0.1, -sz * 0.2);
      ctx.moveTo(sz * 0.2, sz * 0.3); ctx.lineTo(sz * 0.5, sz * 0.1);
      ctx.stroke();
      // Turret — central rectangle + barrel
      ctx.fillStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+30)},${Math.min(255,e.g+10)},${Math.min(255,e.b+10)},0.8)`;
      ctx.fillRect(-sz * 0.2, -sz * 0.2, sz * 0.4, sz * 0.4);
      // Barrel pointing down
      ctx.fillRect(-sz * 0.06, sz * 0.2, sz * 0.12, sz * 0.45);
      // Turret core
      ctx.fillStyle = flash ? '#fff' : `rgba(255,${Math.min(255,e.g+60)},${Math.min(255,e.b+40)},0.6)`;
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.12, 0, Math.PI * 2);
      ctx.fill();
      // Health bar
      const barW = e.size * 2;
      const barH = 4;
      const barY = -e.size - 10;
      ctx.fillStyle = 'rgba(100,0,0,0.7)';
      ctx.fillRect(-barW / 2, barY, barW, barH);
      ctx.fillStyle = '#f44';
      ctx.fillRect(-barW / 2, barY, barW * (e.hp / e.maxHp), barH);
    }
    ctx.restore();
  }

  // Boss — spaceship dreadnought
  if (boss) {
    ctx.save();
    ctx.translate(boss.x, boss.y);
    const flash = boss.flashTimer > 0;
    const bPulse = 0.9 + Math.sin(Date.now() * 0.004) * 0.1;
    const sz = boss.size;
    const t = Date.now() * 0.001;

    // Outer engine glow
    ctx.globalCompositeOperation = 'lighter';
    const glowR = sz * 3;
    const glow = ctx.createRadialGradient(0, 0, sz*0.3, 0, 0, glowR);
    glow.addColorStop(0, flash ? 'rgba(255,255,255,0.5)' : `rgba(255,60,0,${0.25*bPulse})`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(-glowR, -glowR, glowR*2, glowR*2);
    ctx.globalCompositeOperation = 'source-over';

    // Main hull (elongated diamond body)
    ctx.fillStyle = flash ? '#fff' : '#cc2200';
    ctx.beginPath();
    ctx.moveTo(0, -sz*1.4);
    ctx.lineTo(sz*0.55, -sz*0.2);
    ctx.lineTo(sz*0.4, sz*1.0);
    ctx.lineTo(0, sz*0.7);
    ctx.lineTo(-sz*0.4, sz*1.0);
    ctx.lineTo(-sz*0.55, -sz*0.2);
    ctx.closePath();
    ctx.fill();

    // Hull gradient overlay
    const hullGrad = ctx.createLinearGradient(-sz*0.5, -sz*1.2, sz*0.5, sz*0.8);
    hullGrad.addColorStop(0, flash ? 'rgba(255,255,255,0.4)' : 'rgba(255,100,50,0.4)');
    hullGrad.addColorStop(0.5, 'transparent');
    hullGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = hullGrad;
    ctx.beginPath();
    ctx.moveTo(0, -sz*1.4);
    ctx.lineTo(sz*0.55, -sz*0.2);
    ctx.lineTo(sz*0.4, sz*1.0);
    ctx.lineTo(0, sz*0.7);
    ctx.lineTo(-sz*0.4, sz*1.0);
    ctx.lineTo(-sz*0.55, -sz*0.2);
    ctx.closePath();
    ctx.fill();

    // Swept wings
    ctx.fillStyle = flash ? '#fcc' : '#991100';
    ctx.beginPath();
    ctx.moveTo(sz*0.5, -sz*0.1);
    ctx.lineTo(sz*1.6, sz*0.4);
    ctx.lineTo(sz*1.3, sz*0.8);
    ctx.lineTo(sz*0.6, sz*0.5);
    ctx.lineTo(sz*0.35, sz*0.8);
    ctx.lineTo(sz*0.3, sz*0.2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-sz*0.5, -sz*0.1);
    ctx.lineTo(-sz*1.6, sz*0.4);
    ctx.lineTo(-sz*1.3, sz*0.8);
    ctx.lineTo(-sz*0.6, sz*0.5);
    ctx.lineTo(-sz*0.35, sz*0.8);
    ctx.lineTo(-sz*0.3, sz*0.2);
    ctx.closePath();
    ctx.fill();

    // Wing detail lines
    ctx.strokeStyle = flash ? '#fff' : 'rgba(255,80,30,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sz*0.5, -sz*0.1); ctx.lineTo(sz*1.4, sz*0.55);
    ctx.moveTo(-sz*0.5, -sz*0.1); ctx.lineTo(-sz*1.4, sz*0.55);
    ctx.stroke();

    // Engine pods at wing tips
    for (const side of [-1, 1]) {
      const ex = side * sz * 1.35, ey = sz * 0.55;
      ctx.fillStyle = flash ? '#fff' : '#771100';
      ctx.beginPath();
      ctx.ellipse(ex, ey, sz*0.18, sz*0.32, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalCompositeOperation = 'lighter';
      const engGlow = ctx.createRadialGradient(ex, ey+sz*0.25, 0, ex, ey+sz*0.25, sz*0.4);
      engGlow.addColorStop(0, `rgba(255,${140+Math.sin(t*6+side)*60|0},0,${0.8*bPulse})`);
      engGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = engGlow;
      ctx.fillRect(ex-sz*0.4, ey, sz*0.8, sz*0.5);
      ctx.globalCompositeOperation = 'source-over';
    }

    // Central engine (main thruster)
    ctx.globalCompositeOperation = 'lighter';
    const mainEng = ctx.createRadialGradient(0, sz*0.7, 0, 0, sz*0.8, sz*0.5);
    mainEng.addColorStop(0, `rgba(255,180,0,${0.9*bPulse})`);
    mainEng.addColorStop(0.4, `rgba(255,80,0,${0.5*bPulse})`);
    mainEng.addColorStop(1, 'transparent');
    ctx.fillStyle = mainEng;
    ctx.fillRect(-sz*0.5, sz*0.5, sz, sz*0.7);
    ctx.globalCompositeOperation = 'source-over';

    // Cockpit / bridge
    const cockpitGrad = ctx.createRadialGradient(-sz*0.08, -sz*0.6, 0, 0, -sz*0.55, sz*0.3);
    cockpitGrad.addColorStop(0, flash ? '#fff' : 'rgba(255,200,150,0.9)');
    cockpitGrad.addColorStop(0.5, flash ? '#faa' : 'rgba(200,80,30,0.6)');
    cockpitGrad.addColorStop(1, 'rgba(80,0,0,0.3)');
    ctx.fillStyle = cockpitGrad;
    ctx.beginPath();
    ctx.ellipse(0, -sz*0.55, sz*0.22, sz*0.28, 0, 0, Math.PI*2);
    ctx.fill();

    // Panel lines on hull
    ctx.strokeStyle = flash ? '#fff' : 'rgba(255,120,60,0.35)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, -sz*0.3); ctx.lineTo(sz*0.3, sz*0.4);
    ctx.moveTo(0, -sz*0.3); ctx.lineTo(-sz*0.3, sz*0.4);
    ctx.moveTo(-sz*0.25, sz*0.1); ctx.lineTo(sz*0.25, sz*0.1);
    ctx.stroke();

    // Rotating weapon ring
    ctx.strokeStyle = `rgba(255,100,0,${0.4*bPulse})`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6,6]);
    ctx.beginPath();
    ctx.arc(0, 0, sz*0.9, t*1.5 % (Math.PI*2), t*1.5 % (Math.PI*2) + Math.PI*1.2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Health bar
    const barW = sz * 3.5;
    const barH = 7;
    const barY = -sz*1.6;
    ctx.fillStyle = 'rgba(80,0,0,0.8)';
    ctx.fillRect(-barW/2, barY, barW, barH);
    const hpPct = Math.max(0, boss.hp/boss.maxHp);
    ctx.fillStyle = hpPct > 0.5 ? '#f44' : hpPct > 0.25 ? '#f80' : '#ff0';
    ctx.fillRect(-barW/2, barY, barW*hpPct, barH);
    // DREADNOUGHT label
    ctx.fillStyle = 'rgba(255,100,50,0.8)';
    ctx.font = `bold ${Math.floor(sz*0.35)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('DREADNOUGHT', 0, barY - 4);

    ctx.restore();
  }

  // Enemy bullets — with stronger glow halos
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < enemyBullets.length; i++) {
    const b = enemyBullets[i];
    if (!b.active) continue;
    // Outer glow
    const glow2 = ctx.createRadialGradient(b.x, b.y, 2, b.x, b.y, 10);
    glow2.addColorStop(0, 'rgba(255,60,60,0.4)');
    glow2.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = glow2;
    ctx.fillRect(b.x - 10, b.y - 10, 20, 20);
    // Inner glow
    const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 5);
    glow.addColorStop(0, 'rgba(255,200,180,1)');
    glow.addColorStop(0.5, 'rgba(255,80,80,0.8)');
    glow.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(b.x - 5, b.y - 5, 10, 10);
    // Core
    ctx.fillStyle = '#fcc';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  // Player bullets — bright yellow-white elongated with orange glow
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    if (!b.active) continue;
    // Outer orange glow
    const glow2 = ctx.createRadialGradient(b.x, b.y, 2, b.x, b.y, 12);
    glow2.addColorStop(0, 'rgba(255,180,50,0.5)');
    glow2.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = glow2;
    ctx.fillRect(b.x - 12, b.y - 14, 24, 28);
    // Inner bright glow
    const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 6);
    glow.addColorStop(0, 'rgba(255,255,240,1)');
    glow.addColorStop(0.4, 'rgba(255,255,100,0.8)');
    glow.addColorStop(1, 'rgba(255,200,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(b.x - 6, b.y - 8, 12, 16);
    // Elongated bright core
    ctx.fillStyle = '#ffe';
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, 2, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  // Homing missiles — with glow
  for (const m of homingMissiles) {
    ctx.save();
    ctx.translate(m.x, m.y);
    const angle = Math.atan2(m.vy, m.vx);
    ctx.rotate(angle + Math.PI / 2);
    // Glow halo
    ctx.globalCompositeOperation = 'lighter';
    const mGlow = ctx.createRadialGradient(0, 0, 1, 0, 0, m.size * 2);
    mGlow.addColorStop(0, 'rgba(255,120,40,0.5)');
    mGlow.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.fillStyle = mGlow;
    ctx.fillRect(-m.size * 2, -m.size * 2, m.size * 4, m.size * 4);
    ctx.globalCompositeOperation = 'source-over';
    // Body
    ctx.fillStyle = '#f84';
    ctx.beginPath();
    ctx.moveTo(0, -m.size); ctx.lineTo(m.size * 0.5, m.size * 0.5); ctx.lineTo(-m.size * 0.5, m.size * 0.5);
    ctx.closePath();
    ctx.fill();
    // Hot tip
    ctx.fillStyle = '#ffe';
    ctx.beginPath();
    ctx.arc(0, -m.size * 0.5, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Player ship — glowing crystal/gem with layered gradients
  if (state === 'playing' || state === 'paused') {
    const blinkOff = invincibleTimer > 0 && Math.floor(invincibleTimer * 10) % 2 === 0;
    if (!blinkOff) {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.tilt);
      const s = player.size;
      const pulse = 0.95 + Math.sin(Date.now() * 0.004) * 0.05;

      // Outer energy glow (reduced ~60%)
      ctx.globalCompositeOperation = 'lighter';
      const outerGlow = ctx.createRadialGradient(0, 0, s * 0.2, 0, 0, s * 1.4);
      outerGlow.addColorStop(0, 'rgba(0,180,255,0.18)');
      outerGlow.addColorStop(0.5, 'rgba(0,100,200,0.06)');
      outerGlow.addColorStop(1, 'rgba(0,40,120,0)');
      ctx.fillStyle = outerGlow;
      ctx.fillRect(-s * 1.4, -s * 1.4, s * 2.8, s * 2.8);

      // Medium inner glow (reduced)
      const midGlow = ctx.createRadialGradient(0, -s * 0.2, 2, 0, -s * 0.2, s * 1.0);
      midGlow.addColorStop(0, `rgba(100,220,255,${0.25 * pulse})`);
      midGlow.addColorStop(1, 'rgba(0,120,255,0)');
      ctx.fillStyle = midGlow;
      ctx.fillRect(-s * 1.0, -s * 1.2, s * 2.0, s * 2.2);
      ctx.globalCompositeOperation = 'source-over';

      // Shield glow ring
      if (player.shield) {
        ctx.globalCompositeOperation = 'lighter';
        const shieldGlow = ctx.createRadialGradient(0, 0, s + 4, 0, 0, s + 14);
        shieldGlow.addColorStop(0, 'rgba(0,255,120,0.4)');
        shieldGlow.addColorStop(1, 'rgba(0,255,80,0)');
        ctx.fillStyle = shieldGlow;
        ctx.fillRect(-s - 14, -s - 14, (s + 14) * 2, (s + 14) * 2);
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = `rgba(0,255,100,${0.5 + Math.sin(Date.now() * 0.006) * 0.2})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(0, 0, s + 8, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Ship body — outer dark cyan layer (wings)
      ctx.fillStyle = '#068';
      ctx.beginPath();
      ctx.moveTo(0, -s * 1.1);
      ctx.lineTo(-s * 0.7, s * 0.5);
      ctx.lineTo(-s * 0.55, s * 0.7);
      ctx.lineTo(-s * 0.15, s * 0.45);
      ctx.lineTo(0, s * 0.55);
      ctx.lineTo(s * 0.15, s * 0.45);
      ctx.lineTo(s * 0.55, s * 0.7);
      ctx.lineTo(s * 0.7, s * 0.5);
      ctx.closePath();
      ctx.fill();

      // Mid layer — bright cyan body
      const bodyGrad = ctx.createLinearGradient(0, -s, 0, s * 0.6);
      bodyGrad.addColorStop(0, '#4ef');
      bodyGrad.addColorStop(0.5, '#0cf');
      bodyGrad.addColorStop(1, '#068');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(-s * 0.5, s * 0.4);
      ctx.lineTo(-s * 0.15, s * 0.35);
      ctx.lineTo(0, s * 0.5);
      ctx.lineTo(s * 0.15, s * 0.35);
      ctx.lineTo(s * 0.5, s * 0.4);
      ctx.closePath();
      ctx.fill();

      // Inner gem facet — lighter
      const facetGrad = ctx.createLinearGradient(0, -s * 0.8, 0, s * 0.2);
      facetGrad.addColorStop(0, 'rgba(200,255,255,0.7)');
      facetGrad.addColorStop(1, 'rgba(0,180,220,0.3)');
      ctx.fillStyle = facetGrad;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.85);
      ctx.lineTo(-s * 0.2, s * 0.05);
      ctx.lineTo(0, s * 0.15);
      ctx.lineTo(s * 0.2, s * 0.05);
      ctx.closePath();
      ctx.fill();

      // Bright white hot-spot at center
      ctx.globalCompositeOperation = 'lighter';
      const hotspot = ctx.createRadialGradient(0, -s * 0.15, 0, 0, -s * 0.15, s * 0.4);
      hotspot.addColorStop(0, `rgba(255,255,255,${0.6 * pulse})`);
      hotspot.addColorStop(0.4, 'rgba(150,230,255,0.2)');
      hotspot.addColorStop(1, 'rgba(0,150,255,0)');
      ctx.fillStyle = hotspot;
      ctx.beginPath();
      ctx.arc(0, -s * 0.15, s * 0.4, 0, Math.PI * 2);
      ctx.fill();

      // Wing tip accents
      ctx.fillStyle = 'rgba(0,200,255,0.5)';
      ctx.beginPath();
      ctx.arc(-s * 0.6, s * 0.55, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.6, s * 0.55, 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Engine exhaust glow at base — subtle
      const engineGlow = ctx.createRadialGradient(0, s * 0.5, 1, 0, s * 0.5, s * 0.35);
      engineGlow.addColorStop(0, 'rgba(200,240,255,0.5)');
      engineGlow.addColorStop(0.5, 'rgba(0,180,255,0.15)');
      engineGlow.addColorStop(1, 'rgba(0,80,200,0)');
      ctx.fillStyle = engineGlow;
      ctx.beginPath();
      ctx.arc(0, s * 0.5, s * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

      // Subtle ambient ring when no shield
      if (!player.shield) {
        ctx.strokeStyle = `rgba(0,200,255,${0.08 + Math.sin(Date.now() * 0.003) * 0.04})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, s + 6, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }
  }

  // Score popups
  for (let i = 0; i < scorePopups.length; i++) {
    const p = scorePopups[i];
    if (!p.active) continue;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;

  // Boss warning overlay
  if (bossWarning > 0) {
    const flash = Math.sin(bossWarning * 10) > 0;
    if (flash) {
      ctx.fillStyle = 'rgba(255,0,0,0.1)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = `rgba(255,50,50,${0.5 + Math.sin(bossWarning * 8) * 0.5})`;
    ctx.font = `bold ${Math.min(W * 0.1, 50)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚠ WARNING ⚠', W / 2, H / 2);
  }

  // Speed lines when moving fast
  const pSpeed = Math.hypot(player.x - player.prevX, player.y - player.prevY);
  if (pSpeed > 3) {
    ctx.globalCompositeOperation = 'lighter';
    const lineCount = Math.min(Math.floor(pSpeed * 0.8), 8);
    for (let i = 0; i < lineCount; i++) {
      const lx = Math.random() * W;
      const ly = Math.random() * H;
      const ldx = (player.x - player.prevX) * -0.5;
      const ldy = (player.y - player.prevY) * -0.5;
      ctx.strokeStyle = `rgba(100,180,255,${0.05 + Math.random() * 0.08})`;
      ctx.lineWidth = 0.5 + Math.random();
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + ldx * (8 + Math.random() * 15), ly + ldy * (8 + Math.random() * 15));
      ctx.stroke();
    }
    ctx.globalCompositeOperation = 'source-over';
  }

  // Screen flash on big explosions
  if (screenFlashAlpha > 0) {
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = `rgba(255,255,255,${screenFlashAlpha})`;
    ctx.fillRect(-10, -10, W + 20, H + 20);
    ctx.globalCompositeOperation = 'source-over';
  }

  // HUD
  renderHUD();

  // Vignette — darker corners/edges
  const vignetteGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
  vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vignetteGrad;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  ctx.restore();
}

function renderHUD() {
  if (state !== 'playing' && state !== 'paused') return;

  const fontSize = Math.min(W * 0.045, 22);

  // Score
  ctx.fillStyle = '#ffd700';
  ctx.font = `bold ${fontSize * 1.2}px sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(255,215,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText(score.toLocaleString(), 60, 14);
  ctx.shadowBlur = 0;

  // High score
  ctx.fillStyle = 'rgba(255,215,0,0.4)';
  ctx.font = `${fontSize * 0.6}px sans-serif`;
  ctx.fillText(`HI ${Math.max(score, highScore).toLocaleString()}`, 60, 14 + fontSize * 1.3);

  // Wave
  ctx.fillStyle = '#0ff';
  ctx.font = `bold ${fontSize}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`WAVE ${wave}`, W / 2, 14);

  // Difficulty label
  const diffColors = { easy: 'rgba(0,255,255,0.4)', normal: 'rgba(255,215,0,0.5)', hard: 'rgba(255,68,68,0.5)' };
  ctx.fillStyle = diffColors[difficulty];
  ctx.font = `bold ${fontSize * 0.55}px sans-serif`;
  ctx.fillText(difficulty.toUpperCase(), W / 2, 14 + fontSize * 1.15);

  // Wave pulse on new wave
  if (wavePause > 1.0) {
    const alpha = (wavePause - 1.0);
    ctx.fillStyle = `rgba(0,255,255,${alpha})`;
    ctx.font = `bold ${fontSize * 2.5}px sans-serif`;
    ctx.fillText(`WAVE ${wave}`, W / 2, H * 0.4);
  }

  // Lives
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    const lx = W - 55 - i * 22;
    const ly = 18;
    ctx.fillStyle = '#0cf';
    ctx.beginPath();
    ctx.moveTo(lx, ly - 8);
    ctx.lineTo(lx - 5, ly + 4);
    ctx.lineTo(lx + 5, ly + 4);
    ctx.closePath();
    ctx.fill();
  }

  // Active powerup
  if (activePowerup) {
    const px = 60, py = 14 + fontSize * 2.2;
    ctx.fillStyle = activePowerup.color;
    ctx.font = `bold ${fontSize * 0.7}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(`${activePowerup.icon} ${activePowerup.name}`, px, py);
    // Timer bar
    const barW = 80;
    const pct = Math.max(0, activePowerup.timer / activePowerup.maxTimer);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(px, py + fontSize * 0.7 + 2, barW, 4);
    ctx.fillStyle = activePowerup.color;
    ctx.fillRect(px, py + fontSize * 0.7 + 2, barW * pct, 4);
  }

  // Combo
  if (comboCount > 1 && comboTimer > 0) {
    const alpha = Math.min(1, comboTimer * 2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${fontSize * 1.8}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(255,215,0,0.5)';
    ctx.shadowBlur = 15;
    ctx.fillText(`x${comboMultiplier} COMBO!`, W / 2, H * 0.25);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Combo edge flash
  if (comboCount > 3 && comboTimer > 0) {
    const alpha = Math.min(0.15, comboTimer * 0.2);
    ctx.fillStyle = `rgba(255,215,0,${alpha})`;
    ctx.fillRect(0, 0, 4, H);
    ctx.fillRect(W - 4, 0, 4, H);
  }
}

// ===== MAIN LOOP =====
function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  if (lastTime === 0) { lastTime = time; return; }
  dt = Math.min((time - lastTime) / 1000, 1 / 30) * gameSpeedMul;
  lastTime = time;

  update();
  render();
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
