<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STELLAR DRIFT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;overflow:hidden;overscroll-behavior:none;width:100%;height:100%;background:#000;touch-action:none}
canvas{display:block;touch-action:none}
button{touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:auto}
.overlay.hidden{display:none;pointer-events:none}
.overlay-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7)}
.overlay-content{position:relative;z-index:1;text-align:center;color:#fff;font-family:'Segoe UI',system-ui,sans-serif}
.game-title{font-size:clamp(2rem,8vw,4.5rem);font-weight:900;letter-spacing:0.15em;background:linear-gradient(180deg,#fff 0%,#0ff 40%,#06f 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;filter:drop-shadow(0 0 20px rgba(0,255,255,0.5));margin-bottom:0.2em}
.game-subtitle{font-size:clamp(0.7rem,2.5vw,1.1rem);color:rgba(0,255,255,0.6);letter-spacing:0.4em;text-transform:uppercase;margin-bottom:2em}
.btn{background:none;border:2px solid rgba(0,255,255,0.5);color:#0ff;font-size:clamp(0.9rem,3vw,1.2rem);padding:0.7em 2em;margin:0.4em;border-radius:8px;font-family:inherit;letter-spacing:0.1em;transition:all 0.2s;min-width:180px;min-height:48px}
.btn:hover,.btn:active{background:rgba(0,255,255,0.15);border-color:#0ff;box-shadow:0 0 20px rgba(0,255,255,0.3)}
.btn-start{font-size:clamp(1.1rem,3.5vw,1.5rem);border-color:#0ff;animation:pulse-btn 2s infinite}
@keyframes pulse-btn{0%,100%{box-shadow:0 0 10px rgba(0,255,255,0.2)}50%{box-shadow:0 0 30px rgba(0,255,255,0.5)}}
.diff-row{display:flex;gap:0.5em;margin-bottom:1.2em;justify-content:center}
.diff-btn{background:none;border:2px solid rgba(0,255,255,0.3);color:rgba(0,255,255,0.5);font-size:clamp(0.7rem,2.2vw,0.95rem);padding:0.5em 1.2em;border-radius:8px;font-family:inherit;letter-spacing:0.12em;font-weight:700;transition:all 0.2s;min-height:44px;min-width:70px;touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.diff-btn.selected{border-color:#0ff;color:#fff;background:rgba(0,255,255,0.15);box-shadow:0 0 16px rgba(0,255,255,0.35)}
.diff-btn.diff-hard.selected{border-color:#f44;color:#fff;background:rgba(255,68,68,0.15);box-shadow:0 0 16px rgba(255,68,68,0.35)}
.diff-btn.diff-normal.selected{border-color:#ffd700;color:#fff;background:rgba(255,215,0,0.12);box-shadow:0 0 16px rgba(255,215,0,0.3)}
.hud-btn{position:absolute;z-index:20;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:1.3rem;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0}
#pauseBtn{top:10px;left:10px}
#muteBtn{top:10px;right:10px}
.hud-btn.hidden{display:none}
#highScoreList{list-style:none;padding:0;margin:1em 0;max-height:50vh;overflow-y:auto}
#highScoreList li{font-size:clamp(0.8rem,2.5vw,1rem);padding:0.3em 0.8em;color:#aef;font-family:monospace;letter-spacing:0.05em}
#highScoreList li.gold{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,0.5)}
.initials-entry{display:flex;align-items:center;justify-content:center;gap:0.5em;margin:1em 0}
.initial-col{display:flex;flex-direction:column;align-items:center;gap:0.2em}
.initial-col .arr{background:none;border:1px solid rgba(0,255,255,0.4);color:#0ff;width:40px;height:36px;font-size:1.2rem;border-radius:6px;display:flex;align-items:center;justify-content:center}
.initial-col .letter{font-size:2rem;color:#fff;font-family:monospace;width:40px;text-align:center}
.go-score{font-size:clamp(1.5rem,5vw,2.5rem);color:#ffd700;margin:0.3em 0}
.go-wave{font-size:clamp(0.8rem,2.5vw,1rem);color:rgba(255,255,255,0.6);margin-bottom:0.5em}
.go-hs{font-size:clamp(0.9rem,2.5vw,1.1rem);color:#0f0;margin:0.3em 0}
</style>
</head>
<body>
<canvas id="c"></canvas>

<button id="pauseBtn" class="hud-btn hidden" aria-label="Pause">❚❚</button>
<button id="muteBtn" class="hud-btn hidden" aria-label="Mute">🔊</button>

<!-- Title Screen -->
<div id="titleScreen" class="overlay">
<div class="overlay-bg"></div>
<div class="overlay-content">
<div class="game-title">STELLAR DRIFT</div>
<div class="game-subtitle">One-Finger Space Shooter</div>
<div class="diff-row">
<button class="diff-btn diff-easy selected" id="diffEasy">EASY</button>
<button class="diff-btn diff-normal" id="diffNormal">NORMAL</button>
<button class="diff-btn diff-hard" id="diffHard">HARD</button>
</div>
<button class="btn btn-start" id="startBtn">TAP TO START</button>
<button class="btn" id="hsBtn">HIGH SCORES</button>
</div>
</div>

<!-- High Scores Screen -->
<div id="hsScreen" class="overlay hidden">
<div class="overlay-bg"></div>
<div class="overlay-content">
<div style="font-size:clamp(1.2rem,4vw,2rem);color:#ffd700;margin-bottom:0.5em;letter-spacing:0.1em">HIGH SCORES</div>
<ol id="highScoreList"></ol>
<button class="btn" id="hsBackBtn">BACK</button>
</div>
</div>

<!-- Game Over Screen -->
<div id="goScreen" class="overlay hidden">
<div class="overlay-bg"></div>
<div class="overlay-content">
<div style="font-size:clamp(1.5rem,5vw,2.5rem);color:#f44;letter-spacing:0.15em;margin-bottom:0.2em">GAME OVER</div>
<div class="go-score" id="goScore">0</div>
<div class="go-wave" id="goWave">Wave 1</div>
<div class="go-hs hidden" id="goNewHS">NEW HIGH SCORE!</div>
<div id="initialsSection" class="hidden">
<div style="color:rgba(255,255,255,0.6);font-size:0.9rem;margin-bottom:0.3em">ENTER INITIALS</div>
<div class="initials-entry" id="initialsEntry"></div>
</div>
<button class="btn" id="goSubmitBtn">SUBMIT</button>
<button class="btn" id="goRestartBtn" style="display:none">PLAY AGAIN</button>
<button class="btn" id="goHsBtn">HIGH SCORES</button>
<button class="btn" id="goMenuBtn">MENU</button>
</div>
</div>

<!-- Pause Screen -->
<div id="pauseScreen" class="overlay hidden">
<div class="overlay-bg"></div>
<div class="overlay-content">
<div style="font-size:clamp(1.5rem,5vw,2.5rem);color:#0ff;letter-spacing:0.15em;margin-bottom:0.5em">PAUSED</div>
<button class="btn" id="resumeBtn">RESUME</button>
<button class="btn" id="pauseQuitBtn">QUIT</button>
</div>
</div>

<script>
'use strict';
// ===== CANVAS SETUP =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

// ===== CONSTANTS =====
const LERP = 0.15;
const BASE_FIRE_RATE = 1 / 4; // seconds between shots per stream
const BULLET_SPEED = 600;
const PLAYER_SPEED = 1.0;
const POWERUP_CHANCE = 0.15;
const COMBO_WINDOW = 1.0;
const MAX_PARTICLES = 6000;
const MAX_BULLETS = 300;
const MAX_ENEMY_BULLETS = 200;
const POOL_SCORE_POPUPS = 60;
const HS_KEY = 'stellar_drift_highscores';
const DIFF_KEY = 'stellar_drift_difficulty';

// ===== DIFFICULTY =====
let difficulty = 'easy';
try { const saved = localStorage.getItem(DIFF_KEY); if (saved === 'easy' || saved === 'normal' || saved === 'hard') difficulty = saved; } catch(e) {}

const DIFF_SETTINGS = {
  easy:   { speedMul: 1.0, enemyBase: 16, enemyPerWave: 5, spawnMul: 1.0, tankWave: 10, fireMul: 1.0 },
  normal: { speedMul: 1.4, enemyBase: 22, enemyPerWave: 6, spawnMul: 0.7, tankWave: 10, fireMul: 0.85 },
  hard:   { speedMul: 1.8, enemyBase: 30, enemyPerWave: 8, spawnMul: 0.5, tankWave: 7, fireMul: 0.72 }
};

function getDiff() { return DIFF_SETTINGS[difficulty]; }

// ===== STATE =====
let state = 'title'; // title, playing, paused, gameover, highscores
let score = 0, lives = 3, wave = 0, highScore = 0;
let comboCount = 0, comboTimer = 0, comboMultiplier = 1;
let waveTimer = 0, waveEnemiesSpawned = 0, waveEnemyCount = 0, wavePause = 0;
let bossActive = false, bossWarning = 0;
let invincibleTimer = 0;
let shakeTimer = 0, shakeIntensity = 0;
let scoreBoostTimer = 0;
let screenFlashAlpha = 0; // for explosion screen flash
let dt = 0, lastTime = 0;
let inputX = 0, inputY = 0, inputActive = false;
let muted = false;

// ===== OBJECT POOLS =====
function createPool(size, factory) {
  const pool = [];
  for (let i = 0; i < size; i++) { const o = factory(); o.active = false; pool.push(o); }
  pool.get = function() {
    for (let i = 0; i < this.length; i++) { if (!this[i].active) { this[i].active = true; return this[i]; } }
    const o = factory(); o.active = true; this.push(o); return o;
  };
  return pool;
}

const particles = createPool(MAX_PARTICLES, () => ({x:0,y:0,vx:0,vy:0,life:0,maxLife:1,r:0,g:0,b:0,size:2,active:false}));
const bullets = createPool(MAX_BULLETS, () => ({x:0,y:0,vx:0,vy:0,active:false,isLaser:false}));
const enemyBullets = createPool(MAX_ENEMY_BULLETS, () => ({x:0,y:0,vx:0,vy:0,active:false}));
const scorePopups = createPool(POOL_SCORE_POPUPS, () => ({x:0,y:0,text:'',life:0,vx:0,active:false,r:255,g:215,b:0}));

let enemies = [];
let powerups = [];
let boss = null;

// Debris pool (cosmetic falling particles)
const debris = createPool(200, () => ({x:0,y:0,vx:0,vy:0,rot:0,rotSpeed:0,life:0,maxLife:1,r:0,g:0,b:0,size:3,shape:0,active:false}));

// Boss death sequence state
let bossDeathSequence = null; // {timer, subExplosions, finalDone, slowTimer}
let gameSpeedMul = 1; // for slowdown effect

// ===== PLAYER =====
const player = {
  x: 0, y: 0, targetX: 0, targetY: 0,
  fireTimer: 0, size: 18,
  shield: false, rapidFire: 0, tripleShot: 0,
  missile: 0, speedBoost: 0, laser: 0, laserActive: false,
  prevX: 0, prevY: 0, tilt: 0
};

// ===== POWERUP DEFS =====
const PU_TYPES = [
  {name:'RAPID FIRE', color:'#ff0',dur:8,icon:'R'},
  {name:'TRIPLE SHOT',color:'#0af',dur:8,icon:'T'},
  {name:'SHIELD',     color:'#0f0',dur:0,icon:'S'},
  {name:'MISSILE',    color:'#f44',dur:0,icon:'M'},
  {name:'SCORE BOOST',color:'#ffd700',dur:10,icon:'★'},
  {name:'SPEED BOOST',color:'#fff',dur:6,icon:'»'},
  {name:'LASER',      color:'#a0f',dur:5,icon:'L'}
];

let activePowerup = null; // {name, color, timer, maxTimer, icon}

// ===== STARS =====
const starLayers = [[], [], []];
let shootingStars = [];
function initStars() {
  for (let l = 0; l < 3; l++) {
    starLayers[l] = [];
    const count = [180, 100, 50][l];
    for (let i = 0; i < count; i++) {
      starLayers[l].push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: [0.6, 1.3, 2.2][l],
        speed: [12, 30, 65][l],
        brightness: 0.3 + Math.random() * 0.7,
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpeed: 1.5 + Math.random() * 3,
        baseAlpha: 0.3 + Math.random() * 0.5,
        color: l === 2 && Math.random() < 0.3 ? (Math.random() < 0.5 ? '#aaf' : '#ffa') : '#fff'
      });
    }
  }
  shootingStars = [];
}
initStars();

// Nebulae
let nebulae = [];
function initNebulae() {
  nebulae = [];
  const nebColors = [
    {r:60,g:0,b:120},{r:0,g:30,b:100},{r:100,g:0,b:70},
    {r:20,g:10,b:80},{r:80,g:0,b:100},{r:10,g:30,b:90},{r:50,g:0,b:60}
  ];
  for (let i = 0; i < 7; i++) {
    const c = nebColors[i];
    nebulae.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 100 + Math.random() * 200,
      cr: c.r, cg: c.g, cb: c.b,
      alpha: 0.04 + Math.random() * 0.03,
      speed: 3 + Math.random() * 8,
      drift: (Math.random() - 0.5) * 6,
      pulsePhase: Math.random() * Math.PI * 2
    });
  }
}
initNebulae();

// ===== AUDIO =====
let audioCtx = null;
function ensureAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') {
    try { audioCtx.resume(); } catch(e) {}
  }
}

function playSound(type) {
  if (muted || !audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    if (type === 'pew') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.06);
    } else if (type === 'explode') {
      const bufSize = audioCtx.sampleRate * 0.1;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      const osc = audioCtx.createOscillator();
      osc.type = 'sine'; osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
      const g2 = audioCtx.createGain();
      g2.gain.setValueAtTime(0.15, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      src.connect(gain).connect(audioCtx.destination);
      osc.connect(g2).connect(audioCtx.destination);
      src.start(now); osc.start(now); osc.stop(now + 0.12);
    } else if (type === 'boss_explode') {
      for (let i = 0; i < 4; i++) {
        const t = now + i * 0.12;
        const bufSize = audioCtx.sampleRate * 0.2;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let j = 0; j < bufSize; j++) d[j] = (Math.random() * 2 - 1) * (1 - j / bufSize);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        src.connect(gain).connect(audioCtx.destination);
        src.start(t);
        const osc = audioCtx.createOscillator();
        osc.type = 'sine'; osc.frequency.setValueAtTime(80 - i * 10, t);
        osc.frequency.exponentialRampToValueAtTime(20, t + 0.2);
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime(0.2, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.connect(g2).connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.25);
      }
    } else if (type === 'powerup') {
      const notes = [523, 659, 784];
      notes.forEach((f, i) => {
        const t = now + i * 0.06;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = f;
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.13);
      });
    } else if (type === 'hit') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = 80;
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.16);
      const bufSize = audioCtx.sampleRate * 0.08;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const g2 = audioCtx.createGain();
      g2.gain.setValueAtTime(0.15, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      src.connect(g2).connect(audioCtx.destination);
      src.start(now);
    } else if (type === 'warning') {
      for (let i = 0; i < 3; i++) {
        const t = now + i * 0.3;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = 100;
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.setValueAtTime(0.15, t + 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.26);
      }
    } else if (type === 'missile_launch') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.26);
    } else if (type === 'laser') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = 300;
      gain.gain.setValueAtTime(0.04, now);
      gain.gain.linearRampToValueAtTime(0.04, now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.07);
    }
  } catch(e) {}
}

// Droning background
let droneOsc = null, droneGain = null;
function startDrone() {
  if (!audioCtx || droneOsc) return;
  try {
    droneOsc = audioCtx.createOscillator();
    droneGain = audioCtx.createGain();
    droneOsc.type = 'sine';
    droneOsc.frequency.value = 55;
    droneGain.gain.value = muted ? 0 : 0.03;
    droneOsc.connect(droneGain).connect(audioCtx.destination);
    droneOsc.start();
  } catch(e) {}
}
function updateDrone() {
  if (!droneGain) return;
  droneGain.gain.value = muted ? 0 : Math.min(0.03 + wave * 0.003, 0.08);
  if (droneOsc) droneOsc.frequency.value = 55 + wave * 2;
}
function stopDrone() {
  if (droneOsc) { try { droneOsc.stop(); } catch(e) {} droneOsc = null; droneGain = null; }
}

// ===== HIGH SCORES =====
function loadHS() {
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch(e) { return []; }
}
function saveHS(list) {
  try { localStorage.setItem(HS_KEY, JSON.stringify(list)); } catch(e) {}
}
function getHighScore() {
  const hs = loadHS();
  return hs.length > 0 ? hs[0].score : 0;
}
function addHS(initials, sc, w) {
  const list = loadHS();
  list.push({initials, score: sc, wave: w});
  list.sort((a, b) => b.score - a.score);
  if (list.length > 10) list.length = 10;
  saveHS(list);
  return list;
}
function isHighScore(sc) {
  const list = loadHS();
  return list.length < 10 || sc > list[list.length - 1].score;
}

// ===== UI ELEMENTS =====
const titleScreen = document.getElementById('titleScreen');
const hsScreen = document.getElementById('hsScreen');
const goScreen = document.getElementById('goScreen');
const pauseScreen = document.getElementById('pauseScreen');
const pauseBtn = document.getElementById('pauseBtn');
const muteBtn = document.getElementById('muteBtn');
const highScoreList = document.getElementById('highScoreList');
const goScoreEl = document.getElementById('goScore');
const goWaveEl = document.getElementById('goWave');
const goNewHS = document.getElementById('goNewHS');
const initialsSection = document.getElementById('initialsSection');
const initialsEntry = document.getElementById('initialsEntry');
const goSubmitBtn = document.getElementById('goSubmitBtn');
const goRestartBtn = document.getElementById('goRestartBtn');

function showScreen(id) {
  [titleScreen, hsScreen, goScreen, pauseScreen].forEach(s => s.classList.add('hidden'));
  if (id) document.getElementById(id).classList.remove('hidden');
}

function showHUD(show) {
  pauseBtn.classList.toggle('hidden', !show);
  muteBtn.classList.toggle('hidden', !show);
}

function renderHSList(highlightScore) {
  const list = loadHS();
  highScoreList.innerHTML = '';
  list.forEach((entry, i) => {
    const li = document.createElement('li');
    li.textContent = `${String(i + 1).padStart(2, ' ')}. ${entry.initials}  ${String(entry.score).padStart(8, ' ')}  W${entry.wave}`;
    if (highlightScore !== undefined && entry.score === highlightScore && !li.classList.contains('gold')) {
      li.classList.add('gold');
      highlightScore = undefined; // only highlight first match
    }
    highScoreList.appendChild(li);
  });
  if (list.length === 0) {
    const li = document.createElement('li');
    li.textContent = 'No scores yet';
    li.style.color = 'rgba(255,255,255,0.4)';
    highScoreList.appendChild(li);
  }
}

// Initials entry
let initials = [0, 0, 0]; // A=0 ... Z=25
let initialsBuilt = false;
function buildInitialsUI() {
  initialsEntry.innerHTML = '';
  initials = [0, 0, 0];
  for (let i = 0; i < 3; i++) {
    const col = document.createElement('div');
    col.className = 'initial-col';
    const up = document.createElement('button');
    up.className = 'arr';
    up.textContent = '▲';
    const letter = document.createElement('div');
    letter.className = 'letter';
    letter.id = 'init_' + i;
    letter.textContent = 'A';
    const down = document.createElement('button');
    down.className = 'arr';
    down.textContent = '▼';
    const idx = i;
    function handler(dir) {
      return function(e) {
        e.stopPropagation();
        e.preventDefault();
        initials[idx] = (initials[idx] + dir + 26) % 26;
        letter.textContent = String.fromCharCode(65 + initials[idx]);
      };
    }
    up.addEventListener('click', handler(1));
    up.addEventListener('touchend', handler(1));
    down.addEventListener('click', handler(-1));
    down.addEventListener('touchend', handler(-1));
    col.appendChild(up);
    col.appendChild(letter);
    col.appendChild(down);
    initialsEntry.appendChild(col);
  }
  initialsBuilt = true;
}

}

// ===== INPUT =====
function getInputPos(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}
function shouldPreventDefault(e) {
  if (e.target && (e.target.closest('button') || e.target.closest('.overlay'))) return false;
  return true;
}

document.addEventListener('touchstart', e => {
  if (shouldPreventDefault(e)) e.preventDefault();
  if (state !== 'playing') return;
  ensureAudio(); resumeAudio();
  const pos = getInputPos(e);
  inputX = pos.x; inputY = pos.y;
  inputActive = true;
}, { passive: false });
document.addEventListener('touchmove', e => {
  if (shouldPreventDefault(e)) e.preventDefault();
  if (state !== 'playing') return;
  const pos = getInputPos(e);
  inputX = pos.x; inputY = pos.y;
  inputActive = true;
}, { passive: false });
document.addEventListener('touchend', e => {
  if (shouldPreventDefault(e)) e.preventDefault();
  if (e.touches.length === 0) inputActive = false;
}, { passive: false });

document.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  inputX = e.clientX; inputY = e.clientY;
  inputActive = true;
});
document.addEventListener('mousedown', e => {
  if (state !== 'playing') return;
  ensureAudio(); resumeAudio();
  inputX = e.clientX; inputY = e.clientY;
  inputActive = true;
});

// ===== GAME INIT =====
function startGame() {
  showScreen(null);
  showHUD(true);
  state = 'playing';
  score = 0; lives = 3; wave = 0;
  comboCount = 0; comboTimer = 0; comboMultiplier = 1;
  waveTimer = 0; waveEnemiesSpawned = 0; waveEnemyCount = 0; wavePause = 0;
  bossActive = false; bossWarning = 0; boss = null; bossDeathSequence = null; gameSpeedMul = 1;
  invincibleTimer = 0; shakeTimer = 0; shakeIntensity = 0;
  scoreBoostTimer = 0;
  player.x = W / 2; player.y = H * 0.75;
  player.targetX = player.x; player.targetY = player.y;
  player.prevX = player.x; player.prevY = player.y;
  player.fireTimer = 0; player.tilt = 0;
  player.shield = false; player.rapidFire = 0; player.tripleShot = 0;
  player.missile = 0; player.speedBoost = 0; player.laser = 0; player.laserActive = false;
  activePowerup = null;
  enemies = []; powerups = [];
  for (let i = 0; i < particles.length; i++) particles[i].active = false;
  for (let i = 0; i < bullets.length; i++) bullets[i].active = false;
  for (let i = 0; i < enemyBullets.length; i++) enemyBullets[i].active = false;
  for (let i = 0; i < scorePopups.length; i++) scorePopups[i].active = false;
  for (let i = 0; i < debris.length; i++) debris[i].active = false;
  inputActive = false;
  highScore = getHighScore();
  initStars();
  initNebulae();
  startDrone();
  nextWave();
}

// ===== WAVES =====
function nextWave() {
  wave++;
  waveEnemiesSpawned = 0;
  waveTimer = 0;
  updateDrone();

  if (wave % 5 === 0) {
    // Boss wave
    bossWarning = 2.0;
    playSound('warning');
    waveEnemyCount = 0;
    return;
  }

  // Calculate enemy count — scaled by difficulty
  const ds = getDiff();
  const base = ds.enemyBase + (wave - 1) * ds.enemyPerWave;
  waveEnemyCount = Math.min(base, 50);
  wavePause = 2.0; // pause before wave starts
}

function spawnBoss() {
  const hpBase = 50 + wave * 15;
  boss = {
    x: W / 2, y: -80, targetY: 80,
    hp: hpBase, maxHp: hpBase,
    size: 50, phase: 0,
    fireTimer: 0, patternTimer: 0, pattern: 0,
    entered: false, dying: false, deathTimer: 0,
    flashTimer: 0
  };
  bossActive = true;
}

function spawnEnemy() {
  const tankWave = getDiff().tankWave;
  let type;
  if (wave < 4) type = 'drifter';
  else if (wave < 7) type = Math.random() < 0.6 ? 'drifter' : 'zigzagger';
  else if (wave < tankWave) {
    const r = Math.random();
    type = r < 0.3 ? 'drifter' : r < 0.6 ? 'zigzagger' : 'swarmer';
  } else {
    const r = Math.random();
    type = r < 0.25 ? 'drifter' : r < 0.5 ? 'zigzagger' : r < 0.85 ? 'swarmer' : 'tank';
  }

  if (type === 'swarmer') {
    // spawn formation
    const count = 5 + Math.floor(Math.random() * 4);
    const cx = 40 + Math.random() * (W - 80);
    for (let i = 0; i < count && waveEnemiesSpawned < waveEnemyCount; i++) {
      const angle = (i / count) * Math.PI * 2;
      enemies.push(makeEnemy('swarmer', cx + Math.cos(angle) * 25, -30 + Math.sin(angle) * 15));
      waveEnemiesSpawned++;
    }
  } else {
    enemies.push(makeEnemy(type, 30 + Math.random() * (W - 60), -30));
    waveEnemiesSpawned++;
  }
}

function makeEnemy(type, x, y) {
  const speedMul = getDiff().speedMul * (1 + Math.min(wave, 25) * 0.03);
  const e = { type, x, y, hp: 1, maxHp: 1, size: 16, speed: 60, sinAmp: 0, sinFreq: 0, sinOffset: 0, startX: x, fireTimer: 0, flashTimer: 0 };
  if (type === 'drifter') {
    e.hp = 1; e.maxHp = 1; e.size = 16; e.speed = (55 + Math.random() * 35) * speedMul;
    e.r = 255; e.g = 100; e.b = 0;
  } else if (type === 'zigzagger') {
    e.hp = 2; e.maxHp = 2; e.size = 14; e.speed = (65 + Math.random() * 35) * speedMul;
    e.sinAmp = 40 + Math.random() * 40; e.sinFreq = 2 + Math.random(); e.sinOffset = Math.random() * Math.PI * 2;
    e.r = 200; e.g = 0; e.b = 255;
  } else if (type === 'swarmer') {
    e.hp = 1; e.maxHp = 1; e.size = 10; e.speed = (100 + Math.random() * 50) * speedMul;
    e.r = 0; e.g = 255; e.b = 80;
  } else if (type === 'tank') {
    e.hp = 5 + Math.floor(wave / 5); e.maxHp = e.hp; e.size = 28; e.speed = (30 + Math.random() * 18) * speedMul;
    e.fireTimer = 1.5 + Math.random() * 2.5;
    e.r = 200; e.g = 30; e.b = 30;
  }
  return e;
}

// ===== SPAWNING HELPERS =====
function spawnParticle(x, y, vx, vy, r, g, b, life, size) {
  const p = particles.get();
  p.x = x; p.y = y; p.vx = vx; p.vy = vy;
  p.r = r; p.g = g; p.b = b;
  p.life = life; p.maxLife = life; p.size = size || 2;
  return p;
}

function spawnBullet(x, y, vx, vy) {
  const b = bullets.get();
  b.x = x; b.y = y; b.vx = vx; b.vy = vy; b.isLaser = false;
  return b;
}

function spawnEnemyBullet(x, y, vx, vy) {
  const b = enemyBullets.get();
  b.x = x; b.y = y; b.vx = vx; b.vy = vy;
  return b;
}

function spawnScorePopup(x, y, text, r, g, b) {
  const p = scorePopups.get();
  p.x = x; p.y = y; p.text = text; p.life = 1.0; p.vx = (Math.random() - 0.5) * 30;
  p.r = r || 255; p.g = g || 215; p.b = b || 0;
}

function spawnDebris(x, y, count, r, g, b) {
  for (let i = 0; i < count; i++) {
    const d = debris.get();
    d.x = x + (Math.random() - 0.5) * 20;
    d.y = y + (Math.random() - 0.5) * 10;
    d.vx = (Math.random() - 0.5) * 60;
    d.vy = 30 + Math.random() * 80; // falls downward
    d.rot = Math.random() * Math.PI * 2;
    d.rotSpeed = (Math.random() - 0.5) * 8;
    d.life = 2.0 + Math.random() * 1.5;
    d.maxLife = d.life;
    // Color variation from enemy type
    d.r = Math.max(0, Math.min(255, r + Math.floor((Math.random() - 0.5) * 60)));
    d.g = Math.max(0, Math.min(255, g + Math.floor((Math.random() - 0.5) * 40)));
    d.b = Math.max(0, Math.min(255, b + Math.floor((Math.random() - 0.5) * 40)));
    d.size = 1.5 + Math.random() * 3;
    d.shape = Math.floor(Math.random() * 3); // 0=rect, 1=triangle, 2=line
  }
}

function spawnExplosion(x, y, count, r, g, b, speedMul) {
  speedMul = speedMul || 1;
  const boostedCount = Math.floor(count * 1.8);
  for (let i = 0; i < boostedCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (40 + Math.random() * 160) * speedMul;
    const t = i / boostedCount;
    let pr, pg, pb;
    if (t < 0.2) { pr = 255; pg = 255; pb = 255; }
    else if (t < 0.5) { pr = Math.min(255, r + 60); pg = Math.min(255, g + 40); pb = b; }
    else if (t < 0.8) { pr = r; pg = g; pb = b; }
    else { pr = Math.floor(r * 0.6); pg = Math.floor(g * 0.4); pb = Math.floor(b * 0.3); }
    // 2-3x longer particle life
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, pr, pg, pb,
      0.8 + Math.random() * 1.4, 2 + Math.random() * 6);
  }
  // Bright flash at center
  for (let i = 0; i < 5; i++) {
    spawnParticle(x + (Math.random()-0.5)*4, y + (Math.random()-0.5)*4, 0, 0, 255, 255, 255, 0.15 + Math.random() * 0.15, 10 + Math.random() * 15);
  }
  // Spawn debris rain (5-10 pieces)
  const debrisCount = 5 + Math.floor(Math.random() * 6);
  spawnDebris(x, y, debrisCount, r, g, b);
  // Screen flash for bigger explosions
  if (count >= 15) {
    screenFlashAlpha = Math.min(0.25, count * 0.008);
  }
}

function spawnPowerupRing(x, y, r, g, b) {
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2;
    const spd = 120;
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, r, g, b, 0.5, 3);
  }
}

function fireHomingMissile() {

    x: player.x, y: player.y - player.size,
    vx: 0, vy: -200, speed: 350, life: 4, target: null, size: 6
