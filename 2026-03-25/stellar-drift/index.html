<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STELLAR DRIFT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;overflow:hidden;overscroll-behavior:none;width:100%;height:100%;background:#000;touch-action:none}
canvas{display:block;touch-action:none}
button{touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:auto}
.overlay.hidden{display:none;pointer-events:none}
.overlay-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7)}
.overlay-content{position:relative;z-index:1;text-align:center;color:#fff;font-family:'Segoe UI',system-ui,sans-serif}
.game-title{font-size:clamp(2rem,8vw,4.5rem);font-weight:900;letter-spacing:0.15em;background:linear-gradient(180deg,#fff 0%,#0ff 40%,#06f 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;filter:drop-shadow(0 0 20px rgba(0,255,255,0.5));margin-bottom:0.2em}
.game-subtitle{font-size:clamp(0.7rem,2.5vw,1.1rem);color:rgba(0,255,255,0.6);letter-spacing:0.4em;text-transform:uppercase;margin-bottom:2em}
.btn{background:none;border:2px solid rgba(0,255,255,0.5);color:#0ff;font-size:clamp(0.9rem,3vw,1.2rem);padding:0.7em 2em;margin:0.4em;border-radius:8px;font-family:inherit;letter-spacing:0.1em;transition:all 0.2s;min-width:180px;min-height:48px}
.btn:hover,.btn:active{background:rgba(0,255,255,0.15);border-color:#0ff;box-shadow:0 0 20px rgba(0,255,255,0.3)}
.btn-start{font-size:clamp(1.1rem,3.5vw,1.5rem);border-color:#0ff;animation:pulse-btn 2s infinite}
@keyframes pulse-btn{0%,100%{box-shadow:0 0 10px rgba(0,255,255,0.2)}50%{box-shadow:0 0 30px rgba(0,255,255,0.5)}}
.diff-row{display:flex;gap:0.5em;margin-bottom:1.2em;justify-content:center}
.diff-btn{background:none;border:2px solid rgba(0,255,255,0.3);color:rgba(0,255,255,0.5);font-size:clamp(0.7rem,2.2vw,0.95rem);padding:0.5em 1.2em;border-radius:8px;font-family:inherit;letter-spacing:0.12em;font-weight:700;transition:all 0.2s;min-height:44px;min-width:70px;touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.diff-btn.selected{border-color:#0ff;color:#fff;background:rgba(0,255,255,0.15);box-shadow:0 0 16px rgba(0,255,255,0.35)}
.diff-btn.diff-hard.selected{border-color:#f44;color:#fff;background:rgba(255,68,68,0.15);box-shadow:0 0 16px rgba(255,68,68,0.35)}
.diff-btn.diff-normal.selected{border-color:#ffd700;color:#fff;background:rgba(255,215,0,0.12);box-shadow:0 0 16px rgba(255,215,0,0.3)}
.hud-btn{position:absolute;z-index:20;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:1.3rem;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0}
#pauseBtn{top:10px;left:10px}
#muteBtn{top:10px;right:10px}
.hud-btn.hidden{display:none}
#highScoreList{list-style:none;padding:0;margin:1em 0;max-height:50vh;overflow-y:auto}
#highScoreList li{font-size:clamp(0.8rem,2.5vw,1rem);padding:0.3em 0.8em;color:#aef;font-family:monospace;letter-spacing:0.05em}
#highScoreList li.gold{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,0.5)}
.initials-entry{display:flex;align-items:center;justify-content:center;gap:0.5em;margin:1em 0}
.initial-col{display:flex;flex-direction:column;align-items:center;gap:0.2em}
.initial-col .arr{background:none;border:1px solid rgba(0,255,255,0.4);color:#0ff;width:40px;height:36px;font-size:1.2rem;border-radius:6px;display:flex;align-items:center;justify-content:center}
.initial-col .letter{font-size:2rem;color:#fff;font-family:monospace;width:40px;text-align:center}
.go-score{font-size:clamp(1.5rem,5vw,2.5rem);color:#ffd700;margin:0.3em 0}
.go-wave{font-size:clamp(0.8rem,2.5vw,1rem);color:rgba(255,255,255,0.6);margin-bottom:0.5em}
.go-hs{font-size:clamp(0.9rem,2.5vw,1.1rem);color:#0f0;margin:0.3em 0}
.enemy-card{display:flex;flex-direction:column;align-items:center;gap:4px}
.enemy-card canvas{border-radius:8px;background:rgba(0,20,40,0.7);border:1px solid rgba(0,200,255,0.2);box-shadow:0 0 10px rgba(0,150,255,0.15)}
.enemy-card .enemy-label{font-size:clamp(7px,1.5vw,10px);color:rgba(0,200,255,0.7);letter-spacing:0.1em;font-family:monospace;text-transform:uppercase;text-align:center}
.game-title{animation:titleShimmer 3s linear infinite!important}
@keyframes titleShimmer{0%{filter:drop-shadow(0 0 20px rgba(0,255,255,0.5)) brightness(1)}50%{filter:drop-shadow(0 0 30px rgba(0,255,255,0.8)) brightness(1.15)}100%{filter:drop-shadow(0 0 20px rgba(0,255,255,0.5)) brightness(1)}}
.title-glow-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:clamp(220px,60vw,480px);height:clamp(60px,12vw,100px);border-radius:50%;background:radial-gradient(ellipse,rgba(0,255,255,0.12) 0%,transparent 70%);animation:glowRingPulse 2.5s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes glowRingPulse{0%,100%{opacity:0.6;transform:translate(-50%,-60%) scale(1)}50%{opacity:1;transform:translate(-50%,-60%) scale(1.08)}}
.title-separator{width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,255,0.5),transparent);margin:0 auto 1em auto}
#hsBtn{font-size:clamp(0.75rem,2.5vw,1rem);opacity:0.7}
</style>
</head>
<body>
<canvas id="c"></canvas>

<button id="pauseBtn" class="hud-btn hidden" aria-label="Pause">❚❚</button>
<button id="muteBtn" class="hud-btn hidden" aria-label="Mute">🔊</button>

<!-- Title Screen -->
<div id="titleScreen" class="overlay">
<div class="overlay-bg"></div>
<canvas id="titleCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0"></canvas>
<div class="overlay-content" style="z-index:1;width:100%;max-width:500px;padding:0 16px;position:relative">
  <div class="title-glow-ring"></div>
  <div class="game-title" style="margin-bottom:0">STELLAR DRIFT</div>
  <div class="game-subtitle" style="margin-bottom:1.2em">ONE-FINGER SPACE SHOOTER</div>
  <div id="enemyShowcase" style="display:flex;justify-content:center;gap:clamp(8px,3vw,20px);margin-bottom:1.4em;align-items:flex-end"></div>
  <div class="title-separator"></div>
  <div class="diff-row" style="margin-bottom:1em">
    <button class="diff-btn diff-easy selected" id="diffEasy">EASY</button>
    <button class="diff-btn diff-normal" id="diffNormal">NORMAL</button>
    <button class="diff-btn diff-hard" id="diffHard">HARD</button>
  </div>
  <button class="btn btn-start" id="startBtn">TAP TO START</button>
  <button class="btn" id="hsBtn" style="margin-top:0.4em">HIGH SCORES</button>
</div>
</div>

<!-- High Scores Screen -->
<div id="hsScreen" class="overlay hidden">
<div class="overlay-bg"></div>
<div class="overlay-content">
<div style="font-size:clamp(1.2rem,4vw,2rem);color:#ffd700;margin-bottom:0.5em;letter-spacing:0.1em">HIGH SCORES</div>
<ol id="highScoreList"></ol>
<button class="btn" id="hsBackBtn">BACK</button>
</div>
</div>

<!-- Game Over Screen -->
<div id="goScreen" class="overlay hidden">
<div class="overlay-bg"></div>
<div class="overlay-content">
<div style="font-size:clamp(1.5rem,5vw,2.5rem);color:#f44;letter-spacing:0.15em;margin-bottom:0.2em">GAME OVER</div>
<div class="go-score" id="goScore">0</div>
<div class="go-wave" id="goWave">Wave 1</div>
<div class="go-hs hidden" id="goNewHS">NEW HIGH SCORE!</div>
<div id="initialsSection" class="hidden">
<div style="color:rgba(255,255,255,0.6);font-size:0.9rem;margin-bottom:0.3em">ENTER INITIALS</div>
<div class="initials-entry" id="initialsEntry"></div>
</div>
<button class="btn" id="goSubmitBtn">SUBMIT</button>
<button class="btn" id="goRestartBtn" style="display:none">PLAY AGAIN</button>
<button class="btn" id="goHsBtn">HIGH SCORES</button>
<button class="btn" id="goMenuBtn">MENU</button>
</div>
</div>

<!-- Upgrade Screen -->
<div id="upgradeScreen" class="overlay hidden">
<div class="overlay-bg"></div>
<div class="overlay-content">
<div style="font-size:clamp(1.2rem,4vw,2rem);color:#f90;letter-spacing:0.15em;margin-bottom:0.3em;font-family:monospace">▣ SYSTEM UPGRADE ▣</div>
<div style="color:rgba(255,160,0,0.6);font-size:0.8rem;margin-bottom:1.2em">SELECT ONE ENHANCEMENT</div>
<div id="upgradeOptions" style="display:flex;flex-direction:column;gap:0.6em;align-items:center"></div>
</div>
</div>

<!-- Stats Screen -->
<div id="statsScreen" class="overlay hidden">
<div class="overlay-bg"></div>
<div class="overlay-content">
<div style="font-size:clamp(1.2rem,4vw,2rem);color:#f90;letter-spacing:0.15em;margin-bottom:0.5em;font-family:monospace">▣ MISSION DEBRIEF ▣</div>
<div id="statsBody" style="font-family:monospace;font-size:clamp(0.8rem,2.5vw,1rem);color:#ffa040;text-align:left;margin:0 auto;max-width:300px;line-height:2"></div>
<button class="btn" id="statsContinueBtn" style="margin-top:1em;border-color:#f90;color:#f90">CONTINUE</button>
</div>
</div>

<!-- Pause Screen -->
<div id="pauseScreen" class="overlay hidden">
<div class="overlay-bg"></div>
<div class="overlay-content">
<div style="font-size:clamp(1.5rem,5vw,2.5rem);color:#0ff;letter-spacing:0.15em;margin-bottom:0.5em">PAUSED</div>
<button class="btn" id="resumeBtn">RESUME</button>
<button class="btn" id="pauseQuitBtn">QUIT</button>
</div>
</div>

<script>
'use strict';
// ===== CANVAS SETUP =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

// ===== CONSTANTS =====
const LERP = 0.15;
const BASE_FIRE_RATE = 1 / 4; // seconds between shots per stream
const BULLET_SPEED = 600;
const PLAYER_SPEED = 1.0;
const POWERUP_CHANCE = 0.15;
const COMBO_WINDOW = 1.0;
const MAX_PARTICLES = 6000;
const MAX_BULLETS = 300;
const MAX_ENEMY_BULLETS = 200;
const POOL_SCORE_POPUPS = 60;
const HS_KEY = 'stellar_drift_highscores';
const DIFF_KEY = 'stellar_drift_difficulty';

// ===== DIFFICULTY =====
let difficulty = 'easy';
try { const saved = localStorage.getItem(DIFF_KEY); if (saved === 'easy' || saved === 'normal' || saved === 'hard') difficulty = saved; } catch(e) {}

const DIFF_SETTINGS = {
  easy:   { speedMul: 1.8, enemyBase: 30, enemyPerWave: 8,  spawnMul: 0.5, tankWave: 7,  fireMul: 0.72 },
  normal: { speedMul: 2.2, enemyBase: 45, enemyPerWave: 12, spawnMul: 0.35, tankWave: 5, fireMul: 0.6 },
  hard:   { speedMul: 2.8, enemyBase: 65, enemyPerWave: 18, spawnMul: 0.2, tankWave: 4,  fireMul: 0.45 }
};

function getDiff() { return DIFF_SETTINGS[difficulty]; }

// ===== STATE =====
let state = 'title'; // title, playing, paused, gameover, highscores
let score = 0, lives = 3, wave = 0, highScore = 0;
let comboCount = 0, comboTimer = 0, comboMultiplier = 1;
let waveTimer = 0, waveEnemiesSpawned = 0, waveEnemyCount = 0, wavePause = 0;
let bossActive = false, bossWarning = 0;
let invincibleTimer = 0;
let shakeTimer = 0, shakeIntensity = 0;
let scoreBoostTimer = 0;
let screenFlashAlpha = 0; // for explosion screen flash
let dt = 0, lastTime = 0;
let inputX = 0, inputY = 0, inputActive = false;
let muted = false;

// === NEW SYSTEMS ===
let totalKills = 0;
let playerUpgrades = { fireRate: 0, spread: 0, shieldRegen: 0, bulletSpeed: 0, tripleShot: false, extraLives: 0 };
let upgradeActive = false;
let bossIntro = null; // {timer, name}
let waveClearText = null; // {timer, wave}
let phaseFlashTimer = 0;
let phaseFloatText = null; // {text, timer, x, y}
let droneOsc2 = null, droneGain2 = null; // dissonant boss oscillator
let asteroids = [];
let stats = { shotsFired:0, shotsHit:0, enemiesKilled:0, bossesKilled:0, timeSurvived:0, maxCombo:0, wavesCleared:0 };
let showingStats = false;
const BOSS_NAMES = ['DREADNOUGHT','PHANTOM','TITAN','VIPER','OMEGA'];

// ===== OBJECT POOLS =====
function createPool(size, factory) {
  const pool = [];
  for (let i = 0; i < size; i++) { const o = factory(); o.active = false; pool.push(o); }
  pool.get = function() {
    for (let i = 0; i < this.length; i++) { if (!this[i].active) { this[i].active = true; return this[i]; } }
    const o = factory(); o.active = true; this.push(o); return o;
  };
  return pool;
}

const particles = createPool(MAX_PARTICLES, () => ({x:0,y:0,vx:0,vy:0,life:0,maxLife:1,r:0,g:0,b:0,size:2,active:false}));
const bullets = createPool(MAX_BULLETS, () => ({x:0,y:0,vx:0,vy:0,active:false,isLaser:false}));
const enemyBullets = createPool(MAX_ENEMY_BULLETS, () => ({x:0,y:0,vx:0,vy:0,active:false}));
const scorePopups = createPool(POOL_SCORE_POPUPS, () => ({x:0,y:0,text:'',life:0,vx:0,active:false,r:255,g:215,b:0}));

let enemies = [];
let powerups = [];
let boss = null;

// Debris pool (cosmetic falling particles)
const debris = createPool(200, () => ({x:0,y:0,vx:0,vy:0,rot:0,rotSpeed:0,life:0,maxLife:1,r:0,g:0,b:0,size:3,shape:0,active:false}));

// Boss death sequence state
let bossDeathSequence = null; // {timer, subExplosions, finalDone, slowTimer}
let gameSpeedMul = 1; // for slowdown effect

// ===== PLAYER =====
const player = {
  x: 0, y: 0, targetX: 0, targetY: 0,
  fireTimer: 0, size: 18,
  shield: false, rapidFire: 0, tripleShot: 0,
  missile: 0, speedBoost: 0, laser: 0, laserActive: false,
  prevX: 0, prevY: 0, tilt: 0
};

// ===== POWERUP DEFS =====
const PU_TYPES = [
  {name:'RAPID FIRE', color:'#ff0',dur:8,icon:'R'},
  {name:'TRIPLE SHOT',color:'#0af',dur:8,icon:'T'},
  {name:'SHIELD',     color:'#0f0',dur:0,icon:'S'},
  {name:'MISSILE',    color:'#f44',dur:0,icon:'M'},
  {name:'SCORE BOOST',color:'#ffd700',dur:10,icon:'★'},
  {name:'SPEED BOOST',color:'#fff',dur:6,icon:'»'},
  {name:'LASER',      color:'#a0f',dur:5,icon:'L'}
];

let activePowerup = null; // {name, color, timer, maxTimer, icon}

// ===== STARS =====
const starLayers = [[], [], []];
let shootingStars = [];
function initStars() {
  for (let l = 0; l < 3; l++) {
    starLayers[l] = [];
    const count = [180, 100, 50][l];
    for (let i = 0; i < count; i++) {
      starLayers[l].push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: [0.6, 1.3, 2.2][l],
        speed: [12, 30, 65][l],
        brightness: 0.3 + Math.random() * 0.7,
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpeed: 1.5 + Math.random() * 3,
        baseAlpha: 0.3 + Math.random() * 0.5,
        color: l === 2 && Math.random() < 0.3 ? (Math.random() < 0.5 ? '#aaf' : '#ffa') : '#fff'
      });
    }
  }
  shootingStars = [];
}
initStars();

// Nebulae
let nebulae = [];
function initNebulae() {
  nebulae = [];
  const nebColors = [
    {r:60,g:0,b:120},{r:0,g:30,b:100},{r:100,g:0,b:70},
    {r:20,g:10,b:80},{r:80,g:0,b:100},{r:10,g:30,b:90},{r:50,g:0,b:60}
  ];
  for (let i = 0; i < 7; i++) {
    const c = nebColors[i];
    nebulae.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 100 + Math.random() * 200,
      cr: c.r, cg: c.g, cb: c.b,
      alpha: 0.04 + Math.random() * 0.03,
      speed: 3 + Math.random() * 8,
      drift: (Math.random() - 0.5) * 6,
      pulsePhase: Math.random() * Math.PI * 2
    });
  }
}
initNebulae();

// ===== AUDIO =====
let audioCtx = null;
function ensureAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') {
    try { audioCtx.resume(); } catch(e) {}
  }
}

function playSound(type) {
  if (muted || !audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    if (type === 'pew') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.06);
    } else if (type === 'explode') {
      // Layer 1: deep thump (low sine punch)
      const thump = audioCtx.createOscillator();
      const thumpGain = audioCtx.createGain();
      thump.type = 'sine';
      thump.frequency.setValueAtTime(180, now);
      thump.frequency.exponentialRampToValueAtTime(28, now + 0.35);
      thumpGain.gain.setValueAtTime(0.0, now);
      thumpGain.gain.linearRampToValueAtTime(0.45, now + 0.01);
      thumpGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      thump.connect(thumpGain).connect(audioCtx.destination);
      thump.start(now); thump.stop(now + 0.36);

      // Layer 2: mid crunch (filtered noise burst)
      const dur = 0.4;
      const bufSize = audioCtx.sampleRate * dur;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) {
        const env = Math.pow(1 - i / bufSize, 1.5);
        d[i] = (Math.random() * 2 - 1) * env;
      }
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const hpf = audioCtx.createBiquadFilter();
      hpf.type = 'bandpass'; hpf.frequency.value = 600; hpf.Q.value = 0.6;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.18, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      src.connect(hpf).connect(noiseGain).connect(audioCtx.destination);
      src.start(now);

      // Layer 3: sharp crack (short highpass noise)
      const crackBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
      const cd = crackBuf.getChannelData(0);
      for (let i = 0; i < cd.length; i++) cd[i] = (Math.random() * 2 - 1) * (1 - i / cd.length);
      const crackSrc = audioCtx.createBufferSource();
      crackSrc.buffer = crackBuf;
      const hpf2 = audioCtx.createBiquadFilter();
      hpf2.type = 'highpass'; hpf2.frequency.value = 3000;
      const crackGain = audioCtx.createGain();
      crackGain.gain.setValueAtTime(0.22, now);
      crackGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      crackSrc.connect(hpf2).connect(crackGain).connect(audioCtx.destination);
      crackSrc.start(now);
    } else if (type === 'boss_explode') {
      // Cinematic boss death — deep rolling booms, varied pitches, no harsh grinding
      const boomTimes = [0, 0.18, 0.38, 0.62, 0.9];
      const boomPitches = [55, 42, 65, 35, 48];
      boomTimes.forEach((delay, i) => {
        const bt = now + delay;
        // Deep lowpass noise boom
        const bLen = audioCtx.sampleRate * (0.5 + i * 0.08);
        const bBuf = audioCtx.createBuffer(1, bLen, audioCtx.sampleRate);
        const bd = bBuf.getChannelData(0);
        for (let j = 0; j < bLen; j++) {
          const env = Math.pow(1 - j / bLen, 1.8 + i * 0.3);
          bd[j] = (Math.random() * 2 - 1) * env;
        }
        const bSrc = audioCtx.createBufferSource(); bSrc.buffer = bBuf;
        const bLpf = audioCtx.createBiquadFilter(); bLpf.type = 'lowpass';
        bLpf.frequency.value = 180 + i * 30;
        const bGain = audioCtx.createGain();
        bGain.gain.setValueAtTime(0.0, bt);
        bGain.gain.linearRampToValueAtTime(0.28 - i * 0.03, bt + 0.015);
        bGain.gain.exponentialRampToValueAtTime(0.001, bt + 0.5 + i * 0.08);
        bSrc.connect(bLpf).connect(bGain).connect(audioCtx.destination);
        bSrc.start(bt);
        // Sub-bass sine thump — varies pitch per hit
        const sOsc = audioCtx.createOscillator();
        sOsc.type = 'sine';
        sOsc.frequency.setValueAtTime(boomPitches[i], bt);
        sOsc.frequency.exponentialRampToValueAtTime(boomPitches[i] * 0.4, bt + 0.35);
        const sGain = audioCtx.createGain();
        sGain.gain.setValueAtTime(0.0, bt);
        sGain.gain.linearRampToValueAtTime(0.22, bt + 0.01);
        sGain.gain.exponentialRampToValueAtTime(0.001, bt + 0.4);
        sOsc.connect(sGain).connect(audioCtx.destination);
        sOsc.start(bt); sOsc.stop(bt + 0.45);
      });
      // Final long tail rumble
      const rLen = audioCtx.sampleRate * 1.8;
      const rBuf = audioCtx.createBuffer(1, rLen, audioCtx.sampleRate);
      const rd = rBuf.getChannelData(0);
      for (let j = 0; j < rLen; j++) rd[j] = (Math.random()*2-1) * Math.pow(1-j/rLen, 0.6);
      const rSrc = audioCtx.createBufferSource(); rSrc.buffer = rBuf;
      const rLpf = audioCtx.createBiquadFilter(); rLpf.type = 'lowpass'; rLpf.frequency.value = 120;
      const rGain = audioCtx.createGain(); rGain.gain.setValueAtTime(0.12, now+0.1); rGain.gain.exponentialRampToValueAtTime(0.001, now+1.9);
      rSrc.connect(rLpf).connect(rGain).connect(audioCtx.destination); rSrc.start(now+0.1);
    } else if (type === 'powerup') {
      const notes = [523, 659, 784];
      notes.forEach((f, i) => {
        const t = now + i * 0.06;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = f;
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.13);
      });
    } else if (type === 'impact') {
      // Thud + hull resonance — shot punching into metal
      // Layer 1: low thud (noise burst, lowpass)
      const tBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.12, audioCtx.sampleRate);
      const td = tBuf.getChannelData(0);
      for (let i = 0; i < td.length; i++) {
        const env = Math.pow(1 - i/td.length, 2.5);
        td[i] = (Math.random()*2-1) * env;
      }
      const tSrc = audioCtx.createBufferSource(); tSrc.buffer = tBuf;
      const tLpf = audioCtx.createBiquadFilter(); tLpf.type = 'lowpass'; tLpf.frequency.value = 400;
      const tGain = audioCtx.createGain(); tGain.gain.setValueAtTime(0.35, now); tGain.gain.exponentialRampToValueAtTime(0.001, now+0.12);
      tSrc.connect(tLpf).connect(tGain).connect(audioCtx.destination); tSrc.start(now);
      // Layer 2: metallic ring (sine, decays fast)
      const rOsc = audioCtx.createOscillator(); rOsc.type = 'sine'; rOsc.frequency.value = 220;
      const rGain = audioCtx.createGain(); rGain.gain.setValueAtTime(0.12, now); rGain.gain.exponentialRampToValueAtTime(0.001, now+0.18);
      rOsc.connect(rGain).connect(audioCtx.destination); rOsc.start(now); rOsc.stop(now+0.2);
      // Layer 3: short mid crunch
      const cBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
      const cd = cBuf.getChannelData(0);
      for (let i = 0; i < cd.length; i++) cd[i] = (Math.random()*2-1) * (1 - i/cd.length);
      const cSrc = audioCtx.createBufferSource(); cSrc.buffer = cBuf;
      const cFilt = audioCtx.createBiquadFilter(); cFilt.type = 'bandpass'; cFilt.frequency.value = 800; cFilt.Q.value = 1.5;
      const cGain = audioCtx.createGain(); cGain.gain.setValueAtTime(0.2, now); cGain.gain.exponentialRampToValueAtTime(0.001, now+0.04);
      cSrc.connect(cFilt).connect(cGain).connect(audioCtx.destination); cSrc.start(now);
    } else if (type === 'hit') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = 80;
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.16);
      const bufSize = audioCtx.sampleRate * 0.08;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const g2 = audioCtx.createGain();
      g2.gain.setValueAtTime(0.15, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      src.connect(g2).connect(audioCtx.destination);
      src.start(now);
    } else if (type === 'warning') {
      // Two sharp descending punches — dramatic, not buzzy
      [0, 0.35].forEach((delay, i) => {
        const t = now + delay;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(i === 0 ? 180 : 140, t);
        o.frequency.exponentialRampToValueAtTime(60, t + 0.18);
        g.gain.setValueAtTime(0.0, t);
        g.gain.linearRampToValueAtTime(0.2, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        o.connect(g).connect(audioCtx.destination);
        o.start(t); o.stop(t + 0.24);
      });
    } else if (type === 'missile_launch') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.26);
    } else if (type === 'laser') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = 300;
      gain.gain.setValueAtTime(0.04, now);
      gain.gain.linearRampToValueAtTime(0.04, now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.07);
    }
  } catch(e) {}
}

// Droning background
let droneOsc = null, droneGain = null;
function startDrone() {
  if (!audioCtx || droneOsc) return;
  try {
    droneOsc = audioCtx.createOscillator();
    droneGain = audioCtx.createGain();
    droneOsc.type = 'sine';
    droneOsc.frequency.value = 55;
    droneGain.gain.value = muted ? 0 : 0.03;
    droneOsc.connect(droneGain).connect(audioCtx.destination);
    droneOsc.start();
  } catch(e) {}
}
function updateDrone() {
  if (!droneGain) return;
  droneGain.gain.value = muted ? 0 : Math.min(0.03 + wave * 0.003, 0.08);
  if (droneOsc) droneOsc.frequency.value = 55 + wave * 2;
}
function stopDrone() {
  if (droneOsc) { try { droneOsc.stop(); } catch(e) {} droneOsc = null; droneGain = null; }
  if (droneOsc2) { try { droneOsc2.stop(); } catch(e) {} droneOsc2 = null; droneGain2 = null; }
}

// ===== HIGH SCORES =====
function loadHS() {
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch(e) { return []; }
}
function saveHS(list) {
  try { localStorage.setItem(HS_KEY, JSON.stringify(list)); } catch(e) {}
}
function getHighScore() {
  const hs = loadHS();
  return hs.length > 0 ? hs[0].score : 0;
}
function addHS(initials, sc, w) {
  const list = loadHS();
  list.push({initials, score: sc, wave: w});
  list.sort((a, b) => b.score - a.score);
  if (list.length > 10) list.length = 10;
  saveHS(list);
  return list;
}
function isHighScore(sc) {
  const list = loadHS();
  return list.length < 10 || sc > list[list.length - 1].score;
}

  opts.innerHTML = '';
  const allUpgrades = [
    {name:'FIRE RATE +20%',      desc:'Shoots 20% faster',          apply:()=>{ playerUpgrades.fireRate++; }},
    {name:'SPREAD SHOT +15°',    desc:'Bullets fan out wider',       apply:()=>{ playerUpgrades.spread++; }},

// ===== INPUT =====
function getInputPos(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}
function shouldPreventDefault(e) {
  if (e.target && (e.target.closest('button') || e.target.closest('.overlay'))) return false;
  return true;
}

document.addEventListener('touchstart', e => {
  if (shouldPreventDefault(e)) e.preventDefault();
  if (state !== 'playing') return;
  ensureAudio(); resumeAudio();
  const pos = getInputPos(e);
  inputX = pos.x; inputY = pos.y;
  inputActive = true;
}, { passive: false });
document.addEventListener('touchmove', e => {
  if (shouldPreventDefault(e)) e.preventDefault();
  if (state !== 'playing') return;
  const pos = getInputPos(e);
  inputX = pos.x; inputY = pos.y;
  inputActive = true;
}, { passive: false });
document.addEventListener('touchend', e => {
  if (shouldPreventDefault(e)) e.preventDefault();
  if (e.touches.length === 0) inputActive = false;
}, { passive: false });

document.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  inputX = e.clientX; inputY = e.clientY;
  inputActive = true;
});
document.addEventListener('mousedown', e => {
  if (state !== 'playing') return;
  ensureAudio(); resumeAudio();
  inputX = e.clientX; inputY = e.clientY;
  inputActive = true;
});

// ===== WAVES =====
function nextWave() {
  if (wave > 0) {
    stats.wavesCleared++;
    // Wave clear fanfare
    waveClearText = { timer: 1.5, wave: wave };
    playWaveFanfare();
  }
  wave++;
  waveEnemiesSpawned = 0;
  waveTimer = 0;
  asteroids = [];
  updateDrone();

  if (wave === 10) {
    // Mini-boss wave
    bossWarning = 2.0;
    playSound('warning');
    waveEnemyCount = 0;
    return;
  }

  if (wave % 5 === 0) {
    // Boss wave
    bossWarning = 2.0;
    playSound('warning');
    waveEnemyCount = 0;
    return;
  }

  // Calculate enemy count — scaled by difficulty
  const ds = getDiff();
  const waveScaled = wave > 16 ? 16 + (wave - 16) * 0.15 : wave - 1;
  const base = ds.enemyBase + waveScaled * ds.enemyPerWave;
  waveEnemyCount = Math.min(Math.floor(base), 120);

  // Asteroid field waves (every 7th)
  if (wave % 7 === 0) {
    waveEnemyCount = Math.floor(waveEnemyCount * 0.3);
    // Spawn asteroids
    const astCount = 20 + Math.floor(Math.random() * 11);
    for (let i = 0; i < astCount; i++) {
      const r = 15 + Math.random() * 25;
      const verts = [];
      for (let v = 0; v < 8; v++) {
        verts.push(0.6 + Math.random() * 0.4);
      }
      asteroids.push({
        x: Math.random() * W, y: -r - Math.random() * 80,
        vx: (Math.random() - 0.5) * 30, vy: 40 + Math.random() * 60,
        r: r, hp: Math.ceil(r / 10), rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 2, verts: verts
      });
    }
  }

  wavePause = 2.0;
}

function spawnBoss() {
  const isMini = (wave === 10);
  const hpBase = isMini ? Math.floor((50 + wave * 15) / 2) : 50 + wave * 15;
  const bossSize = isMini ? 32 : 50;
  const bossNum = isMini ? -1 : Math.floor(wave / 5); // -1 = mini-boss
  const bossName = isMini ? 'DESTROYER' : BOSS_NAMES[(bossNum) % 5];
  boss = {
    x: W / 2, y: -80, targetY: 80,
    hp: hpBase, maxHp: hpBase,
    size: bossSize, phase: 0,
    fireTimer: 0, patternTimer: 0, pattern: 0,
    entered: false, dying: false, deathTimer: 0,
    flashTimer: 0, bossNum: bossNum, damage: 0,
    isMini: isMini, bossName: bossName,
    phase50triggered: false, phase25triggered: false
  };
  bossActive = true;
  // Boss intro cinematic
  bossIntro = { timer: 2.0, name: bossName };
}

function spawnEnemy() {
  const tankWave = getDiff().tankWave;
  let type;
  if (wave < 4) type = 'drifter';
  else if (wave < 7) type = Math.random() < 0.6 ? 'drifter' : 'zigzagger';
  else if (wave < tankWave) {
    const r = Math.random();
    type = r < 0.3 ? 'drifter' : r < 0.6 ? 'zigzagger' : 'swarmer';
  } else {
    const r = Math.random();
    if (wave >= 8 && r < 0.12) type = 'shielder';
    else if (wave >= 5 && r < 0.22) type = 'kamikaze';
    else if (r < 0.4) type = 'drifter';
    else if (r < 0.6) type = 'zigzagger';
    else if (r < 0.85) type = 'swarmer';
    else type = 'tank';
  }

  if (type === 'swarmer') {
    // spawn formation
    const count = 5 + Math.floor(Math.random() * 4);
    const cx = 40 + Math.random() * (W - 80);
    for (let i = 0; i < count && waveEnemiesSpawned < waveEnemyCount; i++) {
      const angle = (i / count) * Math.PI * 2;
      enemies.push(makeEnemy('swarmer', cx + Math.cos(angle) * 25, -30 + Math.sin(angle) * 15));
      waveEnemiesSpawned++;
    }
  } else {
    enemies.push(makeEnemy(type, 30 + Math.random() * (W - 60), -30));
    waveEnemiesSpawned++;
  }
}

function makeEnemy(type, x, y) {
  const postCap = wave > 16 ? 16 + (wave - 16) * 0.04 : wave;
  const speedMul = getDiff().speedMul * (1 + Math.min(postCap, 40) * 0.03);
  const e = { type, x, y, hp: 1, maxHp: 1, size: 16, speed: 60, sinAmp: 0, sinFreq: 0, sinOffset: 0, startX: x, fireTimer: 0, flashTimer: 0 };
  if (type === 'drifter') {
    e.hp = 1; e.maxHp = 1; e.size = 16; e.speed = (55 + Math.random() * 35) * speedMul;
    // Random vivid color per hex — cycle through a palette
    const hexPalette = [
      [255, 80, 0],   // orange
      [255, 220, 0],  // yellow
      [0, 220, 255],  // cyan
      [180, 0, 255],  // violet
      [0, 255, 100],  // green
      [255, 30, 120], // hot pink
      [255, 140, 0],  // amber
      [30, 120, 255], // blue
    ];
    const pc = hexPalette[Math.floor(Math.random() * hexPalette.length)];
    e.r = pc[0]; e.g = pc[1]; e.b = pc[2];
  } else if (type === 'zigzagger') {
    e.hp = 2; e.maxHp = 2; e.size = 14; e.speed = (65 + Math.random() * 35) * speedMul;
    e.sinAmp = 40 + Math.random() * 40; e.sinFreq = 2 + Math.random(); e.sinOffset = Math.random() * Math.PI * 2;
    e.r = 200; e.g = 0; e.b = 255;
  } else if (type === 'swarmer') {
    e.hp = 1; e.maxHp = 1; e.size = 10; e.speed = (100 + Math.random() * 50) * speedMul;
    e.r = 0; e.g = 255; e.b = 80;
  } else if (type === 'tank') {
    e.hp = 5 + Math.floor(wave / 5); e.maxHp = e.hp; e.size = 28; e.speed = (30 + Math.random() * 18) * speedMul;
    e.fireTimer = 1.5 + Math.random() * 2.5;
    e.r = 200; e.g = 30; e.b = 30;
  } else if (type === 'shielder') {
    e.hp = 3; e.maxHp = 3; e.size = 18; e.speed = (40 + Math.random() * 25) * speedMul;
    e.r = 0; e.g = 180; e.b = 255;
  } else if (type === 'kamikaze') {
    e.hp = 1; e.maxHp = 1; e.size = 12; e.speed = (50 + Math.random() * 20) * speedMul;
    e.r = 255; e.g = 80; e.b = 0; e.kamikazeTimer = 1.0; e.diving = false;
  }
  return e;
}

// ===== SPAWNING HELPERS =====
function spawnParticle(x, y, vx, vy, r, g, b, life, size) {
  const p = particles.get();
  p.x = x; p.y = y; p.vx = vx; p.vy = vy;
  p.r = r; p.g = g; p.b = b;
  p.life = life; p.maxLife = life; p.size = size || 2;
  return p;
}

function spawnBullet(x, y, vx, vy) {
  const b = bullets.get();
  b.x = x; b.y = y; b.vx = vx; b.vy = vy; b.isLaser = false;
  return b;
}

function spawnEnemyBullet(x, y, vx, vy) {
  const b = enemyBullets.get();
  b.x = x; b.y = y; b.vx = vx; b.vy = vy;
  return b;
}

function spawnScorePopup(x, y, text, r, g, b) {
  const p = scorePopups.get();
  p.x = x; p.y = y; p.text = text; p.life = 1.0; p.vx = (Math.random() - 0.5) * 30;
  p.r = r || 255; p.g = g || 215; p.b = b || 0;
}

function spawnDebris(x, y, count, r, g, b) {
  for (let i = 0; i < count; i++) {
    const d = debris.get();
    d.x = x + (Math.random() - 0.5) * 20;
    d.y = y + (Math.random() - 0.5) * 10;
    d.vx = (Math.random() - 0.5) * 60;
    d.vy = 30 + Math.random() * 80; // falls downward
    d.rot = Math.random() * Math.PI * 2;
    d.rotSpeed = (Math.random() - 0.5) * 8;
    d.life = 2.0 + Math.random() * 1.5;
    d.maxLife = d.life;
    // Color variation from enemy type
    d.r = Math.max(0, Math.min(255, r + Math.floor((Math.random() - 0.5) * 60)));
    d.g = Math.max(0, Math.min(255, g + Math.floor((Math.random() - 0.5) * 40)));
    d.b = Math.max(0, Math.min(255, b + Math.floor((Math.random() - 0.5) * 40)));
    d.size = 1.5 + Math.random() * 3;
    d.shape = Math.floor(Math.random() * 3); // 0=rect, 1=triangle, 2=line
  }
}

function spawnExplosion(x, y, count, r, g, b, speedMul) {
  speedMul = speedMul || 1;
  const boostedCount = Math.floor(count * 1.8);
  for (let i = 0; i < boostedCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (40 + Math.random() * 160) * speedMul;
    const t = i / boostedCount;
    let pr, pg, pb;
    if (t < 0.2) { pr = 255; pg = 255; pb = 255; }
    else if (t < 0.5) { pr = Math.min(255, r + 60); pg = Math.min(255, g + 40); pb = b; }
    else if (t < 0.8) { pr = r; pg = g; pb = b; }
    else { pr = Math.floor(r * 0.6); pg = Math.floor(g * 0.4); pb = Math.floor(b * 0.3); }
    // 2-3x longer particle life
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, pr, pg, pb,
      0.8 + Math.random() * 1.4, 2 + Math.random() * 6);
  }
  // Bright flash at center
  for (let i = 0; i < 5; i++) {
    spawnParticle(x + (Math.random()-0.5)*4, y + (Math.random()-0.5)*4, 0, 0, 255, 255, 255, 0.15 + Math.random() * 0.15, 10 + Math.random() * 15);
  }
  // Spawn debris rain (5-10 pieces)
  const debrisCount = 5 + Math.floor(Math.random() * 6);
  spawnDebris(x, y, debrisCount, r, g, b);
  // Screen flash for bigger explosions
  if (count >= 15) {
    screenFlashAlpha = Math.min(0.25, count * 0.008);
  }
}

function spawnPowerupRing(x, y, r, g, b) {
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2;
    const spd = 120;
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, r, g, b, 0.5, 3);
  }
}

// ===== SCREEN SHAKE =====
function triggerShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeTimer = duration;
}

// ===== HOMING MISSILE =====
let homingMissiles = [];
function fireHomingMissile() {
  playSound('missile_launch');
  homingMissiles.push({
    x: player.x, y: player.y - player.size,
    vx: 0, vy: -200, speed: 350, life: 4, target: null, size: 6
  });
}

// ===== UPDATE =====
function update() {
  if (state !== 'playing') return;

  // Timers
  if (invincibleTimer > 0) invincibleTimer -= dt;
  if (shakeTimer > 0) shakeTimer -= dt;
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; comboMultiplier = 1; }
  }
  if (scoreBoostTimer > 0) scoreBoostTimer -= dt;

  // Powerup timers
  if (player.rapidFire > 0) player.rapidFire -= dt;
  if (player.tripleShot > 0) player.tripleShot -= dt;
  if (player.speedBoost > 0) player.speedBoost -= dt;
  if (player.laser > 0) {
    player.laser -= dt;
    if (player.laser <= 0) player.laserActive = false;
  }
  if (activePowerup) {
    activePowerup.timer -= dt;
    if (activePowerup.timer <= 0) activePowerup = null;
  }

  // Player movement
  if (inputActive) {
    player.targetX = inputX;
    player.targetY = inputY;
  }
  const lerpFactor = player.speedBoost > 0 ? 0.25 : LERP;
  player.prevX = player.x; player.prevY = player.y;
  player.x += (player.targetX - player.x) * lerpFactor;
  player.y += (player.targetY - player.y) * lerpFactor;
  // Clamp
  player.x = Math.max(player.size, Math.min(W - player.size, player.x));
  player.y = Math.max(player.size, Math.min(H - player.size, player.y));
  // Tilt
  const dx = player.x - player.prevX;
  player.tilt += (Math.max(-0.3, Math.min(0.3, dx * 0.02)) - player.tilt) * 0.15;

  // Engine trail — compact focused exhaust
  const moveSpeed = Math.abs(dx) + Math.abs(player.y - player.prevY);
  const trailCount = Math.min(8 + Math.floor(moveSpeed * 0.5), 16);
  for (let i = 0; i < trailCount; i++) {
    const spread = (Math.random() - 0.5) * 8; // tight spread
    const depth = Math.random();
    const brightness = 1 - depth * 0.7;
    const r = Math.floor(brightness * 100);
    const g = Math.floor(150 + brightness * 105);
    const b = 255;
    const size = 2 + Math.random() * 5; // smaller particles 2-7px
    spawnParticle(
      player.x + spread,
      player.y + player.size * 0.6 + Math.random() * 4,
      spread * 1.5 + (Math.random() - 0.5) * 15,
      40 + Math.random() * 80,
      r, g, b,
      0.2 + Math.random() * 0.3,
      size
    );
  }
  // Small bright core particles
  for (let i = 0; i < 3; i++) {
    spawnParticle(
      player.x + (Math.random() - 0.5) * 4,
      player.y + player.size * 0.5,
      (Math.random() - 0.5) * 8,
      20 + Math.random() * 30,
      200, 240, 255,
      0.1 + Math.random() * 0.1,
      3 + Math.random() * 4
    );
  }

  // Auto-fire — disabled during upgrade screen
  if (!player.laserActive && !upgradeActive) {
    const frMul = Math.pow(0.8, playerUpgrades.fireRate);
    const fireRate = (player.rapidFire > 0 ? BASE_FIRE_RATE / 2 : BASE_FIRE_RATE) * getDiff().fireMul * frMul;
    player.fireTimer -= dt;
    if (player.fireTimer <= 0) {
      player.fireTimer = fireRate;
      const bSpeed = BULLET_SPEED * (1 + playerUpgrades.bulletSpeed * 0.15);
      const spreadBonus = playerUpgrades.spread * 0.18; // 0.18rad ≈ 10° per stack — clearly visible
      const useTriple = player.tripleShot > 0 || playerUpgrades.tripleShot;
      const streams = useTriple ? 3 : 2;
      const offsets = streams === 2 ? [-5, 5] : [-10, 0, 10];
      const angles = streams === 2 ? [-0.05 - spreadBonus, 0.05 + spreadBonus] : [-0.18 - spreadBonus, 0, 0.18 + spreadBonus];
      stats.shotsFired += streams;
      for (let i = 0; i < streams; i++) {
        const bx = player.x + offsets[i];
        const by = player.y - player.size;
        spawnBullet(bx, by, Math.sin(angles[i]) * bSpeed * 0.3, -bSpeed);
        // Muzzle flash — bigger and brighter
        for (let j = 0; j < 6; j++) {
          spawnParticle(bx, by, (Math.random() - 0.5) * 80, -Math.random() * 100, 255, 240, 120, 0.08 + Math.random() * 0.08, 2 + Math.random() * 3);
        }
      }
      playSound('pew');
    }
  } else {
    // Laser mode - continuous beam damage handled in collision
    if (Math.random() < 0.3) playSound('laser');
  }

  // Track time survived
  stats.timeSurvived += dt;

  // Boss intro cinematic
  if (bossIntro) {
    bossIntro.timer -= dt;
    if (bossIntro.timer <= 0) bossIntro = null;
  }

  // Wave clear text
  if (waveClearText) {
    waveClearText.timer -= dt;
    if (waveClearText.timer <= 0) waveClearText = null;
  }

  // Phase flash
  if (phaseFlashTimer > 0) phaseFlashTimer -= dt;
  if (phaseFloatText) {
    phaseFloatText.timer -= dt;
    if (phaseFloatText.timer <= 0) phaseFloatText = null;
  }

  // Update asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.x += a.vx * dt;
    a.y += a.vy * dt;
    a.rot += a.rotSpeed * dt;
    if (a.y > H + 50) { asteroids.splice(i, 1); continue; }
    // Collision with player
    if (invincibleTimer <= 0 && Math.hypot(a.x - player.x, a.y - player.y) < a.r + player.size * 0.7) {
      playerHit();
    }
  }

  // Asteroid vs player bullets
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    if (!b.active) continue;
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      if (Math.hypot(b.x - a.x, b.y - a.y) < a.r + 4) {
        b.active = false;
        stats.shotsHit++;
        a.hp--;
        if (a.hp <= 0) {
          spawnExplosion(a.x, a.y, 8, 150, 130, 100);
          addScore(10, a.x, a.y);
          // Split into 2 smaller
          if (a.r > 12) {
            for (let k = 0; k < 2; k++) {
              const nr = a.r * 0.55;
              const verts = [];
              for (let v = 0; v < 8; v++) verts.push(0.6 + Math.random() * 0.4);
              asteroids.push({
                x: a.x + (Math.random()-0.5)*10, y: a.y,
                vx: a.vx + (Math.random()-0.5)*40, vy: a.vy + (Math.random()-0.5)*20,
                r: nr, hp: Math.max(1, Math.ceil(nr / 10)),
                rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*3, verts: verts
              });
            }
          }
          asteroids.splice(j, 1);
        }
        break;
      }
    }
  }

  // Dynamic music intensity
  // Dynamic music removed — static drone only
  if (droneGain) droneGain.gain.value = muted ? 0 : 0.04;
  if (droneOsc2) { try { droneOsc2.stop(); } catch(e) {} droneOsc2 = null; droneGain2 = null; }

  // Boss phase change
  if (boss && !boss.dying && boss.entered) {
    const hpPct = boss.hp / boss.maxHp;
    if (hpPct <= 0.5 && !boss.phase50triggered) {
      boss.phase50triggered = true;
      playAlarmBeeps();
      phaseFlashTimer = 0.3;
      phaseFloatText = { text: 'HULL BREACH', timer: 1.5, x: boss.x, y: boss.y };
    }
    if (hpPct <= 0.25 && !boss.phase25triggered) {
      boss.phase25triggered = true;
      playAlarmBeeps();
      phaseFlashTimer = 0.3;
      phaseFloatText = { text: 'CRITICAL DAMAGE', timer: 1.5, x: boss.x, y: boss.y };
    }
  }

  // Wave management
  if (upgradeActive) return; // pause game during upgrade selection
  if (wavePause > 0) {
    wavePause -= dt;
  } else if (bossWarning > 0) {
    bossWarning -= dt;
    if (bossWarning <= 0) spawnBoss();
  } else if (!bossActive) {
    waveTimer += dt;
    const spawnInterval = Math.max(0.3, (1.5 - wave * 0.05) * getDiff().spawnMul);
    if (waveEnemiesSpawned < waveEnemyCount && waveTimer >= spawnInterval) {
      waveTimer = 0;
      spawnEnemy();
    }
    // Check wave complete
    if (waveEnemiesSpawned >= waveEnemyCount && enemies.length === 0 && asteroids.length === 0) {
      nextWave();
    }
  }

  // Update enemies
  const bulletSpeedMul = wave > 10 ? (wave > 16 ? 1.3 + (wave - 16) * 0.005 : 1 + (wave - 10) * 0.05) : 1;
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed * dt;
    if (e.sinAmp > 0) {
      e.sinOffset += e.sinFreq * dt;
      e.x = e.startX + Math.sin(e.sinOffset) * e.sinAmp;
    }
    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Enemy trail particles
    if (Math.random() < 0.4) {
      spawnParticle(e.x + (Math.random()-0.5)*e.size*0.5, e.y - e.size*0.3,
        (Math.random()-0.5)*10, -20 - Math.random()*30,
        e.r, e.g, e.b, 0.25 + Math.random()*0.2, 2 + Math.random()*3);
    }

    // Kamikaze behavior
    if (e.type === 'kamikaze') {
      if (!e.diving) {
        e.kamikazeTimer -= dt;
        if (e.kamikazeTimer <= 0) {
          e.diving = true;
          const angle = Math.atan2(player.y - e.y, player.x - e.x);
          const diveSpeed = e.speed * 3;
          e.speed = 0; // stop normal movement
          e.divVx = Math.cos(angle) * diveSpeed;
          e.divVy = Math.sin(angle) * diveSpeed;
        }
      } else {
        e.x += e.divVx * dt;
        e.y += (e.divVy - e.speed) * dt; // subtract normal y speed added above
      }
    }

    // Tank shooting
    if (e.type === 'tank' && e.y > 0) {
      e.fireTimer -= dt;
      if (e.fireTimer <= 0) {
        e.fireTimer = 2 + Math.random();
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        const spd = 150 * bulletSpeedMul;
        spawnEnemyBullet(e.x, e.y + e.size, Math.cos(angle) * spd, Math.sin(angle) * spd);
      }
    }

    // Remove if off screen
    if (e.y > H + 50) { enemies.splice(i, 1); }
  }

  // Update boss
  if (boss) {
    if (!boss.entered) {
      boss.y += (boss.targetY - boss.y) * 0.02;
      if (Math.abs(boss.y - boss.targetY) < 2) boss.entered = true;
    }
    if (boss.flashTimer > 0) boss.flashTimer -= dt;
    boss.damage = 1 - (boss.hp / boss.maxHp);

    // Smoke when >30% damaged
    if (boss.damage > 0.3 && Math.random() < boss.damage * 0.4) {
      const ex = boss.x + (Math.random()-0.5) * boss.size * 2;
      const ey = boss.y + (Math.random()-0.5) * boss.size;
      spawnParticle(ex, ey, (Math.random()-0.5)*20, -30-Math.random()*50, 180, 180, 180, 0.8+Math.random()*0.5, 3+Math.random()*4);
    }
    // Fire/sparks when >60% damaged
    if (boss.damage > 0.6 && Math.random() < (boss.damage - 0.6) * 0.6) {
      const ex = boss.x + (Math.random()-0.5) * boss.size * 1.5;
      const ey = boss.y + (Math.random()-0.5) * boss.size;
      spawnParticle(ex, ey, (Math.random()-0.5)*15, -20-Math.random()*30, 255, (120+Math.random()*80)|0, 0, 0.4+Math.random()*0.3, 4+Math.random()*5);
    }

    if (boss.entered && !boss.dying) {
      // Boss movement
      const bossType2 = boss.isMini ? 0 : boss.bossNum % 5;
      if (bossType2 === 1) { // PHANTOM — fast strafe
        boss.x += Math.sin(Date.now() * 0.003) * 200 * dt;
      } else if (bossType2 === 3) { // VIPER — aggressive zigzag
        boss.x += Math.sin(Date.now() * 0.004 + boss.y) * 250 * dt;
      } else if (bossType2 === 4) { // OMEGA — figure-8
        boss.x += Math.sin(Date.now() * 0.002) * 160 * dt;
        boss.y = boss.targetY + Math.sin(Date.now() * 0.001) * 40;
      } else {
        boss.x += Math.sin(Date.now() * 0.001) * 80 * dt;
      }
      boss.x = Math.max(boss.size, Math.min(W - boss.size, boss.x));

      // Boss fire patterns
      boss.fireTimer -= dt;
      if (boss.fireTimer <= 0) {
        boss.pattern = (boss.pattern + 1) % 3;
        const spd = 160 * bulletSpeedMul;

        // Boss fire patterns — unique per boss type
        const bossType = boss.isMini ? 99 : boss.bossNum % 5; // 5 distinct boss types cycling

        if (bossType === 0) {
          // DREADNOUGHT — wide spread shots
          boss.fireTimer = Math.max(0.9, 2.2 - wave * 0.04);
          if (boss.pattern === 0) {
            for (let a = -0.5; a <= 0.5; a += 0.2)
              spawnEnemyBullet(boss.x, boss.y + boss.size, Math.sin(a) * spd, Math.cos(a) * spd);
          } else if (boss.pattern === 1) {
            const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
            for (let i = -1; i <= 1; i++)
              spawnEnemyBullet(boss.x, boss.y + boss.size, Math.cos(angle + i*0.15)*spd, Math.sin(angle + i*0.15)*spd);
          } else {
            for (let i = 0; i < 12; i++) {
              const a = (i/12)*Math.PI*2;
              spawnEnemyBullet(boss.x, boss.y, Math.cos(a)*spd*0.8, Math.sin(a)*spd*0.8);
            }
          }
        } else if (bossType === 1) {
          // PHANTOM — fires from sides + teleports (fast side-to-side)
          boss.fireTimer = Math.max(0.6, 1.8 - wave * 0.04);
          if (boss.pattern === 0) {
            for (let side = -1; side <= 1; side += 2) {
              spawnEnemyBullet(boss.x + side * boss.size, boss.y, side * spd * 0.6, spd * 0.6);
              spawnEnemyBullet(boss.x + side * boss.size, boss.y, side * spd * 0.3, spd * 0.8);
            }
          } else if (boss.pattern === 1) {
            const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
            for (let i = 0; i < 5; i++)
              spawnEnemyBullet(boss.x, boss.y + boss.size, Math.cos(angle + (i-2)*0.1)*spd, Math.sin(angle + (i-2)*0.1)*spd);
          } else {
            for (let a = 0; a < Math.PI*2; a += Math.PI/4)
              spawnEnemyBullet(boss.x, boss.y, Math.cos(a)*spd*0.7, Math.sin(a)*spd*0.7);
          }
        } else if (bossType === 2) {
          // TITAN — slow heavy shots
          boss.fireTimer = Math.max(1.2, 2.5 - wave * 0.04);
          if (boss.pattern === 0) {
            for (let a = -0.7; a <= 0.7; a += 0.14)
              spawnEnemyBullet(boss.x, boss.y + boss.size, Math.sin(a)*spd*0.7, Math.cos(a)*spd*0.7);
          } else if (boss.pattern === 1) {
            const rot = Date.now() * 0.003;
            for (let i = 0; i < 12; i++) {
              const a = rot + (i/12)*Math.PI*2;
              spawnEnemyBullet(boss.x, boss.y, Math.cos(a)*spd*0.6, Math.sin(a)*spd*0.6);
            }
          } else {
            const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
            for (let i = -3; i <= 3; i++)
              spawnEnemyBullet(boss.x, boss.y + boss.size, Math.cos(angle + i*0.12)*spd, Math.sin(angle + i*0.12)*spd);
          }
        } else if (bossType === 3) {
          // VIPER — fast moving, fires while strafing
          boss.fireTimer = Math.max(0.4, 1.4 - wave * 0.04);
          if (boss.pattern === 0) {
            const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
            spawnEnemyBullet(boss.x - 15, boss.y + boss.size, Math.cos(angle)*spd, Math.sin(angle)*spd);
            spawnEnemyBullet(boss.x + 15, boss.y + boss.size, Math.cos(angle)*spd, Math.sin(angle)*spd);
          } else if (boss.pattern === 1) {
            for (let i = 0; i < 3; i++) {
              const angle = Math.atan2(player.y - boss.y, player.x - boss.x) + (i-1)*0.2;
              spawnEnemyBullet(boss.x, boss.y + boss.size*0.5, Math.cos(angle)*spd*1.2, Math.sin(angle)*spd*1.2);
            }
          } else {
            for (let i = 0; i < 7; i++)
              spawnEnemyBullet(boss.x - boss.size*1.5 + i * boss.size*0.5, boss.y + boss.size, 0, spd*0.9);
          }
        } else if (bossType === 99) {
          // MINI-BOSS DESTROYER — only spread + aimed
          boss.fireTimer = Math.max(0.8, 2.0 - wave * 0.04);
          if (boss.pattern % 2 === 0) {
            for (let a = -0.4; a <= 0.4; a += 0.2)
              spawnEnemyBullet(boss.x, boss.y + boss.size, Math.sin(a)*spd, Math.cos(a)*spd);
          } else {
            const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
            for (let i = -1; i <= 1; i++)
              spawnEnemyBullet(boss.x, boss.y + boss.size, Math.cos(angle+i*0.15)*spd, Math.sin(angle+i*0.15)*spd);
          }
        } else {
          // OMEGA — endgame boss, all patterns combined
          boss.fireTimer = Math.max(0.5, 1.5 - wave * 0.04);
          if (boss.pattern === 0) {
            const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
            for (let i = -2; i <= 2; i++)
              spawnEnemyBullet(boss.x, boss.y + boss.size, Math.cos(angle+i*0.15)*spd, Math.sin(angle+i*0.15)*spd);
          } else if (boss.pattern === 1) {
            const rot = Date.now() * 0.004;
            for (let i = 0; i < 16; i++) {
              const a = rot + (i/16)*Math.PI*2;
              spawnEnemyBullet(boss.x, boss.y, Math.cos(a)*spd*0.75, Math.sin(a)*spd*0.75);
            }
          } else {
            for (let side = -1; side <= 1; side += 2) {
              for (let i = 0; i < 4; i++) {
                const a = Math.PI*0.5 + side * (0.1 + i*0.15);
                spawnEnemyBullet(boss.x + side*boss.size, boss.y, Math.cos(a)*spd*0.9, Math.sin(a)*spd*0.9);
              }
            }
          }
        }
      }
    }

    if (boss.dying) {
      boss.deathTimer -= dt;

      // Start boss death sequence
      if (!bossDeathSequence) {
        bossDeathSequence = {
          timer: 0,
          subExplosionCount: 0,
          subExplosionInterval: 0.35,
          totalSubExplosions: 4,
          finalDone: false,
          slowTimer: 1.0
        };
        gameSpeedMul = 0.3; // dramatic slowdown
      }

      // Slowdown timer
      if (bossDeathSequence.slowTimer > 0) {
        bossDeathSequence.slowTimer -= dt;
        if (bossDeathSequence.slowTimer <= 0) gameSpeedMul = 1;
      }

      // Sequential sub-explosions at different positions on boss body
      bossDeathSequence.timer += dt;
      if (bossDeathSequence.subExplosionCount < bossDeathSequence.totalSubExplosions &&
          bossDeathSequence.timer >= bossDeathSequence.subExplosionInterval) {
        bossDeathSequence.timer = 0;
        bossDeathSequence.subExplosionCount++;
        const ex = boss.x + (Math.random() - 0.5) * boss.size * 1.8;
        const ey = boss.y + (Math.random() - 0.5) * boss.size * 1.8;
        // Each sub-explosion: 30-40 particles, large
        const subCount = 30 + Math.floor(Math.random() * 11);
        for (let i = 0; i < subCount; i++) {
          const angle = Math.random() * Math.PI * 2;
          const spd = (60 + Math.random() * 200) * 1.5;
          const t = i / subCount;
          let pr, pg, pb;
          if (t < 0.3) { pr = 255; pg = 255; pb = 200; }
          else if (t < 0.6) { pr = 255; pg = 140; pb = 0; }
          else { pr = 200; pg = 40; pb = 0; }
          // Boss particles: 10-20px radius, 3-4 second life
          spawnParticle(ex, ey, Math.cos(angle) * spd, Math.sin(angle) * spd, pr, pg, pb,
            2.5 + Math.random() * 1.5, 10 + Math.random() * 10);
        }
        triggerShake(8, 0.3);
        spawnDebris(ex, ey, 5, 255, 100, 0);
        playSound('explode');
      }

      // Random smaller explosions during sequence
      if (Math.random() < 0.5) {
        const ex = boss.x + (Math.random() - 0.5) * boss.size * 2;
        const ey = boss.y + (Math.random() - 0.5) * boss.size * 2;
        spawnExplosion(ex, ey, 8, 255, 100, 0, 1.5);
      }

      // Final massive explosion when timer runs out
      if (boss.deathTimer <= 0 && !bossDeathSequence.finalDone) {
        bossDeathSequence.finalDone = true;
        // Final explosion: 60+ particles, large (10-20px), long lasting (3-4s)
        for (let i = 0; i < 70; i++) {
          const angle = Math.random() * Math.PI * 2;
          const spd = (80 + Math.random() * 300) * 2;
          const t = i / 70;
          let pr, pg, pb;
          if (t < 0.2) { pr = 255; pg = 255; pb = 255; }
          else if (t < 0.5) { pr = 255; pg = 200; pb = 50; }
          else if (t < 0.8) { pr = 255; pg = 100; pb = 0; }
          else { pr = 180; pg = 30; pb = 0; }
          spawnParticle(boss.x, boss.y, Math.cos(angle) * spd, Math.sin(angle) * spd, pr, pg, pb,
            3.0 + Math.random() * 1.5, 10 + Math.random() * 12);
        }
        // Full screen flash
        screenFlashAlpha = 0.6;
        // Heavy screen shake
        triggerShake(18, 0.8);
        // TONS of debris raining down (20-30 pieces)
        spawnDebris(boss.x, boss.y, 25 + Math.floor(Math.random() * 6), 255, 120, 0);
        playSound('boss_explode');
        addScore(boss.isMini ? 250 : 500, boss.x, boss.y);
        totalKills++;
        stats.enemiesKilled++;
        stats.bossesKilled++;
        // Guaranteed boss drop
        const bossDropTypes = [0,1,2,4,5,6];
        const dropIdx = bossDropTypes[Math.floor(Math.random()*bossDropTypes.length)];
        powerups.push({x: boss.x, y: boss.y, type: dropIdx, angle: 0});
        const wasMini = boss.isMini;
        gameSpeedMul = 1;
        boss = null;
        bossActive = false;
        bossDeathSequence = null;
        // Always show upgrade screen after any boss kill
        showUpgradeScreen();
      }
    }
  }

  // Update bullets
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    if (!b.active) continue;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y < -20 || b.x < -20 || b.x > W + 20) { b.active = false; continue; }
    // Bullet trail — 3-4 fading particles behind each bullet
    for (let t = 0; t < 3; t++) {
      spawnParticle(
        b.x + (Math.random() - 0.5) * 4,
        b.y + 4 + t * 3,
        (Math.random() - 0.5) * 12,
        Math.random() * 30,
        255, 200 + Math.floor(Math.random() * 55), 50,
        0.08 + Math.random() * 0.1,
        1.5 + Math.random() * 2
      );
    }
  }

  // Update enemy bullets
  for (let i = 0; i < enemyBullets.length; i++) {
    const b = enemyBullets[i];
    if (!b.active) continue;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y > H + 20 || b.y < -20 || b.x < -20 || b.x > W + 20) { b.active = false; }
  }

  // Update particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (!p.active) continue;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    p.vx *= 0.98; p.vy *= 0.98;
    if (p.life <= 0) p.active = false;
  }

  // Update debris (cosmetic falling pieces)
  for (let i = 0; i < debris.length; i++) {
    const d = debris[i];
    if (!d.active) continue;
    d.x += d.vx * dt;
    d.vy += 120 * dt; // gravity pulls down
    d.y += d.vy * dt;
    d.rot += d.rotSpeed * dt;
    d.vx *= 0.99;
    d.life -= dt;
    if (d.life <= 0 || d.y > H + 30) d.active = false;
  }

  // Update score popups
  for (let i = 0; i < scorePopups.length; i++) {
    const p = scorePopups[i];
    if (!p.active) continue;
    p.y -= 60 * dt;
    p.x += p.vx * dt;
    p.life -= dt;
    if (p.life <= 0) p.active = false;
  }

  // Update powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.y += 50 * dt;
    pu.angle = (pu.angle || 0) + 3 * dt;
    if (pu.y > H + 30) { powerups.splice(i, 1); }
  }

  // Update homing missiles
  for (let i = homingMissiles.length - 1; i >= 0; i--) {
    const m = homingMissiles[i];
    m.life -= dt;
    if (m.life <= 0) { homingMissiles.splice(i, 1); continue; }

    // Find nearest target
    let nearest = null, nearDist = Infinity;
    for (const e of enemies) {
      const d = Math.hypot(e.x - m.x, e.y - m.y);
      if (d < nearDist) { nearDist = d; nearest = e; }
    }
    if (boss && !boss.dying) {
      const d = Math.hypot(boss.x - m.x, boss.y - m.y);
      if (d < nearDist) { nearDist = d; nearest = boss; }
    }

    if (nearest) {
      const angle = Math.atan2(nearest.y - m.y, nearest.x - m.x);
      const curAngle = Math.atan2(m.vy, m.vx);
      let diff = angle - curAngle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      const turn = Math.min(Math.abs(diff), 5 * dt) * Math.sign(diff);
      const newAngle = curAngle + turn;
      m.vx = Math.cos(newAngle) * m.speed;
      m.vy = Math.sin(newAngle) * m.speed;
    }
    m.x += m.vx * dt;
    m.y += m.vy * dt;

    // Trail
    spawnParticle(m.x, m.y, (Math.random() - 0.5) * 20, Math.random() * 40, 255, 100, 0, 0.2, 2);

    if (m.x < -50 || m.x > W + 50 || m.y < -50 || m.y > H + 50) {
      homingMissiles.splice(i, 1); continue;
    }

    // Missile collision with enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(e.x - m.x, e.y - m.y) < e.size + m.size) {
        // Big explosion
        spawnExplosion(e.x, e.y, 25, e.r, e.g, e.b, 1.5);
        triggerShake(4, 0.15);
        playSound('explode');
        const pts = e.type === 'tank' ? 50 : e.type === 'zigzagger' ? 25 : e.type === 'swarmer' ? 15 : 10;
        addScore(pts, e.x, e.y);
        totalKills++; stats.enemiesKilled++;
        maybeDropPowerup(e.x, e.y);
        enemies.splice(j, 1);
        homingMissiles.splice(i, 1);
        break;
      }
    }
  }

  // ===== COLLISIONS =====
  // Laser beam collision
  if (player.laserActive && player.laser > 0) {
    const laserW = 8;
    // Check enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (Math.abs(e.x - player.x) < laserW + e.size && e.y < player.y) {
        e.hp--;
        e.flashTimer = 0.05;
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, 15, e.r, e.g, e.b);
          for (let ci = 0; ci < 8; ci++) { const ca = (ci/8)*Math.PI*2; spawnParticle(e.x, e.y, Math.cos(ca)*120, Math.sin(ca)*120, e.r, e.g, e.b, 0.6, 4); }
          playSound('explode');
          const pts = e.type === 'tank' ? 50 : e.type === 'zigzagger' ? 25 : e.type === 'swarmer' ? 15 : 10;
          addScore(pts, e.x, e.y);
          totalKills++; stats.enemiesKilled++;
          maybeDropPowerup(e.x, e.y);
          enemies.splice(i, 1);
        }
      }
    }
    // Check boss
    if (boss && !boss.dying && Math.abs(boss.x - player.x) < laserW + boss.size && boss.y < player.y) {
      boss.hp -= 0.5; // Continuous damage scaled by frame
      boss.flashTimer = 0.05;
      if (boss.hp <= 0) {
        boss.dying = true; boss.deathTimer = 1.5;
      }
    }
  }

  // Player bullets vs enemies
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    if (!b.active) continue;
    // vs enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + 4) {
        b.active = false;
        stats.shotsHit++;
        e.hp--;
        e.flashTimer = 0.08;
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, 12 + Math.floor(Math.random() * 8), e.r, e.g, e.b);
          for (let ci = 0; ci < 8; ci++) { const ca = (ci/8)*Math.PI*2; spawnParticle(e.x, e.y, Math.cos(ca)*120, Math.sin(ca)*120, e.r, e.g, e.b, 0.6, 4); }
          playSound('explode');
          const pts = e.type === 'tank' ? 50 : e.type === 'shielder' ? 40 : e.type === 'kamikaze' ? 20 : e.type === 'zigzagger' ? 25 : e.type === 'swarmer' ? 15 : 10;
          addScore(pts, e.x, e.y);
          totalKills++; stats.enemiesKilled++;
          maybeDropPowerup(e.x, e.y);
          enemies.splice(j, 1);
        }
        break;
      }
    }
    // vs boss
    if (b.active && boss && !boss.dying) {
      if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.size + 4) {
        b.active = false;
        stats.shotsHit++;
        boss.hp--;
        boss.flashTimer = 0.08;
        triggerShake(2, 0.05);
        // Impact particles — spark burst at hit point
        for (let pi = 0; pi < 8; pi++) {
          const a = Math.random() * Math.PI * 2;
          const spd = 60 + Math.random() * 120;
          spawnParticle(b.x, b.y, Math.cos(a)*spd, Math.sin(a)*spd, 255, 180+Math.random()*75|0, 0, 0.3+Math.random()*0.2, 2+Math.random()*3);
        }
        // Bright flash at impact
        spawnParticle(b.x, b.y, 0, 0, 255, 255, 255, 0.08, 8);
        playSound('impact');
        if (boss.hp <= 0) {
          boss.dying = true;
          boss.deathTimer = 1.5;
        }
      }
    }
  }

  // Enemy bullets vs player
  if (invincibleTimer <= 0) {
    for (let i = 0; i < enemyBullets.length; i++) {
      const b = enemyBullets[i];
      if (!b.active) continue;
      if (Math.hypot(b.x - player.x, b.y - player.y) < player.size + 3) {
        b.active = false;
        playerHit();
        break;
      }
    }
    // Enemy collision with player
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (Math.hypot(e.x - player.x, e.y - player.y) < e.size + player.size * 0.7) {
        spawnExplosion(e.x, e.y, 10, e.r, e.g, e.b);
        for (let ci = 0; ci < 8; ci++) { const ca = (ci/8)*Math.PI*2; spawnParticle(e.x, e.y, Math.cos(ca)*120, Math.sin(ca)*120, e.r, e.g, e.b, 0.6, 4); }
        enemies.splice(i, 1);
        playerHit();
        break;
      }
    }
  }

  // Powerup collection
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    if (Math.hypot(pu.x - player.x, pu.y - player.y) < 25) {
      collectPowerup(pu);
      powerups.splice(i, 1);
    }
  }

  // Update stars with twinkle
  for (let l = 0; l < 3; l++) {
    for (const s of starLayers[l]) {
      s.y += s.speed * dt;
      s.twinklePhase += s.twinkleSpeed * dt;
      if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    }
  }
  // Update nebulae
  for (const n of nebulae) {
    n.y += n.speed * dt;
    n.x += n.drift * dt;
    n.pulsePhase += 0.3 * dt;
    if (n.y > H + n.r) { n.y = -n.r; n.x = Math.random() * W; }
  }
  // Update shooting stars
  if (Math.random() < 0.003) { // occasional shooting star
    shootingStars.push({
      x: Math.random() * W, y: Math.random() * H * 0.3,
      vx: -150 - Math.random() * 200, vy: 200 + Math.random() * 150,
      life: 0.5 + Math.random() * 0.5, maxLife: 0.5 + Math.random() * 0.5,
      size: 1 + Math.random() * 1.5
    });
  }
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.x += ss.vx * dt; ss.y += ss.vy * dt; ss.life -= dt;
    if (ss.life <= 0) shootingStars.splice(i, 1);
  }
  // Screen flash decay
  if (screenFlashAlpha > 0) screenFlashAlpha = Math.max(0, screenFlashAlpha - dt * 2);
}

function addScore(pts, x, y) {
  comboTimer = COMBO_WINDOW;
  comboCount++;
  comboMultiplier = Math.min(comboCount, 10);
  const mult = (scoreBoostTimer > 0 ? 2 : 1) * comboMultiplier;
  const total = pts * mult;
  score += total;
  if (comboCount > stats.maxCombo) stats.maxCombo = comboCount;
  const text = comboMultiplier > 1 ? `+${total} x${comboMultiplier}` : `+${total}`;
  spawnScorePopup(x, y - 15, text);
  // Big floating combo text for x5+
  if (comboMultiplier >= 5) {
    spawnScorePopup(W/2, H*0.35, `x${comboMultiplier} COMBO!`, 255, 200, 0);
  }
}

function maybeDropPowerup(x, y) {
  if (Math.random() < POWERUP_CHANCE) {
    const type = Math.floor(Math.random() * PU_TYPES.length);
    powerups.push({ x, y, type, angle: 0 });
  }
}

function collectPowerup(pu) {
  const def = PU_TYPES[pu.type];
  playSound('powerup');
  // Parse color for ring
  const tc = hexToRgb(def.color);
  spawnPowerupRing(pu.x, pu.y, tc.r, tc.g, tc.b);

  switch(pu.type) {
    case 0: player.rapidFire = def.dur; activePowerup = {name:def.name, color:def.color, timer:def.dur, maxTimer:def.dur, icon:def.icon}; break;
    case 1: { const tdur = def.dur + playerUpgrades.tripleDur * 3; player.tripleShot = tdur; activePowerup = {name:def.name, color:def.color, timer:tdur, maxTimer:tdur, icon:def.icon}; break; }
    case 2: player.shield = true; break;
    case 3: fireHomingMissile(); break;
    case 4: scoreBoostTimer = def.dur; activePowerup = {name:def.name, color:def.color, timer:def.dur, maxTimer:def.dur, icon:def.icon}; break;
    case 5: player.speedBoost = def.dur; activePowerup = {name:def.name, color:def.color, timer:def.dur, maxTimer:def.dur, icon:def.icon}; break;
    case 6: player.laser = def.dur; player.laserActive = true; activePowerup = {name:def.name, color:def.color, timer:def.dur, maxTimer:def.dur, icon:def.icon}; break;
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16) || 200;
  const g = parseInt(hex.slice(3, 5), 16) || 200;
  const b = parseInt(hex.slice(5, 7), 16) || 200;
  return { r, g, b };
}

function playerHit() {
  if (invincibleTimer > 0) return;
  if (player.shield) {
    player.shield = false;
    spawnExplosion(player.x, player.y, 12, 0, 255, 100);
    triggerShake(3, 0.1);
    return;
  }
  lives--;
  playSound('hit');
  spawnExplosion(player.x, player.y, 20, 0, 200, 255, 1.5);
  triggerShake(8, 0.3);
  if (lives <= 0) {
    gameOver();
  } else {
    invincibleTimer = 2.0;
    player.x = W / 2; player.y = H * 0.75;
    player.targetX = player.x; player.targetY = player.y;
  }
}

function gameOver() {
  state = 'gameover';
  stopDrone();
  if (droneOsc2) { try { droneOsc2.stop(); } catch(e) {} droneOsc2 = null; droneGain2 = null; }
  showHUD(false);
  // Show stats screen first
  showingStats = true;
  const sb = document.getElementById('statsBody');
  const acc = stats.shotsFired > 0 ? Math.round(stats.shotsHit / stats.shotsFired * 100) : 0;
  const mins = Math.floor(stats.timeSurvived / 60);
  const secs = Math.floor(stats.timeSurvived % 60);
  sb.innerHTML = `
    ACCURACY: ${acc}%<br>
    ENEMIES DESTROYED: ${stats.enemiesKilled}<br>
    BOSSES DESTROYED: ${stats.bossesKilled}<br>
    WAVES CLEARED: ${stats.wavesCleared}<br>
    MAX COMBO: x${stats.maxCombo}<br>
    TIME SURVIVED: ${mins}:${String(secs).padStart(2,'0')}<br>
    FINAL SCORE: ${score.toLocaleString()}
  `;
  setTimeout(() => {
    statsScreen.classList.remove('hidden');
    showScreen(null);
    statsScreen.classList.remove('hidden');
  }, 500);
}

function showGameOverScreen() {
  goScoreEl.textContent = score.toLocaleString();
  goWaveEl.textContent = `Wave ${wave}`;
  const isHS = isHighScore(score);
  if (isHS) {
    goNewHS.classList.remove('hidden');
    initialsSection.classList.remove('hidden');
    goSubmitBtn.style.display = '';
    goRestartBtn.style.display = 'none';
    buildInitialsUI();
  } else {
    goNewHS.classList.add('hidden');
    initialsSection.classList.add('hidden');
    goSubmitBtn.style.display = 'none';
    goRestartBtn.style.display = '';
  }
  showScreen('goScreen');
}

// ===== RENDER =====
function render() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  // Background — deep dark space
  ctx.fillStyle = '#020108';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Nebulae — large semi-transparent radial gradients
  for (const n of nebulae) {
    const pulseAlpha = n.alpha + Math.sin(n.pulsePhase) * 0.008;
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    grad.addColorStop(0, `rgba(${n.cr},${n.cg},${n.cb},${pulseAlpha})`);
    grad.addColorStop(0.5, `rgba(${n.cr},${n.cg},${n.cb},${pulseAlpha * 0.5})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(n.x - n.r, n.y - n.r, n.r * 2, n.r * 2);
  }

  // Stars — 3 parallax layers with twinkle
  for (let l = 0; l < 3; l++) {
    for (const s of starLayers[l]) {
      const twinkle = s.baseAlpha + Math.sin(s.twinklePhase) * 0.3;
      ctx.globalAlpha = Math.max(0.05, Math.min(1, twinkle));
      ctx.fillStyle = s.color;
      if (l === 2) {
        // Largest layer: draw with glow
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha *= 0.3;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * 2.5, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(s.x, s.y, s.size, s.size);
      }
    }
  }
  ctx.globalAlpha = 1;

  // Shooting stars
  ctx.globalCompositeOperation = 'lighter';
  for (const ss of shootingStars) {
    const alpha = ss.life / ss.maxLife;
    const tailLen = 40 + (1 - alpha) * 30;
    const nx = ss.vx / Math.hypot(ss.vx, ss.vy);
    const ny = ss.vy / Math.hypot(ss.vx, ss.vy);
    const grad = ctx.createLinearGradient(ss.x, ss.y, ss.x - nx * tailLen, ss.y - ny * tailLen);
    grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = ss.size;
    ctx.beginPath();
    ctx.moveTo(ss.x, ss.y);
    ctx.lineTo(ss.x - nx * tailLen, ss.y - ny * tailLen);
    ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';

  if (state === 'title' || state === 'highscores') {
    // Demo starfield is enough
    ctx.restore();
    return;
  }

  // Particles — additive blending for luminous glow
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (!p.active) continue;
    const alpha = Math.max(0, p.life / p.maxLife);
    const sz = p.size * (0.3 + alpha * 0.7);
    // Soft glow halo
    if (sz > 2) {
      ctx.globalAlpha = alpha * 0.35;
      ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Core
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgb(${Math.min(255, p.r + 40)},${Math.min(255, p.g + 40)},${Math.min(255, p.b + 20)})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;

  // Debris — small tumbling shapes falling down
  for (let i = 0; i < debris.length; i++) {
    const d = debris[i];
    if (!d.active) continue;
    const alpha = Math.max(0, d.life / d.maxLife) * 0.8;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgb(${d.r},${d.g},${d.b})`;
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rot);
    if (d.shape === 0) {
      // Small rectangle
      ctx.fillRect(-d.size, -d.size * 0.5, d.size * 2, d.size);
    } else if (d.shape === 1) {
      // Small triangle
      ctx.beginPath();
      ctx.moveTo(0, -d.size);
      ctx.lineTo(d.size * 0.8, d.size * 0.6);
      ctx.lineTo(-d.size * 0.8, d.size * 0.6);
      ctx.closePath();
      ctx.fill();
    } else {
      // Line/shard
      ctx.strokeStyle = `rgb(${d.r},${d.g},${d.b})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-d.size, 0);
      ctx.lineTo(d.size, 0);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Laser beam
  if (player.laserActive && player.laser > 0 && (state === 'playing' || state === 'paused')) {
    ctx.globalCompositeOperation = 'lighter';
    const grad = ctx.createLinearGradient(player.x, player.y - player.size, player.x, 0);
    grad.addColorStop(0, 'rgba(180,0,255,0.8)');
    grad.addColorStop(0.5, 'rgba(200,100,255,0.4)');
    grad.addColorStop(1, 'rgba(160,0,255,0.1)');
    ctx.fillStyle = grad;
    ctx.fillRect(player.x - 5, 0, 10, player.y - player.size);
    // Glow
    const grad2 = ctx.createLinearGradient(player.x, player.y - player.size, player.x, 0);
    grad2.addColorStop(0, 'rgba(200,100,255,0.3)');
    grad2.addColorStop(1, 'rgba(160,0,255,0)');
    ctx.fillStyle = grad2;
    ctx.fillRect(player.x - 15, 0, 30, player.y - player.size);
    ctx.globalCompositeOperation = 'source-over';
  }

  // Powerups
  for (const pu of powerups) {
    const def = PU_TYPES[pu.type];
    const pulse = 0.8 + Math.sin(Date.now() * 0.005) * 0.2;
    ctx.save();
    ctx.translate(pu.x, pu.y);
    ctx.rotate(pu.angle);
    ctx.scale(pulse, pulse);
    // Glow
    ctx.globalCompositeOperation = 'lighter';
    const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, 18);
    glow.addColorStop(0, def.color);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(-18, -18, 36, 36);
    ctx.globalCompositeOperation = 'source-over';
    // Icon bg
    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.fill();
    // Icon text
    ctx.fillStyle = '#000';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(def.icon, 0, 0);
    ctx.restore();
  }

  // Enemies — detailed geometric shapes
  for (const e of enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);
    const flash = e.flashTimer > 0;
    const pulse = 0.85 + Math.sin(Date.now() * 0.006 + e.x) * 0.15;
    const rot = Date.now() * 0.001; // slow rotation timer

    // Glow halo (additive)
    ctx.globalCompositeOperation = 'lighter';
    const glowRadius = e.size * 1.8;
    const glow = ctx.createRadialGradient(0, 0, e.size * 0.3, 0, 0, glowRadius);
    if (flash) {
      glow.addColorStop(0, 'rgba(255,255,255,0.6)');
      glow.addColorStop(0.4, 'rgba(255,255,255,0.2)');
    } else {
      glow.addColorStop(0, `rgba(${e.r},${e.g},${e.b},${0.25 * pulse})`);
      glow.addColorStop(0.5, `rgba(${e.r},${e.g},${e.b},${0.08 * pulse})`);
    }
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(-glowRadius, -glowRadius, glowRadius * 2, glowRadius * 2);
    ctx.globalCompositeOperation = 'source-over';

    if (e.type === 'drifter') {
      // Hexagon with inscribed triangle, slowly rotating, glowing edges
      const hexRot = rot * 0.4 + e.x * 0.01;
      const sz = e.size * pulse;
      // Outer hexagon fill
      ctx.fillStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.85)`;
      ctx.beginPath();
      for (let p = 0; p < 6; p++) {
        const a = hexRot + (p / 6) * Math.PI * 2;
        const px = Math.cos(a) * sz, py = Math.sin(a) * sz;
        p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      // Glowing edges
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+100)},${Math.min(255,e.g+80)},${Math.min(255,e.b+60)},0.8)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Inscribed triangle
      ctx.strokeStyle = flash ? '#fff' : `rgba(${Math.min(255,e.r+60)},${Math.min(255,e.g+40)},${Math.min(255,e.b+20)},0.6)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let p = 0; p < 3; p++) {
        const a = hexRot + (p / 3) * Math.PI * 2;
        const px = Math.cos(a) * sz * 0.65, py = Math.sin(a) * sz * 0.65;
        p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      // Inner hex ring detail
      ctx.strokeStyle = flash ? '#fff' : `rgba(${e.r},${e.g},${e.b},0.35)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      for (let p = 0; p < 6; p++) {
