<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ink & Press</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2c2218;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#game{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
canvas{display:block;max-width:100vw;max-height:100vh;image-rendering:auto}
  </style>
</head>
<body>
  <div id="game">
    <canvas id="canvas" width="960" height="600"></canvas>
    <div id="ui">
      <button id="startBtn">Start Tutorial</button>
      <div id="score">Score: 0</div>
    </div>
  </div>
  <script>
// Ink & Press — Complete letterpress printing game
(function(){
'use strict';

const C = document.getElementById('canvas');
const ctx = C.getContext('2d');
const W = 960, H = 640;
C.width = W; C.height = H;

// ── Scaling ──
let scale = 1, offX = 0, offY = 0;
function fit(){
  const vw = window.innerWidth, vh = window.innerHeight;
  scale = Math.min(vw/W, vh/H);
  C.style.width = (W*scale)+'px';
  C.style.height = (H*scale)+'px';
  offX = (vw - W*scale)/2;
  offY = (vh - H*scale)/2;
  C.style.marginLeft = offX+'px';
  C.style.marginTop = offY+'px';
}
window.addEventListener('resize', fit); fit();

function canvasXY(e){
  const r = C.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x:(t.clientX - r.left)/scale, y:(t.clientY - r.top)/scale };
}

// ── Audio (Web Audio API) ──
let audioCtx;
function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function playSound(type){
  ensureAudio();
  const ac = audioCtx;
  const now = ac.currentTime;
  if(type==='snap'){
    const o = ac.createOscillator(), g = ac.createGain();
    o.type='square'; o.frequency.value=800;
    g.gain.setValueAtTime(0.15,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
    o.connect(g); g.connect(ac.destination); o.start(now); o.stop(now+0.06);
  } else if(type==='ink'){
    const buf = ac.createBuffer(1,ac.sampleRate*0.12,ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3))*0.2;
    const s = ac.createBufferSource(); s.buffer=buf; s.connect(ac.destination); s.start(now);
  } else if(type==='press'){
    const o = ac.createOscillator(), g = ac.createGain();
    o.type='sawtooth'; o.frequency.value=60;
    g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    o.connect(g); g.connect(ac.destination); o.start(now); o.stop(now+0.25);
    // thunk noise
    const buf = ac.createBuffer(1,ac.sampleRate*0.15,ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.15))*0.35;
    const s = ac.createBufferSource(); s.buffer=buf; s.connect(ac.destination); s.start(now);
  } else if(type==='star'){
    [523,659,784].forEach((f,i)=>{
      const o = ac.createOscillator(), g = ac.createGain();
      o.type='sine'; o.frequency.value=f;
      const t = now+i*0.12;
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.3);
    });
  }
}

// ── State ──
let state = 'title'; // title, howto, compose, inking, pressing, result, win
let level = 0;
let score = 0;
let totalScore = 0;
let stars = 0;
let shakeT = 0;
let ripples = [];
let splatters = [];

// Level data
const LEVELS = [
  { word:'HELLO', inkRate:0.08, pressWindow:0.10, label:'Level 1 — Tutorial' },
  { word:'PRINT', inkRate:0.14, pressWindow:0.06, label:'Level 2 — Journeyman' },
];

// Compose grid
const GRID_LEFT = 220, GRID_TOP = 300, CELL = 80;
let orderWord = '';
let slots = [];      // target slots on composing stick
let blocks = [];     // draggable letter blocks
let dragBlock = null;
let dragOff = {x:0,y:0};

// Inking
let inkLevel = 0;    // 0..1
let inkTarget = 0.85;
let inkDraining = false;
let inkScore = 0;

// Pressing
let cueAng = -0.25, cueDir = 1;
let pressScore = 0;
let pressActive = false;

// Result
let composeScore = 0;
let resultTimer = 0;

// Animations
let titlePulse = 0;
let pressAnim = 0; // 0..1 for press-down animation

// ── Helpers ──
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.random()*i|0; [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function initLevel(lvl){
  level = lvl;
  const L = LEVELS[lvl];
  orderWord = L.word;
  score = 0;
  inkLevel = 0;
  inkScore = 0;
  pressScore = 0;
  composeScore = 0;
  pressAnim = 0;
  cueAng = -0.25;
  cueDir = 1;
  pressActive = false;
  splatters = [];

  // Build slots
  slots = [];
  const startX = (W - orderWord.length * CELL) / 2;
  for(let i=0;i<orderWord.length;i++){
    slots.push({ letter: orderWord[i], x: startX + i*CELL, y: GRID_TOP, filled: false, placedLetter:'' });
  }

  // Build draggable blocks — the correct letters + a few extras, shuffled
  const letters = orderWord.split('');
  const extras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  while(letters.length < orderWord.length + 3){
    letters.push(extras[Math.random()*26|0]);
  }
  shuffle(letters);
  blocks = [];
  const trayY = 500;
  const trayStartX = (W - letters.length * (CELL+8)) / 2;
  for(let i=0;i<letters.length;i++){
    blocks.push({
      letter: letters[i],
      x: trayStartX + i*(CELL+8),
      y: trayY,
      homeX: trayStartX + i*(CELL+8),
      homeY: trayY,
      snapped: false,
      slotIdx: -1,
    });
  }

  state = 'compose';
  logTest('level_'+lvl+'_started');
}

// ── Drawing ──
function drawParchment(){
  // Warm parchment background
  ctx.fillStyle = '#f5ead6';
  ctx.fillRect(0,0,W,H);
  // Subtle grain
  ctx.globalAlpha = 0.04;
  for(let i=0;i<200;i++){
    ctx.fillStyle = Math.random()>0.5?'#c9a96e':'#8b7355';
    ctx.fillRect(Math.random()*W, Math.random()*H, Math.random()*4+1, Math.random()*4+1);
  }
  ctx.globalAlpha = 1;
  // Wood border
  ctx.strokeStyle = '#8b6f47';
  ctx.lineWidth = 12;
  ctx.strokeRect(6,6,W-12,H-12);
  ctx.strokeStyle = '#c4a97d';
  ctx.lineWidth = 3;
  ctx.strokeRect(14,14,W-28,H-28);
}

function drawTitle(){
  drawParchment();
  // Title
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#3a2a1a';
  ctx.font = 'bold 72px Georgia, serif';
  ctx.fillText('Ink & Press', W/2, 200);
  // Subtitle
  ctx.font = '24px Georgia, serif';
  ctx.fillStyle = '#7a5f42';
  ctx.fillText('A Letterpress Printing Game', W/2, 260);
  // Tap prompt (pulsing)
  const a = 0.5 + 0.5*Math.sin(titlePulse*3);
  ctx.globalAlpha = a;
  ctx.font = 'bold 32px Georgia, serif';
  ctx.fillStyle = '#6b4f3b';
  ctx.fillText('TAP TO PLAY', W/2, 400);
  ctx.globalAlpha = 1;
  // How to play
  ctx.font = '18px Georgia, serif';
  ctx.fillStyle = '#9a7e5f';
  ctx.fillText('Tap "?" for how to play', W/2, 460);
  // ? button
  drawBtn(W-70, 30, 40, 40, '?', '#6b4f3b');
}

function drawHowTo(){
  drawParchment();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#3a2a1a';
  ctx.font = 'bold 36px Georgia, serif';
  ctx.fillText('How to Play', W/2, 60);

  const lines = [
    '1. COMPOSE: Drag letter blocks onto the composing stick',
    '   to match the print order shown above.',
    '',
    '2. INK: Tap rapidly to fill the ink roller.',
    '   Stop near the target line for best results!',
    '',
    '3. PRESS: Wait for the press arm to align,',
    '   then tap at the right moment for a clean print.',
    '',
    '4. Score stars based on accuracy, ink, and timing!',
  ];
  ctx.font = '20px Georgia, serif';
  ctx.fillStyle = '#5a4530';
  ctx.textAlign = 'left';
  for(let i=0;i<lines.length;i++){
    ctx.fillText(lines[i], 120, 130+i*36);
  }
  ctx.textAlign = 'center';
  ctx.font = 'bold 24px Georgia, serif';
  ctx.fillStyle = '#6b4f3b';
  ctx.fillText('TAP ANYWHERE TO START', W/2, 560);
}

function drawBtn(x,y,w,h,text,color){
  ctx.fillStyle = color||'#6b4f3b';
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x+w/2, y+h/2);
}

function drawHUD(){
  // Order preview
  ctx.fillStyle = '#3a2a1a';
  ctx.font = 'bold 20px Georgia, serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(LEVELS[level].label, 30, 30);
  // Order
  ctx.font = 'bold 28px "Courier New", monospace';
  ctx.fillStyle = '#6b4f3b';
  ctx.textAlign = 'center';
  ctx.fillText('Order: '+orderWord, W/2, 30);
  // Score
  ctx.textAlign = 'right';
  ctx.font = 'bold 20px Georgia, serif';
  ctx.fillStyle = '#3a2a1a';
  ctx.fillText('Score: '+totalScore, W-30, 30);
}

function drawInkMeter(){
  const mx = W-80, my = 100, mw = 30, mh = 300;
  // Background
  ctx.fillStyle = '#d4c4a8';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = '#8b6f47';
  ctx.lineWidth = 2;
  ctx.strokeRect(mx, my, mw, mh);
  // Fill
  const fh = mh * inkLevel;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(mx, my+mh-fh, mw, fh);
  // Target line
  const ty = my + mh - mh*inkTarget;
  ctx.strokeStyle = '#c44';
  ctx.lineWidth = 2;
  ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(mx-5,ty); ctx.lineTo(mx+mw+5,ty); ctx.stroke();
  ctx.setLineDash([]);
  // Label
  ctx.fillStyle = '#3a2a1a';
  ctx.font = '14px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('INK', mx+mw/2, my+mh+8);
}

function drawComposingStick(){
  // Stick background
  const sW = orderWord.length * CELL + 20;
  const sX = (W - sW)/2;
  ctx.fillStyle = '#c4a06a';
  ctx.beginPath();
  ctx.roundRect(sX, GRID_TOP-10, sW, CELL+20, 6);
  ctx.fill();
  ctx.strokeStyle = '#8b6f47';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Slots
  for(let i=0;i<slots.length;i++){
    const s = slots[i];
    ctx.fillStyle = s.filled ? '#e8d8b8' : '#dcc89e';
    ctx.strokeStyle = '#a08050';
    ctx.lineWidth = 1;
    ctx.fillRect(s.x+2, s.y+2, CELL-4, CELL-4);
    ctx.strokeRect(s.x+2, s.y+2, CELL-4, CELL-4);
    // Guide letter (faint)
    if(!s.filled){
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#3a2a1a';
      ctx.font = 'bold 40px "Courier New", monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(s.letter, s.x+CELL/2, s.y+CELL/2);
      ctx.globalAlpha = 1;
    }
  }
}

function drawBlock(b){
  const clr = b.snapped ? '#5a3e28' : '#6b4f3b';
  ctx.fillStyle = clr;
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = b === dragBlock ? 12 : 4;
  ctx.shadowOffsetY = b === dragBlock ? 6 : 2;
  ctx.beginPath();
  ctx.roundRect(b.x+2, b.y+2, CELL-4, CELL-4, 6);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  // Letter
  ctx.fillStyle = '#f5ead6';
  ctx.font = 'bold 38px "Courier New", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(b.letter, b.x+CELL/2, b.y+CELL/2);
}

function drawCompose(){
  drawParchment();
  drawHUD();
  drawComposingStick();
  // Blocks (non-dragged first)
  for(const b of blocks){ if(b!==dragBlock) drawBlock(b); }
  if(dragBlock) drawBlock(dragBlock);
  // Instruction
  ctx.fillStyle = '#7a5f42';
  ctx.font = '18px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Drag letters onto the composing stick to match the order', W/2, 260);
  // Done button (if all filled)
  if(slots.every(s=>s.filled)){
    drawBtn(W/2-60, 560, 120, 44, 'INK IT!', '#4a7a3a');
  }
}

function drawInking(){
  drawParchment();
  drawHUD();
  drawInkMeter();
  // Show composed word
  const sW = orderWord.length * CELL + 20;
  const sX = (W - sW)/2;
  ctx.fillStyle = '#c4a06a';
  ctx.beginPath(); ctx.roundRect(sX, 200, sW, CELL+20, 6); ctx.fill();
  for(let i=0;i<slots.length;i++){
    const s = slots[i];
    ctx.fillStyle = '#5a3e28';
    ctx.beginPath(); ctx.roundRect(s.x+2, 202, CELL-4, CELL-4, 6); ctx.fill();
    ctx.fillStyle = '#f5ead6';
    ctx.font = 'bold 38px "Courier New", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(s.placedLetter, s.x+CELL/2, 200+CELL/2);
  }
  // Ink roller visualization
  const rollerW = 300, rollerH = 50;
  const rx = (W-rollerW)/2, ry = 340;
  ctx.fillStyle = '#2a2a3e';
  ctx.beginPath(); ctx.roundRect(rx, ry, rollerW, rollerH, 25); ctx.fill();
  // Ink fill on roller
  const fillW = rollerW * inkLevel;
  ctx.fillStyle = '#0a0a1e';
  ctx.beginPath();
  ctx.roundRect(rx, ry, fillW, rollerH, 25);
  ctx.fill();
  // Instruction
  ctx.fillStyle = '#7a5f42';
  ctx.font = '22px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('TAP to fill the ink roller!', W/2, 440);
  ctx.font = '16px Georgia, serif';
  ctx.fillText('Stop near the red target line', W/2, 470);
  // Done button
  if(inkLevel > 0.3){
    drawBtn(W/2-60, 530, 120, 44, 'PRESS!', '#4a3a7a');
  }
  // Splatters
  drawSplatters();
}

function drawSplatters(){
  ctx.fillStyle = 'rgba(10,10,30,0.5)';
  for(const sp of splatters){
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawPressing(){
  drawParchment();
  drawHUD();
  // Press bed
  ctx.fillStyle = '#c4a06a';
  ctx.fillRect(180, 320, 600, 200);
  ctx.strokeStyle = '#8b6f47'; ctx.lineWidth = 3;
  ctx.strokeRect(180, 320, 600, 200);
  // Paper on bed
  ctx.fillStyle = '#fff8ee';
  ctx.fillRect(230, 340, 500, 160);
  // If press happened, show printed text
  if(pressAnim > 0){
    ctx.globalAlpha = pressAnim;
    ctx.fillStyle = '#1a1a2e';
    ctx.font = 'bold 48px "Courier New", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // Slight offset based on press quality
    const wobble = pressScore < 80 ? (Math.random()-0.5)*3 : 0;
    ctx.fillText(slots.map(s=>s.placedLetter).join(''), W/2 + wobble, 420);
    ctx.globalAlpha = 1;
  }
  // Press arm (cue)
  if(!pressActive || pressAnim < 0.5){
    ctx.save();
    ctx.translate(W/2, 180);
    ctx.rotate(cueAng);
    ctx.fillStyle = '#5a3e28';
    ctx.fillRect(-250, -12, 500, 24);
    // Handle
    ctx.fillStyle = '#8b6f47';
    ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // Target zone indicator
    ctx.strokeStyle = '#4a7a3a';
    ctx.lineWidth = 2;
    ctx.setLineDash([4,4]);
    const zoneW = LEVELS[level].pressWindow * 1200;
    ctx.strokeRect(W/2-zoneW, 166, zoneW*2, 28);
    ctx.setLineDash([]);
  }
  // Instruction
  ctx.fillStyle = '#7a5f42';
  ctx.font = '22px Georgia, serif';
  ctx.textAlign = 'center';
  if(!pressActive){
    ctx.fillText('TAP when the arm is centered!', W/2, 280);
  } else {
    ctx.fillText('Pressing...', W/2, 280);
  }
}

function drawResult(){
  drawParchment();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // Printed result
  ctx.fillStyle = '#fff8ee';
  ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = 15;
  ctx.fillRect(230, 120, 500, 180);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.strokeStyle = '#c4a06a'; ctx.lineWidth = 2;
  ctx.strokeRect(230, 120, 500, 180);
  // Text on paper
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 64px "Courier New", monospace';
  ctx.fillText(slots.map(s=>s.placedLetter).join(''), W/2, 210);

  // Score breakdown
  ctx.font = '22px Georgia, serif';
  ctx.fillStyle = '#3a2a1a';
  const y0 = 340;
  ctx.fillText('Composition: '+composeScore+' / 100', W/2, y0);
  ctx.fillText('Inking: '+inkScore+' / 100', W/2, y0+36);
  ctx.fillText('Press Timing: '+pressScore+' / 100', W/2, y0+72);
  score = composeScore + inkScore + pressScore;
  ctx.font = 'bold 28px Georgia, serif';
  ctx.fillText('Total: '+score+' / 300', W/2, y0+120);

  // Stars
  stars = score >= 270 ? 3 : score >= 200 ? 2 : score >= 100 ? 1 : 0;
  for(let i=0;i<3;i++){
    const sx = W/2 - 80 + i*80;
    ctx.font = '48px Georgia, serif';
    ctx.fillStyle = i < stars ? '#d4a017' : '#c4b8a0';
    ctx.fillText(i < stars ? '\u2605' : '\u2606', sx, y0+175);
  }

  // Next / replay button
  if(level < LEVELS.length-1){
    drawBtn(W/2-80, 560, 160, 44, 'NEXT LEVEL', '#4a7a3a');
  } else {
    drawBtn(W/2-80, 560, 160, 44, 'VIEW RESULTS', '#6b4f3b');
  }
}

function drawWin(){
  drawParchment();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#3a2a1a';
  ctx.font = 'bold 48px Georgia, serif';
  ctx.fillText('Congratulations!', W/2, 140);
  ctx.font = '24px Georgia, serif';
  ctx.fillStyle = '#5a4530';
  ctx.fillText('You completed all print orders!', W/2, 200);
  ctx.font = 'bold 36px Georgia, serif';
  ctx.fillStyle = '#6b4f3b';
  ctx.fillText('Final Score: '+totalScore, W/2, 280);

  // Big stars
  const ts = totalScore;
  const finalStars = ts >= 500 ? 3 : ts >= 350 ? 2 : ts >= 150 ? 1 : 0;
  for(let i=0;i<3;i++){
    ctx.font = '72px Georgia, serif';
    ctx.fillStyle = i < finalStars ? '#d4a017' : '#c4b8a0';
    ctx.fillText(i < finalStars ? '\u2605' : '\u2606', W/2-100+i*100, 380);
  }

  drawBtn(W/2-60, 480, 120, 44, 'REPLAY', '#6b4f3b');
}

function drawRipples(){
  for(const r of ripples){
    ctx.strokeStyle = 'rgba(107,79,59,'+r.alpha+')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2);
    ctx.stroke();
  }
}

// ── Screen shake ──
function applyShake(){
  if(shakeT > 0){
    const intensity = shakeT * 8;
    ctx.translate((Math.random()-0.5)*intensity, (Math.random()-0.5)*intensity);
  }
}

// ── Update ──
function update(dt){
  titlePulse += dt*0.003;
  // Ripples
  for(let i=ripples.length-1;i>=0;i--){
    ripples[i].radius += dt*0.15;
    ripples[i].alpha -= dt*0.003;
    if(ripples[i].alpha <= 0) ripples.splice(i,1);
  }
  // Shake
  if(shakeT > 0) shakeT -= dt*0.004;
  // State-specific
  if(state==='inking' && inkDraining){
    inkLevel -= LEVELS[level].inkRate * dt * 0.01;
    if(inkLevel < 0) inkLevel = 0;
  }
  if(state==='pressing' && !pressActive){
    cueAng += cueDir * dt * 0.002;
    if(cueAng > 0.25){ cueDir = -1; }
    if(cueAng < -0.25){ cueDir = 1; }
  }
  if(state==='pressing' && pressActive){
    pressAnim += dt * 0.004;
    if(pressAnim >= 1){
      pressAnim = 1;
      resultTimer += dt;
      if(resultTimer > 800){
        totalScore += score;
        state = 'result';
        logTest('level_'+level+'_result_score_'+score);
      }
    }
  }
}

// ── Render ──
function render(){
  ctx.save();
  applyShake();
  if(state==='title') drawTitle();
  else if(state==='howto') drawHowTo();
  else if(state==='compose') drawCompose();
  else if(state==='inking') drawInking();
  else if(state==='pressing') drawPressing();
  else if(state==='result') drawResult();
  else if(state==='win') drawWin();
  drawRipples();
  ctx.restore();
}

let last = performance.now();
function loop(t){
  const dt = Math.min(t - last, 50);
  last = t;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input handling ──
function addRipple(x,y){
  ripples.push({x,y,radius:5,alpha:0.6});
}

function hitBtn(px,py, bx,by,bw,bh){
  return px>=bx && px<=bx+bw && py>=by && py<=by+bh;
}

function handleDown(px,py){
  ensureAudio();
  addRipple(px,py);

  if(state==='title'){
    // Check ? button
    if(hitBtn(px,py, W-70,30,40,40)){
      state = 'howto';
      return;
    }
    initLevel(0);
    totalScore = 0;
    return;
  }
  if(state==='howto'){
    initLevel(0);
    totalScore = 0;
    return;
  }
  if(state==='compose'){
    // Check done button
    if(slots.every(s=>s.filled) && hitBtn(px,py, W/2-60,560,120,44)){
      // Calculate compose score
      let correct = 0;
      for(let i=0;i<slots.length;i++){
        if(slots[i].placedLetter === slots[i].letter) correct++;
      }
      composeScore = Math.round((correct / slots.length) * 100);
      inkDraining = true;
      state = 'inking';
      logTest('compose_done_score_'+composeScore);
      return;
    }
    // Try to pick up a block
    for(let i=blocks.length-1;i>=0;i--){
      const b = blocks[i];
      if(px>=b.x && px<=b.x+CELL && py>=b.y && py<=b.y+CELL){
        dragBlock = b;
        dragOff.x = px - b.x;
        dragOff.y = py - b.y;
        // If snapped, unsnap
        if(b.snapped && b.slotIdx >= 0){
          slots[b.slotIdx].filled = false;
          slots[b.slotIdx].placedLetter = '';
          b.snapped = false;
          b.slotIdx = -1;
        }
        // Move to front
        blocks.splice(i,1);
        blocks.push(b);
        return;
      }
    }
    return;
  }
  if(state==='inking'){
    // Tap to add ink
    inkLevel = Math.min(1, inkLevel + 0.08);
    playSound('ink');
    // Add splatter
    splatters.push({x: (W-300)/2+Math.random()*300, y:340+Math.random()*50, r:Math.random()*6+2});
    // Check done button
    if(inkLevel > 0.3 && hitBtn(px,py, W/2-60,530,120,44)){
      // Calculate ink score
      const diff = Math.abs(inkLevel - inkTarget);
      inkScore = Math.max(0, Math.round((1 - diff/0.5) * 100));
      state = 'pressing';
      pressActive = false;
      pressAnim = 0;
      resultTimer = 0;
      logTest('ink_done_score_'+inkScore);
    }
    return;
  }
  if(state==='pressing'){
    if(!pressActive){
      pressActive = true;
      const diff = Math.abs(cueAng);
      const window = LEVELS[level].pressWindow;
      if(diff < window){
        pressScore = Math.round((1 - diff/window) * 100);
      } else {
        pressScore = Math.max(0, Math.round((1 - diff/0.25) * 60));
      }
      shakeT = 1;
      playSound('press');
      logTest('press_score_'+pressScore);
    }
    return;
  }
  if(state==='result'){
    if(level < LEVELS.length-1 && hitBtn(px,py, W/2-80,560,160,44)){
      initLevel(level+1);
      return;
    }
    if(level >= LEVELS.length-1 && hitBtn(px,py, W/2-80,560,160,44)){
      state = 'win';
      playSound('star');
      logTest('game_complete_total_'+totalScore);
      return;
    }
    return;
  }
  if(state==='win'){
    if(hitBtn(px,py, W/2-60,480,120,44)){
      state = 'title';
      totalScore = 0;
      return;
    }
    return;
  }
}

function handleMove(px,py){
  if(state==='compose' && dragBlock){
    dragBlock.x = px - dragOff.x;
    dragBlock.y = py - dragOff.y;
  }
}

function handleUp(px,py){
  if(state==='compose' && dragBlock){
    // Check snap to slot
    let snapped = false;
    for(let i=0;i<slots.length;i++){
      const s = slots[i];
      if(s.filled) continue;
      const cx = dragBlock.x + CELL/2;
      const cy = dragBlock.y + CELL/2;
      const sx = s.x + CELL/2;
      const sy = s.y + CELL/2;
      if(Math.abs(cx-sx) < CELL*0.6 && Math.abs(cy-sy) < CELL*0.6){
        dragBlock.x = s.x;
        dragBlock.y = s.y;
        dragBlock.snapped = true;
        dragBlock.slotIdx = i;
        s.filled = true;
        s.placedLetter = dragBlock.letter;
        snapped = true;
        playSound('snap');
        break;
      }
    }
    if(!snapped){
      // Return to home
      dragBlock.x = dragBlock.homeX;
      dragBlock.y = dragBlock.homeY;
      dragBlock.snapped = false;
      dragBlock.slotIdx = -1;
    }
    dragBlock = null;
  }
}

// Mouse events
C.addEventListener('mousedown', e=>{ e.preventDefault(); const p=canvasXY(e); handleDown(p.x,p.y); });
C.addEventListener('mousemove', e=>{ e.preventDefault(); const p=canvasXY(e); handleMove(p.x,p.y); });
C.addEventListener('mouseup', e=>{ e.preventDefault(); const p=canvasXY(e); handleUp(p.x,p.y); });

// Touch events
C.addEventListener('touchstart', e=>{ e.preventDefault(); const p=canvasXY(e); handleDown(p.x,p.y); }, {passive:false});
C.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.touches[0]; const r=C.getBoundingClientRect(); const p={x:(t.clientX-r.left)/scale, y:(t.clientY-r.top)/scale}; handleMove(p.x,p.y); }, {passive:false});
C.addEventListener('touchend', e=>{ e.preventDefault(); const t=e.changedTouches[0]; const r=C.getBoundingClientRect(); const p={x:(t.clientX-r.left)/scale, y:(t.clientY-r.top)/scale}; handleUp(p.x,p.y); }, {passive:false});

// ── Test logger ──
const testLog = [];
function logTest(entry){
  const line = new Date().toISOString()+' '+entry;
  testLog.push(line);
  console.log('[INK&PRESS]', line);
}

// ── Expose for automated harness ──
window.__INK_PRESS = {
  startTutorial: ()=>{ initLevel(0); totalScore=0; },
  getState: ()=> state,
  press: ()=>{ if(state==='pressing') handleDown(W/2,H/2); },
  readLog: ()=> testLog.slice(),
  getScore: ()=> totalScore,
};

logTest('game_loaded');
})();
  </script>
