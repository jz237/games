<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Photon Dash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;overflow:hidden;overscroll-behavior:none;width:100%;height:100%;background:#000}
canvas{display:block;width:100%;height:100%;touch-action:none}
button{touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// --- Constants ---
const STATES={TITLE:0,PLAYING:1,PAUSED:2,GAME_OVER:3,HIGH_SCORE_ENTRY:4,LEADERBOARD:5};
const SPECTRUM=['#FF0000','#FF7F00','#FFFF00','#00FF00','#0000FF','#4B0082','#8B00FF'];
const SPECTRUM_NAMES=['R','O','Y','G','B','I','V'];
const SPECTRUM_FREQ=[523.25,587.33,659.25,698.46,783.99,880.00,987.77];
const LANE_X=[0.25,0.5,0.75];
const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ';

// --- Game State ---
let W=0,H=0,state=STATES.TITLE,score=0,level=1,combo=0,comboMult=1;
let gameTime=0,lastTime=0,dt=0,speed=1,playerLane=1,playerX=0.5,targetX=0.5;
let spectrumCollected=[false,false,false,false,false,false,false];
let rainbowCycles=0,shakeX=0,shakeY=0,shakeDur=0,shakeInt=0,shakeTime=0;
let levelTransTimer=0,levelTransText='',darkZoneTimer=0,isDarkZone=false;
let deathTimer=0,whiteFlash=0,newHighIdx=-1;
let titleAngle=0,pulseTimer=0;

// --- Object Pools ---
let particles=[];
let obstacles=[];
let collectibles=[];
let prismGates=[];
let trail=[];
let speedLines=[];
let stars=[];
let depthLines=[];
let comboTexts=[];

// --- High Scores ---
let highScores=[];
let hsInitials=[0,0,0]; // indices into CHARS
let hsHighlightIdx=-1;

// --- Audio ---
let audioCtx=null;
let bgOsc=null,bgGain=null;

// --- Touch ---
let touchStartX=0,touchStartY=0,touchStartTime=0,isTouching=false;

// --- Particle Pool ---
const MAX_PARTICLES=500;
for(let i=0;i<MAX_PARTICLES;i++) particles.push({active:false,x:0,y:0,vx:0,vy:0,life:0,maxLife:1,r:3,color:'#fff',shrink:true});

// --- Stars ---
for(let i=0;i<80;i++) stars.push({x:Math.random(),y:Math.random()*0.6,size:Math.random()*1.5+0.5,alpha:Math.random()*0.5+0.3});

// --- Depth lines ---
for(let i=0;i<15;i++) depthLines.push({t:i/15});

function resize(){
  W=canvas.width=window.innerWidth*devicePixelRatio;
  H=canvas.height=window.innerHeight*devicePixelRatio;
  ctx.imageSmoothingEnabled=true;
}
window.addEventListener('resize',resize);
resize();

// --- Audio helpers ---
function initAudio(){
  if(audioCtx) return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    // background drone
    bgOsc=audioCtx.createOscillator();
    bgGain=audioCtx.createGain();
    bgOsc.frequency.value=60;
    bgOsc.type='sine';
    bgGain.gain.value=0;
    bgOsc.connect(bgGain);
    bgGain.connect(audioCtx.destination);
    bgOsc.start();
  }catch(e){}
}

function resumeAudio(){
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume().catch(()=>{});
}

function playTone(freq,dur,type='sine',vol=0.15,freqEnd=null){
  if(!audioCtx) return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type=type;
    o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    if(freqEnd!==null) o.frequency.linearRampToValueAtTime(freqEnd,audioCtx.currentTime+dur);
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function playCollect(colorIdx){
  playTone(SPECTRUM_FREQ[colorIdx],0.15,'sine',0.12);
}

function playGate(){
  if(!audioCtx)return;
  [523.25,659.25,783.99,1046.50].forEach((f,i)=>{
    setTimeout(()=>playTone(f,0.08,'sine',0.1),i*50);
  });
}

function playRainbow(){
  if(!audioCtx)return;
  try{
    const now=audioCtx.currentTime;
    [523.25,659.25,783.99].forEach(f=>{
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(0.08,now+0.25);
      g.gain.linearRampToValueAtTime(0,now+0.5);
      const lp=audioCtx.createBiquadFilter();
      lp.type='lowpass';lp.frequency.value=2000;
      o.connect(lp);lp.connect(g);g.connect(audioCtx.destination);
      o.start(now);o.stop(now+0.5);
    });
  }catch(e){}
}

function playDeath(){
  playTone(600,0.8,'sawtooth',0.15,100);
  if(audioCtx){try{
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.3,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.3*(1-i/d.length);
    const s=audioCtx.createBufferSource();
    const g=audioCtx.createGain();
    s.buffer=buf;g.gain.value=0.1;
    s.connect(g);g.connect(audioCtx.destination);
    s.start();
  }catch(e){}}
}

function playLevelUp(){
  playTone(400,0.1,'triangle',0.12,600);
  setTimeout(()=>playTone(600,0.1,'triangle',0.12,800),100);
}

function playCombo(){
  playTone(1000,0.05,'square',0.08);
}

function setBgDrone(on){
  if(bgGain) bgGain.gain.linearRampToValueAtTime(on?0.03:0,audioCtx.currentTime+0.3);
}

// --- Particle helpers ---
function spawnParticle(x,y,vx,vy,life,color,r=3,shrink=true){
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    if(!p.active){
      p.active=true;p.x=x;p.y=y;p.vx=vx;p.vy=vy;
      p.life=life;p.maxLife=life;p.color=color;p.r=r;p.shrink=shrink;
      return p;
    }
  }
  return null;
}

function burstParticles(x,y,count,color,speed=200,life=0.4,r=3){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*speed;
    spawnParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,life,typeof color==='function'?color():color,r);
  }
}

// --- Shake ---
function triggerShake(intensity,duration){
  shakeInt=intensity*devicePixelRatio;
  shakeDur=duration;
  shakeTime=0;
}

// --- High Scores ---
function loadScores(){
  try{
    const d=localStorage.getItem('photon-dash-highscores');
    highScores=d?JSON.parse(d):[];
  }catch(e){highScores=[];}
}

function saveScores(){
  try{localStorage.setItem('photon-dash-highscores',JSON.stringify(highScores.slice(0,10)));}catch(e){}
}

function qualifiesForHighScore(s){
  return highScores.length<10||s>highScores[highScores.length-1].score;
}

function addHighScore(initials,s,lv,rc){
  highScores.push({initials,score:s,level:lv,rainbows:rc,date:Date.now()});
  highScores.sort((a,b)=>b.score-a.score);
  highScores=highScores.slice(0,10);
  hsHighlightIdx=highScores.findIndex(h=>h.initials===initials&&h.score===s);
  saveScores();
}

loadScores();

// --- Game Init ---
function resetGame(){
  score=0;level=1;combo=0;comboMult=1;gameTime=0;speed=1;
  playerLane=1;playerX=0.5;targetX=0.5;
  spectrumCollected=[false,false,false,false,false,false,false];
  rainbowCycles=0;
  obstacles=[];collectibles=[];prismGates=[];trail=[];comboTexts=[];
  speedLines=[];
  levelTransTimer=0;darkZoneTimer=0;isDarkZone=false;
  deathTimer=0;whiteFlash=0;
  particles.forEach(p=>p.active=false);
  depthLines.forEach((d,i)=>d.t=i/15);
  newHighIdx=-1;hsHighlightIdx=-1;
  hsInitials=[0,0,0];
  spawnTimer=0;gateTimer=0;darkTimer=0;
}

// --- Spawning ---
let spawnTimer=0,gateTimer=0,darkTimer=0;
const SPAWN_INTERVAL_BASE=1.2;

function spawnWave(){
  const useLanes=level<2?[0,1]:[0,1,2];
  // spawn prism
  const lane=useLanes[Math.floor(Math.random()*useLanes.length)];
  const colorIdx=Math.floor(Math.random()*7);
  collectibles.push({lane,t:0,color:colorIdx,rot:0,collected:false});

  // spawn dark shard from level 3+
  if(level>=3&&Math.random()<Math.min(0.3+level*0.05,0.7)){
    let shardLane;
    do{shardLane=Math.floor(Math.random()*3);}while(shardLane===lane);
    obstacles.push({lane:shardLane,t:0,rot:0});
    // level 5+ can have paired shards
    if(level>=5&&Math.random()<0.3){
      let lane2;
      do{lane2=Math.floor(Math.random()*3);}while(lane2===lane||lane2===shardLane);
      obstacles.push({lane:lane2,t:0,rot:0});
    }
  }
}

// --- Level Check ---
function checkLevel(){
  let newLevel=1;
  if(gameTime>=130) newLevel=6+Math.floor((gameTime-130)/40);
  else if(gameTime>=90) newLevel=5;
  else if(gameTime>=60) newLevel=4;
  else if(gameTime>=35) newLevel=3;
  else if(gameTime>=15) newLevel=2;

  if(newLevel>level){
    level=newLevel;
    speed=1+[0,0,0.3,0.5,0.7,1.0][Math.min(level,6)-1]+(level>6?(level-6)*0.1:0);
    levelTransTimer=1.5;
    levelTransText='LEVEL '+level;
    score+=500*level;
    playLevelUp();
    triggerShake(3,0.2);
  }
}

// --- Collision ---
function getScreenPos(lane,t){
  const vpx=W*0.5, vpy=H*0.3;
  const bx=LANE_X[lane]*W, by=H;
  const progress=Math.min(t,1);
  const x=vpx+(bx-vpx)*progress;
  const y=vpy+(by-vpy)*progress;
  const scale=progress;
  return {x,y,scale};
}

// --- Update ---
function update(){
  const now=performance.now();
  dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  // Shake
  if(shakeDur>0){
    shakeTime+=dt;
    if(shakeTime<shakeDur){
      const frac=1-shakeTime/shakeDur;
      shakeX=(Math.random()*2-1)*shakeInt*frac;
      shakeY=(Math.random()*2-1)*shakeInt*frac;
    }else{
      shakeDur=0;shakeX=0;shakeY=0;
    }
  }

  // Pulse timer
  pulseTimer+=dt;

  if(state===STATES.TITLE){
    titleAngle+=dt*0.3;
  }

  if(state===STATES.PLAYING){
    if(levelTransTimer>0){
      levelTransTimer-=dt;
      return;
    }

    gameTime+=dt;
    score+=10*dt;

    // Player movement
    targetX=LANE_X[playerLane];
    const diff=targetX-playerX;
    playerX+=diff*Math.min(1,dt*8);

    // Trail
    const px=playerX*W, py=H*0.8;
    trail.unshift({x:px,y:py,alpha:1});
    if(trail.length>15) trail.pop();
    trail.forEach(t=>t.alpha-=dt*2);

    // Photon trail particles
    for(let i=0;i<Math.ceil(20*dt*60);i++){
      spawnParticle(px+(Math.random()-0.5)*8*devicePixelRatio,py+(Math.random()-0.5)*8*devicePixelRatio,
        (Math.random()-0.5)*30,Math.random()*50+20,0.5,
        Math.random()>0.5?'rgba(200,220,255,0.8)':'rgba(255,255,255,0.6)',
        2*devicePixelRatio,true);
    }

    // Spawn
    spawnTimer+=dt;
    const interval=SPAWN_INTERVAL_BASE/speed;
    if(spawnTimer>=interval){
      spawnTimer-=interval;
      spawnWave();
    }

    // Gate timer
    gateTimer+=dt;
    if(gateTimer>=30+Math.random()*10&&level>=4){
      gateTimer=0;
      prismGates.push({t:0});
    }

    // Dark zones level 6+
    if(level>=6){
      darkTimer+=dt;
      if(!isDarkZone&&darkTimer>20+Math.random()*15){
        isDarkZone=true;darkZoneTimer=3;darkTimer=0;
      }
      if(isDarkZone){
        darkZoneTimer-=dt;
        if(darkZoneTimer<=0) isDarkZone=false;
      }
    }

    // Speed lines at higher speeds
    if(speed>1.3){
      for(let i=0;i<Math.ceil(speed*dt*15);i++){
        speedLines.push({x:Math.random()*W,y:0,len:Math.random()*50+30,speed:Math.random()*500+400,alpha:Math.random()*0.3+0.1});
      }
    }

    // Update speed lines
    for(let i=speedLines.length-1;i>=0;i--){
      speedLines[i].y+=speedLines[i].speed*dt*speed;
      if(speedLines[i].y>H) speedLines.splice(i,1);
    }

    // Update collectibles
    for(let i=collectibles.length-1;i>=0;i--){
      const c=collectibles[i];
      c.t+=dt*0.5*speed;
      c.rot+=dt*2;
      if(c.t>1.05){
        if(!c.collected){
          combo=0;comboMult=1;
        }
        collectibles.splice(i,1);
        continue;
      }
      if(!c.collected&&c.t>0.75&&c.t<0.95){
        const pos=getScreenPos(c.lane,c.t);
        const pdist=Math.abs(pos.x-playerX*W);
        if(pdist<40*devicePixelRatio&&pos.y>H*0.7){
          c.collected=true;
          score+=100*comboMult;
          combo++;
          if(combo>=10) comboMult=5;
          else if(combo>=6) comboMult=3;
          else if(combo>=3) comboMult=2;
          else comboMult=1;

          if(comboMult>1){
            comboTexts.push({text:'×'+comboMult+'!',x:pos.x,y:pos.y,life:0.8,maxLife:0.8,scale:0});
            playCombo();
          }

          spectrumCollected[c.color]=true;
          burstParticles(pos.x,pos.y,30,SPECTRUM[c.color],150*devicePixelRatio,0.4,3*devicePixelRatio);
          playCollect(c.color);
          triggerShake(2,0.1);

          // Check rainbow
          if(spectrumCollected.every(v=>v)){
            rainbowCycles++;
            score+=1000;
            spectrumCollected=[false,false,false,false,false,false,false];
            burstParticles(px,py,100,()=>SPECTRUM[Math.floor(Math.random()*7)],250*devicePixelRatio,0.6,4*devicePixelRatio);
            playRainbow();
            triggerShake(5,0.3);
            whiteFlash=0.2;
          }
        }
      }
    }

    // Update obstacles
    for(let i=obstacles.length-1;i>=0;i--){
      const o=obstacles[i];
      o.t+=dt*0.5*speed;
      o.rot+=dt*3;
      if(o.t>1.1){obstacles.splice(i,1);continue;}
      if(o.t>0.75&&o.t<0.95){
        const pos=getScreenPos(o.lane,o.t);
        const pdist=Math.abs(pos.x-playerX*W);
        if(pdist<35*devicePixelRatio&&pos.y>H*0.7){
          // Death
          state=STATES.GAME_OVER;
          deathTimer=0;
          whiteFlash=0.3;
          burstParticles(px,py,150,()=>SPECTRUM[Math.floor(Math.random()*7)],300*devicePixelRatio,1.5,4*devicePixelRatio);
          playDeath();
          triggerShake(10,0.5);
          setBgDrone(false);
          return;
        }
      }
      // Warning particles
      if(o.t>0.5){
        const pos=getScreenPos(o.lane,o.t);
        if(Math.random()<0.3) spawnParticle(pos.x+(Math.random()-0.5)*20,pos.y+(Math.random()-0.5)*20,
          (Math.random()-0.5)*40,(Math.random()-0.5)*40,0.3,'rgba(255,50,50,0.6)',2*devicePixelRatio,true);
      }
    }

    // Update prism gates
    for(let i=prismGates.length-1;i>=0;i--){
      const g=prismGates[i];
      g.t+=dt*0.5*speed;
      if(g.t>1.1){prismGates.splice(i,1);continue;}
      if(g.t>0.75&&g.t<0.95&&!g.collected){
        const pos=getScreenPos(1,g.t);
        if(pos.y>H*0.7){
          g.collected=true;
          score+=500;
          spectrumCollected=[true,true,true,true,true,true,true];
          for(let j=0;j<60;j++){
            spawnParticle(Math.random()*W,pos.y,(Math.random()-0.5)*100,Math.random()*200+50,
              0.6,SPECTRUM[Math.floor(Math.random()*7)],3*devicePixelRatio,true);
          }
          playGate();
          triggerShake(3,0.15);
          // Check rainbow immediately
          if(spectrumCollected.every(v=>v)){
            rainbowCycles++;
            score+=1000;
            spectrumCollected=[false,false,false,false,false,false,false];
            playRainbow();
            triggerShake(5,0.3);
            whiteFlash=0.2;
          }
        }
      }
    }

    // Update depth lines
    depthLines.forEach(d=>{
      d.t+=dt*0.3*speed;
      if(d.t>1) d.t-=1;
    });

    // White flash
    if(whiteFlash>0) whiteFlash-=dt;

    checkLevel();
  }

  if(state===STATES.GAME_OVER){
    deathTimer+=dt;
    if(whiteFlash>0) whiteFlash-=dt;
  }

  // Update particles
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    if(!p.active) continue;
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.life-=dt;
    if(p.life<=0) p.active=false;
  }

  // Update combo texts
  for(let i=comboTexts.length-1;i>=0;i--){
    const c=comboTexts[i];
    c.life-=dt;
    c.y-=60*dt;
    c.scale=Math.min(1,(c.maxLife-c.life)*10);
    if(c.life<=0) comboTexts.splice(i,1);
  }

  // Stars
  stars.forEach(s=>{
    s.y+=dt*0.01;
    if(s.y>0.6) s.y=0;
  });
}

// --- Drawing ---
function drawGlow(x,y,r,color,alpha=0.3){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,color);
  g.addColorStop(1,'transparent');
  ctx.globalAlpha=alpha;
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;
}

function drawHex(x,y,r,rot,fillColor,strokeColor){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot);
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=Math.PI/3*i-Math.PI/6;
    const px=Math.cos(a)*r, py=Math.sin(a)*r;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
  if(fillColor){ctx.fillStyle=fillColor;ctx.fill();}
  if(strokeColor){ctx.strokeStyle=strokeColor;ctx.lineWidth=2*devicePixelRatio;ctx.stroke();}
  ctx.restore();
}

function drawCorridor(){
  const vpx=W*0.5, vpy=H*0.3;
  const wallAlpha=isDarkZone?Math.max(0,darkZoneTimer/3*0.3):1;

  // Background nebula
  const nebula=ctx.createRadialGradient(W*0.5,H*0.3,0,W*0.5,H*0.3,H*0.6);
  nebula.addColorStop(0,'#0a0015');
  nebula.addColorStop(0.5,'#050010');
  nebula.addColorStop(1,'#000005');
  ctx.fillStyle=nebula;
  ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    ctx.globalAlpha=s.alpha;
    ctx.fillStyle='#fff';
    ctx.fillRect(s.x*W,s.y*H,s.size*devicePixelRatio,s.size*devicePixelRatio);
  });
  ctx.globalAlpha=1;

  // Speed lines
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1;
  speedLines.forEach(sl=>{
    ctx.globalAlpha=sl.alpha;
    ctx.beginPath();
    ctx.moveTo(sl.x,sl.y);
    ctx.lineTo(sl.x,sl.y+sl.len);
    ctx.stroke();
  });
  ctx.globalAlpha=1;

  if(wallAlpha<0.05) return;
  ctx.globalAlpha=wallAlpha;

  // Corridor walls
  const gradient=ctx.createLinearGradient(0,H,0,vpy);
  gradient.addColorStop(0,'#1a0040');
  gradient.addColorStop(1,'#0a0020');

  // Left wall
  ctx.beginPath();
  ctx.moveTo(0,H);ctx.lineTo(vpx,vpy);ctx.lineTo(vpx-2,vpy);ctx.lineTo(0,H);
  ctx.fillStyle=gradient;ctx.fill();

  // Right wall
  ctx.beginPath();
  ctx.moveTo(W,H);ctx.lineTo(vpx,vpy);ctx.lineTo(vpx+2,vpy);ctx.lineTo(W,H);
  ctx.fill();

  // Wall edge glow
  ctx.shadowBlur=20*devicePixelRatio;
  ctx.shadowColor='#4444ff';
  ctx.strokeStyle='#3333ff';
  ctx.lineWidth=2*devicePixelRatio;
  ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(vpx,vpy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W,H);ctx.lineTo(vpx,vpy);ctx.stroke();
  ctx.shadowBlur=0;

  // Depth lines
  depthLines.forEach(d=>{
    const t=d.t;
    const y=vpy+(H-vpy)*t;
    const lx=vpx*(1-t);
    const rx=W-vpx*(1-t);
    const alpha=t*0.4;
    ctx.strokeStyle=`rgba(80,80,200,${alpha})`;
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(lx,y);ctx.lineTo(rx,y);ctx.stroke();
  });

  // Wall glow particles
  if(Math.random()<0.2){
    const side=Math.random()>0.5?1:0;
    const t=Math.random();
    const wy=vpy+(H-vpy)*t;
    const wx=side?vpx+(W-vpx)*t:vpx*(1-t);
    spawnParticle(wx,wy,(Math.random()-0.5)*20,(Math.random()-0.5)*20,0.5,
      'rgba(100,100,255,0.3)',2*devicePixelRatio,true);
  }

  ctx.globalAlpha=1;
}

function drawCollectible(c){
  const pos=getScreenPos(c.lane,c.t);
  const r=18*pos.scale*devicePixelRatio;
  if(r<1||c.collected) return;

  // Glow
  drawGlow(pos.x,pos.y,r*3,SPECTRUM[c.color],0.2);

  // Hexagon
  const grad=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,r);
  grad.addColorStop(0,'#ffffff');
  grad.addColorStop(0.4,SPECTRUM[c.color]);
  grad.addColorStop(1,SPECTRUM[c.color]+'80');
  drawHex(pos.x,pos.y,r,c.rot,grad,'#ffffff');

  // Internal light rays
  ctx.save();
  ctx.translate(pos.x,pos.y);
  ctx.rotate(c.rot*0.5);
  ctx.strokeStyle='rgba(255,255,255,0.4)';
  ctx.lineWidth=1;
  for(let i=0;i<3;i++){
    const a=Math.PI*2/3*i;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*r*0.7,Math.sin(a)*r*0.7);
    ctx.stroke();
  }
  ctx.restore();
}

function drawObstacle(o){
  const pos=getScreenPos(o.lane,o.t);
  const r=16*pos.scale*devicePixelRatio;
  if(r<1) return;

  // Dark glow
  drawGlow(pos.x,pos.y,r*2.5,'#4B0082',0.3);

  // Jagged shape
  ctx.save();
  ctx.translate(pos.x,pos.y);
  ctx.rotate(o.rot);
  ctx.beginPath();
  const points=7;
  for(let i=0;i<points;i++){
    const a=Math.PI*2/points*i;
    const cr=r*(0.7+Math.sin(i*2.5)*0.3);
    i===0?ctx.moveTo(Math.cos(a)*cr,Math.sin(a)*cr):ctx.lineTo(Math.cos(a)*cr,Math.sin(a)*cr);
  }
  ctx.closePath();
  const sg=ctx.createRadialGradient(0,0,0,0,0,r);
  sg.addColorStop(0,'#1a0030');
  sg.addColorStop(1,'#0a0015');
  ctx.fillStyle=sg;ctx.fill();
  ctx.strokeStyle='#6a00aa';ctx.lineWidth=2*devicePixelRatio;ctx.stroke();
  ctx.shadowBlur=15*devicePixelRatio;ctx.shadowColor='#4B0082';
  ctx.stroke();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawPrismGate(g){
  const pos=getScreenPos(1,g.t);
  if(g.collected) return;
  const y=pos.y;
  const spread=W*0.35*pos.scale;
  const cx=W*0.5;

  ctx.save();
  ctx.globalAlpha=0.7*pos.scale;
  SPECTRUM.forEach((col,i)=>{
    const arcR=spread-i*4*devicePixelRatio;
    if(arcR<5) return;
    ctx.strokeStyle=col;
    ctx.lineWidth=3*devicePixelRatio;
    ctx.beginPath();
    ctx.arc(cx,y+20*pos.scale,arcR,Math.PI,0);
    ctx.stroke();
  });

  // Shimmer particles
  if(Math.random()<0.3){
    spawnParticle(cx+(Math.random()-0.5)*spread*2,y,(Math.random()-0.5)*30,Math.random()*40,
      0.4,SPECTRUM[Math.floor(Math.random()*7)],2*devicePixelRatio,true);
  }
  ctx.restore();
}

function drawPhoton(){
  const px=playerX*W, py=H*0.8;
  const baseR=12*devicePixelRatio;
  const pulse=Math.sin(pulseTimer*Math.PI*4)*2*devicePixelRatio;

  // Trail
  trail.forEach((t,i)=>{
    if(t.alpha<=0) return;
    ctx.globalAlpha=t.alpha*0.3;
    ctx.fillStyle='rgba(200,220,255,0.5)';
    ctx.beginPath();
    ctx.arc(t.x,t.y,baseR*(1-i/trail.length)*0.6,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;

  // Outer glow (spectrum color)
  const nextColor=spectrumCollected.indexOf(false);
  const glowCol=nextColor>=0?SPECTRUM[nextColor]:'#ffffff';
  drawGlow(px,py,(baseR+pulse)*2.5,glowCol,0.25);

  // Inner glow
  drawGlow(px,py,(baseR+pulse)*1.7,'#ffffff',0.4);

  // Core
  const cg=ctx.createRadialGradient(px,py,0,px,py,baseR+pulse);
  cg.addColorStop(0,'#ffffff');
  cg.addColorStop(0.7,'#ddeeff');
  cg.addColorStop(1,'rgba(200,220,255,0)');
  ctx.fillStyle=cg;
  ctx.beginPath();
  ctx.arc(px,py,baseR+pulse,0,Math.PI*2);
  ctx.fill();

  // Bloom pass
  ctx.globalAlpha=0.15;
  ctx.beginPath();
  ctx.arc(px,py,(baseR+pulse)*2,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;
}

function drawHUD(){
  const fs=Math.max(14,W*0.035);
  ctx.font=`bold ${fs}px monospace`;
  ctx.textBaseline='top';

  // Score
  ctx.fillStyle='#fff';
  ctx.textAlign='left';
  ctx.fillText(`${Math.floor(score)}`,W*0.15,H*0.02);

  // Level
  ctx.textAlign='center';
  ctx.fillText(`LV ${level}`,W*0.5,H*0.02);

  // Rainbow meter
  const mw=fs*0.9;
  const mx=W-7*mw-W*0.05;
  const my=H*0.02;
  SPECTRUM.forEach((col,i)=>{
    const filled=spectrumCollected[i];
    ctx.fillStyle=filled?col:'#222';
    ctx.globalAlpha=filled?1:0.4;
    ctx.fillRect(mx+i*mw,my,mw-2,fs);
    if(filled){
      ctx.shadowBlur=8*devicePixelRatio;
      ctx.shadowColor=col;
      ctx.fillRect(mx+i*mw,my,mw-2,fs);
      ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='#fff';
    ctx.font=`bold ${fs*0.5}px monospace`;
    ctx.textAlign='center';
    ctx.fillText(SPECTRUM_NAMES[i],mx+i*mw+mw/2-1,my+fs*0.25);
    ctx.font=`bold ${fs}px monospace`;
  });

  // Rainbow cycles count
  if(rainbowCycles>0){
    ctx.fillStyle='#ffd700';
    ctx.textAlign='left';
    ctx.font=`bold ${fs*0.7}px monospace`;
    ctx.fillText(`🌈${rainbowCycles}`,mx+7*mw+4,my+fs*0.15);
    ctx.font=`bold ${fs}px monospace`;
  }

  // Pause button
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.textAlign='left';
  const pauseSize=22*devicePixelRatio;
  ctx.fillRect(W*0.02,H*0.02,pauseSize*0.35,pauseSize);
  ctx.fillRect(W*0.02+pauseSize*0.55,H*0.02,pauseSize*0.35,pauseSize);
}

function drawComboTexts(){
  comboTexts.forEach(c=>{
    const alpha=c.life/c.maxLife;
    const s=c.scale;
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#ffd700';
    const fs=Math.max(20,W*0.06)*s;
    ctx.font=`bold ${fs}px monospace`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.shadowBlur=10*devicePixelRatio;
    ctx.shadowColor='#ffd700';
    ctx.fillText(c.text,c.x,c.y);
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  });
}

function drawParticles(){
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    if(!p.active) continue;
    const alpha=p.life/p.maxLife;
    const r=p.shrink?p.r*alpha:p.r;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,Math.max(0.5,r),0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawTitle(){
  // Rotating prismatic beams
  const cx=W*0.5, cy=H*0.4;
  for(let i=0;i<12;i++){
    const a=titleAngle+Math.PI*2/12*i;
    const len=Math.min(W,H)*0.6;
    const grad=ctx.createLinearGradient(cx,cy,cx+Math.cos(a)*len,cy+Math.sin(a)*len);
    grad.addColorStop(0,SPECTRUM[i%7]+'40');
    grad.addColorStop(1,'transparent');
    ctx.strokeStyle=grad;
    ctx.lineWidth=3*devicePixelRatio;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);
    ctx.stroke();
  }

  // Title with chromatic aberration
  const titleFs=Math.max(32,W*0.09);
  ctx.font=`bold ${titleFs}px monospace`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  const off=3*devicePixelRatio;
  ctx.globalAlpha=0.5;
  ctx.fillStyle='#ff0000';
  ctx.fillText('PHOTON DASH',cx-off,cy);
  ctx.fillStyle='#0000ff';
  ctx.fillText('PHOTON DASH',cx+off,cy);
  ctx.globalAlpha=1;
  ctx.fillStyle='#ffffff';
  ctx.fillText('PHOTON DASH',cx,cy);

  // Subtitle
  const subFs=Math.max(16,W*0.04);
  ctx.font=`${subFs}px monospace`;
  const subAlpha=0.5+Math.sin(pulseTimer*3)*0.3;
  ctx.globalAlpha=subAlpha;
  ctx.fillStyle='#aaccff';
  ctx.fillText('Swipe to Refract',cx,cy+titleFs*0.8);
  ctx.globalAlpha=1;

  // Tap to start
  const tapFs=Math.max(14,W*0.035);
  ctx.font=`${tapFs}px monospace`;
  ctx.fillStyle='#ffffff';
  const tapAlpha=0.4+Math.sin(pulseTimer*4)*0.3;
  ctx.globalAlpha=tapAlpha;
  ctx.fillText('TAP TO START',cx,H*0.7);
  ctx.globalAlpha=1;

  // High scores button
  const btnFs=Math.max(12,W*0.03);
  ctx.font=`${btnFs}px monospace`;
  ctx.fillStyle='#ffd700';
  ctx.textAlign='right';
  ctx.fillText('🏆 HIGH SCORES',W*0.95,H*0.92);
}

function drawPaused(){
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,H);
  const fs=Math.max(28,W*0.08);
  ctx.font=`bold ${fs}px monospace`;
  ctx.fillStyle='#fff';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('PAUSED',W*0.5,H*0.35);

  // Buttons
  const btnW=W*0.35, btnH=H*0.07;
  const btnY1=H*0.5, btnY2=H*0.62;

  // Resume
  ctx.fillStyle='#2244aa';
  ctx.fillRect(W*0.5-btnW/2,btnY1,btnW,btnH);
  ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.max(16,W*0.04)}px monospace`;
  ctx.fillText('RESUME',W*0.5,btnY1+btnH/2);

  // Quit
  ctx.fillStyle='#662222';
  ctx.fillRect(W*0.5-btnW/2,btnY2,btnW,btnH);

function drawGameOver(){
  ctx.fillStyle=`rgba(0,0,0,${Math.min(0.7,deathTimer*0.7)})`;
  ctx.fillRect(0,0,W,H);

  if(deathTimer<0.5) return;

  const fs=Math.max(28,W*0.08);
  ctx.font=`bold ${fs}px monospace`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  // Glitch text
  const off=Math.sin(deathTimer*20)*3*devicePixelRatio*(Math.max(0,1-deathTimer));
  ctx.globalAlpha=0.5;
  ctx.fillStyle='#ff0000';
  ctx.fillText('SCATTERED',W*0.5-off,H*0.25);
  ctx.fillStyle='#0000ff';
  ctx.fillText('SCATTERED',W*0.5+off,H*0.25);
  ctx.globalAlpha=1;
  ctx.fillStyle='#fff';
  ctx.fillText('SCATTERED',W*0.5,H*0.25);

  // Stats
  const sfs=Math.max(14,W*0.035);
  ctx.font=`${sfs}px monospace`;
  ctx.fillStyle='#aaa';
  ctx.fillText(`Score: ${Math.floor(score)}`,W*0.5,H*0.4);
  ctx.fillText(`Level: ${level}`,W*0.5,H*0.4+sfs*1.5);
  ctx.fillText(`Rainbow Cycles: ${rainbowCycles}`,W*0.5,H*0.4+sfs*3);

  if(deathTimer>1.5){
    if(qualifiesForHighScore(Math.floor(score))){
      const tapFs=Math.max(14,W*0.035);
      ctx.font=`${tapFs}px monospace`;
      ctx.fillStyle='#ffd700';
      const a=0.5+Math.sin(pulseTimer*4)*0.3;
      ctx.globalAlpha=a;
      ctx.fillText('NEW HIGH SCORE! TAP TO CONTINUE',W*0.5,H*0.7);
      ctx.globalAlpha=1;
    }else{
      const tapFs=Math.max(14,W*0.035);
      ctx.font=`${tapFs}px monospace`;
      ctx.fillStyle='#888';
      const a=0.5+Math.sin(pulseTimer*4)*0.3;
      ctx.globalAlpha=a;
      ctx.fillText('TAP TO CONTINUE',W*0.5,H*0.7);
      ctx.globalAlpha=1;
    }
  }
}

function drawHighScoreEntry(){
  ctx.fillStyle='rgba(0,0,0,0.85)';
  ctx.fillRect(0,0,W,H);

  const fs=Math.max(22,W*0.06);
  ctx.font=`bold ${fs}px monospace`;
  ctx.fillStyle='#ffd700';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('NEW HIGH SCORE!',W*0.5,H*0.12);

  ctx.font=`${fs*0.6}px monospace`;
  ctx.fillStyle='#fff';
  ctx.fillText(`${Math.floor(score)}`,W*0.5,H*0.2);

  // 3 letter entry
  const colW=W*0.18;
  const startX=W*0.5-colW*1.5;
  const charFs=Math.max(28,W*0.08);
  const btnSize=Math.max(40,W*0.1);

  for(let i=0;i<3;i++){
    const cx=startX+colW*(i+0.5);
    const cy=H*0.45;

    // Up arrow
    ctx.fillStyle='#4466cc';
    ctx.beginPath();
    ctx.moveTo(cx,cy-charFs-btnSize*0.6);
    ctx.lineTo(cx-btnSize*0.4,cy-charFs-btnSize*0.1);
    ctx.lineTo(cx+btnSize*0.4,cy-charFs-btnSize*0.1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='#6688ee';ctx.lineWidth=2;ctx.stroke();

    // Letter
    ctx.font=`bold ${charFs}px monospace`;
    ctx.fillStyle='#fff';
    ctx.fillText(CHARS[hsInitials[i]],cx,cy);

    // Down arrow
    ctx.fillStyle='#4466cc';
    ctx.beginPath();
    ctx.moveTo(cx,cy+charFs*0.5+btnSize*0.6);
    ctx.lineTo(cx-btnSize*0.4,cy+charFs*0.5+btnSize*0.1);
    ctx.lineTo(cx+btnSize*0.4,cy+charFs*0.5+btnSize*0.1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='#6688ee';ctx.lineWidth=2;ctx.stroke();
  }

  // Confirm button
  const btnW=W*0.4, btnH=H*0.07;
  const btnY=H*0.75;
  ctx.fillStyle='#228822';
  ctx.fillRect(W*0.5-btnW/2,btnY,btnW,btnH);
  ctx.strokeStyle='#44cc44';
  ctx.lineWidth=2;
  ctx.strokeRect(W*0.5-btnW/2,btnY,btnW,btnH);
  ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.max(16,W*0.04)}px monospace`;
  ctx.fillText('CONFIRM',W*0.5,btnY+btnH/2);
}

function drawLeaderboard(){
  ctx.fillStyle='rgba(0,0,10,0.95)';
  ctx.fillRect(0,0,W,H);

  const fs=Math.max(22,W*0.06);
  ctx.font=`bold ${fs}px monospace`;
  ctx.fillStyle='#fff';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('HIGH SCORES',W*0.5,H*0.08);

  // Rainbow underline
  const uw=W*0.5;
  const ux=W*0.25;
  const uy=H*0.08+fs*0.6;
  SPECTRUM.forEach((c,i)=>{
    ctx.fillStyle=c;
    ctx.fillRect(ux+uw/7*i,uy,uw/7,3*devicePixelRatio);
  });

  const entryFs=Math.max(12,W*0.03);
  ctx.font=`${entryFs}px monospace`;
  const lineH=H*0.065;
  const startY=H*0.18;

  for(let i=0;i<10;i++){

    if(isNew){
      ctx.fillStyle='rgba(255,215,0,0.15)';
      ctx.fillRect(W*0.1,y-lineH*0.4,W*0.8,lineH*0.85);

    }

    ctx.fillStyle=isNew?'#ffd700':'#aaa';
    ctx.textAlign='left';
    ctx.fillText(`${i+1}.`,W*0.12,y);
    if(entry){

      ctx.textAlign='right';
      ctx.fillText(`${entry.score}`,W*0.65,y);
      ctx.fillText(`LV${entry.level}`,W*0.85,y);
    }else{
      ctx.fillText('---',W*0.22,y);
      ctx.textAlign='right';
      ctx.fillText('---',W*0.65,y);
      ctx.fillText('---',W*0.85,y);
    }
    ctx.shadowBlur=0;
  }

  // Back button

  const btnY=H*0.9;
  ctx.fillStyle='#333';
  ctx.fillRect(W*0.5-btnW/2,btnY,btnW,btnH);
  ctx.strokeStyle='#666';ctx.lineWidth=2;
  ctx.strokeRect(W*0.5-btnW/2,btnY,btnW,btnH);
  ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.max(14,W*0.035)}px monospace`;
  ctx.textAlign='center';
  ctx.fillText('BACK',W*0.5,btnY+btnH/2);
}

function drawLevelTransition(){
  if(levelTransTimer<=0) return;
  const alpha=Math.min(1,levelTransTimer*2);
  ctx.globalAlpha=alpha;

  const fs=Math.max(32,W*0.1);
  ctx.font=`bold ${fs}px monospace`;
  ctx.fillStyle='#fff';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.shadowBlur=20*devicePixelRatio;
  ctx.shadowColor='#4488ff';
  ctx.fillText(levelTransText,W*0.5,H*0.4);
  ctx.shadowBlur=0;

  // Expanding ring
  const ringR=(1.5-levelTransTimer)/1.5*Math.min(W,H)*0.3;
  ctx.strokeStyle=`rgba(100,150,255,${alpha*0.5})`;
  ctx.lineWidth=3*devicePixelRatio;
  ctx.beginPath();
  ctx.arc(W*0.5,H*0.4,ringR,0,Math.PI*2);
  ctx.stroke();

  ctx.globalAlpha=1;
}

// --- Main draw ---
function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.save();
  ctx.translate(shakeX,shakeY);

  if(state===STATES.TITLE){
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{
      ctx.globalAlpha=s.alpha;
      ctx.fillStyle='#fff';
      ctx.fillRect(s.x*W,s.y*H,s.size*devicePixelRatio,s.size*devicePixelRatio);
    });
    ctx.globalAlpha=1;
    drawTitle();
  }

  if(state===STATES.PLAYING||state===STATES.PAUSED||state===STATES.GAME_OVER){
    drawCorridor();

    // Draw game objects sorted by t (far to near)
    const allObjs=[];
    collectibles.forEach(c=>allObjs.push({type:'c',obj:c,t:c.t}));
    obstacles.forEach(o=>allObjs.push({type:'o',obj:o,t:o.t}));
    prismGates.forEach(g=>allObjs.push({type:'g',obj:g,t:g.t}));
    allObjs.sort((a,b)=>a.t-b.t);
    allObjs.forEach(item=>{
      if(item.type==='c') drawCollectible(item.obj);
      else if(item.type==='o') drawObstacle(item.obj);
      else drawPrismGate(item.obj);
    });

    if(state!==STATES.GAME_OVER) drawPhoton();
    drawParticles();
    drawComboTexts();
    if(state===STATES.PLAYING) drawHUD();
    drawLevelTransition();

    // White flash
    if(whiteFlash>0){
      ctx.globalAlpha=whiteFlash*2;
      ctx.fillStyle='#fff';
      ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1;
    }
  }

  if(state===STATES.PAUSED) drawPaused();
  if(state===STATES.GAME_OVER){
    drawParticles();
    drawGameOver();
  }
  if(state===STATES.HIGH_SCORE_ENTRY) drawHighScoreEntry();
  if(state===STATES.LEADERBOARD) drawLeaderboard();

  ctx.restore();
}

// --- Input ---
function toCanvasXY(tx,ty){
  return {x:tx*devicePixelRatio,y:ty*devicePixelRatio};
}

function handleTap(cx,cy){
  initAudio();resumeAudio();

  if(state===STATES.TITLE){
    // Check high scores button
    const btnFs=Math.max(12,W*0.03);
    if(cx>W*0.6&&cy>H*0.85){
      hsHighlightIdx=-1;
      state=STATES.LEADERBOARD;
      return;
    }
    resetGame();
    state=STATES.PLAYING;
    setBgDrone(true);
    return;
  }

  if(state===STATES.PLAYING){
    // Check pause
    const pauseSize=22*devicePixelRatio;
    if(cx<W*0.1&&cy<H*0.08){
      state=STATES.PAUSED;
      setBgDrone(false);
      return;
    }
  }

  if(state===STATES.PAUSED){
    const btnW=W*0.35, btnH=H*0.07;
    const btnY1=H*0.5, btnY2=H*0.62;
    if(cx>W*0.5-btnW/2&&cx<W*0.5+btnW/2){
      if(cy>btnY1&&cy<btnY1+btnH){state=STATES.PLAYING;setBgDrone(true);return;}
      if(cy>btnY2&&cy<btnY2+btnH){state=STATES.TITLE;return;}
    }
    return;
  }

  if(state===STATES.GAME_OVER&&deathTimer>1.5){
    if(qualifiesForHighScore(Math.floor(score))){
      hsInitials=[0,0,0];
      state=STATES.HIGH_SCORE_ENTRY;
    }else{
      state=STATES.TITLE;
    }
    return;
  }

  if(state===STATES.HIGH_SCORE_ENTRY){
    const colW=W*0.18;
    const startX=W*0.5-colW*1.5;
    const charFs=Math.max(28,W*0.08);
    const btnSize=Math.max(40,W*0.1);
    const entryCY=H*0.45;

    for(let i=0;i<3;i++){
      const ccx=startX+colW*(i+0.5);
      // Up arrow region
      if(Math.abs(cx-ccx)<btnSize*0.5&&cy<entryCY-charFs*0.3&&cy>entryCY-charFs-btnSize){
        hsInitials[i]=(hsInitials[i]-1+CHARS.length)%CHARS.length;
        return;
      }
      // Down arrow region
      if(Math.abs(cx-ccx)<btnSize*0.5&&cy>entryCY+charFs*0.2&&cy<entryCY+charFs+btnSize){
        hsInitials[i]=(hsInitials[i]+1)%CHARS.length;
        return;
      }
    }

    // Confirm
    const btnW=W*0.4, btnH=H*0.07, btnY=H*0.75;
    if(cx>W*0.5-btnW/2&&cx<W*0.5+btnW/2&&cy>btnY&&cy<btnY+btnH){
      const initials=CHARS[hsInitials[0]]+CHARS[hsInitials[1]]+CHARS[hsInitials[2]];
      addHighScore(initials,Math.floor(score),level,rainbowCycles);
      state=STATES.LEADERBOARD;
      return;
    }
    return;
  }

  if(state===STATES.LEADERBOARD){
    const btnW=W*0.3, btnH=H*0.06, btnY=H*0.9;
    if(cx>W*0.5-btnW/2&&cx<W*0.5+btnW/2&&cy>btnY&&cy<btnY+btnH){
      state=STATES.TITLE;
      hsHighlightIdx=-1;
      return;
    }
    // Tap anywhere to go back
    state=STATES.TITLE;
    hsHighlightIdx=-1;
    return;
  }
}

function handleSwipe(dx){
  if(state===STATES.PLAYING&&levelTransTimer<=0){
    if(dx>0&&playerLane<2) playerLane++;
    else if(dx<0&&playerLane>0) playerLane--;
  }
}

// Touch events
document.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  touchStartX=t.clientX;
  touchStartY=t.clientY;
  touchStartTime=performance.now();
  isTouching=true;

  if(state===STATES.PLAYING||state===STATES.TITLE) e.preventDefault();
},{passive:false});

document.addEventListener('touchmove',e=>{
  if(state===STATES.PLAYING) e.preventDefault();
},{passive:false});

document.addEventListener('touchend',e=>{
  if(!isTouching) return;
  isTouching=false;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX;
  const elapsed=performance.now()-touchStartTime;
  const pos=toCanvasXY(t.clientX,t.clientY);

  if(Math.abs(dx)>30&&elapsed<300){
    handleSwipe(dx);
  }else{
    handleTap(pos.x,pos.y);
  }
},{passive:false});

// Hold left/right for lane change
let holdTimer=0,holdSide=0;
document.addEventListener('touchstart',e=>{
  if(state!==STATES.PLAYING) return;
  const t=e.touches[0];
  holdSide=t.clientX<window.innerWidth*0.5?-1:1;
  holdTimer=performance.now();
},{passive:true});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') handleSwipe(-1);
  else if(e.key==='ArrowRight') handleSwipe(1);
  else if(e.key==='p'||e.key==='P'){
    if(state===STATES.PLAYING){state=STATES.PAUSED;setBgDrone(false);}
    else if(state===STATES.PAUSED){state=STATES.PLAYING;setBgDrone(true);}
  }
  else if(e.key==='Enter'){
    const pos=toCanvasXY(W/(2*devicePixelRatio),H/(2*devicePixelRatio));
    handleTap(pos.x,pos.y);
  }
});

// Mouse click fallback for desktop
document.addEventListener('click',e=>{
  const pos=toCanvasXY(e.clientX,e.clientY);
  handleTap(pos.x,pos.y);
});

// --- Game Loop ---
lastTime=performance.now();
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
