<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" href="data:,">
<title>Millipede</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{position:fixed;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#05070b;color:#eaffff;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%;touch-action:none;background:#05070b;image-rendering:crisp-edges}
button{touch-action:manipulation;user-select:none;border:0;cursor:pointer;font:inherit;color:inherit}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:auto;padding:16px}
.overlay.hidden{display:none;pointer-events:none}
.shade{position:absolute;inset:0;background:radial-gradient(circle at 50% 34%,rgba(13,255,220,.18),transparent 32%),radial-gradient(circle at 50% 78%,rgba(255,65,169,.1),transparent 35%),linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.82));backdrop-filter:blur(.6px)}
.panel{position:relative;width:min(92vw,430px);max-height:92vh;overflow:auto;text-align:center;padding:18px 14px;border:1px solid rgba(120,255,230,.34);border-radius:8px;background:linear-gradient(180deg,rgba(9,19,32,.84),rgba(5,8,14,.94));box-shadow:0 0 0 2px rgba(255,72,190,.08),0 0 32px rgba(0,255,210,.2),inset 0 1px 0 rgba(255,255,255,.1),inset 0 -7px 0 rgba(0,0,0,.24)}
.panel:before{content:"";position:absolute;inset:8px;border:1px solid rgba(255,255,255,.08);border-radius:6px;pointer-events:none}
.title{font-size:clamp(2.45rem,11vw,4.2rem);line-height:.86;font-weight:950;letter-spacing:.02em;text-transform:uppercase;color:#fff;text-shadow:0 0 3px #fff,0 0 9px #8ffff4,0 0 22px #00f0c8,0 4px 0 #103a4c,0 7px 0 #310a31;margin-bottom:8px}
.byline{margin:-2px 0 8px;color:#8fb2bb;font:800 9px ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase}
.subtitle{font-size:.76rem;letter-spacing:.27em;text-transform:uppercase;color:#8cf8e8;margin-bottom:10px}
.version{position:absolute;top:10px;right:12px;color:#8fb2bb;font:700 11px ui-monospace,monospace;letter-spacing:.08em}
.btn{min-height:48px;min-width:168px;margin:6px;padding:12px 18px;border-radius:8px;background:linear-gradient(180deg,#e9fff9 0,#1fffe3 36%,#0b9fbd 100%);color:#021016;font-weight:900;letter-spacing:.1em;text-transform:uppercase;box-shadow:0 3px 0 #07566b,0 0 18px rgba(16,245,220,.28)}
.btn.secondary{background:rgba(255,255,255,.06);color:#dff;border:1px solid rgba(135,255,235,.34);box-shadow:none}
.btn.warn{background:linear-gradient(180deg,#ffd36b,#ff7a3d);color:#1f0900}
.hud{position:absolute;inset:0;z-index:8;pointer-events:none;color:#dffffc;font-weight:900;text-shadow:0 0 8px rgba(0,255,220,.8)}
.topbar{position:absolute;top:0;left:0;right:0;display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:start;padding:8px 10px;font:800 12px ui-monospace,monospace;letter-spacing:.06em;background:linear-gradient(180deg,rgba(0,0,0,.46),transparent)}
.topbar div:nth-child(2){text-align:center}.topbar div:nth-child(3){text-align:right}
.powerhud{position:absolute;top:32px;left:8px;right:8px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap;font:900 10px ui-monospace,monospace;letter-spacing:.08em}
.powerpill{min-width:44px;padding:4px 6px;border:1px solid currentColor;border-radius:4px;background:rgba(3,11,18,.72);box-shadow:0 0 12px currentColor,inset 0 0 10px rgba(255,255,255,.08);text-align:center}
#bombBtn{position:absolute;right:12px;bottom:16px;width:68px;height:68px;border-radius:50%;z-index:12;display:none;align-items:center;justify-content:center;background:radial-gradient(circle,#fff,#ffd45b 32%,#ff4a7e 70%);color:#23000b;font-size:24px;font-weight:950;box-shadow:0 0 22px rgba(255,80,125,.48);pointer-events:auto}
#bombBtn.show{display:flex}
#pauseBtn{position:absolute;left:12px;bottom:18px;width:46px;height:46px;border-radius:50%;z-index:12;background:rgba(4,16,25,.7);border:1px solid rgba(170,255,244,.32);color:#dffffc;pointer-events:auto}
.scores{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:left;margin:12px 0}
.scorebox{border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px;background:rgba(0,0,0,.24)}
.scoretitle{font:900 12px ui-monospace,monospace;letter-spacing:.14em;margin-bottom:8px}.local{color:#46f7ff}.global{color:#ffd66e}
.row{display:grid;grid-template-columns:28px 1fr auto;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06);font:800 12px ui-monospace,monospace}
.row.new{color:#ffe56e;text-shadow:0 0 10px rgba(255,225,80,.65)}
.champ{animation:champ .9s steps(4,end) 5;color:#fff;text-shadow:0 0 8px #fff,0 0 18px #ffe66b}
@keyframes champ{50%{filter:brightness(1.8);transform:scale(1.02)}}
.muted{color:#90a3aa}.small{font-size:12px;color:#a9c8ca;line-height:1.45}.hidden{display:none!important}
.initials{display:flex;justify-content:center;gap:10px;margin:12px 0}.slot{display:flex;flex-direction:column;gap:4px;align-items:center}.letter{width:48px;height:48px;border:1px solid rgba(130,255,235,.34);border-radius:8px;display:flex;align-items:center;justify-content:center;font:950 28px ui-monospace,monospace;background:rgba(0,0,0,.28)}
.arrow{width:48px;height:38px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(130,255,235,.22);color:#dff;font-weight:950}
@media(max-width:370px){.scores{grid-template-columns:1fr}.panel{padding:14px 10px}.btn{min-width:142px}.title{font-size:2.35rem}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div class="topbar"><div id="scoreHud">000000</div><div id="waveHud">WAVE 1</div><div id="livesHud">LIVES 3</div></div>
  <div id="powerHud" class="powerhud"></div>
</div>
<button id="pauseBtn" class="hidden" aria-label="Pause">II</button>
<button id="bombBtn" aria-label="Pulse bomb">✦</button>

<section id="titleScreen" class="overlay">
  <div class="shade"></div>
  <div class="panel">
    <div class="version">v1.5.1</div>
    <h1 class="title">Millipede</h1>
    <div class="byline">by Jez &amp; Kosh</div>
    <div class="subtitle">fungal arcade swarm</div>
    <p class="small">Drag in the lower field to move. Auto-fire clears fungus and segments. Tap the pulse when the garden gets crowded.</p>
    <button id="startBtn" class="btn">Start</button>
    <button id="scoresBtn" class="btn secondary">Scores</button>
    <div id="titleScores" class="scores"></div>
  </div>
</section>

<section id="scoresScreen" class="overlay hidden">
  <div class="shade"></div>
  <div class="panel">
    <div class="version">v1.5.1</div>
    <h2 class="subtitle" style="font-size:1rem;color:#fff;margin-top:4px">Leaderboards</h2>
    <div id="scoreTables" class="scores"></div>
    <button id="scoresBackBtn" class="btn secondary">Back</button>
  </div>
</section>

<section id="gameOverScreen" class="overlay hidden">
  <div class="shade"></div>
  <div class="panel">
    <div class="version">v1.5.1</div>
    <h2 class="title" style="font-size:clamp(2rem,9vw,3.4rem)">Game Over</h2>
    <div id="finalLine" class="subtitle"></div>
    <div id="initialBlock" class="hidden">
      <div class="small">Enter initials</div>
      <div id="initials" class="initials"></div>
      <button id="submitBtn" class="btn warn">Submit</button>
    </div>
    <div id="overScores" class="scores"></div>
    <button id="againBtn" class="btn">Again</button>
    <button id="menuBtn" class="btn secondary">Menu</button>
  </div>
</section>

<script>
'use strict';
const VERSION = 'v1.5.1';
const SCORE_KEY = 'neon_myriapod_scores_v1';
const GLOBAL_SCORES_API = 'https://game-scores.jez237.workers.dev/scores/neon-myriapod';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1, last = 0, state = 'title', demo = true;
let score = 0, lives = 3, wave = 1, bombs = 2, rank = 1, gameTime = 0, shake = 0, flash = 0;
let player = {x:0,y:0,tx:0,ty:0,r:13,fire:0,dead:0,muzzle:0,recoil:0};
let pointer = {active:false,id:null,x:0,y:0};
let mushrooms = [], crawlers = [], bullets = [], enemies = [], particles = [], popups = [], pickups = [], stars = [];
let waveBanner = {text:'',life:0,max:1};
let spawn = {spider:3.5,flea:5.5,scorpion:9};
let audioCtx = null, audioReady = false, globalScoresCache = null, globalScoresTime = 0, pendingEntry = null, initials = ['A','A','A'];
const POWERUP_TYPES = [
  {id:'spread',label:'S',name:'SPREAD',color:'#56fff0',duration:8},
  {id:'laser',label:'L',name:'LASER',color:'#ff4fc4',duration:5},
  {id:'shield',label:'B',name:'BEETLE',color:'#ffe66b',duration:12},
  {id:'frost',label:'F',name:'FROST',color:'#9fdcff',duration:6},
  {id:'score',label:'2X',name:'SCORE',color:'#a7ff55',duration:10}
];
let powers = {spread:0,laser:0,shield:0,frost:0,score:0}, laserTick = 0, pickupPity = 0;

function resize(){
  const area = innerWidth * innerHeight;
  DPR = Math.min(devicePixelRatio || 1, area > 900000 ? 2.75 : 3.5); W = innerWidth; H = innerHeight;
  canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.imageSmoothingEnabled = false;
  resetStars();
  if(state === 'title') seedDemo();
}
addEventListener('resize', resize);
addEventListener('orientationchange', () => setTimeout(resize, 220));
resize();

document.addEventListener('touchmove', e => {
  if (e.target.closest('button,.overlay')) return;
  e.preventDefault();
}, {passive:false});
document.addEventListener('touchstart', e => {
  if (e.target.closest('button,.overlay')) return;
  e.preventDefault();
}, {passive:false});

function unlockAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume().then(()=>{ audioReady = audioCtx && audioCtx.state === 'running'; }).catch(()=>{});
    audioReady = audioCtx.state === 'running';
  }catch(e){}
}
function envGain(gain, dur){
  const g = audioCtx.createGain(), t = audioCtx.currentTime;
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(Math.max(.0002, gain), t + .006);
  g.gain.setValueAtTime(Math.max(.0002, gain), t + Math.max(.008, dur * .35));
  g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  return g;
}
function tone(freq, dur, type, gain, endFreq){
  if(!audioCtx || !audioReady) return;
  try{
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    if(endFreq) o.frequency.setValueAtTime(freq, audioCtx.currentTime), o.frequency.exponentialRampToValueAtTime(Math.max(20,endFreq), audioCtx.currentTime + dur);
    g.gain.setValueAtTime(gain || .035, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function noiseBurst(dur, gain, color){
  if(!audioCtx || !audioReady) return;
  try{
    const len = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    let last = 0;
    for(let i=0;i<len;i++){ const n = Math.random()*2-1; last = color === 'dark' ? last*.82 + n*.18 : n; data[i] = last; }
    const src = audioCtx.createBufferSource(), g = envGain(gain, dur);
    src.buffer = buf; src.connect(g); g.connect(audioCtx.destination); src.start(); src.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function sfx(name){
  if(!audioCtx || !audioReady) return;
  try{
    if(name==='shot'){ tone(1280,.014,'square',.0042,1680); }
    if(name==='mushroom'){ [0,12,24].forEach((d,i)=>setTimeout(()=>tone(720+i*55,.009,'triangle',.0019,620),d)); }
    if(name==='crumble'){ tone(190,.07,'triangle',.018,80); noiseBurst(.09,.018,'dark'); }
    if(name==='segment'){ tone(150,.045,'sawtooth',.018,90); tone(420,.026,'square',.01,250); }
    if(name==='enemy'){ tone(520,.06,'square',.022,180); noiseBurst(.08,.018); }
    if(name==='spider'){ tone(300,.07,'square',.018,420); tone(190,.05,'triangle',.012,130); }
    if(name==='flea'){ tone(720,.05,'square',.016,360); tone(980,.035,'square',.012,700); }
    if(name==='scorpion'){ tone(110,.13,'sawtooth',.024,260); tone(660,.04,'square',.012,520); }
    if(name==='wave'){ [220,330,440,660].forEach((f,i)=>setTimeout(()=>tone(f,.055,'square',.018),i*45)); }
    if(name==='death'){ tone(180,.18,'sawtooth',.05,45); noiseBurst(.22,.045,'dark'); }
    if(name==='bomb'){ tone(80,.18,'sawtooth',.06,38); tone(260,.11,'triangle',.035,520); noiseBurst(.16,.04); }
    if(name==='submit'){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.07,i%2?'triangle':'square',.02),i*55)); }
    if(name==='start'){ [196,262,392,523].forEach((f,i)=>setTimeout(()=>tone(f,.055,'square',.018),i*42)); }
    if(name==='tick'){ tone(380,.035,'square',.013,440); }
    if(name==='pickup'){ [784,1046,1568].forEach((f,i)=>setTimeout(()=>tone(f,.045,i%2?'triangle':'square',.018),i*38)); }
    if(name==='expire'){ tone(520,.06,'triangle',.014,190); tone(260,.07,'square',.008,130); }
    if(name==='shield'){ tone(180,.08,'sawtooth',.035,70); tone(840,.08,'square',.018,360); noiseBurst(.12,.018); }
    if(name==='laser'){ tone(1460,.035,'square',.01,920); noiseBurst(.035,.006); }
    if(name==='queenWarn'){ [146,196,146,262].forEach((f,i)=>setTimeout(()=>tone(f,.09,i%2?'square':'sawtooth',.034),i*70)); setTimeout(()=>noiseBurst(.18,.028,'dark'),120); }
    if(name==='queenHit'){ tone(92,.07,'sawtooth',.026,55); tone(540,.035,'square',.014,360); }
    if(name==='queenDeath'){ [330,247,196,147,110].forEach((f,i)=>setTimeout(()=>tone(f,.11,'sawtooth',.035,Math.max(45,f*.5)),i*58)); noiseBurst(.32,.045,'dark'); }
  }catch(e){}
}
function bindButton(id, fn){
  const el = document.getElementById(id);
  let lock = 0;
  const run = ev => { ev.preventDefault(); ev.stopPropagation(); const now = performance.now(); if(now - lock < 180) return; lock = now; unlockAudio(); fn(ev); };
  el.addEventListener('click', run);
  el.addEventListener('touchend', run, {passive:false});
  return el;
}

function resetStars(){
  stars = [];
  const n = Math.max(70, Math.floor(W * H / 6500));
  for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.8+.3,a:Math.random()*.6+.2});
}
function rand(a,b){return a + Math.random() * (b-a)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)}

function seedField(){
  mushrooms = [];
  const cell = grid();
  const rows = Math.floor((H * .72) / cell);
  const cols = Math.floor(W / cell);
  for(let y=2;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(Math.random() < .12 + Math.min(wave,8)*.006 && y*cell < H-112) addMushroom((x+.5)*cell,(y+.5)*cell,3,false);
    }
  }
}
function grid(){return Math.max(19, Math.min(26, W / 15))}
function addMushroom(x,y,hp,poison){
  const max = Math.max(10, hp || 12);
  mushrooms.push({x,y,hp:max,max,r:grid()*.46,poison:!!poison,pulse:Math.random()*6,chunks:[],seed:Math.floor(rand(1,999999))});
}
function mushroomChunk(m, b){
  const hit = m.max - m.hp, side = hit % 2 ? -1 : 1, edge = hit % 3 === 0;
  const n1 = Math.sin((m.seed + hit * 37) * 12.9898) * 43758.5453, n2 = Math.sin((m.seed + hit * 71) * 78.233) * 24634.6345;
  const a = n1 - Math.floor(n1), c = n2 - Math.floor(n2);
  const dx = clamp(((b && b.x) ? b.x - m.x : Math.sin((m.seed + hit) * 12.9898) * m.r), -m.r*.86, m.r*.86);
  const yBand = edge ? -m.r*.66 + a*m.r*.48 : -m.r*.42 + a*m.r*.96;
  return {x:dx + side*c*m.r*.16,y:yBand,r:m.r*(.105+c*.075),edge,stem:!edge && hit % 4 === 2};
}
function chipMushroom(m, b, play, quiet){
  if(m.hp <= 0) return;
  m.hp--;
  m.chunks.push(mushroomChunk(m, b || {x:m.x,y:m.y}));
  const color = m.poison ? '#ff7cda' : '#aaffdf';
  const n = m.hp <= 0 ? 18 : 4;
  for(let i=0;i<n;i++) particles.push({x:m.x+rand(-m.r*.45,m.r*.45),y:m.y+rand(-m.r*.55,m.r*.25),vx:rand(-58,58),vy:rand(-105,18),life:rand(.16,.46),max:1,r:rand(.8,2.2),color});
  if(!play) return;
  if(m.hp <= 0){ addScore(m.x,m.y,5); burst(m.x,m.y,m.poison?'#ff4fc4':'#52ffba',18); if(!quiet) sfx('crumble'); }
  else if(!quiet) sfx('mushroom');
}
function crawlerSegment(x,y,head,opts){
  const queen = !!opts.queen, child = !!opts.child;
  const hp = queen ? (head ? 5 : 2) : child ? 1 : 1;
  return {x, y, px:x, py:y, turn:0, blink:Math.random()*6, head, hp, maxHp:hp, queen, child};
}
function makeCrawler(y, len, speed, opts){
  opts = opts || {};
  const segs = [];
  const dir = Math.random() < .5 ? 1 : -1;
  const sx = dir > 0 ? grid() : W-grid();
  for(let i=0;i<len;i++) segs.push(crawlerSegment(sx - i*dir*grid()*.9, y || grid()*1.5, i===0, opts));
  crawlers.push({segs,dir,speed,rowDir:1,dive:false,hue:opts.hue || rand(155,195),wiggle:0,turnLock:0,queen:!!opts.queen,child:!!opts.child});
}
function makeChildCrawler(x,y,dir){
  const len = Math.floor(rand(3,6)), segs = [];
  for(let i=0;i<len;i++) segs.push(crawlerSegment(x - i*dir*grid()*.72, y + rand(-3,3), i===0, {child:true}));
  crawlers.push({segs,dir,speed:72 + wave*8,rowDir:1,dive:true,hue:118 + rand(-12,18),wiggle:0,turnLock:.08,child:true});
}
function spawnQueenCrawler(){
  makeCrawler(grid()*1.45, Math.min(20, 13 + Math.floor(wave*.7)), 34 + wave*4, {queen:true,hue:304});
  shake = Math.max(shake,10); flash = Math.max(flash,.2);
  popups.push({x:W*.5-78,y:H*.24,t:'QUEEN ARRIVES',life:1.25,color:'#ffd96a'});
  sfx('queenWarn');
}
function waveTitle(n){
  if(n % 4 === 0) return `WAVE ${n}: QUEEN SWARM`;
  if(n === 3) return 'WAVE 3: POISON RUN';
  if(n === 2) return 'WAVE 2: SPIDER SPORE';
  return `WAVE ${n}: CLASSIC CRAWL`;
}
function showWaveIntro(){
  waveBanner = {text:waveTitle(wave),life:1.55,max:1.55};
}
function damageSegment(s, c, play, amount){
  if(s.hit) return;
  const dmg = amount || 1;
  s.hp = (s.hp || 1) - dmg;
  if(s.queen && play){
    sfx('queenHit');
    burst(s.x,s.y,s.head?'#ffd96a':'#ff5ad8',s.hp <= 0 ? 24 : 9);
    if(s.hp > 0 && dmg >= 2) popups.push({x:s.x-10,y:s.y-14,t:'-'+dmg,life:.42,color:'#ffd96a'});
    if(s.hp <= 0){
      const n = s.head ? 3 : 1;
      for(let k=0;k<n;k++) makeChildCrawler(s.x + rand(-8,8), s.y + rand(-6,6), (k % 2 ? 1 : -1) * (c.dir || 1));
      if(Math.random() < .7) addMushroom(s.x,s.y,3,true);
    }
  }
  if(s.hp <= 0) s.hit = true;
}
function startGame(){
  state='playing'; demo=false; score=0; lives=3; wave=1; bombs=2; rank=1; gameTime=0; shake=0; flash=0;
  bullets=[]; enemies=[]; particles=[]; popups=[]; pickups=[]; crawlers=[];
  powers = {spread:0,laser:0,shield:0,frost:0,score:0}; laserTick = 0; pickupPity = 0;
  player={x:W/2,y:H-54,tx:W/2,ty:H-54,r:13,fire:0,dead:0,muzzle:0,recoil:0};
  spawn={spider:5.8,flea:8.2,scorpion:11.6};
  seedField(); makeCrawler(grid()*1.5, 10, 46);
  showWaveIntro();
  showOnly(null); updateHud(); sfx('start');
}
function seedDemo(){
  demo = true; score = 12400; lives = 3; wave = 3; bombs = 2; rank = 2;
  player={x:W/2,y:H-58,tx:W/2,ty:H-58,r:13,fire:0,dead:0,muzzle:0,recoil:0};

function updateCrawlers(dt, play){

  }
}

function frame(t){
  const dt = Math.min(.033, (t-last)/1000 || .016); last=t;
  if(state === 'playing' || state === 'title') update(dt);
  draw(); requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

function aimPlayer(x,y){
  player.tx = x; player.ty = y;
}
canvas.addEventListener('pointerdown', e=>{ if(state!=='playing') return; pointer={active:true,id:e.pointerId,x:e.clientX,y:e.clientY}; player.tx=e.clientX; player.ty=e.clientY; try{ canvas.setPointerCapture(e.pointerId); }catch(err){} });

canvas.addEventListener('pointercancel', e=>{ if(e.pointerId===pointer.id) pointer.active=false; });
canvas.addEventListener('touchstart', e=>{ if(state!=='playing') return; const t=e.changedTouches[0]; if(!t) return; e.preventDefault(); pointer={active:true,id:t.identifier,x:t.clientX,y:t.clientY}; aimPlayer(t.clientX,t.clientY); }, {passive:false});

canvas.addEventListener('touchend', e=>{ if([...e.changedTouches].some(t=>t.identifier===pointer.id)) pointer.active=false; }, {passive:false});
