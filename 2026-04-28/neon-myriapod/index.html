<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" href="data:,">
<title>Neon Myriapod</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{position:fixed;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#05070b;color:#eaffff;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%;touch-action:none;background:#05070b;image-rendering:crisp-edges}
button{touch-action:manipulation;user-select:none;border:0;cursor:pointer;font:inherit;color:inherit}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:auto;padding:16px}
.overlay.hidden{display:none;pointer-events:none}
.shade{position:absolute;inset:0;background:radial-gradient(circle at 50% 34%,rgba(13,255,220,.18),transparent 32%),radial-gradient(circle at 50% 78%,rgba(255,65,169,.1),transparent 35%),linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.82));backdrop-filter:blur(.6px)}
.panel{position:relative;width:min(92vw,430px);max-height:92vh;overflow:auto;text-align:center;padding:18px 14px;border:1px solid rgba(120,255,230,.34);border-radius:8px;background:linear-gradient(180deg,rgba(9,19,32,.84),rgba(5,8,14,.94));box-shadow:0 0 0 2px rgba(255,72,190,.08),0 0 32px rgba(0,255,210,.2),inset 0 1px 0 rgba(255,255,255,.1),inset 0 -7px 0 rgba(0,0,0,.24)}
.panel:before{content:"";position:absolute;inset:8px;border:1px solid rgba(255,255,255,.08);border-radius:6px;pointer-events:none}
.title{font-size:clamp(2.45rem,12vw,4.9rem);line-height:.86;font-weight:950;letter-spacing:.02em;text-transform:uppercase;color:#fff;text-shadow:0 0 3px #fff,0 0 9px #8ffff4,0 0 22px #00f0c8,0 4px 0 #103a4c,0 7px 0 #310a31;margin-bottom:8px}
.subtitle{font-size:.76rem;letter-spacing:.27em;text-transform:uppercase;color:#8cf8e8;margin-bottom:10px}
.version{position:absolute;top:10px;right:12px;color:#8fb2bb;font:700 11px ui-monospace,monospace;letter-spacing:.08em}
.btn{min-height:48px;min-width:168px;margin:6px;padding:12px 18px;border-radius:8px;background:linear-gradient(180deg,#e9fff9 0,#1fffe3 36%,#0b9fbd 100%);color:#021016;font-weight:900;letter-spacing:.1em;text-transform:uppercase;box-shadow:0 3px 0 #07566b,0 0 18px rgba(16,245,220,.28)}
.btn.secondary{background:rgba(255,255,255,.06);color:#dff;border:1px solid rgba(135,255,235,.34);box-shadow:none}
.btn.warn{background:linear-gradient(180deg,#ffd36b,#ff7a3d);color:#1f0900}
.hud{position:absolute;inset:0;z-index:8;pointer-events:none;color:#dffffc;font-weight:900;text-shadow:0 0 8px rgba(0,255,220,.8)}
.topbar{position:absolute;top:0;left:0;right:0;display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:start;padding:8px 10px;font:800 12px ui-monospace,monospace;letter-spacing:.06em;background:linear-gradient(180deg,rgba(0,0,0,.46),transparent)}
.topbar div:nth-child(2){text-align:center}.topbar div:nth-child(3){text-align:right}
#bombBtn{position:absolute;right:12px;bottom:16px;width:68px;height:68px;border-radius:50%;z-index:12;display:none;align-items:center;justify-content:center;background:radial-gradient(circle,#fff,#ffd45b 32%,#ff4a7e 70%);color:#23000b;font-size:24px;font-weight:950;box-shadow:0 0 22px rgba(255,80,125,.48);pointer-events:auto}
#bombBtn.show{display:flex}
#pauseBtn{position:absolute;left:12px;bottom:18px;width:46px;height:46px;border-radius:50%;z-index:12;background:rgba(4,16,25,.7);border:1px solid rgba(170,255,244,.32);color:#dffffc;pointer-events:auto}
.scores{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:left;margin:12px 0}
.scorebox{border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px;background:rgba(0,0,0,.24)}
.scoretitle{font:900 12px ui-monospace,monospace;letter-spacing:.14em;margin-bottom:8px}.local{color:#46f7ff}.global{color:#ffd66e}
.row{display:grid;grid-template-columns:28px 1fr auto;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06);font:800 12px ui-monospace,monospace}
.row.new{color:#ffe56e;text-shadow:0 0 10px rgba(255,225,80,.65)}
.champ{animation:champ .9s steps(4,end) 5;color:#fff;text-shadow:0 0 8px #fff,0 0 18px #ffe66b}
@keyframes champ{50%{filter:brightness(1.8);transform:scale(1.02)}}
.muted{color:#90a3aa}.small{font-size:12px;color:#a9c8ca;line-height:1.45}.hidden{display:none!important}
.initials{display:flex;justify-content:center;gap:10px;margin:12px 0}.slot{display:flex;flex-direction:column;gap:4px;align-items:center}.letter{width:48px;height:48px;border:1px solid rgba(130,255,235,.34);border-radius:8px;display:flex;align-items:center;justify-content:center;font:950 28px ui-monospace,monospace;background:rgba(0,0,0,.28)}
.arrow{width:48px;height:38px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(130,255,235,.22);color:#dff;font-weight:950}
@media(max-width:370px){.scores{grid-template-columns:1fr}.panel{padding:14px 10px}.btn{min-width:142px}.title{font-size:2.35rem}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div class="topbar"><div id="scoreHud">000000</div><div id="waveHud">WAVE 1</div><div id="livesHud">LIVES 3</div></div>
</div>
<button id="pauseBtn" class="hidden" aria-label="Pause">II</button>
<button id="bombBtn" aria-label="Pulse bomb">✦</button>

<section id="titleScreen" class="overlay">
  <div class="shade"></div>
  <div class="panel">
    <div class="version">v1.1.0</div>
    <h1 class="title">Neon<br>Myriapod</h1>
    <div class="subtitle">fungal arcade swarm</div>
    <p class="small">Drag in the lower field to move. Auto-fire clears fungus and segments. Tap the pulse when the garden gets crowded.</p>
    <button id="startBtn" class="btn">Start</button>
    <button id="scoresBtn" class="btn secondary">Scores</button>
    <div id="titleScores" class="scores"></div>
  </div>
</section>

<section id="scoresScreen" class="overlay hidden">
  <div class="shade"></div>
  <div class="panel">
    <div class="version">v1.1.0</div>
    <h2 class="subtitle" style="font-size:1rem;color:#fff;margin-top:4px">Leaderboards</h2>
    <div id="scoreTables" class="scores"></div>
    <button id="scoresBackBtn" class="btn secondary">Back</button>
  </div>
</section>

<section id="gameOverScreen" class="overlay hidden">
  <div class="shade"></div>
  <div class="panel">
    <div class="version">v1.1.0</div>
    <h2 class="title" style="font-size:clamp(2rem,9vw,3.4rem)">Game Over</h2>
    <div id="finalLine" class="subtitle"></div>
    <div id="initialBlock" class="hidden">
      <div class="small">Enter initials</div>
      <div id="initials" class="initials"></div>
      <button id="submitBtn" class="btn warn">Submit</button>
    </div>
    <div id="overScores" class="scores"></div>
    <button id="againBtn" class="btn">Again</button>
    <button id="menuBtn" class="btn secondary">Menu</button>
  </div>
</section>

<script>
'use strict';
const VERSION = 'v1.1.0';
const SCORE_KEY = 'neon_myriapod_scores_v1';
const GLOBAL_SCORES_API = 'https://game-scores.jez237.workers.dev/scores/neon-myriapod';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1, last = 0, state = 'title', demo = true;
let score = 0, lives = 3, wave = 1, bombs = 2, rank = 1, gameTime = 0, shake = 0, flash = 0;
let player = {x:0,y:0,tx:0,ty:0,r:13,fire:0,dead:0};
let pointer = {active:false,id:null,x:0,y:0};
let mushrooms = [], crawlers = [], bullets = [], enemies = [], particles = [], popups = [], stars = [];
let spawn = {spider:3.5,flea:5.5,scorpion:9};
let audioCtx = null, audioReady = false, globalScoresCache = null, globalScoresTime = 0, pendingEntry = null, initials = ['A','A','A'];

function resize(){
  const area = innerWidth * innerHeight;
  DPR = Math.min(devicePixelRatio || 1, area > 900000 ? 2.6 : 3.25); W = innerWidth; H = innerHeight;
  canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.imageSmoothingEnabled = false;
  resetStars();
  if(state === 'title') seedDemo();
}
addEventListener('resize', resize);
addEventListener('orientationchange', () => setTimeout(resize, 220));
resize();

document.addEventListener('touchmove', e => {
  if (e.target.closest('button,.overlay')) return;
  e.preventDefault();
}, {passive:false});
document.addEventListener('touchstart', e => {
  if (e.target.closest('button,.overlay')) return;
  e.preventDefault();
}, {passive:false});

function unlockAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume().then(()=>{ audioReady = audioCtx && audioCtx.state === 'running'; }).catch(()=>{});
    audioReady = audioCtx.state === 'running';
  }catch(e){}
}
function envGain(gain, dur){
  const g = audioCtx.createGain(), t = audioCtx.currentTime;
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(Math.max(.0002, gain), t + .006);
  g.gain.setValueAtTime(Math.max(.0002, gain), t + Math.max(.008, dur * .35));
  g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  return g;
}
function tone(freq, dur, type, gain, endFreq){
  if(!audioCtx || !audioReady) return;
  try{
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    if(endFreq) o.frequency.setValueAtTime(freq, audioCtx.currentTime), o.frequency.exponentialRampToValueAtTime(Math.max(20,endFreq), audioCtx.currentTime + dur);
    g.gain.setValueAtTime(gain || .035, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function noiseBurst(dur, gain, color){
  if(!audioCtx || !audioReady) return;
  try{
    const len = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    let last = 0;
    for(let i=0;i<len;i++){ const n = Math.random()*2-1; last = color === 'dark' ? last*.82 + n*.18 : n; data[i] = last; }
    const src = audioCtx.createBufferSource(), g = envGain(gain, dur);
    src.buffer = buf; src.connect(g); g.connect(audioCtx.destination); src.start(); src.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function sfx(name){
  if(!audioCtx || !audioReady) return;
  try{
    if(name==='shot'){ tone(880,.028,'square',.011,1320); tone(440,.022,'triangle',.006,620); }
    if(name==='mushroom'){ tone(220,.035,'triangle',.014,150); }
    if(name==='segment'){ tone(150,.045,'sawtooth',.018,90); tone(420,.026,'square',.01,250); }
    if(name==='enemy'){ tone(520,.06,'square',.022,180); noiseBurst(.08,.018); }
    if(name==='spider'){ tone(300,.07,'square',.018,420); tone(190,.05,'triangle',.012,130); }
    if(name==='flea'){ tone(720,.05,'square',.016,360); tone(980,.035,'square',.012,700); }
    if(name==='scorpion'){ tone(110,.13,'sawtooth',.024,260); tone(660,.04,'square',.012,520); }
    if(name==='wave'){ [220,330,440,660].forEach((f,i)=>setTimeout(()=>tone(f,.055,'square',.018),i*45)); }
    if(name==='death'){ tone(180,.18,'sawtooth',.05,45); noiseBurst(.22,.045,'dark'); }
    if(name==='bomb'){ tone(80,.18,'sawtooth',.06,38); tone(260,.11,'triangle',.035,520); noiseBurst(.16,.04); }
    if(name==='submit'){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.07,i%2?'triangle':'square',.02),i*55)); }
    if(name==='start'){ [196,262,392,523].forEach((f,i)=>setTimeout(()=>tone(f,.055,'square',.018),i*42)); }
    if(name==='tick'){ tone(380,.035,'square',.013,440); }
  }catch(e){}
}
function bindButton(id, fn){
  const el = document.getElementById(id);
  let lock = 0;
  const run = ev => { ev.preventDefault(); ev.stopPropagation(); const now = performance.now(); if(now - lock < 180) return; lock = now; unlockAudio(); fn(ev); };
  el.addEventListener('click', run);
  el.addEventListener('touchend', run, {passive:false});
  return el;
}

function resetStars(){
  stars = [];
  const n = Math.max(70, Math.floor(W * H / 6500));
  for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.8+.3,a:Math.random()*.6+.2});
}
function rand(a,b){return a + Math.random() * (b-a)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)}

function seedField(){
  mushrooms = [];
  const cell = grid();
  const rows = Math.floor((H * .72) / cell);
  const cols = Math.floor(W / cell);
  for(let y=2;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(Math.random() < .12 + Math.min(wave,8)*.006 && y*cell < H-112) addMushroom((x+.5)*cell,(y+.5)*cell,3,false);
    }
  }
}
function grid(){return Math.max(19, Math.min(26, W / 15))}
function addMushroom(x,y,hp,poison){
  mushrooms.push({x,y,hp:hp||3,max:3,r:grid()*.42,poison:!!poison,pulse:Math.random()*6});
}
function makeCrawler(y, len, speed){
  const segs = [];
  const dir = Math.random() < .5 ? 1 : -1;
  const sx = dir > 0 ? grid() : W-grid();
  for(let i=0;i<len;i++) segs.push({x:sx - i*dir*grid()*.9,y:y || grid()*1.5,px:sx,py:y || grid()*1.5,turn:0,blink:Math.random()*6,head:i===0});
  crawlers.push({segs,dir,speed,rowDir:1,dive:false,hue:rand(155,195),wiggle:0});
}
function startGame(){
  state='playing'; demo=false; score=0; lives=3; wave=1; bombs=2; rank=1; gameTime=0; shake=0; flash=0;
  bullets=[]; enemies=[]; particles=[]; popups=[]; crawlers=[];
  player={x:W/2,y:H-54,tx:W/2,ty:H-54,r:13,fire:0,dead:0};
  spawn={spider:3.2,flea:5.2,scorpion:8.5};
  seedField(); makeCrawler(grid()*1.5, 10, 46);
  showOnly(null); updateHud(); sfx('start');
}
function seedDemo(){
  demo = true; score = 12400; lives = 3; wave = 3; bombs = 2; rank = 2;
  player={x:W/2,y:H-58,tx:W/2,ty:H-58,r:13,fire:0,dead:0};
  bullets=[]; enemies=[]; particles=[]; popups=[]; crawlers=[]; seedField(); makeCrawler(grid()*2, 12, 38);
}

function showOnly(id){
  ['titleScreen','scoresScreen','gameOverScreen'].forEach(x=>document.getElementById(x).classList.toggle('hidden', x!==id));
  document.getElementById('bombBtn').classList.toggle('show', state === 'playing');
  document.getElementById('pauseBtn').classList.toggle('hidden', state !== 'playing');
}
function updateHud(){
  document.getElementById('scoreHud').textContent = String(score).padStart(6,'0');
  document.getElementById('waveHud').textContent = 'WAVE ' + wave + '  ' + VERSION;
  document.getElementById('livesHud').textContent = 'LIVES ' + lives + '  PULSE ' + bombs;
}

function loadLocalScores(){
  try{
    const data = JSON.parse(localStorage.getItem(SCORE_KEY) || '[]');
    return Array.isArray(data) ? data.filter(e=>e && typeof e.initials==='string' && Number.isFinite(e.score)).slice(0,10) : [];
  }catch(e){return []}
}
function saveLocalScores(list){
  try{localStorage.setItem(SCORE_KEY, JSON.stringify(list.slice(0,10)))}catch(e){}
}
function qualifies(v){
  const list = loadLocalScores();
  return list.length < 10 || v > list[list.length-1].score;
}
async function fetchGlobalScores(){
  const now = Date.now();
  if(globalScoresCache && now - globalScoresTime < 30000) return globalScoresCache;
  try{
    const res = await fetch(GLOBAL_SCORES_API);
    if(res.ok){ globalScoresCache = await res.json(); globalScoresTime = now; return globalScoresCache; }
  }catch(e){}
  return globalScoresCache || [];
}
async function submitGlobalScore(initials, value, level){
  try{
    await fetch(GLOBAL_SCORES_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({initials,score:value,level})});
    globalScoresCache = null; globalScoresTime = 0;
  }catch(e){}
}
function rowHtml(e,i,hi){
  const name = (e.initials || e.name || '???').slice(0,3).toUpperCase();
  const lvl = e.level || e.wave || 1;
  const isNew = hi && e.ts === hi;
  return `<div class="row${isNew?' new':''}"><span>${String(i+1).padStart(2,'0')}</span><span>${name}</span><span>${Math.floor(e.score||0)} W${lvl}</span></div>`;
}
async function renderScores(target, hi){
  const el = typeof target === 'string' ? document.getElementById(target) : target;
  const local = loadLocalScores();
  el.innerHTML = `<div class="scorebox"><div class="scoretitle local">LOCAL</div>${local.length?local.map((e,i)=>rowHtml(e,i,hi)).join(''):'<div class="muted row"><span>--</span><span>EMPTY</span><span>0</span></div>'}</div><div class="scorebox"><div class="scoretitle global">GLOBAL</div><div class="muted row"><span>--</span><span>LOADING</span><span></span></div></div>`;
  const global = await fetchGlobalScores();
  const ghtml = global.length ? global.slice(0,10).map((e,i)=>rowHtml(e,i,hi)).join('') : '<div class="muted row"><span>--</span><span>OFFLINE</span><span></span></div>';
  el.innerHTML = `<div class="scorebox"><div class="scoretitle local">LOCAL</div>${local.length?local.map((e,i)=>rowHtml(e,i,hi)).join(''):'<div class="muted row"><span>--</span><span>EMPTY</span><span>0</span></div>'}</div><div class="scorebox"><div class="scoretitle global">GLOBAL</div>${ghtml}</div>`;
}
function setupInitials(){
  const wrap = document.getElementById('initials'); wrap.innerHTML = '';
  initials.forEach((ch,idx)=>{
    const slot = document.createElement('div'); slot.className='slot';
    slot.innerHTML = `<button class="arrow" data-d="1">▲</button><div class="letter">${ch}</div><button class="arrow" data-d="-1">▼</button>`;
    slot.querySelectorAll('button').forEach(btn=>{
      const fn = ev => { ev.preventDefault(); unlockAudio(); const d = Number(btn.dataset.d); let c = initials[idx].charCodeAt(0)-65; c=(c+d+26)%26; initials[idx]=String.fromCharCode(65+c); slot.querySelector('.letter').textContent=initials[idx]; sfx('tick'); };
      btn.addEventListener('click',fn); btn.addEventListener('touchend',fn,{passive:false});
    });
    wrap.appendChild(slot);
  });
}
function saveScore(){
  if(!pendingEntry) return;
  const name = initials.join('');
  const entry = {initials:name,score:pendingEntry.score,level:pendingEntry.level,ts:pendingEntry.ts};
  const list = loadLocalScores(); list.push(entry); list.sort((a,b)=>b.score-a.score); saveLocalScores(list);
  submitGlobalScore(name, entry.score, entry.level);
  pendingEntry = null;
  document.getElementById('initialBlock').classList.add('hidden');
  document.querySelector('#gameOverScreen .panel').classList.add('champ');
  setTimeout(()=>document.querySelector('#gameOverScreen .panel').classList.remove('champ'), 4600);
  sfx('submit');
  renderScores('overScores', entry.ts);
}

function shoot(){
  bullets.push({x:player.x,y:player.y-16,vx:0,vy:-520,r:3,life:1.35});
  if(rank > 3 && Math.random()<.45){ bullets.push({x:player.x-8,y:player.y-12,vx:-42,vy:-500,r:2.5,life:1.25}); bullets.push({x:player.x+8,y:player.y-12,vx:42,vy:-500,r:2.5,life:1.25}); }
  sfx('shot');
}
function pulseBomb(){
  if(state !== 'playing' || bombs <= 0) return;
  bombs--; shake = 16; flash = .32; updateHud(); sfx('bomb');
  for(let i=enemies.length-1;i>=0;i--){ burst(enemies[i].x,enemies[i].y,'#ffcf5c',18); addScore(enemies[i].x,enemies[i].y,150); enemies.splice(i,1); }
  crawlers.forEach(c=>{ c.segs.forEach(s=>{ if(dist(player.x,player.y,s.x,s.y)<180) s.hit = true; }); });
  mushrooms.forEach(m=>{ if(dist(player.x,player.y,m.x,m.y)<145) m.hp--; });
}
function addScore(x,y,v){ score += v; popups.push({x,y,t:'+'+v,life:.8}); updateHud(); }
function burst(x,y,color,n){
  for(let i=0;i<n;i++) particles.push({x,y,vx:rand(-130,130),vy:rand(-160,80),life:rand(.25,.8),max:1,r:rand(1.5,4),color});
}
function nextWave(){
  wave++; rank += .28; bombs = Math.min(4,bombs+1); seedField(); makeCrawler(grid()*1.5, Math.min(18,10+wave), 46+wave*8);
  if(wave % 3 === 0) makeCrawler(grid()*3.2, 8+wave, 55+wave*7);
  flash=.18; updateHud(); sfx('wave');
}
function gameOver(){
  state='gameover'; demo=false; document.getElementById('bombBtn').classList.remove('show');
  document.getElementById('finalLine').textContent = `${score} POINTS · WAVE ${wave}`;
  if(qualifies(score)){ pendingEntry={score,level:wave,ts:Date.now()}; initials=['A','A','A']; setupInitials(); document.getElementById('initialBlock').classList.remove('hidden'); }
  else { pendingEntry=null; document.getElementById('initialBlock').classList.add('hidden'); }
  showOnly('gameOverScreen'); renderScores('overScores', pendingEntry && pendingEntry.ts);
}

function update(dt){
  gameTime += dt;
  const play = state === 'playing';
  if(state === 'title'){
    const t = performance.now()/1000; player.tx = W/2 + Math.sin(t*.9)*W*.25; player.ty = H-62 + Math.cos(t*1.3)*12;
  }
  player.x += (player.tx-player.x)*Math.min(1,dt*12); player.y += (player.ty-player.y)*Math.min(1,dt*12);
  player.x = clamp(player.x, 18, W-18); player.y = clamp(player.y, H*.68, H-30);
  player.fire -= dt; if(player.fire <= 0 && (play || state === 'title')){ player.fire = Math.max(.08,.18-rank*.01); shoot(); }
  bullets.forEach(b=>{ b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt; }); bullets = bullets.filter(b=>b.life>0 && b.y>-20 && b.x>-20 && b.x<W+20);
  updateCrawlers(dt, play); updateEnemies(dt, play); collisions(play);
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=180*dt;p.life-=dt}); particles=particles.filter(p=>p.life>0);
  popups.forEach(p=>{p.y-=32*dt;p.life-=dt}); popups=popups.filter(p=>p.life>0);
  mushrooms = mushrooms.filter(m=>m.hp>0);
  if(play){
    spawn.spider -= dt; spawn.flea -= dt; spawn.scorpion -= dt;
    if(spawn.spider<=0){ spawnSpider(); sfx('spider'); spawn.spider = rand(4.4,7.2)-Math.min(2.2,wave*.13); }
    if(spawn.flea<=0){ spawnFlea(); sfx('flea'); spawn.flea = rand(7,11)-Math.min(3,wave*.18); }
    if(spawn.scorpion<=0){ spawnScorpion(); sfx('scorpion'); spawn.scorpion = rand(10,15)-Math.min(4,wave*.2); }
    if(crawlers.length === 0) nextWave();
  }
  shake = Math.max(0, shake - dt*18); flash = Math.max(0, flash - dt*1.8);
}
function updateCrawlers(dt, play){
  const cell = grid();
  crawlers.forEach(c=>{
    c.wiggle += dt*8; const speed = (c.speed + rank*8) * dt;
    let lead = c.segs[0]; if(!lead) return;
    const blocked = mushrooms.some(m=>Math.abs(m.x-lead.x)<cell*.7 && Math.abs(m.y-lead.y)<cell*.7);
    if(blocked || lead.x < cell*.5 || lead.x > W-cell*.5){ c.dir *= -1; lead.y += cell; if(blocked && Math.random()<.35) lead.y += cell*.25; }
    if(c.dive || mushrooms.some(m=>m.poison && dist(m.x,m.y,lead.x,lead.y)<cell)){ lead.y += speed*1.55; lead.x += Math.sin(c.wiggle)*speed*.7; c.dive = true; }
    else lead.x += c.dir * speed;
    if(lead.y > H-48){ lead.y = cell; c.dive=false; }
    for(let i=1;i<c.segs.length;i++){
      const prev = c.segs[i-1], s = c.segs[i], dx=prev.x-s.x, dy=prev.y-s.y, d=Math.hypot(dx,dy)||1, target=cell*.82;
      if(d>target){ s.x += dx/d*(d-target); s.y += dy/d*(d-target); }
    }
  });
  crawlers = crawlers.map(c=>splitHitCrawler(c, play)).flat().filter(c=>c.segs.length);
}
function splitHitCrawler(c, play){
  const out = [], segs = c.segs;
  let current = [];
  for(let i=0;i<segs.length;i++){
    if(segs[i].hit){ if(play){ addScore(segs[i].x,segs[i].y,i===0?120:60); addMushroom(segs[i].x,segs[i].y,3,false); burst(segs[i].x,segs[i].y,'#6fffe6',14); sfx('segment'); } if(current.length) out.push({segs:current,dir:-c.dir,speed:c.speed+8,rowDir:1,dive:c.dive,hue:c.hue+18,wiggle:0}); current=[]; }
    else current.push(segs[i]);
  }
  if(current.length) out.push({segs:current,dir:c.dir,speed:c.speed,rowDir:1,dive:c.dive,hue:c.hue,wiggle:c.wiggle});
  out.forEach(o=>o.segs.forEach((s,i)=>s.head=i===0));
  return out;
}
function spawnSpider(){ enemies.push({type:'spider',x:Math.random()<.5?-20:W+20,y:rand(H*.7,H-42),vx:Math.random()<.5?rand(80,140):-rand(80,140),vy:rand(-45,45),r:15,t:0,hp:2}); }
function spawnFlea(){ enemies.push({type:'flea',x:rand(20,W-20),y:-24,vx:0,vy:rand(105,150)+wave*3,r:10,t:0,hp:1,drop:0}); }
function spawnScorpion(){ enemies.push({type:'scorpion',x:Math.random()<.5?-24:W+24,y:rand(58,H*.55),vx:Math.random()<.5?rand(70,105):-rand(70,105),vy:0,r:13,t:0,hp:2}); }
function updateEnemies(dt, play){
  enemies.forEach(e=>{
    e.t += dt; e.x += e.vx*dt; e.y += (e.vy + Math.sin(e.t*5)*28*(e.type==='spider'))*dt;
    if(e.type==='flea'){ e.drop-=dt; if(e.drop<=0){ e.drop=.32; addMushroom(e.x,e.y,3,false); } }
    if(e.type==='scorpion'){ mushrooms.forEach(m=>{ if(Math.abs(m.y-e.y)<14 && Math.abs(m.x-e.x)<18) m.poison=true; }); }
  });
  enemies = enemies.filter(e=>e.x>-50 && e.x<W+50 && e.y<H+50 && e.hp>0);
}
function collisions(play){
  bullets.forEach(b=>{
    mushrooms.forEach(m=>{ if(!b.dead && dist(b.x,b.y,m.x,m.y)<m.r){ b.dead=true; m.hp--; if(play) sfx('mushroom'); if(m.hp<=0 && play){ addScore(m.x,m.y,5); burst(m.x,m.y,m.poison?'#ff4fc4':'#52ffba',5); } } });
    crawlers.forEach(c=>c.segs.forEach(s=>{ if(!b.dead && dist(b.x,b.y,s.x,s.y)<grid()*.43){ b.dead=true; s.hit=true; } }));
    enemies.forEach(e=>{ if(!b.dead && dist(b.x,b.y,e.x,e.y)<e.r+3){ b.dead=true; e.hp--; if(e.hp<=0 && play){ addScore(e.x,e.y,e.type==='spider'?300:e.type==='scorpion'?500:200); burst(e.x,e.y,e.type==='scorpion'?'#ff48cc':'#ffd766',18); sfx('enemy'); } } });
  });
  bullets = bullets.filter(b=>!b.dead);
  if(!play) return;
  let hit = enemies.some(e=>dist(e.x,e.y,player.x,player.y)<e.r+player.r) || crawlers.some(c=>c.segs.some(s=>dist(s.x,s.y,player.x,player.y)<player.r+grid()*.38));
  if(hit && player.dead<=0){
    lives--; player.dead=1.6; shake=18; flash=.38; burst(player.x,player.y,'#ffffff',28); sfx('death'); updateHud();
    player.tx=W/2; player.ty=H-54; if(lives<=0) gameOver();
  }
  player.dead = Math.max(0, player.dead - .016);
}
function draw(){
  const ox = shake ? rand(-shake,shake) : 0, oy = shake ? rand(-shake,shake) : 0;
  ctx.save(); ctx.translate(ox,oy);
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#071026'); g.addColorStop(.62,'#061316'); g.addColorStop(1,'#09070d'); ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
  stars.forEach(s=>{ctx.globalAlpha=s.a;ctx.fillStyle='#b9ffff';ctx.fillRect(s.x,s.y,s.s,s.s)}); ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(71,255,224,.08)'; ctx.lineWidth=1; const cell=grid(); for(let y=cell;y<H;y+=cell){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  mushrooms.forEach(drawMushroom); crawlers.forEach(drawCrawler); enemies.forEach(drawEnemy);
  bullets.forEach(b=>{ctx.fillStyle='#f8ffff';ctx.shadowColor='#55fff0';ctx.shadowBlur=8;ctx.fillRect(Math.round(b.x-b.r*.5),Math.round(b.y-b.r*2),Math.max(2,b.r),Math.max(8,b.r*3));ctx.shadowBlur=0;ctx.fillStyle='#56fff0';ctx.fillRect(Math.round(b.x-b.r),Math.round(b.y+b.r),Math.max(2,b.r*2),2)});
  drawPlayer();
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/.8);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}); ctx.globalAlpha=1;
  popups.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/.8);ctx.fillStyle='#ffe66b';ctx.font='900 13px ui-monospace,monospace';ctx.fillText(p.t,p.x,p.y);}); ctx.globalAlpha=1;
  ctx.restore();
  if(flash){ctx.fillStyle=`rgba(255,255,255,${flash})`;ctx.fillRect(0,0,W,H);}
}
function drawMushroom(m){
  m.pulse += .04; const c = m.poison ? '#ff4fd2' : '#20f4a7', damage = 1 - m.hp / m.max;
  ctx.save(); ctx.translate(m.x,m.y); ctx.shadowColor=c; ctx.shadowBlur=10;
  ctx.strokeStyle=m.poison?'rgba(255,168,235,.55)':'rgba(195,255,239,.45)'; ctx.lineWidth=1.5;
  ctx.fillStyle = m.poison ? 'rgba(255,62,207,.42)' : 'rgba(35,255,177,.42)';
  ctx.beginPath(); ctx.arc(0,-4,m.r,Math.PI,0); ctx.quadraticCurveTo(m.r*.75,m.r*.68,0,m.r*.7); ctx.quadraticCurveTo(-m.r*.75,m.r*.68,-m.r,-4); ctx.fill();
  ctx.stroke();
  ctx.shadowBlur=0; ctx.fillStyle=m.poison?'#ffd2f5':'#dffff5';
  for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.arc(i*m.r*.32,-m.r*.38+Math.abs(i)*3,m.r*(.1+damage*.04),0,7); ctx.fill(); }
  ctx.strokeStyle=m.poison?'#5d003e':'#063a2b'; ctx.lineWidth=2;
  if(damage>.1){ctx.beginPath();ctx.moveTo(-m.r*.5,-m.r*.14);ctx.lineTo(-m.r*.18,m.r*.15);ctx.moveTo(m.r*.24,-m.r*.3);ctx.lineTo(m.r*.5,m.r*.04);ctx.stroke();}
  ctx.fillStyle = m.hp===3?'#eaffff':m.hp===2?'#99ffe8':'#ffdd76';
  ctx.fillRect(Math.round(-m.r*.22),Math.round(-3),Math.round(m.r*.44),Math.round(m.r*.82));
  ctx.fillStyle=m.poison?'#ff4fd2':'#49ffc3'; ctx.fillRect(Math.round(-m.r*.16),Math.round(1),Math.max(2,Math.round(m.r*.12)),Math.round(m.r*.5));
  if(m.poison){ ctx.strokeStyle='rgba(255,68,206,.55)'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(0,-2,m.r+2+Math.sin(m.pulse)*2,0,7); ctx.stroke(); }
  ctx.restore();
}
function drawCrawler(c){
  for(let i=c.segs.length-1;i>=0;i--){ const s=c.segs[i], r=grid()*.39, head=i===0, bob=Math.sin(c.wiggle+i*.7)*2; ctx.save(); ctx.translate(s.x,s.y+bob); ctx.rotate(Math.sin(c.wiggle+i*.5)*.08); ctx.shadowColor=head?'#f8ff6a':'#54ffe2'; ctx.shadowBlur=head?12:8; const grad=ctx.createRadialGradient(-r*.35,-r*.35,2,0,0,r); grad.addColorStop(0,'#ffffff'); grad.addColorStop(.38,head?'#fff06b':`hsl(${c.hue+i*3},95%,66%)`); grad.addColorStop(1,head?'#c58b00':`hsl(${c.hue+i*3},90%,34%)`); ctx.fillStyle=grad; ctx.beginPath(); ctx.ellipse(0,0,r*(head?1.1:1),r*.88,0,0,7); ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='rgba(1,20,26,.82)'; ctx.lineWidth=2; ctx.stroke(); ctx.strokeStyle='rgba(255,255,255,.32)'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(-r*.12,-r*.22,r*.38,Math.PI,Math.PI*1.85); ctx.stroke(); if(head){ctx.fillStyle='#071016';ctx.beginPath();ctx.arc(-r*.28,-r*.14,2.7,0,7);ctx.arc(r*.28,-r*.14,2.7,0,7);ctx.fill();ctx.strokeStyle='#071016';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-r*.46,-r*.55);ctx.lineTo(-r*.82,-r*.92);ctx.moveTo(r*.46,-r*.55);ctx.lineTo(r*.82,-r*.92);ctx.stroke();ctx.fillStyle='#ff4fb8';ctx.fillRect(-r*.26,r*.2,r*.52,2);} ctx.restore(); }
}
function drawEnemy(e){
  ctx.save(); ctx.translate(e.x,e.y); ctx.shadowBlur=14;
  if(e.type==='spider'){ctx.shadowColor='#ff9b4b';ctx.strokeStyle='#ffcf83';ctx.lineWidth=2;for(let i=-1;i<=1;i+=2){for(let k=0;k<4;k++){ctx.beginPath();ctx.moveTo(i*2,0);ctx.lineTo(i*(10+k*5),Math.sin(e.t*9+k)*7+k*3-4);ctx.stroke();}}ctx.fillStyle='#3a1105';ctx.beginPath();ctx.ellipse(0,0,17,11,0,0,7);ctx.fill();ctx.fillStyle='#ff7a3b';ctx.beginPath();ctx.ellipse(-2,-1,13,8,0,0,7);ctx.fill();ctx.fillStyle='#fff3ba';ctx.fillRect(-5,-4,3,3);ctx.fillRect(3,-4,3,3);}
  if(e.type==='flea'){ctx.shadowColor='#84ff4b';ctx.fillStyle='#173605';ctx.beginPath();ctx.ellipse(0,0,9,16,0,0,7);ctx.fill();ctx.fillStyle='#96ff5a';ctx.beginPath();ctx.ellipse(0,-1,7,14,0,0,7);ctx.fill();ctx.fillStyle='#e8ffd8';ctx.fillRect(-3,-9,2,4);ctx.fillRect(2,-9,2,4);ctx.strokeStyle='#173605';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-6,3);ctx.lineTo(-13,12);ctx.moveTo(6,3);ctx.lineTo(13,12);ctx.stroke();}
  if(e.type==='scorpion'){ctx.shadowColor='#ff47cc';ctx.strokeStyle='#ff9ee7';ctx.lineWidth=3;ctx.beginPath();ctx.arc(8,-10,10,Math.PI*.2,Math.PI*1.35);ctx.stroke();ctx.fillStyle='#ff47cc';ctx.beginPath();ctx.ellipse(0,0,16,8,0,0,7);ctx.fill();ctx.fillStyle='#4a0735';ctx.fillRect(-12,-3,24,3);ctx.strokeStyle='#ff9ee7';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-14,-2);ctx.lineTo(-22,-8);ctx.moveTo(14,-2);ctx.lineTo(22,-8);ctx.stroke();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(13,-18,2.5,0,7);ctx.fill();}
  ctx.restore();
}
function drawPlayer(){
  ctx.save(); ctx.translate(player.x,player.y); const inv = player.dead>0 && Math.floor(player.dead*12)%2===0; if(inv){ctx.globalAlpha=.35}
  ctx.shadowColor='#61f7ff'; ctx.shadowBlur=12; ctx.fillStyle='#061a27'; ctx.beginPath(); ctx.moveTo(0,-21); ctx.lineTo(18,17); ctx.lineTo(0,11); ctx.lineTo(-18,17); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='#dfffff'; ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(13,13); ctx.lineTo(0,7); ctx.lineTo(-13,13); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#60f7ff'; ctx.fillRect(-2,-19,4,18); ctx.fillStyle='#ff3f9d'; ctx.fillRect(-6,6,12,12); ctx.fillStyle='#ffe66b'; ctx.fillRect(-9,14,5,6); ctx.fillRect(4,14,5,6); ctx.restore();
}

function frame(t){
  const dt = Math.min(.033, (t-last)/1000 || .016); last=t;
  if(state === 'playing' || state === 'title') update(dt);
  draw(); requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

canvas.addEventListener('pointerdown', e=>{ if(state!=='playing') return; pointer={active:true,id:e.pointerId,x:e.clientX,y:e.clientY}; player.tx=e.clientX; player.ty=e.clientY; try{ canvas.setPointerCapture(e.pointerId); }catch(err){} });
canvas.addEventListener('pointermove', e=>{ if(state!=='playing' || !pointer.active || e.pointerId!==pointer.id) return; player.tx=e.clientX; player.ty=e.clientY; });
canvas.addEventListener('pointerup', e=>{ if(e.pointerId===pointer.id) pointer.active=false; });
canvas.addEventListener('pointercancel', e=>{ if(e.pointerId===pointer.id) pointer.active=false; });

bindButton('startBtn', startGame);
bindButton('scoresBtn', ()=>{ state='scores'; showOnly('scoresScreen'); renderScores('scoreTables'); });
bindButton('scoresBackBtn', ()=>{ state='title'; seedDemo(); showOnly('titleScreen'); renderScores('titleScores'); });
bindButton('againBtn', startGame);
bindButton('menuBtn', ()=>{ state='title'; seedDemo(); showOnly('titleScreen'); renderScores('titleScores'); });
bindButton('submitBtn', saveScore);
bindButton('bombBtn', pulseBomb);
bindButton('pauseBtn', ()=>{ if(state==='playing'){ state='paused'; document.querySelector('#titleScreen .title').innerHTML='Paused'; showOnly('titleScreen'); } else if(state==='paused'){ document.querySelector('#titleScreen .title').innerHTML='Neon<br>Myriapod'; state='playing'; showOnly(null); } });

seedDemo();
renderScores('titleScores');
</script>
