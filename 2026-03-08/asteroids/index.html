<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ASTEROIDS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#0ff;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;position:fixed;top:0;left:0;overscroll-behavior:none}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0}
button{touch-action:manipulation;cursor:pointer}
#hud{position:fixed;top:10px;left:10px;font-size:18px;text-shadow:0 0 8px #0ff,0 0 16px #0ff;z-index:10;pointer-events:none}
#hud .score{font-size:24px;font-weight:bold}
#hud .lives{margin-top:4px;font-size:20px}
#hud .wave{margin-top:2px;font-size:14px;color:#0f8}
#muteBtn{position:fixed;top:10px;right:10px;z-index:25;background:none;border:2px solid #0ff;color:#0ff;font-size:24px;width:44px;height:44px;border-radius:8px;text-shadow:0 0 8px #0ff;box-shadow:0 0 8px #0ff44;pointer-events:auto}
#muteBtn:active{background:#0ff33}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;pointer-events:auto;background:rgba(0,0,0,0.85)}
.overlay h1{font-size:42px;text-shadow:0 0 20px #0ff,0 0 40px #08f;margin-bottom:12px}
.overlay .sub{font-size:15px;color:#f0f;text-shadow:0 0 10px #f0f;margin-bottom:24px}
.overlay button{background:none;border:2px solid #0ff;color:#0ff;font-family:inherit;font-size:20px;padding:14px 40px;cursor:pointer;text-shadow:0 0 8px #0ff;box-shadow:0 0 12px #0ff44,inset 0 0 12px #0ff22;border-radius:8px;transition:all .2s;touch-action:manipulation;margin:6px}
.overlay button:active{background:#0ff33;box-shadow:0 0 24px #0ff88}
.overlay.hidden{display:none;pointer-events:none}
#tutorial{position:fixed;top:0;left:0;width:100%;height:100%;z-index:30;pointer-events:auto;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
#tutorial.hidden{display:none;pointer-events:none}
#tutorial h2{font-size:28px;color:#0ff;text-shadow:0 0 16px #0ff;margin-bottom:24px}
#tutorial .ctrl{margin:8px 0;font-size:16px;color:#ccc;line-height:1.6}
#tutorial .ctrl em{color:#0ff;font-style:normal;font-weight:bold}
#tutorial .ctrl .icon{font-size:22px;margin-right:6px}
#tutorial button{margin-top:28px;background:none;border:2px solid #0ff;color:#0ff;font-family:inherit;font-size:18px;padding:12px 36px;border-radius:8px;text-shadow:0 0 8px #0ff;box-shadow:0 0 12px #0ff44;touch-action:manipulation}
#tutorial button:active{background:#0ff33}
/* High score initials entry */
.hs-entry{text-align:center}
.hs-entry h2{font-size:24px;color:#ff0;text-shadow:0 0 16px #ff0;margin-bottom:8px}
.hs-entry .hs-score{font-size:18px;color:#0ff;margin-bottom:16px}
.hs-letter-group{display:flex;justify-content:center;gap:16px;margin-bottom:20px}
.hs-letter{display:flex;flex-direction:column;align-items:center;gap:4px}
.hs-letter .arrow-btn{background:none;border:2px solid #0ff;color:#0ff;font-size:24px;width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.hs-letter .arrow-btn:active{background:#0ff33}
.hs-letter .letter-display{font-size:36px;font-weight:bold;color:#ff0;text-shadow:0 0 12px #ff0;width:44px;text-align:center}
/* Leaderboard */
.hs-board{text-align:center}
.hs-board h2{font-size:24px;color:#0ff;text-shadow:0 0 16px #0ff;margin-bottom:12px}
.hs-board table{margin:0 auto;border-collapse:collapse;font-size:16px}
.hs-board td{padding:4px 12px;color:#ccc}
.hs-board .hs-rank{color:#888}
.hs-board .hs-name{color:#0ff;font-weight:bold}
.hs-board .hs-score-col{color:#0f8;text-align:right}
.hs-board .hs-wave{color:#f0f}
.hs-board .hs-new{color:#ff0;text-shadow:0 0 10px #ff0,0 0 20px #fa0}
.hs-board .hs-new .hs-name,.hs-board .hs-new .hs-score-col,.hs-board .hs-new .hs-wave{color:#ff0;text-shadow:0 0 10px #ff0,0 0 20px #fa0}
</style>
</head>
<body>
<div id="hud"><div class="score" id="score">0</div><div class="lives" id="lives"></div><div class="wave" id="wave"></div></div>
<button id="muteBtn">🔊</button>

<div id="tutorial">
<h2>🚀 CONTROLS</h2>
<div class="ctrl"><span class="icon">👆</span> <em>Hold anywhere</em> → Fly toward that point</div>
<div class="ctrl"><span class="icon">💥</span> <em>Tap</em> → Aim &amp; shoot toward tap</div>
<div class="ctrl" style="margin-top:12px;font-size:13px;color:#f0f">Hold to thrust, tap to aim+fire in any direction!</div>
<button id="tutorialBtn">GOT IT</button>
</div>

<div id="overlay" class="overlay hidden"><h1>ASTEROIDS</h1><div class="sub">NEON VECTOR EDITION</div><button id="startBtn">START</button><button id="hsBtn">HIGH SCORES</button></div>
<div id="hsOverlay" class="overlay hidden"></div>
<canvas id="c"></canvas>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),waveEl=document.getElementById('wave');
const overlay=document.getElementById('overlay'),startBtn=document.getElementById('startBtn'),hsBtn=document.getElementById('hsBtn');
const hsOverlay=document.getElementById('hsOverlay');
const tutorial=document.getElementById('tutorial'),tutorialBtn=document.getElementById('tutorialBtn');
const muteBtn=document.getElementById('muteBtn');

// === HIGH SCORES ===
const HS_KEY='asteroids_classic_highscores';
function getHighScores(){try{return JSON.parse(localStorage.getItem(HS_KEY))||[]}catch(e){return[]}}
function saveHighScores(hs){localStorage.setItem(HS_KEY,JSON.stringify(hs))}
function isHighScore(s){const hs=getHighScores();return hs.length<10||s>hs[hs.length-1].score}

let newHighScoreIndex=-1;

function showHighScoreEntry(finalScore,finalWave){
  newHighScoreIndex=-1;
  const letters=[0,0,0];// A=0
  hsOverlay.classList.remove('hidden');
  function render(){
    hsOverlay.innerHTML=`<div class="hs-entry">
      <h2>NEW HIGH SCORE!</h2>
      <div class="hs-score">Score: ${finalScore} &bull; Wave ${finalWave}</div>
      <div class="hs-letter-group">${[0,1,2].map(i=>`<div class="hs-letter">
        <button class="arrow-btn" data-dir="up" data-idx="${i}">▲</button>
        <div class="letter-display">${String.fromCharCode(65+letters[i])}</div>
        <button class="arrow-btn" data-dir="down" data-idx="${i}">▼</button>
      </div>`).join('')}</div>
      <button id="hsSubmit">SUBMIT</button>
    </div>`;
    hsOverlay.querySelectorAll('.arrow-btn').forEach(b=>{
      const handler=()=>{
        const idx=+b.dataset.idx;
        if(b.dataset.dir==='up')letters[idx]=(letters[idx]+25)%26;
        else letters[idx]=(letters[idx]+1)%26;
        render();
      };
      b.addEventListener('click',handler);
      b.addEventListener('touchend',e=>{e.preventDefault();handler()});
    });
    const sub=document.getElementById('hsSubmit');
    const submitHandler=()=>{
      const initials=letters.map(l=>String.fromCharCode(65+l)).join('');
      const hs=getHighScores();
      const entry={name:initials,score:finalScore,wave:finalWave};
      hs.push(entry);hs.sort((a,b)=>b.score-a.score);
      if(hs.length>10)hs.length=10;
      newHighScoreIndex=hs.indexOf(entry);
      saveHighScores(hs);
      showLeaderboard(true);
    };
    sub.addEventListener('click',submitHandler);
    sub.addEventListener('touchend',e=>{e.preventDefault();submitHandler()});
  }
  render();
}

function showLeaderboard(afterEntry){
  const hs=getHighScores();
  hsOverlay.classList.remove('hidden');
  let rows='';
  for(let i=0;i<10;i++){
    const e=hs[i];
    const cls=(afterEntry&&i===newHighScoreIndex)?'hs-new':'';
    if(e)rows+=`<tr class="${cls}"><td class="hs-rank">${i+1}.</td><td class="hs-name">${e.name}</td><td class="hs-score-col">${e.score}</td><td class="hs-wave">W${e.wave}</td></tr>`;
    else rows+=`<tr><td class="hs-rank">${i+1}.</td><td class="hs-name">---</td><td class="hs-score-col">0</td><td class="hs-wave">W0</td></tr>`;
  }
  hsOverlay.innerHTML=`<div class="hs-board"><h2>HIGH SCORES</h2><table>${rows}</table><button id="hsBack" style="margin-top:20px">BACK</button></div>`;
  const backHandler=()=>{
    hsOverlay.classList.add('hidden');
    newHighScoreIndex=-1;
    if(afterEntry){showOverlay('GAME OVER','Score: '+lastScore)}
    else{overlay.classList.remove('hidden')}
  };
  const backBtn=document.getElementById('hsBack');
  backBtn.addEventListener('click',backHandler);
  backBtn.addEventListener('touchend',e=>{e.preventDefault();backHandler()});
}

let lastScore=0;

// === SOUND ENGINE (Web Audio API) ===
let audioCtx=null,muted=false;
function initAudio(){
  if(audioCtx)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}catch(e){}
}
function playSound(type){
  if(!audioCtx||muted)return;
  try{
    const t=audioCtx.currentTime;
    if(type==='shoot'){
      const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
      osc.type='square';osc.frequency.setValueAtTime(880,t);osc.frequency.exponentialRampToValueAtTime(220,t+0.1);
      g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      osc.connect(g);g.connect(audioCtx.destination);osc.start(t);osc.stop(t+0.1);
    }else if(type==='explosion'){
      const buf=audioCtx.createBufferSource(),len=audioCtx.sampleRate*0.3;
      const buffer=audioCtx.createBuffer(1,len,audioCtx.sampleRate),data=buffer.getChannelData(0);
      for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
      buf.buffer=buffer;const g=audioCtx.createGain();g.gain.setValueAtTime(0.2,t);
      buf.connect(g);g.connect(audioCtx.destination);buf.start(t);
    }else if(type==='death'){
      const buf=audioCtx.createBufferSource(),len=audioCtx.sampleRate*0.6;
      const buffer=audioCtx.createBuffer(1,len,audioCtx.sampleRate),data=buffer.getChannelData(0);
      for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5);
      buf.buffer=buffer;const g=audioCtx.createGain();g.gain.setValueAtTime(0.3,t);
      buf.connect(g);g.connect(audioCtx.destination);buf.start(t);
    }else if(type==='waveClear'){
      const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
      osc.type='sine';osc.frequency.setValueAtTime(400,t);osc.frequency.exponentialRampToValueAtTime(1200,t+0.4);
      g.gain.setValueAtTime(0.15,t);g.gain.setValueAtTime(0.15,t+0.3);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.connect(g);g.connect(audioCtx.destination);osc.start(t);osc.stop(t+0.5);
    }
  }catch(e){}
}
let thrustNode=null,thrustGain=null;
function startThrust(){
  if(!audioCtx||muted||thrustNode)return;
  try{
    // Brown noise rumble (much better than raw sawtooth)
    const bufLen=audioCtx.sampleRate*2;
    const buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
    const d=buf.getChannelData(0);let last=0;
    for(let i=0;i<bufLen;i++){last=(last+(Math.random()*2-1)*0.02)/1.02;d[i]=last*3.5}
    thrustNode=audioCtx.createBufferSource();thrustNode.buffer=buf;thrustNode.loop=true;
    const filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=200;
    thrustGain=audioCtx.createGain();thrustGain.gain.setValueAtTime(0.12,audioCtx.currentTime);
    thrustNode.connect(filt);filt.connect(thrustGain);thrustGain.connect(audioCtx.destination);thrustNode.start();
  }catch(e){}
}
function stopThrust(){
  if(thrustNode){try{thrustNode.stop()}catch(e){}thrustNode=null;thrustGain=null}
}

function toggleMute(){muted=!muted;muteBtn.textContent=muted?'🔇':'🔊';if(muted)stopThrust()}
muteBtn.addEventListener('click',()=>{initAudio();toggleMute()});
muteBtn.addEventListener('touchend',e=>{e.preventDefault();initAudio();toggleMute()});

// Prevent default touch except on buttons/overlays
document.addEventListener('touchmove',e=>{
  if(e.target.closest('button')||e.target.closest('.overlay'))return;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchstart',e=>{if(e.target===canvas)e.preventDefault()},{passive:false});
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('contextmenu',e=>e.preventDefault());

let W,H,ship,asteroids,bullets,particles,score,lives,wave,gameOver,gameStarted,shakeTimer,shakeMag;
let keys={};
const TAU=Math.PI*2;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

window.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.code]=false});

const touches={};
let touchThrust=false,touchTargetA=null;

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  if(!gameStarted||gameOver)return;
  for(const t of e.changedTouches)touches[t.identifier]={x:t.clientX,y:t.clientY,startTime:performance.now(),moved:false};
  updateTouchTarget();
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=touches[t.identifier];if(!info)continue;
    if(Math.abs(t.clientX-info.x)>8||Math.abs(t.clientY-info.y)>8)info.moved=true;
    info.x=t.clientX;info.y=t.clientY;
  }
  updateTouchTarget();
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=touches[t.identifier];
    if(info){
      if(performance.now()-info.startTime<200&&!info.moved){
        // Rotate ship toward tap point, then fire
        if(ship){ship.a=Math.atan2(info.y-ship.y,info.x-ship.x)}
        keys._tapFire=true;setTimeout(()=>{keys._tapFire=false},50);
      }
      delete touches[t.identifier];
    }
  }
  updateTouchTarget();
},{passive:false});

canvas.addEventListener('touchcancel',e=>{
  for(const t of e.changedTouches)delete touches[t.identifier];
  updateTouchTarget();
},{passive:false});

function updateTouchTarget(){
  const ids=Object.keys(touches);
  let oldest=null,oldestTime=Infinity;
  for(const id of ids){
    const t=touches[id];
    if((performance.now()-t.startTime>=150||t.moved)&&t.startTime<oldestTime){oldest=t;oldestTime=t.startTime}
  }
  if(oldest&&ship){
    touchTargetA=Math.atan2(oldest.y-ship.y,oldest.x-ship.x);
    touchThrust=true;
  }else{touchThrust=false;touchTargetA=null}
}

function isKey(action){
  switch(action){
    case'left':return keys.ArrowLeft||keys.KeyA;
    case'right':return keys.ArrowRight||keys.KeyD;
    case'thrust':return keys.ArrowUp||keys.KeyW||touchThrust;
    case'fire':return keys.Space||keys._tapFire;
  }
}

function makeShip(){return{x:W/2,y:H/2,a:-Math.PI/2,vx:0,vy:0,r:15,fireCd:0,invuln:120,thrustOn:false}}

function makeAsteroid(x,y,size){
  const r=size===3?40:size===2?22:12;
  const speed=(1.2+wave*0.15)*(4-size)*0.4;
  const a=Math.random()*TAU;
  const verts=[],n=8+Math.floor(Math.random()*5);
  for(let i=0;i<n;i++)verts.push(r*(0.7+Math.random()*0.3));
  return{x,y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,r,size,verts,n,rot:Math.random()*TAU,rotV:(Math.random()-0.5)*0.02};
}

function spawnWave(){
  wave++;
  if(wave>1)playSound('waveClear');
  waveEl.textContent='WAVE '+wave;
  const count=3+wave;
  for(let i=0;i<count;i++){
    let x,y;
    do{x=Math.random()*W;y=Math.random()*H}while(Math.hypot(x-ship.x,y-ship.y)<150);
    asteroids.push(makeAsteroid(x,y,3));
  }
}

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*TAU,s=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*30,maxLife:60,color});
  }
}

function initGame(){
  ship=makeShip();asteroids=[];bullets=[];particles=[];score=0;lives=3;wave=0;gameOver=false;shakeTimer=0;shakeMag=0;
  spawnWave();updateHUD();
}

function updateHUD(){
  scoreEl.textContent=score;
  livesEl.textContent='♦'.repeat(lives);
}

let prevThrust=false;
function update(){
  if(gameOver)return;
  if(isKey('left'))ship.a-=0.06;
  if(isKey('right'))ship.a+=0.06;
  if(touchTargetA!==null&&touchThrust){
    updateTouchTarget();
    let diff=touchTargetA-ship.a;
    while(diff>Math.PI)diff-=TAU;while(diff<-Math.PI)diff+=TAU;
    if(Math.abs(diff)>0.08)ship.a+=Math.sign(diff)*0.08;else ship.a=touchTargetA;
  }
  ship.thrustOn=isKey('thrust');
  if(ship.thrustOn){ship.vx+=Math.cos(ship.a)*0.12;ship.vy+=Math.sin(ship.a)*0.12}
  // Thrust sound
  if(ship.thrustOn&&!prevThrust)startThrust();
  if(!ship.thrustOn&&prevThrust)stopThrust();
  prevThrust=ship.thrustOn;

  ship.vx*=0.99;ship.vy*=0.99;
  const spd=Math.hypot(ship.vx,ship.vy);if(spd>8){ship.vx*=8/spd;ship.vy*=8/spd}
  ship.x+=ship.vx;ship.y+=ship.vy;
  wrap(ship);
  if(ship.invuln>0)ship.invuln--;
  if(ship.fireCd>0)ship.fireCd--;
  if(isKey('fire')&&ship.fireCd<=0){
    bullets.push({x:ship.x+Math.cos(ship.a)*18,y:ship.y+Math.sin(ship.a)*18,vx:Math.cos(ship.a)*7,vy:Math.sin(ship.a)*7,life:55});
    ship.fireCd=10;
    playSound('shoot');
  }
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0){bullets.splice(i,1);continue}
    wrap(b);
  }
  for(const a of asteroids){a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotV;wrap(a)}
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    for(let j=asteroids.length-1;j>=0;j--){
      const a=asteroids[j];
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.r){
        bullets.splice(i,1);asteroids.splice(j,1);
        score+=a.size===1?100:a.size===2?50:20;
        spawnParticles(a.x,a.y,['#0ff','#0f0','#f0f'][a.size-1],12+a.size*4);
        playSound('explosion');
        if(a.size>1){asteroids.push(makeAsteroid(a.x,a.y,a.size-1));asteroids.push(makeAsteroid(a.x,a.y,a.size-1))}
        updateHUD();break;
      }
    }
  }
  if(ship.invuln<=0){
    for(let j=asteroids.length-1;j>=0;j--){
      const a=asteroids[j];
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.r+ship.r*0.6){
        lives--;shakeTimer=20;shakeMag=12;
        spawnParticles(ship.x,ship.y,'#f44',25);updateHUD();
        playSound('death');stopThrust();prevThrust=false;
        if(lives<=0){
          gameOver=true;lastScore=score;
          if(isHighScore(score)){setTimeout(()=>showHighScoreEntry(score,wave),800)}
          else{showOverlay('GAME OVER','Score: '+score)}
          return;
        }
        ship.x=W/2;ship.y=H/2;ship.vx=0;ship.vy=0;ship.invuln=120;break;
      }
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  if(asteroids.length===0)spawnWave();
  if(shakeTimer>0)shakeTimer--;
}

function wrap(o){
  const m=50;
  if(o.x<-m)o.x=W+m;if(o.x>W+m)o.x=-m;
  if(o.y<-m)o.y=H+m;if(o.y>H+m)o.y=-m;
}

function draw(){
  ctx.save();
  if(shakeTimer>0){const s=shakeMag*(shakeTimer/20);ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s)}
  ctx.clearRect(-50,-50,W+100,H+100);
  if(!gameOver&&ship){
    const blink=ship.invuln>0&&Math.floor(ship.invuln/4)%2;
    if(!blink){
      ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.a);
      ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.shadowColor='#0ff';ctx.shadowBlur=12;
      ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-12,10);ctx.lineTo(-7,0);ctx.lineTo(-12,-10);ctx.closePath();ctx.stroke();
      if(ship.thrustOn){
        ctx.strokeStyle='#f80';ctx.shadowColor='#f80';ctx.shadowBlur=16;
        ctx.beginPath();ctx.moveTo(-7,5);ctx.lineTo(-18-Math.random()*8,0);ctx.lineTo(-7,-5);ctx.stroke();
      }
      ctx.restore();
    }
  }
  ctx.strokeStyle='#0f8';ctx.lineWidth=1.5;ctx.shadowColor='#0f8';ctx.shadowBlur=10;
  if(asteroids)for(const a of asteroids){
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
    ctx.beginPath();
    for(let i=0;i<=a.n;i++){
      const idx=i%a.n,ang=TAU*idx/a.n,r=a.verts[idx];
      const px=Math.cos(ang)*r,py=Math.sin(ang)*r;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.stroke();ctx.restore();
  }
  ctx.shadowColor='#f0f';ctx.shadowBlur=14;
  if(bullets)for(const b of bullets){ctx.fillStyle='#f0f';ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,TAU);ctx.fill()}
  ctx.shadowBlur=6;
  if(particles)for(const p of particles){
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;ctx.fillStyle=p.color;ctx.shadowColor=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,2*alpha,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();
}

function showOverlay(title,sub){
  overlay.classList.remove('hidden');
  overlay.querySelector('h1').textContent=title;
  overlay.querySelector('.sub').textContent=sub||'';
  startBtn.textContent=gameOver?'RESTART':'START';
}

const tutorialSeen=localStorage.getItem('asteroids_tutorial');
if(tutorialSeen){tutorial.classList.add('hidden');overlay.classList.remove('hidden')}

function addDualHandler(el,fn){el.addEventListener('click',fn);el.addEventListener('touchend',e=>{e.preventDefault();fn()})}

addDualHandler(tutorialBtn,()=>{tutorial.classList.add('hidden');overlay.classList.remove('hidden');localStorage.setItem('asteroids_tutorial','1')});
addDualHandler(startBtn,()=>{initAudio();overlay.classList.add('hidden');gameStarted=true;initGame()});
addDualHandler(hsBtn,()=>{overlay.classList.add('hidden');showLeaderboard(false)});

let bgStars=[];for(let i=0;i<80;i++)bgStars.push({x:Math.random()*2000,y:Math.random()*2000,s:Math.random()*1.5+0.5});

function loop(){
  requestAnimationFrame(loop);
  if(gameStarted&&!gameOver)update();
  draw();
  ctx.fillStyle='#fff3';
  for(const s of bgStars)ctx.fillRect(s.x%W,s.y%H,s.s,s.s);
}
loop();
</script>
