<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#070a10">
<link rel="icon" href="data:,">
<title>Subway Siege v1.9</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{position:fixed;inset:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#05070b;color:#eef8ff;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%;background:#05070b;touch-action:none}
button{font:inherit;color:inherit;border:0;touch-action:manipulation;user-select:none;cursor:pointer}
.hud{position:absolute;inset:0;pointer-events:none;color:#eafbff;text-shadow:0 0 10px rgba(75,224,255,.75);z-index:3}
.top{position:absolute;top:env(safe-area-inset-top,0);left:0;right:0;display:grid;grid-template-columns:1fr auto 1fr;gap:8px;padding:10px 12px 0;font:900 12px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.07em}
.top div:nth-child(2){text-align:center}.top div:nth-child(3){text-align:right}
.bars{position:absolute;left:12px;right:12px;top:36px;display:flex;gap:8px;justify-content:center;align-items:center}
.bar{width:min(28vw,132px);height:7px;border:1px solid rgba(210,245,255,.28);border-radius:999px;background:rgba(0,0,0,.34);overflow:hidden}
.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#37ffc4,#7af0ff)}
.bar.charge span{background:linear-gradient(90deg,#ffd15a,#ff5fa7)}
.badge{padding:4px 8px;border:1px solid rgba(139,234,255,.32);border-radius:999px;background:rgba(4,13,22,.58);font:900 10px ui-monospace,monospace;color:#bcefff}
.controls{position:absolute;left:0;right:0;bottom:calc(12px + env(safe-area-inset-bottom,0));z-index:4;display:flex;justify-content:space-between;align-items:flex-end;padding:0 14px;pointer-events:none}
.ctrl{pointer-events:auto;width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.24),rgba(68,209,255,.18) 35%,rgba(6,15,28,.86));border:1px solid rgba(142,235,255,.38);box-shadow:0 0 18px rgba(68,209,255,.18),inset 0 1px 0 rgba(255,255,255,.24);font-weight:950;color:#eafbff}
#blastBtn{background:radial-gradient(circle at 35% 25%,#fff6c7,#ffbc47 37%,#bc326a 75%);color:#200812;border-color:rgba(255,219,124,.72)}
.overlay{position:absolute;inset:0;z-index:10;display:grid;place-items:center;padding:16px;pointer-events:auto}
.overlay.hidden{display:none}
.shade{position:absolute;inset:0;background:radial-gradient(circle at 50% 26%,rgba(88,217,255,.18),transparent 33%),radial-gradient(circle at 50% 78%,rgba(255,85,134,.12),transparent 34%),linear-gradient(180deg,rgba(2,5,10,.35),rgba(0,0,0,.84));backdrop-filter:blur(1px)}
.panel{position:relative;width:min(92vw,460px);max-height:92vh;overflow:auto;text-align:center;padding:18px 15px;border-radius:8px;border:1px solid rgba(127,229,255,.34);background:linear-gradient(180deg,rgba(9,18,29,.88),rgba(5,8,13,.96));box-shadow:0 0 42px rgba(56,205,255,.18),0 0 0 2px rgba(255,89,126,.08),inset 0 1px 0 rgba(255,255,255,.12)}
.panel:before{content:"";position:absolute;inset:8px;border:1px solid rgba(255,255,255,.08);border-radius:5px;pointer-events:none}
.version{position:absolute;top:10px;right:12px;color:#98b5bf;font:800 11px ui-monospace,monospace;letter-spacing:.09em}
h1{font-size:clamp(2.3rem,12vw,4.5rem);line-height:.82;text-transform:uppercase;font-weight:1000;letter-spacing:.015em;color:#fff;text-shadow:0 0 5px #fff,0 0 15px #65eaff,0 0 30px #236bd8,0 5px 0 #132e4a,0 9px 0 #3b1022;margin:12px 0 10px}
h2{font-size:clamp(2rem,9vw,3.2rem);line-height:.9;text-transform:uppercase;font-weight:1000;color:#fff;text-shadow:0 0 12px rgba(107,230,255,.8);margin:10px 0}
.subtitle{font:900 11px ui-monospace,monospace;letter-spacing:.24em;text-transform:uppercase;color:#7df1ff;margin-bottom:10px}
.small{font-size:13px;line-height:1.45;color:#b8d7df;margin:8px auto;max-width:380px}
.btn{min-width:152px;min-height:46px;margin:6px;padding:11px 16px;border-radius:8px;text-transform:uppercase;font-weight:950;letter-spacing:.1em;background:linear-gradient(180deg,#f5ffff,#55ecff 45%,#1276a4);color:#031219;box-shadow:0 4px 0 #07425c,0 0 20px rgba(80,230,255,.22)}
.btn.secondary{background:rgba(255,255,255,.07);border:1px solid rgba(151,235,255,.3);box-shadow:none;color:#eafbff}
.scores{display:grid;gap:6px;margin:10px 0;text-align:left}
.row{display:grid;grid-template-columns:26px 42px 1fr auto;gap:7px;padding:5px 7px;border:1px solid rgba(255,255,255,.08);border-radius:5px;background:rgba(0,0,0,.18);font:850 11px ui-monospace,monospace}
.row.new{color:#fff2a0;text-shadow:0 0 12px rgba(255,215,100,.65)}
.initials{display:flex;justify-content:center;gap:10px;margin:12px 0}.slot{display:grid;gap:4px}.letter{width:50px;height:50px;display:grid;place-items:center;border:1px solid rgba(130,235,255,.4);border-radius:8px;background:rgba(0,0,0,.28);font:1000 28px ui-monospace,monospace}.arrow{height:36px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(130,235,255,.25);font-weight:1000}
.hidden{display:none!important}
@media(max-width:390px){.panel{padding:15px 10px}.btn{min-width:132px;font-size:12px}.row{font-size:10px;grid-template-columns:22px 36px 1fr auto}.ctrl{width:52px;height:52px}.top{font-size:11px;padding-inline:8px}.bars{top:34px;left:8px;right:8px}}
</style>
</head>
<body>
<canvas id="game" aria-label="Subway Siege arcade game"></canvas>
<div class="hud" aria-hidden="true">
  <div class="top"><div id="scoreHud">000000</div><div id="waveHud">WAVE 1</div><div id="topHud">TOP 000000</div></div>
  <div class="bars"><span class="badge" id="shieldLabel">SHIELD</span><div class="bar"><span id="shieldBar" style="width:0%"></span></div><span class="badge" id="chargeLabel">CHARGE</span><div class="bar charge"><span id="chargeBar" style="width:0%"></span></div></div>
</div>
<div class="controls">
  <button id="pauseBtn" class="ctrl" aria-label="Pause">II</button>
  <button id="blastBtn" class="ctrl" aria-label="Discharge rail charge">⚡</button>
</div>
<section id="titleScreen" class="overlay">
  <div class="shade"></div><div class="panel">
    <div class="version">v1.9</div>
    <h1>Subway<br>Siege</h1>
    <div class="subtitle">tunnel defender</div>
    <p class="small">Drag anywhere to steer the rail drone. Hold or tap to fire. Grab shield and charge cells, dodge trains, and keep the tunnel alive.</p>
    <button id="startBtn" class="btn">Start</button>
    <button id="scoresBtn" class="btn secondary">Scores</button>
    <div id="titleScores" class="scores"></div>
  </div>
</section>
<section id="scoresScreen" class="overlay hidden">
  <div class="shade"></div><div class="panel">
    <div class="version">v1.9</div><h2>Top Ten</h2><div id="scoreTables" class="scores"></div>
    <button id="scoresBackBtn" class="btn secondary">Back</button>
  </div>
</section>
<section id="gameOverScreen" class="overlay hidden">
  <div class="shade"></div><div class="panel">
    <div class="version">v1.9</div><h2>Game Over</h2>
    <div id="finalLine" class="subtitle"></div>
    <div id="initialBlock" class="hidden"><p class="small">Enter initials</p><div id="initials" class="initials"></div><button id="submitBtn" class="btn">Submit</button></div>
    <div id="overScores" class="scores"></div>
    <button id="againBtn" class="btn">Restart</button><button id="menuBtn" class="btn secondary">Title</button>
  </div>
</section>
<script>
(()=>{"use strict";
const VERSION="v1.9",SCORE_KEY="subway_siege_scores_v1";
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
const $=id=>document.getElementById(id);
let W=0,H=0,DPR=1,last=0,state="title",running=true,audioCtx=null,masterGain=null,audioReady=false;
let score=0,wave=1,lives=3,spawnTimer=0,waveKills=0,waveNeed=14,shake=0,flash=0,slowMo=0,gameTime=0,bossSpawned=false;
let player={x:0,y:0,tx:0,ty:0,r:16,fire:0,shield:0,charge:0,heat:0,dead:0,weapon:"basic",weaponTimer:0};
let pointer={active:false,id:null,x:0,y:0,firing:false};
let bullets=[],enemyShots=[],enemies=[],particles=[],pickups=[],rails=[],lights=[],trains=[],sparks=[],shards=[],shockwaves=[],messages=[];
let initials=["A","A","A"],pendingEntry=null;
const BOOMS=["01_raider_pop","02_drone_crunch","04_brute_rupture","05_metal_debris_explosion","06_quick_crack_boom","07_cluster_flak","08_charge_bloom","09_long_tunnel_rumble","10_hard_standard_kaboom"];
const LASERS=["01_arcade_zap","02_rail_lance","03_plasma_pew","05_tri_burst","08_heavy_blaster","09_overheat_spit"];
const WEAPONS={basic:{sound:"01_arcade_zap",label:"LASER"},lance:{sound:"02_rail_lance",label:"RAIL LANCE"},plasma:{sound:"03_plasma_pew",label:"PLASMA"},tri:{sound:"05_tri_burst",label:"TRI-BURST"},heavy:{sound:"08_heavy_blaster",label:"HEAVY"},overheat:{sound:"09_overheat_spit",label:"OVERHEAT"}};
const WEAPON_DROPS=["lance","plasma","tri","heavy","overheat"];
let boomBuffers={},boomLoading=false,laserBuffers={},laserLoading=false;
function resize(){DPR=Math.min(devicePixelRatio||1,innerWidth*innerHeight>900000?2.6:3.5);W=innerWidth;H=innerHeight;canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(DPR,0,0,DPR,0,0);ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";seedScene();if(state==="title")placePlayer()}
addEventListener("resize",resize);addEventListener("orientationchange",()=>setTimeout(resize,180));
function seedScene(){rails=[];lights=[];for(let i=0;i<42;i++)rails.push({z:i/42});for(let i=0;i<34;i++)lights.push({z:i/34,side:i%2?-1:1,flicker:Math.random()*9});}
function placePlayer(){player.x=W*.5;player.y=H*.83;player.tx=player.x;player.ty=player.y}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rnd(a,b){return a+Math.random()*(b-a)}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)}
function scores(){try{return JSON.parse(localStorage.getItem(SCORE_KEY)||"[]").slice(0,10)}catch(e){return[]}}
function saveScores(list){localStorage.setItem(SCORE_KEY,JSON.stringify(list.slice(0,10)))}
function topScore(){return scores()[0]?.score||0}
function scoreRows(list,newEntry){return (list.length?list:[{initials:"---",score:0,wave:1}]).map((s,i)=>`<div class="row ${newEntry&&s.id===newEntry.id?"new":""}"><span>${i+1}.</span><b>${s.initials}</b><span>${String(s.score).padStart(6,"0")}</span><span>W${s.wave}</span></div>`).join("")}
function refreshScores(newEntry=null){$("titleScores").innerHTML=scoreRows(scores().slice(0,5));$("scoreTables").innerHTML=scoreRows(scores(),newEntry);$("overScores").innerHTML=scoreRows(scores(),newEntry);$("topHud").textContent="TOP "+String(topScore()).padStart(6,"0")}
function qualifies(){const list=scores();return score>0&&(list.length<10||score>list[list.length-1].score)}
function submitScore(){const entry={id:Date.now()+":"+Math.random().toString(36).slice(2),initials:initials.join(""),score,wave};const list=scores().concat(entry).sort((a,b)=>b.score-a.score);saveScores(list);pendingEntry=entry;$("initialBlock").classList.add("hidden");refreshScores(entry)}
function buildInitials(){const wrap=$("initials");wrap.innerHTML="";initials.forEach((ch,i)=>{const slot=document.createElement("div");slot.className="slot";slot.innerHTML=`<button class="arrow" data-i="${i}" data-d="1">▲</button><div class="letter">${ch}</div><button class="arrow" data-i="${i}" data-d="-1">▼</button>`;wrap.appendChild(slot)})}
function changeInitial(i,d){let n=initials[i].charCodeAt(0)-65+d;n=(n+26)%26;initials[i]=String.fromCharCode(65+n);buildInitials()}
function unlockAudio(){try{if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();const comp=audioCtx.createDynamicsCompressor();comp.threshold.value=-18;comp.knee.value=10;comp.ratio.value=9;comp.attack.value=.003;comp.release.value=.18;masterGain=audioCtx.createGain();masterGain.gain.value=.72;masterGain.connect(comp);comp.connect(audioCtx.destination)}if(audioCtx.state==="suspended")audioCtx.resume();audioReady=true;loadBooms();loadLasers()}catch(e){}}
function out(){return masterGain||audioCtx.destination}
function loadBooms(){if(!audioCtx||boomLoading)return;boomLoading=true;BOOMS.forEach(id=>fetch(`sfx/explosions/${id}.ogg`).then(r=>r.ok?r.arrayBuffer():Promise.reject()).then(b=>audioCtx.decodeAudioData(b)).then(buf=>boomBuffers[id]=buf).catch(()=>{}))}
function loadLasers(){if(!audioCtx||laserLoading)return;laserLoading=true;LASERS.forEach(id=>fetch(`sfx/laser-drafts/${id}.ogg`).then(r=>r.ok?r.arrayBuffer():Promise.reject()).then(b=>audioCtx.decodeAudioData(b)).then(buf=>laserBuffers[id]=buf).catch(()=>{}))}
function playBoom(id,vol=.72,rate=1){if(!audioCtx||!audioReady||!boomBuffers[id])return false;try{const src=audioCtx.createBufferSource(),g=audioCtx.createGain();src.buffer=boomBuffers[id];src.playbackRate.value=rate;g.gain.value=vol;src.connect(g);g.connect(out());src.start();return true}catch(e){return false}}
function playLaser(){if(!audioCtx||!audioReady)return false;const id=(WEAPONS[player.weapon]||WEAPONS.basic).sound;if(!laserBuffers[id])return false;try{const src=audioCtx.createBufferSource(),g=audioCtx.createGain();src.buffer=laserBuffers[id];src.playbackRate.value=1;g.gain.value=id==="08_heavy_blaster"?.62:.5;src.connect(g);g.connect(out());src.start();return true}catch(e){return false}}
function enemyBoom(e,charged=false){const id=charged?"09_long_tunnel_rumble":e.type==="boss"?"10_hard_standard_kaboom":e.type==="brute"?"05_metal_debris_explosion":e.type==="drone"?"06_quick_crack_boom":e.type==="spark"?"06_quick_crack_boom":"01_raider_pop";if(!playBoom(id,e.type==="boss"?.98:charged?0.82:0.72,rnd(.94,1.08)))sfx("hit")}
function tone(f,d,type="square",vol=.08,end=f,delay=0){if(!audioCtx||!audioReady)return;try{const t=audioCtx.currentTime+delay,o=audioCtx.createOscillator(),g=audioCtx.createGain(),filt=audioCtx.createBiquadFilter();o.type=type;o.frequency.setValueAtTime(Math.max(20,f),t);o.frequency.exponentialRampToValueAtTime(Math.max(20,end),t+d);filt.type="lowpass";filt.frequency.setValueAtTime(5200,t);filt.frequency.exponentialRampToValueAtTime(900,t+d);g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(vol,t+.006);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(filt);filt.connect(g);g.connect(out());o.start(t);o.stop(t+d+.04)}catch(e){}}
function noise(d=.12,vol=.045,filter=1200,delay=0,type="bandpass"){if(!audioCtx||!audioReady)return;try{const t=audioCtx.currentTime+delay,len=Math.floor(audioCtx.sampleRate*d),b=audioCtx.createBuffer(1,len,audioCtx.sampleRate),data=b.getChannelData(0);for(let i=0;i<len;i++){const fade=1-i/len;data[i]=(Math.random()*2-1)*fade*fade}const src=audioCtx.createBufferSource(),f=audioCtx.createBiquadFilter(),g=audioCtx.createGain();src.buffer=b;f.type=type;f.frequency.setValueAtTime(filter,t);f.Q.value=type==="bandpass"?1.7:.8;g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(vol,t+.008);g.gain.exponentialRampToValueAtTime(.0001,t+d);src.connect(f);f.connect(g);g.connect(out());src.start(t);src.stop(t+d+.02)}catch(e){}}
function sfx(kind){if(kind==="shot"){tone(740,.038,"square",.026,1180);tone(190,.055,"triangle",.014,90);noise(.032,.014,2600)}else if(kind==="bossShot"){tone(110,.12,"sawtooth",.058,72);tone(520,.07,"square",.034,260,.02);noise(.06,.028,1400,.01)}else if(kind==="hit"){tone(150,.09,"sawtooth",.052,46);tone(780,.045,"square",.018,360,.012);noise(.09,.04,760);noise(.045,.022,3300,.018)}else if(kind==="pickup"){tone(440,.055,"sine",.045,660);tone(660,.06,"triangle",.045,990,.045);tone(990,.075,"sine",.038,1320,.095)}else if(kind==="blast"){tone(74,.48,"sawtooth",.105,28);tone(112,.22,"square",.052,42,.025);noise(.42,.095,420,0,"lowpass");noise(.16,.055,2600,.035)}else if(kind==="hurt"){tone(260,.18,"triangle",.082,72);tone(78,.32,"sawtooth",.052,34,.04);noise(.2,.06,1700)}else if(kind==="start"){tone(220,.07,"triangle",.052,330);tone(440,.08,"triangle",.05,660,.07);tone(880,.11,"sine",.042,1320,.15)}else if(kind==="train"){tone(55,.42,"sawtooth",.045,38);noise(.34,.055,180,0,"lowpass");tone(330,.08,"square",.026,220,.18)}}
function startGame(){unlockAudio();sfx("start");state="play";score=0;wave=1;lives=3;gameTime=0;spawnTimer=0;waveKills=0;waveNeed=waveNeedFor(1);bossSpawned=false;shake=0;flash=0;slowMo=0;player.shield=0;player.charge=0;player.heat=0;player.weapon="basic";player.weaponTimer=0;bullets=[];enemyShots=[];enemies=[];particles=[];pickups=[];trains=[];sparks=[];shards=[];shockwaves=[];messages=[];placePlayer();hideOverlays();message("WAVE 1","RAIDERS INBOUND")}
function hideOverlays(){["titleScreen","scoresScreen","gameOverScreen"].forEach(id=>$(id).classList.add("hidden"))}
function showTitle(){state="title";hideOverlays();$("titleScreen").classList.remove("hidden");refreshScores()}
function gameOver(){state="over";pendingEntry=null;hideOverlays();$("gameOverScreen").classList.remove("hidden");$("finalLine").textContent=`${String(score).padStart(6,"0")} · WAVE ${wave}`;if(qualifies()){$("initialBlock").classList.remove("hidden");buildInitials()}else $("initialBlock").classList.add("hidden");refreshScores()}
function message(text,sub=""){messages.push({text,sub,t:2.2,max:2.2})}
function waveNeedFor(w){return w%4===0?1:12+w*5}
function waveSubtitle(w){return w%4===0?"SIGNAL LORD INBOUND":w%3===0?"EXPRESS TRAIN WARNING":"TUNNEL PRESSURE RISING"}
function advanceWave(){wave++;waveKills=0;waveNeed=waveNeedFor(wave);bossSpawned=false;message(wave%4===0?"BOSS WAVE "+wave:"WAVE "+wave,waveSubtitle(wave));player.charge=clamp(player.charge+22,0,100)}
function bossAlive(){return enemies.some(e=>e.type==="boss")}
function spawnBoss(){bossSpawned=true;const hp=24+wave*5;enemies.push({type:"boss",x:W*.5,y:-70,r:52,vx:0,vy:34+wave*2,hp,max:hp,fire:.55,rot:0,phase:rnd(0,6.28),value:2200+wave*220});flash=.28;shake=10;if(!playBoom("09_long_tunnel_rumble",.72,.9))sfx("blast")}
function spawnEnemy(){if(wave%4===0){if(!bossSpawned&&!bossAlive())spawnBoss();return}const lane=rnd(.18,.82),types=["raider","drone","spark"];let type=types[Math.floor(Math.random()*types.length)];if(wave>2&&Math.random()<.16)type="brute";if(wave>3&&Math.random()<.11)type="train";if(type==="train"){trains.push({x:lane*W,y:-80,w:rnd(56,88),h:rnd(145,220),speed:rnd(210,290)+wave*10,hp:4,side:Math.random()<.5?-1:1,flash:0});sfx("train");return}const hp=type==="brute"?4:type==="drone"?2:1;enemies.push({type,x:lane*W,y:-30,r:type==="brute"?23:type==="drone"?16:14,vx:rnd(-22,22),vy:rnd(70,120)+wave*9,hp,max:hp,fire:rnd(1.2,2.8),rot:rnd(0,6.28),value:type==="brute"?450:type==="drone"?250:type==="spark"?180:150})}
function addBullet(x,y,vx,vy,r=4,dmg=1,life=1.2,color="#dfffff"){bullets.push({x,y,vx,vy,r,life,dmg,color})}
function addEnemyShot(x,y,vx,vy,r=5,life=3,color="#ff6b7f"){enemyShots.push({x,y,px:x,py:y,vx,vy,r,life,max:life,color})}
function bossVolley(e){const base=Math.atan2(player.y-e.y,player.x-e.x),speed=185+wave*13,spread=.18+Math.min(.18,wave*.012),ports=[[-e.r*.54,e.r*.26],[0,e.r*.58],[e.r*.54,e.r*.26]];ports.forEach((p,i)=>{const a=base+(i-1)*spread;addEnemyShot(e.x+p[0],e.y+p[1],Math.cos(a)*speed,Math.sin(a)*speed,6,3.2,i===1?"#fff1a8":"#ff6b7f")});if(wave>=8){for(const side of[-1,1]){const a=base+side*.46;addEnemyShot(e.x+side*e.r*.72,e.y+e.r*.05,Math.cos(a)*(speed*.92),Math.sin(a)*(speed*.92),4.5,2.8,"#76eeff")}}sfx("bossShot")}

function drawTrain(t){ctx.save();ctx.translate(t.x,t.y);ctx.fillStyle=t.flash>0?"#fff6cc":"#111924";ctx.strokeStyle="#ffcf66";ctx.lineWidth=2;ctx.shadowColor="#ffcf66";ctx.shadowBlur=14;ctx.fillRect(-t.w/2,-t.h/2,t.w,t.h);ctx.strokeRect(-t.w/2,-t.h/2,t.w,t.h);ctx.fillStyle="#76eeff";for(let y=-t.h/2+16;y<t.h/2-20;y+=32)ctx.fillRect(-t.w/2+9,y,t.w-18,12);ctx.fillStyle="#ff4d6d";ctx.fillRect(-t.w/2+8,t.h/2-24,t.w-16,8);ctx.restore()}
function draw(){drawTunnel(gameTime);ctx.save();ctx.translate(shake?rnd(-shake,shake):0,shake?rnd(-shake,shake):0);pickups.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.fillStyle=p.type==="shield"?"#37ffc4":p.type==="charge"?"#ffd15a":"#ff7ad9";ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#07121d";ctx.font="900 11px ui-monospace,monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(p.type==="shield"?"S":p.type==="charge"?"C":"W",0,1);ctx.restore()});trains.forEach(drawTrain);enemies.forEach(drawEnemy);bullets.forEach(b=>{ctx.fillStyle=b.color||"#dfffff";ctx.shadowColor=b.color||"#78f2ff";ctx.shadowBlur=10;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill()});enemyShots.forEach(s=>{const a=clamp(s.life/s.max,0,1);ctx.save();ctx.globalAlpha=.35+.65*a;ctx.strokeStyle=s.color;ctx.lineWidth=Math.max(2,s.r*.75);ctx.lineCap="round";ctx.shadowColor=s.color;ctx.shadowBlur=16;ctx.beginPath();ctx.moveTo(s.px,s.py);ctx.lineTo(s.x,s.y);ctx.stroke();ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="rgba(255,255,255,.82)";ctx.beginPath();ctx.arc(s.x,s.y,Math.max(1.5,s.r*.38),0,Math.PI*2);ctx.fill();ctx.restore()});shockwaves.forEach(w=>{const a=clamp(w.life/w.max,0,1);ctx.save();ctx.globalAlpha=a*.75;ctx.strokeStyle=w.color;ctx.lineWidth=w.w*a;ctx.shadowColor=w.color;ctx.shadowBlur=22*a;ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=a*.2;ctx.lineWidth=w.w*2.4*a;ctx.beginPath();ctx.arc(w.x,w.y,w.r*.74,0,Math.PI*2);ctx.stroke();ctx.restore()});sparks.forEach(s=>{ctx.globalAlpha=clamp(s.life*2,0,1);ctx.fillStyle=s.color;ctx.fillRect(s.x-2,s.y-2,4,4);ctx.globalAlpha=1});shards.forEach(q=>{const a=clamp(q.life/q.max,0,1);ctx.save();ctx.globalAlpha=a*.45;ctx.strokeStyle=q.color;ctx.lineWidth=Math.max(.7,q.w*.72);ctx.lineCap="round";ctx.shadowColor=q.color;ctx.shadowBlur=18*a;ctx.beginPath();ctx.moveTo(q.px,q.py);ctx.lineTo(q.x-q.vx*.035,q.y-q.vy*.035);ctx.stroke();ctx.globalAlpha=a;ctx.translate(q.x,q.y);ctx.rotate(q.rot);ctx.strokeStyle=q.color;ctx.lineWidth=q.w;ctx.beginPath();ctx.moveTo(-q.len*.5,0);ctx.lineTo(q.len*.5,0);ctx.stroke();ctx.strokeStyle="rgba(255,255,255,.62)";ctx.lineWidth=Math.max(.65,q.w*.34);ctx.beginPath();ctx.moveTo(-q.len*.25,0);ctx.lineTo(q.len*.32,0);ctx.stroke();ctx.restore()});particles.forEach(p=>{ctx.globalAlpha=clamp(p.life/p.max,0,1);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.r*2,p.r*2);ctx.globalAlpha=1});drawPlayer();ctx.restore();if(messages[0]){const m=messages[0],a=clamp(m.t/.35,0,1),y=H*.28+(1-a)*12;ctx.globalAlpha=clamp(Math.min(m.t,m.max-m.t)*2,0,1);ctx.textAlign="center";ctx.fillStyle="#fff";ctx.font="1000 "+clamp(W*.075,28,54)+"px system-ui,sans-serif";ctx.textBaseline="middle";ctx.shadowColor="#5eeeff";ctx.shadowBlur=18;ctx.fillText(m.text,W/2,y);ctx.font="900 12px ui-monospace,monospace";ctx.fillStyle="#9ff4ff";ctx.fillText(m.sub,W/2,y+38);ctx.globalAlpha=1;ctx.shadowBlur=0}if(state==="paused"){ctx.fillStyle="rgba(0,0,0,.48)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#fff";ctx.font="1000 44px system-ui";ctx.textAlign="center";ctx.fillText("PAUSED",W/2,H/2)}if(flash>0){ctx.fillStyle=`rgba(255,245,190,${flash*.45})`;ctx.fillRect(0,0,W,H)}}
function loop(now){const dt=Math.min(.033,(now-last)/1000||.016);last=now;if(running)update(dt);draw();requestAnimationFrame(loop)}
function setPointer(e,on){const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left),y=(e.clientY-r.top);if(on){pointer.active=true;pointer.id=e.pointerId;pointer.firing=true;canvas.setPointerCapture?.(e.pointerId);unlockAudio()}pointer.x=x;pointer.y=y;player.tx=x;player.ty=y}
canvas.addEventListener("pointerdown",e=>{if(state==="title"){startGame();return}if(state==="over")return;if(state==="paused"){state="play";return}setPointer(e,true);e.preventDefault()});
canvas.addEventListener("pointermove",e=>{if(pointer.active&&(pointer.id===null||e.pointerId===pointer.id)){setPointer(e,false);e.preventDefault()}});
canvas.addEventListener("pointerup",e=>{if(e.pointerId===pointer.id){pointer.active=false;pointer.firing=false;pointer.id=null}e.preventDefault()});
canvas.addEventListener("pointercancel",()=>{pointer.active=false;pointer.firing=false;pointer.id=null});
document.addEventListener("touchmove",e=>{if(!e.target.closest("button,.overlay"))e.preventDefault()},{passive:false});
$("startBtn").onclick=startGame;$("scoresBtn").onclick=()=>{unlockAudio();hideOverlays();$("scoresScreen").classList.remove("hidden");refreshScores()};$("scoresBackBtn").onclick=showTitle;$("againBtn").onclick=startGame;$("menuBtn").onclick=showTitle;$("submitBtn").onclick=submitScore;$("blastBtn").onclick=blast;$("pauseBtn").onclick=()=>{unlockAudio();if(state==="play")state="paused";else if(state==="paused")state="play"};
$("initials").addEventListener("click",e=>{const b=e.target.closest("button[data-i]");if(b)changeInitial(+b.dataset.i,+b.dataset.d)});
addEventListener("keydown",e=>{if(e.key===" "){if(state==="play")blast();else if(state==="title")startGame()}if(e.key==="p"&&state==="play")state="paused";else if(e.key==="p"&&state==="paused")state="play";if(e.key.startsWith("Arrow")){if(e.key==="ArrowLeft")player.tx-=28;if(e.key==="ArrowRight")player.tx+=28;if(e.key==="ArrowUp")player.ty-=28;if(e.key==="ArrowDown")player.ty+=28}});
resize();refreshScores();requestAnimationFrame(loop);
})();
</script>
