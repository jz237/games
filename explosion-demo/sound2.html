<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sound #2 Variations</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#050510;color:#fff;font-family:monospace;min-height:100vh;overscroll-behavior:none}
h1{text-align:center;padding:20px 16px 4px;font-size:clamp(1.2rem,4vw,2rem);color:#0ff;letter-spacing:0.1em}
p.sub{text-align:center;color:rgba(0,255,255,0.5);font-size:0.8rem;margin-bottom:8px;padding:0 16px}
.ref{text-align:center;margin-bottom:20px}
.ref button{background:rgba(0,80,40,0.8);border:2px solid #0f8;border-radius:10px;color:#0f8;font-family:monospace;font-size:1rem;padding:12px 28px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;letter-spacing:0.1em}
.ref button:active{background:rgba(0,200,100,0.2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;padding:12px 12px 40px}
.btn{
  background:rgba(0,20,50,0.8);
  border:1px solid rgba(0,200,255,0.3);
  border-radius:10px;
  color:#fff;
  font-family:monospace;
  font-size:0.95rem;
  padding:16px 8px 12px;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:background 0.15s;
  user-select:none;
}
.btn:active,.btn.flash{background:rgba(255,255,255,0.15);border-color:#0ff}
.btn .num{font-size:1.4rem;color:#0ff;font-weight:bold}
.btn .label{font-size:0.6rem;color:rgba(255,255,255,0.5);letter-spacing:0.05em;text-align:center;line-height:1.4}
</style>
</head>
<body>
<h1>💥 SOUND #2 VARIATIONS</h1>
<p class="sub">All based on the deep hull crack. Original is green.</p>
<div class="ref">
  <button id="refBtn">▶ ORIGINAL #2</button>
</div>
<div class="grid" id="grid"></div>

<script>
'use strict';
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function noiseBurst(freq, dur, gain, t, shape='lowpass', envPow=1.4) {
  const bsz = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bsz, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bsz; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/bsz, envPow);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const filt = audioCtx.createBiquadFilter(); filt.type = shape; filt.frequency.value = freq;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  src.connect(filt).connect(g).connect(audioCtx.destination); src.start(t);
}

function sineThump(f1, f2, dur, gain, t) {
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(f1, t); o.frequency.exponentialRampToValueAtTime(f2, t+dur);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain,t+0.012); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t+dur+0.02);
}

function crack(gain, t) {
  noiseBurst(4000, 0.04, gain, t, 'highpass');
}

// Original #2 for reference
function original(t) {
  sineThump(160, 22, 0.32, 0.42, t);
  noiseBurst(500, 0.35, 0.16, t);
  crack(0.18, t);
}

const variants = [
  // 1 — Original #2 (copy for comparison)
  { label:'copy of #2', fn(t){ sineThump(160,22,0.32,0.42,t); noiseBurst(500,0.35,0.16,t); crack(0.18,t); }},

  // 2 — Deeper thump (lower start freq)
  { label:'deeper thump', fn(t){ sineThump(120,18,0.36,0.44,t); noiseBurst(500,0.38,0.16,t); crack(0.16,t); }},

  // 3 — Higher crack (brighter snap on top)
  { label:'brighter snap', fn(t){ sineThump(160,22,0.32,0.42,t); noiseBurst(500,0.35,0.16,t); crack(0.28,t); }},

  // 4 — Shorter decay (snappier)
  { label:'snappier', fn(t){ sineThump(160,28,0.2,0.42,t); noiseBurst(500,0.22,0.16,t); crack(0.18,t); }},

  // 5 — Longer decay (more boom)
  { label:'longer boom', fn(t){ sineThump(160,18,0.45,0.42,t); noiseBurst(500,0.48,0.17,t); crack(0.16,t); }},

  // 6 — Louder crack layer
  { label:'loud crack', fn(t){ sineThump(160,22,0.32,0.4,t); noiseBurst(500,0.35,0.14,t); noiseBurst(5000,0.05,0.32,t,'highpass'); }},

  // 7 — Mid noise band (warmer crunch)
  { label:'warm crunch', fn(t){ sineThump(160,22,0.32,0.42,t); noiseBurst(800,0.35,0.18,t,'bandpass'); crack(0.14,t); }},

  // 8 — No crack (pure thump)
  { label:'pure thump', fn(t){ sineThump(160,22,0.32,0.45,t); noiseBurst(500,0.38,0.18,t); }},

  // 9 — Added sub layer (extra rumble)
  { label:'+sub rumble', fn(t){ sineThump(160,22,0.32,0.38,t); sineThump(55,8,0.5,0.22,t); noiseBurst(500,0.35,0.15,t); crack(0.16,t); }},

  // 10 — Delayed crack (crack comes slightly after)
  { label:'delayed crack', fn(t){ sineThump(160,22,0.32,0.42,t); noiseBurst(500,0.35,0.16,t); crack(0.18,t+0.06); }},

  // 11 — Double crack
  { label:'double crack', fn(t){ sineThump(160,22,0.32,0.42,t); noiseBurst(500,0.35,0.15,t); crack(0.2,t); crack(0.14,t+0.05); }},

  // 12 — Slightly higher base tone
  { label:'higher base', fn(t){ sineThump(200,28,0.3,0.4,t); noiseBurst(600,0.32,0.16,t); crack(0.18,t); }},

  // 13 — Fatter noise (wider band)
  { label:'fatter noise', fn(t){ sineThump(160,22,0.32,0.42,t); noiseBurst(300,0.38,0.2,t); crack(0.16,t); }},

  // 14 — Extra mid layer
  { label:'+mid layer', fn(t){ sineThump(160,22,0.32,0.38,t); noiseBurst(500,0.35,0.14,t); noiseBurst(1200,0.18,0.14,t,'bandpass'); crack(0.16,t); }},

  // 15 — Slightly slower onset (tiny buildup)
  { label:'slow onset', fn(t){ sineThump(160,22,0.32,0.38,t+0.01); noiseBurst(500,0.35,0.16,t+0.01); crack(0.16,t+0.015); }},

  // 16 — Punchier attack (faster ramp up)
  { label:'punch attack', fn(t){ 
    const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(22,t+0.32);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.48,t+0.003); g.gain.exponentialRampToValueAtTime(0.001,t+0.32);
    o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t+0.34);
    noiseBurst(500,0.35,0.16,t); crack(0.18,t);
  }},

  // 17 — Less crack, more noise body
  { label:'more body', fn(t){ sineThump(160,22,0.32,0.42,t); noiseBurst(400,0.42,0.2,t); crack(0.08,t); }},

  // 18 — Metallic resonance on top
  { label:'+metallic', fn(t){
    sineThump(160,22,0.32,0.38,t); noiseBurst(500,0.35,0.15,t); crack(0.16,t);
    const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
    o.type='triangle'; o.frequency.value=380;
    g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t+0.26);
  }},

  // 19 — Slightly reverb-ish (quick echo)
  { label:'echo tail', fn(t){ 
    sineThump(160,22,0.32,0.42,t); noiseBurst(500,0.35,0.16,t); crack(0.18,t);
    sineThump(140,20,0.28,0.18,t+0.12); noiseBurst(500,0.3,0.08,t+0.12);
  }},

  // 20 — Beefiest version (all layers louder)
  { label:'max beef', fn(t){ sineThump(155,20,0.35,0.5,t); noiseBurst(450,0.38,0.22,t); crack(0.24,t); sineThump(55,8,0.45,0.18,t); }},
];

// Reference button
const refBtn = document.getElementById('refBtn');
function fireRef() { initAudio(); original(audioCtx.currentTime); }
refBtn.addEventListener('click', e => { e.stopPropagation(); fireRef(); });
refBtn.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); fireRef(); });

// Build grid
const grid = document.getElementById('grid');
variants.forEach((v, idx) => {
  const n = idx + 1;
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.innerHTML = `<span class="num">${n}</span><span class="label">${v.label}</span>`;
  function fire() {
    initAudio();
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 200);
    v.fn(audioCtx.currentTime);
  }
  btn.addEventListener('click', e => { e.stopPropagation(); fire(); });
  btn.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); fire(); });
  grid.appendChild(btn);
});
</script>
</body>
</html>
