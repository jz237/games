<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>Void Echo – Space Survival</title>
<!-- v1.1.0 -->
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:'Courier New',monospace;-webkit-user-select:none;user-select:none}
canvas{display:block;position:fixed;inset:0;touch-action:none}
#ui{position:fixed;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;color:rgba(200,230,255,.95);font-size:clamp(12px,2.5vw,16px);text-shadow:0 0 8px rgba(100,180,255,.6);pointer-events:none;z-index:10}
#ui .shield-bar{display:inline-block;width:60px;height:8px;border:1px solid rgba(100,200,255,.5);border-radius:4px;vertical-align:middle;margin-left:4px;overflow:hidden;background:rgba(0,0,0,.3)}
#ui .shield-fill{height:100%;background:linear-gradient(90deg,#0af,#0ff);transition:width .3s;border-radius:3px}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#b9ddff;z-index:20;padding:24px;text-align:center}
#overlay h1{font-size:clamp(28px,7vw,52px);letter-spacing:5px;margin-bottom:8px;text-shadow:0 0 30px rgba(100,180,255,.7)}
#overlay .sub{font-size:clamp(13px,2.5vw,18px);margin-bottom:20px;color:rgba(180,215,255,.7);max-width:420px;line-height:1.6}
#overlay .how{font-size:clamp(11px,2vw,14px);color:rgba(160,200,240,.55);max-width:380px;line-height:1.7;margin-bottom:24px}
#overlay button{min-height:52px;min-width:200px;padding:14px 36px;border-radius:6px;border:1px solid rgba(100,180,255,.6);background:rgba(100,180,255,.15);color:#cce5ff;font-family:'Courier New',monospace;font-size:clamp(14px,2.5vw,18px);letter-spacing:3px;cursor:pointer;transition:background .2s,box-shadow .2s;text-transform:uppercase;touch-action:manipulation}
#overlay button:hover,#overlay button:active{background:rgba(100,180,255,.3);box-shadow:0 0 20px rgba(100,180,255,.4)}
#overlay .buttonRow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:6px}
#overlay .result{font-size:clamp(20px,5vw,36px);letter-spacing:3px;margin-bottom:6px}
#overlay .score-final{font-size:clamp(14px,3vw,20px);color:rgba(180,220,255,.7);margin-bottom:20px}
.versionTag{position:fixed;left:14px;bottom:14px;z-index:30;color:rgba(170,210,255,.6);font-size:12px;letter-spacing:2px;text-shadow:0 0 10px rgba(100,180,255,.25);pointer-events:none}
.scorePanel{width:min(92vw,430px);margin-top:20px;padding:16px 16px 8px;border:1px solid rgba(130,190,255,.22);background:rgba(10,18,36,.48);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 0 30px rgba(30,80,160,.15) inset}
.scorePanelTitle{font-size:12px;letter-spacing:2px;margin-bottom:8px;color:#9ed8ff}
.leaderboardTitle{color:#ffd86a;letter-spacing:2px;font-size:12px;margin:14px 0 8px}
.leaderboardTitle.local{color:#78ddff}
.leaderboardRow{display:grid;grid-template-columns:32px 1fr auto auto;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06);align-items:center;font-size:12px;color:#ddecff}
.leaderboardRow span:last-child{color:#c7b7ff}
.leaderboardRow.newEntry{color:#fff2b5;text-shadow:0 0 10px rgba(255,220,120,.35)}
.initialsRow{display:flex;justify-content:center;gap:10px;margin:12px 0 14px}
.initialCell{display:flex;flex-direction:column;align-items:center;gap:6px}
.initialCell button{min-width:44px;min-height:36px;padding:0 10px;font-size:18px;letter-spacing:0;border-radius:8px}
.initialChar{width:44px;height:44px;border:1px solid rgba(140,205,255,.35);display:flex;align-items:center;justify-content:center;background:rgba(10,20,40,.55);font-size:24px;color:#eff8ff;text-shadow:0 0 10px rgba(120,200,255,.4)}
#muteBtn{position:fixed;bottom:14px;right:14px;z-index:30;width:44px;height:44px;border-radius:50%;border:1px solid rgba(100,180,255,.4);background:rgba(10,15,30,.7);color:#b9ddff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);touch-action:manipulation}
#muteBtn:hover,#muteBtn:active{background:rgba(100,180,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div>⚡ <span id="scoreEl">0</span></div>
  <div>LV <span id="levelEl">1</span>/3</div>
  <div>🛡<span class="shield-bar"><span class="shield-fill" id="shieldBar" style="width:0%"></span></span></div>
  <div>⏱ <span id="timeEl">30</span></div>
</div>
<div id="overlay">
  <h1>VOID ECHO</h1>
  <div class="sub">Survive the void. Dodge enemies. Collect crystals.</div>
  <div class="how">
    🚀 Drag or move mouse to pilot your ship<br>
    💎 Collect crystals for points + shield<br>
    🛡 Shield absorbs one hit<br>
    ☠️ Dodge red enemies &amp; asteroids<br>
    ⏱ Survive all 3 levels to win!
  </div>
  <div class="buttonRow">
    <button id="startBtn">TAP TO PLAY</button>
    <button id="scoresBtn">HIGH SCORES</button>
  </div>
  <div id="scorePanel" class="scorePanel" style="display:none"></div>
</div>
<div class="versionTag" id="versionTag">v1.2.0</div>
<button id="muteBtn" aria-label="Toggle sound">🔊</button>
<script>
// ─── VOID ECHO: Space Survival ───
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const overlay = document.getElementById('overlay');
const GAME_VERSION = 'v1.2.0';
const HS_KEY = 'void_echo_highscores';
const SCORES_API = 'https://game-scores.jez237.workers.dev/scores/void-echo';
const startBtn = document.getElementById('startBtn');
const scoresBtn = document.getElementById('scoresBtn');
let scorePanel = document.getElementById('scorePanel');
const scoreEl = document.getElementById('scoreEl');
const levelEl = document.getElementById('levelEl');
const timeEl = document.getElementById('timeEl');
const shieldBar = document.getElementById('shieldBar');

const muteBtn = document.getElementById('muteBtn');

let W, H;
let initials = [0,0,0];
const INITIAL_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
let pendingScoreSubmission = null;
let globalScoresCache = [];
let nearMissPulse = 0;
let atmosphereDrift = 0;
let announceText = '';
let announceTimer = 0;
let stormTimer = 8;
let stormFlash = 0;
let stormArcs = [];
function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
resize();
addEventListener('resize', resize);

// ─── Audio Engine (Echo/Reverb) ───
let audioCtx, masterGain, echoDelay, echoFeedback, echoWet, echoDry;
let audioReady = false;
let muted = false;

function initAudio() {
  if (audioReady) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);

    // Echo chain: delay → feedback gain → back to delay
    echoDelay = audioCtx.createDelay(2.0);
    echoDelay.delayTime.value = 0.35;
    echoFeedback = audioCtx.createGain();
    echoFeedback.gain.value = 0.4;
    echoDelay.connect(echoFeedback);
    echoFeedback.connect(echoDelay);

    // Wet path (echo output)
    echoWet = audioCtx.createGain();
    echoWet.gain.value = 0.5;
    echoDelay.connect(echoWet);
    echoWet.connect(masterGain);

    // Dry path
    echoDry = audioCtx.createGain();
    echoDry.gain.value = 0.7;
    echoDry.connect(masterGain);

    audioReady = true;
  } catch (e) { /* audio not available */ }
}

function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
}

// Route a source node through the echo chain
function connectEcho(node) {
  node.connect(echoDry);
  node.connect(echoDelay);
}

function rand(a, b) { return a + Math.random() * (b - a); }

function playEnemyVoice(kind = 'chaser') {
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = kind === 'asteroid' ? 'triangle' : 'sawtooth';
  osc2.type = 'sine';
  const base = kind === 'asteroid' ? rand(90, 130) : rand(180, 260);
  osc.frequency.setValueAtTime(base * 1.4, t);
  osc.frequency.exponentialRampToValueAtTime(base, t + rand(0.12, 0.22));
  osc2.frequency.setValueAtTime(base * rand(1.9, 2.5), t);
  osc2.frequency.exponentialRampToValueAtTime(base * 0.85, t + rand(0.18, 0.26));
  g.gain.setValueAtTime(0.001, t);
  g.gain.linearRampToValueAtTime(kind === 'asteroid' ? 0.09 : 0.06, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + rand(0.35, 0.55));
  osc.connect(g); osc2.connect(g);
  connectEcho(g);
  osc.start(t); osc2.start(t);
  osc.stop(t + 0.5); osc2.stop(t + 0.55);
}

function playShieldBreak() {
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(880, t);
  osc.frequency.exponentialRampToValueAtTime(140, t + 0.35);
  g.gain.setValueAtTime(0.22, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc.connect(g);
  connectEcho(g);
  osc.start(t);
  osc.stop(t + 0.4);
}

function playComboTier(tier = 1) {
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  const notes = tier >= 3 ? [620, 930, 1240] : tier === 2 ? [540, 760] : [480];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = i % 2 ? 'triangle' : 'sine';
    osc.frequency.setValueAtTime(freq, t + i * 0.04);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.7, t + i * 0.04 + 0.25);
    g.gain.setValueAtTime(0.001, t + i * 0.04);
    g.gain.linearRampToValueAtTime(0.12, t + i * 0.04 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.42);
    osc.connect(g);
    connectEcho(g);
    osc.start(t + i * 0.04);
    osc.stop(t + i * 0.04 + 0.42);
  });
}

function playStormBlast(power = 1) {
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.22, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 900 + power * 160;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.24, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
  noise.connect(bp); bp.connect(g); connectEcho(g);
  noise.start(t); noise.stop(t + 0.25);
  const osc = audioCtx.createOscillator();
  const og = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220 + power * 40, t);
  osc.frequency.exponentialRampToValueAtTime(55, t + 0.45);
  og.gain.setValueAtTime(0.14, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
  osc.connect(og); connectEcho(og);
  osc.start(t); osc.stop(t + 0.45);
}

muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.5;
});

// ─── Sound Effects ───
function playPing() {
  // Player action: ethereal ping ~400hz
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(600, t + 0.08);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  osc.connect(g);
  connectEcho(g);
  osc.start(t);
  osc.stop(t + 0.3);
}

function playCollect() {
  // Crystal pickup: crystalline chime arpeggio with variation
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  const noteSets = [[720, 940, 1240, 1540],[840, 1080, 1320, 1700],[760, 980, 1280, 1620],[680, 900, 1180, 1480]];
  const notes = noteSets[(Math.random() * noteSets.length) | 0];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = i % 2 ? 'triangle' : 'sine';
    osc.frequency.value = freq * rand(0.98, 1.03);
    g.gain.setValueAtTime(0, t + i * 0.06);
    g.gain.linearRampToValueAtTime(0.18, t + i * 0.06 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.5);
    osc.connect(g);
    connectEcho(g);
    osc.start(t + i * 0.06);
    osc.stop(t + i * 0.06 + 0.5);
  });
}

function playHazard() {
  // Enemy/hazard: varied resonant warning pulse
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = Math.random() < 0.5 ? 'sine' : 'triangle';
  osc.frequency.value = rand(68, 110);
  g.gain.setValueAtTime(0.001, t);
  g.gain.linearRampToValueAtTime(0.3, t + 0.15);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
  osc.connect(g);
  connectEcho(g);
  osc.start(t);
  osc.stop(t + 0.8);
}

function playDeath() {
  // Death: noise burst through heavy delay
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  // Noise burst
  const bufLen = audioCtx.sampleRate * 0.3;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.4, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  // Low pass for rumble
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 400;
  noise.connect(filt);
  filt.connect(g);
  connectEcho(g);
  noise.start(t);
  noise.stop(t + 0.5);
  // Sub boom
  const osc = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(100, t);
  osc.frequency.exponentialRampToValueAtTime(30, t + 0.6);
  g2.gain.setValueAtTime(0.35, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  osc.connect(g2);
  connectEcho(g2);
  osc.start(t);
  osc.stop(t + 0.6);
}

function playLevelComplete() {
  // Ascending echo sequence
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  const notes = [400, 500, 600, 800, 1000];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = i % 2 ? 'triangle' : 'sine';
    osc.frequency.value = freq * rand(0.98, 1.03);
    const start = t + i * 0.12;
    g.gain.setValueAtTime(0.001, start);
    g.gain.linearRampToValueAtTime(0.2, start + 0.03);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.6);
    osc.connect(g);
    connectEcho(g);
    osc.start(start);
    osc.stop(start + 0.6);
  });
}

function playGameOver() {
  // Deep descending tone fading into infinite echo
  if (!audioReady || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 2.0);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
  osc.connect(g);
  connectEcho(g);
  osc.start(t);
  osc.stop(t + 2.0);
  // Second voice, slightly detuned
  const osc2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(303, t);
  osc2.frequency.exponentialRampToValueAtTime(42, t + 2.2);
  g2.gain.setValueAtTime(0.2, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 2.2);
  osc2.connect(g2);
  connectEcho(g2);
  osc2.start(t);
  osc2.stop(t + 2.2);
}

let lastMoveSoundTime = 0;
function playMovePing() {
  // Subtle ambient echo ping on movement
  if (!audioReady || muted) return;
  const now = audioCtx.currentTime;
  if (now - lastMoveSoundTime < 0.4) return;
  lastMoveSoundTime = now;
  const t = now;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 1200 + Math.random() * 800;
  g.gain.setValueAtTime(0.04, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(g);
  connectEcho(g);
  osc.start(t);
  osc.stop(t + 0.15);
}

let comboCount = 0;
let comboTimer = 0;
function playCombo() {
  // Each successive hit echoes at higher pitch
  if (!audioReady || muted) return;
  comboCount++;
  const t = audioCtx.currentTime;
  const freq = 500 + comboCount * 100;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = Math.min(freq, 2000);
  g.gain.setValueAtTime(0.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc.connect(g);
  connectEcho(g);
  osc.start(t);
  osc.stop(t + 0.4);
}

function getHighScores() {
  try {
    return (JSON.parse(localStorage.getItem(HS_KEY)) || []).sort((a,b)=> (b.score - a.score) || ((b.level||0)-(a.level||0))).slice(0,10);
  } catch (e) { return []; }
}

function saveHighScores(list) {
  try { localStorage.setItem(HS_KEY, JSON.stringify(list.slice(0,10))); } catch (e) {}
}

function isHighScore(entry) {
  const list = getHighScores();
  return list.length < 10 || entry.score > list[list.length - 1].score;
}

async function fetchGlobalScores() {
  try {
    const res = await fetch(SCORES_API);
    const data = await res.json();
    globalScoresCache = (data.scores || data || []).map(s => ({ initials: s.initials || '???', score: Number(s.score) || 0, level: Number(s.level) || 1, ts: s.ts || 0 })).sort((a,b)=> (b.score-a.score) || ((b.level||0)-(a.level||0))).slice(0,10);
  } catch (e) {
    globalScoresCache = [];
  }
  return globalScoresCache;
}

function renderRows(rows, highlightTs) {
  if (!rows.length) return '<div style="color:rgba(255,255,255,.5);padding:6px 0">No scores yet</div>';
  return rows.map((e,i)=>`<div class="leaderboardRow${highlightTs && e.ts===highlightTs ? ' newEntry' : ''}"><span>${String(i+1).padStart(2,'0')}</span><span>${e.initials||'???'}</span><span>${e.score}</span><span>LV ${e.level||1}</span></div>`).join('');
}

function currentInitials() {
  return initials.map(i => INITIAL_CHARS[i]).join('');
}

function renderInitialPicker() {
  return `<div class="scorePanelTitle">ENTER INITIALS</div><div class="initialsRow">${initials.map((idx, slot)=>`<div class="initialCell"><button data-initial="${slot}" data-dir="1">▲</button><div class="initialChar">${INITIAL_CHARS[idx]}</div><button data-initial="${slot}" data-dir="-1">▼</button></div>`).join('')}</div><div class="buttonRow" style="margin-top:0"><button id="submitScoreBtn">SUBMIT SCORE</button><button id="cancelScoreBtn">SKIP</button></div>`;
}

async function renderScorePanel(highlightTs = 0) {
  const local = getHighScores();
  const global = await fetchGlobalScores();
  let html = '';
  if (pendingScoreSubmission) html += renderInitialPicker();
  html += `<div class="leaderboardTitle local">🏠 LOCAL HIGH SCORES</div>${renderRows(local, highlightTs)}<div class="leaderboardTitle">🌐 GLOBAL HIGH SCORES</div>${global.length ? renderRows(global, highlightTs) : '<div style="color:rgba(255,255,255,.5);padding:6px 0">Loading or unavailable</div>'}`;
  scorePanel.innerHTML = html;
  wireScorePanel();
}

function cycleInitial(slot, dir) {
  initials[slot] = (initials[slot] + dir + INITIAL_CHARS.length) % INITIAL_CHARS.length;
  renderScorePanel(pendingScoreSubmission && pendingScoreSubmission.ts);
}

async function submitScoreEntry() {
  if (!pendingScoreSubmission) return;
  const entry = { ...pendingScoreSubmission, initials: currentInitials() };
  const local = getHighScores();
  local.push(entry);
  local.sort((a,b)=> (b.score-a.score) || ((b.level||0)-(a.level||0)));
  saveHighScores(local);
  pendingScoreSubmission = null;
  try {
    await fetch(SCORES_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(entry) });
  } catch (e) {}
  renderScorePanel(entry.ts);
}

function wireScorePanel() {
  scorePanel.querySelectorAll('[data-initial]').forEach(btn => {
    btn.addEventListener('click', () => cycleInitial(Number(btn.dataset.initial), Number(btn.dataset.dir)));
    btn.addEventListener('touchend', e => { e.preventDefault(); cycleInitial(Number(btn.dataset.initial), Number(btn.dataset.dir)); });
  });
  const submitBtn = document.getElementById('submitScoreBtn');
  if (submitBtn) {
    submitBtn.addEventListener('click', submitScoreEntry);
    submitBtn.addEventListener('touchend', e => { e.preventDefault(); submitScoreEntry(); });
  }
  const cancelBtn = document.getElementById('cancelScoreBtn');
  if (cancelBtn) {
    cancelBtn.addEventListener('click', () => { pendingScoreSubmission = null; renderScorePanel(); });
    cancelBtn.addEventListener('touchend', e => { e.preventDefault(); pendingScoreSubmission = null; renderScorePanel(); });
  }
}

// ─── Game State ───
let state = 'menu'; // menu | playing | won | lost
let score = 0;
let level = 1;
let timer = 0;
let shieldHP = 0; // 0-100
let shakeT = 0;
let particles = [];
let stars = [];
let voidBands = [];
let wisps = [];
let enemies = [];
let asteroids = [];
let crystals = [];
let player = { x: 0, y: 0, tx: 0, ty: 0, r: 16, glow: 0 };
let inputActive = false;
let lastTime = 0;

// Level config: { duration, enemyCount, enemySpeed, asteroidCount, crystalCount }
const LEVELS = [
  { duration: 30, enemyCount: 3, enemySpeed: 60, asteroidCount: 4, crystalCount: 6 },
  { duration: 30, enemyCount: 6, enemySpeed: 100, asteroidCount: 7, crystalCount: 5 },
  { duration: 30, enemyCount: 12, enemySpeed: 140, asteroidCount: 10, crystalCount: 4 },
];
function getLevelConfig(lvl) {
  if (lvl <= LEVELS.length) return LEVELS[lvl - 1];
  const extra = lvl - LEVELS.length;
  return {
    duration: Math.max(22, 28 - extra * 0.5),
    enemyCount: 12 + extra * 2,
    enemySpeed: 140 + extra * 16,
    asteroidCount: 10 + Math.floor(extra * 1.5),
    crystalCount: Math.max(3, 4 - Math.floor(extra / 4))
  };
}
function announce(msg) {
  announceText = msg;
  announceTimer = 2.2;
}

// ─── Stars ───
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 1.8 + 0.3, b: Math.random(), drift: rand(0.2, 1.1) });
  }
}

function initAtmosphere() {
  voidBands = Array.from({ length: 6 }, (_, i) => ({ y: H * (i + 0.5) / 6, phase: Math.random() * Math.PI * 2, speed: rand(0.2, 0.9), amp: rand(18, 42), width: rand(160, 280) }));
  wisps = Array.from({ length: 10 }, () => ({ x: Math.random() * W, y: Math.random() * H, r: rand(28, 70), vx: rand(-10, 10), vy: rand(-6, 6), a: rand(0.03, 0.08) }));
}

// ─── Init Level ───
function initLevel() {
  const cfg = getLevelConfig(level);
  timer = cfg.duration;
  announce(level <= 3 ? `SECTOR ${level}` : `VOID STORM ${level}`);
  enemies = [];
  asteroids = [];
  crystals = [];
  particles = [];

  // Spawn enemies at edges
  for (let i = 0; i < cfg.enemyCount; i++) {
    spawnEnemy();
  }
  // Spawn asteroids
  for (let i = 0; i < cfg.asteroidCount; i++) {
    asteroids.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 14 + Math.random() * 22,
      vx: (Math.random() - 0.5) * 40,
      vy: (Math.random() - 0.5) * 40,
      rot: Math.random() * Math.PI * 2,
      rv: (Math.random() - 0.5) * 2,
      verts: genAsteroidVerts()
    });
  }
  // Spawn crystals
  for (let i = 0; i < cfg.crystalCount; i++) {
    spawnCrystal();
  }
}

function spawnEnemy() {
  const side = Math.random() * 4 | 0;
  let x, y;
  if (side === 0) { x = -30; y = Math.random() * H; }
  else if (side === 1) { x = W + 30; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = -30; }
  else { x = Math.random() * W; y = H + 30; }
  const eliteChance = level >= 4 ? Math.min(0.16 + (level - 4) * 0.02, 0.34) : 0;
  const elite = Math.random() < eliteChance;
  enemies.push({ x, y, r: (elite ? 20 : 12) + Math.random() * (elite ? 8 : 6), pulse: Math.random() * Math.PI * 2, kind: elite ? 'overseer' : (Math.random() < 0.28 ? 'phantom' : 'chaser'), aura: Math.random() * Math.PI * 2, elite });
}


function spawnCrystal() {
  crystals.push({
    x: 40 + Math.random() * (W - 80),
    y: 40 + Math.random() * (H - 80),
    r: 10,
    rot: Math.random() * Math.PI * 2,
    sparkle: Math.random() * Math.PI * 2
  });
}

function genAsteroidVerts() {
  const n = 6 + (Math.random() * 4 | 0);
  const v = [];
  for (let i = 0; i < n; i++) {
    v.push(0.6 + Math.random() * 0.4);
  }
  return v;
}

// ─── Particles ───
function emitParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed + speed * 0.3;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color, r: 1.5 + Math.random() * 2.5 });
  }
}

function killEnemy(index, reason = 'storm') {
  const e = enemies[index];
  if (!e) return;
  const color = e.kind === 'overseer' ? '#9ff' : e.kind === 'phantom' ? '#c7a6ff' : '#ff7a5f';
  emitParticles(e.x, e.y, color, e.kind === 'overseer' ? 36 : 22, e.kind === 'overseer' ? 220 : 150);
  score += e.kind === 'overseer' ? 60 : e.kind === 'phantom' ? 35 : 20;
  if (reason === 'storm') playStormBlast(e.kind === 'overseer' ? 2 : 1);
  else playEnemyVoice(e.kind);
  enemies.splice(index, 1);
}

function triggerStormEvent() {
  if (state !== 'playing' || level < 3) return;
  stormFlash = 1;
  const hits = Math.min(enemies.length, 1 + Math.floor(level / 3));
  stormArcs = [];
  announce(level < 6 ? 'VOID SURGE' : 'STORM FRACTURE');
  for (let i = 0; i < hits; i++) {
    if (!enemies.length) break;
    const idx = Math.random() * enemies.length | 0;
    const e = enemies[idx];
    stormArcs.push({ x1: rand(0, W), y1: -20, x2: e.x, y2: e.y, life: 0.22, color: e.kind === 'overseer' ? '#c8ffff' : '#9fd6ff' });
    killEnemy(idx, 'storm');
  }
  if (level >= 5 && crystals.length && Math.random() < 0.6) {
    const cr = crystals[Math.random() * crystals.length | 0];
    emitParticles(cr.x, cr.y, '#8ff', 24, 120);
    score += 25;
  }
}

// ─── Input ───
function setTarget(cx, cy) {
  player.tx = cx;
  player.ty = cy;
}

C.addEventListener('pointerdown', e => {
  if (state !== 'playing') return;
  inputActive = true;
  setTarget(e.clientX, e.clientY);
  playPing();
});
C.addEventListener('pointermove', e => {
  if (state !== 'playing') return;
  if (e.pointerType === 'mouse' || inputActive) {
    setTarget(e.clientX, e.clientY);
  }
});
C.addEventListener('pointerup', () => { inputActive = false; });
C.addEventListener('pointercancel', () => { inputActive = false; });

// Mouse always controls on desktop
C.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  setTarget(e.clientX, e.clientY);
});

// ─── Collision ───
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// ─── Start / Restart ───
function startGame() {
  initAudio();
  resumeAudio();
  state = 'playing';
  score = 0;
  level = 1;
  comboCount = 0;
  comboTimer = 0;
  shieldHP = 0;
  shakeT = 0;
  stormTimer = 8;
  stormFlash = 0;
  stormArcs = [];
  player.x = W / 2;
  player.y = H / 2;
  player.tx = W / 2;
  player.ty = H / 2;
  player.glow = 0;
  particles = [];
  overlay.style.display = 'none';
  initStars();
  initAtmosphere();
  initLevel();
  updateUI();
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', startGame);
startBtn.addEventListener('touchend', e => { e.preventDefault(); startGame(); });
scoresBtn.addEventListener('click', () => { scorePanel.style.display = scorePanel.style.display === 'block' ? 'none' : 'block'; if (scorePanel.style.display === 'block') renderScorePanel(); });
scoresBtn.addEventListener('touchend', e => { e.preventDefault(); scorePanel.style.display = scorePanel.style.display === 'block' ? 'none' : 'block'; if (scorePanel.style.display === 'block') renderScorePanel(); });

// ─── UI ───
function updateUI() {
  scoreEl.textContent = score;
  levelEl.textContent = level <= 3 ? level : `${level}∞`;
  timeEl.textContent = Math.ceil(timer);
  shieldBar.style.width = Math.min(100, shieldHP) + '%';
}

function showEnd(won) {
  state = won ? 'won' : 'lost';
  const entry = { score, level, ts: Date.now() };
  pendingScoreSubmission = isHighScore(entry) ? entry : null;
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <div class="result">${won ? '🏆 YOU SURVIVED!' : '💀 DESTROYED'}</div>
    <div class="score-final">Score: ${score}${won ? ' — All 3 levels cleared!' : ` — Reached Level ${level}`}</div>
    <div class="buttonRow"><button id="restartBtn">PLAY AGAIN</button><button id="endScoresBtn">HIGH SCORES</button></div>
    <div id="scorePanel" class="scorePanel"></div>
  `;
  scorePanel = document.getElementById('scorePanel');
  document.getElementById('restartBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('touchend', e => { e.preventDefault(); startGame(); });
  document.getElementById('endScoresBtn').addEventListener('click', () => renderScorePanel(pendingScoreSubmission && pendingScoreSubmission.ts));
  document.getElementById('endScoresBtn').addEventListener('touchend', e => { e.preventDefault(); renderScorePanel(pendingScoreSubmission && pendingScoreSubmission.ts); });
  renderScorePanel(pendingScoreSubmission && pendingScoreSubmission.ts);
}

// ─── Main Loop ───
function loop(now) {
  if (state !== 'playing') return;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  update(dt);
  draw();
  updateUI();

  requestAnimationFrame(loop);
}

// ─── Update ───
function update(dt) {
  const cfg = getLevelConfig(level);

  // Timer
  timer -= dt;
  if (timer <= 0) {
    timer = 0;
    level++;
    initLevel();
    playLevelComplete();
    emitParticles(player.x, player.y, level <= 3 ? '#0af' : '#b6f', level <= 3 ? 30 : 52, level <= 3 ? 120 : 190);
    return;
  }

  atmosphereDrift += dt;
  nearMissPulse = Math.max(0, nearMissPulse - dt * 2.2);
  for (const w of wisps) {
    w.x += w.vx * dt; w.y += w.vy * dt;
    if (w.x < -120) w.x = W + 120; if (w.x > W + 120) w.x = -120;
    if (w.y < -120) w.y = H + 120; if (w.y > H + 120) w.y = -120;
  }

  // Player movement – smooth follow
  const dx = player.tx - player.x;
  const dy = player.ty - player.y;
  const d = Math.hypot(dx, dy);
  const speed = 8;
  if (d > 2) {
    player.x += dx * speed * dt * (d > 100 ? 3 : 1.5);
    player.y += dy * speed * dt * (d > 100 ? 3 : 1.5);
  }

  // Clamp to screen
  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));

  // Movement sound
  if (d > 10) playMovePing();

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }
  if (announceTimer > 0) announceTimer -= dt;
  if (stormFlash > 0) stormFlash = Math.max(0, stormFlash - dt * 3.2);
  for (let i = stormArcs.length - 1; i >= 0; i--) {
    stormArcs[i].life -= dt;
    if (stormArcs[i].life <= 0) stormArcs.splice(i, 1);
  }
  stormTimer -= dt;
  if (stormTimer <= 0) {
    triggerStormEvent();
    stormTimer = Math.max(8, 16 - level * 0.45);
  }

  player.glow += dt * 3;

  // Shield decay
  if (shieldHP > 0) shieldHP -= dt * 4;
  if (shieldHP < 0) shieldHP = 0;

  // Enemies – chase player
  for (const e of enemies) {
    const ex = player.x - e.x;
    const ey = player.y - e.y;
    const ed = Math.hypot(ex, ey) || 1;
    const speedMult = e.elite ? 1.18 : e.kind === 'overseer' ? 1.08 : e.kind === 'phantom' ? 0.96 : 1;
    e.x += (ex / ed) * cfg.enemySpeed * speedMult * dt;
    e.y += (ey / ed) * cfg.enemySpeed * speedMult * dt;
    e.pulse += dt * 5;
    e.aura += dt * (e.kind === 'phantom' ? 7 : 4);
    if (ed < player.r + e.r + 26 && ed > player.r + e.r + 2 && Math.random() < dt * 6) {
      nearMissPulse = Math.max(nearMissPulse, 0.5);
      if (Math.random() < (e.elite ? 0.45 : 0.2)) playEnemyVoice(e.kind);
    }

    // Collision with player
    if (dist(player, e) < player.r + e.r) {
      if (shieldHP > 0) {
        shieldHP = 0;
        emitParticles(e.x, e.y, '#0ff', 20, 150);
        shakeT = 0.2;
        nearMissPulse = 1;
        playShieldBreak();
        playHazard();
        // Push enemy away
        e.x = player.x - (ex / ed) * 150;
        e.y = player.y - (ey / ed) * 150;
      } else {
        emitParticles(player.x, player.y, '#f44', 40, 200);
        shakeT = 0.4;
        playDeath();
        playGameOver();
        showEnd(false);
        // Do one more draw with particles
        draw();
        return;
      }
    }
  }

  // Occasionally spawn new enemies in later levels
  if (level >= 2 && Math.random() < dt * 0.3) {
    if (enemies.length < cfg.enemyCount + 4 + Math.floor(Math.max(0, level - 3) * 0.5)) spawnEnemy();
  }

  // Asteroids
  for (const a of asteroids) {
    a.x += a.vx * dt;
    a.y += a.vy * dt;
    a.rot += a.rv * dt;
    // Wrap
    if (a.x < -50) a.x = W + 40;
    if (a.x > W + 50) a.x = -40;
    if (a.y < -50) a.y = H + 40;
    if (a.y > H + 50) a.y = -40;

    // Collision
    if (dist(player, a) < player.r + a.r * 0.7) {
      if (shieldHP > 0) {
        shieldHP = 0;
        emitParticles(a.x, a.y, '#fa0', 15, 100);
        shakeT = 0.2;
        nearMissPulse = 1;
        playEnemyVoice('asteroid');
        playShieldBreak();
        playHazard();
      } else {
        emitParticles(player.x, player.y, '#f80', 35, 180);
        shakeT = 0.4;
        playDeath();
        playGameOver();
        showEnd(false);
        draw();
        return;
      }
    }
  }

  // Crystals
  for (let i = crystals.length - 1; i >= 0; i--) {
    const cr = crystals[i];
    cr.rot += dt * 2;
    cr.sparkle += dt * 4;
    if (dist(player, cr) < player.r + cr.r + 8) {
      score += 10 + Math.max(0, comboCount - 1) * 2 + Math.max(0, level - 3) * 3;
      shieldHP = Math.min(100, shieldHP + 35);
      emitParticles(cr.x, cr.y, '#0ff', 12, 80);
      playCollect();
      playCombo();
      comboTimer = 2.4;
      if (comboCount === 5) { emitParticles(player.x, player.y, '#8ff', 22, 120); playComboTier(1); }
      if (comboCount === 10) { emitParticles(player.x, player.y, '#b8ff', 30, 140); playComboTier(2); }
      if (comboCount === 15) { emitParticles(player.x, player.y, '#fff', 42, 170); playComboTier(3); }
      crystals.splice(i, 1);
      // Respawn after delay
      setTimeout(() => { if (state === 'playing') spawnCrystal(); }, 3000);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt * 2.5;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Shake decay
  if (shakeT > 0) shakeT -= dt;
}

// ─── Draw ───
function draw() {
  ctx.save();

  // Screen shake
  if (shakeT > 0) {
    const s = shakeT * 20;
    ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
  }

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#06070d');
  bgGrad.addColorStop(0.55, '#090d18');
  bgGrad.addColorStop(1, '#04050a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  for (const band of voidBands) {
    const y = band.y + Math.sin(atmosphereDrift * band.speed + band.phase) * band.amp;
    const grad = ctx.createRadialGradient(W * 0.5, y, 0, W * 0.5, y, band.width);
    grad.addColorStop(0, 'rgba(60,120,255,0.05)');
    grad.addColorStop(0.45, 'rgba(70,40,140,0.04)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, y - band.width, W, band.width * 2);
  }

  for (const w of wisps) {
    const grad = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, w.r);
    grad.addColorStop(0, `rgba(100,180,255,${w.a})`);
    grad.addColorStop(0.5, 'rgba(80,110,255,0.025)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stars
  for (const s of stars) {
    const b = 0.3 + Math.sin(s.b + performance.now() * 0.001 + atmosphereDrift * s.drift) * 0.3;
    ctx.globalAlpha = b;
    ctx.fillStyle = '#c8deff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (nearMissPulse > 0) {
    const grad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, 220);
    grad.addColorStop(0, `rgba(120,220,255,${0.12 * nearMissPulse})`);
    grad.addColorStop(0.5, `rgba(90,120,255,${0.08 * nearMissPulse})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
  if (stormFlash > 0) {
    ctx.fillStyle = `rgba(190,240,255,${0.16 * stormFlash})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Asteroids
  for (const a of asteroids) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.beginPath();
    const n = a.verts.length;
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * Math.PI * 2;
      const r = a.r * a.verts[i];
      if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
      else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
    }
    ctx.closePath();
    ctx.fillStyle = '#3a3530';
    ctx.fill();
    ctx.strokeStyle = '#7a6e60';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  // Crystals
  for (const cr of crystals) {
    ctx.save();
    ctx.translate(cr.x, cr.y);
    ctx.rotate(cr.rot);
    // Glow
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 12 + Math.sin(cr.sparkle) * 5;
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(0, -cr.r);
    ctx.lineTo(cr.r * 0.6, 0);
    ctx.lineTo(0, cr.r);
    ctx.lineTo(-cr.r * 0.6, 0);
    ctx.closePath();
    ctx.fillStyle = '#0ef';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Enemies
  for (const e of enemies) {
    const pulse = 0.7 + Math.sin(e.pulse) * 0.3;
    ctx.save();
    ctx.translate(e.x, e.y);
    const glow = e.kind === 'overseer' ? '#7ef6ff' : e.kind === 'phantom' ? '#a56bff' : '#f33';
    ctx.shadowColor = glow;
    ctx.shadowBlur = 10 + Math.sin(e.pulse) * 6;
    if (e.kind === 'overseer') {
      ctx.rotate(e.aura * 0.15);
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = i / 8 * Math.PI * 2;
        const r = i % 2 ? e.r * 0.5 : e.r * (1.05 + Math.sin(e.pulse) * 0.12);
        if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
        else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fillStyle = `rgba(90,240,255,${0.58 + Math.sin(e.pulse) * 0.14})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, 0, e.r * 0.38, 0, Math.PI * 2);
      ctx.fillStyle = '#eaffff';
      ctx.fill();
    } else if (e.kind === 'phantom') {
      ctx.rotate(e.aura * 0.2);
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = i / 6 * Math.PI * 2;
        const r = i % 2 ? e.r * 0.45 : e.r * pulse;
        if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
        else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fillStyle = `rgba(150,80,255,${0.62 + Math.sin(e.pulse) * 0.16})`;
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, e.r * pulse, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,40,30,${0.7 + Math.sin(e.pulse) * 0.2})`;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(0, 0, e.r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = '#ffec9c';
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  for (const arc of stormArcs) {
    ctx.save();
    ctx.strokeStyle = arc.color;
    ctx.lineWidth = 3;
    ctx.shadowColor = arc.color;
    ctx.shadowBlur = 18;
    ctx.globalAlpha = Math.max(0, arc.life / 0.22);
    ctx.beginPath();
    ctx.moveTo(arc.x1, arc.y1);
    const midX = (arc.x1 + arc.x2) * 0.5 + Math.sin(arc.life * 40) * 24;
    const midY = (arc.y1 + arc.y2) * 0.5;
    ctx.lineTo(midX, midY);
    ctx.lineTo(arc.x2, arc.y2);
    ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Player
  ctx.save();
  ctx.translate(player.x, player.y);

  // Shield ring
  if (shieldHP > 0) {
    ctx.beginPath();
    ctx.arc(0, 0, player.r + 8, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,200,255,${0.3 + shieldHP / 200})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#0af';
    ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  if (comboCount >= 5) {
    for (let i = 0; i < Math.min(comboCount, 15) / 5; i++) {
      const orbA = player.glow * 1.7 + i * (Math.PI * 2 / 3);
      const orbR = player.r + 16 + i * 4;
      ctx.beginPath();
      ctx.arc(Math.cos(orbA) * orbR, Math.sin(orbA) * orbR, 3 + i, 0, Math.PI * 2);
      ctx.fillStyle = i === 2 ? '#fff' : i === 1 ? '#aef' : '#6ef';
      ctx.fill();
    }
  }

  // Ship glow
  ctx.shadowColor = '#4af';
  ctx.shadowBlur = 18 + Math.sin(player.glow) * 6;

  // Ship body – triangle
  const angle = Math.atan2(player.ty - player.y, player.tx - player.x);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(player.r + 4, 0);
  ctx.lineTo(-player.r * 0.7, -player.r * 0.7);
  ctx.lineTo(-player.r * 0.4, 0);
  ctx.lineTo(-player.r * 0.7, player.r * 0.7);
  ctx.closePath();
  ctx.fillStyle = '#5af';
  ctx.fill();
  ctx.strokeStyle = '#adf';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Engine glow
  ctx.beginPath();
  ctx.arc(-player.r * 0.5, 0, 3 + Math.sin(player.glow * 3) * 1.5, 0, Math.PI * 2);
  ctx.fillStyle = '#0ff';
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (announceTimer > 0 && announceText) {
    ctx.globalAlpha = Math.min(1, announceTimer) * 0.92;
    ctx.textAlign = 'center';
    ctx.font = `700 ${Math.max(20, Math.min(W * 0.05, 42))}px Courier New`;
    ctx.fillStyle = level <= 3 ? '#9fe8ff' : '#d9b3ff';
    ctx.shadowColor = level <= 3 ? '#4ad8ff' : '#b56dff';
    ctx.shadowBlur = 20;
    ctx.fillText(announceText, W * 0.5, H * 0.22);
    ctx.shadowBlur = 0;
    ctx.font = `400 ${Math.max(11, Math.min(W * 0.018, 16))}px Courier New`;
    ctx.fillStyle = 'rgba(230,245,255,0.9)';
    ctx.fillText(level <= 3 ? 'SURVIVE THE SECTOR' : 'ENDLESS ESCALATION', W * 0.5, H * 0.22 + 24);
    ctx.textAlign = 'start';
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

// ─── Initial star render for menu ───
initStars();
initAtmosphere();
document.getElementById('versionTag').textContent = GAME_VERSION;
renderScorePanel();
function menuDraw() {
  if (state !== 'menu') return;
  atmosphereDrift += 0.01;
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#06070d');
  bgGrad.addColorStop(1, '#04050a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  for (const band of voidBands) {
    const y = band.y + Math.sin(atmosphereDrift * 0.5 * band.speed + band.phase) * band.amp;
    const grad = ctx.createRadialGradient(W * 0.5, y, 0, W * 0.5, y, band.width);
    grad.addColorStop(0, 'rgba(70,120,255,0.04)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, y - band.width, W, band.width * 2);
  }
  for (const w of wisps) {
    w.x += w.vx * 0.016; w.y += w.vy * 0.016;
    if (w.x < -120) w.x = W + 120; if (w.x > W + 120) w.x = -120;
    if (w.y < -120) w.y = H + 120; if (w.y > H + 120) w.y = -120;
    const grad = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, w.r);
    grad.addColorStop(0, `rgba(100,180,255,${w.a})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2); ctx.fill();
  }
  for (const s of stars) {
    const b = 0.3 + Math.sin(s.b + performance.now() * 0.001 + atmosphereDrift * s.drift) * 0.3;
    ctx.globalAlpha = b;
    ctx.fillStyle = '#c8deff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(menuDraw);
}
menuDraw();
</script>
