<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOID ECHO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;overflow:hidden;width:100%;height:100%;background:#000}
canvas{display:block;width:100%;height:100%;touch-action:none}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10}
.card{background:rgba(10,10,40,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(100,140,255,0.3);border-radius:16px;padding:24px;text-align:center;color:#fff;font-family:'Segoe UI',sans-serif;max-width:340px;width:90%}
.card h1{font-size:2.2em;background:linear-gradient(135deg,#00cfff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;text-shadow:none}
.card h2{font-size:1.4em;color:#8af;margin-bottom:12px}
.card p{color:#aac;font-size:0.9em;margin:4px 0}
.btn{display:inline-block;padding:14px 36px;margin:8px;font-size:1.1em;font-weight:bold;border:none;border-radius:10px;cursor:pointer;color:#fff;background:linear-gradient(135deg,#0077ff,#6c3bff);box-shadow:0 0 20px rgba(0,100,255,0.4);transition:transform 0.1s}
.btn:active{transform:scale(0.95)}
.btn-sm{padding:10px 20px;font-size:0.95em}
.scores-table{width:100%;border-collapse:collapse;margin:8px 0}
.scores-table td{padding:4px 6px;font-size:0.85em;color:#aac;border-bottom:1px solid rgba(100,140,255,0.15)}
.scores-table .gold td{color:#ffd700;font-weight:bold}
.init-picker{display:flex;justify-content:center;gap:16px;margin:12px 0}
.init-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.init-col .letter{font-size:2em;color:#fff;font-weight:bold;width:40px;text-align:center}
.arr-btn{width:44px;height:44px;font-size:1.4em;border:1px solid rgba(100,140,255,0.4);border-radius:8px;background:rgba(30,30,80,0.8);color:#8af;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hidden{display:none!important}
#hud{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;color:#fff;font-family:'Segoe UI',sans-serif;font-size:14px;z-index:5;pointer-events:none}
#hud>div{pointer-events:auto}
#muteBtn{background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:6px;padding:4px 10px;font-size:13px;cursor:pointer}
#bombBtn{position:absolute;bottom:30px;right:20px;width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,100,50,0.6);background:rgba(30,10,10,0.7);color:#fff;font-size:22px;font-weight:bold;z-index:6;display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1;cursor:pointer;box-shadow:0 0 15px rgba(255,80,30,0.3)}
#bombBtn .bomb-count{font-size:12px;margin-top:2px;color:#fa0}
.versionTag{position:fixed;left:12px;bottom:12px;color:rgba(180,210,255,0.65);font:12px 'Segoe UI',sans-serif;letter-spacing:2px;z-index:8;pointer-events:none;text-shadow:0 0 10px rgba(100,160,255,0.35)}
#activePowerups{position:absolute;top:32px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:5;pointer-events:none}
.pu-icon{width:28px;height:28px;border-radius:6px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;overflow:hidden}
.pu-icon .pu-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:#0f0}
.upgrade-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,20,0.85);display:flex;align-items:center;justify-content:center;z-index:20;flex-direction:column}
.upgrade-overlay h2{color:#8af;font-family:'Segoe UI',sans-serif;font-size:1.6em;margin-bottom:20px;text-shadow:0 0 20px rgba(100,150,255,0.5)}
.upgrade-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:0 10px}
.upgrade-card{width:120px;padding:16px 10px;border-radius:14px;border:1px solid rgba(100,140,255,0.4);background:linear-gradient(180deg,rgba(20,20,60,0.9),rgba(10,10,40,0.95));cursor:pointer;text-align:center;color:#fff;font-family:'Segoe UI',sans-serif;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 0 15px rgba(80,120,255,0.2)}
.upgrade-card:hover,.upgrade-card:active{transform:scale(1.05);box-shadow:0 0 30px rgba(100,150,255,0.5);border-color:rgba(100,180,255,0.7)}
.upgrade-card .uc-icon{font-size:2.2em;margin-bottom:6px}
.upgrade-card .uc-name{font-size:0.85em;font-weight:bold;color:#adf;margin-bottom:6px}
.upgrade-card .uc-desc{font-size:0.7em;color:#89a;line-height:1.3}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud" class="hidden">
  <div><span id="scoreHud">0</span> &nbsp; x<span id="multHud">1</span></div>
  <div>Wave <span id="waveHud">1</span></div>
  <div><button id="muteBtn">🔊</button></div>
</div>
<div id="activePowerups"></div>
<button id="bombBtn" class="hidden"><span>💣</span><span class="bomb-count">x1</span></button>
<div class="versionTag" id="versionTag">v2.9.2</div>

<div id="titleScreen" class="overlay">
  <div class="card">
    <h1>VOID ECHO</h1>
    <p style="color:#6af;margin-bottom:16px">Space Survival Shooter</p>
    <button class="btn" id="playBtn">▶ PLAY</button><br>
    <button class="btn btn-sm" id="hsBtn" style="background:linear-gradient(135deg,#333,#555)">HIGH SCORES</button>
  </div>
</div>

<div id="gameOverScreen" class="overlay hidden">
  <div class="card">
    <h2>GAME OVER</h2>
    <p>Score: <span id="goScore">0</span></p>
    <p>Wave: <span id="goWave">0</span></p>
    <div id="initEntry" class="hidden">
      <p style="color:#ffd700;margin:8px 0">NEW HIGH SCORE! Enter initials:</p>
      <div class="init-picker" id="initPicker"></div>
      <button class="btn btn-sm" id="confirmInit">CONFIRM</button>
    </div>
    <div id="goScores"></div>
    <button class="btn" id="replayBtn">PLAY AGAIN</button>
  </div>
</div>

<div id="hsScreen" class="overlay hidden">
  <div class="card">
    <h2>HIGH SCORES</h2>
    <div id="hsTable"></div>
    <button class="btn btn-sm" id="hsBack" style="background:linear-gradient(135deg,#333,#555)">BACK</button>
  </div>
</div>

<div id="upgradeScreen" class="upgrade-overlay hidden">
  <h2>CHOOSE YOUR UPGRADE</h2>
  <div class="upgrade-cards" id="upgradeCards"></div>
</div>

<script>
// ===== CANVAS SETUP =====
const GAME_VERSION='v2.9.2';
document.getElementById('versionTag').textContent=GAME_VERSION;
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ===== AUDIO =====
let audioCtx=null,muted=false;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
function toggleMute(){muted=!muted;document.getElementById('muteBtn').textContent=muted?'🔇':'🔊'}
function playTone(freq,dur,type='sine',vol=0.15,detune=0){
  if(!audioCtx||muted)return;
  try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;o.detune.value=detune;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}
}
function sfxShoot(){playTone(880,0.08,'square',0.08);playTone(1200,0.06,'sine',0.05)}
function sfxExplodeSmall(){playTone(150,0.2,'sawtooth',0.12);playTone(80,0.3,'sine',0.08)}
function sfxExplodeBig(){playTone(80,0.5,'sawtooth',0.2);playTone(40,0.6,'sine',0.15);playTone(200,0.3,'square',0.1)}
function sfxCrystal(){playTone(1400,0.1,'sine',0.1);playTone(1800,0.15,'sine',0.08)}
function sfxBossWarn(){for(let i=0;i<3;i++)setTimeout(()=>{playTone(200,0.3,'sawtooth',0.15);playTone(150,0.4,'square',0.1)},i*400)}
function sfxPowerup(){playTone(800,0.1,'sine',0.12);playTone(1200,0.15,'sine',0.1);setTimeout(()=>playTone(1600,0.1,'sine',0.08),80)}
function sfxBomb(){playTone(60,0.8,'sawtooth',0.25);playTone(30,1,'sine',0.2);playTone(400,0.3,'square',0.15)}
function sfxDash(){playTone(600,0.1,'sine',0.08);playTone(900,0.08,'sine',0.06)}
function sfxUpgrade(){playTone(600,0.15,'sine',0.12);setTimeout(()=>playTone(900,0.15,'sine',0.1),100);setTimeout(()=>playTone(1200,0.2,'sine',0.1),200)}

// ===== HIGH SCORES =====
const HS_KEY='voidecho_highscores';
function getScores(){try{return JSON.parse(localStorage.getItem(HS_KEY))||[]}catch(e){return[]}}
function saveScores(s){localStorage.setItem(HS_KEY,JSON.stringify(s))}
function isHighScore(s){const sc=getScores();return sc.length<10||s>sc[sc.length-1].score}
function addScore(initials,score,wave){
  const sc=getScores();sc.push({initials,score,wave,id:Date.now()});
  sc.sort((a,b)=>b.score-a.score);if(sc.length>10)sc.length=10;saveScores(sc);return sc
}
function renderScores(container,highlightId){
  const sc=getScores();
  if(!sc.length){container.innerHTML='<p>No scores yet</p>';return}
  let h='<table class="scores-table">';
  sc.forEach((s,i)=>{
    const cls=s.id===highlightId?'gold':'';
    h+=`<tr class="${cls}"><td>${i+1}.</td><td>${s.initials}</td><td>${s.score.toLocaleString()}</td><td>W${s.wave}</td></tr>`;
  });
  container.innerHTML=h+'</table>';
}

// ===== UPGRADE POOL =====
const UPGRADE_POOL=[
  {id:'rapidfire',icon:'⚡',name:'Rapid Fire',desc:'Shoot faster'},
  {id:'heavyrounds',icon:'💥',name:'Heavy Rounds',desc:'Bullets do 2x damage'},
  {id:'tripleshot',icon:'🎯',name:'Triple Shot',desc:'Fire 3 bullets in spread'},
  {id:'homing',icon:'🔮',name:'Homing',desc:'Bullets curve toward enemies'},
  {id:'afterburner',icon:'💨',name:'Afterburner',desc:'Move 40% faster'},
  {id:'hull',icon:'🛡',name:'Reinforced Hull',desc:'+50 max HP & heal 50'},
  {id:'bomb',icon:'💣',name:'Bomb Ready',desc:'+1 bomb charge (max 3)'},
  {id:'ricochet',icon:'🌀',name:'Ricochet',desc:'Bullets bounce off edges'},
  {id:'piercing',icon:'☄️',name:'Piercing',desc:'Bullets pass through enemies'},
  {id:'overcharge',icon:'⚡',name:'Overcharge',desc:'Multiplier decays slower'}
];

// ===== POWER-UP TYPES =====
const PU_TYPES=[
  {id:'health',icon:'🔴',name:'Health Pack',color:'#f44',dur:0},
  {id:'scoreburst',icon:'💛',name:'Score Burst',color:'#fd0',dur:300},
  {id:'shield',icon:'🔵',name:'Shield Bubble',color:'#48f',dur:0},
  {id:'rapidtemp',icon:'🟢',name:'Rapid Fire',color:'#4f4',dur:480},
  {id:'homingtemp',icon:'💜',name:'Homing',color:'#a4f',dur:480}
];

// ===== GAME STATE =====
let state='title';
let player,bullets=[],enemies=[],particles=[],crystals=[],powerups=[],asteroids=[],enemyBullets=[];
let stars=[],nebulae=[];
let score=0,wave=0,killStreak=0,multiplier=1,multDecayTimer=0,waveTimer=0,waveState='active';
let spawnTimer=0,enemiesLeft=0,bossActive=false;
let screenFlash=0,waveAnnounce={text:'',alpha:0,scale:0};
let joystick={active:false,id:null,ox:0,oy:0,dx:0,dy:0,max:56,dead:6};
let moveTarget={x:0,y:0,active:false};
let newScoreId=null;
let demoMode=true;

// player upgrades & abilities
let upgrades=[];
let bombs=1,maxBombs=3;
let dashCooldown=0,dashTimer=0,dashDir={x:0,y:0};
let shieldHits=0;
let activeEffects={scoreburst:0,rapidtemp:0,homingtemp:0};
let bombFlash=0;
let lastTapTime=0,lastTapX=0,lastTapY=0;

function hasUpgrade(id){return upgrades.includes(id)}

// ===== STARS & NEBULAE =====
function initStars(){
  stars=[];
  for(let l=0;l<3;l++)for(let i=0;i<60;i++){
    stars.push({x:Math.random()*2000-500,y:Math.random()*2000-500,s:Math.random()*1.5+0.5,speed:(l+1)*0.15,brightness:Math.random()*0.5+0.5,layer:l});
  }
  nebulae=[];
  for(let i=0;i<5;i++){
    nebulae.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*200+100,
      color:`hsla(${Math.random()*60+220},60%,30%,0.06)`,dx:Math.random()*0.3-0.15,dy:Math.random()*0.2-0.1});
  }
}
initStars();

function initPlayer(){
  player={x:W/2,y:H*0.7,tx:W/2,ty:H*0.7,hp:100,maxHp:100,r:16,invuln:0,trail:[]};
  moveTarget={x:player.x,y:player.y-80,active:true,id:null};
}

// ===== SPAWNING =====
function startWave(n){
  wave=n;
  if(n>1){
    // show upgrade screen
    waveState='upgrade';
    showUpgradeScreen();
  } else {
    beginWaveAnnounce(n);
  }
  document.getElementById('waveHud').textContent=n;
}
function beginWaveAnnounce(n){
  waveState='announce';waveTimer=180;
  waveAnnounce={text:`WAVE ${n}`,alpha:1,scale:3};
  if(n%5===0){sfxBossWarn();waveAnnounce.text=`⚠ BOSS WAVE ${n} ⚠`}
  // spawn asteroids
  spawnAsteroids();
}
function spawnWaveEnemies(){
  waveState='active';
  if(wave%5===0){spawnBoss();bossActive=true;enemiesLeft=1;return}
  bossActive=false;
  enemiesLeft=Math.min(4+wave*2,30);spawnTimer=0;
}

function spawnAsteroids(){
  const count=3+Math.floor(Math.random()*4);
  for(let i=0;i<count;i++){
    asteroids.push({
      x:Math.random()*W,y:-50-Math.random()*200,
      vx:(Math.random()-0.5)*1.5,vy:Math.random()*0.8+0.3,
      r:20+Math.random()*20,hp:3,
      vertices:generateAsteroidVerts(6+Math.floor(Math.random()*4)),
      rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.02
    });
  }
}
function generateAsteroidVerts(n){
  const v=[];
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    const r=0.7+Math.random()*0.3;
    v.push({a,r});
  }
  return v;
}

function spawnEnemy(){
  const side=Math.random()*4|0;
  let x,y;
  if(side===0){x=Math.random()*W;y=-30}
  else if(side===1){x=W+30;y=Math.random()*H}
  else if(side===2){x=Math.random()*W;y=H+30}
  else{x=-30;y=Math.random()*H}
  let type='basic';
  if(wave>=6&&Math.random()<0.25)type='heavy';
  else if(wave>=4&&Math.random()<0.35)type='fast';
  const e={x,y,type,hp:0,maxHp:0,r:0,speed:0,angle:0,timer:Math.random()*100,shieldAngle:0,
    dodgeTimer:0,zigzagPhase:Math.random()*Math.PI*2,burstTimer:0,shootTimer:0};
  if(type==='basic'){e.hp=e.maxHp=2+Math.floor(wave/3);e.r=14;e.speed=1+wave*0.08}
  else if(type==='fast'){e.hp=e.maxHp=1+Math.floor(wave/5);e.r=10;e.speed=2.5+wave*0.1}
  else{e.hp=e.maxHp=5+wave;e.r=22;e.speed=0.6+wave*0.04;e.shootTimer=60+Math.random()*60}
  enemies.push(e);
}
function spawnBoss(){
  const e={x:W/2,y:-60,type:'boss',hp:50+wave*10,maxHp:50+wave*10,r:45,speed:0.5,
    angle:0,timer:0,shieldAngle:0,shootTimer:0,phase:1,laserAngle:0};
  enemies.push(e);
}

// ===== UPGRADE SCREEN =====
function showUpgradeScreen(){
  const screen=document.getElementById('upgradeScreen');
  const container=document.getElementById('upgradeCards');
  container.innerHTML='';
  // pick 3 random upgrades not yet owned (allow duplicates for stackable ones like bomb/hull)
  const available=UPGRADE_POOL.filter(u=>!hasUpgrade(u.id)||u.id==='bomb'||u.id==='hull');
  const shuffled=available.sort(()=>Math.random()-0.5).slice(0,3);
  if(shuffled.length===0){beginWaveAnnounce(wave);return}
  shuffled.forEach(u=>{
    const card=document.createElement('div');
    card.className='upgrade-card';
    card.innerHTML=`<div class="uc-icon">${u.icon}</div><div class="uc-name">${u.name}</div><div class="uc-desc">${u.desc}</div>`;
    function pick(e){
      if(e)e.stopPropagation();
      applyUpgrade(u);
      screen.classList.add('hidden');
      sfxUpgrade();
      beginWaveAnnounce(wave);
    }
    card.addEventListener('click',pick);
    card.addEventListener('touchend',e=>{e.preventDefault();pick(e)});
    container.appendChild(card);
  });
  screen.classList.remove('hidden');
}
function applyUpgrade(u){
  upgrades.push(u.id);
  if(u.id==='hull'){player.maxHp+=50;player.hp=Math.min(player.hp+50,player.maxHp)}
  if(u.id==='bomb'){bombs=Math.min(bombs+1,maxBombs);updateBombBtn()}
}

// ===== POWER-UP DROPS =====
function spawnPowerup(x,y){
  if(Math.random()>0.25)return; // 25% drop chance
  const type=PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
  powerups.push({x,y,type,life:480,maxLife:480}); // 8 sec at 60fps
}
function collectPowerup(pu){
  sfxPowerup();
  const t=pu.type;
  if(t.id==='health'){player.hp=Math.min(player.hp+30,player.maxHp)}
  else if(t.id==='scoreburst'){activeEffects.scoreburst=300}
  else if(t.id==='shield'){shieldHits+=3}
  else if(t.id==='rapidtemp'){activeEffects.rapidtemp=480}
  else if(t.id==='homingtemp'){activeEffects.homingtemp=480}
}

// ===== BOMB =====
function useBomb(){
  if(bombs<=0||state!=='playing'||waveState!=='active')return;
  bombs--;updateBombBtn();sfxBomb();
  bombFlash=30;
  // kill all non-boss enemies
  enemies.forEach(e=>{
    if(e.type==='boss'){
      e.hp-=Math.floor(e.maxHp*0.2);
      if(e.hp<=0)e.hp=1;
    } else {
      e.hp=0;
      spawnExplosion(e.x,e.y,30,true);
      const pts=(e.type==='heavy'?50:e.type==='fast'?30:20)*multiplier;
      score+=pts;
    }
  });
  // destroy asteroids
  asteroids.forEach(a=>{spawnExplosion(a.x,a.y,20,false)});
  asteroids=[];
  // clear enemy bullets
  enemyBullets=[];
  enemies=enemies.filter(e=>e.hp>0);
  document.getElementById('scoreHud').textContent=score.toLocaleString();
}
function updateBombBtn(){
  document.getElementById('bombBtn').querySelector('.bomb-count').textContent='x'+bombs;
}

// ===== DASH =====
function triggerDash(){
  if(dashCooldown>0||dashTimer>0||state!=='playing')return;
  dashTimer=18; // 0.3s
  dashCooldown=48; // 0.8s
  player.invuln=Math.max(player.invuln,18);
  dashDir.x=(player.tx??player.x)-player.x;
  dashDir.y=(player.ty??player.y)-player.y;
  if(Math.hypot(dashDir.x,dashDir.y)<4){dashDir.x=0;dashDir.y=-20;}
  const len=Math.hypot(dashDir.x,dashDir.y)||1;
  dashDir.x/=len;dashDir.y/=len;
  sfxDash();
}

// ===== DEMO MODE =====
let demoBullets=[],demoEnemies=[],demoParticles=[],demoShip={x:0,y:0,angle:0,trail:[]};
function initDemo(){
  demoShip={x:W/2,y:H/2,angle:0,trail:[]};demoBullets=[];demoEnemies=[];demoParticles=[];
  for(let i=0;i<6;i++){
    demoEnemies.push({x:Math.random()*W,y:Math.random()*H,type:['basic','fast','heavy'][i%3],
      r:14,timer:Math.random()*100,shieldAngle:0,speed:0.8,angle:0});
  }
}
initDemo();
function updateDemo(){
  demoShip.angle+=0.008;
  demoShip.x=W/2+Math.cos(demoShip.angle*0.7)*W*0.25;
  demoShip.y=H/2+Math.sin(demoShip.angle)*H*0.2;
  demoShip.trail.unshift({x:demoShip.x,y:demoShip.y});
  if(demoShip.trail.length>20)demoShip.trail.pop();
  if(Math.random()<0.12){
    const te=demoEnemies[Math.random()*demoEnemies.length|0];
    if(te){const a=Math.atan2(te.y-demoShip.y,te.x-demoShip.x);
      demoBullets.push({x:demoShip.x,y:demoShip.y,vx:Math.cos(a)*7,vy:Math.sin(a)*7,life:60})}
  }
  demoBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--});
  demoBullets=demoBullets.filter(b=>b.life>0);
  demoEnemies.forEach(e=>{
    e.timer+=0.05;
    e.x+=Math.sin(e.timer)*e.speed;e.y+=Math.cos(e.timer*0.7)*e.speed*0.5;
    if(e.x<0)e.x=W;if(e.x>W)e.x=0;if(e.y<0)e.y=H;if(e.y>H)e.y=0;
    e.shieldAngle+=0.03;
  });
  demoBullets.forEach(b=>{
    demoEnemies.forEach(e=>{
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+4){
        b.life=0;
        for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2;const s=Math.random()*3+1;
          demoParticles.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:40,
            color:`hsl(${Math.random()*60+10},100%,${50+Math.random()*30}%)`})}
        e.x=Math.random()*W;e.y=Math.random()*H;
      }
    });
  });
  demoParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--});
  demoParticles=demoParticles.filter(p=>p.life>0);
}
function drawDemo(){
  drawBackground();
  demoShip.trail.forEach((t,i)=>{

  });
}

// ===== DRAWING HELPERS =====
function drawBackground(){
  X.fillStyle='#050510';X.fillRect(0,0,W,H);
  nebulae.forEach(n=>{
    n.x+=n.dx;n.y+=n.dy;
    if(n.x<-n.r)n.x=W+n.r;if(n.x>W+n.r)n.x=-n.r;
    if(n.y<-n.r)n.y=H+n.r;if(n.y>H+n.r)n.y=-n.r;
    const g=X.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.color);g.addColorStop(1,'transparent');
    X.fillStyle=g;X.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);
  });
  stars.forEach(s=>{
    X.fillStyle=`rgba(200,220,255,${s.brightness*(0.6+0.4*Math.sin(performance.now()*0.002+s.x))})`;
    X.fillRect(s.x,s.y,s.s,s.s);
  });
}
function drawShipAt(x,y,angle){

function drawBullet(b){
  X.save();
  const col=b.heavy?'#f80':'#0ff';
  X.shadowColor=col;X.shadowBlur=10;
  X.fillStyle='#fff';X.beginPath();X.arc(b.x,b.y,b.heavy?3.5:2.5,0,Math.PI*2);X.fill();

  X.fillStyle=b.heavy?'rgba(255,150,0,0.3)':'rgba(0,255,255,0.3)';

  X.strokeStyle=b.heavy?'rgba(255,150,0,0.25)':'rgba(0,200,255,0.25)';X.lineWidth=2;
  X.beginPath();X.moveTo(b.x,b.y);X.lineTo(b.x-b.vx*3,b.y-b.vy*3);X.stroke();
  X.restore();
}
function drawEnemy(e){
  X.save();X.translate(e.x,e.y);
  e.timer+=0.03;
  if(e.type==='basic'){
    const pulse=1+Math.sin(e.timer*3)*0.15;
    X.strokeStyle='rgba(255,60,30,0.3)';X.lineWidth=1.5;
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4+e.timer;const len=e.r*1.6*pulse;
      X.beginPath();X.moveTo(Math.cos(a)*e.r*0.8,Math.sin(a)*e.r*0.8);
      X.lineTo(Math.cos(a)*len,Math.sin(a)*len);X.stroke();
    }
    X.fillStyle='rgba(255,50,30,0.7)';X.shadowColor='#f42';X.shadowBlur=12;
    X.beginPath();X.arc(0,0,e.r*pulse,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,200,150,0.5)';X.beginPath();X.arc(0,0,e.r*0.5,0,Math.PI*2);X.fill();
  }else if(e.type==='fast'){
    const a=e.angle||0;
    X.rotate(a);
    X.fillStyle='rgba(0,220,220,0.8)';X.shadowColor='#0dd';X.shadowBlur=10;
    X.beginPath();X.moveTo(0,-e.r*1.3);X.lineTo(-e.r*0.7,e.r);X.lineTo(e.r*0.7,e.r);X.closePath();X.fill();
    X.fillStyle='rgba(0,200,200,0.15)';
    X.beginPath();X.moveTo(0,e.r);X.lineTo(-4,e.r*3);X.lineTo(4,e.r*3);X.closePath();X.fill();
  }else if(e.type==='heavy'){
    e.shieldAngle+=0.02;
    X.fillStyle='rgba(130,50,200,0.7)';X.shadowColor='#a3f';X.shadowBlur=15;
    X.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3;X.lineTo(Math.cos(a)*e.r,Math.sin(a)*e.r)}
    X.closePath();X.fill();
    X.strokeStyle='rgba(180,100,255,0.4)';X.lineWidth=2;
    X.beginPath();X.arc(0,0,e.r+8,e.shieldAngle,e.shieldAngle+Math.PI*1.2);X.stroke();
    X.beginPath();X.arc(0,0,e.r+8,e.shieldAngle+Math.PI,e.shieldAngle+Math.PI*2.2);X.stroke();
  }else if(e.type==='boss'){
    e.shieldAngle+=0.01;
    X.fillStyle='rgba(200,30,30,0.6)';X.shadowColor='#f22';X.shadowBlur=25;
    X.beginPath();X.moveTo(0,-e.r);X.lineTo(-e.r*0.8,e.r*0.6);X.lineTo(e.r*0.8,e.r*0.6);X.closePath();X.fill();
    X.fillStyle='rgba(255,100,0,0.5)';
    X.beginPath();X.moveTo(-e.r*0.6,-e.r*0.3);X.lineTo(-e.r*1.2,e.r*0.4);X.lineTo(-e.r*0.4,e.r*0.4);X.closePath();X.fill();
    X.beginPath();X.moveTo(e.r*0.6,-e.r*0.3);X.lineTo(e.r*1.2,e.r*0.4);X.lineTo(e.r*0.4,e.r*0.4);X.closePath();X.fill();
    // laser beams in phase 2+
    if(e.phase>=2){
      e.laserAngle+=0.03;
      X.save();
      X.strokeStyle='rgba(255,50,50,0.4)';X.lineWidth=3;X.shadowColor='#f00';X.shadowBlur=10;
      for(let i=0;i<(e.phase>=3?4:2);i++){
        const la=e.laserAngle+i*(Math.PI/(e.phase>=3?2:1));
        X.beginPath();X.moveTo(0,0);
        X.lineTo(Math.cos(la)*300,Math.sin(la)*300);X.stroke();
      }
      X.restore();
    }
    X.shadowBlur=0;
    const bw=e.r*2,bh=6,bx=-e.r,by=-e.r-15;
    X.fillStyle='rgba(50,0,0,0.6)';X.fillRect(bx,by,bw,bh);
    X.fillStyle=e.hp/e.maxHp>0.3?'#f44':'#ff0';
    X.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
  }
  X.shadowBlur=0;X.restore();
}
function drawCrystal(cr){

  X.fillStyle='rgba(0,255,180,0.8)';X.shadowColor='#0fa';X.shadowBlur=10;

function drawAsteroid(a){

function drawPowerup(pu){

// ===== INPUT — tap/hold anywhere to move, auto-shoot nearest enemy =====
function handleTouchStart(e){
  if(state!=='playing'||waveState==='upgrade')return;
  const now=performance.now();
  if(e.touches){
    Array.from(e.changedTouches).forEach(t=>{
      const bombEl=document.getElementById('bombBtn');
      const br=bombEl.getBoundingClientRect();
      if(t.clientX>=br.left&&t.clientX<=br.right&&t.clientY>=br.top&&t.clientY<=br.bottom)return;
      // double-tap = dash
      if(now-lastTapTime<300&&Math.hypot(t.clientX-lastTapX,t.clientY-lastTapY)<80){
        triggerDash();lastTapTime=0;
      }else{
        lastTapTime=now;lastTapX=t.clientX;lastTapY=t.clientY;
      }
      if(!moveTarget.active){moveTarget.active=true;moveTarget.id=t.identifier;}
      if(t.identifier===moveTarget.id){moveTarget.x=t.clientX;moveTarget.y=t.clientY;}
    });
  }else{
    if(now-lastTapTime<300&&Math.hypot(e.clientX-lastTapX,e.clientY-lastTapY)<80){
      triggerDash();lastTapTime=0;
    }else{lastTapTime=now;lastTapX=e.clientX;lastTapY=e.clientY;}
    moveTarget.active=true;moveTarget.id=-1;moveTarget.x=e.clientX;moveTarget.y=e.clientY;
  }
}
function handleTouchMove(e){
  if(state!=='playing')return;
  if(e.touches){
    Array.from(e.changedTouches).forEach(t=>{
      if(moveTarget.active&&t.identifier===moveTarget.id){moveTarget.x=t.clientX;moveTarget.y=t.clientY;}
    });
  }else if(moveTarget.active){moveTarget.x=e.clientX;moveTarget.y=e.clientY;}
}
function handleTouchEnd(e){
  if(e.touches){
    Array.from(e.changedTouches).forEach(t=>{
      if(moveTarget.active&&t.identifier===moveTarget.id)moveTarget.id=null;
    });
  }else moveTarget.id=null;
}

C.addEventListener('touchstart',e=>{
  // don't prevent default on overlay buttons
  if(e.target.closest('.overlay')||e.target.closest('.upgrade-overlay')||e.target.closest('#bombBtn'))return;

},{passive:false});

},{passive:false});

},{passive:false});

let shootCooldown=0;
function fireBullet(tx,ty){
  if(shootCooldown>0)return;
  const rapidFire=hasUpgrade('rapidfire')||activeEffects.rapidtemp>0;
  shootCooldown=rapidFire?4:8;
  const a=Math.atan2(ty-player.y,tx-player.x);
  const speed=8;
  const heavy=hasUpgrade('heavyrounds');
  const hom=hasUpgrade('homing')||activeEffects.homingtemp>0;
  const pierce=hasUpgrade('piercing');
  const rico=hasUpgrade('ricochet');

  function makeBullet(angle){
    return{x:player.x,y:player.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:80,heavy,homing:hom,piercing:pierce,ricochet:rico,bounced:false,dmg:heavy?2:1};
  }

  if(hasUpgrade('tripleshot')){
    bullets.push(makeBullet(a-0.15));
    bullets.push(makeBullet(a));
    bullets.push(makeBullet(a+0.15));
  }else{
    bullets.push(makeBullet(a));
  }
  sfxShoot();
}

// ===== GAME LOGIC =====
function startGame(){
  state='playing';score=0;wave=0;killStreak=0;multiplier=1;multDecayTimer=0;
  bullets=[];enemies=[];particles=[];crystals=[];powerups=[];asteroids=[];enemyBullets=[];
  screenFlash=0;bombFlash=0;
  upgrades=[];bombs=1;shieldHits=0;
  activeEffects={scoreburst:0,rapidtemp:0,homingtemp:0};
  dashCooldown=0;dashTimer=0;
  initPlayer();
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('upgradeScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('bombBtn').classList.remove('hidden');
  document.getElementById('scoreHud').textContent='0';
  document.getElementById('multHud').textContent='1';
  updateBombBtn();
  startWave(1);
}
function gameOver(){
  state='gameover';
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('bombBtn').classList.add('hidden');
  document.getElementById('goScore').textContent=score.toLocaleString();
  document.getElementById('goWave').textContent=wave;
  const goScreen=document.getElementById('gameOverScreen');
  const initE=document.getElementById('initEntry');
  if(isHighScore(score)){
    initE.classList.remove('hidden');
    setupInitPicker();
  }else{
    initE.classList.add('hidden');
    newScoreId=null;
  }
  renderScores(document.getElementById('goScores'),newScoreId);
  goScreen.classList.remove('hidden');
}

// initials picker
let initials=[0,0,0];
const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
function setupInitPicker(){
  initials=[0,0,0];
  const cont=document.getElementById('initPicker');cont.innerHTML='';
  for(let i=0;i<3;i++){
    const col=document.createElement('div');col.className='init-col';
    const up=document.createElement('button');up.className='arr-btn';up.textContent='▲';
    const ltr=document.createElement('div');ltr.className='letter';ltr.id='ltr'+i;ltr.textContent='A';
    const dn=document.createElement('button');dn.className='arr-btn';dn.textContent='▼';
    const idx=i;
    function goUp(){initials[idx]=(initials[idx]+1)%26;ltr.textContent=LETTERS[initials[idx]]}
    function goDown(){initials[idx]=(initials[idx]+25)%26;ltr.textContent=LETTERS[initials[idx]]}
    up.addEventListener('click',goUp);up.addEventListener('touchend',e=>{e.preventDefault();goUp()});
    dn.addEventListener('click',goDown);dn.addEventListener('touchend',e=>{e.preventDefault();goDown()});
    col.appendChild(up);col.appendChild(ltr);col.appendChild(dn);cont.appendChild(col);
  }
}
function confirmInitials(){
  const ini=initials.map(i=>LETTERS[i]).join('');
  const sc=addScore(ini,score,wave);
  newScoreId=sc.find(s=>s.initials===ini&&s.score===score)?.id;
  document.getElementById('initEntry').classList.add('hidden');
  renderScores(document.getElementById('goScores'),newScoreId);
}

function takeDamage(amt){
  if(player.invuln>0)return;
  if(shieldHits>0){shieldHits--;player.invuln=10;return}
  player.hp-=amt;
  player.invuln=60;
  killStreak=0;multiplier=1;
  document.getElementById('multHud').textContent='1';
  spawnExplosion(player.x,player.y,15,false);
  if(player.hp<=0)gameOver();
}

function update(){
  if(state!=='playing')return;
  if(waveState==='upgrade')return;

  // player movement — follows touch/mouse anywhere on screen
  const moveSpeed=hasUpgrade('afterburner')?7:5;
  if(moveTarget.active){
    const dx=moveTarget.x-player.x,dy=moveTarget.y-player.y,dist=Math.hypot(dx,dy);
    if(dist>4){player.x+=dx/dist*Math.min(moveSpeed,dist);player.y+=dy/dist*Math.min(moveSpeed,dist);}
  }
  // auto-shoot nearest enemy always (no touch required)
  if(shootCooldown<=0){
    let nearest=null,nearDist=Infinity;
    enemies.forEach(e=>{const d=Math.hypot(e.x-player.x,e.y-player.y);if(d<nearDist){nearDist=d;nearest=e;}});
    if(nearest){fireBullet(nearest.x,nearest.y);}
    else if(enemies.length===0){shootCooldown=8;} // idle, don't spam
  }
  // dash movement
  if(dashTimer>0){
    dashTimer--;
    player.x+=dashDir.x*12;
    player.y+=dashDir.y*12;
    // dash trail particles
    for(let i=0;i<3;i++){
      particles.push({x:player.x+(Math.random()-0.5)*10,y:player.y+(Math.random()-0.5)*10,
        vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:15,maxLife:15,
        color:'rgba(100,200,255,0.8)',size:3});
    }
  }
  if(dashCooldown>0)dashCooldown--;

  player.x=Math.max(player.r,Math.min(W-player.r,player.x));
  player.y=Math.max(player.r,Math.min(H-player.r,player.y));
  player.trail.unshift({x:player.x,y:player.y});
  if(player.trail.length>15)player.trail.pop();
  if(player.invuln>0)player.invuln--;
  if(shootCooldown>0)shootCooldown--;

  // multiplier decay
  if(!hasUpgrade('overcharge')){
    multDecayTimer++;
    if(multDecayTimer>300&&multiplier>1){multiplier=Math.max(1,multiplier-1);multDecayTimer=0;
      document.getElementById('multHud').textContent=multiplier}
  }else{
    multDecayTimer++;
    if(multDecayTimer>600&&multiplier>1){multiplier=Math.max(1,multiplier-1);multDecayTimer=0;
      document.getElementById('multHud').textContent=multiplier}
  }

  // active effects
  for(const k in activeEffects)if(activeEffects[k]>0)activeEffects[k]--;
  updatePowerupUI();

  // wave logic
  if(waveState==='announce'){
    waveTimer--;
    waveAnnounce.alpha=Math.min(1,waveAnnounce.alpha);
    waveAnnounce.scale+=(1-waveAnnounce.scale)*0.1;
    if(waveTimer<=0)spawnWaveEnemies();
  }else if(waveState==='active'){
    if(!bossActive){
      spawnTimer++;
      const interval=Math.max(20,60-wave*3);
      if(spawnTimer>=interval&&enemiesLeft>0){spawnTimer=0;spawnEnemy();enemiesLeft--}
    }
    if(enemies.length===0&&enemiesLeft<=0){
      killStreak=0;
      startWave(wave+1);
    }
  }

  // bullets
  bullets.forEach(b=>{
    // homing
    if(b.homing&&enemies.length>0){
      let nearest=null,nd=Infinity;
      enemies.forEach(e=>{const d=Math.hypot(e.x-b.x,e.y-b.y);if(d<nd){nd=d;nearest=e}});
      if(nearest&&nd<300){
        const ta=Math.atan2(nearest.y-b.y,nearest.x-b.x);
        const ca=Math.atan2(b.vy,b.vx);
        let da=ta-ca;
        while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
        const turn=Math.min(0.08,Math.abs(da))*Math.sign(da);
        const na=ca+turn;
        const sp=Math.hypot(b.vx,b.vy);
        b.vx=Math.cos(na)*sp;b.vy=Math.sin(na)*sp;
      }
    }
    b.x+=b.vx;b.y+=b.vy;
    // ricochet
    if(b.ricochet&&!b.bounced){
      if(b.x<0){b.x=0;b.vx*=-1;b.bounced=true}
      else if(b.x>W){b.x=W;b.vx*=-1;b.bounced=true}
      if(b.y<0){b.y=0;b.vy*=-1;b.bounced=true}
      else if(b.y>H){b.y=H;b.vy*=-1;b.bounced=true}
    }
    b.life--;
  });
  bullets=bullets.filter(b=>b.life>0&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20);

  // enemy bullets
  enemyBullets.forEach(b=>{
    if(b.homing){
      const ta=Math.atan2(player.y-b.y,player.x-b.x);
      const ca=Math.atan2(b.vy,b.vx);
      let da=ta-ca;while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
      const turn=Math.min(0.04,Math.abs(da))*Math.sign(da);
      const na=ca+turn;const sp=Math.hypot(b.vx,b.vy);
      b.vx=Math.cos(na)*sp;b.vy=Math.sin(na)*sp;
    }
    b.x+=b.vx;b.y+=b.vy;b.life--;
  });
  enemyBullets=enemyBullets.filter(b=>b.life>0&&b.x>-50&&b.x<W+50&&b.y>-50&&b.y<H+50);

  // enemies AI
  enemies.forEach(e=>{
    const a=Math.atan2(player.y-e.y,player.x-e.x);
    e.angle=a;

    if(e.type==='basic'){
      // dodge: check if bullet is near
      e.dodgeTimer--;
      let dodging=false;
      if(e.dodgeTimer<=0){
        for(const b of bullets){
          if(!b.enemy&&Math.hypot(b.x-e.x,b.y-e.y)<80){
            // dodge perpendicular
            const perp=a+Math.PI/2*(Math.random()>0.5?1:-1);
            e.x+=Math.cos(perp)*e.speed*4;
            e.y+=Math.sin(perp)*e.speed*4;
            e.dodgeTimer=30;dodging=true;break;
          }
        }
      }
      if(!dodging){e.x+=Math.cos(a)*e.speed;e.y+=Math.sin(a)*e.speed}

    }else if(e.type==='fast'){
      // zigzag + burst
      e.zigzagPhase+=0.15;
      const perp=a+Math.PI/2;
      const zigOffset=Math.sin(e.zigzagPhase)*30;
      e.burstTimer++;
      const spd=e.burstTimer%120<20?e.speed*2.5:e.speed;
      e.x+=Math.cos(a)*spd+Math.cos(perp)*Math.cos(e.zigzagPhase)*1.5;
      e.y+=Math.sin(a)*spd+Math.sin(perp)*Math.cos(e.zigzagPhase)*1.5;

    }else if(e.type==='heavy'){
      e.x+=Math.cos(a)*e.speed;e.y+=Math.sin(a)*e.speed;
      // shoot homing shots when close
      const dist=Math.hypot(player.x-e.x,player.y-e.y);
      e.shootTimer--;
      if(dist<250&&e.shootTimer<=0){
        e.shootTimer=120;
        for(let i=0;i<2;i++){
          const sa=a+(i-0.5)*0.3;
          enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(sa)*3,vy:Math.sin(sa)*3,life:150,homing:true});
        }
      }

    }else if(e.type==='boss'){
      // phase based on HP
      const hpPct=e.hp/e.maxHp;
      if(hpPct>0.6)e.phase=1;
      else if(hpPct>0.3)e.phase=2;
      else e.phase=3;

      const ty=H*0.2;
      if(e.y<ty)e.y+=e.speed*2;
      else{
        const bossSpeed=e.phase===3?e.speed*2:e.speed;
        e.x+=Math.sin(e.timer*0.02)*(e.phase===3?3:1.5);
        e.timer++;
      }
      e.shootTimer++;
      const shootInterval=e.phase===3?30:e.phase===2?45:60;
      if(e.shootTimer>shootInterval){
        e.shootTimer=0;
        const spread=e.phase===3?4:e.phase===2?3:2;
        for(let i=-spread;i<=spread;i++){
          const ba=Math.atan2(player.y-e.y,player.x-e.x)+i*0.15;
          enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(ba)*(e.phase===3?5:4),
            vy:Math.sin(ba)*(e.phase===3?5:4),life:100,homing:false});
        }
      }
      // laser beams damage check (phase 2+)
      if(e.phase>=2&&player.invuln<=0){
        const beamCount=e.phase>=3?4:2;
        for(let i=0;i<beamCount;i++){
          const la=e.laserAngle+i*(Math.PI/(e.phase>=3?2:1));
          // check if player is near the beam line
          const dx=player.x-e.x,dy=player.y-e.y;
          const dist=Math.hypot(dx,dy);
          if(dist<300){
            const pa=Math.atan2(dy,dx);
            let diff=pa-la;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
            if(Math.abs(diff)<0.08){
              takeDamage(5);
            }
          }
        }
      }
    }

    // collision with player
    if(player.invuln<=0&&Math.hypot(e.x-player.x,e.y-player.y)<e.r+player.r){
      takeDamage(e.type==='boss'?20:10);
    }
  });

  // bullet-enemy collision
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(e.hp<=0)return;
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+5){
        if(!b.piercing)b.life=0;
        else b.life-=3; // piercing still costs some life
        e.hp-=b.dmg;
        spawnExplosion(b.x,b.y,5,false);
        if(e.hp<=0){
          const big=e.type==='boss'||e.type==='heavy';
          spawnExplosion(e.x,e.y,big?60:25,big);
          big?sfxExplodeBig():sfxExplodeSmall();
          killStreak++;multDecayTimer=0;
          multiplier=Math.min(8,1+Math.floor(killStreak/5));
          document.getElementById('multHud').textContent=multiplier;
          const scoreMult=activeEffects.scoreburst>0?3:1;
          const pts=(e.type==='boss'?500:e.type==='heavy'?50:e.type==='fast'?30:20)*multiplier*scoreMult;
          score+=pts;
          document.getElementById('scoreHud').textContent=score.toLocaleString();
          // drop crystal
          if(Math.random()<0.5||e.type==='boss'){
            crystals.push({x:e.x,y:e.y,angle:0,vy:0.5,life:300});
          }
          // drop power-up
          spawnPowerup(e.x,e.y);
        }
      }
    });
  });
  enemies=enemies.filter(e=>e.hp>0);

  // bullet-asteroid collision — bullets destroy asteroids
  bullets.forEach(b=>{
    asteroids.forEach(a=>{
      if(!a.dead&&Math.hypot(b.x-a.x,b.y-a.y)<a.r){
        if(!b.piercing)b.life=0;
        a.hp=(a.hp||3)-1;
        spawnExplosion(b.x,b.y,6,false);
        if(a.hp<=0){a.dead=true;spawnExplosion(a.x,a.y,20,false);sfxExplodeSmall();}
      }
    });
  });
  asteroids=asteroids.filter(a=>!a.dead);

  // enemy bullet -> player
  enemyBullets.forEach(b=>{
    if(player.invuln<=0&&Math.hypot(b.x-player.x,b.y-player.y)<player.r+4){
      b.life=0;
      takeDamage(15);
    }
  });

  // asteroids
  asteroids.forEach(a=>{
    a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotSpeed;
    // wrap
    if(a.x<-a.r)a.x=W+a.r;if(a.x>W+a.r)a.x=-a.r;
    if(a.y<-a.r)a.y=H+a.r;if(a.y>H+a.r)a.y=-a.r;
    // hit player
    if(player.invuln<=0&&Math.hypot(a.x-player.x,a.y-player.y)<a.r+player.r){
      takeDamage(25);
    }
  });

  // crystals
  crystals.forEach(cr=>{
    cr.angle+=0.05;cr.vy*=0.99;cr.y+=cr.vy;cr.life--;
    if(Math.hypot(cr.x-player.x,cr.y-player.y)<25){
      cr.life=0;
      const scoreMult=activeEffects.scoreburst>0?3:1;
      score+=100*multiplier*scoreMult;
      document.getElementById('scoreHud').textContent=score.toLocaleString();
      sfxCrystal();
    }
  });
  crystals=crystals.filter(c=>c.life>0);

  // power-ups
  powerups.forEach(pu=>{
    pu.life--;
    if(Math.hypot(pu.x-player.x,pu.y-player.y)<25){
      collectPowerup(pu);pu.life=0;
    }
  });
  powerups=powerups.filter(p=>p.life>0);

  // particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.life--});
  particles=particles.filter(p=>p.life>0);

  if(screenFlash>0)screenFlash--;
  if(bombFlash>0)bombFlash--;
}

function draw(){
  drawBackground();

  // asteroids
  asteroids.forEach(a=>drawAsteroid(a));

  // player trail
  player.trail.forEach((t,i)=>{
    const a=1-i/player.trail.length;
    const w=(1-i/player.trail.length)*6;
    X.fillStyle=dashTimer>0?`rgba(100,200,255,${a*0.6})`:`rgba(0,150,255,${a*0.35})`;
    X.beginPath();X.arc(t.x,t.y,w,0,Math.PI*2);X.fill();
  });

  // player
  if(player.invuln<=0||Math.floor(player.invuln/4)%2===0){
    const aimA=Math.atan2((player.ty??player.y)-player.y,(player.tx??player.x)-player.x);
    drawShipAt(player.x,player.y,Number.isFinite(aimA)?aimA:-Math.PI/2);
  }

  // HP bar
  const hpW=60,hpH=4;
  X.fillStyle='rgba(50,0,0,0.6)';X.fillRect(player.x-hpW/2,player.y+20,hpW,hpH);
  X.fillStyle=player.hp/player.maxHp>0.3?'#0f0':'#f00';
  X.fillRect(player.x-hpW/2,player.y+20,hpW*(Math.max(0,player.hp)/player.maxHp),hpH);

  // bullets
  bullets.forEach(b=>drawBullet(b));
  // enemy bullets
  enemyBullets.forEach(b=>{
    X.save();
    X.fillStyle=b.homing?'rgba(200,50,255,0.8)':'rgba(255,80,80,0.8)';
    X.shadowColor=b.homing?'#a3f':'#f44';X.shadowBlur=8;
    X.beginPath();X.arc(b.x,b.y,3,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
    X.fillStyle=b.homing?'rgba(200,50,255,0.2)':'rgba(255,50,50,0.2)';
    X.beginPath();X.arc(b.x,b.y,7,0,Math.PI*2);X.fill();
    X.restore();
  });

  enemies.forEach(e=>drawEnemy(e));
  crystals.forEach(cr=>drawCrystal(cr));
  powerups.forEach(pu=>drawPowerup(pu));

  // particles
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    X.globalAlpha=a;X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;

  // bomb flash
  if(bombFlash>0){
    const t=bombFlash/30;
    if(t>0.7){
      // white flash
      X.fillStyle=`rgba(255,255,255,${(t-0.7)/0.3})`;X.fillRect(0,0,W,H);
    }else{
      // collapse to center
      const r=W*(t/0.7);
      const g=X.createRadialGradient(W/2,H/2,0,W/2,H/2,r);
      g.addColorStop(0,'rgba(255,200,100,0.4)');g.addColorStop(1,'transparent');
      X.fillStyle=g;X.fillRect(0,0,W,H);
    }
  }

  // screen flash
  if(screenFlash>0){
    X.fillStyle=`rgba(255,255,255,${screenFlash/8*0.3})`;X.fillRect(0,0,W,H);
  }

  // wave announce
  if(waveState==='announce'&&waveAnnounce.alpha>0){
    X.save();X.textAlign='center';X.textBaseline='middle';
    X.font=`bold ${36*waveAnnounce.scale}px 'Segoe UI',sans-serif`;
    X.fillStyle=`rgba(255,255,255,${waveAnnounce.alpha})`;
    X.fillText(waveAnnounce.text,W/2,H/2);
    X.restore();
    waveAnnounce.alpha-=0.008;
  }

  // move target indicator
  if(moveTarget.active){
    X.strokeStyle='rgba(100,180,255,0.4)';X.lineWidth=1.5;
    X.beginPath();X.arc(moveTarget.x,moveTarget.y,16,0,Math.PI*2);X.stroke();
    X.strokeStyle='rgba(100,180,255,0.15)';
    X.beginPath();X.moveTo(player.x,player.y);X.lineTo(moveTarget.x,moveTarget.y);X.stroke();
  }
  // dash cooldown arc near player
  if(dashCooldown>0){
    const pct=dashCooldown/48;
    X.strokeStyle='rgba(100,200,255,0.5)';X.lineWidth=3;
    X.beginPath();X.arc(player.x,player.y,28,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-pct));X.stroke();
  }
}

// ===== MAIN LOOP =====
function loop(){
  requestAnimationFrame(loop);
  if(state==='title'){
    updateDemo();drawDemo();
  }else if(state==='playing'){
    update();
    if(waveState!=='upgrade')draw();
    else{drawBackground();} // still draw bg behind upgrade screen
  }else if(state==='gameover'){
    drawBackground();
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--});
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      const a=p.life/p.maxLife;X.globalAlpha=a;X.fillStyle=p.color;
      X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();
    });
    X.globalAlpha=1;
  }
}
loop();

// ===== BUTTON HANDLERS =====
function bindBtn(id,fn){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('click',e=>{e.stopPropagation();fn()});
  el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();fn()});
}
bindBtn('playBtn',()=>{initAudio();startGame()});
bindBtn('muteBtn',()=>{initAudio();toggleMute()});
bindBtn('hsBtn',()=>{
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('hsScreen').classList.remove('hidden');
  renderScores(document.getElementById('hsTable'));
});
bindBtn('hsBack',()=>{
  document.getElementById('hsScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');
});
bindBtn('replayBtn',()=>{initAudio();startGame()});
bindBtn('confirmInit',confirmInitials);
bindBtn('bombBtn',()=>{initAudio();useBomb()});
</script>
