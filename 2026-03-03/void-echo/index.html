<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Void Echo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;overflow:hidden;width:100%;height:100%;background:#000}
canvas{display:block;width:100%;height:100%}
button{touch-action:manipulation}
#startScreen,#upgradeScreen,#gameOverScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(0,0,10,0.92)}
#startScreen h1{font-family:sans-serif;font-size:3rem;color:#0ff;text-shadow:0 0 30px #0ff,0 0 60px #08f;margin-bottom:10px}
#startScreen p{color:#88f;font-family:sans-serif;margin-bottom:30px;font-size:1.1rem}
.btn{background:none;border:2px solid #0ff;color:#0ff;font-family:sans-serif;font-size:1.3rem;padding:14px 40px;border-radius:8px;cursor:pointer;text-shadow:0 0 10px #0ff}
.btn:active{background:rgba(0,255,255,0.15)}
#bombBtn{position:fixed;bottom:24px;right:24px;width:70px;height:70px;border-radius:50%;background:rgba(255,60,60,0.25);border:3px solid #f44;color:#fff;font-size:28px;z-index:5;display:none;cursor:pointer;touch-action:manipulation;text-shadow:0 0 8px #f44}
#bombCount{position:fixed;bottom:100px;right:42px;color:#f88;font-family:sans-serif;font-size:14px;z-index:5;display:none}
#upgradeScreen{display:none}
#upgradeScreen h2{color:#0ff;font-family:sans-serif;font-size:1.8rem;margin-bottom:24px;text-shadow:0 0 20px #0ff}
#cardRow{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.card{width:160px;padding:20px 14px;background:rgba(20,20,60,0.95);border:2px solid #88f;border-radius:14px;text-align:center;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;touch-action:manipulation}
.card:active{transform:scale(1.06);box-shadow:0 0 30px #0ff}
.card .emoji{font-size:2.4rem;margin-bottom:8px}
.card .cname{color:#fff;font-family:sans-serif;font-size:1rem;margin-bottom:6px}
.card .cdesc{color:#aaf;font-family:sans-serif;font-size:0.78rem}
#gameOverScreen{display:none}
#gameOverScreen h2{color:#f44;font-family:sans-serif;font-size:2.2rem;text-shadow:0 0 20px #f44;margin-bottom:10px}
#gameOverScreen .info{color:#aaa;font-family:sans-serif;margin-bottom:16px;font-size:1.1rem}
#initialsEntry{display:none;flex-direction:column;align-items:center;margin-bottom:16px}
#initialsEntry label{color:#0ff;font-family:sans-serif;margin-bottom:8px}
#initialsInput{background:#111;border:2px solid #0ff;color:#0ff;font-family:monospace;font-size:2rem;width:100px;text-align:center;padding:6px;text-transform:uppercase;border-radius:6px}
#leaderboard{color:#ccc;font-family:monospace;font-size:0.9rem;margin-bottom:20px;text-align:left;max-height:200px;overflow-y:auto}
#leaderboard div{padding:2px 0}
#leaderboard .hl{color:#ff0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="bombBtn" aria-label="Bomb">💣</button>
<div id="bombCount"></div>

<div id="startScreen">
<h1>VOID ECHO</h1>
<p>Touch anywhere to pilot. Auto-fire engaged.</p>
<button class="btn" id="playBtn">▶ PLAY</button>
</div>

<div id="upgradeScreen">
<h2>CHOOSE UPGRADE</h2>
<div id="cardRow"></div>
</div>

<div id="gameOverScreen">
<h2>GAME OVER</h2>
<div class="info" id="goInfo"></div>
<div id="initialsEntry">
<label>NEW HIGH SCORE! Enter initials:</label>
<input id="initialsInput" maxlength="3" autocomplete="off">
<button class="btn" id="submitScore" style="margin-top:10px;font-size:1rem;padding:8px 24px">SUBMIT</button>
</div>
<div id="leaderboard"></div>
<button class="btn" id="restartBtn">PLAY AGAIN</button>
</div>

<script>
// ── Canvas Setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Audio ──
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playTone(freq, dur, vol=0.12, type='square') {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

// ── State ──
let state = 'start'; // start, playing, upgrading, gameover
let score = 0, multiplier = 1, wave = 0, hp = 100, maxHp = 100, bombs = 1, maxBombs = 3;
let fireRate = 500, bulletDmg = 10, bulletSpeed = 10, shipSpeed = 5;
let tripleShot = false, homingBullets = false, piercing = false, ricochet = false;
let fireTimer = 0, shieldTimer = 0, rapidTimer = 0;
let waveEnemiesLeft = 0, waveAnnounceTimer = 0, waveAnnounceText = '';
let screenFlash = 0;
let touchX = -1, touchY = -1, touching = false;

// Arrays
let stars = [], nebulae = [], bullets = [], enemies = [], particles = [], powerups = [], enemyBullets = [];
let player = { x: 0, y: 0, trail: [] };

// Upgrades catalog
const UPGRADES = [
  { id:'rapid',   emoji:'⚡', name:'Rapid Fire',   desc:'Shoot 25% faster' },
  { id:'heavy',   emoji:'💥', name:'Heavy Rounds',  desc:'+5 bullet damage' },
  { id:'triple',  emoji:'🎯', name:'Triple Shot',   desc:'Fire 3 bullets' },
  { id:'homing',  emoji:'🔮', name:'Homing',        desc:'Bullets track enemies' },
  { id:'speed',   emoji:'💨', name:'Speed Boost',   desc:'+1.5 ship speed' },
  { id:'hull',    emoji:'🛡', name:'Hull Repair',   desc:'+50 HP' },
  { id:'bomb',    emoji:'💣', name:'Extra Bomb',    desc:'+1 bomb (max 3)' },
  { id:'pierce',  emoji:'☄️', name:'Piercing',      desc:'Bullets pass through' },
  { id:'rico',    emoji:'🌀', name:'Ricochet',      desc:'Bullets bounce once' },
];

// ── Stars & Nebulae ──
function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) stars.push({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*2+0.5, b: Math.random() });
  nebulae = [];
  for (let i = 0; i < 5; i++) nebulae.push({ x: Math.random()*W, y: Math.random()*H, r: 80+Math.random()*120, c: `hsla(${220+Math.random()*80},60%,20%,0.08)` });
}
initStars();

function drawBg() {
  ctx.fillStyle = '#05050f';
  ctx.fillRect(0, 0, W, H);
  for (const n of nebulae) {
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    g.addColorStop(0, n.c); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.fillRect(n.x-n.r, n.y-n.r, n.r*2, n.r*2);
  }
  for (const s of stars) {
    s.b += 0.02; const a = 0.4 + Math.sin(s.b)*0.3;
    ctx.fillStyle = `rgba(200,220,255,${a})`;
    ctx.fillRect(s.x, s.y, s.s, s.s);
    s.y += s.s * 0.3;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
  }
}

// ── Player ──
function drawPlayer() {
  const px = player.x, py = player.y;
  // Trail
  player.trail.push({ x: px, y: py + 14, a: 1 });
  if (player.trail.length > 15) player.trail.shift();
  for (const t of player.trail) {
    ctx.fillStyle = `rgba(0,180,255,${t.a * 0.4})`;
    ctx.beginPath(); ctx.arc(t.x, t.y, 4 * t.a, 0, Math.PI*2); ctx.fill();
    t.a -= 0.06;
  }
  player.trail = player.trail.filter(t => t.a > 0);

  // Shield
  if (shieldTimer > 0) {
    ctx.strokeStyle = `rgba(100,200,255,${0.3 + Math.sin(Date.now()*0.01)*0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(px, py, 22, 0, Math.PI*2); ctx.stroke();
  }

  // Ship glow
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#0df';
  ctx.beginPath();
  ctx.moveTo(px, py - 16);
  ctx.lineTo(px - 12, py + 12);
  ctx.lineTo(px + 12, py + 12);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ── Enemies ──
function spawnWave() {
  wave++;
  waveAnnounceText = wave % 5 === 0 ? `⚠ BOSS WAVE ${wave}` : `WAVE ${wave}`;
  waveAnnounceTimer = 120;
  enemies = [];
  enemyBullets = [];

  if (wave % 5 === 0) {
    // Boss wave
    enemies.push(makeBoss());
    waveEnemiesLeft = 1;
    return;
  }

  let count = 3 + wave * 2;
  waveEnemiesLeft = count;
  for (let i = 0; i < count; i++) {
    const edge = Math.random();
    let ex, ey;
    if (edge < 0.25) { ex = Math.random()*W; ey = -30; }
    else if (edge < 0.5) { ex = Math.random()*W; ey = H+30; }
    else if (edge < 0.75) { ex = -30; ey = Math.random()*H; }
    else { ex = W+30; ey = Math.random()*H; }

    if (wave >= 6 && Math.random() < 0.2) {
      enemies.push({ type:'heavy', x:ex, y:ey, hp:60+wave*3, maxHp:60+wave*3, r:18, shootTimer:120+Math.random()*60, phase:0 });
    } else if (wave >= 4 && Math.random() < 0.3) {
      enemies.push({ type:'fast', x:ex, y:ey, hp:15+wave, maxHp:15+wave, r:10, zigTimer:0, zigDir:1 });
    } else {
      enemies.push({ type:'basic', x:ex, y:ey, hp:20+wave*2, maxHp:20+wave*2, r:12 });
    }
  }
}

function makeBoss() {
  return { type:'boss', x:W/2, y:-60, hp:200+wave*40, maxHp:200+wave*40, r:40, phase:0,
    shootTimer:0, laserTimer:0, laserAngle:0, laserActive:false, enterDone:false };
}

function updateEnemies(dt) {
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    const nx = dx/dist, ny = dy/dist;

    if (e.type === 'basic') {
      const spd = 1 + wave*0.08;
      e.x += nx * spd; e.y += ny * spd;
    } else if (e.type === 'fast') {
      e.zigTimer += dt;
      const spd = 2.5 + wave*0.05;
      const perp = Math.sin(e.zigTimer*0.05) * 2;
      e.x += nx*spd + (-ny)*perp;
      e.y += ny*spd + nx*perp;
    } else if (e.type === 'heavy') {
      e.x += nx * 0.6; e.y += ny * 0.6;
      e.shootTimer -= dt;
      if (e.shootTimer <= 0) {
        e.shootTimer = 90 + Math.random()*40;
        enemyBullets.push({ x:e.x, y:e.y, vx:nx*3, vy:ny*3, homing:true, r:4, dmg:8 });
        playTone(200, 0.15, 0.06);
      }
    } else if (e.type === 'boss') {
      if (!e.enterDone) {
        e.y += 1.5;
        if (e.y >= 100) e.enterDone = true;
      } else {
        e.x += Math.sin(Date.now()*0.001) * 1.5;
        const hpPct = e.hp / e.maxHp;
        e.phase = hpPct > 0.66 ? 0 : hpPct > 0.33 ? 1 : 2;
        e.shootTimer -= dt;
        if (e.shootTimer <= 0) {
          e.shootTimer = e.phase === 2 ? 20 : e.phase === 1 ? 35 : 50;
          const angles = e.phase >= 1 ? 7 : 5;
          for (let a = 0; a < angles; a++) {
            const ang = (a/(angles-1) - 0.5) * (Math.PI * 0.6) + Math.atan2(dy, dx);
            enemyBullets.push({ x:e.x, y:e.y, vx:Math.cos(ang)*3.5, vy:Math.sin(ang)*3.5, homing:false, r:4, dmg:10 });
          }
          playTone(150, 0.2, 0.05);
        }
        // Laser in phase 2
        if (e.phase === 2) {
          e.laserTimer -= dt;
          if (e.laserTimer <= 0) {
            e.laserActive = !e.laserActive;
            e.laserTimer = e.laserActive ? 90 : 60;
            e.laserAngle = Math.atan2(dy, dx);
          }
          if (e.laserActive) {
            e.laserAngle += (Math.atan2(player.y-e.y, player.x-e.x) - e.laserAngle) * 0.02;
          }
        }
      }
    }

    // Collision with player
    if (dist < e.r + 14 && state === 'playing') {
      if (shieldTimer > 0) { shieldTimer = 0; } else { hp -= e.type==='boss'?20:15; screenFlash=8; }
      if (e.type !== 'boss') { killEnemy(i); }
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length-1; i >= 0; i--) {
    const b = enemyBullets[i];
    if (b.homing) {
      const dx = player.x-b.x, dy = player.y-b.y, d = Math.sqrt(dx*dx+dy*dy)||1;
      b.vx += (dx/d)*0.08; b.vy += (dy/d)*0.08;
      const s = Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      if (s > 4) { b.vx = b.vx/s*4; b.vy = b.vy/s*4; }
    }
    b.x += b.vx; b.y += b.vy;
    if (b.x<-20||b.x>W+20||b.y<-20||b.y>H+20) { enemyBullets.splice(i,1); continue; }
    const dx = player.x-b.x, dy = player.y-b.y;
    if (Math.sqrt(dx*dx+dy*dy) < 14 + b.r) {
      if (shieldTimer > 0) { shieldTimer = 0; } else { hp -= b.dmg; screenFlash = 5; }
      enemyBullets.splice(i,1);
    }
  }

  // Boss laser damage
  for (const e of enemies) {
    if (e.type==='boss' && e.laserActive) {
      const cos = Math.cos(e.laserAngle), sin = Math.sin(e.laserAngle);
      const dx = player.x-e.x, dy = player.y-e.y;
      const proj = dx*cos+dy*sin;
      const perp = Math.abs(-dx*sin+dy*cos);
      if (proj > 0 && perp < 18) {
        if (shieldTimer > 0) { shieldTimer = 0; } else { hp -= 0.5; }
      }
    }
  }
}

function killEnemy(idx) {
  const e = enemies[idx];
  const pts = e.type==='boss'?1000:e.type==='heavy'?50:e.type==='fast'?30:20;
  score += pts * multiplier;
  multiplier = Math.min(multiplier + 0.1, 5);
  spawnExplosion(e.x, e.y, e.type==='boss'?40:15);
  if (e.type==='boss') { screenFlash = 20; playTone(80,0.5,0.15,'sawtooth'); }
  else { playTone(300+Math.random()*200, 0.1, 0.08); }

  // Power-up drop
  if (e.type !== 'boss' && Math.random() < 0.25) {
    const types = ['health','score','shield','rapid'];
    powerups.push({ x:e.x, y:e.y, type:types[Math.floor(Math.random()*types.length)], timer:300 });
  }

  enemies.splice(idx, 1);
  waveEnemiesLeft--;
}

// ── Bullets ──
function autoFire(dt) {
  const rate = rapidTimer > 0 ? fireRate * 0.4 : fireRate;
  fireTimer -= dt * 16.67;
  if (fireTimer > 0 || enemies.length === 0) return;
  fireTimer = rate;

  // Find nearest enemy
  let nearest = null, minD = Infinity;
  for (const e of enemies) {
    const d = Math.hypot(e.x-player.x, e.y-player.y);
    if (d < minD) { minD = d; nearest = e; }
  }
  if (!nearest) return;

  const ang = Math.atan2(nearest.y-player.y, nearest.x-player.x);
  const spd = bulletSpeed;

  function makeBullet(a) {
    return { x:player.x, y:player.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, dmg:bulletDmg, bounced:false };
  }

  bullets.push(makeBullet(ang));
  if (tripleShot) {
    bullets.push(makeBullet(ang - 0.18));
    bullets.push(makeBullet(ang + 0.18));
  }
  playTone(800, 0.05, 0.04);
}

function updateBullets() {
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if (homingBullets && enemies.length > 0) {
      let nearest = null, minD = Infinity;
      for (const e of enemies) {
        const d = Math.hypot(e.x-b.x, e.y-b.y);
        if (d < minD) { minD = d; nearest = e; }
      }
      if (nearest) {
        const ang = Math.atan2(nearest.y-b.y, nearest.x-b.x);
        const s = bulletSpeed;
        b.vx += Math.cos(ang)*0.3; b.vy += Math.sin(ang)*0.3;
        const cur = Math.hypot(b.vx, b.vy);
        b.vx = b.vx/cur*s; b.vy = b.vy/cur*s;
      }
    }
    b.x += b.vx; b.y += b.vy;
    if (b.x<-10||b.x>W+10||b.y<-10||b.y>H+10) {
      if (ricochet && !b.bounced) {
        b.bounced = true;
        if (b.x<-10||b.x>W+10) b.vx *= -1;
        if (b.y<-10||b.y>H+10) b.vy *= -1;
        b.x = Math.max(0, Math.min(W, b.x));
        b.y = Math.max(0, Math.min(H, b.y));
      } else {
        bullets.splice(i,1); continue;
      }
    }

    // Hit enemies
    for (let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(e.x-b.x, e.y-b.y) < e.r + 5) {
        e.hp -= b.dmg;
        spawnExplosion(b.x, b.y, 3);
        if (e.hp <= 0) killEnemy(j);
        if (!piercing) { bullets.splice(i,1); break; }
      }
    }
  }
}

// ── Powerups ──
function updatePowerups() {
  for (let i = powerups.length-1; i >= 0; i--) {
    const p = powerups[i];
    p.timer--;
    if (p.timer <= 0) { powerups.splice(i,1); continue; }
    if (Math.hypot(p.x-player.x, p.y-player.y) < 24) {
      if (p.type==='health') { hp = Math.min(hp+30, maxHp); }
      else if (p.type==='score') { score += 100 * multiplier; multiplier = Math.min(multiplier+0.5,5); }
      else if (p.type==='shield') { shieldTimer = 300; }
      else if (p.type==='rapid') { rapidTimer = 300; }
      playTone(600, 0.15, 0.1, 'sine');
      powerups.splice(i,1);
    }
  }
}

// ── Particles ──
function spawnExplosion(x, y, count) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random()*Math.PI*2, spd = 1+Math.random()*3;
    particles.push({ x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:1,
      color:`hsl(${20+Math.random()*40},100%,${50+Math.random()*30}%)`, size:2+Math.random()*3 });
  }
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= 0.025;
    if (p.life <= 0) particles.splice(i,1);
  }
}

// ── Drawing helpers ──
function drawEnemies() {
  for (const e of enemies) {
    ctx.save();
    if (e.type === 'basic') {
      ctx.shadowColor = '#f44'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#f44';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'fast') {
      ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#0ee';
      ctx.beginPath();
      ctx.moveTo(e.x, e.y - e.r);
      ctx.lineTo(e.x - e.r*0.7, e.y + e.r);
      ctx.lineTo(e.x + e.r*0.7, e.y + e.r);
      ctx.closePath(); ctx.fill();
    } else if (e.type === 'heavy') {
      ctx.shadowColor = '#a0f'; ctx.shadowBlur = 14;
      ctx.fillStyle = '#90e';
      ctx.beginPath();
      for (let a = 0; a < 6; a++) {
        const ang = a * Math.PI/3 - Math.PI/6;
        const m = a===0?'moveTo':'lineTo';
        ctx[m](e.x+Math.cos(ang)*e.r, e.y+Math.sin(ang)*e.r);
      }
      ctx.closePath(); ctx.fill();
    } else if (e.type === 'boss') {
      ctx.shadowColor = '#f80'; ctx.shadowBlur = 25;
      ctx.fillStyle = e.phase===2?'#f22':e.phase===1?'#f80':'#fa0';
      ctx.beginPath();
      ctx.moveTo(e.x, e.y - e.r);
      ctx.lineTo(e.x - e.r*1.2, e.y + e.r*0.5);
      ctx.lineTo(e.x - e.r*0.4, e.y + e.r*0.8);
      ctx.lineTo(e.x + e.r*0.4, e.y + e.r*0.8);
      ctx.lineTo(e.x + e.r*1.2, e.y + e.r*0.5);
      ctx.closePath(); ctx.fill();
      // HP bar
      ctx.shadowBlur = 0;
      const bw = 80, bh = 6;
      ctx.fillStyle = '#333'; ctx.fillRect(e.x-bw/2, e.y-e.r-14, bw, bh);
      ctx.fillStyle = '#f44'; ctx.fillRect(e.x-bw/2, e.y-e.r-14, bw*(e.hp/e.maxHp), bh);
      // Laser
      if (e.laserActive) {
        ctx.strokeStyle = 'rgba(255,50,50,0.7)'; ctx.lineWidth = 8;
        ctx.shadowColor = '#f00'; ctx.shadowBlur = 20;
        ctx.beginPath(); ctx.moveTo(e.x, e.y);
        ctx.lineTo(e.x+Math.cos(e.laserAngle)*W, e.y+Math.sin(e.laserAngle)*W);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,200,200,0.9)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(e.x, e.y);
        ctx.lineTo(e.x+Math.cos(e.laserAngle)*W, e.y+Math.sin(e.laserAngle)*W);
        ctx.stroke();
      }
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawBullets() {
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 8;
  for (const b of bullets) {
    ctx.fillStyle = '#0ff';
    ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowColor = '#f44'; ctx.shadowBlur = 6;
  for (const b of enemyBullets) {
    ctx.fillStyle = b.homing ? '#f0f' : '#f84';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawPowerups() {
  const icons = { health:'❤️', score:'⭐', shield:'🛡', rapid:'⚡' };
  ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
  for (const p of powerups) {
    const a = p.timer < 60 ? p.timer/60 : 1;
    ctx.globalAlpha = a;
    ctx.fillText(icons[p.type], p.x, p.y+6);
  }
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Score: ${Math.floor(score)}`, 14, 30);
  ctx.fillStyle = '#ff0';
  ctx.fillText(`x${multiplier.toFixed(1)}`, 14, 52);

  ctx.textAlign = 'center'; ctx.fillStyle = '#aaf';
  ctx.fillText(`Wave ${wave}`, W/2, 30);

  // HP bar
  const bw = 120, bh = 10, bx = W-bw-14, by = 14;
  ctx.fillStyle = '#333'; ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = hp/maxHp > 0.3 ? '#0f8' : '#f44';
  ctx.fillRect(bx, by, bw*(hp/maxHp), bh);
  ctx.strokeStyle = '#666'; ctx.strokeRect(bx, by, bw, bh);

  // Wave announce
  if (waveAnnounceTimer > 0) {
    waveAnnounceTimer--;
    const scale = waveAnnounceTimer > 100 ? 1 + (waveAnnounceTimer-100)*0.03 : 1;
    const alpha = waveAnnounceTimer > 100 ? 1 : waveAnnounceTimer/100;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${32*scale}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
    ctx.fillText(waveAnnounceText, W/2, H/2 - 40);
    ctx.restore();
  }

  // Screen flash
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${screenFlash*0.04})`;
    ctx.fillRect(0, 0, W, H);
    screenFlash--;
  }

  // Timers display
  let ty = 74;
  ctx.textAlign = 'left'; ctx.font = '13px sans-serif';
  if (shieldTimer > 0) { ctx.fillStyle='#4df'; ctx.fillText(`🛡 ${Math.ceil(shieldTimer/60)}s`, 14, ty); ty+=16; }
  if (rapidTimer > 0) { ctx.fillStyle='#ff0'; ctx.fillText(`⚡ ${Math.ceil(rapidTimer/60)}s`, 14, ty); ty+=16; }
}

// ── Bomb ──
function useBomb() {
  if (bombs <= 0 || state !== 'playing') return;
  bombs--;
  updateBombUI();
  screenFlash = 15;
  playTone(60, 0.5, 0.2, 'sawtooth');
  for (let i = enemies.length-1; i >= 0; i--) {
    if (enemies[i].type === 'boss') { enemies[i].hp -= 50; if (enemies[i].hp<=0) killEnemy(i); }
    else killEnemy(i);
  }
  enemyBullets = [];
}

function updateBombUI() {
  document.getElementById('bombCount').textContent = `x${bombs}`;
}

// ── Touch Handling ──
const bombBtn = document.getElementById('bombBtn');

function isBombBtn(t) { return t === bombBtn; }

canvas.addEventListener('touchstart', e => {
  if (state !== 'playing') return;
  for (const t of e.changedTouches) {
    if (!isBombBtn(t.target)) {
      touching = true; touchX = t.clientX; touchY = t.clientY;
    }
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (state !== 'playing') return;
  for (const t of e.changedTouches) {
    touchX = t.clientX; touchY = t.clientY;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => { touching = false; e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchcancel', e => { touching = false; }, { passive: false });

// Mouse fallback
canvas.addEventListener('mousedown', e => { if (state==='playing') { touching=true; touchX=e.clientX; touchY=e.clientY; } });
canvas.addEventListener('mousemove', e => { if (touching) { touchX=e.clientX; touchY=e.clientY; } });
canvas.addEventListener('mouseup', () => { touching=false; });

// Bomb button
function bombHandler(e) { e.preventDefault(); e.stopPropagation(); useBomb(); }
bombBtn.addEventListener('click', bombHandler);
bombBtn.addEventListener('touchend', bombHandler);

// ── Upgrades ──
function showUpgrades() {
  state = 'upgrading';
  const pool = [...UPGRADES];
  const picks = [];
  for (let i = 0; i < 3 && pool.length; i++) {
    const idx = Math.floor(Math.random()*pool.length);
    picks.push(pool.splice(idx,1)[0]);
  }
  const row = document.getElementById('cardRow');
  row.innerHTML = '';
  for (const u of picks) {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<div class="emoji">${u.emoji}</div><div class="cname">${u.name}</div><div class="cdesc">${u.desc}</div>`;
    function pick(e) { e.preventDefault(); applyUpgrade(u.id); }
    div.addEventListener('click', pick);
    div.addEventListener('touchend', pick);
    row.appendChild(div);
  }
  document.getElementById('upgradeScreen').style.display = 'flex';
}

function applyUpgrade(id) {
  if (id==='rapid') fireRate = Math.max(100, fireRate*0.75);
  else if (id==='heavy') bulletDmg += 5;
  else if (id==='triple') tripleShot = true;
  else if (id==='homing') homingBullets = true;
  else if (id==='speed') shipSpeed += 1.5;
  else if (id==='hull') { maxHp += 50; hp = Math.min(hp+50, maxHp); }
  else if (id==='bomb') { maxBombs = Math.min(maxBombs+1, 5); bombs = Math.min(bombs+1, maxBombs); updateBombUI(); }
  else if (id==='pierce') piercing = true;
  else if (id==='rico') ricochet = true;
  playTone(500, 0.2, 0.1, 'sine');
  document.getElementById('upgradeScreen').style.display = 'none';
  state = 'playing';
  spawnWave();
}

// ── Game Over ──
function gameOver() {
  state = 'gameover';
  bombBtn.style.display = 'none';
  document.getElementById('bombCount').style.display = 'none';
  const finalScore = Math.floor(score);
  document.getElementById('goInfo').textContent = `Score: ${finalScore} | Wave: ${wave}`;

  const scores = JSON.parse(localStorage.getItem('voidecho_highscores') || '[]');
  const isHigh = scores.length < 10 || finalScore > (scores[scores.length-1]?.score || 0);

  if (isHigh && finalScore > 0) {
    document.getElementById('initialsEntry').style.display = 'flex';
    document.getElementById('initialsInput').value = '';
    setTimeout(() => document.getElementById('initialsInput').focus(), 100);
  } else {
    document.getElementById('initialsEntry').style.display = 'none';
  }

  renderLeaderboard(scores, -1);
  document.getElementById('gameOverScreen').style.display = 'flex';
}

function renderLeaderboard(scores, hlIdx) {
  const lb = document.getElementById('leaderboard');
  if (!scores.length) { lb.innerHTML = '<div>No scores yet</div>'; return; }
  lb.innerHTML = scores.map((s, i) =>
    `<div class="${i===hlIdx?'hl':''}">${(i+1+'').padStart(2,' ')}. ${s.initials} — ${s.score}</div>`
  ).join('');
}

function submitScore() {
  const initials = document.getElementById('initialsInput').value.toUpperCase().replace(/[^A-Z]/g,'').substring(0,3) || 'AAA';
  const finalScore = Math.floor(score);
  let scores = JSON.parse(localStorage.getItem('voidecho_highscores') || '[]');
  scores.push({ initials, score: finalScore });
  scores.sort((a,b) => b.score - a.score);
  scores = scores.slice(0, 10);
  localStorage.setItem('voidecho_highscores', JSON.stringify(scores));
  const hlIdx = scores.findIndex(s => s.initials === initials && s.score === finalScore);
  document.getElementById('initialsEntry').style.display = 'none';
  renderLeaderboard(scores, hlIdx);
}

// Submit score handlers
const submitBtn = document.getElementById('submitScore');
submitBtn.addEventListener('click', e => { e.preventDefault(); submitScore(); });
submitBtn.addEventListener('touchend', e => { e.preventDefault(); submitScore(); });

// ── Start / Restart ──
function startGame() {
  initAudio();
  score = 0; multiplier = 1; wave = 0; hp = 100; maxHp = 100; bombs = 1;
  fireRate = 500; bulletDmg = 10; bulletSpeed = 10; shipSpeed = 5;
  tripleShot = false; homingBullets = false; piercing = false; ricochet = false;
  fireTimer = 0; shieldTimer = 0; rapidTimer = 0; screenFlash = 0;
  bullets = []; enemies = []; particles = []; powerups = []; enemyBullets = [];
  player.x = W/2; player.y = H*0.7; player.trail = [];
  touching = false;
  state = 'playing';
  bombBtn.style.display = 'block';
  document.getElementById('bombCount').style.display = 'block';
  updateBombUI();
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  spawnWave();
}

const playBtn = document.getElementById('playBtn');
function playHandler(e) { e.preventDefault(); startGame(); }
playBtn.addEventListener('click', playHandler);
playBtn.addEventListener('touchend', playHandler);

const restartBtn = document.getElementById('restartBtn');
function restartHandler(e) { e.preventDefault(); startGame(); }
restartBtn.addEventListener('click', restartHandler);
restartBtn.addEventListener('touchend', restartHandler);

// ── Game Loop ──
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3) || 1;
  lastTime = ts;

  drawBg();

  if (state === 'playing') {
    // Move player toward touch
    if (touching) {
      const dx = touchX - player.x, dy = touchY - player.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist > 2) {
        const spd = Math.min(shipSpeed * dt, dist);
        player.x += (dx/dist) * spd;
        player.y += (dy/dist) * spd;
      }
    }
    player.x = Math.max(12, Math.min(W-12, player.x));
    player.y = Math.max(12, Math.min(H-12, player.y));

    autoFire(dt);
    updateBullets();
    updateEnemies(dt);
    updatePowerups();
    updateParticles();

    if (shieldTimer > 0) shieldTimer -= dt;
    if (rapidTimer > 0) rapidTimer -= dt;
    multiplier = Math.max(1, multiplier - 0.001*dt);

    if (hp <= 0) gameOver();
    if (waveEnemiesLeft <= 0 && enemies.length === 0 && state === 'playing') showUpgrades();
  } else {
    updateParticles();
  }

  drawParticles();
  if (state === 'playing' || state === 'upgrading') {
    drawEnemies();
    drawBullets();
    drawPowerups();
    drawPlayer();
    drawHUD();
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
