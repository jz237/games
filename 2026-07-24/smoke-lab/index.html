  return wrap;
}

function drawDial(){
  var d = document.getElementById('dial'); if(!d) return;
  var mag = Math.hypot(P.windX, P.windY);
  var ang = Math.atan2(P.windY, P.windX);
  var i = d.querySelector('i');
  i.style.transform = 'rotate(' + (90 - ang*180/Math.PI) + 'deg)';
  i.style.height = (6 + clamp(mag/6,0,1)*22) + 'px';
  i.style.marginTop = '-' + (6 + clamp(mag/6,0,1)*22) + 'px';
  i.style.opacity = mag < 0.01 ? 0.25 : 1;
  var out = document.getElementById('dialval');
  if(out) out.textContent = mag.toFixed(2) + ' @ ' + Math.round(((ang*180/Math.PI)+360)%360) + '°';
}

function syncControls(){ controlRefs.forEach(function(c){ try{ c.sync(); }catch(e){} }); }

function resetGroup(g){
  g.items.forEach(function(it){
    if(!it.k) return;
    if(it.src === 'em'){ var e=emitters[selEm]; if(e) e[it.k]=EM_DEFAULTS[it.k]; }
    else if(it.src === 'ob'){ var o=obstacles[selObs]; if(o){ if(it.k==='osx')o.sx=0.09; if(it.k==='osy')o.sy=0.09; if(it.k==='rotd')o.rot=0; } }
    else P[it.k] = it.def;
  });
  scheduleResize(); syncControls(); saveSoon();
  toast(g.title + ' reset');
}

function applyPreset(name){
  var pr = PRESETS[name]; if(!pr) return;
  P = Object.assign({}, DEFAULTS, pr.p||{});
  emitters = (pr.em||[]).map(function(e){
    var n = newEmitter(e.x*state.aspect, e.y);
    Object.keys(e).forEach(function(k){ if(k!=='x'&&k!=='y') n[k]=e[k]; });
    return n;
  });
  if(!emitters.length) emitters=[newEmitter(state.aspect*0.5,0.05)];
  selEm = 0;
  if(name === 'Wind Tunnel'){
    obstacles = [];
    var a = newObstacle(1, state.aspect*0.42, 0.5); a.sx=a.sy=0.075; obstacles.push(a);
    var b = newObstacle(2, state.aspect*0.72, 0.5); b.sx=0.13; b.sy=0.08; b.rot=-0.22; obstacles.push(b);
  } else if(name === 'Slow Ink'){
    obstacles = [];
    var c = newObstacle(0, state.aspect*0.5, 0.45); c.sx=0.16; c.sy=0.02; c.rot=0.35; obstacles.push(c);
  } else if(!obstacles.length){
    defaultScene();
  }
  selObs = -1;
  scheduleResize(); resetFields(); syncControls(); saveSoon();
  toast(name);
}

/* --------------------------------------------------------------------------
   8. SAVE / LOAD
   -------------------------------------------------------------------------- */
function serialize(){
  return {
    v:1, p:P,
    ob: obstacles.map(function(o){ return {t:o.type,x:+o.x.toFixed(4),y:+o.y.toFixed(4),
                                           sx:+o.sx.toFixed(4),sy:+o.sy.toFixed(4),r:+o.rot.toFixed(4)}; }),
    em: emitters.map(function(e){ return {x:+e.x.toFixed(4),y:+e.y.toFixed(4),radius:e.radius,rate:e.rate,
                                          temp:e.temp,vel:e.vel,angle:e.angle,spread:e.spread,
                                          pulse:e.pulse,pulseRate:e.pulseRate,on:e.on}; })
  };
}
function deserialize(o){
  if(!o) return false;
  if(o.p) P = Object.assign({}, DEFAULTS, o.p);
  if(o.ob && o.ob.length){
    obstacles = o.ob.map(function(s){
      var n = newObstacle(s.t, s.x, s.y); n.sx=s.sx; n.sy=s.sy; n.rot=s.r; n.px=s.x; n.py=s.y; return n;
    });
  }
  if(o.em && o.em.length){
    emitters = o.em.map(function(s){
      var n = newEmitter(s.x, s.y);
      Object.keys(s).forEach(function(k){ n[k]=s[k]; });
      if(n.on===undefined) n.on=true;
      return n;
    });
  }
  selEm = 0; selObs = -1;
  return true;
}
var saveTimer=0;
function saveSoon(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    try{ localStorage.setItem('smokelab.v1', JSON.stringify(serialize())); }catch(e){}
  }, 400);
}
function loadSaved(){
  if(location.hash.length > 3){
    try{ if(deserialize(JSON.parse(decodeURIComponent(location.hash.slice(1))))) return true; }catch(e){}
  }
  try{
    var s = localStorage.getItem('smokelab.v1');
    if(s) return deserialize(JSON.parse(s));
  }catch(e){}
  return false;
}

/* --------------------------------------------------------------------------
   9. INPUT
   -------------------------------------------------------------------------- */
var drag = null;   // {mode:'obs'|'em'|'fluid'|'smoke', idx, ox, oy, lastX, lastY}

function onDown(ev){
  if(ev.target !== glCanvas && ev.target !== uiCanvas) return;
  ev.preventDefault();
  uiCanvas.setPointerCapture && uiCanvas.setPointerCapture(ev.pointerId);
  var w = screenToWorld(ev.clientX, ev.clientY);
  var right = ev.button === 2 || ev.ctrlKey;

  var ei = pickEmitter(w.x, w.y);
  var oi = pickObstacle(w.x, w.y, 0.010);
  if(!right && ei >= 0){
    selEm = ei; drag = {mode:'em', idx:ei, ox:emitters[ei].x-w.x, oy:emitters[ei].y-w.y};
    syncControls(); return;
  }
  if(!right && oi >= 0){
    selObs = oi;
    var o = obstacles[oi];
    drag = {mode:'obs', idx:oi, ox:o.x-w.x, oy:o.y-w.y};
    syncControls(); return;
  }
  drag = {mode: right ? 'smoke' : 'fluid', lastX:w.x, lastY:w.y};
  if(!right && oi < 0 && ei < 0){ selObs = -1; syncControls(); }
}

function onMove(ev){
  var w = screenToWorld(ev.clientX, ev.clientY);
  hovObs = pickObstacle(w.x, w.y, 0.008);
  hovEm  = pickEmitter(w.x, w.y);
  if(!drag){
    glCanvas.style.cursor = (hovObs>=0||hovEm>=0) ? 'grab' : 'crosshair';
    return;
  }
  glCanvas.style.cursor = 'grabbing';
  if(drag.mode === 'obs'){
    var o = obstacles[drag.idx]; if(!o) return;
    o.x = clamp(w.x + drag.ox, -0.5, state.aspect+0.5);
    o.y = clamp(w.y + drag.oy, -0.5, 1.5);
  } else if(drag.mode === 'em'){
    var e = emitters[drag.idx]; if(!e) return;
    e.x = clamp(w.x + drag.ox, 0, state.aspect);
    e.y = clamp(w.y + drag.oy, 0, 1);
    saveSoon();
  } else {
    var dx = w.x - drag.lastX, dy = w.y - drag.lastY;
    var U = state.gpu ? state.simH : CPU.h;
    if(drag.mode === 'fluid'){
      pendingSplats.push({x:w.x, y:w.y, r:0.045, d:0, t:0, vx:dx*U*6, vy:dy*U*6});
    } else {
      pendingSplats.push({x:w.x, y:w.y, r:0.05, d:0.30, t:0.16, vx:dx*U*2, vy:dy*U*2});
    }
    drag.lastX = w.x; drag.lastY = w.y;
  }
}
function onUp(){
  if(drag && drag.mode==='obs') saveSoon();
  drag = null;
  glCanvas.style.cursor = 'crosshair';
}
function onWheel(ev){
  var w = screenToWorld(ev.clientX, ev.clientY);
  var idx = (drag && drag.mode==='obs') ? drag.idx : (hovObs >= 0 ? hovObs : selObs);
  var o = obstacles[idx]; if(!o) return;
  ev.preventDefault();
  var d = Math.sign(ev.deltaY);
  if(ev.shiftKey){
    var f = d > 0 ? 0.94 : 1.064;
    o.sx = clamp(o.sx*f, 0.012, 0.6);
    o.sy = clamp(o.sy*f, 0.012, 0.6);
  } else {
    o.rot -= d * 0.09;
  }
  selObs = idx;
  syncControls(); saveSoon();
}

uiCanvas.style.pointerEvents = 'auto';
uiCanvas.addEventListener('pointerdown', onDown);
window.addEventListener('pointermove', onMove);
window.addEventListener('pointerup', onUp);
window.addEventListener('pointercancel', onUp);
uiCanvas.addEventListener('wheel', onWheel, {passive:false});
uiCanvas.addEventListener('contextmenu', function(ev){ ev.preventDefault(); });

window.addEventListener('keydown', function(ev){
  if(ev.target.tagName === 'INPUT' || ev.target.tagName === 'SELECT') return;
  var k = ev.key;
  if(k === ' '){ ev.preventDefault(); togglePause(); }
  else if(k === '.'){ state.stepOnce = true; state.paused = true; syncPauseBtn(); }
  else if(k === 'r' || k === 'R'){ resetFields(); toast('fields cleared'); }
  else if(k === 'h' || k === 'H'){ document.body.classList.toggle('hideui'); }
  else if(k === 'd' || k === 'D'){ P.debug = (P.debug+1) % DEBUG_VIEWS.length; syncControls(); toast(DEBUG_VIEWS[P.debug]); }
  else if(k === 'Delete' || k === 'Backspace'){
    if(selObs >= 0){ obstacles.splice(selObs,1); selObs=-1; syncControls(); saveSoon(); }
  }
});

function togglePause(){ state.paused = !state.paused; syncPauseBtn(); }
function syncPauseBtn(){
  var b = document.getElementById('btnPaused');
  b.textContent = state.paused ? '▶' : '❚❚';
  b.classList.toggle('on', state.paused);
}
document.getElementById('btnPaused').onclick = togglePause;
document.getElementById('btnStep').onclick = function(){ state.stepOnce = true; state.paused = true; syncPauseBtn(); };
document.getElementById('ptoggle').onclick = function(){ document.body.classList.toggle('collapsed'); };

/* --------------------------------------------------------------------------
   10. OVERLAY GIZMOS (emitter handles) — drawn on the 2D canvas above the sim
   -------------------------------------------------------------------------- */
function drawOverlay(){
  var ctx = uictx, W = state.W, H = state.H;
  if(!state.gpu){ /* CPU path paints the field first, then gizmos on top */ }
  else ctx.clearRect(0,0,W,H);

  for(var i=0;i<emitters.length;i++){
    var e = emitters[i];
    var x = e.x/state.aspect*W, y = (1-e.y)*H;
    var r = Math.max(7, e.radius*H);
    var sel = (i===selEm), hov = (i===hovEm);
    ctx.save();
    ctx.globalAlpha = e.on ? 1 : 0.4;
    ctx.strokeStyle = sel ? 'rgba(255,150,70,0.95)' : 'rgba(210,220,240,0.45)';
    ctx.lineWidth = sel ? 1.6 : 1.1;
    ctx.setLineDash(e.on ? [] : [3,3]);
    ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(x,y,3.2,0,TAU);
    ctx.fillStyle = sel ? 'rgba(255,150,70,0.95)' : 'rgba(210,220,240,0.6)';
    ctx.fill();
    if(e.vel > 0.001){
      var a = e.angle*Math.PI/180;
      var dx = Math.sin(a), dy = -Math.cos(a);
      var L = r + 10 + Math.min(e.vel*16, 34);
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+dx*L, y+dy*L); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x+dx*L, y+dy*L);
      ctx.lineTo(x+dx*(L-7)-dy*4, y+dy*(L-7)+dx*4);
      ctx.lineTo(x+dx*(L-7)+dy*4, y+dy*(L-7)-dx*4);
      ctx.closePath(); ctx.fill();
      if(e.spread > 1){
        ctx.globalAlpha *= 0.30;
        var s = e.spread*Math.PI/180/2;
        ctx.beginPath(); ctx.moveTo(x,y);
        ctx.arc(x, y, L*0.8, Math.atan2(dy,dx)-s, Math.atan2(dy,dx)+s);
        ctx.closePath(); ctx.fill();
      }
    }
    ctx.globalAlpha = e.on ? 0.85 : 0.4;
    ctx.fillStyle = sel ? '#ffb070' : '#c9d2e4';
    ctx.font = '10px ui-monospace,Menlo,monospace';
    ctx.fillText('E'+(i+1), x + r + 4, y - r - 2);
    ctx.restore();
  }

  if(hovEm >= 0 || hovObs >= 0){
    ctx.save();
    ctx.fillStyle = 'rgba(190,205,230,0.55)';
    ctx.font = '11px ui-sans-serif,system-ui';
    ctx.restore();
  }
}

/* CPU path draws obstacle bodies itself (no GL pass available) */
function drawCPUObstacles(ctx){
  for(var i=0;i<obstacles.length;i++){
    var o = obstacles[i];
    ctx.save();
    ctx.translate(o.x/state.aspect*state.W, (1-o.y)*state.H);
    ctx.rotate(-o.rot);
    var sx = o.sx/state.aspect*state.W, sy = o.sy*state.H;
    ctx.beginPath();
    if(o.type===0) ctx.rect(-sx,-sy,sx*2,sy*2);
    else if(o.type===1){ ctx.ellipse(0,0,sx,sy,0,0,TAU); }
    else {
      ctx.moveTo(-0.85*sx, -0.34*sy); ctx.lineTo(-0.85*sx, 0.16*sy); ctx.lineTo(sx, 0);
      ctx.closePath();
    }
    var g = ctx.createLinearGradient(0,-sy,0,sy);
    g.addColorStop(0,'#3d4351'); g.addColorStop(1,'#171a21');
    ctx.fillStyle = g; ctx.fill();
    if(i===selObs || i===hovObs){
      ctx.strokeStyle = i===selObs ? 'rgba(77,178,255,0.95)' : 'rgba(160,180,210,0.6)';
      ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.restore();
  }
}
function drawCPUArrows(ctx){
  if(!P.arrows) return;
  var cols = Math.round(P.arrowDens), rows = Math.max(4, Math.round(cols/state.aspect));
  ctx.save(); ctx.strokeStyle='rgba(115,242,179,0.55)'; ctx.lineWidth=1;
  ctx.beginPath();
  for(var j=0;j<rows;j++) for(var i=0;i<cols;i++){
    var fx = (i+0.5)/cols, fy = (j+0.5)/rows;
    var ci = Math.round(fx*CPU.w)+1, cj = Math.round(fy*CPU.h)+1;
    var id = ci + (CPU.w+2)*cj;
    var x = fx*state.W, y = (1-fy)*state.H;
    var vx = CPU.u[id]/CPU.w*state.W*P.arrowScale*0.016;
    var vy = -CPU.v[id]/CPU.h*state.H*P.arrowScale*0.016;
    ctx.moveTo(x,y); ctx.lineTo(x+vx, y+vy);
  }
  ctx.stroke(); ctx.restore();
}

/* --------------------------------------------------------------------------
   12. MAIN LOOP
   -------------------------------------------------------------------------- */
var resizeTimer = 0, needResize = false;
function scheduleResize(){ needResize = true; }
window.addEventListener('resize', function(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){ needResize = true; }, 120);
});

var lastT = 0, fpsAcc = 0, fpsN = 0, msAcc = 0;

function frame(now){
  requestAnimationFrame(frame);
  var rt = now*0.001;
  var wall = lastT ? Math.min(rt - lastT, 0.1) : 0.016;
  lastT = rt;
  var t0 = performance.now();

  if(needResize){ needResize = false; resize(); syncControls(); }

  /* update obstacle drag velocity (smoothed so one fast frame does not spike the fluid) */
  var invdt = wall > 1e-4 ? 1/wall : 60;
  for(var i=0;i<obstacles.length;i++){
    var o = obstacles[i];
    var vx = (o.x - o.px)*invdt, vy = (o.y - o.py)*invdt;
    o.vx = lerp(o.vx, vx, 0.35);
    o.vy = lerp(o.vy, vy, 0.35);
    if(Math.abs(o.vx) < 1e-4) o.vx = 0;
    if(Math.abs(o.vy) < 1e-4) o.vy = 0;
    o.px = o.x; o.py = o.y;
  }

  var run = !state.paused || state.stepOnce;
  if(run){
    var sub = Math.max(1, Math.round(P.substeps));
    var dt = clamp(P.dt * P.simSpeed / sub, 0.0005, 0.05);
    for(var s=0;s<sub;s++){
      state.time += dt;
      if(state.gpu) gpuStep(dt); else CPU.step(dt);
    }
    state.stepOnce = false;
    if(state.paused) syncPauseBtn();
  }

  if(state.gpu){
    gpuRender();
    drawOverlay();
  } else {
    var ctx = cpu2d || uictx;
    CPU.render(ctx);
    drawCPUArrows(ctx);
    drawCPUObstacles(ctx);
    drawOverlay();
  }

  state.frames++;
  msAcc += performance.now() - t0;
  fpsAcc += wall; fpsN++;
  if(fpsAcc > 0.4){
    state.fps = fpsN/fpsAcc; state.ms = msAcc/fpsN;
    hudEls.fps.textContent = state.fps.toFixed(0);
    hudEls.ms.textContent  = state.ms.toFixed(1)+' ms';
    hudEls.it.textContent  = Math.round(P.iterations);
    hudEls.div.textContent = state.residual.toExponential(1);
    fpsAcc=0; fpsN=0; msAcc=0;
  }
  if(state.nanSticky > 0){
    state.nanSticky--;
    hudEls.nan.style.display = 'inline-block';
  } else if(state.nan){
    state.nan = false; hudEls.nan.style.display = 'none';
  }
}

/* --------------------------------------------------------------------------
   13. BOOT
   -------------------------------------------------------------------------- */
function boot(){
  state.aspect = Math.max(0.4, window.innerWidth / Math.max(1,window.innerHeight));

  var ok = false;
  if(!FORCE_CPU){
    try { ok = initGL(); } catch(e){ console.error('[smoke-lab]', e); ok = false; }
  }
  state.gpu = ok;

  var loaded = loadSaved();
  if(!loaded){ defaultScene(); }
  if(!emitters.length) defaultScene();
  pickAutoRes();

  if(!ok) fallbackToCPU(FORCE_CPU ? 'forced by ?cpu=1' : 'no WebGL2 float targets');
  else {
    var tag = document.getElementById('h_mode');
    tag.textContent = 'WEBGL2 · RG16F'; tag.className = 'tag';
  }

  buildPanel();
  resize();
  syncControls();
  syncPauseBtn();
  drawDial();

  if(window.innerWidth > 1100) document.body.classList.remove('collapsed');

  requestAnimationFrame(frame);

  if(QA){
    window.__smokeQA = {
      state: state, params: P, obstacles: obstacles, emitters: emitters,
      mode: function(){ return state.gpu ? 'gpu' : 'cpu'; },
      set: function(k,v){ P[k]=v; syncControls(); },
      preset: applyPreset,
      addObstacle: function(t,x,y){ var o=newObstacle(t,x,y); obstacles.push(o); return obstacles.length-1; },
      dragObstacle: function(i,x,y){ var o=obstacles[i]; if(o){ o.x=x; o.y=y; } },
      step: function(n){ for(var i=0;i<(n||1);i++){ state.time+=P.dt; if(state.gpu) gpuStep(P.dt); else CPU.step(P.dt); } },
      stats: function(){ return {fps:state.fps, ms:state.ms, residual:state.residual, nan:state.nanSticky>0,
                                 grid: state.gpu ? [state.simW,state.simH] : [CPU.w,CPU.h],
                                 dye:  state.gpu ? [state.dyeW,state.dyeH] : [CPU.w,CPU.h],
                                 obstacles:obstacles.length, emitters:emitters.length, gpu:state.gpu}; },
      /* mean smoke density read straight off the GPU, for headless checks */
      sampleDensity: function(){
        if(!state.gpu) { var s=0,n=0; for(var i=0;i<CPU.d.length;i++){ s+=CPU.d[i]; n++; } return s/n; }
        var w=8,h=8;
        var tmp = makeFBO(w,h, gl.RGBA8, gl.RGBA, gl.UNSIGNED_BYTE, gl.NEAREST);
        var p = PROG.display.use();
        p.f('uMaxVel',1).v2('uTexel', FB.dye.tx, FB.dye.ty).i('uMode',0).i('uColormap',0)
         .f('uExposure',P.exposure).f('uContrast',P.contrast)
         .v3('uTint',1,1,1).v3('uBg',0,0,0)
         .tex('uDye',FB.dye.read.tex).tex('uVelocity',FB.velocity.read.tex)
         .tex('uPressure',FB.pressure.read.tex).tex('uDivergence',FB.divergence.tex)
         .tex('uCurl',FB.curl.tex).tex('uObstacle',FB.obstacle.tex);
        blit(tmp);
        var buf = new Uint8Array(w*h*4);
        gl.bindFramebuffer(gl.FRAMEBUFFER, tmp.fbo);
        gl.readPixels(0,0,w,h,gl.RGBA,gl.UNSIGNED_BYTE,buf);
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        tmp.destroy();
        var sum=0; for(var k=0;k<w*h;k++) sum += buf[k*4];
        return sum/(w*h)/255;
      }
    };
  }
}

boot();
})();
</script>
</body>
</html>
