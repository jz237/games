<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chrono Reef Expedition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{position:fixed;overflow:hidden;overscroll-behavior:none;width:100%;height:100%;background:#000;font-family:'Segoe UI',Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;width:100%;height:100%;}
button{touch-action:manipulation;cursor:pointer;background:none;border:none;color:#fff;font-family:inherit;}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
.overlay.hidden{display:none;}
#titleScreen{background:radial-gradient(ellipse at 50% 80%,#0a2a3a 0%,#020810 100%);}
#titleScreen h1{font-size:clamp(28px,6vw,60px);color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #06c,0 0 80px #039;letter-spacing:4px;margin-bottom:8px;text-align:center;}
#titleScreen h2{font-size:clamp(14px,3vw,24px);color:#4af;margin-bottom:40px;font-weight:300;text-align:center;}
.menu-btn{font-size:clamp(18px,4vw,28px);padding:14px 40px;margin:8px;border:2px solid #0ff;border-radius:12px;color:#0ff;background:rgba(0,255,255,0.08);text-shadow:0 0 10px #0ff;transition:background 0.2s;}
.menu-btn:active{background:rgba(0,255,255,0.25);}
#hud{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:5;padding:8px;}
#hud.hidden{display:none;}
.hud-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.hp-bg{width:clamp(120px,30vw,220px);height:16px;background:rgba(0,0,0,0.6);border:1px solid #0aa;border-radius:8px;overflow:hidden;}
.hp-fill{height:100%;background:linear-gradient(90deg,#0f0,#0c0);border-radius:8px;transition:width 0.3s;}
.hud-text{color:#0ff;font-size:clamp(12px,2.5vw,18px);text-shadow:0 0 6px #06c;}
#minimap{position:absolute;top:8px;right:8px;pointer-events:none;z-index:5;border:1px solid rgba(0,255,255,0.3);border-radius:4px;background:rgba(0,10,20,0.7);}
#minimap.hidden{display:none;}
#muteBtn{position:absolute;bottom:10px;right:10px;font-size:28px;z-index:15;pointer-events:auto;}
#shopScreen{background:rgba(2,8,16,0.95);}
#shopScreen h2{color:#0ff;font-size:clamp(22px,5vw,36px);margin-bottom:20px;text-shadow:0 0 15px #0ff;}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;max-width:500px;width:100%;max-height:55vh;overflow-y:auto;}
.shop-item{background:rgba(0,255,255,0.06);border:1px solid rgba(0,255,255,0.3);border-radius:10px;padding:12px;text-align:center;pointer-events:auto;}
.shop-item.maxed{opacity:0.4;border-color:#555;}
.shop-item h3{color:#4df;font-size:clamp(13px,2.8vw,18px);margin-bottom:4px;}
.shop-item .cost{color:#ff0;font-size:clamp(12px,2.5vw,16px);}
.shop-item .desc{color:#8cf;font-size:clamp(10px,2.2vw,13px);margin-top:4px;}
.shop-item .level{color:#0f0;font-size:clamp(10px,2vw,12px);margin-top:2px;}
.shop-shards{color:#ff0;font-size:clamp(16px,3.5vw,24px);margin-bottom:16px;text-shadow:0 0 8px #aa0;}
.continue-btn{margin-top:20px;font-size:clamp(16px,3.5vw,24px);padding:12px 36px;border:2px solid #0f0;border-radius:12px;color:#0f0;background:rgba(0,255,0,0.08);pointer-events:auto;}
#gameOverScreen{background:rgba(2,8,16,0.95);}
#gameOverScreen h2{color:#f44;font-size:clamp(26px,6vw,44px);text-shadow:0 0 20px #f00;margin-bottom:10px;}
.go-stats{color:#4af;font-size:clamp(14px,3vw,20px);margin-bottom:20px;}
.initials-entry{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.init-col{display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:auto;}
.init-col button{font-size:24px;color:#0ff;padding:6px 12px;border:1px solid #0ff;border-radius:6px;background:rgba(0,255,255,0.1);}
.init-col .letter{font-size:32px;color:#ff0;font-weight:bold;text-shadow:0 0 8px #aa0;}
#scoresList{list-style:none;max-height:35vh;overflow-y:auto;width:clamp(260px,70vw,400px);padding:0;}
#scoresList li{display:flex;justify-content:space-between;padding:6px 12px;font-size:clamp(13px,2.8vw,17px);color:#8cf;border-bottom:1px solid rgba(0,255,255,0.1);}
#scoresList li.gold{color:#ff0;text-shadow:0 0 8px #aa0;}
#bossWarn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f44;font-size:clamp(28px,7vw,56px);font-weight:bold;text-shadow:0 0 30px #f00,0 0 60px #a00;z-index:8;pointer-events:none;opacity:0;transition:opacity 0.3s;}
#sectorTitle{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);color:#0ff;font-size:clamp(22px,5vw,40px);text-shadow:0 0 20px #0ff;z-index:8;pointer-events:none;opacity:0;transition:opacity 0.5s;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<canvas id="minimap" class="hidden" width="140" height="140"></canvas>

<div id="hud" class="hidden">
  <div class="hud-bar">
    <div class="hp-bg"><div class="hp-fill" id="hpFill"></div></div>
    <span class="hud-text" id="hpText">10/10</span>
  </div>
  <div class="hud-bar">
    <span class="hud-text" id="shardCount">⬡ 0</span>
    <span class="hud-text" id="scoreText" style="margin-left:16px">Score: 0</span>
    <span class="hud-text" id="comboText" style="margin-left:16px;color:#f80"></span>
    <span class="hud-text" id="sectorText" style="margin-left:16px"></span>
  </div>
</div>

<div id="bossWarn">⚠ GUARDIAN DETECTED ⚠</div>
<div id="sectorTitle"></div>

<div id="titleScreen" class="overlay">
  <h1>CHRONO REEF</h1>
  <h2>E X P E D I T I O N</h2>
  <button class="menu-btn" id="startBtn">DIVE IN</button>
  <button class="menu-btn" id="scoresBtn">HIGH SCORES</button>
</div>

<div id="shopScreen" class="overlay hidden">
  <h2>⚙ UPGRADE MECH ⚙</h2>
  <div class="shop-shards" id="shopShards">⬡ 0</div>
  <div class="shop-grid" id="shopGrid"></div>
  <button class="continue-btn" id="continueBtn">NEXT SECTOR ▶</button>
</div>

<div id="gameOverScreen" class="overlay hidden">
  <h2>EXPEDITION OVER</h2>
  <div class="go-stats" id="goStats"></div>
  <div class="initials-entry" id="initialsEntry">
    <div class="init-col"><button class="iUp" data-i="0">▲</button><span class="letter" id="i0">A</span><button class="iDn" data-i="0">▼</button></div>
    <div class="init-col"><button class="iUp" data-i="1">▲</button><span class="letter" id="i1">A</span><button class="iDn" data-i="1">▼</button></div>
    <div class="init-col"><button class="iUp" data-i="2">▲</button><span class="letter" id="i2">A</span><button class="iDn" data-i="2">▼</button></div>
    <button class="menu-btn" id="submitScore" style="font-size:18px;padding:10px 20px;">SUBMIT</button>
  </div>
  <h3 style="color:#0ff;margin-bottom:8px;">HIGH SCORES</h3>
  <ul id="scoresList"></ul>
  <button class="menu-btn" id="replayBtn" style="margin-top:16px;">DIVE AGAIN</button>
</div>

<button id="muteBtn">🔊</button>

<script>
'use strict';
// ============================================================
// CHRONO REEF EXPEDITION — Full Game
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap');
const mmCtx = mmCanvas.getContext('2d');

// --- Screens ---
const titleScreen = document.getElementById('titleScreen');
const shopScreen = document.getElementById('shopScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const hudEl = document.getElementById('hud');
const hpFill = document.getElementById('hpFill');
const hpText = document.getElementById('hpText');
const shardCountEl = document.getElementById('shardCount');
const scoreTextEl = document.getElementById('scoreText');
const comboTextEl = document.getElementById('comboText');
const sectorTextEl = document.getElementById('sectorText');
const bossWarnEl = document.getElementById('bossWarn');
const sectorTitleEl = document.getElementById('sectorTitle');
const muteBtn = document.getElementById('muteBtn');

// --- Constants ---
const TILE = 40;
const ROOM_MIN = 8, ROOM_MAX = 14;
const CORRIDOR_W = 3;
const DPR = Math.min(window.devicePixelRatio || 1, 3);
let W, H;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// --- Game State ---
let state = 'title'; // title, playing, shop, gameover, sectorIntro, bossIntro
let player, enemies, bullets, particles, shards, floatTexts, rooms, mapW, mapH, tiles;
let currentSector = 0;
let totalShards = 0;
let score = 0;
let combo = 0;
let comboTimer = 0;
let camera = { x: 0, y: 0 };
let touchPos = null;
let touchDown = false;
let lastTapTime = 0;
let lastTapPos = null;
let screenShake = 0;
let bossActive = false;
let boss = null;
let introTimer = 0;
let ambientBubbles = [];
let bgLayers = [];
let causticTime = 0;
let sectorPalettes = [
  { bg: '#0a2a3a', water: [10,42,58], coral: ['#f06','#f80','#a0f','#ff6','#f48'], floor: '#2a1a08', name: 'Shallow Reef' },
  { bg: '#0a2a1a', water: [10,42,26], coral: ['#0a4','#084','#2a6','#0c4','#4a2'], floor: '#0a1a08', name: 'Kelp Forest' },
  { bg: '#040810', water: [4,8,16], coral: ['#226','#114','#048','#206','#024'], floor: '#0a0a12', name: 'Deep Trench' },
  { bg: '#1a0a2a', water: [26,10,42], coral: ['#f0f','#0ff','#ff0','#f44','#4f4'], floor: '#120818', name: 'Time Rift' }
];
let palette;

// --- Upgrades ---
let upgrades = { pulse: 0, fireRate: 0, shield: 0, dash: 0, sonar: 0, hull: 0 };
const upgradeData = [
  { key: 'pulse', name: 'Pulse Power', max: 3, costs: [3,5,8], desc: '+damage per shot' },
  { key: 'fireRate', name: 'Fire Rate', max: 3, costs: [3,5,7], desc: 'Faster blasts' },
  { key: 'shield', name: 'Shield', max: 3, costs: [4,6,9], desc: 'Absorb hits' },
  { key: 'dash', name: 'Dash Range', max: 2, costs: [4,7], desc: 'Longer dash' },
  { key: 'sonar', name: 'Sonar', max: 2, costs: [3,6], desc: 'Reveal map' },
  { key: 'hull', name: 'Hull', max: 3, costs: [3,5,8], desc: '+max HP' }
];
let shieldHP = 0;

// --- Audio ---
let audioCtx = null;
let muted = false;
function initAudio() {
  if (audioCtx) { try { audioCtx.resume(); } catch(e){} return; }
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
}
function playSound(type) {
  if (muted || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const now = audioCtx.currentTime;
    osc.connect(gain); gain.connect(audioCtx.destination);
    switch(type) {
      case 'shoot':
        osc.type = 'sine'; osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(60, now+0.15);
        gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.15);
        osc.start(now); osc.stop(now+0.15); break;
      case 'hit':
        osc.type = 'square'; osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(40, now+0.1);
        gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.1);
        osc.start(now); osc.stop(now+0.1); break;
      case 'shard':
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(1600, now+0.2);
        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.25);
        osc.start(now); osc.stop(now+0.25); break;
      case 'dash':
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now+0.12);
        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.12);
        osc.start(now); osc.stop(now+0.12); break;
      case 'damage':
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(30, now+0.2);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.2);
        osc.start(now); osc.stop(now+0.2); break;
      case 'bossWarn':
        osc.type = 'sine'; osc.frequency.setValueAtTime(40, now);
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.2, now+0.5);
        gain.gain.exponentialRampToValueAtTime(0.001, now+1.5);
        osc.start(now); osc.stop(now+1.5); break;
      case 'kill':
        osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(200, now+0.1);
        gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.1);
        osc.start(now); osc.stop(now+0.1); break;
    }
  } catch(e){}
}

// Ambient drone
let droneOsc = null, droneGain = null;
function startDrone() {
  if (muted || !audioCtx) return;
  try {
    if (droneOsc) { droneOsc.stop(); droneOsc = null; }
    droneOsc = audioCtx.createOscillator();
    droneGain = audioCtx.createGain();
    droneOsc.type = 'sine';
    droneOsc.frequency.setValueAtTime([55,45,35,50][currentSector] || 55, audioCtx.currentTime);
    droneGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
    droneOsc.connect(droneGain); droneGain.connect(audioCtx.destination);
    droneOsc.start();
  } catch(e){}
}
function stopDrone() {
  if (droneOsc) { try { droneOsc.stop(); } catch(e){} droneOsc = null; }
}

muteBtn.addEventListener('click', (e) => { e.stopPropagation(); muted = !muted; muteBtn.textContent = muted ? '🔇' : '🔊'; if(muted) stopDrone(); else if(state==='playing') startDrone(); });
muteBtn.addEventListener('touchend', (e) => { e.stopPropagation(); e.preventDefault(); });

// --- Procedural Map Generation ---
function generateMap(sector) {
  const numRooms = 6 + Math.min(sector, 2) * 2;
  rooms = [];
  mapW = 80 + sector * 10;
  mapH = 60 + sector * 10;
  tiles = [];
  for (let y = 0; y < mapH; y++) { tiles[y] = []; for (let x = 0; x < mapW; x++) tiles[y][x] = 1; } // 1=wall

  // Place rooms
  for (let i = 0; i < numRooms * 3 && rooms.length < numRooms; i++) {
    const rw = ROOM_MIN + Math.floor(Math.random() * (ROOM_MAX - ROOM_MIN));
    const rh = ROOM_MIN + Math.floor(Math.random() * (ROOM_MAX - ROOM_MIN));
    const rx = 2 + Math.floor(Math.random() * (mapW - rw - 4));
    const ry = 2 + Math.floor(Math.random() * (mapH - rh - 4));
    let overlap = false;
    for (const r of rooms) {
      if (rx < r.x + r.w + 2 && rx + rw + 2 > r.x && ry < r.y + r.h + 2 && ry + rh + 2 > r.y) { overlap = true; break; }
    }
    if (!overlap) rooms.push({ x: rx, y: ry, w: rw, h: rh, explored: false, isBoss: false, enemies: [], shards: [] });
  }

  // Carve rooms
  for (const r of rooms) {
    for (let y = r.y; y < r.y + r.h; y++)
      for (let x = r.x; x < r.x + r.w; x++)
        tiles[y][x] = 0;
  }

  // Connect rooms with corridors (MST-like)
  const connected = [0];
  const unconnected = rooms.map((_,i) => i).slice(1);
  while (unconnected.length > 0) {
    let bestDist = Infinity, bestA = 0, bestB = 0;
    for (const a of connected) {
      for (const b of unconnected) {
        const ra = rooms[a], rb = rooms[b];
        const d = Math.abs(ra.x + ra.w/2 - rb.x - rb.w/2) + Math.abs(ra.y + ra.h/2 - rb.y - rb.h/2);
        if (d < bestDist) { bestDist = d; bestA = a; bestB = b; }
      }
    }
    connected.push(bestB);
    unconnected.splice(unconnected.indexOf(bestB), 1);
    carveCorridor(rooms[bestA], rooms[bestB]);
  }

  // Mark boss room (farthest from room 0)
  let farthest = 0, farthestDist = 0;
  const r0 = rooms[0];
  for (let i = 1; i < rooms.length; i++) {
    const d = Math.abs(rooms[i].x - r0.x) + Math.abs(rooms[i].y - r0.y);
    if (d > farthestDist) { farthestDist = d; farthest = i; }
  }
  rooms[farthest].isBoss = true;

  // Place shards
  const shardCounts = [9, 11, 13, 16];
  let shardsToPlace = shardCounts[sector] || 10;
  shards = [];
  const nonBossRooms = rooms.filter(r => !r.isBoss);
  while (shardsToPlace > 0 && nonBossRooms.length > 0) {
    const r = nonBossRooms[Math.floor(Math.random() * nonBossRooms.length)];
    const sx = r.x + 1 + Math.floor(Math.random() * (r.w - 2));
    const sy = r.y + 1 + Math.floor(Math.random() * (r.h - 2));
    shards.push({ x: sx * TILE + TILE/2, y: sy * TILE + TILE/2, collected: false, glow: Math.random() * Math.PI * 2 });
    shardsToPlace--;
  }

  // Place enemies
  enemies = [];
  for (let ri = 0; ri < rooms.length; ri++) {
    const r = rooms[ri];
    if (ri === 0) continue; // starting room clear
    if (r.isBoss) continue;
    const numEnemies = 2 + sector + Math.floor(Math.random() * 3);
    for (let i = 0; i < numEnemies; i++) {
      const ex = (r.x + 1 + Math.random() * (r.w - 2)) * TILE;
      const ey = (r.y + 1 + Math.random() * (r.h - 2)) * TILE;
      enemies.push(createEnemy(ex, ey, sector));
    }
  }
}

function carveCorridor(a, b) {
  let cx = Math.floor(a.x + a.w / 2);
  let cy = Math.floor(a.y + a.h / 2);
  const tx = Math.floor(b.x + b.w / 2);
  const ty = Math.floor(b.y + b.h / 2);
  const hw = Math.floor(CORRIDOR_W / 2);
  while (cx !== tx) {
    for (let dy = -hw; dy <= hw; dy++) {
      const yy = cy + dy;
      if (yy >= 0 && yy < mapH) tiles[yy][cx] = 0;
    }
    cx += cx < tx ? 1 : -1;
  }
  while (cy !== ty) {
    for (let dx = -hw; dx <= hw; dx++) {
      const xx = cx + dx;
      if (xx >= 0 && xx < mapW) tiles[cy][xx] = 0;
    }
    cy += cy < ty ? 1 : -1;
  }
}

// --- Enemy Creation ---
function createEnemy(x, y, sector) {
  const types0 = ['jellyfish','fishSwarm'];
  const types1 = ['eel','octopus'];
  const types2 = ['anglerfish','crab'];
  const types3 = ['jellyfish','eel','anglerfish','crab'];
  const pool = [types0, types1, types2, types3][sector] || types0;
  const type = pool[Math.floor(Math.random() * pool.length)];
  const mult = sector === 3 ? 1.5 : 1;
  const base = {
    x, y, type, sector, alive: true, flash: 0, angle: Math.random() * Math.PI * 2,
    shootTimer: 2 + Math.random() * 2, moveTimer: 0, phase: 0, vel: { x: 0, y: 0 }
  };
  switch(type) {
    case 'jellyfish': return { ...base, hp: 2*mult, maxHp: 2*mult, speed: 30*mult, color: '#f0f', radius: 14, dmg: 1, score: 50 };
    case 'fishSwarm': return { ...base, hp: 1*mult, maxHp: 1*mult, speed: 80*mult, color: '#4cf', radius: 10, dmg: 1, score: 30 };
    case 'eel': return { ...base, hp: 3*mult, maxHp: 3*mult, speed: 40*mult, color: '#ff0', radius: 16, dmg: 2, score: 80 };
    case 'octopus': return { ...base, hp: 4*mult, maxHp: 4*mult, speed: 25*mult, color: '#f80', radius: 18, dmg: 2, score: 100 };
    case 'anglerfish': return { ...base, hp: 5*mult, maxHp: 5*mult, speed: 50*mult, color: '#0ff', radius: 20, dmg: 3, score: 120 };
    case 'crab': return { ...base, hp: 8*mult, maxHp: 8*mult, speed: 20*mult, color: '#f44', radius: 22, dmg: 2, score: 100 };
    default: return { ...base, hp: 2, maxHp: 2, speed: 30, color: '#f0f', radius: 14, dmg: 1, score: 50 };
  }
}

// --- Guardian / Boss Creation ---
function createBoss(sector, room) {
  const cx = (room.x + room.w / 2) * TILE;
  const cy = (room.y + room.h / 2) * TILE;
  const base = { x: cx, y: cy, alive: true, flash: 0, phase: 0, timer: 0, attackTimer: 2, sector };
  switch(sector) {
    case 0: return { ...base, type: 'mantisShrimp', hp: 40, maxHp: 40, radius: 36, speed: 100, color: '#0f0', dmg: 3, score: 500,
      state: 'idle', chargeDir: {x:0,y:0}, shockwave: 0 };
    case 1: return { ...base, type: 'kraken', hp: 60, maxHp: 60, radius: 44, speed: 30, color: '#80f', dmg: 3, score: 800,
      tentacles: [], tentacleTimer: 0 };
    case 2: return { ...base, type: 'leviathan', hp: 80, maxHp: 80, radius: 50, speed: 60, color: '#08f', dmg: 4, score: 1200,
      segments: [], state: 'circle' };
    case 3: return { ...base, type: 'chronoHydra', hp: 120, maxHp: 120, radius: 40, speed: 40, color: '#f0f', dmg: 4, score: 2000,
      heads: [{angle:0,hp:30,maxHp:30,type:'fire'},{angle:Math.PI*0.66,hp:30,maxHp:30,type:'ice'},{angle:Math.PI*1.33,hp:30,maxHp:30,type:'lightning'}] };
    default: return { ...base, type: 'mantisShrimp', hp: 40, maxHp: 40, radius: 36, speed: 100, color: '#0f0', dmg: 3, score: 500, state: 'idle', chargeDir: {x:0,y:0}, shockwave: 0 };
  }
}

// --- Player ---
function createPlayer(room) {
  const maxHp = 10 + upgrades.hull * 5;
  return {
    x: (room.x + room.w / 2) * TILE,
    y: (room.y + room.h / 2) * TILE,
    angle: 0, speed: 140, radius: 15,
    hp: maxHp, maxHp: maxHp,
    shootTimer: 0, dashTimer: 0, dashCooldown: 0,
    dashing: false, dashDx: 0, dashDy: 0, dashTime: 0,
    invuln: 0, bubbleTimer: 0
  };
}

// --- Init Sector ---
function startSector(sector) {
  currentSector = sector;
  palette = sectorPalettes[sector];
  generateMap(sector);
  player = createPlayer(rooms[0]);
  rooms[0].explored = true;
  bullets = [];
  particles = [];
  floatTexts = [];
  bossActive = false;
  boss = null;
  shieldHP = upgrades.shield * 2;
  ambientBubbles = [];
  for (let i = 0; i < 40; i++) {
    ambientBubbles.push({ x: Math.random() * mapW * TILE, y: Math.random() * mapH * TILE, r: 1 + Math.random() * 3, speed: 10 + Math.random() * 20, wobble: Math.random() * Math.PI * 2 });
  }
  // Sector intro
  state = 'sectorIntro';
  introTimer = 2;
  sectorTitleEl.textContent = `Sector ${sector+1}: ${palette.name}`;
  sectorTitleEl.style.opacity = '1';
  startDrone();
}

// --- Game Start ---
function startGame() {
  score = 0; totalShards = 0; combo = 0; comboTimer = 0;
  currentSector = 0;
  upgrades = { pulse: 0, fireRate: 0, shield: 0, dash: 0, sonar: 0, hull: 0 };

// --- Buttons ---
function addBtn(el, fn) {

}

addBtn(document.getElementById('replayBtn'), () => {

// --- Shop ---
function openShop() {
  state = 'shop';
  stopDrone();
  shopScreen.classList.remove('hidden');
  hudEl.classList.add('hidden');
  mmCanvas.classList.add('hidden');
  renderShop();
}

function renderShop() {
  document.getElementById('shopShards').textContent = '⬡ ' + totalShards;
  const grid = document.getElementById('shopGrid');
  grid.innerHTML = '';
  for (const u of upgradeData) {
    const lvl = upgrades[u.key];
    const maxed = lvl >= u.max;
    const cost = maxed ? '-' : u.costs[lvl];
    const canBuy = !maxed && totalShards >= u.costs[lvl];
    const div = document.createElement('div');
    div.className = 'shop-item' + (maxed ? ' maxed' : '');
    div.innerHTML = `<h3>${u.name}</h3><div class="level">Lv ${lvl}/${u.max}</div><div class="desc">${u.desc}</div><div class="cost">${maxed ? 'MAX' : '⬡ '+cost}</div>`;
    if (canBuy) {
      div.style.borderColor = '#0ff';
      const buyFn = () => {
        totalShards -= u.costs[upgrades[u.key]];
        upgrades[u.key]++;
        playSound('shard');
        renderShop();
      };
      div.addEventListener('click', (e) => { e.stopPropagation(); buyFn(); });
      div.addEventListener('touchend', (e) => { e.stopPropagation(); e.preventDefault(); buyFn(); });
    }
    grid.appendChild(div);
  }
}

// --- Scores ---
function getScores() {
  try { return JSON.parse(localStorage.getItem('chrono_reef_highscores')) || []; } catch(e) { return []; }
}
function saveScore(initials, sc, sect) {
  const scores = getScores();
  scores.push({ initials, score: sc, sector: sect, ts: Date.now() });
  scores.sort((a,b) => b.score - a.score);
  while (scores.length > 10) scores.pop();
  localStorage.setItem('chrono_reef_highscores', JSON.stringify(scores));
  return scores;
}
function showScores(newScore) {
  const scores = getScores();
  const list = document.getElementById('scoresList');
  list.innerHTML = '';
  for (const s of scores) {
    const li = document.createElement('li');
    if (newScore && s.ts === newScore.ts) li.className = 'gold';
    li.innerHTML = `<span>${s.initials} — Sector ${s.sector+1}</span><span>${s.score}</span>`;
    list.appendChild(li);
  }
  if (scores.length === 0) list.innerHTML = '<li style="justify-content:center;color:#556">No scores yet</li>';
}

// --- Input ---
let touchStartPos = null;
let touchMoved = false;

canvas.addEventListener('touchstart', (e) => {
  if (e.target.closest('button') || e.target.closest('.overlay')) return;
  if (state !== 'playing') return;
  e.preventDefault();
  const t = e.touches[0];
  const now = performance.now();
  const px = t.clientX, py = t.clientY;

  touchStartPos = { x: px, y: py };
  touchMoved = false;

  // Double-tap dash
  if (lastTapTime && now - lastTapTime < 300 && lastTapPos) {
    const dd = Math.hypot(px - lastTapPos.x, py - lastTapPos.y);
    if (dd < 60) {
      tryDash();
      lastTapTime = 0;
      lastTapPos = null;
      touchDown = true;
      touchPos = { x: px, y: py };
      return;
    }
  }
  lastTapTime = now;
  lastTapPos = { x: px, y: py };
  touchDown = true;
  touchPos = { x: px, y: py };
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (e.target.closest('button') || e.target.closest('.overlay')) return;
  if (state !== 'playing') return;
  e.preventDefault();
  const px = e.touches[0].clientX, py = e.touches[0].clientY;
  touchPos = { x: px, y: py };
  if (touchStartPos && Math.hypot(px - touchStartPos.x, py - touchStartPos.y) > 20) {
    touchMoved = true;
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (e.target.closest('button') || e.target.closest('.overlay')) return;
  if (state !== 'playing') return;
  e.preventDefault();
  // Only shoot on quick TAP (not after hold-to-move)
  if (touchDown && touchPos && !touchMoved) {
    const dx = touchPos.x - W/2;
    const dy = touchPos.y - H/2;
    if (Math.hypot(dx, dy) > 10) {
      firePulse(Math.atan2(dy, dx));
    }
  }
  touchDown = false;
  touchPos = null;
  touchStartPos = null;
  touchMoved = false;
}, { passive: false });

// Mouse fallback
canvas.addEventListener('mousedown', (e) => {
  if (state !== 'playing') return;
  const now = performance.now();
  if (lastTapTime && now - lastTapTime < 300) { tryDash(); lastTapTime = 0; }
  else { lastTapTime = now; }
  touchDown = true;
  touchPos = { x: e.clientX, y: e.clientY };
  touchStartPos = { x: e.clientX, y: e.clientY };
  touchMoved = false;
});
canvas.addEventListener('mousemove', (e) => {
  if (touchDown) {
    touchPos = { x: e.clientX, y: e.clientY };
    if (touchStartPos && Math.hypot(e.clientX - touchStartPos.x, e.clientY - touchStartPos.y) > 20) touchMoved = true;
  }
});
canvas.addEventListener('mouseup', (e) => {
  if (state !== 'playing') return;
  if (touchPos && !touchMoved) {
    const dx = touchPos.x - W/2;
    const dy = touchPos.y - H/2;
    if (Math.hypot(dx, dy) > 10) firePulse(Math.atan2(dy, dx));
  }
  touchDown = false;
  touchPos = null;
  touchStartPos = null;
  touchMoved = false;
});

// Keyboard
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ') { e.preventDefault(); tryDash(); } });
document.addEventListener('keyup', e => { keys[e.key] = false; });

function tryDash() {
  if (!player || player.dashCooldown > 0 || player.dashing) return;
  const dashRange = 0.15 + upgrades.dash * 0.08;
  player.dashing = true;
  player.dashTime = dashRange;
  player.dashDx = Math.cos(player.angle);
  player.dashDy = Math.sin(player.angle);
  player.invuln = dashRange;
  player.dashCooldown = 0.8;
  playSound('dash');
}

function firePulse(angle) {
  if (!player || player.shootTimer > 0) return;
  const fireInterval = 0.35 - upgrades.fireRate * 0.07;
  player.shootTimer = fireInterval;

  // Auto-aim: slightly adjust toward nearest enemy
  let nearestDist = 200;
  let nearestAngle = angle;
  const allTargets = [...enemies.filter(e => e.alive)];
  if (boss && boss.alive) allTargets.push(boss);
  for (const e of allTargets) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < nearestDist) {
      nearestDist = d;
      nearestAngle = Math.atan2(e.y - player.y, e.x - player.x);
    }
  }
  // Blend toward auto-aim
  let finalAngle = angle;
  if (nearestDist < 200) {
    let diff = nearestAngle - angle;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    if (Math.abs(diff) < 0.6) finalAngle = angle + diff * 0.5;
  }

  const dmg = 1 + upgrades.pulse;
  bullets.push({
    x: player.x + Math.cos(finalAngle) * 20,
    y: player.y + Math.sin(finalAngle) * 20,
    dx: Math.cos(finalAngle) * 280,
    dy: Math.sin(finalAngle) * 280,
    life: 0.6, dmg, friendly: true, color: '#0ff', radius: 5
  });
  playSound('shoot');
}

// --- Collision Helpers ---
function tileAt(px, py) {
  const tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if (tx < 0 || ty < 0 || tx >= mapW || ty >= mapH) return 1;
  return tiles[ty][tx];
}
function circleWall(x, y, r) {
  return tileAt(x-r, y-r) || tileAt(x+r, y-r) || tileAt(x-r, y+r) || tileAt(x+r, y+r) ||
         tileAt(x, y-r) || tileAt(x, y+r) || tileAt(x-r, y) || tileAt(x+r, y);
}
function slideMove(obj, dx, dy, r) {
  const nx = obj.x + dx, ny = obj.y + dy;
  if (!circleWall(nx, ny, r)) { obj.x = nx; obj.y = ny; return; }
  if (!circleWall(nx, obj.y, r)) { obj.x = nx; return; }
  if (!circleWall(obj.x, ny, r)) { obj.y = ny; return; }
}

// --- Particles & Float Text ---
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.5 + Math.random());
    particles.push({ x, y, dx: Math.cos(a)*s, dy: Math.sin(a)*s, life: 0.4 + Math.random()*0.4, color, radius: 2 + Math.random()*3 });
  }
}
function addFloatText(x, y, text, color) {
  floatTexts.push({ x, y, text, color, life: 1 });
}

// --- UPDATE ---
function update(dt) {
  if (state === 'sectorIntro') {
    introTimer -= dt;
    if (introTimer <= 0) {
      state = 'playing';
      sectorTitleEl.style.opacity = '0';
    }
    return;
  }
  if (state === 'bossIntro') {
    introTimer -= dt;
    if (introTimer <= 0) {
      state = 'playing';
      bossWarnEl.style.opacity = '0';
    }
    return;
  }
  if (state !== 'playing') return;

  // --- Player movement ---
  let moveX = 0, moveY = 0;
  if (keys['ArrowLeft'] || keys['a']) moveX -= 1;
  if (keys['ArrowRight'] || keys['d']) moveX += 1;
  if (keys['ArrowUp'] || keys['w']) moveY -= 1;
  if (keys['ArrowDown'] || keys['s']) moveY += 1;

  if (touchDown && touchPos) {
    const dx = touchPos.x - W/2;
    const dy = touchPos.y - H/2;
    const dist = Math.hypot(dx, dy);
    if (dist > 15) {
      moveX = dx / dist;
      moveY = dy / dist;
    }
  }

  const moveMag = Math.hypot(moveX, moveY);
  if (moveMag > 0) {
    moveX /= moveMag; moveY /= moveMag;
    player.angle += angleDiff(player.angle, Math.atan2(moveY, moveX)) * Math.min(1, dt * 10);
  }

  // Dash
  if (player.dashing) {
    player.dashTime -= dt;
    slideMove(player, player.dashDx * 400 * dt, player.dashDy * 400 * dt, player.radius);
    spawnParticles(player.x, player.y, '#0ff', 1, 40);
    if (player.dashTime <= 0) player.dashing = false;
  } else if (moveMag > 0) {
    let spd = player.speed;
    // Kelp slowdown in sector 1 (procedural kelp zones)
    if (currentSector === 1) {
      const kx = Math.floor(player.x / TILE), ky = Math.floor(player.y / TILE);
      if ((kx + ky * 3) % 5 === 0 && tiles[ky] && tiles[ky][kx] === 0) spd *= 0.6;
    }
    // Time rift zones in sector 3
    if (currentSector === 3) {
      const zone = Math.sin(player.x * 0.01 + player.y * 0.01 + causticTime);
      spd *= 0.8 + zone * 0.4;
    }
    slideMove(player, moveX * spd * dt, moveY * spd * dt, player.radius);
  }

  player.shootTimer -= dt;
  player.dashCooldown -= dt;
  player.invuln -= dt;
  player.bubbleTimer -= dt;
  if (player.bubbleTimer <= 0 && moveMag > 0) {
    player.bubbleTimer = 0.1;
    particles.push({ x: player.x - Math.cos(player.angle)*18, y: player.y - Math.sin(player.angle)*18,
      dx: (Math.random()-0.5)*20, dy: -15 - Math.random()*10, life: 0.8, color: 'rgba(150,220,255,0.4)', radius: 2+Math.random()*3 });
  }

  // Keyboard shoot
  if (keys['f'] || keys['j']) {
    firePulse(player.angle);
  }

  // Explore rooms
  for (const r of rooms) {
    if (!r.explored) {
      const cx = (r.x + r.w/2) * TILE, cy = (r.y + r.h/2) * TILE;
      if (Math.hypot(player.x - cx, player.y - cy) < (r.w + r.h) / 2 * TILE * 0.6) {
        r.explored = true;
        if (r.isBoss && !bossActive) {
          // Spawn boss
          bossActive = true;
          boss = createBoss(currentSector, r);
          state = 'bossIntro';
          introTimer = 2;
          bossWarnEl.style.opacity = '1';
          playSound('bossWarn');
          return;
        }
      }
    }
  }

  // --- Bullets ---
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.dx * dt;
    b.y += b.dy * dt;
    b.life -= dt;
    if (b.life <= 0 || tileAt(b.x, b.y)) {
      spawnParticles(b.x, b.y, b.color, 3, 30);
      bullets.splice(i, 1);
      continue;
    }
    if (b.friendly) {
      let bulletHit = false;
      // Hit enemies
      for (const e of enemies) {
        if (!e.alive) continue;
        if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius + b.radius) {
          e.hp -= b.dmg;
          e.flash = 0.1;
          addFloatText(e.x, e.y - 20, '-' + b.dmg, '#ff0');
          playSound('hit');
          if (e.hp <= 0) { killEnemy(e); }
          bullets.splice(i, 1);
          bulletHit = true;
          break;
        }
      }
      // Hit boss
      if (!bulletHit && boss && boss.alive) {
        if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.radius + b.radius) {
          boss.hp -= b.dmg;
          boss.flash = 0.1;
          addFloatText(boss.x, boss.y - 30, '-' + b.dmg, '#ff0');
          playSound('hit');
          screenShake = 0.1;
          if (boss.hp <= 0) { killBoss(); }
          bullets.splice(i, 1);
        }
      }
    } else {
      // Hit player
      if (Math.hypot(b.x - player.x, b.y - player.y) < player.radius + b.radius) {
        hurtPlayer(b.dmg || 1);
        bullets.splice(i, 1);
      }
    }
  }

  // --- Enemies AI ---
  for (const e of enemies) {
    if (!e.alive) continue;
    e.flash -= dt;
    e.phase += dt;
    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.hypot(dx, dy);

    switch(e.type) {
      case 'jellyfish':
        // Float around, drift toward player
        e.x += Math.sin(e.phase * 1.5) * 15 * dt;
        e.y += Math.cos(e.phase * 1.2) * 10 * dt;
        if (dist < 250) slideMove(e, dx/dist * e.speed * dt * 0.5, dy/dist * e.speed * dt * 0.5, e.radius);
        break;
      case 'fishSwarm':
        if (dist < 200) slideMove(e, dx/dist * e.speed * dt, dy/dist * e.speed * dt, e.radius);
        else { e.x += Math.sin(e.phase * 3) * 30 * dt; e.y += Math.cos(e.phase * 2) * 20 * dt; }
        break;
      case 'eel':
        slideMove(e, Math.sin(e.phase * 2) * 20 * dt, Math.cos(e.phase * 1.5) * 15 * dt, e.radius);
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && dist < 300) {
          e.shootTimer = 2;
          const a = Math.atan2(dy, dx);
          bullets.push({ x: e.x, y: e.y, dx: Math.cos(a)*180, dy: Math.sin(a)*180, life: 0.8, color: '#ff0', radius: 4, friendly: false, dmg: e.dmg });
        }
        break;
      case 'octopus':
        if (dist < 150) slideMove(e, dx/dist * e.speed * dt, dy/dist * e.speed * dt, e.radius);
        else { e.x += Math.sin(e.phase) * 10 * dt; }
        break;
      case 'anglerfish':
        if (dist < 250) slideMove(e, dx/dist * e.speed * dt, dy/dist * e.speed * dt, e.radius);
        break;
      case 'crab':
        if (dist < 180) slideMove(e, dx/dist * e.speed * dt, dy/dist * e.speed * dt, e.radius);
        break;
    }

    // Contact damage
    if (dist < player.radius + e.radius) {
      hurtPlayer(e.dmg);
    }
  }

  // --- Boss AI ---
  if (boss && boss.alive) {
    boss.flash -= dt;
    boss.timer += dt;
    boss.attackTimer -= dt;
    const dx = player.x - boss.x, dy = player.y - boss.y;
    const dist = Math.hypot(dx, dy);

    switch(boss.type) {
      case 'mantisShrimp':
        if (boss.state === 'idle') {
          slideMove(boss, dx/dist * boss.speed * 0.3 * dt, dy/dist * boss.speed * 0.3 * dt, boss.radius);
          if (boss.attackTimer <= 0) {
            boss.state = 'charge';
            boss.chargeDir = { x: dx/dist, y: dy/dist };
            boss.attackTimer = 0.4;
          }
        } else if (boss.state === 'charge') {
          slideMove(boss, boss.chargeDir.x * boss.speed * 3 * dt, boss.chargeDir.y * boss.speed * 3 * dt, boss.radius);
          boss.attackTimer -= dt;
          if (boss.attackTimer <= 0) {
            boss.state = 'shockwave';
            boss.shockwave = 0;
            boss.attackTimer = 1.5;
            screenShake = 0.3;
            playSound('damage');
          }
        } else if (boss.state === 'shockwave') {
          boss.shockwave += dt * 200;
          if (boss.shockwave < 150 && Math.abs(dist - boss.shockwave) < 30) hurtPlayer(boss.dmg);
          if (boss.attackTimer <= 0) { boss.state = 'idle'; boss.attackTimer = 1.5; }
        }
        if (dist < player.radius + boss.radius) hurtPlayer(boss.dmg);
        break;

      case 'kraken':
        // Rotate around center
        boss.x += Math.sin(boss.timer * 0.5) * 20 * dt;
        boss.y += Math.cos(boss.timer * 0.7) * 15 * dt;
        boss.tentacleTimer -= dt;
        if (boss.tentacleTimer <= 0) {
          boss.tentacleTimer = 1.5;
          // Spawn tentacle attack
          for (let i = 0; i < 3; i++) {
            const a = Math.atan2(dy, dx) + (i-1) * 0.4;
            bullets.push({ x: boss.x, y: boss.y, dx: Math.cos(a)*150, dy: Math.sin(a)*150, life: 1.2, color: '#80f', radius: 6, friendly: false, dmg: boss.dmg });
          }
        }
        if (dist < player.radius + boss.radius) hurtPlayer(boss.dmg);
        break;

      case 'leviathan':
        const ang = boss.timer * 0.8;
        const cx = boss.x, cy = boss.y;
        boss.x = cx + Math.cos(ang) * 2;
        boss.y = cy + Math.sin(ang) * 2;
        slideMove(boss, dx/dist * boss.speed * 0.5 * dt, dy/dist * boss.speed * 0.5 * dt, boss.radius);
        if (boss.attackTimer <= 0) {
          boss.attackTimer = 1;
          // Sweep attack
          for (let i = 0; i < 5; i++) {
            const a = Math.atan2(dy, dx) + (i-2) * 0.3;
            bullets.push({ x: boss.x, y: boss.y, dx: Math.cos(a)*160, dy: Math.sin(a)*160, life: 1.5, color: '#08f', radius: 5, friendly: false, dmg: boss.dmg });
          }
          screenShake = 0.15;
        }
        if (dist < player.radius + boss.radius) hurtPlayer(boss.dmg);
        break;

      case 'chronoHydra':
        slideMove(boss, dx/dist * boss.speed * 0.3 * dt, dy/dist * boss.speed * 0.3 * dt, boss.radius);
        for (const h of boss.heads) {
          if (h.hp <= 0) continue;
          h.angle += dt * 1.5;
          if (boss.attackTimer <= 0) {
            const ha = h.angle + Math.atan2(dy, dx);
            const col = h.type === 'fire' ? '#f40' : h.type === 'ice' ? '#4df' : '#ff0';
            bullets.push({ x: boss.x + Math.cos(h.angle)*30, y: boss.y + Math.sin(h.angle)*30,
              dx: Math.cos(ha)*140, dy: Math.sin(ha)*140, life: 1.5, color: col, radius: 5, friendly: false, dmg: boss.dmg });
          }
        }
        if (boss.attackTimer <= 0) boss.attackTimer = 1.2;
        if (dist < player.radius + boss.radius) hurtPlayer(boss.dmg);
        break;
    }
  }

  // --- Shards ---
  for (const s of shards) {
    if (s.collected) continue;
    s.glow += dt * 3;
    if (Math.hypot(player.x - s.x, player.y - s.y) < player.radius + 16) {
      s.collected = true;
      totalShards++;
      score += 25;
      playSound('shard');
      spawnParticles(s.x, s.y, '#ff0', 8, 60);
      addFloatText(s.x, s.y - 10, '+⬡', '#ff0');
    }
  }

  // --- Combo ---
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

  // --- Particles ---
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx * dt; p.y += p.dy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // --- Float texts ---
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.y -= 40 * dt;
    f.life -= dt;
    if (f.life <= 0) floatTexts.splice(i, 1);
  }

  // --- Ambient bubbles ---
  for (const b of ambientBubbles) {
    b.y -= b.speed * dt;
    b.wobble += dt * 2;
    b.x += Math.sin(b.wobble) * 5 * dt;
    if (b.y < 0) { b.y = mapH * TILE; b.x = Math.random() * mapW * TILE; }
  }

  causticTime += dt;

  // --- Camera ---
  camera.x = player.x - W / 2;
  camera.y = player.y - H / 2;

  // Screen shake
  if (screenShake > 0) {
    camera.x += (Math.random() - 0.5) * screenShake * 20;
    camera.y += (Math.random() - 0.5) * screenShake * 20;
    screenShake -= dt;
  }

  // --- HUD ---
  hpFill.style.width = (player.hp / player.maxHp * 100) + '%';
  hpFill.style.background = player.hp > player.maxHp * 0.3 ? 'linear-gradient(90deg,#0f0,#0c0)' : 'linear-gradient(90deg,#f44,#a00)';
  hpText.textContent = Math.ceil(player.hp) + '/' + player.maxHp + (shieldHP > 0 ? ' 🛡'+shieldHP : '');
  shardCountEl.textContent = '⬡ ' + totalShards;
  scoreTextEl.textContent = 'Score: ' + score;
  comboTextEl.textContent = combo > 1 ? combo + 'x COMBO' : '';
  sectorTextEl.textContent = 'S' + (currentSector + 1);
}

function killEnemy(e) {
  e.alive = false;
  spawnParticles(e.x, e.y, e.color, 12, 80);
  combo++;
  comboTimer = 2;
  const pts = e.score * Math.max(1, combo);
  score += pts;
  addFloatText(e.x, e.y - 20, '+' + pts, '#0f0');
  playSound('kill');

  // Check if all enemies + boss dead -> open shop or next
  checkSectorComplete();
}

function killBoss() {
  boss.alive = false;
  bossActive = false;
  spawnParticles(boss.x, boss.y, boss.color, 30, 120);
  score += boss.score;
  addFloatText(boss.x, boss.y, '+' + boss.score, '#f0f');
  screenShake = 0.5;
  playSound('kill');

  // Sector complete
  setTimeout(() => {
    if (currentSector < 3) openShop();
    else showVictory();
  }, 1500);
}

function checkSectorComplete() {
  // Boss must be dead for sector completion (handled in killBoss)
}

function hurtPlayer(dmg) {
  if (player.invuln > 0) return;
  if (shieldHP > 0) { shieldHP--; player.invuln = 0.3; spawnParticles(player.x, player.y, '#4df', 5, 50); playSound('hit'); return; }
  player.hp -= dmg;
  player.invuln = 0.5;
  screenShake = 0.2;
  playSound('damage');
  spawnParticles(player.x, player.y, '#f44', 6, 60);
  if (player.hp <= 0) { player.hp = 0; gameOver(); }
}

function angleDiff(a, b) {
  let d = b - a;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

// --- RENDER ---
function render() {
  ctx.save();
  ctx.clearRect(0, 0, W, H);

  if (state === 'title' || state === 'shop' || state === 'gameover') {
    // Animated background for menus
    drawMenuBg();
    ctx.restore();
    return;
  }

  const pal = palette || sectorPalettes[0];

  // BG fill
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);

  // Parallax layer 1 — distant dark
  ctx.save();
  ctx.translate(-camera.x * 0.2, -camera.y * 0.2);
  for (let i = 0; i < 20; i++) {
    const bx = ((i * 317) % (mapW * TILE)) ;
    const by = ((i * 523) % (mapH * TILE)) ;
    ctx.fillStyle = `rgba(${pal.water[0]+10},${pal.water[1]+10},${pal.water[2]+20},0.3)`;
    ctx.beginPath();
    ctx.ellipse(bx, by, 60 + (i%3)*30, 30 + (i%2)*20, i*0.5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Parallax layer 2 — mid formations
  ctx.save();
  ctx.translate(-camera.x * 0.5, -camera.y * 0.5);
  for (let i = 0; i < 15; i++) {
    const bx = ((i * 457 + 100) % (mapW * TILE));
    const by = ((i * 283 + 200) % (mapH * TILE));
    ctx.fillStyle = pal.coral[i % pal.coral.length] + '33';
    ctx.beginPath();
    ctx.ellipse(bx, by, 40 + (i%4)*20, 25 + (i%3)*15, i*0.8, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  // Water caustics
  drawCaustics();

  // Tiles
  const startTX = Math.max(0, Math.floor(camera.x / TILE));
  const startTY = Math.max(0, Math.floor(camera.y / TILE));
  const endTX = Math.min(mapW, Math.ceil((camera.x + W) / TILE) + 1);
  const endTY = Math.min(mapH, Math.ceil((camera.y + H) / TILE) + 1);

  for (let ty = startTY; ty < endTY; ty++) {
    for (let tx = startTX; tx < endTX; tx++) {
      const px = tx * TILE, py = ty * TILE;
      if (tiles[ty][tx] === 1) {
        // Wall
        const ci = (tx * 7 + ty * 13) % pal.coral.length;
        ctx.fillStyle = pal.coral[ci] + '88';
        ctx.fillRect(px, py, TILE, TILE);
        // Wall detail
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(px, py, TILE, 2);
        ctx.fillRect(px, py, 2, TILE);
      } else {
        // Floor
        ctx.fillStyle = pal.floor;
        ctx.fillRect(px, py, TILE, TILE);
        // Subtle floor texture
        if ((tx + ty) % 3 === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.02)';
          ctx.fillRect(px + 4, py + 4, TILE - 8, TILE - 8);
        }
      }
    }
  }

  // Seagrass (sector 0) and Kelp (sector 1)
  if (currentSector === 0 || currentSector === 1) {
    for (let ty = startTY; ty < endTY; ty++) {
      for (let tx = startTX; tx < endTX; tx++) {
        if (tiles[ty][tx] !== 0) continue;
        const seed = (tx * 7 + ty * 13) % 11;
        if (seed > 3) continue;
        const px = tx * TILE + TILE/2, py = ty * TILE + TILE;
        const sway = Math.sin(causticTime * 1.5 + tx * 0.7 + ty * 0.3) * 6;
        if (currentSector === 0) {
          // Seagrass — short green strands
          ctx.strokeStyle = `rgba(40,${160+seed*10},60,0.5)`;
          ctx.lineWidth = 2;
          for (let s = -1; s <= 1; s++) {
            ctx.beginPath();
            ctx.moveTo(px + s * 5, py);
            ctx.quadraticCurveTo(px + s * 5 + sway, py - 15, px + s * 5 + sway * 1.5, py - 25 - seed * 2);
            ctx.stroke();
          }
        } else {
          // Kelp — tall green strands
          ctx.strokeStyle = `rgba(20,${120+seed*15},40,0.6)`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.bezierCurveTo(px + sway, py - 20, px + sway * 1.5, py - 40, px + sway * 2, py - TILE - seed * 5);
          ctx.stroke();
          // Leaf blobs
          ctx.fillStyle = `rgba(30,${140+seed*10},50,0.4)`;
          ctx.beginPath();
          ctx.ellipse(px + sway * 1.2, py - 25, 6, 3, sway * 0.1, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  // Time rift zones (sector 3)
  if (currentSector === 3) {
    for (let ty = startTY; ty < endTY; ty++) {
      for (let tx = startTX; tx < endTX; tx++) {
        if (tiles[ty][tx] === 0) {
          const zone = Math.sin(tx * 0.3 + ty * 0.3 + causticTime * 2);
          if (zone > 0.5) {
            ctx.fillStyle = 'rgba(255,0,255,0.06)';
            ctx.fillRect(tx*TILE, ty*TILE, TILE, TILE);
          } else if (zone < -0.5) {
            ctx.fillStyle = 'rgba(0,255,255,0.06)';
            ctx.fillRect(tx*TILE, ty*TILE, TILE, TILE);
          }
        }
      }
    }
  }

  // Ambient bubbles
  for (const b of ambientBubbles) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(180,220,255,0.2)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Shards
  for (const s of shards) {
    if (s.collected) continue;
    const glow = 0.5 + Math.sin(s.glow) * 0.3;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    // Hexagon
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3 + causticTime;
      const r = 10;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](s.x + Math.cos(a) * r, s.y + Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fillStyle = `rgba(255,255,0,${glow})`;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    drawEnemy(e);
  }

  // Boss
  if (boss && boss.alive) drawBoss(boss);

  // Boss shockwave
  if (boss && boss.type === 'mantisShrimp' && boss.state === 'shockwave') {
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, boss.shockwave, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,255,0,${Math.max(0, 0.5 - boss.shockwave/300)})`;
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  // Bullets
  ctx.globalCompositeOperation = 'lighter';
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalCompositeOperation = 'source-over';

  // Particles
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    const alpha = Math.min(1, p.life * 2);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  // Player
  drawPlayer();

  // Float texts
  for (const f of floatTexts) {
    ctx.globalAlpha = f.life;
    ctx.font = 'bold 16px sans-serif';
    ctx.fillStyle = f.color;
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // Deep Trench darkness overlay (sector 2) — player light is main visibility
  if (currentSector >= 2) {
    const darkness = currentSector === 2 ? 0.75 : 0.3;
    const lightR = currentSector === 2 ? 120 : 200;
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${darkness})`;
    ctx.fillRect(0, 0, W, H);
    // Cut out player light
    ctx.globalCompositeOperation = 'destination-out';
    const lg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, lightR);
    lg.addColorStop(0, `rgba(0,0,0,${darkness})`);
    lg.addColorStop(0.7, `rgba(0,0,0,${darkness * 0.5})`);
    lg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lg;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // Boss HP bar
  if (boss && boss.alive) {
    const bw = Math.min(W * 0.6, 300);
    const bx = W/2 - bw/2;
    const by = H - 40;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(bx - 2, by - 2, bw + 4, 18);
    ctx.fillStyle = '#f44';
    ctx.fillRect(bx, by, bw * boss.hp / boss.maxHp, 14);
    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(boss.type.toUpperCase(), W/2, by + 12);
  }

  // Minimap
  drawMinimap();

  ctx.restore();
}

function drawCaustics() {
  // Subtle animated caustic pattern
  const viewL = camera.x, viewT = camera.y;
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.03;
  const step = 60;
  const ox = viewL - (viewL % step);
  const oy = viewT - (viewT % step);
  for (let y = oy; y < viewT + H + step; y += step) {
    for (let x = ox; x < viewL + W + step; x += step) {
      const s = Math.sin(x * 0.02 + causticTime * 1.5) * Math.cos(y * 0.02 + causticTime * 1.2);
      if (s > 0.3) {
        ctx.beginPath();
        const r = 15 + s * 20;
        ctx.ellipse(x + Math.sin(causticTime + x*0.01)*10, y + Math.cos(causticTime + y*0.01)*10, r, r*0.6, causticTime*0.3, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
    }
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

function drawPlayer() {
  if (!player) return;
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);

  // Bioluminescent glow
  ctx.globalCompositeOperation = 'lighter';
  const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 60 + (currentSector === 2 ? 20 : 0));
  grad.addColorStop(0, 'rgba(0,255,200,0.15)');
  grad.addColorStop(1, 'rgba(0,255,200,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(-70, -70, 140, 140);
  ctx.globalCompositeOperation = 'source-over';

  // Flash on invuln
  if (player.invuln > 0 && Math.floor(player.invuln * 20) % 2) { ctx.globalAlpha = 0.4; }

  // Shield ring
  if (shieldHP > 0) {
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(100,200,255,${0.3 + Math.sin(causticTime*4)*0.2})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Mech body
  ctx.fillStyle = '#556';
  ctx.beginPath();
  ctx.moveTo(18, 0);
  ctx.lineTo(-12, -10);
  ctx.lineTo(-15, -8);
  ctx.lineTo(-15, 8);
  ctx.lineTo(-12, 10);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#889';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Panel lines
  ctx.strokeStyle = '#334';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(5, -6); ctx.lineTo(-8, -8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5, 6); ctx.lineTo(-8, 8); ctx.stroke();

  // Cockpit glow
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = '#0fa';
  ctx.beginPath();
  ctx.ellipse(6, 0, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  // Thruster
  ctx.fillStyle = '#08f';
  ctx.globalAlpha = 0.6 + Math.sin(causticTime * 10) * 0.3;
  ctx.beginPath();
  ctx.moveTo(-15, -5);
  ctx.lineTo(-20 - Math.random()*4, 0);
  ctx.lineTo(-15, 5);
  ctx.closePath();
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  // Bioluminescent glow
  ctx.globalCompositeOperation = 'lighter';
  const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, e.radius * 2);
  grad.addColorStop(0, e.color + '40');
  grad.addColorStop(1, e.color + '00');
  ctx.fillStyle = grad;
  ctx.fillRect(-e.radius*2, -e.radius*2, e.radius*4, e.radius*4);
  ctx.globalCompositeOperation = 'source-over';

  if (e.flash > 0) ctx.fillStyle = '#fff';
  else ctx.fillStyle = e.color;

  switch(e.type) {
    case 'jellyfish':
      // Dome
      ctx.beginPath();
      ctx.arc(0, -4, e.radius * 0.8, Math.PI, 0);
      ctx.fill();
      // Tentacles
      ctx.strokeStyle = e.flash > 0 ? '#fff' : e.color;
      ctx.lineWidth = 1.5;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(i * 4, 2);
        ctx.quadraticCurveTo(i * 4 + Math.sin(e.phase * 3 + i) * 5, 12, i * 4, e.radius + 4);
        ctx.stroke();
      }
      break;
    case 'fishSwarm':
      ctx.beginPath();
      ctx.ellipse(0, 0, e.radius, e.radius * 0.5, Math.atan2(player.y - e.y, player.x - e.x), 0, Math.PI * 2);
      ctx.fill();
      // Eye
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(4, -2, 2, 0, Math.PI*2); ctx.fill();
      break;
    case 'eel':
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const seg = i / 8;
        const sx = -e.radius + seg * e.radius * 2;
        const sy = Math.sin(e.phase * 3 + i * 0.8) * 6;
        if (i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.lineWidth = 6;
      ctx.strokeStyle = e.flash > 0 ? '#fff' : e.color;
      ctx.stroke();
      // Sparks
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = '#ff0';
      for (let i = 0; i < 3; i++) {
        const a = Math.random() * Math.PI * 2;
        ctx.beginPath(); ctx.arc(Math.cos(a) * e.radius * 0.8, Math.sin(a) * e.radius * 0.8, 2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';
      break;
    case 'octopus':
      // Body
      ctx.beginPath();
      ctx.arc(0, 0, e.radius * 0.6, 0, Math.PI * 2);
      ctx.fill();
      // Arms
      for (let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3 + e.phase * 0.5;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * e.radius * 0.5, Math.sin(a) * e.radius * 0.5);
        ctx.quadraticCurveTo(
          Math.cos(a + 0.3) * e.radius, Math.sin(a + 0.3) * e.radius,
          Math.cos(a) * e.radius * 1.2, Math.sin(a) * e.radius * 1.2
        );
        ctx.strokeStyle = e.flash > 0 ? '#fff' : e.color;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      break;
    case 'anglerfish':
      // Body
      ctx.beginPath();
      ctx.ellipse(0, 0, e.radius, e.radius * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
      // Jaw
      ctx.beginPath();
      ctx.moveTo(e.radius * 0.5, 4);
      ctx.lineTo(e.radius + 4, 2 + Math.sin(e.phase * 2) * 3);
      ctx.lineTo(e.radius * 0.5, 0);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Lure
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.arc(Math.sin(e.phase * 1.5) * 3, -e.radius - 5, 4 + Math.sin(e.phase * 4), 0, Math.PI * 2);
      ctx.fillStyle = '#0ff';
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      break;
    case 'crab':
      // Shell
      ctx.beginPath();
      ctx.ellipse(0, 0, e.radius, e.radius * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      // Claws
      ctx.strokeStyle = e.flash > 0 ? '#fff' : e.color;
      ctx.lineWidth = 3;
      for (const side of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(e.radius * 0.6 * side, -e.radius * 0.4);
        ctx.lineTo(e.radius * 1.2 * side, -e.radius * 0.6);
        ctx.lineTo(e.radius * 1.1 * side, -e.radius * 0.2);
        ctx.stroke();
      }
      // Legs
      for (let i = 0; i < 3; i++) {
        for (const side of [-1, 1]) {
          ctx.beginPath();
          const lx = (-3 + i * 5) * side;
          ctx.moveTo(lx, e.radius * 0.4 * side);
          ctx.lineTo(lx + 4 * side, e.radius * 0.8 * side);
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }
      break;
  }

  // HP bar
  if (e.hp < e.maxHp) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-e.radius, -e.radius - 8, e.radius * 2, 4);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(-e.radius, -e.radius - 8, e.radius * 2 * (e.hp / e.maxHp), 4);
  }

  ctx.restore();
}

function drawBoss(b) {
  ctx.save();
  ctx.translate(b.x, b.y);

  // Big glow
  ctx.globalCompositeOperation = 'lighter';
  const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, b.radius * 3);
  grad.addColorStop(0, b.color + '30');
  grad.addColorStop(1, b.color + '00');
  ctx.fillStyle = grad;
  ctx.fillRect(-b.radius*3, -b.radius*3, b.radius*6, b.radius*6);
  ctx.globalCompositeOperation = 'source-over';

  const fill = b.flash > 0 ? '#fff' : b.color;

  switch(b.type) {
    case 'mantisShrimp':
      // Body
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.ellipse(0, 0, b.radius, b.radius * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      for (const side of [-1, 1]) {
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.arc(b.radius * 0.4, side * b.radius * 0.5, 6, 0, Math.PI * 2);
        ctx.fill();
      }
      // Club arms
      ctx.strokeStyle = fill;
      ctx.lineWidth = 5;
      for (const side of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(b.radius * 0.8, side * b.radius * 0.2);
        ctx.lineTo(b.radius * 1.3 + Math.sin(b.timer * 4) * 5, side * b.radius * 0.6);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(b.radius * 1.3 + Math.sin(b.timer * 4) * 5, side * b.radius * 0.6, 7, 0, Math.PI * 2);
        ctx.fillStyle = '#f80';
        ctx.fill();
      }
      break;

    case 'kraken':
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.arc(0, 0, b.radius * 0.7, 0, Math.PI * 2);
      ctx.fill();
      // Tentacles
      for (let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4 + b.timer * 0.3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * b.radius * 0.6, Math.sin(a) * b.radius * 0.6);
        ctx.quadraticCurveTo(
          Math.cos(a + 0.5) * b.radius * 1.5, Math.sin(a + 0.5) * b.radius * 1.5,
          Math.cos(a + Math.sin(b.timer + i) * 0.3) * b.radius * 2, Math.sin(a + Math.sin(b.timer + i) * 0.3) * b.radius * 2
        );
        ctx.strokeStyle = fill;
        ctx.lineWidth = 4;
        ctx.stroke();
      }
      // Eye
      ctx.fillStyle = '#f00';
      ctx.beginPath(); ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(0, 0, 5, 8, 0, 0, Math.PI * 2); ctx.fill();
      break;

    case 'leviathan':
      // Serpent body
      ctx.fillStyle = fill;
      for (let i = 0; i < 8; i++) {
        const seg = i / 8;
        const sx = Math.cos(b.timer * 0.8 + seg * Math.PI * 2) * (b.radius * 1.5);
        const sy = Math.sin(b.timer * 0.8 + seg * Math.PI * 2) * (b.radius * 1.5);
        ctx.beginPath();
        ctx.arc(sx, sy, b.radius * 0.4 * (1 - seg * 0.5), 0, Math.PI * 2);
        ctx.fill();
      }
      // Head
      ctx.fillStyle = b.flash > 0 ? '#fff' : '#0cf';
      ctx.beginPath();
      const hx = Math.cos(b.timer * 0.8) * b.radius * 1.5;
      const hy = Math.sin(b.timer * 0.8) * b.radius * 1.5;
      ctx.arc(hx, hy, b.radius * 0.5, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#f00';
      ctx.beginPath(); ctx.arc(hx + 8, hy - 6, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(hx + 8, hy + 6, 4, 0, Math.PI * 2); ctx.fill();
      break;

    case 'chronoHydra':
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.arc(0, 0, b.radius * 0.7, 0, Math.PI * 2);
      ctx.fill();
      // Heads
      const headColors = { fire: '#f40', ice: '#4df', lightning: '#ff0' };
      for (const h of b.heads) {
        if (h.hp <= 0) continue;
        const nx = Math.cos(h.angle) * b.radius * 1.8;
        const ny = Math.sin(h.angle) * b.radius * 1.8;
        // Neck
        ctx.beginPath();
        ctx.moveTo(Math.cos(h.angle) * b.radius * 0.6, Math.sin(h.angle) * b.radius * 0.6);
        ctx.lineTo(nx, ny);
        ctx.strokeStyle = headColors[h.type];
        ctx.lineWidth = 5;
        ctx.stroke();
        // Head
        ctx.fillStyle = headColors[h.type];
        ctx.beginPath();
        ctx.arc(nx, ny, 14, 0, Math.PI * 2);
        ctx.fill();
        // Glow
        ctx.globalCompositeOperation = 'lighter';
        ctx.beginPath();
        ctx.arc(nx, ny, 20, 0, Math.PI * 2);
        ctx.fillStyle = headColors[h.type] + '40';
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
      }
      break;
  }

  ctx.restore();
}

function drawMinimap() {
  if (state !== 'playing' && state !== 'sectorIntro' && state !== 'bossIntro') return;
  const mmW = 140, mmH = 140;
  mmCtx.clearRect(0, 0, mmW, mmH);
  mmCtx.fillStyle = 'rgba(0,10,20,0.8)';
  mmCtx.fillRect(0, 0, mmW, mmH);

  const scale = Math.min(mmW / (mapW * TILE), mmH / (mapH * TILE));

  // Rooms
  for (const r of rooms) {
    if (!r.explored && upgrades.sonar < 1) continue;
    const rx = r.x * TILE * scale, ry = r.y * TILE * scale;
    const rw = r.w * TILE * scale, rh = r.h * TILE * scale;
    mmCtx.fillStyle = r.explored ? (r.isBoss ? 'rgba(255,0,0,0.3)' : 'rgba(0,255,255,0.15)') : 'rgba(0,255,255,0.05)';
    mmCtx.fillRect(rx, ry, rw, rh);
  }

  // Shards on sonar
  if (upgrades.sonar >= 2) {
    for (const s of shards) {
      if (s.collected) continue;
      mmCtx.fillStyle = '#ff0';
      mmCtx.fillRect(s.x * scale - 1, s.y * scale - 1, 2, 2);
    }
  }

  // Enemies on sonar
  if (upgrades.sonar >= 1) {
    for (const e of enemies) {
      if (!e.alive) continue;
      mmCtx.fillStyle = '#f44';
      mmCtx.fillRect(e.x * scale - 1, e.y * scale - 1, 2, 2);
    }
    if (boss && boss.alive) {
      mmCtx.fillStyle = '#f0f';
      mmCtx.fillRect(boss.x * scale - 2, boss.y * scale - 2, 4, 4);
    }
  }

  // Player
  mmCtx.fillStyle = '#0f0';
  mmCtx.fillRect(player.x * scale - 2, player.y * scale - 2, 4, 4);
}

function drawMenuBg() {
  // Animated underwater background for menus
  ctx.fillStyle = '#020810';
  ctx.fillRect(0, 0, W, H);
  const t = performance.now() / 1000;
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 30; i++) {
    const x = ((i * 73 + t * 10) % (W + 100)) - 50;
    const y = ((i * 97 + t * (5 + i % 3)) % (H + 100)) - 50;
    const r = 2 + (i % 4);
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${100+i*5},${200+i*2},255,${0.1 + Math.sin(t + i) * 0.05})`;
    ctx.fill();
  }
  // Caustic light on title
  for (let i = 0; i < 8; i++) {
    const x = W/2 + Math.sin(t * 0.7 + i * 1.2) * W * 0.3;
    const y = H * 0.3 + Math.cos(t * 0.5 + i * 0.9) * H * 0.2;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 80);
    grad.addColorStop(0, 'rgba(0,255,255,0.03)');
    grad.addColorStop(1, 'rgba(0,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(x - 80, y - 80, 160, 160);
  }
  ctx.globalCompositeOperation = 'source-over';
}

// --- Game Loop ---
let lastTime = 0;
function loop(timestamp) {
  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  if (dt > 1/30) dt = 1/30;

  update(dt);
  render();
  requestAnimationFrame(loop);
}

requestAnimationFrame((ts) => { lastTime = ts; loop(ts); });
</script>
