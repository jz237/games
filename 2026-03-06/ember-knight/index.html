<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ember Knight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{position:fixed;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#000;font-family:'Segoe UI',Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100%}
button{touch-action:manipulation;cursor:pointer;border:none;outline:none;font-family:inherit}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay.hidden{display:none}
#titleScreen{background:radial-gradient(ellipse at center,#1a0800 0%,#000 100%)}
#titleScreen h1{font-size:clamp(2rem,8vw,4rem);color:#ff6600;text-shadow:0 0 20px #ff4400,0 0 40px #ff2200,0 0 60px #cc0000;letter-spacing:0.1em;margin-bottom:0.5em;text-align:center}
#titleScreen h2{font-size:clamp(0.8rem,3vw,1.2rem);color:#cc8844;margin-bottom:2em;letter-spacing:0.3em}
.menu-btn{background:linear-gradient(180deg,#ff6600,#cc3300);color:#fff;font-size:clamp(1rem,4vw,1.5rem);padding:0.7em 2em;margin:0.4em;border-radius:8px;font-weight:bold;text-shadow:0 1px 2px rgba(0,0,0,0.5);min-width:200px;box-shadow:0 4px 15px rgba(255,100,0,0.4)}
.menu-btn:active{transform:scale(0.95);background:linear-gradient(180deg,#cc5500,#aa2200)}
#hsScreen{background:rgba(0,0,0,0.95)}
#hsScreen h2{color:#ff6600;font-size:clamp(1.2rem,5vw,2rem);margin-bottom:0.5em;text-shadow:0 0 10px #ff4400}
.hs-list{color:#dda050;font-size:clamp(0.8rem,3vw,1.1rem);text-align:left;font-family:monospace;line-height:1.8;max-height:60vh;overflow-y:auto;padding:0 1em}
.hs-new{color:#ffdd00;text-shadow:0 0 8px #ffaa00}
#controlsOverlay{background:rgba(0,0,0,0.85)}
#controlsOverlay p{color:#ffaa44;font-size:clamp(1rem,4vw,1.5rem);margin:0.5em;text-align:center}
#gameOverScreen{background:rgba(0,0,0,0.9)}
#gameOverScreen h2{color:#ff3300;font-size:clamp(1.5rem,6vw,2.5rem);text-shadow:0 0 20px #ff0000;margin-bottom:0.3em}
#gameOverScreen .score-info{color:#ffaa44;font-size:clamp(0.9rem,3.5vw,1.3rem);margin:0.3em}
#initialsEntry{display:flex;align-items:center;justify-content:center;gap:0.5em;margin:1em 0}
.init-col{display:flex;flex-direction:column;align-items:center}
.init-char{color:#ffdd00;font-size:clamp(2rem,8vw,3rem);font-family:monospace;font-weight:bold;text-shadow:0 0 10px #ffaa00;width:1.5em;text-align:center}
.init-btn{background:#443300;color:#ffaa00;font-size:clamp(1.2rem,5vw,2rem);width:2em;height:2em;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0.2em}
.init-btn:active{background:#665500}
#victoryScreen{background:rgba(0,0,0,0.9)}
#victoryScreen h2{color:#ffdd00;font-size:clamp(1.5rem,6vw,2.5rem);text-shadow:0 0 30px #ffaa00,0 0 60px #ff6600}
#muteBtn{position:absolute;top:8px;right:8px;z-index:20;background:rgba(0,0,0,0.5);color:#ffaa44;font-size:clamp(1.2rem,4vw,1.8rem);width:2.2em;height:2.2em;border-radius:50%;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="muteBtn">🔊</button>

<div id="titleScreen" class="overlay">
<h1>🔥 EMBER KNIGHT 🔥</h1>
<h2>A DUNGEON AWAITS</h2>
<button class="menu-btn" id="startBtn">⚔️ START</button>
<button class="menu-btn" id="hsBtn">🏆 HIGH SCORES</button>
</div>

<div id="hsScreen" class="overlay hidden">
<h2>🏆 HIGH SCORES 🏆</h2>
<div class="hs-list" id="hsList"></div>
<button class="menu-btn" id="hsBackBtn" style="margin-top:1em">BACK</button>
</div>

<div id="controlsOverlay" class="overlay hidden">
<p>👆 Tap: AIM &amp; ATTACK</p>
<p>👆 Hold: MOVE toward finger</p>
<p style="margin-top:1em;color:#ff6600;font-weight:bold">TAP TO BEGIN</p>
</div>

<div id="gameOverScreen" class="overlay hidden">
<h2>💀 GAME OVER 💀</h2>
<div class="score-info" id="goScore"></div>
<div class="score-info" id="goFloor"></div>
<div id="initialsEntry" class="hidden">
<div class="init-col"><button class="init-btn" data-i="0" data-d="1">▲</button><div class="init-char" id="ic0">A</div><button class="init-btn" data-i="0" data-d="-1">▼</button></div>
<div class="init-col"><button class="init-btn" data-i="1" data-d="1">▲</button><div class="init-char" id="ic1">A</div><button class="init-btn" data-i="1" data-d="-1">▼</button></div>
<div class="init-col"><button class="init-btn" data-i="2" data-d="1">▲</button><div class="init-char" id="ic2">A</div><button class="init-btn" data-i="2" data-d="-1">▼</button></div>
</div>
<button class="menu-btn" id="goSubmitBtn" style="display:none">SUBMIT</button>
<button class="menu-btn" id="goMenuBtn" style="display:none">MENU</button>
</div>

<div id="victoryScreen" class="overlay hidden">
<h2>🔥 VICTORY! 🔥</h2>
<div class="score-info" id="vicScore"></div>
<div id="vicInitials" class="hidden" style="display:flex;align-items:center;justify-content:center;gap:0.5em;margin:1em 0">
<div class="init-col"><button class="init-btn vic-ib" data-i="0" data-d="1">▲</button><div class="init-char" id="vc0">A</div><button class="init-btn vic-ib" data-i="0" data-d="-1">▼</button></div>
<div class="init-col"><button class="init-btn vic-ib" data-i="1" data-d="1">▲</button><div class="init-char" id="vc1">A</div><button class="init-btn vic-ib" data-i="1" data-d="-1">▼</button></div>
<div class="init-col"><button class="init-btn vic-ib" data-i="2" data-d="1">▲</button><div class="init-char" id="vc2">A</div><button class="init-btn vic-ib" data-i="2" data-d="-1">▼</button></div>
</div>
<button class="menu-btn" id="vicSubmitBtn" style="display:none">SUBMIT</button>
<button class="menu-btn" id="vicMenuBtn" style="display:none">MENU</button>
</div>

<script>
// ===== CONSTANTS =====
const TS=24,MW=40,MH=40,MAXFLOOR=10;
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ===== HIGH SCORES =====
const HS_KEY='ember_knight_highscores';
function getHighScores(){try{return JSON.parse(localStorage.getItem(HS_KEY))||[]}catch(e){return[]}}
function saveHighScores(hs){localStorage.setItem(HS_KEY,JSON.stringify(hs))}
function isHighScore(s){if(s<=0)return false;const hs=getHighScores();if(hs.length<10)return true;hs.sort((a,b)=>b.score-a.score);return s>hs[hs.length-1].score}

// ===== AUDIO =====
let actx=null,muted=false;
function initAudio(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}if(actx&&actx.state==='suspended')actx.resume()}
function playSound(type){
  if(muted||!actx)return;
  try{
    const t=actx.currentTime,g=actx.createGain(),o=actx.createOscillator();
    g.connect(actx.destination);o.connect(g);
    switch(type){
      case'slash':o.type='sawtooth';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(200,t+0.1);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.1);o.start(t);o.stop(t+0.1);break;
      case'bolt':{const o2=actx.createOscillator(),g2=actx.createGain();g2.connect(actx.destination);o2.connect(g2);o2.type='sine';o2.frequency.setValueAtTime(1200,t);o2.frequency.exponentialRampToValueAtTime(400,t+0.15);g2.gain.setValueAtTime(0.15,t);g2.gain.exponentialRampToValueAtTime(0.01,t+0.15);o2.start(t);o2.stop(t+0.15);o.type='sawtooth';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(200,t+0.1);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.1);o.start(t);o.stop(t+0.1);break}
      case'hit':o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+0.15);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.15);o.start(t);o.stop(t+0.15);break;
      case'death':o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(50,t+0.4);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.4);o.start(t);o.stop(t+0.4);break;
      case'pickup':o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(1200,t+0.15);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.15);o.start(t);o.stop(t+0.15);break;
      case'stairs':o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.linearRampToValueAtTime(800,t+0.3);g.gain.setValueAtTime(0.2,t);g.gain.linearRampToValueAtTime(0,t+0.5);o.start(t);o.stop(t+0.5);break;
      case'boss':o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.linearRampToValueAtTime(120,t+0.3);o.frequency.linearRampToValueAtTime(60,t+0.6);g.gain.setValueAtTime(0.4,t);g.gain.linearRampToValueAtTime(0,t+0.8);o.start(t);o.stop(t+0.8);break;
      case'aura':o.type='sine';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(1500,t+0.3);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.4);o.start(t);o.stop(t+0.4);break;
      case'gameover':o.type='square';o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(100,t+0.8);g.gain.setValueAtTime(0.3,t);g.gain.linearRampToValueAtTime(0,t+1);o.start(t);o.stop(t+1);break;
      case'whoosh':o.type='sine';o.frequency.setValueAtTime(100,t);o.frequency.exponentialRampToValueAtTime(800,t+0.4);o.frequency.exponentialRampToValueAtTime(100,t+0.8);g.gain.setValueAtTime(0.2,t);g.gain.linearRampToValueAtTime(0,t+0.8);o.start(t);o.stop(t+0.8);break;
    }
  }catch(e){}
}
document.getElementById('muteBtn').addEventListener('click',()=>{muted=!muted;document.getElementById('muteBtn').textContent=muted?'🔇':'🔊'});

// ===== GAME STATE =====
let state='title',floor=1,score=0,hp=5,maxHp=5,comboMeter=0,comboMax=30,fireAura=0;
let player={x:0,y:0,dir:0,speed:120,dmg:1,speedBoost:0,shieldTime:0,dmgBoost:0,invuln:0};
let enemies=[],pickups=[],particles=[],popups=[],slashAnim=null,stairs={x:0,y:0};
let projectiles=[];
let map=[],camX=0,camY=0,shakeX=0,shakeY=0,shakeT=0,gameTime=0;
let joystick={active:false,sx:0,sy:0,cx:0,cy:0,dx:0,dy:0,id:-1};
let flickerT=0;
let torches=[];
let ambientParticles=[];
let floorTransition=0; // >0 means transition active
let wallSeeds=[]; // per-tile random seeds for texture variation

// Seeded random for wall textures
function hashTile(x,y){return((x*2654435761)^(y*2246822519))>>>0}

// ===== DUNGEON GENERATION =====
function genFloor(fl){
  map=[];torches=[];
  for(let y=0;y<MH;y++){map[y]=[];for(let x=0;x<MW;x++)map[y][x]=1}
  const rooms=[];
  const numRooms=6+Math.floor(Math.random()*4);
  for(let i=0;i<numRooms;i++){
    const rw=4+Math.floor(Math.random()*5),rh=4+Math.floor(Math.random()*5);
    const rx=2+Math.floor(Math.random()*(MW-rw-4)),ry=2+Math.floor(Math.random()*(MH-rh-4));
    let overlap=false;
    for(const r of rooms){if(rx<r.x+r.w+1&&rx+rw>r.x-1&&ry<r.y+r.h+1&&ry+rh>r.y-1){overlap=true;break}}
    if(overlap)continue;
    rooms.push({x:rx,y:ry,w:rw,h:rh});
    for(let dy=0;dy<rh;dy++)for(let dx=0;dx<rw;dx++)map[ry+dy][rx+dx]=0;
  }
  for(let i=1;i<rooms.length;i++){
    let ax=Math.floor(rooms[i-1].x+rooms[i-1].w/2),ay=Math.floor(rooms[i-1].y+rooms[i-1].h/2);
    let bx=Math.floor(rooms[i].x+rooms[i].w/2),by=Math.floor(rooms[i].y+rooms[i].h/2);
    while(ax!==bx){map[ay][ax]=0;ax+=ax<bx?1:-1}
    while(ay!==by){map[ay][ax]=0;ay+=ay<by?1:-1}
    map[ay][ax]=0;
  }
  if(rooms.length<2)return genFloor(fl);
  // Place torches on walls adjacent to floor tiles
  for(const rm of rooms){
    // Top wall
    if(rm.y>0){for(let x=rm.x;x<rm.x+rm.w;x+=3+Math.floor(Math.random()*2)){if(map[rm.y-1][x]===1)torches.push({x:x*TS+TS/2,y:(rm.y-1)*TS+TS-2,t:Math.random()*10})}}
    // Left wall
    if(rm.x>0){for(let y=rm.y;y<rm.y+rm.h;y+=3+Math.floor(Math.random()*2)){if(map[y][rm.x-1]===1)torches.push({x:(rm.x-1)*TS+TS-2,y:y*TS+TS/2,t:Math.random()*10})}}
  }
  const r0=rooms[0];
  player.x=(r0.x+r0.w/2)*TS;player.y=(r0.y+r0.h/2)*TS;
  const rl=rooms[rooms.length-1];
  stairs.x=Math.floor(rl.x+rl.w/2);stairs.y=Math.floor(rl.y+rl.h/2);
  enemies=[];
  const numEn=4+fl*2;
  const isBossFloor=(fl%5===0);
  for(let i=0;i<numEn;i++){
    const ri=rooms[1+Math.floor(Math.random()*(rooms.length-1))];
    if(!ri)continue;
    const ex=ri.x+1+Math.floor(Math.random()*(ri.w-2)),ey=ri.y+1+Math.floor(Math.random()*(ri.h-2));
    if(map[ey][ex]!==0)continue;
    let type;
    const r=Math.random();
    if(fl<3)type='skeleton';
    else if(fl<6)type=r<0.4?'skeleton':r<0.7?'slime':'bat';
    else type=r<0.3?'skeleton':r<0.5?'slime':r<0.8?'bat':'skeleton';
    enemies.push({x:ex*TS+TS/2,y:ey*TS+TS/2,type,hp:type==='slime'?2:type==='bat'?1:2,maxHp:type==='slime'?2:type==='bat'?1:2,speed:type==='bat'?60:type==='slime'?20:35,dmg:1,t:Math.random()*6,size:type==='slime'?10:8,hit:0});
  }
  if(isBossFloor){
    const br=rooms[Math.floor(rooms.length/2)]||rooms[1];
    enemies.push({x:(br.x+br.w/2)*TS,y:(br.y+br.h/2)*TS,type:'darkknight',hp:8+fl*2,maxHp:8+fl*2,speed:40,dmg:2,t:0,size:14,hit:0});
    playSound('boss');
  }
  pickups=[];
  for(let i=0;i<3+fl;i++){
    const ri=rooms[Math.floor(Math.random()*rooms.length)];
    const px=ri.x+1+Math.floor(Math.random()*(ri.w-2)),py=ri.y+1+Math.floor(Math.random()*(ri.h-2));
    if(map[py][px]!==0)continue;
    const r=Math.random();
    let type=r<0.3?'health':r<0.7?'ember':'chest';
    pickups.push({x:px*TS+TS/2,y:py*TS+TS/2,type,t:Math.random()*6});
  }
  particles=[];popups=[];projectiles=[];
  // Seed ambient particles
  ambientParticles=[];
  for(let i=0;i<30;i++){
    ambientParticles.push({x:Math.random()*MW*TS,y:Math.random()*MH*TS,vx:(Math.random()-0.5)*5,vy:-3-Math.random()*5,life:Math.random()*4+2,maxLife:4+Math.random()*2,size:1+Math.random()*1.5,type:Math.random()<0.5?'dust':'ember'});
  }
  // Floor transition
  floorTransition=1.0;
  if(fl>1)playSound('whoosh');
}

// ===== TOUCH HANDLING =====
const touchInfo={};
const HOLD_MS=180;

function onTouchStart(e){
  initAudio();
  if(state!=='play')return;
  for(const t of e.changedTouches){
    touchInfo[t.identifier]={sx:t.clientX,sy:t.clientY,cx:t.clientX,cy:t.clientY,start:performance.now(),moved:false,isMove:false};
  }
}
function onTouchMove(e){
  if(e.target.closest('button')||e.target.closest('.overlay'))return;
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=touchInfo[t.identifier];if(!info)continue;
    info.cx=t.clientX;info.cy=t.clientY;
    if(Math.abs(t.clientX-info.sx)>10||Math.abs(t.clientY-info.sy)>10)info.moved=true;
  }
}
function onTouchEnd(e){
  for(const t of e.changedTouches){
    const info=touchInfo[t.identifier];
    if(info){
      const held=performance.now()-info.start;
      if(held<HOLD_MS&&!info.moved){
        doAttack(info.cx,info.cy);
      }
      delete touchInfo[t.identifier];
    }
  }
  if(Object.keys(touchInfo).length===0){joystick.active=false;joystick.dx=0;joystick.dy=0}
}

function updateTouchMovement(){
  const now=performance.now();
  let moveTouch=null;
  for(const id in touchInfo){
    const info=touchInfo[id];
    if(now-info.start>=HOLD_MS||info.moved){
      info.isMove=true;
      moveTouch=info;
    }
  }
  if(moveTouch){
    const worldX=moveTouch.cx+camX,worldY=moveTouch.cy+camY;
    const dx=worldX-player.x,dy=worldY-player.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>8){
      joystick.active=true;
      joystick.dx=dx/dist;joystick.dy=dy/dist;
      player.dir=Math.atan2(dy,dx);
    }else{joystick.active=false;joystick.dx=0;joystick.dy=0}
  }else if(Object.keys(touchInfo).length===0){
    joystick.active=false;joystick.dx=0;joystick.dy=0;
  }
}

document.addEventListener('touchstart',onTouchStart,{passive:true});
document.addEventListener('touchmove',onTouchMove,{passive:false});
document.addEventListener('touchend',onTouchEnd,{passive:true});
document.addEventListener('touchcancel',(e)=>{for(const t of e.changedTouches)delete touchInfo[t.identifier]},{passive:true});

// Mouse fallback
let mouseDown=false,mouseHoldStart=0;
canvas.addEventListener('mousedown',(e)=>{
  initAudio();if(state!=='play')return;
  mouseDown=true;mouseHoldStart=performance.now();
  joystick.sx=e.clientX;joystick.sy=e.clientY;
});
canvas.addEventListener('mousemove',(e)=>{
  if(!mouseDown)return;
  if(performance.now()-mouseHoldStart>=HOLD_MS){
    const worldX=e.clientX+camX,worldY=e.clientY+camY;
    const dx=worldX-player.x,dy=worldY-player.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>8){joystick.active=true;joystick.dx=dx/dist;joystick.dy=dy/dist;player.dir=Math.atan2(dy,dx)}
  }
});
canvas.addEventListener('mouseup',(e)=>{
  if(mouseDown&&performance.now()-mouseHoldStart<HOLD_MS){doAttack(e.clientX,e.clientY)}
  mouseDown=false;joystick.active=false;joystick.dx=0;joystick.dy=0;
});

// ===== ATTACK =====
function doAttack(screenX,screenY){
  if(slashAnim)return;
  if(screenX!==undefined&&screenY!==undefined){
    const worldX=screenX+camX,worldY=screenY+camY;
    player.dir=Math.atan2(worldY-player.y,worldX-player.x);
  }
  playSound('bolt');
  slashAnim={t:0,dur:0.2,dir:player.dir};
  // Melee slash — hits close range
  const range=30,arc=Math.PI*0.8;
  const dmg=player.dmg+(player.dmgBoost>0?1:0)+(fireAura>0?1:0);
  for(const e of enemies){
    const dx=e.x-player.x,dy=e.y-player.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>range+e.size)continue;
    const angle=Math.atan2(dy,dx);
    let diff=angle-player.dir;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    if(Math.abs(diff)<arc/2){
      e.hp-=dmg;e.hit=0.15;
      playSound('hit');shake(3);
      spawnHitParticles(e.x,e.y);
      popups.push({x:e.x,y:e.y-10,text:'-'+dmg,t:0,color:'#ff4444'});
      if(e.hp<=0)killEnemy(e);
    }
  }
  // Fire ember bolt projectile
  const boltSpeed=350;
  projectiles.push({
    x:player.x+Math.cos(player.dir)*12,
    y:player.y+Math.sin(player.dir)*12,
    vx:Math.cos(player.dir)*boltSpeed,
    vy:Math.sin(player.dir)*boltSpeed,
    life:0.28, // ~3.5 tiles at 350 speed
    dmg:dmg,
    trail:[],
    hitSet:new Set()
  });
  // Slash sparks
  for(let i=0;i<6;i++){
    const a=player.dir+(Math.random()-0.5)*1.2;
    const s=80+Math.random()*60;
    particles.push({x:player.x+Math.cos(player.dir)*10,y:player.y+Math.sin(player.dir)*10,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3+Math.random()*0.2,type:'spark',size:2+Math.random()*2,color:fireAura>0?'#ff4400':'#ffcc44'});
  }
}

function spawnHitParticles(x,y){
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2,s=40+Math.random()*60;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.4,type:'spark',size:2+Math.random()*2,color:'#ff6600'});
  }
}

function killEnemy(e){
  playSound('death');
  const pts=e.type==='darkknight'?500:e.type==='bat'?150:100;
  score+=pts;
  popups.push({x:e.x,y:e.y,text:'+'+pts,t:0,color:'#ffdd00'});
  // Death shatter — lots of particles matching enemy color
  const col=e.type==='skeleton'?'#ccbbaa':e.type==='slime'?'#44cc44':e.type==='bat'?'#8844aa':'#6633aa';
  for(let i=0;i<15;i++){
    const a=Math.random()*Math.PI*2,s=40+Math.random()*80;
    particles.push({x:e.x+(Math.random()-0.5)*10,y:e.y+(Math.random()-0.5)*10,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.6+Math.random()*0.3,type:'shard',size:2+Math.random()*4,color:col});
  }
  // Ember drops
  for(let i=0;i<5;i++){
    particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*80,vy:(Math.random()-0.5)*80,life:1,type:'ember',size:3+Math.random()*3,color:'#ff6600'});
  }
  comboMeter=Math.min(comboMax,comboMeter+5);
  if(comboMeter>=comboMax&&fireAura<=0){
    fireAura=8;playSound('aura');
    popups.push({x:player.x,y:player.y-20,text:'🔥 FIRE AURA!',t:0,color:'#ff4400'});
  }
  if(e.type==='slime'&&e.size>6){
    for(let i=0;i<2;i++){
      enemies.push({x:e.x+(i?10:-10),y:e.y,type:'slime',hp:1,maxHp:1,speed:25,dmg:1,t:0,size:6,hit:0});
    }
  }
  e.hp=-999;
}

function shake(amt){shakeT=0.15;shakeX=(Math.random()-0.5)*amt*2;shakeY=(Math.random()-0.5)*amt*2}

// ===== UPDATE =====
function update(dt){
  if(state!=='play')return;
  gameTime+=dt;flickerT+=dt;
  if(floorTransition>0)floorTransition=Math.max(0,floorTransition-dt*2);
  updateTouchMovement();
  // Player movement
  const spd=player.speed*(player.speedBoost>0?1.5:1);
  let mx=joystick.dx*spd*dt,my=joystick.dy*spd*dt;
  if(mx!==0||my!==0){
    player.dir=Math.atan2(joystick.dy,joystick.dx);
    // Ember trail while moving
    if(Math.random()<0.4){
      particles.push({x:player.x+(Math.random()-0.5)*6,y:player.y+8,vx:(Math.random()-0.5)*10,vy:-5-Math.random()*10,life:0.4+Math.random()*0.3,type:'trail',size:2+Math.random()*2,color:Math.random()<0.5?'#ff6600':'#ff4400'});
    }
  }
  // Collision
  const nx=player.x+mx,ny=player.y+my;
  const r=8;
  if(!solid(nx-r,player.y-r)&&!solid(nx+r,player.y-r)&&!solid(nx-r,player.y+r)&&!solid(nx+r,player.y+r))player.x=nx;
  if(!solid(player.x-r,ny-r)&&!solid(player.x+r,ny-r)&&!solid(player.x-r,ny+r)&&!solid(player.x+r,ny+r))player.y=ny;
  // Player flame particles (always rising)
  if(Math.random()<0.25){
    particles.push({x:player.x+(Math.random()-0.5)*10,y:player.y-5+(Math.random()-0.5)*8,vx:(Math.random()-0.5)*12,vy:-20-Math.random()*15,life:0.3+Math.random()*0.3,type:'flame',size:2+Math.random()*2,color:Math.random()<0.6?'#ff8800':'#ffcc00'});
  }
  // Timers
  if(player.invuln>0)player.invuln-=dt;
  if(player.speedBoost>0)player.speedBoost-=dt;
  if(player.dmgBoost>0)player.dmgBoost-=dt;
  if(player.shieldTime>0)player.shieldTime-=dt;
  if(fireAura>0){fireAura-=dt;comboMeter=comboMax;
    if(Math.random()<0.4)particles.push({x:player.x+(Math.random()-0.5)*24,y:player.y+(Math.random()-0.5)*24,vx:(Math.random()-0.5)*25,vy:-35-Math.random()*25,life:0.5,type:'flame',size:4+Math.random()*3,color:Math.random()<0.5?'#ff4400':'#ff6600'});
  }else{comboMeter=Math.max(0,comboMeter-dt*2)}
  if(shakeT>0){shakeT-=dt;if(shakeT<=0){shakeX=0;shakeY=0}}
  if(slashAnim){slashAnim.t+=dt;if(slashAnim.t>=slashAnim.dur)slashAnim=null}
  // Projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.life-=dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    // Trail particles
    if(Math.random()<0.8){
      particles.push({x:p.x+(Math.random()-0.5)*4,y:p.y+(Math.random()-0.5)*4,vx:(Math.random()-0.5)*30,vy:(Math.random()-0.5)*30,life:0.2+Math.random()*0.15,type:'bolttrail',size:2+Math.random()*3,color:Math.random()<0.5?'#ff6600':'#ff3300'});
    }
    // Store trail positions for glow rendering
    p.trail.push({x:p.x,y:p.y,t:0.15});
    if(p.trail.length>8)p.trail.shift();
    // Hit wall?
    if(solid(p.x,p.y)){
      // Wall impact sparks
      for(let j=0;j<6;j++){
        const a=Math.random()*Math.PI*2,s=40+Math.random()*50;
        particles.push({x:p.x,y:p.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3,type:'spark',size:2,color:'#ff8800'});
      }
      projectiles.splice(i,1);continue;
    }
    // Hit enemies (pierce through)
    for(const e of enemies){
      if(e.hp<=-999)continue;
      if(p.hitSet.has(e))continue;
      const dx=e.x-p.x,dy=e.y-p.y;
      if(dx*dx+dy*dy<(e.size+6)*(e.size+6)){
        p.hitSet.add(e);
        e.hp-=p.dmg;e.hit=0.15;
        shake(3);playSound('hit');
        spawnHitParticles(e.x,e.y);
        popups.push({x:e.x,y:e.y-10,text:'-'+p.dmg,t:0,color:'#ff4444'});
        if(e.hp<=0)killEnemy(e);
      }
    }
    if(p.life<=0){projectiles.splice(i,1)}
  }
  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.hp<=-999){enemies.splice(i,1);continue}
    e.t+=dt;if(e.hit>0)e.hit-=dt;
    // Dark particles for shadow creatures
    if(Math.random()<0.1){
      particles.push({x:e.x+(Math.random()-0.5)*e.size,y:e.y+(Math.random()-0.5)*e.size,vx:(Math.random()-0.5)*15,vy:-10-Math.random()*10,life:0.4,type:'shadow',size:2+Math.random()*2,color:e.type==='darkknight'?'#442266':'#333'});
    }
    const dx=player.x-e.x,dy=player.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>15&&dist<200){
      let sp=e.speed;
      if(e.type==='bat')sp+=Math.sin(e.t*8)*20;
      const nx2=e.x+dx/dist*sp*dt,ny2=e.y+dy/dist*sp*dt;
      if(!solid(nx2,ny2)){e.x=nx2;e.y=ny2}
    }
    if(dist<e.size+8&&player.invuln<=0){
      if(player.shieldTime>0){player.shieldTime=0;shake(4);popups.push({x:player.x,y:player.y-15,text:'SHIELD!',t:0,color:'#44aaff'})}
      else{
        hp-=e.dmg;player.invuln=1;shake(6);playSound('hit');
        if(hp<=0){hp=0;endGame(false)}
      }
    }
  }
  // Pickups
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];p.t+=dt;
    const dx=player.x-p.x,dy=player.y-p.y;
    if(dx*dx+dy*dy<20*20){
      playSound('pickup');
      if(p.type==='health'){hp=Math.min(maxHp,hp+1);popups.push({x:p.x,y:p.y,text:'+❤️',t:0,color:'#ff4444'})}
      else if(p.type==='ember'){score+=50;popups.push({x:p.x,y:p.y,text:'+50',t:0,color:'#ffaa00'})}
      else{
        const r=Math.random();
        if(r<0.33){player.dmgBoost=10;popups.push({x:p.x,y:p.y,text:'⚔️ DMG UP!',t:0,color:'#ff6666'})}
        else if(r<0.66){player.speedBoost=10;popups.push({x:p.x,y:p.y,text:'💨 SPEED!',t:0,color:'#66ff66'})}
        else{player.shieldTime=15;popups.push({x:p.x,y:p.y,text:'🛡️ SHIELD!',t:0,color:'#6666ff'})}
      }
      pickups.splice(i,1);
    }
  }
  // Stairs
  {const dx=player.x-stairs.x*TS-TS/2,dy=player.y-stairs.y*TS-TS/2;
  if(dx*dx+dy*dy<18*18){
    if(floor>=MAXFLOOR){endGame(true)}
    else{floor++;score+=floor*100;playSound('stairs');genFloor(floor)}
  }}
  // Torch particles
  for(const torch of torches){
    torch.t+=dt;
    if(Math.random()<0.3){
      particles.push({x:torch.x+(Math.random()-0.5)*4,y:torch.y-4,vx:(Math.random()-0.5)*10,vy:-15-Math.random()*15,life:0.3+Math.random()*0.3,type:'torchflame',size:2+Math.random()*2,color:Math.random()<0.6?'#ff8800':'#ffcc00'});
    }
  }
  // Ambient particles
  for(let i=ambientParticles.length-1;i>=0;i--){
    const p=ambientParticles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0){
      // Respawn near player
      p.x=player.x+(Math.random()-0.5)*400;
      p.y=player.y+(Math.random()-0.5)*400;
      p.life=p.maxLife;
    }
  }
  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.type==='ember'){
      const dx=player.x-p.x,dy=player.y-p.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<200){p.vx+=dx/d*200*dt;p.vy+=dy/d*200*dt}
      if(d<15){comboMeter=Math.min(comboMax,comboMeter+0.5);p.life=-1}
    }
    if(p.life<=0)particles.splice(i,1);
  }
  // Popups
  for(let i=popups.length-1;i>=0;i--){
    popups[i].t+=dt;popups[i].y-=40*dt;
    if(popups[i].t>1)popups.splice(i,1);
  }
  // Camera
  camX=player.x-W/2;camY=player.y-H/2;
}

function solid(px,py){
  const tx=Math.floor(px/TS),ty=Math.floor(py/TS);
  if(tx<0||ty<0||tx>=MW||ty>=MH)return true;
  return map[ty][tx]===1;
}

function endGame(victory){
  state=victory?'victory':'gameover';
  const timeBonus=Math.max(0,Math.floor(1000-gameTime));
  score+=timeBonus+floor*200;
  if(victory){
    document.getElementById('victoryScreen').classList.remove('hidden');
    document.getElementById('vicScore').textContent='Score: '+score;
    if(isHighScore(score)){
      document.getElementById('vicInitials').classList.remove('hidden');
      document.getElementById('vicSubmitBtn').style.display='';
      document.getElementById('vicMenuBtn').style.display='none';
      vicChars=[0,0,0];updateVicChars();
    }else{
      document.getElementById('vicInitials').classList.add('hidden');
      document.getElementById('vicSubmitBtn').style.display='none';
      document.getElementById('vicMenuBtn').style.display='';
    }
  }else{
    playSound('gameover');
    document.getElementById('gameOverScreen').classList.remove('hidden');
    document.getElementById('goScore').textContent='Score: '+score;
    document.getElementById('goFloor').textContent='Floor: '+floor;
    if(isHighScore(score)){
      document.getElementById('initialsEntry').classList.remove('hidden');
      document.getElementById('goSubmitBtn').style.display='';
      document.getElementById('goMenuBtn').style.display='none';
      initChars=[0,0,0];updateInitChars();
    }else{
      document.getElementById('initialsEntry').classList.add('hidden');
      document.getElementById('goSubmitBtn').style.display='none';
      document.getElementById('goMenuBtn').style.display='';
    }
  }
}

// ===== RENDER =====
function render(){
  ctx.fillStyle='#060308';ctx.fillRect(0,0,W,H);
  if(state!=='play')return;
  ctx.save();
  ctx.translate(-camX+shakeX,-camY+shakeY);
  const flicker=1+Math.sin(flickerT*7)*0.03+Math.sin(flickerT*13)*0.02;

  // Visible tile range
  const sx=Math.max(0,Math.floor(camX/TS)),sy=Math.max(0,Math.floor(camY/TS));
  const ex=Math.min(MW,Math.ceil((camX+W)/TS)+1),ey=Math.min(MH,Math.ceil((camY+H)/TS)+1);

  // Precompute light sources: player + torches
  // For performance, we compute per-tile brightness from player and nearby torches
  function getTileBright(wx,wy){
    const dx=wx-player.x,dy=wy-player.y;
    let dist=Math.sqrt(dx*dx+dy*dy);
    let bright=Math.max(0,Math.min(1,(220-dist)/160))*flicker;
    // Add torch light
    for(const torch of torches){
      const tdx=wx-torch.x,tdy=wy-torch.y;
      const td=Math.sqrt(tdx*tdx+tdy*tdy);
      if(td<100){
        const tf=Math.max(0,(100-td)/100)*(0.5+Math.sin(torch.t*8)*0.1+Math.sin(torch.t*13)*0.05);
        bright=Math.min(1,bright+tf*0.6);
      }
    }
    return bright;
  }

  // Draw tiles with texture
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
    const wx=x*TS+TS/2,wy=y*TS+TS/2;
    const dx=wx-player.x,dy=wy-player.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>280)continue;
    const bright=getTileBright(wx,wy);
    if(bright<0.01)continue;
    const h=hashTile(x,y);
    if(map[y][x]===1){
      // Wall with brick texture
      const br=bright;
      const baseR=40+((h>>8)&15),baseG=28+((h>>12)&10),baseB=45+((h>>16)&10);
      ctx.fillStyle=`rgb(${Math.floor(baseR*br)},${Math.floor(baseG*br)},${Math.floor(baseB*br)})`;
      ctx.fillRect(x*TS,y*TS,TS,TS);
      // Brick lines
      const brickAlpha=0.15*br;
      ctx.strokeStyle=`rgba(20,15,10,${brickAlpha})`;
      ctx.lineWidth=1;
      ctx.strokeRect(x*TS+1,y*TS+1,TS-2,TS/2-1);
      ctx.strokeRect(x*TS+TS/2,y*TS+TS/2,TS/2-1,TS/2-1);
      ctx.strokeRect(x*TS+1,y*TS+TS/2,TS/2-1,TS/2-1);
      // Highlight edge
      ctx.fillStyle=`rgba(80,60,50,${0.2*br})`;
      ctx.fillRect(x*TS,y*TS,TS,1);ctx.fillRect(x*TS,y*TS,1,TS);
      // Cracks (deterministic from hash)
      if((h&0x1f)<4){
        ctx.strokeStyle=`rgba(15,10,8,${0.3*br})`;
        ctx.lineWidth=0.5;
        ctx.beginPath();
        const cx=x*TS+6+((h>>5)&7),cy=y*TS+4+((h>>9)&7);
        ctx.moveTo(cx,cy);ctx.lineTo(cx+4+((h>>13)&3),cy+5+((h>>17)&3));
        ctx.stroke();
      }
      // Moss patches
      if((h&0x3f)<3){
        ctx.fillStyle=`rgba(30,${Math.floor(60*br)},20,${0.3*br})`;
        const mx=x*TS+((h>>4)&0xf),my=y*TS+TS-4;
        ctx.fillRect(mx,my,4+((h>>8)&3),3);
      }
    }else{
      // Floor with subtle pattern
      const baseR=22+((h>>8)&8),baseG=18+((h>>12)&6),baseB=14+((h>>16)&6);
      ctx.fillStyle=`rgb(${Math.floor(baseR*bright)},${Math.floor(baseG*bright)},${Math.floor(baseB*bright)})`;
      ctx.fillRect(x*TS,y*TS,TS,TS);
      // Tile border
      ctx.fillStyle=`rgba(40,32,24,${0.08*bright})`;
      ctx.fillRect(x*TS,y*TS,TS,1);ctx.fillRect(x*TS,y*TS,1,TS);
      // Occasional floor detail
      if((h&0x1f)<2){
        ctx.fillStyle=`rgba(40,35,25,${0.12*bright})`;
        ctx.fillRect(x*TS+3+((h>>5)&7),y*TS+3+((h>>9)&7),3,3);
      }
    }
  }

  // Fog of war soft gradient (draw over edges)
  // Radial gradient centered on player for soft atmospheric edge
  const fogGrad=ctx.createRadialGradient(player.x,player.y,150,player.x,player.y,280);
  fogGrad.addColorStop(0,'rgba(6,3,8,0)');
  fogGrad.addColorStop(0.7,'rgba(6,3,8,0.5)');
  fogGrad.addColorStop(1,'rgba(6,3,8,1)');
  ctx.fillStyle=fogGrad;
  ctx.fillRect(camX-20,camY-20,W+40,H+40);

  // Player light (warm radial glow)
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const plGlow=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,fireAura>0?140:100);
  plGlow.addColorStop(0,fireAura>0?'rgba(255,80,0,0.12)':'rgba(255,140,60,0.08)');
  plGlow.addColorStop(0.5,fireAura>0?'rgba(255,60,0,0.06)':'rgba(255,100,40,0.04)');
  plGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=plGlow;
  ctx.fillRect(player.x-160,player.y-160,320,320);
  // Torch lights
  for(const torch of torches){
    const tdx=torch.x-player.x,tdy=torch.y-player.y;
    if(tdx*tdx+tdy*tdy>300*300)continue;
    const tGlow=ctx.createRadialGradient(torch.x,torch.y,0,torch.x,torch.y,70);
    const ti=0.6+Math.sin(torch.t*8)*0.1;
    tGlow.addColorStop(0,`rgba(255,150,50,${0.08*ti})`);
    tGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=tGlow;
    ctx.fillRect(torch.x-80,torch.y-80,160,160);
  }
  ctx.restore();

  // Torches (visual — bracket + flame)
  for(const torch of torches){
    const tdx=torch.x-player.x,tdy=torch.y-player.y;
    if(tdx*tdx+tdy*tdy>250*250)continue;
    const tb=getTileBright(torch.x,torch.y);
    ctx.fillStyle=`rgba(80,60,40,${tb})`;
    ctx.fillRect(torch.x-2,torch.y-6,4,8);
    // Flame
    const fs=3+Math.sin(torch.t*10)*1;
    ctx.save();ctx.globalCompositeOperation='lighter';
    ctx.fillStyle=`rgba(255,180,50,${0.7*tb})`;
    ctx.beginPath();ctx.arc(torch.x,torch.y-8,fs,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,100,20,${0.4*tb})`;
    ctx.beginPath();ctx.arc(torch.x,torch.y-10,fs*0.6,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Stairs (glowing portal)
  {const sx2=stairs.x*TS,sy2=stairs.y*TS;
  const stairPulse=0.5+Math.sin(flickerT*3)*0.3;
  ctx.save();ctx.globalCompositeOperation='lighter';
  const stGlow=ctx.createRadialGradient(sx2+TS/2,sy2+TS/2,2,sx2+TS/2,sy2+TS/2,TS);
  stGlow.addColorStop(0,`rgba(255,200,50,${0.15*stairPulse})`);
  stGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=stGlow;
  ctx.fillRect(sx2-TS,sy2-TS,TS*3,TS*3);
  ctx.restore();
  ctx.fillStyle='#553300';ctx.fillRect(sx2+2,sy2+2,TS-4,TS-4);
  ctx.fillStyle='#332200';
  for(let i=0;i<4;i++)ctx.fillRect(sx2+4,sy2+4+i*5,TS-8,2);
  ctx.fillStyle=`rgba(255,200,80,${0.3+stairPulse*0.3})`;
  ctx.fillRect(sx2+1,sy2+1,TS-2,TS-2);
  // Stair border glow
  ctx.strokeStyle=`rgba(255,170,0,${0.4+stairPulse*0.2})`;ctx.lineWidth=1.5;
  ctx.strokeRect(sx2+1,sy2+1,TS-2,TS-2);
  }

  // Ambient dust/ember particles
  for(const p of ambientParticles){
    const dx=p.x-player.x,dy=p.y-player.y;
    if(dx*dx+dy*dy>250*250)continue;
    ctx.globalAlpha=Math.min(1,p.life/p.maxLife)*0.3;
    ctx.fillStyle=p.type==='dust'?'#998877':'#ff8844';
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Pickups
  for(const p of pickups){
    const bob=Math.sin(p.t*3)*3;
    // Pickup glow
    ctx.save();ctx.globalCompositeOperation='lighter';
    const pCol=p.type==='health'?'rgba(255,50,50,0.06)':p.type==='ember'?'rgba(255,170,0,0.06)':'rgba(255,200,50,0.06)';
    const pGlow=ctx.createRadialGradient(p.x,p.y+bob,0,p.x,p.y+bob,20);
    pGlow.addColorStop(0,pCol);pGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pGlow;ctx.fillRect(p.x-25,p.y+bob-25,50,50);
    ctx.restore();
    if(p.type==='health'){ctx.fillStyle='#ff3333';ctx.beginPath();ctx.arc(p.x,p.y+bob,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.fillRect(p.x-1,p.y+bob-4,2,8);ctx.fillRect(p.x-4,p.y+bob-1,8,2)}
    else if(p.type==='ember'){ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.moveTo(p.x,p.y+bob-7);ctx.lineTo(p.x+5,p.y+bob+4);ctx.lineTo(p.x-5,p.y+bob+4);ctx.fill();ctx.fillStyle='#ffdd44';ctx.beginPath();ctx.moveTo(p.x,p.y+bob-4);ctx.lineTo(p.x+3,p.y+bob+2);ctx.lineTo(p.x-3,p.y+bob+2);ctx.fill()}
    else{ctx.fillStyle='#886633';ctx.fillRect(p.x-7,p.y+bob-5,14,10);ctx.fillStyle='#ffcc00';ctx.fillRect(p.x-1,p.y+bob-6,2,2);ctx.fillStyle='#aa8844';ctx.fillRect(p.x-7,p.y+bob-1,14,2)}
  }

  // Enemies — detailed shadow creatures
  for(const e of enemies){
    if(e.hp<=-999)continue;
    const bob=Math.sin(e.t*4)*2;
    const pulse=1+Math.sin(e.t*3)*0.05; // breathing
    const flash=e.hit>0;
    ctx.save();
    if(flash)ctx.globalAlpha=0.5+Math.sin(e.hit*30)*0.5;
    if(e.type==='skeleton'){
      // Dark wispy skeleton with red eyes
      ctx.save();ctx.translate(e.x,e.y+bob);ctx.scale(pulse,pulse);
      // Body shadow
      ctx.fillStyle=flash?'#fff':'#1a1520';
      ctx.beginPath();ctx.ellipse(0,4,7,3,0,0,Math.PI*2);ctx.fill(); // shadow base
      ctx.fillStyle=flash?'#fff':'#2a2030';
      ctx.fillRect(-6,-10,12,18); // body
      // Wispy edges
      ctx.fillStyle=flash?'#ddd':'#1a1520';
      for(let w=0;w<3;w++){
        const wa=Math.sin(e.t*5+w*2)*3;
        ctx.fillRect(-7+w*4,-8+wa,3,12);
      }
      // Skull
      ctx.fillStyle=flash?'#fff':'#443855';
      ctx.beginPath();ctx.arc(0,-7,5,0,Math.PI*2);ctx.fill();
      // Red glowing eyes
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='#ff2200';
      ctx.beginPath();ctx.arc(-2,-8,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(2,-8,1.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,0,0,0.15)';
      ctx.beginPath();ctx.arc(0,-8,6,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // Bone arm
      ctx.fillStyle='#554466';ctx.fillRect(6,-4,6,2);
      ctx.restore();
    }else if(e.type==='slime'){
      ctx.save();ctx.translate(e.x,e.y+bob);
      const squish=1+Math.sin(e.t*5)*0.08;
      ctx.scale(pulse/squish,pulse*squish);
      // Slime body with gradient
      const sg=ctx.createRadialGradient(0,-2,0,0,0,e.size);
      sg.addColorStop(0,flash?'#fff':'#66ee66');
      sg.addColorStop(0.6,flash?'#ddd':'#33aa33');
      sg.addColorStop(1,flash?'#bbb':'#227722');
      ctx.fillStyle=sg;
      ctx.beginPath();ctx.ellipse(0,0,e.size,e.size*0.7,0,0,Math.PI*2);ctx.fill();
      // Shiny highlight
      ctx.fillStyle='rgba(200,255,200,0.3)';
      ctx.beginPath();ctx.ellipse(-2,-3,3,2,0,0,Math.PI*2);ctx.fill();
      // Eyes
      ctx.fillStyle='#115511';
      ctx.beginPath();ctx.arc(-3,-2,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(3,-2,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(-3,-2,1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(3,-2,1,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }else if(e.type==='bat'){
      ctx.save();ctx.translate(e.x,e.y+bob);ctx.scale(pulse,pulse);
      const wing=Math.sin(e.t*12)*6;
      // Wings — more detailed
      ctx.fillStyle=flash?'#fff':'#5a2878';
      // Left wing
      ctx.beginPath();ctx.moveTo(-2,0);ctx.quadraticCurveTo(-8,-wing-4,-14,-wing);ctx.quadraticCurveTo(-10,2,-4,2);ctx.fill();
      // Right wing
      ctx.beginPath();ctx.moveTo(2,0);ctx.quadraticCurveTo(8,-wing-4,14,-wing);ctx.quadraticCurveTo(10,2,4,2);ctx.fill();
      // Body
      ctx.fillStyle=flash?'#fff':'#3a1858';
      ctx.beginPath();ctx.ellipse(0,0,4,5,0,0,Math.PI*2);ctx.fill();
      // Glowing eyes
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='#ffff00';
      ctx.beginPath();ctx.arc(-2,-2,1.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(2,-2,1.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,0,0.1)';
      ctx.beginPath();ctx.arc(0,-2,5,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // Ears
      ctx.fillStyle=flash?'#eee':'#5a2878';
      ctx.beginPath();ctx.moveTo(-3,-4);ctx.lineTo(-5,-8);ctx.lineTo(-1,-5);ctx.fill();
      ctx.beginPath();ctx.moveTo(3,-4);ctx.lineTo(5,-8);ctx.lineTo(1,-5);ctx.fill();
      ctx.restore();
    }else if(e.type==='darkknight'){
      ctx.save();ctx.translate(e.x,e.y+bob);ctx.scale(pulse,pulse);
      // Dark aura
      ctx.save();ctx.globalCompositeOperation='lighter';
      const dkGlow=ctx.createRadialGradient(0,0,5,0,0,25);
      dkGlow.addColorStop(0,'rgba(100,0,200,0.1)');
      dkGlow.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=dkGlow;ctx.fillRect(-30,-30,60,60);
      ctx.restore();
      // Body armor
      ctx.fillStyle=flash?'#fff':'#1a0833';
      ctx.fillRect(-10,-14,20,28);
      // Shoulder plates
      ctx.fillStyle=flash?'#ddd':'#2a1055';
      ctx.fillRect(-14,-14,6,8);ctx.fillRect(8,-14,6,8);
      // Helmet with visor
      ctx.fillStyle=flash?'#eee':'#2a1055';
      ctx.fillRect(-8,-18,16,8);
      ctx.fillStyle='#110022';ctx.fillRect(-6,-14,12,3); // visor slit
      // Glowing red eyes through visor
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='#ff3300';
      ctx.beginPath();ctx.arc(-3,-12,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(3,-12,1.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,0,0,0.2)';
      ctx.beginPath();ctx.arc(0,-12,8,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // Sword
      ctx.fillStyle='#443366';ctx.fillRect(10,-8,10,2);
      ctx.fillStyle='#6644aa';ctx.fillRect(18,-10,2,6);
      // Cape wisp
      ctx.fillStyle=flash?'#ccc':'#1a0830';
      const capeWave=Math.sin(e.t*3)*3;
      ctx.beginPath();ctx.moveTo(-8,14);ctx.quadraticCurveTo(0,18+capeWave,8,14);ctx.lineTo(6,8);ctx.lineTo(-6,8);ctx.fill();
      // HP bar
      ctx.fillStyle='#300';ctx.fillRect(-12,-24,24,3);
      ctx.fillStyle='#f00';ctx.fillRect(-12,-24,24*(e.hp/e.maxHp),3);
      ctx.restore();
    }
    ctx.restore();
  }

  // Player character — detailed knight
  ctx.save();
  const pa=player.invuln>0&&Math.sin(player.invuln*20)>0?0.4:1;
  ctx.globalAlpha=pa;
  ctx.save();ctx.translate(player.x,player.y);

  // Ember core glow (additive)
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=fireAura>0?'rgba(255,80,0,0.25)':'rgba(255,120,40,0.1)';
  ctx.beginPath();ctx.arc(0,0,fireAura>0?22:14,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Legs
  ctx.fillStyle='#553322';
  ctx.fillRect(-5,4,4,8);ctx.fillRect(1,4,4,8);
  // Body armor
  ctx.fillStyle='#8a6633';ctx.fillRect(-8,-8,16,16);
  // Armor plate detail
  ctx.fillStyle='#9a7744';ctx.fillRect(-7,-6,14,4); // chest plate
  ctx.fillStyle='#7a5522';ctx.fillRect(-7,0,14,3); // belt
  // Ember core in chest
  ctx.save();ctx.globalCompositeOperation='lighter';
  const coreGlow=0.5+Math.sin(flickerT*6)*0.2;
  ctx.fillStyle=`rgba(255,100,0,${coreGlow*0.6})`;
  ctx.beginPath();ctx.arc(0,-3,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`rgba(255,200,50,${coreGlow*0.4})`;
  ctx.beginPath();ctx.arc(0,-3,1.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Shoulder armor
  ctx.fillStyle='#9a7744';
  ctx.fillRect(-10,-7,4,6);ctx.fillRect(6,-7,4,6);
  // Helmet
  ctx.fillStyle='#8a6633';
  ctx.beginPath();
  ctx.moveTo(-6,-8);ctx.lineTo(-7,-13);ctx.lineTo(0,-16);ctx.lineTo(7,-13);ctx.lineTo(6,-8);
  ctx.fill();
  // Visor
  ctx.fillStyle='#553311';ctx.fillRect(-5,-12,10,3);
  // Eye glow through visor
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.fillStyle='rgba(255,180,50,0.5)';
  ctx.fillRect(-3,-11,2,1.5);ctx.fillRect(1,-11,2,1.5);
  ctx.restore();
  // Helmet crest
  ctx.fillStyle='#aa7744';
  ctx.beginPath();ctx.moveTo(-1,-16);ctx.lineTo(0,-19);ctx.lineTo(1,-16);ctx.fill();

  // Facing indicator (sword/weapon direction)
  const fx=Math.cos(player.dir)*16,fy=Math.sin(player.dir)*16;
  ctx.fillStyle='#ffcc00';
  ctx.beginPath();ctx.arc(fx,fy,2.5,0,Math.PI*2);ctx.fill();

  ctx.restore(); // translate

  // Shield visual
  if(player.shieldTime>0){
    ctx.strokeStyle=`rgba(100,150,255,${0.3+Math.sin(flickerT*5)*0.15})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(player.x,player.y,18,0,Math.PI*2);ctx.stroke();
    ctx.save();ctx.globalCompositeOperation='lighter';
    const shGlow=ctx.createRadialGradient(player.x,player.y,12,player.x,player.y,20);
    shGlow.addColorStop(0,'rgba(60,100,255,0.05)');shGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=shGlow;ctx.fillRect(player.x-25,player.y-25,50,50);
    ctx.restore();
  }
  ctx.restore(); // player globalAlpha

  // Slash animation with sparks
  if(slashAnim){
    const prog=slashAnim.t/slashAnim.dur;
    ctx.save();ctx.translate(player.x,player.y);ctx.rotate(slashAnim.dir);
    // Bright slash arc
    ctx.save();ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle=fireAura>0?`rgba(255,100,0,${(1-prog)*0.8})`:`rgba(255,220,100,${(1-prog)*0.8})`;
    ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(0,0,25+prog*12,-0.7+prog*0.3,0.7-prog*0.3);ctx.stroke();
    // Inner bright line
    ctx.strokeStyle=`rgba(255,255,200,${(1-prog)*0.5})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,23+prog*10,-0.5+prog*0.2,0.5-prog*0.2);ctx.stroke();
    ctx.restore();
    ctx.restore();
  }

  // Projectiles (ember bolts)
  for(const p of projectiles){
    ctx.save();ctx.globalCompositeOperation='lighter';
    // Trail glow
    for(let i=0;i<p.trail.length;i++){
      const tp=p.trail[i];
      const ta=i/p.trail.length*0.3;
      ctx.fillStyle=`rgba(255,100,0,${ta})`;
      ctx.beginPath();ctx.arc(tp.x,tp.y,4-i*0.3,0,Math.PI*2);ctx.fill();
    }
    // Main bolt
    const boltSize=5+Math.sin(flickerT*20)*1;
    // Outer glow
    const bGlow=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,12);
    bGlow.addColorStop(0,'rgba(255,150,50,0.4)');
    bGlow.addColorStop(0.5,'rgba(255,80,0,0.15)');
    bGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bGlow;ctx.fillRect(p.x-15,p.y-15,30,30);
    // Core
    ctx.fillStyle='rgba(255,200,100,0.9)';
    ctx.beginPath();ctx.arc(p.x,p.y,boltSize*0.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,120,20,0.7)';
    ctx.beginPath();ctx.arc(p.x,p.y,boltSize,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Particles (with additive blending for fire types)
  ctx.save();
  for(const p of particles){
    const alpha=Math.max(0,p.life);
    if(p.type==='flame'||p.type==='torchflame'||p.type==='bolttrail'||p.type==='spark'||p.type==='trail'){
      ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha=alpha*0.7;
    }else if(p.type==='shadow'){
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=alpha*0.5;
    }else if(p.type==='shard'){
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=alpha;
    }else{
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=alpha;
    }
    ctx.fillStyle=p.color;
    if(p.type==='shard'){
      // Rectangular shards that rotate
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.life*10);
      ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      ctx.restore();
    }else{
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*Math.min(1,p.life*2),0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
  ctx.restore();

  // Popups (floating damage/text)
  for(const p of popups){
    ctx.globalAlpha=Math.max(0,1-p.t);
    ctx.fillStyle=p.color;
    ctx.font=`bold ${14+Math.floor((1-p.t)*4)}px sans-serif`;
    ctx.textAlign='center';
    // Shadow for readability
    ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=2;
    ctx.strokeText(p.text,p.x,p.y);
    ctx.fillText(p.text,p.x,p.y);
  }
  ctx.globalAlpha=1;
  ctx.restore(); // camera transform

  // === HUD ===
  // Hearts
  for(let i=0;i<maxHp;i++){
    ctx.fillStyle=i<hp?'#ff3333':'#442222';
    ctx.font='20px sans-serif';ctx.fillText('❤️',10+i*24,30);
  }
  // Floor
  ctx.fillStyle='#ffaa44';ctx.font='bold 16px sans-serif';ctx.textAlign='left';
  ctx.fillText('Floor '+floor+'/'+MAXFLOOR,10,55);
  // Score
  ctx.fillText('Score: '+score,10,75);
  // Combo meter
  const cw=100,ch=8,cx2=10,cy2=82;
  ctx.fillStyle='#331100';ctx.fillRect(cx2,cy2,cw,ch);
  const comboFrac=comboMeter/comboMax;
  ctx.fillStyle=fireAura>0?'#ff4400':'#ff8800';ctx.fillRect(cx2,cy2,cw*comboFrac,ch);
  // Combo glow
  if(comboFrac>0.5){
    ctx.save();ctx.globalCompositeOperation='lighter';
    ctx.fillStyle=`rgba(255,100,0,${(comboFrac-0.5)*0.3})`;
    ctx.fillRect(cx2,cy2-1,cw*comboFrac,ch+2);
    ctx.restore();
  }
  ctx.strokeStyle='#664400';ctx.strokeRect(cx2,cy2,cw,ch);
  if(fireAura>0){ctx.fillStyle='#ff4400';ctx.font='bold 12px sans-serif';ctx.fillText('🔥 FIRE AURA',cx2,cy2+20)}
  // Joystick visual
  if(joystick.active){
    ctx.globalAlpha=0.3;ctx.fillStyle='#ffaa44';
    ctx.beginPath();ctx.arc(joystick.sx,joystick.sy,50,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.6;
    ctx.beginPath();ctx.arc(joystick.sx+joystick.dx*50,joystick.sy+joystick.dy*50,20,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Floor transition whoosh
  if(floorTransition>0){
    ctx.fillStyle=`rgba(0,0,0,${floorTransition})`;
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle=`rgba(255,100,0,${floorTransition*0.3})`;
    ctx.font=`bold ${Math.floor(24+floorTransition*20)}px sans-serif`;
    ctx.textAlign='center';
    ctx.fillText('Floor '+floor,W/2,H/2);
  }
}

// ===== INITIALS ENTRY =====
let initChars=[0,0,0],vicChars=[0,0,0];
const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
function updateInitChars(){for(let i=0;i<3;i++)document.getElementById('ic'+i).textContent=CHARS[initChars[i]]}
function updateVicChars(){for(let i=0;i<3;i++)document.getElementById('vc'+i).textContent=CHARS[vicChars[i]]}

document.querySelectorAll('.init-btn:not(.vic-ib)').forEach(b=>{
  const handler=()=>{
    const i=+b.dataset.i,d=+b.dataset.d;
    initChars[i]=(initChars[i]+d+26)%26;updateInitChars();
  };
  b.addEventListener('click',handler);b.addEventListener('touchend',(e)=>{e.preventDefault();handler()});
});
document.querySelectorAll('.vic-ib').forEach(b=>{
  const handler=()=>{
    const i=+b.dataset.i,d=+b.dataset.d;
    vicChars[i]=(vicChars[i]+d+26)%26;updateVicChars();
  };
  b.addEventListener('click',handler);b.addEventListener('touchend',(e)=>{e.preventDefault();handler()});
});

function submitScore(chars){
  const initials=chars.map(c=>CHARS[c]).join('');
  const hs=getHighScores();
  hs.push({initials,score,floor});
  hs.sort((a,b)=>b.score-a.score);
  if(hs.length>10)hs.length=10;
  saveHighScores(hs);
}

// ===== UI BUTTONS =====
function btn(id,fn){const el=document.getElementById(id);el.addEventListener('click',fn);el.addEventListener('touchend',(e)=>{e.preventDefault();fn()})}

btn('startBtn',()=>{
  initAudio();
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('controlsOverlay').classList.remove('hidden');
});
btn('hsBtn',()=>{
  document.getElementById('titleScreen').classList.add('hidden');
  showHS();document.getElementById('hsScreen').classList.remove('hidden');
});
btn('hsBackBtn',()=>{
  document.getElementById('hsScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');
});
document.getElementById('controlsOverlay').addEventListener('click',startGame);
document.getElementById('controlsOverlay').addEventListener('touchend',(e)=>{e.preventDefault();startGame()});

function startGame(){
  document.getElementById('controlsOverlay').classList.add('hidden');
  state='play';floor=1;score=0;hp=5;comboMeter=0;fireAura=0;gameTime=0;
  player.dmg=1;player.speedBoost=0;player.dmgBoost=0;player.shieldTime=0;player.invuln=0;
  genFloor(1);
}

btn('goSubmitBtn',()=>{
  submitScore(initChars);
  document.getElementById('goSubmitBtn').style.display='none';
  document.getElementById('initialsEntry').classList.add('hidden');
  document.getElementById('goMenuBtn').style.display='';
});
btn('goMenuBtn',()=>{
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');
  state='title';
});
btn('vicSubmitBtn',()=>{
  submitScore(vicChars);
  document.getElementById('vicSubmitBtn').style.display='none';
  document.getElementById('vicInitials').classList.add('hidden');
  document.getElementById('vicMenuBtn').style.display='';
});
btn('vicMenuBtn',()=>{
  document.getElementById('victoryScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');
  state='title';
});

function showHS(newIdx){
  const hs=getHighScores();
  let html='';
  if(hs.length===0)html='<p style="color:#886644;text-align:center">No scores yet!</p>';
  else hs.forEach((h,i)=>{
    const cls=i===newIdx?'hs-new':'';
    html+=`<div class="${cls}">${String(i+1).padStart(2,' ')}. ${h.initials} - ${h.score} (F${h.floor})</div>`;
  });
  document.getElementById('hsList').innerHTML=html;
}

// ===== GAME LOOP =====
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,(t-lastT)/1000);lastT=t;
  update(dt);render();
}
requestAnimationFrame(loop);
</script>
