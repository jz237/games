<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Joust — Modern 3D</title>
<meta name="description" content="Joust re-imagined in real-time 3D — the same ROM-faithful engine as the retro remake driving a volcanic 3D arena, with achievements, kill-cam, gamepad rumble and its own global leaderboard.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%23ffe999'/><stop offset='1' stop-color='%23d98f16'/></linearGradient></defs><polygon points='3,10 11,7 10,12 4,13' fill='url(%23g)'/><polygon points='9,7 12,3 13,5 10,8' fill='%23eebc2e'/><polygon points='10,5 15,4 15,5 11,6' fill='%23e8ecf5'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  overscroll-behavior:none;-webkit-user-select:none;user-select:none;touch-action:none}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#gl{z-index:1}#hud{z-index:2}
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
  color:#7fd4ff;background:#05060f;z-index:10;font-weight:700;letter-spacing:3px}
#boot small{color:#3a5a72;margin-top:12px;font-weight:400;letter-spacing:1px}
#touchbar{position:fixed;left:0;right:0;bottom:0;display:none;justify-content:space-between;align-items:flex-end;
  padding:14px 18px;gap:10px;z-index:20;pointer-events:none}
#touchbar button{pointer-events:auto;width:72px;height:72px;border-radius:50%;font-family:inherit;font-weight:700;
  font-size:15px;color:#cfeaff;background:radial-gradient(circle at 35% 30%,rgba(30,60,90,.85),rgba(10,20,34,.85));
  border:2px solid rgba(127,212,255,.5);backdrop-filter:blur(2px);-webkit-tap-highlight-color:transparent}
#touchbar #tF{width:96px;height:96px;font-size:18px;color:#fff;
  background:radial-gradient(circle at 35% 30%,rgba(120,40,40,.9),rgba(60,16,16,.9));border-color:rgba(255,120,120,.6)}
#touchbar button:active{filter:brightness(1.5)}
#touchbar .sp{flex:1}
#rotate{display:none}
@media (orientation:portrait) and (pointer:coarse){
  #rotate{display:flex;align-items:center;gap:8px;position:fixed;top:8px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.72);color:#7fd4ff;padding:7px 14px;border-radius:10px;font-size:13px;font-weight:700;
    letter-spacing:1px;z-index:30;pointer-events:none;border:1px solid rgba(127,212,255,.35)}
}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="hud"></canvas>
<div id="rotate">↻ ROTATE TO LANDSCAPE</div>
<div id="boot">LOADING JOUST 3D…<small>same game · new world</small></div>
<script>
window.__V3 = '1.1.1';                              // modern edition version (cache-buster)
window.__V  = '2.0.4';                              // shared retro-engine assets version
window.__JOUST_AUDIO_BASE = '../retro/assets/audio/'; // reuse the bit-exact arcade SFX
window.__JOUST_THEME = 'assets/audio/theme.ogg';       // original modern title theme (menus only)
window.addEventListener('error', e => { const b = document.getElementById('boot'); if (b && b.style.display !== 'none') b.innerHTML = 'LOAD ERROR:<br><small>' + (e.message || e.type) + '</small>'; });
</script>
<script src="../retro/assets/data.js?v=2.0.4"></script>
<!-- sprites.js MUST precede engine.js: the v2 engine uses the sprite pixel masks for ALL collision -->
<script src="../retro/assets/sprites.js?v=2.0.4"></script>
<script src="../retro/assets/engine.js?v=2.0.4"></script>
<script src="../retro/assets/audio.js?v=2.0.4"></script>
<script src="vendor/three.min.js?v=1.1.1"></script>
<script src="assets/render3d.js?v=1.1.1"></script>
<script src="assets/game3d.js?v=1.1.1"></script>
</body>
</html>
