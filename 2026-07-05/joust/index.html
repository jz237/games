<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Joust — Faithful Browser Remake</title>
<meta name="description" content="A source-faithful browser remake of Williams' 1982 arcade classic Joust — original pixel art and sound, ROM-accurate flap physics, waves, eggs, pterodactyl, lava troll, and 2-player play.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><ellipse cx='7' cy='9' rx='5' ry='4' fill='%23ffe14d'/><path d='M9 7 Q13 4 14 2' stroke='%23ffe14d' stroke-width='2' fill='none'/><rect x='5' y='2' width='3' height='4' fill='%23ffd23a'/><line x1='6' y1='3' x2='15' y2='1' stroke='%23e8e8f0' stroke-width='1'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;
  overscroll-behavior:none;-webkit-user-select:none;user-select:none;touch-action:none}
canvas{display:block;width:100%;height:100%;touch-action:none;image-rendering:pixelated;image-rendering:crisp-edges}
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
  color:#ffd23a;background:#05060f;z-index:10;font-weight:700;letter-spacing:3px}
#boot small{color:#7a6a2a;margin-top:12px;font-weight:400;letter-spacing:1px}
#touchbar{position:fixed;left:0;right:0;bottom:0;display:none;justify-content:space-between;align-items:flex-end;
  padding:14px 18px;gap:10px;z-index:20;pointer-events:none}
#touchbar button{pointer-events:auto;width:72px;height:72px;border-radius:50%;font-family:inherit;font-weight:700;
  font-size:15px;color:#ffe8a0;background:radial-gradient(circle at 35% 30%,rgba(90,70,30,.85),rgba(30,24,12,.85));
  border:2px solid rgba(255,210,60,.5);backdrop-filter:blur(2px);-webkit-tap-highlight-color:transparent}
#touchbar #tF{width:96px;height:96px;font-size:18px;color:#fff;
  background:radial-gradient(circle at 35% 30%,rgba(120,40,40,.9),rgba(60,16,16,.9));border-color:rgba(255,120,120,.6)}
#touchbar button:active{filter:brightness(1.5)}
#touchbar .sp{flex:1}
#touchbar > #tL,#touchbar > #tR{margin-right:8px}
#rotate{display:none}
@media (orientation:portrait) and (pointer:coarse){
  #rotate{display:flex;align-items:center;gap:8px;position:fixed;top:8px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.72);color:#ffd23a;padding:7px 14px;border-radius:10px;font-size:13px;font-weight:700;
    letter-spacing:1px;z-index:30;pointer-events:none;border:1px solid rgba(255,210,60,.35)}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="rotate">↻ ROTATE TO LANDSCAPE</div>
<div id="boot">LOADING JOUST…<small>Williams 1982 — faithful remake</small></div>
<script>
window.__V = '2.0.0';   // single source of truth for the cache-buster; keep the ?v= tags below in sync
window.addEventListener('error', e => { const b = document.getElementById('boot'); if (b && b.style.display !== 'none') b.innerHTML = 'LOAD ERROR:<br><small>' + (e.message || e.type) + '</small>'; });
</script>
<script src="assets/data.js?v=2.0.0"></script>
<script src="assets/sprites.js?v=2.0.0"></script>
<script src="assets/font.js?v=2.0.0"></script>
<script src="assets/engine.js?v=2.0.0"></script>
<script src="assets/render.js?v=2.0.0"></script>
<script src="assets/audio.js?v=2.0.0"></script>
<script src="assets/game.js?v=2.0.0"></script>
</body>
</html>
